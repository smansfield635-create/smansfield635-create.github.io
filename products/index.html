<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  />
  <title>Products | Diamond Gate Bridge</title>
  <meta
    name="description"
    content="Live products experience for Diamond Gate Bridge."
  />

  <style>
    :root {
      color-scheme: dark;
      --bg-0: #05070d;
      --bg-1: #0b1020;
      --bg-2: #10182c;
      --line: rgba(255, 255, 255, 0.12);
      --text: #f5f7ff;
      --muted: rgba(245, 247, 255, 0.72);
      --accent: #8bb8ff;
      --danger: #ff8f8f;
      --ok: #8fffb3;
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at top, rgba(73, 107, 178, 0.22), transparent 30%),
        radial-gradient(circle at bottom, rgba(94, 67, 160, 0.18), transparent 28%),
        linear-gradient(180deg, var(--bg-1) 0%, var(--bg-0) 100%);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      min-height: 100vh;
    }

    .page-shell {
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      gap: 0.75rem;
      align-items: center;
      justify-content: space-between;
      padding: 0.9rem 1rem;
      background: rgba(5, 7, 13, 0.72);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(14px);
    }

    .brand {
      font-size: 0.92rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text);
      text-decoration: none;
      white-space: nowrap;
    }

    .nav {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      justify-content: flex-end;
    }

    .nav a {
      color: var(--text);
      text-decoration: none;
      font-size: 0.84rem;
      line-height: 1;
      padding: 0.7rem 0.9rem;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.04);
    }

    .nav a[aria-current="page"] {
      border-color: rgba(139, 184, 255, 0.45);
      color: var(--accent);
    }

    .hero {
      width: min(1100px, calc(100% - 2rem));
      margin: 0 auto;
      padding: 1.25rem 0 0.75rem;
    }

    .eyebrow {
      display: inline-block;
      margin: 0 0 0.6rem;
      font-size: 0.78rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 3vw, 3.4rem);
      line-height: 1.02;
      letter-spacing: -0.03em;
    }

    .lede {
      max-width: 70ch;
      margin: 0.85rem 0 0;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.6;
    }

    .stage-shell {
      width: min(1100px, calc(100% - 2rem));
      margin: 0 auto;
      padding: 0.75rem 0 2rem;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    #products-stage {
      position: relative;
      min-height: 68vh;
      border: 1px solid var(--line);
      border-radius: 28px;
      overflow: clip;
      background:
        radial-gradient(circle at 50% 0%, rgba(139, 184, 255, 0.12), transparent 24%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0.015));
      box-shadow: var(--shadow);
      isolation: isolate;
    }

    #products-stage[data-ready="false"]::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 35%, rgba(139, 184, 255, 0.08), transparent 18%),
        radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.035), transparent 26%);
      pointer-events: none;
    }

    .loading-copy {
      position: absolute;
      inset: auto 1rem 1rem 1rem;
      z-index: 1;
      padding: 0.9rem 1rem;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(8, 12, 22, 0.76);
      color: var(--muted);
      font-size: 0.9rem;
      backdrop-filter: blur(12px);
    }

    .diagnostic-card {
      border: 1px solid var(--line);
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.03);
      overflow: hidden;
    }

    .diagnostic-card summary {
      cursor: pointer;
      list-style: none;
      padding: 0.95rem 1rem;
      font-size: 0.85rem;
      color: var(--muted);
      border-bottom: 1px solid transparent;
    }

    .diagnostic-card[open] summary {
      border-bottom-color: var(--line);
    }

    .diagnostic-card summary::-webkit-details-marker {
      display: none;
    }

    #products-diagnostics {
      margin: 0;
      padding: 1rem;
      white-space: pre-wrap;
      word-break: break-word;
      color: var(--text);
      font: 0.84rem/1.55 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    }

    .state-ok {
      color: var(--ok);
    }

    .state-error {
      color: var(--danger);
    }

    noscript {
      display: block;
      width: min(1100px, calc(100% - 2rem));
      margin: 1rem auto 2rem;
      padding: 1rem;
      border: 1px solid rgba(255, 143, 143, 0.35);
      border-radius: 18px;
      background: rgba(255, 143, 143, 0.08);
      color: var(--text);
    }

    @media (max-width: 720px) {
      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .nav {
        justify-content: flex-start;
      }

      #products-stage {
        min-height: 56vh;
      }
    }
  </style>
</head>
<body>
  <div class="page-shell">
    <header class="topbar">
      <a class="brand" href="/home/">Diamond Gate Bridge</a>
      <nav class="nav" aria-label="Products navigation">
        <a href="/home/">Home</a>
        <a href="/explore/">Explore</a>
        <a href="/gauges/">Gauges</a>
        <a href="/platform/">Platform</a>
        <a href="/products/" aria-current="page">Products</a>
      </nav>
    </header>

    <section class="hero" aria-label="Products introduction">
      <div class="eyebrow">Live products experience</div>
      <h1>Products</h1>
      <p class="lede">
        Protected host region, visible stage container, and runtime handoff through a single explicit host contract.
      </p>
    </section>

    <main class="stage-shell">
      <section
        id="products-stage"
        data-stage-owner="products_runtime"
        data-ready="false"
        aria-label="Products stage"
      >
        <div class="loading-copy" id="products-loading-copy">
          Loading products stage…
        </div>
      </section>

      <details class="diagnostic-card" id="products-diagnostic-card">
        <summary>Runtime / Receipt</summary>
        <pre id="products-diagnostics">Boot pending…</pre>
      </details>
    </main>

    <noscript>
      JavaScript is required to load the products stage.
    </noscript>
  </div>

  <script>
    window.__PRODUCTS_HOST_CONTRACT__ = Object.freeze({
      page: "PRODUCTS",
      version: "PRODUCTS_HOST_CONTRACT_V2",
      stageId: "products-stage",
      diagnosticsId: "products-diagnostics",
      loadingCopyId: "products-loading-copy",
      runtimeGlobalKey: "ProductsPlanetRuntime",
      runtimeScript: "/products/products_runtime.js",
      hostScript: "/products/index.js"
    });
  </script>

  <script defer src="/products/products_runtime.js"></script>
  <script defer src="/products/index.js"></script>
</body>
</html>
