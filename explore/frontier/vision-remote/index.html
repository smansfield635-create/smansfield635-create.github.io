<!doctype html>
<!-- TNT — /explore/frontier/vision-remote/index.html
     VISION · REMOTE (KIOSK)
     PURPOSE:
       - One usable hub page you can drive from.
       - 8 outer diamonds + 1 dominant center diamond (center is 125% size).
       - Center routes to Frontier Index (manual / linear map):
           /explore/frontier/index.html
       - Outer diamonds route to the 8 Frontier pages that already exist.
     INFORMAL SITE LAYER (PINNED):
       - style = informal (stored gd_style)
       - depth = explore  (stored gd_depth)
       - lane=platform|engineering is URL-only (never stored)
     CONTROLS:
       - Language (EN/中文/ES) top
       - Lane (PLATFORM/ENGINEERING) top
       - Switching lang/lane DOES NOT reload and DOES NOT break symmetry.
     STATE CARRY:
       - URL + LS: gd_lang/gd_style/gd_time/gd_depth only (NO new gd_* keys)
       - Preserve URL query: lang/style/time/depth/lane
     ASSETS:
       - /assets/ui.css + /assets/branch.css + /assets/instruments.js
       - ui.css owns html/body background (NO overrides)
-->

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>VISION · REMOTE</title>

<link rel="stylesheet" href="/assets/ui.css"/>
<link rel="stylesheet" href="/assets/branch.css"/>
<script defer src="/assets/instruments.js"></script>

<style>
a{color:inherit;text-decoration:none}
body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:#fff}
body::before,body::after{pointer-events:none!important}

:root{
  --dockH:112px;

  /* geometry */
  --D:124px;                 /* outer diamond size */
  --Dc:155px;                /* center diamond = 125% */
  --R:176px;                 /* ring radius (cardinals) */
  --Rd:124px;                /* ring radius (diagonals) approx R*0.707 */

  /* palette (red/black/gold) */
  --stroke:rgba(255,255,255,.12);
  --stroke2:rgba(255,255,255,.10);

  --ink:rgba(255,255,255,.94);
  --mut:rgba(255,255,255,.78);

  --crimson:rgba(120,0,22,.30);
  --festival:rgba(255,43,43,.14);
  --opalV:rgba(90,40,120,.10);
  --goldSoft:rgba(201,162,74,.18);

  --shadowA:0 34px 120px rgba(0,0,0,.58);
  --shadowB:0 18px 60px rgba(0,0,0,.55);
  --shadowC:0 18px 60px rgba(0,0,0,.55);
}

/* top controls */
.top{
  position:fixed;top:16px;left:0;right:0;
  padding:0 16px;
  display:flex;justify-content:space-between;align-items:center;
  gap:12px;
  z-index:240;
  pointer-events:none;
}
.top .left,.top .right{
  display:flex;gap:10px;align-items:center;flex-wrap:wrap;white-space:nowrap;
  pointer-events:auto;
}

/* compact nav buttons */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:10px 12px;min-height:44px;border-radius:16px;
  border:1px solid rgba(255,255,255,.14);
  background:
    radial-gradient(circle at 50% 120%, rgba(201,162,74,.14), transparent 64%),
    linear-gradient(145deg, rgba(10,12,16,.78), rgba(6,8,10,.90));
  color:var(--ink);
  font-weight:950;font-size:14px;letter-spacing:.2px;
  -webkit-tap-highlight-color:transparent;
  position:relative;overflow:hidden;
  touch-action:manipulation;
  box-shadow:var(--shadowC);
}
.btn:active{transform:translateY(1px)}
.btn::after{
  content:"";
  position:absolute;left:10px;right:10px;bottom:-12px;height:28px;
  background: radial-gradient(circle at 50% 0%, rgba(201,162,74,.28), transparent 72%);
  opacity:.55;pointer-events:none;
}
.btn.red{border-color:rgba(255,43,43,.22); box-shadow:var(--shadowC), 0 0 16px rgba(255,43,43,.10);}

/* diamond segmented controls */
.seg{
  display:inline-flex;gap:8px;align-items:center;
  padding:6px 8px;border-radius:18px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(0,0,0,.16);
  box-shadow:var(--shadowB);
}
.seg button{
  appearance:none;border:0;background:transparent;
  padding:8px 10px;min-height:40px;
  color:rgba(255,255,255,.84);
  font-weight:950;font-size:13px;letter-spacing:.25px;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
  border-radius:14px;
  position:relative;
}
.seg button::before{
  content:"";
  position:absolute;left:8px;top:50%;
  width:8px;height:8px;border-radius:2px;
  transform:translateY(-50%) rotate(45deg);
  background:rgba(201,162,74,.28);
  box-shadow:0 0 0 1px rgba(255,255,255,.10);
  opacity:.55;
}
.seg button span{padding-left:14px;display:inline-block}
.seg button[aria-pressed="true"]{
  color:var(--ink);
  background:
    radial-gradient(circle at 50% 120%, rgba(201,162,74,.18), transparent 62%),
    linear-gradient(180deg, rgba(255,43,43,.10), rgba(0,0,0,.10));
  box-shadow: inset 0 -10px 22px rgba(201,162,74,.10);
}
.seg button[aria-pressed="true"]::before{
  background:rgba(255,43,43,.30);
  opacity:.85;
}

/* page */
.page{
  width:min(1180px,94vw);
  margin:0 auto;
  padding:92px 0 calc(var(--dockH) + 22px);
  position:relative;
  z-index:10;
}

/* header slab */
.header{
  border:1px solid var(--stroke);
  border-radius:24px;
  background:
    radial-gradient(circle at 18% 22%, var(--crimson), transparent 72%),
    radial-gradient(circle at 82% 34%, var(--opalV), transparent 74%),
    radial-gradient(circle at 70% 92%, var(--festival), transparent 62%),
    radial-gradient(circle at 26% 22%, rgba(201,162,74,.14), transparent 62%),
    linear-gradient(160deg, rgba(0,0,0,.26), rgba(0,0,0,.12));
  backdrop-filter:blur(10px);
  box-shadow:var(--shadowA);
  padding:16px 16px 14px;
  position:relative;
  overflow:hidden;
}
.header::before{
  content:"";
  position:absolute;inset:0;border-radius:24px;pointer-events:none;
  box-shadow: inset 0 0 0 1px rgba(201,162,74,.14);
  background:
    repeating-linear-gradient(45deg, rgba(201,162,74,.08) 0 1px, transparent 1px 16px),
    repeating-linear-gradient(-45deg, rgba(201,162,74,.06) 0 1px, transparent 1px 16px);
  opacity:.22;
  mask:
    radial-gradient(circle at 50% 50%, transparent 0 78%, #000 82% 100%),
    linear-gradient(#000,#000);
  -webkit-mask:
    radial-gradient(circle at 50% 50%, transparent 0 78%, #000 82% 100%),
    linear-gradient(#000,#000);
}
.k{margin:0 0 8px;font-size:11px;letter-spacing:4px;text-transform:uppercase;opacity:.78;color:var(--mut);position:relative}
.t{margin:0;font-weight:980;font-size:28px;letter-spacing:.8px;color:var(--ink);position:relative}
.s{margin:10px 0 0;font-size:14.5px;line-height:1.55;color:rgba(255,255,255,.88);max-width:980px;position:relative}
.state{
  margin-top:10px;
  display:flex;gap:10px;flex-wrap:wrap;align-items:center;
  position:relative;
}
.pillState{
  display:inline-flex;align-items:center;gap:8px;
  padding:10px 12px;border-radius:999px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(0,0,0,.14);
  box-shadow:0 14px 36px rgba(0,0,0,.55);
  color:rgba(255,255,255,.78);
  font-weight:950;
}

/* stage */
.stage{
  position:relative;
  width:min(780px,94vw);
  height:min(780px,72vh);
  margin:16px auto 0;
  pointer-events:none;
}
.d{
  pointer-events:auto;
  position:absolute;left:50%;top:50%;
  width:var(--D);height:var(--D);
  border-radius:26px;
  cursor:pointer;
  touch-action:manipulation;
  -webkit-tap-highlight-color:transparent;
  transform-origin:center;
  overflow:hidden;

  background:
    radial-gradient(circle at 20% 18%, rgba(255,255,255,.22), transparent 46%),
    radial-gradient(circle at 70% 22%, rgba(255,43,43,.14), transparent 62%),
    radial-gradient(circle at 76% 78%, var(--opalV), transparent 66%),
    radial-gradient(circle at 28% 80%, var(--crimson), transparent 72%),
    linear-gradient(160deg, rgba(10,12,16,.82), rgba(6,8,10,.92));

  border:1px solid rgba(255,255,255,.14);
  box-shadow:
    0 44px 140px rgba(0,0,0,.78),
    0 0 28px rgba(255,43,43,.08),
    inset 0 2px 0 rgba(255,255,255,.16),
    inset 0 -44px 86px rgba(0,0,0,.86);

  transition:transform .16s ease, box-shadow .16s ease, border-color .16s ease;
}
.d::before{
  content:"";
  position:absolute;inset:0;border-radius:inherit;pointer-events:none;
  box-shadow: inset 0 0 0 1px rgba(201,162,74,.18);
  background:
    repeating-linear-gradient(45deg, rgba(201,162,74,.08) 0 1px, transparent 1px 18px),
    repeating-linear-gradient(-45deg, rgba(201,162,74,.06) 0 1px, transparent 1px 18px);
  opacity:.30;
  mask:
    radial-gradient(circle at 50% 50%, transparent 0 72%, #000 78% 100%),
    linear-gradient(#000,#000);
  -webkit-mask:
    radial-gradient(circle at 50% 50%, transparent 0 72%, #000 78% 100%),
    linear-gradient(#000,#000);
}
.d::after{
  content:"";
  position:absolute;left:10%;right:10%;top:10%;
  height:28%;
  border-radius:999px;
  background:linear-gradient(to bottom, rgba(255,255,255,.18), rgba(255,255,255,0));
  transform:rotate(-10deg);
  pointer-events:none;
  opacity:.90;
}
.d:hover{
  transform:translate(-50%,-50%) translate(var(--tx),var(--ty)) rotate(45deg) scale(1.04);
  border-color:rgba(201,162,74,.22);
}
.d:active{transform:translate(-50%,-50%) translate(var(--tx),var(--ty)) rotate(45deg) scale(.99);}

/* 8-ring placement (perfect compass) */
.N  { --tx:0px;                 --ty:calc(-1 * var(--R));  }
.NE { --tx:var(--Rd);           --ty:calc(-1 * var(--Rd)); }
.E  { --tx:var(--R);            --ty:0px;                  }
.SE { --tx:var(--Rd);           --ty:var(--Rd);            }
.S  { --tx:0px;                 --ty:var(--R);             }
.SW { --tx:calc(-1 * var(--Rd));--ty:var(--Rd);            }
.W  { --tx:calc(-1 * var(--R)); --ty:0px;                  }
.NW { --tx:calc(-1 * var(--Rd));--ty:calc(-1 * var(--Rd)); }

.N,.NE,.E,.SE,.S,.SW,.W,.NW{
  transform:translate(-50%,-50%) translate(var(--tx),var(--ty)) rotate(45deg);
}

/* center */
.C{
  width:var(--Dc);height:var(--Dc);
  --tx:0px;--ty:0px;
  transform:translate(-50%,-50%) rotate(45deg);
  border-color:rgba(255,43,43,.22);
  box-shadow:
    0 52px 170px rgba(0,0,0,.84),
    0 0 40px rgba(255,43,43,.10),
    0 0 26px rgba(201,162,74,.12),
    inset 0 2px 0 rgba(255,255,255,.18),
    inset 0 -52px 98px rgba(0,0,0,.88);
}
.C:hover{
  transform:translate(-50%,-50%) rotate(45deg) scale(1.03);
}
.C:active{
  transform:translate(-50%,-50%) rotate(45deg) scale(.99);
}

/* inner text */
.inner{
  width:100%;height:100%;
  transform:rotate(-45deg);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  text-align:center;
  padding:14px;
  gap:6px;
  user-select:none;
  pointer-events:none;
}
.word{
  font-weight:980;
  font-size:16px;
  letter-spacing:.7px;
  color:rgba(255,255,255,.94);
  text-shadow:0 0 18px rgba(0,0,0,.42);
}
.code{
  font-size:11px;
  letter-spacing:2px;
  opacity:.80;
  color:rgba(255,255,255,.78);
}
.small{
  font-size:11px;
  opacity:.78;
  color:rgba(255,255,255,.78);
}

/* dock */
.dock{
  position:fixed;left:50%;
  bottom:max(10px, env(safe-area-inset-bottom));
  transform:translateX(-50%);
  z-index:220;
  width:min(980px,94vw);
  padding:10px 12px;border-radius:22px;
  border:1px solid rgba(255,255,255,.12);
  background:
    radial-gradient(circle at 18% 18%, rgba(255,43,43,.10), transparent 62%),
    radial-gradient(circle at 82% 70%, rgba(90,40,120,.10), transparent 64%),
    linear-gradient(145deg, rgba(10,12,16,.72), rgba(6,8,10,.86));
  backdrop-filter:blur(10px);
  box-shadow:0 18px 60px rgba(0,0,0,.55);
  display:grid;grid-template-columns:repeat(4, minmax(0,1fr));
  gap:10px;
}
.dock .btn{width:100%;padding:10px 10px;border-radius:999px;white-space:nowrap}

@media (max-width:560px){
  :root{--D:114px;--Dc:143px;--R:162px;--Rd:114px}
}
@media (max-width:420px){
  :root{--D:108px;--Dc:135px;--R:152px;--Rd:108px}
}
</style>
</head>

<body>

<div class="top" aria-label="Top controls">
  <div class="left">
    <a class="btn" id="btnBack" data-route="/explore/frontier/" href="/explore/frontier/">FRONTIER</a>
    <a class="btn red" id="btnManual" data-route="/explore/frontier/index.html" href="/explore/frontier/index.html">INDEX</a>
  </div>
  <div class="right" aria-label="Controls">
    <div class="seg" role="group" aria-label="Language">
      <button type="button" id="langEN" aria-pressed="true"><span>EN</span></button>
      <button type="button" id="langZH" aria-pressed="false"><span>中文</span></button>
      <button type="button" id="langES" aria-pressed="false"><span>ES</span></button>
    </div>
    <div class="seg" role="group" aria-label="Lane">
      <button type="button" id="lanePlatform" aria-pressed="true"><span>PLATFORM</span></button>
      <button type="button" id="laneEngineering" aria-pressed="false"><span>ENGINEERING</span></button>
    </div>
  </div>
</div>

<div class="page">

  <section class="header" aria-label="Header">
    <p class="k" id="hk">VISION · REMOTE</p>
    <h1 class="t" id="ht">FRONTIER REMOTE</h1>
    <p class="s" id="hs"></p>
    <div class="state">
      <div class="pillState" id="laneState">—</div>
      <div class="pillState" id="langState">—</div>
    </div>
  </section>

  <div class="stage" aria-label="Remote diamonds">

    <!-- Outer 8 -->
    <div class="d N"  id="dCities"   role="button" tabindex="0" aria-label="Cities">
      <div class="inner"><div class="word" id="wCities">CITIES</div><div class="code">N</div><div class="small" id="sCities">Urban OS</div></div>
    </div>

    <div class="d NE" id="dWater"    role="button" tabindex="0" aria-label="Water">
      <div class="inner"><div class="word" id="wWater">WATER</div><div class="code">NE</div><div class="small" id="sWater">Circulation</div></div>
    </div>

    <div class="d E"  id="dEnergy"   role="button" tabindex="0" aria-label="Energy">
      <div class="inner"><div class="word" id="wEnergy">ENERGY</div><div class="code">E</div><div class="small" id="sEnergy">Stability</div></div>
    </div>

    <div class="d SE" id="dHabitats" role="button" tabindex="0" aria-label="Habitats">
      <div class="inner"><div class="word" id="wHabitats">HABITATS</div><div class="code">SE</div><div class="small" id="sHabitats">Closed loop</div></div>
    </div>

    <div class="d S"  id="dWaste"    role="button" tabindex="0" aria-label="Waste">
      <div class="inner"><div class="word" id="wWaste">WASTE</div><div class="code">S</div><div class="small" id="sWaste">Routing loss</div></div>
    </div>

    <div class="d SW" id="dTrajectory" role="button" tabindex="0" aria-label="Trajectory">
      <div class="inner"><div class="word" id="wTrajectory">TRAJECTORY</div><div class="code">SW</div><div class="small" id="sTrajectory">Windows</div></div>
    </div>

    <div class="d W"  id="dLattice"  role="button" tabindex="0" aria-label="Lattice">
      <div class="inner"><div class="word" id="wLattice">LATTICE</div><div class="code">W</div><div class="small" id="sLattice">Finite coords</div></div>
    </div>

    <div class="d NW" id="dShimmer"  role="button" tabindex="0" aria-label="Shimmer">
      <div class="inner"><div class="word" id="wShimmer">SHIMMER</div><div class="code">NW</div><div class="small" id="sShimmer">Signal clarity</div></div>
    </div>

    <!-- Center (dominant) -->
    <div class="d C" id="dCenter" role="button" tabindex="0" aria-label="Frontier Index">
      <div class="inner">
        <div class="word" id="wCenter">INDEX</div>
        <div class="code">CORE</div>
        <div class="small" id="sCenter">Manual / Map</div>
      </div>
    </div>

  </div>
</div>

<nav class="dock" aria-label="Bottom navigation">
  <a class="btn" id="dockExplore" data-route="/explore/" href="/explore/">EXPLORE</a>
  <a class="btn" id="dockProducts" data-route="/products/" href="/products/">PRODUCTS</a>
  <a class="btn" id="dockLaws" data-route="/laws/" href="/laws/">LAWS</a>
  <a class="btn" id="dockGauges" data-route="/gauges/" href="/gauges/">GAUGES</a>
</nav>

<script>
(function(){
  "use strict";

  // ===== Canon state (gd_* only; no new keys) =====
  var qs=new URLSearchParams(location.search);
  var LS=window.localStorage;

  var lang  = qs.get("lang")  || LS.getItem("gd_lang")  || "en";
  var time  = qs.get("time")  || LS.getItem("gd_time")  || "now";
  var lane  = qs.get("lane")  || "platform";            // URL-only (never store)

  // PIN informal layer
  var style = "informal";
  var depth = "explore";

  if(lang!=="en" && lang!=="zh" && lang!=="es") lang="en";
  if(time==="trajectory") time="post";
  if(time!=="origin" && time!=="now" && time!=="post") time="now";
  if(lane!=="platform" && lane!=="engineering") lane="platform";

  try{
    LS.setItem("gd_lang",lang);
    LS.setItem("gd_style","informal");
    LS.setItem("gd_time",time);
    LS.setItem("gd_depth","explore");
  }catch(e){}

  document.documentElement.lang=(lang==="zh")?"zh":(lang==="es")?"es":"en";

  function q(over){
    var p=new URLSearchParams();
    p.set("lang",(over&&over.lang)?over.lang:lang);
    p.set("style","informal");
    p.set("time",(over&&over.time)?over.time:time);
    p.set("depth","explore");
    p.set("lane",(over&&over.lane)?over.lane:lane);
    return "?" + p.toString();
  }

  function setPressed(ids, activeId){
    for(var i=0;i<ids.length;i++){
      var el=document.getElementById(ids[i]);
      if(el) el.setAttribute("aria-pressed", ids[i]===activeId ? "true" : "false");
    }
  }

  function laneLabel(){
    return (lang==="zh") ? (lane==="engineering"?"工程":"平台")
      : (lang==="es") ? (lane==="engineering"?"INGENIERÍA":"PLATAFORMA")
      : (lane==="engineering"?"ENGINEERING":"PLATFORM");
  }
  function langLabel(){
    return (lang==="zh") ? "中文" : (lang==="es") ? "ES" : "EN";
  }

  // Wire all internal links with pinned state + lane
  function wireAll(){
    var nodes=document.querySelectorAll("[data-route]");
    for(var i=0;i<nodes.length;i++){
      var el=nodes[i];
      var route=el.getAttribute("data-route")||"";
      if(!route) continue;
      el.setAttribute("href", route + q());
    }
  }

  // ===== Routes (8 + center) =====
  var ROUTES={
    cities:"/explore/frontier/urban/",
    water:"/explore/frontier/water/",
    energy:"/explore/frontier/energy/",
    habitats:"/explore/frontier/closed-loop/",
    waste:"/explore/frontier/waste/",
    trajectory:"/explore/frontier/trajectory/",
    lattice:"/explore/frontier/lattice/",
    shimmer:"/explore/frontier/shimmer/",
    center:"/explore/frontier/index.html"
  };

  function go(path){ window.location.href = path + q(); }
  function bind(id, fn){
    var el=document.getElementById(id);
    if(!el) return;
    el.addEventListener("click", fn, {passive:true});
    el.addEventListener("keydown", function(e){
      if(e.key==="Enter"||e.key===" "){ e.preventDefault(); fn(); }
    });
  }

  bind("dCities",    function(){ go(ROUTES.cities); });
  bind("dWater",     function(){ go(ROUTES.water); });
  bind("dEnergy",    function(){ go(ROUTES.energy); });
  bind("dHabitats",  function(){ go(ROUTES.habitats); });
  bind("dWaste",     function(){ go(ROUTES.waste); });
  bind("dTrajectory",function(){ go(ROUTES.trajectory); });
  bind("dLattice",   function(){ go(ROUTES.lattice); });
  bind("dShimmer",   function(){ go(ROUTES.shimmer); });
  bind("dCenter",    function(){ go(ROUTES.center); });

  // ===== No reload on language / lane changes =====
  function applyHeaderCopy(){
    document.getElementById("hk").textContent =
      (lang==="zh") ? "愿景 · 遥控器" : (lang==="es") ? "VISIÓN · CONTROL" : "VISION · REMOTE";
    document.getElementById("ht").textContent =
      (lang==="zh") ? "前沿遥控器" : (lang==="es") ? "CONTROL DE FRONTERA" : "FRONTIER REMOTE";

    document.getElementById("hs").textContent =
      (lane==="engineering")
        ? ((lang==="zh") ? "工程视角：选一个领域进入。中心=索引（手册/地图）。"
           : (lang==="es") ? "Ingeniería: elige un dominio. Centro = índice (manual/mapa)."
           : "Engineering view: pick a domain. Center = Index (manual/map).")
        : ((lang==="zh") ? "平台视角：点一个按钮走一步。中心=索引（手册/地图）。"
           : (lang==="es") ? "Plataforma: un toque, un paso. Centro = índice (manual/mapa)."
           : "Platform view: one tap, one step. Center = Index (manual/map).");

    document.getElementById("laneState").textContent =
      (lang==="zh") ? ("当前透镜："+laneLabel()) :
      (lang==="es") ? ("Lente actual: "+laneLabel()) :
      ("Current lens: "+laneLabel());

    document.getElementById("langState").textContent =
      (lang==="zh") ? ("语言：中文") :
      (lang==="es") ? ("Idioma: ES") :
      ("Lang: EN");

    // small labels (keep 1 word + short hint)
    if(lang==="zh"){
      document.getElementById("wCities").textContent="城市";

  function setLang(next){
    if(next!=="en" && next!=="zh" && next!=="es") next="en";
    lang=next;
    try{ LS.setItem("gd_lang",lang);}catch(e){}
    history.replaceState({}, "", location.pathname + q({lang:lang}));
    applyHeaderCopy();
  }
  function setLane(next){
    if(next!=="platform" && next!=="engineering") next="platform";
    lane=next;
    history.replaceState({}, "", location.pathname + q({lane:lane}));
    applyHeaderCopy();
  }
