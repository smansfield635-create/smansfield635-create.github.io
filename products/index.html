<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>PRODUCTS</title>

<link rel="stylesheet" href="/assets/ui.css"/>
<link rel="stylesheet" href="/assets/branch.css"/>
<script defer src="/assets/instruments.js"></script>

<style>
a{color:inherit;text-decoration:none}
body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:#fff}
body::before,body::after{pointer-events:none!important}

:root{
  --dockH:132px;
  --stroke:rgba(255,255,255,.12);
  --stroke2:rgba(255,255,255,.10);
  --ink:rgba(255,255,255,.95);
  --txt:rgba(255,255,255,.90);
  --mut:rgba(255,255,255,.78);
  --crimson:rgba(120,0,22,.34);
  --festival:rgba(255,43,43,.18);
  --opalV:rgba(90,40,120,.12);
  --goldSoft:rgba(201,162,74,.18);
  --shadowA:0 28px 110px rgba(0,0,0,.70);
  --shadowB:0 18px 60px rgba(0,0,0,.55);
  --shadowC:0 18px 60px rgba(0,0,0,.55);
  --fieldGap:14px;
  --microGap:10px;
  --radiusA:26px;
  --radiusB:22px;
  --radiusC:18px;
}

/* ===== TOP CONTROLS ===== */
.top{
  position:fixed;top:16px;left:0;right:0;
  padding:0 16px;
  display:flex;justify-content:space-between;align-items:center;
  gap:12px;
  z-index:240;
  pointer-events:none;
}
.top .left,.top .right{
  display:flex;gap:10px;flex-wrap:wrap;align-items:center;white-space:nowrap;
  pointer-events:auto;
}

.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:10px 12px;min-height:44px;border-radius:16px;
  border:1px solid rgba(255,255,255,.14);
  background:
    radial-gradient(circle at 50% 120%, rgba(201,162,74,.16), transparent 64%),
    linear-gradient(145deg, rgba(10,12,16,.78), rgba(6,8,10,.90));
  color:var(--ink);
  font-weight:950;font-size:14px;letter-spacing:.2px;
  -webkit-tap-highlight-color:transparent;
  position:relative;overflow:hidden;
  touch-action:manipulation;
  box-shadow:var(--shadowC);
}
.btn:active{transform:translateY(1px)}
.btn::after{
  content:"";
  position:absolute;left:10px;right:10px;bottom:-12px;height:28px;
  background: radial-gradient(circle at 50% 0%, rgba(201,162,74,.34), transparent 72%);
  opacity:.60;pointer-events:none;
}
.btn.red{border-color:rgba(255,43,43,.22); box-shadow:var(--shadowC), 0 0 18px rgba(255,43,43,.12);}

.seg{
  display:inline-flex;gap:0;overflow:hidden;border-radius:16px;
  border:1px solid rgba(255,255,255,.12);
  background: rgba(0,0,0,.16);
  box-shadow: var(--shadowC);
}
.seg button{
  appearance:none;border:0;background:transparent;color:var(--mut);
  padding:10px 12px;min-height:44px;font-weight:950;font-size:13px;
  letter-spacing:.25px;cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
.seg button[aria-pressed="true"]{
  color:var(--ink);
  background:
    radial-gradient(circle at 50% 120%, rgba(201,162,74,.22), transparent 62%),
    linear-gradient(180deg, rgba(255,43,43,.10), rgba(0,0,0,.10));
  box-shadow: inset 0 -10px 22px rgba(201,162,74,.16);
}

/* ===== PAGE ===== */
.page{
  width:min(1580px,96vw);
  margin:0 auto;
  padding:104px 0 calc(var(--dockH) + 18px);
  display:flex;
  flex-direction:column;
  gap:14px;
  position:relative;
  z-index:10;
}

.backdrop{
  position:absolute;
  left:50%;
  top:68px;
  transform:translateX(-50%);
  width:min(1660px,98vw);
  height:calc(100% - 108px);
  border-radius:34px;
  pointer-events:none;
  z-index:0;
  overflow:hidden;
}
.backdrop::before{
  content:"";
  position:absolute;inset:0;
  border:1px solid rgba(255,255,255,.08);
  border-radius:34px;
  background:
    radial-gradient(circle at 18% 20%, rgba(201,162,74,.10), transparent 60%),
    radial-gradient(circle at 78% 22%, rgba(255,43,43,.12), transparent 62%),
    radial-gradient(circle at 60% 90%, rgba(90,40,120,.10), transparent 64%),
    linear-gradient(160deg, rgba(0,0,0,.18), rgba(0,0,0,.08));
  box-shadow:
    0 70px 220px rgba(0,0,0,.62),
    inset 0 2px 0 rgba(255,255,255,.06),
    inset 0 -70px 140px rgba(0,0,0,.55);
  opacity:.92;
}
.backdrop::after{
  content:"";
  position:absolute;inset:-18%;
  background:
    radial-gradient(circle at 18% 34%, rgba(255,43,43,.18), transparent 44%),
    radial-gradient(circle at 84% 30%, rgba(255,43,43,.14), transparent 46%),
    radial-gradient(circle at 52% 78%, rgba(201,162,74,.12), transparent 48%),
    conic-gradient(from 12deg at 30% 28%,
      rgba(201,162,74,.14), transparent 12%,
      rgba(255,43,43,.12), transparent 24%,
      rgba(90,40,120,.10), transparent 38%,
      transparent 100%),
    conic-gradient(from 180deg at 70% 36%,
      rgba(255,43,43,.12), transparent 14%,
      rgba(201,162,74,.12), transparent 28%,
      rgba(90,40,120,.10), transparent 44%,
      transparent 100%),
    radial-gradient(circle at 50% 50%, rgba(255,255,255,.04), transparent 62%);
  filter:blur(1px);
  opacity:.72;
}

/* ===== HERO ===== */
.hero{
  position:relative;
  z-index:2;
  border:1px solid var(--stroke);
  border-radius:var(--radiusA);
  padding:20px 18px 16px;
  background:
    radial-gradient(circle at 18% 22%, var(--crimson), transparent 72%),
    radial-gradient(circle at 82% 30%, var(--opalV), transparent 74%),
    radial-gradient(circle at 70% 92%, var(--festival), transparent 62%),
    radial-gradient(circle at 26% 22%, rgba(201,162,74,.14), transparent 62%),
    linear-gradient(160deg, rgba(0,0,0,.30), rgba(0,0,0,.14));
  backdrop-filter:blur(10px);
  box-shadow:var(--shadowA);
  overflow:hidden;
}
.hero::before{
  content:"";
  position:absolute;inset:0;border-radius:var(--radiusA);pointer-events:none;
  box-shadow: inset 0 0 0 1px rgba(201,162,74,.16);
  background:
    repeating-linear-gradient(45deg, rgba(201,162,74,.08) 0 1px, transparent 1px 16px),
    repeating-linear-gradient(-45deg, rgba(201,162,74,.06) 0 1px, transparent 1px 16px);
  opacity:.22;
  mask:
    radial-gradient(circle at 50% 50%, transparent 0 78%, #000 82% 100%),
    linear-gradient(#000,#000);
  -webkit-mask:
    radial-gradient(circle at 50% 50%, transparent 0 78%, #000 82% 100%),
    linear-gradient(#000,#000);
}
.heroGrid{
  position:relative;
  display:grid;
  grid-template-columns:minmax(0,1.4fr) minmax(360px,.9fr);
  gap:18px;
  align-items:stretch;
}
.heroMain{min-width:0}
.heroField{
  min-width:0;
  display:grid;
  grid-template-columns:repeat(4,minmax(0,1fr));
  gap:10px;
  align-content:start;
}
.k{margin:0 0 8px;font-size:11px;letter-spacing:4px;text-transform:uppercase;opacity:.78;color:var(--mut);position:relative}
.h1{margin:0;font-weight:980;font-size:36px;letter-spacing:.7px;color:var(--ink);line-height:1.02;position:relative}
.sub{
  margin-top:12px;
  font-size:15.75px;
  line-height:1.6;
  color:rgba(255,255,255,.88);
  max-width:980px;
  position:relative;
  white-space:pre-line;
}
.rule{
  margin-top:12px;
  padding:12px 12px;
  border-radius:18px;
  border:1px solid rgba(255,255,255,.10);
  background:
    radial-gradient(circle at 22% 18%, rgba(255,43,43,.10), transparent 58%),
    radial-gradient(circle at 82% 70%, rgba(201,162,74,.10), transparent 62%),
    linear-gradient(160deg, rgba(10,12,16,.62), rgba(6,8,10,.76));
  font-size:13.25px;
  color:rgba(255,255,255,.86);
  line-height:1.45;
  position:relative;
}
.stateRow{
  margin-top:12px;
  display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;align-items:center;
}
.statePill{
  display:inline-flex;align-items:center;gap:8px;
  padding:10px 12px;border-radius:999px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(0,0,0,.16);
  color:rgba(255,255,255,.78);
  font-weight:950;
  box-shadow:0 14px 36px rgba(0,0,0,.55);
}
.fieldChip{
  position:relative;
  min-height:78px;
  border-radius:18px;
  border:1px solid rgba(255,255,255,.10);
  background:
    radial-gradient(circle at 24% 24%, rgba(255,255,255,.05), transparent 58%),
    linear-gradient(145deg, rgba(17,22,28,.88), rgba(10,12,16,.96));
  box-shadow:var(--shadowB);
  padding:12px;
  overflow:hidden;
}
.fieldChip::before{
  content:"";
  position:absolute;
  width:10px;height:10px;
  right:12px;top:12px;
  background:rgba(201,162,74,.90);
  border-radius:2px;
  transform:rotate(45deg);
  box-shadow:0 0 0 1px rgba(255,255,255,.08);
}
.fieldChip__k{
  font-size:10px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.58)
}
.fieldChip__v{
  margin-top:8px;font-size:13px;line-height:1.35;color:rgba(255,255,255,.88);font-weight:850
}

/* ===== SECTION HEADERS ===== */
.band{
  position:relative;z-index:2;
  padding:10px 12px;border-radius:18px;
  border:1px solid var(--stroke2);
  background:rgba(0,0,0,.14);
  font-weight:980;letter-spacing:.25px;
  color:rgba(255,255,255,.90);
}

/* ===== SIGNATURE FIELD ===== */
.sigField{
  position:relative;z-index:2;
  display:grid;
  grid-template-columns:repeat(12,minmax(0,1fr));
  gap:var(--fieldGap);
  align-items:start;
}
.sigNode{
  position:relative;
  min-height:180px;
  border:1px solid rgba(255,255,255,.10);
  border-radius:22px;
  background:
    radial-gradient(circle at 18% 18%, rgba(255,43,43,.10), transparent 58%),
    radial-gradient(circle at 82% 30%, rgba(90,40,120,.10), transparent 66%),
    linear-gradient(145deg, rgba(17,22,28,.86), rgba(11,15,20,.94));
  box-shadow:var(--shadowA);
  overflow:hidden;
}
.sigNode::before{
  content:"";
  position:absolute;inset:0;border-radius:22px;pointer-events:none;
  box-shadow:inset 0 0 0 1px rgba(201,162,74,.10);
  opacity:.55;
}
.sigNode[data-open="true"]{border-color:rgba(255,43,43,.22); box-shadow:var(--shadowA), 0 0 18px rgba(255,43,43,.10)}
.sigNode--wide{grid-column:span 6}
.sigNode--mid{grid-column:span 4}
.sigNode--small{grid-column:span 3}
.sigNode__head{
  display:flex;justify-content:space-between;align-items:flex-start;gap:12px;
  padding:16px;cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation;
}
.sigNode__left{display:flex;gap:12px;align-items:flex-start;min-width:0}
.sigNode__diamond{
  width:12px;height:12px;border-radius:3px;transform:rotate(45deg);flex:0 0 auto;margin-top:4px;
  background:var(--nodeColor,#c9a24a);
  box-shadow:0 0 0 1px rgba(255,255,255,.14), 0 0 14px rgba(0,0,0,.35);
}
.sigNode__title{
  font-weight:980;font-size:19px;line-height:1.1;color:var(--ink)
}
.sigNode__preview{
  margin-top:8px;font-size:13.75px;line-height:1.42;color:rgba(255,255,255,.84);max-width:64ch
}
.sigNode__chev{
  width:36px;height:36px;border-radius:14px;border:1px solid rgba(255,255,255,.14);
  background:rgba(0,0,0,.16);display:flex;align-items:center;justify-content:center;
  color:rgba(255,255,255,.78);font-weight:950;flex:0 0 auto;position:relative;overflow:hidden
}
.sigNode__chev::after{
  content:"";position:absolute;left:6px;right:6px;bottom:-10px;height:22px;
  background:radial-gradient(circle at 50% 0%, rgba(201,162,74,.30), transparent 70%);
  opacity:.62;pointer-events:none;
}
.sigNode__body{
  display:none;
  padding:0 16px 16px;
  border-top:1px solid rgba(255,255,255,.08);
  background:
    radial-gradient(circle at 30% 30%, rgba(255,255,255,.06), transparent 55%),
    linear-gradient(145deg, rgba(10,12,16,.86), rgba(6,8,10,.94));
}
.sigNode[data-open="true"] .sigNode__body{display:block}
.sigNode__micro{
  display:grid;grid-template-columns:1.1fr auto;gap:12px;align-items:end;padding-top:14px
}
.sigNode__para{
  margin:0;color:rgba(255,255,255,.88);font-size:14.5px;line-height:1.7
}

/* ===== STREAMS ===== */
.streamList{position:relative;z-index:2;display:flex;flex-direction:column;gap:12px}
.stream{
  position:relative;
  border:1px solid rgba(255,255,255,.10);
  border-radius:22px;
  background:
    radial-gradient(circle at 22% 18%, rgba(255,43,43,.10), transparent 58%),
    radial-gradient(circle at 82% 30%, rgba(90,40,120,.10), transparent 66%),
    linear-gradient(145deg, rgba(17,22,28,.86), rgba(11,15,20,.94));
  box-shadow:var(--shadowA);
  overflow:hidden;
}
.stream::before{
  content:"";
  position:absolute;inset:0;border-radius:22px;pointer-events:none;
  box-shadow:inset 0 0 0 1px rgba(201,162,74,.10);
  opacity:.55;
}
.stream[data-open="true"]{border-color:rgba(255,43,43,.22); box-shadow:var(--shadowA), 0 0 18px rgba(255,43,43,.10)}
.stream__head{
  display:flex;justify-content:space-between;align-items:flex-start;gap:12px;
  padding:16px;cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation;
}
.stream__left{display:flex;gap:12px;align-items:flex-start;min-width:0}
.stream__diamond{
  width:12px;height:12px;border-radius:3px;transform:rotate(45deg);flex:0 0 auto;margin-top:4px;
  background:var(--streamColor,#c9a24a);
  box-shadow:0 0 0 1px rgba(255,255,255,.14), 0 0 14px rgba(0,0,0,.35);
}
.stream__title{
  font-weight:980;font-size:20px;line-height:1.1;color:var(--ink)
}
.stream__sub{
  margin-top:8px;font-size:13.75px;line-height:1.42;color:rgba(255,255,255,.84);max-width:96ch
}
.stream__chev{
  width:36px;height:36px;border-radius:14px;border:1px solid rgba(255,255,255,.14);
  background:rgba(0,0,0,.16);display:flex;align-items:center;justify-content:center;
  color:rgba(255,255,255,.78);font-weight:950;flex:0 0 auto;position:relative;overflow:hidden
}
.stream__chev::after{
  content:"";position:absolute;left:6px;right:6px;bottom:-10px;height:22px;
  background:radial-gradient(circle at 50% 0%, rgba(201,162,74,.30), transparent 70%);
  opacity:.62;pointer-events:none;
}
.stream__body{
  display:none;
  padding:16px;
  border-top:1px solid rgba(255,255,255,.08);
  background:
    radial-gradient(circle at 30% 30%, rgba(255,255,255,.06), transparent 55%),
    linear-gradient(145deg, rgba(10,12,16,.86), rgba(6,8,10,.94));
}
.stream[data-open="true"] .stream__body{display:block}
.stream__bodyGrid{
  display:grid;
  grid-template-columns:minmax(0,.9fr) minmax(0,2.1fr);
  gap:14px;
  align-items:start;
}
.stream__thesis{
  position:sticky;top:92px;
  border:1px solid rgba(255,255,255,.10);
  border-radius:18px;
  padding:14px;
  background:
    radial-gradient(circle at 20% 20%, rgba(255,255,255,.04), transparent 58%),
    linear-gradient(145deg, rgba(10,12,16,.72), rgba(6,8,10,.86));
  box-shadow:var(--shadowB);
}
.stream__para{
  margin:0;color:rgba(255,255,255,.88);font-size:14.5px;line-height:1.7
}
.stream__grid{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:var(--microGap);
}
.productNode{
  position:relative;
  border:1px solid rgba(255,255,255,.10);
  border-radius:18px;
  background:
    radial-gradient(circle at 18% 18%, rgba(255,43,43,.08), transparent 56%),
    radial-gradient(circle at 82% 30%, rgba(90,40,120,.08), transparent 64%),
    linear-gradient(145deg, rgba(17,22,28,.84), rgba(11,15,20,.94));
  box-shadow:var(--shadowB);
  overflow:hidden;
}
.productNode::before{
  content:"";
  position:absolute;inset:0;border-radius:18px;pointer-events:none;
  box-shadow:inset 0 0 0 1px rgba(201,162,74,.08);
  opacity:.55;
}
.productNode[data-open="true"]{border-color:rgba(255,43,43,.22); box-shadow:var(--shadowB), 0 0 16px rgba(255,43,43,.10)}
.productNode__head{
  display:flex;justify-content:space-between;align-items:flex-start;gap:10px;
  padding:14px;cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation;
}
.productNode__left{display:flex;gap:10px;align-items:flex-start;min-width:0}
.productNode__diamond{
  width:10px;height:10px;border-radius:3px;transform:rotate(45deg);flex:0 0 auto;margin-top:4px;
  background:var(--prodColor,#c9a24a);
  box-shadow:0 0 0 1px rgba(255,255,255,.14), 0 0 10px rgba(0,0,0,.35);
}
.productNode__title{
  font-weight:980;font-size:17px;line-height:1.12;color:var(--ink)
}
.productNode__preview{
  margin-top:7px;font-size:13.25px;line-height:1.4;color:rgba(255,255,255,.84)
}
.productNode__chev{
  width:34px;height:34px;border-radius:12px;border:1px solid rgba(255,255,255,.14);
  background:rgba(0,0,0,.16);display:flex;align-items:center;justify-content:center;
  color:rgba(255,255,255,.78);font-weight:950;flex:0 0 auto;position:relative;overflow:hidden
}
.productNode__body{
  display:none;
  padding:0 14px 14px;
  border-top:1px solid rgba(255,255,255,.08);
  background:
    radial-gradient(circle at 30% 30%, rgba(255,255,255,.05), transparent 55%),
    linear-gradient(145deg, rgba(10,12,16,.84), rgba(6,8,10,.94));
}
.productNode[data-open="true"] .productNode__body{display:block}
.productNode__para{
  margin:14px 0 0;color:rgba(255,255,255,.88);font-size:14px;line-height:1.65
}
.actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end;margin-top:14px}
.actions .btn{border-radius:999px;min-height:40px;font-size:13px}

/* ===== DOCK ===== */
.dock{
  position:fixed;left:50%;
  bottom:max(10px, env(safe-area-inset-bottom));
  transform:translateX(-50%);
  z-index:220;
  width:min(980px,94vw);
  padding:10px 12px;border-radius:22px;
  border:1px solid rgba(255,255,255,.12);
  background:
    radial-gradient(circle at 18% 18%, rgba(255,43,43,.10), transparent 62%),
    radial-gradient(circle at 82% 70%, rgba(90,40,120,.10), transparent 64%),
    linear-gradient(145deg, rgba(10,12,16,.72), rgba(6,8,10,.86));
  backdrop-filter:blur(10px);
  box-shadow:0 18px 60px rgba(0,0,0,.55);
  display:grid;grid-template-columns:repeat(4, minmax(0,1fr));
  gap:10px;
}
.dock .btn{width:100%;padding:10px 10px;border-radius:999px;white-space:nowrap}

@media (max-width:1240px){
  .heroGrid{grid-template-columns:1fr}
  .heroField{grid-template-columns:repeat(2,minmax(0,1fr))}
  .stream__bodyGrid{grid-template-columns:1fr}
  .stream__thesis{position:relative;top:auto}
  .sigNode--wide,.sigNode--mid,.sigNode--small{grid-column:span 6}
}
@media (max-width:900px){
  .sigField{grid-template-columns:repeat(6,minmax(0,1fr))}
  .sigNode--wide,.sigNode--mid,.sigNode--small{grid-column:span 6}
  .stream__grid{grid-template-columns:1fr}
}
@media (max-width:520px){
  :root{--dockH:148px}
  .dock{grid-template-columns:repeat(3, minmax(0,1fr))}
  .h1{font-size:28px}
  .heroField{grid-template-columns:1fr}
}
</style>
</head>

<body>

<div class="top" aria-label="Top controls">
  <div class="left">
    <a class="btn" id="btnDoor" data-route="/door/" href="/door/">DOOR</a>
    <a class="btn" id="btnHome" data-route="/home/" href="/home/">HOME</a>
    <a class="btn red" id="btnCompass" data-route="/index.html" href="/index.html">COMPASS</a>
  </div>
  <div class="right" aria-label="Controls">
    <div class="seg" role="group" aria-label="Language">
      <button type="button" id="langEN" aria-pressed="true">EN</button>
      <button type="button" id="langZH" aria-pressed="false">中文</button>
      <button type="button" id="langES" aria-pressed="false">ES</button>
    </div>
    <div class="seg" role="group" aria-label="Lane">
      <button type="button" id="lanePlatform" aria-pressed="true">PLATFORM</button>
      <button type="button" id="laneEngineering" aria-pressed="false">ENGINEERING</button>
    </div>
  </div>
</div>

<div class="page">
  <div class="backdrop" aria-hidden="true"></div>

  <section class="hero" aria-label="Products hero">
    <div class="heroGrid">
      <div class="heroMain">
        <p class="k" id="hk">PRODUCTS</p>
        <h1 class="h1" id="ht">WHAT THE WORLD NEEDS NOW</h1>
        <p class="sub" id="hs"></p>
        <div class="rule" id="rule"></div>
        <div class="stateRow" aria-label="State">
          <div class="statePill" id="laneState">—</div>
          <div class="statePill" id="langState">—</div>
        </div>
      </div>
      <div class="heroField" aria-label="Field diagnostics">
        <div class="fieldChip"><div class="fieldChip__k">Surface</div><div class="fieldChip__v" id="chipSurface">256-density product field</div></div>

  function wireAll(){
    var nodes=document.querySelectorAll("[data-route]");
    for(var i=0;i<nodes.length;i++){
      var el=nodes[i];
      var route=el.getAttribute("data-route")||"";
      if(!route) continue;

      if(route.indexOf("?")!==-1){
        try{
          var u=new URL(route, location.origin);
          var sp=u.searchParams;
          sp.set("lang", lang);
          sp.set("style","informal");
          sp.set("time", time);
          sp.set("depth","explore");
          sp.set("lane", lane);
          el.setAttribute("href", u.pathname + "?" + sp.toString() + (u.hash||""));
        }catch(e){
          el.setAttribute("href", route);
        }
      }else{
        el.setAttribute("href", route + q());
      }
    }
  }

  function createEnterButton(id){
    var a=document.createElement("a");
    a.className="btn red";
    a.setAttribute("data-route", ROUTES[id] || "/products/");
    return a;
  }

  /* ===== SIGNATURE FIELD ===== */
  var sigField=document.getElementById("sigField");
  var sigRefs=[];
  var openSignature = 0;

  function closeAllSignature(){
    for(var i=0;i<sigRefs.length;i++){
      sigRefs[i].node.dataset.open = "false";
      sigRefs[i].chev.textContent = "▸";
    }
  }

  function toggleSignature(i){
    var active = sigRefs[i].node.dataset.open === "true";
    if(active){
      sigRefs[i].node.dataset.open = "false";
      sigRefs[i].chev.textContent = "▸";
      return;
    }
    closeAllSignature();
    openSignature = i;
    sigRefs[i].node.dataset.open = "true";
    sigRefs[i].chev.textContent = "▾";
    wireAll();
  }

  function buildSignatureField(){
    sigField.innerHTML="";
    sigRefs=[];
    for(var i=0;i<SIGNATURE.length;i++){
      var S=SIGNATURE[i];
      var node=document.createElement("article");
      node.className="sigNode sigNode--"+(S.size||"mid");
      node.style.setProperty("--nodeColor", S.c);

      var head=document.createElement("div");
      head.className="sigNode__head";
      head.setAttribute("role","button");
      head.tabIndex=0;

      var left=document.createElement("div");
      left.className="sigNode__left";

      var dia=document.createElement("div");
      dia.className="sigNode__diamond";

      var copy=document.createElement("div");
      copy.className="sigNode__copy";

      var title=document.createElement("div");
      title.className="sigNode__title";

      var preview=document.createElement("div");
      preview.className="sigNode__preview";

      copy.appendChild(title);
      copy.appendChild(preview);

      left.appendChild(dia);
      left.appendChild(copy);

      var chevWrap=document.createElement("div");
      chevWrap.className="sigNode__chev";
      var chev=document.createElement("span");
      chev.textContent="▸";
      chevWrap.appendChild(chev);

      head.appendChild(left);
      head.appendChild(chevWrap);

      var body=document.createElement("div");
      body.className="sigNode__body";

      var micro=document.createElement("div");
      micro.className="sigNode__micro";

      var para=document.createElement("p");
      para.className="sigNode__para";

      var actions=document.createElement("div");
      actions.className="actions";
      var enter=createEnterButton(S.id);
      actions.appendChild(enter);

      micro.appendChild(para);
      micro.appendChild(actions);
      body.appendChild(micro);

      (function(index){
        function act(){ toggleSignature(index); }
        head.addEventListener("click", act, {passive:true});
        head.addEventListener("keydown", function(e){
          if(e.key==="Enter"||e.key===" "){ e.preventDefault(); act(); }
        });
      })(i);

      node.appendChild(head);
      node.appendChild(body);
      sigField.appendChild(node);

      sigRefs.push({
        item:S,
        node:node,
        title:title,
        preview:preview,
        para:para,
        btn:enter,
        chev:chev
      });
    }
    toggleSignature(openSignature);
  }

  /* ===== STREAMS ===== */
  var streamList=document.getElementById("streamList");
  var streamRefs=[];
  var openStream=0;
  var openProductByStream={};

  function closeAllStreams(){
    for(var i=0;i<streamRefs.length;i++){
      streamRefs[i].row.dataset.open = "false";
      streamRefs[i].chev.textContent = "▸";
    }
  }

  function toggleStream(i){
    var isOpen=streamRefs[i].row.dataset.open === "true";
    if(isOpen){
      streamRefs[i].row.dataset.open="false";
      streamRefs[i].chev.textContent="▸";
      return;
    }
    closeAllStreams();
    openStream=i;
    streamRefs[i].row.dataset.open="true";
    streamRefs[i].chev.textContent="▾";
  }

  function closeAllProducts(refs){
    for(var i=0;i<refs.length;i++){
      refs[i].node.dataset.open="false";
      refs[i].chev.textContent="▸";
    }
  }

  function toggleProduct(streamIndex, prodIndex){
    var refs=streamRefs[streamIndex].products;
    var active = refs[prodIndex].node.dataset.open === "true";
    if(active){
      refs[prodIndex].node.dataset.open="false";
      refs[prodIndex].chev.textContent="▸";
      return;
    }
    closeAllProducts(refs);
    openProductByStream[streamIndex]=prodIndex;
    refs[prodIndex].node.dataset.open="true";
    refs[prodIndex].chev.textContent="▾";
    wireAll();
  }

  function buildStreamList(){
    streamList.innerHTML="";
    streamRefs=[];

    for(var i=0;i<STREAMS.length;i++){
      var S=STREAMS[i];

      var row=document.createElement("section");
      row.className="stream";
      row.style.setProperty("--streamColor", S.c);

      var head=document.createElement("div");
      head.className="stream__head";
      head.setAttribute("role","button");
      head.tabIndex=0;

      var left=document.createElement("div");
      left.className="stream__left";

      var dia=document.createElement("div");
      dia.className="stream__diamond";

      var block=document.createElement("div");
      block.className="stream__block";

      var title=document.createElement("div");
      title.className="stream__title";

      var sub=document.createElement("div");
      sub.className="stream__sub";

      block.appendChild(title);
      block.appendChild(sub);

      left.appendChild(dia);
      left.appendChild(block);

      var chevWrap=document.createElement("div");
      chevWrap.className="stream__chev";
      var chev=document.createElement("span");
      chev.textContent="▸";
      chevWrap.appendChild(chev);

      head.appendChild(left);
      head.appendChild(chevWrap);

      var body=document.createElement("div");
      body.className="stream__body";

      var bodyGrid=document.createElement("div");
      bodyGrid.className="stream__bodyGrid";

      var thesis=document.createElement("div");
      thesis.className="stream__thesis";
      var para=document.createElement("p");
      para.className="stream__para";
      thesis.appendChild(para);

      var grid=document.createElement("div");
      grid.className="stream__grid";

      var prodRefs=[];
      for(var j=0;j<S.products.length;j++){
        var P=S.products[j];

        var pNode=document.createElement("article");
        pNode.className="productNode";
        pNode.style.setProperty("--prodColor", P.c);

        var pHead=document.createElement("div");
        pHead.className="productNode__head";
        pHead.setAttribute("role","button");
        pHead.tabIndex=0;

        var pLeft=document.createElement("div");
        pLeft.className="productNode__left";

        var pDia=document.createElement("div");
        pDia.className="productNode__diamond";

        var pCopy=document.createElement("div");
        pCopy.className="productNode__copy";

        var pTitle=document.createElement("div");
        pTitle.className="productNode__title";

        var pPreview=document.createElement("div");
        pPreview.className="productNode__preview";

        pCopy.appendChild(pTitle);
        pCopy.appendChild(pPreview);

        pLeft.appendChild(pDia);
        pLeft.appendChild(pCopy);

        var pChevWrap=document.createElement("div");
        pChevWrap.className="productNode__chev";
        var pChev=document.createElement("span");
        pChev.textContent="▸";
        pChevWrap.appendChild(pChev);

        pHead.appendChild(pLeft);
        pHead.appendChild(pChevWrap);

        var pBody=document.createElement("div");
        pBody.className="productNode__body";

        var pPara=document.createElement("p");
        pPara.className="productNode__para";

        var pActions=document.createElement("div");
        pActions.className="actions";
        var pBtn=createEnterButton(P.id);
        pActions.appendChild(pBtn);

        pBody.appendChild(pPara);
        pBody.appendChild(pActions);

        (function(streamIndex, prodIndex){
          function act(){ toggleProduct(streamIndex, prodIndex); }
          pHead.addEventListener("click", act, {passive:true});
          pHead.addEventListener("keydown", function(e){
            if(e.key==="Enter"||e.key===" "){ e.preventDefault(); act(); }
          });
        })(i, j);

        pNode.appendChild(pHead);
        pNode.appendChild(pBody);
        grid.appendChild(pNode);

        prodRefs.push({
          prod:P,
          node:pNode,
          title:pTitle,
          preview:pPreview,
          para:pPara,
          btn:pBtn,
          chev:pChev
        });
      }

      bodyGrid.appendChild(thesis);
      bodyGrid.appendChild(grid);
      body.appendChild(bodyGrid);

      (function(index){
        function act(){ toggleStream(index); }
        head.addEventListener("click", act, {passive:true});
        head.addEventListener("keydown", function(e){
          if(e.key==="Enter"||e.key===" "){ e.preventDefault(); act(); }
        });
      })(i);

      row.appendChild(head);
      row.appendChild(body);
      streamList.appendChild(row);

      streamRefs.push({
        stream:S,
        row:row,
        title:title,
        sub:sub,
        para:para,
        chev:chev,
        products:prodRefs
      });
    }

    toggleStream(openStream);
  }

  function applyCopy(){
    applyHero();

    for(var i=0;i<sigRefs.length;i++){
      var S=sigRefs[i].item;
      var R=sigRefs[i];
      var nm=(lane==="engineering")?S.name.engineering:S.name.platform;
      var pv=(lane==="engineering")?S.preview.engineering:S.preview.platform;
      var pr=(lane==="engineering")?S.para.engineering:S.para.platform;

      R.title.textContent = pick3(nm.en, nm.zh, nm.es);
      R.preview.textContent = pick3(pv.en, pv.zh, pv.es);
      R.para.textContent = pick3(pr.en, pr.zh, pr.es);
      R.btn.textContent = openLabel()+": "+pick3("ENTER","进入","ENTRAR");
    }

    closeAllSignature();
    toggleSignature(openSignature);

    for(var s=0;s<streamRefs.length;s++){
      var SR=streamRefs[s];
      var S2=SR.stream;

      SR.title.textContent = pick3(S2.name.en, S2.name.zh, S2.name.es);
      SR.sub.textContent   = pick3(S2.sub.en, S2.sub.zh, S2.sub.es);

      var sp = (lane==="engineering") ? S2.para.engineering : S2.para.platform;
      SR.para.textContent = pick3(sp.en, sp.zh, sp.es);

      for(var j=0;j<SR.products.length;j++){
        var P=SR.products[j].prod;
        var R2=SR.products[j];

        var nm2=(lane==="engineering")?P.t.engineering:P.t.platform;
        var pv2=(lane==="engineering")?P.prev.engineering:P.prev.platform;
        var pr2=(lane==="engineering")?P.para.engineering:P.para.platform;

        R2.title.textContent = pick3(nm2.en, nm2.zh, nm2.es);
        R2.preview.textContent = pick3(pv2.en, pv2.zh, pv2.es);
        R2.para.textContent = pick3(pr2.en, pr2.zh, pr2.es);
        R2.btn.textContent = openLabel()+": "+pick3("ENTER","进入","ENTRAR");
      }

      closeAllProducts(SR.products);
      var openProd = Number.isInteger(openProductByStream[s]) ? openProductByStream[s] : 0;
      if(SR.products[openProd]){
        SR.products[openProd].node.dataset.open="true";
        SR.products[openProd].chev.textContent="▾";
      }
    }

    closeAllStreams();
    toggleStream(openStream);
    wireAll();
  }

  function setLang(next){
    if(next!=="en"&&next!=="zh"&&next!=="es") next="en";
    lang=next;
    try{ LS.setItem("gd_lang",lang);}catch(e){}
    history.replaceState({}, "", location.pathname + q({lang:lang}));
    setPressed(["langEN","langZH","langES"], lang==="zh"?"langZH":(lang==="es"?"langES":"langEN"));
    applyCopy();
  }

  function setLane(next){
    if(next!=="platform"&&next!=="engineering") next="platform";
    lane=next;
    history.replaceState({}, "", location.pathname + q({lane:lane}));
    setPressed(["lanePlatform","laneEngineering"], lane==="engineering"?"laneEngineering":"lanePlatform");
    applyCopy();
  }

  document.getElementById("langEN").addEventListener("click", function(){ setLang("en"); }, {passive:true});
  document.getElementById("langZH").addEventListener("click", function(){ setLang("zh"); }, {passive:true});
  document.getElementById("langES").addEventListener("click", function(){ setLang("es"); }, {passive:true});
  document.getElementById("lanePlatform").addEventListener("click", function(){ setLane("platform"); }, {passive:true});
  document.getElementById("laneEngineering").addEventListener("click", function(){ setLane("engineering"); }, {passive:true});

  setPressed(["langEN","langZH","langES"], lang==="zh"?"langZH":(lang==="es"?"langES":"langEN"));
  setPressed(["lanePlatform","laneEngineering"], lane==="engineering"?"laneEngineering":"lanePlatform");

  buildSignatureField();
  buildStreamList();
  applyCopy();

})();
</script>
