<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Compass</title>

<link rel="stylesheet" href="/assets/ui.css"/>
<link rel="stylesheet" href="/assets/branch.css"/>
<script defer src="/assets/instruments.js"></script>

<style>
a{color:inherit;text-decoration:none}
body{margin:0}
body::before,body::after{pointer-events:none!important}

:root{
  --R:160px;                 /* cardinal radius */
  --Rd:113px;                /* diagonal radius ≈ R * 0.707 */
  --D:150px;                 /* diamond size */

  --onyx0:rgba(6,8,10,.96);
  --onyx1:rgba(10,12,16,.88);

  --crimson:rgba(120,0,22,.44);
  --festival:rgba(255,43,43,.26);
  --opalV:rgba(90,40,120,.18);

  --gold:rgba(201,162,74,.55);
  --goldGlow:rgba(201,162,74,.36);

  --shadowDeep:0 44px 140px rgba(0,0,0,.82);
}

.stage{
  position:relative;
  width:min(760px,94vw);
  height:min(760px,82vh);
  margin:120px auto 0;
  pointer-events:none;
}

.d{
  position:absolute;
  left:50%;
  top:50%;
  width:var(--D);
  height:var(--D);
  border-radius:28px;
  cursor:pointer;
  pointer-events:auto;
  transform-origin:center;
  transition:transform .18s ease, box-shadow .18s ease;
  overflow:hidden;
}

/* Ring placement (8 nodes) */
.N  { transform:translate(-50%,-50%) rotate(45deg) translate(0, calc(-1 * var(--R))); }
.E  { transform:translate(-50%,-50%) rotate(45deg) translate(var(--R), 0); }
.S  { transform:translate(-50%,-50%) rotate(45deg) translate(0, var(--R)); }
.W  { transform:translate(-50%,-50%) rotate(45deg) translate(calc(-1 * var(--R)), 0); }

.NE { transform:translate(-50%,-50%) rotate(45deg) translate(var(--Rd), calc(-1 * var(--Rd))); }
.NW { transform:translate(-50%,-50%) rotate(45deg) translate(calc(-1 * var(--Rd)), calc(-1 * var(--Rd))); }
.SE { transform:translate(-50%,-50%) rotate(45deg) translate(var(--Rd), var(--Rd)); }
.SW { transform:translate(-50%,-50%) rotate(45deg) translate(calc(-1 * var(--Rd)), var(--Rd)); }

/* FULL GLOSS MATERIAL STACK (same family as Vision) */
.surface{
  background:
    radial-gradient(circle at 20% 18%, rgba(255,255,255,.30), transparent 45%),
    radial-gradient(circle at 78% 22%, var(--festival), transparent 60%),
    radial-gradient(circle at 75% 82%, var(--opalV), transparent 65%),
    radial-gradient(circle at 30% 80%, var(--crimson), transparent 72%),
    linear-gradient(160deg, var(--onyx1), var(--onyx0));

  border:1px solid rgba(255,255,255,.18);

  box-shadow:
    var(--shadowDeep),
    0 0 32px rgba(255,43,43,.14),
    inset 0 2px 0 rgba(255,255,255,.22),
    inset 0 -50px 90px rgba(0,0,0,.90);
}

/* Silk trim (subtle, edge only) */
.surface::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:inherit;
  pointer-events:none;
  background:
    repeating-linear-gradient(45deg, rgba(201,162,74,.10) 0 1px, transparent 1px 18px),
    repeating-linear-gradient(-45deg, rgba(201,162,74,.08) 0 1px, transparent 1px 18px);
  opacity:.40;
  mask:
    radial-gradient(circle at 50% 50%, transparent 0 72%, #000 78% 100%),
    linear-gradient(#000,#000);
  -webkit-mask:
    radial-gradient(circle at 50% 50%, transparent 0 72%, #000 78% 100%),
    linear-gradient(#000,#000);
}

/* Highlight streak */
.surface::after{
  content:"";
  position:absolute;
  left:12%;
  right:12%;
  top:10%;
  height:30%;
  border-radius:999px;
  background:linear-gradient(to bottom, rgba(255,255,255,.22), rgba(255,255,255,0));
  transform:rotate(-12deg);
  pointer-events:none;
  opacity:.95;
}

/* Research gold trim */
.goldTrim{
  border:1px solid var(--gold);
  box-shadow:
    var(--shadowDeep),
    0 0 38px var(--goldGlow),
    inset 0 2px 0 rgba(255,255,255,.24),
    inset 0 -50px 90px rgba(0,0,0,.90);
}

.d:hover{
  transform:translate(-50%,-50%) rotate(45deg) scale(1.05);
}

.inner{
  width:100%;
  height:100%;
  transform:rotate(-45deg);
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:980;
  font-size:17px;
  letter-spacing:.6px;
  text-align:center;
  color:#fff;
  padding:10px;
}

/* Mobile tighten */
@media (max-width:600px){
  :root{
    --R:142px;
    --Rd:100px;
    --D:138px;
  }
  .inner{font-size:16px}
}
</style>
</head>

<body>

<div class="stage">
  <!-- Cardinals -->
  <div class="d surface N"  id="dExplore"><div class="inner" id="txtExplore">EXPLORE</div></div>
  <div class="d surface E"  id="dProducts"><div class="inner" id="txtProducts">PRODUCTS</div></div>
  <div class="d surface S"  id="dLaws"><div class="inner" id="txtLaws">LAWS</div></div>
  <div class="d surface W"  id="dGauges"><div class="inner" id="txtGauges">GAUGES</div></div>

  <!-- Diagonals -->
  <div class="d surface goldTrim NE" id="dResearch"><div class="inner" id="txtResearch">RESEARCH</div></div>
  <div class="d surface NW" id="dEducation"><div class="inner" id="txtEducation">EDUCATION</div></div>
  <div class="d surface SE" id="dHome"><div class="inner" id="txtHome">HOME</div></div>
  <div class="d surface SW" id="dDoor"><div class="inner" id="txtDoor">DOOR</div></div>
</div>

<script>
(function(){
  var qs=new URLSearchParams(location.search);
  var lang  = qs.get("lang")  || localStorage.getItem("gd_lang")  || "en";
  var style = qs.get("style") || localStorage.getItem("gd_style") || "informal";
  var time  = qs.get("time")  || localStorage.getItem("gd_time")  || "now";
  var depth = qs.get("depth") || localStorage.getItem("gd_depth") || "explore";

  if(!["en","zh","es"].includes(lang)) lang="en";
  if(!["informal","formal"].includes(style)) style="informal";
  if(!["origin","now","post"].includes(time)) time="now";
  if(!["explore","learn"].includes(depth)) depth="explore";

  try{
    localStorage.setItem("gd_lang",lang);
    localStorage.setItem("gd_style",style);
    localStorage.setItem("gd_time",time);
    localStorage.setItem("gd_depth",depth);
  }catch(e){}

  function q(){
    return "?lang="+encodeURIComponent(lang)+"&style="+encodeURIComponent(style)+"&time="+encodeURIComponent(time)+"&depth="+encodeURIComponent(depth);
  }
  function go(p){location.href=p+q();}

  dExplore.onclick  = ()=>go("/explore/");
  dProducts.onclick = ()=>go("/products/");
  dLaws.onclick     = ()=>go("/laws/");
  dGauges.onclick   = ()=>go("/gauges/");
  dResearch.onclick = ()=>go("/research/");
  dEducation.onclick= ()=>go("/products/education/");
  dHome.onclick     = ()=>go("/home/");
  dDoor.onclick     = ()=>go("/door/");

  // Trilingual labels
  if(lang==="zh"){
    txtExplore.textContent="探索";
    txtProducts.textContent="产品";
    txtLaws.textContent="法则";
    txtGauges.textContent="量规";
    txtResearch.textContent="研究";
    txtEducation.textContent="教育";
    txtHome.textContent="主页";
    txtDoor.textContent="门";
  }else if(lang==="es"){
    txtExplore.textContent="EXPLORAR";
    txtProducts.textContent="PRODUCTOS";
    txtLaws.textContent="LEYES";
    txtGauges.textContent="MEDIDORES";
    txtResearch.textContent="INVESTIGACIÓN";
    txtEducation.textContent="EDUCACIÓN";
    txtHome.textContent="INICIO";
    txtDoor.textContent="PUERTA";
  }
})();
</script>

</body>
</html>
