<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta
    name="viewport"
    content="width=device-width,initial-scale=1,viewport-fit=cover"
  />
  <title>Products</title>
  <meta
    name="description"
    content="Products runtime host surface."
  />
  <style>
    :root {
      color-scheme: dark;
      --bg: #05070b;
      --panel: rgba(255,255,255,0.06);
      --panel-strong: rgba(255,255,255,0.1);
      --border: rgba(255,255,255,0.12);
      --text: #f5f7fb;
      --muted: rgba(245,247,251,0.72);
      --good: #5df2a2;
      --warn: #ffd166;
      --bad: #ff6b6b;
      --info: #7cc7ff;
      --shadow: 0 20px 60px rgba(0,0,0,0.35);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      min-height: 100vh;
      overflow-x: hidden;
    }

    .products-host {
      position: relative;
      min-height: 100vh;
      isolation: isolate;
      background:
        radial-gradient(circle at top, rgba(124,199,255,0.12), transparent 30%),
        radial-gradient(circle at 20% 80%, rgba(93,242,162,0.08), transparent 24%),
        radial-gradient(circle at 80% 20%, rgba(255,209,102,0.07), transparent 20%),
        var(--bg);
    }

    .products-stage-shell {
      position: relative;
      min-height: 100vh;
      width: 100%;
    }

    #products-stage {
      position: relative;
      min-height: 100vh;
      width: 100%;
    }

    .products-receipts {
      position: fixed;
      left: 16px;
      right: 16px;
      bottom: 16px;
      z-index: 50;
      pointer-events: none;
      display: grid;
      gap: 10px;
      max-width: 780px;
      margin: 0 auto;
    }

    .products-receipt-card {
      pointer-events: auto;
      backdrop-filter: blur(14px);
      background: linear-gradient(180deg, rgba(12,15,22,0.88), rgba(7,10,16,0.92));
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .products-receipt-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .products-receipt-body {
      display: grid;
      gap: 8px;
      padding: 12px 14px 14px;
    }

    .products-receipt-line {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      font-size: 14px;
      line-height: 1.45;
      color: var(--text);
      word-break: break-word;
    }

    .products-dot {
      flex: 0 0 auto;
      width: 10px;
      height: 10px;
      border-radius: 999px;
      margin-top: 5px;
      background: var(--info);
      box-shadow: 0 0 0 4px rgba(124,199,255,0.12);
    }

    .products-dot.good {
      background: var(--good);
      box-shadow: 0 0 0 4px rgba(93,242,162,0.12);
    }

    .products-dot.warn {
      background: var(--warn);
      box-shadow: 0 0 0 4px rgba(255,209,102,0.12);
    }

    .products-dot.bad {
      background: var(--bad);
      box-shadow: 0 0 0 4px rgba(255,107,107,0.12);
    }

    .products-fallback {
      position: fixed;
      inset: 16px 16px auto 16px;
      z-index: 60;
      max-width: 760px;
      margin: 0 auto;
      padding: 16px 18px;
      border: 1px solid rgba(255,107,107,0.28);
      border-radius: 18px;
      background: rgba(34,10,14,0.9);
      color: var(--text);
      box-shadow: var(--shadow);
      display: none;
    }

    .products-fallback.is-visible {
      display: block;
    }

    .products-fallback h1 {
      margin: 0 0 8px;
      font-size: 18px;
      line-height: 1.2;
    }

    .products-fallback p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
      font-size: 14px;
    }

    .products-noscript {
      position: fixed;
      inset: 16px;
      z-index: 70;
      padding: 16px 18px;
      border-radius: 18px;
      border: 1px solid rgba(255,107,107,0.28);
      background: rgba(34,10,14,0.95);
      color: var(--text);
      box-shadow: var(--shadow);
    }

    @media (max-width: 640px) {
      .products-receipts {
        left: 12px;
        right: 12px;
        bottom: 12px;
      }

      .products-fallback {
        inset: 12px 12px auto 12px;
      }
    }
  </style>
</head>
<body>
  <main
    id="products-host"
    class="products-host"
    data-host-contract="PRODUCTS_HOST_CONTRACT_V1"
    data-stage-owner="runtime-only"
    data-runtime-script="./products_runtime.js"
    data-runtime-global="ProductsPlanetRuntime"
  >
    <section class="products-stage-shell" aria-label="Products stage shell">
      <div
        id="products-stage"
        data-products-stage="true"
        data-visible-stage-owner="runtime"
        aria-live="polite"
      ></div>
    </section>

    <section
      id="products-receipts"
      class="products-receipts"
      aria-label="Products runtime receipts"
    >
      <article class="products-receipt-card">
        <header class="products-receipt-head">
          <span>Products Host Contract</span>
          <span id="products-receipt-status">Booting</span>
        </header>
        <div id="products-receipt-body" class="products-receipt-body"></div>
      </article>
    </section>

    <section
      id="products-fallback"
      class="products-fallback"
      role="alert"
      aria-live="assertive"
    >
      <h1>Products host-side failure surfaced</h1>
      <p id="products-fallback-text">
        The host layer detected a runtime handoff failure before visible stage ownership was confirmed.
      </p>
    </section>
  </main>

  <noscript>
    <div class="products-noscript">
      JavaScript is required to initialize the products runtime host surface.
    </div>
  </noscript>

  <script src="./index.js" defer></script>
</body>
</html>
