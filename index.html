<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Compass</title>

<link rel="stylesheet" href="/assets/ui.css"/>
<link rel="stylesheet" href="/assets/branch.css"/>
<script defer src="/assets/instruments.js"></script>

<style>
a{color:inherit;text-decoration:none}
body::before,body::after{pointer-events:none!important}

:root{
  --R:170px;
  --D:168px;
  --Dminor:150px;

  --onyx0:rgba(6,8,10,.96);
  --onyx1:rgba(10,12,16,.88);

  --crimson:rgba(120,0,22,.42);
  --festival:rgba(255,43,43,.22);
  --opalV:rgba(90,40,120,.16);

  --gold:rgba(201,162,74,.50);
  --goldGlow:rgba(201,162,74,.30);

  --shadowDeep:0 44px 140px rgba(0,0,0,.82);
}

.stage{
  position:relative;
  width:min(760px,94vw);
  height:min(760px,80vh);
  margin:120px auto 0;
  pointer-events:none;
}

.d{
  position:absolute;
  left:50%;
  top:50%;
  transform-origin:center;
  border-radius:28px;
  cursor:pointer;
  pointer-events:auto;
  overflow:hidden;
  transition:transform .18s ease, box-shadow .18s ease;
}

.primary{width:var(--D);height:var(--D)}
.secondary{width:var(--Dminor);height:var(--Dminor)}

/* MATERIAL STACK */
.surface{
  background:
    radial-gradient(circle at 22% 18%, rgba(255,255,255,.22), transparent 46%),
    radial-gradient(circle at 75% 22%, var(--festival), transparent 62%),
    radial-gradient(circle at 78% 82%, var(--opalV), transparent 66%),
    radial-gradient(circle at 28% 80%, var(--crimson), transparent 74%),
    linear-gradient(160deg, var(--onyx1), var(--onyx0));

  border:1px solid rgba(255,255,255,.16);
  box-shadow:
    var(--shadowDeep),
    0 0 28px rgba(255,43,43,.10),
    inset 0 2px 0 rgba(255,255,255,.20),
    inset 0 -46px 86px rgba(0,0,0,.88);
}

/* Gold trim layer */
.goldTrim{
  border:1px solid var(--gold);
  box-shadow:
    var(--shadowDeep),
    0 0 34px var(--goldGlow),
    inset 0 2px 0 rgba(255,255,255,.22),
    inset 0 -46px 86px rgba(0,0,0,.88);
}

/* Silk diamond lay on trim */
.surface::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:inherit;
  pointer-events:none;
  background:
    repeating-linear-gradient(45deg, rgba(201,162,74,.08) 0 1px, transparent 1px 18px),
    repeating-linear-gradient(-45deg, rgba(201,162,74,.06) 0 1px, transparent 1px 18px);
  opacity:.35;
  mask:
    radial-gradient(circle at 50% 50%, transparent 0 72%, #000 78% 100%),
    linear-gradient(#000,#000);
  -webkit-mask:
    radial-gradient(circle at 50% 50%, transparent 0 72%, #000 78% 100%),
    linear-gradient(#000,#000);
}

/* Highlight gloss */
.surface::after{
  content:"";
  position:absolute;
  left:12%;
  right:12%;
  top:10%;
  height:30%;
  border-radius:999px;
  background:linear-gradient(to bottom, rgba(255,255,255,.18), rgba(255,255,255,0));
  transform:rotate(-10deg);
  pointer-events:none;
}

.d:hover{
  transform:translate(-50%,-50%) rotate(45deg) scale(1.04);
}

/* Placement */
.dN{transform:translate(-50%,-50%) translate(0,-170px) rotate(45deg)}
.dE{transform:translate(-50%,-50%) translate(170px,0) rotate(45deg)}
.dS{transform:translate(-50%,-50%) translate(0,170px) rotate(45deg)}
.dW{transform:translate(-50%,-50%) translate(-170px,0) rotate(45deg)}
.dNE{transform:translate(-50%,-50%) translate(120px,-120px) rotate(45deg)}
.dNW{transform:translate(-50%,-50%) translate(-120px,-120px) rotate(45deg)}

.inner{
  width:100%;
  height:100%;
  transform:rotate(-45deg);
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:980;
  font-size:18px;
  letter-spacing:.6px;
  text-align:center;
  color:#fff;
}

/* Responsive */
@media (max-width:600px){
  :root{
    --R:150px;
    --D:152px;
    --Dminor:138px;
  }
}
</style>
</head>

<body>

<div class="stage">

  <div class="d primary surface dN" id="dExplore"><div class="inner" id="txtExplore">EXPLORE</div></div>
  <div class="d primary surface dE" id="dProducts"><div class="inner" id="txtProducts">PRODUCTS</div></div>
  <div class="d primary surface dS" id="dLaws"><div class="inner" id="txtLaws">LAWS</div></div>
  <div class="d primary surface dW" id="dGauges"><div class="inner" id="txtGauges">GAUGES</div></div>

  <div class="d secondary surface goldTrim dNE" id="dResearch"><div class="inner" id="txtResearch">RESEARCH</div></div>
  <div class="d secondary surface dNW" id="dEducation"><div class="inner" id="txtEducation">EDUCATION</div></div>

</div>

<script>
(function(){
  var qs=new URLSearchParams(location.search);
  var lang=qs.get("lang")||localStorage.getItem("gd_lang")||"en";
  var style=qs.get("style")||localStorage.getItem("gd_style")||"informal";
  var time=qs.get("time")||localStorage.getItem("gd_time")||"now";
  var depth=qs.get("depth")||localStorage.getItem("gd_depth")||"explore";

  localStorage.setItem("gd_lang",lang);
  localStorage.setItem("gd_style",style);
  localStorage.setItem("gd_time",time);
  localStorage.setItem("gd_depth",depth);

  function q(){
    return "?lang="+lang+"&style="+style+"&time="+time+"&depth="+depth;
  }

  function go(p){location.href=p+q();}

  dExplore.onclick=()=>go("/explore/");
  dProducts.onclick=()=>go("/products/");
  dLaws.onclick=()=>go("/laws/");
  dGauges.onclick=()=>go("/gauges/");
  dResearch.onclick=()=>go("/research/");
  dEducation.onclick=()=>go("/products/education/");

  if(lang==="zh"){
    txtExplore.textContent="探索";
    txtProducts.textContent="产品";
    txtLaws.textContent="法则";
    txtGauges.textContent="量规";
    txtResearch.textContent="研究";
    txtEducation.textContent="教育";
  }
  if(lang==="es"){
    txtExplore.textContent="EXPLORAR";
    txtProducts.textContent="PRODUCTOS";
    txtLaws.textContent="LEYES";
    txtGauges.textContent="MEDIDORES";
    txtResearch.textContent="INVESTIGACIÓN";
    txtEducation.textContent="EDUCACIÓN";
  }
})();
</script>

</body>
</html>
