<!doctype html>
<!-- TNT — /home/index.html
     HOME · INDEX — INFORMAL SITE LAYER (PINNED) · LEVEL 4
     PURPOSE:
       - Bring Home from Generation 1 compression into Level 4
       - Preserve interior-orientation role
       - Keep Home as centered interior surface, not the Door and not the whole system
       - Add Compass / North Star / Legend / Interior Ledger / Route Map
       - Keep PLATFORM vs ENGINEERING lens (URL-only lane; NO reload)
       - Trilingual UI (EN/中文/ES) (NO reload)
       - Single-open accordion (tap same closes)
       - Switching LANG or LANE does NOT reload and does NOT close open row
       - No modals/overlays; no inline onclick; addEventListener only
       - Canon state carry: lang/style/time/depth via URL + LS gd_lang/gd_style/gd_time/gd_depth ONLY
       - NO new gd_* keys
-->

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>HOME · Diamond Gate Bridge</title>

<link rel="stylesheet" href="/assets/ui.css"/>
<link rel="stylesheet" href="/assets/branch.css"/>
<script defer src="/assets/instruments.js"></script>

<style>
a{color:inherit;text-decoration:none}
body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:#fff}
body::before,body::after{pointer-events:none!important}

:root{
  --dockH:132px;

  --stroke:rgba(255,255,255,.12);
  --stroke2:rgba(255,255,255,.10);

  --ink:rgba(255,255,255,.95);
  --txt:rgba(255,255,255,.90);
  --mut:rgba(255,255,255,.78);
  --soft:rgba(255,255,255,.62);

  --onyx0:rgba(6,8,10,.96);
  --onyx1:rgba(10,12,16,.86);

  --crimson:rgba(120,0,22,.28);
  --festival:rgba(255,43,43,.12);
  --opalV:rgba(90,40,120,.10);
  --skyBlue:rgba(83,119,255,.16);

  --gold:rgba(201,162,74,.62);
  --goldSolid:rgba(201,162,74,.92);
  --goldGlow:rgba(201,162,74,.22);
  --goldGlowSoft:rgba(201,162,74,.14);

  --green:rgba(128,240,182,.92);
  --blue:rgba(147,197,253,.92);
  --red:rgba(255,154,154,.92);

  --shadowA:0 24px 90px rgba(0,0,0,.58);
  --shadowB:0 16px 56px rgba(0,0,0,.62);
  --shadowC:0 18px 60px rgba(0,0,0,.55);
}

/* ===== Top controls ===== */
.top{
  position:fixed;top:16px;left:0;right:0;
  padding:0 16px;
  display:flex;justify-content:space-between;align-items:center;
  gap:12px;
  z-index:240;
  pointer-events:none;
}
.top .left,.top .right{
  display:flex;gap:10px;flex-wrap:wrap;align-items:center;white-space:nowrap;
  pointer-events:auto;
}

.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:10px 12px;min-height:44px;border-radius:16px;
  border:1px solid rgba(255,255,255,.14);
  background:
    radial-gradient(circle at 50% 50%, rgba(201,162,74,.08), transparent 58%),
    linear-gradient(145deg, rgba(10,12,16,.78), rgba(6,8,10,.90));
  color:var(--ink);
  font-weight:950;font-size:14px;letter-spacing:.2px;
  -webkit-tap-highlight-color:transparent;
  position:relative;overflow:hidden;
  touch-action:manipulation;
  box-shadow:var(--shadowC);
}
.btn:active{transform:translateY(1px)}
.btn::after{
  content:"";
  position:absolute;inset:-2px;
  border-radius:18px;
  pointer-events:none;
  box-shadow:
    0 0 0 1px rgba(255,255,255,.10),
    0 0 18px var(--goldGlowSoft),
    inset 0 0 0 1px rgba(201,162,74,.10);
  opacity:.85;
}
.btn.red{
  border-color:rgba(255,43,43,.22);
  box-shadow:var(--shadowC), 0 0 18px rgba(255,43,43,.10);
}
.btn.red::after{
  box-shadow:
    0 0 0 1px rgba(255,255,255,.10),
    0 0 24px var(--goldGlow),
    inset 0 0 0 1px rgba(201,162,74,.16);
}

.seg{
  display:inline-flex;gap:0;overflow:hidden;border-radius:16px;
  border:1px solid rgba(255,255,255,.12);
  background: rgba(0,0,0,.16);
  box-shadow: var(--shadowC);
}
.seg button{
  appearance:none;border:0;background:transparent;color:var(--mut);
  padding:10px 12px;min-height:44px;font-weight:950;font-size:13px;
  letter-spacing:.25px;cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
  position:relative;
}
.seg button[aria-pressed="true"]{
  color:var(--ink);
  background:
    radial-gradient(circle at 50% 50%, rgba(201,162,74,.14), transparent 60%),
    linear-gradient(180deg, rgba(255,43,43,.10), rgba(0,0,0,.10));
  box-shadow: inset 0 0 0 1px rgba(201,162,74,.14);
}
.seg button[aria-pressed="true"]::after{
  content:"";
  position:absolute;inset:2px;border-radius:14px;
  pointer-events:none;
  box-shadow:0 0 20px var(--goldGlowSoft);
  opacity:.95;
}

/* ===== Page ===== */
.page{
  width:min(1120px,94vw);
  margin:0 auto;
  padding:104px 0 calc(var(--dockH) + 18px);
  display:flex;flex-direction:column;gap:12px;
  position:relative;
  z-index:10;
}

.backdrop{
  position:absolute;
  left:50%;
  top:68px;
  transform:translateX(-50%);
  width:min(1180px,96vw);
  height:calc(100% - 108px);
  border-radius:34px;
  pointer-events:none;
  z-index:0;
  overflow:hidden;
}
.backdrop::before{
  content:"";
  position:absolute;inset:0;
  border:1px solid rgba(255,255,255,.08);
  border-radius:34px;
  background:
    radial-gradient(circle at 16% 20%, rgba(201,162,74,.10), transparent 58%),
    radial-gradient(circle at 76% 18%, rgba(83,119,255,.15), transparent 62%),
    radial-gradient(circle at 62% 88%, rgba(255,43,43,.10), transparent 64%),
    linear-gradient(160deg, rgba(0,0,0,.18), rgba(0,0,0,.08));
  box-shadow:
    0 70px 220px rgba(0,0,0,.62),
    inset 0 2px 0 rgba(255,255,255,.06),
    inset 0 -70px 140px rgba(0,0,0,.55);
  opacity:.92;
}
.backdrop::after{
  content:"";
  position:absolute;inset:-18%;
  background:
    radial-gradient(circle at 20% 34%, rgba(255,43,43,.14), transparent 44%),
    radial-gradient(circle at 82% 30%, rgba(83,119,255,.16), transparent 48%),
    radial-gradient(circle at 52% 78%, rgba(201,162,74,.12), transparent 48%),
    conic-gradient(from 22deg at 34% 30%,
      rgba(201,162,74,.14), transparent 12%,
      rgba(83,119,255,.12), transparent 24%,
      rgba(90,40,120,.10), transparent 38%,
      transparent 100%),
    radial-gradient(circle at 50% 50%, rgba(255,255,255,.04), transparent 62%);
  filter:blur(1px);
  opacity:.72;
}

/* ===== Header ===== */
.header{
  position:relative;
  z-index:2;
  border:1px solid var(--stroke);
  border-radius:24px;
  background:
    radial-gradient(circle at 18% 22%, var(--crimson), transparent 72%),
    radial-gradient(circle at 82% 30%, var(--skyBlue), transparent 74%),
    radial-gradient(circle at 70% 92%, var(--festival), transparent 62%),
    radial-gradient(circle at 26% 22%, rgba(201,162,74,.14), transparent 62%),
    linear-gradient(160deg, rgba(0,0,0,.30), rgba(0,0,0,.14));
  backdrop-filter:blur(10px);
  box-shadow:var(--shadowA);
  padding:16px 16px 14px;
  overflow:hidden;
}
.header::before{
  content:"";
  position:absolute;inset:0;border-radius:24px;pointer-events:none;
  box-shadow: inset 0 0 0 1px rgba(201,162,74,.16);
  background:
    radial-gradient(circle at 50% 50%, transparent 0 72%, rgba(201,162,74,.10) 78%, transparent 84%),
    conic-gradient(from 45deg at 50% 50%,
      rgba(201,162,74,.12) 0 6%,
      transparent 6% 12%,
      rgba(201,162,74,.08) 12% 18%,
      transparent 18% 100%),
    radial-gradient(circle at 50% 50%, rgba(255,255,255,.04), transparent 62%);
  opacity:.26;
  mask:
    radial-gradient(circle at 50% 50%, transparent 0 78%, #000 82% 100%),
    linear-gradient(#000,#000);
  -webkit-mask:
    radial-gradient(circle at 50% 50%, transparent 0 78%, #000 82% 100%),
    linear-gradient(#000,#000);
}

.k{margin:0 0 6px;font-size:11px;letter-spacing:4px;text-transform:uppercase;opacity:.78;color:var(--mut);position:relative}
.t{margin:0;font-weight:980;font-size:30px;letter-spacing:.7px;color:var(--ink);position:relative}
.s{margin:10px 0 0;font-size:15.5px;line-height:1.55;color:var(--txt);max-width:980px;position:relative}
.rule{
  margin-top:12px;
  padding:12px 12px;
  border-radius:18px;
  border:1px solid rgba(255,255,255,.10);
  background:
    radial-gradient(circle at 50% 50%, rgba(201,162,74,.10), transparent 58%),
    radial-gradient(circle at 22% 18%, rgba(255,43,43,.10), transparent 58%),
    linear-gradient(160deg, rgba(10,12,16,.62), rgba(6,8,10,.76));
  font-size:13.25px;
  color:rgba(255,255,255,.86);
  line-height:1.45;
  position:relative;
}

.stateRow{
  margin-top:12px;
  display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;align-items:center;
}
.statePill{
  display:inline-flex;align-items:center;gap:8px;
  padding:10px 12px;border-radius:999px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(0,0,0,.16);
  color:rgba(255,255,255,.78);
  font-weight:950;
  box-shadow:0 14px 36px rgba(0,0,0,.55);
}

.band{
  position:relative;z-index:2;
  padding:10px 12px;border-radius:18px;
  border:1px solid var(--stroke2);
  background:rgba(0,0,0,.14);
  font-weight:980;letter-spacing:.25px;
  color:rgba(255,255,255,.90);
}

/* Level 4 cards */
.l4Grid{
  position:relative;
  z-index:2;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}
.l4Card{
  border:1px solid rgba(255,255,255,.10);
  border-radius:22px;
  background:
    radial-gradient(circle at 22% 18%, rgba(255,43,43,.09), transparent 58%),
    radial-gradient(circle at 82% 30%, rgba(83,119,255,.10), transparent 66%),
    radial-gradient(circle at 50% 50%, rgba(201,162,74,.07), transparent 64%),
    linear-gradient(145deg, rgba(17,22,28,.78), rgba(11,15,20,.92));
  box-shadow:var(--shadowA);
  padding:16px;
  position:relative;
  overflow:hidden;
}
.l4Card::before{
  content:"";
  position:absolute;inset:0;border-radius:22px;pointer-events:none;
  box-shadow: inset 0 0 0 1px rgba(201,162,74,.10);
  opacity:.60;
}
.l4Card h2{
  margin:0 0 8px;
  color:var(--ink);
  font-size:17px;
  line-height:1;
  letter-spacing:.2px;
  position:relative;
}
.l4Card p{
  margin:0;
  color:rgba(255,255,255,.84);
  line-height:1.58;
  font-size:14.25px;
  position:relative;
}
.legendStack{
  display:grid;
  gap:8px;
  margin-top:12px;
  position:relative;
}
.legendItem{
  display:grid;
  grid-template-columns:88px 1fr;
  gap:10px;
  border-top:1px solid rgba(255,255,255,.08);
  padding-top:8px;
  color:rgba(255,255,255,.80);
  line-height:1.45;
  font-size:13.25px;
}
.legendItem strong{
  color:var(--goldSolid);
  font-size:11px;
  letter-spacing:1.4px;
  text-transform:uppercase;
}

/* Accordion */
.list{position:relative;z-index:2;display:flex;flex-direction:column;gap:12px}
.row{
  border:1px solid rgba(255,255,255,.10);
  border-radius:22px;
  background:
    radial-gradient(circle at 22% 18%, rgba(255,43,43,.10), transparent 58%),
    radial-gradient(circle at 82% 30%, rgba(83,119,255,.10), transparent 66%),
    linear-gradient(145deg, rgba(17,22,28,.86), rgba(11,15,20,.94));
  box-shadow:var(--shadowA);
  overflow:hidden;
  position:relative;
}
.row::before{
  content:"";
  position:absolute;inset:0;border-radius:22px;pointer-events:none;
  box-shadow: inset 0 0 0 1px rgba(201,162,74,.10);
  opacity:.55;
}
.head{
  display:flex;align-items:flex-start;justify-content:space-between;
  gap:10px;padding:16px 16px;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
.hL{display:flex;gap:12px;align-items:flex-start;min-width:0}
.mark{
  width:10px;height:10px;border-radius:3px;transform:rotate(45deg);
  background:var(--c);
  box-shadow:0 0 0 1px rgba(255,255,255,.14), 0 0 14px rgba(0,0,0,.35);
  flex:0 0 auto;margin-top:4px;
}
.titleBlock{min-width:0}
.q{
  font-weight:980;letter-spacing:.2px;font-size:18px;color:var(--ink);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.subt{
  margin-top:8px;font-size:13.75px;opacity:.88;line-height:1.42;
  color:rgba(255,255,255,.86);max-width:92ch;
}
.chev{
  width:36px;height:36px;border-radius:14px;
  border:1px solid rgba(255,255,255,.14);
  background: rgba(0,0,0,.16);
  display:flex;align-items:center;justify-content:center;
  color:rgba(255,255,255,.78);
  font-weight:950;
  position:relative;overflow:hidden;
  flex:0 0 auto;margin-top:2px;
}
.chev::after{
  content:"";
  position:absolute;inset:-2px;border-radius:16px;
  pointer-events:none;
  box-shadow:0 0 18px var(--goldGlowSoft);
  opacity:.65;
}
.body{
  display:none;
  padding:16px 16px 18px;
  border-top:1px solid rgba(255,255,255,.08);
  background:
    radial-gradient(circle at 30% 30%, rgba(255,255,255,.06), transparent 55%),
    linear-gradient(145deg, rgba(10,12,16,.86), rgba(6,8,10,.94));
}
.row.open .body{display:block}
.row.open{border-color:rgba(255,43,43,.22); box-shadow:var(--shadowA), 0 0 18px rgba(255,43,43,.10);}
.pdesc{margin:0;color:rgba(255,255,255,.90);line-height:1.65;font-size:14.75px}
.pdesc + .pdesc{margin-top:12px}

.subBubbles{margin-top:12px;display:flex;flex-direction:column;gap:10px}
.bubble{
  border:1px solid rgba(255,255,255,.10);
  border-radius:18px;
  background:
    radial-gradient(circle at 22% 18%, rgba(255,43,43,.08), transparent 60%),
    radial-gradient(circle at 50% 50%, rgba(201,162,74,.08), transparent 58%),
    rgba(0,0,0,.12);
  padding:14px 14px 12px;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
  position:relative;
  overflow:hidden;
}
.bubble::after{
  content:"";
  position:absolute;inset:-2px;border-radius:20px;
  pointer-events:none;
  box-shadow:0 0 22px rgba(201,162,74,.10);
  opacity:.60;
}
.bubble h4{margin:0 0 8px;font-weight:980;letter-spacing:.15px;font-size:15px;color:var(--ink)}
.bubble p{margin:0;color:rgba(255,255,255,.80);line-height:1.7;display:none;font-size:14.25px}
.bubble.open p{display:block}

.actions{
  margin-top:14px;
  display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end;
}
.actions .btn{padding:10px 14px;border-radius:999px;min-height:40px;font-size:13px}

/* Ledger */
.ledger{
  position:relative;
  z-index:2;
  display:flex;
  flex-direction:column;
  gap:10px;
}
.ledgerRow{
  border:1px solid rgba(255,255,255,.10);
  border-radius:18px;
  background:
    radial-gradient(circle at 22% 18%, rgba(255,43,43,.08), transparent 60%),
    radial-gradient(circle at 50% 50%, rgba(201,162,74,.08), transparent 58%),
    linear-gradient(145deg, rgba(17,22,28,.74), rgba(11,15,20,.90));
  box-shadow:var(--shadowB);
  display:grid;
  grid-template-columns:180px 1fr 122px;
  gap:12px;
  align-items:center;
  padding:14px;
}
.ledgerRow strong{
  color:var(--ink);
  font-size:14px;
  letter-spacing:.2px;
}
.ledgerRow span{
  color:rgba(255,255,255,.80);
  font-size:13.25px;
  line-height:1.45;
}
.status{
  justify-self:end;
  border-radius:999px;
  padding:7px 10px;
  border:1px solid rgba(255,255,255,.10);
  background:rgba(128,240,182,.10);
  color:var(--green)!important;
  font-weight:950;
  font-size:11px!important;
  letter-spacing:1px;
  text-transform:uppercase;
}

/* Route map */
.routeMap{
  position:relative;
  z-index:2;
  display:grid;
  grid-template-columns:repeat(5,minmax(0,1fr));
  gap:10px;
}
.routeMap a{
  min-height:48px;
  border:1px solid rgba(255,255,255,.10);
  border-radius:18px;
  background:
    radial-gradient(circle at 50% 50%, rgba(201,162,74,.08), transparent 58%),
    linear-gradient(145deg, rgba(10,12,16,.72), rgba(6,8,10,.86));
  box-shadow:var(--shadowC);
  display:flex;
  align-items:center;
  justify-content:center;
  color:rgba(255,255,255,.82);
  font-weight:950;
  font-size:13px;
  letter-spacing:.2px;
  position:relative;
  overflow:hidden;
}
.routeMap a::after{
  content:"";
  position:absolute;inset:-2px;border-radius:20px;
  pointer-events:none;
  box-shadow:0 0 20px var(--goldGlowSoft);
  opacity:.62;
}

/* Dock */
.dock{
  position:fixed;left:50%;
  bottom:max(10px, env(safe-area-inset-bottom));
  transform:translateX(-50%);
  z-index:220;
  width:min(980px,94vw);
  padding:10px 12px;border-radius:22px;
  border:1px solid rgba(255,255,255,.12);
  background:
    radial-gradient(circle at 18% 18%, rgba(255,43,43,.10), transparent 62%),
    radial-gradient(circle at 82% 70%, rgba(83,119,255,.10), transparent 64%),
    linear-gradient(145deg, rgba(10,12,16,.72), rgba(6,8,10,.86));
  backdrop-filter:blur(10px);
  box-shadow:0 18px 60px rgba(0,0,0,.55);
  display:grid;grid-template-columns:repeat(4, minmax(0,1fr));
  gap:10px;
}
.dock .btn{width:100%;padding:10px 10px;border-radius:999px;white-space:nowrap}

@media (max-width:900px){
  .l4Grid{grid-template-columns:1fr}
  .ledgerRow{grid-template-columns:1fr}
  .status{justify-self:start}
  .routeMap{grid-template-columns:repeat(2,minmax(0,1fr))}
}
@media (max-width:620px){
  .top{position:absolute}
  .top .left,.top .right{width:100%}
  .seg{max-width:100%;overflow:auto}
  .q{white-space:normal}
}
@media (max-width:520px){
  :root{--dockH:148px}
  .dock{grid-template-columns:repeat(3, minmax(0,1fr))}
  .routeMap{grid-template-columns:1fr}
  .legendItem{grid-template-columns:1fr}
}
</style>
</head>

<body>

<div class="top" aria-label="Top controls">
  <div class="left">
    <a class="btn" id="btnCompass" data-route="/index.html" href="/index.html">COMPASS</a>
    <a class="btn" id="btnPrelude" data-route="/prelude/" href="/prelude/">PRELUDE</a>
    <a class="btn" id="btnExplore" data-route="/explore/" href="/explore/">EXPLORE</a>
  </div>
  <div class="right" aria-label="Controls">
    <div class="seg" role="group" aria-label="Language">
      <button type="button" id="langEN" aria-pressed="true">EN</button>
      <button type="button" id="langZH" aria-pressed="false">中文</button>
      <button type="button" id="langES" aria-pressed="false">ES</button>
    </div>
    <div class="seg" role="group" aria-label="Lane">
      <button type="button" id="lanePlatform" aria-pressed="true">PLATFORM</button>
      <button type="button" id="laneEngineering" aria-pressed="false">ENGINEERING</button>
    </div>
  </div>
</div>

<div class="page">
  <div class="backdrop" aria-hidden="true"></div>

  <section class="header" aria-label="Home header">
    <p class="k" id="hk">HOME</p>
    <h1 class="t" id="ht">INTERIOR ORIENTATION</h1>
    <p class="s" id="hs"></p>
    <div class="rule" id="rule"></div>

    <div class="stateRow" aria-label="State">
      <div class="statePill" id="laneState">—</div>
      <div class="statePill" id="langState">—</div>
    </div>
  </section>

  <div class="band" id="l4Band">LEVEL 4 STRUCTURE</div>

  <section class="l4Grid" aria-label="Home Level 4 structure">
    <article class="l4Card">
      <h2 id="compassTitle">Compass</h2>
      <p id="compassBody"></p>
      <div class="legendStack">
        <div class="legendItem"><strong id="northLabel">North</strong><span id="northBody"></span></div>
        <div class="legendItem"><strong id="eastLabel">East</strong><span id="eastBody"></span></div>
        <div class="legendItem"><strong id="southLabel">South</strong><span id="southBody"></span></div>
        <div class="legendItem"><strong id="westLabel">West</strong><span id="westBody"></span></div>
      </div>
    </article>

    <article class="l4Card">
      <h2 id="northStarTitle">North Star</h2>
      <p id="northStarBody"></p>
      <div class="legendStack">
        <div class="legendItem"><strong id="purposeLabel">Purpose</strong><span id="purposeBody"></span></div>
        <div class="legendItem"><strong id="methodLabel">Method</strong><span id="methodBody"></span></div>
        <div class="legendItem"><strong id="failureLabel">Failure</strong><span id="failureBody"></span></div>
      </div>
    </article>
  </section>

  <div class="band" id="band">HOME ZONES (OPEN ONE)</div>
  <div class="list" id="list"></div>

  <div class="band" id="ledgerBand">HOME LEDGER</div>
  <section class="ledger" id="ledger" aria-label="Home ledger"></section>

  <div class="band" id="routeBand">ROUTE MAP</div>
  <nav class="routeMap" aria-label="Home route map">

  function closeAllRows(){

      rowRefs[i].chev.textContent="▸";
    }
  }

  function toggleRow(i){
    var isOpen=rowRefs[i].row.classList.contains("open");
    if(isOpen){
      rowRefs[i].row.classList.remove("open");
      rowRefs[i].chev.textContent="▸";
      openIndex=null;
      return;
    }
    closeAllRows();
    openIndex=i;
    rowRefs[i].row.classList.add("open");
    rowRefs[i].chev.textContent="▾";
  }

  function makeBubble(titleObj, textObj){
    var b=document.createElement("div");
    b.className="bubble";
    b.setAttribute("role","button");
    b.tabIndex=0;

    var h=document.createElement("h4");
    h.textContent = pick3(titleObj.en, titleObj.zh, titleObj.es);

    var p=document.createElement("p");
    p.textContent = pick3(textObj.en, textObj.zh, textObj.es);

    b.appendChild(h);
    b.appendChild(p);

    function act(){ b.classList.toggle("open"); }
    b.addEventListener("click", act, {passive:true});
    b.addEventListener("keydown", function(e){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); act(); }});
    return b;
  }

    var sb=document.createElement("div");
    sb.className="subBubbles";

    var pack = (lane==="engineering") ? zone.engineering : zone.platform;
    sb.appendChild(makeBubble(pack.b1.h, pack.b1.p));
    sb.appendChild(makeBubble(pack.b2.h, pack.b2.p));
    sb.appendChild(makeBubble(pack.b3.h, pack.b3.p));
    body.appendChild(sb);

    var actions=document.createElement("div");
    actions.className="actions";

    var aPrelude=document.createElement("a");
    aPrelude.className="btn red";
    aPrelude.setAttribute("data-route", ROUTES.prelude);
    actions.appendChild(aPrelude);

    var aExplore=document.createElement("a");
    aExplore.className="btn";
    aExplore.setAttribute("data-route", ROUTES.explore);
    actions.appendChild(aExplore);

    var aGauges=document.createElement("a");
    aGauges.className="btn";
    aGauges.setAttribute("data-route", ROUTES.gauges);
    actions.appendChild(aGauges);

    body.appendChild(actions);

    function act(){ toggleRow(idx); wireAll(); }
    head.addEventListener("click", act, {passive:true});
    head.addEventListener("keydown", function(e){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); act(); }});

    row.appendChild(head);
    row.appendChild(body);
    list.appendChild(row);

    rowRefs.push({
      row:row,
      chev:row.querySelector(".chevTxt"),
      title:title,
      subt:subt,
      intro:intro,
      preludeBtn:aPrelude,
      exploreBtn:aExplore,
      gaugesBtn:aGauges,
      zone:zone
    });
  }

  function buildLedger(){
    ledger.innerHTML="";
    for(var i=0;i<LEDGER.length;i++){
      var item=LEDGER[i];

      var row=document.createElement("div");
      row.className="ledgerRow";

      var name=document.createElement("strong");
      name.textContent=pick3(item.name.en,item.name.zh,item.name.es);

      var desc=document.createElement("span");
      desc.textContent=pick3(item.desc.en,item.desc.zh,item.desc.es);

      var status=document.createElement("span");
      status.className="status";
      status.textContent=pick3("Strong","强","Fuerte");

      row.appendChild(name);
      row.appendChild(desc);
      row.appendChild(status);
      ledger.appendChild(row);
    }
  }

  function renderList(){
    list.innerHTML="";
    rowRefs=[];
    for(var i=0;i<ZONES.length;i++) buildRow(ZONES[i], i);
    openIndex=0;
    toggleRow(0);
  }

  function applyLevel4(){
    var c=L4[lang]||L4.en;

    document.getElementById("l4Band").textContent=c.level;
    document.getElementById("compassTitle").textContent=c.compassTitle;
    document.getElementById("compassBody").textContent=c.compassBody;
    document.getElementById("northLabel").textContent=c.north;
    document.getElementById("northBody").textContent=c.northBody;
    document.getElementById("eastLabel").textContent=c.east;
    document.getElementById("eastBody").textContent=c.eastBody;
    document.getElementById("southLabel").textContent=c.south;
    document.getElementById("southBody").textContent=c.southBody;
    document.getElementById("westLabel").textContent=c.west;
    document.getElementById("westBody").textContent=c.westBody;

    document.getElementById("northStarTitle").textContent=c.northStarTitle;
    document.getElementById("northStarBody").textContent=c.northStarBody;
    document.getElementById("purposeLabel").textContent=c.purpose;
    document.getElementById("purposeBody").textContent=c.purposeBody;
    document.getElementById("methodLabel").textContent=c.method;
    document.getElementById("methodBody").textContent=c.methodBody;
    document.getElementById("failureLabel").textContent=c.failure;
    document.getElementById("failureBody").textContent=c.failureBody;

    document.getElementById("ledgerBand").textContent=c.ledger;
    document.getElementById("routeBand").textContent=c.route;
  }

  function applyHeader(){
    var H=(HEAD[lang]||HEAD.en);
    var pack=(lane==="engineering") ? H.engineering : H.platform;

    document.getElementById("hk").textContent = pick3("HOME","首页","HOME");
    document.getElementById("ht").textContent = pick3("INTERIOR ORIENTATION","内部定位","ORIENTACIÓN INTERIOR");
    document.getElementById("hs").textContent = pack.hs;
    document.getElementById("rule").textContent = pack.rule;
    document.getElementById("band").textContent = pick3("HOME ZONES (OPEN ONE)","HOME 区域（打开一个）","ZONAS HOME (ABRE UNA)");

    document.getElementById("laneState").textContent =
      (lang==="zh") ? ("当前透镜："+laneLabel()) :
      (lang==="es") ? ("Lente actual: "+laneLabel()) :
      ("Current lens: "+laneLabel());

    document.getElementById("langState").textContent =
      (lang==="zh") ? "语言：中文" : (lang==="es") ? "Idioma: ES" : "Lang: EN";

    document.getElementById("btnCompass").textContent = pick3("COMPASS","指南针","BRÚJULA");
    document.getElementById("btnPrelude").textContent = pick3("PRELUDE","序章","PRELUDIO");
    document.getElementById("btnExplore").textContent = pick3("EXPLORE","探索","EXPLORAR");

    document.getElementById("dockDoor").textContent = pick3("DOOR","门","PUERTA");
    document.getElementById("dockLaws").textContent = pick3("LAWS","法则","LEYES");
    document.getElementById("dockGovernance").textContent = pick3("GOVERNANCE","治理","GOBERNANZA");
    document.getElementById("dockCompass").textContent = pick3("COMPASS","指南针","BRÚJULA");

    document.getElementById("routeCompass").textContent = pick3("COMPASS","指南针","BRÚJULA");
    document.getElementById("routePrelude").textContent = pick3("PRELUDE","序章","PRELUDIO");
    document.getElementById("routeExplore").textContent = pick3("EXPLORE","探索","EXPLORAR");
    document.getElementById("routeProducts").textContent = pick3("PRODUCTS","产品","PRODUCTOS");
    document.getElementById("routeGauges").textContent = pick3("GAUGES","量规","MEDIDORES");
  }

  function updateRows(){
    var keep=openIndex;

    for(var i=0;i<rowRefs.length;i++){
      var R=rowRefs[i];
      var z=R.zone;

      R.title.textContent = pick3(z.t.en, z.t.zh, z.t.es);
      R.subt.textContent  = pick3(z.s.en, z.s.zh, z.s.es);

      var pack = (lane==="engineering") ? z.engineering : z.platform;
      R.intro.textContent = pick3(pack.intro.en, pack.intro.zh, pack.intro.es);

      var sb = R.row.querySelector(".subBubbles");
      if(sb){
        sb.innerHTML="";
        sb.appendChild(makeBubble(pack.b1.h, pack.b1.p));
        sb.appendChild(makeBubble(pack.b2.h, pack.b2.p));
        sb.appendChild(makeBubble(pack.b3.h, pack.b3.p));
      }

      R.preludeBtn.textContent = openLabel()+": "+pick3("PRELUDE","序章","PRELUDIO");
      R.exploreBtn.textContent = openLabel()+": "+pick3("EXPLORE","探索","EXPLORAR");
      R.gaugesBtn.textContent = openLabel()+": "+pick3("GAUGES","量规","MEDIDORES");
    }

    closeAllRows();
    if(keep!==null && keep!==undefined && rowRefs[keep]){
      rowRefs[keep].row.classList.add("open");
      rowRefs[keep].chev.textContent="▾";
      openIndex=keep;
    }else{
      openIndex=null;
    }

    wireAll();
  }

  function wireAll(){
    var nodes=document.querySelectorAll("[data-route]");
    for(var i=0;i<nodes.length;i++){
      var el=nodes[i];
      var route=el.getAttribute("data-route")||"";
      if(!route) continue;

      if(route.indexOf("?")!==-1){
        try{
          var u=new URL(route, location.origin);
          var sp=u.searchParams;
          sp.set("lang", lang);
          sp.set("style","informal");
          sp.set("time", time);
          sp.set("depth","explore");
          sp.set("lane", lane);
          el.setAttribute("href", u.pathname + "?" + sp.toString() + (u.hash||""));
        }catch(e){
          el.setAttribute("href", route);
        }
      }else{
        el.setAttribute("href", route + q());
      }
    }
  }

  function setLang(next){
    if(next!=="en"&&next!=="zh"&&next!=="es") next="en";
    lang=next;
    document.documentElement.lang=(lang==="zh")?"zh":(lang==="es")?"es":"en";
    try{ LS.setItem("gd_lang",lang);}catch(e){}
    history.replaceState({}, "", location.pathname + q({lang:lang}));
    setPressed(["langEN","langZH","langES"], lang==="zh"?"langZH":(lang==="es"?"langES":"langEN"));
    applyHeader();
    applyLevel4();
    buildLedger();
    updateRows();
  }

  function setLane(next){
    if(next!=="platform"&&next!=="engineering") next="platform";
    lane=next;
    history.replaceState({}, "", location.pathname + q({lane:lane}));
    setPressed(["lanePlatform","laneEngineering"], lane==="engineering"?"laneEngineering":"lanePlatform");
    applyHeader();
    applyLevel4();
    buildLedger();
    updateRows();
  }

  document.getElementById("langEN").addEventListener("click", function(){ setLang("en"); }, {passive:true});
  document.getElementById("langZH").addEventListener("click", function(){ setLang("zh"); }, {passive:true});
  document.getElementById("langES").addEventListener("click", function(){ setLang("es"); }, {passive:true});

  document.getElementById("lanePlatform").addEventListener("click", function(){ setLane("platform"); }, {passive:true});
  document.getElementById("laneEngineering").addEventListener("click", function(){ setLane("engineering"); }, {passive:true});

  setPressed(["langEN","langZH","langES"], lang==="zh"?"langZH":(lang==="es"?"langES":"langEN"));
  setPressed(["lanePlatform","laneEngineering"], lane==="engineering"?"laneEngineering":"lanePlatform");

  renderList();
  applyHeader();
  applyLevel4();
  buildLedger();
  updateRows();
  wireAll();

})();
</script>

</body>
</html>
