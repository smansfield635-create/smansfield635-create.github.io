     COMPASS · GEM DIAL (OBSIDIAN) · V5 (WATER FACE + DRAGONS + CLOUDS + FRACTAL GEMS)

       - 16 unique destinations; missing/duplicate → /404.html
       - CORE routes to /index-core/index.html
       - Bottom corner controls: EXIT → /door/ | HUB → /home/ (above any bottom UI)
       - Trilingual: EN / 中文 / ES (NO reload)
       - Lane: lane=platform|engineering (URL-only; NO reload; NEVER stored)
       - Canon state carry: gd_lang/gd_style/gd_time/gd_depth via URL + LocalStorage ONLY (NO new gd_* keys)

     VISUAL MODEL (LAYER STACK):

       L3 CloudReflection (translucent clouds drift left→right; masked to avoid CORE area)

       L5 Gems (opaque 3D fractalized diamonds)

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Compass · DiamondGateBridge</title>

<link rel="stylesheet" href="/assets/ui.css"/>
<link rel="stylesheet" href="/assets/branch.css"/>
<script defer src="/assets/instruments.js"></script>

<style>
a{color:inherit;text-decoration:none}
body{margin:0}
body::before,body::after{pointer-events:none!important}

:root{
  /* ===== GEOMETRY ===== */
  --D0:200px;  /* CORE (dominant) */
  --D1:148px;  /* Cardinals */
  --D2:112px;  /* Diagonals */
  --D3:88px;   /* Outer 8 */

  --R1:170px;
  --R2:248px;
  --R3:316px;

  --padTop:104px;

  /* ===== MATERIAL ===== */
  --ink:rgba(255,255,255,.94);
  --mut:rgba(255,255,255,.78);

  --onyx0:rgba(6,8,10,.96);
  --onyx1:rgba(10,12,16,.88);

  --crimson:rgba(120,0,22,.44);
  --festival:rgba(255,43,43,.26);
  --opalV:rgba(90,40,120,.18);

  --gold:rgba(201,162,74,.58);
  --goldGlow:rgba(201,162,74,.22);

  --shadowDeep:0 44px 140px rgba(0,0,0,.82);
  --shadowA:0 28px 110px rgba(0,0,0,.70);
  --shadowB:0 18px 60px rgba(0,0,0,.55);
}

/* ===== TOP BAR ===== */
.top{
  position:fixed;top:14px;left:0;right:0;
  padding:0 14px;
  z-index:260;
  pointer-events:none;
}
.topbar{
  pointer-events:auto;
  width:min(1180px,96vw);
  margin:0 auto;
  border:1px solid rgba(255,255,255,.12);
  border-radius:22px;
  padding:10px 12px;
  background:
    radial-gradient(circle at 20% 18%, rgba(255,170,90,.10), transparent 62%),
    radial-gradient(circle at 82% 30%, rgba(255,43,43,.10), transparent 64%),
    radial-gradient(circle at 60% 20%, rgba(201,162,74,.10), transparent 58%),
    linear-gradient(145deg, rgba(8,10,14,.78), rgba(4,6,10,.86));
  box-shadow:var(--shadowA), inset 0 0 0 1px rgba(201,162,74,.10);
  backdrop-filter:blur(10px);
  display:flex;align-items:center;justify-content:space-between;
  gap:12px;
}
.brandLeft{
  display:flex;align-items:flex-start;gap:12px;flex-wrap:wrap;min-width:0;
}
.brandBlock{display:flex;flex-direction:column;gap:4px;min-width:0}
.brandTitle{
  font-weight:980;
  letter-spacing:.6px;
  font-size:14px;
  color:rgba(255,255,255,.94);
  white-space:nowrap;
}
.brandSub{
  font-size:12.5px;
  color:rgba(255,255,255,.74);
  letter-spacing:.2px;
  line-height:1.35;
  max-width:min(640px,60vw);
}
.brandLinks{
  display:flex;gap:10px;flex-wrap:wrap;
  font-size:12px;
  color:rgba(255,255,255,.70);
}
.brandLinks a{
  padding:6px 10px;
  border-radius:999px;
  border:1px solid rgba(201,162,74,.16);
  background:rgba(0,0,0,.12);
}
.controlsRight{
  display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:flex-end;
}

/* Segmented controls */
.seg{
  display:inline-flex;gap:0;overflow:hidden;border-radius:16px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(0,0,0,.16);
  box-shadow:var(--shadowB);
}
.seg button{
  appearance:none;border:0;background:transparent;
  color:rgba(255,255,255,.78);
  padding:10px 12px;min-height:42px;
  font-weight:980;font-size:13px;letter-spacing:.25px;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
.seg button[aria-pressed="true"]{
  color:rgba(255,255,255,.95);
  background:
    radial-gradient(circle at 50% 50%, rgba(201,162,74,.14), transparent 62%),
    linear-gradient(180deg, rgba(255,43,43,.10), rgba(0,0,0,.10));
  box-shadow: inset 0 0 0 1px rgba(201,162,74,.14), inset 0 -10px 22px rgba(201,162,74,.10);
}

/* ===== STAGE ===== */
.stage{
  position:relative;
  width:min(1220px,94vw);
  height:min(1220px,86vh);
  margin:var(--padTop) auto 0;
  pointer-events:none;
}

/* ===== L1: SKY REFLECTION (brighter evening palette) ===== */
.sky{
  position:absolute;inset:-18%;
  pointer-events:none;
  z-index:0;
  border-radius:44px;
  overflow:hidden;
}
.sky::before{
  content:"";
  position:absolute;inset:0;
  background:
    radial-gradient(900px 520px at 68% 18%, rgba(255,220,170,.20) 0%, rgba(255,220,170,0) 56%), /* moon haze */
    radial-gradient(640px 420px at 20% 20%, rgba(255,120,90,.16) 0%, rgba(255,120,90,0) 60%),  /* lantern sky glow */
    radial-gradient(760px 520px at 84% 34%, rgba(255,140,70,.12) 0%, rgba(255,140,70,0) 64%),  /* warm horizon */
    radial-gradient(900px 620px at 50% 100%, rgba(0,0,0,.22) 0%, rgba(0,0,0,0) 62%),
    linear-gradient(180deg,
      rgba(180,20,20,.22) 0%,
      rgba(120,0,0,.26) 44%,
      rgba(50,0,0,.22) 72%,
      rgba(0,0,0,.18) 100%);
  opacity:.98;
}
.sky::after{
  content:"";
  position:absolute;inset:0;
  background:
    radial-gradient(2px 2px at 18% 22%, rgba(255,255,255,.22) 0%, transparent 60%),
    radial-gradient(2px 2px at 28% 30%, rgba(255,255,255,.16) 0%, transparent 60%),
    radial-gradient(2px 2px at 34% 18%, rgba(255,255,255,.16) 0%, transparent 60%),
    radial-gradient(2px 2px at 54% 26%, rgba(255,255,255,.18) 0%, transparent 60%),
    radial-gradient(2px 2px at 66% 20%, rgba(255,255,255,.18) 0%, transparent 60%),
    radial-gradient(2px 2px at 76% 30%, rgba(255,255,255,.16) 0%, transparent 60%),
    radial-gradient(2px 2px at 84% 18%, rgba(255,255,255,.14) 0%, transparent 60%),
    radial-gradient(2px 2px at 12% 40%, rgba(255,255,255,.14) 0%, transparent 60%),
    radial-gradient(2px 2px at 90% 44%, rgba(255,255,255,.12) 0%, transparent 60%);
  opacity:.65;
  mix-blend-mode:screen;
}

/* ===== Moon (single) + reflection ===== */
.moonWrap{
  position:absolute;
  right:6%;
  top:7%;
  width:160px;height:160px;
  pointer-events:none;
  z-index:1;
  filter: drop-shadow(0 0 18px rgba(255,240,210,.22));
}
.moon{
  width:160px;height:160px;border-radius:999px;
  position:relative;
  background:
    radial-gradient(circle at 32% 30%, rgba(255,255,255,.50), rgba(255,255,255,.18) 38%, rgba(255,255,255,.06) 62%, rgba(255,255,255,0) 78%),
    radial-gradient(circle at 50% 50%, rgba(255,240,210,.40), rgba(255,240,210,.10) 58%, rgba(255,240,210,0) 76%),
    radial-gradient(circle at 45% 55%, rgba(0,0,0,.18), rgba(0,0,0,0) 46%),
    radial-gradient(circle at 62% 42%, rgba(0,0,0,.14), rgba(0,0,0,0) 40%),
    radial-gradient(circle at 35% 70%, rgba(0,0,0,.12), rgba(0,0,0,0) 44%),
    radial-gradient(circle at 50% 50%, rgba(255,240,210,.55), rgba(255,240,210,.10) 62%, rgba(255,240,210,0) 78%);
  box-shadow:
    0 0 0 1px rgba(255,255,255,.10),
    0 0 30px rgba(255,240,210,.20),
    inset 0 0 18px rgba(255,255,255,.10);
  overflow:hidden;
}
.moon::after{
  content:"";
  position:absolute;inset:-40%;
  background:
    radial-gradient(circle at 50% 50%, rgba(255,240,210,.18), rgba(255,240,210,0) 62%);
  animation: moonGlow 6s ease-in-out infinite;
  opacity:.85;
}
@keyframes moonGlow{
  0%,100%{transform:scale(1);opacity:.75}
  50%{transform:scale(1.06);opacity:.95}
}
/* phase mask (changes periodically; no storage, no new keys) */
.phaseMask{
  position:absolute;inset:0;border-radius:999px;
  background: rgba(0,0,0,.0);
  mix-blend-mode:multiply;
  opacity:.92;
}

/* reflection: faint and stretched in the lower sky */
.moonReflect{
  position:absolute;
  right:8%;
  top:46%;
  width:220px;height:360px;
  pointer-events:none;
  z-index:0;
  opacity:.18;
  transform:skewX(-10deg);
  filter: blur(1px);
}
.moonReflect::before{
  content:"";
  position:absolute;inset:0;
  background:
    radial-gradient(closest-side at 50% 0%, rgba(255,240,210,.55), rgba(255,240,210,0) 72%),
    linear-gradient(180deg, rgba(255,240,210,.22), rgba(255,240,210,0));
}

/* ===== L2: WATER COMPASS (translucent) ===== */
.waterFace{
  position:absolute;
  left:50%;top:50%;
  transform:translate(-50%,-50%);
  width:min(980px,92vw);
  height:min(980px,92vw);
  border-radius:999px;
  pointer-events:none;
  z-index:2;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.10);
  background:
    radial-gradient(circle at 50% 40%, rgba(255,255,255,.06), transparent 60%),
    radial-gradient(circle at 50% 50%, rgba(201,162,74,.08), transparent 62%),
    radial-gradient(circle at 50% 50%, rgba(255,43,43,.08), transparent 68%),
    linear-gradient(180deg, rgba(255,120,80,.08), rgba(0,0,0,.10));
  box-shadow:
    0 60px 220px rgba(0,0,0,.42),
    inset 0 0 60px rgba(0,0,0,.25);
  opacity:.86;
}
.waterFace::before{
  content:"";
  position:absolute;inset:-20%;
  background:
    radial-gradient(circle at 50% 50%, rgba(255,255,255,.06), transparent 62%),
    repeating-radial-gradient(circle at 50% 50%,
      rgba(255,255,255,.04) 0 2px,
      transparent 2px 16px),
    repeating-conic-gradient(from 45deg at 50% 50%,
      rgba(201,162,74,.06) 0 1.2deg,
      transparent 1.2deg 7.2deg);
  opacity:.75;
  filter: blur(.35px);
  animation: ripple 10s linear infinite;
}
.waterFace::after{
  content:"";
  position:absolute;inset:-18%;
  background:
    radial-gradient(110% 80% at 20% 10%, rgba(255,255,255,.10), rgba(255,255,255,0) 58%),
    radial-gradient(100% 90% at 70% 80%, rgba(255,255,255,.08), rgba(255,255,255,0) 62%),
    linear-gradient(180deg, rgba(255,200,140,.08), rgba(0,0,0,0));
  opacity:.50;
  animation: ripple2 14s ease-in-out infinite;
}
@keyframes ripple{
  0%{transform:translate(0,0) rotate(0deg)}
  100%{transform:translate(2.5%,1.5%) rotate(8deg)}
}
@keyframes ripple2{
  0%,100%{transform:translate(0,0) rotate(0deg);opacity:.45}
  50%{transform:translate(-2.2%,1.4%) rotate(-6deg);opacity:.60}
}

/* engraved rings/ticks (instrument grade) */
.dialEngrave{
  position:absolute;
  left:50%;top:50%;
  transform:translate(-50%,-50%);
  width:min(900px,90vw);
  height:min(900px,90vw);
  border-radius:999px;
  pointer-events:none;
  z-index:3;
  opacity:.78;
}
.dialEngrave::before{
  content:"";
  position:absolute;inset:0;border-radius:999px;
  background:
    radial-gradient(circle at 50% 50%, transparent 0 36%, rgba(0,0,0,.24) 36% 36.6%, transparent 37% 100%),
    radial-gradient(circle at 50% 50%, transparent 0 52%, rgba(0,0,0,.22) 52% 52.6%, transparent 53% 100%),
    radial-gradient(circle at 50% 50%, transparent 0 68%, rgba(0,0,0,.20) 68% 68.6%, transparent 69% 100%),
    linear-gradient(90deg, transparent 0 49.7%, rgba(0,0,0,.22) 49.7% 50.3%, transparent 50.3% 100%),
    linear-gradient(0deg,  transparent 0 49.7%, rgba(0,0,0,.22) 49.7% 50.3%, transparent 50.3% 100%);
  mix-blend-mode:multiply;
}
.dialEngrave::after{
  content:"";
  position:absolute;inset:-10%;
  background:
    repeating-conic-gradient(from -90deg at 50% 50%,
      rgba(0,0,0,.22) 0deg 0.8deg,
      transparent 0.8deg 7.5deg);
  opacity:.50;
  filter: blur(.2px);
  mask: radial-gradient(circle at 50% 50%, transparent 0 22%, #000 26% 100%);
  -webkit-mask: radial-gradient(circle at 50% 50%, transparent 0 22%, #000 26% 100%);
}

/* 16 direction labels on the compass face */
.dirRing{
  position:absolute;
  left:50%;top:50%;
  transform:translate(-50%,-50%);
  width:min(900px,90vw);
  height:min(900px,90vw);
  pointer-events:none;
  z-index:4;
}
.dirTxt{
  position:absolute;
  transform:translate(-50%,-50%);
  font-weight:980;
  letter-spacing:1px;
  font-size:10px;
  color:rgba(0,0,0,.55);
  text-shadow:
    0 0 0 rgba(0,0,0,0),
    0 0 10px rgba(201,162,74,.22);
}
.dirTxt::after{
  content:attr(data-t);
  position:absolute;left:0;top:0;
  transform:translate(0,0);
  color:rgba(201,162,74,.58);
  text-shadow:0 0 12px rgba(201,162,74,.18);
  mix-blend-mode:screen;
  opacity:.75;
}

/* ===== L3: CLOUDS (reflection) ===== */
.cloudLayer{
  position:absolute;inset:0;
  pointer-events:none;
  z-index:5;
  opacity:.55;
  mix-blend-mode:screen;
  /* mask hole at center so clouds never pass over CORE */
  mask: radial-gradient(circle at 50% 50%, transparent 0 18%, #000 22% 100%);
  -webkit-mask: radial-gradient(circle at 50% 50%, transparent 0 18%, #000 22% 100%);
}
.cloud{
  position:absolute;
  left:-40%;
  width:60%;
  height:26%;
  top:18%;
  background:
    radial-gradient(40% 50% at 20% 60%, rgba(255,255,255,.10), rgba(255,255,255,0) 66%),
    radial-gradient(44% 56% at 44% 52%, rgba(255,255,255,.10), rgba(255,255,255,0) 68%),
    radial-gradient(48% 60% at 70% 56%, rgba(255,255,255,.10), rgba(255,255,255,0) 70%),
    radial-gradient(60% 80% at 50% 60%, rgba(255,255,255,.06), rgba(255,255,255,0) 72%);
  filter: blur(1.2px);
  opacity:.70;
  animation: cloudsLR 22s linear infinite;
}
.cloud.c2{
  top:56%;
  height:24%;
  width:66%;
  opacity:.55;
  animation-duration:28s;
  animation-delay:-10s;
}
@keyframes cloudsLR{
  0%{transform:translateX(0)}
  100%{transform:translateX(220%)}
}

/* ===== L4: DRAGONS (two) ===== */
.dragonLayer{
  position:absolute;inset:0;
  pointer-events:none;
  z-index:6;
}
.dragon{
  position:absolute;
  left:110%;
  width:70%;
  height:24%;
  filter: drop-shadow(0 0 10px rgba(0,0,0,.40));
  opacity:.92;
  animation: dragonRL 26s linear infinite;
}
.dragon.top{ top:18%; animation-duration:30s; }
.dragon.bot{ top:64%; animation-duration:34s; animation-delay:-14s; }
@keyframes dragonRL{
  0%{transform:translateX(0)}
  100%{transform:translateX(-260%)}
}

/* ===== L5: GEM NODES ===== */
.node{
  position:absolute;
  left:50%;top:50%;
  transform:translate(-50%,-50%) rotate(45deg);
  cursor:pointer;
  pointer-events:auto;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.18);
  transition:box-shadow .16s ease, border-color .16s ease, filter .16s ease;
  z-index:12;
  border-radius:22px;
}
.core{width:var(--D0);height:var(--D0);z-index:14;border-radius:26px}
.l1{width:var(--D1);height:var(--D1)}
.l2{width:var(--D2);height:var(--D2)}
.l3{width:var(--D3);height:var(--D3);border-radius:18px}

/* gem material + fractalization */
.surface{
  background:
    radial-gradient(120% 90% at 22% 12%, rgba(255,255,255,.22) 0%, rgba(255,255,255,0) 52%),
    radial-gradient(90% 80% at 78% 22%, rgba(255,43,43,.14) 0%, rgba(255,43,43,0) 62%),
    radial-gradient(90% 90% at 76% 78%, rgba(160,90,255,.12) 0%, rgba(160,90,255,0) 64%),
    /* fractal-like micro facets */
    repeating-conic-gradient(from 18deg at 45% 55%,
      rgba(255,255,255,.08) 0 6deg,
      rgba(0,0,0,0) 6deg 14deg),
    repeating-conic-gradient(from 80deg at 58% 42%,
      rgba(201,162,74,.08) 0 4deg,
      rgba(0,0,0,0) 4deg 12deg),
    linear-gradient(160deg, var(--onyx1), var(--onyx0));
  box-shadow:
    var(--shadowDeep),
    0 0 24px rgba(255,43,43,.08),
    inset 0 2px 0 rgba(255,255,255,.18),
    inset 0 -52px 92px rgba(0,0,0,.88);
}

/* 3D edge + curved inlay (NO orthogonal grid) */
.surface::before{
  content:"";
  position:absolute;inset:0;border-radius:inherit;pointer-events:none;
  /* curved inlay arcs + perimeter rim */
  background:
    radial-gradient(120% 120% at 50% 50%, rgba(201,162,74,0) 58%, rgba(201,162,74,.14) 82%, rgba(201,162,74,0) 100%),
    repeating-conic-gradient(from 45deg at 50% 50%,
      rgba(201,162,74,.07) 0 1.2deg,
      transparent 1.2deg 7.5deg),
    radial-gradient(110% 80% at 20% 10%, rgba(255,255,255,.10), rgba(255,255,255,0) 58%),
    radial-gradient(110% 80% at 80% 90%, rgba(0,0,0,.18), rgba(0,0,0,0) 62%);
  opacity:.75;
  mask:
    radial-gradient(circle at 50% 50%, transparent 0 70%, #000 78% 100%),
    linear-gradient(#000,#000);
  -webkit-mask:
    radial-gradient(circle at 50% 50%, transparent 0 70%, #000 78% 100%),
    linear-gradient(#000,#000);
}

/* highlight streak */
.surface::after{
  content:"";
  position:absolute;left:12%;right:12%;top:10%;
  height:30%;
  border-radius:999px;
  background:linear-gradient(to bottom, rgba(255,255,255,.22), rgba(255,255,255,0));
  transform:rotate(-12deg);
  pointer-events:none;
  opacity:.92;
}

/* glow-only hover */
.node:hover{
  border-color:rgba(201,162,74,.44);
  box-shadow:
    var(--shadowDeep),
    0 0 0 2px rgba(201,162,74,.14),
    0 0 34px rgba(201,162,74,.18),
    inset 0 2px 0 rgba(255,255,255,.20),
    inset 0 -52px 92px rgba(0,0,0,.88);
}
.node:active{filter:brightness(.98)}

/* inner text */
.inner{
  width:100%;height:100%;
  transform:rotate(-45deg);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:10px;
  gap:6px;
  color:#fff;
  pointer-events:none;
}
.word{
  font-weight:980;
  letter-spacing:.6px;
  line-height:1.05;
  text-shadow:0 0 18px rgba(0,0,0,.42);
  font-size:clamp(10px, 1.15vw, 16px);
  max-width:100%;
  word-break:keep-all;
}
.code{
  font-weight:950;
  font-size:10px;
  letter-spacing:1.2px;
  opacity:.78;
}

/* CORE emphasis */
.core{
  border-color:rgba(201,162,74,.26);
  box-shadow:
    0 54px 170px rgba(0,0,0,.88),
    0 0 46px rgba(201,162,74,.12),
    inset 0 2px 0 rgba(255,255,255,.22),
    inset 0 -64px 110px rgba(0,0,0,.92);
}

/* ===== BOTTOM CORNERS (EXIT / HUB) ===== */
.corner{
  position:fixed;
  bottom:max(16px, env(safe-area-inset-bottom));
  z-index:270;
  pointer-events:none;
}
.corner .dmini{pointer-events:auto}
.corner.left{left:16px}
.corner.right{right:16px}
.dmini{
  width:56px;height:56px;
  border-radius:16px;
  border:1px solid rgba(255,255,255,.14);
  background:
    radial-gradient(circle at 50% 40%, rgba(255,255,255,.08), transparent 52%),
    linear-gradient(145deg, rgba(10,12,16,.78), rgba(6,8,10,.92));
  box-shadow:var(--shadowB), 0 0 0 1px rgba(201,162,74,.10), 0 0 18px rgba(201,162,74,.10);
  display:grid;place-items:center;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
  transform:rotate(45deg);
  position:relative;
  overflow:hidden;
  transition:box-shadow .16s ease, border-color .16s ease;
}
.dmini:hover{
  border-color:rgba(201,162,74,.44);
  box-shadow:var(--shadowB), 0 0 0 2px rgba(201,162,74,.14), 0 0 30px rgba(201,162,74,.18);
}
.dmini span{
  transform:rotate(-45deg);
  font-weight:980;
  font-size:12px;
  letter-spacing:.6px;
  color:rgba(255,255,255,.92);
  user-select:none;
}
.cornerLabel{
  margin-top:10px;
  text-align:center;
  color:rgba(255,255,255,.72);
  font-size:11px;
  letter-spacing:.4px;
}

/* ===== BOTTOM PILL ===== */
.pillWrap{
  width:min(1180px,94vw);
  margin:14px auto 0;
  padding-bottom:90px;
}

<body>

      <div class="phaseMask" id="phaseMask"></div>

  </div>

  <div class="waterFace" aria-hidden="true"></div>

</div>

<script>
(function(){
  "use strict";

  // ===== Canon state (gd_* only; lane URL-only) =====
  var qs=new URLSearchParams(location.search);
  var LS=window.localStorage;

  var lang  = qs.get("lang")  || LS.getItem("gd_lang")  || "en";
  var style = qs.get("style") || LS.getItem("gd_style") || "informal";
  var time  = qs.get("time")  || LS.getItem("gd_time")  || "now";
  var depth = qs.get("depth") || LS.getItem("gd_depth") || "explore";
  var lane  = qs.get("lane")  || "platform"; // URL-only

  if(lang!=="en" && lang!=="zh" && lang!=="es") lang="en";
  if(style!=="informal" && style!=="formal") style="informal";
  if(time==="trajectory") time="post";
  if(time!=="origin" && time!=="now" && time!=="post") time="now";
  if(depth!=="explore" && depth!=="learn") depth="explore";
  if(lane!=="platform" && lane!=="engineering") lane="platform";

  try{
    LS.setItem("gd_lang",lang);
    LS.setItem("gd_style",style);
    LS.setItem("gd_time",time);
    LS.setItem("gd_depth",depth);
  }catch(e){}

  document.documentElement.lang=(lang==="zh")?"zh":(lang==="es")?"es":"en";

  function q(over){
    var p=new URLSearchParams();
    p.set("lang",(over&&over.lang)?over.lang:lang);
    p.set("style",(over&&over.style)?over.style:style);
    p.set("time",(over&&over.time)?over.time:time);
    p.set("depth",(over&&over.depth)?over.depth:depth);
    var L=(over&&over.lane)?over.lane:lane;
    if(L==="platform"||L==="engineering") p.set("lane",L);
    return "?"+p.toString();
  }
  function go(path){ window.location.href = path + q(); }
  function setPressed(btn, on){ btn.setAttribute("aria-pressed", on ? "true" : "false"); }

  // ===== Moon phase (no storage / no new keys) =====
  // phase advances every 5 minutes (approximates “time passing” without persistence)
  function moonPhaseIndex(){
    var step = Math.floor(Date.now()/(1000*60*5));
    return step % 8; // 0..7
  }
  function applyMoonPhase(){
    var i = moonPhaseIndex();
    // 0 new, 1 waxing crescent, 2 first quarter, 3 waxing gibbous, 4 full, 5 waning gibbous, 6 last quarter, 7 waning crescent
    // Use a soft dark mask that slides; never create a second moon.
    var mask = document.getElementById("phaseMask");
    if(!mask) return;

    var x = [92,78,62,46,0,46,62,78][i];  // how much dark covers (0=full)
    var o = (i===4)?0.0:0.80;

    mask.style.background =
      "radial-gradient(130% 130% at "+x+"% 50%, rgba(0,0,0,"+o+") 0%, rgba(0,0,0,"+o+") 58%, rgba(0,0,0,0) 62%)";
    // Boost glow for full moon
    var moon = mask.parentElement;
    if(moon){
      moon.style.filter = (i===4) ? "drop-shadow(0 0 18px rgba(255,240,210,.28))" : "none";
    }
  }

  // ===== ROUTING (NO DUPLICATES; unknown/unbuilt → 404) =====
  var CORE_ROUTE = "/index-core/index.html";
  var EXIT_ROUTE = "/door/";
  var HUB_ROUTE  = "/home/";
  var PLACEHOLDER_404 = "/404.html";

  // REQUIRED mapping:
  // N = Laws, E = Energy, S = Finance, W = Governance
  // Must include Research; Doctrine must route to /products/capital-doctrine/
  // Prelude removed from compass.
  var ROUTES_RAW = [
    // Tier 1 (cardinals)
    {tier:1, code:"N",  label:{platform:{en:"LAWS",zh:"法则",es:"LEYES"}, engineering:{en:"BOUNDS",zh:"边界",es:"LÍMIT"}}, href:"/laws/"},
    {tier:1, code:"E",  label:{platform:{en:"ENERGY",zh:"能源",es:"ENERGÍA"}, engineering:{en:"POWER",zh:"功率",es:"PWR"}}, href:"/explore/frontier/energy/"},
    {tier:1, code:"S",  label:{platform:{en:"FINANCE",zh:"金融",es:"FINANZAS"}, engineering:{en:"CAPITAL",zh:"资本",es:"CAP"}}, href:"/finance/"},
    {tier:1, code:"W",  label:{platform:{en:"GOVERNANCE",zh:"治理",es:"GOBERNANZA"}, engineering:{en:"EXEC",zh:"执行",es:"EJEC"}}, href:"/governance/"},

    // Tier 2 (diagonals)
    {tier:2, code:"NE", label:{platform:{en:"PRODUCTS",zh:"产品",es:"PRODUCTOS"}, engineering:{en:"DEPLOY",zh:"部署",es:"DESPL"}}, href:"/products/"},
    {tier:2, code:"SE", label:{platform:{en:"RESEARCH",zh:"研究",es:"INVEST."}, engineering:{en:"R&D",zh:"研发",es:"I+D"}}, href:"/research/"},
    {tier:2, code:"SW", label:{platform:{en:"EXPLORE",zh:"探索",es:"EXPLORAR"}, engineering:{en:"MODELS",zh:"模型",es:"MODELOS"}}, href:"/explore/"},
    {tier:2, code:"NW", label:{platform:{en:"DOCTRINE",zh:"教义",es:"DOCTRINA"}, engineering:{en:"CCD",zh:"CCD",es:"CCD"}}, href:"/products/capital-doctrine/"},

    // Tier 3 (outer 8)
    {tier:3, code:"NNE",label:{platform:{en:"EDUCATION",zh:"教育",es:"EDUCACIÓN"}, engineering:{en:"ESL",zh:"ESL",es:"ESL"}}, href:"/products/education/"},
    {tier:3, code:"ENE",label:{platform:{en:"FRONTIER",zh:"前沿",es:"FRONTERA"}, engineering:{en:"FRONTIER",zh:"前沿",es:"FRONTERA"}}, href:"/explore/frontier/"},
    {tier:3, code:"ESE",label:{platform:{en:"INFRA",zh:"基建",es:"INFRA"}, engineering:{en:"SUBST",zh:"替代",es:"SUBST"}}, href:"/explore/infrastructure/"},
    {tier:3, code:"SSE",label:{platform:{en:"AGRICULTURE",zh:"农业",es:"AGRO"}, engineering:{en:"FOOD",zh:"食物",es:"ALIM"}}, href:"/products/agriculture/"},
    {tier:3, code:"SSW",label:{platform:{en:"GAUGES",zh:"量规",es:"MEDIDORES"}, engineering:{en:"SIGNALS",zh:"信号",es:"SEÑALES"}}, href:"/gauges/"},
    {tier:3, code:"WSW",label:{platform:{en:"VISION",zh:"愿景",es:"VISIÓN"}, engineering:{en:"MAP",zh:"映射",es:"MAP"}}, href:"/explore/frontier/vision/"},
    {tier:3, code:"WNW",label:{platform:{en:"LATTICE",zh:"晶格",es:"LATTICE"}, engineering:{en:"256",zh:"256态",es:"256"}}, href:"/explore/frontier/lattice/"},
    {tier:3, code:"NNW",label:{platform:{en:"SHIMMER",zh:"闪烁",es:"SHIMMER"}, engineering:{en:"S.H.I.M.M.E.R.",zh:"SHIMMER",es:"SHIMMER"}}, href:"/explore/frontier/shimmer/"}
  ];

  function normalizeRoutes(list){
    var seen = Object.create(null);
    var out = [];
    for(var i=0;i<list.length;i++){
      var it=list[i];
      var h=(it.href||"").trim();
      if(!h) h=PLACEHOLDER_404;
      if(seen[h]) h=PLACEHOLDER_404;
      seen[h]=true;
      out.push({tier:it.tier, code:it.code, label:it.label, href:h});
    }
    return out;
  }
  var ROUTES = normalizeRoutes(ROUTES_RAW);

  function pick3(en,zh,es){ return (lang==="zh")?zh:(lang==="es")?es:en; }
  function labelFor(it){
    var pack = (lane==="engineering") ? it.label.engineering : it.label.platform;
    return pick3(pack.en, pack.zh, pack.es);
  }

  // ===== Node build =====
  var stage=document.getElementById("stage");

  function mkNode(word, code, cls){
    var d=document.createElement("div");
    d.className="node surface "+cls;
    d.setAttribute("role","button");
    d.tabIndex=0;

    var inner=document.createElement("div");
    inner.className="inner";

    var w=document.createElement("div");
    w.className="word";
    w.textContent=word;

    var c=document.createElement("div");
    c.className="code";
    c.textContent=code;

    inner.appendChild(w);
    inner.appendChild(c);
    d.appendChild(inner);
    return d;
  }

  function layout(){
    // remove existing nodes
    stage.querySelectorAll(".node").forEach(function(n){ n.remove(); });

    var rect=stage.getBoundingClientRect();
    var cx=rect.width/2, cy=rect.height/2;

    var cs=getComputedStyle(document.documentElement);
    var R1=parseFloat(cs.getPropertyValue("--R1"))||170;
    var R2=parseFloat(cs.getPropertyValue("--R2"))||248;
    var R3=parseFloat(cs.getPropertyValue("--R3"))||316;

    // CORE
    var core=mkNode(pick3("CORE","核心","NÚCLEO"), "INDEX", "core");
    core.style.left=cx+"px"; core.style.top=cy+"px";
    core.addEventListener("click", function(){ go(CORE_ROUTE); }, {passive:true});
    core.addEventListener("keydown", function(e){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); go(CORE_ROUTE); }});
    stage.appendChild(core);

    // split by tier
    var t1=[], t2=[], t3=[];
    for(var i=0;i<ROUTES.length;i++){
      if(ROUTES[i].tier===1) t1.push(ROUTES[i]);
      else if(ROUTES[i].tier===2) t2.push(ROUTES[i]);
      else t3.push(ROUTES[i]);
    }

    // Tier 1 pinned to N/E/S/W angles
    function byCode(arr, code){ for(var i=0;i<arr.length;i++) if(arr[i].code===code) return arr[i]; return null; }
    var ordered=[byCode(t1,"N"),byCode(t1,"E"),byCode(t1,"S"),byCode(t1,"W")].filter(Boolean);
    var ang=[-Math.PI/2, 0, Math.PI/2, Math.PI];
    for(var i=0;i<ordered.length;i++){
      var it=ordered[i];
      var x=cx + R1*Math.cos(ang[i]);
      var y=cy + R1*Math.sin(ang[i]);
      var n=mkNode(labelFor(it), it.code, "l1");
      n.style.left=x+"px"; n.style.top=y+"px";
      (function(path, el){
        el.addEventListener("click", function(){ go(path); }, {passive:true});
        el.addEventListener("keydown", function(e){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); go(path); }});
      })(it.href, n);
      stage.appendChild(n);
    }

    // Tier 2 (diagonals) start at -45°
    for(var i=0;i<t2.length;i++){
      var it=t2[i];
      var a=(i/t2.length)*(Math.PI*2) - Math.PI/4;
      var x=cx + R2*Math.cos(a);
      var y=cy + R2*Math.sin(a);
      var n=mkNode(labelFor(it), it.code, "l2");
      n.style.left=x+"px"; n.style.top=y+"px";
      (function(path, el){
        el.addEventListener("click", function(){ go(path); }, {passive:true});
        el.addEventListener("keydown", function(e){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); go(path); }});
      })(it.href, n);
      stage.appendChild(n);
    }

    // Tier 3 (outer 8) start at -67.5°
    for(var i=0;i<t3.length;i++){
      var it=t3[i];
      var a=(i/t3.length)*(Math.PI*2) - Math.PI*(3/8);
      var x=cx + R3*Math.cos(a);
      var y=cy + R3*Math.sin(a);
      var n=mkNode(labelFor(it), it.code, "l3");
      n.style.left=x+"px"; n.style.top=y+"px";
      (function(path, el){
        el.addEventListener("click", function(){ go(path); }, {passive:true});
        el.addEventListener("keydown", function(e){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); go(path); }});
      })(it.href, n);
      stage.appendChild(n);
    }
  }

  function safeLayout(){
    var r=stage.getBoundingClientRect();
    if(r.width<10||r.height<10){ requestAnimationFrame(safeLayout); return; }
    layout();
  }

  // ===== 16 direction labels on compass face =====
  var DIRS = ["N","NNE","NE","ENE","E","ESE","SE","SSE","S","SSW","SW","WSW","W","WNW","NW","NNW"];
  function buildDirRing(){
    var ring=document.getElementById("dirRing");
    if(!ring) return;
    ring.innerHTML="";
    var rect=ring.getBoundingClientRect();
    var cx=rect.width/2, cy=rect.height/2;
    var R = Math.min(cx,cy)*0.47; // label radius inside face

    for(var i=0;i<DIRS.length;i++){
      var a=(i/DIRS.length)*(Math.PI*2) - Math.PI/2;
      var x=cx + R*Math.cos(a);
      var y=cy + R*Math.sin(a);

      var s=document.createElement("div");
      s.className="dirTxt";
      s.style.left=x+"px";
      s.style.top=y+"px";
      s.setAttribute("data-t", DIRS[i]);
      s.textContent=DIRS[i];
      ring.appendChild(s);
    }
  }

  // ===== Dragons (SVG with textPath) =====
  function dragonSVG(text, isTop){
    // Body path: curvy but segmented look; head + horns + limbs as shapes.
    // Text: along main path, gold glow.
    var fill = "rgba(6,70,40,0.92)"; // dark green
    var stroke = "rgba(0,0,0,0.55)";
    var glow = "rgba(212,175,55,0.75)";

    var id = isTop ? "pTop" : "pBot";
    var tsize = isTop ? 18 : 16;

    // NOTE: keep svg light (no filters that kill mobile)
    return ""+
    "<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1400 320' preserveAspectRatio='xMidYMid meet'>"+
      "<defs>"+
        "<path id='"+id+"' d='M40 190 C120 110, 220 90, 320 120 C410 146, 468 190, 560 178 C650 166, 720 118, 820 108 C930 98, 1000 130, 1086 174 C1180 222, 1260 230, 1360 170'/>"+
      "</defs>"+

      /* segmented body */
      "<g opacity='0.96'>"+
        "<path d='M40 190 C120 110, 220 90, 320 120 C410 146, 468 190, 560 178 C650 166, 720 118, 820 108 C930 98, 1000 130, 1086 174 C1180 222, 1260 230, 1360 170' fill='none' stroke='"+stroke+"' stroke-width='30' stroke-linecap='round' stroke-linejoin='round'/>"+
        "<path d='M40 190 C120 110, 220 90, 320 120 C410 146, 468 190, 560 178 C650 166, 720 118, 820 108 C930 98, 1000 130, 1086 174 C1180 222, 1260 230, 1360 170' fill='none' stroke='"+fill+"' stroke-width='24' stroke-linecap='round' stroke-linejoin='round'/>"+

        /* scales hint */
        "<path d='M90 175 C140 150, 200 142, 250 152' fill='none' stroke='rgba(255,255,255,0.10)' stroke-width='3'/>"+
        "<path d='M260 152 C320 166, 360 190, 420 184' fill='none' stroke='rgba(255,255,255,0.10)' stroke-width='3'/>"+
        "<path d='M520 182 C590 168, 650 150, 710 142' fill='none' stroke='rgba(255,255,255,0.10)' stroke-width='3'/>"+
        "<path d='M850 112 C910 110, 960 120, 1010 144' fill='none' stroke='rgba(255,255,255,0.10)' stroke-width='3'/>"+

        /* head (left) */
        "<g transform='translate(62,176) rotate(-18)'>"+
          "<path d='M0 0 C22 -24, 54 -20, 72 0 C58 18, 34 22, 0 0Z' fill='"+fill+"' stroke='"+stroke+"' stroke-width='3'/>"+
          "<circle cx='46' cy='-2' r='3' fill='rgba(255,255,255,0.55)'/>"+
          "<path d='M18 -18 C10 -34, 22 -46, 34 -38' fill='none' stroke='"+fill+"' stroke-width='6' stroke-linecap='round'/>"+
          "<path d='M34 -16 C30 -34, 48 -48, 60 -34' fill='none' stroke='"+fill+"' stroke-width='6' stroke-linecap='round'/>"+
          "<path d='M62 2 C76 0, 84 6, 90 14' fill='none' stroke='"+fill+"' stroke-width='5' stroke-linecap='round'/>"+
        "</g>"+

        /* small limbs */
        "<g fill='"+fill+"' opacity='0.92'>"+
          "<path d='M360 170 C346 196, 360 214, 382 210 C374 196, 372 184, 382 168Z'/>"+
          "<path d='M690 152 C678 176, 690 194, 712 190 C704 176, 702 164, 712 150Z'/>"+
        "</g>"+

        /* tail tip (right) */
        "<g transform='translate(1328,174) rotate(14)'>"+
          "<path d='M0 0 C18 -8, 30 -2, 40 10 C26 18, 12 16, 0 0Z' fill='"+fill+"' stroke='"+stroke+"' stroke-width='2'/>"+
        "</g>"+
      "</g>"+

      /* glowing text along body */
      "<text font-family='system-ui, -apple-system, Segoe UI, Roboto, sans-serif' font-weight='900' font-size='"+tsize+"' letter-spacing='1'>"+
        "<textPath href='#"+id+"' startOffset='10%'>"+
          "<tspan fill='rgba(0,0,0,0)'>"+""+"</tspan>"+
          "<tspan fill='"+glow+"' opacity='0.92'>"+escapeXML(text)+"</tspan>"+
        "</textPath>"+
      "</text>"+
      "<text font-family='system-ui, -apple-system, Segoe UI, Roboto, sans-serif' font-weight='900' font-size='"+tsize+"' letter-spacing='1' opacity='0.60'>"+
        "<textPath href='#"+id+"' startOffset='10%'>"+
          "<tspan fill='rgba(212,175,55,0.30)'>"+escapeXML(text)+"</tspan>"+
        "</textPath>"+
      "</text>"+
    "</svg>";
  }

  function escapeXML(s){
    return String(s)
      .replace(/&/g,"&amp;")
      .replace(/</g,"&lt;")
      .replace(/>/g,"&gt;")
      .replace(/"/g,"&quot;")
      .replace(/'/g,"&apos;");
  }

  // Top dragon = ancient Chinese sayings (static set, rotates by time)
  var CN_SAYINGS = [
    "道生一，一生二，二生三，三生万物",
    "道可道，非常道；名可名，非常名",
    "己所不欲，勿施于人",
    "上善若水，水善利万物而不争"
  ];

  function selectedLanguageSayings(){
    // bottom dragon = selected language
    if(lang==="zh"){
      return ["以事实为锚，以边界为准，以收据为证"];
    }
    if(lang==="es"){
      return ["Hechos → límites → recibos → ejecución"];
    }
    return ["Facts → bounds → receipts → execution"];
  }

  function paintDragons(){
    var top=document.getElementById("dragonTop");
    var bot=document.getElementById("dragonBot");
    if(!top || !bot) return;

    var idx = Math.floor(Date.now()/(1000*20)) % CN_SAYINGS.length;
    var topText = CN_SAYINGS[idx];
    var botText = selectedLanguageSayings()[0];

    top.innerHTML = dragonSVG(topText, true);
    bot.innerHTML = dragonSVG(botText, false);
  }

  // ===== Language (NO reload) =====
  var btnEN=document.getElementById("btnEN");
  var btnZH=document.getElementById("btnZH");
  var btnES=document.getElementById("btnES");
  setPressed(btnEN, lang==="en");
  setPressed(btnZH, lang==="zh");
  setPressed(btnES, lang==="es");

  function paintHeader(){
    var laneWord = (lane==="engineering")
      ? pick3("ENGINEERING","工程","INGENIERÍA")
      : pick3("PLATFORM","平台","PLATAFORMA");

    if(lang==="zh"){
      document.getElementById("brandTitle").textContent="欢迎来到指南针";
      document.getElementById("brandSub").textContent="这是教程页：选一个枢纽，读一块，然后移动。感觉循环时回到 CORE 重置。透镜："+laneWord;
      document.getElementById("lblExit").textContent="退出";
      document.getElementById("lblHub").textContent="枢纽";
      document.querySelector("#btnExit span").textContent="退出";
      document.querySelector("#btnHub span").textContent="枢纽";
      document.getElementById("pill").innerHTML="<b>指南针：</b>一个中心（<span class='g'>CORE</span>）+ 16 枢纽。禁止重复目的地。未建页面暂时路由到 <span class='g'>/404.html</span>。";
    }else if(lang==="es"){
      document.getElementById("brandTitle").textContent="BIENVENIDO A LA BRÚJULA";
      document.getElementById("brandSub").textContent="Tutorial: elige un hub, lee un bloque y avanza. Si aparece un bucle, vuelve a CORE para reset. Lente: "+laneWord;
      document.getElementById("lblExit").textContent="SALIR";
      document.getElementById("lblHub").textContent="HUB";
      document.querySelector("#btnExit span").textContent="SALIR";
      document.querySelector("#btnHub span").textContent="HUB";
      document.getElementById("pill").innerHTML="<b>Brújula:</b> Un centro (<span class='g'>CORE</span>) + 16 hubs. Sin destinos duplicados. No construido → <span class='g'>/404.html</span>.";
    }else{
      document.getElementById("brandTitle").textContent="WELCOME TO THE COMPASS";
      document.getElementById("brandSub").textContent="This is a tutorial: pick one hub, read one block, then move. Use CORE to reset if you feel a loop. Lens: "+laneWord;
      document.getElementById("lblExit").textContent="EXIT";
      document.getElementById("lblHub").textContent="HUB";
      document.querySelector("#btnExit span").textContent="EXIT";
      document.querySelector("#btnHub span").textContent="HUB";
      document.getElementById("pill").innerHTML="<b>Compass:</b> One center (<span class='g'>CORE</span>) + 16 hubs. No duplicate destinations. Unbuilt hubs route to <span class='g'>/404.html</span>.";
    }
  }

  function setLang(next){
    if(next!=="en" && next!=="zh" && next!=="es") next="en";
    lang=next;
    try{ LS.setItem("gd_lang",lang);}catch(e){}
    history.replaceState({}, "", location.pathname + q({lang:lang}));
    setPressed(btnEN, lang==="en");
    setPressed(btnZH, lang==="zh");
    setPressed(btnES, lang==="es");
    paintHeader();
    paintDragons();
    safeLayout();
  }
  btnEN.addEventListener("click", function(){ setLang("en"); }, {passive:true});
  btnZH.addEventListener("click", function(){ setLang("zh"); }, {passive:true});
  btnES.addEventListener("click", function(){ setLang("es"); }, {passive:true});

  // ===== Lane (NO reload; URL-only) =====
  var btnLP=document.getElementById("lanePlatform");
  var btnLE=document.getElementById("laneEngineering");
  setPressed(btnLP, lane==="platform");
  setPressed(btnLE, lane==="engineering");

  function setLane(next){
    if(next!=="platform" && next!=="engineering") next="platform";
    lane=next;
    history.replaceState({}, "", location.pathname + q({lane:lane}));
    setPressed(btnLP, lane==="platform");
    setPressed(btnLE, lane==="engineering");
    paintHeader();
    paintDragons();
    safeLayout();
  }
  btnLP.addEventListener("click", function(){ setLane("platform"); }, {passive:true});
  btnLE.addEventListener("click", function(){ setLane("engineering"); }, {passive:true});

  // ===== Corner buttons =====
  function bindCorner(id, path){
    var el=document.getElementById(id);
    if(!el) return;
    function act(){ go(path); }
    el.addEventListener("click", act, {passive:true});
    el.addEventListener("keydown", function(e){
      if(e.key==="Enter"||e.key===" "){ e.preventDefault(); act(); }
    });
  }
  bindCorner("btnExit", EXIT_ROUTE);
  bindCorner("btnHub", HUB_ROUTE);

  // ===== Init =====
  paintHeader();
  applyMoonPhase();
  buildDirRing();
  paintDragons();
  requestAnimationFrame(safeLayout);
  window.addEventListener("resize", function(){
    buildDirRing();
    safeLayout();
  }, {passive:true});

  // refresh dragons text occasionally (new phrase every pass window)
  setInterval(function(){
    paintDragons();
    applyMoonPhase();
  }, 12000);

})();
</script>

</body>
</html>
