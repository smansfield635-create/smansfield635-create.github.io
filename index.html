<!doctype html>
<!-- TNT — /index.html
     BUILD: IDX_FORCE_ENGINE_REFRESH_v2
     PURPOSE:
       - force reload of dragon engine (cache bust)
       - guarantee host containers exist
       - mount engines after DOM parse
-->

<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>DiamondGateBridge</title>

<link rel="stylesheet" href="/assets/ui.css">
<link rel="stylesheet" href="/assets/branch.css">

<!-- engines -->
<script defer src="/assets/instruments.js?v=2"></script>
<script defer src="/assets/bg-engine.js?v=2"></script>
<script defer src="/assets/dragon-anatomy.js?v=2"></script>

<style>

body{
margin:0;
}

/* engine layers */

#gd-field,
#gd-dragon,
#gd-ui{
position:fixed;
inset:0;
width:100%;
height:100%;
}

#gd-field{
z-index:0;
pointer-events:none;
}

#gd-dragon{
z-index:6;
pointer-events:none;
}

#gd-ui{
z-index:20;
pointer-events:none;
}

/* stage */

.stage{
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
width:min(900px,90vw);
height:min(900px,90vw);
pointer-events:none;
}

.node{
position:absolute;
left:50%;
top:50%;
pointer-events:auto;
}

</style>
</head>

<body>

<!-- engine hosts -->

<div id="gd-field"></div>
<div id="gd-dragon"></div>

<div id="gd-ui">

<div class="stage">

<div class="gd_dialFace"></div>

<div class="node gd_diamond gd_core" style="left:50%;top:50%;">
<div class="gd_inner">
<div class="gd_word">CORE</div>
<div class="gd_code">CORE</div>
</div>
</div>

<div class="node gd_diamond gd_l1" style="left:50%;top:20%;">
<div class="gd_inner">
<div class="gd_word">LAWS</div>
<div class="gd_code">N</div>
</div>
</div>

<div class="node gd_diamond gd_l1" style="left:80%;top:50%;">
<div class="gd_inner">
<div class="gd_word">ENERGY</div>
<div class="gd_code">E</div>
</div>
</div>

<div class="node gd_diamond gd_l1" style="left:50%;top:80%;">
<div class="gd_inner">
<div class="gd_word">FINANCE</div>
<div class="gd_code">S</div>
</div>
</div>

<div class="node gd_diamond gd_l1" style="left:20%;top:50%;">
<div class="gd_inner">
<div class="gd_word">GOV</div>
<div class="gd_code">W</div>
</div>
</div>

</div>
</div>

<script>

/* mount engines after DOM ready */

window.addEventListener("load",function(){

try{
if(window.GD_BG && window.GD_BG.mount)
window.GD_BG.mount({fps:30,dpr_cap:1.6});
}catch(e){}

try{
if(window.GD_DRAGON && window.GD_DRAGON.mount)
window.GD_DRAGON.mount({});
}catch(e){}

});

</script>

</body>
</html>
