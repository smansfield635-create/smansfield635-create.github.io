<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Nine Summits World</title>
  <meta name="description" content="Compressed 256×256 world engine bootstrap shell.">
  <link rel="stylesheet" href="./assets/ui.css">
</head>

<body data-mode="world" data-diagnostics="peek">
  <div id="app-shell">
    <canvas id="world-canvas" class="world-canvas" aria-label="World canvas"></canvas>

    <div id="nav-doors" class="nav-doors" aria-label="Primary doors">
      <a href="/home/" class="nav-btn">Home</a>
      <a href="/explore/" class="nav-btn">Explore</a>
    </div>

    <div id="hud" class="hud">
      <div id="runtime-banner" class="runtime-banner">
        <span id="runtime-phase">BOOT</span>
      </div>

      <div id="world-actions" class="world-actions">
        <button id="open-button" class="world-btn" type="button">Open</button>
      </div>

      <div id="debug-panel" class="debug-panel"></div>

      <div id="compass-overlay" class="compass-overlay"></div>

      <div id="diagnostics-dock" class="diagnostics-dock">
        <div id="diagnostics-bar" class="diagnostics-bar">
          <div id="diagnostics-summary" class="diagnostic-bar__summary"></div>
          <button id="diagnostics-toggle" class="diagnostics-toggle"></button>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { WORLD_KERNEL } from "./world/world_kernel.js";
    import { createPlanetEngine } from "./world/planet_engine.js";
    import { createRenderer } from "./world/render.js";
    import { createControlSystem } from "./world/control.js";
    import { createInstruments } from "./assets/instruments.js";

    // ✅ NEW: GEOMETRY ENGINE
    import { createProductGeometryEngine } from "./world/product_geometry.js";

    const canvas = document.getElementById("world-canvas");
    const ctx = canvas.getContext("2d", { alpha: true });

    const runtimePhase = document.getElementById("runtime-phase");
    const openButton = document.getElementById("open-button");

    const planetEngine = createPlanetEngine();
    const renderer = createRenderer();
    const control = createControlSystem();
    const instruments = createInstruments();

    // ✅ NEW: GEOMETRY ENGINE INSTANCE
    const geometry = createProductGeometryEngine();

    const runtime = {
      phase: "BOOT",
      kernel: WORLD_KERNEL,
      planetField: null,
      dtMs: 0,
      fps: 0,
      elapsedMs: 0,
      startupComplete: false
    };

    let lastFrame = performance.now();
    let startTime = lastFrame;

    // =========================
    // RESIZE
    // =========================
    function resize() {
      const w = window.innerWidth;
      const h = window.innerHeight;

      canvas.width = w;
      canvas.height = h;

      control.resize(w, h);

      // ✅ GEOMETRY RESIZE
      geometry.resize(w, h);
    }

    // =========================
    // TIMING
    // =========================
    function updateTime(now) {
      const dt = now - lastFrame;
      lastFrame = now;

      runtime.dtMs = dt;
      runtime.fps = dt > 0 ? 1000 / dt : 0;
      runtime.elapsedMs = now - startTime;
    }

    // =========================
    // INITIAL BUILD
    // =========================
    function build() {
      runtime.planetField = planetEngine.buildPlanetField({});

      // ✅ INITIAL PRODUCT NODES
      geometry.buildNodes([
        { id: "now", label: "NOW", route: "/products/" },
        { id: "future", label: "FUTURE", route: "/explore/" }
      ]);
    }

    // =========================
    // RENDER
    // =========================
    function renderFrame() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // 🌍 WORLD
      renderer.renderPlanet({
        ctx,
        planetField: runtime.planetField,
        projectPoint: control.projectSphere,
        viewState: control.getCameraState()
      });

      // 💠 GEOMETRY (DIAMONDS)
      geometry.render(ctx);
    }

    // =========================
    // FRAME LOOP
    // =========================
    function frame(now) {
      updateTime(now);

      control.stepInertia();

      // ✅ GEOMETRY UPDATE
      geometry.update(runtime.dtMs);

      renderFrame();

      requestAnimationFrame(frame);
    }

    // =========================
    // EVENTS
    // =========================
    function bind() {
      window.addEventListener("resize", () => {
        resize();
        renderFrame();
      });

      canvas.addEventListener("pointerdown", e => {
        control.startDrag(e.clientX, e.clientY);
      });

      window.addEventListener("pointermove", e => {
        control.drag(e.clientX, e.clientY);
      });

      window.addEventListener("pointerup", () => {
        control.endDrag();
      });

      // ✅ TAP ROUTING (GEOMETRY HIT TEST)
      canvas.addEventListener("click", e => {
        const hit = geometry.hitTest(e.clientX, e.clientY);
        if (hit?.route) {
          window.location.href = hit.route;
        }
      });

      openButton.addEventListener("click", () => {
        window.location.href = "/home/";
      });
    }

    // =========================
    // START
    // =========================
    function start() {
      resize();
      build();
      bind();

      runtime.startupComplete = true;
      runtime.phase = "RUNNING";
      runtimePhase.textContent = "RUNNING";

      requestAnimationFrame(frame);
    }

    start();
  </script>
</body>
</html>
