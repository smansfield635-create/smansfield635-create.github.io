<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Nine Summits — Index</title>
<link rel="stylesheet" href="/assets/ui.css"/>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: #000;
  width: 100%;
  height: 100%;
  overflow: hidden;
}

#app-shell {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
}

/* 🔥 FORCE CANVAS VISIBILITY */
#world {
  position: absolute;
  inset: 0;
  width: 100vw;
  height: 100vh;
  display: block;
  z-index: 0;
  background: black;
}

/* KEEP UI ABOVE CANVAS */
#runtime-root,
#diagnostics-dock,
#debug-panel {
  position: relative;
  z-index: 10;
}

#boot-status{
  position:fixed;
  top:0;
  left:0;
  padding:6px 10px;
  font-family:monospace;
  font-size:12px;
  color:#0f0;
  background:#000;
  z-index:9999;
}
</style>

</head>

<body data-mode="round" data-diagnostics="peek">

<div id="app-shell">

  <canvas id="world"></canvas>

  <div id="runtime-root"></div>

  <div id="diagnostics-dock" class="diagnostics-dock">
    <div id="diagnostics-bar" class="diagnostics-bar">
      <div id="diagnostics-summary" class="diagnostic-bar__summary"></div>
      <button id="diagnostics-toggle" class="diagnostics-toggle" type="button">
        DIAGNOSTICS
      </button>
    </div>
  </div>

  <div id="debug-panel" class="debug-panel"></div>

</div>

<div id="boot-status">BOOTING...</div>

<script type="module">
const status = document.getElementById("boot-status");

function log(msg){
  if(status) status.textContent = msg;
  console.log("[BOOT]", msg);
}

try {
  log("IMPORTING RUNTIME...");
  const mod = await import("/world/runtime/world_runtime.js");

  log("RUNTIME IMPORTED");

  if (mod?.startRuntime) {
    log("STARTING RUNTIME...");
    mod.startRuntime();
    log("RUNNING");
  } else if (mod?.default?.startRuntime) {
    log("STARTING DEFAULT...");
    mod.default.startRuntime();
    log("RUNNING");
  } else {
    log("ERROR: startRuntime missing");
  }

} catch (err) {
  log("BOOT ERROR: " + err.message);
  console.error(err);
}

document.getElementById("diagnostics-toggle")?.addEventListener("click", () => {
  window.location.href = "/gauges/";
});
</script>

</body>
</html>
