<!-- DESTINATION FILE: /index.html -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Nine Summits — Index</title>
<link rel="stylesheet" href="/assets/ui.css"/>
</head>

<body data-mode="round" data-diagnostics="peek">

<div id="app-shell">

  <!-- CANVAS -->
  <canvas id="world" aria-label="Home world canvas"></canvas>

  <!-- UI ROOT (WORLD RUNTIME OWNS UI HERE) -->
  <div id="runtime-root"></div>

  <!-- DIAGNOSTICS BAR (NAV → GAUGES) -->
  <div id="diagnostics-dock" class="diagnostics-dock">
    <div id="diagnostics-bar" class="diagnostics-bar">
      <div id="diagnostics-summary" class="diagnostic-bar__summary"></div>

      <!-- IMPORTANT: NO TOGGLE → NAVIGATION -->
      <button
        id="diagnostics-toggle"
        class="diagnostics-toggle"
        type="button"
      >
        DIAGNOSTICS
      </button>
    </div>
  </div>

  <!-- DEBUG PANEL (OPTIONAL LOCAL MIRROR) -->
  <div id="debug-panel" class="debug-panel" aria-live="polite"></div>

</div>

<script type="module">
import runtime from "/world/runtime/world_runtime.js";

/* ===== FORCE RUNTIME START ===== */
if (runtime && typeof runtime.startRuntime === "function") {
  runtime.startRuntime();
} else {
  console.error("Runtime start function missing");
}

/* ===== FORCE DIAGNOSTICS → GAUGES ===== */
const btn = document.getElementById("diagnostics-toggle");

if (btn) {
  btn.addEventListener("click", () => {
    window.location.href = "/gauges/";
  });
}
</script>

</body>
</html>
