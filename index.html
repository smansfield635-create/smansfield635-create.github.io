<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Nine Summits — Home</title>
  <link rel="stylesheet" href="../assets/ui.css" />
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #030712;
      color: #fff;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    }

    #app-shell {
      position: fixed;
      inset: 0;
      overflow: hidden;
      isolation: isolate;
      background:
        radial-gradient(circle at 50% 42%, rgba(50, 100, 180, 0.12), transparent 34%),
        linear-gradient(180deg, #030712 0%, #071225 52%, #08101f 100%);
    }

    #world-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      z-index: 1;
      touch-action: none;
    }

    #universe-layer,
    #atmosphere-layer,
    #hero-layer,
    #flat-layer,
    #hud-layer {
      position: fixed;
      inset: 0;
    }

    #universe-layer {
      z-index: 2;
      pointer-events: none;
      overflow: hidden;
    }

    .star-band {
      position: absolute;
      inset: -10%;
      opacity: 0.42;
      mix-blend-mode: screen;
      animation: starDrift 44s linear infinite;
    }

    .star-band.near {
      opacity: 0.62;
      animation-duration: 26s;
    }

    .star-band.far {
      opacity: 0.2;
      animation-duration: 70s;
    }

    .star-band::before,
    .star-band::after {
      content: "";
      position: absolute;
      inset: 0;
      background-repeat: repeat;
      background-size: 320px 320px;
    }

    .star-band::before {
      background-image:
        radial-gradient(circle at 20px 24px, rgba(255,255,255,0.95) 0 1px, transparent 1.6px),
        radial-gradient(circle at 118px 78px, rgba(255,255,255,0.55) 0 1px, transparent 1.6px),
        radial-gradient(circle at 242px 194px, rgba(255,255,255,0.82) 0 1px, transparent 1.6px),
        radial-gradient(circle at 286px 42px, rgba(255,255,255,0.42) 0 0.9px, transparent 1.4px),
        radial-gradient(circle at 68px 214px, rgba(255,255,255,0.68) 0 0.9px, transparent 1.4px);
    }

    .star-band::after {
      background-image:
        radial-gradient(circle at 78px 48px, rgba(120, 180, 255, 0.28) 0 1.2px, transparent 2px),
        radial-gradient(circle at 204px 158px, rgba(255, 215, 120, 0.22) 0 1.3px, transparent 2px),
        radial-gradient(circle at 300px 258px, rgba(180, 140, 255, 0.18) 0 1.1px, transparent 1.8px);
      filter: blur(0.5px);
    }

    #atmosphere-layer {
      z-index: 3;
      pointer-events: none;
      overflow: hidden;
    }

    .atmo-glow {
      position: absolute;
      left: 50%;
      top: 58%;
      width: min(92vw, 1040px);
      height: min(92vw, 1040px);
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background:
        radial-gradient(circle at 50% 50%, rgba(120, 180, 255, 0.14), transparent 34%),
        radial-gradient(circle at 50% 56%, rgba(255, 255, 255, 0.04), transparent 56%),
        radial-gradient(circle at 50% 50%, rgba(30, 90, 170, 0.1), transparent 70%);
      filter: blur(12px);
      animation: glowPulse 8s ease-in-out infinite;
    }

    .mist-veil {
      position: absolute;
      left: 0;
      right: 0;
      bottom: -4%;
      height: 40%;
      background:
        linear-gradient(
          to bottom,
          transparent 0%,
          rgba(130, 190, 255, 0.06) 18%,
          rgba(170, 220, 255, 0.1) 54%,
          rgba(255, 255, 255, 0.03) 100%
        );
      mask-image: linear-gradient(to bottom, transparent 0%, rgba(0, 0, 0, 0.25) 18%, rgba(0, 0, 0, 0.95) 84%, transparent 100%);
      -webkit-mask-image: linear-gradient(to bottom, transparent 0%, rgba(0, 0, 0, 0.25) 18%, rgba(0, 0, 0, 0.95) 84%, transparent 100%);
      opacity: 0.22;
      transform: translateY(8%);
      animation: veilDrift 9s ease-in-out infinite;
    }

    #hero-layer {
      z-index: 8;
      pointer-events: none;
    }

    .hero-panel {
      position: absolute;
      left: 50%;
      top: 7.5vh;
      transform: translateX(-50%);
      width: min(92vw, 980px);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      text-align: center;
      pointer-events: none;
    }

    .hero-title {
      margin: 0;
      font-size: clamp(42px, 7vw, 96px);
      font-weight: 950;
      letter-spacing: 0.05em;
      line-height: 0.9;
      text-shadow: 0 10px 38px rgba(0, 0, 0, 0.62);
    }

    .hero-sub {
      margin: 0;
      font-size: clamp(16px, 2vw, 22px);
      color: rgba(255, 255, 255, 0.86);
    }

    .hero-tag {
      margin: 0;
      font-size: clamp(13px, 1.5vw, 16px);
      color: rgba(255, 255, 255, 0.64);
      letter-spacing: 0.02em;
    }

    .orbit-shell {
      position: absolute;
      left: 50%;
      top: 58%;
      width: min(84vw, 780px);
      height: min(84vw, 780px);
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .orbit-guide {
      position: absolute;
      inset: 12%;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.06);
      box-shadow:
        0 0 70px rgba(100, 170, 255, 0.06),
        inset 0 0 34px rgba(255, 255, 255, 0.02);
    }

    .orbit-guide.inner {
      inset: 22%;
      opacity: 0.66;
    }

    .star-node {
      position: absolute;
      width: 120px;
      height: 120px;
      margin: -60px 0 0 -60px;
      pointer-events: auto;
      cursor: pointer;
      transition: filter 0.18s ease, opacity 0.18s ease, transform 0.18s ease;
      will-change: transform, opacity, filter;
    }

    .star-node:hover {
      filter: brightness(1.08);
    }

    .star-core {
      position: absolute;
      inset: 0;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.22);
      box-shadow:
        0 0 20px rgba(255, 255, 255, 0.08),
        0 0 50px rgba(0, 0, 0, 0.68),
        inset 0 0 16px rgba(255, 255, 255, 0.08),
        inset 0 0 42px rgba(120, 180, 255, 0.06);
      background:
        linear-gradient(145deg, rgba(10, 18, 34, 0.94), rgba(6, 8, 14, 0.98)),
        linear-gradient(45deg, rgba(102,194,255,0.12), rgba(255,212,120,0.1));
      transform: rotate(45deg);
      animation: starSpinCW 14s linear infinite;
    }

    .star-node.ccw .star-core {
      animation-name: starSpinCCW;
    }

    .star-core::before {
      content: "";
      position: absolute;
      inset: -18%;
      background:
        linear-gradient(
          120deg,
          transparent 18%,
          rgba(255,255,255,0.12) 34%,
          transparent 48%,
          rgba(255,255,255,0.07) 58%,
          transparent 72%
        );
      transform: translateX(-26%);
      animation: shimmerSweep 4.8s ease-in-out infinite;
    }

    .star-cross {
      position: absolute;
      inset: 0;
      transform: rotate(45deg);
      pointer-events: none;
    }

    .star-cross::before,
    .star-cross::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.26), rgba(255,255,255,0.02));
      box-shadow: 0 0 20px rgba(255,255,255,0.08);
      border-radius: 999px;
      transform: translate(-50%, -50%);
    }

    .star-cross::before {
      width: 18px;
      height: 106%;
    }

    .star-cross::after {
      width: 106%;
      height: 18px;
    }

    .star-label {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 13px;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      text-align: center;
      text-shadow: 0 2px 18px rgba(0, 0, 0, 0.52);
      opacity: 0.9;
      pointer-events: none;
    }

    #flat-layer {
      z-index: 9;
      display: none;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .flat-menu {
      width: min(92vw, 720px);
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
      pointer-events: auto;
    }

    .flat-card {
      position: relative;
      min-height: 132px;
      border-radius: 28px;
      border: 1px solid rgba(255,255,255,0.16);
      background:
        radial-gradient(circle at 22% 18%, rgba(255,255,255,0.18), transparent 22%),
        linear-gradient(145deg, rgba(10,14,22,0.92), rgba(5,8,12,0.98));
      box-shadow:
        0 18px 48px rgba(0,0,0,0.38),
        inset 0 0 20px rgba(255,255,255,0.04);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-weight: 900;
      font-size: clamp(18px, 2.2vw, 24px);
      letter-spacing: 0.06em;
      cursor: pointer;
      overflow: hidden;
      transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;
    }

    .flat-card:hover {
      transform: translateY(-2px);
      border-color: rgba(255,255,255,0.26);
      background:
        radial-gradient(circle at 22% 18%, rgba(255,255,255,0.22), transparent 24%),
        linear-gradient(145deg, rgba(14,18,28,0.96), rgba(5,8,12,1));
    }

    .flat-card::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 86px;
      height: 86px;
      margin: -43px 0 0 -43px;
      transform: rotate(45deg);
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: inset 0 0 14px rgba(255,255,255,0.08);
    }

    #hud-layer {
      z-index: 12;
      pointer-events: none;
    }

    .runtime-pill {
      position: absolute;
      left: 16px;
      top: 16px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.38);
      border: 1px solid rgba(255, 255, 255, 0.14);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.04em;
      color: rgba(255, 255, 255, 0.86);
      backdrop-filter: blur(8px);
      pointer-events: auto;
    }

    .mode-note {
      position: absolute;
      right: 16px;
      top: 16px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.38);
      border: 1px solid rgba(255, 255, 255, 0.14);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.04em;
      color: rgba(255, 255, 255, 0.86);
      backdrop-filter: blur(8px);
      pointer-events: auto;
    }

    .hidden {
      display: none !important;
    }

    @keyframes starDrift {
      from { transform: translate3d(-1.5%, -1%, 0); }
      to   { transform: translate3d(1.5%, 1%, 0); }
    }

    @keyframes glowPulse {
      0%,100% { opacity: 0.82; transform: translate(-50%, -50%) scale(1); }
      50%     { opacity: 1; transform: translate(-50%, -50%) scale(1.04); }
    }

    @keyframes veilDrift {
      0%,100% { transform: translateY(8%); opacity: 0.18; }
      50%     { transform: translateY(2%); opacity: 0.28; }
    }

    @keyframes starSpinCW {
      from { transform: rotate(45deg); }
      to   { transform: rotate(405deg); }
    }

    @keyframes starSpinCCW {
      from { transform: rotate(45deg); }
      to   { transform: rotate(-315deg); }
    }

    @keyframes shimmerSweep {
      0%,100% { transform: translateX(-34%); }
      50%     { transform: translateX(34%); }
    }

    @media (max-width: 900px) {
      .orbit-shell {
        width: min(92vw, 660px);
        height: min(92vw, 660px);
        top: 60%;
      }

      .star-node {
        width: 106px;
        height: 106px;
        margin: -53px 0 0 -53px;
      }
    }

    @media (max-width: 700px) {
      .hero-panel {
        top: 8.4vh;
        gap: 12px;
      }

      .orbit-shell {
        width: min(96vw, 560px);
        height: min(96vw, 560px);
        top: 61%;
      }

      .star-node {
        width: 92px;
        height: 92px;
        margin: -46px 0 0 -46px;
      }

      .star-label {
        font-size: 11px;
        letter-spacing: 0.6px;
      }

      .flat-menu {
        grid-template-columns: 1fr;
        width: min(92vw, 420px);
        gap: 12px;
      }

      .flat-card {
        min-height: 98px;
      }
    }
  </style>
</head>
<body>
  <div id="app-shell">
    <canvas id="world-canvas" aria-label="Home world canvas"></canvas>

    <div id="universe-layer" aria-hidden="true">
      <div class="star-band far"></div>
      <div class="star-band"></div>
      <div class="star-band near"></div>
    </div>

    <div id="atmosphere-layer" aria-hidden="true">
      <div class="atmo-glow"></div>
      <div class="mist-veil"></div>
    </div>

    <div id="hero-layer">
      <div class="hero-panel">
        <h1 class="hero-title">NINE SUMMITS</h1>
        <p class="hero-sub">Homepage</p>
        <p class="hero-tag">Enter simple. Discover power. Choose depth.</p>
      </div>

      <div class="orbit-shell" id="orbit-shell">
        <div class="orbit-guide"></div>
        <div class="orbit-guide inner"></div>

        <button class="star-node" id="star-products" type="button" aria-label="Products">
          <span class="star-core"></span>
          <span class="star-cross"></span>
          <span class="star-label">PRODUCTS</span>
        </button>

        <button class="star-node ccw" id="star-laws" type="button" aria-label="Laws">
          <span class="star-core"></span>
          <span class="star-cross"></span>
          <span class="star-label">LAWS</span>
        </button>

        <button class="star-node" id="star-gauges" type="button" aria-label="Gauges">
          <span class="star-core"></span>
          <span class="star-cross"></span>
          <span class="star-label">GAUGES</span>
        </button>

        <button class="star-node ccw" id="star-explore" type="button" aria-label="Explore">
          <span class="star-core"></span>
          <span class="star-cross"></span>
          <span class="star-label">EXPLORE</span>
        </button>
      </div>
    </div>

    <div id="flat-layer">
      <div class="flat-menu">
        <button class="flat-card" data-route="/explore/" type="button">EXPLORE</button>
        <button class="flat-card" data-route="/products/" type="button">PRODUCTS</button>
        <button class="flat-card" data-route="/laws/" type="button">LAWS</button>
        <button class="flat-card" data-route="/gauges/" type="button">GAUGES</button>
      </div>
    </div>

    <div id="hud-layer">
      <div class="runtime-pill" id="runtime-pill">HOME</div>
      <div class="mode-note" id="mode-note">ROUND</div>
    </div>
  </div>

  <script type="module">
    import { createPlanetEngine } from "../world/planet_engine.js";
    import { createRenderer } from "../world/render.js";
    import { createControlSystem } from "../world/control.js";

    const params = new URLSearchParams(location.search);
    const mode = params.get("mode") === "flat" ? "flat" : "round";

    const canvas = document.getElementById("world-canvas");
    const ctx = canvas.getContext("2d", { alpha: true });

    const flatLayer = document.getElementById("flat-layer");
    const orbitShell = document.getElementById("orbit-shell");
    const modeNote = document.getElementById("mode-note");

    const starProducts = document.getElementById("star-products");
    const starLaws = document.getElementById("star-laws");
    const starGauges = document.getElementById("star-gauges");
    const starExplore = document.getElementById("star-explore");

    const planetEngine = createPlanetEngine();
    const renderer = createRenderer();
    const control = createControlSystem();

    let planetField = null;
    let rafId = 0;
    let lastFrameAt = performance.now();
    let idlePhase = 0;
    let orbitPhase = 0;
    let isDragging = false;
    let lastX = 0;
    let lastY = 0;

    const starState = [
      {
        element: starProducts,
        label: "PRODUCTS",
        route: "/products/",
        phase0: -Math.PI / 2
      },
      {
        element: starLaws,
        label: "LAWS",
        route: "/laws/",
        phase0: Math.PI / 2
      },
      {
        element: starGauges,
        label: "GAUGES",
        route: "/gauges/",
        phase0: 0
      },
      {
        element: starExplore,
        label: "EXPLORE",
        route: "/explore/",
        phase0: Math.PI
      }
    ];

    function withModeQuery(route) {
      const glue = route.includes("?") ? "&" : "?";
      return `${route}${glue}mode=${mode}`;
    }

    function resizeWorld() {
      const width = window.innerWidth;
      const height = window.innerHeight;
      canvas.width = width;
      canvas.height = height;
      control.resize(width, height);
    }

    function buildPlanetFieldOnce() {
      if (!planetField) {
        planetField = planetEngine.buildPlanetField({});
      }
    }

    function renderSurface() {
      if (!planetField) return;

      renderer.renderPlanet({
        ctx,
        planetField,
        projectPoint: (latDeg, lonDeg, radiusOffsetPx = 0) => {
          return control.projectSphere(latDeg, lonDeg, radiusOffsetPx);
        },
        viewState: control.getCameraState()
      });
    }

    function stepIdleDrift(dtMs) {
      if (mode !== "round") return;

      idlePhase += dtMs * 0.00018;
      const yawDrift = 0.05 + Math.sin(idlePhase) * 0.016;
      control.applyDrag(yawDrift * dtMs * 0.18, 0);
      control.stepInertia(dtMs);
    }

    function updateStarOrbit(dtMs) {
      if (mode !== "round") return;

      orbitPhase += dtMs * 0.00028;

      const shellRect = orbitShell.getBoundingClientRect();
      const cx = shellRect.width * 0.5;
      const cy = shellRect.height * 0.5;
      const orbitX = shellRect.width * 0.38;
      const orbitY = shellRect.height * 0.23;

      starState.forEach((star) => {
        const theta = orbitPhase + star.phase0;
        const x = cx + Math.cos(theta) * orbitX;
        const y = cy + Math.sin(theta) * orbitY;
        const depth = Math.cos(theta);
        const scale = 0.78 + ((depth + 1) * 0.18);
        const opacity = 0.28 + ((depth + 1) * 0.36);
        const blur = Math.max(0, (1 - scale) * 6);
        const z = depth >= 0 ? 4 : 1;

        const transform = `translate(${x}px, ${y}px) translate(-50%, -50%) scale(${scale})`;

        star.element.style.transform = transform;
        star.element.style.opacity = String(opacity);
        star.element.style.filter = `blur(${blur}px) brightness(${0.92 + ((depth + 1) * 0.08)})`;
        star.element.style.zIndex = String(z);
      });
    }

    function frame(now) {
      const dtMs = now - lastFrameAt;
      lastFrameAt = now;

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      if (mode === "round") {
        stepIdleDrift(dtMs);
      }

      renderSurface();
      updateStarOrbit(dtMs);

      rafId = requestAnimationFrame(frame);
    }

    function setModePresentation() {
      modeNote.textContent = mode.toUpperCase();

      if (mode === "flat") {
        flatLayer.style.display = "flex";
        orbitShell.style.display = "none";
        canvas.style.filter = "blur(8px) brightness(.65)";
      } else {
        flatLayer.style.display = "none";
        orbitShell.style.display = "block";
        canvas.style.filter = "none";
      }
    }

    function bindEvents() {
      if (mode === "round") {
        canvas.addEventListener("pointerdown", (event) => {
          isDragging = true;
          lastX = event.clientX;
          lastY = event.clientY;
        }, { passive: true });

        window.addEventListener("pointermove", (event) => {
          if (!isDragging) return;
          const dx = event.clientX - lastX;
          const dy = event.clientY - lastY;
          lastX = event.clientX;
          lastY = event.clientY;
          control.applyDrag(dx, dy);
        }, { passive: true });

        window.addEventListener("pointerup", () => {
          isDragging = false;
        }, { passive: true });

        window.addEventListener("pointercancel", () => {
          isDragging = false;
        }, { passive: true });

        starState.forEach((star) => {
          star.element.addEventListener("click", () => {
            location.href = withModeQuery(star.route);
          });
        });
      }

      document.querySelectorAll(".flat-card").forEach((card) => {
        card.addEventListener("click", () => {
          const route = card.dataset.route || "/home/";
          location.href = withModeQuery(route);
        });
      });

      window.addEventListener("resize", () => {
        resizeWorld();
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        renderSurface();
        updateStarOrbit(0);
      }, { passive: true });

      window.addEventListener("pagehide", () => {
        if (rafId) {
          cancelAnimationFrame(rafId);
          rafId = 0;
        }
      }, { passive: true });
    }

    function start() {
      resizeWorld();
      buildPlanetFieldOnce();
      setModePresentation();
      bindEvents();
      renderSurface();
      updateStarOrbit(0);

      if (!rafId) {
        lastFrameAt = performance.now();
        rafId = requestAnimationFrame(frame);
      }
    }

    start();
  </script>
</body>
</html>
