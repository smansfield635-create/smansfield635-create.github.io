<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Nine Summits — Index</title>
<link rel="stylesheet" href="/assets/ui.css"/>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: #000;
  width: 100%;
  height: 100%;
  overflow: hidden;
}

#app-shell {
  position: fixed;
  inset: 0;
}

#world {
  position: absolute;
  inset: 0;
  width: 100vw;
  height: 100vh;
  display: block;
  background: #000;
}

#runtime-root {
  position: relative;
  z-index: 10;
}

#boot-status {
  position: fixed;
  top: 0;
  left: 0;
  padding: 6px 10px;
  font-family: monospace;
  font-size: 12px;
  color: #0f0;
  background: #000;
  border-right: 1px solid rgba(255,255,255,0.12);
  border-bottom: 1px solid rgba(255,255,255,0.12);
  z-index: 9999;
}

.boot-ok { color: #7fffd4; }
.boot-warn { color: #ffd27a; }
.boot-fail { color: #ff7a7a; }
</style>
</head>

<body>
<div id="app-shell">
  <canvas id="world"></canvas>
  <div id="runtime-root"></div>
</div>

<div id="boot-status" class="boot-warn">BOOTING...</div>

<script type="module">
const statusNode = document.getElementById("boot-status");
const canvas = document.getElementById("world");
const root = document.getElementById("runtime-root");

const RECEIPT_KEY = "__RUNTIME_RECEIPT__";
const TIMEOUT_MS = 12000;

function setStatus(msg, tone="boot-warn"){
  if (statusNode){
    statusNode.textContent = msg;
    statusNode.className = tone;
  }
  console.log("[BOOT]", msg);
}

function ensureCanvas(c){
  const dpr = Math.max(1, window.devicePixelRatio || 1);
  const w = Math.floor(window.innerWidth * dpr);
  const h = Math.floor(window.innerHeight * dpr);

  c.width = w;
  c.height = h;
  c.style.width = "100vw";
  c.style.height = "100vh";
}

function validateRuntime(mod){
  return typeof mod?.startRuntime === "function" ||
         typeof mod?.default?.startRuntime === "function";
}

async function boot(){
  try {
    if (!canvas) throw new Error("canvas missing");

    ensureCanvas(canvas);
    window.addEventListener("resize", () => ensureCanvas(canvas));

    setStatus("IMPORT RUNTIME...", "boot-warn");

    const runtimeMod = await import("/world/runtime/world_runtime.js");

    if (!validateRuntime(runtimeMod)){
      throw new Error("runtime contract invalid");
    }

    const startRuntime =
      runtimeMod.startRuntime ||
      runtimeMod.default.startRuntime;

    setStatus("START RUNTIME...", "boot-warn");

    startRuntime({
      canvas,
      root,
      mode: "index"
    });

    setStatus("WAITING FOR RECEIPT...", "boot-warn");

    const start = performance.now();

    while (performance.now() - start < TIMEOUT_MS){
      const receipt = window[RECEIPT_KEY];

      if (receipt?.status === "RUNNING"){
        setStatus("RUNNING", "boot-ok");
        return;
      }

      if (receipt?.status === "FAIL"){
        throw new Error(receipt?.error || "runtime failure");
      }

      await new Promise(r => setTimeout(r, 100));
    }

    throw new Error("ignition timeout");

  } catch (e){
    setStatus("BOOT ERROR:\n" + (e?.message || e), "boot-fail");
  }
}

boot();
</script>
</body>
</html>
