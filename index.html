<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Nine Summits — Index</title>
<link rel="stylesheet" href="/assets/ui.css"/>
</head>
<body data-mode="round" data-diagnostics="peek">
  <div id="app-shell">
    <canvas id="world-canvas" aria-label="Home world canvas"></canvas>
    <div id="runtime-root" aria-live="off"></div>
    <div id="diagnostics-dock" class="diagnostics-dock">
      <div id="diagnostics-bar" class="diagnostics-bar">
        <div id="diagnostics-summary" class="diagnostic-bar__summary"></div>
        <button id="diagnostics-toggle" class="diagnostics-toggle" type="button">DIAGNOSTICS</button>
      </div>
    </div>
    <div id="debug-panel" class="debug-panel" aria-live="polite"></div>
  </div>

  <script type="module">
    import "/world/runtime/world_runtime.js";
  </script>
</body>
</html>
