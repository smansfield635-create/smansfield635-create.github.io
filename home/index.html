<!doctype html>
<!-- TNT — /home/index.html
     HOME · LAUNCHPAD (TRILINGUAL · NO LENSES · MONUMENT TYPE · SINGLE-OPEN ACCORDION)
     UPDATE (PER SEAN):
       - Keep festival-night context BEHIND content (no overlays/modals)
       - Upgrade to uniform 3D gloss adoption (gem material)
       - Gold glow = perimeter ring (NOT bottom underlight)
       - Buttons do NOT move on press (glow only)
       - Reduce loop confusion: each open block has ONE “OPEN” jump only (no multi-jump spam)
     RULES:
       - EN / 中文 / ES
       - No modals. No overlays.
       - No inline onclick. Tap-safe (addEventListener only).
       - Single-open accordion (one opens; others close; tap same closes)
       - Canon state carry: lang/style/time/depth via localStorage gd_lang/gd_style/gd_time/gd_depth ONLY + URL
       - NO new gd_* keys
       - lane=platform|engineering is URL-only (preserve if present; never store)
       - Language toggle reloads SAME pathname (GH Pages safe)
       - Uses /assets/ui.css + /assets/branch.css + /assets/instruments.js only
       - Does NOT style html/body background (ui.css owns field)
     ROUTES:
       - DOOR  → /door/
       - PRELUDE → /prelude/
       - COMPASS → /index.html
       - PRODUCTS → /products/
       - EXPLORE → /explore/
       - LAWS → /laws/
       - GAUGES → /gauges/
-->

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>HOME</title>

<link rel="stylesheet" href="/assets/ui.css"/>
<link rel="stylesheet" href="/assets/branch.css"/>
<script defer src="/assets/instruments.js"></script>

<style>
a{color:inherit;text-decoration:none}
body{position:relative;z-index:0;margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:#fff}
body::before,body::after{z-index:0!important;pointer-events:none!important}
#root{position:relative;z-index:10}

/* ===== TOKENS (page-local; ui.css owns field) ===== */
:root{
  --dockH:96px;

  --stroke:rgba(255,255,255,.12);
  --stroke2:rgba(255,255,255,.10);

  --ink:rgba(255,255,255,.94);
  --txt:rgba(255,255,255,.92);
  --mut:rgba(255,255,255,.80);
  --mut2:rgba(255,255,255,.72);

  --onyx0:rgba(6,8,10,.90);
  --onyx1:rgba(10,12,16,.78);
  --opalV:rgba(90,40,120,.10);
  --crimson:rgba(120,0,22,.30);
  --festival:rgba(255,43,43,.14);

  --gold:rgba(201,162,74,.55);
  --goldSoft:rgba(201,162,74,.18);

  --shadowA:0 34px 120px rgba(0,0,0,.58);
  --shadowB:0 16px 52px rgba(0,0,0,.60);
  --shadowC:0 18px 60px rgba(0,0,0,.55);
}

/* ===== TOP (fixed; no pointer traps) ===== */
.top{
  position:fixed;top:16px;left:0;right:0;
  padding:0 16px;
  display:flex;align-items:center;justify-content:space-between;
  gap:12px;
  z-index:240;
  pointer-events:none;
}
.top .left,.top .right{
  display:flex;gap:10px;align-items:center;
  flex-wrap:wrap;white-space:nowrap;
  pointer-events:auto;
}

/* ===== 3D GLOSS BUTTON (no movement; perimeter glow) ===== */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:10px 12px;min-height:44px;border-radius:16px;
  border:1px solid rgba(255,255,255,.14);
  background:
    radial-gradient(circle at 20% 18%, rgba(255,255,255,.18), transparent 42%),
    radial-gradient(circle at 78% 22%, rgba(255,43,43,.10), transparent 62%),
    radial-gradient(circle at 76% 78%, rgba(90,40,120,.08), transparent 66%),
    radial-gradient(circle at 28% 80%, rgba(120,0,22,.16), transparent 72%),
    linear-gradient(160deg, rgba(17,22,28,.88), rgba(11,15,20,.94));
  color:var(--ink);
  font-weight:950;font-size:14px;letter-spacing:.2px;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
  position:relative;overflow:hidden;
  box-shadow:var(--shadowC), inset 0 2px 0 rgba(255,255,255,.10), inset 0 -26px 46px rgba(0,0,0,.55);
  white-space:nowrap;
  transform:none !important;
  transition:border-color .16s ease, box-shadow .16s ease, filter .16s ease;
}
.btn::before{
  content:"";
  position:absolute;inset:0;border-radius:inherit;pointer-events:none;
  background:
    radial-gradient(130% 130% at 50% 50%, rgba(212,175,55,0) 58%, rgba(212,175,55,.18) 82%, rgba(212,175,55,0) 100%),
    repeating-linear-gradient(45deg, rgba(201,162,74,.07) 0 1px, transparent 1px 18px),
    repeating-linear-gradient(-45deg, rgba(201,162,74,.05) 0 1px, transparent 1px 18px);
  mask:
    radial-gradient(circle at 50% 50%, transparent 0 70%, #000 80% 100%),
    linear-gradient(#000,#000);
  -webkit-mask:
    radial-gradient(circle at 50% 50%, transparent 0 70%, #000 80% 100%),
    linear-gradient(#000,#000);
  opacity:.32;
}
.btn::after{
  content:"";
  position:absolute;left:12%;right:12%;top:10%;
  height:30%;
  border-radius:999px;
  background:linear-gradient(to bottom, rgba(255,255,255,.18), rgba(255,255,255,0));
  transform:rotate(-12deg);
  pointer-events:none;
  opacity:.90;
}
.btn:hover{
  border-color:rgba(212,175,55,.55);
  box-shadow:
    0 22px 72px rgba(0,0,0,.72),
    0 0 22px rgba(212,175,55,.26),
    inset 0 2px 0 rgba(255,255,255,.12),
    inset 0 -30px 54px rgba(0,0,0,.60);
  filter:saturate(1.05);
}
.btn:active{
  border-color:rgba(212,175,55,.62);
  box-shadow:
    0 18px 60px rgba(0,0,0,.65),
    0 0 28px rgba(212,175,55,.34),
    inset 0 0 0 2px rgba(255,255,255,.10),
    inset 0 2px 0 rgba(255,255,255,.12),
    inset 0 -30px 54px rgba(0,0,0,.62);
}
.btn.red{
  border-color:rgba(255,43,43,.22);
  box-shadow:var(--shadowC), 0 0 16px rgba(255,43,43,.12), inset 0 2px 0 rgba(255,255,255,.10), inset 0 -26px 46px rgba(0,0,0,.55);
}

/* ===== PAGE ===== */
.page{
  width:min(1100px,94vw);
  margin:0 auto;
  padding:86px 0 calc(var(--dockH) + 18px);
  display:flex;
  flex-direction:column;
  gap:12px;
  position:relative;
  z-index:10;
}

/* ===== Background context (behind hero + stack; not body) ===== */
.backdrop{
  position:absolute;
  left:50%;
  top:70px;
  transform:translateX(-50%);
  width:min(1160px,96vw);
  height:calc(100% - 120px);
  border-radius:34px;
  pointer-events:none;
  z-index:0;
  overflow:hidden;
}
.backdrop::before{
  content:"";
  position:absolute;inset:0;
  border:1px solid rgba(255,255,255,.08);
  border-radius:34px;
  background:
    radial-gradient(circle at 18% 22%, rgba(201,162,74,.10), transparent 60%),
    radial-gradient(circle at 78% 26%, rgba(255,43,43,.10), transparent 62%),
    radial-gradient(circle at 62% 90%, rgba(90,40,120,.10), transparent 64%),
    linear-gradient(160deg, rgba(0,0,0,.18), rgba(0,0,0,.08));
  box-shadow:
    0 70px 220px rgba(0,0,0,.62),
    inset 0 2px 0 rgba(255,255,255,.06),
    inset 0 -70px 140px rgba(0,0,0,.55);
  opacity:.92;
}
.backdrop::after{
  content:"";
  position:absolute;inset:-18%;
  background:
    radial-gradient(circle at 18% 34%, rgba(255,43,43,.18), transparent 44%),
    radial-gradient(circle at 84% 30%, rgba(255,43,43,.14), transparent 46%),
    radial-gradient(circle at 52% 78%, rgba(201,162,74,.12), transparent 48%),
    conic-gradient(from 12deg at 30% 28%,
      rgba(201,162,74,.14), transparent 12%,
      rgba(255,43,43,.12), transparent 24%,
      rgba(90,40,120,.10), transparent 38%,
      transparent 100%),
    conic-gradient(from 180deg at 70% 36%,
      rgba(255,43,43,.12), transparent 14%,
      rgba(201,162,74,.12), transparent 28%,
      rgba(90,40,120,.10), transparent 44%,
      transparent 100%),
    radial-gradient(circle at 50% 50%, rgba(255,255,255,.04), transparent 62%);
  filter:blur(1px);
  opacity:.72;
}

/* ===== HERO ===== */
.hero{
  position:relative;
  z-index:2;
  border-radius:26px;
  border:1px solid var(--stroke);
  background:
    radial-gradient(circle at 18% 22%, var(--crimson), transparent 70%),
    radial-gradient(circle at 82% 28%, var(--opalV), transparent 72%),
    radial-gradient(circle at 62% 92%, var(--festival), transparent 62%),
    radial-gradient(circle at 26% 22%, rgba(201,162,74,.14), transparent 62%),
    linear-gradient(160deg, rgba(0,0,0,.30), rgba(0,0,0,.14));
  backdrop-filter:blur(12px);
  box-shadow:var(--shadowA);
  overflow:hidden;
  padding:18px 18px 16px;
}
.hero::before{
  content:"";
  position:absolute;inset:0;
  border-radius:26px;
  pointer-events:none;
  opacity:.28;
  box-shadow: inset 0 0 0 1px rgba(201,162,74,.16);
  background:
    repeating-linear-gradient(45deg, rgba(201,162,74,.08) 0 1px, transparent 1px 16px),
    repeating-linear-gradient(-45deg, rgba(201,162,74,.06) 0 1px, transparent 1px 16px);
  mask:
    radial-gradient(circle at 50% 50%, transparent 0 76%, #000 80% 100%),
    linear-gradient(#000,#000);
  -webkit-mask:
    radial-gradient(circle at 50% 50%, transparent 0 76%, #000 80% 100%),
    linear-gradient(#000,#000);
}
.k{
  position:relative;z-index:2;
  margin:0 0 6px;
  font-size:12px;
  letter-spacing:4px;
  text-transform:uppercase;
  opacity:.80;
  color:var(--mut);
}
.h1{
  position:relative;z-index:2;
  margin:0;
  font-weight:950;
  font-size:38px;
  letter-spacing:1.1px;
  line-height:1.08;
  color:var(--ink);
}
.tag{
  position:relative;z-index:2;
  margin:10px 0 0;
  color:var(--txt);
  font-size:16px;
  line-height:1.55;
  max-width:980px;
}
.rule{
  position:relative;z-index:2;
  margin:12px 0 0;
  padding:12px 14px;
  border-radius:18px;
  border:1px solid rgba(255,255,255,.12);
  background:
    radial-gradient(circle at 22% 18%, rgba(255,43,43,.10), transparent 58%),
    radial-gradient(circle at 82% 70%, rgba(201,162,74,.10), transparent 62%),
    linear-gradient(160deg, rgba(10,12,16,.62), rgba(6,8,10,.76));
  box-shadow:0 14px 48px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.06);
  font-size:13.5px;
  color:rgba(255,255,255,.84);
  line-height:1.5;
}

/* ===== BAND ===== */
.band{
  position:relative;
  z-index:2;
  padding:10px 12px;
  border-radius:18px;
  border:1px solid var(--stroke2);
  background:rgba(0,0,0,.12);
  font-weight:950;
  letter-spacing:.2px;
  color:rgba(255,255,255,.88);
}

/* ===== ACCORDION ===== */
.stack{position:relative;z-index:2;display:flex;flex-direction:column;gap:12px}
.card{
  position:relative;
  border:1px solid rgba(255,255,255,.10);
  border-radius:22px;
  background:
    radial-gradient(circle at 22% 18%, rgba(255,43,43,.10), transparent 58%),
    radial-gradient(circle at 78% 30%, rgba(90,40,120,.10), transparent 62%),
    linear-gradient(145deg, rgba(17,22,28,.86), rgba(11,15,20,.92));
  box-shadow:var(--shadowB);
  overflow:hidden;
}
.card::before{
  content:"";
  position:absolute;inset:0;border-radius:inherit;pointer-events:none;
  background:
    radial-gradient(130% 130% at 50% 50%, rgba(212,175,55,0) 58%, rgba(212,175,55,.14) 82%, rgba(212,175,55,0) 100%),
    repeating-linear-gradient(45deg, rgba(201,162,74,.07) 0 1px, transparent 1px 18px),
    repeating-linear-gradient(-45deg, rgba(201,162,74,.05) 0 1px, transparent 1px 18px);
  mask:
    radial-gradient(circle at 50% 50%, transparent 0 72%, #000 80% 100%),
    linear-gradient(#000,#000);
  -webkit-mask:
    radial-gradient(circle at 50% 50%, transparent 0 72%, #000 80% 100%),
    linear-gradient(#000,#000);
  opacity:.26;
}
.head{
  display:flex;align-items:flex-start;justify-content:space-between;
  gap:10px;
  padding:16px 16px;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
.hL{display:flex;gap:12px;align-items:flex-start;min-width:0}
.dmark{
  width:10px;height:10px;border-radius:3px;
  transform:rotate(45deg);
  background:var(--c, rgba(201,162,74,.45));
  box-shadow:0 0 0 1px rgba(255,255,255,.14), 0 0 14px rgba(0,0,0,.35);
  flex:0 0 auto;
  margin-top:4px;
}
.titleBlock{min-width:0}
.q{
  font-weight:950;
  letter-spacing:.2px;
  font-size:18px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  color:var(--ink);
}
.s{
  margin-top:8px;
  font-size:13.75px;
  opacity:.88;
  line-height:1.42;
  color:rgba(255,255,255,.86);
  max-width:92ch;
}
.chev{
  width:36px;height:36px;border-radius:14px;
  border:1px solid rgba(255,255,255,.14);
  background: rgba(0,0,0,.16);
  display:flex;align-items:center;justify-content:center;
  color:var(--mut);
  font-weight:950;
  position:relative;overflow:hidden;
  flex:0 0 auto;
  margin-top:2px;
}
.chev::after{
  content:"";
  position:absolute;left:6px;right:6px;bottom:-10px;height:22px;
  background: radial-gradient(circle at 50% 0%, rgba(201,162,74,.32), transparent 70%);
  opacity:.62;pointer-events:none;
}
.body{
  display:none;
  padding:14px 16px 16px;
  border-top:1px solid rgba(255,255,255,.08);
  background:
    radial-gradient(circle at 30% 30%, rgba(255,255,255,.06), transparent 55%),
    linear-gradient(145deg, rgba(10,12,16,.86), rgba(6,8,10,.92));
}
.card.open .body{display:block}
.p{
  margin:0;
  color:rgba(255,255,255,.90);
  line-height:1.68;
  font-size:14.25px;
}
.p + .p{margin-top:10px}
.actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end;margin-top:14px}
.actions .btn{border-radius:999px;padding:10px 14px;white-space:nowrap}

/* ===== DOCK ===== */
.dock{
  position:fixed;left:50%;
  bottom:max(10px, env(safe-area-inset-bottom));
  transform:translateX(-50%);
  z-index:220;
  width:min(980px,94vw);
  padding:10px 12px;
  border-radius:22px;
  border:1px solid rgba(255,255,255,.12);
  background:
    radial-gradient(circle at 18% 18%, rgba(255,43,43,.10), transparent 62%),
    radial-gradient(circle at 82% 70%, rgba(90,40,120,.10), transparent 64%),
    linear-gradient(145deg, rgba(10,12,16,.72), rgba(6,8,10,.86));
  backdrop-filter:blur(10px);
  box-shadow:0 18px 60px rgba(0,0,0,.55);
  display:grid;
  grid-template-columns:repeat(4, minmax(0,1fr));
  gap:10px;
}
.dock .btn{width:100%;padding:10px 10px;border-radius:999px;white-space:nowrap}
@media (max-width:520px){
  :root{--dockH:112px}
  .dock{grid-template-columns:repeat(3, minmax(0,1fr))}
  .h1{font-size:34px}
}
</style>
</head>

<body>
<div id="root">

  <div class="top" aria-label="Top controls">
    <div class="left">
      <a class="btn" id="btnDoor" href="/door/" data-route="/door/">DOOR</a>
      <a class="btn" id="btnPrelude" href="/prelude/" data-route="/prelude/">PRELUDE</a>
      <a class="btn red" id="btnIndex" href="/index.html" data-route="/index.html">COMPASS</a>
      <a class="btn" id="btnProducts" href="/products/" data-route="/products/">PRODUCTS</a>
      <a class="btn" id="btnExplore" href="/explore/" data-route="/explore/">EXPLORE</a>
    </div>
    <div class="right" aria-label="Language">
      <button class="btn" id="btnEN" type="button">EN</button>
      <button class="btn" id="btnZH" type="button">中文</button>
      <button class="btn" id="btnES" type="button">ES</button>
    </div>
  </div>

  <div class="page">
    <div class="backdrop" aria-hidden="true"></div>

    <section class="hero" aria-label="Home hero">
      <p class="k" id="k0">HOME</p>
      <h1 class="h1" id="h0">WHERE DO YOU WANT TO GO NEXT?</h1>
      <p class="tag" id="tag0"></p>
      <div class="rule" id="rule0"></div>
    </section>

    <div class="band" id="band0">SURFACES (OPEN ONE)</div>
    <div class="stack" id="stack"></div>
  </div>

  <nav class="dock" aria-label="Bottom navigation">
    <a class="btn" id="dockProducts" href="/products/" data-route="/products/">PRODUCTS</a>
    <a class="btn" id="dockExplore" href="/explore/" data-route="/explore/">EXPLORE</a>
    <a class="btn" id="dockLaws" href="/laws/" data-route="/laws/">LAWS</a>
    <a class="btn" id="dockGauges" href="/gauges/" data-route="/gauges/">GAUGES</a>
  </nav>

</div>

<script>
(function(){
  "use strict";

  // ===== canonical state =====
  var qs=new URLSearchParams(location.search);
  var lang  = qs.get("lang")  || localStorage.getItem("gd_lang")  || "en";
  var style = qs.get("style") || localStorage.getItem("gd_style") || "informal";
  var time  = qs.get("time")  || localStorage.getItem("gd_time")  || "now";
  var depth = qs.get("depth") || localStorage.getItem("gd_depth") || "explore";
  var lane  = qs.get("lane")  || ""; // URL-only preserve if present; never store

  if(lang!=="en" && lang!=="zh" && lang!=="es") lang="en";
  if(style!=="formal" && style!=="informal") style="informal";
  if(time==="trajectory") time="post";
  if(time!=="origin" && time!=="now" && time!=="post") time="now";
  if(depth!=="explore" && depth!=="learn") depth="explore";
  if(lane!=="platform" && lane!=="engineering") lane="";

  try{
    localStorage.setItem("gd_lang",lang);
    localStorage.setItem("gd_style",style);
    localStorage.setItem("gd_time",time);
    localStorage.setItem("gd_depth",depth);
  }catch(e){}

  document.documentElement.lang = (lang==="zh") ? "zh" : (lang==="es" ? "es" : "en");

  function q(over){
    var L=(over&&over.lang)?over.lang:lang;
    var S=(over&&over.style)?over.style:style;
    var T=(over&&over.time)?over.time:time;
    var D=(over&&over.depth)?over.depth:depth;
    var A=(over&&over.lane)?over.lane:lane;
    var out="?lang="+encodeURIComponent(L)+"&style="+encodeURIComponent(S)+"&time="+encodeURIComponent(T)+"&depth="+encodeURIComponent(D);
    if(A==="platform"||A==="engineering") out+="&lane="+encodeURIComponent(A);
    return out;
  }

  // wire all internal [data-route] with state
  function wireAll(){
    var nodes=document.querySelectorAll("[data-route]");
    for(var i=0;i<nodes.length;i++){
      var el=nodes[i];
      var route=el.getAttribute("data-route")||"";
      if(!route) continue;
      el.setAttribute("href", route + q());
    }
  }

  // language toggle (reload same path)
  function setLang(next){
    if(next!=="en" && next!=="zh" && next!=="es") next="en";
    lang=next;
    try{ localStorage.setItem("gd_lang",lang); }catch(e){}
    window.location.href = window.location.pathname + q({lang:lang});
  }
  document.getElementById("btnEN").addEventListener("click", function(){ setLang("en"); }, {passive:true});
  document.getElementById("btnZH").addEventListener("click", function(){ setLang("zh"); }, {passive:true});
  document.getElementById("btnES").addEventListener("click", function(){ setLang("es"); }, {passive:true});

  // ===== copy packs =====
  function P(en,zh,es){ return {en:en, zh:zh, es:es}; }
  function pick(o){ return (lang==="zh")?o.zh:(lang==="es")?o.es:o.en; }

  var HERO = {
    tag:P(
      "Home is the fast lane. It doesn’t teach taxonomy. It routes you to the next surface with one clean choice.",
      "主页是快车道：不教分类，只把你路由到下一入口（一次只做一个选择）。",
      "Home es el carril rápido: no enseña taxonomía. Te enruta con una sola elección limpia."
    ),
    rule:P(
      "Rule: open one block, read one paragraph, then jump. If you want the big table first, go to DOOR.",
      "规则：打开一个块，读一段，然后跳转。想先看总桌面就去 DOOR。",
      "Regla: abre un bloque, lee un párrafo y salta. Para la mesa grande: PUERTA."
    ),
    band:P("SURFACES (OPEN ONE)","入口（打开一个）","SUPERFICIES (ABRE UNA)")
  };

  document.getElementById("tag0").textContent = pick(HERO.tag);
  document.getElementById("rule0").textContent = pick(HERO.rule);
  document.getElementById("band0").textContent = pick(HERO.band);

  // ===== accordion data (each has ONE jump only) =====
  var CARDS = [
    { c:"#c9a24a",
      q:P("Start at the big table?","从总桌面开始？","¿Empezar por la mesa grande?"),
      s:P("Door is the intro hub: it tells you what this is and where to enter.","DOOR 是入门枢纽：告诉你这是什么、怎么进入。","Puerta es el hub de intro: qué es y cómo entrar."),
      p:P(
        "Use DOOR when you want the intro posture: what the system is, what it refuses to claim, and how to enter without getting lost.",
        "想要入门姿态就用 DOOR：系统是什么、拒绝什么主张、如何不迷路进入。",
        "Usa PUERTA para postura de inicio: qué es, qué no afirma y cómo entrar sin perderte."
      ),
      jump:{label:P("OPEN: DOOR","打开：DOOR","ABRIR: PUERTA"), href:"/door/"}
    },
    { c:"#ff2b2b",
      q:P("Need direction right now?","现在就要方向？","¿Necesitas dirección ya?"),
      s:P("Compass is fast traversal: pick a direction and go.","指南针=快速遍历：选方向就走。","Brújula = recorrido rápido: eliges y vas."),
      p:P(

  // ===== accordion render (single-open; tap same closes) =====
  var stack=document.getElementById("stack");

  function closeAll(){
    var cards=stack.querySelectorAll(".card");
    for(var i=0;i<cards.length;i++){
      cards[i].classList.remove("open");
      var t=cards[i].querySelector(".chevTxt");
      if(t) t.textContent="▸";
    }
  }

  function makeCard(item, idx){
    var card=document.createElement("div");
    card.className="card";
    card.style.setProperty("--c", item.c);

    var head=document.createElement("div");
    head.className="head";
    head.setAttribute("role","button");
    head.tabIndex=0;

    var hL=document.createElement("div");
    hL.className="hL";

    var mark=document.createElement("div");
    mark.className="dmark";
    mark.style.background=item.c;

    var tb=document.createElement("div");
    tb.className="titleBlock";

    var qEl=document.createElement("div");
    qEl.className="q";
    qEl.textContent=pick(item.q);

    var sEl=document.createElement("div");
    sEl.className="s";
    sEl.textContent=pick(item.s);

    tb.appendChild(qEl);
    tb.appendChild(sEl);

    hL.appendChild(mark);
    hL.appendChild(tb);

    var chev=document.createElement("div");
    chev.className="chev";
    chev.innerHTML='<span class="chevTxt">▸</span>';

    head.appendChild(hL);
    head.appendChild(chev);

    var body=document.createElement("div");
    body.className="body";

    var p=document.createElement("p");
    p.className="p";
    p.textContent=pick(item.p);
    body.appendChild(p);

    var actions=document.createElement("div");
    actions.className="actions";

    var a=document.createElement("a");
    a.className="btn red";
    a.textContent=pick(item.jump.label);
    a.setAttribute("data-route", item.jump.href);
    actions.appendChild(a);

    body.appendChild(actions);

    function toggle(){
      var isOpen=card.classList.contains("open");
      if(isOpen){
        card.classList.remove("open");
        chev.querySelector(".chevTxt").textContent="▸";
        return;
      }
      closeAll();
      card.classList.add("open");
      chev.querySelector(".chevTxt").textContent="▾";
      wireAll();
    }

    head.addEventListener("click", toggle, {passive:true});
    head.addEventListener("keydown", function(e){
      if(e.key==="Enter"||e.key===" "){ e.preventDefault(); toggle(); }
    });

    card.appendChild(head);
    card.appendChild(body);

    if(idx===0){
      card.classList.add("open");
      chev.querySelector(".chevTxt").textContent="▾";
    }
    return card;
  }

  function render(){
    stack.innerHTML="";
    for(var i=0;i<CARDS.length;i++){
      stack.appendChild(makeCard(CARDS[i], i));
    }

    if(lang==="zh"){
      document.getElementById("k0").textContent="主页";
      document.getElementById("h0").textContent="你下一步想去哪？";
      document.getElementById("band0").textContent="入口（打开一个）";
      document.getElementById("btnDoor").textContent="门";
      document.getElementById("btnPrelude").textContent="前奏";
      document.getElementById("btnIndex").textContent="指南针";
      document.getElementById("btnProducts").textContent="产品";
      document.getElementById("btnExplore").textContent="探索";
      document.getElementById("dockProducts").textContent="产品";
      document.getElementById("dockExplore").textContent="探索";
      document.getElementById("dockLaws").textContent="法则";
      document.getElementById("dockGauges").textContent="量规";
    }else if(lang==="es"){
      document.getElementById("k0").textContent="INICIO";
      document.getElementById("h0").textContent="¿A DÓNDE QUIERES IR AHORA?";
      document.getElementById("band0").textContent="SUPERFICIES (ABRE UNA)";
      document.getElementById("btnDoor").textContent="PUERTA";
      document.getElementById("btnPrelude").textContent="PRELUDIO";
      document.getElementById("btnIndex").textContent="BRÚJULA";
      document.getElementById("btnProducts").textContent="PRODUCTOS";
      document.getElementById("btnExplore").textContent="EXPLORAR";
      document.getElementById("dockProducts").textContent="PRODUCTOS";
      document.getElementById("dockExplore").textContent="EXPLORAR";
      document.getElementById("dockLaws").textContent="LEYES";
      document.getElementById("dockGauges").textContent="MEDIDORES";
    }else{
      document.getElementById("k0").textContent="HOME";
      document.getElementById("h0").textContent="WHERE DO YOU WANT TO GO NEXT?";
      document.getElementById("band0").textContent="SURFACES (OPEN ONE)";
      document.getElementById("btnDoor").textContent="DOOR";
      document.getElementById("btnPrelude").textContent="PRELUDE";
      document.getElementById("btnIndex").textContent="COMPASS";
      document.getElementById("btnProducts").textContent="PRODUCTS";
      document.getElementById("btnExplore").textContent="EXPLORE";
      document.getElementById("dockProducts").textContent="PRODUCTS";
      document.getElementById("dockExplore").textContent="EXPLORE";
      document.getElementById("dockLaws").textContent="LAWS";
      document.getElementById("dockGauges").textContent="GAUGES";
    }

    wireAll();
  }

  render();
})();
</script>
