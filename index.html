<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Nine Summits — Home</title>
  <link rel="stylesheet" href="../assets/ui.css" />
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #030712;
      color: #fff;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    }

    #app-shell {
      position: fixed;
      inset: 0;
      overflow: hidden;
      isolation: isolate;
      background:
        radial-gradient(circle at 50% 42%, rgba(50, 100, 180, 0.12), transparent 34%),
        linear-gradient(180deg, #030712 0%, #071225 52%, #08101f 100%);
    }

    #world-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      z-index: 1;
      touch-action: none;
    }

    #universe-layer,
    #atmosphere-layer,
    #hero-layer,
    #flat-layer,
    #hud-layer {
      position: fixed;
      inset: 0;
    }

    #universe-layer {
      z-index: 2;
      pointer-events: none;
      overflow: hidden;
    }

    .star-band {
      position: absolute;
      inset: -10%;
      opacity: 0.42;
      mix-blend-mode: screen;
      animation: starDrift 44s linear infinite;
    }

    .star-band.near {
      opacity: 0.62;
      animation-duration: 26s;
    }

    .star-band.far {
      opacity: 0.2;
      animation-duration: 70s;
    }

    .star-band::before,
    .star-band::after {
      content: "";
      position: absolute;
      inset: 0;
      background-repeat: repeat;
      background-size: 320px 320px;
    }

    .star-band::before {
      background-image:
        radial-gradient(circle at 20px 24px, rgba(255,255,255,0.95) 0 1px, transparent 1.6px),
        radial-gradient(circle at 118px 78px, rgba(255,255,255,0.55) 0 1px, transparent 1.6px),
        radial-gradient(circle at 242px 194px, rgba(255,255,255,0.82) 0 1px, transparent 1.6px),
        radial-gradient(circle at 286px 42px, rgba(255,255,255,0.42) 0 0.9px, transparent 1.4px),
        radial-gradient(circle at 68px 214px, rgba(255,255,255,0.68) 0 0.9px, transparent 1.4px);
    }

    .star-band::after {
      background-image:
        radial-gradient(circle at 78px 48px, rgba(120, 180, 255, 0.28) 0 1.2px, transparent 2px),
        radial-gradient(circle at 204px 158px, rgba(255, 215, 120, 0.22) 0 1.3px, transparent 2px),
        radial-gradient(circle at 300px 258px, rgba(180, 140, 255, 0.18) 0 1.1px, transparent 1.8px);
      filter: blur(0.5px);
    }

    #atmosphere-layer {
      z-index: 3;
      pointer-events: none;
      overflow: hidden;
    }

    .atmo-glow {
      position: absolute;
      left: 50%;
      top: 58%;
      width: min(92vw, 1040px);
      height: min(92vw, 1040px);
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background:
        radial-gradient(circle at 50% 50%, rgba(120, 180, 255, 0.14), transparent 34%),
        radial-gradient(circle at 50% 56%, rgba(255, 255, 255, 0.04), transparent 56%),
        radial-gradient(circle at 50% 50%, rgba(30, 90, 170, 0.1), transparent 70%);
      filter: blur(12px);
      animation: glowPulse 8s ease-in-out infinite;
    }

    .mist-veil {
      position: absolute;
      left: 0;
      right: 0;
      bottom: -4%;
      height: 40%;
      background:
        linear-gradient(
          to bottom,
          transparent 0%,
          rgba(130, 190, 255, 0.06) 18%,
          rgba(170, 220, 255, 0.1) 54%,
          rgba(255, 255, 255, 0.03) 100%
        );
      mask-image: linear-gradient(to bottom, transparent 0%, rgba(0, 0, 0, 0.25) 18%, rgba(0, 0, 0, 0.95) 84%, transparent 100%);
      -webkit-mask-image: linear-gradient(to bottom, transparent 0%, rgba(0, 0, 0, 0.25) 18%, rgba(0, 0, 0, 0.95) 84%, transparent 100%);
      opacity: 0.22;
      transform: translateY(8%);
      animation: veilDrift 9s ease-in-out infinite;
    }

    #hero-layer {
      z-index: 8;
      pointer-events: none;
    }

    .hero-panel {
      position: absolute;
      left: 50%;
      top: 7.5vh;
      transform: translateX(-50%);
      width: min(92vw, 980px);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      text-align: center;
      pointer-events: none;
    }

    .hero-title {
      margin: 0;
      font-size: clamp(42px, 7vw, 96px);
      font-weight: 950;
      letter-spacing: 0.05em;
      line-height: 0.9;
      text-shadow: 0 10px 38px rgba(0, 0, 0, 0.62);
    }

    .hero-sub {
      margin: 0;
      font-size: clamp(16px, 2vw, 22px);
      color: rgba(255, 255, 255, 0.86);
    }

    .hero-tag {
      margin: 0;
      font-size: clamp(13px, 1.5vw, 16px);
      color: rgba(255, 255, 255, 0.64);
      letter-spacing: 0.02em;
    }

    #flat-layer {
      z-index: 9;
      display: none;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .flat-menu {
      width: min(92vw, 720px);
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
      pointer-events: auto;
    }

    .flat-card {
      position: relative;
      min-height: 132px;
      border-radius: 28px;
      border: 1px solid rgba(255,255,255,0.16);
      background:
        radial-gradient(circle at 22% 18%, rgba(255,255,255,0.18), transparent 22%),
        linear-gradient(145deg, rgba(10,14,22,0.92), rgba(5,8,12,0.98));
      box-shadow:
        0 18px 48px rgba(0,0,0,0.38),
        inset 0 0 20px rgba(255,255,255,0.04);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-weight: 900;
      font-size: clamp(18px, 2.2vw, 24px);
      letter-spacing: 0.06em;
      cursor: pointer;
      overflow: hidden;
      transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;
    }

    .flat-card:hover {
      transform: translateY(-2px);
      border-color: rgba(255,255,255,0.26);
      background:
        radial-gradient(circle at 22% 18%, rgba(255,255,255,0.22), transparent 24%),
        linear-gradient(145deg, rgba(14,18,28,0.96), rgba(5,8,12,1));
    }

    .flat-card::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 86px;
      height: 86px;
      margin: -43px 0 0 -43px;
      transform: rotate(45deg);
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: inset 0 0 14px rgba(255,255,255,0.08);
    }

    #hud-layer {
      z-index: 12;
      pointer-events: none;
    }

    .runtime-pill,
    .mode-note {
      position: absolute;
      top: 16px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.38);
      border: 1px solid rgba(255, 255, 255, 0.14);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.04em;
      color: rgba(255, 255, 255, 0.86);
      backdrop-filter: blur(8px);
      pointer-events: auto;
    }

    .runtime-pill {
      left: 16px;
    }

    .mode-note {
      right: 16px;
    }

    @keyframes starDrift {
      from { transform: translate3d(-1.5%, -1%, 0); }
      to   { transform: translate3d(1.5%, 1%, 0); }
    }

    @keyframes glowPulse {
      0%,100% { opacity: 0.82; transform: translate(-50%, -50%) scale(1); }
      50%     { opacity: 1; transform: translate(-50%, -50%) scale(1.04); }
    }

    @keyframes veilDrift {
      0%,100% { transform: translateY(8%); opacity: 0.18; }
      50%     { transform: translateY(2%); opacity: 0.28; }
    }

    @media (max-width: 700px) {
      .hero-panel {
        top: 8.4vh;
        gap: 12px;
      }

      .flat-menu {
        grid-template-columns: 1fr;
        width: min(92vw, 420px);
        gap: 12px;
      }

      .flat-card {
        min-height: 98px;
      }
    }
  </style>
</head>
<body>
  <div id="app-shell">
    <canvas id="world-canvas" aria-label="Home world canvas"></canvas>

    <div id="universe-layer" aria-hidden="true">
      <div class="star-band far"></div>
      <div class="star-band"></div>
      <div class="star-band near"></div>
    </div>

    <div id="atmosphere-layer" aria-hidden="true">
      <div class="atmo-glow"></div>
      <div class="mist-veil"></div>
    </div>

    <div id="hero-layer">
      <div class="hero-panel">
        <h1 class="hero-title">NINE SUMMITS</h1>
        <p class="hero-sub">Homepage</p>
        <p class="hero-tag">Enter simple. Discover power. Choose depth.</p>
      </div>
    </div>

    <div id="flat-layer">
      <div class="flat-menu">
        <button class="flat-card" data-route="/explore/" type="button">EXPLORE</button>
        <button class="flat-card" data-route="/products/" type="button">PRODUCTS</button>
        <button class="flat-card" data-route="/laws/" type="button">LAWS</button>
        <button class="flat-card" data-route="/gauges/" type="button">GAUGES</button>
      </div>
    </div>

    <div id="hud-layer">
      <div class="runtime-pill">HOME</div>
      <div class="mode-note" id="mode-note">ROUND</div>
    </div>
  </div>

  <script type="module">
    import { createPlanetEngine } from "../world/planet_engine.js";
    import { createRenderer } from "../world/render.js";
    import { createControlSystem } from "../world/control.js";

    const params = new URLSearchParams(location.search);
    const mode = params.get("mode") === "flat" ? "flat" : "round";

    const canvas = document.getElementById("world-canvas");
    const ctx = canvas.getContext("2d", { alpha: true });
    const flatLayer = document.getElementById("flat-layer");
    const modeNote = document.getElementById("mode-note");

    const planetEngine = createPlanetEngine();
    const renderer = createRenderer();
    const control = createControlSystem();

    const MOTION_STORAGE_KEY = "ns_home_round_motion_v1";

    const orbitalSystem = Object.freeze({
      objects: Object.freeze([
        Object.freeze({
          id: "north-products",
          label: "PRODUCTS",
          route: "/products/",
          baseLatDeg: 0,
          baseLonDeg: 0,
          bearingOffsetDeg: -90,
          spinOffsetRad: 0.2,
          spinMultiplier: 1.35,
          sizePx: 52
        }),
        Object.freeze({
          id: "south-laws",
          label: "LAWS",
          route: "/laws/",
          baseLatDeg: 0,
          baseLonDeg: 0,
          bearingOffsetDeg: 90,
          spinOffsetRad: 0.8,
          spinMultiplier: 1.25,
          sizePx: 52
        }),
        Object.freeze({
          id: "east-gauges",
          label: "GAUGES",
          route: "/gauges/",
          baseLatDeg: 0,
          baseLonDeg: 0,
          bearingOffsetDeg: 0,
          spinOffsetRad: 1.1,
          spinMultiplier: 1.45,
          sizePx: 52
        }),
        Object.freeze({
          id: "west-explore",
          label: "EXPLORE",
          route: "/explore/",
          baseLatDeg: 0,
          baseLonDeg: 0,
          bearingOffsetDeg: 180,
          spinOffsetRad: 1.7,
          spinMultiplier: 1.3,
          sizePx: 52
        })
      ])
    });

    let planetField = null;
    let rafId = 0;
    let lastFrameAt = performance.now();
    let lastRenderReceipt = Object.freeze({
      orbitalHits: Object.freeze([])
    });

    let isDragging = false;
    let pendingStar = null;
    let pendingPointerDown = null;
    let lastX = 0;
    let lastY = 0;

    function withModeQuery(route) {
      const glue = route.includes("?") ? "&" : "?";
      return `${route}${glue}mode=${mode}`;
    }

    function resizeWorld() {
      const width = window.innerWidth;
      const height = window.innerHeight;
      canvas.width = width;
      canvas.height = height;
      control.resize(width, height);
    }

    function buildPlanetFieldOnce() {
      if (!planetField) {
        planetField = planetEngine.buildPlanetField({});
      }
    }

    function restoreMotionState() {
      if (mode !== "round") return;

      try {
        const raw = sessionStorage.getItem(MOTION_STORAGE_KEY);
        if (!raw) return;
        control.restoreMotionState(JSON.parse(raw));
      } catch {
        return;
      }
    }

    function persistMotionState() {
      if (mode !== "round") return;

      try {
        sessionStorage.setItem(
          MOTION_STORAGE_KEY,
          JSON.stringify(control.getMotionState())
        );
      } catch {
        return;
      }
    }

    function renderSurface() {
      if (!planetField) return;

      lastRenderReceipt = renderer.renderPlanet({
        ctx,
        planetField,
        projectPoint: (latDeg, lonDeg, radiusOffsetPx = 0) => {
          return control.projectSphere(latDeg, lonDeg, radiusOffsetPx);
        },
        viewState: control.getCameraState(),
        orbitalSystem: mode === "round"
          ? Object.freeze({
              phase: control.getOrbitalState().orbitPhase,
              objects: orbitalSystem.objects,
              altitudeFactor: 0.42
            })
          : null
      });
    }

    function hitTestOrbitalTargets(screenX, screenY) {
      const targets = Array.isArray(lastRenderReceipt?.orbitalHits)
        ? lastRenderReceipt.orbitalHits
        : [];

      for (let i = targets.length - 1; i >= 0; i -= 1) {
        const hit = targets[i];
        const dx = screenX - hit.x;
        const dy = screenY - hit.y;
        const distance = Math.sqrt((dx * dx) + (dy * dy));

        if (distance <= hit.radius) {
          return hit;
        }
      }

      return null;
    }

    function frame(now) {
      const dtMs = now - lastFrameAt;
      lastFrameAt = now;

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      if (mode === "round") {
        control.stepInertia(dtMs);
      }

      renderSurface();
      rafId = requestAnimationFrame(frame);
    }

    function setModePresentation() {
      modeNote.textContent = mode.toUpperCase();

      if (mode === "flat") {
        flatLayer.style.display = "flex";
        canvas.style.filter = "blur(8px) brightness(.65)";
      } else {
        flatLayer.style.display = "none";
        canvas.style.filter = "none";
      }
    }

    function bindEvents() {
      if (mode === "round") {
        canvas.addEventListener("pointerdown", (event) => {
          const starHit = hitTestOrbitalTargets(event.clientX, event.clientY);

          pendingPointerDown = Object.freeze({
            x: event.clientX,
            y: event.clientY
          });

          if (starHit) {
            pendingStar = starHit;
            isDragging = false;
            return;
          }

          pendingStar = null;
          isDragging = true;
          lastX = event.clientX;
          lastY = event.clientY;
        }, { passive: true });

        window.addEventListener("pointermove", (event) => {
          if (pendingStar) {
            return;
          }

          if (!isDragging) return;

          const dx = event.clientX - lastX;
          const dy = event.clientY - lastY;

          lastX = event.clientX;
          lastY = event.clientY;

          control.applyDrag(dx, dy);
        }, { passive: true });

        window.addEventListener("pointerup", (event) => {
          if (pendingStar) {
            const moved =
              pendingPointerDown
                ? Math.sqrt(
                    Math.pow(event.clientX - pendingPointerDown.x, 2) +
                    Math.pow(event.clientY - pendingPointerDown.y, 2)
                  )
                : 0;

            const hit = hitTestOrbitalTargets(event.clientX, event.clientY);

            if (moved <= 12 && hit && hit.id === pendingStar.id) {
              location.href = withModeQuery(pendingStar.route);
            }
          }

          pendingStar = null;
          pendingPointerDown = null;
          isDragging = false;
        }, { passive: true });

        window.addEventListener("pointercancel", () => {
          pendingStar = null;
          pendingPointerDown = null;
          isDragging = false;
        }, { passive: true });
      }

      document.querySelectorAll(".flat-card").forEach((card) => {
        card.addEventListener("click", () => {
          const route = card.dataset.route || "/home/";
          location.href = withModeQuery(route);
        });
      });

      window.addEventListener("resize", () => {
        resizeWorld();
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        renderSurface();
      }, { passive: true });

      window.addEventListener("pagehide", () => {
        persistMotionState();

        if (rafId) {
          cancelAnimationFrame(rafId);
          rafId = 0;
        }
      }, { passive: true });

      window.addEventListener("pageshow", () => {
        if (mode === "round") {
          restoreMotionState();
        }

        if (!rafId) {
          lastFrameAt = performance.now();
          rafId = requestAnimationFrame(frame);
        }
      }, { passive: true });
    }

    function start() {
      resizeWorld();
      buildPlanetFieldOnce();
      if (mode === "round") {
        restoreMotionState();
      }
      setModePresentation();
      bindEvents();
      renderSurface();

      if (mode === "round" && !rafId) {
        lastFrameAt = performance.now();
        rafId = requestAnimationFrame(frame);
      }
    }

    start();
  </script>
</body>
</html>
