<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Products · Spine</title>

<link rel="stylesheet" href="/assets/ui.css"/>

<style>
:root{
  --bg0:#05070d;
  --bg1:#0a0f1a;

  --red:#ff2b2b;
  --gold:#c9a24a;

  --ink:#ffffff;
  --mut:rgba(255,255,255,.75);

  --z-bg:1;
  --z-field:2;
  --z-ui:10;
}

/* BASE */
html,body{
  margin:0;
  height:100%;
  overflow:hidden;
  color:var(--ink);
  font-family:system-ui;
  background:
    radial-gradient(circle at 20% 20%, rgba(255,43,43,.15), transparent 60%),
    radial-gradient(circle at 80% 80%, rgba(201,162,74,.12), transparent 60%),
    linear-gradient(160deg,var(--bg1),var(--bg0));
}

/* FIELD */
#field{
  position:absolute;
  inset:0;
  z-index:var(--z-field);
}

/* WEATHER */
.weather{
  position:absolute;
  inset:0;
  pointer-events:none;
  z-index:var(--z-bg);
}

.rain{
  background-image:
    linear-gradient(rgba(255,255,255,.08) 1px, transparent 1px);
  background-size:2px 18px;
  animation:rain 0.4s linear infinite;
  opacity:.25;
}

@keyframes rain{
  from{transform:translateY(0)}
  to{transform:translateY(18px)}
}

/* UI */
#ui{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:40px;
  z-index:var(--z-ui);
  pointer-events:none;
}

/* HERO */
.hero{
  text-align:center;
  max-width:720px;
}

.hero h1{
  font-size:42px;
  margin:0;
  letter-spacing:1px;
}

.hero p{
  margin-top:12px;
  color:var(--mut);
  line-height:1.6;
}

/* SPLIT */
.split{
  display:flex;
  gap:80px;
  pointer-events:auto;
}

.node{
  width:180px;
  height:180px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:18px;
  position:relative;
  cursor:pointer;
  transition:.2s;
}

/* DIAMOND */
.diamond{
  width:100%;
  height:100%;
  transform:rotate(45deg);
  border:1px solid rgba(255,255,255,.15);
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
}

.node span{
  transform:rotate(-45deg);
  font-weight:900;
  letter-spacing:.2em;
}

/* ANIMATION */
.spin-cw{
  animation:spinCW 12s linear infinite;
}
.spin-ccw{
  animation:spinCCW 16s linear infinite;
}

@keyframes spinCW{
  from{transform:rotate(45deg)}
  to{transform:rotate(405deg)}
}
@keyframes spinCCW{
  from{transform:rotate(45deg)}
  to{transform:rotate(-315deg)}
}

/* HOVER */
.node:hover{
  transform:scale(1.05);
}

.node:hover .diamond{
  border-color:var(--gold);
  box-shadow:0 0 25px rgba(201,162,74,.25);
}

/* PRODUCT GRID (HIDDEN UNTIL ENTRY) */
#products{
  position:absolute;
  inset:0;
  display:none;
  flex-direction:column;
  padding:120px 40px 40px;
  gap:20px;
  overflow:auto;
  z-index:var(--z-ui);
}

.product{
  padding:18px;
  border:1px solid rgba(255,255,255,.12);
  border-radius:16px;
  background:rgba(0,0,0,.4);
  cursor:pointer;
}

.product:hover{
  border-color:var(--gold);
}

/* BACK */
.back{
  position:absolute;
  top:20px;
  left:20px;
  cursor:pointer;
  pointer-events:auto;
}
</style>
</head>

<body>

<canvas id="field"></canvas>
<div class="weather rain"></div>

<div id="ui">

  <div class="hero">
    <h1>PRODUCTS</h1>
    <p>
      Choose your path. What exists now, or what is being built next.
    </p>
  </div>

  <div class="split">

    <!-- NOW -->
    <div class="node" id="enterNow">
      <div class="diamond spin-cw">
        <span>NOW</span>
      </div>
    </div>

    <!-- FUTURE -->
    <div class="node" id="enterFuture">
      <div class="diamond spin-ccw">
        <span>FUTURE</span>
      </div>
    </div>

  </div>

</div>

<!-- PRODUCTS -->
<div id="products">

  <div class="back" id="backBtn">← BACK</div>

  <div class="product">OnYourSide AI</div>
  <div class="product">Education System</div>
  <div class="product">Energy Platform</div>
  <div class="product">Governance System</div>

</div>

<script>
/* =========================
   FIELD ENGINE (256 DENSITY FEEL)
========================= */
const canvas=document.getElementById("field");
const ctx=canvas.getContext("2d");

function resize(){
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
}
resize();
window.addEventListener("resize",resize);

let t=0;

function render(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  const spacing=40;

  for(let x=0;x<canvas.width;x+=spacing){
    for(let y=0;y<canvas.height;y+=spacing){

      const v=Math.sin(x*0.01 + t) + Math.cos(y*0.01 + t);
      const a=(v+2)/4;

      ctx.fillStyle=`rgba(255,255,255,${a*0.08})`;
      ctx.fillRect(x,y,2,2);
    }
  }

  t+=0.01;
  requestAnimationFrame(render);
}
render();

/* =========================
   INTERACTION
========================= */

const ui=document.getElementById("ui");
const products=document.getElementById("products");

document.getElementById("enterNow").onclick=()=>{
  ui.style.display="none";
  products.style.display="flex";
};

document.getElementById("enterFuture").onclick=()=>{
  window.location.href="/explore/";
};

document.getElementById("backBtn").onclick=()=>{
  products.style.display="none";
  ui.style.display="flex";
};
</script>

</body>
</html>
