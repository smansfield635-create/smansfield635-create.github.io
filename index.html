<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Compass</title>

<link rel="stylesheet" href="/assets/ui.css"/>
<link rel="stylesheet" href="/assets/branch.css"/>
<script defer src="/assets/instruments.js"></script>

<style>
a{color:inherit;text-decoration:none}
body{margin:0}
body::before,body::after{pointer-events:none!important}

:root{
  /* ===== HIERARCHICAL GEOMETRY ===== */

  --CORE:190px;

  --L1:96px;     /* 4 Cardinals */
  --L2:72px;     /* 4 Diagonals */
  --L3:52px;     /* 8 Intercardinals */

  --R1:170px;    /* Cardinals radius */
  --R2:250px;    /* Diagonals radius */
  --R3:330px;    /* Intercardinals radius */

  --padTop:120px;

  --onyx0:rgba(6,8,10,.96);
  --onyx1:rgba(10,12,16,.88);

  --festival:rgba(255,43,43,.26);
  --opalV:rgba(90,40,120,.18);
  --crimson:rgba(120,0,22,.44);

  --gold:rgba(201,162,74,.58);
  --goldGlow:rgba(201,162,74,.34);

  --shadowDeep:0 44px 140px rgba(0,0,0,.82);
}

/* ===== STAGE ===== */

.stage{
  position:relative;
  width:min(1100px,94vw);
  height:min(1100px,82vh);
  margin:var(--padTop) auto 0;
  pointer-events:none;
}

/* ===== NODE BASE ===== */

.node{
  position:absolute;
  left:50%;top:50%;
  transform:translate(-50%,-50%) rotate(45deg);
  transform-origin:center;
  pointer-events:auto;
  cursor:pointer;
  overflow:hidden;
  border-radius:22px;
  transition:box-shadow .16s ease, border-color .16s ease;
}

.surface{
  background:
    radial-gradient(circle at 20% 18%, rgba(255,255,255,.28), transparent 45%),
    radial-gradient(circle at 78% 22%, var(--festival), transparent 60%),
    radial-gradient(circle at 75% 82%, var(--opalV), transparent 65%),
    radial-gradient(circle at 30% 80%, var(--crimson), transparent 72%),
    linear-gradient(160deg, var(--onyx1), var(--onyx0));
  border:1px solid rgba(255,255,255,.18);
  box-shadow:
    var(--shadowDeep),
    inset 0 2px 0 rgba(255,255,255,.22),
    inset 0 -50px 90px rgba(0,0,0,.90);
}

.node:hover{
  border-color:var(--gold);
  box-shadow:
    var(--shadowDeep),
    0 0 0 2px rgba(201,162,74,.18),
    0 0 28px var(--goldGlow),
    inset 0 2px 0 rgba(255,255,255,.24),
    inset 0 -50px 90px rgba(0,0,0,.90);
}

/* ===== SIZE CLASSES ===== */

.core{ width:var(--CORE); height:var(--CORE); z-index:6; }
.l1{ width:var(--L1); height:var(--L1); z-index:5; }
.l2{ width:var(--L2); height:var(--L2); z-index:4; }
.l3{ width:var(--L3); height:var(--L3); z-index:3; }

.inner{
  width:100%;height:100%;
  transform:rotate(-45deg);
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  font-weight:950;
  color:#fff;
  padding:8px;
  font-size:12px;
}

/* ===== BRAND STRIP ===== */

.pill{
  width:min(980px,94vw);
  margin:14px auto 0;
  padding:14px 16px;
  border-radius:22px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(0,0,0,.16);
  box-shadow:0 26px 90px rgba(0,0,0,.55);
  color:rgba(255,255,255,.86);
  text-align:center;
  font-size:13px;
}
.pill span{
  color:var(--gold);
  font-weight:900;
}

</style>
</head>

<body>

<div class="stage" id="stage"></div>

<div class="pill">
  <span>cogrid.net</span> · <span>diamondgatebridge.com</span>
</div>

<script>
(function(){

  var stage=document.getElementById("stage");

  function node(label, cls, radius, angle){
    var d=document.createElement("div");
    d.className="node surface "+cls;

    var inner=document.createElement("div");
    inner.className="inner";
    inner.textContent=label;
    d.appendChild(inner);

    var cx=stage.offsetWidth/2;
    var cy=stage.offsetHeight/2;

    var x=cx + radius*Math.cos(angle);
    var y=cy + radius*Math.sin(angle);

    d.style.left=x+"px";
    d.style.top=y+"px";

    stage.appendChild(d);
  }

  function layout(){

    stage.innerHTML="";

    var cx=stage.offsetWidth/2;
    var cy=stage.offsetHeight/2;

    /* CORE */
    var core=document.createElement("div");
    core.className="node surface core";
    var inner=document.createElement("div");
    inner.className="inner";
    inner.textContent="INDEX";
    core.appendChild(inner);
    core.style.left=cx+"px";
    core.style.top=cy+"px";
    stage.appendChild(core);

    /* LEVEL 1 — CARDINALS */
    var axes=["N","E","S","W"];
    var angles=[-Math.PI/2,0,Math.PI/2,Math.PI];
    for(var i=0;i<4;i++){
      node(axes[i],"l1", parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--R1")), angles[i]);
    }

    /* LEVEL 2 — DIAGONALS */
    var diags=["NE","SE","SW","NW"];
    var R2=parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--R2"));
    for(var i=0;i<4;i++){
      var a=-Math.PI/4 + i*(Math.PI/2);
      node(diags[i],"l2",R2,a);
    }

    /* LEVEL 3 — INTERCARDINALS */
    var subs=["NNE","ENE","ESE","SSE","SSW","WSW","WNW","NNW"];
    var R3=parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--R3"));
    for(var i=0;i<8;i++){
      var a=-Math.PI*(3/8) + i*(Math.PI/4);
      node(subs[i],"l3",R3,a);
    }
  }

  function safeLayout(){
    if(stage.offsetWidth<10){ requestAnimationFrame(safeLayout); return; }
    layout();
  }

  requestAnimationFrame(safeLayout);
  window.addEventListener("resize",safeLayout);

})();
</script>

</body>
</html>
