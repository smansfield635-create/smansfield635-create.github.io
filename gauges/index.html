<script>
const KEY = "cte_runtime_v3";

let lastRaw = null;

function getData(){
  try{
    const raw = localStorage.getItem(KEY);
    if(!raw) return null;

    // FORCE re-parse every time (no caching)
    if(raw !== lastRaw){
      lastRaw = raw;
      return JSON.parse(raw);
    }

    return JSON.parse(raw);
  }catch(e){
    console.error(e);
    return null;
  }
}

function row(label, value){
  return `
    <div class="row">
      <div class="left">
        <div class="diamond"></div>
        <div>${label}</div>
      </div>
      <div class="value">${value}</div>
    </div>
  `;
}

function render(data){
  if(!data){
    document.getElementById("statusBar").textContent = "STATE: NO DATA";
    return;
  }

  const age = Date.now() - new Date(data.timestamp).getTime();

  document.getElementById("statusBar").textContent =
    "STATE: LIVE • " + data.phase + " • " + Math.round(age) + "ms";

  document.getElementById("runtimeBlock").innerHTML = `
    ${row("phase", data.phase)}
    ${row("mode", data.mode)}
    ${row("fps", Math.round(data.fps))}
    ${row("dtMs", Math.round(data.dtMs))}
  `;

  const m = data.control?.motionState || {};
  document.getElementById("motionBlock").innerHTML = `
    ${row("yaw", m.yaw)}
    ${row("pitch", m.pitch)}
    ${row("orbitPhase", m.orbitPhase)}
  `;

  const e = data.emissionReceipt || {};
  document.getElementById("emissionBlock").innerHTML = `
    ${row("emitted", e.emissionEmitted)}
    ${row("pass", e.emissionPass)}
  `;
}

// 🔥 KEY CHANGE: RAF LOOP INSTEAD OF INTERVAL
function loop(){
  const data = getData();
  render(data);
  requestAnimationFrame(loop);
}

loop();
</script>
