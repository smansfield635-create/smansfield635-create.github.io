<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>World Is Round · External Harbor Branch</title>
  <link rel="stylesheet" href="./assets/ui.css" />
</head>

<body>
  <div id="app">
    <canvas id="world-canvas" aria-label="World canvas"></canvas>

    <div id="hud">

      <div id="title-bar">
        <div class="brand-card">
          <h1 class="brand-title">World Is Round</h1>
          <div class="brand-subtitle">
            External branch baseline · Harbor → Gratitude → Generosity
          </div>
        </div>

        <div class="state-card">
          <div class="state-label">Runtime state</div>
          <div id="runtime-phase" class="state-value">BOOT</div>
        </div>
      </div>

      <div id="debug-panel" class="panel-card">
        <div id="debug-content" class="panel-grid"></div>
      </div>

      <div id="compass-overlay" class="panel-card">
        <canvas id="compass-canvas" aria-label="Compass overlay"></canvas>
      </div>

    </div>
  </div>

  <noscript>
    <div style="
      position:fixed;
      inset:0;
      display:grid;
      place-items:center;
      background:#000;
      color:#fff;
      font-family:system-ui,sans-serif;
    ">
      JavaScript is required to run the external world baseline.
    </div>
  </noscript>

  <script type="module">

    import { createRuntime } from "./world/scene_runtime.js";

    const worldCanvas = document.getElementById("world-canvas");
    const compassCanvas = document.getElementById("compass-canvas");
    const debugContent = document.getElementById("debug-content");
    const runtimePhase = document.getElementById("runtime-phase");

    const runtime = createRuntime({
      worldCanvas,
      compassCanvas,
      debugContent,
      runtimePhase
    });

    runtime.start();

    window.__WORLD_RUNTIME__ = runtime;

  </script>

</body>
</html>
