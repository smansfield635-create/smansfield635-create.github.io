<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Diamond Gate Bridge</title>
<meta name="description" content="Compass first entry.">
<link rel="stylesheet" href="/variant/styles.css">
</head>
<body data-page="index">
<canvas id="scene" aria-hidden="true"></canvas>

<header class="toprail">
  <div class="brand">
    <div class="brand-kicker" data-i18n="index.kicker">Primary Compass</div>
    <div class="brand-title">Diamond Gate Bridge</div>
  </div>

  <div class="toprail-controls">
    <div class="chipset" aria-label="Language">
      <button class="chip" data-lang="en" type="button">EN</button>
      <button class="chip" data-lang="zh" type="button">中文</button>
      <button class="chip" data-lang="es" type="button">ES</button>
    </div>

    <div class="chipset" aria-label="Layer">
      <button class="chip" data-layer="1" type="button">Layer 1</button>
      <button class="chip" data-layer="2" type="button">Layer 2</button>
    </div>

    <div class="chipset" aria-label="Lane">
      <button class="chip" data-lane="platform" type="button">Platform</button>
      <button class="chip" data-lane="engineering" type="button">Engineering</button>
    </div>
  </div>
</header>

<main class="shell">
  <section class="hero">
    <div class="hero-kicker" data-i18n="index.heroKicker">Compass First Entry</div>
    <h1 class="hero-title" data-i18n="index.heroTitle">Choose your direction</h1>
    <p class="hero-body" data-i18n="index.heroBody">
      A liquid compass instrument with mounted diamond navigation, mirrored dragon traversal,
      and accessible controls.
    </p>
  </section>

  <section class="stage stage-compass" id="compassStage" aria-label="Compass navigation surface">
    <div class="gem-layer" id="gemLayer"></div>
  </section>
</main>

<nav class="corner-nav corner-left">
  <button class="corner-btn" data-route="/door/" type="button" data-i18n="common.door">Door</button>
</nav>

<nav class="corner-nav corner-right">
  <button class="corner-btn" data-route="/home/" type="button" data-i18n="common.home">Home</button>
</nav>

<script src="/variant/index.js"></script>
</body>
</html>
