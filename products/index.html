<!doctype html>
<!-- TNT — /products/index.html
     PRODUCTS · SIGNATURE + 5 STREAMS · 20 CORE PRODUCTS (MARKETABLE / STORY-FIRST)
     INFORMAL LAYER (PINNED):
       - gd_style = informal
       - gd_depth = explore
     TRILINGUAL UI: EN / 中文 / ES
     VISIBLE LENS ONLY:
       - lane=platform|engineering (URL-only; NEVER stored)
     UX:
       - Single-open accordion (streams)
       - Switching LANG or LANE does NOT reload
       - Switching LANG or LANE does NOT close the open stream
       - NO empty grid boxes (no dead space)
       - Each product is a stacked card with:
           - 1 narrative paragraph (always visible)
           - 3 sub-bubbles: Concept / Build Now / Roadmap
           - Jump button
     STATE:
       - Preserve gd_lang/gd_style/gd_time/gd_depth only (NO new gd_* keys)
       - Preserve URL query: lang/style/time/depth/lane
     ASSETS:
       - /assets/ui.css + /assets/branch.css + /assets/instruments.js
       - ui.css owns html/body background (NO overrides)
     ROUTES:
       - Edit ROUTES table in JS to fix any 404s (single place).
-->

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>PRODUCTS</title>

<link rel="stylesheet" href="/assets/ui.css"/>
<link rel="stylesheet" href="/assets/branch.css"/>
<script defer src="/assets/instruments.js"></script>

<style>
a{color:inherit;text-decoration:none}
body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:#fff}
body::before,body::after{pointer-events:none!important}

:root{
  --dockH:132px;

  --stroke:rgba(255,255,255,.12);
  --stroke2:rgba(255,255,255,.10);

  --ink:rgba(255,255,255,.94);
  --txt:rgba(255,255,255,.92);
  --mut:rgba(255,255,255,.80);
  --mut2:rgba(255,255,255,.72);

  --crimson:rgba(120,0,22,.30);
  --festival:rgba(255,43,43,.14);
  --opalV:rgba(90,40,120,.10);
  --goldSoft:rgba(201,162,74,.18);

  --shadowA:0 28px 110px rgba(0,0,0,.70);
  --shadowB:0 18px 60px rgba(0,0,0,.55);
  --shadowC:0 18px 60px rgba(0,0,0,.55);
}

/* ===== Top controls ===== */
.top{
  position:fixed;top:16px;left:0;right:0;
  padding:0 16px;
  display:flex;justify-content:space-between;align-items:center;
  gap:12px;
  z-index:240;
  pointer-events:none;
}
.top .left,.top .right{
  display:flex;gap:10px;flex-wrap:wrap;align-items:center;white-space:nowrap;
  pointer-events:auto;
}

/* button */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:10px 12px;min-height:44px;border-radius:16px;
  border:1px solid rgba(255,255,255,.14);
  background:
    radial-gradient(circle at 50% 120%, rgba(201,162,74,.16), transparent 64%),
    linear-gradient(145deg, rgba(10,12,16,.78), rgba(6,8,10,.90));
  color:var(--ink);
  font-weight:950;font-size:14px;letter-spacing:.2px;
  -webkit-tap-highlight-color:transparent;
  position:relative;overflow:hidden;
  touch-action:manipulation;
  box-shadow:var(--shadowC);
}
.btn:active{transform:translateY(1px)}
.btn::after{
  content:"";
  position:absolute;left:10px;right:10px;bottom:-12px;height:28px;
  background: radial-gradient(circle at 50% 0%, rgba(201,162,74,.34), transparent 72%);
  opacity:.60;pointer-events:none;
}
.btn.red{border-color:rgba(255,43,43,.22); box-shadow:var(--shadowC), 0 0 18px rgba(255,43,43,.12);}

.seg{
  display:inline-flex;gap:0;overflow:hidden;border-radius:16px;
  border:1px solid rgba(255,255,255,.12);
  background: rgba(0,0,0,.16);
  box-shadow: var(--shadowC);
}
.seg button{
  appearance:none;border:0;background:transparent;color:var(--mut);
  padding:10px 12px;min-height:44px;font-weight:950;font-size:13px;
  letter-spacing:.25px;cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
.seg button[aria-pressed="true"]{
  color:var(--ink);
  background:
    radial-gradient(circle at 50% 120%, rgba(201,162,74,.22), transparent 62%),
    linear-gradient(180deg, rgba(255,43,43,.10), rgba(0,0,0,.10));
  box-shadow: inset 0 -10px 22px rgba(201,162,74,.16);
}

/* ===== Page ===== */
.page{
  width:min(1120px,94vw);
  margin:0 auto;
  padding:104px 0 calc(var(--dockH) + 18px);
  display:flex;flex-direction:column;gap:12px;
  position:relative;z-index:10;
}

/* background context behind content */
.backdrop{
  position:absolute;
  left:50%;
  top:68px;
  transform:translateX(-50%);
  width:min(1180px,96vw);
  height:calc(100% - 108px);
  border-radius:34px;
  pointer-events:none;
  z-index:0;
  overflow:hidden;
}
.backdrop::before{
  content:"";
  position:absolute;inset:0;
  border:1px solid rgba(255,255,255,.08);
  border-radius:34px;
  background:
    radial-gradient(circle at 18% 20%, rgba(201,162,74,.10), transparent 60%),
    radial-gradient(circle at 78% 22%, rgba(255,43,43,.12), transparent 62%),
    radial-gradient(circle at 60% 90%, rgba(90,40,120,.10), transparent 64%),
    linear-gradient(160deg, rgba(0,0,0,.18), rgba(0,0,0,.08));
  box-shadow:
    0 70px 220px rgba(0,0,0,.62),
    inset 0 2px 0 rgba(255,255,255,.06),
    inset 0 -70px 140px rgba(0,0,0,.55);
  opacity:.92;
}
.backdrop::after{
  content:"";
  position:absolute;inset:-18%;
  background:
    radial-gradient(circle at 18% 34%, rgba(255,43,43,.18), transparent 44%),
    radial-gradient(circle at 84% 30%, rgba(255,43,43,.14), transparent 46%),
    radial-gradient(circle at 52% 78%, rgba(201,162,74,.12), transparent 48%),
    conic-gradient(from 12deg at 30% 28%,
      rgba(201,162,74,.14), transparent 12%,
      rgba(255,43,43,.12), transparent 24%,
      rgba(90,40,120,.10), transparent 38%,
      transparent 100%),
    conic-gradient(from 180deg at 70% 36%,
      rgba(255,43,43,.12), transparent 14%,
      rgba(201,162,74,.12), transparent 28%,
      rgba(90,40,120,.10), transparent 44%,
      transparent 100%),
    radial-gradient(circle at 50% 50%, rgba(255,255,255,.04), transparent 62%);
  filter:blur(1px);
  opacity:.72;
}

/* ===== Header ===== */
.header{
  position:relative;z-index:2;
  border:1px solid var(--stroke);
  border-radius:24px;
  background:
    radial-gradient(circle at 18% 22%, var(--crimson), transparent 72%),
    radial-gradient(circle at 82% 30%, var(--opalV), transparent 74%),
    radial-gradient(circle at 70% 92%, var(--festival), transparent 62%),
    radial-gradient(circle at 26% 22%, rgba(201,162,74,.14), transparent 62%),
    linear-gradient(160deg, rgba(0,0,0,.30), rgba(0,0,0,.14));
  backdrop-filter:blur(10px);
  box-shadow:var(--shadowA);
  padding:18px 18px 16px;
  overflow:hidden;
}
.header::before{
  content:"";
  position:absolute;inset:0;border-radius:24px;pointer-events:none;
  box-shadow: inset 0 0 0 1px rgba(201,162,74,.16);
  background:
    repeating-linear-gradient(45deg, rgba(201,162,74,.08) 0 1px, transparent 1px 16px),
    repeating-linear-gradient(-45deg, rgba(201,162,74,.06) 0 1px, transparent 1px 16px);
  opacity:.26;
  mask:
    radial-gradient(circle at 50% 50%, transparent 0 78%, #000 82% 100%),
    linear-gradient(#000,#000);
  -webkit-mask:
    radial-gradient(circle at 50% 50%, transparent 0 78%, #000 82% 100%),
    linear-gradient(#000,#000);
}

.k{margin:0 0 6px;font-size:11px;letter-spacing:4px;text-transform:uppercase;opacity:.78;color:var(--mut)}
.t{margin:0;font-weight:980;font-size:30px;letter-spacing:.7px;color:var(--ink)}
.s{margin:10px 0 0;font-size:15.5px;line-height:1.65;color:var(--txt);max-width:980px}
.rule{
  margin-top:12px;
  padding:12px 12px;
  border-radius:18px;
  border:1px solid rgba(255,255,255,.10);
  background:
    radial-gradient(circle at 22% 18%, rgba(255,43,43,.10), transparent 58%),
    radial-gradient(circle at 82% 70%, rgba(201,162,74,.10), transparent 62%),
    linear-gradient(160deg, rgba(10,12,16,.62), rgba(6,8,10,.76));
  font-size:13.25px;
  color:rgba(255,255,255,.86);
  line-height:1.45;
}

/* signature panel */
.signature{
  position:relative;z-index:2;
  border:1px solid rgba(201,162,74,.26);
  border-radius:24px;
  background:
    radial-gradient(circle at 50% 120%, rgba(201,162,74,.20), transparent 58%),
    radial-gradient(circle at 18% 22%, rgba(255,43,43,.10), transparent 62%),
    linear-gradient(160deg, rgba(0,0,0,.28), rgba(0,0,0,.14));
  box-shadow:var(--shadowA), 0 0 22px rgba(201,162,74,.10);
  padding:18px 18px 16px;
  overflow:hidden;
}
.signature h2{margin:0;font-size:18px;font-weight:980;letter-spacing:.4px;color:var(--ink)}
.sigGrid{margin-top:12px;display:flex;flex-direction:column;gap:10px}
.sigItem{
  border:1px solid rgba(255,255,255,.10);
  border-radius:18px;
  padding:12px 12px;
  background:rgba(0,0,0,.14);
}
.sigTop{display:flex;gap:10px;align-items:flex-start}
.sigDia{width:10px;height:10px;border-radius:3px;transform:rotate(45deg);background:var(--pc);box-shadow:0 0 0 1px rgba(255,255,255,.14), 0 0 14px rgba(0,0,0,.35);flex:0 0 auto;margin-top:4px}
.sigName{font-weight:980;font-size:15px;letter-spacing:.2px;color:var(--ink)}
.sigBody{margin-top:8px;color:rgba(255,255,255,.84);line-height:1.6;font-size:13.75px}
.sigActions{margin-top:10px;display:flex;justify-content:flex-end}

/* state pills */
.stateRow{
  margin-top:12px;
  display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;align-items:center;
}
.statePill{
  display:inline-flex;align-items:center;gap:8px;
  padding:10px 12px;border-radius:999px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(0,0,0,.16);
  color:rgba(255,255,255,.78);
  font-weight:950;
  box-shadow:0 14px 36px rgba(0,0,0,.55);
}

/* band */
.band{
  position:relative;z-index:2;
  padding:10px 12px;border-radius:18px;
  border:1px solid var(--stroke2);
  background:rgba(0,0,0,.14);
  font-weight:980;letter-spacing:.25px;
  color:rgba(255,255,255,.90);
}

/* ===== Streams accordion (single-open) ===== */
.list{position:relative;z-index:2;display:flex;flex-direction:column;gap:12px}
.row{
  border:1px solid rgba(255,255,255,.10);
  border-radius:22px;
  background:
    radial-gradient(circle at 22% 18%, rgba(255,43,43,.10), transparent 58%),
    radial-gradient(circle at 82% 30%, rgba(90,40,120,.10), transparent 66%),
    linear-gradient(145deg, rgba(17,22,28,.86), rgba(11,15,20,.94));
  box-shadow:var(--shadowA);
  overflow:hidden;
  position:relative;
}
.row::before{
  content:"";
  position:absolute;inset:0;border-radius:22px;pointer-events:none;
  box-shadow: inset 0 0 0 1px rgba(201,162,74,.10);
  opacity:.55;
}
.head{
  display:flex;align-items:flex-start;justify-content:space-between;
  gap:10px;padding:16px 16px;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
.hL{display:flex;gap:12px;align-items:flex-start;min-width:0}
.mark{
  width:10px;height:10px;border-radius:3px;transform:rotate(45deg);
  background:var(--c);
  box-shadow:0 0 0 1px rgba(255,255,255,.14), 0 0 14px rgba(0,0,0,.35);
  flex:0 0 auto;margin-top:4px;
}
.titleBlock{min-width:0}
.q{
  font-weight:980;letter-spacing:.2px;font-size:18px;color:var(--ink);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.subt{
  margin-top:8px;font-size:13.75px;opacity:.90;line-height:1.45;
  color:rgba(255,255,255,.86);max-width:92ch;
}
.chev{
  width:36px;height:36px;border-radius:14px;
  border:1px solid rgba(255,255,255,.14);
  background: rgba(0,0,0,.16);
  display:flex;align-items:center;justify-content:center;
  color:rgba(255,255,255,.78);
  font-weight:950;
  position:relative;overflow:hidden;
  flex:0 0 auto;margin-top:2px;
}
.chev::after{
  content:"";
  position:absolute;left:6px;right:6px;bottom:-10px;height:22px;
  background: radial-gradient(circle at 50% 0%, rgba(201,162,74,.30), transparent 70%);
  opacity:.62;pointer-events:none;
}
.body{
  display:none;
  padding:16px 16px 18px;
  border-top:1px solid rgba(255,255,255,.08);
  background:
    radial-gradient(circle at 30% 30%, rgba(255,255,255,.06), transparent 55%),
    linear-gradient(145deg, rgba(10,12,16,.86), rgba(6,8,10,.94));
}
.row.open .body{display:block}
.row.open{border-color:rgba(255,43,43,.22); box-shadow:var(--shadowA), 0 0 18px rgba(255,43,43,.10);}

/* product card (no grid dead space) */
.pcard{
  border:1px solid rgba(255,255,255,.12);
  border-radius:18px;
  padding:14px 14px 12px;
  background:
    radial-gradient(circle at 22% 18%, rgba(255,43,43,.08), transparent 60%),
    radial-gradient(circle at 82% 70%, rgba(201,162,74,.08), transparent 62%),
    rgba(0,0,0,.12);
  position:relative;
  overflow:hidden;
}
.pcard + .pcard{margin-top:12px}
.pcard::after{
  content:"";
  position:absolute;left:10px;right:10px;bottom:-14px;height:30px;
  background: radial-gradient(circle at 50% 0%, rgba(201,162,74,.22), transparent 72%);
  opacity:.50;pointer-events:none;
}
.pTop{display:flex;gap:10px;align-items:flex-start}
.pDia{width:10px;height:10px;border-radius:3px;transform:rotate(45deg);background:var(--pc);box-shadow:0 0 0 1px rgba(255,255,255,.14), 0 0 14px rgba(0,0,0,.35);flex:0 0 auto;margin-top:4px}
.pName{font-weight:980;letter-spacing:.2px;font-size:16px;color:var(--ink);line-height:1.15}
.pNarr{margin-top:10px;color:rgba(255,255,255,.86);line-height:1.65;font-size:14.25px}

/* sub-bubbles */
.subBubbles{margin-top:12px;display:flex;flex-direction:column;gap:10px}
.bubble{
  border:1px solid rgba(255,255,255,.10);
  border-radius:18px;
  background:
    radial-gradient(circle at 22% 18%, rgba(255,43,43,.08), transparent 60%),
    radial-gradient(circle at 82% 70%, rgba(201,162,74,.08), transparent 62%),
    rgba(0,0,0,.12);
  padding:12px 12px 10px;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
  position:relative;
  overflow:hidden;
}
.bubble::after{
  content:"";
  position:absolute;left:10px;right:10px;bottom:-14px;height:30px;
  background: radial-gradient(circle at 50% 0%, rgba(201,162,74,.20), transparent 72%);
  opacity:.45;pointer-events:none;
}
.bubble h4{margin:0 0 6px;font-weight:980;letter-spacing:.15px;font-size:14px;color:var(--ink)}
.bubble p{margin:0;color:rgba(255,255,255,.80);line-height:1.65;display:none;font-size:13.75px}
.bubble.open p{display:block}

/* jump */
.pActions{margin-top:12px;display:flex;justify-content:flex-end}
.pActions .btn{padding:10px 12px;border-radius:999px;min-height:40px;font-size:13px}

/* ===== Dock ===== */
.dock{
  position:fixed;left:50%;
  bottom:max(10px, env(safe-area-inset-bottom));
  transform:translateX(-50%);
  z-index:220;
  width:min(980px,94vw);
  padding:10px 12px;border-radius:22px;
  border:1px solid rgba(255,255,255,.12);
  background:
    radial-gradient(circle at 18% 18%, rgba(255,43,43,.10), transparent 62%),
    radial-gradient(circle at 82% 70%, rgba(90,40,120,.10), transparent 64%),
    linear-gradient(145deg, rgba(10,12,16,.72), rgba(6,8,10,.86));
  backdrop-filter:blur(10px);
  box-shadow:0 18px 60px rgba(0,0,0,.55);
  display:grid;grid-template-columns:repeat(4, minmax(0,1fr));
  gap:10px;
}
.dock .btn{width:100%;padding:10px 10px;border-radius:999px;white-space:nowrap}
@media (max-width:520px){
  :root{--dockH:132px}
  .dock{grid-template-columns:repeat(3, minmax(0,1fr))}
}
</style>
</head>

<body>

<div class="top" aria-label="Top controls">
  <div class="left">
    <a class="btn" id="btnDoor" data-route="/door/" href="/door/">DOOR</a>
    <a class="btn" id="btnHome" data-route="/home/" href="/home/">HOME</a>
    <a class="btn red" id="btnCompass" data-route="/index.html" href="/index.html">COMPASS</a>
  </div>
  <div class="right" aria-label="Controls">
    <div class="seg" role="group" aria-label="Language">
      <button type="button" id="langEN" aria-pressed="true">EN</button>
      <button type="button" id="langZH" aria-pressed="false">中文</button>
      <button type="button" id="langES" aria-pressed="false">ES</button>
    </div>
    <div class="seg" role="group" aria-label="Lane">
      <button type="button" id="lanePlatform" aria-pressed="true">PLATFORM</button>
      <button type="button" id="laneEngineering" aria-pressed="false">ENGINEERING</button>
    </div>
  </div>
</div>

<div class="page">
  <div class="backdrop" aria-hidden="true"></div>

  <section class="header" aria-label="Products header">
    <p class="k" id="hk">PRODUCTS</p>
    <h1 class="t" id="ht">SIGNATURE + STREAMS</h1>
    <p class="s" id="hs"></p>
    <div class="rule" id="rule"></div>

    <div class="stateRow" aria-label="State">
      <div class="statePill" id="laneState">—</div>
      <div class="statePill" id="langState">—</div>
    </div>
  </section>

  <section class="signature" aria-label="Signature Solutions">
    <h2 id="sigH">SIGNATURE SOLUTIONS</h2>
    <div class="sigGrid" id="sigGrid"></div>
  </section>

  <div class="band" id="band">STREAMS (OPEN ONE)</div>
  <div class="list" id="list"></div>
</div>

<nav class="dock" aria-label="Bottom navigation">
  <a class="btn" id="dockExplore" data-route="/explore/" href="/explore/">EXPLORE</a>
  <a class="btn red" id="dockProducts" data-route="/products/" href="/products/">PRODUCTS</a>
  <a class="btn" id="dockLaws" data-route="/laws/" href="/laws/">LAWS</a>
  <a class="btn" id="dockGauges" data-route="/gauges/" href="/gauges/">GAUGES</a>
</nav>

<script>
(function(){
  "use strict";

  // ===== State (gd_* only; pinned informal layer) =====
  var qs=new URLSearchParams(location.search);
  var LS=window.localStorage;

  var lang = qs.get("lang") || LS.getItem("gd_lang") || "en";
  var time = qs.get("time") || LS.getItem("gd_time") || "now";
  var lane = qs.get("lane") || "platform"; // URL-only

  // pinned layer
  var style="informal";
  var depth="explore";

  if(lang!=="en" && lang!=="zh" && lang!=="es") lang="en";
  if(time==="trajectory") time="post";
  if(time!=="origin" && time!=="now" && time!=="post") time="now";
  if(lane!=="platform" && lane!=="engineering") lane="platform";

  try{
    LS.setItem("gd_lang",lang);
    LS.setItem("gd_style","informal");
    LS.setItem("gd_time",time);
    LS.setItem("gd_depth","explore");
  }catch(e){}

  document.documentElement.lang=(lang==="zh")?"zh":(lang==="es")?"es":"en";

  function q(over){
    var p=new URLSearchParams();
    p.set("lang",(over&&over.lang)?over.lang:lang);
    p.set("style","informal");
    p.set("time",(over&&over.time)?over.time:time);
    p.set("depth","explore");
    var L=(over&&over.lane)?over.lane:lane;
    if(L==="platform"||L==="engineering") p.set("lane",L);
    return "?"+p.toString();
  }

  function setPressed(ids, activeId){
    for(var i=0;i<ids.length;i++){
      var el=document.getElementById(ids[i]);
      if(!el) continue;
      el.setAttribute("aria-pressed", ids[i]===activeId ? "true" : "false");
    }
  }

  function pick3(en,zh,es){ return (lang==="zh")?zh:(lang==="es")?es:en; }
  function laneLabel(){
    return (lang==="zh") ? (lane==="engineering"?"工程":"平台")
      : (lang==="es") ? (lane==="engineering"?"INGENIERÍA":"PLATAFORMA")
      : (lane==="engineering"?"ENGINEERING":"PLATFORM");
  }
  function openLabel(){ return (lang==="zh")?"打开":(lang==="es")?"ABRIR":"OPEN"; }

  // ===== ROUTES TABLE (edit here if you rename pages) =====
  var ROUTES = {
    // SIGNATURE
    "sig_side":"/products/signature/on-your-side-ai/",
    "sig_shimmer":"/explore/frontier/shimmer/",
    "sig_lattice":"/explore/frontier/lattice/",
    "sig_dotgrid":"/products/signature/dot-dot-grid/",
    "sig_fte":"/products/signature/fusion-traversal-engine/",

    // GOVERNING
    "gov_policy_engine":"/products/governing/policy-engine/",
    "gov_decision_index":"/products/governing/decision-index/",
    "gov_compliance_grid":"/products/governing/compliance-grid/",
    "gov_public_risk_meter":"/products/governing/public-risk-meter/",

    // ENERGY
    "en_grid_optimization":"/products/energy/grid-optimization/",
    "en_storage_stack":"/products/energy/storage-stack/",
    "en_load_balancer":"/products/energy/load-balancer/",
    "en_resilience_module":"/products/energy/resilience-module/",

    // FINANCE
    "fi_capital_doctrine":"/products/capital-doctrine/",
    "fi_liquidity_model":"/products/finance/liquidity-model/",
    "fi_risk_envelope":"/products/finance/risk-envelope/",

  // ===== Wire routes with pinned query (and lane) =====
  function wireAll(){
    var nodes=document.querySelectorAll("[data-route]");
    for(var i=0;i<nodes.length;i++){
      var el=nodes[i];
      var route=el.getAttribute("data-route")||"";
      if(!route) continue;
      if(route.indexOf("?")!==-1){
        try{
          var u=new URL(route, location.origin);
          var sp=u.searchParams;
          sp.set("lang", lang);
          sp.set("style","informal");
          sp.set("time", time);
          sp.set("depth","explore");
          sp.set("lane", lane);
          el.setAttribute("href", u.pathname + "?" + sp.toString() + (u.hash||""));
        }catch(e){ el.setAttribute("href", route); }
      }else{
        el.setAttribute("href", route + q());
      }
    }
  }

  // ===== Signature render =====
  var sigGrid=document.getElementById("sigGrid");
  function makeBubble(title, text){
    var b=document.createElement("div");
    b.className="bubble";
    b.setAttribute("role","button");
    b.tabIndex=0;

    var h=document.createElement("h4");
    h.textContent=title;

    var p=document.createElement("p");
    p.textContent=text;

    b.appendChild(h);
    b.appendChild(p);

    function act(){ b.classList.toggle("open"); }
    b.addEventListener("click", act, {passive:true});
    b.addEventListener("keydown", function(e){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); act(); }});
    return b;
  }

  function renderSignature(){
    sigGrid.innerHTML="";
    for(var i=0;i<SIGNATURE.length;i++){
      var s=SIGNATURE[i];
      var box=document.createElement("div");
      box.className="sigItem";
      box.style.setProperty("--pc", s.pc);

      var top=document.createElement("div");
      top.className="sigTop";

      var dia=document.createElement("div");
      dia.className="sigDia";
      dia.style.background=s.pc;

      var nm=document.createElement("div");
      nm.className="sigName";
      var packN=(lane==="engineering")?s.n.engineering:s.n.platform;
      nm.textContent=(lang==="zh")?packN.zh:(lang==="es")?(packN.es||packN.en):packN.en;

      top.appendChild(dia);
      top.appendChild(nm);

      var body=document.createElement("div");
      body.className="sigBody";
      var packP=(lane==="engineering")?s.p.engineering:s.p.platform;
      body.textContent=(lang==="zh")?packP.zh:(lang==="es")?(packP.es||packP.en):packP.en;

      var bubbles=document.createElement("div");
      bubbles.className="subBubbles";
      var packC=(lane==="engineering")?s.c.engineering:s.c.platform;
      var packB=(lane==="engineering")?s.b.engineering:s.b.platform;
      var packR=(lane==="engineering")?s.r.engineering:s.r.platform;

      bubbles.appendChild(makeBubble(pick3("Concept","概念","Concepto"), (lang==="zh")?packC.zh:(lang==="es")?(packC.es||packC.en):packC.en));
      bubbles.appendChild(makeBubble(pick3("Build Now","现在建","Construir ahora"), (lang==="zh")?packB.zh:(lang==="es")?(packB.es||packB.en):packB.en));
      bubbles.appendChild(makeBubble(pick3("Roadmap","路线图","Hoja de ruta"), (lang==="zh")?packR.zh:(lang==="es")?(packR.es||packR.en):packR.en));

      var actions=document.createElement("div");
      actions.className="sigActions";
      var a=document.createElement("a");
      a.className="btn red";
      a.setAttribute("data-route", ROUTES[s.id] || "/products/");
      a.textContent=openLabel()+": "+pick3("ENTER","进入","ENTRAR");

      box.appendChild(top);

      box.appendChild(bubbles);
      box.appendChild(actions);

      sigGrid.appendChild(box);
    }
  }

  // ===== Streams accordion =====
  var list=document.getElementById("list");
  var rowRefs=[];
  var openIndex=0;

  function closeAllRows(){
    for(var i=0;i<rowRefs.length;i++){
      rowRefs[i].row.classList.remove("open");
      rowRefs[i].chev.textContent="▸";
    }
  }
  function toggleRow(i){
    var isOpen=rowRefs[i].row.classList.contains("open");
    if(isOpen){
      rowRefs[i].row.classList.remove("open");
      rowRefs[i].chev.textContent="▸";
      return;
    }
    closeAllRows();
    openIndex=i;
    rowRefs[i].row.classList.add("open");
    rowRefs[i].chev.textContent="▾";
  }

  function buildStreamRow(stream, idx){
    var row=document.createElement("div");
    row.className="row";
    row.style.setProperty("--c", stream.c);

    var head=document.createElement("div");
    head.className="head";
    head.setAttribute("role","button");
    head.tabIndex=0;

    var hL=document.createElement("div");
    hL.className="hL";

    var mark=document.createElement("div");
    mark.className="mark";
    mark.style.background=stream.c;

    var tb=document.createElement("div");
    tb.className="titleBlock";

    var title=document.createElement("div");
    title.className="q";

    var subt=document.createElement("div");
    subt.className="subt";

    tb.appendChild(title);
    tb.appendChild(subt);

    hL.appendChild(mark);
    hL.appendChild(tb);

    var chevWrap=document.createElement("div");
    chevWrap.className="chev";
    chevWrap.innerHTML='<span class="chevTxt">▸</span>';

    head.appendChild(hL);
    head.appendChild(chevWrap);

    var body=document.createElement("div");
    body.className="body";

    var cards=[];
    for(var i=0;i<stream.products.length;i++){
      var p=stream.products[i];

      var card=document.createElement("div");
      card.className="pcard";
      card.style.setProperty("--pc", p.pc);

      var top=document.createElement("div");
      top.className="pTop";

      var dia=document.createElement("div");
      dia.className="pDia";
      dia.style.background=p.pc;

      var name=document.createElement("div");
      name.className="pName";

      top.appendChild(dia);
      top.appendChild(name);

      var narr=document.createElement("div");
      narr.className="pNarr";

      var bubbles=document.createElement("div");
      bubbles.className="subBubbles";

      var bConcept=makeBubble(pick3("Concept","概念","Concepto"), "");
      var bBuild=makeBubble(pick3("Build Now","现在建","Construir ahora"), "");
      var bRoad=makeBubble(pick3("Roadmap","路线图","Hoja de ruta"), "");

      bubbles.appendChild(bConcept);
      bubbles.appendChild(bBuild);
      bubbles.appendChild(bRoad);

      var actions=document.createElement("div");
      actions.className="pActions";

      var btn=document.createElement("a");
      btn.className="btn red";
      btn.setAttribute("data-route", ROUTES[p.id] || "/products/");
      btn.textContent=openLabel()+": "+pick3("ENTER","进入","ENTRAR");
      actions.appendChild(btn);

      card.appendChild(top);
      card.appendChild(narr);
      card.appendChild(bubbles);
      card.appendChild(actions);

      body.appendChild(card);

      cards.push({
        name:name,narr:narr,
        cP:bConcept.querySelector("p"),
        bP:bBuild.querySelector("p"),
        rP:bRoad.querySelector("p"),
        btn:btn,
        prod:p
      });
    }

    function onToggle(){ toggleRow(idx); wireAll(); }
    head.addEventListener("click", onToggle, {passive:true});
    head.addEventListener("keydown", function(e){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); onToggle(); }});

    row.appendChild(head);
    row.appendChild(body);
    list.appendChild(row);

    rowRefs.push({
      row:row,
      chev:row.querySelector(".chevTxt"),
      title:title,
      subt:subt,
      cards:cards,
      stream:stream
    });
  }

  function renderStreams(){
    list.innerHTML="";
    rowRefs=[];
    for(var i=0;i<STREAMS.length;i++){
      buildStreamRow(STREAMS[i], i);
    }
    openIndex=0;
    toggleRow(0);
  }

  function applyHeader(){
    var H=(COPY[lang]||COPY.en).header;
    document.getElementById("hk").textContent = pick3("PRODUCTS","产品","PRODUCTOS");
    document.getElementById("ht").textContent = pick3("SIGNATURE + STREAMS","签名方案 + 产品流","FIRMA + STREAMS");
    document.getElementById("hs").textContent = H.hs;
    document.getElementById("rule").textContent = H.rule;

    document.getElementById("sigH").textContent = pick3("SIGNATURE SOLUTIONS","签名方案","SOLUCIONES FIRMA");
    document.getElementById("band").textContent = pick3("STREAMS (OPEN ONE)","产品流（打开一个）","STREAMS (abre uno)");

    document.getElementById("laneState").textContent =
      (lang==="zh") ? ("当前透镜："+laneLabel()) :
      (lang==="es") ? ("Lente actual: "+laneLabel()) :
      ("Current lens: "+laneLabel());

    document.getElementById("langState").textContent =
      (lang==="zh") ? "语言：中文" : (lang==="es") ? "Idioma: ES" : "Lang: EN";

    document.getElementById("btnDoor").textContent = pick3("DOOR","门","PUERTA");
    document.getElementById("btnHome").textContent = pick3("HOME","主页","INICIO");
    document.getElementById("btnCompass").textContent = pick3("COMPASS","指南针","BRÚJULA");

    document.getElementById("dockExplore").textContent = pick3("EXPLORE","探索","EXPLORAR");
    document.getElementById("dockProducts").textContent = pick3("PRODUCTS","产品","PRODUCTOS");
    document.getElementById("dockLaws").textContent = pick3("LAWS","法则","LEYES");
    document.getElementById("dockGauges").textContent = pick3("GAUGES","量规","MEDIDORES");

    document.getElementById("lanePlatform").textContent = pick3("PLATFORM","平台","PLATAFORMA");
    document.getElementById("laneEngineering").textContent = pick3("ENGINEERING","工程","INGENIERÍA");
  }

  function updateStreams(){
    var keep=openIndex;

    for(var i=0;i<rowRefs.length;i++){
      var r=rowRefs[i];
      var s=r.stream;
      r.title.textContent = pick3(s.name.en, s.name.zh, s.name.es);
      r.subt.textContent  = pick3(s.sub.en,  s.sub.zh,  s.sub.es);

      for(var j=0;j<r.cards.length;j++){
        var c=r.cards[j];
        var p=c.prod;

        var packN=(lane==="engineering")?p.n.engineering:p.n.platform;
        var packP=(lane==="engineering")?p.p.engineering:p.p.platform;
        var packC=(lane==="engineering")?p.c.engineering:p.c.platform;
        var packB=(lane==="engineering")?p.b.engineering:p.b.platform;
        var packR=(lane==="engineering")?p.r.engineering:p.r.platform;

        c.name.textContent=(lang==="zh")?packN.zh:(lang==="es")?(packN.es||packN.en):packN.en;
        c.narr.textContent=(lang==="zh")?packP.zh:(lang==="es")?(packP.es||packP.en):packP.en;

        c.cP.textContent=(lang==="zh")?packC.zh:(lang==="es")?(packC.es||packC.en):packC.en;
        c.bP.textContent=(lang==="zh")?packB.zh:(lang==="es")?(packB.es||packB.en):packB.en;
        c.rP.textContent=(lang==="zh")?packR.zh:(lang==="es")?(packR.es||packR.en):packR.en;

        c.btn.textContent=openLabel()+": "+pick3("ENTER","进入","ENTRAR");
      }
    }

    closeAllRows();
    toggleRow(keep);
    wireAll();
  }

  // ===== No reload toggles =====
  function setLang(next){
    if(next!=="en"&&next!=="zh"&&next!=="es") next="en";
    lang=next;
    try{ LS.setItem("gd_lang",lang);}catch(e){}
    history.replaceState({}, "", location.pathname + q({lang:lang}));
    setPressed(["langEN","langZH","langES"], lang==="zh"?"langZH":(lang==="es"?"langES":"langEN"));
    applyHeader();
    renderSignature();
    updateStreams();
  }

  function setLane(next){
    if(next!=="platform"&&next!=="engineering") next="platform";
    lane=next;
    history.replaceState({}, "", location.pathname + q({lane:lane}));
    setPressed(["lanePlatform","laneEngineering"], lane==="engineering"?"laneEngineering":"lanePlatform");
    applyHeader();
    renderSignature();
    updateStreams();
  }

  // bindings
  document.getElementById("langEN").addEventListener("click", function(){ setLang("en"); }, {passive:true});
  document.getElementById("langZH").addEventListener("click", function(){ setLang("zh"); }, {passive:true});
  document.getElementById("langES").addEventListener("click", function(){ setLang("es"); }, {passive:true});

  document.getElementById("lanePlatform").addEventListener("click", function(){ setLane("platform"); }, {passive:true});
  document.getElementById("laneEngineering").addEventListener("click", function(){ setLane("engineering"); }, {passive:true});

  // init pressed
  setPressed(["langEN","langZH","langES"], lang==="zh"?"langZH":(lang==="es"?"langES":"langEN"));
  setPressed(["lanePlatform","laneEngineering"], lane==="engineering"?"laneEngineering":"lanePlatform");

  // init render
  applyHeader();
  renderSignature();
  renderStreams();
  updateStreams();
  wireAll();

})();
</script>

</body>
</html>
