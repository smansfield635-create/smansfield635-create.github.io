<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Diamond Gate Bridge</title>
  <meta name="description" content="Diamond Gate Bridge platform host." />
  <meta name="theme-color" content="#05070b" />
  <style>
    :root{
      --bg:#05070b;
      --bg2:#0b1220;
      --fg:#e8edf5;
      --muted:#9aa7bd;
      --line:rgba(255,255,255,.08);
      --panel:rgba(255,255,255,.04);
      --shadow:0 18px 48px rgba(0,0,0,.36);
      --radius:14px;
      --max:1440px;
      --font:12px system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    }
    *{box-sizing:border-box}
    html,body{
      margin:0;
      padding:0;
      min-height:100%;
      background:
        radial-gradient(circle at 20% 12%, rgba(255,255,255,.05), transparent 22%),
        radial-gradient(circle at 80% 78%, rgba(64,169,255,.08), transparent 24%),
        linear-gradient(180deg,var(--bg) 0%,var(--bg2) 100%);
      color:var(--fg);
      font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
    }
    body{overflow:hidden}
    a{color:inherit;text-decoration:none}

    .shell{
      position:fixed;
      inset:0;
      display:grid;
      grid-template-rows:64px 1fr;
      overflow:hidden;
      isolation:isolate;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:center;
      border-bottom:1px solid var(--line);
      background:rgba(5,7,11,.62);
      backdrop-filter:blur(12px);
      z-index:10;
    }

    .topbar-inner{
      width:min(calc(100% - 24px),var(--max));
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
    }

    .brand{
      display:inline-flex;
      align-items:center;
      gap:12px;
      font-weight:700;
      letter-spacing:.02em;
    }

    .brand-mark{
      width:16px;
      height:16px;
      transform:rotate(45deg);
      border:1px solid rgba(255,255,255,.6);
      background:linear-gradient(180deg,rgba(255,255,255,.22),rgba(255,255,255,.06));
      box-shadow:0 0 14px rgba(255,255,255,.08);
      flex:0 0 auto;
    }

    .nav{
      display:flex;
      align-items:center;
      gap:14px;
      color:var(--muted);
      font-size:.95rem;
    }

    .stage{
      width:min(calc(100% - 24px),var(--max));
      height:calc(100vh - 88px);
      margin:12px auto;
      position:relative;
      border:1px solid var(--line);
      border-radius:24px;
      overflow:hidden;
      background:rgba(255,255,255,.02);
      box-shadow:var(--shadow);
    }

    #app{
      position:absolute;
      inset:0;
      display:grid;
      grid-template-rows:1fr auto;
      min-height:0;
    }

    #world-canvas-wrap{
      position:relative;
      min-height:0;
      overflow:hidden;
    }

    #world-canvas{
      display:block;
      width:100%;
      height:100%;
      background:#05070b;
    }

    #world-hud{
      position:absolute;
      left:12px;
      top:12px;
      max-width:min(520px,calc(100vw - 48px));
      padding:10px 12px;
      border:1px solid var(--line);
      border-radius:10px;
      background:rgba(255,255,255,.04);
      backdrop-filter:blur(6px);
      white-space:pre-wrap;
      line-height:1.35;
      font:var(--font);
      color:var(--fg);
      pointer-events:none;
      box-shadow:var(--shadow);
    }

    #instrument-panel{
      padding:10px 12px;
      border-top:1px solid var(--line);
      background:rgba(255,255,255,.02);
      overflow:auto;
      max-height:22vh;
      color:var(--muted);
      font:var(--font);
    }

    .overlay-note{
      position:absolute;
      right:12px;
      top:12px;
      width:min(320px,calc(100vw - 48px));
      padding:12px 14px;
      border:1px solid var(--line);
      border-radius:12px;
      background:var(--panel);
      backdrop-filter:blur(8px);
      box-shadow:var(--shadow);
      pointer-events:none;
    }

    .overlay-note strong{
      display:block;
      margin-bottom:6px;
      font-size:.95rem;
      letter-spacing:.01em;
    }

    .overlay-note span{
      display:block;
      color:var(--muted);
      line-height:1.45;
      font-size:.9rem;
    }

    @media (max-width:720px){
      .nav{display:none}
      .stage{height:calc(100vh - 80px);margin:8px auto}
      #world-hud,.overlay-note{max-width:calc(100vw - 32px)}
    }

    @media (prefers-reduced-motion:reduce){
      *,*::before,*::after{
        animation:none!important;
        transition:none!important;
        scroll-behavior:auto!important;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="topbar-inner">
        <a class="brand" href="/" aria-label="Diamond Gate Bridge home">
          <span class="brand-mark" aria-hidden="true"></span>
          <span>Diamond Gate Bridge</span>
        </a>
        <nav class="nav" aria-label="Primary">
          <a href="/">Entry</a>
          <a href="/">World</a>
          <a href="/">Runtime</a>
        </nav>
      </div>
    </header>

    <main class="stage">
      <div id="app">
        <div id="world-canvas-wrap">
          <canvas id="world-canvas" aria-label="World canvas"></canvas>
          <div id="world-hud">WORLD HOST
projection=flat
elapsedSeconds=0
status=boot_pending</div>
          <div class="overlay-note" aria-hidden="true">
            <strong>Platform host active</strong>
            <span>HTML host shell aligned to <code>/index.js</code>, canvas mount, HUD, and instrument panel IDs.</span>
          </div>
        </div>
        <div id="instrument-panel">instrument boot path intentionally excluded</div>
      </div>
    </main>
  </div>

  <script type="module" src="./index.js"></script>
</body>
</html>
