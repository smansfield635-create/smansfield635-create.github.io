<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Gauges — Live Diagnostic</title>

<style>
body{
  margin:0;
  background:#020617;
  color:#fff;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
}

.page{
  padding:16px;
  display:flex;
  flex-direction:column;
  gap:14px;
}

.card{
  border:1px solid rgba(255,255,255,.08);
  border-radius:14px;
  padding:12px;
  background:rgba(0,0,0,.25);
}

.title{
  font-weight:900;
  margin-bottom:8px;
  letter-spacing:.08em;
}

.row{
  display:flex;
  justify-content:space-between;
  padding:8px 0;
  border-bottom:1px solid rgba(255,255,255,.06);
}
.row:last-child{border-bottom:0}

.left{
  display:flex;
  gap:10px;
  align-items:center;
}

.diamond{
  width:10px;
  height:10px;
  transform:rotate(45deg);
}

/* STATUS COLORS */
.pass{ background:#22c55e }
.warn{ background:#facc15 }
.fail{ background:#ef4444 }
.idle{ background:#6b7280 }

.value{
  opacity:.85;
  font-weight:700;
}

.statusBar{
  position:sticky;
  top:0;
  background:#020617;
  padding:10px 0;
  font-weight:900;
}
</style>
</head>

<body>

<div class="page">

<div class="statusBar" id="statusBar">STATE: —</div>

<div class="card">
<div class="title">RUNTIME</div>
<div id="runtime"></div>
</div>

<div class="card">
<div class="title">MOTION</div>
<div id="motion"></div>
</div>

<div class="card">
<div class="title">INSTRUMENT</div>
<div id="instrument"></div>
</div>

<div class="card">
<div class="title">WORLD</div>
<div id="world"></div>
</div>

<div class="card">
<div class="title">EMISSION</div>
<div id="emission"></div>
</div>

<div class="card">
<div class="title">PLACEMENT</div>
<div id="placement"></div>
</div>

<div class="card">
<div class="title">FAILURE</div>
<div id="failure"></div>
</div>

</div>

<script>
const KEY = "cte_runtime_v3";

function cls(v){
  if(v === true) return "pass";
  if(v === false) return "fail";
  if(v === null || v === undefined) return "idle";
  return "warn";
}

function row(k,v){
  return `
    <div class="row">
      <div class="left">
        <div class="diamond ${cls(v)}"></div>
        <div>${k}</div>
      </div>
      <div class="value">${v ?? "—"}</div>
    </div>
  `;
}

function render(d){
  if(!d){
    document.getElementById("statusBar").textContent="STATE: NO DATA";
    return;
  }

  const stale = Date.now() - new Date(d.timestamp).getTime() > 2000;

  document.getElementById("statusBar").textContent =
    `STATE: ${stale?"STALE":"LIVE"} • ${d.phase}`;

  // ===== RUNTIME =====
  document.getElementById("runtime").innerHTML = `
    ${row("phase", d.phase)}
    ${row("mode", d.mode)}
    ${row("fps", Math.round(d.fps))}
    ${row("dtMs", Math.round(d.dtMs))}
  `;

  // ===== MOTION =====
  const m = d.control?.motionState || {};
  document.getElementById("motion").innerHTML = `
    ${row("yaw", m.yaw)}
    ${row("pitch", m.pitch)}
    ${row("yawVelocity", m.yawVelocity)}
    ${row("pitchVelocity", m.pitchVelocity)}
    ${row("orbitPhase", m.orbitPhase)}
  `;

  // ===== INSTRUMENT =====
  const i = d.instrument || {};
  document.getElementById("instrument").innerHTML = `
    ${row("gate", i.gate)}
    ${row("trajectory", i.trajectoryClass)}
    ${row("coherence", i.coherence)}
  `;

  // ===== WORLD =====
  const w = i.world || {};
  document.getElementById("world").innerHTML = `
    ${row("phase", w.phase)}
    ${row("stability", w.stabilityClass)}
  `;

  // ===== EMISSION =====
  const e = d.emissionReceipt || {};
  document.getElementById("emission").innerHTML = `
    ${row("emitted", e.emissionEmitted)}
    ${row("frontVisible", e.emissionFrontVisible)}
    ${row("pass", e.emissionPass)}
  `;

  // ===== PLACEMENT =====
  const p = d.placementReceipt || {};
  document.getElementById("placement").innerHTML = `
    ${row("placed", p.placementPlaced)}
    ${row("collisions", p.markerCollisionCount)}
    ${row("pass", p.placementPass)}
  `;

  // ===== FAILURE =====
  const f = d.failure || {};
  document.getElementById("failure").innerHTML = `
    ${row("error", f.message || "none")}
    ${row("pass", d.verification?.pass)}
  `;
}

function tick(){
  try{
    const raw = localStorage.getItem(KEY);
    render(raw ? JSON.parse(raw) : null);
  }catch(e){}
}

setInterval(tick, 250);
tick();
</script>

</body>
</html>
