<!DOCTYPE html>
<!-- TNT — /index.html (COMPASS VISUAL UPGRADE SAFE BUILD) -->
<html lang="en">

<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>

<title>Compass · DiamondGateBridge</title>

<link rel="stylesheet" href="/assets/ui.css"/>
<link rel="stylesheet" href="/assets/branch.css"/>

<script defer src="/assets/instruments.js"></script>
<script defer src="/assets/bg-engine.js"></script>
<script defer src="/assets/dragon-anatomy.js"></script>

<style>

/* =========================
STAGE
========================= */

body{
margin:0;
overflow:hidden;
}

.stage{
position:relative;
width:min(1100px,92vw);
height:min(1100px,85vh);
margin:90px auto 0;
pointer-events:none;
}

/* =========================
COMPASS DIAL
========================= */

.dial{

position:absolute;
left:50%;
top:50%;

transform:translate(-50%,-50%);

width:min(880px,88vw);
height:min(880px,88vw);

border-radius:50%;

z-index:2;

/* translucent glass */

background:

radial-gradient(circle at 30% 30%,rgba(255,255,255,.08),transparent 60%),

radial-gradient(circle at 60% 70%,rgba(255,120,120,.08),transparent 60%),

linear-gradient(160deg,rgba(10,12,16,.55),rgba(6,8,10,.65));

box-shadow:

0 60px 200px rgba(0,0,0,.55),

inset 0 0 0 2px rgba(255,255,255,.06),

inset 0 0 60px rgba(0,0,0,.45);

}

/* =========================
COMPASS RINGS
========================= */

.dial::before{

content:"";
position:absolute;
inset:0;

border-radius:50%;

background:

radial-gradient(circle at center,transparent 0%,transparent 38%,rgba(212,175,55,.08) 39%,transparent 40%),

radial-gradient(circle at center,transparent 0%,transparent 54%,rgba(212,175,55,.08) 55%,transparent 56%),

radial-gradient(circle at center,transparent 0%,transparent 70%,rgba(212,175,55,.08) 71%,transparent 72%);

}

/* =========================
RADIAL COMPASS TICKS
========================= */

.dial::after{

content:"";
position:absolute;
inset:0;
border-radius:50%;

background:
repeating-conic-gradient(

rgba(212,175,55,.25) 0deg,
rgba(212,175,55,.25) 1deg,

transparent 1deg,
transparent 15deg

);

mask:
radial-gradient(circle at center,transparent 0 65%,#000 67%);

opacity:.35;

}

/* =========================
GEM NODES
========================= */

.node{

position:absolute;

left:50%;
top:50%;

transform:translate(-50%,-50%) rotate(45deg);

cursor:pointer;
pointer-events:auto;

border-radius:22px;

border:1px solid rgba(255,255,255,.18);

transition:all .18s ease;

background:

radial-gradient(circle at 20% 20%,rgba(255,255,255,.25),transparent 45%),

linear-gradient(160deg,#0b0f16,#050608);

box-shadow:

0 40px 120px rgba(0,0,0,.9),

inset 0 2px 0 rgba(255,255,255,.15);

}

/* honeycomb fractal pattern */

.node::before{

content:"";
position:absolute;
inset:0;
opacity:.18;

background:

repeating-linear-gradient(
60deg,
rgba(212,175,55,.15) 0 1px,
transparent 1px 10px),

repeating-linear-gradient(
-60deg,
rgba(212,175,55,.12) 0 1px,
transparent 1px 10px);

mask:
radial-gradient(circle at center,transparent 0 70%,#000 80%);

}

/* highlight streak */

.node::after{

content:"";
position:absolute;

left:12%;
right:12%;
top:8%;

height:30%;

border-radius:999px;

background:
linear-gradient(
to bottom,
rgba(255,255,255,.25),
rgba(255,255,255,0)
);

transform:rotate(-12deg);

}

/* sizes */

.core{
width:200px;
height:200px;
z-index:10;
}

.l1{
width:150px;
height:150px;
}

/* =========================
TEXT
========================= */

.inner{

display:flex;
align-items:center;
justify-content:center;

width:100%;
height:100%;

transform:rotate(-45deg);

color:white;

font-weight:900;
letter-spacing:.6px;

text-shadow:0 0 16px rgba(0,0,0,.6);

}

/* =========================
CORNERS
========================= */

.corner{

position:fixed;
bottom:20px;
z-index:300;

}

.corner.left{left:20px}
.corner.right{right:20px}

.corner button{

background:#050608;
color:white;

border:1px solid rgba(255,255,255,.15);

padding:10px 14px;
border-radius:10px;

cursor:pointer;

}

</style>
</head>

<body>

<div class="stage" id="stage">

<div class="dial"></div>

</div>

<div class="corner left">
<button id="btnExit">EXIT</button>
</div>

<div class="corner right">
<button id="btnHub">HUB</button>
</div>

<script>

(function(){

"use strict";

/* =========================
ENGINE MOUNT
(unchanged animation)
========================= */

function mountEngines(){

if(window.GD_BG && !window.__BG_ACTIVE){

window.__BG_ACTIVE=true;

window.GD_BG.mount({

fps:30,
dpr_cap:1.5,
moon_radius:.065,
crater_count:18

})

}

if(window.GD_DRAGON && !window.__DRAGON_ACTIVE){

window.__DRAGON_ACTIVE=true;

window.GD_DRAGON.mount({

speed:.18,
girth:3.2,
segments:120

})

}

}

window.addEventListener("load",mountEngines)

/* =========================
COMPASS LAYOUT
========================= */

const stage=document.getElementById("stage")

const nodes=[

{label:"CORE",cls:"core",x:0,y:0,href:"/index-core/index.html"},

{label:"LAWS",cls:"l1",x:0,y:-180,href:"/laws/"},

{label:"ENERGY",cls:"l1",x:180,y:0,href:"/explore/frontier/energy/"},

{label:"FINANCE",cls:"l1",x:0,y:180,href:"/finance/"},

{label:"GOVERNANCE",cls:"l1",x:-180,y:0,href:"/governance/"}

]

function build(){

nodes.forEach(n=>{

const d=document.createElement("div")
d.className="node "+n.cls

const inner=document.createElement("div")
inner.className="inner"
inner.textContent=n.label

d.appendChild(inner)

d.style.left=`calc(50% + ${n.x}px)`
d.style.top=`calc(50% + ${n.y}px)`

d.onclick=()=>location.href=n.href

stage.appendChild(d)

})

}

build()

/* =========================
NAV
========================= */

document.getElementById("btnExit").onclick=()=>location.href="/door/"
document.getElementById("btnHub").onclick=()=>location.href="/home/"

})()

</script>

</body>
</html>
