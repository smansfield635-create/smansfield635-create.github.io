<!doctype html>
<!-- TNT — /research/index.html
     RESEARCH HUB · DUAL LENS (NARRATIVE / ENGINEERING)
     GOAL:
       - Lead from the front with the 100-customer dataset (pedestal)
       - Keep everything else as parallel correlative context
       - SAME page supports two lenses without losing density
     LENS RULE:
       - Narrative lens = homeowner-readable, TED clarity
       - Engineering lens = constraint + dataset language
       - BOTH lenses apply to the two preface sections:
           (1) Primary Dataset pedestal
           (2) Engineering Context
       - The lower framework cards remain neutral (single voice)
     CONSTRAINTS:
       - English only
       - No logos, no images, no implied partnerships
       - No URLs displayed in body text
       - No star icons, no ranking language
       - Canon state carry: gd_lang/gd_style/gd_time/gd_depth ONLY (no new gd_* keys)
       - No modals/overlays; no inline onclick; addEventListener only
       - Uses /assets/ui.css + /assets/branch.css + /assets/instruments.js
-->

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Research</title>

<link rel="stylesheet" href="/assets/ui.css"/>
<link rel="stylesheet" href="/assets/branch.css"/>
<script defer src="/assets/instruments.js"></script>

<style>
a{color:inherit;text-decoration:none}
body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:#fff}
body::before,body::after{pointer-events:none!important}

:root{
  --dockH:112px;
  --stroke:rgba(255,255,255,.12);
  --ink:rgba(255,255,255,.94);
  --mut:rgba(255,255,255,.82);
  --shadowA:0 28px 100px rgba(0,0,0,.65);
  --crimson:rgba(120,0,22,.30);
  --festival:rgba(255,43,43,.14);
  --gold:rgba(201,162,74,.18);
}

.page{
  width:min(980px,94vw);
  margin:0 auto;
  padding:110px 0 calc(var(--dockH) + 24px);
  display:flex;
  flex-direction:column;
  gap:18px;
  position:relative;
  z-index:10;
}

/* TOP BUTTONS */
.top{
  position:fixed;top:16px;left:0;right:0;
  padding:0 16px;
  display:flex;justify-content:space-between;align-items:center;
  gap:12px;
  z-index:240;
  pointer-events:none;
}
.top .left,.top .right{display:flex;gap:10px;flex-wrap:wrap;pointer-events:auto}
.btn{
  display:inline-flex;align-items:center;justify-content:center;
  padding:10px 12px;min-height:44px;border-radius:16px;
  border:1px solid rgba(255,255,255,.14);
  background:rgba(0,0,0,.22);
  color:var(--ink);
  font-weight:950;font-size:14px;letter-spacing:.2px;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}

/* LENS TOGGLE */
.lensRow{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  justify-content:flex-end;
}
.pill{
  padding:10px 14px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.14);
  background:
    radial-gradient(circle at 50% 120%, rgba(201,162,74,.14), transparent 64%),
    rgba(0,0,0,.18);
  color:var(--ink);
  font-weight:950;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}
.pill.active{
  border-color:rgba(255,255,255,.32);
  box-shadow:0 0 18px rgba(255,43,43,.16);
}

/* PREFACE SECTIONS */
.section{
  border:1px solid var(--stroke);
  border-radius:26px;
  padding:22px;
  background:
    radial-gradient(circle at 18% 22%, var(--crimson), transparent 72%),
    radial-gradient(circle at 70% 92%, var(--festival), transparent 62%),
    linear-gradient(160deg, rgba(0,0,0,.22), rgba(0,0,0,.12));
  box-shadow:var(--shadowA);
}
.k{font-size:11px;letter-spacing:4px;text-transform:uppercase;color:var(--mut);margin:0 0 8px}
.h1{font-weight:980;font-size:28px;margin:0 0 12px;color:var(--ink)}
.p{line-height:1.75;color:var(--mut);font-size:15.25px;margin:0 0 12px}
.metric{
  margin-top:14px;
  padding:14px;
  border:1px solid rgba(255,255,255,.10);
  border-radius:18px;
  background:rgba(0,0,0,.18);
  font-size:14px;
  line-height:1.6;
  color:var(--mut);
}
.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px;justify-content:flex-end}
.actions .btn{border-radius:999px;padding:10px 14px}

/* FRAMEWORK CARDS */
.stack{display:flex;flex-direction:column;gap:12px}
.card{
  border:1px solid rgba(255,255,255,.10);
  border-radius:22px;
  overflow:hidden;
  background:rgba(0,0,0,.18);
  box-shadow:var(--shadowA);
}
.head{
  padding:16px;
  cursor:pointer;
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
}
.title{font-weight:950;font-size:16.5px}
.sub{margin-top:6px;font-size:13.25px;color:rgba(255,255,255,.82)}
.body{display:none;padding:16px;border-top:1px solid rgba(255,255,255,.08)}
.card.open .body{display:block}
.body p{margin:0 0 12px;line-height:1.7;color:rgba(255,255,255,.84)}

/* Dock */
.dock{
  position:fixed;left:50%;
  bottom:max(12px, env(safe-area-inset-bottom));
  transform:translateX(-50%);
  width:min(980px,94vw);
  padding:12px;
  border-radius:22px;
  border:1px solid var(--stroke);
  background:rgba(0,0,0,.22);
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  z-index:220;
}
.dock .btn{width:100%;text-align:center;border-radius:999px;padding:10px}
@media (max-width:520px){
  :root{--dockH:132px}
  .dock{grid-template-columns:repeat(3,1fr)}
  .h1{font-size:26px}
}
</style>
</head>

<body>

<div class="top" aria-label="Top controls">
  <div class="left">
    <a class="btn" id="btnIndex" href="/index.html">INDEX</a>
    <a class="btn" id="btnIndustry" href="/research/industry-context/">INDUSTRY BENCHMARKS</a>
    <a class="btn" id="btnEvidence" href="/research/testimonials/">FIELD STUDY EVIDENCE</a>
  </div>
  <div class="right">
    <div class="lensRow" aria-label="Lens toggle">
      <button class="pill active" id="pillNarrative" type="button">NARRATIVE</button>
      <button class="pill" id="pillEngineering" type="button">ENGINEERING</button>
    </div>
  </div>
</div>

<div class="page">

  <!-- PRIMARY DATASET PEDESTAL -->
  <section class="section" aria-label="Primary dataset">
    <p class="k">PRIMARY DATASET</p>
    <h1 class="h1" id="hDataset">100-Customer Field Study (Rainwater Management)</h1>

    <p class="p" id="pDataset1"></p>
    <p class="p" id="pDataset2"></p>

    <div class="metric" id="metricBox"></div>

    <div class="actions">
      <a class="btn" id="goEvidence" href="/research/testimonials/">OPEN FIELD EVIDENCE</a>
    </div>
  </section>

  <!-- PARALLEL CORRELATIVE CONTEXT -->
  <section class="section" aria-label="Engineering context">
    <p class="k">PARALLEL CORRELATIVE CONTEXT</p>
    <h1 class="h1" id="hContext">Engineering Context (Parallel, Not Comparative)</h1>

    <p class="p" id="pContext1"></p>
    <p class="p" id="pContext2"></p>

    <div class="actions">
      <a class="btn" id="goIndustry" href="/research/industry-context/">OPEN INDUSTRY BENCHMARKS</a>
    </div>
  </section>

  <!-- STRUCTURAL FRAMEWORK (NEUTRAL) -->
  <div class="stack" id="stack"></div>

</div>

<nav class="dock" aria-label="Bottom navigation">
  <a class="btn" id="dockIndex" href="/index.html">INDEX</a>
  <a class="btn" id="dockExplore" href="/explore/">EXPLORE</a>
  <a class="btn" id="dockProducts" href="/products/">PRODUCTS</a>
  <a class="btn" id="dockLaws" href="/laws/">LAWS</a>
</nav>

<script>
(function(){
  "use strict";

  // Canon state carry (gd_* only)
  var qs=new URLSearchParams(location.search);
  var lang  = qs.get("lang")  || localStorage.getItem("gd_lang")  || "en";
  var style = qs.get("style") || localStorage.getItem("gd_style") || "informal";
  var time  = qs.get("time")  || localStorage.getItem("gd_time")  || "now";
  var depth = qs.get("depth") || localStorage.getItem("gd_depth") || "explore";

  if(lang!=="en" && lang!=="zh" && lang!=="es") lang="en";
  if(style!=="informal" && style!=="formal") style="informal";
  if(time!=="origin" && time!=="now" && time!=="post") time="now";
  if(depth!=="explore" && depth!=="learn") depth="explore";

  try{
    localStorage.setItem("gd_lang",lang);
    localStorage.setItem("gd_style",style);
    localStorage.setItem("gd_time",time);
    localStorage.setItem("gd_depth",depth);
  }catch(e){}

  function q(){
    return "?lang="+encodeURIComponent(lang)+"&style="+encodeURIComponent(style)+"&time="+encodeURIComponent(time)+"&depth="+encodeURIComponent(depth);
  }
  function wire(id,path){
    var el=document.getElementById(id);
    if(el) el.href = path + q();
  }

  // top
  wire("btnIndex","/index.html");
  wire("btnIndustry","/research/industry-context/");
  wire("btnEvidence","/research/testimonials/");
  wire("goEvidence","/research/testimonials/");
  wire("goIndustry","/research/industry-context/");

  // dock
  wire("dockIndex","/index.html");
  wire("dockExplore","/explore/");
  wire("dockProducts","/products/");
  wire("dockLaws","/laws/");

  // Lens copy packs
  var COPY = {
    narrative:{
      dataset1:
        "This research layer leads with the only dataset I can fully stand behind: my first 100 completed residential rainwater management installations. The objective is not promotion. The objective is pattern clarity under real physical constraint.",
      dataset2:
        "Across homes with different rooflines, debris loads, fascia conditions, and foundation risk profiles, the same decision and outcome themes repeated. The evidence layer below contains the anchors: references, review-present subset, claim language mapping, and warranty mapping.",
      metric:
        "<div><strong>Dataset Size:</strong> 100 installations</div>"+
        "<div><strong>Observed Decision Pattern:</strong> full-system adoption or deferred timing</div>"+
        "<div><strong>Observed Partial Substitutions:</strong> none within the dataset window</div>"+
        "<div><strong>Primary Limiting Variable:</strong> financial timing (observed), not structural objection</div>",
      context1:
        "The broader industry context is not here to compete with the dataset. It is here to support correlation: across the building envelope, engineering-led systems tend to stabilize when they reduce failure modes and standardize deployment.",
      context2:
        "That is why industry benchmarks are tracked separately: HVAC, roofing, insulation, fenestration, plumbing, and rainwater management all show similar convergence patterns when constraints dominate. This page keeps them parallel, not comparative."
    },
    engineering:{
      dataset1:
        "Primary dataset: first 100 completed residential installations executed under repeatable field conditions. Objective: document convergence patterns under physical constraints (gravity, debris load, attachment interfaces, termination geometry, storm variance).",
      dataset2:
        "Anchor surfaces: reference index, review-present subset, claim-bucket mapping, warranty-bucket mapping. Study posture: descriptive only. No ranking. No competitor comparison. No corporate representations beyond observed dataset boundaries.",
      metric:
        "<div><strong>Dataset Size:</strong> 100 installations</div>"+
        "<div><strong>Outcome Structure:</strong> adoption vs deferral within cohort window</div>"+
        "<div><strong>Alternative Configurations Observed:</strong> none within cohort window</div>"+
        "<div><strong>Primary Constraint Driver:</strong> timing of financing (observed variable)</div>",
      context1:
        "Parallel correlative context: building-envelope verticals exhibit convergence under constraint. Benchmarks are used to normalize language and classify engineered system evolution (bottlenecked design space is a known artifact of constrained solutions).",
      context2:
        "Industry Benchmarks remain separate by design to prevent category mixing: benchmarks are references; the 100-installation cohort is deployed evidence. Correlation is allowed; comparison is excluded."
    }
  };

  var lens="narrative";
  var pillNarr=document.getElementById("pillNarrative");
  var pillEng=document.getElementById("pillEngineering");

  function applyLens(){
    pillNarr.classList.toggle("active", lens==="narrative");
    pillEng.classList.toggle("active", lens==="engineering");

    document.getElementById("pDataset1").textContent = COPY[lens].dataset1;
    document.getElementById("pDataset2").textContent = COPY[lens].dataset2;
    document.getElementById("metricBox").innerHTML = COPY[lens].metric;

    document.getElementById("pContext1").textContent = COPY[lens].context1;
    document.getElementById("pContext2").textContent = COPY[lens].context2;
  }

  pillNarr.addEventListener("click", function(){ lens="narrative"; applyLens(); });
  pillEng.addEventListener("click", function(){ lens="engineering"; applyLens(); });

  applyLens();

  // Neutral framework accordion (single voice)
  var SECTIONS = [
    {
      title:"Field Evidence Structure",
      sub:"References, review-present subset, claim alignment, warranty correlation.",
      body:"The evidence layer is intentionally dense. It holds the anchors that back the dataset: (1) reference index (contact on file), (2) review-present subset, (3) claim language buckets, (4) warranty correlation buckets."
    },
    {
      title:"Method Boundary",
      sub:"Descriptive observation only.",
      body:"This research hub does not rank brands, compare competitors, or publish proprietary performance metrics. It documents observed patterns within a bounded cohort window."
    },
    {
      title:"Expansion Protocol",
      sub:"Additional cohorts or systems can be added later.",
      body:"If future datasets are added, they must follow identical evidence rules (reference index, review subset, claim buckets, warranty buckets) to preserve comparability."
    }
  ];

  var stack=document.getElementById("stack");

  function closeAll(){
    stack.querySelectorAll(".card").forEach(function(c){
      c.classList.remove("open");
      c.querySelector(".chev").textContent="▸";
    });
  }

  SECTIONS.forEach(function(s,i){
    var card=document.createElement("div");
    card.className="card";

    var head=document.createElement("div");
    head.className="head";
    head.innerHTML='<div><div class="title">'+s.title+'</div><div class="sub">'+s.sub+'</div></div><div class="chev">▸</div>';

    var body=document.createElement("div");
    body.className="body";
    body.innerHTML='<p>'+s.body+'</p>';

    head.addEventListener("click", function(){
      var openNow=!card.classList.contains("open");
      closeAll();
      if(openNow){
        card.classList.add("open");
        head.querySelector(".chev").textContent="▾";
      }
    });

    card.appendChild(head);
    card.appendChild(body);
    stack.appendChild(card);

    if(i===0){
      card.classList.add("open");
      head.querySelector(".chev").textContent="▾";
    }
  });

})();
</script>

</body>
</html>
