<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Diamond Gate Bridge — Harbor Core</title>
  <meta name="description" content="Harbor Core runtime." />
  <style>
    :root{
      --bg0:#05070b;
      --bg1:#0a1120;
      --text:#f5f7fb;
      --line:rgba(255,255,255,.12);
      --safe-top:max(12px,env(safe-area-inset-top));
      --safe-right:max(12px,env(safe-area-inset-right));
      --safe-bottom:max(12px,env(safe-area-inset-bottom));
      --safe-left:max(12px,env(safe-area-inset-left));
      --font:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
    }

    *{box-sizing:border-box}

    html,body{
      margin:0;
      padding:0;
      width:100%;
      height:100%;
      overflow:hidden;
      background:
        radial-gradient(circle at 50% 0%,rgba(86,118,184,.16),transparent 34%),
        linear-gradient(180deg,#091223 0%,#05070b 100%);
      color:var(--text);
      font-family:var(--font);
    }

    .runtime-shell{
      position:relative;
      width:100vw;
      height:100dvh;
      overflow:hidden;
      background:
        radial-gradient(circle at 50% 0%,rgba(86,118,184,.16),transparent 34%),
        linear-gradient(180deg,#091223 0%,#05070b 100%);
    }

    #scene{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      display:block;
      z-index:1;
      touch-action:none;
    }

    .topbar{
      position:absolute;
      top:var(--safe-top);
      left:var(--safe-left);
      right:var(--safe-right);
      z-index:3;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      pointer-events:none;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:38px;
      padding:0 14px;
      border-radius:999px;
      border:1px solid var(--line);
      background:rgba(8,14,26,.56);
      box-shadow:0 14px 34px rgba(0,0,0,.28);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
      pointer-events:auto;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      font-weight:700;
      letter-spacing:.08em;
      text-transform:uppercase;
    }

    .brand-mark{
      width:34px;
      height:34px;
      border-radius:50%;
      background:
        radial-gradient(circle at 34% 26%,rgba(255,255,255,.92),rgba(255,255,255,.18) 34%,transparent 35%),
        linear-gradient(180deg,#f1f7ff 0%,#adc8f3 42%,#1b3158 72%,#0d1830 100%);
      border:1px solid rgba(255,255,255,.24);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.82),0 8px 18px rgba(0,0,0,.28);
      flex:0 0 auto;
    }

    .hint{
      position:absolute;
      left:50%;
      bottom:max(18px,env(safe-area-inset-bottom));
      transform:translateX(-50%);
      z-index:3;
      padding:10px 14px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.10);
      background:rgba(8,14,26,.42);
      color:rgba(245,247,251,.82);
      font-size:12px;
      line-height:1;
      letter-spacing:.06em;
      text-transform:uppercase;
      backdrop-filter:blur(8px);
      -webkit-backdrop-filter:blur(8px);
      pointer-events:none;
    }
  </style>
</head>
<body>
  <div class="runtime-shell">
    <div class="topbar">
      <div class="pill brand">
        <span class="brand-mark" aria-hidden="true"></span>
        <span>Diamond Gate Bridge</span>
      </div>
      <div class="pill">Harbor Core</div>
    </div>

    <canvas id="scene" aria-label="Harbor Core Scene"></canvas>
    <div class="hint">Tap center to raise / lower compass · drag to tilt</div>
  </div>

  <script src="variant/background_renderer.js"></script>
  <script src="variant/compass_renderer.js"></script>
  <script>
    (function(){
      "use strict";

      const canvas=document.getElementById("scene");
      const ctx=canvas.getContext("2d");
      const BG=window.VARIANT_BACKGROUND_RENDERER;
      const COMPASS=window.VARIANT_COMPASS_RENDERER;

      if(!canvas||!ctx||!BG||!COMPASS){
        console.error("HARBOR_CORE_BOOT_v2 missing required modules.");
        return;
      }

      const state={
        tick:0,
        w:0,
        h:0,
        dpr:1,
        dragging:false,
        lastX:0,
        lastY:0,
        dragX:0,
        dragY:0,
        velX:0,
        velY:0,
        compassVisible:true,
        background:BG.createState()
      };

      function clamp(v,min,max){
        return Math.max(min,Math.min(max,v));
      }

      function horizonY(){
        return state.h*0.62;
      }

      function triggerRect(){
        const w=Math.min(148,state.w*0.34);
        const h=40;
        return{
          x:(state.w*0.5)-(w*0.5),
          y:horizonY()-28,
          w:w,
          h:h
        };
      }

      function resize(){
        state.dpr=Math.max(1,window.devicePixelRatio||1);
        state.w=window.innerWidth;
        state.h=window.innerHeight;
        canvas.width=Math.floor(state.w*state.dpr);
        canvas.height=Math.floor(state.h*state.dpr);
        canvas.style.width=state.w+"px";
        canvas.style.height=state.h+"px";
        ctx.setTransform(1,0,0,1,0,0);
        ctx.scale(state.dpr,state.dpr);
        BG.resizeState(state.background,state.w,state.h);
      }

      function pointFromClient(clientX,clientY){
        const rect=canvas.getBoundingClientRect();
        return{
          x:clientX-rect.left,
          y:clientY-rect.top
        };
      }

      function pointInRect(x,y,rect){
        return x>=rect.x&&x<=rect.x+rect.w&&y>=rect.y&&y<=rect.y+rect.h;
      }

      function pointerDown(x,y){
        const rect=triggerRect();
        if(pointInRect(x,y,rect)){
          state.compassVisible=!state.compassVisible;
          return;
        }
        state.dragging=true;
        state.lastX=x;
        state.lastY=y;
      }

      function pointerMove(x,y){
        if(!state.dragging)return;
        const dx=x-state.lastX;
        const dy=y-state.lastY;
        state.lastX=x;
        state.lastY=y;
        state.velX+=dx*0.0022;
        state.velY+=dy*0.0016;
      }

      function pointerUp(){
        state.dragging=false;
      }

      function bindInput(){
        canvas.addEventListener("pointerdown",function(e){
          const p=pointFromClient(e.clientX,e.clientY);
          pointerDown(p.x,p.y);
        });

        canvas.addEventListener("pointermove",function(e){
          const p=pointFromClient(e.clientX,e.clientY);
          pointerMove(p.x,p.y);
        });

        canvas.addEventListener("pointerup",pointerUp);
        canvas.addEventListener("pointerleave",pointerUp);

        canvas.addEventListener("touchstart",function(e){
          if(!e.changedTouches||!e.changedTouches.length)return;
          const t=e.changedTouches[0];
          const p=pointFromClient(t.clientX,t.clientY);
          pointerDown(p.x,p.y);
          e.preventDefault();
        },{passive:false});

        canvas.addEventListener("touchmove",function(e){
          if(!e.changedTouches||!e.changedTouches.length)return;
          const t=e.changedTouches[0];
          const p=pointFromClient(t.clientX,t.clientY);
          pointerMove(p.x,p.y);
          e.preventDefault();
        },{passive:false});

        canvas.addEventListener("touchend",function(e){
          pointerUp();
          e.preventDefault();
        },{passive:false});
      }

      function drawTrigger(){
        const rect=triggerRect();

        ctx.save();
        ctx.globalAlpha=0.92;
        ctx.fillStyle="rgba(18,10,14,0.74)";
        ctx.strokeStyle="rgba(255,222,168,0.82)";
        ctx.lineWidth=1.2;
        BG.roundedRectPath(ctx,rect.x,rect.y,rect.w,rect.h,18);
        ctx.fill();
        ctx.stroke();

        ctx.fillStyle="rgba(255,238,200,0.96)";
        ctx.font='700 12px system-ui,Segoe UI,Roboto,sans-serif';
        ctx.textAlign="center";
        ctx.textBaseline="middle";
        ctx.fillText(state.compassVisible?"LOWER COMPASS":"RAISE COMPASS",rect.x+(rect.w*0.5),rect.y+(rect.h*0.5)+0.5);
        ctx.restore();

        ctx.save();
        ctx.globalAlpha=0.76;
        ctx.fillStyle="rgba(255,232,190,0.96)";
        ctx.font='700 12px system-ui,Segoe UI,Roboto,sans-serif';
        ctx.textAlign="center";
        ctx.textBaseline="middle";
        ctx.fillText("HARBOR CORE",state.w*0.5+(state.dragX*8),rect.y+rect.h+18);
        ctx.restore();
      }

      function animate(){
        state.tick++;
        state.dragX+=state.velX;
        state.dragY+=state.velY;
        state.velX*=state.dragging?0.88:0.94;
        state.velY*=state.dragging?0.88:0.94;
        state.dragX=clamp(state.dragX,-1.2,1.2);
        state.dragY=clamp(state.dragY,-0.8,0.8);
        state.velX=clamp(state.velX,-0.12,0.12);
        state.velY=clamp(state.velY,-0.12,0.12);
      }

      function draw(){
        ctx.clearRect(0,0,state.w,state.h);

        BG.drawSky(ctx,state.w,state.h,state.tick);
        BG.drawCelestials(ctx,state.w,state.h,state.tick);
        BG.drawClouds(ctx,state.tick,state.background);
        BG.drawLanterns(ctx,state.tick,state.background);
        BG.drawMountains(ctx,state.w,state.h);
        COMPASS.drawCompass(ctx,{
          centerX:state.w*0.5+(state.dragX*10),
          centerY:(state.compassVisible?(horizonY()-98):(horizonY()+84)),
          size:Math.min(state.w,state.h)*0.086,
          rotX:(state.dragY*0.18)-0.10,
          rotY:(state.tick*0.006)+(state.dragX*0.20)
        });
        BG.drawWater(ctx,state.w,state.h,state.tick);
        drawTrigger();
      }

      function frame(){
        try{
          animate();
          draw();
        }catch(err){
          console.error("HARBOR_CORE_BOOT_v2 frame error",err);
        }
        requestAnimationFrame(frame);
      }

      window.addEventListener("resize",resize,{passive:true});
      window.addEventListener("orientationchange",resize,{passive:true});

      bindInput();
      resize();
      frame();
    })();
  </script>
</body>
</html>
