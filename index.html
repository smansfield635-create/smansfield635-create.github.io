<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Diamond Gate Bridge — Euclidean Universe Entry</title>
  <meta
    name="description"
    content="Euclidean universe host for Diamond Gate Bridge. Canvas-first runtime with orbit bands, planets, runtime readouts, and inline boot failure capture."
  />
  <style>
    :root{
      --bg-0:#020611;
      --bg-1:#09182d;
      --bg-2:#132946;
      --panel:rgba(7,16,30,.72);
      --panel-strong:rgba(7,16,30,.84);
      --line:rgba(190,210,255,.14);
      --line-strong:rgba(220,232,255,.22);
      --text:#f5f8ff;
      --muted:#bfd0ea;
      --chip:rgba(255,255,255,.05);
      --chip-strong:rgba(255,248,225,.10);
      --shadow:0 22px 56px rgba(0,0,0,.30);
      --blur:16px;
      --radius:28px;
      --radius-sm:18px;
      --maxw:1180px;
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    html,body{min-height:100%}
    body{
      background:#020611;
      color:var(--text);
      font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
    }

    a{color:inherit;text-decoration:none}

    #app{
      position:relative;
      min-height:100vh;
      overflow:hidden;
      background:
        radial-gradient(circle at 50% 56%, rgba(255,245,214,.05), transparent 0 12%),
        linear-gradient(180deg,var(--bg-0) 0%,var(--bg-1) 40%,var(--bg-2) 100%);
    }

    #scene{
      position:absolute;
      inset:0;
      display:block;
      width:100vw;
      height:100vh;
      z-index:1;
    }

    #home-ui{
      position:relative;
      z-index:3;
      width:min(var(--maxw),calc(100vw - 32px));
      margin:0 auto;
      padding:24px 0 40px;
      display:grid;
      grid-template-columns:minmax(0,1.2fr) minmax(320px,.8fr);
      grid-template-areas:
        "title legend"
        "title scope"
        "status status";
      gap:18px;
      min-height:100vh;
      align-content:start;
      pointer-events:none;
    }

    #home-ui > *{
      pointer-events:auto;
    }

    .panel{
      border:1px solid var(--line);
      background:var(--panel);
      backdrop-filter:blur(var(--blur));
      -webkit-backdrop-filter:blur(var(--blur));
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .title-block{
      grid-area:title;
      padding:26px 24px 24px;
      margin-top:82px;
    }

    .title-block h1{
      margin:0 0 14px;
      font-size:clamp(34px,6vw,70px);
      line-height:.96;
      letter-spacing:-.06em;
      max-width:12ch;
    }

    .title-block p{
      margin:0;
      max-width:62ch;
      color:var(--muted);
      font-size:18px;
      line-height:1.65;
    }

    .chip-row{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-top:20px;
    }

    .chip{
      display:inline-flex;
      align-items:center;
      min-height:38px;
      padding:9px 14px;
      border:1px solid var(--line);
      border-radius:999px;
      background:var(--chip);
      color:var(--muted);
      font-size:12px;
      letter-spacing:.12em;
      text-transform:uppercase;
    }

    .chip--strong{
      background:var(--chip-strong);
      color:var(--text);
      border-color:var(--line-strong);
    }

    .action-row{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      margin-top:18px;
    }

    .action{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:44px;
      padding:10px 16px;
      border-radius:999px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.04);
      color:var(--muted);
      font-weight:600;
      transition:background .2s ease,border-color .2s ease,transform .2s ease;
    }

    .action:hover{
      background:rgba(255,255,255,.07);
      border-color:var(--line-strong);
      transform:translateY(-1px);
    }

    .action--strong{
      color:var(--text);
      border-color:var(--line-strong);
      background:rgba(255,248,225,.08);
    }

    .legend{
      grid-area:legend;
      padding:20px 20px 16px;
      margin-top:82px;
    }

    .scale-panel{
      grid-area:scope;
      padding:20px 20px 16px;
    }

    .status{
      grid-area:status;
      padding:16px 18px;
      color:var(--muted);
      font-size:14px;
      line-height:1.7;
      margin-bottom:12px;
    }

    .legend h2,
    .scale-panel h2{
      margin:0 0 14px;
      font-size:14px;
      letter-spacing:.14em;
      text-transform:uppercase;
      color:var(--muted);
    }

    .legend-row,
    .scale-row{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:16px;
      padding:12px 0;
      border-top:1px solid rgba(255,255,255,.06);
    }

    .legend-row:first-of-type,
    .scale-row:first-of-type{
      border-top:0;
      padding-top:0;
    }

    .legend-row span,
    .scale-row span{
      color:var(--muted);
      font-size:14px;
      line-height:1.5;
    }

    .legend-row strong,
    .scale-row strong{
      color:var(--text);
      font-size:14px;
      line-height:1.5;
      text-align:right;
      font-weight:700;
    }

    .inline-divider{
      display:inline-block;
      margin:0 10px;
      color:rgba(255,255,255,.22);
    }

    #boot-banner{
      position:fixed;
      top:18px;
      left:50%;
      transform:translateX(-50%);
      z-index:5;
      min-height:42px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:10px 18px;
      border-radius:999px;
      border:1px solid var(--line-strong);
      background:rgba(7,16,30,.72);
      backdrop-filter:blur(var(--blur));
      -webkit-backdrop-filter:blur(var(--blur));
      box-shadow:var(--shadow);
      color:var(--text);
      font-size:13px;
      letter-spacing:.12em;
      text-transform:uppercase;
      white-space:nowrap;
    }

    #boot-status{
      position:fixed;
      left:14px;
      right:14px;
      bottom:14px;
      z-index:4;
      max-width:min(980px,calc(100vw - 28px));
      margin:0 auto;
      padding:12px 14px;
      border-radius:16px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(4,10,20,.72);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
      box-shadow:var(--shadow);
      color:rgba(235,242,255,.82);
      font:12px/1.55 ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;
      white-space:pre-wrap;
      word-break:break-word;
      display:none;
    }

    #boot-fail{
      position:fixed;
      left:50%;
      top:96px;
      transform:translateX(-50%);
      z-index:6;
      width:min(760px,calc(100vw - 28px));
      display:none;
      padding:16px 18px;
      border-radius:20px;
      border:1px solid rgba(255,120,120,.28);
      background:rgba(48,8,10,.88);
      box-shadow:0 24px 56px rgba(0,0,0,.38);
      color:#ffe8e8;
      font:13px/1.6 ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;
      white-space:pre-wrap;
      word-break:break-word;
    }

    #boot-fail.is-visible{
      display:block;
    }

    @media (max-width:980px){
      #home-ui{
        grid-template-columns:1fr;
        grid-template-areas:
          "title"
          "legend"
          "scope"
          "status";
        padding-top:16px;
      }

      .title-block,
      .legend{
        margin-top:70px;
      }

      .title-block h1{
        max-width:none;
      }
    }

    @media (max-width:640px){
      #home-ui{
        width:calc(100vw - 20px);
        gap:14px;
      }

      .title-block,
      .legend,
      .scale-panel,
      .status{
        padding-left:16px;
        padding-right:16px;
      }

      .title-block{
        padding-top:20px;
      }

      .title-block p{
        font-size:16px;
      }

      .legend-row,
      .scale-row{
        flex-direction:column;
        gap:4px;
      }

      .legend-row strong,
      .scale-row strong{
        text-align:left;
      }

      #boot-banner{
        top:12px;
        max-width:calc(100vw - 20px);
        font-size:12px;
        letter-spacing:.1em;
      }

      #boot-fail{
        top:72px;
      }
    }

    @media (prefers-reduced-motion: reduce){
      .action{
        transition:none;
      }
    }
  </style>
</head>
<body>
  <div id="app" data-app-root="true">
    <canvas id="scene" aria-label="Euclidean universe display"></canvas>
    <div id="boot-banner" class="boot-banner">Euclidean Universe Host</div>
    <div id="home-ui"></div>
    <div id="boot-status" role="status" aria-live="polite"></div>
    <div id="boot-fail" class="boot-fail" aria-live="polite"></div>
  </div>

  <script src="./index.js"></script>
</body>
</html>
