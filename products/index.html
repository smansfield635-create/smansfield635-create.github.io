<!doctype html>
<!-- TNT — /products/index.html
     PRODUCTS AUTHORITY — REFINED TRUE 3D GLASS COMPASS CHAMBER HOST
     LOCKS:
       - host/layout only
       - runtime authority lives in /products/index.js
       - five separate euclidean product objects only
       - no inline onclick
       - no modal overlays
-->

<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <title>Nine Summits — Products</title>

  <link rel="stylesheet" href="/assets/ui.css"/>
  <link rel="stylesheet" href="/assets/branch.css"/>

  <style>
    :root{
      --bg0:#041124;
      --bg1:#07203d;
      --bg2:#0b2f58;
      --ink:rgba(255,255,255,.96);
      --mut:rgba(255,255,255,.80);
      --gold:rgba(244,226,176,.96);
      --goldSoft:rgba(244,226,176,.22);
      --shellShadow:0 18px 54px rgba(0,0,0,.42);
      --safe-top:env(safe-area-inset-top,0px);
      --safe-right:env(safe-area-inset-right,0px);
      --safe-bottom:env(safe-area-inset-bottom,0px);
      --safe-left:env(safe-area-inset-left,0px);
    }

    *{box-sizing:border-box}
    html,body{
      margin:0;
      width:100%;
      height:100%;
      overflow:hidden;
      background:var(--bg0);
      color:var(--ink);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    }
    body::before,body::after{pointer-events:none!important}
    a{color:inherit;text-decoration:none}

    #app-shell{
      position:fixed;
      inset:0;
      overflow:hidden;
      isolation:isolate;
      background:
        radial-gradient(circle at 50% 18%, rgba(125,180,255,.10), transparent 28%),
        radial-gradient(circle at 50% 82%, rgba(125,180,255,.08), transparent 34%),
        linear-gradient(180deg, var(--bg2) 0%, var(--bg1) 48%, var(--bg0) 100%);
    }

    .env{
      position:absolute;
      inset:0;
      z-index:1;
      pointer-events:none;
      overflow:hidden;
    }

    .env::before{
      content:"";
      position:absolute;
      inset:-10%;
      background:
        radial-gradient(circle at 10% 20%, rgba(255,255,255,.94) 0 1.2px, transparent 2px),
        radial-gradient(circle at 18% 50%, rgba(255,255,255,.82) 0 1px, transparent 1.8px),
        radial-gradient(circle at 24% 28%, rgba(255,255,255,.72) 0 1px, transparent 1.8px),
        radial-gradient(circle at 36% 16%, rgba(255,255,255,.86) 0 1.1px, transparent 1.9px),
        radial-gradient(circle at 42% 42%, rgba(255,255,255,.74) 0 1px, transparent 1.8px),
        radial-gradient(circle at 58% 18%, rgba(255,255,255,.90) 0 1.2px, transparent 2px),
        radial-gradient(circle at 66% 36%, rgba(255,255,255,.76) 0 1px, transparent 1.8px),
        radial-gradient(circle at 74% 22%, rgba(255,255,255,.88) 0 1.1px, transparent 1.9px),
        radial-gradient(circle at 84% 34%, rgba(255,255,255,.80) 0 1px, transparent 1.8px),
        radial-gradient(circle at 90% 54%, rgba(255,255,255,.92) 0 1.2px, transparent 2px),
        radial-gradient(circle at 20% 78%, rgba(255,255,255,.76) 0 1px, transparent 1.8px),
        radial-gradient(circle at 34% 72%, rgba(255,255,255,.88) 0 1.1px, transparent 1.9px),
        radial-gradient(circle at 50% 82%, rgba(255,255,255,.80) 0 1px, transparent 1.8px),
        radial-gradient(circle at 70% 76%, rgba(255,255,255,.90) 0 1.1px, transparent 1.9px),
        radial-gradient(circle at 86% 80%, rgba(255,255,255,.82) 0 1px, transparent 1.8px);
      opacity:.62;
      animation:starDrift 30s linear infinite;
    }

    .env::after{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 50% 50%, rgba(100,160,255,.08), transparent 26%),
        linear-gradient(180deg, transparent 0%, rgba(255,255,255,.015) 50%, transparent 100%);
      filter:blur(6px);
      opacity:.7;
    }

    .top-nav{
      position:fixed;
      left:16px;
      top:calc(16px + var(--safe-top));
      z-index:30;
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .top-right{
      position:fixed;
      right:16px;
      top:calc(16px + var(--safe-top));
      z-index:30;
      display:flex;
      gap:10px;
      justify-content:flex-end;
      align-items:center;
    }

    .nav-btn,
    .top-pill{
      min-height:42px;
      padding:10px 14px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.15);
      background:
        radial-gradient(circle at 50% 120%, rgba(244,226,176,.12), transparent 64%),
        radial-gradient(circle at 18% 18%, rgba(255,255,255,.12), transparent 40%),
        linear-gradient(145deg, rgba(10,12,20,.44), rgba(4,6,10,.62));
      color:#fff;
      font-weight:900;
      font-size:13px;
      letter-spacing:.05em;
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
      box-shadow:var(--shellShadow);
      position:relative;
      overflow:hidden;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      -webkit-tap-highlight-color:transparent;
      touch-action:manipulation;
      transition:border-color .18s ease, box-shadow .18s ease, transform .18s ease;
    }

    .nav-btn::after,
    .top-pill::after{
      content:"";
      position:absolute;
      left:10px;
      right:10px;
      bottom:-12px;
      height:26px;
      background:radial-gradient(circle at 50% 0%, rgba(244,226,176,.22), transparent 72%);
      opacity:.56;
      pointer-events:none;
    }

    .nav-btn:hover,
    .top-pill:hover{
      border-color:rgba(244,226,176,.34);
      box-shadow:var(--shellShadow),0 0 16px rgba(244,226,176,.10);
      transform:translateY(-1px);
    }

    .nav-btn.active{
      border-color:rgba(244,226,176,.42);
    }

    .hero{
      position:absolute;
      top:11%;
      left:50%;
      transform:translateX(-50%);
      width:min(94vw,1040px);
      text-align:center;
      z-index:10;
      pointer-events:none;
    }

    .hero h1{
      margin:0;
      font-size:clamp(42px,6.4vw,88px);
      font-weight:950;
      letter-spacing:.05em;
      line-height:.92;
      text-shadow:0 10px 38px rgba(0,0,0,.58);
    }

    .hero p{
      margin:12px auto 0;
      max-width:920px;
      font-size:clamp(15px,1.8vw,21px);
      line-height:1.5;
      color:rgba(255,255,255,.88);
      text-shadow:0 8px 24px rgba(0,0,0,.40);
    }

    .focus-pill{
      position:fixed;
      right:16px;
      bottom:calc(16px + var(--safe-bottom));
      z-index:30;
      min-height:42px;
      padding:10px 14px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.15);
      background:
        radial-gradient(circle at 50% 120%, rgba(244,226,176,.12), transparent 64%),
        rgba(0,0,0,.34);
      color:#fff;
      font-weight:900;
      font-size:13px;
      letter-spacing:.05em;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      backdrop-filter:blur(8px);
      -webkit-backdrop-filter:blur(8px);
      box-shadow:var(--shellShadow);
      max-width:min(72vw,420px);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .stage{
      position:absolute;
      inset:0;
      z-index:12;
      perspective:1800px;
      perspective-origin:50% 50%;
    }

    .chamber{
      position:absolute;
      left:50%;
      top:60%;
      width:min(1080px,92vw);
      height:min(620px,58vh);
      transform:translate(-50%,-50%);
      z-index:4;
      pointer-events:none;
      transform-style:preserve-3d;
    }

    .product-node{
      position:absolute;
      width:172px;
      height:216px;
      border:0;
      padding:0;
      background:transparent;
      color:inherit;
      cursor:pointer;
      pointer-events:auto;
      -webkit-tap-highlight-color:transparent;
      touch-action:manipulation;
      transform-style:preserve-3d;
    }

    .product-shadow{
      position:absolute;
      left:14%;
      right:14%;
      bottom:10px;
      height:18px;
      border-radius:999px;
      background:radial-gradient(circle at 50% 50%, rgba(0,0,0,.36), transparent 72%);
      filter:blur(10px);
      opacity:.85;
      pointer-events:none;
    }

    .object-wrap{
      position:absolute;
      left:50%;
      top:42%;
      width:132px;
      height:164px;
      margin-left:-66px;
      margin-top:-82px;
      pointer-events:none;
      transform-style:preserve-3d;
    }

    .glass-compass{
      position:absolute;
      inset:0;
      transform-style:preserve-3d;
    }

    .glass-front,
    .glass-back{
      position:absolute;
      inset:0;
      clip-path:polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
      border:2px solid var(--gold);
      background:
        linear-gradient(135deg, rgba(255,246,225,.08), rgba(255,246,225,.015) 22%, rgba(180,50,50,.12) 25%, rgba(160,52,52,.18) 46%, rgba(248,225,178,.12) 48%, rgba(248,225,178,.14) 72%, rgba(255,246,225,.08) 100%);
      box-shadow:
        0 0 0 1px rgba(255,246,225,.10) inset,
        0 0 18px rgba(244,226,176,.10);
      backdrop-filter:blur(1.5px);
      -webkit-backdrop-filter:blur(1.5px);
    }

    .glass-front{transform:translateZ(16px)}
    .glass-back{
      transform:translateZ(-16px) scale(.95);
      opacity:.28;
      filter:brightness(.88);
    }

    .side-face{
      position:absolute;
      left:50%;
      top:50%;
      width:10px;
      height:54px;
      margin-left:-5px;
      margin-top:-27px;
      background:linear-gradient(180deg, rgba(255,246,225,.10), rgba(244,226,176,.05));
      border-left:1px solid rgba(244,226,176,.16);
      border-right:1px solid rgba(244,226,176,.10);
      opacity:.20;
      transform-style:preserve-3d;
      pointer-events:none;
      filter:none;
    }

    .side-top{transform:translate3d(0,-56px,0) rotateY(90deg) rotateZ(45deg)}
    .side-right{transform:translate3d(46px,0,0) rotateY(90deg) rotateZ(-45deg)}
    .side-bottom{transform:translate3d(0,56px,0) rotateY(90deg) rotateZ(45deg)}
    .side-left{transform:translate3d(-46px,0,0) rotateY(90deg) rotateZ(-45deg)}

    .facet{
      position:absolute;
      background:var(--gold);
      opacity:.88;
      pointer-events:none;
      box-shadow:0 0 8px rgba(244,226,176,.14);
    }

    .facet.v1{
      left:49%;
      top:14px;
      width:2px;
      height:130px;
      transform:translateZ(20px) rotate(9deg);
    }

    .facet.v2{
      left:49%;
      top:24px;
      width:2px;
      height:114px;
      transform:translateZ(20px) rotate(-28deg);
    }

    .facet.v3{
      left:49%;
      top:24px;
      width:2px;
      height:114px;
      transform:translateZ(20px) rotate(28deg);
    }

    .facet.h1{
      left:20px;
      top:80px;
      width:92px;
      height:2px;
      transform:translateZ(20px) rotate(-17deg);
    }

    .facet.h2{
      left:20px;
      top:80px;
      width:92px;
      height:2px;
      transform:translateZ(20px) rotate(17deg);
    }

    .core-dot{
      position:absolute;
      left:50%;
      top:50%;
      width:18px;
      height:18px;
      margin-left:-9px;
      margin-top:-9px;
      border-radius:999px;
      background:rgba(255,246,225,.94);
      box-shadow:
        0 0 0 2px rgba(244,226,176,.12),
        0 0 16px rgba(255,246,225,.18);
      transform:translateZ(24px);
    }

    .cardinal{
      position:absolute;
      font-size:10px;
      font-weight:900;
      letter-spacing:.08em;
      color:rgba(255,246,225,.95);
      text-shadow:0 4px 10px rgba(0,0,0,.36);
      pointer-events:none;
      transform:translateZ(24px);
    }

    .cardinal.n{left:50%;top:10px;transform:translateX(-50%) translateZ(24px)}
    .cardinal.e{right:10px;top:50%;transform:translateY(-50%) translateZ(24px)}
    .cardinal.s{left:50%;bottom:10px;transform:translateX(-50%) translateZ(24px)}
    .cardinal.w{left:10px;top:50%;transform:translateY(-50%) translateZ(24px)}

    .spark{
      position:absolute;
      width:10px;
      height:10px;
      background:radial-gradient(circle at 50% 50%, rgba(255,255,255,.98), rgba(244,226,176,.88) 42%, transparent 72%);
      pointer-events:none;
      filter:drop-shadow(0 0 6px rgba(255,246,225,.54));
      transform:translateZ(26px);
    }

    .spark.top{left:50%;top:-2px;margin-left:-5px}
    .spark.right{right:-1px;top:50%;margin-top:-5px}
    .spark.bottom{left:50%;bottom:-2px;margin-left:-5px}
    .spark.left{left:-1px;top:50%;margin-top:-5px}

    .label{
      position:absolute;
      left:50%;
      bottom:0;
      width:160px;
      transform:translateX(-50%);
      text-align:center;
      text-shadow:0 8px 22px rgba(0,0,0,.55);
      pointer-events:none;
    }

    .product-title{
      margin:0;
      font-size:15px;
      line-height:1.05;
      font-weight:950;
      letter-spacing:.05em;
    }

    .product-sub{
      margin-top:8px;
      font-size:10px;
      line-height:1.16;
      font-weight:900;
      letter-spacing:.09em;
      color:rgba(255,255,255,.84);
      text-transform:uppercase;
    }

    .product-node.is-focus .glass-front,
    .product-node:hover .glass-front{
      box-shadow:
        0 0 0 1px rgba(255,246,225,.12) inset,
        0 0 22px rgba(244,226,176,.14),
        0 0 24px rgba(255,246,225,.08);
    }

    .mobile-dock{
      position:fixed;
      left:12px;
      right:12px;
      bottom:calc(12px + var(--safe-bottom));
      z-index:28;
      display:none;
      grid-template-columns:repeat(5,1fr);
      gap:8px;
    }

    .dock-btn{
      min-height:48px;
      padding:8px 10px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.14);
      background:linear-gradient(145deg, rgba(10,12,20,.54), rgba(4,6,10,.70));
      color:#fff;
      font-weight:900;
      font-size:10px;
      line-height:1.12;
      letter-spacing:.05em;
      text-transform:uppercase;
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
      box-shadow:var(--shellShadow);
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      touch-action:manipulation;
      -webkit-tap-highlight-color:transparent;
    }

    .dock-btn.is-active{
      border-color:rgba(244,226,176,.42);
      box-shadow:var(--shellShadow),0 0 16px rgba(244,226,176,.10);
    }

    @keyframes starDrift{
      from{transform:translate3d(-1.2%,-.8%,0)}
      to{transform:translate3d(1.2%,.8%,0)}
    }

    @media (max-width:980px){
      .hero{top:12%}
      .chamber{width:min(96vw,760px);height:min(560px,48vh)}
      .product-node{width:154px;height:194px}
      .object-wrap{width:118px;height:146px;margin-left:-59px;margin-top:-73px}
      .label{width:148px}
    }

    @media (max-width:720px){
      .top-right{top:auto;bottom:calc(76px + var(--safe-bottom));right:16px}
      .hero{top:14%;width:min(94vw,640px)}
      .hero p{font-size:15px;max-width:520px}
      .chamber{top:59%;width:min(98vw,540px);height:420px}
      .product-node{width:130px;height:170px}
      .object-wrap{width:100px;height:128px;margin-left:-50px;margin-top:-64px}
      .label{width:130px}
      .product-title{font-size:13px}
      .product-sub{font-size:9px}
      .cardinal{font-size:9px}
      .mobile-dock{display:grid}
      .focus-pill{bottom:calc(72px + var(--safe-bottom))}
    }

    @media (max-width:520px){
      .top-nav{gap:8px}
      .nav-btn,.top-pill{min-height:40px;padding:9px 12px;font-size:12px}
      .hero{top:15%}
      .hero h1{font-size:40px}
      .chamber{top:58%;width:min(100vw,390px);height:344px}
      .product-node{width:116px;height:154px}
      .object-wrap{width:88px;height:114px;margin-left:-44px;margin-top:-57px}
      .label{width:116px}
      .product-title{font-size:11px}
      .product-sub{margin-top:6px;font-size:8px}
      .cardinal{font-size:8px}
      .facet.v1{height:88px;top:12px}
      .facet.v2,.facet.v3{height:78px;top:18px}
      .facet.h1,.facet.h2{width:64px;top:58px;left:12px}
      .side-face{width:8px;height:44px;margin-left:-4px;margin-top:-22px}
      .side-top{transform:translate3d(0,-40px,0) rotateY(90deg) rotateZ(45deg)}
      .side-right{transform:translate3d(34px,0,0) rotateY(90deg) rotateZ(-45deg)}
      .side-bottom{transform:translate3d(0,40px,0) rotateY(90deg) rotateZ(45deg)}
      .side-left{transform:translate3d(-34px,0,0) rotateY(90deg) rotateZ(-45deg)}
    }
  </style>
</head>

<body>
  <div id="app-shell">
    <div class="env" aria-hidden="true"></div>

    <nav class="top-nav" aria-label="Primary">
      <a class="nav-btn" id="navCompass" href="/index.html" data-route="/index.html">COMPASS</a>
      <a class="nav-btn active" id="navProducts" href="/products/" data-route="/products/">PRODUCTS</a>
      <a class="nav-btn" id="navExplore" href="/explore/" data-route="/explore/">EXPLORE</a>
      <a class="nav-btn" id="navGauges" href="/gauges/" data-route="/gauges/">GAUGES</a>
    </nav>

    <div class="top-right" aria-label="Products meta">
      <div class="top-pill" id="scenePill">REFINED 3D GLASS COMPASS</div>
    </div>

    <section class="hero" aria-label="Products hero">
      <h1 id="heroTitle">PRODUCTS</h1>
      <p id="heroTag">Five separate refined true-3D glass compass objects, each spinning in place with direct product routing.</p>
    </section>

    <div class="focus-pill" id="focusPill">FOCUS: BASELINE NUTRITION</div>

    <section class="stage" aria-label="Products chamber">
      <div class="chamber" id="productChamber">

        <button class="product-node is-focus" id="nodeNutrition" data-index="0" data-route="/products/nutrition/" aria-label="Baseline Nutrition Systems" type="button">
          <div class="product-shadow"></div>
          <div class="object-wrap">
            <div class="glass-compass">
              <div class="glass-back"></div><div class="glass-front"></div>
              <div class="side-face side-top"></div><div class="side-face side-right"></div><div class="side-face side-bottom"></div><div class="side-face side-left"></div>
              <div class="facet v1"></div><div class="facet v2"></div><div class="facet v3"></div><div class="facet h1"></div><div class="facet h2"></div>
              <div class="core-dot"></div><div class="cardinal n">N</div><div class="cardinal e">E</div><div class="cardinal s">S</div><div class="cardinal w">W</div>
              <div class="spark top"></div><div class="spark right"></div><div class="spark bottom"></div><div class="spark left"></div>
            </div>
          </div>
          <div class="label"><div class="product-title" id="titleNutrition">BASELINE NUTRITION</div><div class="product-sub" id="subNutrition">SYSTEMS</div></div>
        </button>

        <button class="product-node" id="nodeAI" data-index="1" data-route="/products/on-your-side-ai/" aria-label="On Your Side AI" type="button">
          <div class="product-shadow"></div>
          <div class="object-wrap">
            <div class="glass-compass">
              <div class="glass-back"></div><div class="glass-front"></div>
              <div class="side-face side-top"></div><div class="side-face side-right"></div><div class="side-face side-bottom"></div><div class="side-face side-left"></div>
              <div class="facet v1"></div><div class="facet v2"></div><div class="facet v3"></div><div class="facet h1"></div><div class="facet h2"></div>
              <div class="core-dot"></div><div class="cardinal n">N</div><div class="cardinal e">E</div><div class="cardinal s">S</div><div class="cardinal w">W</div>
              <div class="spark top"></div><div class="spark right"></div><div class="spark bottom"></div><div class="spark left"></div>
            </div>
          </div>
          <div class="label"><div class="product-title" id="titleAI">ON YOUR SIDE AI</div><div class="product-sub" id="subAI">INTELLIGENCE</div></div>
        </button>

        <button class="product-node" id="nodeLanguage" data-index="2" data-route="/products/education/" aria-label="Education and Language Systems" type="button">
          <div class="product-shadow"></div>
          <div class="object-wrap">
            <div class="glass-compass">
              <div class="glass-back"></div><div class="glass-front"></div>
              <div class="side-face side-top"></div><div class="side-face side-right"></div><div class="side-face side-bottom"></div><div class="side-face side-left"></div>
              <div class="facet v1"></div><div class="facet v2"></div><div class="facet v3"></div><div class="facet h1"></div><div class="facet h2"></div>
              <div class="core-dot"></div><div class="cardinal n">N</div><div class="cardinal e">E</div><div class="cardinal s">S</div><div class="cardinal w">W</div>
              <div class="spark top"></div><div class="spark right"></div><div class="spark bottom"></div><div class="spark left"></div>
            </div>
          </div>
          <div class="label"><div class="product-title" id="titleLanguage">EDUCATION &amp; LANGUAGE</div><div class="product-sub" id="subLanguage">SYSTEMS</div></div>
        </button>

        <button class="product-node" id="nodeGame" data-index="3" data-route="/products/five-flags/" aria-label="Five Flags What's My Theme" type="button">
          <div class="product-shadow"></div>
          <div class="object-wrap">
            <div class="glass-compass">
              <div class="glass-back"></div><div class="glass-front"></div>
