<!doctype html>
<!-- TNT — /index-core/index.html
     INDEX · CORE — DECISION DIAGNOSTIC ENGINE (CITIZEN DIAGNOSTIC ENGINE)
     MODE:
       - Bubble-first (contrast + 3D gloss)
       - No sliders (no user “knob” manipulation)
       - Scenario presets only (receipt-oriented posture)
       - 4 context layers: Individual · Relational · Business · Corporate
     LENSES (VISIBLE):
       - lane=platform|engineering (URL-only; NEVER stored) (NO reload; updates copy in-place)
       - lang=EN|中文|ES (NO reload; updates copy in-place)
     STATE (CANON ONLY; NO NEW gd_* KEYS):
       - Preserve gd_lang/gd_style/gd_time/gd_depth via URL + LS ONLY
       - lane is URL-only
     UX:
       - Single-open accordion (tap same closes)
       - Buttons glow (no motion)
       - Timestamp displayed (render timestamp)
       - Direct routing to hubs (Compass/Home/Products/Laws/Governance/Gauges/Explore)
     ASSETS:
       - /assets/ui.css + /assets/branch.css + /assets/instruments.js
       - ui.css owns html/body background (NO overrides)
-->

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>INDEX · CORE — Decision Diagnostic Engine</title>

<link rel="stylesheet" href="/assets/ui.css"/>
<link rel="stylesheet" href="/assets/branch.css"/>
<script defer src="/assets/instruments.js"></script>

<style>
a{color:inherit;text-decoration:none}
body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:#fff}
body::before,body::after{pointer-events:none!important}

:root{
  --dockH:128px;

  --stroke:rgba(255,255,255,.12);
  --stroke2:rgba(255,255,255,.10);

  --ink:rgba(255,255,255,.95);
  --txt:rgba(255,255,255,.90);
  --mut:rgba(255,255,255,.78);

  --crimson:rgba(120,0,22,.30);
  --festival:rgba(255,43,43,.14);
  --opalV:rgba(90,40,120,.10);

  --gold:rgba(201,162,74,.55);
  --goldGlow:rgba(201,162,74,.22);
  --goldSoft:rgba(201,162,74,.14);

  --shadowA:0 28px 110px rgba(0,0,0,.70);
  --shadowB:0 18px 60px rgba(0,0,0,.55);
  --shadowC:0 18px 60px rgba(0,0,0,.55);
}

/* ===== Top ===== */
.top{
  position:fixed;top:14px;left:0;right:0;
  padding:0 14px;
  display:flex;justify-content:space-between;align-items:center;
  gap:10px;
  z-index:240;
  pointer-events:none;
}
.top .left,.top .right{
  display:flex;gap:10px;flex-wrap:wrap;align-items:center;white-space:nowrap;
  pointer-events:auto;
}

/* Button (perimeter glow; no motion) */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:10px 12px;min-height:44px;border-radius:16px;
  border:1px solid rgba(255,255,255,.14);
  background:
    radial-gradient(circle at 50% 40%, rgba(255,255,255,.08), transparent 52%),
    linear-gradient(145deg, rgba(10,12,16,.78), rgba(6,8,10,.90));
  color:var(--ink);
  font-weight:950;font-size:14px;letter-spacing:.2px;
  -webkit-tap-highlight-color:transparent;
  position:relative;overflow:hidden;
  touch-action:manipulation;
  box-shadow:var(--shadowC), 0 0 0 1px rgba(201,162,74,.10), 0 0 18px rgba(201,162,74,.08);
}
.btn:hover{
  border-color:rgba(201,162,74,.44);
  box-shadow:var(--shadowC), 0 0 0 2px rgba(201,162,74,.18), 0 0 28px rgba(201,162,74,.16);
}
.btn:active{filter:brightness(.98)}
.btn.red{
  border-color:rgba(255,43,43,.22);
  box-shadow:var(--shadowC), 0 0 0 1px rgba(255,43,43,.14), 0 0 18px rgba(255,43,43,.10);
}
.btn.red:hover{
  border-color:rgba(255,43,43,.32);
  box-shadow:var(--shadowC), 0 0 0 2px rgba(255,43,43,.16), 0 0 28px rgba(255,43,43,.14);
}

/* Seg */
.seg{
  display:inline-flex;gap:0;overflow:hidden;border-radius:16px;
  border:1px solid rgba(255,255,255,.12);
  background: rgba(0,0,0,.16);
  box-shadow: var(--shadowC);
}
.seg button{
  appearance:none;border:0;background:transparent;color:var(--mut);
  padding:10px 12px;min-height:44px;font-weight:950;font-size:13px;
  letter-spacing:.25px;cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
.seg button[aria-pressed="true"]{
  color:var(--ink);
  background:
    radial-gradient(circle at 50% 50%, rgba(201,162,74,.14), transparent 60%),
    linear-gradient(180deg, rgba(255,43,43,.10), rgba(0,0,0,.10));
  box-shadow: inset 0 0 0 1px rgba(201,162,74,.14), inset 0 -10px 22px rgba(201,162,74,.10);
}

/* ===== Page ===== */
.page{
  width:min(1120px,94vw);
  margin:0 auto;
  padding:104px 0 calc(var(--dockH) + 18px);
  display:flex;flex-direction:column;gap:12px;
  position:relative;
  z-index:10;
}

/* Backdrop slab behind content */
.backdrop{
  position:absolute;
  left:50%;
  top:68px;
  transform:translateX(-50%);
  width:min(1180px,96vw);
  height:calc(100% - 108px);
  border-radius:34px;
  pointer-events:none;
  z-index:0;
  overflow:hidden;
}
.backdrop::before{
  content:"";
  position:absolute;inset:0;
  border:1px solid rgba(255,255,255,.08);
  border-radius:34px;
  background:
    radial-gradient(circle at 18% 20%, rgba(201,162,74,.10), transparent 60%),
    radial-gradient(circle at 78% 22%, rgba(255,43,43,.12), transparent 62%),
    radial-gradient(circle at 60% 90%, rgba(90,40,120,.10), transparent 64%),
    linear-gradient(160deg, rgba(0,0,0,.18), rgba(0,0,0,.08));
  box-shadow:
    0 70px 220px rgba(0,0,0,.62),
    inset 0 2px 0 rgba(255,255,255,.06),
    inset 0 -70px 140px rgba(0,0,0,.55);
  opacity:.92;
}
.backdrop::after{
  content:"";
  position:absolute;inset:-18%;
  background:
    radial-gradient(circle at 18% 34%, rgba(255,43,43,.18), transparent 44%),
    radial-gradient(circle at 84% 30%, rgba(255,43,43,.14), transparent 46%),
    radial-gradient(circle at 52% 78%, rgba(201,162,74,.12), transparent 48%),
    repeating-conic-gradient(from 45deg at 50% 50%,
      rgba(201,162,74,.06) 0 1.2deg, transparent 1.2deg 7.5deg),
    radial-gradient(circle at 50% 50%, rgba(255,255,255,.04), transparent 62%);
  filter:blur(1px);
  opacity:.72;
}

/* Header */
.header{
  position:relative;
  z-index:2;
  border:1px solid var(--stroke);
  border-radius:26px;
  padding:20px 18px 16px;
  background:
    radial-gradient(circle at 18% 22%, var(--crimson), transparent 72%),
    radial-gradient(circle at 82% 30%, var(--opalV), transparent 74%),
    radial-gradient(circle at 70% 92%, var(--festival), transparent 62%),
    radial-gradient(circle at 26% 22%, rgba(201,162,74,.14), transparent 62%),
    linear-gradient(160deg, rgba(0,0,0,.30), rgba(0,0,0,.14));
  backdrop-filter:blur(10px);
  box-shadow:var(--shadowA);
  overflow:hidden;
}
.header::before{
  content:"";
  position:absolute;inset:0;border-radius:26px;pointer-events:none;
  box-shadow: inset 0 0 0 1px rgba(201,162,74,.16);
  background:
    repeating-linear-gradient(45deg, rgba(201,162,74,.08) 0 1px, transparent 1px 16px),
    repeating-linear-gradient(-45deg, rgba(201,162,74,.06) 0 1px, transparent 1px 16px);
  opacity:.24;
  mask:
    radial-gradient(circle at 50% 50%, transparent 0 78%, #000 82% 100%),
    linear-gradient(#000,#000);
  -webkit-mask:
    radial-gradient(circle at 50% 50%, transparent 0 78%, #000 82% 100%),
    linear-gradient(#000,#000);
}
.k{margin:0 0 8px;font-size:11px;letter-spacing:4px;text-transform:uppercase;opacity:.78;color:var(--mut)}
.h1{margin:0;font-weight:980;font-size:30px;letter-spacing:.7px;color:var(--ink);line-height:1.08}
.sub{margin-top:12px;font-size:15.5px;line-height:1.6;color:rgba(255,255,255,.88);max-width:980px}
.metaRow{margin-top:12px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between}
.pill{
  display:inline-flex;align-items:center;gap:8px;
  padding:10px 12px;border-radius:999px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(0,0,0,.16);
  color:rgba(255,255,255,.78);
  font-weight:950;
  box-shadow:0 14px 36px rgba(0,0,0,.55);
}
.pill .g{color:rgba(201,162,74,.75);font-weight:950}

/* Bands */
.band{
  position:relative;z-index:2;
  padding:10px 12px;border-radius:18px;
  border:1px solid var(--stroke2);
  background:rgba(0,0,0,.14);
  font-weight:980;letter-spacing:.25px;
  color:rgba(255,255,255,.90);
}

/* Engine panel */
.engine{
  position:relative;z-index:2;
  border:1px solid rgba(255,255,255,.10);
  border-radius:24px;
  padding:16px 16px 18px;
  background:
    radial-gradient(circle at 22% 18%, rgba(201,162,74,.10), transparent 58%),
    radial-gradient(circle at 78% 30%, rgba(255,43,43,.10), transparent 62%),
    linear-gradient(145deg, rgba(17,22,28,.84), rgba(11,15,20,.94));
  box-shadow:var(--shadowA);
  overflow:hidden;
}
.engineIntro{margin:0 0 14px;font-size:14.75px;line-height:1.65;color:rgba(255,255,255,.86);max-width:980px}

/* Context pills */
.ctxRow{
  display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;
}
.ctxPills{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.ctx{
  padding:10px 14px;border-radius:999px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(0,0,0,.14);
  color:rgba(255,255,255,.86);
  font-weight:980;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}
.ctx.active{
  border-color:rgba(201,162,74,.34);
  box-shadow:0 0 0 2px rgba(201,162,74,.12), 0 0 24px rgba(201,162,74,.14);
}

/* Scenario select */
.formRow{
  margin-top:12px;
  display:grid;
  grid-template-columns:1fr 220px;
  gap:12px;
  align-items:start;
}
@media (max-width:820px){
  .formRow{grid-template-columns:1fr}
}
.select{
  width:100%;
  min-height:48px;
  padding:12px 12px;
  border-radius:16px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(0,0,0,.18);
  color:rgba(255,255,255,.92);
  outline:none;
}
.select option{color:#000}
.runRow{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end;align-items:center}
.runRow .btn{min-height:48px;border-radius:999px;padding:10px 14px}

/* Output bubble */
.out{
  margin-top:12px;
  border:1px solid rgba(255,255,255,.12);
  border-radius:18px;
  padding:12px 12px;
  background:
    radial-gradient(circle at 18% 18%, rgba(201,162,74,.10), transparent 60%),
    radial-gradient(circle at 82% 34%, rgba(255,43,43,.10), transparent 60%),
    rgba(0,0,0,.14);
}
.outTop{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between}
.big{
  font-weight:980;
  letter-spacing:.6px;
  font-size:18px;
  color:rgba(255,255,255,.94);
}
.big .n{color:rgba(201,162,74,.90)}
.badge{
  display:inline-flex;align-items:center;justify-content:center;
  padding:8px 12px;border-radius:999px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(0,0,0,.16);
  font-weight:980;
  letter-spacing:.2px;
  color:rgba(255,255,255,.86);
  box-shadow:0 14px 36px rgba(0,0,0,.55);
}
.reason{
  margin-top:8px;
  color:rgba(255,255,255,.84);
  line-height:1.5;
  font-size:13.75px;
}
.metrics{
  margin-top:10px;
  display:grid;
  grid-template-columns:repeat(4,minmax(0,1fr));
  gap:10px;
}
@media (max-width:920px){ .metrics{grid-template-columns:repeat(2,minmax(0,1fr))} }
.m{
  border:1px solid rgba(255,255,255,.10);
  border-radius:16px;
  padding:10px 10px;
  background:rgba(0,0,0,.12);
}
.mN{font-weight:980;color:rgba(255,255,255,.90);font-size:12.75px}
.mV{margin-top:6px;font-weight:980;color:rgba(201,162,74,.86);font-size:14px}

/* Accordion */
.list{position:relative;z-index:2;display:flex;flex-direction:column;gap:12px}
.row{
  border:1px solid rgba(255,255,255,.10);
  border-radius:22px;
  background:
    radial-gradient(circle at 22% 18%, rgba(255,43,43,.10), transparent 58%),
    radial-gradient(circle at 82% 30%, rgba(90,40,120,.10), transparent 66%),
    linear-gradient(145deg, rgba(17,22,28,.86), rgba(11,15,20,.94));
  box-shadow:var(--shadowA);
  overflow:hidden;
  position:relative;
}
.row::before{
  content:"";
  position:absolute;inset:0;border-radius:22px;pointer-events:none;
  box-shadow: inset 0 0 0 1px rgba(201,162,74,.10);
  opacity:.55;
}
.head{
  display:flex;align-items:flex-start;justify-content:space-between;
  gap:10px;padding:16px 16px;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
.hL{display:flex;gap:12px;align-items:flex-start;min-width:0}
.mark{
  width:10px;height:10px;border-radius:3px;transform:rotate(45deg);
  background:var(--c);
  box-shadow:0 0 0 1px rgba(255,255,255,.14), 0 0 14px rgba(0,0,0,.35);
  flex:0 0 auto;margin-top:4px;
}
.q{
  font-weight:980;letter-spacing:.2px;font-size:18px;color:var(--ink);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.subt{
  margin-top:8px;font-size:13.75px;opacity:.88;line-height:1.42;
  color:rgba(255,255,255,.86);max-width:92ch;
}
.chev{
  width:36px;height:36px;border-radius:14px;
  border:1px solid rgba(255,255,255,.14);
  background: rgba(0,0,0,.16);
  display:flex;align-items:center;justify-content:center;
  color:rgba(255,255,255,.78);
  font-weight:950;
  position:relative;overflow:hidden;
  flex:0 0 auto;margin-top:2px;
}
.chev::after{
  content:"";
  position:absolute;left:6px;right:6px;bottom:-10px;height:22px;
  background: radial-gradient(circle at 50% 0%, rgba(201,162,74,.30), transparent 70%);
  opacity:.62;pointer-events:none;
}
.body{
  display:none;
  padding:16px 16px 18px;
  border-top:1px solid rgba(255,255,255,.08);
  background:
    radial-gradient(circle at 30% 30%, rgba(255,255,255,.06), transparent 55%),
    linear-gradient(145deg, rgba(10,12,16,.86), rgba(6,8,10,.94));
}
.row.open .body{display:block}
.p{margin:0;color:rgba(255,255,255,.90);line-height:1.7;font-size:14.5px}
.p + .p{margin-top:10px}
.actions{margin-top:14px;display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end}
.actions .btn{padding:10px 14px;border-radius:999px;min-height:40px;font-size:13px}

/* Dock */
.dock{
  position:fixed;left:50%;
  bottom:max(10px, env(safe-area-inset-bottom));
  transform:translateX(-50%);
  z-index:220;
  width:min(980px,94vw);
  padding:10px 12px;border-radius:22px;
  border:1px solid rgba(255,255,255,.12);
  background:
    radial-gradient(circle at 18% 18%, rgba(255,43,43,.10), transparent 62%),
    radial-gradient(circle at 82% 70%, rgba(90,40,120,.10), transparent 64%),
    linear-gradient(145deg, rgba(10,12,16,.72), rgba(6,8,10,.86));
  backdrop-filter:blur(10px);
  box-shadow:0 18px 60px rgba(0,0,0,.55);
  display:grid;grid-template-columns:repeat(4, minmax(0,1fr));
  gap:10px;
}
.dock .btn{width:100%;padding:10px 10px;border-radius:999px;white-space:nowrap}
@media (max-width:520px){
  :root{--dockH:148px}
  .dock{grid-template-columns:repeat(3, minmax(0,1fr))}
}
</style>
</head>

<body>

<div class="top" aria-label="Top controls">
  <div class="left">
    <a class="btn" id="btnCompass" data-route="/index.html" href="/index.html">COMPASS</a>
    <a class="btn" id="btnHome" data-route="/home/" href="/home/">HOME</a>
    <a class="btn" id="btnDoor" data-route="/door/" href="/door/">DOOR</a>
  </div>
  <div class="right" aria-label="Controls">
    <div class="seg" role="group" aria-label="Language">
      <button type="button" id="langEN" aria-pressed="true">EN</button>
      <button type="button" id="langZH" aria-pressed="false">中文</button>
      <button type="button" id="langES" aria-pressed="false">ES</button>
    </div>
    <div class="seg" role="group" aria-label="Lane">
      <button type="button" id="lanePlatform" aria-pressed="true">PLATFORM</button>
      <button type="button" id="laneEngineering" aria-pressed="false">ENGINEERING</button>
    </div>
  </div>
</div>

<div class="page">
  <div class="backdrop" aria-hidden="true"></div>

  <section class="header" aria-label="Header">
    <p class="k" id="hk">INDEX</p>
    <h1 class="h1" id="ht">DECISION DIAGNOSTIC ENGINE</h1>
    <p class="sub" id="hs"></p>

    <div class="metaRow" aria-label="Meta">
      <div class="pill" id="laneState">—</div>
      <div class="pill" id="tsPill"><span class="g" id="tsLabel">Timestamp</span>: <span id="tsVal">—</span></div>
    </div>
  </section>

  <div class="band" id="bandEngine">ENGINE (SELECT → RUN)</div>
  <section class="engine" aria-label="Engine">
    <p class="engineIntro" id="engineIntro"></p>

    <div class="ctxRow">
      <div class="ctxPills" aria-label="Context">
        <button class="ctx active" id="ctxIndividual" type="button">INDIVIDUAL</button>
        <button class="ctx" id="ctxRelational" type="button">RELATIONAL</button>
        <button class="ctx" id="ctxBusiness" type="button">BUSINESS</button>
        <button class="ctx" id="ctxCorporate" type="button">CORPORATE</button>
      </div>
      <div class="pill" id="ctxState">—</div>
    </div>

    <div class="formRow" aria-label="Scenario">
      <select class="select" id="scenarioSelect" aria-label="Scenario select"></select>
      <div class="runRow">
        <button class="btn red" id="btnRun" type="button">RUN</button>
      </div>
    </div>

    <div class="out" id="out">
      <div class="outTop">
        <div class="big" id="outTitle">POSTURE: <span class="n" id="outPosture">—</span></div>
        <div class="badge" id="outScore">SCORE: —/100</div>
      </div>
      <div class="reason" id="outReason">—</div>
      <div class="metrics" aria-label="Metrics">
        <div class="m"><div class="mN" id="mDefN">Definition</div><div class="mV" id="mDefV">—</div></div>
        <div class="m"><div class="mN" id="mExeN">Execution</div><div class="mV" id="mExeV">—</div></div>
        <div class="m"><div class="mN" id="mVerN">Verification</div><div class="mV" id="mVerV">—</div></div>
        <div class="m"><div class="mN" id="mScaN">Scale Posture</div><div class="mV" id="mScaV">—</div></div>
      </div>
    </div>
  </section>

  <div class="band" id="bandHow">HOW THIS WORKS (OPEN ONE)</div>
  <div class="list" id="list"></div>
</div>

<nav class="dock" aria-label="Bottom navigation">
  <a class="btn" id="dockProducts" data-route="/products/" href="/products/">PRODUCTS</a>
  <a class="btn" id="dockLaws" data-route="/laws/" href="/laws/">LAWS</a>
  <a class="btn" id="dockGovernance" data-route="/governance/" href="/governance/">GOVERNANCE</a>
  <a class="btn" id="dockExplore" data-route="/explore/" href="/explore/">EXPLORE</a>
</nav>

<script>
(function(){
  "use strict";

  // ===== State (gd_* only; lane URL-only) =====
  var qs=new URLSearchParams(location.search);
  var LS=window.localStorage;

  var lang  = qs.get("lang")  || LS.getItem("gd_lang")  || "en";
  var style = qs.get("style") || LS.getItem("gd_style") || "informal";
  var time  = qs.get("time")  || LS.getItem("gd_time")  || "now";
  var depth = qs.get("depth") || LS.getItem("gd_depth") || "explore";
  var lane  = qs.get("lane")  || "platform"; // URL-only

  if(lang!=="en" && lang!=="zh" && lang!=="es") lang="en";
  if(style!=="informal" && style!=="formal") style="informal";
  if(time==="trajectory") time="post";
  if(time!=="origin" && time!=="now" && time!=="post") time="now";
  if(depth!=="explore" && depth!=="learn") depth="explore";
  if(lane!=="platform" && lane!=="engineering") lane="platform";

  try{
    LS.setItem("gd_lang",lang);
    LS.setItem("gd_style",style);
    LS.setItem("gd_time",time);
    LS.setItem("gd_depth",depth);
  }catch(e){}

  document.documentElement.lang=(lang==="zh")?"zh":(lang==="es")?"es":"en";

  function q(over){
    var p=new URLSearchParams();
    p.set("lang",(over&&over.lang)?over.lang:lang);
    p.set("style",(over&&over.style)?over.style:style);
    p.set("time",(over&&over.time)?over.time:time);
    p.set("depth",(over&&over.depth)?over.depth:depth);
    var L=(over&&over.lane)?over.lane:lane;
    if(L==="platform"||L==="engineering") p.set("lane",L);
    return "?"+p.toString();
  }

  function setPressed(ids, activeId){
    for(var i=0;i<ids.length;i++){
      var el=document.getElementById(ids[i]);
      if(!el) continue;
      el.setAttribute("aria-pressed", ids[i]===activeId ? "true" : "false");
    }
  }

    var mm=pad2(d.getMinutes());

  // ===== Scoring (internal; derived from preset receipts) =====
  function score(v){
    // weighted; verification has largest weight
    var raw = v.def*0.25 + v.exe*0.25 + v.ver*0.30 + v.sca*0.20;
    return Math.round(raw);
  }
  function posture(v, s){
    if(v.ver < 40) return "HOLD";
    if(s >= 80) return "READY";
    if(s >= 60) return "STABLE";
    return "HOLD";
  }
  function postureReason(v, s, item){
    if(lane==="engineering"){
      return (lang==="zh")?item.eng.zh:(lang==="es")?item.eng.es:item.eng.en;
    }
    return (lang==="zh")?item.plat.zh:(lang==="es")?item.plat.es:item.plat.en;
  }

  // ===== Output render =====
  function renderOutput(run){
    var outPost=document.getElementById("outPosture");
    var outScore=document.getElementById("outScore");
    var outReason=document.getElementById("outReason");

    if(!run){
      outPost.textContent="—";
      outScore.textContent = pick3("SCORE: —/100","评分：—/100","PUNTAJE: —/100");
      outReason.textContent = pick3(
        "Select a context and scenario, then RUN.",
        "选择层级与场景，然后 RUN。",
        "Selecciona capa y escenario, luego RUN."
      );
      document.getElementById("mDefV").textContent="—";
      document.getElementById("mExeV").textContent="—";
      document.getElementById("mVerV").textContent="—";
      document.getElementById("mScaV").textContent="—";
      return;
    }

    var it=run.item;
    var v=it.v;
    var s=score(v);
    var p=posture(v,s);

    outPost.textContent = pick3(p,p,p);
    outScore.textContent =
      (lang==="zh")?("评分： "+s+"/100"):(lang==="es")?("PUNTAJE: "+s+"/100"):("SCORE: "+s+"/100");
    outReason.textContent = postureReason(v,s,it);

    document.getElementById("mDefV").textContent=String(v.def);
    document.getElementById("mExeV").textContent=String(v.exe);
    document.getElementById("mVerV").textContent=String(v.ver);
    document.getElementById("mScaV").textContent=String(v.sca);
  }
