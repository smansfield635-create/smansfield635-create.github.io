<!doctype html>
<!-- TNT — /explore/frontier/vision/index.html
     FRONTIER · VISION REMOTE (16 MANIFOLDS + CORE + EXIT + HUB)
     GEOMETRY:
       - 16 outer cardinal manifolds
       - 1 center CORE (manual index)
       - 2 bottom controls: EXIT (→ DOOR) / HUB (→ MAIN COMPASS)
     STATE:
       - 3 Language toggles (EN / 中文 / ES)
       - 2 Lane toggles (P / E)
       - Pinned informal layer (gd_style=informal, gd_depth=explore)
-->

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>FRONTIER · VISION REMOTE</title>

<link rel="stylesheet" href="/assets/ui.css"/>
<link rel="stylesheet" href="/assets/branch.css"/>
<script defer src="/assets/instruments.js"></script>

<style>
a{color:inherit;text-decoration:none}
body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:#fff}
body::before,body::after{pointer-events:none!important}

:root{
  --D:88px;     /* outer size (reduced ~20%) */
  --C:140px;    /* center size */
  --R:270px;    /* radius */
  --padTop:120px;

  --onyx0:rgba(6,8,10,.96);
  --onyx1:rgba(10,12,16,.86);
  --festival:rgba(255,43,43,.18);
  --crimson:rgba(120,0,22,.34);
  --opalV:rgba(90,40,120,.12);
  --gold:rgba(201,162,74,.45);

  --shadowA:0 28px 90px rgba(0,0,0,.7);
}

.stage{
  position:relative;
  width:min(860px,95vw);
  height:min(860px,82vh);
  margin:var(--padTop) auto 0;
  pointer-events:none;
}

.d{
  position:absolute;
  left:50%;
  top:50%;
  width:var(--D);
  height:var(--D);
  transform:translate(-50%,-50%) rotate(45deg);
  border-radius:18px;
  cursor:pointer;
  pointer-events:auto;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;

  background:
    radial-gradient(circle at 25% 20%, rgba(255,255,255,.2), transparent 50%),
    radial-gradient(circle at 70% 30%, var(--festival), transparent 65%),
    linear-gradient(160deg, var(--onyx1), var(--onyx0));

  border:1px solid rgba(255,255,255,.14);
  box-shadow:var(--shadowA);
}

.d.center{
  width:var(--C);
  height:var(--C);
  border-radius:26px;
  border-color:var(--gold);
}

.inner{
  transform:rotate(-45deg);
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:6px;
}

.word{
  font-weight:900;
  font-size:12px;
  letter-spacing:.6px;
}
.cardinal{
  font-size:9px;
  opacity:.7;
  margin-top:4px;
  letter-spacing:1px;
}

.d.center .word{font-size:15px}

/* TOP CONTROLS */
.top{
  position:fixed;top:16px;left:0;right:0;
  display:flex;justify-content:space-between;
  padding:0 16px;z-index:240;
}
.ctrl{
  display:flex;gap:10px;
}
.tbtn{
  width:42px;height:42px;
  transform:rotate(45deg);
  border-radius:12px;
  background:linear-gradient(160deg,var(--onyx1),var(--onyx0));
  border:1px solid rgba(255,255,255,.15);
  display:grid;place-items:center;
  cursor:pointer;
}
.tbtn span{
  transform:rotate(-45deg);
  font-size:11px;
  font-weight:800;
}
.tbtn.on{border-color:var(--gold)}

/* BOTTOM */
.bottom{
  position:fixed;
  bottom:20px;
  left:0;right:0;
  display:flex;
  justify-content:space-between;
  padding:0 24px;
  z-index:240;
}
</style>
</head>

<body>

<div class="top">
  <div class="ctrl">
    <div class="tbtn on" id="langEN"><span>EN</span></div>
    <div class="tbtn" id="langZH"><span>中文</span></div>
    <div class="tbtn" id="langES"><span>ES</span></div>
  </div>
  <div class="ctrl">
    <div class="tbtn on" id="laneP"><span>P</span></div>
    <div class="tbtn" id="laneE"><span>E</span></div>
  </div>
</div>

<div class="stage" id="stage"></div>

<div class="bottom">
  <div class="tbtn" id="btnExit"><span>EXIT</span></div>
  <div class="tbtn" id="btnHub"><span>HUB</span></div>
</div>

<script>
(function(){
"use strict";

var qs=new URLSearchParams(location.search);
var LS=window.localStorage;

var lang=qs.get("lang")||LS.getItem("gd_lang")||"en";
var lane=qs.get("lane")||"platform";

if(lang!=="en"&&lang!=="zh"&&lang!=="es") lang="en";
if(lane!=="platform"&&lane!=="engineering") lane="platform";

LS.setItem("gd_lang",lang);
LS.setItem("gd_style","informal");
LS.setItem("gd_depth","explore");

function q(){
  var p=new URLSearchParams();
  p.set("lang",lang);
  p.set("lane",lane);
  p.set("style","informal");
  p.set("depth","explore");
  return "?"+p.toString();
}

function go(path){ window.location.href=path+q(); }

var MANIFOLDS=[
"N","NNE","NE","ENE","E","ESE","SE","SSE",
"S","SSW","SW","WSW","W","WNW","NW","NNW"
];

var stage=document.getElementById("stage");

function build(){
  stage.innerHTML="";
  var rect=stage.getBoundingClientRect();
  var cx=rect.width/2;
  var cy=rect.height/2;
  var R=parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--R"));

  // CENTER
  var center=mk("INDEX","CORE",true);
  center.style.left=cx+"px";
  center.style.top=cy+"px";
  center.onclick=function(){go("/explore/frontier/manual/");};
  stage.appendChild(center);

  // OUTER 16
  for(var i=0;i<16;i++){
    var angle=(i/16)*Math.PI*2 - Math.PI/2;
    var x=cx+R*Math.cos(angle);
    var y=cy+R*Math.sin(angle);
    var d=mk("",""+MANIFOLDS[i],false);
    d.style.left=x+"px";
    d.style.top=y+"px";
    d.onclick=(function(code){
      return function(){go("/explore/frontier/"+code.toLowerCase()+"/");};
    })(MANIFOLDS[i]);
    stage.appendChild(d);
  }
}

function mk(word,code,isCenter){
  var d=document.createElement("div");
  d.className="d"+(isCenter?" center":"");
  var inner=document.createElement("div");
  inner.className="inner";
  var w=document.createElement("div");
  w.className="word";
  w.textContent=word;
  var c=document.createElement("div");
  c.className="cardinal";
  c.textContent=code;
  inner.appendChild(w);
  inner.appendChild(c);
  d.appendChild(inner);
  return d;
}

// toggles
function setLang(l){lang=l;LS.setItem("gd_lang",l);history.replaceState({}, "", location.pathname+q());}
function setLane(l){lane=l;history.replaceState({}, "", location.pathname+q());}

document.getElementById("langEN").onclick=function(){setLang("en");};
document.getElementById("langZH").onclick=function(){setLang("zh");};
document.getElementById("langES").onclick=function(){setLang("es");};
document.getElementById("laneP").onclick=function(){setLane("platform");};
document.getElementById("laneE").onclick=function(){setLane("engineering");};

document.getElementById("btnExit").onclick=function(){go("/door/");};
document.getElementById("btnHub").onclick=function(){go("/index.html");};

requestAnimationFrame(build);
window.addEventListener("resize",build);

})();
</script>

</body>
</html>
