<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Nine Summits World</title>
  <meta name="description" content="World entry gateway.">

  <link rel="stylesheet" href="./assets/ui.css">
</head>

<body data-mode="door">

  <canvas id="world-canvas"></canvas>

  <!-- DOOR UI -->
  <div id="door-ui">

    <div class="door-title">
      <h1>NINE SUMMITS</h1>
      <p>Choose your reality.</p>
    </div>

    <div class="door-options">

      <button id="btn-round" class="door-btn">
        WORLD IS ROUND
      </button>

      <button id="btn-flat" class="door-btn alt">
        WORLD IS FLAT
      </button>

    </div>

  </div>

  <script type="module">
    import { createPlanetEngine } from "./world/planet_engine.js";
    import { createRenderer } from "./world/render.js";
    import { createControlSystem } from "./world/control.js";

    const canvas = document.getElementById("world-canvas");
    const ctx = canvas.getContext("2d");

    const engine = createPlanetEngine();
    const renderer = createRenderer();
    const control = createControlSystem();

    const runtime = {
      planetField: null
    };

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      control.resize(canvas.width, canvas.height);
    }

    function render() {
      if (!runtime.planetField) return;

      renderer.renderPlanet({
        ctx,
        planetField: runtime.planetField,
        projectPoint: (lat, lon, r) => control.projectSphere(lat, lon, r),
        viewState: control.getCameraState()
      });
    }

    function frame() {
      control.stepInertia();
      render();
      requestAnimationFrame(frame);
    }

    function start() {
      resize();
      runtime.planetField = engine.buildPlanetField({});
      frame();
    }

    // ===== DOOR LOGIC =====

    document.getElementById("btn-round").addEventListener("click", () => {
      // ENTER WORLD → ZOOM INTO GRATITUDE
      window.location.href = "/world/gratitude/";
    });

    document.getElementById("btn-flat").addEventListener("click", () => {
      // FLAT MODE → CONTENT ONLY
      window.location.href = "/home/?mode=flat";
    });

    window.addEventListener("resize", resize);

    start();
  </script>

</body>
</html>
