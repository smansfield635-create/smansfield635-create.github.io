<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta
    name="viewport"
    content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover"
  />
  <title>Products</title>
  <meta
    name="description"
    content="Products stage host shell."
  />
  <style>
    :root {
      color-scheme: dark;
      --products-bg: #02040a;
      --products-fg: #f5f7fb;
      --products-stage-min-height: 100svh;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      padding: 0;
      background: var(--products-bg);
      color: var(--products-fg);
      overflow-x: hidden;
    }

    body {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    #products-app {
      position: relative;
      width: 100%;
      min-height: var(--products-stage-min-height);
      isolation: isolate;
    }

    #products-stage {
      position: relative;
      width: 100%;
      min-height: var(--products-stage-min-height);
      overflow: clip;
    }

    #products-stage[hidden] {
      display: block;
      visibility: hidden;
    }

    noscript {
      display: block;
      padding: 24px;
      font-size: 14px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div id="products-app" data-products-host="true" data-products-shell="host-only">
    <main
      id="products-stage"
      data-products-stage="true"
      aria-label="Products Stage"
    ></main>
  </div>

  <noscript>JavaScript is required to load the products stage.</noscript>

  <script type="module" src="./index.js"></script>
</body>
</html>
