<!-- TNT — /explore/models/index.html
     EXPLORE · APPLIED COHERENCE MODELS (ROUTING-SAFE SHELL)
     REQUIREMENTS:
       - Trilingual: EN / 中文 / ES
       - 4 lenses:
           lane=platform|engineering (URL-only; NEVER stored)
           style=informal|formal     (gd_style + URL)
       - Single-open accordion (one open at a time; tap same closes)
       - Inside each row: 3 sub-bubbles (Concept / Build Now / Roadmap) tap-to-open
       - Monument typography
       - Dark opal + red (no washed-out blue)
       - Canon state carry: lang/style/time/depth via URL + LS gd_lang/gd_style/gd_time/gd_depth ONLY
       - NO new gd_* keys
       - Uses ui.css + branch.css + instruments.js only
       - ui.css owns html/body background (NO overrides)
       - No inline onclick; addEventListener only
     ROUTING:
       - Back: /explore/
       - Frontier: /explore/frontier/
       - Products: /products/
       - Laws: /laws/
       - Gauges: /gauges/
-->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>EXPLORE · MODELS</title>

<link rel="stylesheet" href="/assets/ui.css"/>

<style>
a{color:inherit;text-decoration:none}
body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:#fff}
body::before,body::after{pointer-events:none!important}

:root{
  --dockH:132px;

  --stroke:rgba(255,255,255,.12);
  --stroke2:rgba(255,255,255,.10);

  --ink:rgba(255,255,255,.94);
  --txt:rgba(255,255,255,.92);
  --mut:rgba(255,255,255,.78);

  --crimson:rgba(120,0,22,.30);
  --festival:rgba(255,43,43,.14);
  --opalV:rgba(90,40,120,.10);

  --shadowA:0 24px 90px rgba(0,0,0,.58);
  --shadowB:0 16px 56px rgba(0,0,0,.62);
  --shadowC:0 18px 60px rgba(0,0,0,.55);
}

.page{
  width:min(1120px,94vw);
  margin:0 auto;
  padding:14px 0 calc(var(--dockH) + 18px);
  display:flex;
  flex-direction:column;
  gap:12px;
  position:relative;
  z-index:10;
}

.top{
  position:sticky;
  top:0;
  z-index:240;
  padding:10px 0 6px;
  display:flex;
  justify-content:space-between;
  gap:12px;
}
.top .left,.top .right{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  white-space:nowrap;
  align-items:center;
}

.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:10px 12px;min-height:44px;border-radius:16px;
  border:1px solid rgba(255,255,255,.14);
  background:
    radial-gradient(circle at 50% 120%, rgba(201,162,74,.16), transparent 64%),
    linear-gradient(145deg, rgba(10,12,16,.78), rgba(6,8,10,.90));
  color:var(--ink);
  font-weight:950;font-size:14px;letter-spacing:.2px;
  -webkit-tap-highlight-color:transparent;
  position:relative;overflow:hidden;
  touch-action:manipulation;
  box-shadow:var(--shadowC);
}
.btn:active{transform:translateY(1px)}
.btn::after{
  content:"";
  position:absolute;left:10px;right:10px;bottom:-12px;height:28px;
  background: radial-gradient(circle at 50% 0%, rgba(201,162,74,.34), transparent 72%);
  opacity:.60;pointer-events:none;
}
.btn.red{border-color:rgba(255,43,43,.22); box-shadow:var(--shadowC), 0 0 18px rgba(255,43,43,.12);}

.header{
  border:1px solid var(--stroke);
  border-radius:22px;
  background:
    radial-gradient(circle at 18% 22%, var(--crimson), transparent 72%),
    radial-gradient(circle at 82% 34%, var(--opalV), transparent 74%),
    radial-gradient(circle at 70% 92%, var(--festival), transparent 62%),
    radial-gradient(circle at 26% 22%, rgba(201,162,74,.14), transparent 62%),
    linear-gradient(160deg, rgba(0,0,0,.30), rgba(0,0,0,.14));
  backdrop-filter:blur(10px);
  box-shadow:var(--shadowA);
  padding:16px 16px 14px;
  position:relative;
  overflow:hidden;
}
.header::before{
  content:"";
  position:absolute;inset:0;border-radius:22px;pointer-events:none;
  box-shadow: inset 0 0 0 1px rgba(201,162,74,.16);
  background:
    repeating-linear-gradient(45deg, rgba(201,162,74,.08) 0 1px, transparent 1px 16px),
    repeating-linear-gradient(-45deg, rgba(201,162,74,.06) 0 1px, transparent 1px 16px);
  opacity:.26;
  mask:
    radial-gradient(circle at 50% 50%, transparent 0 78%, #000 82% 100%),
    linear-gradient(#000,#000);
  -webkit-mask:
    radial-gradient(circle at 50% 50%, transparent 0 78%, #000 82% 100%),
    linear-gradient(#000,#000);
}

.k{margin:0 0 8px;font-size:12px;letter-spacing:4px;text-transform:uppercase;opacity:.80;color:rgba(255,255,255,.78)}
.t{margin:0;font-weight:980;font-size:30px;letter-spacing:.8px;line-height:1.08;color:var(--ink)}
.s{margin:12px 0 0;font-size:16px;opacity:.92;line-height:1.55;max-width:980px;color:var(--txt)}
.rule{

  border:1px solid rgba(255,255,255,.10);

    linear-gradient(160deg, rgba(10,12,16,.55), rgba(6,8,10,.72));

  color:rgba(255,255,255,.86);

}

.lenses{

  gap:10px;

  justify-content:space-between;
  align-items:center;
}
.pills{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.pill{
  padding:10px 14px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.12);
  background:
    radial-gradient(circle at 50% 120%, rgba(201,162,74,.12), transparent 64%),
    linear-gradient(145deg, rgba(10,12,16,.78), rgba(6,8,10,.90));
  box-shadow:0 14px 36px rgba(0,0,0,.55);

  background: radial-gradient(circle at 50% 0%, rgba(201,162,74,.26), transparent 72%);

}
.pill.active{
  border-color:rgba(255,43,43,.32);
  box-shadow:0 14px 36px rgba(0,0,0,.55), 0 0 16px rgba(255,43,43,.12);
}
.badge{
  display:inline-flex;align-items:center;gap:10px;
  padding:10px 12px;border-radius:999px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(0,0,0,.16);
  color:rgba(255,255,255,.78);
  font-weight:950;
  box-shadow:0 14px 36px rgba(0,0,0,.55);
}
.badge b{color:var(--ink)}

.band{
  padding:10px 12px;
  border-radius:18px;
  border:1px solid var(--stroke2);
  background:rgba(0,0,0,.14);
  font-weight:950;
  letter-spacing:.2px;
  color:rgba(255,255,255,.88);
}

.list{display:flex;flex-direction:column;gap:12px}
.row{
  border:1px solid rgba(255,255,255,.10);
  border-radius:22px;
  background:
    radial-gradient(circle at 22% 18%, rgba(255,43,43,.10), transparent 58%),
    radial-gradient(circle at 82% 30%, rgba(90,40,120,.10), transparent 62%),
    linear-gradient(145deg, rgba(17,22,28,.86), rgba(11,15,20,.94));
  box-shadow:var(--shadowB);
  overflow:hidden;
  position:relative;
}
.row::before{
  content:"";
  position:absolute;inset:0;border-radius:22px;pointer-events:none;
  box-shadow: inset 0 0 0 1px rgba(201,162,74,.12);

}
.head{
  display:flex;align-items:flex-start;justify-content:space-between;
  gap:10px;
  padding:16px 16px;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
.hL{display:flex;gap:12px;align-items:flex-start;min-width:0}
.dmark{
  width:10px;height:10px;border-radius:3px;
  transform:rotate(45deg);
  background:var(--c, rgba(201,162,74,.45));

}
.titleBlock{min-width:0}
.q{
  font-weight:980;
  letter-spacing:.2px;
  font-size:18px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  color:var(--ink);
}
.sub{
  margin-top:8px;

  opacity:.88;
  line-height:1.42;
  color:rgba(255,255,255,.86);

}
.chev{
  width:36px;height:36px;border-radius:14px;
  border:1px solid rgba(255,255,255,.14);
  background: rgba(0,0,0,.16);
  display:flex;align-items:center;justify-content:center;
  color:rgba(255,255,255,.78);
  font-weight:950;
  position:relative;overflow:hidden;
  flex:0 0 auto;margin-top:2px;
}
.chev::after{
  content:"";
  position:absolute;left:6px;right:6px;bottom:-10px;height:22px;
  background: radial-gradient(circle at 50% 0%, rgba(201,162,74,.30), transparent 70%);
  opacity:.62;pointer-events:none;
}

.body{
  display:none;
  padding:16px 16px 16px;
  border-top:1px solid rgba(255,255,255,.08);
  background:
    radial-gradient(circle at 30% 30%, rgba(255,255,255,.06), transparent 55%),
    linear-gradient(145deg, rgba(10,12,16,.86), rgba(6,8,10,.94));
}
.row.open .body{display:block}
.row.open{border-color:rgba(255,43,43,.22); box-shadow:var(--shadowB), 0 0 18px rgba(255,43,43,.10);}

.pdesc{margin:0;color:rgba(255,255,255,.90);line-height:1.65;font-size:15px}
.subBubbles{margin-top:12px;display:flex;flex-direction:column;gap:10px}
.bubble{
  border:1px solid rgba(255,255,255,.10);
  border-radius:18px;
  background:
    radial-gradient(circle at 22% 18%, rgba(255,43,43,.08), transparent 60%),
    radial-gradient(circle at 82% 70%, rgba(201,162,74,.08), transparent 62%),
    rgba(0,0,0,.12);
  padding:14px 14px 12px;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
  position:relative;
  overflow:hidden;
}
.bubble::after{
  content:"";
  position:absolute;left:10px;right:10px;bottom:-14px;height:30px;
  background: radial-gradient(circle at 50% 0%, rgba(201,162,74,.22), transparent 72%);
  opacity:.50;pointer-events:none;
}
.bubble h4{margin:0 0 8px;font-weight:980;letter-spacing:.15px;font-size:15px;color:var(--ink)}
.bubble p{margin:0;color:rgba(255,255,255,.80);line-height:1.7;display:none;font-size:14.5px}
.bubble.open p{display:block}

.actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end;margin-top:14px}

.dock{
  position:fixed;
  left:50%;
  bottom:max(10px, env(safe-area-inset-bottom));
  transform:translateX(-50%);
  z-index:220;
  width:min(980px,94vw);
  padding:10px 12px;
  border-radius:22px;
  border:1px solid rgba(255,255,255,.12);
  background:
    radial-gradient(circle at 18% 18%, rgba(255,43,43,.10), transparent 62%),
    radial-gradient(circle at 82% 70%, rgba(90,40,120,.10), transparent 64%),
    linear-gradient(145deg, rgba(10,12,16,.72), rgba(6,8,10,.86));
  backdrop-filter:blur(10px);
  box-shadow:0 18px 60px rgba(0,0,0,.55);
  display:grid;
  grid-template-columns:repeat(4, minmax(0,1fr));
  gap:10px;
}
.dock .btn{width:100%;padding:10px 10px;border-radius:999px;white-space:nowrap}
@media (max-width:520px){
  :root{--dockH:148px}
  .dock{grid-template-columns:repeat(3, minmax(0,1fr))}
}
</style>

<body>
<div class="page">

  <div class="top" aria-label="Top controls">
    <div class="left">
      <a class="btn" id="btnExplore" href="/explore/" data-route="/explore/">EXPLORE</a>
      <a class="btn" id="btnFrontier" href="/explore/frontier/" data-route="/explore/frontier/">FRONTIER</a>
      <a class="btn" id="btnHome" href="/home/" data-route="/home/">HOME</a>
    </div>
    <div class="right" aria-label="Language">
      <button class="btn" id="btnEN" type="button">EN</button>

      <button class="btn" id="btnES" type="button">ES</button>

    <p class="s" id="hs"></p>
    <div class="rule" id="rule"></div>

    <div class="lenses" aria-label="Lenses">
      <div class="pills" aria-label="Lane">
        <button class="pill" id="pillPlatform" type="button">PLATFORM</button>

        <span id="bLang">LANG</span> <b id="bLangV">EN</b>

        <span id="bTone">STYLE</span> <b id="bToneV">INFORMAL</b>
      </div>

<script>
(function(){
  "use strict";

  var qs=new URLSearchParams(location.search);
  var LS=window.localStorage;

  var lang  = qs.get("lang")  || LS.getItem("gd_lang")  || "en";
  var style = qs.get("style") || LS.getItem("gd_style") || "informal";
  var time  = qs.get("time")  || LS.getItem("gd_time")  || "now";
  var depth = qs.get("depth") || LS.getItem("gd_depth") || "1";
  var lane  = qs.get("lane")  || "platform"; // URL-only

  if(lang!=="en" && lang!=="zh" && lang!=="es") lang="en";
  if(style!=="informal" && style!=="formal") style="informal";
  if(time!=="origin" && time!=="now" && time!=="post") time="now";

  var d=parseInt(depth,10);
  if(!isFinite(d)) d=1;
  if(d<1) d=1;
  if(d>9) d=9;
  depth=String(d);

  if(lane!=="platform" && lane!=="engineering") lane="platform";

  try{
    LS.setItem("gd_lang",lang);
    LS.setItem("gd_style",style);
    LS.setItem("gd_time",time);
    LS.setItem("gd_depth",depth);
  }catch(e){}

  document.documentElement.lang = (lang==="zh")?"zh":(lang==="es")?"es":"en";

  function q(extra){
    var p=new URLSearchParams();
    p.set("lang",(extra&&extra.lang)?extra.lang:lang);
    p.set("style",(extra&&extra.style)?extra.style:style);
    p.set("time",(extra&&extra.time)?extra.time:time);
    p.set("depth",(extra&&extra.depth)?String(extra.depth):depth);
    var L=(extra&&extra.lane)?extra.lane:lane;
    if(L==="platform"||L==="engineering") p.set("lane", L);
    return "?" + p.toString();
  }

  function wireAll(){
    var nodes=document.querySelectorAll("[data-route]");
    for(var i=0;i<nodes.length;i++){
      var el=nodes[i];
      var route=el.getAttribute("data-route")||"";
      if(!route) continue;

      if(route.indexOf("?")!==-1){
        try{
          var u=new URL(route, location.origin);
          var sp=u.searchParams;
          if(!sp.get("lang")) sp.set("lang", lang);
          if(!sp.get("style")) sp.set("style", style);
          if(!sp.get("time")) sp.set("time", time);
          if(!sp.get("depth")) sp.set("depth", depth);
          if(!sp.get("lane")) sp.set("lane", lane);
          el.setAttribute("href", u.pathname + "?" + sp.toString() + (u.hash||""));
        }catch(e){
          el.setAttribute("href", route);
        }
      }else{
        el.setAttribute("href", route + q());
      }
    }
  }

  function setLang(next){
    if(next!=="en" && next!=="zh" && next!=="es") next="en";
    lang=next;
    try{ LS.setItem("gd_lang",lang);}catch(e){}
    window.location.href = window.location.pathname + q({lang:lang});
  }
  var btnEN=document.getElementById("btnEN");
  var btnZH=document.getElementById("btnZH");
  var btnES=document.getElementById("btnES");
  if(btnEN) btnEN.addEventListener("click", function(){ setLang("en"); }, {passive:true});
  if(btnZH) btnZH.addEventListener("click", function(){ setLang("zh"); }, {passive:true});
  if(btnES) btnES.addEventListener("click", function(){ setLang("es"); }, {passive:true});

  var pillPlatform=document.getElementById("pillPlatform");
  var pillEngineering=document.getElementById("pillEngineering");
  var pillInformal=document.getElementById("pillInformal");
  var pillFormal=document.getElementById("pillFormal");

  function paintPills(){
    pillPlatform.classList.toggle("active", lane==="platform");
    pillEngineering.classList.toggle("active", lane==="engineering");
    pillInformal.classList.toggle("active", style==="informal");
    pillFormal.classList.toggle("active", style==="formal");
  }

  function setLane(next){
    if(next!=="platform" && next!=="engineering") next="platform";
    lane=next;
    history.replaceState({}, "", location.pathname + q({lane:lane}));
    paintPills();
    render();
  }
  function setTone(next){
    if(next!=="informal" && next!=="formal") next="informal";
    style=next;
    try{ LS.setItem("gd_style",style);}catch(e){}
    history.replaceState({}, "", location.pathname + q({style:style}));
    paintPills();
    render();
  }
  pillPlatform.addEventListener("click", function(){ setLane("platform"); }, {passive:true});
  pillEngineering.addEventListener("click", function(){ setLane("engineering"); }, {passive:true});
  pillInformal.addEventListener("click", function(){ setTone("informal"); }, {passive:true});
  pillFormal.addEventListener("click", function(){ setTone("formal"); }, {passive:true});

  function P(en,zh,es){ return {en:en, zh:zh, es:es}; }
  function pick(o){ return (lang==="zh")?o.zh:(lang==="es")?(o.es||o.en):o.en; }

  function laneLabel(){
    if(lang==="zh") return (lane==="engineering")?"工程":"平台";
    if(lang==="es") return (lane==="engineering")?"INGENIERÍA":"PLATAFORMA";
    return (lane==="engineering")?"ENGINEERING":"PLATFORM";
  }
  function styleLabel(){
    if(lang==="zh") return (style==="formal")?"正式":"通俗";
    if(lang==="es") return (style==="formal")?"FORMAL":"INFORMAL";
    return (style==="formal")?"FORMAL":"INFORMAL";
  }

  var HEAD={
    en:{
      hs_platform_informal:"This lane turns ‘it feels off’ into a map you can walk: what changed, what moved together, and what to do next.",
      hs_platform_formal:"This is the routing shell for applied models. It preserves state and keeps navigation honest.",
      hs_engineering_informal:"Engineering view: define coordinates and thresholds so independent observers classify the same evidence the same way.",
      hs_engineering_formal:"Engineering posture: observer-invariant measurement rules, deterministic evaluation, and reproducible outputs under declared scope.",
      rule:"Rule: models are only as good as their measurement rules. If observers can’t agree, the model is not yet operational."
    },
    zh:{
      hs_platform_informal:"本车道把“感觉不对”变成可走的地图：变了什么、哪些一起动、下一步做什么。",
      hs_platform_formal:"本页是应用模型的路由壳：保留状态，保持导航诚实。",
      hs_engineering_informal:"工程视图：定义坐标与阈值，让独立观察者对同证据给出同分类。",
      hs_engineering_formal:"工程姿态：观察者不变测量规则、确定性评估、声明范围下可复现输出。",
      rule:"规则：模型的价值取决于测量规则。观察者不能一致，就还未可操作。"
    },
    es:{
      hs_platform_informal:"Este carril convierte ‘se siente mal’ en un mapa caminable: qué cambió, qué se movió junto y qué hacer.",
      hs_platform_formal:"Este es el shell de rutas para modelos aplicados. Preserva estado y mantiene navegación honesta.",
      hs_engineering_informal:"Vista ingeniería: define coordenadas y umbrales para que observadores independientes clasifiquen igual la misma evidencia.",
      hs_engineering_formal:"Postura ingeniería: reglas invariantes al observador, evaluación determinista y salidas reproducibles bajo alcance declarado.",
      rule:"Regla: los modelos valen tanto como sus reglas de medición. Si observadores no coinciden, aún no es operacional."
    }
  };

  var ROOMS=[
    {c:"#ff2b2b", t:P("Diagnostic Core","诊断核心","Núcleo de diagnóstico"), s:P("Pass / hold / contain with reason codes.","通过/等待/隔离 + 原因码。","Pasa/espera/contén con razones."), href:"/explore/models/diagnostic-core/"},
    {c:"#c9a24a", t:P("Dot.Grid Mapping","Dot.Grid 映射","Mapeo Dot.Grid"), s:P("Map + sweep to reveal wiring.","地图+扫掠暴露线路。","Mapa + barrido para revelar cableado."), href:"/explore/models/dot-grid/"},
    {c:"#ff2b2b", t:P("Lattice Enumeration","晶格枚举","Enumeración lattice"), s:P("Finite states and transitions.","有限状态与转移。","Estados finitos y transiciones."), href:"/explore/models/lattice/"},
    {c:"#c9a24a", t:P("Trajectory Windows","轨迹窗口","Ventanas de trayectoria"), s:P("Windowed evaluation + epoch rules.","窗口评估 + 纪元规则。","Evaluación por ventanas + reglas de época."), href:"/explore/models/trajectory/"},
    {c:"#ff2b2b", t:P("Correlation Exposure","相关暴露","Exposición de correlación"), s:P("Coupled movement and shared dependency risk.","耦合运动与共享依赖风险。","Movimiento acoplado y riesgo compartido."), href:"/explore/models/correlation/"},
    {c:"#c9a24a", t:P("Stress Tests","压力测试","Pruebas de estrés"), s:P("Try to break it before scale.","规模前先打破。","Rómpelo antes de escalar."), href:"/explore/models/stress-tests/"}
  ];

  function labConcept(){ return (lang==="zh")?"概念":(lang==="es")?"Concepto":"Concept"; }
  function labBuild(){ return (lang==="zh")?"现在建":(lang==="es")?"Construir ahora":"Build Now"; }
  function labRoadmap(){ return (lang==="zh")?"路线图":(lang==="es")?"Hoja de ruta":"Roadmap"; }
  function openLabel(){ return (lang==="zh")?"打开":(lang==="es")?"ABRIR":"OPEN"; }

  function makeSubBubble(label, text){
    var b=document.createElement("div");
    b.className="bubble";
    b.setAttribute("role","button");
    b.tabIndex=0;

    var h=document.createElement("h4");
    h.textContent=label;

    var p=document.createElement("p");
    p.textContent=text;

    b.appendChild(h);
    b.appendChild(p);

    function act(){ b.classList.toggle("open"); }
    b.addEventListener("click", act, {passive:true});
    b.addEventListener("keydown", function(e){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); act(); }});
    return b;
  }

  var list=document.getElementById("list");

  function closeAllRows(){
    var rows=list.querySelectorAll(".row");
    for(var i=0;i<rows.length;i++){
      rows[i].classList.remove("open");
      var ch=rows[i].querySelector(".chevTxt");
      if(ch) ch.textContent="▸";
    }
  }

  function makeRow(item, idx){
    var row=document.createElement("div");
    row.className="row";
    row.style.setProperty("--c", item.c);

    var head=document.createElement("div");
    head.className="head";
    head.setAttribute("role","button");
    head.tabIndex=0;

    var hL=document.createElement("div");
    hL.className="hL";

    var mark=document.createElement("div");
    mark.className="dmark";
    mark.style.background=item.c;

    var tb=document.createElement("div");
    tb.className="titleBlock";

    var qEl=document.createElement("div");
    qEl.className="q";
    qEl.textContent=pick(item.t);

    var sEl=document.createElement("div");
    sEl.className="sub";
    sEl.textContent=pick(item.s);

    tb.appendChild(qEl);
    tb.appendChild(sEl);

    hL.appendChild(mark);
    hL.appendChild(tb);

    var chev=document.createElement("div");
    chev.className="chev";
    chev.innerHTML='<span class="chevTxt">▸</span>';

    head.appendChild(hL);
    head.appendChild(chev);

    var body=document.createElement("div");
    body.className="body";

    var intro=document.createElement("p");
    intro.className="pdesc";
    intro.textContent =
      (lane==="platform")
        ? (lang==="zh" ? "平台视角：先让人能用，再让人能懂。用清晰入口把人路由到正确页。"
           : lang==="es" ? "Plataforma: primero usable, luego entendible. Rutea con entradas claras."
           : "Platform: usable first, then explainable. Route people with clear entry points.")
        : (lang==="zh" ? "工程视角：先定义测量规则与阈值。没有可复现规则，就不升级。"
           : lang==="es" ? "Ingeniería: define reglas de medición y umbrales. Sin reglas reproducibles, no hay upgrade."
           : "Engineering: define measurement rules and thresholds. No reproducible rules, no upgrades.");

    var bubbles=document.createElement("div");
    bubbles.className="subBubbles";

    var conceptText = (style==="formal")
      ? (lang==="zh" ? "概念：把语义翻译成坐标。让独立观察者对同证据给出同分类。"
         : lang==="es" ? "Concepto: traducir semántica a coordenadas. Observadores independientes deben clasificar igual."
         : "Concept: translate semantics into coordinates. Independent observers must classify identically.")
      : (lang==="zh" ? "概念：把“感觉”变成“可验证”。"
         : lang==="es" ? "Concepto: convertir ‘sensación’ en ‘verificable’."
         : "Concept: turn ‘feeling’ into ‘verifiable’.");

    var buildText = (style==="formal")
      ? (lang==="zh" ? "现在建：先做最小规则集+原因码输出，再做仪表与可视化。"
         : lang==="es" ? "Construir ahora: conjunto mínimo de reglas + razones, luego tableros."
         : "Build now: minimum rule set + reason-code outputs, then dashboards.")
      : (lang==="zh" ? "现在建：先做一个可跑的例子（输入→输出→解释）。"
         : lang==="es" ? "Construir ahora: un ejemplo ejecutable (entrada→salida→explicación)."
         : "Build now: one runnable example (input→output→explanation).");

    var roadText = (lang==="zh"
      ? "路线图：把模型绑定到 Gauges（信号）与 Laws（边界），并用窗口/纪元管理修正。"
      : (lang==="es"
        ? "Hoja de ruta: enlazar el modelo a Medidores (señales) y Leyes (límites), y gestionar correcciones con ventanas/épocas."
        : "Roadmap: bind models to Gauges (signals) and Laws (bounds), and manage corrections via windows/epochs."));

    bubbles.appendChild(makeSubBubble(labConcept(), conceptText));
    bubbles.appendChild(makeSubBubble(labBuild(), buildText));
    bubbles.appendChild(makeSubBubble(labRoadmap(), roadText));

    var actions=document.createElement("div");
    actions.className="actions";
    var a=document.createElement("a");
    a.className="btn red";
    a.textContent=openLabel()+": "+(lang==="zh"?"进入":"Enter");
    a.setAttribute("data-route", item.href);
    actions.appendChild(a);

    body.appendChild(intro);
    body.appendChild(bubbles);
    body.appendChild(actions);

    function toggle(){
      var isOpen=row.classList.contains("open");
      if(isOpen){
        row.classList.remove("open");
        row.querySelector(".chevTxt").textContent="▸";
        return;
      }
      closeAllRows();
      row.classList.add("open");
      row.querySelector(".chevTxt").textContent="▾";
      wireAll();
    }
    head.addEventListener("click", toggle, {passive:true});
    head.addEventListener("keydown", function(e){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); toggle(); }});

    row.appendChild(head);
    row.appendChild(body);

    if(idx===0){
      row.classList.add("open");
      row.querySelector(".chevTxt").textContent="▾";
    }
    return row;
  }

  function applyHeader(){
    var key = (lane==="platform" ? "platform_" : "engineering_") + (style==="formal" ? "formal" : "informal");
    var H=HEAD[lang] || HEAD.en;

    document.getElementById("hs").textContent = H["hs_"+key] || H.hs_platform_informal;
    document.getElementById("rule").textContent = H.rule;

    document.getElementById("bLangV").textContent = (lang==="zh")?"中文":(lang==="es")?"ES":"EN";
    document.getElementById("bLaneV").textContent = laneLabel();
    document.getElementById("bToneV").textContent = styleLabel();

    if(lang==="zh"){
      document.getElementById("hk").textContent="探索 · 模型";
      document.getElementById("ht").textContent="应用一致性模型";
      document.getElementById("band").textContent="模型房间（壳）";
      document.getElementById("dockCompass").textContent="索引";
      document.getElementById("dockProducts").textContent="产品";
      document.getElementById("dockLaws").textContent="法则";
      document.getElementById("dockGauges").textContent="量规";
      document.getElementById("btnExplore").textContent="探索";
      document.getElementById("btnFrontier").textContent="前沿";
      document.getElementById("btnHome").textContent="主页";
      pillPlatform.textContent="平台";
      pillEngineering.textContent="工程";
      pillInformal.textContent="通俗";
      pillFormal.textContent="正式";
      document.getElementById("bLang").textContent="语言";
      document.getElementById("bLane").textContent="车道";
      document.getElementById("bTone").textContent="语气";
    }else if(lang==="es"){
      document.getElementById("hk").textContent="EXPLORAR · MODELOS";
      document.getElementById("ht").textContent="MODELOS DE COHERENCIA APLICADOS";
      document.getElementById("band").textContent="SALAS DE MODELO (SHELLS)";
      document.getElementById("dockCompass").textContent="BRÚJULA";
      document.getElementById("dockProducts").textContent="PRODUCTOS";
      document.getElementById("dockLaws").textContent="LEYES";
      document.getElementById("dockGauges").textContent="MEDIDORES";
      document.getElementById("btnExplore").textContent="EXPLORAR";
      document.getElementById("btnFrontier").textContent="FRONTERA";
      document.getElementById("btnHome").textContent="INICIO";
      pillPlatform.textContent="PLATAFORMA";
      pillEngineering.textContent="INGENIERÍA";
      pillInformal.textContent="INFORMAL";
      pillFormal.textContent="FORMAL";
      document.getElementById("bLang").textContent="IDIOMA";
      document.getElementById("bLane").textContent="CARRIL";
      document.getElementById("bTone").textContent="ESTILO";
    }else{
      document.getElementById("hk").textContent="EXPLORE · MODELS";
      document.getElementById("ht").textContent="APPLIED COHERENCE MODELS";
      document.getElementById("band").textContent="MODEL ROOMS (SHELLS)";
      document.getElementById("dockCompass").textContent="COMPASS";
      document.getElementById("dockProducts").textContent="PRODUCTS";
      document.getElementById("dockLaws").textContent="LAWS";
      document.getElementById("dockGauges").textContent="GAUGES";
      document.getElementById("btnExplore").textContent="EXPLORE";
      document.getElementById("btnFrontier").textContent="FRONTIER";
      document.getElementById("btnHome").textContent="HOME";
      pillPlatform.textContent="PLATFORM";
      pillEngineering.textContent="ENGINEERING";
      pillInformal.textContent="INFORMAL";
      pillFormal.textContent="FORMAL";
      document.getElementById("bLang").textContent="LANG";
      document.getElementById("bLane").textContent="LANE";
      document.getElementById("bTone").textContent="STYLE";
    }
  }

  function render(){
    paintPills();
    applyHeader();
    list.innerHTML="";
    for(var i=0;i<ROOMS.length;i++){
      list.appendChild(makeRow(ROOMS[i], i));
    }
    wireAll();
  }

  paintPills();
  render();
})();
</script>

</body>
