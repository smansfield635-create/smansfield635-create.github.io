<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Diagnostic Gauges</title>
<style>
:root{
  --bg:#0b0f14;
  --panel:#0f1620;
  --line:#1f2a36;
  --text:#d7f9ff;
  --muted:rgba(215,249,255,.72);
  --accent:#7fffd4;
}
*{box-sizing:border-box}
html,body{margin:0;background:var(--bg);color:var(--text);font-family:monospace}
.container{padding:16px;max-width:1040px;margin:0 auto}
.status{color:var(--accent);font-weight:bold;margin-bottom:12px}
.group{
  margin-bottom:12px;
  border:1px solid var(--line);
  border-radius:12px;
  background:var(--panel);
  overflow:hidden;
}
.summary{
  display:flex;
  align-items:center;
  gap:12px;
  width:100%;
  padding:12px;
  background:transparent;
  border:0;
  color:var(--text);
  text-align:left;
  cursor:pointer;
}
.summary:active{transform:translateY(1px)}
.diamondWrap{
  width:26px;
  height:26px;
  position:relative;
  flex:0 0 26px;
}
.diamond{
  position:absolute;
  inset:0;
  transform:rotate(45deg);
  border-radius:4px;
  border:1px solid rgba(255,255,255,.18);
  box-shadow:
    inset 0 0 12px rgba(255,255,255,.08),
    0 0 10px rgba(255,255,255,.12);
  animation:spin 7s linear infinite,pulse 1.8s ease-in-out infinite;
}
.spark::after{
  content:"";
  position:absolute;
  inset:-3px;
  border-radius:6px;
  border:1px solid rgba(255,255,255,.25);
  transform:rotate(45deg);
  animation:flicker .6s steps(2,end) infinite;
}
@keyframes spin{
  from{transform:rotate(45deg)}
  to{transform:rotate(405deg)}
}
@keyframes pulse{
  0%,100%{filter:brightness(.95)}
  50%{filter:brightness(1.18)}
}
@keyframes flicker{
  0%,100%{opacity:.12}
  25%{opacity:.55}
  50%{opacity:.18}
  75%{opacity:.72}
}
.state-white{background:rgba(255,255,255,.88)}
.state-gray{background:rgba(144,154,166,.72)}
.state-yellow{background:rgba(255,224,128,.88)}
.state-orange{background:rgba(255,170,102,.92)}
.state-red{background:rgba(255,108,108,.95)}
.state-black{background:rgba(12,12,12,.96);border-color:rgba(255,255,255,.28)}
.state-blue{background:rgba(110,231,255,.9)}
.summaryText{min-width:0;flex:1 1 auto}
.titleRow{display:flex;align-items:center;justify-content:space-between;gap:12px}
.title{color:var(--accent);font-weight:bold}
.meta{color:var(--muted);font-size:12px;white-space:nowrap}
.preview{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:8px;
  margin-top:6px;
}
.previewItem{
  padding:6px 8px;
  border:1px solid var(--line);
  border-radius:8px;
  background:rgba(255,255,255,.02);
}
.previewK{opacity:.72;font-size:11px}
.previewV{margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.detail{
  display:none;
  padding:0 12px 12px 12px;
  border-top:1px solid var(--line);
}
.group.open .detail{display:block}
.rows{margin-top:10px}
.row{display:flex;justify-content:space-between;gap:16px;margin:4px 0}
.row div:first-child{opacity:.9}
.row div:last-child{text-align:right;word-break:break-word}
.canvasWrap{
  margin-top:10px;
  border:1px solid var(--line);
  border-radius:8px;
  overflow:hidden;
  background:var(--bg);
}
canvas{display:block;width:100%}
.small{opacity:.7;font-size:12px;margin-top:6px}
@media (max-width:760px){
  .preview{grid-template-columns:1fr}
}
</style>
</head>

<body>
<div class="container">
  <div id="status" class="status">STATE: NO DATA</div>
  <div id="groups"></div>
</div>

<script>
const KEYS = ["cte_runtime_v4", "cte_runtime_v3"];
const HISTORY_SIZE = 180;
const RELEASE_LATCH_MS = 1600;
const DRAG_LATCH_MS = 200;
const EPS = 0.000001;

const history = {
  yawVelocity: [],
  pitchVelocity: [],
  velocityMagnitude: [],
  dragActive: [],
  fps: [],
  coherence: [],
  clarity: [],
  stability: []
};

let prevDragActive = null;
let prevVelocityMagnitude = null;
let prevYawVelocity = null;
let prevPitchVelocity = null;

let lastReleaseAt = null;
let lastReleaseYawVelocity = null;
let lastReleasePitchVelocity = null;
let peakVelocityRecent = 0;
let lastDragAt = null;

const GROUP_ORDER = [
  "runtime",
  "trajectory",
  "worldMode",
  "variant",
  "traversal",
  "coherence",
  "perception",
  "subsurface",
  "motion",
  "handoff",
  "history",
  "autospin",
  "emission",
  "scope",
  "lens",
  "primitive",
  "topology",
  "renderAuthority",
  "density"
];

const OPEN_DEFAULT = new Set([
  "runtime",
  "trajectory",
  "worldMode",
  "variant",
  "traversal",
  "coherence"
]);

function row(k,v){
  return `<div class="row"><div>${k}</div><div>${v}</div></div>`;
}

function fmt(v, digits = 6){
  return typeof v === "number" && Number.isFinite(v) ? v.toFixed(digits) : "—";
}

function bool(v){
  return v === true ? "true" : v === false ? "false" : "—";
}

function num(v){
  return typeof v === "number" && Number.isFinite(v) ? v : null;
}

function esc(v){
  return String(v ?? "—")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;");
}

function read(){
  for(const key of KEYS){
    try{
      const raw = localStorage.getItem(key);
      if(!raw) continue;
      const parsed = JSON.parse(raw);
      if(parsed && typeof parsed === "object"){
        parsed.__sourceKey = key;
        return parsed;
      }
    }catch{}
  }
  return null;
}

function getMotionState(data){
  return data?.control?.motionState || {};
}

function getCameraState(data){
  return data?.control?.cameraState || {};
}

function getWorldVariantState(data){
  return data?.worldVariantState || data?.worldModeState?.variantState || {};
}

function getTraversalState(data){
  return data?.traversalState || data?.worldModeState?.traversalState || {};
}

function getCoherenceState(data){
  return data?.coherenceBindingState || data?.coherenceState || data?.worldModeState?.coherenceBindingState || {};
}

function getPerceptionState(data){
  return data?.perceptionModifiersState || data?.perceptionModifiers || data?.worldModeState?.perceptionModifiersState || {};
}

function getSubsurfaceState(data){
  return data?.subsurfaceActivationState || data?.worldModeState?.subsurfaceActivationState || {};
}

function getWorldModeState(data){
  return data?.worldModeState || {};
}

function pickNumber(...values){
  for(const v of values){
    if(typeof v === "number" && Number.isFinite(v)) return v;
  }
  return null;
}

function pickString(...values){
  for(const v of values){
    if(typeof v === "string" && v.length > 0) return v;
  }
  return null;
}

function deriveDragActive(data){
  const m = getMotionState(data);
  const c = getCameraState(data);
  if(typeof m.dragActive === "boolean") return m.dragActive;
  if(typeof c.dragActive === "boolean") return c.dragActive;
  return null;
}

function deriveYawVelocity(data){
  const m = getMotionState(data);
  const c = getCameraState(data);
  return pickNumber(m.yawVelocity, c.yawVelocity);
}

function derivePitchVelocity(data){
  const m = getMotionState(data);
  const c = getCameraState(data);
  return pickNumber(m.pitchVelocity, c.pitchVelocity);
}

function deriveVelocityMagnitude(yv, pv){
  if(yv === null && pv === null) return null;
  return Math.sqrt((yv || 0) * (yv || 0) + (pv || 0) * (pv || 0));
}

function deriveInertiaDecay(data){
  const m = getMotionState(data);
  const c = getCameraState(data);
  return pickNumber(m.inertiaDecay, c.inertiaDecay);
}

function deriveAutoSpinEnabled(data){
  const m = getMotionState(data);
  const c = getCameraState(data);
  if(typeof m.autoSpinEnabled === "boolean") return m.autoSpinEnabled;
  if(typeof c.autoSpinEnabled === "boolean") return c.autoSpinEnabled;
  return null;
}

function deriveAutoSpinSpeed(data){
  const m = getMotionState(data);
  const c = getCameraState(data);
  return pickNumber(m.autoSpinSpeed, c.autoSpinSpeed);
}

function deriveGlobalCoherence(data){
  const c = getCoherenceState(data);
  return pickNumber(
    c?.globalField?.coherence,
    c?.global?.coherence,
    c?.diagnostics?.globalCoherence
  );
}

function deriveGlobalNoise(data){
  const c = getCoherenceState(data);
  return pickNumber(
    c?.globalField?.noise,
    c?.global?.noise
  );
}

function deriveGlobalStability(data){
  const c = getCoherenceState(data);
  return pickNumber(
    c?.globalField?.stability,
    c?.global?.stability,
    c?.diagnostics?.globalStability
  );
}

function deriveTrajectory(variant, traversal, coherence, perception, subsurface){
  const activeVariant = pickNumber(variant?.activeVariant) ?? null;
  const traversalMode = pickString(traversal?.activeMode) || "—";
  const coherenceLevel = pickNumber(
    coherence?.globalField?.coherence,
    coherence?.global?.coherence
  );
  const clarityLevel = pickNumber(
    perception?.globalEnvelope?.clarityLevel,
    coherenceLevel
  );
  const accessAllowed = subsurface?.accessState?.accessAllowed === true || subsurface?.accessAllowed === true;
  const zoneState = pickString(subsurface?.zoneState) || "—";

  const destination =
    activeVariant !== null
      ? `VARIANT_${activeVariant} → ${traversalMode} → ${zoneState}`
      : `${traversalMode} → ${zoneState}`;

  return {
    destination,
    activeVariant,
    traversalMode,
    coherenceLevel,
    clarityLevel,
    accessAllowed,
    zoneState
  };
}

function push(arr, value){
  arr.push(value);
  if(arr.length > HISTORY_SIZE) arr.shift();
}

function updateEventMemory(dragActive, yawVelocity, pitchVelocity, velocityMagnitude){
  const now = Date.now();

  if(dragActive === true){
    lastDragAt = now;
  }

  if(prevDragActive === true && dragActive === false){
    lastReleaseAt = now;
    lastReleaseYawVelocity = yawVelocity;
    lastReleasePitchVelocity = pitchVelocity;
  }

  if(typeof velocityMagnitude === "number" && Number.isFinite(velocityMagnitude)){
    peakVelocityRecent = Math.max(peakVelocityRecent * 0.992, velocityMagnitude);
  }

  prevDragActive = dragActive;
}

function deriveReleaseDetected(){
  if(!lastReleaseAt) return false;
  return (Date.now() - lastReleaseAt) <= RELEASE_LATCH_MS;
}

function deriveDragLatched(){
  if(prevDragActive === true) return true;
  if(!lastDragAt) return false;
  return (Date.now() - lastDragAt) <= DRAG_LATCH_MS;
}

function deriveZeroedThisFrame(currentMagnitude){
  if(prevVelocityMagnitude === null || currentMagnitude === null) return null;
  return prevVelocityMagnitude > EPS && currentMagnitude <= EPS;
}

function deriveDelta(current, previous){
  if(current === null || previous === null) return null;
  return current - previous;
}

function drawSeries(canvas, seriesA, seriesB){
  const ctx = canvas.getContext("2d");
  const w = canvas.width;
  const h = canvas.height;

  ctx.clearRect(0,0,w,h);
  ctx.fillStyle = "#0b0f14";
  ctx.fillRect(0,0,w,h);

  const all = [...seriesA, ...seriesB].filter(v => typeof v === "number" && Number.isFinite(v));
  const maxAbs = Math.max(0.001, ...all.map(v => Math.abs(v)));

  ctx.strokeStyle = "#1f2a36";
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, h/2);
  ctx.lineTo(w, h/2);
  ctx.stroke();

  function draw(series, color){
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.beginPath();
    series.forEach((v, i) => {
      const x = (i / Math.max(1, HISTORY_SIZE - 1)) * w;
      const y = h/2 - (v / maxAbs) * (h * 0.42);
      if(i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    });
    ctx.stroke();
  }

  draw(seriesA, "#6fe7ff");
  draw(seriesB, "#7fffd4");
}

function drawDragLatch(canvas, dragSeries){
  const ctx = canvas.getContext("2d");
  const w = canvas.width;
  const h = canvas.height;

  ctx.clearRect(0,0,w,h);
  ctx.fillStyle = "#0b0f14";
  ctx.fillRect(0,0,w,h);

  ctx.strokeStyle = "#1f2a36";
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, h - 10);
  ctx.lineTo(w, h - 10);
  ctx.stroke();

  ctx.strokeStyle = "#ffffff";
  ctx.lineWidth = 2;
  ctx.beginPath();

  dragSeries.forEach((v, i) => {
    const x = (i / Math.max(1, HISTORY_SIZE - 1)) * w;
    const y = v ? 18 : h - 10;
    if(i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  });

  ctx.stroke();
}

function drawScalarSeries(canvas, seriesA, seriesB, seriesC){
  const ctx = canvas.getContext("2d");
  const w = canvas.width;
  const h = canvas.height;

  ctx.clearRect(0,0,w,h);
  ctx.fillStyle = "#0b0f14";
  ctx.fillRect(0,0,w,h);

  ctx.strokeStyle = "#1f2a36";
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, h - 12);
  ctx.lineTo(w, h - 12);
  ctx.stroke();

  function draw(series, color){
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.beginPath();
    series.forEach((v, i) => {
      const n = typeof v === "number" && Number.isFinite(v) ? Math.max(0, Math.min(1, v)) : 0;
      const x = (i / Math.max(1, HISTORY_SIZE - 1)) * w;
      const y = h - 12 - n * (h * 0.72);
      if(i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    });
    ctx.stroke();
  }

  draw(seriesA, "#7fffd4");
  draw(seriesB, "#6fe7ff");
  draw(seriesC, "#ffd27a");
}

function inferState(groupId, data, derived){
  switch(groupId){
    case "runtime":
      if(!data) return {color:"gray",spark:false};
      if(data.failure?.phase) return {color:"red",spark:true};
      if(data.phase === "RUNNING") return {color:"white",spark:false};
      return {color:"yellow",spark:false};

    case "trajectory":
      if(!data) return {color:"gray",spark:false};
      if(data.failure?.phase) return {color:"red",spark:true};
      if(derived.accessAllowed && derived.coherenceLevel !== null && derived.coherenceLevel >= 0.6) {
        return {color:"blue",spark:false};
      }
      if(derived.coherenceLevel !== null) return {color:"yellow",spark:false};
      return {color:"gray",spark:false};

    case "worldMode":
      if(!data?.worldModeState) return {color:"gray",spark:false};
      if(data.worldModeState?.diagnostics?.bindingIntegrity === true) return {color:"white",spark:false};
      return {color:"orange",spark:false};

    case "variant":
      if(!data?.worldVariantState && !data?.worldModeState?.variantState) return {color:"gray",spark:false};
      if(derived.activeVariant >= 8) return {color:"blue",spark:false};
      if(derived.activeVariant !== null) return {color:"white",spark:false};
      return {color:"gray",spark:false};

    case "traversal":
      if(!data?.traversalState && !data?.worldModeState?.traversalState) return {color:"gray",spark:false};
      if(derived.traversalMode !== "—") return {color:"white",spark:false};
      return {color:"gray",spark:false};

    case "coherence":
      if(derived.coherenceLevel === null) return {color:"gray",spark:false};
      if(derived.coherenceLevel >= 0.8) return {color:"blue",spark:false};
      if(derived.coherenceLevel >= 0.5) return {color:"white",spark:false};
      if(derived.coherenceLevel >= 0.25) return {color:"yellow",spark:false};
      return {color:"orange",spark:false};

    case "perception":
      if(!data?.perceptionModifiersState && !data?.perceptionModifiers) return {color:"gray",spark:false};
      if(derived.clarityLevel !== null && derived.clarityLevel >= 0.75) return {color:"white",spark:false};
      if(derived.clarityLevel !== null) return {color:"yellow",spark:false};
      return {color:"gray",spark:false};

    case "subsurface":
      if(!data?.subsurfaceActivationState && !data?.worldModeState?.subsurfaceActivationState) return {color:"gray",spark:false};
      if(derived.accessAllowed) return {color:"blue",spark:false};
      return {color:"orange",spark:false};

    case "motion":
      if(derived.velocityMagnitude === null) return {color:"gray",spark:false};
      if(derived.dragActive === true || (derived.velocityMagnitude > EPS)) return {color:"white",spark:false};
      return {color:"gray",spark:false};

    case "handoff":
      if(derived.releaseDetected) return {color:"blue",spark:false};
      if(derived.dragLatched) return {color:"blue",spark:false};
      return {color:"white",spark:false};

    case "history":
      if(derived.zeroedThisFrame) return {color:"orange",spark:true};
      return {color:"white",spark:false};

    case "autospin":
      if(derived.autoSpinEnabled === false) return {color:"gray",spark:false};
      return {color:"white",spark:false};

    case "emission":
      if(data?.emissionReceipt?.emissionPass === true) return {color:"white",spark:false};
      return {color:"yellow",spark:false};

    case "scope":
      if(!data?.scope) return {color:"gray",spark:false};
      if(data.scope.activeScope && data.scope.activeScope !== "UNKNOWN") return {color:"white",spark:false};
      return {color:"orange",spark:false};

    case "lens":
      if(!data?.lens) return {color:"gray",spark:false};
      if(data.lens.lensMode && data.lens.lensMode !== "UNKNOWN") return {color:"white",spark:false};
      return {color:"orange",spark:false};

    case "primitive":
      if(!data?.primitive) return {color:"gray",spark:false};
      if(data.primitive.primitiveType === "UNKNOWN") return {color:"orange",spark:false};
      if(data.primitive.rowColumnPathActive === true) return {color:"yellow",spark:false};
      return {color:"white",spark:false};

    case "topology":
      if(!data?.topology) return {color:"gray",spark:false};
      if(data.topology.topologyMode === "UNKNOWN") return {color:"orange",spark:false};
      if(data.topology.neighborLaw === "GRID" || data.topology.neighborLaw === "CROSS_GRID") return {color:"yellow",spark:false};
      return {color:"white",spark:false};

    case "renderAuthority":
      if(!data?.renderAuthority) return {color:"gray",spark:false};
      if(data.renderAuthority.fallbackMode === true) return {color:"red",spark:true};
      if(data.renderAuthority.renderReadsScope && data.renderAuthority.renderReadsLens) return {color:"white",spark:false};
      return {color:"orange",spark:false};

    case "density":
      if(!data?.density) return {color:"gray",spark:false};
      if(data.density.densityTier === "UNKNOWN") return {color:"orange",spark:false};
      return {color:"white",spark:false};

    default:
      return {color:"gray",spark:false};
  }
}

function colorClass(state){
  switch(state){
    case "white": return "state-white";
    case "gray": return "state-gray";
    case "yellow": return "state-yellow";
    case "orange": return "state-orange";
    case "red": return "state-red";
    case "black": return "state-black";
    case "blue": return "state-blue";
    default: return "state-gray";
  }
}

function buildSummaryPreview(items){
  return `
    <div class="preview">
      ${items.map(([k,v]) => `
        <div class="previewItem">
          <div class="previewK">${esc(k)}</div>
          <div class="previewV">${esc(v)}</div>
        </div>
      `).join("")}
    </div>
  `;
}

function groupBlock(id,title,meta,previewItems,detailHtml,state){
  const openClass = OPEN_DEFAULT.has(id) ? "open" : "";
  const sparkClass = state.spark ? "spark" : "";
  return `
    <div class="group ${openClass}" data-group="${esc(id)}">
      <button class="summary" type="button">
        <div class="diamondWrap ${sparkClass}">
          <div class="diamond ${colorClass(state.color)}"></div>
        </div>
        <div class="summaryText">
          <div class="titleRow">
            <div class="title">${esc(title)}</div>
            <div class="meta">${esc(meta)}</div>
          </div>
          ${buildSummaryPreview(previewItems)}
        </div>
      </button>
      <div class="detail">${detailHtml}</div>
    </div>
  `;
}

function buildGroups(data, derived){
  const motion = getMotionState(data);
  const emission = data?.emissionReceipt || {};
  const scope = data?.scope || {};
  const lens = data?.lens || {};
  const primitive = data?.primitive || {};
  const topology = data?.topology || {};
  const renderAuthority = data?.renderAuthority || {};
  const density = data?.density || {};
  const worldMode = getWorldModeState(data);
  const variant = getWorldVariantState(data);
  const traversal = getTraversalState(data);
  const coherence = getCoherenceState(data);
  const perception = getPerceptionState(data);
  const subsurface = getSubsurfaceState(data);

  const groups = {
    runtime: groupBlock(
      "runtime","RUNTIME",
      `${data?.phase ?? "—"} • ${Math.round(data?.fps || 0)} fps`,
      [
        ["phase", data?.phase ?? "—"],
        ["mode", data?.mode ?? "—"],
        ["source", data?.__sourceKey ?? "—"]
      ],
      `<div class="rows">
        ${row("phase", data?.phase ?? "—")}
        ${row("mode", data?.mode ?? "—")}
        ${row("fps", Math.round(data?.fps || 0))}
        ${row("dtMs", Math.round(data?.dtMs || 0))}
        ${row("receiptSource", data?.__sourceKey ?? "—")}
        ${row("failure.phase", data?.failure?.phase ?? "—")}
        ${row("failure.message", data?.failure?.message ?? "—")}
      </div>`,
      inferState("runtime",data,derived)
    ),

    trajectory: groupBlock(
      "trajectory","TRAJECTORY",
      `${derived.destination}`,
      [
        ["destination", derived.destination],
        ["coherence", fmt(derived.coherenceLevel,3)],
        ["access", bool(derived.accessAllowed)]
      ],
      `<div class="rows">
        ${row("destination", derived.destination)}
        ${row("activeVariant", derived.activeVariant ?? "—")}
        ${row("traversalMode", derived.traversalMode)}
        ${row("coherenceLevel", fmt(derived.coherenceLevel, 6))}
        ${row("clarityLevel", fmt(derived.clarityLevel, 6))}
        ${row("zoneState", derived.zoneState)}
        ${row("accessAllowed", bool(derived.accessAllowed))}
      </div>`,
      inferState("trajectory",data,derived)
    ),

    worldMode: groupBlock(
      "worldMode","WORLD MODE",
      `${worldMode?.diagnostics?.bindingIntegrity === true ? "BOUND" : "UNBOUND"}`,
      [
        ["variant", worldMode?.diagnostics?.activeVariant ?? "—"],
        ["traversal", worldMode?.diagnostics?.activeTraversalMode ?? "—"],
        ["bound", bool(worldMode?.diagnostics?.bindingIntegrity === true)]
      ],
      `<div class="rows">
        ${row("bindingIntegrity", bool(worldMode?.diagnostics?.bindingIntegrity === true))}
        ${row("activeVariant", worldMode?.diagnostics?.activeVariant ?? "—")}
        ${row("activeTraversalMode", worldMode?.diagnostics?.activeTraversalMode ?? "—")}
        ${row("coherenceLevel", fmt(worldMode?.diagnostics?.coherenceLevel, 6))}
        ${row("stabilityLevel", fmt(worldMode?.diagnostics?.stabilityLevel, 6))}
        ${row("unifiedLatticeIndex", worldMode?.latticeBinding?.unifiedLatticeIndex ?? "—")}
        ${row("activeNodeIndex", worldMode?.nodeBinding?.activeNodeIndex ?? "—")}
      </div>`,
      inferState("worldMode",data,derived)
    ),

    variant: groupBlock(
      "variant","WORLD VARIANT",
      `${variant?.ratio ?? "—"} • V${variant?.activeVariant ?? "—"}`,
      [
        ["variant", variant?.activeVariant ?? "—"],
        ["ratio", variant?.ratio ?? "—"],
        ["scale", fmt(variant?.compositionScale,3)]
      ],
      `<div class="rows">
        ${row("activeVariant", variant?.activeVariant ?? "—")}
        ${row("ratio", variant?.ratio ?? "—")}
        ${row("compositionScale", fmt(variant?.compositionScale, 6))}
        ${row("baseScale", fmt(variant?.baseScale, 6))}
        ${row("variantLatticeIndex", variant?.latticeBinding?.variantLatticeIndex ?? "—")}
        ${row("activeCardinalAxis", variant?.cardinalBinding?.activeCardinalAxis ?? "—")}
        ${row("activeNodeIndex", variant?.nodeBinding?.activeNodeIndex ?? "—")}
      </div>`,
      inferState("variant",data,derived)
    ),

    traversal: groupBlock(
      "traversal","TRAVERSAL",
      `${traversal?.activeMode ?? "—"}`,
      [
        ["mode", traversal?.activeMode ?? "—"],
        ["converge", fmt(traversal?.convergenceBias,2)],
        ["expand", fmt(traversal?.expansionBias,2)]
      ],
      `<div class="rows">
        ${row("activeMode", traversal?.activeMode ?? "—")}
        ${row("traversalLatticeIndex", traversal?.latticeBinding?.traversalLatticeIndex ?? "—")}
        ${row("axis", traversal?.cardinalBinding?.axis ?? "—")}
        ${row("activeNodeIndex", traversal?.nodeBinding?.activeNodeIndex ?? "—")}
        ${row("convergenceBias", fmt(traversal?.convergenceBias, 6))}
        ${row("expansionBias", fmt(traversal?.expansionBias, 6))}
        ${row("preferredDirection", traversal?.navigationBias?.preferredDirection ?? "—")}
      </div>`,
      inferState("traversal",data,derived)
    ),

    coherence: groupBlock(
      "coherence","COHERENCE",
      `${fmt(derived.coherenceLevel,3)} / ${fmt(deriveGlobalStability(data),3)}`,
      [
        ["coherence", fmt(derived.coherenceLevel,3)],
        ["noise", fmt(deriveGlobalNoise(data),3)],
        ["stability", fmt(deriveGlobalStability(data),3)]
      ],
      `<div class="rows">
        ${row("globalCoherence", fmt(deriveGlobalCoherence(data), 6))}
        ${row("globalNoise", fmt(deriveGlobalNoise(data), 6))}
        ${row("globalStability", fmt(deriveGlobalStability(data), 6))}
        ${row("coherenceLatticeIndex", coherence?.latticeBinding?.coherenceLatticeIndex ?? "—")}
        ${row("variance", fmt(coherence?.diagnostics?.variance, 6))}
        ${row("activeNodeIndex", coherence?.nodeBinding?.activeNodeIndex ?? "—")}
      </div>
      <div class="canvasWrap"><canvas id="coherenceChart" width="1000" height="120"></canvas></div>
      <div class="small">coherence = green · clarity = cyan · stability = yellow</div>`,
      inferState("coherence",data,derived)
    ),

    perception: groupBlock(
      "perception","PERCEPTION",
      `${fmt(derived.clarityLevel,3)}`,
      [
        ["terrain", fmt(perception?.terrain?.contrast,3)],
        ["hydration", fmt(perception?.hydration?.flowContinuity,3)],
        ["subsurface", fmt(perception?.subsurface?.detectability,3)]
      ],
      `<div class="rows">
        ${row("clarityLevel", fmt(perception?.globalEnvelope?.clarityLevel, 6))}
        ${row("noiseLevel", fmt(perception?.globalEnvelope?.noiseLevel, 6))}
        ${row("stabilityLevel", fmt(perception?.globalEnvelope?.stabilityLevel, 6))}
        ${row("terrain.contrast", fmt(perception?.terrain?.contrast, 6))}
        ${row("hydration.flowContinuity", fmt(perception?.hydration?.flowContinuity, 6))}
        ${row("subsurface.detectability", fmt(perception?.subsurface?.detectability, 6))}
        ${row("lighting.activationReadiness", fmt(perception?.lighting?.activationReadiness, 6))}
      </div>`,
      inferState("perception",data,derived)
    ),

    subsurface: groupBlock(
      "subsurface","SUBSURFACE",
      `${subsurface?.zoneState ?? "—"}`,
      [
        ["zone", subsurface?.zoneState ?? "—"],
        ["access", bool(subsurface?.accessState?.accessAllowed ?? subsurface?.accessAllowed)],
        ["depth", subsurface?.activeDepthTier ?? "—"]
      ],
      `<div class="rows">
        ${row("zoneState", subsurface?.zoneState ?? "—")}
        ${row("accessAllowed", bool(subsurface?.accessState?.accessAllowed ?? subsurface?.accessAllowed))}
        ${row("activeDepthTier", subsurface?.activeDepthTier ?? "—")}
        ${row("preferredEntryAxis", subsurface?.cardinalBinding?.preferredEntryAxis ?? "—")}
        ${row("activeNodeIndex", subsurface?.nodeBinding?.activeNodeIndex ?? "—")}
        ${row("zoneStability", fmt(subsurface?.stabilityEnvelope?.zoneStability, 6))}
        ${row("lightingReadiness", fmt(subsurface?.diagnostics?.lightingReadiness, 6))}
      </div>`,
      inferState("subsurface",data,derived)
    ),

    motion: groupBlock(
      "motion","MOTION",
      `|v| ${fmt(derived.velocityMagnitude, 9)}`,
      [
        ["yaw", fmt(num(motion.yaw),6)],
        ["pitch", fmt(num(motion.pitch),6)],
        ["speed", fmt(derived.velocityMagnitude,9)]
      ],
      `<div class="rows">
        ${row("yaw", fmt(num(motion.yaw), 12))}
        ${row("pitch", fmt(num(motion.pitch), 12))}
        ${row("orbitPhase", fmt(num(motion.orbitPhase), 6))}
        ${row("yawVelocity", fmt(derived.yawVelocity, 9))}
        ${row("pitchVelocity", fmt(derived.pitchVelocity, 9))}
        ${row("velocityMagnitude", fmt(derived.velocityMagnitude, 9))}
      </div>
      <div class="canvasWrap"><canvas id="velocityChart" width="1000" height="120"></canvas></div>
      <div class="small">yawVelocity = cyan · pitchVelocity = green</div>`,
      inferState("motion",data,derived)
    ),

    handoff: groupBlock(
      "handoff","HANDOFF",
      `${bool(derived.dragActive)} / ${bool(derived.releaseDetected)}`,
      [
        ["dragActive", bool(derived.dragActive)],
        ["dragLatched", bool(derived.dragLatched)],
        ["release", bool(derived.releaseDetected)]
      ],
      `<div class="rows">
        ${row("dragActive", bool(derived.dragActive))}
        ${row("dragLatched", bool(derived.dragLatched))}
        ${row("releaseDetected", bool(derived.releaseDetected))}
        ${row("lastReleaseAgeMs", lastReleaseAt ? Math.round(Date.now() - lastReleaseAt) : "—")}
        ${row("lastReleaseYawVelocity", fmt(lastReleaseYawVelocity, 9))}
        ${row("lastReleasePitchVelocity", fmt(lastReleasePitchVelocity, 9))}
        ${row("yawVelocityΔ", fmt(derived.yawVelocityDelta, 9))}
        ${row("pitchVelocityΔ", fmt(derived.pitchVelocityDelta, 9))}
      </div>`,
      inferState("handoff",data,derived)
    ),

    history: groupBlock(
      "history","RECENT HISTORY",
      `${fmt(peakVelocityRecent, 9)}`,
      [
        ["peak", fmt(peakVelocityRecent,6)],
        ["zeroed", bool(derived.zeroedThisFrame)],
        ["decay", fmt(derived.inertiaDecay,6)]
      ],
      `<div class="rows">
        ${row("peakVelocityRecent", fmt(peakVelocityRecent, 9))}
        ${row("zeroedThisFrame", bool(derived.zeroedThisFrame))}
        ${row("prevVelocityMagnitude", fmt(prevVelocityMagnitude, 9))}
        ${row("currentVelocityMagnitude", fmt(derived.velocityMagnitude, 9))}
        ${row("inertiaDecay", fmt(derived.inertiaDecay, 6))}
      </div>
      <div class="canvasWrap"><canvas id="dragChart" width="1000" height="80"></canvas></div>
      <div class="small">dragActive latch = white</div>`,
      inferState("history",data,derived)
    ),

    autospin: groupBlock(
      "autospin","AUTO SPIN",
      `${bool(derived.autoSpinEnabled)}`,
      [
        ["enabled", bool(derived.autoSpinEnabled)],
        ["speed", fmt(derived.autoSpinSpeed,9)],
        ["pitchLock", fmt(num(motion.pitch),6)]
      ],
      `<div class="rows">
        ${row("autoSpinEnabled", bool(derived.autoSpinEnabled))}
        ${row("autoSpinSpeed", fmt(derived.autoSpinSpeed, 9))}
      </div>`,
      inferState("autospin",data,derived)
    ),

    emission: groupBlock(
      "emission","EMISSION",
      `${bool(emission.emissionPass)}`,
      [
        ["emitted", emission.emissionEmitted ?? "—"],
        ["visible", emission.emissionFrontVisible ?? "—"],
        ["pass", bool(emission.emissionPass)]
      ],
      `<div class="rows">
        ${row("emitted", emission.emissionEmitted ?? "—")}
        ${row("frontVisible", emission.emissionFrontVisible ?? "—")}
        ${row("pass", bool(emission.emissionPass))}
      </div>`,
      inferState("emission",data,derived)
    ),

    scope: groupBlock(
      "scope","SCOPE",
      `${scope.activeScope ?? "UNKNOWN"}`,
      [
        ["active", scope.activeScope ?? "UNKNOWN"],
        ["sizeKm", scope.scopeSizeKm ?? "—"],
        ["anchor", scope.scopeAnchor ?? "—"]
      ],
      `<div class="rows">
        ${row("activeScope", scope.activeScope ?? "UNKNOWN")}
        ${row("scopeSizeKm", scope.scopeSizeKm ?? "—")}
        ${row("scopeAnchor", scope.scopeAnchor ?? "—")}
        ${row("scopeTransitionState", JSON.stringify(scope.scopeTransitionState ?? null))}
      </div>`,
      inferState("scope",data,derived)
    ),

    lens: groupBlock(
      "lens","LENS",
      `${lens.lensMode ?? "UNKNOWN"} / ${lens.lensTier ?? "—"}`,
      [
        ["mode", lens.lensMode ?? "UNKNOWN"],
        ["tier", lens.lensTier ?? "—"],
        ["zoom", fmt(lens.zoomCurrent,4)]
      ],
      `<div class="rows">
        ${row("lensMode", lens.lensMode ?? "UNKNOWN")}
        ${row("lensTier", lens.lensTier ?? "—")}
        ${row("zoomCurrent", fmt(lens.zoomCurrent, 6))}
        ${row("zoomTarget", fmt(lens.zoomTarget, 6))}
        ${row("zoomMin", fmt(lens.zoomMin, 6))}
        ${row("zoomMax", fmt(lens.zoomMax, 6))}
      </div>`,
      inferState("lens",data,derived)
    ),

    primitive: groupBlock(
      "primitive","PRIMITIVE",
      `${primitive.primitiveType ?? "UNKNOWN"}`,
      [
        ["type", primitive.primitiveType ?? "UNKNOWN"],
        ["center", bool(primitive.centerAnchored)],
        ["grid", bool(primitive.rowColumnPathActive)]
      ],
      `<div class="rows">
        ${row("primitiveType", primitive.primitiveType ?? "UNKNOWN")}
        ${row("primitivePath", primitive.primitivePath ?? "UNKNOWN")}
        ${row("centerAnchored", bool(primitive.centerAnchored))}
        ${row("rowColumnPathActive", bool(primitive.rowColumnPathActive))}
        ${row("sectorBandPathActive", bool(primitive.sectorBandPathActive))}
      </div>`,
      inferState("primitive",data,derived)
    ),

    topology: groupBlock(
      "topology","TOPOLOGY",
      `${topology.topologyMode ?? "UNKNOWN"}`,
      [
        ["mode", topology.topologyMode ?? "UNKNOWN"],
        ["neighbor", topology.neighborLaw ?? "UNKNOWN"],
        ["visible", topology.visibleCellCount ?? "—"]
      ],
      `<div class="rows">
        ${row("topologyMode", topology.topologyMode ?? "UNKNOWN")}
        ${row("neighborLaw", topology.neighborLaw ?? "UNKNOWN")}
        ${row("visibleCellCount", topology.visibleCellCount ?? "—")}
        ${row("emittedCellCount", topology.emittedCellCount ?? "—")}
        ${row("skippedCellCount", topology.skippedCellCount ?? "—")}
      </div>`,
      inferState("topology",data,derived)
    ),

    renderAuthority: groupBlock(
      "renderAuthority","RENDER AUTHORITY",
      `${renderAuthority.liveRenderPath ?? "UNKNOWN"}`,
      [
        ["scopeRead", bool(renderAuthority.renderReadsScope)],
        ["lensRead", bool(renderAuthority.renderReadsLens)],
        ["fallback", bool(renderAuthority.fallbackMode)]
      ],
      `<div class="rows">
        ${row("renderReadsScope", bool(renderAuthority.renderReadsScope))}
        ${row("renderReadsLens", bool(renderAuthority.renderReadsLens))}
        ${row("fallbackMode", bool(renderAuthority.fallbackMode))}
        ${row("liveRenderPath", renderAuthority.liveRenderPath ?? "UNKNOWN")}
      </div>`,
      inferState("renderAuthority",data,derived)
    ),

    density: groupBlock(
      "density","DENSITY",
      `${density.densityTier ?? "UNKNOWN"}`,
      [
        ["avgSpan", fmt(density.averageCellSpanPx,2)],
        ["subdiv", density.subdivisionTier ?? "—"],
        ["tier", density.densityTier ?? "UNKNOWN"]
      ],
      `<div class="rows">
        ${row("averageCellSpanPx", fmt(density.averageCellSpanPx, 4))}
        ${row("subdivisionTier", density.subdivisionTier ?? "—")}
        ${row("densityTier", density.densityTier ?? "UNKNOWN")}
      </div>`,
      inferState("density",data,derived)
    )
  };

  return GROUP_ORDER.map(id => groups[id]).join("");
}

function installExpanders(){
  document.querySelectorAll(".group .summary").forEach(btn => {
    btn.onclick = () => {
      btn.parentElement.classList.toggle("open");
    };
  });
}

function render(data){
  if(!data){
    document.getElementById("status").textContent = "STATE: NO DATA";
    document.getElementById("groups").innerHTML = "";
    return;
  }

  const age = Date.now() - new Date(data.timestamp).getTime();

  const yawVelocity = deriveYawVelocity(data);
  const pitchVelocity = derivePitchVelocity(data);
  const velocityMagnitude = deriveVelocityMagnitude(yawVelocity, pitchVelocity);
  const dragActive = deriveDragActive(data);
  const inertiaDecay = deriveInertiaDecay(data);
  const autoSpinEnabled = deriveAutoSpinEnabled(data);
  const autoSpinSpeed = deriveAutoSpinSpeed(data);

  updateEventMemory(dragActive, yawVelocity, pitchVelocity, velocityMagnitude);

  push(history.yawVelocity, yawVelocity ?? 0);
  push(history.pitchVelocity, pitchVelocity ?? 0);
  push(history.velocityMagnitude, velocityMagnitude ?? 0);
  push(history.dragActive, dragActive === true);
  push(history.fps, data.fps ?? 0);

  const coherenceLevel = deriveGlobalCoherence(data);
  const clarityLevel = pickNumber(getPerceptionState(data)?.globalEnvelope?.clarityLevel, coherenceLevel);
  const stabilityLevel = deriveGlobalStability(data);

  push(history.coherence, coherenceLevel ?? 0);
  push(history.clarity, clarityLevel ?? 0);
  push(history.stability, stabilityLevel ?? 0);

  const zeroedThisFrame = deriveZeroedThisFrame(velocityMagnitude);
  const yawVelocityDelta = deriveDelta(yawVelocity, prevYawVelocity);
  const pitchVelocityDelta = deriveDelta(pitchVelocity, prevPitchVelocity);

  const derivedTrajectory = deriveTrajectory(
    getWorldVariantState(data),
    getTraversalState(data),
    getCoherenceState(data),
    getPerceptionState(data),
    getSubsurfaceState(data)
  );

  const derived = {
    yawVelocity,
    pitchVelocity,
    velocityMagnitude,
    dragActive,
    inertiaDecay,
    autoSpinEnabled,
    autoSpinSpeed,
    releaseDetected: deriveReleaseDetected(),
    dragLatched: deriveDragLatched(),
    zeroedThisFrame,
    yawVelocityDelta,
    pitchVelocityDelta,
    ...derivedTrajectory
  };

  document.getElementById("status").textContent =
    "STATE: LIVE • " + (data.phase ?? "—") + " • " + age + "ms";

  document.getElementById("groups").innerHTML = buildGroups(data, derived);
  installExpanders();

  const velocityCanvas = document.getElementById("velocityChart");
  if(velocityCanvas){
    drawSeries(velocityCanvas, history.yawVelocity, history.pitchVelocity);
  }

  const dragCanvas = document.getElementById("dragChart");
  if(dragCanvas){
    drawDragLatch(dragCanvas, history.dragActive);
  }

  const coherenceCanvas = document.getElementById("coherenceChart");
  if(coherenceCanvas){
    drawScalarSeries(coherenceCanvas, history.coherence, history.clarity, history.stability);
  }

  prevVelocityMagnitude = velocityMagnitude;
  prevYawVelocity = yawVelocity;
  prevPitchVelocity = pitchVelocity;
}

function loop(){
  render(read());
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
