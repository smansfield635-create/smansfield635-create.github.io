<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Diamond Gate Bridge</title>
<meta name="description" content="Primary 12-face navigator">
<link rel="stylesheet" href="/variant/styles.css">
</head>
<body data-page="index">
<canvas id="bgCanvas" aria-hidden="true"></canvas>

<header class="toprail">
  <div class="brand">
    <div class="brand-kicker" data-i18n="index.kicker">Primary Navigator</div>
    <div class="brand-title">Diamond Gate Bridge</div>
  </div>

  <div class="toprail-controls">
    <div class="chipset" aria-label="Language">
      <button class="chip" data-lang="en" type="button">EN</button>
      <button class="chip" data-lang="zh" type="button">中文</button>
      <button class="chip" data-lang="es" type="button">ES</button>
    </div>
  </div>
</header>

<main class="shell">
  <section class="hero">
    <div class="hero-kicker" data-i18n="index.heroKicker">Rhombic Navigator</div>
    <h1 class="hero-title" data-i18n="index.heroTitle">Stop the globe and choose a face</h1>
    <p class="hero-body" data-i18n="index.heroBody">
      A twelve-face navigator. Let it rotate. Tap once to stop and focus a face. Tap the same face again to enter it.
    </p>

    <div class="hero-actions">
      <button class="action-btn primary" id="resumeSpinBtn" type="button" data-i18n="index.resume">Resume Spin</button>
      <button class="action-btn" data-route="/door/" type="button" data-i18n="common.door">Door</button>
      <button class="action-btn" data-route="/home/" type="button" data-i18n="common.home">Home</button>
    </div>
  </section>

  <section class="poly-stage-wrap">
    <div class="poly-stage" id="polyStage">
      <div class="poly-scene" id="polyScene">
        <div class="poly-object" id="polyObject" aria-label="12 face navigator"></div>
      </div>
    </div>

    <div class="selection-readout">
      <div class="readout-kicker" data-i18n="index.readoutKicker">Selection</div>
      <div class="readout-title" id="selectedFaceName" data-i18n="index.readoutIdle">No face selected</div>
      <div class="readout-body" id="selectedFaceHint" data-i18n="index.readoutBody">
        Tap any face to stop rotation and bring it forward.
      </div>
    </div>
  </section>
</main>

<script src="/variant/runtime.js"></script>
</body>
</html>
