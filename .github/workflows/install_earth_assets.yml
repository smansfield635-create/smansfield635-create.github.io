name: Create Earth Surface Asset

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/create_earth_surface_asset.yml"

permissions:
  contents: write

jobs:
  create-earth-surface-asset:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Create Earth asset folder
        run: |
          mkdir -p assets/earth

      - name: Install ImageMagick
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick file

      - name: Create earth_surface_2048.jpg
        run: |
          convert -size 2048x1024 xc:'#06142f' \
            -fill '#123d7a' -draw "rectangle 0,0 2048,1024" \
            -fill '#0e3a7a' -draw "ellipse 1024,512 1024,512 0,360" \
            -fill '#4b8f45' -draw "ellipse 610,420 270,135 0,360" \
            -fill '#6f9b4c' -draw "ellipse 940,610 170,255 0,360" \
            -fill '#9a7a45' -draw "ellipse 1370,390 230,165 0,360" \
            -fill '#5d8f48' -draw "ellipse 1500,650 160,210 0,360" \
            -fill '#ffffff55' -draw "ellipse 520,180 420,70 0,360" \
            -fill '#ffffff40' -draw "ellipse 1220,820 560,90 0,360" \
            -quality 92 \
            assets/earth/earth_surface_2048.jpg

      - name: Verify earth_surface_2048.jpg
        run: |
          test -s assets/earth/earth_surface_2048.jpg
          file assets/earth/earth_surface_2048.jpg

      - name: Commit earth_surface_2048.jpg
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add assets/earth/earth_surface_2048.jpg

          if git diff --cached --quiet; then
            echo "earth_surface_2048.jpg already exists."
          else
            git commit -m "Create Earth surface asset"
            git push
          fi
