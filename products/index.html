<!doctype html>
<!-- TNT — /products/index.html
     PRODUCTS · MASTER ROUTING CATALOG · SINGLE-OPEN ACCORDION · TRILINGUAL (EN/中文/ES)
     LENSES (NO NEW gd_* KEYS):
       - INFORMAL/FORMAL uses gd_style (style=informal|formal) [URL + localStorage gd_style]
       - PLATFORM/ENGINEERING uses lane=platform|engineering (URL ONLY; never stored as gd_*)
     RULES:
       - No modals, no overlays
       - One row open at a time (global single-open)
       - State carry: lang/style/time/depth via URL + LS gd_lang/gd_style/gd_time/gd_depth ONLY
       - lane URL-only
       - Language toggle reloads SAME pathname (GH Pages safe)
       - Uses /assets/ui.css + /assets/branch.css + /assets/instruments.js
       - ui.css owns field (NO html/body background styling)
     ROUTES (authoritative):
       Products:
         - Energy → /products/energy/
         - Education → /products/education/
         - Coherence Diagnostic → /products/coherence-diagnostic/
         - Software Spine (“Machine Behind Pages”) → /products/software/
         - Dot.Grid → /products/dot-grid/
         - SSG → /products/ssg/
         - Risk & Capital Systems → /products/risk-capital/
         - UCI Engine → /products/uci/
         - Registry → /products/registry/
         - Adoption Ladder → /products/adoption-ladder/
       Services:
         - Advisory → /laws/
         - Audit Support → /gauges/
         - Integration → /products/software/ (default lane=platform)
         - Training → /products/training/
       Vision shells:
         - Water → /explore/frontier/vision/?focus=water
         - Waste → /explore/frontier/vision/?focus=waste
         - SHIMMER → /explore/frontier/vision/?focus=shimmer
-->
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>PRODUCTS</title>

  <link rel="stylesheet" href="/assets/ui.css"/>
  <link rel="stylesheet" href="/assets/branch.css"/>
  <script defer src="/assets/instruments.js"></script>

  <style>
    a{color:inherit;text-decoration:none}
    body::before,body::after{pointer-events:none!important}

    :root{
      /* Red / Black / Gold hierarchy */
      --onyx0: rgba(6,8,10,.90);
      --onyx1: rgba(10,12,16,.78);
      --opalV: rgba(90,40,120,.12);
      --crimson: rgba(120,0,22,.34);
      --festival: rgba(255,43,43,.16);
      --gold: rgba(201,162,74,.40);

      --ink: rgba(255,255,255,.94);
      --mut: rgba(255,255,255,.80);
      --soft: rgba(255,255,255,.62);

      --stroke: rgba(255,255,255,.14);
      --stroke2: rgba(255,255,255,.10);

      --shadow: 0 22px 72px rgba(0,0,0,.66);

      --dockH: 98px;
    }

    /* page */
    .page{
      width:min(1120px,94vw);
      margin:0 auto;
      padding:88px 0 calc(var(--dockH) + 18px);
      display:flex;
      flex-direction:column;
      gap:12px;
      position:relative;
      z-index:10;
    }

    /* top controls */
    .top-left,.top-right{
      position:fixed;top:16px;z-index:240;
      display:flex;gap:10px;flex-wrap:wrap;align-items:center;
      max-width: calc(50vw - 18px);
    }
    .top-left{left:16px;justify-content:flex-start}
    .top-right{right:16px;justify-content:flex-end}

    .seg{
      display:inline-flex;gap:0;overflow:hidden;border-radius:16px;
      border:1px solid var(--stroke);
      background: rgba(0,0,0,.16);
      box-shadow: 0 16px 44px rgba(0,0,0,.62);
    }
    .seg button{
      appearance:none;border:0;background:transparent;color:var(--mut);
      padding:10px 12px;min-height:44px;font-weight:980;font-size:13px;
      letter-spacing:.25px;cursor:pointer;
      -webkit-tap-highlight-color:transparent;
      touch-action:manipulation;
    }
    .seg button[aria-pressed="true"]{
      color:var(--ink);
      background:
        radial-gradient(circle at 50% 120%, rgba(201,162,74,.22), transparent 62%),
        linear-gradient(180deg, rgba(255,43,43,.10), rgba(0,0,0,.10));
      box-shadow: inset 0 -10px 22px rgba(201,162,74,.16);
    }

    .btn{
      display:inline-flex;align-items:center;justify-content:center;gap:8px;
      padding:10px 12px;min-height:44px;border-radius:16px;
      border:1px solid rgba(255,255,255,.14);
      background:
        radial-gradient(circle at 50% 120%, rgba(201,162,74,.16), transparent 64%),
        linear-gradient(145deg, rgba(10,12,16,.78), rgba(6,8,10,.90));
      color:var(--ink);
      font-weight:980;font-size:14px;letter-spacing:.2px;
      -webkit-tap-highlight-color:transparent;
      position:relative;
      overflow:hidden;
      touch-action:manipulation;
      box-shadow: 0 16px 44px rgba(0,0,0,.62);
      white-space:nowrap;
    }
    .btn:active{transform:translateY(1px)}
    .btn::after{
      content:"";
      position:absolute;left:10px;right:10px;bottom:-12px;height:28px;
      background: radial-gradient(circle at 50% 0%, rgba(201,162,74,.34), transparent 72%);
      opacity:.70;pointer-events:none;
    }
    .btn.red{
      border-color: rgba(255,43,43,.22);
      box-shadow: 0 16px 44px rgba(0,0,0,.62), 0 0 18px rgba(255,43,43,.12);
    }

    /* header */
    .header{
      border:1px solid var(--stroke);
      border-radius:24px;
      background:
        radial-gradient(circle at 18% 16%, var(--crimson), transparent 62%),
        radial-gradient(circle at 82% 22%, var(--opalV), transparent 66%),
        radial-gradient(circle at 70% 92%, var(--festival), transparent 62%),
        linear-gradient(145deg, rgba(10,12,16,.72), rgba(6,8,10,.86));
      backdrop-filter: blur(10px);
      box-shadow: var(--shadow);
      padding:16px 16px 14px;
      position:relative;
      overflow:hidden;
    }
    .goldTrim::before{
      content:"";
      position:absolute;inset:0;border-radius:24px;pointer-events:none;
      box-shadow:
        inset 0 0 0 1px rgba(201,162,74,.30),
        inset 0 0 0 2px rgba(0,0,0,.35);
      background:
        repeating-linear-gradient(45deg, rgba(201,162,74,.10) 0 1px, transparent 1px 14px),
        repeating-linear-gradient(-45deg, rgba(201,162,74,.08) 0 1px, transparent 1px 14px);
      opacity:.52;
      mask:
        radial-gradient(circle at 50% 50%, transparent 0 78%, #000 80% 100%),
        linear-gradient(#000,#000);
      -webkit-mask:
        radial-gradient(circle at 50% 50%, transparent 0 78%, #000 80% 100%),
        linear-gradient(#000,#000);
    }
    .goldTrim::after{
      content:"◇";
      position:absolute;right:14px;top:12px;
      color: rgba(201,162,74,.58);
      font-weight: 980;
      font-size:16px;
      opacity:.78;
      pointer-events:none;
      text-shadow: 0 10px 24px rgba(0,0,0,.55);
    }

    .k{margin:0 0 6px;font-size:11px;letter-spacing:4px;text-transform:uppercase;opacity:.74;color:var(--mut)}
    .t{margin:0;font-weight:980;font-size:30px;letter-spacing:.7px;color:var(--ink)}
    .s{margin:10px 0 0;font-size:16.5px;line-height:1.55;max-width:980px;color:var(--ink)}
    .fine{margin-top:10px;font-size:13.5px;line-height:1.45;color:var(--mut);opacity:.86}

    .metaRow{
      display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-top:12px
    }
    .chip{
      display:inline-flex;align-items:center;gap:10px;
      padding:10px 12px;border-radius:999px;
      border:1px solid var(--stroke);
      background:
        radial-gradient(circle at 25% 35%, rgba(255,43,43,.10), transparent 62%),
        radial-gradient(circle at 80% 70%, rgba(201,162,74,.08), transparent 62%),
        linear-gradient(145deg, rgba(10,12,16,.78), rgba(6,8,10,.86));
      backdrop-filter: blur(10px);
      box-shadow: 0 16px 44px rgba(0,0,0,.62);
      color: var(--mut);
      font-weight: 980;
      letter-spacing:.25px;
      -webkit-tap-highlight-color:transparent;
      user-select:none;
      min-height:44px;
      white-space:nowrap;
    }
    .chip b{color:var(--ink)}

    /* band */
    .band{
      padding:10px 12px;border-radius:18px;
      border:1px solid var(--stroke2);
      background:rgba(0,0,0,.14);
      font-weight:980;letter-spacing:.25px;color:rgba(255,255,255,.90);
    }

    /* accordion rows */
    .list{display:flex;flex-direction:column;gap:12px}

    .row{
      border:1px solid rgba(255,255,255,.12);
      border-radius:22px;
      background:
        radial-gradient(circle at 22% 18%, rgba(120,0,22,.14), transparent 60%),
        radial-gradient(circle at 82% 30%, rgba(90,40,120,.10), transparent 66%),
        linear-gradient(145deg, rgba(10,12,16,.78), rgba(6,8,10,.92));
      box-shadow: 0 18px 56px rgba(0,0,0,.66);
      overflow:hidden;
      position:relative;
    }
    .row::after{
      content:"";
      position:absolute;inset:0;border-radius:22px;pointer-events:none;
      box-shadow: inset 0 0 0 1px rgba(201,162,74,.14);
      opacity:.60;
    }

    .head{
      display:flex;align-items:flex-start;justify-content:space-between;
      gap:10px;padding:16px 16px;cursor:pointer;
      -webkit-tap-highlight-color:transparent;touch-action:manipulation;
      position:relative;
    }
    .left{display:flex;align-items:flex-start;gap:12px;min-width:0}
    .mark{
      width:10px;height:10px;border-radius:3px;transform:rotate(45deg);
      background:var(--c);
      box-shadow:0 0 0 1px rgba(255,255,255,.14), 0 0 14px rgba(0,0,0,.35);
      margin-top:4px;flex:0 0 auto;
    }
    .titleBlock{min-width:0}
    .title{
      font-weight:980;letter-spacing:.25px;
      font-size:18.5px;color:var(--ink);
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    }
    .sub{
      margin-top:8px;font-size:14.25px;opacity:.88;line-height:1.35;max-width:92ch;color:var(--mut);
    }
    .chev{
      width:36px;height:36px;border-radius:14px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.16);
      display:flex;align-items:center;justify-content:center;
      color:var(--mut);
      font-weight:980;
      position:relative;
      overflow:hidden;
      flex:0 0 auto;
      margin-top:2px;
    }
    .chev::after{
      content:"";
      position:absolute;left:6px;right:6px;bottom:-10px;height:22px;
      background: radial-gradient(circle at 50% 0%, rgba(201,162,74,.32), transparent 70%);
      opacity:.62;pointer-events:none;
    }

    .body{
      display:none;
      padding:16px 16px 16px;
      border-top:1px solid rgba(255,255,255,.08);
      background:
        radial-gradient(circle at 24% 30%, rgba(255,43,43,.12), transparent 55%),
        radial-gradient(circle at 78% 35%, rgba(201,162,74,.10), transparent 58%),
        linear-gradient(145deg, rgba(10,12,16,.72), rgba(6,8,10,.92));
    }
    .row.open .body{display:block}
    .row.open{border-color: rgba(255,43,43,.22); box-shadow: 0 18px 56px rgba(0,0,0,.66), 0 0 18px rgba(255,43,43,.12);}

    .p{margin:0;color:rgba(255,255,255,.92);line-height:1.7;font-size:15px}
    .p + .p{margin-top:10px}
    .ul{margin:12px 0 0 18px;padding:0;color:rgba(255,255,255,.84);line-height:1.65;font-size:14.25px}
    .ul li{margin:7px 0}
    .actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end;margin-top:14px}

    /* dock */
    .dock{
      position:fixed;left:50%;
      bottom:max(10px, env(safe-area-inset-bottom));
      transform:translateX(-50%);
      z-index:220;
      width:min(980px,94vw);
      padding:10px 12px;border-radius:24px;
      border:1px solid rgba(255,255,255,.12);
      background:
        radial-gradient(circle at 18% 18%, rgba(255,43,43,.10), transparent 62%),
        radial-gradient(circle at 82% 70%, rgba(90,40,120,.10), transparent 64%),
        linear-gradient(145deg, rgba(10,12,16,.72), rgba(6,8,10,.86));
      backdrop-filter: blur(10px);
      box-shadow: 0 18px 60px rgba(0,0,0,.62);
      display:grid;grid-template-columns:repeat(4, minmax(0,1fr));
      gap:10px;
    }
    .dock .btn{width:100%;border-radius:999px}
    @media (max-width:520px){
      :root{--dockH:114px}
      .dock{grid-template-columns:repeat(3, minmax(0,1fr))}
    }
  </style>
</head>

<body>
  <div class="top-left" aria-label="Top navigation">
    <a class="btn" id="btnDoor" href="/door/" data-route="/door/">DOOR</a>
    <a class="btn" id="btnHome" href="/home/" data-route="/home/">HOME</a>
    <a class="btn red" id="btnExit" href="/index.html" data-route="/index.html">COMPASS</a>
  </div>

  <div class="top-right" aria-label="Language">
    <div class="seg" role="group" aria-label="Language toggle">
      <button type="button" id="langEN" aria-pressed="true">EN</button>
      <button type="button" id="langZH" aria-pressed="false">中文</button>
      <button type="button" id="langES" aria-pressed="false">ES</button>
    </div>
  </div>

  <div class="page">
    <section class="header goldTrim" aria-label="Products header">
      <p class="k" id="hk">PRODUCTS</p>
      <h1 class="t" id="ht">WHAT YOU CAN USE</h1>
      <p class="s" id="hs"></p>
      <div class="fine" id="fine"></div>

      <div class="metaRow">
        <div class="seg" role="group" aria-label="Lane toggle">
          <button type="button" id="lanePlatform" aria-pressed="true">PLATFORM</button>
          <button type="button" id="laneEngineering" aria-pressed="false">ENGINEERING</button>
        </div>

        <div class="seg" role="group" aria-label="Voice toggle">
          <button type="button" id="styleInformal" aria-pressed="true">INFORMAL</button>
          <button type="button" id="styleFormal" aria-pressed="false">FORMAL</button>
        </div>

        <div class="chip" aria-label="State">
          <span id="chipLang">LANG</span> <b id="chipLangVal">EN</b>
          <span style="opacity:.6">·</span>
          <span id="chipLane">LANE</span> <b id="chipLaneVal">PLATFORM</b>
          <span style="opacity:.6">·</span>
          <span id="chipStyle">STYLE</span> <b id="chipStyleVal">INFORMAL</b>
          <span style="opacity:.6">·</span>
          <span id="chipDepth">DEPTH</span> <b id="chipDepthVal">1</b>
        </div>
      </div>
    </section>

    <div class="band" id="bandA">PRODUCT SURFACES</div>
    <div class="list" id="listA"></div>

    <div class="band" id="bandS">SERVICES</div>
    <div class="list" id="listS"></div>

    <div class="band" id="bandB">VISION SHELLS</div>
    <div class="list" id="listB"></div>

    <div class="band" id="bandC">SYSTEM SPINES</div>
    <div class="list" id="listC"></div>
  </div>

  <nav class="dock" aria-label="Bottom navigation">
    <a class="btn" href="/explore/" data-route="/explore/" id="dockExplore">EXPLORE</a>
    <a class="btn red" href="/products/" data-route="/products/" id="dockProducts">PRODUCTS</a>
    <a class="btn" href="/laws/" data-route="/laws/" id="dockLaws">LAWS</a>
    <a class="btn" href="/gauges/" data-route="/gauges/" id="dockGauges">GAUGES</a>
  </nav>

  <script>
  (function(){
    "use strict";

    // ===== Canon state (NO new gd_* keys) =====
    var qs = new URLSearchParams(location.search);
    var LS = window.localStorage;

    var lang  = qs.get("lang")  || LS.getItem("gd_lang")  || "en";
    var style = qs.get("style") || LS.getItem("gd_style") || "informal"; // informal|formal
    var time  = qs.get("time")  || LS.getItem("gd_time")  || "now";      // origin|now|post
    var depth = qs.get("depth") || LS.getItem("gd_depth") || "1";        // 1..9
    var lane  = qs.get("lane")  || "platform";                           // URL-only platform|engineering

    if(lang!=="en" && lang!=="zh" && lang!=="es") lang="en";
    if(style!=="informal" && style!=="formal") style="informal";
    if(time!=="origin" && time!=="now" && time!=="post") time="now";

    var d = parseInt(depth,10);
    if(!isFinite(d)) d=1;
    if(d<1) d=1;
    if(d>9) d=9;
    depth = String(d);

    if(lane!=="platform" && lane!=="engineering") lane="platform";

    try{
      LS.setItem("gd_lang", lang);
      LS.setItem("gd_style", style);
      LS.setItem("gd_time", time);
      LS.setItem("gd_depth", depth);
    }catch(e){}

    document.documentElement.lang = (lang==="zh") ? "zh" : (lang==="es" ? "es" : "en");

    function q(extra){
      var p = new URLSearchParams();
      p.set("lang", (extra&&extra.lang)?extra.lang:lang);
      p.set("style",(extra&&extra.style)?extra.style:style);
      p.set("time", (extra&&extra.time)?extra.time:time);
      p.set("depth",(extra&&extra.depth)?String(extra.depth):depth);
      var L = (extra&&extra.lane)?extra.lane:lane;
      if(L==="platform"||L==="engineering") p.set("lane", L);
      return "?" + p.toString();
    }

    // Wire all [data-route] links with state
    function wireAll(){
      var nodes = document.querySelectorAll("[data-route]");
      for(var i=0;i<nodes.length;i++){
        var el = nodes[i];
        var route = el.getAttribute("data-route") || "";
        if(!route) continue;

        if(route.indexOf("?") !== -1){
          try{
            var u = new URL(route, location.origin);
            var sp = u.searchParams;
            if(!sp.get("lang")) sp.set("lang", lang);
            if(!sp.get("style")) sp.set("style", style);
            if(!sp.get("time")) sp.set("time", time);
            if(!sp.get("depth")) sp.set("depth", depth);
            if(!sp.get("lane")) sp.set("lane", lane);
            el.setAttribute("href", u.pathname + "?" + sp.toString() + (u.hash||""));
          }catch(e){
            el.setAttribute("href", route);
          }
        }else{
          el.setAttribute("href", route + q());
        }
      }
    }

    // ===== i18n =====
    function pick(en,zh,es){ return (lang==="zh")?zh:(lang==="es")?es:en; }
    function openWord(){ return (lang==="zh")?"打开":(lang==="es")?"ABRIR":"OPEN"; }

    var I18N = {
      en:{
        hk:"PRODUCTS",
        ht:"WHAT YOU CAN USE",
        hs_informal_platform:"Pick one thing. Open it. Keep your state. This catalog routes you to the next bounded page.",
        hs_informal_engineering:"Pick one thing. Open it. Keep your state. Engineering view tightens language and highlights boundaries.",
        hs_formal_platform:"This is the routing catalog. Links are stable. State-carry is mandatory.",
        hs_formal_engineering:"This is the routing catalog. Links are stable. State-carry is mandatory. Engineering view tightens wording.",
        fine_informal_platform:"PLATFORM emphasizes discoverability and clear next steps. Gold is trim. Red is direction. Black stays gem-like.",
        fine_informal_engineering:"ENGINEERING emphasizes boundaries, checks, and measurable outputs. Gold is trim. Red is direction. Black stays gem-like.",
        fine_formal_platform:"PLATFORM posture: discoverability + usability under stable routing contracts.",
        fine_formal_engineering:"ENGINEERING posture: separation + precision under stable routing contracts.",

        bandA:"PRODUCT SURFACES",
        bandS:"SERVICES",
        bandB:"VISION SHELLS",
        bandC:"SYSTEM SPINES",

        dockExplore:"EXPLORE",
        dockProducts:"PRODUCTS",
        dockLaws:"LAWS",
        dockGauges:"GAUGES"
      },
      zh:{
        hk:"产品",
        ht:"你能用的东西",
        hs_informal_platform:"选一个东西，打开它，状态保留。本目录把你路由到一个有界的下一页。",
        hs_informal_engineering:"选一个东西，打开它，状态保留。工程视图会更严格、更强调边界。",
        hs_formal_platform:"本页为路由目录。链接稳定。内部跳转必须携带状态。",
        hs_formal_engineering:"本页为路由目录。链接稳定。内部跳转必须携带状态。工程视图强化措辞。",
        fine_informal_platform:"平台强调可发现性与清晰下一步。金=饰边。红=方向。黑=宝石面。",
        fine_informal_engineering:"工程强调边界、检查与可测输出。金=饰边。红=方向。黑=宝石面。",
        fine_formal_platform:"平台姿态：稳定契约下提升可发现性与可用性。",
        fine_formal_engineering:"工程姿态：稳定契约下强化分离度与精确措辞。",

        bandA:"产品执行面",
        bandS:"服务",
        bandB:"愿景壳",
        bandC:"系统主脊柱",

        dockExplore:"探索",
        dockProducts:"产品",
        dockLaws:"法则",
        dockGauges:"量规"
      },
      es:{
        hk:"PRODUCTOS",
        ht:"LO QUE PUEDES USAR",
        hs_informal_platform:"Elige una cosa. Ábrela. Conserva el estado. Este catálogo te enruta al siguiente paso acotado.",
        hs_informal_engineering:"Elige una cosa. Ábrela. Conserva el estado. Ingeniería endurece el lenguaje y resalta límites.",
        hs_formal_platform:"Este es el catálogo de rutas. Enlaces estables. Estado obligatorio.",
        hs_formal_engineering:"Este es el catálogo de rutas. Enlaces estables. Estado obligatorio. Ingeniería endurece el lenguaje.",
        fine_informal_platform:"Plataforma: descubribilidad y siguiente paso claro. Oro = adorno. Rojo = dirección. Negro = gema.",
        fine_informal_engineering:"Ingeniería: límites, checks y salidas medibles. Oro = adorno. Rojo = dirección. Negro = gema.",
        fine_formal_platform:"Plataforma: descubribilidad y usabilidad bajo contratos de ruta estables.",
        fine_formal_engineering:"Ingeniería: separación y precisión bajo contratos de ruta estables.",

        bandA:"SUPERFICIES",
        bandS:"SERVICIOS",
        bandB:"CARCASAS DE VISIÓN",
        bandC:"ESPINAS DEL SISTEMA",

        dockExplore:"EXPLORAR",
        dockProducts:"PRODUCTOS",
        dockLaws:"LEYES",
        dockGauges:"MEDIDORES"
      }
    };

    function t(key){
      var dict = I18N[lang] || I18N.en;
      return dict[key] || (I18N.en[key] || "");
    }

    function applyHeader(){
      var hk=document.getElementById("hk");
      var ht=document.getElementById("ht");
      var hs=document.getElementById("hs");
      var fine=document.getElementById("fine");

      if(hk) hk.textContent=t("hk");
      if(ht) ht.textContent=t("ht");

      var hsKey="hs_"+style+"_"+lane;
      var fineKey="fine_"+style+"_"+lane;

      if(hs) hs.textContent=t(hsKey);

    function setPressed(ids, activeId){

        el.setAttribute("aria-pressed", ids[i]===activeId ? "true" : "false");

      {c:"#ff2b2b", t:{en:"Waste (Vision Shell)", zh:"废弃物（愿景壳）", es:"Residuos (carcasa de visión)"}, s:{en:"Stop burning value. Route molecules instead.", zh:"别烧掉价值：路由分子。", es:"No quemar valor: rutear moléculas."}, href:"/explore/frontier/vision/?focus=waste"},
      {c:"#ff2b2b", t:{en:"SHIMMER (Vision Shell)", zh:"SHIMMER（愿景壳）", es:"SHIMMER (carcasa de visión)"}, s:{en:"Hybrid molecular refinery at scale.", zh:"规模化混合分子精炼。", es:"Refinería molecular híbrida a escala."}, href:"/explore/frontier/vision/?focus=shimmer"}
    ];

    var ROWS_C = [
      {c:"#ff2b2b", t:{en:"Software Spine", zh:"软件主干", es:"Espina de software"}, s:{en:"Routing, gates, receipts. The machine behind pages.", zh:"路由/闸门/收据：页面背后的机器。", es:"Rutas, compuertas, recibos."}, href:"/products/software/"},
      {c:"#c9a24a", t:{en:"Dot.Grid", zh:"Dot.Grid", es:"Dot.Grid"}, s:{en:"Map + sweep: reveal wiring and correlation early.", zh:"地图+扫掠：提前暴露线路与相关。", es:"Mapa + barrido: revela cableado y correlación."}, href:"/products/dot-grid/"},
      {c:"#c9a24a", t:{en:"SSG", zh:"SSG", es:"SSG"}, s:{en:"Execution geometry: Resources/Stores/Constraints/Goals/Guards.", zh:"执行几何：资源/存储/约束/目标/守卫。", es:"Geometría: Resources/Stores/Constraints/Goals/Guards."}, href:"/products/ssg/"},
      {c:"#ff2b2b", t:{en:"Risk & Capital Systems", zh:"风险与资本系统", es:"Riesgo y capital"}, s:{en:"Risk, contracts, compliance, insurance, finance, crypto (bounded).", zh:"风险/合约/合规/保险/金融/加密（有界）。", es:"Riesgo, contratos, cumplimiento, seguro, finanzas, cripto (acotado)."}, href:"/products/risk-capital/"},
      {c:"#c9a24a", t:{en:"UCI Engine", zh:"UCI 引擎", es:"Motor UCI"}, s:{en:"Routing-safe shell (build next if missing).", zh:"路由安全壳（缺失则下一步构建）。", es:"Shell seguro (construir si falta)."}, href:"/products/uci/"},
      {c:"#c9a24a", t:{en:"Registry", zh:"注册表", es:"Registro"}, s:{en:"Routing-safe shell (build next if missing).", zh:"路由安全壳（缺失则下一步构建）。", es:"Shell seguro (construir si falta)."}, href:"/products/registry/"},
      {c:"#c9a24a", t:{en:"Adoption Ladder", zh:"采用阶梯", es:"Escalera de adopción"}, s:{en:"Routing-safe shell (build next if missing).", zh:"路由安全壳（缺失则下一步构建）。", es:"Shell seguro (construir si falta)."}, href:"/products/adoption-ladder/"}
    ];

    function makeRow(item, withCopy){
      var row=document.createElement("div");
      row.className="row";
      row.style.setProperty("--c", item.c);

      var head=document.createElement("div");
      head.className="head";
      head.setAttribute("role","button");
      head.tabIndex=0;

      var left=document.createElement("div");
      left.className="left";

      var mark=document.createElement("div");
      mark.className="mark";
      mark.style.background=item.c;

      var titleBlock=document.createElement("div");
      titleBlock.className="titleBlock";

      var title=document.createElement("div");
      title.className="title";
      title.textContent = item.t[lang] || item.t.en;

      var sub=document.createElement("div");
      sub.className="sub";
      sub.textContent = item.s[lang] || item.s.en;

      titleBlock.appendChild(title);
      titleBlock.appendChild(sub);

      left.appendChild(mark);
      left.appendChild(titleBlock);

      var chev=document.createElement("div");
      chev.className="chev";
      chev.textContent="▸";

      head.appendChild(left);
      head.appendChild(chev);

      var body=document.createElement("div");
      body.className="body";

      if(withCopy && item.copy){
        var cc = rowCopy(item.copy);
        var p1=document.createElement("p");
        p1.className="p";
        p1.textContent = (cc.p1[lang] || cc.p1.en);
        body.appendChild(p1);

        var p2=document.createElement("p");
        p2.className="p";
        p2.textContent = (cc.p2[lang] || cc.p2.en);
        body.appendChild(p2);

        var ul=document.createElement("ul");
        ul.className="ul";
        var bl = cc.bullets[lang] || cc.bullets.en;
        for(var i=0;i<bl.length;i++){
          var li=document.createElement("li");
          li.textContent=bl[i];
          ul.appendChild(li);
        }
        body.appendChild(ul);
      }else{
        var p=document.createElement("p");
        p.className="p";
        p.textContent = pick(
          "Open this to go to the destination page. Your state will carry.",
          "打开以进入目标页。你的状态会携带。",
          "Ábrelo para ir a la página destino. Tu estado se conserva."
        );
        body.appendChild(p);
      }

      var actions=document.createElement("div");
      actions.className="actions";

      var open=document.createElement("a");
      open.className="btn red";
      open.textContent = openWord() + ": " + pick("OPEN","打开","ABRIR");
      open.setAttribute("data-route", item.href);
      actions.appendChild(open);

      body.appendChild(actions);

      function toggle(){
        var willOpen = !row.classList.contains("open");
        var rows=document.querySelectorAll(".row");
        for(var i=0;i<rows.length;i++){
          rows[i].classList.remove("open");
          var c=rows[i].querySelector(".chev");
          if(c) c.textContent="▸";
        }
        row.classList.toggle("open", willOpen);
        chev.textContent = willOpen ? "▾" : "▸";
      }

      head.addEventListener("click", function(){ toggle(); });
      head.addEventListener("keydown", function(e){
        if(e.key==="Enter"||e.key===" "){ e.preventDefault(); toggle(); }
      });

      row.appendChild(head);
      row.appendChild(body);
      return row;
    }

    function mount(listId, arr, withCopy){
      var list=document.getElementById(listId);
      list.innerHTML="";
      for(var i=0;i<arr.length;i++){
        list.appendChild(makeRow(arr[i], withCopy));
      }
    }

    // ===== Apply labels + mount =====
    applyHeader();
    initControls();

    // Localize top buttons + dock labels (text only; routes wired by data-route)
    if(lang==="zh"){
      document.getElementById("btnDoor").textContent="门";
      document.getElementById("btnHome").textContent="主页";
      document.getElementById("btnExit").textContent="指南针";
      document.getElementById("lanePlatform").textContent="平台";
      document.getElementById("laneEngineering").textContent="工程";
      document.getElementById("styleInformal").textContent="通俗";
      document.getElementById("styleFormal").textContent="正式";
    }else if(lang==="es"){
      document.getElementById("btnDoor").textContent="PUERTA";
      document.getElementById("btnHome").textContent="INICIO";
      document.getElementById("btnExit").textContent="BRÚJULA";
      document.getElementById("lanePlatform").textContent="PLATAFORMA";
      document.getElementById("laneEngineering").textContent="INGENIERÍA";
      document.getElementById("styleInformal").textContent="INFORMAL";
      document.getElementById("styleFormal").textContent="FORMAL";
    }

    // Mount lists (A + Services include lens-dependent copy)
    mount("listA", ROWS_A, true);
    mount("listS", ROWS_S, true);
    mount("listB", ROWS_B, false);
    mount("listC", ROWS_C, false);

    // Wire links now that DOM has data-route in actions
    wireAll();

    // Default open first row only (keeps single-open safe)
    try{
      var first = document.querySelector(".row");
      if(first){
        first.classList.add("open");
        var c = first.querySelector(".chev");
        if(c) c.textContent="▾";
      }
    }catch(e){}
  })();
  </script>
</body>
</html>
