<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>LAWS · Canonical</title>

<link rel="stylesheet" href="/assets/ui.css"/>
<link rel="stylesheet" href="/assets/branch.css"/>

<style>
a{color:inherit;text-decoration:none}
body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:#fff}
body::before,body::after{pointer-events:none!important}

:root{
  --dockH:112px;

  /* high-contrast red/black/gold */
  --stroke:rgba(255,255,255,.12);
  --stroke2:rgba(255,255,255,.10);

  --ink:rgba(255,255,255,.94);
  --txt:rgba(255,255,255,.90);
  --mut:rgba(255,255,255,.78);
  --mut2:rgba(255,255,255,.70);

  --crimson:rgba(120,0,22,.30);
  --festival:rgba(255,43,43,.14);
  --opalV:rgba(90,40,120,.10);

  --sigR:rgba(255,43,43,.18);
  --sigR2:rgba(255,43,43,.12);

  --gold:rgba(201,162,74,.40);
  --goldSoft:rgba(201,162,74,.18);

  --shadowA:0 24px 80px rgba(0,0,0,.55);
  --shadowB:0 16px 52px rgba(0,0,0,.60);
  --shadowC:0 18px 60px rgba(0,0,0,.55);

  --fsH:28px;
  --fsP:14.75px;
}

/* ===== TOP CONTROLS ===== */
.top{
  position:fixed;top:16px;left:0;right:0;
  padding:0 16px;
  display:flex;justify-content:space-between;align-items:center;
  gap:12px;
  z-index:240;
  pointer-events:none;
}
.top .left,.top .right{
  display:flex;gap:10px;align-items:center;
  flex-wrap:wrap;white-space:nowrap;
  pointer-events:auto;
}

/* Button (gold under-light only) */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:10px 12px;min-height:44px;border-radius:16px;
  border:1px solid rgba(255,255,255,.14);
  background:
    radial-gradient(circle at 50% 120%, rgba(201,162,74,.16), transparent 64%),
    linear-gradient(145deg, rgba(10,12,16,.78), rgba(6,8,10,.90));
  color:var(--ink);
  font-weight:950;font-size:14px;letter-spacing:.2px;
  -webkit-tap-highlight-color:transparent;
  position:relative;overflow:hidden;
  touch-action:manipulation;
  box-shadow:var(--shadowC);
  white-space:nowrap;
}
.btn:active{transform:translateY(1px)}
.btn::after{
  content:"";
  position:absolute;left:10px;right:10px;bottom:-12px;height:28px;
  background: radial-gradient(circle at 50% 0%, rgba(201,162,74,.34), transparent 72%);
  opacity:.60;pointer-events:none;
}
.btn.red{border-color:rgba(255,43,43,.22); box-shadow:var(--shadowC), 0 0 18px rgba(255,43,43,.12);}

/* Segmented controls */
.seg{
  display:inline-flex;gap:0;overflow:hidden;border-radius:16px;
  border:1px solid rgba(255,255,255,.12);
  background: rgba(0,0,0,.16);
  box-shadow: var(--shadowC);
}
.seg button{
  appearance:none;border:0;background:transparent;color:var(--mut);
  padding:10px 12px;min-height:44px;font-weight:950;font-size:13px;
  letter-spacing:.25px;cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
.seg button[aria-pressed="true"]{
  color:var(--ink);
  background:
    radial-gradient(circle at 50% 120%, rgba(201,162,74,.22), transparent 62%),
    linear-gradient(180deg, rgba(255,43,43,.10), rgba(0,0,0,.10));
  box-shadow: inset 0 -10px 22px rgba(201,162,74,.16);
}

/* ===== PAGE ===== */
.page{
  width:min(1120px,94vw);
  margin:0 auto;
  padding:84px 0 calc(var(--dockH) + 18px);
  display:flex;
  flex-direction:column;
  gap:12px;
  position:relative;
  z-index:10;
}

/* ===== Background context (behind content; not body) ===== */
.backdrop{
  position:absolute;
  left:50%;
  top:70px;
  transform:translateX(-50%);
  width:min(1180px,96vw);
  height:calc(100% - 120px);
  border-radius:34px;
  pointer-events:none;
  z-index:0;
  overflow:hidden;
}
.backdrop::before{
  content:"";
  position:absolute;inset:0;
  border:1px solid rgba(255,255,255,.08);
  border-radius:34px;
  background:
    radial-gradient(circle at 18% 22%, rgba(201,162,74,.10), transparent 60%),
    radial-gradient(circle at 78% 26%, rgba(255,43,43,.10), transparent 62%),
    radial-gradient(circle at 62% 90%, rgba(90,40,120,.10), transparent 64%),
    linear-gradient(160deg, rgba(0,0,0,.18), rgba(0,0,0,.08));
  box-shadow:
    0 70px 220px rgba(0,0,0,.62),
    inset 0 2px 0 rgba(255,255,255,.06),
    inset 0 -70px 140px rgba(0,0,0,.55);
  opacity:.92;
}
.backdrop::after{
  content:"";
  position:absolute;inset:-18%;
  background:
    radial-gradient(circle at 18% 34%, rgba(255,43,43,.18), transparent 44%),
    radial-gradient(circle at 84% 30%, rgba(255,43,43,.14), transparent 46%),
    radial-gradient(circle at 52% 78%, rgba(201,162,74,.12), transparent 48%),
    conic-gradient(from 12deg at 30% 28%,
      rgba(201,162,74,.14), transparent 12%,
      rgba(255,43,43,.12), transparent 24%,
      rgba(90,40,120,.10), transparent 38%,
      transparent 100%),
    conic-gradient(from 180deg at 70% 36%,
      rgba(255,43,43,.12), transparent 14%,
      rgba(201,162,74,.12), transparent 28%,
      rgba(90,40,120,.10), transparent 44%,
      transparent 100%),
    radial-gradient(circle at 50% 50%, rgba(255,255,255,.04), transparent 62%);
  filter:blur(1px);
  opacity:.72;
}

/* ===== HEADER ===== */
.header{
  position:relative;
  z-index:2;
  border:1px solid var(--stroke);
  border-radius:22px;
  background:
    radial-gradient(circle at 18% 22%, var(--crimson), transparent 72%),
    radial-gradient(circle at 82% 30%, var(--opalV), transparent 74%),
    radial-gradient(circle at 55% 110%, var(--sigR2), transparent 62%),
    radial-gradient(circle at 26% 22%, rgba(201,162,74,.14), transparent 62%),
    linear-gradient(160deg, rgba(0,0,0,.30), rgba(0,0,0,.14));
  backdrop-filter:blur(10px);
  box-shadow:var(--shadowA);
  padding:16px 16px 14px;
  overflow:hidden;
}
.header::before{
  content:"";
  position:absolute;inset:0;border-radius:22px;pointer-events:none;
  box-shadow: inset 0 0 0 1px rgba(255,43,43,.18);
  background:
    repeating-linear-gradient(45deg, rgba(201,162,74,.08) 0 1px, transparent 1px 16px),
    repeating-linear-gradient(-45deg, rgba(201,162,74,.06) 0 1px, transparent 1px 16px);
  opacity:.30;
  mask:
    radial-gradient(circle at 50% 50%, transparent 0 78%, #000 82% 100%),
    linear-gradient(#000,#000);
  -webkit-mask:
    radial-gradient(circle at 50% 50%, transparent 0 78%, #000 82% 100%),
    linear-gradient(#000,#000);
}

.k{margin:0 0 6px;font-size:11px;letter-spacing:4px;text-transform:uppercase;opacity:.74;color:var(--mut)}
.t{margin:0;font-weight:950;font-size:var(--fsH);letter-spacing:.7px;line-height:1.12;color:var(--ink)}
.s{margin:10px 0 0;font-size:var(--fsP);opacity:.92;line-height:1.55;color:var(--txt);max-width:980px}
.rule{
  margin-top:12px;
  border-radius:18px;
  border:1px solid rgba(255,255,255,.10);
  background:
    radial-gradient(circle at 22% 18%, rgba(255,43,43,.10), transparent 58%),
    radial-gradient(circle at 82% 70%, rgba(201,162,74,.10), transparent 62%),
    linear-gradient(160deg, rgba(10,12,16,.55), rgba(6,8,10,.72));

  color:rgba(255,255,255,.86);
  font-size:13px;
  line-height:1.5;
}
.fine{margin-top:10px;font-size:12.75px;opacity:.80;line-height:1.45;color:var(--mut)}

/* Lens row (NEW STANDARD) */
.lensRow{
  margin-top:12px;
  display:flex;
  justify-content:space-between;
  gap:10px;
  flex-wrap:wrap;
  align-items:center;
}
.statePill{
  display:inline-flex;align-items:center;gap:8px;
  padding:10px 12px;border-radius:999px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(0,0,0,.16);
  color:var(--mut);
  font-weight:950;
  box-shadow:0 14px 36px rgba(0,0,0,.55);
}

/* ===== BAND ===== */
.band{
  position:relative;
  z-index:2;
  padding:10px 12px;
  border-radius:18px;
  border:1px solid var(--stroke2);
  background:rgba(0,0,0,.14);
  font-weight:950;
  letter-spacing:.2px;
  color:rgba(255,255,255,.88);
}

/* ===== ACCORDION ===== */
.list{position:relative;z-index:2;display:flex;flex-direction:column;gap:12px}

.row{
  position:relative;
  border:1px solid rgba(255,255,255,.10);
  border-radius:22px;
  background:
    radial-gradient(circle at 22% 18%, rgba(255,43,43,.10), transparent 58%),
    radial-gradient(circle at 78% 30%, rgba(90,40,120,.10), transparent 62%),
    linear-gradient(145deg, rgba(17,22,28,.86), rgba(11,15,20,.92));
  box-shadow:var(--shadowB);
  overflow:hidden;
}
.row::before{
  content:"";
  position:absolute;inset:0;border-radius:22px;pointer-events:none;
  box-shadow: inset 0 0 0 1px rgba(201,162,74,.12);
  opacity:.60;
}
.head{
  display:flex;align-items:flex-start;justify-content:space-between;
  gap:10px;
  padding:14px 16px;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
  position:relative;
}
.left{display:flex;align-items:flex-start;gap:12px;min-width:0}
.marker{
  display:flex;flex-direction:column;align-items:center;gap:8px;
  margin-top:2px;flex:0 0 auto;
}
.diamond{
  width:10px;height:10px;border-radius:3px;transform:rotate(45deg);
  background:var(--c);
  box-shadow:0 0 0 1px rgba(255,255,255,.14), 0 0 14px rgba(0,0,0,.35);
}
.bar{
  width:6px;height:22px;border-radius:99px;background:var(--c);
  box-shadow:0 0 18px rgba(0,0,0,.25);
}
.titleBlock{min-width:0}
.title{
  font-weight:950;
  letter-spacing:.25px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  font-size:16.5px;
  color:var(--ink);
}
.sub2{
  margin-top:6px;
  font-size:13.25px;
  opacity:.88;
  line-height:1.38;
  max-width:92ch;
  color:rgba(255,255,255,.86);
}
.chev{
  width:36px;height:36px;border-radius:14px;
  border:1px solid rgba(255,255,255,.14);
  background: rgba(0,0,0,.16);
  display:flex;align-items:center;justify-content:center;
  color:var(--mut);
  font-weight:950;
  position:relative;overflow:hidden;
  flex:0 0 auto;margin-top:2px;
}
.chev::after{
  content:"";
  position:absolute;left:6px;right:6px;bottom:-10px;height:22px;
  background: radial-gradient(circle at 50% 0%, rgba(201,162,74,.30), transparent 70%);
  opacity:.62;pointer-events:none;
}

.body{
  display:none;
  padding:14px 16px 16px;
  border-top:1px solid rgba(255,255,255,.08);
  background:
    radial-gradient(circle at 30% 30%, rgba(255,255,255,.06), transparent 55%),
    linear-gradient(145deg, rgba(10,12,16,.86), rgba(6,8,10,.92));
}
.row.open .body{display:block}
.row.open{border-color:rgba(255,43,43,.22); box-shadow:var(--shadowB), 0 0 18px rgba(255,43,43,.10);}

.p{
  margin:0;
  color:rgba(255,255,255,.90);
  line-height:1.7;
  font-size:14.5px;
}
.p + .p{margin-top:10px}
.ul{
  margin:10px 0 0 18px;padding:0;
  color:rgba(255,255,255,.82);
  line-height:1.55;
  font-size:13.5px;
}
.ul li{margin:6px 0}

.actions{
  display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end;margin-top:12px;
}

/* ===== DOCK ===== */
.dock{
  position:fixed;left:50%;
  bottom:max(10px, env(safe-area-inset-bottom));
  transform:translateX(-50%);
  z-index:220;
  width:min(980px,94vw);
  padding:10px 12px;
  border-radius:22px;
  border:1px solid rgba(255,255,255,.12);
  background:
    radial-gradient(circle at 18% 18%, rgba(255,43,43,.10), transparent 62%),
    radial-gradient(circle at 82% 70%, rgba(90,40,120,.10), transparent 64%),
    linear-gradient(145deg, rgba(10,12,16,.72), rgba(6,8,10,.86));
  backdrop-filter:blur(10px);
  box-shadow:0 18px 60px rgba(0,0,0,.55);
  display:grid;
  grid-template-columns:repeat(4, minmax(0,1fr));
  gap:10px;
}
.dock .btn{width:100%;padding:10px 10px;border-radius:999px;white-space:nowrap}
@media (max-width:520px){
  :root{--dockH:132px;--fsH:27px;--fsP:14.25px}
  .dock{grid-template-columns:repeat(3, minmax(0,1fr))}
  .title{font-size:15.75px}
}
</style>
</head>

  // =======================
  // URL STATE (NO RELOAD)
  // =======================
  function setPressed(ids, activeId){
    for(var i=0;i<ids.length;i++){
      var el=document.getElementById(ids[i]);
      if(!el) continue;
      el.setAttribute("aria-pressed", ids[i]===activeId ? "true" : "false");
    }
  }

  function setLang(next){
    if(next!=="en" && next!=="zh" && next!=="es") next="en";
    lang=next;
    try{ LS.setItem("gd_lang",lang); }catch(e){}
    history.replaceState({}, "", location.pathname + q({lang:lang}));
    applyStatic();
    updateBodies(); // keep open row open
    wireAll();
  }

  function setLane(next){
    if(next!=="platform" && next!=="engineering") next="platform";
    lane=next;
    history.replaceState({}, "", location.pathname + q({lane:lane}));
    applyStatic();
    updateBodies(); // keep open row open
    wireAll();
  }

  // =======================
  // WIRE LINKS (STATE CARRY)
  // =======================
  function wireAll(){
    var nodes=document.querySelectorAll("[data-route]");
    for(var i=0;i<nodes.length;i++){
      var el=nodes[i];
      var route=el.getAttribute("data-route")||"";
      if(!route) continue;

      if(route.indexOf("?")!==-1){
        try{
          var u=new URL(route, location.origin);
          var sp=u.searchParams;
          sp.set("lang", lang);
          sp.set("style","informal");
          sp.set("time", time);
          sp.set("depth","explore");
          sp.set("lane", lane);
          el.setAttribute("href", u.pathname + "?" + sp.toString() + (u.hash||""));
        }catch(e){
          el.setAttribute("href", route);
        }
      }else{
        el.setAttribute("href", route + q());
      }
    }
  }

  // =======================
  // RENDER (ONE TIME)
  // =======================
  var list=document.getElementById("list");
  var rowEls=[]; // [{row, chevron, title, sub, bodyPWrap, ul, actions}]
  var openIndex=0;

  function closeAll(){
    for(var i=0;i<rowEls.length;i++){
      rowEls[i].row.classList.remove("open");
      rowEls[i].chev.textContent="▸";
    }
  }

  function toggleRow(i){
    var isOpen=rowEls[i].row.classList.contains("open");
    if(isOpen){
      rowEls[i].row.classList.remove("open");
      rowEls[i].chev.textContent="▸";
      return;
    }
    closeAll();
    openIndex=i;
    rowEls[i].row.classList.add("open");
    rowEls[i].chev.textContent="▾";
  }

  function buildRow(L, idx){
    var row=document.createElement("div");
    row.className="row";
    row.style.setProperty("--c", L.c);

    var head=document.createElement("div");
    head.className="head";
    head.setAttribute("role","button");
    head.tabIndex=0;

    var left=document.createElement("div");
    left.className="left";

    var marker=document.createElement("div");
    marker.className="marker";
    var diamond=document.createElement("div");
    diamond.className="diamond";
    diamond.style.background=L.c;
    var bar=document.createElement("div");
    bar.className="bar";
    bar.style.background=L.c;
    marker.appendChild(diamond);
    marker.appendChild(bar);

    var tb=document.createElement("div");
    tb.className="titleBlock";

    var title=document.createElement("div");
    title.className="title";

    var sub=document.createElement("div");
    sub.className="sub2";

    tb.appendChild(title);
    tb.appendChild(sub);

    left.appendChild(marker);
    left.appendChild(tb);

    var chev=document.createElement("div");
    chev.className="chev";
    chev.textContent="▸";

    head.appendChild(left);
    head.appendChild(chev);

    var body=document.createElement("div");
    body.className="body";

    var pWrap=document.createElement("div");

    var ul=document.createElement("ul");
    ul.className="ul";

    var actions=document.createElement("div");
    actions.className="actions";

    var aG=document.createElement("a");
    aG.className="btn";
    aG.setAttribute("data-route","/gauges/");
    actions.appendChild(aG);

    var aP=document.createElement("a");
    aP.className="btn";
    aP.setAttribute("data-route","/products/");
    actions.appendChild(aP);

    body.appendChild(pWrap);
    body.appendChild(ul);
    body.appendChild(actions);

    function onToggle(){ toggleRow(idx); }
    head.addEventListener("click", onToggle, {passive:true});
    head.addEventListener("keydown", function(e){
      if(e.key==="Enter"||e.key===" "){ e.preventDefault(); onToggle(); }
    });

    row.appendChild(head);
    row.appendChild(body);

    list.appendChild(row);

    rowEls.push({
      row:row,
      chev:chev,
      title:title,
      sub:sub,
      pWrap:pWrap,
      ul:ul,
      aG:aG,
      aP:aP
    });
  }

  function render(){
    list.innerHTML="";
    rowEls=[];
    for(var i=0;i<LAWS.length;i++){
      buildRow(LAWS[i], i);
    }
    openIndex=0;
    toggleRow(0);
  }

  // =======================
  // UPDATE (NO CLOSE)
  // =======================
  function applyStatic(){
    // header text
    var HC = HEADER_COPY[lang] || HEADER_COPY.en;
    document.getElementById("hs").textContent = (lane==="engineering") ? HC.hs_engineering : HC.hs_platform;
    document.getElementById("ruleTop").textContent = HC.rule;
    document.getElementById("fine").textContent = HC.fine;

    // labels
    document.getElementById("hk").textContent = pick3("LAWS","法则","LEYES");
    document.getElementById("ht").textContent = pick3("THE RULES THAT KEEP BIG IDEAS HONEST","让大想法保持诚实的规则","REGLAS QUE MANTIENEN HONESTAS LAS IDEAS GRANDES");
    document.getElementById("band").textContent = pick3("CANONICAL LAWS (7)","规范法则（7）","LEYES CANÓNICAS (7)");

    // top nav
    document.getElementById("btnDoor").textContent = pick3("DOOR","门","PUERTA");
    document.getElementById("btnPrelude").textContent = pick3("PRELUDE","前奏","PRELUDIO");
    document.getElementById("btnHome").textContent = pick3("HOME","主页","INICIO");

    // dock
    document.getElementById("dockIndex").textContent = pick3("COMPASS","指南针","BRÚJULA");
    document.getElementById("dockExplore").textContent = pick3("EXPLORE","探索","EXPLORAR");
    document.getElementById("dockProducts").textContent = pick3("PRODUCTS","产品","PRODUCTOS");
    document.getElementById("dockGauges").textContent = pick3("GAUGES","量规","MEDIDORES");

    // language seg pressed
    setPressed(["langEN","langZH","langES"], lang==="zh"?"langZH":(lang==="es"?"langES":"langEN"));

    // lane seg pressed + labels
    document.getElementById("lanePlatform").textContent = pick3("PLATFORM","平台","PLATAFORMA");
    document.getElementById("laneEngineering").textContent = pick3("ENGINEERING","工程","INGENIERÍA");
    setPressed(["lanePlatform","laneEngineering"], lane==="engineering"?"laneEngineering":"lanePlatform");

    // lens state
    document.getElementById("lensState").textContent =
      (lang==="zh") ? ("当前透镜："+laneLabel()) :
      (lang==="es") ? ("Lente actual: "+laneLabel()) :
      ("Current lens: "+laneLabel());
  }

  function updateBodies(){
    // preserve open state
    var keepOpen=openIndex;

    for(var i=0;i<LAWS.length;i++){
      var L=LAWS[i];
      var re=rowEls[i];

      // title/sub
      re.title.textContent = (lang==="zh")?L.t.zh:(lang==="es")?L.t.es:L.t.en;
      re.sub.textContent   = (lang==="zh")?L.s.zh:(lang==="es")?L.s.es:L.s.en;

      // body content (lane + lang)
      var blk = (lane==="engineering") ? L.engineering : L.platform;
      var pack = (lang==="zh")?blk.zh:(lang==="es")?blk.es:blk.en;

      // paragraphs
      re.pWrap.innerHTML="";
      for(var p=0;p<pack.p.length;p++){
        var elP=document.createElement("p");
        elP.className="p";
        elP.textContent=pack.p[p];
        re.pWrap.appendChild(elP);
      }

      // bullets
      re.ul.innerHTML="";
      for(var u=0;u<pack.ul.length;u++){
        var li=document.createElement("li");
        li.textContent=pack.ul[u];
        re.ul.appendChild(li);
      }

      // actions labels
      re.aG.textContent = openWord()+": "+pick3("GAUGES","量规","MEDIDORES");
      re.aP.textContent = openWord()+": "+pick3("PRODUCTS","产品","PRODUCTOS");
    }

    // restore open
    closeAll();
    toggleRow(keepOpen);
  }

  // =======================
  // EVENTS
  // =======================
  document.getElementById("langEN").addEventListener("click", function(){ setLang("en"); }, {passive:true});
  document.getElementById("langZH").addEventListener("click", function(){ setLang("zh"); }, {passive:true});
  document.getElementById("langES").addEventListener("click", function(){ setLang("es"); }, {passive:true});

  document.getElementById("lanePlatform").addEventListener("click", function(){ setLane("platform"); }, {passive:true});
  document.getElementById("laneEngineering").addEventListener("click", function(){ setLane("engineering"); }, {passive:true});

  // =======================
  // INIT
  // =======================
  render();
  applyStatic();
  updateBodies();
  wireAll();
})();
</script>
