<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Nine Summits Stage 1 Runtime</title>
  <style>
    :root{
      color-scheme:dark;
      --bg:#071018;
      --panel:rgba(7,16,24,.82);
      --line:rgba(255,255,255,.12);
      --text:#dce8f4;
      --muted:#9db2c7;
    }
    *{box-sizing:border-box}
    html,body{
      margin:0;
      width:100%;
      height:100%;
      overflow:hidden;
      background:var(--bg);
      color:var(--text);
      font-family:Arial,Helvetica,sans-serif;
    }
    body{position:relative}
    #world-canvas{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      display:block;
      background:#071018;
    }
    #runtime-status{
      position:absolute;
      top:12px;
      left:12px;
      z-index:10;
      min-width:220px;
      padding:10px 12px;
      border:1px solid var(--line);
      border-radius:10px;
      background:var(--panel);
      color:var(--muted);
      font-size:12px;
      line-height:1.45;
      white-space:pre-line;
      pointer-events:none;
      user-select:none;
    }
  </style>
</head>
<body>
  <canvas id="world-canvas" aria-label="Nine Summits Stage 1 simulation canvas"></canvas>
  <pre id="runtime-status">boot: pending
payload: pending
render: pending
coherence: pending</pre>
  <script type="module" src="./variant/scene.js"></script>
</body>
</html>
