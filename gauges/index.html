<!-- DESTINATION FILE: /gauges/index.html -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Gauges — Live Diagnostic</title>

<link rel="stylesheet" href="/assets/ui.css"/>

<style>
body{
  margin:0;
  background:#020617;
  color:#fff;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
}

/* ===== Layout ===== */
.page{
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:14px;
}

/* ===== Card ===== */
.card{
  border:1px solid rgba(255,255,255,.08);
  border-radius:16px;
  padding:14px;
  background:rgba(0,0,0,.25);
}

/* ===== Diamond ===== */
.row{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:10px 0;
  border-bottom:1px solid rgba(255,255,255,.06);
}
.row:last-child{border-bottom:0}

.left{
  display:flex;
  align-items:center;
  gap:10px;
}

.diamond{
  width:10px;
  height:10px;
  transform:rotate(45deg);
  border-radius:2px;
}

/* ===== Status colors ===== */
.pass{ background:#22c55e }
.warn{ background:#facc15 }
.fail{ background:#ef4444 }
.idle{ background:#6b7280 }

.title{
  font-weight:900;
  letter-spacing:.04em;
}

.value{
  opacity:.85;
  font-weight:700;
}

/* ===== Header ===== */
.header{
  font-size:22px;
  font-weight:900;
  letter-spacing:.08em;
}

/* ===== Sticky status ===== */
.statusBar{
  position:sticky;
  top:0;
  background:#020617;
  padding:10px 0;
  z-index:10;
  font-weight:900;
  letter-spacing:.08em;
}
</style>
</head>

<body>

<div class="page">

  <div class="statusBar" id="statusBar">
    STATE: —
  </div>

  <div class="header">
    LIVE DIAGNOSTIC
  </div>

  <!-- RUNTIME -->
  <div class="card">
    <div class="title">RUNTIME</div>
    <div id="runtimeBlock"></div>
  </div>

  <!-- MOTION -->
  <div class="card">
    <div class="title">MOTION</div>
    <div id="motionBlock"></div>
  </div>

  <!-- INSTRUMENT -->
  <div class="card">
    <div class="title">INSTRUMENT</div>
    <div id="instrumentBlock"></div>
  </div>

  <!-- WORLD -->
  <div class="card">
    <div class="title">WORLD</div>
    <div id="worldBlock"></div>
  </div>

  <!-- EMISSION -->
  <div class="card">
    <div class="title">EMISSION</div>
    <div id="emissionBlock"></div>
  </div>

  <!-- PLACEMENT -->
  <div class="card">
    <div class="title">PLACEMENT</div>
    <div id="placementBlock"></div>
  </div>

  <!-- FAILURE -->
  <div class="card">
    <div class="title">FAILURE</div>
    <div id="failureBlock"></div>
  </div>

</div>

<script>
const KEY = "cte_runtime_v3";

function getStatusClass(value){
  if(value === true) return "pass";
  if(value === false) return "fail";
  if(value === null || value === undefined) return "idle";
  return "warn";
}

function row(label, value){
  const cls = getStatusClass(value);

  return `
    <div class="row">
      <div class="left">
        <div class="diamond ${cls}"></div>
        <div>${label}</div>
      </div>
      <div class="value">${value}</div>
    </div>
  `;
}

function render(data){
  if(!data){
    document.getElementById("statusBar").textContent = "STATE: NO DATA";
    return;
  }

  const stale = Date.now() - new Date(data.timestamp).getTime() > 2000;

  document.getElementById("statusBar").textContent =
    "STATE: " + (stale ? "STALE" : "LIVE") + " • " + data.phase;

  // ===== RUNTIME =====
  document.getElementById("runtimeBlock").innerHTML = `
    ${row("phase", data.phase)}
    ${row("mode", data.mode)}
    ${row("fps", Math.round(data.fps))}
    ${row("dtMs", Math.round(data.dtMs))}
    ${row("timestamp", data.timestamp)}
  `;

  // ===== MOTION =====
  const m = data.control?.motionState || {};
  document.getElementById("motionBlock").innerHTML = `
    ${row("yaw", m.yaw)}
    ${row("pitch", m.pitch)}
    ${row("yawVelocity", m.yawVelocity)}
    ${row("pitchVelocity", m.pitchVelocity)}
    ${row("orbitPhase", m.orbitPhase)}
  `;

  // ===== INSTRUMENT =====
  const inst = data.instrument || {};
  document.getElementById("instrumentBlock").innerHTML = `
    ${row("gate", inst.gate)}
    ${row("trajectory", inst.trajectoryClass)}
    ${row("coherence", inst.coherence)}
  `;

  // ===== WORLD =====
  const w = inst.world || {};
  document.getElementById("worldBlock").innerHTML = `
    ${row("phase", w.phase)}
    ${row("stability", w.stabilityClass)}
  `;

  // ===== EMISSION =====
  const e = data.emissionReceipt || {};
  document.getElementById("emissionBlock").innerHTML = `
    ${row("emitted", e.emissionEmitted)}
    ${row("frontVisible", e.emissionFrontVisible)}
    ${row("pass", e.emissionPass)}
  `;

  // ===== PLACEMENT =====
  const p = data.placementReceipt || {};
  document.getElementById("placementBlock").innerHTML = `
    ${row("placed", p.placementPlaced)}
    ${row("collisions", p.markerCollisionCount)}
    ${row("pass", p.placementPass)}
  `;

  // ===== FAILURE =====
  const f = data.failure || {};
  document.getElementById("failureBlock").innerHTML = `
    ${row("error", f.message || "none")}
    ${row("pass", data.verification?.pass)}
  `;
}

function tick(){
  try{
    const raw = localStorage.getItem(KEY);
    const data = raw ? JSON.parse(raw) : null;
    render(data);
  }catch(e){
    console.error(e);
  }
}

setInterval(tick, 500);
tick();
</script>

</body>
</html>
