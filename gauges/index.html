<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D World Runtime - LIVE</title>
    <script src="https://cdnjs.cloudflare.com"></script>
    <style>
        :root { --accent: #00ff88; --muted: #888; --line: #333; --bg: #050505; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: monospace; overflow: hidden; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        /* Dashboard Overlay */
        .container { position: absolute; top: 20px; left: 20px; z-index: 10; width: 320px; background: rgba(0,0,0,0.85); border: 1px solid var(--line); border-radius: 12px; padding: 15px; backdrop-filter: blur(10px); }
        .status { font-weight: bold; margin-bottom: 10px; color: var(--muted); }
        .title { color: var(--accent); font-weight: bold; font-size: 1.2em; }
        .preview { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-top: 10px; }
        .previewItem { padding: 8px; border: 1px solid var(--line); border-radius: 8px; background: rgba(255,255,255,0.02); }
        .previewK { opacity: 0.7; font-size: 10px; text-transform: uppercase; }
        .previewV { font-size: 14px; margin-top: 2px; }
        .canvasWrap { margin-top: 15px; border: 1px solid var(--line); border-radius: 8px; overflow: hidden; }
        canvas#runtimeChart { display: block; width: 100%; background: #000; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="canvas-container"></div>

<div class="container">
    <div id="status" class="status">STATE: OFFLINE</div>
    <div class="title">SYSTEM_DIAGNOSTICS_v6</div>
    
    <div id="display-layer">
        <div class="preview">
            <div class="previewItem"><div class="previewK">FPS</div><div id="val-fps" class="previewV">—</div></div>
            <div class="previewItem"><div class="previewK">LATENCY</div><div id="val-dt" class="previewV">—</div></div>
        </div>
    </div>

    <div class="canvasWrap">
        <canvas id="runtimeChart" width="300" height="80"></canvas>
    </div>
</div>

<script>
/** 
 * SECTION 1: THE 3D ENGINE (BARREL TRIGGER)
 * This block simulates your globe engine and emits the "Truth" to window.
 */
function initEngine() {
    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    container.appendChild(renderer.domElement);

    // Create a wireframe globe (The STOCK)
    const geometry = new THREE.SphereGeometry(2, 32, 32);
    const material = new THREE.MeshBasicMaterial({ color: 0x00ff88, wireframe: true, transparent: true, opacity: 0.3 });
    const globe = new THREE.Mesh(geometry, material);
    scene.add(globe);
    camera.position.z = 5;

    let lastTime = performance.now();
    
    function animate(time) {
        const dt = time - lastTime;
        lastTime = time;
        const fps = Math.round(1000 / dt);

        globe.rotation.y += 0.005;
        renderer.render(scene, camera);

        /**
         * FINAL LAW: MOVE THE DATA TO THE WINDOW
         * This satisfies the Gauges' search for a "Live Receipt"
         */
        window.__AUTHORITY_RECEIPT__ = {
            phase: "RUNNING",
            timestamp: Date.now(),
            fps: fps,
            dtMs: dt,
            instrument: {
                classifiedState: "ACTIVE",
                diagnosticsPayload: { fps: fps, dtMs: dt }
            }
        };

        requestAnimationFrame(animate);
    }
    requestAnimationFrame(animate);
}

/** 
 * SECTION 2: THE DASHBOARD LOGIC (THE OBSERVER)
 * Your provided logic rewritten to bridge the gap.
 */
const history = { fps: [], dtMs: [] };

function readReceipt() { return window.__AUTHORITY_RECEIPT__ || {}; }

function updateDashboard() {
    const receipt = readReceipt();
    const statusNode = document.getElementById("status");
    const valFps = document.getElementById("val-fps");
    const valDt = document.getElementById("val-dt");

    if (!receipt.phase) {
        statusNode.textContent = "STATE: OFFLINE";
        return;
    }

    // Update UI elements
    const state = receipt.instrument?.classifiedState || "UNKNOWN";
    statusNode.textContent = `STATE: ${state} • ${receipt.phase}`;
    statusNode.style.color = "var(--accent)";
    
    valFps.textContent = receipt.fps;
    valDt.textContent = Math.round(receipt.dtMs) + "ms";

    // Update History for Graph
    history.fps.push(receipt.fps);
    history.dtMs.push(receipt.dtMs);
    if (history.fps.length > 100) { history.fps.shift(); history.dtMs.shift(); }

    drawChart();
}

function drawChart() {
    const canvas = document.getElementById("runtimeChart");
    const ctx = canvas.getContext("2d");
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    ctx.strokeStyle = "#00ff88"; // Green for FPS
    ctx.beginPath();
    history.fps.forEach((v, i) => {
        const x = (i / 100) * canvas.width;
        const y = canvas.height - (v / 100) * canvas.height;
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    });
    ctx.stroke();
}

// Start everything
initEngine();
function loop() {
    updateDashboard();
    requestAnimationFrame(loop);
}
loop();

window.addEventListener('resize', () => location.reload());
</script>
</body>
</html>
