<!doctype html>
<html lang="en" data-route-status="compatibility-redirect">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Frontier · Redirecting · Diamond Gate Bridge</title>
  <meta name="description" content="Compatibility route for Frontier. Redirects /frontier/ to the canonical /explore/frontier/ page." />
  <meta http-equiv="refresh" content="0; url=/explore/frontier/" />
  <link rel="canonical" href="https://diamondgatebridge.com/explore/frontier/" />

  <style>
    :root {
      --panel: rgba(7, 14, 28, .92);
      --panel2: rgba(10, 20, 42, .96);
      --line: rgba(170, 198, 255, .18);
      --text: #eef4ff;
      --muted: #aab8d8;
      --gold: #efd29a;
      --shadow: 0 24px 80px rgba(0,0,0,.50);
    }

    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      min-height: 100%;
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 50% 4%, rgba(239,210,154,.18), transparent 22%),
        radial-gradient(circle at 18% 28%, rgba(142,197,255,.12), transparent 30%),
        linear-gradient(180deg, #020610 0%, #071225 55%, #020610 100%);
    }

    main {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(720px, calc(100vw - 24px));
      border: 1px solid var(--line);
      border-radius: 30px;
      padding: clamp(22px, 5vw, 42px);
      background:
        radial-gradient(circle at 50% 0%, rgba(239,210,154,.10), transparent 42%),
        linear-gradient(180deg, var(--panel2), var(--panel));
      box-shadow: var(--shadow);
      text-align: center;
      display: grid;
      gap: 14px;
    }

    .mark {
      width: 58px;
      height: 58px;
      margin: 0 auto 6px;
      display: grid;
      place-items: center;
      border-radius: 18px;
      border: 1px solid rgba(239,210,154,.34);
      background:
        radial-gradient(circle at 50% 28%, rgba(239,210,154,.34), transparent 44%),
        linear-gradient(180deg, rgba(42,34,20,.92), rgba(10,18,32,.98));
      font-weight: 950;
      letter-spacing: .08em;
    }

    .kicker {
      color: #c8d7ff;
      font-size: .72rem;
      text-transform: uppercase;
      letter-spacing: .16em;
      font-weight: 850;
    }

    h1 {
      margin: 0;
      color: #fff;
      font-size: clamp(2.2rem, 7vw, 4.4rem);
      line-height: .9;
      letter-spacing: -.06em;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
    }

    a {
      display: inline-flex;
      justify-content: center;
      justify-self: center;
      margin-top: 8px;
      min-width: 190px;
      padding: 12px 16px;
      border-radius: 999px;
      border: 1px solid rgba(239,210,154,.38);
      color: #fff8ea;
      text-decoration: none;
      font-weight: 900;
      background:
        radial-gradient(circle at 50% 120%, rgba(239,210,154,.22), transparent 62%),
        rgba(239,210,154,.08);
    }

    code {
      color: #dfe8ff;
      word-break: break-word;
    }
  </style>
</head>

<body>
  <main>
    <section class="card" aria-labelledby="title">
      <div class="mark" aria-hidden="true">FR</div>
      <div class="kicker">Compatibility Route</div>
      <h1 id="title">Frontier moved.</h1>
      <p>The canonical Frontier page now lives at <code>/explore/frontier/</code>.</p>
      <p>This compatibility route redirects the old <code>/frontier/</code> path to the active canonical page.</p>
      <a href="/explore/frontier/">Open Frontier</a>
    </section>
  </main>

  <script>
    (function () {
      "use strict";
      var target = "/explore/frontier/" + window.location.search + window.location.hash;
      window.location.replace(target);
    })();
  </script>
</body>
</html>
