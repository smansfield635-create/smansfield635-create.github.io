<!doctype html>
<!-- TNT — /index.html
     COMPASS · 16-POINT RING + CENTER INDEX (CORE) — GEOMETRY LOCK v5
     CORE = EXACTLY 2× LEVEL-1 SIZE
     OUTER TIERS UNCHANGED
     NO DRIFT
-->

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Compass</title>

<link rel="stylesheet" href="/assets/ui.css"/>
<link rel="stylesheet" href="/assets/branch.css"/>
<script defer src="/assets/instruments.js"></script>

<style>
a{color:inherit;text-decoration:none}
body{margin:0}
body::before,body::after{pointer-events:none!important}

/* =========================================================
   FINAL GEOMETRY LOCK
   ---------------------------------------------------------
   Tier 1 = Base reference
   CORE   = 2 × Tier 1
   All other tiers unchanged
========================================================= */

:root{
  --D1:120px;      /* Tier 1 (N/E/S/W) */
  --D0:240px;      /* CORE = EXACTLY 2× Tier 1 */

  --D2:150px;      /* Diagonals */
  --D3:188px;      /* Outer ring */

  --R1:150px;
  --R2:245px;
  --R3:360px;

  --padTop:120px;

  --onyx0:rgba(6,8,10,.96);
  --onyx1:rgba(10,12,16,.88);
  --festival:rgba(255,43,43,.26);
  --opalV:rgba(90,40,120,.18);
  --crimson:rgba(120,0,22,.44);
  --gold:rgba(201,162,74,.55);
  --goldGlow:rgba(201,162,74,.28);
  --shadowDeep:0 40px 120px rgba(0,0,0,.85);
}

.stage{
  position:relative;
  width:min(1200px,94vw);
  height:min(1200px,85vh);
  margin:var(--padTop) auto 0;
  pointer-events:none;
}

.node{
  position:absolute;
  left:50%;top:50%;
  transform:translate(-50%,-50%) rotate(45deg);
  border-radius:24px;
  cursor:pointer;
  pointer-events:auto;
  overflow:hidden;
  transition:.15s ease;
}

.core{ width:var(--D0); height:var(--D0); z-index:6;}
.l1{ width:var(--D1); height:var(--D1);}
.l2{ width:var(--D2); height:var(--D2);}
.l3{ width:var(--D3); height:var(--D3);}

.surface{
  background:
    radial-gradient(circle at 25% 25%, rgba(255,255,255,.25), transparent 45%),
    radial-gradient(circle at 75% 30%, var(--festival), transparent 60%),
    radial-gradient(circle at 60% 80%, var(--opalV), transparent 60%),
    radial-gradient(circle at 30% 75%, var(--crimson), transparent 70%),
    linear-gradient(160deg,var(--onyx1),var(--onyx0));
  border:1px solid rgba(255,255,255,.18);
  box-shadow:
    var(--shadowDeep),
    inset 0 2px 0 rgba(255,255,255,.22),
    inset 0 -60px 90px rgba(0,0,0,.9);
}

.surface::after{
  content:"";
  position:absolute;
  left:15%;right:15%;top:10%;
  height:28%;
  border-radius:999px;
  background:linear-gradient(to bottom,rgba(255,255,255,.25),transparent);
  transform:rotate(-10deg);
}

.node:hover{
  box-shadow:
    var(--shadowDeep),
    0 0 0 2px var(--goldGlow),
    0 0 40px var(--goldGlow),
    inset 0 2px 0 rgba(255,255,255,.22),
    inset 0 -60px 90px rgba(0,0,0,.9);
  border-color:var(--gold);
}

.inner{
  width:100%;height:100%;
  transform:rotate(-45deg);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:12px;
}

.word{
  font-weight:900;
  font-size:clamp(12px,1.2vw,18px);
  line-height:1.1;
}

.code{
  font-size:10px;
  opacity:.7;
  margin-top:4px;
}

</style>
</head>

<body>

<div class="stage" id="stage"></div>

<script>
(function(){

const ROUTES = [
  {tier:1,code:"N",label:"LAWS",href:"/laws/"},
  {tier:1,code:"E",label:"PRODUCTS",href:"/products/"},
  {tier:1,code:"S",label:"ENERGY",href:"/explore/frontier/energy/"},
  {tier:1,code:"W",label:"GAUGES",href:"/gauges/"},

  {tier:2,code:"NE",label:"EXPLORE",href:"/explore/"},
  {tier:2,code:"SE",label:"FINANCE",href:"/finance/"},
  {tier:2,code:"SW",label:"AGRICULTURE",href:"/products/agriculture/"},
  {tier:2,code:"NW",label:"LATTICE",href:"/explore/frontier/lattice/"},

  {tier:3,code:"NNE",label:"PRELUDE",href:"/prelude/"},
  {tier:3,code:"ENE",label:"FRONTIER",href:"/explore/frontier/"},
  {tier:3,code:"ESE",label:"SIGNALS",href:"/gauges/"},
  {tier:3,code:"SSE",label:"CAPITAL",href:"/finance/"},
  {tier:3,code:"SSW",label:"INFRA",href:"/explore/infrastructure/"},
  {tier:3,code:"WSW",label:"GOVERNANCE",href:"/governance/"},
  {tier:3,code:"WNW",label:"VISION",href:"/explore/frontier/vision/"},
  {tier:3,code:"NNW",label:"SHIMMER",href:"/explore/frontier/shimmer/"}
];

const stage=document.getElementById("stage");

function mkNode(item,className){
  const d=document.createElement("div");
  d.className="node surface "+className;
  d.tabIndex=0;
  const inner=document.createElement("div");
  inner.className="inner";
  inner.innerHTML=`<div class="word">${item.label}</div><div class="code">${item.code}</div>`;
  d.appendChild(inner);
  d.onclick=()=>location.href=item.href;
  return d;
}

function layout(){
  stage.innerHTML="";
  const rect=stage.getBoundingClientRect();
  const cx=rect.width/2;
  const cy=rect.height/2;

  const R1=parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--R1"));
  const R2=parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--R2"));
  const R3=parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--R3"));

  const core=mkNode({label:"INDEX",code:"CORE",href:"/index-core/"},"core");
  core.style.left=cx+"px";
  core.style.top=cy+"px";
  stage.appendChild(core);

  function place(list,radius,className,startAngle= -Math.PI/2){
    list.forEach((item,i)=>{
      const angle=startAngle+(i/list.length)*Math.PI*2;
      const x=cx+radius*Math.cos(angle);
      const y=cy+radius*Math.sin(angle);
      const n=mkNode(item,className);
      n.style.left=x+"px";
      n.style.top=y+"px";
      stage.appendChild(n);
    });
  }

  place(ROUTES.filter(r=>r.tier===1),R1,"l1");
  place(ROUTES.filter(r=>r.tier===2),R2,"l2",-Math.PI/4);
  place(ROUTES.filter(r=>r.tier===3),R3,"l3",-Math.PI/8);
}

requestAnimationFrame(layout);
window.addEventListener("resize",layout);

})();
</script>

</body>
</html>
