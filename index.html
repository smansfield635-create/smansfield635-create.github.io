<!doctype html>
<!-- TNT — /index.html
     COMPASS · GEM DIAL (OBSIDIAN) · DUAL-LENS (8 NODES) · ROTATION ANIMATION (B)
     OWNER: SEAN (Website Building Room)

     PURPOSE (THIS BUILD):
       - Reduce on-screen clutter: show 8 nodes per lens (PLATFORM vs ENGINEERING)
       - Lens switch uses a 180° compass rotation animation (no reload)
       - English-only UI until visuals are locked (per Sean)
       - Keep existing compass/dial aesthetic + buttons + routing discipline

     LOCKS:
       - ui.css owns html/body background (NO overrides)
       - Use /assets/ui.css + /assets/branch.css + /assets/instruments.js only
       - lane=platform|engineering is URL-only (NEVER stored)
       - Canon state carry via URL + LS: gd_lang/gd_style/gd_time/gd_depth ONLY (NO new gd_* keys)
       - No modals/overlays; no inline onclick; addEventListener only
       - Center CORE routes to /index-core/index.html
       - Bottom corner controls: EXIT → /door/ | HUB → /home/
       - No duplicate destinations: duplicates/unbuilt → /404.html

     NOTE:
       - This TNT intentionally DOES NOT touch moon/dragons/water/ripples.
       - This is the isolated “dual-lens visibility” upgrade so you can SEE it.
-->

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Compass · DiamondGateBridge</title>

<link rel="stylesheet" href="/assets/ui.css"/>
<link rel="stylesheet" href="/assets/branch.css"/>
<script defer src="/assets/instruments.js"></script>

<style>
a{color:inherit;text-decoration:none}
body{margin:0}
body::before,body::after{pointer-events:none!important}

/* ===== GEOMETRY ===== */
:root{
  --D0:210px;  /* CORE */
  --D1:150px;  /* Cardinals (largest ring nodes) */
  --D2:112px;  /* Diagonals */
  --D3:86px;   /* Outer 8 */

  --R1:168px;
  --R2:246px;
  --R3:314px;

  --padTop:102px;

  --ink:rgba(255,255,255,.94);
  --mut:rgba(255,255,255,.78);

  --onyx0:rgba(6,8,10,.96);
  --onyx1:rgba(10,12,16,.88);

  --crimson:rgba(120,0,22,.44);
  --festival:rgba(255,43,43,.26);
  --opalV:rgba(90,40,120,.18);

  --gold:rgba(201,162,74,.58);
  --goldGlow:rgba(201,162,74,.22);

  --shadowDeep:0 44px 140px rgba(0,0,0,.82);
  --shadowA:0 28px 110px rgba(0,0,0,.70);
  --shadowB:0 18px 60px rgba(0,0,0,.55);
}

/* ===== TOP BAR ===== */
.top{
  position:fixed;top:14px;left:0;right:0;
  padding:0 14px;
  z-index:260;
  pointer-events:none;
}
.topbar{
  pointer-events:auto;
  width:min(1120px,96vw);
  margin:0 auto;
  border:1px solid rgba(255,255,255,.12);
  border-radius:22px;
  padding:10px 12px;
  background:
    radial-gradient(circle at 18% 18%, rgba(201,162,74,.10), transparent 62%),
    radial-gradient(circle at 82% 30%, rgba(255,43,43,.10), transparent 64%),
    linear-gradient(145deg, rgba(8,10,14,.92), rgba(4,6,10,.96));
  box-shadow:var(--shadowA), inset 0 0 0 1px rgba(201,162,74,.12);
  backdrop-filter:blur(10px);
  display:flex;align-items:center;justify-content:space-between;
  gap:10px;
}
.brandLeft{
  display:flex;align-items:center;gap:12px;flex-wrap:wrap;min-width:0;
}
.brandTitle{
  font-weight:980;
  letter-spacing:.6px;
  font-size:14px;
  color:rgba(255,255,255,.94);
  white-space:nowrap;
}
.brandSub{
  font-size:12px;
  color:rgba(255,255,255,.72);
  letter-spacing:.2px;
  white-space:nowrap;
}
.brandLinks{
  display:flex;gap:10px;flex-wrap:wrap;
  font-size:12px;
  color:rgba(255,255,255,.70);
}
.brandLinks a{
  padding:6px 10px;
  border-radius:999px;
  border:1px solid rgba(201,162,74,.16);
  background:rgba(0,0,0,.14);
}
.controlsRight{
  display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:flex-end;
}

/* Segmented controls */
.seg{
  display:inline-flex;gap:0;overflow:hidden;border-radius:16px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(0,0,0,.18);
  box-shadow:var(--shadowB);
}
.seg button{
  appearance:none;border:0;background:transparent;
  color:rgba(255,255,255,.78);
  padding:10px 12px;min-height:42px;
  font-weight:980;font-size:13px;letter-spacing:.25px;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
.seg button[aria-pressed="true"]{
  color:rgba(255,255,255,.95);
  background:
    radial-gradient(circle at 50% 50%, rgba(201,162,74,.14), transparent 62%),
    linear-gradient(180deg, rgba(255,43,43,.10), rgba(0,0,0,.10));
  box-shadow: inset 0 0 0 1px rgba(201,162,74,.14), inset 0 -10px 22px rgba(201,162,74,.10);
}

/* ===== STAGE ===== */
.stage{
  position:relative;
  width:min(1200px,94vw);
  height:min(1200px,86vh);
  margin:var(--padTop) auto 0;
  pointer-events:none;
}

/* Compass slab */
.slab{
  position:absolute;left:50%;top:50%;
  transform:translate(-50%,-50%);
  width:min(980px,92vw);
  height:min(980px,92vw);
  border-radius:44px;
  pointer-events:none;
  z-index:1;
  border:1px solid rgba(255,255,255,.10);
  background:
    radial-gradient(circle at 30% 22%, rgba(255,255,255,.08), transparent 55%),
    radial-gradient(circle at 78% 28%, rgba(255,43,43,.08), transparent 60%),
    radial-gradient(circle at 70% 82%, rgba(90,40,120,.08), transparent 64%),
    linear-gradient(160deg, rgba(10,12,16,.90), rgba(6,8,10,.96));
  box-shadow:
    0 70px 240px rgba(0,0,0,.62),
    inset 0 2px 0 rgba(255,255,255,.08),
    inset 0 -70px 140px rgba(0,0,0,.65);
}

/* Obsidian dial */
.dial{
  position:absolute;
  left:50%;top:50%;
  transform:translate(-50%,-50%);
  width:min(900px,90vw);
  height:min(900px,90vw);
  border-radius:999px;
  pointer-events:none;
  z-index:2;
  overflow:hidden;
}
.dial::before{
  content:"";
  position:absolute;inset:0;border-radius:999px;
  background:
    radial-gradient(circle at 50% 42%,
      rgba(255,255,255,.05),
      rgba(0,0,0,.22) 56%,
      rgba(0,0,0,.58) 78%,
      rgba(0,0,0,.00) 92%),
    radial-gradient(circle at 50% 50%, rgba(201,162,74,.10), transparent 62%),
    radial-gradient(circle at 50% 50%, rgba(255,43,43,.08), transparent 66%),
    linear-gradient(180deg, rgba(0,0,0,.12), rgba(0,0,0,.00));
  box-shadow:
    inset 0 0 0 2px rgba(255,255,255,.06),
    inset 0 0 0 10px rgba(0,0,0,.12),
    inset 0 0 80px rgba(0,0,0,.55),
    0 50px 180px rgba(0,0,0,.30);
  opacity:.96;
}
.dial::after{
  content:"";
  position:absolute;inset:-14%;
  background:
    radial-gradient(circle at 50% 50%, transparent 0 36%, rgba(255,255,255,.06) 36% 36.6%, transparent 37% 100%),
    radial-gradient(circle at 50% 50%, transparent 0 52%, rgba(255,255,255,.06) 52% 52.6%, transparent 53% 100%),
    radial-gradient(circle at 50% 50%, transparent 0 68%, rgba(255,255,255,.06) 68% 68.6%, transparent 69% 100%),

    linear-gradient(90deg, transparent 0 49.7%, rgba(201,162,74,.10) 49.7% 50.3%, transparent 50.3% 100%),
    linear-gradient(0deg,  transparent 0 49.7%, rgba(201,162,74,.10) 49.7% 50.3%, transparent 50.3% 100%),

    /* 45° aligned inlay (no orthogonal grid) */
    repeating-conic-gradient(from 45deg at 50% 50%,
      rgba(201,162,74,.06) 0 1.2deg,
      transparent 1.2deg 7.5deg),

    radial-gradient(circle at 50% 50%, rgba(255,255,255,.04), transparent 62%);
  filter: blur(.25px);
  opacity:.78;
  mask: radial-gradient(circle at 50% 50%, transparent 0 18%, #000 20% 100%);
  -webkit-mask: radial-gradient(circle at 50% 50%, transparent 0 18%, #000 20% 100%);
}

/* Cardinal letters */
.faceLetters{
  position:absolute;left:50%;top:50%;
  transform:translate(-50%,-50%);
  width:min(900px,90vw);
  height:min(900px,90vw);
  pointer-events:none;
  z-index:3;
  opacity:.72;
}
.faceLetters span{
  position:absolute;
  color:rgba(201,162,74,.45);
  font-weight:980;
  letter-spacing:2px;
  font-size:12px;
  text-shadow:0 0 12px rgba(0,0,0,.55);
}
.faceLetters .N{left:50%;top:12px;transform:translateX(-50%)}
.faceLetters .E{right:12px;top:50%;transform:translateY(-50%)}
.faceLetters .S{left:50%;bottom:12px;transform:translateX(-50%)}
.faceLetters .W{left:12px;top:50%;transform:translateY(-50%)}

/* ===== NODE LAYER (animated rotate) ===== */
.nodeLayer{
  position:absolute;
  inset:0;
  z-index:10;
  pointer-events:none;
  transform-origin:50% 50%;
  will-change:transform, opacity;
}

/* ===== GEM NODES ===== */
.node{
  position:absolute;
  left:50%;top:50%;
  transform:translate(-50%,-50%) rotate(45deg);
  cursor:pointer;
  pointer-events:auto;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.18);
  transition:box-shadow .16s ease, border-color .16s ease, filter .16s ease;
  border-radius:22px;
}
.core{width:var(--D0);height:var(--D0);z-index:12;border-radius:26px}
.l1{width:var(--D1);height:var(--D1)}
.l2{width:var(--D2);height:var(--D2)}
.l3{width:var(--D3);height:var(--D3);border-radius:18px}

.surface{
  background:
    radial-gradient(circle at 20% 18%, rgba(255,255,255,.28), transparent 46%),
    radial-gradient(circle at 78% 22%, var(--festival), transparent 62%),
    radial-gradient(circle at 74% 84%, var(--opalV), transparent 64%),
    radial-gradient(circle at 28% 84%, var(--crimson), transparent 70%),
    linear-gradient(160deg, var(--onyx1), var(--onyx0));
  box-shadow:
    var(--shadowDeep),
    0 0 24px rgba(255,43,43,.08),
    inset 0 2px 0 rgba(255,255,255,.18),
    inset 0 -52px 92px rgba(0,0,0,.88);
}
.surface::before{
  content:"";
  position:absolute;inset:0;border-radius:inherit;pointer-events:none;
  box-shadow: inset 0 0 0 1px rgba(201,162,74,.18);
  background:
    /* diamond-aligned silk (kept, not orthogonal grid) */
    repeating-linear-gradient(45deg, rgba(201,162,74,.09) 0 1px, transparent 1px 18px),
    repeating-linear-gradient(-45deg, rgba(201,162,74,.07) 0 1px, transparent 1px 18px);
  opacity:.30;
  mask:
    radial-gradient(circle at 50% 50%, transparent 0 72%, #000 78% 100%),
    linear-gradient(#000,#000);
  -webkit-mask:
    radial-gradient(circle at 50% 50%, transparent 0 72%, #000 78% 100%),
    linear-gradient(#000,#000);
}
.surface::after{
  content:"";
  position:absolute;left:12%;right:12%;top:10%;
  height:30%;
  border-radius:999px;
  background:linear-gradient(to bottom, rgba(255,255,255,.20), rgba(255,255,255,0));
  transform:rotate(-12deg);
  pointer-events:none;
  opacity:.92;
}
.node:hover{
  border-color:rgba(201,162,74,.44);
  box-shadow:
    var(--shadowDeep),
    0 0 0 2px rgba(201,162,74,.14),
    0 0 34px rgba(201,162,74,.18),
    inset 0 2px 0 rgba(255,255,255,.20),
    inset 0 -52px 92px rgba(0,0,0,.88);
}
.node:active{filter:brightness(.98)}

.inner{
  width:100%;height:100%;
  transform:rotate(-45deg);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:10px;
  gap:6px;
  color:#fff;
}
.word{
  font-weight:980;
  letter-spacing:.6px;
  line-height:1.05;
  text-shadow:0 0 18px rgba(0,0,0,.42);
  font-size:clamp(10px, 1.15vw, 16px);
  max-width:100%;
}
.code{
  font-weight:950;
  font-size:10px;
  letter-spacing:1.2px;
  opacity:.78;
}

/* CORE emphasis */
.core{
  border-color:rgba(201,162,74,.26);
  box-shadow:
    0 54px 170px rgba(0,0,0,.88),
    0 0 46px rgba(201,162,74,.12),
    inset 0 2px 0 rgba(255,255,255,.22),
    inset 0 -64px 110px rgba(0,0,0,.92);
}

/* ===== CORNERS ===== */
.corner{
  position:fixed;
  bottom:max(16px, env(safe-area-inset-bottom));
  z-index:260;
  pointer-events:none;
}
.corner .dmini{pointer-events:auto}
.corner.left{left:16px}
.corner.right{right:16px}

.dmini{
  width:56px;height:56px;
  border-radius:16px;
  border:1px solid rgba(255,255,255,.14);
  background:
    radial-gradient(circle at 50% 40%, rgba(255,255,255,.08), transparent 52%),
    linear-gradient(145deg, rgba(10,12,16,.78), rgba(6,8,10,.92));
  box-shadow:var(--shadowB), 0 0 0 1px rgba(201,162,74,.10), 0 0 18px rgba(201,162,74,.10);
  display:grid;place-items:center;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
  transform:rotate(45deg);
  position:relative;
  overflow:hidden;
  transition:box-shadow .16s ease, border-color .16s ease;
}
.dmini:hover{
  border-color:rgba(201,162,74,.44);
  box-shadow:var(--shadowB), 0 0 0 2px rgba(201,162,74,.14), 0 0 30px rgba(201,162,74,.18);
}
.dmini span{
  transform:rotate(-45deg);
  font-weight:980;
  font-size:12px;
  letter-spacing:.6px;
  color:rgba(255,255,255,.92);
  user-select:none;
}
.cornerLabel{
  margin-top:10px;
  text-align:center;
  color:rgba(255,255,255,.72);
  font-size:11px;
  letter-spacing:.4px;
}

/* ===== BOTTOM NOTE ===== */
.pillWrap{
  width:min(1120px,94vw);
  margin:14px auto 0;
  padding-bottom:90px;
}
.pill{
  border:1px solid rgba(255,255,255,.12);
  border-radius:22px;
  padding:14px 16px;
  background:
    radial-gradient(circle at 18% 22%, rgba(255,43,43,.10), transparent 62%),
    radial-gradient(circle at 82% 32%, rgba(90,40,120,.10), transparent 66%),
    radial-gradient(circle at 50% 92%, rgba(201,162,74,.10), transparent 62%),
    rgba(0,0,0,.16);
  box-shadow:0 26px 90px rgba(0,0,0,.55);
  color:rgba(255,255,255,.86);
  line-height:1.55;
  font-size:13.5px;
}
.pill b{color:rgba(255,255,255,.95)}
.pill .g{color:rgba(201,162,74,.80);font-weight:980}

/* Responsive */
@media (max-width:720px){
  :root{
    --D0:196px; --D1:142px; --D2:108px; --D3:84px;
    --R1:156px; --R2:228px; --R3:292px;
    --padTop:112px;
  }
  .stage{height:min(980px,86vh)}
}
@media (max-width:520px){
  :root{
    --D0:184px; --D1:136px; --D2:104px; --D3:80px;
    --R1:146px; --R2:214px; --R3:274px;
  }
  .brandSub{display:none}
}
</style>
</head>

<body>

<div class="top" aria-label="Top controls">
  <div class="topbar">
    <div class="brandLeft" aria-label="Brand">
      <div class="brandTitle" id="brandTitle">WELCOME TO THE COMPASS</div>
      <div class="brandSub" id="brandSub">Visual tutorial · pick one hub → get one clear next step · Lens: PLATFORM</div>
      <div class="brandLinks" aria-label="Brand links">
        <a href="https://diamondgatebridge.com" target="_blank" rel="noopener">diamondgatebridge.com</a>
        <a href="https://cogrid.net" target="_blank" rel="noopener">cogrid.net</a>
      </div>
    </div>

    <div class="controlsRight" aria-label="Lens">
      <div class="seg" role="group" aria-label="Lane">
        <button type="button" id="lanePlatform" aria-pressed="true">PLATFORM</button>
        <button type="button" id="laneEngineering" aria-pressed="false">ENGINEERING</button>
      </div>
    </div>
  </div>
</div>

<div class="stage" id="stage" aria-label="Compass dial">
  <div class="slab" aria-hidden="true"></div>
  <div class="dial" aria-hidden="true"></div>
  <div class="faceLetters" aria-hidden="true">
    <span class="N">N</span><span class="E">E</span><span class="S">S</span><span class="W">W</span>
  </div>

  <div class="nodeLayer" id="nodeLayer" aria-hidden="false"></div>
</div>

<div class="pillWrap" aria-label="Compass note">
  <div class="pill" id="pill">
    <b>Compass:</b> One center (<span class="g">CORE</span>) + <span class="g">8</span> hubs per lens. Switch lens to see the other half. Duplicates/unbuilt route to <span class="g">/404.html</span>.
  </div>
</div>

<div class="corner left" aria-label="Exit">
  <div class="dmini" id="btnExit" role="button" tabindex="0" aria-label="Exit"><span>EXIT</span></div>
  <div class="cornerLabel" id="lblExit">EXIT</div>
</div>
<div class="corner right" aria-label="Hub">
  <div class="dmini" id="btnHub" role="button" tabindex="0" aria-label="Hub"><span>HUB</span></div>
  <div class="cornerLabel" id="lblHub">HUB</div>
</div>

<script>
(function(){
  "use strict";

  // ===== Canon state (gd_* only; lane URL-only) =====
  var qs=new URLSearchParams(location.search);
  var LS=window.localStorage;

  var lang  = qs.get("lang")  || LS.getItem("gd_lang")  || "en";
  var style = qs.get("style") || LS.getItem("gd_style") || "informal";
  var time  = qs.get("time")  || LS.getItem("gd_time")  || "now";
  var depth = qs.get("depth") || LS.getItem("gd_depth") || "explore";
  var lane  = qs.get("lane")  || "platform"; // URL-only

  if(lang!=="en" && lang!=="zh" && lang!=="es") lang="en";
  if(style!=="informal" && style!=="formal") style="informal";
  if(time==="trajectory") time="post";
  if(time!=="origin" && time!=="now" && time!=="post") time="now";
  if(depth!=="explore" && depth!=="learn") depth="explore";
  if(lane!=="platform" && lane!=="engineering") lane="platform";

  try{
    LS.setItem("gd_lang",lang);
    LS.setItem("gd_style",style);
    LS.setItem("gd_time",time);
    LS.setItem("gd_depth",depth);
  }catch(e){}

  document.documentElement.lang="en"; // EN-only UI in this build

  function q(over){
    var p=new URLSearchParams();
    p.set("lang",(over&&over.lang)?over.lang:lang);
    p.set("style",(over&&over.style)?over.style:style);
    p.set("time",(over&&over.time)?over.time:time);
    p.set("depth",(over&&over.depth)?over.depth:depth);
    var L=(over&&over.lane)?over.lane:lane;
    if(L==="platform"||L==="engineering") p.set("lane",L);
    return "?"+p.toString();
  }

  function go(path){ window.location.href = path + q(); }

  // ===== ROUTING (NO DUPLICATES; unknown/unbuilt → 404) =====
  var CORE_ROUTE = "/index-core/index.html";
  var EXIT_ROUTE = "/door/";
  var HUB_ROUTE  = "/home/";
  var PLACEHOLDER_404 = "/404.html";

  // Full 16 unique destinations must remain unique across both lenses.
  // Each lens only shows 8 at a time.
  var ROUTES_RAW = [
    // Cardinals (always visible in both lenses, but assigned to lens halves below)
    {code:"N",  label:"LAWS",        href:"/laws/"},
    {code:"E",  label:"ENERGY",      href:"/explore/frontier/energy/"},
    {code:"S",  label:"FINANCE",     href:"/finance/"},
    {code:"W",  label:"GOVERNANCE",  href:"/governance/"},

    // Diagonals
    {code:"NE", label:"PRODUCTS",    href:"/products/"},
    {code:"SE", label:"RESEARCH",    href:"/research/"},
    {code:"SW", label:"EXPLORE",     href:"/explore/"},
    {code:"NW", label:"DOCTRINE",    href:"/products/capital-doctrine/"},

    // Outer 8
    {code:"NNE",label:"EDUCATION",   href:"/products/education/"},
    {code:"ENE",label:"FRONTIER",    href:"/explore/frontier/"},
    {code:"ESE",label:"INFRA",       href:"/explore/infrastructure/"},
    {code:"SSE",label:"AGRICULTURE", href:"/products/agriculture/"},
    {code:"SSW",label:"GAUGES",      href:"/gauges/"},
    {code:"WSW",label:"VISION",      href:"/explore/frontier/vision/"},
    {code:"WNW",label:"LATTICE",     href:"/explore/frontier/lattice/"},
    {code:"NNW",label:"SHIMMER",     href:"/explore/frontier/shimmer/"}
  ];

  function normalizeRoutes(list){
    var seen = Object.create(null);
    var out = [];
    for(var i=0;i<list.length;i++){
      var it=list[i];
      var h=(it.href||"").trim();
      if(!h) h=PLACEHOLDER_404;
      if(seen[h]) h=PLACEHOLDER_404;
      seen[h]=true;
      out.push({code:it.code,label:it.label,href:h});
    }
    return out;
  }
  var ROUTES = normalizeRoutes(ROUTES_RAW);

  // Lens halves (8 each) — chosen to reduce cognitive load and keep “top meaning” coherent.
  // PLATFORM = meaning + boundaries + exploration posture
  // ENGINEERING = build + execute + apply posture
  var PLATFORM_SET = ["N","W","SW","NW","NNW","WNW","WSW","SSW"]; // LAWS, GOVERNANCE, EXPLORE, DOCTRINE, SHIMMER, LATTICE, VISION, GAUGES
  var ENGINEERING_SET = ["E","S","NE","SE","NNE","ENE","ESE","SSE"]; // ENERGY, FINANCE, PRODUCTS, RESEARCH, EDUCATION, FRONTIER, INFRA, AGRICULTURE

  function byCode(code){
    for(var i=0;i<ROUTES.length;i++) if(ROUTES[i].code===code) return ROUTES[i];
    return {code:code,label:code,href:PLACEHOLDER_404};
  }

  // ===== TIERING =====
  function tierFor(code){
    // Tier 1 cardinals
    if(code==="N"||code==="E"||code==="S"||code==="W") return {cls:"l1", r:"--R1", angleHint:"cardinal"};
    // Tier 2 diagonals
    if(code==="NE"||code==="SE"||code==="SW"||code==="NW") return {cls:"l2", r:"--R2", angleHint:"diag"};
    // Tier 3 outer 8
    return {cls:"l3", r:"--R3", angleHint:"outer"};
  }

  // We keep perfect 16-angle positions even when hidden, so lens swap feels like “rotation of what’s present”
  var ORDER_16 = ["N","NNE","NE","ENE","E","ESE","SE","SSE","S","SSW","SW","WSW","W","WNW","NW","NNW"];

  // ===== UI REFS =====
  var nodeLayer=document.getElementById("nodeLayer");
  var btnLP=document.getElementById("lanePlatform");
  var btnLE=document.getElementById("laneEngineering");

  function setPressed(btn, on){ btn.setAttribute("aria-pressed", on ? "true" : "false"); }
  function paintHeader(){
    document.getElementById("brandSub").textContent =
      "Visual tutorial · pick one hub → get one clear next step · Lens: " + (lane==="engineering" ? "ENGINEERING" : "PLATFORM");
  }

  // ===== BUILD NODE =====
  function mkNode(item, cls){
    var d=document.createElement("div");
    d.className="node surface "+cls;
    d.setAttribute("role","button");
    d.tabIndex=0;

    var inner=document.createElement("div");
    inner.className="inner";

    var w=document.createElement("div");
    w.className="word";
    w.textContent=item.label;

    var c=document.createElement("div");
    c.className="code";
    c.textContent=item.code;

    inner.appendChild(w);
    inner.appendChild(c);
    d.appendChild(inner);

    function act(){ go(item.href); }
    d.addEventListener("click", act, {passive:true});
    d.addEventListener("keydown", function(e){
      if(e.key==="Enter"||e.key===" "){ e.preventDefault(); act(); }
    });

    return d;
  }

  // ===== LAYOUT (8 visible, 16-position geometry) =====
  function renderNodes(activeSet){
    nodeLayer.innerHTML="";

    var rect=nodeLayer.getBoundingClientRect();
    var cx=rect.width/2, cy=rect.height/2;

    var cs=getComputedStyle(document.documentElement);
    var R1=parseFloat(cs.getPropertyValue("--R1"))||168;
    var R2=parseFloat(cs.getPropertyValue("--R2"))||246;
    var R3=parseFloat(cs.getPropertyValue("--R3"))||314;

    // CORE
    var core=mkNode({label:"START CORE",code:"CORE",href:CORE_ROUTE},"core");
    core.style.left=cx+"px"; core.style.top=cy+"px";
    nodeLayer.appendChild(core);

    // activeSet nodes only
    for(var i=0;i<ORDER_16.length;i++){
      var code=ORDER_16[i];
      if(activeSet.indexOf(code)===-1) continue;

      var it=byCode(code);
      var t=tierFor(code);

      var ang=(i/ORDER_16.length)*Math.PI*2 - Math.PI/2; // N at top
      var r=(t.r==="--R1")?R1:(t.r==="--R2")?R2:R3;

      var x=cx + r*Math.cos(ang);
      var y=cy + r*Math.sin(ang);

      var n=mkNode(it, t.cls);
      n.style.left=x+"px"; n.style.top=y+"px";
      nodeLayer.appendChild(n);
    }
  }

  // ===== ROTATION ANIMATION (B) =====
  var animBusy=false;

  function animateSwap(nextLane){
    if(animBusy) return;
    animBusy=true;

    var startRot=0;
    var endRot=180;

    // If already rotated by previous state, keep it consistent by using dataset
    var cur = parseFloat(nodeLayer.dataset.rot || "0");
    startRot = cur;
    endRot = cur + 180;

    // Phase 1: rotate out + fade a bit
    nodeLayer.style.transition="transform 520ms ease, opacity 520ms ease";
    nodeLayer.style.opacity="0.82";
    nodeLayer.style.transform="rotate("+endRot+"deg)";

    // Midpoint swap (after 260ms)
    window.setTimeout(function(){
      lane=nextLane;
      history.replaceState({}, "", location.pathname + q({lane:lane}));

      setPressed(btnLP, lane==="platform");
      setPressed(btnLE, lane==="engineering");
      paintHeader();

      // Swap the visible set
      var set = (lane==="engineering") ? ENGINEERING_SET : PLATFORM_SET;
      renderNodes(set);

      // Keep rotation continuity so it feels like the compass rotated and “revealed” a new face
      // We render nodes at 0, then immediately apply the same rotation so the visual doesn't jump
      nodeLayer.style.transition="none";
      nodeLayer.dataset.rot = String(endRot);
      nodeLayer.style.transform="rotate("+endRot+"deg)";
      nodeLayer.style.opacity="0.82";

      // Phase 2: settle + brighten slightly
      window.requestAnimationFrame(function(){
        nodeLayer.style.transition="transform 520ms ease, opacity 520ms ease";
        nodeLayer.style.opacity="1";
        nodeLayer.style.transform="rotate("+(endRot)+"deg)";
      });

      window.setTimeout(function(){
        animBusy=false;
      }, 560);

    }, 260);
  }

  // ===== SAFE LAYOUT =====
  function safeLayout(){
    var r=nodeLayer.getBoundingClientRect();
    if(r.width<10||r.height<10){ requestAnimationFrame(safeLayout); return; }
    var set = (lane==="engineering") ? ENGINEERING_SET : PLATFORM_SET;
    renderNodes(set);
  }

  // ===== LANE EVENTS =====
  setPressed(btnLP, lane==="platform");
  setPressed(btnLE, lane==="engineering");
  paintHeader();

  btnLP.addEventListener("click", function(){
    if(lane==="platform") return;
    animateSwap("platform");
  }, {passive:true});

  btnLE.addEventListener("click", function(){
    if(lane==="engineering") return;
    animateSwap("engineering");
  }, {passive:true});

  // ===== CORNERS =====
  function bindCorner(id, path){
    var el=document.getElementById(id);
    if(!el) return;
    function act(){ go(path); }
    el.addEventListener("click", act, {passive:true});
    el.addEventListener("keydown", function(e){
      if(e.key==="Enter"||e.key===" "){ e.preventDefault(); act(); }
    });
  }
  bindCorner("btnExit", EXIT_ROUTE);
  bindCorner("btnHub", HUB_ROUTE);

  // ===== INIT =====
  requestAnimationFrame(safeLayout);
  window.addEventListener("resize", function(){ safeLayout(); }, {passive:true});

})();
</script>

</body>
</html>
