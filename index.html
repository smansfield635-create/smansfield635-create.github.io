<!doctype html>
<!-- TNT — /index.html
     COMPASS · GEM DIAL (OBSIDIAN) · LAYERED BACKGROUND (RED→DARK→RED→DARK) · EN-ONLY (VISUAL PASS)
     OWNER: SEAN (Website Building Room)
     PURPOSE (THIS PASS):
       - FIX: “vines / worms” → TRUE DRAGON SPINE ENGINE (segments follow a path, not each other)
       - FIX: NO random looping / bunching / size explosions
       - KEEP: One dominant CORE + progressively smaller nodes
       - KEEP: lane=platform|engineering toggle (URL-only; no reload; never stored)
       - KEEP: EXIT + HUB buttons (above bottom; no conflict)
       - EN-ONLY: remove CN/ES UI until visuals lock
       - Moon: single, outside compass; no double moon; phase steps per load
     LOCKS:
       - No overlays/modals; no inline onclick; addEventListener only
       - ui.css owns html/body background (NO overrides)
       - Canon state carry: gd_lang/gd_style/gd_time/gd_depth via URL + LS ONLY (NO new gd_* keys)
-->

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Compass · DiamondGateBridge</title>

<link rel="stylesheet" href="/assets/ui.css"/>
<link rel="stylesheet" href="/assets/branch.css"/>
<script defer src="/assets/instruments.js"></script>

<style>
a{color:inherit;text-decoration:none}
body{margin:0}
body::before,body::after{pointer-events:none!important}

/* =========================================================
   VISUAL PASS v5 — EN ONLY
   COLOR STACK: red (field) · dark (header) · red (stage) · dark (dial)
========================================================= */
:root{
  /* hierarchy */
  --D0:210px;  /* CORE */
  --D1:150px;  /* Cardinals */
  --D2:112px;  /* Diagonals */
  --D3:86px;   /* Outer 8 */

  --R1:168px;
  --R2:246px;
  --R3:314px;

  --padTop:102px;

  --ink:rgba(255,255,255,.94);
  --mut:rgba(255,255,255,.78);

  --onyx0:rgba(6,8,10,.96);
  --onyx1:rgba(10,12,16,.88);

  --crimson:rgba(120,0,22,.44);
  --festival:rgba(255,43,43,.26);
  --opalV:rgba(90,40,120,.18);

  --gold:rgba(201,162,74,.58);
  --goldGlow:rgba(201,162,74,.22);

  --shadowDeep:0 44px 140px rgba(0,0,0,.82);
  --shadowA:0 28px 110px rgba(0,0,0,.70);
  --shadowB:0 18px 60px rgba(0,0,0,.55);
}

/* ===== TOP BAR (dark) ===== */
.top{
  position:fixed;top:14px;left:0;right:0;
  padding:0 14px;
  z-index:260;
  pointer-events:none;
}
.topbar{
  pointer-events:auto;
  width:min(1120px,96vw);
  margin:0 auto;
  border:1px solid rgba(255,255,255,.12);
  border-radius:22px;
  padding:10px 12px;
  background:
    radial-gradient(circle at 18% 18%, rgba(201,162,74,.10), transparent 62%),
    radial-gradient(circle at 82% 30%, rgba(255,43,43,.10), transparent 64%),
    linear-gradient(145deg, rgba(8,10,14,.92), rgba(4,6,10,.96));
  box-shadow:var(--shadowA), inset 0 0 0 1px rgba(201,162,74,.12);
  backdrop-filter:blur(10px);
  display:flex;align-items:center;justify-content:space-between;
  gap:10px;
}
.brandLeft{display:flex;align-items:center;gap:12px;flex-wrap:wrap;min-width:0}
.brandTitle{
  font-weight:980;letter-spacing:.6px;font-size:14px;color:rgba(255,255,255,.94);
  white-space:nowrap;
}
.brandSub{
  font-size:12px;color:rgba(255,255,255,.72);letter-spacing:.2px;
  white-space:nowrap;
}
.brandLinks{
  display:flex;gap:10px;flex-wrap:wrap;
  font-size:12px;color:rgba(255,255,255,.70);
}
.brandLinks a{
  padding:6px 10px;border-radius:999px;
  border:1px solid rgba(201,162,74,.16);
  background:rgba(0,0,0,.14);
}

.controlsRight{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:flex-end}

/* lane pills */
.seg{
  display:inline-flex;gap:0;overflow:hidden;border-radius:16px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(0,0,0,.18);
  box-shadow:var(--shadowB);
}
.seg button{
  appearance:none;border:0;background:transparent;
  color:rgba(255,255,255,.78);
  padding:10px 12px;min-height:42px;
  font-weight:980;font-size:13px;letter-spacing:.25px;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
.seg button[aria-pressed="true"]{
  color:rgba(255,255,255,.95);
  background:
    radial-gradient(circle at 50% 50%, rgba(201,162,74,.14), transparent 62%),
    linear-gradient(180deg, rgba(255,43,43,.10), rgba(0,0,0,.10));
  box-shadow: inset 0 0 0 1px rgba(201,162,74,.14), inset 0 -10px 22px rgba(201,162,74,.10);
}

/* ===== STAGE (red) ===== */
.stage{
  position:relative;
  width:min(1200px,94vw);
  height:min(1200px,86vh);
  margin:var(--padTop) auto 0;
  pointer-events:none;
}

/* red “stage plate” behind compass */
.stagePlate{
  position:absolute;inset:0;
  border-radius:30px;
  pointer-events:none;
  z-index:0;
  background:
    radial-gradient(circle at 50% 22%, rgba(255,255,255,.07), transparent 58%),
    radial-gradient(circle at 22% 30%, rgba(255,120,80,.10), transparent 62%),
    radial-gradient(circle at 84% 30%, rgba(255,140,90,.08), transparent 66%),
    linear-gradient(180deg, rgba(255,255,255,.04), rgba(0,0,0,.00) 22%),
    linear-gradient(180deg, rgba(255,0,0,.08), rgba(0,0,0,.00) 44%),
    rgba(0,0,0,.04);
  box-shadow: inset 0 0 0 1px rgba(255,255,255,.06);
}

/* dark compass slab (dark) */
.slab{
  position:absolute;left:50%;top:50%;
  transform:translate(-50%,-50%);
  width:min(980px,92vw);
  height:min(980px,92vw);
  border-radius:44px;
  pointer-events:none;
  z-index:1;
  border:1px solid rgba(255,255,255,.10);
  background:
    radial-gradient(circle at 30% 22%, rgba(255,255,255,.08), transparent 55%),
    radial-gradient(circle at 78% 28%, rgba(255,43,43,.08), transparent 60%),
    radial-gradient(circle at 70% 82%, rgba(90,40,120,.08), transparent 64%),
    linear-gradient(160deg, rgba(10,12,16,.90), rgba(6,8,10,.96));
  box-shadow:
    0 70px 240px rgba(0,0,0,.62),
    inset 0 2px 0 rgba(255,255,255,.08),
    inset 0 -70px 140px rgba(0,0,0,.65);
}

/* dial face (crisp rings, no blur) */
.dial{
  position:absolute;left:50%;top:50%;
  transform:translate(-50%,-50%);
  width:min(900px,90vw);
  height:min(900px,90vw);
  border-radius:999px;
  pointer-events:none;
  z-index:2;
  overflow:hidden;
}
.dial::before{
  content:"";
  position:absolute;inset:0;border-radius:999px;
  background:
    radial-gradient(circle at 50% 42%,
      rgba(255,255,255,.05),
      rgba(0,0,0,.22) 56%,
      rgba(0,0,0,.58) 78%,
      rgba(0,0,0,.00) 92%),
    radial-gradient(circle at 50% 50%, rgba(201,162,74,.08), transparent 62%),
    radial-gradient(circle at 50% 50%, rgba(255,43,43,.06), transparent 66%),
    linear-gradient(180deg, rgba(0,0,0,.12), rgba(0,0,0,.00));
  box-shadow:
    inset 0 0 0 2px rgba(255,255,255,.06),
    inset 0 0 0 10px rgba(0,0,0,.12),
    inset 0 0 80px rgba(0,0,0,.55),
    0 50px 180px rgba(0,0,0,.30);
  opacity:.96;
}
.dial::after{
  content:"";
  position:absolute;inset:-14%;
  background:
    /* resolution rings */
    radial-gradient(circle at 50% 50%, transparent 0 36%, rgba(255,255,255,.06) 36% 36.6%, transparent 37% 100%),
    radial-gradient(circle at 50% 50%, transparent 0 52%, rgba(255,255,255,.06) 52% 52.6%, transparent 53% 100%),
    radial-gradient(circle at 50% 50%, transparent 0 68%, rgba(255,255,255,.06) 68% 68.6%, transparent 69% 100%),

    /* cardinal engrave */
    linear-gradient(90deg, transparent 0 49.7%, rgba(201,162,74,.10) 49.7% 50.3%, transparent 50.3% 100%),
    linear-gradient(0deg,  transparent 0 49.7%, rgba(201,162,74,.10) 49.7% 50.3%, transparent 50.3% 100%),

    /* 45° aligned inlay (crisp) */
    repeating-conic-gradient(from 45deg at 50% 50%,
      rgba(201,162,74,.05) 0 1.1deg,
      transparent 1.1deg 7.5deg),

    radial-gradient(circle at 50% 50%, rgba(255,255,255,.03), transparent 62%);
  opacity:.80;
  mask: radial-gradient(circle at 50% 50%, transparent 0 18%, #000 20% 100%);
  -webkit-mask: radial-gradient(circle at 50% 50%, transparent 0 18%, #000 20% 100%);
}

/* 16-direction letters (subtle) */
.faceLetters{
  position:absolute;left:50%;top:50%;
  transform:translate(-50%,-50%);
  width:min(900px,90vw);
  height:min(900px,90vw);
  pointer-events:none;
  z-index:3;
  opacity:.78;
}
.faceLetters span{
  position:absolute;
  color:rgba(201,162,74,.55);
  font-weight:980;
  letter-spacing:2px;
  font-size:12px;
  text-shadow:0 0 12px rgba(0,0,0,.55);
}
.faceLetters .N{left:50%;top:10px;transform:translateX(-50%)}
.faceLetters .E{right:10px;top:50%;transform:translateY(-50%)}
.faceLetters .S{left:50%;bottom:10px;transform:translateX(-50%)}
.faceLetters .W{left:10px;top:50%;transform:translateY(-50%)}

/* ===== SINGLE MOON (outside compass) ===== */
.moonWrap{
  position:absolute;
  right:28px;
  top:142px;
  width:170px;height:170px;
  pointer-events:none;
  z-index:1; /* behind dial and nodes */
  opacity:.95;
}
.moon{
  position:absolute;inset:0;
  border-radius:999px;
  background:
    radial-gradient(circle at 30% 30%, rgba(255,255,255,.28), transparent 48%),
    radial-gradient(circle at 50% 50%, rgba(255,255,255,.86), rgba(255,255,255,.80) 55%, rgba(255,255,255,.74) 100%);
  box-shadow:
    0 0 34px rgba(255,255,255,.18),
    0 0 90px rgba(255,230,160,.12);
}
.moon::before{
  content:"";
  position:absolute;inset:10%;
  border-radius:999px;
  background:
    radial-gradient(circle at 42% 38%, rgba(0,0,0,.12) 0%, rgba(0,0,0,0) 40%),
    radial-gradient(circle at 62% 58%, rgba(0,0,0,.10) 0%, rgba(0,0,0,0) 38%),
    radial-gradient(circle at 35% 70%, rgba(0,0,0,.08) 0%, rgba(0,0,0,0) 42%);
  opacity:.55;
}
.moonShadow{
  position:absolute;inset:-2%;
  border-radius:999px;
  background:#000;
  opacity:.0; /* set by JS for phase */
  transform:translateX(0);
  filter:blur(.2px);
}

/* ===== DRAGON CANVAS (between dial and nodes) ===== */
#fx{
  position:absolute;
  left:0;top:0;width:100%;height:100%;
  pointer-events:none;
  z-index:4; /* above dial, below nodes */
}

/* ===== GEM NODES ===== */
.node{
  position:absolute;
  left:50%;top:50%;
  transform:translate(-50%,-50%) rotate(45deg);
  cursor:pointer;
  pointer-events:auto;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.18);
  transition:box-shadow .16s ease, border-color .16s ease, filter .16s ease;
  z-index:10;
  border-radius:22px;
}
.core{width:var(--D0);height:var(--D0);z-index:12;border-radius:26px}
.l1{width:var(--D1);height:var(--D1)}
.l2{width:var(--D2);height:var(--D2)}
.l3{width:var(--D3);height:var(--D3);border-radius:18px}

.surface{
  background:
    radial-gradient(circle at 20% 18%, rgba(255,255,255,.28), transparent 46%),
    radial-gradient(circle at 78% 22%, var(--festival), transparent 62%),
    radial-gradient(circle at 74% 84%, var(--opalV), transparent 64%),
    radial-gradient(circle at 28% 84%, var(--crimson), transparent 70%),
    linear-gradient(160deg, var(--onyx1), var(--onyx0));
  box-shadow:
    var(--shadowDeep),
    0 0 24px rgba(255,43,43,.08),
    inset 0 2px 0 rgba(255,255,255,.18),
    inset 0 -52px 92px rgba(0,0,0,.88);
}
/* 3D inlay (curved feel): conic “arc” overlay instead of strict vertical grid */
.surface::before{
  content:"";
  position:absolute;inset:0;border-radius:inherit;pointer-events:none;
  box-shadow: inset 0 0 0 1px rgba(201,162,74,.18);
  background:
    repeating-conic-gradient(from 20deg at 50% 50%,
      rgba(201,162,74,.08) 0 1deg,
      transparent 1deg 10deg),
    radial-gradient(circle at 50% 50%, transparent 0 70%, rgba(201,162,74,.10) 78% 82%, transparent 90%);
  opacity:.28;
  mask:
    radial-gradient(circle at 50% 50%, transparent 0 70%, #000 78% 100%),
    linear-gradient(#000,#000);
  -webkit-mask:
    radial-gradient(circle at 50% 50%, transparent 0 70%, #000 78% 100%),
    linear-gradient(#000,#000);
}
.surface::after{
  content:"";
  position:absolute;left:12%;right:12%;top:10%;
  height:30%;
  border-radius:999px;
  background:linear-gradient(to bottom, rgba(255,255,255,.20), rgba(255,255,255,0));
  transform:rotate(-12deg);
  pointer-events:none;
  opacity:.92;
}

.node:hover{
  border-color:rgba(201,162,74,.44);
  box-shadow:
    var(--shadowDeep),
    0 0 0 2px rgba(201,162,74,.14),
    0 0 34px rgba(201,162,74,.18),
    inset 0 2px 0 rgba(255,255,255,.20),
    inset 0 -52px 92px rgba(0,0,0,.88);
}
.node:active{filter:brightness(.98)}

.inner{
  width:100%;height:100%;
  transform:rotate(-45deg);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:10px;
  gap:6px;
  color:#fff;
  pointer-events:none;
  user-select:none;
}
.word{
  font-weight:980;
  letter-spacing:.6px;
  line-height:1.05;
  text-shadow:0 0 18px rgba(0,0,0,.42);
  font-size:clamp(10px, 1.15vw, 16px);
  max-width:100%;
  word-break:keep-all;
}
.code{
  font-weight:950;
  font-size:10px;
  letter-spacing:1.2px;
  opacity:.78;
}

/* ===== CORNERS ===== */
.corner{
  position:fixed;
  bottom:max(16px, env(safe-area-inset-bottom));
  z-index:300; /* ABOVE everything */
  pointer-events:none;
}
.corner .dmini{pointer-events:auto}
.corner.left{left:16px}
.corner.right{right:16px}

.dmini{
  width:56px;height:56px;
  border-radius:16px;
  border:1px solid rgba(255,255,255,.14);
  background:
    radial-gradient(circle at 50% 40%, rgba(255,255,255,.08), transparent 52%),
    linear-gradient(145deg, rgba(10,12,16,.78), rgba(6,8,10,.92));
  box-shadow:var(--shadowB), 0 0 0 1px rgba(201,162,74,.10), 0 0 18px rgba(201,162,74,.10);
  display:grid;place-items:center;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
  transform:rotate(45deg);
  position:relative;
  overflow:hidden;
  transition:box-shadow .16s ease, border-color .16s ease;
}
.dmini:hover{
  border-color:rgba(201,162,74,.44);
  box-shadow:var(--shadowB), 0 0 0 2px rgba(201,162,74,.14), 0 0 30px rgba(201,162,74,.18);
}
.dmini span{
  transform:rotate(-45deg);
  font-weight:980;
  font-size:12px;
  letter-spacing:.6px;
  color:rgba(255,255,255,.92);
}
.cornerLabel{
  margin-top:10px;
  text-align:center;
  color:rgba(255,255,255,.72);
  font-size:11px;
  letter-spacing:.4px;
}

/* pill note (minimal) */
.pillWrap{
  width:min(1120px,94vw);
  margin:14px auto 0;
  padding-bottom:90px;
}
.pill{
  border:1px solid rgba(255,255,255,.12);
  border-radius:22px;
  padding:12px 14px;
  background:rgba(0,0,0,.14);
  box-shadow:0 26px 90px rgba(0,0,0,.55);
  color:rgba(255,255,255,.86);
  line-height:1.5;
  font-size:13px;
}

/* responsive */
@media (max-width:720px){
  :root{
    --D0:196px;--D1:142px;--D2:108px;--D3:84px;
    --R1:156px;--R2:228px;--R3:292px;
    --padTop:112px;
  }
}
@media (max-width:520px){
  :root{
    --D0:184px;--D1:136px;--D2:104px;--D3:80px;
    --R1:146px;--R2:214px;--R3:274px;
  }
  .brandSub{display:none}
}
</style>
</head>

<body>

<div class="top" aria-label="Top controls">
  <div class="topbar">
    <div class="brandLeft">
      <div class="brandTitle" id="brandTitle">WELCOME TO THE COMPASS</div>
      <div class="brandSub" id="brandSub">Visual calibration · v5 (dragon spine fix) · Lens: PLATFORM</div>
      <div class="brandLinks">
        <a href="https://diamondgatebridge.com" target="_blank" rel="noopener">diamondgatebridge.com</a>
        <a href="https://cogrid.net" target="_blank" rel="noopener">cogrid.net</a>
      </div>
    </div>

    <div class="controlsRight">
      <div class="seg" role="group" aria-label="Lane">
        <button type="button" id="lanePlatform" aria-pressed="true">PLATFORM</button>
        <button type="button" id="laneEngineering" aria-pressed="false">ENGINEERING</button>
      </div>
    </div>
  </div>
</div>

<div class="stage" id="stage" aria-label="Compass dial">
  <div class="stagePlate" aria-hidden="true"></div>

  <div class="moonWrap" aria-hidden="true">
    <div class="moon"></div>
    <div class="moonShadow" id="moonShadow"></div>
  </div>

  <div class="slab" aria-hidden="true"></div>
  <div class="dial" aria-hidden="true"></div>

  <div class="faceLetters" aria-hidden="true">
    <span class="N">N</span><span class="E">E</span><span class="S">S</span><span class="W">W</span>
  </div>

  <canvas id="fx" aria-hidden="true"></canvas>
  <!-- nodes injected by JS -->
</div>

<div class="pillWrap">
  <div class="pill">Compass v5: this pass only fixes the dragon engine (true spine + segment spacing). No CN/ES until visuals lock.</div>
</div>

<div class="corner left" aria-label="Exit">
  <div class="dmini" id="btnExit" role="button" tabindex="0" aria-label="Exit"><span>EXIT</span></div>
  <div class="cornerLabel">EXIT</div>
</div>
<div class="corner right" aria-label="Hub">
  <div class="dmini" id="btnHub" role="button" tabindex="0" aria-label="Hub"><span>HUB</span></div>
  <div class="cornerLabel">HUB</div>
</div>

<script>
(function(){
  "use strict";

  // ===== Canon state (gd_* only; lane URL-only) =====
  var qs=new URLSearchParams(location.search);
  var LS=window.localStorage;

  var lang  = qs.get("lang")  || LS.getItem("gd_lang")  || "en";
  var style = qs.get("style") || LS.getItem("gd_style") || "informal";
  var time  = qs.get("time")  || LS.getItem("gd_time")  || "now";
  var depth = qs.get("depth") || LS.getItem("gd_depth") || "explore";
  var lane  = qs.get("lane")  || "platform"; // URL-only

  if(lang!=="en") lang="en";                 // EN-only for this pass
  if(style!=="informal" && style!=="formal") style="informal";
  if(time==="trajectory") time="post";
  if(time!=="origin" && time!=="now" && time!=="post") time="now";
  if(depth!=="explore" && depth!=="learn") depth="explore";
  if(lane!=="platform" && lane!=="engineering") lane="platform";

  try{
    LS.setItem("gd_lang","en");
    LS.setItem("gd_style",style);
    LS.setItem("gd_time",time);
    LS.setItem("gd_depth",depth);
  }catch(e){}

  document.documentElement.lang="en";

  function q(over){
    var p=new URLSearchParams();
    p.set("lang","en");
    p.set("style",(over&&over.style)?over.style:style);
    p.set("time",(over&&over.time)?over.time:time);
    p.set("depth",(over&&over.depth)?over.depth:depth);
    var L=(over&&over.lane)?over.lane:lane;
    if(L==="platform"||L==="engineering") p.set("lane",L);
    return "?"+p.toString();
  }

  function go(path){ window.location.href = path + q(); }
  function setPressed(btn, on){ btn.setAttribute("aria-pressed", on ? "true" : "false"); }

  // ===== ROUTING =====
  var CORE_ROUTE = "/index-core/index.html";
  var EXIT_ROUTE = "/door/";
  var HUB_ROUTE  = "/home/";
  var PLACEHOLDER_404 = "/404.html";

  var ROUTES_RAW = [
    // Tier 1 (cardinals)
    {tier:1, code:"N",  label:{platform:"LAWS",        engineering:"BOUNDS"},   href:"/laws/"},
    {tier:1, code:"E",  label:{platform:"ENERGY",      engineering:"POWER"},    href:"/explore/frontier/energy/"},
    {tier:1, code:"S",  label:{platform:"FINANCE",     engineering:"CAPITAL"},  href:"/finance/"},
    {tier:1, code:"W",  label:{platform:"GOVERNANCE",  engineering:"EXEC"},     href:"/governance/"},

    // Tier 2 (diagonals)
    {tier:2, code:"NE", label:{platform:"PRODUCTS",    engineering:"DEPLOY"},   href:"/products/"},
    {tier:2, code:"SE", label:{platform:"RESEARCH",    engineering:"R&D"},      href:"/research/"},
    {tier:2, code:"SW", label:{platform:"EXPLORE",     engineering:"MODELS"},   href:"/explore/"},
    {tier:2, code:"NW", label:{platform:"DOCTRINE",    engineering:"CCD"},      href:"/products/capital-doctrine/"},

    // Tier 3 (outer 8)
    {tier:3, code:"NNE",label:{platform:"EDUCATION",   engineering:"ESL"},      href:"/products/education/"},
    {tier:3, code:"ENE",label:{platform:"FRONTIER",    engineering:"FRONTIER"}, href:"/explore/frontier/"},
    {tier:3, code:"ESE",label:{platform:"INFRA",       engineering:"SUBST"},    href:"/explore/infrastructure/"},
    {tier:3, code:"SSE",label:{platform:"AGRICULTURE", engineering:"FOOD"},     href:"/products/agriculture/"},
    {tier:3, code:"SSW",label:{platform:"GAUGES",      engineering:"SIGNALS"},  href:"/gauges/"},
    {tier:3, code:"WSW",label:{platform:"VISION",      engineering:"MAP"},      href:"/explore/frontier/vision/"},
    {tier:3, code:"WNW",label:{platform:"LATTICE",     engineering:"256"},      href:"/explore/frontier/lattice/"},
    {tier:3, code:"NNW",label:{platform:"SHIMMER",     engineering:"SHIMMER"},  href:"/explore/frontier/shimmer/"}
  ];

  function normalizeRoutes(list){
    var seen = Object.create(null);
    var out = [];
    for(var i=0;i<list.length;i++){
      var it=list[i];
      var h=(it.href||"").trim();
      if(!h) h=PLACEHOLDER_404;
      if(seen[h]) h=PLACEHOLDER_404;
      seen[h]=true;
      out.push({tier:it.tier, code:it.code, label:it.label, href:h});
    }
    return out;
  }
  var ROUTES = normalizeRoutes(ROUTES_RAW);

  function labelFor(it){
    return (lane==="engineering") ? it.label.engineering : it.label.platform;
  }

  // ===== header + lane =====
  var btnLP=document.getElementById("lanePlatform");
  var btnLE=document.getElementById("laneEngineering");

  function paintHeader(){
    document.getElementById("brandSub").textContent =
      "Visual calibration · v5 (dragon spine fix) · Lens: " + (lane==="engineering" ? "ENGINEERING" : "PLATFORM");
  }

  setPressed(btnLP, lane==="platform");
  setPressed(btnLE, lane==="engineering");
  paintHeader();

  function setLane(next){
    if(next!=="platform" && next!=="engineering") next="platform";
    lane=next;
    history.replaceState({}, "", location.pathname + q({lane:lane}));
    setPressed(btnLP, lane==="platform");
    setPressed(btnLE, lane==="engineering");
    paintHeader();
    layoutNodes();
  }

  btnLP.addEventListener("click", function(){ setLane("platform"); }, {passive:true});
  btnLE.addEventListener("click", function(){ setLane("engineering"); }, {passive:true});

  // ===== corners =====
  function bindCorner(id, path){
    var el=document.getElementById(id);
    if(!el) return;
    function act(){ go(path); }
    el.addEventListener("click", act, {passive:true});
    el.addEventListener("keydown", function(e){
      if(e.key==="Enter"||e.key===" "){ e.preventDefault(); act(); }
    });
  }
  bindCorner("btnExit", EXIT_ROUTE);
  bindCorner("btnHub", HUB_ROUTE);

  // ===== moon phase (single) =====
  // phase step increments per load (stored in sessionStorage only)
  var ms = window.sessionStorage;
  var step = 0;
  try{
    step = parseInt(ms.getItem("gd_moon_step")||"0",10) || 0;
    step = (step + 1) % 8;
    ms.setItem("gd_moon_step", String(step));
  }catch(e){ step = Math.floor(Math.random()*8); }

  // map 0..7 to shadow offset + opacity (fake phase)
  var shadow=document.getElementById("moonShadow");
  var phase = step / 7; // 0 new -> 1 full-ish
  // we want full moon possible: use phase to move shadow OFF disk
  var dx = (1 - phase) * 80;       // more shadow when new
  var op = (1 - phase) * 0.92;     // opacity
  shadow.style.opacity = String(op);
  shadow.style.transform = "translateX(" + dx + "px)";

  // ===== nodes =====
  var stage=document.getElementById("stage");

  function mkNode(word, code, cls){
    var d=document.createElement("div");
    d.className="node surface " + cls;
    d.setAttribute("role","button");
    d.tabIndex=0;

    var inner=document.createElement("div");
    inner.className="inner";

    var w=document.createElement("div");
    w.className="word";
    w.textContent=word;

    var c=document.createElement("div");
    c.className="code";
    c.textContent=code;

    inner.appendChild(w);
    inner.appendChild(c);
    d.appendChild(inner);

    return d;
  }

  function layoutNodes(){
    stage.querySelectorAll(".node").forEach(function(n){ n.remove(); });

    var rect=stage.getBoundingClientRect();
    var cx=rect.width/2, cy=rect.height/2;

    var cs=getComputedStyle(document.documentElement);
    var R1=parseFloat(cs.getPropertyValue("--R1"))||168;
    var R2=parseFloat(cs.getPropertyValue("--R2"))||246;
    var R3=parseFloat(cs.getPropertyValue("--R3"))||314;

    // core
    var core=mkNode("CORE","INDEX","core");
    core.style.left=cx+"px"; core.style.top=cy+"px";
    core.addEventListener("click", function(){ go(CORE_ROUTE); }, {passive:true});
    core.addEventListener("keydown", function(e){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); go(CORE_ROUTE); }});
    stage.appendChild(core);

    var t1=[], t2=[], t3=[];
    for(var i=0;i<ROUTES.length;i++){
      if(ROUTES[i].tier===1) t1.push(ROUTES[i]);
      else if(ROUTES[i].tier===2) t2.push(ROUTES[i]);
      else t3.push(ROUTES[i]);
    }

    function byCode(arr, code){ for(var i=0;i<arr.length;i++) if(arr[i].code===code) return arr[i]; return null; }
    var ordered=[byCode(t1,"N"),byCode(t1,"E"),byCode(t1,"S"),byCode(t1,"W")].filter(Boolean);
    var ang=[-Math.PI/2, 0, Math.PI/2, Math.PI];

    for(var i=0;i<ordered.length;i++){
      var it=ordered[i];
      var x=cx + R1*Math.cos(ang[i]);
      var y=cy + R1*Math.sin(ang[i]);
      var n=mkNode(labelFor(it), it.code, "l1");
      n.style.left=x+"px"; n.style.top=y+"px";
      (function(path, el){
        el.addEventListener("click", function(){ go(path); }, {passive:true});
        el.addEventListener("keydown", function(e){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); go(path); }});
      })(it.href, n);
      stage.appendChild(n);
    }

    for(var i=0;i<t2.length;i++){
      var it=t2[i];
      var a=(i/t2.length)*(Math.PI*2) - Math.PI/4;
      var x=cx + R2*Math.cos(a);
      var y=cy + R2*Math.sin(a);
      var n=mkNode(labelFor(it), it.code, "l2");
      n.style.left=x+"px"; n.style.top=y+"px";
      (function(path, el){
        el.addEventListener("click", function(){ go(path); }, {passive:true});
        el.addEventListener("keydown", function(e){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); go(path); }});
      })(it.href, n);
      stage.appendChild(n);
    }

    for(var i=0;i<t3.length;i++){
      var it=t3[i];
      var a=(i/t3.length)*(Math.PI*2) - Math.PI*(3/8);
      var x=cx + R3*Math.cos(a);
      var y=cy + R3*Math.sin(a);
      var n=mkNode(labelFor(it), it.code, "l3");
      n.style.left=x+"px"; n.style.top=y+"px";
      (function(path, el){
        el.addEventListener("click", function(){ go(path); }, {passive:true});
        el.addEventListener("keydown", function(e){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); go(path); }});
      })(it.href, n);
      stage.appendChild(n);
    }
  }

  function safeLayout(){
    var r=stage.getBoundingClientRect();
    if(r.width<10||r.height<10){ requestAnimationFrame(safeLayout); return; }
    layoutNodes();
    fxResize();
  }

  // ===== DRAGON SPINE ENGINE (FIX) =====
  var canvas=document.getElementById("fx");
  var ctx=canvas.getContext("2d",{alpha:true});
  var fxW=0, fxH=0;

  function fxResize(){
    var r=stage.getBoundingClientRect();
    fxW=Math.max(1, Math.floor(r.width));
    fxH=Math.max(1, Math.floor(r.height));
    canvas.width=fxW;
    canvas.height=fxH;
    canvas.style.width=fxW+"px";
    canvas.style.height=fxH+"px";
  }

  // path helpers
  function clamp(v,a,b){ return Math.max(a,Math.min(b,v)); }
  function lerp(a,b,t){ return a+(b-a)*t; }
  function fract(x){ return x-Math.floor(x); }

  // SPINE PATHS: return point for parameter s in [0..1]
  function spineHorizontal(t, yBase, amp, freq, dir){
    // dir: +1 L->R, -1 R->L
    var margin = 220;
    return function(s){
      // head at s=0, tail at s=1 (trail behind)
      var u = fract(t*0.04 + (dir>0?0:0.5) + s*0.9);
      var x = (dir>0) ? lerp(-margin, fxW+margin, u) : lerp(fxW+margin, -margin, u);
      var y = yBase + Math.sin((u*freq*2*Math.PI) + t*0.002)*amp;
      return {x:x,y:y};
    };
  }

  // sample spine into equally spaced segments (true spacing)
  function buildSegments(pathFn, segCount, gap){
    var pts = [];
    // start at s=0 (head)
    var s = 0;
    var p0 = pathFn(s);
    pts.push({x:p0.x,y:p0.y});

    // walk forward in s until we accumulate segCount points with distance >= gap
    var maxIter = 9000;
    var iter = 0;
    while(pts.length < segCount && iter < maxIter){
      iter++;
      s += 0.0018; // step
      if(s>1.6) break; // safety
      var p = pathFn(s);
      var last = pts[pts.length-1];
      var dx = p.x-last.x, dy=p.y-last.y;
      var d = Math.sqrt(dx*dx+dy*dy);
      if(d >= gap){
        pts.push({x:p.x,y:p.y});
      }
    }
    return pts;
  }

  // draw dragon around spine points
  function drawDragon(pts, opts){
    if(!pts || pts.length<6) return;

    // BODY
    for(var i=pts.length-1;i>=0;i--){
      var p = pts[i];
      var t = i/(pts.length-1); // 0 head -> 1 tail
      var w = lerp(opts.headW, opts.tailW, t);
      var h = w*0.78;

      // base body
      ctx.fillStyle = opts.fill;
      ctx.strokeStyle = opts.stroke;
      ctx.lineWidth = 1.6;

      ctx.beginPath();
      ctx.ellipse(p.x,p.y,w,h,0,0,Math.PI*2);
      ctx.fill();
      ctx.stroke();

      // scale arcs (segmented body feel)
      ctx.strokeStyle = opts.scaleStroke;
      ctx.lineWidth = 1.0;
      var arcR = w*0.92;
      ctx.beginPath();
      ctx.arc(p.x, p.y, arcR, Math.PI*0.15, Math.PI*0.95);
      ctx.stroke();
    }

    // HEAD (simple but clearly “dragon” not vine)
    var h0 = pts[0];
    var h1 = pts[1];
    var vx = h0.x-h1.x, vy = h0.y-h1.y;
    var ang = Math.atan2(vy,vx);

    ctx.save();
    ctx.translate(h0.x,h0.y);
    ctx.rotate(ang);

    // snout
    ctx.fillStyle = opts.fill2;
    ctx.strokeStyle = opts.stroke;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.ellipse(14,0,24,18,0,0,Math.PI*2);
    ctx.fill();
    ctx.stroke();

    // jaw
    ctx.beginPath();
    ctx.ellipse(22,10,16,10,0,0,Math.PI*2);
    ctx.fill();
    ctx.stroke();

    // eye
    ctx.fillStyle = "rgba(255,255,255,.86)";
    ctx.beginPath();
    ctx.arc(18,-6,3.2,0,Math.PI*2);
    ctx.fill();
    ctx.fillStyle = "rgba(0,0,0,.55)";
    ctx.beginPath();
    ctx.arc(19,-6,1.3,0,Math.PI*2);
    ctx.fill();

    // horns
    ctx.strokeStyle = opts.horn;
    ctx.lineWidth = 2.2;
    ctx.beginPath();
    ctx.moveTo(6,-16); ctx.lineTo(-8,-34);
    ctx.moveTo(14,-16); ctx.lineTo(2,-36);
    ctx.stroke();

    // whiskers
    ctx.strokeStyle = opts.whisker;
    ctx.lineWidth = 1.4;
    ctx.beginPath();
    ctx.moveTo(28,-4); ctx.quadraticCurveTo(52,-18,78,-10);
    ctx.moveTo(28, 4); ctx.quadraticCurveTo(52, 18,78, 10);
    ctx.stroke();

    ctx.restore();
  }

  // two dragons: top (classic lane banner slot later), bottom (selected language later)
  function renderFX(now){
    ctx.clearRect(0,0,fxW,fxH);

    // subtle lantern sparks (very light)
    var n=10;
    for(var i=0;i<n;i++){
      var x = (now*0.02 + i*97) % fxW;
      var y = fxH - ((now*0.03 + i*131) % (fxH*0.55));
      ctx.fillStyle = "rgba(255,200,120,.12)";
      ctx.beginPath();
      ctx.arc(x,y,2.2,0,Math.PI*2);
      ctx.fill();
    }

    var t = now;

    // top dragon: right->left (above compass, below nodes)
    var pathTop = spineHorizontal(t, fxH*0.28, 10, 2.2, -1);
    var ptsTop = buildSegments(pathTop, 58, 16);

    // bottom dragon: left->right
    var pathBot = spineHorizontal(t+9000, fxH*0.70, 12, 1.9, +1);
    var ptsBot = buildSegments(pathBot, 62, 16);

    var green = "rgba(14,70,28,.92)";
    var green2 = "rgba(20,95,38,.92)";
    var gold = "rgba(212,175,55,.70)";
    var gold2= "rgba(212,175,55,.55)";
    var scale = "rgba(180,255,160,.16)";

    drawDragon(ptsTop, {
      headW:22, tailW:6,
      fill:green, fill2:green2,
      stroke:gold, scaleStroke:scale,
      horn:gold2, whisker:gold
    });

    drawDragon(ptsBot, {
      headW:24, tailW:7,
      fill:green, fill2:green2,
      stroke:gold, scaleStroke:scale,
      horn:gold2, whisker:gold
    });

    requestAnimationFrame(renderFX);
  }

  // init
  requestAnimationFrame(safeLayout);
  window.addEventListener("resize", function(){ safeLayout(); }, {passive:true});
  fxResize();
  requestAnimationFrame(renderFX);

})();
</script>

</body>
