<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Prelude | The Nine Summits of Love</title>
  <meta name="description" content="Prelude bloom into the Nine Summits of Love." />
  <style>
    :root{
      color-scheme:dark;
      --bg0:#1a0822;
      --bg1:#182f63;
      --bg2:#0b1735;
      --ink:#fff9f5;
      --mut:rgba(255,249,245,.82);
      --soft:rgba(255,249,245,.62);
      --gold:#ffd76a;
      --rose:#ff6fb0;
      --sky:#7fd4ff;
      --violet:#c28cff;
      --emerald:#7ef0c4;
      --line:rgba(255,255,255,.14);
      --shadow:0 24px 84px rgba(0,0,0,.44);
      --panel:rgba(12,16,34,.66);
      --panelStrong:rgba(10,12,28,.86);
    }
    *{box-sizing:border-box}
    html,body{
      margin:0;
      min-height:100%;
      font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
      color:var(--ink);
      background:
        radial-gradient(circle at 12% 18%, rgba(255,111,176,.24), transparent 22%),
        radial-gradient(circle at 84% 18%, rgba(127,212,255,.20), transparent 24%),
        radial-gradient(circle at 50% 32%, rgba(255,215,106,.14), transparent 18%),
        radial-gradient(circle at 20% 72%, rgba(126,240,196,.18), transparent 22%),
        radial-gradient(circle at 78% 76%, rgba(194,140,255,.18), transparent 24%),
        linear-gradient(180deg,var(--bg1) 0%,var(--bg0) 42%,var(--bg2) 100%);
    }
    body{overflow-x:hidden}
    a{color:inherit;text-decoration:none}
    .page{
      position:relative;
      min-height:100vh;
      overflow:hidden;
      isolation:isolate;
    }
    .stars,.stars:before,.stars:after{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      display:block;
    }
    .stars{
      opacity:.58;
      background-image:
        radial-gradient(circle at 12% 22%, rgba(255,255,255,.94) 0 1px, transparent 2px),
        radial-gradient(circle at 28% 58%, rgba(255,255,255,.82) 0 1px, transparent 2px),
        radial-gradient(circle at 66% 18%, rgba(255,255,255,.92) 0 1px, transparent 2px),
        radial-gradient(circle at 86% 74%, rgba(255,255,255,.82) 0 1px, transparent 2px);
    }
    .stars:before{
      opacity:.5;
      background:
        radial-gradient(circle at 18% 16%, rgba(255,111,176,.22), transparent 18%),
        radial-gradient(circle at 78% 22%, rgba(127,212,255,.18), transparent 20%),
        radial-gradient(circle at 50% 48%, rgba(255,215,106,.14), transparent 16%),
        radial-gradient(circle at 52% 78%, rgba(126,240,196,.18), transparent 22%);
      filter:blur(24px);
    }
    .wrap{
      position:relative;
      z-index:1;
      width:min(1220px,calc(100vw - 32px));
      margin:0 auto;
      padding:24px 0 42px;
      display:grid;
      gap:18px;
    }
    .topbar,.hero,.dolls,.bridge,.footerbox{
      border:1px solid var(--line);
      background:
        linear-gradient(180deg,rgba(255,255,255,.07),rgba(255,255,255,.02)),
        linear-gradient(180deg,var(--panel),var(--panelStrong));
      box-shadow:var(--shadow);
      backdrop-filter:blur(14px);
      -webkit-backdrop-filter:blur(14px);
      position:relative;
      overflow:hidden;
    }
    .topbar{
      border-radius:999px;
      padding:14px 18px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
    }
    .brand{display:flex;align-items:center;gap:12px}
    .mark{
      width:44px;height:44px;border-radius:14px;transform:rotate(45deg);
      background:linear-gradient(135deg,var(--gold),var(--rose) 35%,var(--sky) 68%,var(--emerald));
      flex:0 0 auto;
      box-shadow:0 0 28px rgba(255,111,176,.22);
    }
    .brand h2{margin:0;font-size:.96rem;font-weight:900;letter-spacing:.08em;text-transform:uppercase}
    .brand p{margin:2px 0 0;color:var(--soft);font-size:.82rem}
    .pills{display:flex;gap:10px;flex-wrap:wrap}
    .pill{
      min-height:40px;padding:0 14px;border-radius:999px;border:1px solid rgba(255,255,255,.12);
      display:inline-flex;align-items:center;justify-content:center;
      font-size:.74rem;font-weight:900;letter-spacing:.12em;text-transform:uppercase;
      background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.02));
    }
    .hero{
      border-radius:34px;
      padding:34px 30px;
    }
    .hero:before,.dolls:before,.bridge:before,.footerbox:before{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      background:
        radial-gradient(circle at 14% 14%, rgba(255,111,176,.18), transparent 24%),
        radial-gradient(circle at 82% 18%, rgba(127,212,255,.16), transparent 24%),
        radial-gradient(circle at 50% 24%, rgba(255,215,106,.14), transparent 18%),
        radial-gradient(circle at 18% 82%, rgba(126,240,196,.14), transparent 22%),
        radial-gradient(circle at 76% 80%, rgba(194,140,255,.16), transparent 24%);
      opacity:.95;
    }
    .eyebrow{
      position:relative;z-index:1;
      margin:0 0 12px;color:var(--gold);
      font-size:.78rem;font-weight:900;letter-spacing:.18em;text-transform:uppercase;
    }
    h1{
      position:relative;z-index:1;
      margin:0;
      font-family:Georgia,"Times New Roman",serif;
      font-size:clamp(3rem,7vw,5.8rem);
      line-height:.9;
      letter-spacing:.04em;
    }
    .tag{
      position:relative;z-index:1;
      margin:16px 0 0;
      font-size:clamp(1.15rem,2vw,1.6rem);
      line-height:1.45;
      color:#fff0c9;
      font-weight:800;
      max-width:900px;
    }
    .copy{
      position:relative;z-index:1;
      margin:14px 0 0;
      color:var(--mut);
      line-height:1.68;
      font-size:1rem;
      max-width:900px;
    }
    .actions{
      position:relative;z-index:1;
      margin-top:22px;
      display:flex;
      flex-wrap:wrap;
      gap:12px;
    }
    .btn{
      min-height:50px;
      padding:0 18px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.12);
      display:inline-flex;
      align-items:center;
      justify-content:center;
      font-size:.78rem;
      font-weight:900;
      letter-spacing:.12em;
      text-transform:uppercase;
      background:linear-gradient(135deg,rgba(255,255,255,.10),rgba(255,255,255,.03));
      transition:transform .15s ease,border-color .15s ease;
    }
    .btn:hover{transform:translateY(-2px)}
    .btn.primary{border-color:rgba(255,215,106,.34);color:#fff1b8}
    .dolls{
      border-radius:34px;
      padding:22px;
    }
    .dolls h3,.bridge h3{
      position:relative;z-index:1;
      margin:0 0 14px;
      font-size:.84rem;
      font-weight:900;
      letter-spacing:.16em;
      text-transform:uppercase;
      color:var(--gold);
    }
    .dollGrid{
      position:relative;z-index:1;
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      gap:16px;
    }
    .doll{
      border-radius:26px;
      padding:20px;
      border:1px solid rgba(255,255,255,.12);
      min-height:220px;
      display:grid;
      align-content:start;
      gap:12px;
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.03);
    }
    .doll.one{
      background:linear-gradient(180deg,rgba(255,111,176,.22),rgba(255,111,176,.07));
    }
    .doll.two{
      background:linear-gradient(180deg,rgba(255,215,106,.22),rgba(255,215,106,.07));
    }
    .doll.three{
      background:linear-gradient(180deg,rgba(127,212,255,.22),rgba(127,212,255,.07));
    }
