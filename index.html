<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Compass · DiamondGateBridge</title>

<link rel="stylesheet" href="/assets/ui.css"/>
<link rel="stylesheet" href="/assets/branch.css"/>
<script defer src="/assets/instruments.js"></script>

<style>
a{color:inherit;text-decoration:none}
body{margin:0}
body::before,body::after{pointer-events:none!important}

:root{
  /* ===== GEOMETRY (one dominant center; progressively smaller outward) ===== */
  --D0:210px;  /* CORE */
  --D1:150px;  /* Cardinals */
  --D2:112px;  /* Diagonals */
  --D3:86px;   /* Outer 8 */

  /* tighter radii */
  --R1:168px;
  --R2:246px;
  --R3:314px;

  --padTop:102px;

  /* ===== MATERIAL ===== */
  --ink:rgba(255,255,255,.94);
  --mut:rgba(255,255,255,.78);

  --onyx0:rgba(6,8,10,.96);
  --onyx1:rgba(10,12,16,.88);

  --crimson:rgba(120,0,22,.44);
  --festival:rgba(255,43,43,.26);
  --opalV:rgba(90,40,120,.18);

  --gold:rgba(201,162,74,.58);
  --goldGlow:rgba(201,162,74,.22);

  --shadowDeep:0 44px 140px rgba(0,0,0,.82);
  --shadowA:0 28px 110px rgba(0,0,0,.70);
  --shadowB:0 18px 60px rgba(0,0,0,.55);
}

/* ===== TOP BAR ===== */
.top{
  position:fixed;top:14px;left:0;right:0;
  padding:0 14px;
  z-index:260;
  pointer-events:none;
}
.topbar{
  pointer-events:auto;
  width:min(1120px,96vw);
  margin:0 auto;
  border:1px solid rgba(255,255,255,.12);
  border-radius:22px;
  padding:10px 12px;
  background:
    radial-gradient(circle at 18% 18%, rgba(201,162,74,.10), transparent 62%),
    radial-gradient(circle at 82% 30%, rgba(255,43,43,.10), transparent 64%),
    linear-gradient(145deg, rgba(8,10,14,.92), rgba(4,6,10,.96));
  box-shadow:var(--shadowA), inset 0 0 0 1px rgba(201,162,74,.12);
  backdrop-filter:blur(10px);
  display:flex;align-items:center;justify-content:space-between;
  gap:10px;
}
.brandLeft{
  display:flex;align-items:center;gap:12px;flex-wrap:wrap;min-width:0;
}
.brandTitle{
  font-weight:980;
  letter-spacing:.6px;
  font-size:14px;
  color:rgba(255,255,255,.94);
  white-space:nowrap;
}
.brandSub{
  font-size:12px;
  color:rgba(255,255,255,.74);
  letter-spacing:.2px;
  white-space:nowrap;
}
.brandLinks{
  display:flex;gap:10px;flex-wrap:wrap;
  font-size:12px;
  color:rgba(255,255,255,.70);
}
.brandLinks a{
  padding:6px 10px;
  border-radius:999px;
  border:1px solid rgba(201,162,74,.16);
  background:rgba(0,0,0,.14);
}
.controlsRight{
  display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:flex-end;
}

/* Segmented controls */
.seg{
  display:inline-flex;gap:0;overflow:hidden;border-radius:16px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(0,0,0,.18);
  box-shadow:var(--shadowB);
}
.seg button{
  appearance:none;border:0;background:transparent;
  color:rgba(255,255,255,.78);
  padding:10px 12px;min-height:42px;
  font-weight:980;font-size:13px;letter-spacing:.25px;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
.seg button[aria-pressed="true"]{
  color:rgba(255,255,255,.95);
  background:
    radial-gradient(circle at 50% 50%, rgba(201,162,74,.14), transparent 62%),
    linear-gradient(180deg, rgba(255,43,43,.10), rgba(0,0,0,.10));
  box-shadow: inset 0 0 0 1px rgba(201,162,74,.14), inset 0 -10px 22px rgba(201,162,74,.10);
}

/* ===== STAGE ===== */
.stage{
  position:relative;
  width:min(1200px,94vw);
  height:min(1200px,86vh);
  margin:var(--padTop) auto 0;
  pointer-events:none;
}

/* ========= SKY LAYER (EVENING + FESTIVAL, BRIGHTER) ========= */
.sky{
  position:absolute;inset:-18%;
  pointer-events:none;
  z-index:0;
  border-radius:44px;
  overflow:hidden;
}
.sky::before{
  content:"";
  position:absolute;inset:0;
  background:
    radial-gradient(circle at 68% 14%, rgba(255,240,210,.22), transparent 52%), /* moon haze stronger */
    radial-gradient(circle at 18% 22%, rgba(255,90,80,.14), transparent 56%),  /* lantern glow */
    radial-gradient(circle at 86% 38%, rgba(120,70,255,.12), transparent 64%), /* opal haze */
    radial-gradient(circle at 50% 65%, rgba(0,0,0,.12), transparent 62%),      /* soften darkness */
    linear-gradient(180deg,
      rgba(30,18,28,.00) 0%,
      rgba(22,10,16,.10) 55%,
      rgba(0,0,0,.18) 100%);
  opacity:.92;
}

/* ========= CLOUDS (REFLECTION DIRECTION: LEFT→RIGHT) ========= */
.clouds{
  position:absolute;inset:-25%;
  pointer-events:none;
  z-index:1; /* still behind face */
  opacity:.55;
  filter:blur(0.8px);
  mix-blend-mode:screen;
  background:
    radial-gradient(260px 120px at 8% 30%, rgba(255,255,255,.10) 0%, rgba(255,255,255,0) 70%),
    radial-gradient(320px 140px at 22% 44%, rgba(255,255,255,.08) 0%, rgba(255,255,255,0) 72%),
    radial-gradient(380px 160px at 46% 26%, rgba(255,255,255,.07) 0%, rgba(255,255,255,0) 74%),
    radial-gradient(420px 170px at 72% 42%, rgba(255,255,255,.06) 0%, rgba(255,255,255,0) 76%),
    radial-gradient(300px 130px at 86% 28%, rgba(255,255,255,.07) 0%, rgba(255,255,255,0) 72%);
  animation:cloudDrift 40s linear infinite;
}
@keyframes cloudDrift{
  0%{transform:translateX(-6%)}
  100%{transform:translateX(6%)}
}

/* ========= COMPASS SLAB (GLASSY WATER/OBSIDIAN) ========= */
.slab{
  position:absolute;left:50%;top:50%;
  transform:translate(-50%,-50%);
  width:min(980px,92vw);
  height:min(980px,92vw);
  border-radius:44px;
  pointer-events:none;
  z-index:2;
  border:1px solid rgba(255,255,255,.10);
  background:
    radial-gradient(circle at 30% 22%, rgba(255,255,255,.10), transparent 55%),
    radial-gradient(circle at 78% 28%, rgba(255,43,43,.10), transparent 60%),
    radial-gradient(circle at 70% 82%, rgba(90,40,120,.10), transparent 64%),
    linear-gradient(160deg, rgba(18,24,34,.62), rgba(6,8,10,.78)); /* less dark */
  box-shadow:
    0 70px 240px rgba(0,0,0,.52),
    inset 0 2px 0 rgba(255,255,255,.10),
    inset 0 -70px 140px rgba(0,0,0,.55);
}

/* subtle water ripple (performance-safe, pure CSS) */
.slab::after{
  content:"";
  position:absolute;inset:-10%;
  background:
    repeating-radial-gradient(circle at 52% 56%,
      rgba(255,255,255,.06) 0 2px,
      rgba(255,255,255,0) 2px 18px);
  opacity:.14;
  filter:blur(0.4px);
  animation:ripple 10s linear infinite;
}
@keyframes ripple{
  0%{transform:translate(-1%,-1%) scale(1.00)}
  50%{transform:translate(1%,1%) scale(1.02)}
  100%{transform:translate(-1%,-1%) scale(1.00)}
}

/* ========= OBISIDIAN DIAL FACE ========= */
.dial{
  position:absolute;
  left:50%;top:50%;
  transform:translate(-50%,-50%);
  width:min(900px,90vw);
  height:min(900px,90vw);
  border-radius:999px;
  pointer-events:none;
  z-index:3;
  overflow:hidden;
}
.dial::before{
  content:"";
  position:absolute;inset:0;border-radius:999px;
  background:
    radial-gradient(circle at 50% 42%,
      rgba(255,255,255,.05),
      rgba(0,0,0,.20) 56%,
      rgba(0,0,0,.52) 78%,
      rgba(0,0,0,.00) 92%),
    radial-gradient(circle at 50% 50%, rgba(201,162,74,.12), transparent 62%),
    radial-gradient(circle at 50% 50%, rgba(255,43,43,.09), transparent 66%),
    linear-gradient(180deg, rgba(0,0,0,.10), rgba(0,0,0,.00));
  box-shadow:
    inset 0 0 0 2px rgba(255,255,255,.06),
    inset 0 0 0 10px rgba(0,0,0,.12),
    inset 0 0 80px rgba(0,0,0,.45),
    0 50px 180px rgba(0,0,0,.26);
  opacity:.96;
}
.dial::after{
  content:"";
  position:absolute;inset:-14%;
  background:
    radial-gradient(circle at 50% 50%, transparent 0 36%, rgba(255,255,255,.06) 36% 36.6%, transparent 37% 100%),
    radial-gradient(circle at 50% 50%, transparent 0 52%, rgba(255,255,255,.06) 52% 52.6%, transparent 53% 100%),
    radial-gradient(circle at 50% 50%, transparent 0 68%, rgba(255,255,255,.06) 68% 68.6%, transparent 69% 100%),
    linear-gradient(90deg, transparent 0 49.7%, rgba(201,162,74,.10) 49.7% 50.3%, transparent 50.3% 100%),
    linear-gradient(0deg,  transparent 0 49.7%, rgba(201,162,74,.10) 49.7% 50.3%, transparent 50.3% 100%),
    repeating-conic-gradient(from 45deg at 50% 50%,
      rgba(201,162,74,.06) 0 1.2deg,
      transparent 1.2deg 7.5deg);
  filter: blur(.25px);
  opacity:.78;
  mask: radial-gradient(circle at 50% 50%, transparent 0 18%, #000 20% 100%);
  -webkit-mask: radial-gradient(circle at 50% 50%, transparent 0 18%, #000 20% 100%);
}

/* ========= FULL 16 DIRECTION LETTERING (black print + gold overlay) ========= */
.dir16{
  position:absolute;left:50%;top:50%;
  transform:translate(-50%,-50%);
  width:min(900px,90vw);
  height:min(900px,90vw);
  pointer-events:none;
  z-index:4;
  opacity:.88;
}
.dir16 span{
  position:absolute;
  font-weight:980;
  letter-spacing:1.4px;
  font-size:11px;
  color:rgba(0,0,0,.78);               /* black print */
  text-shadow:
    0 0 0 rgba(0,0,0,0),
    0 0 16px rgba(0,0,0,.35);
}
.dir16 span::after{
  content:attr(data-gold);
  position:absolute;left:0;top:0;
  color:rgba(201,162,74,.52);          /* gold overlay */
  text-shadow:0 0 18px rgba(201,162,74,.16);
  transform:translate(0.4px,0.4px);
  pointer-events:none;
}
.dir16 .N{left:50%;top:14px;transform:translateX(-50%);font-size:12px}
.dir16 .NNE{left:63%;top:32px;transform:translateX(-50%)}
.dir16 .NE{left:74%;top:74px;transform:translateX(-50%)}
.dir16 .ENE{left:85%;top:160px;transform:translateX(-50%)}
.dir16 .E{right:14px;top:50%;transform:translateY(-50%);font-size:12px}
.dir16 .ESE{left:85%;bottom:160px;transform:translateX(-50%)}
.dir16 .SE{left:74%;bottom:74px;transform:translateX(-50%)}
.dir16 .SSE{left:63%;bottom:32px;transform:translateX(-50%)}
.dir16 .S{left:50%;bottom:14px;transform:translateX(-50%);font-size:12px}
.dir16 .SSW{left:37%;bottom:32px;transform:translateX(-50%)}
.dir16 .SW{left:26%;bottom:74px;transform:translateX(-50%)}
.dir16 .WSW{left:15%;bottom:160px;transform:translateX(-50%)}
.dir16 .W{left:14px;top:50%;transform:translateY(-50%);font-size:12px}
.dir16 .WNW{left:15%;top:160px;transform:translateX(-50%)}
.dir16 .NW{left:26%;top:74px;transform:translateX(-50%)}
.dir16 .NNW{left:37%;top:32px;transform:translateX(-50%)}

/* ========= MOON + REFLECTION ========= */
#moon{
  position:absolute;
  top:64px;
  right:140px;
  width:120px;height:120px;
  border-radius:50%;
  z-index:1; /* moon is in sky layer */
}
.moonGlow{
  background:#ffffff;
  box-shadow:
    0 0 60px rgba(255,255,255,.70),
    0 0 120px rgba(255,255,255,.40),
    0 0 180px rgba(255,255,255,.22);
}
.moonDim{
  background:#eaeaea;
  box-shadow:
    0 0 36px rgba(255,255,255,.40),
    0 0 74px rgba(255,255,255,.22);
}
.moonNew{
  background:rgba(0,0,0,.70);
  box-shadow:none;
}

/* phase mask */
#moon::after{
  content:"";
  position:absolute;inset:0;
  border-radius:50%;
  background:#111;
  transform:translateX(var(--phaseShift, 0%));
  opacity:var(--maskOn, 0);
}

/* reflection on slab (below dragons, above slab) */
.moonReflect{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  width:min(980px,92vw);
  height:min(980px,92vw);
  z-index:2;            /* sits with slab */
  pointer-events:none;
  border-radius:44px;
  overflow:hidden;
}
.moonReflect::before{
  content:"";
  position:absolute;
  left:72%;
  top:18%;
  width:220px;
  height:520px;
  transform:rotate(18deg);
  background:
    radial-gradient(closest-side, rgba(255,255,255,.35), rgba(255,255,255,0) 70%),
    linear-gradient(180deg, rgba(255,255,255,.18), rgba(255,255,255,0));
  filter:blur(6px);
  opacity:var(--moonRef, .18);
  mix-blend-mode:screen;
}

  background-size:cover;

  animation:dragonDrift 28s linear infinite;
}
@keyframes dragonDrift{
  0%{transform:translateX(6%)}
  100%{transform:translateX(-6%)}
}

/* ===== GEM NODES ===== */
.node{
  position:absolute;
  left:50%;top:50%;
  transform:translate(-50%,-50%) rotate(45deg);
  cursor:pointer;
  pointer-events:auto;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.18);
  transition:box-shadow .16s ease, border-color .16s ease, filter .16s ease;
  z-index:12;
  border-radius:22px;
}
.core{width:var(--D0);height:var(--D0);z-index:14;border-radius:26px}
.l1{width:var(--D1);height:var(--D1)}
.l2{width:var(--D2);height:var(--D2)}
.l3{width:var(--D3);height:var(--D3);border-radius:18px}

/* 3D EDGE + FRACTALIZED GLASS FEEL (no heavy shaders) */
.surface{
  background:
    /* fractal-ish facets */
    conic-gradient(from 210deg at 30% 30%,
      rgba(255,255,255,.08), rgba(255,255,255,0) 20%,
      rgba(201,162,74,.08) 34%, rgba(0,0,0,0) 54%,
      rgba(255,43,43,.10) 66%, rgba(0,0,0,0) 86%),
    radial-gradient(circle at 20% 18%, rgba(255,255,255,.28), transparent 46%),
    radial-gradient(circle at 78% 22%, var(--festival), transparent 62%),
    radial-gradient(circle at 74% 84%, var(--opalV), transparent 64%),
    radial-gradient(circle at 28% 84%, var(--crimson), transparent 70%),
    linear-gradient(160deg, var(--onyx1), var(--onyx0));
  box-shadow:
    var(--shadowDeep),
    0 0 24px rgba(255,43,43,.08),
    inset 0 2px 0 rgba(255,255,255,.18),
    inset 0 -52px 92px rgba(0,0,0,.88);
}

/* diamond-aligned “3D edge” (angled bevel lines, not orthogonal grid) */
.surface::before{
  content:"";
  position:absolute;inset:0;border-radius:inherit;pointer-events:none;
  background:
    /* bevel rim */
    linear-gradient(135deg, rgba(255,255,255,.10), rgba(255,255,255,0) 38%),
    linear-gradient(-45deg, rgba(0,0,0,.45), rgba(0,0,0,0) 48%),
    /* diamond-aligned silk */
    repeating-linear-gradient(45deg, rgba(201,162,74,.08) 0 1px, transparent 1px 18px),
    repeating-linear-gradient(-45deg, rgba(201,162,74,.06) 0 1px, transparent 1px 18px);
  box-shadow: inset 0 0 0 1px rgba(201,162,74,.18);
  opacity:.38;
  mask:
    radial-gradient(circle at 50% 50%, transparent 0 72%, #000 78% 100%),
    linear-gradient(#000,#000);
  -webkit-mask:
    radial-gradient(circle at 50% 50%, transparent 0 72%, #000 78% 100%),
    linear-gradient(#000,#000);
}

/* highlight streak */
.surface::after{
  content:"";
  position:absolute;left:12%;right:12%;top:10%;
  height:30%;
  border-radius:999px;
  background:linear-gradient(to bottom, rgba(255,255,255,.20), rgba(255,255,255,0));
  transform:rotate(-12deg);
  pointer-events:none;
  opacity:.92;
}

/* glow-only hover */
.node:hover{
  border-color:rgba(201,162,74,.44);
  box-shadow:
    var(--shadowDeep),
    0 0 0 2px rgba(201,162,74,.14),
    0 0 34px rgba(201,162,74,.18),
    inset 0 2px 0 rgba(255,255,255,.20),
    inset 0 -52px 92px rgba(0,0,0,.88);
}
.node:active{filter:brightness(.98)}

/* inner text */
.inner{
  width:100%;height:100%;
  transform:rotate(-45deg);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:10px;
  gap:6px;
  color:#fff;
}
.word{
  font-weight:980;
  letter-spacing:.6px;
  line-height:1.05;
  text-shadow:0 0 18px rgba(0,0,0,.42);
  font-size:clamp(10px, 1.15vw, 16px);
  max-width:100%;
  word-break:keep-all;
}
.code{
  font-weight:950;
  font-size:10px;
  letter-spacing:1.2px;
  opacity:.78;
}

/* core emphasis */
.core{
  border-color:rgba(201,162,74,.26);
  box-shadow:
    0 54px 170px rgba(0,0,0,.88),
    0 0 46px rgba(201,162,74,.12),
    inset 0 2px 0 rgba(255,255,255,.22),
    inset 0 -64px 110px rgba(0,0,0,.92);
}

/* ===== BOTTOM CORNERS (EXIT / HUB) — raised above bottom conflicts ===== */
.corner{
  position:fixed;
  bottom:max(92px, env(safe-area-inset-bottom)); /* raised */
  z-index:260;
  pointer-events:none;
}
.corner .dmini{pointer-events:auto}
.corner.left{left:16px}
.corner.right{right:16px}

.dmini{
  width:56px;height:56px;
  border-radius:16px;
  border:1px solid rgba(255,255,255,.14);
  background:
    radial-gradient(circle at 50% 40%, rgba(255,255,255,.08), transparent 52%),
    linear-gradient(145deg, rgba(10,12,16,.78), rgba(6,8,10,.92));
  box-shadow:var(--shadowB), 0 0 0 1px rgba(201,162,74,.10), 0 0 18px rgba(201,162,74,.10);
  display:grid;place-items:center;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
  transform:rotate(45deg);
  position:relative;
  overflow:hidden;
  transition:box-shadow .16s ease, border-color .16s ease;
}
.dmini:hover{
  border-color:rgba(201,162,74,.44);
  box-shadow:var(--shadowB), 0 0 0 2px rgba(201,162,74,.14), 0 0 30px rgba(201,162,74,.18);
}
.dmini span{
  transform:rotate(-45deg);
  font-weight:980;
  font-size:12px;
  letter-spacing:.6px;
  color:rgba(255,255,255,.92);
  user-select:none;
}
.cornerLabel{
  margin-top:10px;
  text-align:center;
  color:rgba(255,255,255,.72);
  font-size:11px;
  letter-spacing:.4px;
}

/* ===== BOTTOM PILL ===== */
.pillWrap{
  width:min(1120px,94vw);
  margin:14px auto 0;
  padding-bottom:130px;
}
.pill{
  border:1px solid rgba(255,255,255,.12);
  border-radius:22px;
  padding:14px 16px;
  background:
    radial-gradient(circle at 18% 22%, rgba(255,43,43,.10), transparent 62%),
    radial-gradient(circle at 82% 32%, rgba(90,40,120,.10), transparent 66%),
    radial-gradient(circle at 50% 92%, rgba(201,162,74,.10), transparent 62%),
    rgba(0,0,0,.16);
  box-shadow:0 26px 90px rgba(0,0,0,.55);
  color:rgba(255,255,255,.86);
  line-height:1.55;
  font-size:13.5px;
}
.pill b{color:rgba(255,255,255,.95)}
.pill .g{color:rgba(201,162,74,.80);font-weight:980}

/* ===== RESPONSIVE FIT ===== */
@media (max-width:720px){
  :root{
    --D0:196px; --D1:142px; --D2:108px; --D3:84px;
    --R1:156px; --R2:228px; --R3:292px;
    --padTop:112px;
  }
  .stage{height:min(980px,86vh)}
}
@media (max-width:520px){
  :root{
    --D0:184px; --D1:136px; --D2:104px; --D3:80px;
    --R1:146px; --R2:214px; --R3:274px;
  }
  .brandSub{display:none}
}
</style>
</head>

<body>

<div class="top" aria-label="Top controls">
  <div class="topbar">
    <div class="brandLeft" aria-label="Brand">
      <div class="brandTitle" id="brandTitle">WELCOME TO THE COMPASS</div>
      <div class="brandSub" id="brandSub">A tutorial hub: choose one concept, learn the boundary, then enter.</div>
      <div class="brandLinks" aria-label="Brand links">
        <a href="https://diamondgatebridge.com" target="_blank" rel="noopener">diamondgatebridge.com</a>
        <a href="https://cogrid.net" target="_blank" rel="noopener">cogrid.net</a>
      </div>
    </div>

    <div class="controlsRight" aria-label="Language and lens">
      <div class="seg" role="group" aria-label="Language">
        <button type="button" id="btnEN" aria-pressed="true">EN</button>
        <button type="button" id="btnZH" aria-pressed="false">中文</button>
        <button type="button" id="btnES" aria-pressed="false">ES</button>
      </div>
      <div class="seg" role="group" aria-label="Lane">
        <button type="button" id="lanePlatform" aria-pressed="true">PLATFORM</button>
        <button type="button" id="laneEngineering" aria-pressed="false">ENGINEERING</button>
      </div>
    </div>
  </div>
</div>

<div class="stage" id="stage" aria-label="Compass dial">
  <div class="sky" aria-hidden="true"></div>
  <div id="moon" class="moonGlow" aria-hidden="true"></div>

  <div class="clouds" aria-hidden="true"></div>

  <div class="slab" aria-hidden="true"></div>
  <div class="moonReflect" id="moonReflect" aria-hidden="true"></div>

  <div class="dial" aria-hidden="true"></div>

  <div class="dir16" aria-hidden="true">
    <span class="N"   data-gold="N">N</span>
    <span class="NNE" data-gold="NNE">NNE</span>
    <span class="NE"  data-gold="NE">NE</span>
    <span class="ENE" data-gold="ENE">ENE</span>
    <span class="E"   data-gold="E">E</span>
    <span class="ESE" data-gold="ESE">ESE</span>
    <span class="SE"  data-gold="SE">SE</span>
    <span class="SSE" data-gold="SSE">SSE</span>
    <span class="S"   data-gold="S">S</span>
    <span class="SSW" data-gold="SSW">SSW</span>
    <span class="SW"  data-gold="SW">SW</span>
    <span class="WSW" data-gold="WSW">WSW</span>
    <span class="W"   data-gold="W">W</span>
    <span class="WNW" data-gold="WNW">WNW</span>
    <span class="NW"  data-gold="NW">NW</span>
    <span class="NNW" data-gold="NNW">NNW</span>
  </div>

  <div class="dragons" aria-hidden="true"></div>
  <!-- nodes injected by JS -->
</div>

<div class="pillWrap" aria-label="Compass note">
  <div class="pill" id="pill">
    <b>Compass:</b> One center (<span class="g">CORE</span>) + 16 hubs. No duplicate destinations. Unbuilt hubs route to <span class="g">/404.html</span>.
  </div>
</div>

<div class="corner left" aria-label="Exit">
  <div class="dmini" id="btnExit" role="button" tabindex="0" aria-label="Exit"><span>EXIT</span></div>
  <div class="cornerLabel" id="lblExit">EXIT</div>
</div>
<div class="corner right" aria-label="Hub">
  <div class="dmini" id="btnHub" role="button" tabindex="0" aria-label="Hub"><span>HUB</span></div>
  <div class="cornerLabel" id="lblHub">HUB</div>
</div>

<script>
(function(){
  "use strict";

  // ===== Canon state (gd_* only; lane URL-only) =====
  var qs=new URLSearchParams(location.search);
  var LS=window.localStorage;

  var lang  = qs.get("lang")  || LS.getItem("gd_lang")  || "en";
  var style = qs.get("style") || LS.getItem("gd_style") || "informal";
  var time  = qs.get("time")  || LS.getItem("gd_time")  || "now";
  var depth = qs.get("depth") || LS.getItem("gd_depth") || "explore";
  var lane  = qs.get("lane")  || "platform"; // URL-only

  if(lang!=="en" && lang!=="zh" && lang!=="es") lang="en";
  if(style!=="informal" && style!=="formal") style="informal";
  if(time==="trajectory") time="post";
  if(time!=="origin" && time!=="now" && time!=="post") time="now";
  if(depth!=="explore" && depth!=="learn") depth="explore";
  if(lane!=="platform" && lane!=="engineering") lane="platform";

  try{
    LS.setItem("gd_lang",lang);
    LS.setItem("gd_style",style);
    LS.setItem("gd_time",time);
    LS.setItem("gd_depth",depth);
  }catch(e){}

  document.documentElement.lang=(lang==="zh")?"zh":(lang==="es")?"es":"en";

  function q(over){
    var p=new URLSearchParams();
    p.set("lang",(over&&over.lang)?over.lang:lang);
    p.set("style",(over&&over.style)?over.style:style);
    p.set("time",(over&&over.time)?over.time:time);
    p.set("depth",(over&&over.depth)?over.depth:depth);
    var L=(over&&over.lane)?over.lane:lane;
    if(L==="platform"||L==="engineering") p.set("lane",L);
    return "?"+p.toString();
  }

  function go(path){ window.location.href = path + q(); }
  function setPressed(btn, on){ btn.setAttribute("aria-pressed", on ? "true" : "false"); }

  // ===== Moon phase engine (full cycle + glow + reflection strength) =====
  (function(){
    var moon = document.getElementById("moon");
    var mr = document.getElementById("moonReflect");

    var phases = [
      {name:"new",   mask:1, shift:0,   glow:"moonNew",  ref:0.06},
      {name:"waxC",  mask:1, shift:-35, glow:"moonDim",  ref:0.10},
      {name:"first", mask:1, shift:-50, glow:"moonDim",  ref:0.12},
      {name:"waxG",  mask:1, shift:-15, glow:"moonDim",  ref:0.14},
      {name:"full",  mask:0, shift:0,   glow:"moonGlow", ref:0.22},
      {name:"wanG",  mask:1, shift:15,  glow:"moonDim",  ref:0.14},
      {name:"last",  mask:1, shift:50,  glow:"moonDim",  ref:0.12},
      {name:"wanC",  mask:1, shift:35,  glow:"moonDim",  ref:0.10}
    ];

    var idx = parseInt(LS.getItem("moonPhaseIndex") || "0", 10);
    idx = (idx + 1) % phases.length;
    LS.setItem("moonPhaseIndex", String(idx));

    var ph = phases[idx];

    moon.className = ph.glow;
    moon.style.setProperty("--maskOn", ph.mask ? "1" : "0");
    moon.style.setProperty("--phaseShift", (ph.shift||0) + "%");

    // reflection strength (CSS variable via inline style)
    mr.style.setProperty("--moonRef", String(ph.ref));
  })();

  // ===== ROUTING (NO DUPLICATES; unknown/unbuilt → 404) =====
  var CORE_ROUTE = "/index-core/index.html";
  var EXIT_ROUTE = "/door/";
  var HUB_ROUTE  = "/home/";
  var PLACEHOLDER_404 = "/404.html";

  // N/E/S/W meaning locked to your instruction:
  // N=LAWS, E=ENERGY, S=FINANCE, W=GOVERNANCE
  // Prelude removed from compass. Doctrine fixed.
  var ROUTES_RAW = [
    {tier:1, code:"N",  label:{platform:{en:"LAWS",zh:"法则",es:"LEYES"}, engineering:{en:"BOUNDS",zh:"边界",es:"LÍMIT"}}, href:"/laws/"},
    {tier:1, code:"E",  label:{platform:{en:"ENERGY",zh:"能源",es:"ENERGÍA"}, engineering:{en:"POWER",zh:"功率",es:"PWR"}}, href:"/explore/frontier/energy/"},
    {tier:1, code:"S",  label:{platform:{en:"FINANCE",zh:"金融",es:"FINANZAS"}, engineering:{en:"CAPITAL",zh:"资本",es:"CAP"}}, href:"/finance/"},
    {tier:1, code:"W",  label:{platform:{en:"GOVERNANCE",zh:"治理",es:"GOBERNANZA"}, engineering:{en:"EXEC",zh:"执行",es:"EJEC"}}, href:"/governance/"},

    {tier:2, code:"NE", label:{platform:{en:"PRODUCTS",zh:"产品",es:"PRODUCTOS"}, engineering:{en:"DEPLOY",zh:"部署",es:"DESPL"}}, href:"/products/"},
    {tier:2, code:"SE", label:{platform:{en:"RESEARCH",zh:"研究",es:"INVEST."}, engineering:{en:"R&D",zh:"研发",es:"I+D"}}, href:"/research/"},
    {tier:2, code:"SW", label:{platform:{en:"EXPLORE",zh:"探索",es:"EXPLORAR"}, engineering:{en:"MODELS",zh:"模型",es:"MODELOS"}}, href:"/explore/"},
    {tier:2, code:"NW", label:{platform:{en:"DOCTRINE",zh:"教义",es:"DOCTRINA"}, engineering:{en:"CCD",zh:"CCD",es:"CCD"}}, href:"/products/capital-doctrine/"},

    {tier:3, code:"NNE",label:{platform:{en:"EDUCATION",zh:"教育",es:"EDUCACIÓN"}, engineering:{en:"ESL",zh:"ESL",es:"ESL"}}, href:"/products/education/"},
    {tier:3, code:"ENE",label:{platform:{en:"FRONTIER",zh:"前沿",es:"FRONTERA"}, engineering:{en:"FRONTIER",zh:"前沿",es:"FRONTERA"}}, href:"/explore/frontier/"},
    {tier:3, code:"ESE",label:{platform:{en:"INFRA",zh:"基建",es:"INFRA"}, engineering:{en:"SUBST",zh:"替代",es:"SUBST"}}, href:"/explore/infrastructure/"},
    {tier:3, code:"SSE",label:{platform:{en:"AGRICULTURE",zh:"农业",es:"AGRO"}, engineering:{en:"FOOD",zh:"食物",es:"ALIM"}}, href:"/products/agriculture/"},
    {tier:3, code:"SSW",label:{platform:{en:"GAUGES",zh:"量规",es:"MEDIDORES"}, engineering:{en:"SIGNALS",zh:"信号",es:"SEÑALES"}}, href:"/gauges/"},
    {tier:3, code:"WSW",label:{platform:{en:"VISION",zh:"愿景",es:"VISIÓN"}, engineering:{en:"MAP",zh:"映射",es:"MAP"}}, href:"/explore/frontier/vision/"},
    {tier:3, code:"WNW",label:{platform:{en:"LATTICE",zh:"晶格",es:"LATTICE"}, engineering:{en:"256",zh:"256态",es:"256"}}, href:"/explore/frontier/lattice/"},
    {tier:3, code:"NNW",label:{platform:{en:"SHIMMER",zh:"闪烁",es:"SHIMMER"}, engineering:{en:"S.H.I.M.M.E.R.",zh:"SHIMMER",es:"SHIMMER"}}, href:"/explore/frontier/shimmer/"}
  ];

  function normalizeRoutes(list){
    var seen = Object.create(null);
    var out = [];
    for(var i=0;i<list.length;i++){
      var it=list[i];
      var h=(it.href||"").trim();
      if(!h) h=PLACEHOLDER_404;
      if(seen[h]) h=PLACEHOLDER_404;
      seen[h]=true;
      out.push({tier:it.tier, code:it.code, label:it.label, href:h});
    }
    return out;
  }
  var ROUTES = normalizeRoutes(ROUTES_RAW);

  function pick3(en,zh,es){ return (lang==="zh")?zh:(lang==="es")?es:en; }

  function labelFor(it){
    var pack = (lane==="engineering") ? it.label.engineering : it.label.platform;
    return pick3(pack.en, pack.zh, pack.es);
  }

  var stage=document.getElementById("stage");

  function mkNode(word, code, cls){
    var d=document.createElement("div");
    d.className="node "+cls;
    d.setAttribute("role","button");
    d.tabIndex=0;

    var inner=document.createElement("div");
    inner.className="inner";

    var w=document.createElement("div");
    w.className="word";
    w.textContent=word;

    var c=document.createElement("div");
    c.className="code";
    c.textContent=code;

    inner.appendChild(w);
    inner.appendChild(c);
    d.appendChild(inner);

    return d;
  }

  function layout(){
    stage.querySelectorAll(".node").forEach(function(n){ n.remove(); });

    var rect=stage.getBoundingClientRect();
    var cx=rect.width/2, cy=rect.height/2;

    var R1=parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--R1"))||168;
    var R2=parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--R2"))||246;
    var R3=parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--R3"))||314;

    // CORE
    var core=mkNode(pick3("CORE","核心","NÚCLEO"), "INDEX", "core surface");
    core.style.left=cx+"px"; core.style.top=cy+"px";
    core.addEventListener("click", function(){ go(CORE_ROUTE); }, {passive:true});
    core.addEventListener("keydown", function(e){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); go(CORE_ROUTE); }});
    stage.appendChild(core);

    var t1=[], t2=[], t3=[];
    for(var i=0;i<ROUTES.length;i++){
      if(ROUTES[i].tier===1) t1.push(ROUTES[i]);
      else if(ROUTES[i].tier===2) t2.push(ROUTES[i]);
      else t3.push(ROUTES[i]);
    }

    function byCode(arr, code){ for(var i=0;i<arr.length;i++) if(arr[i].code===code) return arr[i]; return null; }

    // Tier 1 pinned N/E/S/W
    var ordered=[byCode(t1,"N"),byCode(t1,"E"),byCode(t1,"S"),byCode(t1,"W")].filter(Boolean);
    var ang=[-Math.PI/2, 0, Math.PI/2, Math.PI];
    for(var i=0;i<ordered.length;i++){
      var it=ordered[i];
      var x=cx + R1*Math.cos(ang[i]);
      var y=cy + R1*Math.sin(ang[i]);
      var n=mkNode(labelFor(it), it.code, "l1 surface");
      n.style.left=x+"px"; n.style.top=y+"px";
      (function(path, el){
        el.addEventListener("click", function(){ go(path); }, {passive:true});
        el.addEventListener("keydown", function(e){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); go(path); }});
      })(it.href, n);
      stage.appendChild(n);
    }

    // Tier 2 (diagonals) start at -45°
    for(var i=0;i<t2.length;i++){
      var it=t2[i];
      var a=(i/t2.length)*(Math.PI*2) - Math.PI/4;
      var x=cx + R2*Math.cos(a);
      var y=cy + R2*Math.sin(a);
      var n=mkNode(labelFor(it), it.code, "l2 surface");
      n.style.left=x+"px"; n.style.top=y+"px";
      (function(path, el){
        el.addEventListener("click", function(){ go(path); }, {passive:true});
        el.addEventListener("keydown", function(e){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); go(path); }});
      })(it.href, n);
      stage.appendChild(n);
    }

    // Tier 3 (8) start at -67.5°
    for(var i=0;i<t3.length;i++){
      var it=t3[i];
      var a=(i/t3.length)*(Math.PI*2) - Math.PI*(3/8);
      var x=cx + R3*Math.cos(a);
      var y=cy + R3*Math.sin(a);
      var n=mkNode(labelFor(it), it.code, "l3 surface");
      n.style.left=x+"px"; n.style.top=y+"px";
      (function(path, el){
        el.addEventListener("click", function(){ go(path); }, {passive:true});
        el.addEventListener("keydown", function(e){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); go(path); }});
      })(it.href, n);
      stage.appendChild(n);
    }
  }

  function safeLayout(){
    var r=stage.getBoundingClientRect();
    if(r.width<10||r.height<10){ requestAnimationFrame(safeLayout); return; }
    layout();
  }

  // ===== Language (NO reload) =====
  var btnEN=document.getElementById("btnEN");
  var btnZH=document.getElementById("btnZH");
  var btnES=document.getElementById("btnES");
  setPressed(btnEN, lang==="en");
  setPressed(btnZH, lang==="zh");
  setPressed(btnES, lang==="es");

  function paintHeader(){
    var laneWord = (lane==="engineering")
      ? pick3("ENGINEERING","工程","INGENIERÍA")
      : pick3("PLATFORM","平台","PLATAFORMA");

    if(lang==="zh"){
      document.getElementById("brandTitle").textContent="欢迎来到指南针";
      document.getElementById("brandSub").textContent="教程页：选一个概念，理解边界，然后进入 · 透镜："+laneWord;
      document.getElementById("lblExit").textContent="退出";
      document.getElementById("lblHub").textContent="枢纽";
      document.querySelector("#btnExit span").textContent="退出";
      document.querySelector("#btnHub span").textContent="枢纽";
      document.getElementById("pill").innerHTML="<b>指南针：</b>一个中心（<span class='g'>核心</span>）+ 16 枢纽。禁止重复目的地。未建页面暂时路由到 <span class='g'>/404.html</span>。";
    }else if(lang==="es"){
      document.getElementById("brandTitle").textContent="BIENVENIDO A LA BRÚJULA";
      document.getElementById("brandSub").textContent="Tutorial: elige un concepto, entiende el límite, y entra · Lente: "+laneWord;
      document.getElementById("lblExit").textContent="SALIR";
      document.getElementById("lblHub").textContent="HUB";
      document.querySelector("#btnExit span").textContent="SALIR";
      document.querySelector("#btnHub span").textContent="HUB";
      document.getElementById("pill").innerHTML="<b>Brújula:</b> Un centro (<span class='g'>CORE</span>) + 16 hubs. Sin destinos duplicados. No construido → <span class='g'>/404.html</span>.";
    }else{
      document.getElementById("brandTitle").textContent="WELCOME TO THE COMPASS";
      document.getElementById("brandSub").textContent="Tutorial: choose one concept, learn the boundary, then enter · Lens: "+laneWord;
      document.getElementById("lblExit").textContent="EXIT";
      document.getElementById("lblHub").textContent="HUB";
      document.querySelector("#btnExit span").textContent="EXIT";
      document.querySelector("#btnHub span").textContent="HUB";
      document.getElementById("pill").innerHTML="<b>Compass:</b> One center (<span class='g'>CORE</span>) + 16 hubs. No duplicate destinations. Unbuilt hubs route to <span class='g'>/404.html</span>.";
    }
  }

  function setLang(next){
    if(next!=="en" && next!=="zh" && next!=="es") next="en";
    lang=next;
    try{ LS.setItem("gd_lang",lang);}catch(e){}
    history.replaceState({}, "", location.pathname + q({lang:lang}));
    setPressed(btnEN, lang==="en");
    setPressed(btnZH, lang==="zh");
    setPressed(btnES, lang==="es");
    paintHeader();
    safeLayout();
  }
  btnEN.addEventListener("click", function(){ setLang("en"); }, {passive:true});
  btnZH.addEventListener("click", function(){ setLang("zh"); }, {passive:true});
  btnES.addEventListener("click", function(){ setLang("es"); }, {passive:true});

  // ===== Lane (NO reload; URL-only) =====
  var btnLP=document.getElementById("lanePlatform");
  var btnLE=document.getElementById("laneEngineering");
  setPressed(btnLP, lane==="platform");
  setPressed(btnLE, lane==="engineering");

  function setLane(next){
    if(next!=="platform" && next!=="engineering") next="platform";
    lane=next;
    history.replaceState({}, "", location.pathname + q({lane:lane}));
    setPressed(btnLP, lane==="platform");
    setPressed(btnLE, lane==="engineering");
    paintHeader();
    safeLayout();
  }
  btnLP.addEventListener("click", function(){ setLane("platform"); }, {passive:true});
  btnLE.addEventListener("click", function(){ setLane("engineering"); }, {passive:true});

  // ===== Corners =====
  function bindCorner(id, path){
    var el=document.getElementById(id);
    if(!el) return;
    function act(){ go(path); }
    el.addEventListener("click", act, {passive:true});
    el.addEventListener("keydown", function(e){
      if(e.key==="Enter"||e.key===" "){ e.preventDefault(); act(); }
    });
  }
  bindCorner("btnExit", EXIT_ROUTE);
  bindCorner("btnHub", HUB_ROUTE);

  // ===== Init =====
  paintHeader();
  requestAnimationFrame(safeLayout);
  window.addEventListener("resize", function(){ safeLayout(); }, {passive:true});

})();
</script>

</body>
</html>
