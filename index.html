<!doctype html>
<!-- TNT v5-L1 — /index.html
     COMPASS · GEM DIAL (OBSIDIAN) · LAYERED BUILD
     L1: SKY+MOON+WATER DIAL ONLY (NO CLOUDS, NO DRAGONS)
     EN-ONLY (visual calibration phase)
     RULES:
       - No external assets
       - No inline onclick; addEventListener only
       - Canon state keys only: gd_lang/gd_style/gd_time/gd_depth (lane URL-only)
       - ui.css owns html/body background (no overrides)
-->

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Compass · DiamondGateBridge</title>

<link rel="stylesheet" href="/assets/ui.css"/>
<link rel="stylesheet" href="/assets/branch.css"/>
<script defer src="/assets/instruments.js"></script>

<style>
a{color:inherit;text-decoration:none}
body{margin:0}
body::before,body::after{pointer-events:none!important}

:root{
  /* ===== GEOMETRY ===== */
  --D0:210px;  /* CORE (dominant) */
  --D1:150px;  /* Cardinals */
  --D2:112px;  /* Diagonals */
  --D3:86px;   /* Outer 8 */

  --R1:168px;
  --R2:246px;
  --R3:314px;

  --padTop:102px;

  /* ===== MATERIAL ===== */
  --ink:rgba(255,255,255,.94);
  --mut:rgba(255,255,255,.78);

  --onyx0:rgba(6,8,10,.96);
  --onyx1:rgba(10,12,16,.88);

  --crimson:rgba(120,0,22,.44);
  --festival:rgba(255,43,43,.26);
  --opalV:rgba(90,40,120,.18);

  --gold:rgba(201,162,74,.58);
  --goldGlow:rgba(201,162,74,.22);

  --shadowDeep:0 44px 140px rgba(0,0,0,.82);
  --shadowA:0 28px 110px rgba(0,0,0,.70);
  --shadowB:0 18px 60px rgba(0,0,0,.55);
}

/* ===== TOP BAR (minimal, EN-only) ===== */
.top{
  position:fixed;top:14px;left:0;right:0;
  padding:0 14px;
  z-index:260;
  pointer-events:none;
}
.topbar{
  pointer-events:auto;
  width:min(1120px,96vw);
  margin:0 auto;
  border:1px solid rgba(255,255,255,.12);
  border-radius:22px;
  padding:10px 12px;
  background:
    radial-gradient(circle at 18% 18%, rgba(201,162,74,.10), transparent 62%),
    radial-gradient(circle at 82% 30%, rgba(255,43,43,.10), transparent 64%),
    linear-gradient(145deg, rgba(8,10,14,.92), rgba(4,6,10,.96));
  box-shadow:var(--shadowA), inset 0 0 0 1px rgba(201,162,74,.12);
  backdrop-filter:blur(10px);
  display:flex;align-items:center;justify-content:space-between;
  gap:10px;
}
.brandLeft{display:flex;align-items:center;gap:12px;flex-wrap:wrap;min-width:0}
.brandTitle{font-weight:980;letter-spacing:.6px;font-size:14px;color:rgba(255,255,255,.94);white-space:nowrap}
.brandSub{font-size:12px;color:rgba(255,255,255,.72);letter-spacing:.2px;white-space:nowrap}
.brandLinks{display:flex;gap:10px;flex-wrap:wrap;font-size:12px;color:rgba(255,255,255,.70)}
.brandLinks a{padding:6px 10px;border-radius:999px;border:1px solid rgba(201,162,74,.16);background:rgba(0,0,0,.14)}
.controlsRight{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:flex-end}
.seg{
  display:inline-flex;gap:0;overflow:hidden;border-radius:16px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(0,0,0,.18);
  box-shadow:var(--shadowB);
}
.seg button{
  appearance:none;border:0;background:transparent;
  color:rgba(255,255,255,.78);
  padding:10px 12px;min-height:42px;
  font-weight:980;font-size:13px;letter-spacing:.25px;
  cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation;
}
.seg button[aria-pressed="true"]{
  color:rgba(255,255,255,.95);
  background:
    radial-gradient(circle at 50% 50%, rgba(201,162,74,.14), transparent 62%),
    linear-gradient(180deg, rgba(255,43,43,.10), rgba(0,0,0,.10));
  box-shadow: inset 0 0 0 1px rgba(201,162,74,.14), inset 0 -10px 22px rgba(201,162,74,.10);
}

/* ===== STAGE ===== */
.stage{
  position:relative;
  width:min(1200px,94vw);
  height:min(1200px,86vh);
  margin:var(--padTop) auto 0;
  pointer-events:none;
  border-radius:34px;
}

/* LAYER CANVASES (separate layers to prevent “competing UI”) */
.layer{
  position:absolute;inset:0;
  pointer-events:none;
  border-radius:34px;
  overflow:hidden;
}
#bgCanvas{z-index:0}
#dialCanvas{z-index:1}

/* Compass slab (dark crystal plate) */
.slab{
  position:absolute;left:50%;top:50%;
  transform:translate(-50%,-50%);
  width:min(980px,92vw);
  height:min(980px,92vw);
  border-radius:44px;
  pointer-events:none;
  z-index:2;
  border:1px solid rgba(255,255,255,.10);
  background:
    radial-gradient(circle at 30% 22%, rgba(255,255,255,.08), transparent 55%),
    radial-gradient(circle at 78% 28%, rgba(255,43,43,.08), transparent 60%),
    radial-gradient(circle at 70% 82%, rgba(90,40,120,.08), transparent 64%),
    linear-gradient(160deg, rgba(10,12,16,.88), rgba(6,8,10,.96));
  box-shadow:
    0 70px 240px rgba(0,0,0,.62),
    inset 0 2px 0 rgba(255,255,255,.08),
    inset 0 -70px 140px rgba(0,0,0,.65);
  opacity:.92;
}

/* Nodes */
.node{
  position:absolute;left:50%;top:50%;
  transform:translate(-50%,-50%) rotate(45deg);
  cursor:pointer;pointer-events:auto;
  overflow:hidden;border:1px solid rgba(255,255,255,.18);
  transition:box-shadow .16s ease, border-color .16s ease, filter .16s ease;
  z-index:10;border-radius:22px;
}
.core{width:var(--D0);height:var(--D0);z-index:12;border-radius:26px}
.l1{width:var(--D1);height:var(--D1)}
.l2{width:var(--D2);height:var(--D2)}
.l3{width:var(--D3);height:var(--D3);border-radius:18px}

.surface{
  background:
    radial-gradient(circle at 20% 18%, rgba(255,255,255,.28), transparent 46%),
    radial-gradient(circle at 78% 22%, var(--festival), transparent 62%),
    radial-gradient(circle at 74% 84%, var(--opalV), transparent 64%),
    radial-gradient(circle at 28% 84%, var(--crimson), transparent 70%),
    linear-gradient(160deg, var(--onyx1), var(--onyx0));
  box-shadow:
    var(--shadowDeep),
    0 0 24px rgba(255,43,43,.08),
    inset 0 2px 0 rgba(255,255,255,.18),
    inset 0 -52px 92px rgba(0,0,0,.88);
}
.surface::before{
  content:"";
  position:absolute;inset:0;border-radius:inherit;pointer-events:none;
  box-shadow: inset 0 0 0 1px rgba(201,162,74,.18);
  background:
    repeating-linear-gradient(45deg, rgba(201,162,74,.08) 0 1px, transparent 1px 18px),
    repeating-linear-gradient(-45deg, rgba(201,162,74,.06) 0 1px, transparent 1px 18px);
  opacity:.34;
  /* keep inlay in trim zone only */
  mask:
    radial-gradient(circle at 50% 50%, transparent 0 70%, #000 78% 100%),
    linear-gradient(#000,#000);
  -webkit-mask:
    radial-gradient(circle at 50% 50%, transparent 0 70%, #000 78% 100%),
    linear-gradient(#000,#000);
}
.surface::after{
  content:"";
  position:absolute;left:12%;right:12%;top:10%;
  height:30%;
  border-radius:999px;
  background:linear-gradient(to bottom, rgba(255,255,255,.22), rgba(255,255,255,0));
  transform:rotate(-12deg);
  pointer-events:none;
  opacity:.92;
}
.node:hover{
  border-color:rgba(201,162,74,.44);
  box-shadow:
    var(--shadowDeep),
    0 0 0 2px rgba(201,162,74,.14),
    0 0 34px rgba(201,162,74,.18),
    inset 0 2px 0 rgba(255,255,255,.20),
    inset 0 -52px 92px rgba(0,0,0,.88);
}
.node:active{filter:brightness(.98)}

/* Inner */
.inner{
  width:100%;height:100%;
  transform:rotate(-45deg);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  text-align:center;
  padding:10px;
  gap:6px;
  color:#fff;
  pointer-events:none;
}
.word{
  font-weight:980;
  letter-spacing:.6px;
  line-height:1.05;
  text-shadow:0 0 18px rgba(0,0,0,.42);
  font-size:clamp(10px, 1.15vw, 16px);
}
.code{
  font-weight:950;
  font-size:10px;
  letter-spacing:1.2px;
  opacity:.78;
}

/* Corner buttons */
.corner{
  position:fixed;
  bottom:max(16px, env(safe-area-inset-bottom));
  z-index:260;
  pointer-events:none;
}
.corner .dmini{pointer-events:auto}
.corner.left{left:16px}
.corner.right{right:16px}
.dmini{
  width:56px;height:56px;
  border-radius:16px;
  border:1px solid rgba(255,255,255,.14);
  background:
    radial-gradient(circle at 50% 40%, rgba(255,255,255,.08), transparent 52%),
    linear-gradient(145deg, rgba(10,12,16,.78), rgba(6,8,10,.92));
  box-shadow:var(--shadowB), 0 0 0 1px rgba(201,162,74,.10), 0 0 18px rgba(201,162,74,.10);
  display:grid;place-items:center;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
  transform:rotate(45deg);
  position:relative;
  overflow:hidden;
  transition:box-shadow .16s ease, border-color .16s ease;
}
.dmini:hover{
  border-color:rgba(201,162,74,.44);
  box-shadow:var(--shadowB), 0 0 0 2px rgba(201,162,74,.14), 0 0 30px rgba(201,162,74,.18);
}
.dmini span{
  transform:rotate(-45deg);
  font-weight:980;
  font-size:12px;
  letter-spacing:.6px;
  color:rgba(255,255,255,.92);
  user-select:none;
}
.cornerLabel{
  margin-top:10px;
  text-align:center;
  color:rgba(255,255,255,.72);
  font-size:11px;
  letter-spacing:.4px;
}

/* Mobile */
@media (max-width:720px){
  :root{
    --D0:196px; --D1:142px; --D2:108px; --D3:84px;
    --R1:156px; --R2:228px; --R3:292px;
    --padTop:112px;
  }
  .stage{height:min(1200px,86vh)}
  .brandSub{display:none}
}
</style>
</head>

<body>

<div class="top" aria-label="Top controls">
  <div class="topbar">
    <div class="brandLeft" aria-label="Brand">
      <div class="brandTitle">WELCOME TO THE COMPASS</div>
      <div class="brandSub">Visual calibration · L1 (sky+moon+water)</div>
      <div class="brandLinks" aria-label="Brand links">
        <a href="https://diamondgatebridge.com" target="_blank" rel="noopener">diamondgatebridge.com</a>
        <a href="https://cogrid.net" target="_blank" rel="noopener">cogrid.net</a>
      </div>
    </div>

    <div class="controlsRight" aria-label="Lens">
      <div class="seg" role="group" aria-label="Lane">
        <button type="button" id="lanePlatform" aria-pressed="true">PLATFORM</button>
        <button type="button" id="laneEngineering" aria-pressed="false">ENGINEERING</button>
      </div>
    </div>
  </div>
</div>

<div class="stage" id="stage" aria-label="Compass">
  <canvas class="layer" id="bgCanvas"></canvas>
  <canvas class="layer" id="dialCanvas"></canvas>
  <div class="slab" aria-hidden="true"></div>
  <!-- nodes injected -->
</div>

<div class="corner left" aria-label="Exit">
  <div class="dmini" id="btnExit" role="button" tabindex="0" aria-label="Exit"><span>EXIT</span></div>
  <div class="cornerLabel">EXIT</div>
</div>
<div class="corner right" aria-label="Hub">
  <div class="dmini" id="btnHub" role="button" tabindex="0" aria-label="Hub"><span>HUB</span></div>
  <div class="cornerLabel">HUB</div>
</div>

<script>
(function(){
  "use strict";

  // ===== state (gd_* only; lane URL-only) =====
  var qs=new URLSearchParams(location.search);
  var LS=window.localStorage;

  var lang  = "en"; // EN-only calibration phase
  var style = qs.get("style") || LS.getItem("gd_style") || "informal";
  var time  = qs.get("time")  || LS.getItem("gd_time")  || "now";
  var depth = qs.get("depth") || LS.getItem("gd_depth") || "explore";
  var lane  = qs.get("lane")  || "platform"; // URL-only

  if(style!=="informal" && style!=="formal") style="informal";
  if(time==="trajectory") time="post";
  if(time!=="origin" && time!=="now" && time!=="post") time="now";
  if(depth!=="explore" && depth!=="learn") depth="explore";
  if(lane!=="platform" && lane!=="engineering") lane="platform";

  try{
    LS.setItem("gd_lang","en");
    LS.setItem("gd_style",style);
    LS.setItem("gd_time",time);
    LS.setItem("gd_depth",depth);
  }catch(e){}

  document.documentElement.lang="en";

  function q(over){
    var p=new URLSearchParams();
    p.set("lang","en");
    p.set("style",(over&&over.style)?over.style:style);
    p.set("time",(over&&over.time)?over.time:time);
    p.set("depth",(over&&over.depth)?over.depth:depth);
    var L=(over&&over.lane)?over.lane:lane;
    if(L==="platform"||L==="engineering") p.set("lane",L);
    return "?"+p.toString();
  }
  function go(path){ window.location.href = path + q(); }

  // ===== routing =====
  var CORE_ROUTE="/index-core/index.html";
  var EXIT_ROUTE="/door/";
  var HUB_ROUTE="/home/";
  var PLACEHOLDER_404="/404.html";

  var ROUTES_RAW=[
    {tier:1, code:"N",  label:"LAWS",       href:"/laws/"},
    {tier:1, code:"E",  label:"ENERGY",     href:"/explore/frontier/energy/"},
    {tier:1, code:"S",  label:"FINANCE",    href:"/finance/"},
    {tier:1, code:"W",  label:"GOVERNANCE", href:"/governance/"},
    {tier:2, code:"NE", label:"PRODUCTS",   href:"/products/"},
    {tier:2, code:"SE", label:"RESEARCH",   href:"/research/"},
    {tier:2, code:"SW", label:"EXPLORE",    href:"/explore/"},
    {tier:2, code:"NW", label:"DOCTRINE",   href:"/products/capital-doctrine/"},
    {tier:3, code:"NNE",label:"EDUCATION",  href:"/products/education/"},
    {tier:3, code:"ENE",label:"FRONTIER",   href:"/explore/frontier/"},
    {tier:3, code:"ESE",label:"INFRA",      href:"/explore/infrastructure/"},
    {tier:3, code:"SSE",label:"AGRICULTURE",href:"/products/agriculture/"},
    {tier:3, code:"SSW",label:"GAUGES",     href:"/gauges/"},
    {tier:3, code:"WSW",label:"VISION",     href:"/explore/frontier/vision/"},
    {tier:3, code:"WNW",label:"LATTICE",    href:"/explore/frontier/lattice/"},
    {tier:3, code:"NNW",label:"SHIMMER",    href:"/explore/frontier/shimmer/"}
  ];
  function normalizeRoutes(list){
    var seen=Object.create(null), out=[];
    for(var i=0;i<list.length;i++){
      var it=list[i];
      var h=(it.href||"").trim();
      if(!h) h=PLACEHOLDER_404;
      if(seen[h]) h=PLACEHOLDER_404;
      seen[h]=true;
      out.push({tier:it.tier, code:it.code, label:it.label, href:h});
    }
    return out;
  }
  var ROUTES=normalizeRoutes(ROUTES_RAW);

  // ===== nodes =====
  var stage=document.getElementById("stage");
  function mkNode(word, code, cls){
    var d=document.createElement("div");
    d.className="node surface "+cls;
    d.setAttribute("role","button");
    d.tabIndex=0;

    var inner=document.createElement("div");
    inner.className="inner";

    var w=document.createElement("div");
    w.className="word";
    w.textContent=word;

    var c=document.createElement("div");
    c.className="code";
    c.textContent=code;

    inner.appendChild(w);
    inner.appendChild(c);
    d.appendChild(inner);
    return d;
  }

  function layout(){
    stage.querySelectorAll(".node").forEach(function(n){ n.remove(); });

    var rect=stage.getBoundingClientRect();
    var cx=rect.width/2, cy=rect.height/2;

    var R1=parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--R1"))||168;
    var R2=parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--R2"))||246;
    var R3=parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--R3"))||314;

    // CORE
    var core=mkNode("CORE","INDEX","core");
    core.style.left=cx+"px"; core.style.top=cy+"px";
    core.addEventListener("click", function(){ go(CORE_ROUTE); }, {passive:true});
    core.addEventListener("keydown", function(e){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); go(CORE_ROUTE); }});
    stage.appendChild(core);

    var t1=[],t2=[],t3=[];
    for(var i=0;i<ROUTES.length;i++){
      if(ROUTES[i].tier===1) t1.push(ROUTES[i]);
      else if(ROUTES[i].tier===2) t2.push(ROUTES[i]);
      else t3.push(ROUTES[i]);
    }

    function byCode(arr, code){ for(var i=0;i<arr.length;i++) if(arr[i].code===code) return arr[i]; return null; }

    var ordered=[byCode(t1,"N"),byCode(t1,"E"),byCode(t1,"S"),byCode(t1,"W")].filter(Boolean);
    var ang=[-Math.PI/2, 0, Math.PI/2, Math.PI];

    for(var i=0;i<ordered.length;i++){
      var it=ordered[i];
      var x=cx + R1*Math.cos(ang[i]);
      var y=cy + R1*Math.sin(ang[i]);
      var n=mkNode(it.label, it.code, "l1");
      n.style.left=x+"px"; n.style.top=y+"px";
      (function(path, el){
        el.addEventListener("click", function(){ go(path); }, {passive:true});
        el.addEventListener("keydown", function(e){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); go(path); }});
      })(it.href, n);
      stage.appendChild(n);
    }

    for(var i=0;i<t2.length;i++){
      var it=t2[i];
      var a=(i/t2.length)*(Math.PI*2) - Math.PI/4;
      var x=cx + R2*Math.cos(a);
      var y=cy + R2*Math.sin(a);
      var n=mkNode(it.label, it.code, "l2");
      n.style.left=x+"px"; n.style.top=y+"px";
      (function(path, el){
        el.addEventListener("click", function(){ go(path); }, {passive:true});
        el.addEventListener("keydown", function(e){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); go(path); }});
      })(it.href, n);
      stage.appendChild(n);
    }

    for(var i=0;i<t3.length;i++){
      var it=t3[i];
      var a=(i/t3.length)*(Math.PI*2) - Math.PI*(3/8);
      var x=cx + R3*Math.cos(a);
      var y=cy + R3*Math.sin(a);
      var n=mkNode(it.label, it.code, "l3");
      n.style.left=x+"px"; n.style.top=y+"px";
      (function(path, el){
        el.addEventListener("click", function(){ go(path); }, {passive:true});
        el.addEventListener("keydown", function(e){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); go(path); }});
      })(it.href, n);
      stage.appendChild(n);
    }
  }

  function bindCorner(id, path){
    var el=document.getElementById(id);
    function act(){ go(path); }
    el.addEventListener("click", act, {passive:true});
    el.addEventListener("keydown", function(e){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); act(); }});
  }
  bindCorner("btnExit", EXIT_ROUTE);
  bindCorner("btnHub", HUB_ROUTE);

  // ===== lane toggle (URL-only, no reload) =====
  function setPressed(btn, on){ btn.setAttribute("aria-pressed", on ? "true" : "false"); }
  var btnLP=document.getElementById("lanePlatform");
  var btnLE=document.getElementById("laneEngineering");
  setPressed(btnLP, lane==="platform");
  setPressed(btnLE, lane==="engineering");

  function setLane(next){
    if(next!=="platform" && next!=="engineering") next="platform";
    lane=next;
    history.replaceState({}, "", location.pathname + q({lane:lane}));
    setPressed(btnLP, lane==="platform");
    setPressed(btnLE, lane==="engineering");
  }
  btnLP.addEventListener("click", function(){ setLane("platform"); }, {passive:true});
  btnLE.addEventListener("click", function(){ setLane("engineering"); }, {passive:true});

  // ===== L1 visuals: sky + moon phases + water dial =====
  var bg=document.getElementById("bgCanvas");
  var dial=document.getElementById("dialCanvas");
  var bgCtx=bg.getContext("2d");
  var dCtx=dial.getContext("2d");

  function resize(){
    var r=stage.getBoundingClientRect();
    bg.width=Math.max(1, Math.floor(r.width));
    bg.height=Math.max(1, Math.floor(r.height));
    dial.width=bg.width;
    dial.height=bg.height;
  }

  // moon phase increments on each visit
  function getMoonPhase(){
    var k="gd_moon_phase_v1"; // NOT gd_* (do not persist). Use session only.
    // Use sessionStorage so it changes per return without polluting LS.
    var v=0;
    try{
      v=parseInt(sessionStorage.getItem(k)||"0",10);
      if(!isFinite(v)) v=0;
      v=(v+1)%8;
      sessionStorage.setItem(k,String(v));
    }catch(e){ v=(Math.floor(Math.random()*8))%8; }
    return v;
  }
  var moonPhase=getMoonPhase();

  function drawMoon(ctx, x,y, radius, phase){
    // base glow
    var g=ctx.createRadialGradient(x,y, radius*0.2, x,y, radius*1.8);
    g.addColorStop(0,"rgba(255,245,220,.35)");
    g.addColorStop(1,"rgba(255,245,220,0)");
    ctx.fillStyle=g;
    ctx.beginPath(); ctx.arc(x,y,radius*1.8,0,Math.PI*2); ctx.fill();

    // full disc
    ctx.fillStyle="rgba(255,245,220,.92)";
    ctx.beginPath(); ctx.arc(x,y,radius,0,Math.PI*2); ctx.fill();

    // crater texture (simple dots)
    ctx.globalAlpha=0.18;
    ctx.fillStyle="rgba(0,0,0,.35)";
    for(var i=0;i<18;i++){
      var a=i*0.9;
      var rx=x + Math.cos(a)*radius*0.55 + (i%3)*2;
      var ry=y + Math.sin(a)*radius*0.35;
      var rr=radius*(0.05 + (i%5)*0.01);
      ctx.beginPath(); ctx.arc(rx,ry,rr,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha=1;

    // phase mask (single disc, no “double moon”)
    // phase 0 new, 4 full. We keep full possible.
    var t=phase/7; // 0..1
    var k=(t<0.5)?(t*2):(1-(t-0.5)*2); // 0..1..0
    // k=1 full, k=0 new
    var offset=(1-k)*radius*1.1;

    ctx.save();
    ctx.globalCompositeOperation="destination-out";
    ctx.fillStyle="rgba(0,0,0,1)";
    ctx.beginPath();
    // dark mask circle shifted
    ctx.arc(x+offset, y, radius*1.02, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }

  var t0=performance.now();

  function draw(){
    var w=bg.width, h=bg.height;
    var now=performance.now();
    var t=(now-t0)/1000;

    // BG sky gradient (do not fight ui.css; only inside stage)
    bgCtx.clearRect(0,0,w,h);
    var sky=bgCtx.createLinearGradient(0,0,0,h);
    sky.addColorStop(0,"rgba(255,120,60,.18)");
    sky.addColorStop(0.45,"rgba(120,0,22,.10)");
    sky.addColorStop(1,"rgba(0,0,0,.20)");
    bgCtx.fillStyle=sky;
    bgCtx.fillRect(0,0,w,h);

    // subtle haze
    bgCtx.globalAlpha=0.55;
    for(var i=0;i<5;i++){
      var cx=w*(0.2+i*0.18);
      var cy=h*(0.15+i*0.08);
      var rr=Math.min(w,h)*(0.18+i*0.03);
      var hz=bgCtx.createRadialGradient(cx,cy,rr*0.1,cx,cy,rr);
      hz.addColorStop(0,"rgba(255,220,170,.08)");
      hz.addColorStop(1,"rgba(255,220,170,0)");
      bgCtx.fillStyle=hz;
      bgCtx.beginPath(); bgCtx.arc(cx,cy,rr,0,Math.PI*2); bgCtx.fill();
    }
    bgCtx.globalAlpha=1;

    // moon (top-right) — L1 only
    drawMoon(bgCtx, w*0.86, h*0.16, Math.min(w,h)*0.07, moonPhase);

    // Dial canvas: water-like ripples inside a circular “compass lake”
    dCtx.clearRect(0,0,w,h);

    var cx=w*0.5, cy=h*0.52;
    var R=Math.min(w,h)*0.38;

    // clip circle
    dCtx.save();
    dCtx.beginPath(); dCtx.arc(cx,cy,R,0,Math.PI*2); dCtx.clip();

    // water base
    var base=dCtx.createRadialGradient(cx,cy,R*0.1,cx,cy,R);
    base.addColorStop(0,"rgba(255,255,255,.08)");
    base.addColorStop(0.65,"rgba(0,0,0,.10)");
    base.addColorStop(1,"rgba(0,0,0,.18)");
    dCtx.fillStyle=base;
    dCtx.fillRect(cx-R,cy-R,R*2,R*2);

    // ripples (subtle in L1)
    dCtx.globalAlpha=0.55;
    dCtx.strokeStyle="rgba(201,162,74,.12)";
    for(var k=0;k<10;k++){
      var r=R*(0.15 + k*0.08) + Math.sin(t*0.9 + k)*3;
      dCtx.lineWidth=(k%3===0)?1.2:0.8;
      dCtx.beginPath();
      dCtx.arc(cx,cy,r,0,Math.PI*2);
      dCtx.stroke();
    }
    dCtx.globalAlpha=1;

    // restore clip
    dCtx.restore();

    requestAnimationFrame(draw);
  }

  function safeLayout(){
    var r=stage.getBoundingClientRect();
    if(r.width<10||r.height<10){ requestAnimationFrame(safeLayout); return; }
    resize();
    layout();
  }

  requestAnimationFrame(function(){
    safeLayout();
    draw();
  });
  window.addEventListener("resize", function(){ safeLayout(); }, {passive:true});

})();
</script>

</body>
</html>
