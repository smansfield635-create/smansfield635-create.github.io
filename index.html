<!doctype html>
<!-- TNT — /index.html
     COMPASS · GEM DIAL (OBSIDIAN) · 16 NODES + CORE · MID-AUTUMN SKY (SEPARATED LAYERS FIX) · v7
     OWNER: SEAN (Website Building Room)
     FIX (PER SEAN):
       - Separate visuals into distinct layers (NO “dragon becomes cloud” merge)
         LAYER ORDER (back→front):
           0) sky + stars + moon (single moon, phased)
           1) water reflection haze (subtle)
           2) clouds (translucent) — behind compass face
           3) compass slab + dial face (semi-glass)
           4) dragons (opaque) — ABOVE compass face, BELOW buttons
           5) gem buttons (opaque)
       - Moon: SINGLE, brighter, cratered, visible; phase advances each page load/return (sessionStorage)
       - Dragons: two, thicker, segmented, with head + horns + whiskers; gold glowing sayings (top=classical CN, bottom=selected language)
       - Clouds can cross at multiple depths but NEVER over CORE diamond
       - 3D inlay: remove orthogonal “grid” look inside diamonds; use diamond-aligned conic silk + curvature feel
       - Keep: 16 unique destinations, CORE → /index-core/index.html, EXIT → /door/, HUB → /home/
       - Trilingual: EN/中文/ES (NO reload)
       - Lane: lane=platform|engineering (URL-only; NO reload; NEVER stored)
       - Canon state carry: gd_lang/gd_style/gd_time/gd_depth via URL + LS ONLY (NO new gd_* keys)
       - ui.css owns html/body background (NO overrides)
-->

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Compass · DiamondGateBridge</title>

<link rel="stylesheet" href="/assets/ui.css"/>
<link rel="stylesheet" href="/assets/branch.css"/>
<script defer src="/assets/instruments.js"></script>

<style>
a{color:inherit;text-decoration:none}
body{margin:0}
body::before,body::after{pointer-events:none!important}

:root{
  /* ===== GEOMETRY ===== */
  --D0:210px;  /* CORE */
  --D1:150px;  /* Cardinals */
  --D2:112px;  /* Diagonals */
  --D3:86px;   /* Outer 8 */

  --R1:168px;
  --R2:246px;
  --R3:314px;

  --padTop:102px;

  /* ===== MATERIAL ===== */
  --ink:rgba(255,255,255,.94);
  --mut:rgba(255,255,255,.78);

  --onyx0:rgba(6,8,10,.96);
  --onyx1:rgba(10,12,16,.88);

  --crimson:rgba(120,0,22,.44);
  --festival:rgba(255,43,43,.26);
  --opalV:rgba(90,40,120,.18);

  --gold:rgba(201,162,74,.58);
  --goldGlow:rgba(201,162,74,.22);

  --shadowDeep:0 44px 140px rgba(0,0,0,.82);
  --shadowA:0 28px 110px rgba(0,0,0,.70);
  --shadowB:0 18px 60px rgba(0,0,0,.55);
}

/* ===== TOP BAR ===== */
.top{
  position:fixed;top:14px;left:0;right:0;
  padding:0 14px;
  z-index:260;
  pointer-events:none;
}
.topbar{
  pointer-events:auto;
  width:min(1120px,96vw);
  margin:0 auto;
  border:1px solid rgba(255,255,255,.12);
  border-radius:22px;
  padding:10px 12px;
  background:
    radial-gradient(circle at 18% 18%, rgba(201,162,74,.10), transparent 62%),
    radial-gradient(circle at 82% 30%, rgba(255,43,43,.10), transparent 64%),
    linear-gradient(145deg, rgba(8,10,14,.92), rgba(4,6,10,.96));
  box-shadow:var(--shadowA), inset 0 0 0 1px rgba(201,162,74,.12);
  backdrop-filter:blur(10px);
  display:flex;align-items:center;justify-content:space-between;
  gap:10px;
}
.brandLeft{display:flex;align-items:center;gap:12px;flex-wrap:wrap;min-width:0;}
.brandTitle{font-weight:980;letter-spacing:.6px;font-size:14px;color:rgba(255,255,255,.94);white-space:nowrap;}
.brandSub{font-size:12px;color:rgba(255,255,255,.72);letter-spacing:.2px;white-space:nowrap;}
.brandLinks{display:flex;gap:10px;flex-wrap:wrap;font-size:12px;color:rgba(255,255,255,.70);}
.brandLinks a{padding:6px 10px;border-radius:999px;border:1px solid rgba(201,162,74,.16);background:rgba(0,0,0,.14);}
.controlsRight{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:flex-end;}

.seg{
  display:inline-flex;gap:0;overflow:hidden;border-radius:16px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(0,0,0,.18);
  box-shadow:var(--shadowB);
}
.seg button{
  appearance:none;border:0;background:transparent;
  color:rgba(255,255,255,.78);
  padding:10px 12px;min-height:42px;
  font-weight:980;font-size:13px;letter-spacing:.25px;
  cursor:pointer;-webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
.seg button[aria-pressed="true"]{
  color:rgba(255,255,255,.95);
  background:
    radial-gradient(circle at 50% 50%, rgba(201,162,74,.14), transparent 62%),
    linear-gradient(180deg, rgba(255,43,43,.10), rgba(0,0,0,.10));
  box-shadow: inset 0 0 0 1px rgba(201,162,74,.14), inset 0 -10px 22px rgba(201,162,74,.10);
}

/* ===== STAGE ===== */
.stage{
  position:relative;
  width:min(1200px,94vw);
  height:min(1200px,86vh);
  margin:var(--padTop) auto 0;
  pointer-events:none;
  border-radius:44px;
  overflow:hidden;
}

/* ===== LAYER 0: SKY + STARS + MOON (single moon only) ===== */
.sky{
  position:absolute;inset:0;
  pointer-events:none;
  z-index:0;
  background:
    radial-gradient(circle at 70% 14%, rgba(255,240,210,.16) 0%, rgba(255,240,210,0) 52%),
    radial-gradient(circle at 18% 22%, rgba(255,90,70,.12) 0%, transparent 56%),
    radial-gradient(circle at 86% 38%, rgba(120,70,255,.10) 0%, transparent 66%),
    radial-gradient(circle at 50% 78%, rgba(0,0,0,.22) 0%, transparent 68%),
    linear-gradient(180deg, rgba(255,120,60,.22) 0%, rgba(120,20,10,.22) 35%, rgba(0,0,0,.26) 100%);
  filter:saturate(1.05);
}
.stars{
  position:absolute;inset:0;z-index:1;pointer-events:none;opacity:.75;
  background:
    radial-gradient(1px 1px at 12% 18%, rgba(255,255,255,.55), transparent 55%),
    radial-gradient(1px 1px at 26% 12%, rgba(255,255,255,.50), transparent 55%),
    radial-gradient(1px 1px at 44% 20%, rgba(255,255,255,.45), transparent 55%),
    radial-gradient(1px 1px at 62% 14%, rgba(255,255,255,.55), transparent 55%),
    radial-gradient(1px 1px at 78% 18%, rgba(255,255,255,.50), transparent 55%),
    radial-gradient(1px 1px at 88% 26%, rgba(255,255,255,.40), transparent 55%),
    radial-gradient(1px 1px at 18% 34%, rgba(255,255,255,.35), transparent 55%),
    radial-gradient(1px 1px at 34% 40%, rgba(255,255,255,.30), transparent 55%),
    radial-gradient(1px 1px at 70% 36%, rgba(255,255,255,.34), transparent 55%),
    radial-gradient(1px 1px at 84% 44%, rgba(255,255,255,.28), transparent 55%);
  filter:blur(.2px);
}

/* single moon with craters + glow + phase shadow */
.moon{
  position:absolute;
  right:6%;
  top:12%;
  width:180px;height:180px;
  border-radius:999px;
  z-index:2;
  pointer-events:none;
  background:
    radial-gradient(circle at 35% 30%, rgba(255,255,255,.82), rgba(255,255,255,.55) 52%, rgba(255,255,255,.30) 72%, rgba(255,255,255,.00) 100%),
    radial-gradient(circle at 40% 38%, rgba(240,230,210,.55) 0 30%, rgba(0,0,0,0) 31%),
    radial-gradient(circle at 62% 56%, rgba(230,220,200,.45) 0 22%, rgba(0,0,0,0) 23%),
    radial-gradient(circle at 52% 28%, rgba(220,210,190,.40) 0 14%, rgba(0,0,0,0) 15%),
    radial-gradient(circle at 32% 62%, rgba(220,210,190,.34) 0 18%, rgba(0,0,0,0) 19%);
  box-shadow:
    0 0 40px rgba(255,240,210,.25),
    0 0 90px rgba(255,240,210,.18);
  opacity:.95;
}
.moon::after{
  /* terminator shadow for phases; moved by --phaseX */
  content:"";
  position:absolute;inset:-2%;
  border-radius:999px;
  background:
    radial-gradient(circle at 50% 50%, rgba(0,0,0,.00) 0 55%, rgba(0,0,0,.70) 74% 100%);
  transform:translateX(var(--phaseX, 0%));
  mix-blend-mode:multiply;
  opacity:.78;
}

/* ===== LAYER 1: WATER REFLECTION HAZE (subtle) ===== */
.water{
  position:absolute;inset:0;z-index:3;pointer-events:none;
  background:
    radial-gradient(circle at 50% 65%, rgba(255,255,255,.06), transparent 60%),
    radial-gradient(circle at 30% 82%, rgba(255,140,80,.08), transparent 70%),
    linear-gradient(180deg, rgba(255,255,255,.02), rgba(0,0,0,.10));
  opacity:.75;
}
.water::after{
  content:"";
  position:absolute;inset:-20%;
  background:
    repeating-radial-gradient(circle at 50% 60%,
      rgba(255,255,255,.020) 0 10px,
      rgba(255,255,255,0) 10px 22px);
  animation:ripple 10s linear infinite;
  opacity:.40;
}
@keyframes ripple{
  0%{transform:translateY(0) rotate(0deg)}
  100%{transform:translateY(-40px) rotate(1deg)}
}

/* ===== LAYER 2: CLOUDS (translucent; behind compass face; never over CORE area) ===== */
.cloudLayer{
  position:absolute;inset:0;z-index:4;pointer-events:none;
  mask-image:
    radial-gradient(circle at 50% 58%, transparent 0 140px, #000 190px 100%); /* keep clear around CORE */
  -webkit-mask-image:
    radial-gradient(circle at 50% 58%, transparent 0 140px, #000 190px 100%);
}
.cloud{
  position:absolute;
  width:520px;height:210px;
  left:-40%;
  top:18%;
  opacity:.22;
  filter:blur(0.2px);
  background:
    radial-gradient(140px 90px at 22% 55%, rgba(255,255,255,.26), rgba(255,255,255,0) 70%),
    radial-gradient(160px 100px at 48% 45%, rgba(255,255,255,.20), rgba(255,255,255,0) 72%),
    radial-gradient(140px 90px at 70% 58%, rgba(255,255,255,.18), rgba(255,255,255,0) 70%),
    radial-gradient(90px 60px at 86% 62%, rgba(255,255,255,.12), rgba(255,255,255,0) 72%);
  animation:cloudDrift 26s linear infinite;
}
.cloud.c2{top:56%;opacity:.18;animation-duration:32s;animation-delay:-10s;}
.cloud.c3{top:36%;opacity:.14;animation-duration:40s;animation-delay:-22s;}
@keyframes cloudDrift{
  0%{transform:translateX(-10%)}
  100%{transform:translateX(160%)}
}

/* ===== LAYER 3: COMPASS SLAB + DIAL (semi-glass; lighter for contrast) ===== */
.slab{
  position:absolute;left:50%;top:50%;
  transform:translate(-50%,-50%);
  width:min(980px,92vw);
  height:min(980px,92vw);
  border-radius:44px;
  pointer-events:none;
  z-index:5;
  border:1px solid rgba(255,255,255,.12);
  background:
    radial-gradient(circle at 30% 22%, rgba(255,255,255,.12), transparent 58%),
    radial-gradient(circle at 78% 28%, rgba(255,43,43,.10), transparent 62%),
    radial-gradient(circle at 70% 82%, rgba(90,40,120,.08), transparent 66%),
    linear-gradient(160deg, rgba(255,255,255,.05), rgba(0,0,0,.10));
  box-shadow:
    0 70px 240px rgba(0,0,0,.55),
    inset 0 2px 0 rgba(255,255,255,.10),
    inset 0 -70px 140px rgba(0,0,0,.55);
  opacity:.78;
}

.dial{
  position:absolute;
  left:50%;top:50%;
  transform:translate(-50%,-50%);
  width:min(900px,90vw);
  height:min(900px,90vw);
  border-radius:999px;
  pointer-events:none;
  z-index:6;
  overflow:hidden;
}
.dial::before{
  content:"";
  position:absolute;inset:0;border-radius:999px;
  background:
    radial-gradient(circle at 50% 42%,
      rgba(255,255,255,.06),
      rgba(0,0,0,.18) 56%,
      rgba(0,0,0,.42) 78%,
      rgba(0,0,0,.00) 92%),
    radial-gradient(circle at 50% 50%, rgba(201,162,74,.10), transparent 62%),
    radial-gradient(circle at 50% 50%, rgba(255,43,43,.08), transparent 66%);
  box-shadow:
    inset 0 0 0 2px rgba(255,255,255,.06),
    inset 0 0 0 10px rgba(0,0,0,.10),
    inset 0 0 80px rgba(0,0,0,.45);
  opacity:.95;
}
.dial::after{
  content:"";
  position:absolute;inset:-14%;
  background:
    radial-gradient(circle at 50% 50%, transparent 0 36%, rgba(255,255,255,.06) 36% 36.6%, transparent 37% 100%),
    radial-gradient(circle at 50% 50%, transparent 0 52%, rgba(255,255,255,.06) 52% 52.6%, transparent 53% 100%),
    radial-gradient(circle at 50% 50%, transparent 0 68%, rgba(255,255,255,.06) 68% 68.6%, transparent 69% 100%),

    linear-gradient(90deg, transparent 0 49.7%, rgba(201,162,74,.10) 49.7% 50.3%, transparent 50.3% 100%),
    linear-gradient(0deg,  transparent 0 49.7%, rgba(201,162,74,.10) 49.7% 50.3%, transparent 50.3% 100%),

    repeating-conic-gradient(from 45deg at 50% 50%,
      rgba(201,162,74,.06) 0 1.2deg,
      transparent 1.2deg 7.5deg),

    radial-gradient(circle at 50% 50%, rgba(255,255,255,.04), transparent 62%);
  filter: blur(.25px);
  opacity:.72;
  mask: radial-gradient(circle at 50% 50%, transparent 0 18%, #000 20% 100%);
  -webkit-mask: radial-gradient(circle at 50% 50%, transparent 0 18%, #000 20% 100%);
}

/* 16 direction labels on dial */
.face16{
  position:absolute;left:50%;top:50%;
  transform:translate(-50%,-50%);
  width:min(900px,90vw);
  height:min(900px,90vw);
  pointer-events:none;
  z-index:7;
  opacity:.78;
}
.face16 span{
  position:absolute;
  color:rgba(0,0,0,.70);
  text-shadow:0 0 0 rgba(0,0,0,0);
  font-weight:980;
  letter-spacing:1.6px;
  font-size:11px;
  mix-blend-mode:overlay;
}
.face16 span::after{
  content:attr(data-g);
  position:absolute;inset:0;
  color:rgba(201,162,74,.62);
  text-shadow:0 0 10px rgba(201,162,74,.18);
  transform:translate(1px,1px);
  mix-blend-mode:screen;
}

/* ===== LAYER 4: DRAGONS (opaque; above compass, below buttons) ===== */
.dragonLayer{
  position:absolute;inset:0;
  z-index:8;
  pointer-events:none;
}
.dragon{
  position:absolute;
  width:920px;
  height:260px;
  top:16%;
  left:-110%;
  opacity:.95;
  filter:drop-shadow(0 18px 26px rgba(0,0,0,.35));
  animation:dragonPassTop 26s linear infinite;
}
.dragon.bottom{
  top:auto;
  bottom:16%;
  left:110%;
  transform:scaleX(-1);
  animation:dragonPassBottom 28s linear infinite;
}
@keyframes dragonPassTop{
  0%{transform:translateX(0)}
  100%{transform:translateX(240%)}
}
@keyframes dragonPassBottom{
  0%{transform:translateX(0) scaleX(-1)}
  100%{transform:translateX(-240%) scaleX(-1)}
}

/* glow text on dragon */
.dragonText{
  fill:rgba(212,175,55,.96);
  filter:drop-shadow(0 0 10px rgba(212,175,55,.28));
  font-weight:900;
  letter-spacing:2px;
}

/* ===== LAYER 5: GEM BUTTONS ===== */
.node{
  position:absolute;
  left:50%;top:50%;
  transform:translate(-50%,-50%) rotate(45deg);
  cursor:pointer;
  pointer-events:auto;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.18);
  transition:box-shadow .16s ease, border-color .16s ease, filter .16s ease;
  z-index:10;
  border-radius:22px;
}
.core{width:var(--D0);height:var(--D0);z-index:12;border-radius:26px}
.l1{width:var(--D1);height:var(--D1)}
.l2{width:var(--D2);height:var(--D2)}
.l3{width:var(--D3);height:var(--D3);border-radius:18px}

.surface{
  background:
    radial-gradient(circle at 20% 18%, rgba(255,255,255,.28), transparent 46%),
    radial-gradient(circle at 78% 22%, var(--festival), transparent 62%),
    radial-gradient(circle at 74% 84%, var(--opalV), transparent 64%),
    radial-gradient(circle at 28% 84%, var(--crimson), transparent 70%),
    linear-gradient(160deg, var(--onyx1), var(--onyx0));
  box-shadow:
    var(--shadowDeep),
    0 0 24px rgba(255,43,43,.08),
    inset 0 2px 0 rgba(255,255,255,.18),
    inset 0 -52px 92px rgba(0,0,0,.88);
}

/* 3D inlay FIX: remove orthogonal look → conic silk aligned to diamond + curved feel */
.surface::before{
  content:"";
  position:absolute;inset:0;border-radius:inherit;pointer-events:none;
  box-shadow: inset 0 0 0 1px rgba(201,162,74,.18);
  background:
    repeating-conic-gradient(from 45deg at 50% 50%,
      rgba(201,162,74,.08) 0 1.1deg,
      transparent 1.1deg 7.2deg),
    radial-gradient(circle at 50% 50%, rgba(255,255,255,.05), transparent 62%);
  opacity:.38;
  mask:
    radial-gradient(circle at 50% 50%, transparent 0 72%, #000 78% 100%),
    linear-gradient(#000,#000);
  -webkit-mask:
    radial-gradient(circle at 50% 50%, transparent 0 72%, #000 78% 100%),
    linear-gradient(#000,#000);
}
.surface::after{
  content:"";
  position:absolute;left:12%;right:12%;top:10%;
  height:30%;
  border-radius:999px;
  background:linear-gradient(to bottom, rgba(255,255,255,.20), rgba(255,255,255,0));
  transform:rotate(-12deg);
  pointer-events:none;
  opacity:.92;
}

.node:hover{
  border-color:rgba(201,162,74,.44);
  box-shadow:
    var(--shadowDeep),
    0 0 0 2px rgba(201,162,74,.14),
    0 0 34px rgba(201,162,74,.18),
    inset 0 2px 0 rgba(255,255,255,.20),
    inset 0 -52px 92px rgba(0,0,0,.88);
}
.node:active{filter:brightness(.98)}

/* inner text + per-gem N/E/S/W corners */
.inner{
  width:100%;height:100%;
  transform:rotate(-45deg);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:10px;
  gap:6px;
  color:#fff;
  position:relative;
}
.word{
  font-weight:980;
  letter-spacing:.6px;
  line-height:1.05;
  text-shadow:0 0 18px rgba(0,0,0,.42);
  font-size:clamp(10px, 1.15vw, 16px);
  max-width:100%;
  word-break:keep-all;
}
.code{
  font-weight:950;
  font-size:10px;
  letter-spacing:1.2px;
  opacity:.78;
}

/* small cardinal corners on each gem (not peppered across page) */
.cornerMark{
  position:absolute;
  font-weight:980;
  font-size:9px;
  letter-spacing:1.1px;
  color:rgba(201,162,74,.72);
  text-shadow:0 0 10px rgba(201,162,74,.18);
  opacity:.92;
}
.cornerMark.n{top:6px;left:50%;transform:translateX(-50%)}
.cornerMark.e{right:6px;top:50%;transform:translateY(-50%)}
.cornerMark.s{bottom:6px;left:50%;transform:translateX(-50%)}
.cornerMark.w{left:6px;top:50%;transform:translateY(-50%)}

/* ===== BOTTOM CORNERS (EXIT / HUB) ===== */
.cornerBtn{
  position:fixed;
  bottom:max(16px, env(safe-area-inset-bottom));
  z-index:300;
  pointer-events:none;
}
.cornerBtn .dmini{pointer-events:auto}
.cornerBtn.left{left:16px}
.cornerBtn.right{right:16px}

.dmini{
  width:56px;height:56px;
  border-radius:16px;
  border:1px solid rgba(255,255,255,.14);
  background:
    radial-gradient(circle at 50% 40%, rgba(255,255,255,.08), transparent 52%),
    linear-gradient(145deg, rgba(10,12,16,.78), rgba(6,8,10,.92));
  box-shadow:var(--shadowB), 0 0 0 1px rgba(201,162,74,.10), 0 0 18px rgba(201,162,74,.10);
  display:grid;place-items:center;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
  transform:rotate(45deg);
  position:relative;
  overflow:hidden;
  transition:box-shadow .16s ease, border-color .16s ease;
}
.dmini:hover{
  border-color:rgba(201,162,74,.44);
  box-shadow:var(--shadowB), 0 0 0 2px rgba(201,162,74,.14), 0 0 30px rgba(201,162,74,.18);
}
.dmini span{
  transform:rotate(-45deg);
  font-weight:980;
  font-size:12px;
  letter-spacing:.6px;
  color:rgba(255,255,255,.92);
  user-select:none;
}
.cornerLabel{
  margin-top:10px;
  text-align:center;
  color:rgba(255,255,255,.72);
  font-size:11px;
  letter-spacing:.4px;
}

/* ===== BOTTOM PILL ===== */
.pillWrap{
  width:min(1120px,94vw);
  margin:14px auto 0;
  padding-bottom:90px;
}
.pill{
  border:1px solid rgba(255,255,255,.12);
  border-radius:22px;
  padding:14px 16px;
  background:
    radial-gradient(circle at 18% 22%, rgba(255,43,43,.10), transparent 62%),
    radial-gradient(circle at 82% 32%, rgba(90,40,120,.10), transparent 66%),
    radial-gradient(circle at 50% 92%, rgba(201,162,74,.10), transparent 62%),
    rgba(0,0,0,.16);
  box-shadow:0 26px 90px rgba(0,0,0,.55);
  color:rgba(255,255,255,.86);
  line-height:1.55;
  font-size:13.5px;
}
.pill b{color:rgba(255,255,255,.95)}
.pill .g{color:rgba(201,162,74,.80);font-weight:980}

@media (max-width:720px){
  :root{--D0:196px;--D1:142px;--D2:108px;--D3:84px;--R1:156px;--R2:228px;--R3:292px;--padTop:112px;}
  .moon{width:150px;height:150px}
}
@media (max-width:520px){
  :root{--D0:184px;--D1:136px;--D2:104px;--D3:80px;--R1:146px;--R2:214px;--R3:274px;}
  .brandSub{display:none}
  .moon{width:132px;height:132px}
}
</style>
</head>

<body>

<div class="top" aria-label="Top controls">
  <div class="topbar">
    <div class="brandLeft" aria-label="Brand">
      <div class="brandTitle" id="brandTitle">WELCOME TO THE COMPASS</div>
      <div class="brandSub" id="brandSub">A visual tutorial: pick a direction → get a clear next step. Lens: PLATFORM.</div>
      <div class="brandLinks" aria-label="Brand links">

<script>
(function(){
  "use strict";

  // ===== Canon state (gd_* only; lane URL-only) =====
  var qs=new URLSearchParams(location.search);
  var LS=window.localStorage;

  var lang  = qs.get("lang")  || LS.getItem("gd_lang")  || "en";
  var style = qs.get("style") || LS.getItem("gd_style") || "informal";
  var time  = qs.get("time")  || LS.getItem("gd_time")  || "now";
  var depth = qs.get("depth") || LS.getItem("gd_depth") || "explore";
  var lane  = qs.get("lane")  || "platform"; // URL-only

  if(lang!=="en" && lang!=="zh" && lang!=="es") lang="en";
  if(style!=="informal" && style!=="formal") style="informal";
  if(time==="trajectory") time="post";
  if(time!=="origin" && time!=="now" && time!=="post") time="now";
  if(depth!=="explore" && depth!=="learn") depth="explore";
  if(lane!=="platform" && lane!=="engineering") lane="platform";

  try{
    LS.setItem("gd_lang",lang);
    LS.setItem("gd_style",style);
    LS.setItem("gd_time",time);
    LS.setItem("gd_depth",depth);
  }catch(e){}

  document.documentElement.lang=(lang==="zh")?"zh":(lang==="es")?"es":"en";

  function q(over){
    var p=new URLSearchParams();
    p.set("lang",(over&&over.lang)?over.lang:lang);
    p.set("style",(over&&over.style)?over.style:style);
    p.set("time",(over&&over.time)?over.time:time);
    p.set("depth",(over&&over.depth)?over.depth:depth);
    var L=(over&&over.lane)?over.lane:lane;
    if(L==="platform"||L==="engineering") p.set("lane",L);
    return "?"+p.toString();
  }
  function go(path){ window.location.href = path + q(); }
  function setPressed(btn, on){ btn.setAttribute("aria-pressed", on ? "true" : "false"); }

  // ===== Moon phases: advance per page load/return (sessionStorage; no gd_* keys) =====
  var PHASES = [
    "-34%", "-22%", "-12%", "-6%", "0%", "8%", "18%", "28%"  // includes full-ish (0)
  ];
  var idx = 0;
  try{
    var k="moon_phase_idx";
    var prev = parseInt(sessionStorage.getItem(k)||"0",10);
    if(!isFinite(prev)) prev = 0;
    idx = (prev + 1) % PHASES.length;
    sessionStorage.setItem(k, String(idx));
  }catch(e){}
  var moon=document.getElementById("moon");
  if(moon) moon.style.setProperty("--phaseX", PHASES[idx]);

  // ===== Routing (NO DUPLICATES; unknown/unbuilt → 404) =====
  var CORE_ROUTE = "/index-core/index.html";
  var EXIT_ROUTE = "/door/";
  var HUB_ROUTE  = "/home/";
  var PLACEHOLDER_404 = "/404.html";

  // N/E/S/W meaning fixed per your latest directive:
  // N = Laws, E = Energy, S = Finance, W = Governance
  // Prelude removed; Research included; Doctrine fixed.
  var ROUTES_RAW = [
    {tier:1, code:"N",  label:{platform:{en:"LAWS",zh:"法则",es:"LEYES"}, engineering:{en:"BOUNDS",zh:"边界",es:"LÍMIT"}}, href:"/laws/"},
    {tier:1, code:"E",  label:{platform:{en:"ENERGY",zh:"能源",es:"ENERGÍA"}, engineering:{en:"POWER",zh:"功率",es:"PWR"}}, href:"/explore/frontier/energy/"},
    {tier:1, code:"S",  label:{platform:{en:"FINANCE",zh:"金融",es:"FINANZAS"}, engineering:{en:"CAPITAL",zh:"资本",es:"CAP"}}, href:"/finance/"},
    {tier:1, code:"W",  label:{platform:{en:"GOVERNANCE",zh:"治理",es:"GOBERNANZA"}, engineering:{en:"EXEC",zh:"执行",es:"EJEC"}}, href:"/governance/"},

    {tier:2, code:"NE", label:{platform:{en:"PRODUCTS",zh:"产品",es:"PRODUCTOS"}, engineering:{en:"DEPLOY",zh:"部署",es:"DESPL"}}, href:"/products/"},
    {tier:2, code:"SE", label:{platform:{en:"RESEARCH",zh:"研究",es:"INVEST."}, engineering:{en:"R&D",zh:"研发",es:"I+D"}}, href:"/research/"},
    {tier:2, code:"SW", label:{platform:{en:"EXPLORE",zh:"探索",es:"EXPLORAR"}, engineering:{en:"MODELS",zh:"模型",es:"MODELOS"}}, href:"/explore/"},
    {tier:2, code:"NW", label:{platform:{en:"DOCTRINE",zh:"教义",es:"DOCTRINA"}, engineering:{en:"CCD",zh:"CCD",es:"CCD"}}, href:"/products/capital-doctrine/"},

    {tier:3, code:"NNE",label:{platform:{en:"EDUCATION",zh:"教育",es:"EDUCACIÓN"}, engineering:{en:"ESL",zh:"ESL",es:"ESL"}}, href:"/products/education/"},
    {tier:3, code:"ENE",label:{platform:{en:"FRONTIER",zh:"前沿",es:"FRONTERA"}, engineering:{en:"FRONTIER",zh:"前沿",es:"FRONTERA"}}, href:"/explore/frontier/"},
    {tier:3, code:"ESE",label:{platform:{en:"INFRA",zh:"基建",es:"INFRA"}, engineering:{en:"SUBST",zh:"替代",es:"SUBST"}}, href:"/explore/infrastructure/"},
    {tier:3, code:"SSE",label:{platform:{en:"AGRICULTURE",zh:"农业",es:"AGRO"}, engineering:{en:"FOOD",zh:"食物",es:"ALIM"}}, href:"/products/agriculture/"},
    {tier:3, code:"SSW",label:{platform:{en:"GAUGES",zh:"量规",es:"MEDIDORES"}, engineering:{en:"SIGNALS",zh:"信号",es:"SEÑALES"}}, href:"/gauges/"},
    {tier:3, code:"WSW",label:{platform:{en:"VISION",zh:"愿景",es:"VISIÓN"}, engineering:{en:"MAP",zh:"映射",es:"MAP"}}, href:"/explore/frontier/vision/"},
    {tier:3, code:"WNW",label:{platform:{en:"LATTICE",zh:"晶格",es:"LATTICE"}, engineering:{en:"256",zh:"256态",es:"256"}}, href:"/explore/frontier/lattice/"},
    {tier:3, code:"NNW",label:{platform:{en:"SHIMMER",zh:"闪烁",es:"SHIMMER"}, engineering:{en:"S.H.I.M.M.E.R.",zh:"SHIMMER",es:"SHIMMER"}}, href:"/explore/frontier/shimmer/"}
  ];

  function normalizeRoutes(list){
    var seen = Object.create(null);
    var out = [];
    for(var i=0;i<list.length;i++){
      var it=list[i];
      var h=(it.href||"").trim();
      if(!h) h=PLACEHOLDER_404;
      if(seen[h]) h=PLACEHOLDER_404;
      seen[h]=true;
      out.push({tier:it.tier, code:it.code, label:it.label, href:h});
    }
    return out;
  }
  var ROUTES = normalizeRoutes(ROUTES_RAW);

  function pick3(en,zh,es){ return (lang==="zh")?zh:(lang==="es")?es:en; }
  function labelFor(it){
    var pack = (lane==="engineering") ? it.label.engineering : it.label.platform;
    return pick3(pack.en, pack.zh, pack.es);
  }

  // Bottom dragon sayings per language
  function paintDragonBottomText(){
    var l1 = document.getElementById("dragonBottomLine1");
    var l2 = document.getElementById("dragonBottomLine2");
    if(!l1||!l2) return;

    if(lang==="zh"){
      l1.textContent="少说多做 · 相相如水";
      l2.textContent="道可道 非常道 · 急所不欲 无施于人";
    }else if(lang==="es"){
      l1.textContent="DI MENOS, HAZ MÁS · EL TIEMPO FLUYE COMO EL AGUA";
      l2.textContent="EL CAMINO QUE PUEDE NOMBRARSE NO ES EL CAMINO ETERNO";
    }else{
      l1.textContent="SAY LESS, DO MORE · TIME FLOWS LIKE WATER";
      l2.textContent="THE WAY THAT CAN BE SPOKEN IS NOT THE ETERNAL WAY";
    }
  }
  paintDragonBottomText();

  // ===== Build nodes =====
  var stage=document.getElementById("stage");

  function mkNode(word, code, cls){
    var d=document.createElement("div");
    d.className="node surface "+cls;
    d.setAttribute("role","button");
    d.tabIndex=0;

    var inner=document.createElement("div");
    inner.className="inner";

    var w=document.createElement("div");
    w.className="word";
    w.textContent=word;

    var c=document.createElement("div");
    c.className="code";
    c.textContent=code;

    // per-gem NESW corners (only on gems)
    var n=document.createElement("div"); n.className="cornerMark n"; n.textContent="N";
    var e=document.createElement("div"); e.className="cornerMark e"; e.textContent="E";
    var s=document.createElement("div"); s.className="cornerMark s"; s.textContent="S";
    var ww=document.createElement("div"); ww.className="cornerMark w"; ww.textContent="W";

    inner.appendChild(w);
    inner.appendChild(c);
    inner.appendChild(n);
    inner.appendChild(e);
    inner.appendChild(s);
    inner.appendChild(ww);

    d.appendChild(inner);
    return d;
  }

  function layout(){
    stage.querySelectorAll(".node").forEach(function(n){ n.remove(); });

    var rect=stage.getBoundingClientRect();
    var cx=rect.width/2, cy=rect.height/2;

    var R1=parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--R1"))||168;
    var R2=parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--R2"))||246;
    var R3=parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--R3"))||314;

    // CORE
    var core=mkNode(pick3("CORE","核心","NÚCLEO"), "INDEX", "core");
    core.style.left=cx+"px"; core.style.top=cy+"px";
    core.addEventListener("click", function(){ go(CORE_ROUTE); }, {passive:true});
    core.addEventListener("keydown", function(e){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); go(CORE_ROUTE); }});
    stage.appendChild(core);

    var t1=[], t2=[], t3=[];
    for(var i=0;i<ROUTES.length;i++){
      if(ROUTES[i].tier===1) t1.push(ROUTES[i]);
      else if(ROUTES[i].tier===2) t2.push(ROUTES[i]);
      else t3.push(ROUTES[i]);
    }

    function byCode(arr, code){ for(var i=0;i<arr.length;i++) if(arr[i].code===code) return arr[i]; return null; }

    // Tier 1 pinned angles
    var ordered=[byCode(t1,"N"),byCode(t1,"E"),byCode(t1,"S"),byCode(t1,"W")].filter(Boolean);
    var ang=[-Math.PI/2, 0, Math.PI/2, Math.PI];
    for(var i=0;i<ordered.length;i++){
      var it=ordered[i];
      var x=cx + R1*Math.cos(ang[i]);
      var y=cy + R1*Math.sin(ang[i]);
      var n=mkNode(labelFor(it), it.code, "l1");
      n.style.left=x+"px"; n.style.top=y+"px";
      (function(path, el){
        el.addEventListener("click", function(){ go(path); }, {passive:true});
        el.addEventListener("keydown", function(e){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); go(path); }});
      })(it.href, n);
      stage.appendChild(n);
    }

    // Tier 2 diagonals
    for(var i=0;i<t2.length;i++){
      var it=t2[i];
      var a=(i/t2.length)*(Math.PI*2) - Math.PI/4;
      var x=cx + R2*Math.cos(a);
      var y=cy + R2*Math.sin(a);
      var n=mkNode(labelFor(it), it.code, "l2");
      n.style.left=x+"px"; n.style.top=y+"px";
      (function(path, el){
        el.addEventListener("click", function(){ go(path); }, {passive:true});
        el.addEventListener("keydown", function(e){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); go(path); }});
      })(it.href, n);
      stage.appendChild(n);
    }

    // Tier 3 outer 8
    for(var i=0;i<t3.length;i++){
      var it=t3[i];
      var a=(i/t3.length)*(Math.PI*2) - Math.PI*(3/8);
      var x=cx + R3*Math.cos(a);
      var y=cy + R3*Math.sin(a);
      var n=mkNode(labelFor(it), it.code, "l3");
      n.style.left=x+"px"; n.style.top=y+"px";
      (function(path, el){
        el.addEventListener("click", function(){ go(path); }, {passive:true});
        el.addEventListener("keydown", function(e){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); go(path); }});
      })(it.href, n);
      stage.appendChild(n);
    }

    // build minimal 16-direction text on dial (once per layout)
    var face=document.getElementById("face16");
    if(face){
      face.innerHTML="";
      var labels=["N","NNE","NE","ENE","E","ESE","SE","SSE","S","SSW","SW","WSW","W","WNW","NW","NNW"];
      for(var i=0;i<labels.length;i++){
        var sp=document.createElement("span");
        sp.textContent=labels[i];
        sp.setAttribute("data-g", labels[i]);
        var a=(i/labels.length)*(Math.PI*2) - Math.PI/2;
        var r= (Math.min(face.clientWidth, face.clientHeight)/2) - 18;
        var x=(face.clientWidth/2) + r*Math.cos(a);
        var y=(face.clientHeight/2) + r*Math.sin(a);
        sp.style.left = x+"px";
        sp.style.top  = y+"px";
        sp.style.transform="translate(-50%,-50%)";
        face.appendChild(sp);
      }
    }
  }

  function safeLayout(){
    var r=stage.getBoundingClientRect();
    if(r.width<10||r.height<10){ requestAnimationFrame(safeLayout); return; }
    layout();
  }

  // ===== Language (NO reload) =====
  var btnEN=document.getElementById("btnEN");
  var btnZH=document.getElementById("btnZH");
  var btnES=document.getElementById("btnES");
  setPressed(btnEN, lang==="en");
  setPressed(btnZH, lang==="zh");
  setPressed(btnES, lang==="es");

  function paintHeader(){
    var laneWord = (lane==="engineering") ? pick3("ENGINEERING","工程","INGENIERÍA") : pick3("PLATFORM","平台","PLATAFORMA");
    if(lang==="zh"){
      document.getElementById("brandTitle").textContent="欢迎来到指南针";
      document.getElementById("brandSub").textContent="视觉教程：选一个方向 → 得到清晰下一步。透镜："+laneWord+"。";
      document.getElementById("lblExit").textContent="退出";
      document.getElementById("lblHub").textContent="枢纽";
      document.querySelector("#btnExit span").textContent="退出";
      document.querySelector("#btnHub span").textContent="枢纽";
      document.getElementById("pill").innerHTML="<b>指南针：</b>一个中心（<span class='g'>核心</span>）+ 16 枢纽。禁止重复目的地。未建页面路由到 <span class='g'>/404.html</span>。";
    }else if(lang==="es"){
      document.getElementById("brandTitle").textContent="BIENVENIDO A LA BRÚJULA";
      document.getElementById("brandSub").textContent="Tutorial visual: elige una dirección → siguiente paso claro. Lente: "+laneWord+".";
      document.getElementById("lblExit").textContent="SALIR";
      document.getElementById("lblHub").textContent="HUB";
      document.querySelector("#btnExit span").textContent="SALIR";
      document.querySelector("#btnHub span").textContent="HUB";
      document.getElementById("pill").innerHTML="<b>Brújula:</b> Un centro (<span class='g'>CORE</span>) + 16 hubs. Sin duplicados. No construido → <span class='g'>/404.html</span>.";
    }else{
      document.getElementById("brandTitle").textContent="WELCOME TO THE COMPASS";
      document.getElementById("brandSub").textContent="A visual tutorial: pick a direction → get a clear next step. Lens: "+laneWord+".";
      document.getElementById("lblExit").textContent="EXIT";
      document.getElementById("lblHub").textContent="HUB";
      document.querySelector("#btnExit span").textContent="EXIT";
      document.querySelector("#btnHub span").textContent="HUB";
      document.getElementById("pill").innerHTML="<b>Compass:</b> One center (<span class='g'>CORE</span>) + 16 hubs. No duplicate destinations. Unbuilt hubs route to <span class='g'>/404.html</span>.";
    }
    paintDragonBottomText();
  }

  function setLang(next){
    if(next!=="en" && next!=="zh" && next!=="es") next="en";
    lang=next;
    try{ LS.setItem("gd_lang",lang);}catch(e){}
    history.replaceState({}, "", location.pathname + q({lang:lang}));
    setPressed(btnEN, lang==="en");
    setPressed(btnZH, lang==="zh");
    setPressed(btnES, lang==="es");
    paintHeader();
    safeLayout();
  }
  btnEN.addEventListener("click", function(){ setLang("en"); }, {passive:true});
  btnZH.addEventListener("click", function(){ setLang("zh"); }, {passive:true});
  btnES.addEventListener("click", function(){ setLang("es"); }, {passive:true});

  // ===== Lane (NO reload; URL-only) =====
  var btnLP=document.getElementById("lanePlatform");
  var btnLE=document.getElementById("laneEngineering");
  setPressed(btnLP, lane==="platform");
  setPressed(btnLE, lane==="engineering");

  function setLane(next){
    if(next!=="platform" && next!=="engineering") next="platform";
    lane=next;
    history.replaceState({}, "", location.pathname + q({lane:lane}));
    setPressed(btnLP, lane==="platform");
    setPressed(btnLE, lane==="engineering");
    paintHeader();
    safeLayout();
  }
  btnLP.addEventListener("click", function(){ setLane("platform"); }, {passive:true});
  btnLE.addEventListener("click", function(){ setLane("engineering"); }, {passive:true});

  // ===== Corner buttons =====
  function bindCorner(id, path){
    var el=document.getElementById(id);
    if(!el) return;
    function act(){ go(path); }
    el.addEventListener("click", act, {passive:true});
    el.addEventListener("keydown", function(e){
      if(e.key==="Enter"||e.key===" "){ e.preventDefault(); act(); }
    });
  }
  bindCorner("btnExit", EXIT_ROUTE);
  bindCorner("btnHub", HUB_ROUTE);

  // ===== Init =====
  paintHeader();
  requestAnimationFrame(safeLayout);
  window.addEventListener("resize", function(){ safeLayout(); }, {passive:true});

})();
</script>

</body>
</html>
