<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Navigator</title>

<link rel="stylesheet" href="/assets/ui.css">
<link rel="stylesheet" href="/assets/branch.css">

<style>
/* minimal mount styling */

#scene{
  position:fixed;
  inset:0;
  z-index:0;
}

.uiLayer{
  position:relative;
  z-index:2;
  pointer-events:auto;
}

.navigatorHeader{
  padding:18px 24px;
  font-size:28px;
  font-weight:800;
}

.layerControls{
  padding:12px 24px;
  display:flex;
  gap:12px;
}

.layerControls button{
  padding:10px 16px;
  font-weight:700;
  border-radius:8px;
}
</style>

</head>

<body>

<!-- RENDER ENGINE MOUNT -->
<canvas id="scene"></canvas>

<!-- UI ABOVE THE SCENE -->
<div class="uiLayer">

<div class="navigatorHeader">
Navigator
</div>

<div class="layerControls">
<button onclick="navigatorLayer(1)">Layer 1</button>
<button onclick="navigatorLayer(2)">Layer 2</button>
</div>

</div>

<script src="/assets/instruments.js"></script>
<script src="/variant/scene.js"></script>

</body>
</html>
