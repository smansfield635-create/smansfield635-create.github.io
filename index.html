<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />
  <meta
    name="description"
    content="Constraint-governed world runtime baseline for the external harbor branch."
  />
  <title>World Is Round · External Harbor Branch</title>
  <link rel="stylesheet" href="./assets/ui.css?v=1006" />
</head>
<body data-shell="canonical" data-runtime="booting" data-diagnostics="peek">
  <div id="app" aria-label="World runtime host">
    <canvas id="world-canvas" aria-label="World canvas"></canvas>

    <div id="hud" aria-label="Heads-up display">
      <div id="title-bar" aria-label="Title and runtime state">
        <div class="brand-card">
          <h1 class="brand-title">World Is Round</h1>
          <div class="brand-subtitle">
            External branch baseline · Harbor → Gratitude → Generosity
          </div>
        </div>

        <div class="state-card">
          <div class="state-label">Runtime state</div>
          <div id="runtime-phase" class="state-value">BOOT</div>
        </div>
      </div>

      <button
        id="diagnostics-toggle"
        class="diagnostics-toggle"
        type="button"
        aria-label="Toggle diagnostics"
        aria-controls="debug-panel"
        aria-expanded="false"
      >
        ⌁
      </button>

      <div id="debug-panel" class="panel-card" aria-label="Debug instrumentation panel">
        <div id="debug-content" class="panel-grid"></div>
      </div>

      <div id="compass-overlay" class="panel-card" aria-label="Compass overlay">
        <canvas id="compass-canvas" aria-label="Compass canvas"></canvas>
      </div>
    </div>
  </div>

  <noscript>
    <div
      style="position:fixed;inset:0;z-index:100;display:grid;place-items:center;background:#000;color:#fff;font-family:system-ui,sans-serif;"
    >
      JavaScript is required to run the external world baseline.
    </div>
  </noscript>

  <script type="module">
    import { createRuntime } from "./world/scene_runtime.js?v=1006";

    const worldCanvas = document.getElementById("world-canvas");
    const compassCanvas = document.getElementById("compass-canvas");
    const debugContent = document.getElementById("debug-content");
    const runtimePhase = document.getElementById("runtime-phase");
    const diagnosticsToggle = document.getElementById("diagnostics-toggle");

    const runtime = createRuntime({
      worldCanvas,
      compassCanvas,
      debugContent,
      runtimePhase,
      diagnosticsToggle
    });

    runtime.start();
    window.__WORLD_RUNTIME__ = runtime;
    document.body.dataset.runtime = "running";
  </script>
</body>
</html>
