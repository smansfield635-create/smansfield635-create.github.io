<!DOCTYPE html>
<!-- TNT — /index.html (STABILIZED ENGINE CONTROL) -->
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Compass · DiamondGateBridge</title>

<link rel="stylesheet" href="/assets/ui.css"/>
<link rel="stylesheet" href="/assets/branch.css"/>

<script defer src="/assets/instruments.js"></script>
<script defer src="/assets/bg-engine.js"></script>
<script defer src="/assets/dragon-anatomy.js"></script>

<style>
body{margin:0}

/* Stage */
.stage{
position:relative;
width:min(1200px,94vw);
height:min(1200px,86vh);
margin:96px auto 0;
pointer-events:none;
}

/* Compass dial */
.dial{
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
width:min(900px,90vw);
height:min(900px,90vw);
border-radius:999px;
z-index:2;
background:
radial-gradient(circle at 50% 42%, rgba(255,255,255,.05), rgba(0,0,0,.45) 80%);
box-shadow:0 50px 180px rgba(0,0,0,.45);
}

/* Gems */
.node{
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%) rotate(45deg);
border-radius:22px;
border:1px solid rgba(255,255,255,.18);
background:linear-gradient(160deg,#0b0f16,#050608);
box-shadow:0 40px 120px rgba(0,0,0,.85);
cursor:pointer;
pointer-events:auto;
}

.core{width:200px;height:200px}
.l1{width:150px;height:150px}

.inner{
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;
transform:rotate(-45deg);
color:white;
font-weight:900;
letter-spacing:.6px;
}

/* corner buttons */
.corner{
position:fixed;
bottom:20px;
z-index:300;
}

.corner.left{left:20px}
.corner.right{right:20px}

.corner button{
background:#050608;
color:white;
border:1px solid rgba(255,255,255,.15);
padding:10px 14px;
border-radius:10px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="stage" id="stage">
<div class="dial"></div>
</div>

<div class="corner left">
<button id="btnExit">EXIT</button>
</div>

<div class="corner right">
<button id="btnHub">HUB</button>
</div>

<script>
(function(){
"use strict";

/* =========================================================
ENGINE STABILIZER
========================================================= */

function mountEngines(){

if(window.GD_BG && !window.__BG_ACTIVE){
window.__BG_ACTIVE = true;

window.GD_BG.mount({
fps:30,
dpr_cap:1.5,
moon_radius:0.065,
crater_count:18
});
}

if(window.GD_DRAGON && !window.__DRAGON_ACTIVE){
window.__DRAGON_ACTIVE = true;

window.GD_DRAGON.mount({
speed:0.18,       /* dramatically slower */
girth:3.2,        /* thicker dragon */
segments:120
});
}

}

window.addEventListener("load",mountEngines);

/* =========================================================
COMPASS
========================================================= */

const stage=document.getElementById("stage")

const nodes=[
{label:"CORE",cls:"core",x:0,y:0,href:"/index-core/index.html"},
{label:"LAWS",cls:"l1",x:0,y:-180,href:"/laws/"},
{label:"ENERGY",cls:"l1",x:180,y:0,href:"/explore/frontier/energy/"},
{label:"FINANCE",cls:"l1",x:0,y:180,href:"/finance/"},
{label:"GOVERNANCE",cls:"l1",x:-180,y:0,href:"/governance/"}
]

function build(){

nodes.forEach(n=>{
const d=document.createElement("div")
d.className="node "+n.cls

const inner=document.createElement("div")
inner.className="inner"
inner.textContent=n.label

d.appendChild(inner)

d.style.left=`calc(50% + ${n.x}px)`
d.style.top=`calc(50% + ${n.y}px)`

d.onclick=()=>location.href=n.href

stage.appendChild(d)

})

}

build()

/* =========================================================
NAV
========================================================= */

document.getElementById("btnExit").onclick=()=>location.href="/door/"
document.getElementById("btnHub").onclick=()=>location.href="/home/"

})();
</script>

</body>
</html>
