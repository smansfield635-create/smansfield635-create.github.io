name: Create Real Earth Cloud Asset

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/create_real_earth_cloud_asset.yml"

permissions:
  contents: write

jobs:
  create-real-earth-cloud-asset:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Create Earth asset folder
        run: |
          mkdir -p assets/earth

      - name: Install image tools
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick file curl

      - name: Download real NASA Blue Marble cloud map
        run: |
          curl -L -f \
            "https://neo.gsfc.nasa.gov/archive/bluemarble/cloud_combined_8192_preview.png" \
            -o /tmp/earth_clouds_real.png

      - name: Convert real cloud map to required JPG path
        run: |
          convert /tmp/earth_clouds_real.png \
            -resize 2048x1024\! \
            -colorspace sRGB \
            -quality 94 \
            assets/earth/earth_clouds_2048.jpg

      - name: Verify real Earth cloud JPG
        run: |
          test -s assets/earth/earth_clouds_2048.jpg
          file assets/earth/earth_clouds_2048.jpg

      - name: Commit real Earth cloud JPG
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add assets/earth/earth_clouds_2048.jpg

          if git diff --cached --quiet; then
            echo "Real Earth cloud asset already current."
          else
            git commit -m "Replace Earth clouds with real Blue Marble cloud asset"
            git push
          fi
