<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Nine Summits — Index</title>
<link rel="stylesheet" href="/assets/ui.css"/>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: #000;
  width: 100%;
  height: 100%;
  overflow: hidden;
}

#app-shell {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
}

#world {
  position: absolute;
  inset: 0;
  width: 100vw;
  height: 100vh;
  display: block;
  z-index: 0;
  background: #000;
}

#runtime-root,
#diagnostics-dock,
#debug-panel {
  position: relative;
  z-index: 10;
}

#boot-status {
  position: fixed;
  top: 0;
  left: 0;
  right: auto;
  max-width: calc(100vw - 16px);
  padding: 6px 10px;
  font-family: monospace;
  font-size: 12px;
  line-height: 1.35;
  color: #0f0;
  background: #000;
  border-right: 1px solid rgba(255,255,255,0.12);
  border-bottom: 1px solid rgba(255,255,255,0.12);
  z-index: 9999;
  white-space: pre-wrap;
  word-break: break-word;
}

.boot-ok { color: #7fffd4; }
.boot-warn { color: #ffd27a; }
.boot-fail { color: #ff7a7a; }

:root{
  --diag-bg:rgba(11,15,20,.92);
  --diag-panel:rgba(15,22,32,.96);
  --diag-line:#1f2a36;
  --diag-text:#d7f9ff;
  --diag-muted:rgba(215,249,255,.72);
  --diag-accent:#7fffd4;
}

.diagnostics-dock{
  position:fixed;
  left:12px;
  right:12px;
  bottom:12px;
  display:flex;
  justify-content:center;
  pointer-events:none;
  z-index:120;
}

.diagnostics-bar{
  width:min(1100px,100%);
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px 12px;
  border:1px solid rgba(255,255,255,.12);
  border-radius:18px;
  background:rgba(8,12,20,.78);
  box-shadow:0 20px 60px rgba(0,0,0,.44);
  backdrop-filter:blur(10px);
  pointer-events:auto;
}

.diagnostic-bar__summary{
  min-width:0;
  flex:1 1 auto;
  color:var(--diag-text);
  font-family:monospace;
  font-size:12px;
  line-height:1.35;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.diagnostics-toggle,
.diagnostics-tab{
  min-height:38px;
  padding:0 14px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.14);
  background:rgba(10,12,20,.42);
  color:rgba(255,255,255,.94);
  font:inherit;
  font-size:12px;
  font-weight:900;
  letter-spacing:.06em;
  text-transform:uppercase;
  cursor:pointer;
}

.diagnostics-toggle:active,
.diagnostics-tab:active{transform:translateY(1px)}

.diagnostics-toggle.is-active,
.diagnostics-tab.is-active{
  border-color:rgba(127,255,212,.64);
  color:var(--diag-accent);
}

.debug-panel{
  position:fixed;
  left:12px;
  right:12px;
  bottom:76px;
  display:none;
  justify-content:center;
  pointer-events:none;
  z-index:119;
}

.debug-panel.is-open{
  display:flex;
}

.debug-panel__sheet{
  width:min(1100px,100%);
  max-height:min(68vh,900px);
  overflow:auto;
  padding:12px;
  border:1px solid rgba(255,255,255,.14);
  border-radius:20px;
  background:var(--diag-bg);
  box-shadow:0 24px 90px rgba(0,0,0,.52);
  backdrop-filter:blur(12px);
  pointer-events:auto;
}

.debug-panel__tabs{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-bottom:12px;
}

.debug-panel__layer.hidden{
  display:none;
}

.debug-group{
  margin-bottom:12px;
  border:1px solid var(--diag-line);
  border-radius:12px;
  background:var(--diag-panel);
  overflow:hidden;
}

.debug-group__title{
  padding:12px;
  color:var(--diag-accent);
  font-weight:bold;
  font-family:monospace;
}

.debug-group__block{
  padding:12px;
  border-top:1px solid var(--diag-line);
}

.debug-row{
  display:flex;
  justify-content:space-between;
  gap:16px;
  margin:4px 0;
  font-family:monospace;
  color:var(--diag-text);
}

.debug-row div:first-child{
  opacity:.9;
}

.debug-row div:last-child{
  text-align:right;
  word-break:break-word;
}

.debug-preview{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:8px;
  margin-top:6px;
}

.debug-preview__item{
  padding:6px 8px;
  border:1px solid var(--diag-line);
  border-radius:8px;
  background:rgba(255,255,255,.02);
  font-family:monospace;
}

.debug-preview__k{
  opacity:.72;
  font-size:11px;
}

.debug-preview__v{
  margin-top:2px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.debug-status{
  color:var(--diag-accent);
  font-family:monospace;
  font-weight:bold;
  margin-bottom:12px;
}

.debug-small{
  opacity:.7;
  font-size:12px;
  margin-top:6px;
  font-family:monospace;
  color:var(--diag-text);
}

.debug-canvas-wrap{
  margin-top:10px;
  border:1px solid var(--diag-line);
  border-radius:8px;
  overflow:hidden;
  background:#0b0f14;
}

.debug-canvas{
  display:block;
  width:100%;
}

@media (max-width:760px){
  .debug-preview{
    grid-template-columns:1fr;
  }
  .debug-row{
    flex-direction:column;
    gap:2px;
  }
  .debug-row div:last-child{
    text-align:left;
  }
  .diagnostics-bar{
    flex-wrap:wrap;
  }
  .diagnostic-bar__summary{
    width:100%;
    white-space:normal;
  }
}
</style>
</head>

<body data-mode="round" data-diagnostics="peek">
<div id="app-shell">
  <canvas id="world"></canvas>

  <div id="runtime-root"></div>

  <div id="diagnostics-dock" class="diagnostics-dock">
    <div id="diagnostics-bar" class="diagnostics-bar">
      <div id="diagnostics-summary" class="diagnostic-bar__summary">STATE: OFFLINE</div>
      <button id="diagnostics-toggle" class="diagnostics-toggle" type="button">
        DIAGNOSTICS
      </button>
    </div>
  </div>

  <div id="debug-panel" class="debug-panel">
    <div class="debug-panel__sheet">
      <div id="debug-status" class="debug-status">STATE: OFFLINE</div>

      <div class="debug-panel__tabs">
        <button id="debug-tab-display" class="diagnostics-tab is-active" type="button">DISPLAY</button>
        <button id="debug-tab-diagnostics" class="diagnostics-tab" type="button">DIAGNOSTICS</button>
      </div>

      <div id="debug-layer-display" class="debug-panel__layer"></div>
      <div id="debug-layer-diagnostics" class="debug-panel__layer hidden"></div>
    </div>
  </div>
</div>

<div id="boot-status" class="boot-warn">BOOTING...</div>

<script type="module">
const statusNode = document.getElementById("boot-status");
const diagnosticsToggle = document.getElementById("diagnostics-toggle");
const diagnosticsSummary = document.getElementById("diagnostics-summary");
const debugPanel = document.getElementById("debug-panel");
const debugStatus = document.getElementById("debug-status");
const debugTabDisplay = document.getElementById("debug-tab-display");
const debugTabDiagnostics = document.getElementById("debug-tab-diagnostics");
const debugLayerDisplay = document.getElementById("debug-layer-display");
const debugLayerDiagnostics = document.getElementById("debug-layer-diagnostics");

const BOOT_CONTRACT = Object.freeze({
  id: "INDEX_BOOT_CONTRACT_RENEWAL_v5",
  engineContract: "PLANET_ENGINE_CONTRACT_RENEWAL_v1",
  runtimeContract: "WORLD_RUNTIME_CONTRACT_v1",
  renderContract: "RENDER_BASELINE_CONTRACT_RENEWAL_v3",
  diagnosticsPath: "/gauges/",
  runtimeStorageKey: "cte_runtime_v4",
  runtimeReceiptKey: "__AUTHORITY_RECEIPT__",
  bootStateKey: "__INDEX_BOOT_STATE__",
  ignitionTimeoutMs: 12000,
  ignitionPollMs: 100
});

const MODULES = Object.freeze([
  Object.freeze({
    key: "world_kernel",
    path: "/world/world_kernel.js",
    required: true
  }),
  Object.freeze({
    key: "planet_engine",
    path: "/world/planet_engine.js",
    required: true,
    validate(mod) {
      return typeof mod?.createPlanetEngine === "function" ||
        typeof mod?.buildPlanetField === "function" ||
        typeof mod?.default?.buildPlanetField === "function";
    },
    validationMessage: "planet_engine contract missing createPlanetEngine/buildPlanetField"
  }),
  Object.freeze({
    key: "render",
    path: "/world/render.js",
    required: true,
    validate(mod) {
      return typeof mod?.createRenderer === "function" ||
        typeof mod?.renderPlanet === "function" ||
        typeof mod?.default?.renderPlanet === "function";
    },
    validationMessage: "render contract missing createRenderer/renderPlanet"
  }),
  Object.freeze({
    key: "control",
    path: "/world/control.js",
    required: true,
    validate(mod) {
      return typeof mod?.createControlSystem === "function" ||
        typeof mod?.default?.createControlSystem === "function";
    },
    validationMessage: "control contract missing createControlSystem"
  }),
  Object.freeze({
    key: "instruments",
    path: "/assets/instruments.js",
    required: true
  }),
  Object.freeze({
    key: "runtime",
    path: "/world/runtime/world_runtime.js",
    required: true,
    validate(mod) {
      return typeof mod?.startRuntime === "function" ||
        typeof mod?.default?.startRuntime === "function";
    },
    validationMessage: "runtime contract missing startRuntime"
  })
]);

const bootState = {
  phase: "BOOT_INIT",
  activeModule: null,
  modulesLoaded: [],
  failedModule: null,
  failurePath: null,
  failureClass: null,
  failureMessage: "",
  verificationPass: false
};

const HISTORY_SIZE = 180;
const debugHistory = {
  fps: [],
  dtMs: [],
  coherence: [],
  stability: []
};

let diagnosticsMode = "display";
let diagnosticsOpen = false;

function pushHistory(arr, value) {
  arr.push(value);
  if (arr.length > HISTORY_SIZE) arr.shift();
}

function normalizeObject(value) {
  return value && typeof value === "object" && !Array.isArray(value) ? value : {};
}

function bool(v) {
  return v === true ? "true" : v === false ? "false" : "—";
}

function fmt(v, digits = 6) {
  return typeof v === "number" && Number.isFinite(v) ? v.toFixed(digits) : "—";
}

function esc(v) {
  return String(v ?? "—")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;");
}

function row(k, v) {
  return `<div class="debug-row"><div>${k}</div><div>${v ?? "—"}</div></div>`;
}

function buildPreview(items) {
  return `
    <div class="debug-preview">
      ${items.map(([k, v]) => `
        <div class="debug-preview__item">
          <div class="debug-preview__k">${esc(k)}</div>
          <div class="debug-preview__v">${esc(v)}</div>
        </div>
      `).join("")}
    </div>
  `;
}

function buildGroup(title, meta, previewItems, detailHtml) {
  return `
    <div class="debug-group">
      <div class="debug-group__title">
        ${esc(title)}${meta ? ` <span style="opacity:.7;font-weight:normal">• ${esc(meta)}</span>` : ""}
      </div>
      <div class="debug-group__block">
        ${buildPreview(previewItems)}
        <div style="margin-top:10px">${detailHtml}</div>
      </div>
    </div>
  `;
}

function drawSeries(canvas, seriesA, seriesB, yMax) {
  const ctx = canvas.getContext("2d");
  const w = canvas.width;
  const h = canvas.height;

  ctx.clearRect(0,0,w,h);
  ctx.fillStyle = "#0b0f14";
  ctx.fillRect(0,0,w,h);

  ctx.strokeStyle = "#1f2a36";
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, h - 12);
  ctx.lineTo(w, h - 12);
  ctx.stroke();

  function draw(series, color) {
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.beginPath();
    series.forEach((v, i) => {
      const n = typeof v === "number" && Number.isFinite(v)
        ? Math.max(0, Math.min(1, yMax > 0 ? v / yMax : 0))
        : 0;
      const x = (i / Math.max(1, HISTORY_SIZE - 1)) * w;
      const y = h - 12 - n * (h * 0.72);
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    });
    ctx.stroke();
  }

  draw(seriesA, "#7fffd4");
  draw(seriesB, "#6fe7ff");
}

function drawScalarSeries(canvas, seriesA, seriesB) {
  const ctx = canvas.getContext("2d");
  const w = canvas.width;
  const h = canvas.height;

  ctx.clearRect(0,0,w,h);
  ctx.fillStyle = "#0b0f14";
  ctx.fillRect(0,0,w,h);

  ctx.strokeStyle = "#1f2a36";
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, h - 12);
  ctx.lineTo(w, h - 12);
  ctx.stroke();

  function draw(series, color) {
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.beginPath();
    series.forEach((v, i) => {
      const n = typeof v === "number" && Number.isFinite(v) ? Math.max(0, Math.min(1, v)) : 0;
      const x = (i / Math.max(1, HISTORY_SIZE - 1)) * w;
      const y = h - 12 - n * (h * 0.72);
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    });
    ctx.stroke();
  }

  draw(seriesA, "#7fffd4");
  draw(seriesB, "#ffd27a");
}

function readWindowReceipt() {
  const receipt = window[BOOT_CONTRACT.runtimeReceiptKey];
  return receipt && typeof receipt === "object" ? receipt : null;
}

function readRuntimeStorageReceipt() {
  try {
    const raw = localStorage.getItem(BOOT_CONTRACT.runtimeStorageKey);
    if (!raw) return null;
    const parsed = JSON.parse(raw);
    return parsed && typeof parsed === "object" ? parsed : null;
  } catch {
    return null;
  }
}

function readAuthorityReceipt() {
  return normalizeObject(readWindowReceipt() || readRuntimeStorageReceipt());
}

function readInstrument(receipt) {
  return normalizeObject(receipt.instrument);
}

function renderDiagnosticsSurface() {
  const receipt = readAuthorityReceipt();
  const instrument = readInstrument(receipt);

  if (Object.keys(receipt).length === 0 || Object.keys(instrument).length === 0) {
    diagnosticsSummary.textContent = "STATE: OFFLINE";
    debugStatus.textContent = "STATE: OFFLINE";
    debugLayerDisplay.innerHTML = "";
    debugLayerDiagnostics.innerHTML = "";
    return;
  }

  const state = instrument.classifiedState ?? "OFFLINE";
  const timestampMs = receipt.timestamp ? new Date(receipt.timestamp).getTime() : null;
  const ageMs = typeof timestampMs === "number" && Number.isFinite(timestampMs)
    ? Math.max(0, Date.now() - timestampMs)
    : null;

  diagnosticsSummary.textContent =
    `STATE: ${state} • ${receipt.phase ?? "—"} • ${Math.round(receipt.fps || 0)}fps • ${ageMs ?? "—"}ms`;

  debugStatus.textContent =
    `STATE: ${state} • ${receipt.phase ?? "—"} • ${receipt.mode ?? "—"} • ${ageMs ?? "—"}ms`;

  const displayPayload = normalizeObject(instrument.displayPayload);
  const baseline = normalizeObject(displayPayload.baseline);
  const progress = normalizeObject(displayPayload.progress);
  const failure = normalizeObject(displayPayload.failure);

  const diagnosticsPayload = normalizeObject(instrument.diagnosticsPayload);

  pushHistory(debugHistory.fps, typeof diagnosticsPayload.fps === "number" ? diagnosticsPayload.fps : (receipt.fps || 0));
  pushHistory(debugHistory.dtMs, typeof diagnosticsPayload.dtMs === "number" ? diagnosticsPayload.dtMs : (receipt.dtMs || 0));
  pushHistory(debugHistory.coherence, typeof progress.c === "number" ? progress.c : 0);
  pushHistory(debugHistory.stability, typeof progress.st === "number" ? progress.st : 0);

  debugLayerDisplay.innerHTML = [
    buildGroup(
      "RUNTIME",
      `${receipt.phase ?? "—"} • ${Math.round(receipt.fps || 0)} fps`,
      [
        ["classifiedState", state],
        ["phase", receipt.phase ?? "—"],
        ["mode", receipt.mode ?? "—"]
      ],
      [
        row("classifiedState", state),
        row("phase", receipt.phase ?? "—"),
        row("mode", receipt.mode ?? "—"),
        row("timestamp", receipt.timestamp ?? "—"),
        row("fps", Math.round(receipt.fps || 0)),
        row("dtMs", Math.round(receipt.dtMs || 0)),
        row("failure.phase", receipt.failure?.phase ?? "—"),
        row("failure.message", receipt.failure?.message ?? "—")
      ].join("")
    ),
    buildGroup(
      "BASELINE",
      `${baseline.p ?? "—"} • ${baseline.s ?? "—"}`,
      [
        ["t", baseline.t ?? "—"],
        ["p", baseline.p ?? "—"],
        ["s", baseline.s ?? "—"]
      ],
      [
        row("t", baseline.t ?? "—"),
        row("p", baseline.p ?? "—"),
        row("s", baseline.s ?? "—"),
        row("v", baseline.v ?? "—")
      ].join("")
    ),
    buildGroup(
      "PROGRESS",
      `${fmt(progress.c,3)} / ${fmt(progress.st,3)}`,
      [
        ["f", progress.f ?? "—"],
        ["dt", progress.dt ?? "—"],
        ["tr", progress.tr ?? "—"]
      ],
      [
        row("f", progress.f ?? "—"),
        row("dt", progress.dt ?? "—"),
        row("c", fmt(progress.c, 6)),
        row("st", fmt(progress.st, 6)),
        row("tr", progress.tr ?? "—"),
        `<div class="debug-canvas-wrap"><canvas id="debug-progress-chart" class="debug-canvas" width="1000" height="120"></canvas></div>`,
        `<div class="debug-small">coherence = green · stability = yellow</div>`
      ].join("")
    ),
    buildGroup(
      "FAILURE",
      `${failure.ph ?? "—"}`,
      [
        ["ph", failure.ph ?? "—"],
        ["msg", failure.msg ?? "—"],
        ["s", bool(failure.s)]
      ],
      [
        row("ph", failure.ph ?? "—"),
        row("msg", failure.msg ?? "—"),
        row("s", bool(failure.s))
      ].join("")
    )
  ].join("");

  debugLayerDiagnostics.innerHTML = [
    buildGroup(
      "CLASSIFICATION PROOF",
      `${state}`,
      [
        ["classifiedState", state],
        ["payloadState", diagnosticsPayload.classifiedState ?? "—"],
        ["sourcePhase", diagnosticsPayload.sourcePhase ?? "—"]
      ],
      [
        row("classifiedState", state),
        row("diagnostics.classifiedState", diagnosticsPayload.classifiedState ?? "—"),
        row("sourcePhase", diagnosticsPayload.sourcePhase ?? "—"),
        row("sourceMode", diagnosticsPayload.sourceMode ?? "—")
      ].join("")
    ),
    buildGroup(
      "FRESHNESS PROOF",
      `${bool(diagnosticsPayload.fresh)}`,
      [
        ["timestampMs", diagnosticsPayload.timestampMs ?? "—"],
        ["ageMs", diagnosticsPayload.ageMs ?? "—"],
        ["fresh", bool(diagnosticsPayload.fresh)]
      ],
      [
        row("timestampMs", diagnosticsPayload.timestampMs ?? "—"),
        row("ageMs", diagnosticsPayload.ageMs ?? "—"),
        row("timestampValid", bool(diagnosticsPayload.timestampValid)),
        row("fresh", bool(diagnosticsPayload.fresh))
      ].join("")
    ),
    buildGroup(
      "FRAME PROOF",
      `${bool(diagnosticsPayload.frameSync)} / ${bool(diagnosticsPayload.verificationPass)}`,
      [
        ["frameSync", bool(diagnosticsPayload.frameSync)],
        ["verificationPass", bool(diagnosticsPayload.verificationPass)],
        ["fps", diagnosticsPayload.fps ?? "—"]
      ],
      [
        row("frameSync", bool(diagnosticsPayload.frameSync)),
        row("verificationPass", bool(diagnosticsPayload.verificationPass)),
        row("fps", diagnosticsPayload.fps ?? "—"),
        row("dtMs", diagnosticsPayload.dtMs ?? "—"),
        `<div class="debug-canvas-wrap"><canvas id="debug-runtime-chart" class="debug-canvas" width="1000" height="120"></canvas></div>`,
        `<div class="debug-small">fps = green · dtMs = cyan</div>`
      ].join("")
    ),
    buildGroup(
      "FAILURE PROOF",
      `${diagnosticsPayload.failurePhase ?? "—"}`,
      [
        ["failurePhase", diagnosticsPayload.failurePhase ?? "—"],
        ["failureMessage", diagnosticsPayload.failureMessage ?? "—"],
        ["receiptFailure", receipt.failure?.phase ?? "—"]
      ],
      [
        row("failurePhase", diagnosticsPayload.failurePhase ?? "—"),
        row("failureMessage", diagnosticsPayload.failureMessage ?? "—"),
        row("receipt.failure.phase", receipt.failure?.phase ?? "—"),
        row("receipt.failure.message", receipt.failure?.message ?? "—")
      ].join("")
    )
  ].join("");

  const progressChart = document.getElementById("debug-progress-chart");
  if (progressChart) {
    drawScalarSeries(progressChart, debugHistory.coherence, debugHistory.stability);
  }

  const runtimeChart = document.getElementById("debug-runtime-chart");
  if (runtimeChart) {
    drawSeries(
      runtimeChart,
      debugHistory.fps,
      debugHistory.dtMs,
      Math.max(60, ...debugHistory.fps, ...debugHistory.dtMs, 1)
    );
  }
}

function syncDiagnosticsView() {
  debugPanel.classList.toggle("is-open", diagnosticsOpen);
  diagnosticsToggle.classList.toggle("is-active", diagnosticsOpen);
  debugLayerDisplay.classList.toggle("hidden", diagnosticsMode !== "display");
  debugLayerDiagnostics.classList.toggle("hidden", diagnosticsMode !== "diagnostics");
  debugTabDisplay.classList.toggle("is-active", diagnosticsMode === "display");
  debugTabDiagnostics.classList.toggle("is-active", diagnosticsMode === "diagnostics");
}

function openDiagnostics(mode) {
  diagnosticsOpen = true;
  diagnosticsMode = mode;
  syncDiagnosticsView();
}

function closeDiagnostics() {
  diagnosticsOpen = false;
  syncDiagnosticsView();
}

function toggleDiagnostics() {
  diagnosticsOpen = !diagnosticsOpen;
  syncDiagnosticsView();
}

function installDiagnosticsControls() {
  diagnosticsToggle?.addEventListener("click", function onDiagnosticsToggle() {
    toggleDiagnostics();
  });

  debugTabDisplay?.addEventListener("click", function onDisplayTab() {
    openDiagnostics("display");
  });

  debugTabDiagnostics?.addEventListener("click", function onDiagnosticsTab() {
    openDiagnostics("diagnostics");
  });
}

function renderDiagnosticsLoop() {
  renderDiagnosticsSurface();
  window.requestAnimationFrame(renderDiagnosticsLoop);
}

function writeBootState() {
  window[BOOT_CONTRACT.bootStateKey] = {
    phase: bootState.phase,
    activeModule: bootState.activeModule,
    modulesLoaded: [...bootState.modulesLoaded],
    failedModule: bootState.failedModule,
    failurePath: bootState.failurePath,
    failureClass: bootState.failureClass,
    failureMessage: bootState.failureMessage,
    verificationPass: bootState.verificationPass
  };
}

function setBootPhase(phase, extras = {}) {
  bootState.phase = phase;

  if ("activeModule" in extras) bootState.activeModule = extras.activeModule;
  if ("failedModule" in extras) bootState.failedModule = extras.failedModule;
  if ("failurePath" in extras) bootState.failurePath = extras.failurePath;
  if ("failureClass" in extras) bootState.failureClass = extras.failureClass;
  if ("failureMessage" in extras) bootState.failureMessage = extras.failureMessage;
  if ("verificationPass" in extras) bootState.verificationPass = extras.verificationPass;

  writeBootState();
}

function setStatus(message, tone = "boot-warn") {
  if (statusNode) {
    statusNode.textContent = message;
    statusNode.className = tone;
  }

  console.log("[BOOT]", message);
}

function toMessage(error) {
  if (error instanceof Error && typeof error.message === "string" && error.message.length > 0) {
    return error.message;
  }

  return String(error);
}

function classifyImportFailure(error) {
  const message = toMessage(error);
  const lowered = message.toLowerCase();

  if (
    lowered.includes("unexpected end of input") ||
    lowered.includes("unexpected end of script")
  ) {
    return "PARSE_EOF";
  }

  if (lowered.includes("missing ) after argument list")) {
    return "PARSE_ARGUMENT_LIST";
  }

  if (lowered.includes("unexpected token")) {
    return "PARSE_TOKEN";
  }

  if (lowered.includes("failed to fetch dynamically imported module")) {
    return "FETCH_IMPORT";
  }

  if (
    lowered.includes("does not provide an export") ||
    lowered.includes("cannot find module")
  ) {
    return "EXPORT_CONTRACT";
  }

  return "IMPORT_FAILURE";
}

function formatImportFailure(definition, error) {
  const failureClass = classifyImportFailure(error);
  const message = toMessage(error);

  return [
    "BOOT ERROR: " + definition.key + " import failed",
    definition.path,
    "CLASS: " + failureClass,
    message
  ].join("\n");
}

async function importModule(definition) {
  setBootPhase("MODULE_IMPORT", {
    activeModule: definition.key,
    failedModule: null,
    failurePath: null,
    failureClass: null,
    failureMessage: "",
    verificationPass: false
  });

  setStatus("IMPORTING " + definition.key.toUpperCase() + "...", "boot-warn");

  let mod;

  try {
    mod = await import(definition.path);
  } catch (error) {
    const failureClass = classifyImportFailure(error);
    const failureMessage = toMessage(error);
    const failureBlock = formatImportFailure(definition, error);

    setBootPhase("MODULE_IMPORT_FAILED", {
      activeModule: definition.key,
      failedModule: definition.key,
      failurePath: definition.path,
      failureClass: failureClass,
      failureMessage: failureMessage,
      verificationPass: false
    });

    setStatus(failureBlock, "boot-fail");
    console.error("[BOOT] " + definition.key + " import failed", error);
    throw error;
  }

  if (typeof definition.validate === "function") {
    const valid = definition.validate(mod);

    if (valid !== true) {
      const validationError = new Error(
        definition.validationMessage ||
        (definition.key + " contract validation failed")
      );

      const failureClass = "CONTRACT_VALIDATION";
      const failureMessage = toMessage(validationError);
      const failureBlock = [
        "BOOT ERROR: " + definition.key + " validation failed",
        definition.path,
        "CLASS: " + failureClass,
        failureMessage
      ].join("\n");

      setBootPhase("MODULE_VALIDATION_FAILED", {
        activeModule: definition.key,
        failedModule: definition.key,
        failurePath: definition.path,
        failureClass: failureClass,
        failureMessage: failureMessage,
        verificationPass: false
      });

      setStatus(failureBlock, "boot-fail");
      console.error("[BOOT] " + definition.key + " validation failed", validationError);
      throw validationError;
    }
  }

  bootState.modulesLoaded.push(definition.key);
  writeBootState();

  setStatus("IMPORTED " + definition.key.toUpperCase(), "boot-ok");
  return mod;
}

async function preflightModules() {
  const loaded = Object.create(null);

  for (const definition of MODULES) {
    loaded[definition.key] = await importModule(definition);
  }

  setBootPhase("MODULE_PREFLIGHT_OK", {
    activeModule: null,
    failedModule: null,
    failurePath: null,
    failureClass: null,
    failureMessage: "",
    verificationPass: false
  });

  return loaded;
}

function resolveStartRuntime(runtimeModule) {
  if (typeof runtimeModule?.startRuntime === "function") return runtimeModule.startRuntime;
  if (typeof runtimeModule?.default?.startRuntime === "function") return runtimeModule.default.startRuntime;
  return null;
}

function validateCanvasPresence() {
  const world = document.getElementById("world");

  if (!world) {
    throw new Error("Missing #world canvas");
  }

  return world;
}

function resolveVerificationState() {
  const windowReceipt = readWindowReceipt();
  const storageReceipt = readRuntimeStorageReceipt();

  const verificationPass =
    windowReceipt?.verification?.pass === true ||
    storageReceipt?.verification?.pass === true;

  const failurePhase =
    windowReceipt?.failure?.phase ??
    storageReceipt?.failure?.phase ??
    null;

  const failureMessage =
    windowReceipt?.failure?.message ??
    storageReceipt?.failure?.message ??
    "";

  return {
    verificationPass,
    failurePhase,
    failureMessage
  };
}

async function waitForIgnition() {
  const startedAt = performance.now();

  setBootPhase("IGNITION_WAIT", {
    activeModule: null,
    failedModule: null,
    failurePath: null,
    failureClass: null,
    failureMessage: "",
    verificationPass: false
  });

  while ((performance.now() - startedAt) < BOOT_CONTRACT.ignitionTimeoutMs) {
    const state = resolveVerificationState();

    if (state.failurePhase) {
      setBootPhase("RUNTIME_FAILURE", {
        activeModule: "runtime",
        failedModule: "runtime",
        failurePath: "/world/runtime/world_runtime.js",
        failureClass: "RUNTIME_FAILURE",
        failureMessage: state.failureMessage,
        verificationPass: false
      });

      setStatus(
        [
          "RUNTIME ERROR: " + state.failurePhase,
          state.failureMessage || "Unknown runtime failure"
        ].join("\n"),
        "boot-fail"
      );

      return false;
    }

    if (state.verificationPass === true) {
      setBootPhase("RUNNING", {
        activeModule: null,
        failedModule: null,
        failurePath: null,
        failureClass: null,
        failureMessage: "",
        verificationPass: true
      });

      setStatus(
        [
          "RUNNING",
          "BOOT: " + BOOT_CONTRACT.id,
          "ENGINE: " + BOOT_CONTRACT.engineContract,
          "RUNTIME: " + BOOT_CONTRACT.runtimeContract,
          "RENDER: " + BOOT_CONTRACT.renderContract
        ].join("\n"),
        "boot-ok"
      );

      return true;
    }

    setStatus(
      [
        "WAITING FOR IGNITION...",
        "BOOT: " + BOOT_CONTRACT.id,
        "ENGINE: " + BOOT_CONTRACT.engineContract,
        "RUNTIME: " + BOOT_CONTRACT.runtimeContract,
        "RENDER: " + BOOT_CONTRACT.renderContract
      ].join("\n"),
      "boot-warn"
    );

    await new Promise(function waitForPoll(resolve) {
      window.setTimeout(resolve, BOOT_CONTRACT.ignitionPollMs);
    });
  }

  const finalState = resolveVerificationState();

  if (finalState.failurePhase) {
    setBootPhase("RUNTIME_FAILURE", {
      activeModule: "runtime",
      failedModule: "runtime",
      failurePath: "/world/runtime/world_runtime.js",
      failureClass: "RUNTIME_FAILURE",
      failureMessage: finalState.failureMessage,
      verificationPass: false
    });

    setStatus(
      [
        "RUNTIME ERROR: " + finalState.failurePhase,
        finalState.failureMessage || "Unknown runtime failure"
      ].join("\n"),
      "boot-fail"
    );

    return false;
  }

  setBootPhase("IGNITION_TIMEOUT", {
    activeModule: null,
    failedModule: "runtime",
    failurePath: "/world/runtime/world_runtime.js",
    failureClass: "IGNITION_TIMEOUT",
    failureMessage: "Ignition timed out before verification pass.",
    verificationPass: false
  });

  setStatus(
    [
      "IGNITION TIMEOUT",
      "BOOT: " + BOOT_CONTRACT.id,
      "ENGINE: " + BOOT_CONTRACT.engineContract,
      "RUNTIME: " + BOOT_CONTRACT.runtimeContract,
      "RENDER: " + BOOT_CONTRACT.renderContract
    ].join("\n"),
    "boot-fail"
  );

  return false;
}

async function boot() {
  try {
    setBootPhase("BOOT_INIT", {
      activeModule: null,
      failedModule: null,
      failurePath: null,
      failureClass: null,
      failureMessage: "",
      verificationPass: false
    });

    validateCanvasPresence();

    setStatus(
      [
        "BOOT CONTRACT: " + BOOT_CONTRACT.id,
        "ENGINE: " + BOOT_CONTRACT.engineContract,
        "RUNTIME: " + BOOT_CONTRACT.runtimeContract,
        "RENDER: " + BOOT_CONTRACT.renderContract
      ].join("\n"),
      "boot-warn"
    );

    const modules = await preflightModules();
    const startRuntime = resolveStartRuntime(modules.runtime);

    if (!startRuntime) {
      const failureMessage = "runtime startRuntime missing";

      setBootPhase("RUNTIME_CONTRACT_FAILURE", {
        activeModule: "runtime",
        failedModule: "runtime",
        failurePath: "/world/runtime/world_runtime.js",
        failureClass: "RUNTIME_CONTRACT_FAILURE",
        failureMessage: failureMessage,
        verificationPass: false
      });

      setStatus(
        [
          "BOOT ERROR: runtime startRuntime missing",
          "/world/runtime/world_runtime.js",
          "CLASS: RUNTIME_CONTRACT_FAILURE",
          failureMessage
        ].join("\n"),
        "boot-fail"
      );

      return;
    }

    setBootPhase("RUNTIME_START", {
      activeModule: "runtime",
      failedModule: null,
      failurePath: null,
      failureClass: null,
      failureMessage: "",
      verificationPass: false
    });

    setStatus(
      [
        "STARTING RUNTIME...",
        "BOOT: " + BOOT_CONTRACT.id,
        "ENGINE: " + BOOT_CONTRACT.engineContract,
        "RUNTIME: " + BOOT_CONTRACT.runtimeContract,
        "RENDER: " + BOOT_CONTRACT.renderContract
      ].join("\n"),
      "boot-warn"
    );

    startRuntime();
    await waitForIgnition();
  } catch {
    // failure already surfaced above
  }
}

installDiagnosticsControls();
syncDiagnosticsView();
writeBootState();
renderDiagnosticsLoop();
boot();
</script>
