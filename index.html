<script>
(function(){
"use strict";

/* ====== STATUS HELPERS ====== */
function set(id, txt, bad){
  var el=document.getElementById(id);
  if(!el) return;
  el.textContent = txt;
  if(bad){ el.classList.remove("dim"); el.classList.add("bad"); }

function findScriptSrcContains(part){
  try{
    var ss = document.scripts || [];
    for(var i=0;i<ss.length;i++){
      var s = ss[i];
      var src = s && s.src ? String(s.src) : "";
      if(src.indexOf(part) >= 0) return src;
    }
  }catch(e){}
  return "NOT_FOUND";
}

function mkNode(label, code, cls, dx, dy){

  d.className="node "+cls;
  var inner=document.createElement("div");
  inner.className="inner";
  var w=document.createElement("div"); w.className="word"; w.textContent=label;
  var c=document.createElement("div"); c.className="code"; c.textContent=code;
  inner.appendChild(w); inner.appendChild(c);
  d.appendChild(inner);
  d.style.left="50%";
  d.style.top="50%";
  d.style.transform="translate("+dx+"px,"+dy+"px) rotate(45deg)";
  stage.appendChild(d);
}
