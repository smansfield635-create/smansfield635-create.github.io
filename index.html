<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Compass</title>

<link rel="stylesheet" href="/assets/ui.css"/>
<link rel="stylesheet" href="/assets/branch.css"/>
<script defer src="/assets/instruments.js"></script>

<style>
a{color:inherit;text-decoration:none}
body::before,body::after{pointer-events:none!important}

:root{
  --R:175px;              /* Increased radial distance */
  --D:180px;              /* Primary size */
  --Dminor:160px;         /* Secondary diagonal size */

  --onyxA:rgba(8,10,14,.94);
  --onyxB:rgba(12,14,18,.98);

  --crimson:rgba(120,0,22,.38);
  --festival:rgba(255,43,43,.22);
  --opalV:rgba(90,40,120,.14);

  --gold:rgba(201,162,74,.55);
  --goldGlow:rgba(201,162,74,.35);

  --shadow:0 40px 140px rgba(0,0,0,.75);
}

.stage{
  position:relative;
  width:min(820px,94vw);
  height:min(820px,82vh);
  margin:120px auto 0;
  pointer-events:none;
}

/* Base Diamond */
.d{
  position:absolute;
  left:50%;
  top:50%;
  transform-origin:center;
  border-radius:28px;
  cursor:pointer;
  pointer-events:auto;
  overflow:hidden;
  transition:transform .18s ease, box-shadow .18s ease;
}

.primary{
  width:var(--D);
  height:var(--D);
}

.secondary{
  width:var(--Dminor);
  height:var(--Dminor);
}

.surface{
  background:
    radial-gradient(circle at 18% 18%, var(--crimson), transparent 70%),
    radial-gradient(circle at 82% 30%, var(--opalV), transparent 74%),
    radial-gradient(circle at 70% 92%, var(--festival), transparent 62%),
    linear-gradient(160deg, var(--onyxA), var(--onyxB));
  border:1px solid rgba(255,255,255,.16);
  box-shadow:var(--shadow);
}

.goldEdge{
  border:1px solid var(--gold);
  box-shadow:var(--shadow), 0 0 28px var(--goldGlow);
}

.d:hover{
  transform:translate(-50%,-50%) rotate(45deg) scale(1.04);
}

.inner{
  width:100%;
  height:100%;
  transform:rotate(-45deg);
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:950;
  font-size:18px;
  letter-spacing:.6px;
  text-align:center;
}

/* Placement */
.dN{transform:translate(-50%,-50%) translate(0,-175px) rotate(45deg)}
.dE{transform:translate(-50%,-50%) translate(175px,0) rotate(45deg)}
.dS{transform:translate(-50%,-50%) translate(0,175px) rotate(45deg)}
.dW{transform:translate(-50%,-50%) translate(-175px,0) rotate(45deg)}
.dNE{transform:translate(-50%,-50%) translate(124px,-124px) rotate(45deg)}
.dNW{transform:translate(-50%,-50%) translate(-124px,-124px) rotate(45deg)}

/* Mobile refinement */
@media (max-width:600px){
  :root{
    --R:155px;
    --D:160px;
    --Dminor:145px;
  }
}

</style>
</head>

<body>

<div class="stage">

  <div class="d primary surface dN" id="dExplore">
    <div class="inner" id="txtExplore">EXPLORE</div>
  </div>

  <div class="d primary surface dE" id="dProducts">
    <div class="inner" id="txtProducts">PRODUCTS</div>
  </div>

  <div class="d primary surface dS" id="dLaws">
    <div class="inner" id="txtLaws">LAWS</div>
  </div>

  <div class="d primary surface dW" id="dGauges">
    <div class="inner" id="txtGauges">GAUGES</div>
  </div>

  <!-- Research (secondary geometry, gold trimmed) -->
  <div class="d secondary surface goldEdge dNE" id="dResearch">
    <div class="inner" id="txtResearch">RESEARCH</div>
  </div>

  <!-- Education (secondary geometry, neutral) -->
  <div class="d secondary surface dNW" id="dEducation">
    <div class="inner" id="txtEducation">EDUCATION</div>
  </div>

</div>

<script>
(function(){
  var qs=new URLSearchParams(location.search);
  var lang=qs.get("lang")||localStorage.getItem("gd_lang")||"en";
  var style=qs.get("style")||localStorage.getItem("gd_style")||"informal";
  var time=qs.get("time")||localStorage.getItem("gd_time")||"now";
  var depth=qs.get("depth")||localStorage.getItem("gd_depth")||"explore";

  localStorage.setItem("gd_lang",lang);
  localStorage.setItem("gd_style",style);
  localStorage.setItem("gd_time",time);
  localStorage.setItem("gd_depth",depth);

  function q(){
    return "?lang="+lang+"&style="+style+"&time="+time+"&depth="+depth;
  }

  function go(p){location.href=p+q();}

  document.getElementById("dExplore").onclick=()=>go("/explore/");
  document.getElementById("dProducts").onclick=()=>go("/products/");
  document.getElementById("dLaws").onclick=()=>go("/laws/");
  document.getElementById("dGauges").onclick=()=>go("/gauges/");
  document.getElementById("dResearch").onclick=()=>go("/research/");
  document.getElementById("dEducation").onclick=()=>go("/products/education/");

  if(lang==="zh"){
    txtExplore.textContent="探索";
    txtProducts.textContent="产品";
    txtLaws.textContent="法则";
    txtGauges.textContent="量规";
    txtResearch.textContent="研究";
    txtEducation.textContent="教育";
  }
  if(lang==="es"){
    txtExplore.textContent="EXPLORAR";
    txtProducts.textContent="PRODUCTOS";
    txtLaws.textContent="LEYES";
    txtGauges.textContent="MEDIDORES";
    txtResearch.textContent="INVESTIGACIÓN";
    txtEducation.textContent="EDUCACIÓN";
  }
})();
</script>

</body>
</html>
