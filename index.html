<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Nine Summits</title>

<link rel="stylesheet" href="./assets/ui.css"/>

<style>
html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:#030712;
  color:#fff;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
}

/* ===== LAYERS ===== */
#app-shell,#world-layer,#door-layer{
  position:fixed;inset:0;
}

#world-canvas{
  position:fixed;inset:0;
  width:100%;
  height:100%;
  display:block;
  z-index:1;
}

/* ===== DOOR ===== */
#door-layer{
  z-index:10;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  pointer-events:none;
}

.door-panel{
  pointer-events:auto;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:18px;
}

/* TITLE */
.door-title{
  margin:0;
  font-size:clamp(44px,7vw,96px);
  font-weight:950;
  letter-spacing:.05em;
  line-height:.9;
  text-shadow:0 10px 40px rgba(0,0,0,.6);
}

/* SUBTEXT */
.door-sub{
  margin:0;
  font-size:clamp(16px,2vw,22px);
  color:rgba(255,255,255,.82);
}

.door-tag{
  margin:0;
  font-size:clamp(13px,1.5vw,16px);
  color:rgba(255,255,255,.6);
}

/* BUTTONS */
.door-buttons{
  display:flex;
  gap:14px;
  flex-wrap:wrap;
  justify-content:center;
}

.door-btn{
  border:1px solid rgba(255,255,255,.18);
  background:rgba(255,255,255,.08);
  color:#fff;
  border-radius:999px;
  padding:14px 20px;
  font-weight:800;
  cursor:pointer;
  backdrop-filter:blur(10px);
  transition:.2s;
}
.door-btn:hover{transform:translateY(-2px)}

/* ===== CONTROL PANEL ===== */
#control-panel{
  position:fixed;
  left:50%;
  bottom:18px;
  transform:translateX(-50%);
  z-index:12;
  display:flex;
  gap:10px;
}

.ctrl-btn{
  border:1px solid rgba(255,255,255,.16);
  background:rgba(0,0,0,.5);
  color:#fff;
  border-radius:999px;
  padding:10px 14px;
  font-weight:800;
  cursor:pointer;
}

/* ===== STATE ===== */
.hidden{display:none!important}

</style>
</head>

<body>

<div id="app-shell">

  <!-- WORLD -->
  <canvas id="world-canvas"></canvas>

  <!-- DOOR -->
  <div id="door-layer">
    <div class="door-panel">
      <h1 class="door-title">NINE SUMMITS</h1>
      <p class="door-sub">Choose your reality.</p>
      <p class="door-tag">Enter simple. Discover power. Choose depth.</p>

      <div class="door-buttons">
        <button id="btn-round" class="door-btn">WORLD IS ROUND</button>
        <button id="btn-flat" class="door-btn">WORLD IS FLAT</button>
      </div>
    </div>
  </div>

  <!-- CONTROL -->
  <div id="control-panel" class="hidden">
    <button id="btn-open" class="ctrl-btn">OPEN</button>
    <button id="btn-explore" class="ctrl-btn">EXPLORE</button>
    <button id="btn-products" class="ctrl-btn">PRODUCTS</button>
    <button id="btn-laws" class="ctrl-btn">LAWS</button>
  </div>

</div>

<script type="module">

import { createPlanetEngine } from "./world/planet_engine.js";
import { createRenderer } from "./world/render.js";
import { createControlSystem } from "./world/control.js";

/* ===== INIT ===== */
const params = new URLSearchParams(location.search);
const mode = params.get("mode") || "door";

const canvas = document.getElementById("world-canvas");
const ctx = canvas.getContext("2d");

const doorLayer = document.getElementById("door-layer");
const controlPanel = document.getElementById("control-panel");

const planetEngine = createPlanetEngine();
const renderer = createRenderer();
const control = createControlSystem();

/* ===== STATE ===== */
let planetField = null;
let raf = 0;
let last = performance.now();
let dragging = false;
let lx = 0, ly = 0;

/* ===== RESIZE ===== */
function resize(){
  canvas.width = innerWidth;
  canvas.height = innerHeight;
  control.resize(innerWidth, innerHeight);
}

/* ===== BUILD ===== */
function build(){
  if(!planetField){
    planetField = planetEngine.buildPlanetField({});
  }
}

/* ===== RENDER ===== */
function render(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  if(!planetField) return;

  renderer.renderPlanet({
    ctx,
    planetField,
    projectPoint:(lat,lon,r=0)=>control.projectSphere(lat,lon,r),
    viewState:control.getCameraState()
  });
}

/* ===== LOOP ===== */
function loop(t){
  const dt = t-last;
  last=t;

  if(!dragging){
    control.stepInertia(dt);
  }

  render();
  raf=requestAnimationFrame(loop);
}

/* ===== MODE ===== */
function enterDoor(){
  doorLayer.classList.remove("hidden");
  controlPanel.classList.add("hidden");
}

function enterWorld(flat=false){
  doorLayer.classList.add("hidden");
  controlPanel.classList.remove("hidden");

  build();

  canvas.style.filter = flat ? "blur(6px) brightness(.7)" : "none";

  if(!raf){
    last=performance.now();
    raf=requestAnimationFrame(loop);
  }
}

/* ===== INPUT ===== */
canvas.addEventListener("pointerdown",(e)=>{
  if(mode==="door") return;
  dragging=true;
  lx=e.clientX; ly=e.clientY;
});

window.addEventListener("pointermove",(e)=>{
  if(!dragging) return;
  const dx=e.clientX-lx;
  const dy=e.clientY-ly;
  lx=e.clientX; ly=e.clientY;
  control.applyDrag(dx,dy);
});

window.addEventListener("pointerup",()=>dragging=false);

/* ===== BUTTONS ===== */
document.getElementById("btn-round").onclick=()=>{
  location.href="/index.html?mode=world";
};

document.getElementById("btn-flat").onclick=()=>{
  location.href="/index.html?mode=flat";
};

document.getElementById("btn-open").onclick=()=>location.href="/home/";
document.getElementById("btn-explore").onclick=()=>location.href="/explore/";
document.getElementById("btn-products").onclick=()=>location.href="/products/";
document.getElementById("btn-laws").onclick=()=>location.href="/laws/";

/* ===== START ===== */
resize();
addEventListener("resize",resize);

if(mode==="world") enterWorld(false);
else if(mode==="flat") enterWorld(true);
else enterDoor();

</script>

</body>
</html>
