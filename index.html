<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Navigator</title>

<link rel="stylesheet" href="/assets/ui.css">
<link rel="stylesheet" href="/assets/branch.css">

<style>
html,body{
margin:0;
height:100%;
overflow:hidden;
font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
color:#fff;
}

/* RENDER MOUNT */
#scene{
position:fixed;
inset:0;
width:100%;
height:100%;
display:block;
z-index:0;
}

/* UI MOUNT */
#uiLayer{
position:relative;
z-index:2;
pointer-events:auto;
padding:24px;
}

/* CONTROLS */
.controls{
display:flex;
gap:12px;
margin-bottom:20px;
}

button{
padding:10px 16px;
font-weight:700;
border-radius:6px;
border:none;
cursor:pointer;
}
</style>
</head>

<body data-page="index">

<!-- RENDER ENGINE MOUNT -->
<canvas id="scene"></canvas>

<!-- UI LAYER -->
<div id="uiLayer">

<div class="controls">
<button onclick="navigatorLayer(1)">Layer 1</button>
<button onclick="navigatorLayer(2)">Layer 2</button>
</div>

<h1>Navigator</h1>
<p>Layer 1 = cube navigator</p>
<p>Layer 2 = expanded navigator</p>

</div>

<script src="/variant/scene.js"></script>

</body>
</html>
