<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Diamond Gate Bridge — Harbor Core Foundation</title>

<style>
:root{
  --safe-top:max(12px,env(safe-area-inset-top));
  --safe-right:max(12px,env(safe-area-inset-right));
  --safe-bottom:max(12px,env(safe-area-inset-bottom));
  --safe-left:max(12px,env(safe-area-inset-left));
  --font:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
}

*{box-sizing:border-box}

html,body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:#05070b;
  font-family:var(--font);
}

.app{
  position:relative;
  width:100vw;
  height:100dvh;
  overflow:hidden;
}

/* CAMERA CONTROL (INDEX CHOKE POINT) */

#scene{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;

  /* This is the camera control */
  transform:scale(.62);
  transform-origin:50% 76%;

  display:block;
  z-index:1;
  touch-action:none;
}

/* TOP BAR */

.topbar{
  position:absolute;
  top:var(--safe-top);
  left:var(--safe-left);
  z-index:3;
}

.pill{
  display:inline-flex;
  align-items:center;
  gap:10px;
  padding:10px 14px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(10,16,26,.45);
  backdrop-filter:blur(10px);
  color:#edf4ff;
}

.brand-mark{
  width:26px;
  height:26px;
  border-radius:50%;
  background:
  radial-gradient(circle at 35% 30%,#fff,rgba(255,255,255,.2) 36%,transparent 37%),
  linear-gradient(180deg,#f1f7ff,#21385f,#0d1730);
}

/* COMPASS */

.compass{
  position:absolute;
  right:calc(var(--safe-right) + 8px);

  /* LOWERED slightly */
  top:calc(var(--safe-top) + 84px);

  width:120px;
  height:120px;

  z-index:3;
  pointer-events:none;
}

.compass svg{
  width:100%;
  height:100%;
}

/* SELECTION PANEL */

.panel-stack{
  position:absolute;
  right:var(--safe-right);
  bottom:var(--safe-bottom);
  width:110px;
  z-index:3;
}

.panel{
  padding:6px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(10,16,26,.45);
  backdrop-filter:blur(6px);
  color:#edf4ff;
  font-size:9px;
}

.kv{
  display:grid;
  grid-template-columns:32px 1fr;
  gap:2px 4px;
}

.kv dt{opacity:.7}
.kv dd{margin:0}

.footer-hint{
  position:absolute;
  bottom:var(--safe-bottom);
  left:50%;
  transform:translateX(-50%);
  padding:10px 14px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(9,14,22,.56);
  color:#edf4ff;
  font-size:11px;
}

</style>
</head>

<body>

<div class="app">

<canvas id="scene"></canvas>

<div class="topbar">
  <div class="pill">
    <span class="brand-mark"></span>
    <div>
      <strong>Diamond Gate Bridge</strong><br>
      <span style="font-size:10px;opacity:.7">Harbor Core Interactive Foundation</span>
    </div>
  </div>
</div>

<!-- COMPASS -->

<div class="compass">

<svg viewBox="0 0 112 112">

<defs>
<radialGradient id="c1">
<stop offset="0%" stop-color="#ffe9b5"/>
<stop offset="60%" stop-color="#8fd4ff"/>
<stop offset="100%" stop-color="transparent"/>
</radialGradient>
</defs>

<circle cx="56" cy="56" r="42" fill="url(#c1)" opacity=".6"/>

<polygon points="56,10 102,56 56,102 10,56"
fill="rgba(0,0,0,.35)"
stroke="rgba(255,230,170,.9)"
stroke-width="1.4"/>

<polygon points="56,20 63,49 92,56 63,63 56,92 49,63 20,56 49,49"
fill="rgba(255,240,200,.25)"
stroke="rgba(255,235,170,.9)"
stroke-width="1"/>

<circle cx="56" cy="56" r="4.5" fill="#ffe6b0"/>

<text x="56" y="8" text-anchor="middle" fill="#fff" font-size="9">N</text>
<text x="106" y="59" text-anchor="middle" fill="#fff" font-size="9">E</text>
<text x="56" y="110" text-anchor="middle" fill="#fff" font-size="9">S</text>
<text x="6" y="59" text-anchor="middle" fill="#fff" font-size="9">W</text>

</svg>

</div>

<div class="panel-stack">
<section class="panel">
<dl class="kv">
<dt>Sel</dt><dd id="selectedNameOut">—</dd>
<dt>Type</dt><dd id="selectedTypeOut">—</dd>
<dt>Dest</dt><dd id="destinationOut">—</dd>
</dl>
<p id="selectionHintOut" style="opacity:.7;margin-top:4px">Tap region.</p>
</section>
</div>

<div class="footer-hint">Tap Harbor Region or Harbor Village · fixed camera pilot</div>

</div>

<script type="module">

import { createScene } from "./variant/scene.js";

const outputs={
region:document.createElement("span"),
cell:document.createElement("span"),
sector:document.createElement("span"),
band:document.createElement("span"),
encoding:document.createElement("span"),
byte:document.createElement("span"),
selectedName:document.getElementById("selectedNameOut"),
selectedType:document.getElementById("selectedTypeOut"),
destination:document.getElementById("destinationOut"),
selectionHint:document.getElementById("selectionHintOut")
};

const canvas=document.getElementById("scene");

createScene(canvas,outputs)
.then(scene=>scene.start())
.catch(error=>{
console.error(error);
alert(`Interactive foundation failed to boot: ${error.message}`);
});

</script>

</body>
</html>
