<!doctype html>
<!-- TNT — /products/index.html
     PRODUCTS · MASTER ROUTING CATALOG (TAXONOMY FIX + SUPERLAYER INSTALL)
     INFORMAL REALM LOCK:
       - This page is INFORMAL by design. (gd_style is forced to informal)
       - LENSES ON THIS PAGE: PLATFORM vs ENGINEERING ONLY (lane=platform|engineering URL-only)
       - Trilingual (EN/中文/ES)
     GOAL:
       - One canonical catalog with five bands in this order:
         (0) CAPITAL COHERENCE DOCTRINE (SUPERLAYER)
         (1) SYSTEM SPINES
         (2) PRODUCT SURFACES
         (3) SERVICES
         (4) FRONTIER INNOVATIONS (VISION)
       - Single-open accordion (global, across entire page)
     STATE:
       - Canon state carry: lang/style/time/depth via URL + LS gd_lang/gd_style/gd_time/gd_depth ONLY
       - NO new gd_* keys
     ASSETS:
       - Uses /assets/ui.css + /assets/branch.css + /assets/instruments.js only
       - ui.css owns field (NO html/body background styling)
     SAFETY:
       - No modals/overlays; no inline onclick; addEventListener only
     ROUTES (authoritative):
       SUPERLAYER:
         - Capital Coherence Doctrine → /products/capital-doctrine/
       SYSTEM SPINES:
         - Software Spine → /products/software/
       PRODUCT SURFACES:
         - Energy → /products/energy/
         - Education → /products/education/
         - Coherence Diagnostic → /products/coherence-diagnostic/
         - Dot.Grid → /products/dot-grid/
         - SSG → /products/ssg/
         - Risk & Capital Systems → /products/risk-capital/
         - UCI Engine → /products/uci/
         - Registry → /products/registry/
         - Adoption Ladder → /products/adoption-ladder/
       SERVICES:
         - Advisory → /laws/
         - Audit Support → /gauges/
         - Integration → /products/software/?lane=platform
         - Training → /products/training/
       FRONTIER INNOVATIONS (VISION):
         - Vision Index → /explore/frontier/vision/
         - Water (Vision) → /explore/frontier/vision/?focus=water
         - Waste (Vision) → /explore/frontier/vision/?focus=waste
         - SHIMMER (Vision) → /explore/frontier/vision/?focus=shimmer
         - Clean Cities (Urban OS) → /explore/frontier/vision/urban-resource-os/
         - Closed-Loop Habitats → /explore/frontier/vision/closed-loop-habitats/
         - Energy Without Smoke → /explore/frontier/vision/energy-without-smoke/
-->
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>PRODUCTS</title>

  <link rel="stylesheet" href="/assets/ui.css"/>
  <link rel="stylesheet" href="/assets/branch.css"/>
  <script defer src="/assets/instruments.js"></script>

  <style>
    a{color:inherit;text-decoration:none}
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:#fff}
    body::before,body::after{pointer-events:none!important}

    :root{
      --dockH:114px;

      /* Red/Black/Gold hierarchy */
      --stroke:rgba(255,255,255,.12);
      --stroke2:rgba(255,255,255,.10);

      --ink:rgba(255,255,255,.94);
      --txt:rgba(255,255,255,.92);
      --mut:rgba(255,255,255,.80);
      --soft:rgba(255,255,255,.62);

      --crimson:rgba(120,0,22,.30);
      --festival:rgba(255,43,43,.14);
      --opalV:rgba(90,40,120,.10);

      --goldSoft:rgba(201,162,74,.18);

      --shadowA:0 22px 72px rgba(0,0,0,.66);
      --shadowB:0 16px 52px rgba(0,0,0,.62);
      --shadowC:0 18px 60px rgba(0,0,0,.55);
    }

    /* page */
    .page{
      width:min(1120px,94vw);
      margin:0 auto;
      padding:88px 0 calc(var(--dockH) + 18px);
      display:flex;
      flex-direction:column;
      gap:12px;
      position:relative;
      z-index:10;
    }

    /* top controls */
    .top-left,.top-right{
      position:fixed;top:16px;z-index:240;
      display:flex;gap:10px;flex-wrap:wrap;align-items:center;
      max-width: calc(50vw - 18px);
    }
    .top-left{left:16px;justify-content:flex-start}
    .top-right{right:16px;justify-content:flex-end}

    .btn{
      display:inline-flex;align-items:center;justify-content:center;gap:8px;
      padding:10px 12px;min-height:44px;border-radius:16px;
      border:1px solid rgba(255,255,255,.14);
      background:
        radial-gradient(circle at 50% 120%, rgba(201,162,74,.16), transparent 64%),
        linear-gradient(145deg, rgba(10,12,16,.78), rgba(6,8,10,.90));
      color:var(--ink);
      font-weight:950;font-size:14px;letter-spacing:.2px;
      -webkit-tap-highlight-color:transparent;
      position:relative;overflow:hidden;
      touch-action:manipulation;
      box-shadow:var(--shadowC);
      white-space:nowrap;
    }
    .btn:active{transform:translateY(1px)}
    .btn::after{
      content:"";
      position:absolute;left:10px;right:10px;bottom:-12px;height:28px;
      background: radial-gradient(circle at 50% 0%, rgba(201,162,74,.34), transparent 72%);
      opacity:.60;pointer-events:none;
    }
    .btn.red{border-color:rgba(255,43,43,.22); box-shadow:var(--shadowC), 0 0 18px rgba(255,43,43,.12);}

    .seg{
      display:inline-flex;gap:0;overflow:hidden;border-radius:16px;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(0,0,0,.16);
      box-shadow: var(--shadowC);
    }
    .seg button{
      appearance:none;border:0;background:transparent;color:var(--mut);
      padding:10px 12px;min-height:44px;font-weight:950;font-size:13px;
      letter-spacing:.25px;cursor:pointer;
      -webkit-tap-highlight-color:transparent;
      touch-action:manipulation;
    }
    .seg button[aria-pressed="true"]{
      color:var(--ink);
      background:
        radial-gradient(circle at 50% 120%, rgba(201,162,74,.22), transparent 62%),
        linear-gradient(180deg, rgba(255,43,43,.10), rgba(0,0,0,.10));
      box-shadow: inset 0 -10px 22px rgba(201,162,74,.16);
    }

    /* header */
    .header{
      border:1px solid var(--stroke);
      border-radius:24px;
      background:
        radial-gradient(circle at 18% 16%, var(--crimson), transparent 62%),
        radial-gradient(circle at 82% 22%, var(--opalV), transparent 66%),
        radial-gradient(circle at 70% 92%, var(--festival), transparent 62%),
        radial-gradient(circle at 26% 22%, rgba(201,162,74,.14), transparent 62%),
        linear-gradient(145deg, rgba(10,12,16,.72), rgba(6,8,10,.86));
      backdrop-filter: blur(10px);
      box-shadow: var(--shadowA);
      padding:16px 16px 14px;
      position:relative;
      overflow:hidden;
    }
    .header::before{
      content:"";
      position:absolute;inset:0;border-radius:24px;pointer-events:none;
      box-shadow: inset 0 0 0 1px rgba(201,162,74,.16);
      background:
        repeating-linear-gradient(45deg, rgba(201,162,74,.08) 0 1px, transparent 1px 16px),
        repeating-linear-gradient(-45deg, rgba(201,162,74,.06) 0 1px, transparent 1px 16px);
      opacity:.24;
      mask:
        radial-gradient(circle at 50% 50%, transparent 0 78%, #000 82% 100%),
        linear-gradient(#000,#000);
      -webkit-mask:
        radial-gradient(circle at 50% 50%, transparent 0 78%, #000 82% 100%),
        linear-gradient(#000,#000);
    }

    .k{margin:0 0 6px;font-size:11px;letter-spacing:4px;text-transform:uppercase;opacity:.78;color:var(--mut);position:relative}
    .t{margin:0;font-weight:980;font-size:30px;letter-spacing:.7px;color:var(--ink);position:relative}
    .s{margin:10px 0 0;font-size:16px;line-height:1.55;color:var(--txt);max-width:980px;position:relative}
    .fine{margin-top:10px;font-size:13.5px;line-height:1.45;color:var(--mut);opacity:.88;position:relative}

    .metaRow{
      display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;
      margin-top:12px;position:relative;
    }
    .badge{
      display:inline-flex;align-items:center;gap:10px;
      padding:10px 12px;border-radius:999px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(0,0,0,.16);
      color:var(--mut);
      font-weight:950;
      box-shadow:0 14px 36px rgba(0,0,0,.55);
    }
    .badge b{color:var(--ink)}

    .band{
      padding:10px 12px;
      border-radius:18px;
      border:1px solid var(--stroke2);
      background:rgba(0,0,0,.14);
      font-weight:980;
      letter-spacing:.25px;
      color:rgba(255,255,255,.90);
    }

    /* accordion rows */
    .list{display:flex;flex-direction:column;gap:12px}
    .row{
      border:1px solid rgba(255,255,255,.10);
      border-radius:22px;
      background:
        radial-gradient(circle at 22% 18%, rgba(255,43,43,.10), transparent 58%),
        radial-gradient(circle at 82% 30%, rgba(90,40,120,.10), transparent 62%),
        linear-gradient(145deg, rgba(17,22,28,.86), rgba(11,15,20,.94));
      box-shadow:var(--shadowB);
      overflow:hidden;
      position:relative;
    }
    .row::before{
      content:"";
      position:absolute;inset:0;border-radius:22px;pointer-events:none;
      box-shadow: inset 0 0 0 1px rgba(201,162,74,.12);
      opacity:.60;
    }
    .head{
      display:flex;align-items:flex-start;justify-content:space-between;
      gap:10px;padding:16px 16px;
      cursor:pointer;
      -webkit-tap-highlight-color:transparent;
      touch-action:manipulation;
    }
    .hL{display:flex;gap:12px;align-items:flex-start;min-width:0}
    .mark{
      width:10px;height:10px;border-radius:3px;
      transform:rotate(45deg);
      background:var(--c, rgba(201,162,74,.45));
      box-shadow:0 0 0 1px rgba(255,255,255,.14), 0 0 14px rgba(0,0,0,.35);
      flex:0 0 auto;margin-top:4px;
    }
    .titleBlock{min-width:0}
    .q{
      font-weight:980;letter-spacing:.2px;font-size:18px;color:var(--ink);
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    }
    .sub{
      margin-top:8px;font-size:13.75px;opacity:.88;line-height:1.42;
      color:rgba(255,255,255,.86);max-width:92ch;
    }
    .chev{
      width:36px;height:36px;border-radius:14px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.16);
      display:flex;align-items:center;justify-content:center;
      color:var(--mut);
      font-weight:950;
      position:relative;overflow:hidden;
      flex:0 0 auto;margin-top:2px;
    }
    .chev::after{
      content:"";
      position:absolute;left:6px;right:6px;bottom:-10px;height:22px;
      background: radial-gradient(circle at 50% 0%, rgba(201,162,74,.30), transparent 70%);
      opacity:.62;pointer-events:none;
    }

    .body{
      display:none;
      padding:16px 16px 16px;
      border-top:1px solid rgba(255,255,255,.08);
      background:
        radial-gradient(circle at 30% 30%, rgba(255,255,255,.06), transparent 55%),
        linear-gradient(145deg, rgba(10,12,16,.86), rgba(6,8,10,.94));
    }
    .row.open .body{display:block}
    .row.open{border-color:rgba(255,43,43,.22); box-shadow:var(--shadowB), 0 0 18px rgba(255,43,43,.10);}

    .p{margin:0;color:rgba(255,255,255,.90);line-height:1.7;font-size:15px}
    .p + .p{margin-top:10px}
    .actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end;margin-top:14px}

    /* dock */
    .dock{
      position:fixed;left:50%;
      bottom:max(10px, env(safe-area-inset-bottom));
      transform:translateX(-50%);
      z-index:220;
      width:min(980px,94vw);
      padding:10px 12px;border-radius:22px;
      border:1px solid rgba(255,255,255,.12);
      background:
        radial-gradient(circle at 18% 18%, rgba(255,43,43,.10), transparent 62%),
        radial-gradient(circle at 82% 70%, rgba(90,40,120,.10), transparent 64%),
        linear-gradient(145deg, rgba(10,12,16,.72), rgba(6,8,10,.86));
      backdrop-filter:blur(10px);
      box-shadow:0 18px 60px rgba(0,0,0,.55);
      display:grid;grid-template-columns:repeat(4, minmax(0,1fr));
      gap:10px;
    }
    .dock .btn{width:100%;padding:10px 10px;border-radius:999px;white-space:nowrap}
    @media (max-width:520px){
      :root{--dockH:132px}
      .dock{grid-template-columns:repeat(3, minmax(0,1fr))}
    }
  </style>
</head>

<body>

  <div class="top-left" aria-label="Top navigation">
    <a class="btn" id="btnDoor" href="/door/" data-route="/door/">DOOR</a>
    <a class="btn" id="btnHome" href="/home/" data-route="/home/">HOME</a>
    <a class="btn red" id="btnCompass" href="/index.html" data-route="/index.html">COMPASS</a>
  </div>

  <div class="top-right" aria-label="Language">
    <div class="seg" role="group" aria-label="Language toggle">
      <button type="button" id="langEN" aria-pressed="true">EN</button>
      <button type="button" id="langZH" aria-pressed="false">中文</button>
      <button type="button" id="langES" aria-pressed="false">ES</button>
    </div>
  </div>

  <div class="page">

    <section class="header" aria-label="Products header">
      <p class="k" id="hk">PRODUCTS</p>
      <h1 class="t" id="ht">WHAT YOU CAN USE</h1>
      <p class="s" id="hs"></p>
      <div class="fine" id="fine"></div>

      <div class="metaRow" aria-label="Lenses">
        <div class="seg" role="group" aria-label="Lane toggle">
          <button type="button" id="lanePlatform" aria-pressed="true">PLATFORM</button>
          <button type="button" id="laneEngineering" aria-pressed="false">ENGINEERING</button>
        </div>

        <div class="badge" aria-label="State">
          <span id="bLang">LANG</span> <b id="bLangV">EN</b>
          <span style="opacity:.6">·</span>
          <span id="bLane">LENS</span> <b id="bLaneV">PLATFORM</b>
          <span style="opacity:.6">·</span>
          <span id="bStyle">MODE</span> <b id="bStyleV">INFORMAL</b>
        </div>
      </div>
    </section>

    <div class="band" id="bandDoctrine">CAPITAL COHERENCE DOCTRINE</div>
    <div class="list" id="listDoctrine"></div>

    <div class="band" id="bandSpines">SYSTEM SPINES</div>
    <div class="list" id="listSpines"></div>

    <div class="band" id="bandSurfaces">PRODUCT SURFACES</div>
    <div class="list" id="listSurfaces"></div>

    <div class="band" id="bandServices">SERVICES</div>
    <div class="list" id="listServices"></div>

    <div class="band" id="bandVision">FRONTIER INNOVATIONS (VISION)</div>
    <div class="list" id="listVision"></div>

  </div>

  <nav class="dock" aria-label="Bottom navigation">
    <a class="btn" id="dockExplore" href="/explore/" data-route="/explore/">EXPLORE</a>
    <a class="btn red" id="dockProducts" href="/products/" data-route="/products/">PRODUCTS</a>
    <a class="btn" id="dockLaws" href="/laws/" data-route="/laws/">LAWS</a>
    <a class="btn" id="dockGauges" href="/gauges/" data-route="/gauges/">GAUGES</a>
  </nav>

  <script>
  (function(){
    "use strict";

    var qs=new URLSearchParams(location.search);
    var LS=window.localStorage;

    var lang  = qs.get("lang")  || LS.getItem("gd_lang")  || "en";
    var style = "informal"; // INFORMAL REALM LOCK (still carried in URL/LS)
    var time  = qs.get("time")  || LS.getItem("gd_time")  || "now";
    var depth = qs.get("depth") || LS.getItem("gd_depth") || "1";
    var lane  = qs.get("lane")  || "platform"; // URL-only

    if(lang!=="en" && lang!=="zh" && lang!=="es") lang="en";
    if(time!=="origin" && time!=="now" && time!=="post") time="now";

    var d=parseInt(depth,10);
    if(!isFinite(d)) d=1;
    if(d<1) d=1;
    if(d>9) d=9;
    depth=String(d);

    if(lane!=="platform" && lane!=="engineering") lane="platform";

    try{
      LS.setItem("gd_lang",lang);
      LS.setItem("gd_style",style);
      LS.setItem("gd_time",time);
      LS.setItem("gd_depth",depth);
    }catch(e){}

    document.documentElement.lang=(lang==="zh")?"zh":(lang==="es")?"es":"en";

    function q(extra){
      var p=new URLSearchParams();
      p.set("lang",(extra&&extra.lang)?extra.lang:lang);
      p.set("style","informal");
      p.set("time",(extra&&extra.time)?extra.time:time);
      p.set("depth",(extra&&extra.depth)?String(extra.depth):depth);
      var L=(extra&&extra.lane)?extra.lane:lane;
      if(L==="platform"||L==="engineering") p.set("lane",L);
      return "?" + p.toString();
    }

    function wireAll(){
      var nodes=document.querySelectorAll("[data-route]");
      for(var i=0;i<nodes.length;i++){
        var el=nodes[i];
        var route=el.getAttribute("data-route")||"";
        if(!route) continue;

        if(route.indexOf("?")!==-1){
          try{
            var u=new URL(route, location.origin);
            var sp=u.searchParams;
            if(!sp.get("lang")) sp.set("lang", lang);
            sp.set("style","informal");
            if(!sp.get("time")) sp.set("time", time);
            if(!sp.get("depth")) sp.set("depth", depth);
            if(!sp.get("lane")) sp.set("lane", lane);
            el.setAttribute("href", u.pathname + "?" + sp.toString() + (u.hash||""));
          }catch(e){
            el.setAttribute("href", route);
          }
        }else{
          el.setAttribute("href", route + q());
        }
      }
    }

    function setPressed(ids, activeId){
      for(var i=0;i<ids.length;i++){
        var el=document.getElementById(ids[i]);
        if(!el) continue;
        el.setAttribute("aria-pressed", ids[i]===activeId ? "true" : "false");
      }
    }

    function setLang(next){
      if(next!=="en" && next!=="zh" && next!=="es") next="en";
      lang=next;
      try{ LS.setItem("gd_lang",lang);}catch(e){}
      window.location.href = window.location.pathname + q({lang:lang});
    }
    document.getElementById("langEN").addEventListener("click", function(){ setLang("en"); }, {passive:true});
    document.getElementById("langZH").addEventListener("click", function(){ setLang("zh"); }, {passive:true});
    document.getElementById("langES").addEventListener("click", function(){ setLang("es"); }, {passive:true});

    function setLane(next){
      if(next!=="platform" && next!=="engineering") next="platform";
      lane=next;
      window.location.href = window.location.pathname + q({lane:lane});
    }
    document.getElementById("lanePlatform").addEventListener("click", function(){ setLane("platform"); }, {passive:true});
    document.getElementById("laneEngineering").addEventListener("click", function(){ setLane("engineering"); }, {passive:true});

    function P(en,zh,es){ return {en:en, zh:zh, es:es}; }
    function pick(o){ return (lang==="zh")?o.zh:(lang==="es")?(o.es||o.en):o.en; }
    function openWord(){ return (lang==="zh")?"打开":(lang==="es")?"ABRIR":"OPEN"; }

    function lensKey(){
      return (lane==="platform" ? "platform_" : "engineering_") + "informal";
    }

    var HEAD={
      en:{
        platform_informal:"This is the catalog. One route, one next step. Built for clarity and speed.",
        engineering_informal:"Engineering lens (still informal): same catalog, but phrased for implementation and reliability.",
        fine_platform_informal:"Order is fixed: Doctrine → Spines → Surfaces → Services → Vision. This page stays in informal mode.",
        fine_engineering_informal:"Engineering lens: same order. Language stays informal. Details move to the target pages."
      },
      zh:{
        platform_informal:"这是目录：一条路由，一个下一步。清晰、快速、好用。",
        engineering_informal:"工程透镜（仍通俗）：同一目录，但用更偏实现与可靠性的表达。",
        fine_platform_informal:"顺序锁定：教义→主脊柱→执行面→服务→愿景。本页固定为通俗模式。",
        fine_engineering_informal:"工程透镜：同顺序。语言保持通俗。细节放到目标页面。"
      },
      es:{
        platform_informal:"Este es el catálogo: una ruta, un siguiente paso. Claridad y velocidad.",
        engineering_informal:"Lente de ingeniería (aún informal): mismo catálogo, con lenguaje orientado a implementación.",
        fine_platform_informal:"Orden fijo: Doctrina → Espinas → Superficies → Servicios → Visión. Esta página queda en modo informal.",
        fine_engineering_informal:"Lente ingeniería: mismo orden. Lenguaje sigue informal. Detalles viven en páginas destino."
      }
    };

    function laneLabel(){
      if(lang==="zh") return (lane==="engineering")?"工程":"平台";
      if(lang==="es") return (lane==="engineering")?"INGENIERÍA":"PLATAFORMA";
      return (lane==="engineering")?"ENGINEERING":"PLATFORM";
    }

    function applyHeader(){
      var H=HEAD[lang] || HEAD.en;
      var lk=lensKey();

      document.getElementById("hs").textContent = H[lk] || H.platform_informal;
      document.getElementById("fine").textContent = (lane==="engineering") ? (H.fine_engineering_informal||H.fine_platform_informal) : (H.fine_platform_informal||"");

      document.getElementById("bLangV").textContent = (lang==="zh")?"中文":(lang==="es")?"ES":"EN";
      document.getElementById("bLaneV").textContent = laneLabel();
      document.getElementById("bStyleV").textContent = (lang==="zh")?"通俗":(lang==="es")?"INFORMAL":"INFORMAL";

      if(lang==="zh"){
        document.getElementById("hk").textContent="产品";
        document.getElementById("ht").textContent="你能用的东西";
        document.getElementById("bandDoctrine").textContent="资本一致性教义（超层）";
        document.getElementById("bandSpines").textContent="系统主脊柱";
        document.getElementById("bandSurfaces").textContent="产品执行面";
        document.getElementById("bandServices").textContent="服务";
        document.getElementById("bandVision").textContent="前沿创新（愿景）";
        document.getElementById("dockExplore").textContent="探索";
        document.getElementById("dockProducts").textContent="产品";
        document.getElementById("dockLaws").textContent="法则";
        document.getElementById("dockGauges").textContent="量规";
        document.getElementById("btnDoor").textContent="门";
        document.getElementById("btnHome").textContent="主页";
        document.getElementById("btnCompass").textContent="指南针";
        document.getElementById("bLang").textContent="语言";
        document.getElementById("bLane").textContent="透镜";
        document.getElementById("bStyle").textContent="模式";
        document.getElementById("lanePlatform").textContent="平台";
        document.getElementById("laneEngineering").textContent="工程";
      }else if(lang==="es"){
        document.getElementById("hk").textContent="PRODUCTOS";
        document.getElementById("ht").textContent="LO QUE PUEDES USAR";
        document.getElementById("bandDoctrine").textContent="DOCTRINA DE COHERENCIA DE CAPITAL";

    // global single-open
    function closeAll(){
      var rows=document.querySelectorAll(".row");
      for(var i=0;i<rows.length;i++){
        rows[i].classList.remove("open");
        var ct=rows[i].querySelector(".chevTxt");
        if(ct) ct.textContent="▸";
      }
    }

    function makeRow(listEl, item, isDefaultOpen){
      var row=document.createElement("div");
      row.className="row";
      row.style.setProperty("--c", item.c);

      var head=document.createElement("div");
      head.className="head";
      head.setAttribute("role","button");
      head.tabIndex=0;

      var hL=document.createElement("div");
      hL.className="hL";

      var mark=document.createElement("div");
      mark.className="mark";
      mark.style.background=item.c;

      var tb=document.createElement("div");
      tb.className="titleBlock";

      var qEl=document.createElement("div");
      qEl.className="q";
      qEl.textContent=item.t[lang] || item.t.en;

      var sEl=document.createElement("div");
      sEl.className="sub";
      sEl.textContent=item.s[lang] || item.s.en;

      tb.appendChild(qEl);
      tb.appendChild(sEl);

      hL.appendChild(mark);
      hL.appendChild(tb);

      var chev=document.createElement("div");
      chev.className="chev";
      chev.innerHTML='<span class="chevTxt">▸</span>';

      head.appendChild(hL);
      head.appendChild(chev);

      var body=document.createElement("div");
      body.className="body";

      var p1=document.createElement("p");
      p1.className="p";
      p1.textContent=item.p1[lang] || item.p1.en;

      var p2=document.createElement("p");
      p2.className="p";
      p2.textContent=item.p2[lang] || item.p2.en;

      var actions=document.createElement("div");
      actions.className="actions";
      var a=document.createElement("a");
      a.className="btn red";
      a.textContent=openWord()+": "+(lang==="zh"?"进入":"Enter");
      a.setAttribute("data-route", item.href);
      actions.appendChild(a);

      body.appendChild(p1);
      body.appendChild(p2);
      body.appendChild(actions);

      function toggle(){
        var isOpen=row.classList.contains("open");
        if(isOpen){
          row.classList.remove("open");
          row.querySelector(".chevTxt").textContent="▸";
          return;
        }
        closeAll();
        row.classList.add("open");
        row.querySelector(".chevTxt").textContent="▾";
        wireAll();
      }

      head.addEventListener("click", toggle, {passive:true});
      head.addEventListener("keydown", function(e){
        if(e.key==="Enter"||e.key===" "){ e.preventDefault(); toggle(); }
      });

      row.appendChild(head);
      row.appendChild(body);
      listEl.appendChild(row);

      if(isDefaultOpen){
        row.classList.add("open");
        row.querySelector(".chevTxt").textContent="▾";
      }
    }

    function renderBand(listId, arr, openFirstOverall){
      var listEl=document.getElementById(listId);
      listEl.innerHTML="";
      for(var i=0;i<arr.length;i++){
        var cpy=copy(arr[i]);
        var merged={
          c:arr[i].c,t:arr[i].t,s:arr[i].s,
          p1:cpy.p1,p2:cpy.p2,href:arr[i].href
        };
        makeRow(listEl, merged, openFirstOverall && i===0);
        openFirstOverall=false;
      }
      return openFirstOverall;
    }

    function init(){
      setPressed(["langEN","langZH","langES"], lang==="zh"?"langZH":(lang==="es"?"langES":"langEN"));
      setPressed(["lanePlatform","laneEngineering"], lane==="engineering"?"laneEngineering":"lanePlatform");

      applyHeader();

      // One open total (global). Only doctrine first row is open by default.
      closeAll();
      renderBand("listDoctrine", DOCTRINE, true);
      renderBand("listSpines", SPINES, false);
      renderBand("listSurfaces", SURFACES, false);
      renderBand("listServices", SERVICES, false);
      renderBand("listVision", VISION, false);

      wireAll();
    }

    init();
