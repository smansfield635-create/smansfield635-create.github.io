<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gauges</title>
  <style>
    :root{
      --bg:#05070b;
      --panel:#0b1220;
      --line:rgba(255,255,255,0.08);
      --text:#d7e2ff;
      --muted:#8ea3c7;
      --accent:#46e0b6;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace}
    body{min-height:100vh}
    .shell{max-width:1100px;margin:0 auto;padding:16px}
    .title{font-size:14px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin:0 0 12px}
    #statusBar{
      min-height:44px;
      display:flex;
      align-items:center;
      padding:12px 14px;
      border:1px solid var(--line);
      background:linear-gradient(180deg,rgba(255,255,255,0.02),rgba(255,255,255,0.01));
      border-radius:12px;
      margin-bottom:12px;
      color:var(--accent);
      word-break:break-word;
    }
    .grid{
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      gap:12px;
    }
    .panel{
      border:1px solid var(--line);
      background:var(--panel);
      border-radius:12px;
      overflow:hidden;
      min-height:220px;
    }
    .panelHead{
      padding:10px 12px;
      border-bottom:1px solid var(--line);
      color:var(--muted);
      text-transform:uppercase;
      letter-spacing:.08em;
      font-size:12px;
    }
    .panelBody{padding:6px 0}
    .row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:10px 12px;
      border-bottom:1px solid var(--line);
    }
    .row:last-child{border-bottom:none}
    .left{
      display:flex;
      align-items:center;
      gap:8px;
      min-width:0;
    }
    .diamond{
      width:8px;
      height:8px;
      background:var(--accent);
      transform:rotate(45deg);
      flex:0 0 auto;
    }
    .value{
      color:#ffffff;
      text-align:right;
      word-break:break-word;
    }
    .empty{
      padding:12px;
      color:var(--muted);
    }
    @media (max-width:900px){
      .grid{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <div class="shell">
    <h1 class="title">Diagnostic Gauges</h1>
