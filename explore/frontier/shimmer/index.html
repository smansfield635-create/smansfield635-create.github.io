<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>FRONTIER · SHIMMER</title>

<link rel="stylesheet" href="/assets/ui.css"/>

<style>
a{color:inherit;text-decoration:none}
body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:#fff}
body::before,body::after{pointer-events:none!important}

:root{
  --dockH:132px;

  --stroke:rgba(255,255,255,.12);
  --stroke2:rgba(255,255,255,.10);

  --ink:rgba(255,255,255,.94);
  --txt:rgba(255,255,255,.92);
  --mut:rgba(255,255,255,.78);

  --crimson:rgba(120,0,22,.30);
  --festival:rgba(255,43,43,.14);
  --opalV:rgba(90,40,120,.10);
  --goldSoft:rgba(201,162,74,.18);

  --shadowA:0 24px 90px rgba(0,0,0,.58);
  --shadowB:0 16px 56px rgba(0,0,0,.62);
  --shadowC:0 18px 60px rgba(0,0,0,.55);
}

/* ===== Top (fixed) ===== */
.top{
  position:fixed;top:16px;left:0;right:0;
  padding:0 16px;
  display:flex;justify-content:space-between;align-items:center;
  gap:12px;
  z-index:240;
  pointer-events:none;
}
.top .left,.top .right{
  display:flex;gap:10px;flex-wrap:wrap;white-space:nowrap;align-items:center;
  pointer-events:auto;
}

/* Button */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:10px 12px;min-height:44px;border-radius:16px;
  border:1px solid rgba(255,255,255,.14);
  background:
    radial-gradient(circle at 50% 120%, rgba(201,162,74,.16), transparent 64%),
    linear-gradient(145deg, rgba(10,12,16,.78), rgba(6,8,10,.90));
  color:var(--ink);
  font-weight:950;font-size:14px;letter-spacing:.2px;
  -webkit-tap-highlight-color:transparent;
  position:relative;overflow:hidden;
  touch-action:manipulation;
  box-shadow:var(--shadowC);
}
.btn:active{transform:translateY(1px)}
.btn::after{
  content:"";
  position:absolute;left:10px;right:10px;bottom:-12px;height:28px;
  background: radial-gradient(circle at 50% 0%, rgba(201,162,74,.34), transparent 72%);
  opacity:.60;pointer-events:none;
}
.btn.red{border-color:rgba(255,43,43,.22); box-shadow:var(--shadowC), 0 0 18px rgba(255,43,43,.12);}

/* Segmented controls */
.seg{
  display:inline-flex;gap:0;overflow:hidden;border-radius:16px;
  border:1px solid rgba(255,255,255,.12);
  background: rgba(0,0,0,.16);
  box-shadow: var(--shadowC);
}
.seg button{
  appearance:none;border:0;background:transparent;color:var(--mut);
  padding:10px 12px;min-height:44px;font-weight:950;font-size:13px;
  letter-spacing:.25px;cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
.seg button[aria-pressed="true"]{
  color:var(--ink);
  background:
    radial-gradient(circle at 50% 120%, rgba(201,162,74,.22), transparent 62%),
    linear-gradient(180deg, rgba(255,43,43,.10), rgba(0,0,0,.10));
  box-shadow: inset 0 -10px 22px rgba(201,162,74,.16);
}

/* ===== Page ===== */
.page{
  width:min(1120px,94vw);
  margin:0 auto;
  padding:104px 0 calc(var(--dockH) + 18px);
  display:flex;
  flex-direction:column;
  gap:12px;
  position:relative;
  z-index:10;
}

/* Background context (behind content; not body) */
.backdrop{
  position:absolute;
  left:50%;
  top:68px;
  transform:translateX(-50%);
  width:min(1180px,96vw);
  height:calc(100% - 108px);
  border-radius:34px;
  pointer-events:none;
  z-index:0;
  overflow:hidden;
}
.backdrop::before{
  content:"";
  position:absolute;inset:0;
  border:1px solid rgba(255,255,255,.08);
  border-radius:34px;
  background:
    radial-gradient(circle at 18% 20%, rgba(201,162,74,.10), transparent 60%),
    radial-gradient(circle at 78% 22%, rgba(90,40,120,.12), transparent 62%),
    radial-gradient(circle at 60% 90%, rgba(255,43,43,.10), transparent 64%),
    linear-gradient(160deg, rgba(0,0,0,.18), rgba(0,0,0,.08));
  box-shadow:
    0 70px 220px rgba(0,0,0,.62),
    inset 0 2px 0 rgba(255,255,255,.06),
    inset 0 -70px 140px rgba(0,0,0,.55);
  opacity:.92;
}
.backdrop::after{
  content:"";
  position:absolute;inset:-18%;
  background:
    radial-gradient(circle at 28% 30%, rgba(201,162,74,.12), transparent 46%),
    radial-gradient(circle at 72% 28%, rgba(90,40,120,.14), transparent 48%),
    radial-gradient(circle at 50% 78%, rgba(255,43,43,.10), transparent 52%),
    conic-gradient(from 20deg at 52% 40%,
      rgba(201,162,74,.12), transparent 14%,
      rgba(90,40,120,.12), transparent 30%,
      rgba(255,43,43,.10), transparent 44%,
      transparent 100%),
    radial-gradient(circle at 50% 50%, rgba(255,255,255,.04), transparent 62%);
  filter:blur(1px);
  opacity:.72;
}

/* Header */
.header{
  position:relative;
  z-index:2;
  border:1px solid var(--stroke);
  border-radius:22px;
  background:
    radial-gradient(circle at 18% 22%, var(--crimson), transparent 72%),
    radial-gradient(circle at 82% 34%, var(--opalV), transparent 74%),
    radial-gradient(circle at 70% 92%, var(--festival), transparent 62%),
    radial-gradient(circle at 26% 22%, rgba(201,162,74,.14), transparent 62%),
    linear-gradient(160deg, rgba(0,0,0,.30), rgba(0,0,0,.14));
  backdrop-filter:blur(10px);
  box-shadow:var(--shadowA);
  padding:16px 16px 14px;
  overflow:hidden;
}
.header::before{
  content:"";
  position:absolute;inset:0;border-radius:22px;pointer-events:none;
  box-shadow: inset 0 0 0 1px rgba(201,162,74,.16);
  background:
    repeating-linear-gradient(45deg, rgba(201,162,74,.08) 0 1px, transparent 1px 16px),
    repeating-linear-gradient(-45deg, rgba(201,162,74,.06) 0 1px, transparent 1px 16px);
  opacity:.26;
  mask:
    radial-gradient(circle at 50% 50%, transparent 0 78%, #000 82% 100%),
    linear-gradient(#000,#000);
  -webkit-mask:
    radial-gradient(circle at 50% 50%, transparent 0 78%, #000 82% 100%),
    linear-gradient(#000,#000);
}
.k{margin:0 0 8px;font-size:12px;letter-spacing:4px;text-transform:uppercase;opacity:.80;color:rgba(255,255,255,.78)}
.t{margin:0;font-weight:980;font-size:30px;letter-spacing:.8px;line-height:1.08;color:var(--ink)}
.s{margin:12px 0 0;font-size:16px;opacity:.92;line-height:1.55;max-width:980px;color:var(--txt)}
.rule{
  margin-top:12px;
  padding:12px 12px;
  border-radius:18px;
  border:1px solid rgba(255,255,255,.10);
  background:
    radial-gradient(circle at 22% 18%, rgba(255,43,43,.10), transparent 58%),
    radial-gradient(circle at 82% 70%, rgba(201,162,74,.10), transparent 62%),
    linear-gradient(160deg, rgba(10,12,16,.55), rgba(6,8,10,.72));
  font-size:13.5px;
  color:rgba(255,255,255,.86);
  line-height:1.45;
}

/* Mode row + state pills */
.modeRow{
  margin-top:12px;
  display:flex;
  justify-content:space-between;
  gap:10px;
  flex-wrap:wrap;
  align-items:center;
}
.statePill{
  display:inline-flex;align-items:center;gap:8px;
  padding:10px 12px;border-radius:999px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(0,0,0,.16);
  color:rgba(255,255,255,.78);
  font-weight:950;
  box-shadow:0 14px 36px rgba(0,0,0,.55);
}

/* Band */
.band{
  position:relative;
  z-index:2;
  padding:10px 12px;
  border-radius:18px;
  border:1px solid var(--stroke2);
  background:rgba(0,0,0,.14);
  font-weight:950;
  letter-spacing:.2px;
  color:rgba(255,255,255,.88);
}

/* Accordion rows */
.list{position:relative;z-index:2;display:flex;flex-direction:column;gap:12px}
.row{
  border:1px solid rgba(255,255,255,.10);
  border-radius:22px;
  background:
    radial-gradient(circle at 22% 18%, rgba(255,43,43,.10), transparent 58%),
    radial-gradient(circle at 82% 30%, rgba(90,40,120,.10), transparent 62%),
    linear-gradient(145deg, rgba(17,22,28,.86), rgba(11,15,20,.94));
  box-shadow:var(--shadowB);
  overflow:hidden;
  position:relative;
}
.row::before{
  content:"";
  position:absolute;inset:0;border-radius:22px;pointer-events:none;
  box-shadow: inset 0 0 0 1px rgba(201,162,74,.12);
  opacity:.60;
}
.head{
  display:flex;align-items:flex-start;justify-content:space-between;
  gap:10px;
  padding:16px 16px;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
.hL{display:flex;gap:12px;align-items:flex-start;min-width:0}
.dmark{
  width:10px;height:10px;border-radius:3px;
  transform:rotate(45deg);
  background:var(--c, rgba(201,162,74,.45));
  box-shadow:0 0 0 1px rgba(255,255,255,.14), 0 0 14px rgba(0,0,0,.35);
  flex:0 0 auto;margin-top:4px;
}
.titleBlock{min-width:0}
.q{
  font-weight:980;letter-spacing:.2px;font-size:18px;color:var(--ink);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.sub{
  margin-top:8px;font-size:13.75px;opacity:.88;line-height:1.42;
  color:rgba(255,255,255,.86);max-width:92ch;
}
.chev{
  width:36px;height:36px;border-radius:14px;
  border:1px solid rgba(255,255,255,.14);
  background: rgba(0,0,0,.16);
  display:flex;align-items:center;justify-content:center;
  color:rgba(255,255,255,.78);
  font-weight:950;
  position:relative;overflow:hidden;
  flex:0 0 auto;margin-top:2px;
}
.chev::after{
  content:"";
  position:absolute;left:6px;right:6px;bottom:-10px;height:22px;
  background: radial-gradient(circle at 50% 0%, rgba(201,162,74,.30), transparent 70%);
  opacity:.62;pointer-events:none;
}
.body{
  display:none;
  padding:16px 16px 16px;
  border-top:1px solid rgba(255,255,255,.08);
  background:
    radial-gradient(circle at 30% 30%, rgba(255,255,255,.06), transparent 55%),
    linear-gradient(145deg, rgba(10,12,16,.86), rgba(6,8,10,.94));
}
.row.open .body{display:block}
.row.open{border-color:rgba(255,43,43,.22); box-shadow:var(--shadowB), 0 0 18px rgba(255,43,43,.10);}

.pdesc{margin:0;color:rgba(255,255,255,.90);line-height:1.65;font-size:15px}
.pdesc + .pdesc{margin-top:10px}

/* Sub-bubbles */
.subBubbles{margin-top:12px;display:flex;flex-direction:column;gap:10px}
.bubble{
  border:1px solid rgba(255,255,255,.10);
  border-radius:18px;
  background:
    radial-gradient(circle at 22% 18%, rgba(255,43,43,.08), transparent 60%),
    radial-gradient(circle at 82% 70%, rgba(201,162,74,.08), transparent 62%),
    rgba(0,0,0,.12);
  padding:14px 14px 12px;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
  position:relative;
  overflow:hidden;
}
.bubble::after{
  content:"";
  position:absolute;left:10px;right:10px;bottom:-14px;height:30px;
  background: radial-gradient(circle at 50% 0%, rgba(201,162,74,.22), transparent 72%);
  opacity:.50;pointer-events:none;
}
.bubble h4{margin:0 0 8px;font-weight:980;letter-spacing:.15px;font-size:15px;color:var(--ink)}
.bubble p{margin:0;color:rgba(255,255,255,.80);line-height:1.7;display:none;font-size:14.5px}
.bubble.open p{display:block}

.actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end;margin-top:14px}

/* Dock */
.dock{
  position:fixed;
  left:50%;
  bottom:max(10px, env(safe-area-inset-bottom));
  transform:translateX(-50%);
  z-index:220;
  width:min(980px,94vw);
  padding:10px 12px;
  border-radius:22px;
  border:1px solid rgba(255,255,255,.12);
  background:
    radial-gradient(circle at 18% 18%, rgba(255,43,43,.10), transparent 62%),
    radial-gradient(circle at 82% 70%, rgba(90,40,120,.10), transparent 64%),
    linear-gradient(145deg, rgba(10,12,16,.72), rgba(6,8,10,.86));
  backdrop-filter:blur(10px);
  box-shadow:0 18px 60px rgba(0,0,0,.55);
  display:grid;
  grid-template-columns:repeat(4, minmax(0,1fr));
  gap:10px;
}
.dock .btn{width:100%;padding:10px 10px;border-radius:999px;white-space:nowrap}
@media (max-width:520px){
  :root{--dockH:132px}
  .dock{grid-template-columns:repeat(3, minmax(0,1fr))}
}
</style>

<body>

<div class="top" aria-label="Top controls">

<script>
(function(){
  "use strict";

  // ===== Canon state (gd_* only; no new keys) =====
  var qs=new URLSearchParams(location.search);
  var LS=window.localStorage;

  var lang  = qs.get("lang")  || LS.getItem("gd_lang")  || "en";
  var time  = qs.get("time")  || LS.getItem("gd_time")  || "now";
  var lane  = qs.get("lane")  || "platform"; // URL-only

  // Pin informal layer
  var style = "informal";
  var depth = "explore";

  if(lang!=="en" && lang!=="zh" && lang!=="es") lang="en";
  if(time==="trajectory") time="post";
  if(time!=="origin" && time!=="now" && time!=="post") time="now";
  if(lane!=="platform" && lane!=="engineering") lane="platform";

  try{
    LS.setItem("gd_lang",lang);
    LS.setItem("gd_style","informal");
    LS.setItem("gd_time",time);
    LS.setItem("gd_depth","explore");
  }catch(e){}

  document.documentElement.lang=(lang==="zh")?"zh":(lang==="es")?"es":"en";

  function q(over){
    var p=new URLSearchParams();
    p.set("lang",(over&&over.lang)?over.lang:lang);
    p.set("style","informal");
    p.set("time",(over&&over.time)?over.time:time);
    p.set("depth","explore");
    var L=(over&&over.lane)?over.lane:lane;
    if(L==="platform"||L==="engineering") p.set("lane",L);
    return "?"+p.toString();
  }

  function setPressed(ids, activeId){
    for(var i=0;i<ids.length;i++){
      var el=document.getElementById(ids[i]);
      if(!el) continue;
      el.setAttribute("aria-pressed", ids[i]===activeId ? "true" : "false");
    }
  }

  function pick3(en,zh,es){ return (lang==="zh")?zh:(lang==="es")?es:en; }
  function openLabel(){ return (lang==="zh")?"打开":(lang==="es")?"ABRIR":"OPEN"; }
  function labConcept(){ return (lang==="zh")?"概念":(lang==="es")?"Concepto":"Concept"; }
  function labBuild(){ return (lang==="zh")?"现在建":(lang==="es")?"Construir ahora":"Build Now"; }
  function labRoadmap(){ return (lang==="zh")?"路线图":(lang==="es")?"Hoja de ruta":"Roadmap"; }

  function laneLabel(){
    return (lang==="zh") ? (lane==="engineering"?"工程":"平台")
      : (lang==="es") ? (lane==="engineering"?"INGENIERÍA":"PLATAFORMA")
      : (lane==="engineering"?"ENGINEERING":"PLATFORM");
  }

  // Wire all internal links with pinned state (and lane)
  function wireAll(){
    var nodes=document.querySelectorAll("[data-route]");
    for(var i=0;i<nodes.length;i++){
      var el=nodes[i];
      var route=el.getAttribute("data-route")||"";
      if(!route) continue;

      if(route.indexOf("?")!==-1){
        try{
          var u=new URL(route, location.origin);
          var sp=u.searchParams;
          sp.set("lang", lang);
          sp.set("style","informal");
          sp.set("time", time);
          sp.set("depth","explore");
          sp.set("lane", lane);
          el.setAttribute("href", u.pathname + "?" + sp.toString() + (u.hash||""));
        }catch(e){
          el.setAttribute("href", route);
        }
      }else{
        el.setAttribute("href", route + q());
      }
    }
  }

  // ===== MODE (in-page; not stored; no reload) =====
  var mode="shimmer"; // shimmer|lattice
  var openIndexByMode={ shimmer:0, lattice:0 };

  // ===== Header copy =====
  function headerPacks(){
    var H={
      shimmer:{
        en:{
          platform:{hs:"SHIMMER is a clarity loop for humans: Screen → Highlight → Inspect → Measure → Mitigate → Explain → Repeat. It stops attention from turning into drift.", rule:"Rule: show what changed before you argue. Receipts beat vibes."},
          engineering:{hs:"Engineering SHIMMER = interface variance control: baseline → bands → triggers → reason codes → receipts → replay. Treat perception drift as a measurable system fault.", rule:"Rule: baseline first. Any trigger must be reproducible under fixed scope."}
        },
        zh:{
          platform:{hs:"SHIMMER 是面向人类的清晰循环：筛选→高亮→检查→测量→减缓→解释→重复。它阻止注意力变成漂移。", rule:"规则：先展示变化，再争论。收据胜过感觉。"},
          engineering:{hs:"工程 SHIMMER = 接口方差控制：基线→区间→触发→原因码→收据→回放。把感知漂移当成可测系统故障。", rule:"规则：先基线。任何触发在固定范围下都必须可复现。"}
        },
        es:{
          platform:{hs:"SHIMMER es un loop de claridad: Filtrar → Resaltar → Inspeccionar → Medir → Mitigar → Explicar → Repetir. Evita que la atención se vuelva deriva.", rule:"Regla: muestra qué cambió antes de discutir. Recibos > sensaciones."},
          engineering:{hs:"SHIMMER (ingeniería) = control de varianza de interfaz: baseline → bandas → triggers → códigos → recibos → replay. Trata la deriva perceptiva como fallo medible.", rule:"Regla: baseline primero. Cualquier trigger debe ser reproducible bajo alcance fijo."}
        }
      },
      lattice:{
        en:{
          platform:{hs:"Lattice is coordinate discipline. It turns ‘complex’ into ‘indexable’. Indexable → comparable; comparable → scalable safely.", rule:"Rule: no indexing → no comparability. No comparability → no safe scaling."},
          engineering:{hs:"Engineering view: finite state coordinates + manifest locks + deterministic replay. If identical inputs diverge, epoch bump + replay is required.", rule:"Rule: identical inputs must yield identical outputs. Mutation requires version bump + full replay."}
        },
        zh:{
          platform:{hs:"晶格=坐标纪律。把“复杂”变成“可索引”。可索引→可比较；可比较→可安全扩张。", rule:"规则：不能索引就不能比较；不能比较就不能安全扩张。"},
          engineering:{hs:"工程视图：有限状态坐标+清单锁定+确定性回放。同输入若分歧，必须新纪元+回放。", rule:"规则：同输入必得同输出。变异必须版本升级+全量回放。"}

  var list=document.getElementById("list");

  function closeAllRows(){
    for(var i=0;i<rowRefs.length;i++){
      rowRefs[i].row.classList.remove("open");
      rowRefs[i].chev.textContent="▸";
    }
  }

  function toggleRow(i){
    var isOpen=rowRefs[i].row.classList.contains("open");
    if(isOpen){
      rowRefs[i].row.classList.remove("open");
      rowRefs[i].chev.textContent="▸";
      return;
    }
    closeAllRows();
    openIndexByMode[mode]=i;
    rowRefs[i].row.classList.add("open");
    rowRefs[i].chev.textContent="▾";
  }

  function makeSubBubble(label){
    var b=document.createElement("div");
    b.className="bubble";
    b.setAttribute("role","button");
    b.tabIndex=0;

    var h=document.createElement("h4");
    h.textContent=label;

    var p=document.createElement("p");
    p.textContent="";

    b.appendChild(h);
    b.appendChild(p);

    function act(){ b.classList.toggle("open"); }
    b.addEventListener("click", act, {passive:true});
    b.addEventListener("keydown", function(e){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); act(); }});

    return {wrap:b, p:p};
  }

    chev.className="chev";
    chev.innerHTML='<span class="chevTxt">▸</span>';

    head.appendChild(hL);
    head.appendChild(chev);

    var body=document.createElement("div");
    body.className="body";

    var intro=document.createElement("p");
    intro.className="pdesc";
    body.appendChild(intro);

    var bubbles=document.createElement("div");
    bubbles.className="subBubbles";

    var b1=makeSubBubble(labConcept());
    var b2=makeSubBubble(labBuild());
    var b3=makeSubBubble(labRoadmap());

    bubbles.appendChild(b1.wrap);
    bubbles.appendChild(b2.wrap);
    bubbles.appendChild(b3.wrap);
    body.appendChild(bubbles);

    var actions=document.createElement("div");
    actions.className="actions";

    var a1=document.createElement("a"); a1.className="btn"; a1.setAttribute("data-route","/explore/frontier/"); actions.appendChild(a1);
    var a2=document.createElement("a"); a2.className="btn"; a2.setAttribute("data-route","/laws/"); actions.appendChild(a2);
    var a3=document.createElement("a"); a3.className="btn red"; a3.setAttribute("data-route","/gauges/"); actions.appendChild(a3);

    body.appendChild(actions);

    function onToggle(){ toggleRow(idx); wireAll(); }
    head.addEventListener("click", onToggle, {passive:true});
    head.addEventListener("keydown", function(e){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); onToggle(); }});

    row.appendChild(head);
    row.appendChild(body);
    list.appendChild(row);

    rowRefs.push({
      row:row,
      chev:row.querySelector(".chevTxt"),
      title:title,
      sub:sub,
      intro:intro,
      b1p:b1.p, b2p:b2.p, b3p:b3.p,
      a1:a1,a2:a2,a3:a3
    });
  }

  function renderList(){
    var DOMS=getActiveDomains();
    var keep=openIndexByMode[mode]||0;
    if(keep<0) keep=0;
    if(keep>=DOMS.length) keep=0;

    list.innerHTML="";
    rowRefs=[];
    for(var i=0;i<DOMS.length;i++){
      buildRow(DOMS[i], i);
    }
    toggleRow(keep);
  }

  function applyHeader(){
    var pack=headerPacks();

    document.getElementById("hk").textContent =
      (mode==="shimmer") ? pick3("FRONTIER · SHIMMER","前沿 · SHIMMER","FRONTERA · SHIMMER")
                         : pick3("FRONTIER · LATTICE","前沿 · 晶格","FRONTERA · LATTICE");

    document.getElementById("ht").textContent =
      (mode==="shimmer") ? pick3("SHIMMER (S.H.I.M.M.E.R.)","SHIMMER（S.H.I.M.M.E.R.）","SHIMMER (S.H.I.M.M.E.R.)")
                         : pick3("LATTICE GEOMETRY","晶格几何","GEOMETRÍA LATTICE");

    document.getElementById("hs").textContent = pack.hs;
    document.getElementById("rule").textContent = pack.rule;

    document.getElementById("band").textContent =
      (mode==="shimmer") ? pick3("SHIMMER DOMAINS","SHIMMER 域","DOMINIOS SHIMMER")
                         : pick3("LATTICE DOMAINS","晶格域","DOMINIOS LATTICE");

    document.getElementById("btnFrontier").textContent = pick3("FRONTIER","前沿","FRONTERA");
    document.getElementById("btnExplore").textContent  = pick3("EXPLORE","探索","EXPLORAR");
    document.getElementById("btnHome").textContent     = pick3("HOME","主页","INICIO");

    document.getElementById("dockFrontier").textContent = pick3("FRONTIER","前沿","FRONTERA");
    document.getElementById("dockProducts").textContent = pick3("PRODUCTS","产品","PRODUCTOS");
    document.getElementById("dockLaws").textContent     = pick3("LAWS","法则","LEYES");
    document.getElementById("dockGauges").textContent   = pick3("GAUGES","量规","MEDIDORES");

    document.getElementById("modeShimmer").textContent = pick3("SHIMMER","SHIMMER","SHIMMER");
    document.getElementById("modeLattice").textContent = pick3("LATTICE","晶格","LATTICE");

    document.getElementById("lanePlatform").textContent   = pick3("PLATFORM","平台","PLATAFORMA");
    document.getElementById("laneEngineering").textContent= pick3("ENGINEERING","工程","INGENIERÍA");

    document.getElementById("modeState").textContent =
      (lang==="zh") ? ("模式："+(mode==="shimmer"?"SHIMMER":"晶格")) :
      (lang==="es") ? ("Modo: "+(mode==="shimmer"?"SHIMMER":"LATTICE")) :
      ("Mode: "+(mode==="shimmer"?"SHIMMER":"LATTICE"));

    document.getElementById("laneState").textContent =
      (lang==="zh") ? ("当前透镜："+laneLabel()) :
      (lang==="es") ? ("Lente actual: "+laneLabel()) :
      ("Current lens: "+laneLabel());

    document.getElementById("langState").textContent =
      (lang==="zh") ? ("语言：中文") :
      (lang==="es") ? ("Idioma: ES") :
      ("Lang: EN");

    setPressed(["langEN","langZH","langES"], lang==="zh"?"langZH":(lang==="es"?"langES":"langEN"));
    setPressed(["lanePlatform","laneEngineering"], lane==="engineering"?"laneEngineering":"lanePlatform");
    setPressed(["modeShimmer","modeLattice"], mode==="shimmer"?"modeShimmer":"modeLattice");
  }

  function updateRows(){
    var DOMS=getActiveDomains();
    var keep=openIndexByMode[mode]||0;
    if(keep<0) keep=0;
    if(keep>=DOMS.length) keep=0;

    for(var i=0;i<DOMS.length;i++){
      var item=DOMS[i];
      var r=rowRefs[i];
      if(!r) continue;

      r.title.textContent = (lang==="zh")?item.t.zh:(lang==="es")?(item.t.es||item.t.en):item.t.en;
      r.sub.textContent   = (lang==="zh")?item.s.zh:(lang==="es")?(item.s.es||item.s.en):item.s.en;

      var pack = (lane==="engineering") ? item.engineering : item.platform;

      r.intro.textContent = (lang==="zh")?pack.intro.zh:(lang==="es")?(pack.intro.es||pack.intro.en):pack.intro.en;
      r.b1p.textContent   = (lang==="zh")?pack.concept.zh:(lang==="es")?(pack.concept.es||pack.concept.en):pack.concept.en;
      r.b2p.textContent   = (lang==="zh")?pack.build.zh:(lang==="es")?(pack.build.es||pack.build.en):pack.build.en;
      r.b3p.textContent   = (lang==="zh")?pack.roadmap.zh:(lang==="es")?(pack.roadmap.es||pack.roadmap.en):pack.roadmap.en;

      r.a1.textContent = openLabel()+": "+pick3("FRONTIER INDEX","前沿索引","ÍNDICE FRONTERA");
      r.a2.textContent = openLabel()+": "+pick3("LAWS","法则","LEYES");
      r.a3.textContent = openLabel()+": "+pick3("GAUGES","量规","MEDIDORES");
    }

    closeAllRows();
    toggleRow(keep);
    wireAll();
  }

  // ===== No reload on language/lane/mode changes =====
  function setLang(next){
    if(next!=="en" && next!=="zh" && next!=="es") next="en";
    lang=next;
    try{ LS.setItem("gd_lang",lang);}catch(e){}
    history.replaceState({}, "", location.pathname + q({lang:lang}));
    applyHeader();
    updateRows();
  }

  function setLane(next){
    if(next!=="platform" && next!=="engineering") next="platform";
    lane=next;
    history.replaceState({}, "", location.pathname + q({lane:lane}));
    applyHeader();
    updateRows();
  }

  function setMode(next){
    if(next!=="shimmer" && next!=="lattice") next="shimmer";
    mode=next;
    applyHeader();
    renderList();
    updateRows();
  }

  document.getElementById("langEN").addEventListener("click", function(){ setLang("en"); }, {passive:true});
  document.getElementById("langZH").addEventListener("click", function(){ setLang("zh"); }, {passive:true});
  document.getElementById("langES").addEventListener("click", function(){ setLang("es"); }, {passive:true});

  document.getElementById("lanePlatform").addEventListener("click", function(){ setLane("platform"); }, {passive:true});
  document.getElementById("laneEngineering").addEventListener("click", function(){ setLane("engineering"); }, {passive:true});

  document.getElementById("modeShimmer").addEventListener("click", function(){ setMode("shimmer"); }, {passive:true});
  document.getElementById("modeLattice").addEventListener("click", function(){ setMode("lattice"); }, {passive:true});

  // ===== INIT =====
  renderList();
  applyHeader();
  updateRows();
  wireAll();
})();
</script>

</body>
</html>
