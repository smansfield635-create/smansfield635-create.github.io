/* STAGE */
.stage{position:relative;width:min(1200px,94vw);height:min(1200px,86vh);margin:96px auto 0;pointer-events:none}
.glassPlate{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:min(980px,92vw);height:min(980px,92vw);border-radius:44px;pointer-events:none;z-index:1;border:1px solid rgba(255,255,255,.10);background:linear-gradient(160deg, rgba(10,12,16,.34), rgba(6,8,10,.44));box-shadow:0 70px 240px rgba(0,0,0,.48), inset 0 2px 0 rgba(255,255,255,.08), inset 0 -70px 140px rgba(0,0,0,.52);opacity:.86}

.dial::before{content:"";position:absolute;inset:0;border-radius:999px;background:radial-gradient(circle at 50% 42%, rgba(255,255,255,.05), rgba(0,0,0,.14) 56%, rgba(0,0,0,.34) 78%, rgba(0,0,0,0) 92%);box-shadow:inset 0 0 0 2px rgba(255,255,255,.06), inset 0 0 80px rgba(0,0,0,.35), 0 50px 180px rgba(0,0,0,.22);opacity:.92}

/* NODES (GLOSSY GEMS RESTORED) */
.node{
position:absolute;left:50%;top:50%;
transform:translate(-50%,-50%) rotate(45deg);
pointer-events:auto;overflow:hidden;
z-index:20;border-radius:22px;
border:1px solid rgba(255,255,255,.16);
box-shadow:
  0 48px 150px rgba(0,0,0,.82),
  0 0 26px rgba(212,175,55,.12),
  inset 0 1px 0 rgba(255,255,255,.10),
  inset 0 -28px 60px rgba(0,0,0,.55);
background:
  radial-gradient(140% 120% at 22% 16%, rgba(255,255,255,.22) 0%, rgba(255,255,255,0) 54%),
  radial-gradient(120% 120% at 74% 26%, rgba(212,175,55,.16) 0%, rgba(212,175,55,0) 58%),
  radial-gradient(120% 120% at 74% 78%, rgba(255,43,43,.10) 0%, rgba(255,43,43,0) 62%),
  linear-gradient(145deg, rgba(17,24,39,.96), rgba(11,15,22,.98));
}
.node::before{
content:"";
position:absolute;inset:0;border-radius:inherit;pointer-events:none;
background:
  radial-gradient(120% 120% at 50% 50%,
    rgba(212,175,55,0) 58%,
    rgba(212,175,55,.16) 82%,
    rgba(212,175,55,0) 100%);
opacity:.72;
}
.node::after{
content:"";
position:absolute;inset:0;border-radius:inherit;pointer-events:none;
background:
  repeating-linear-gradient(45deg, rgba(212,175,55,.08) 0 1px, transparent 1px 18px),
  repeating-linear-gradient(-45deg, rgba(212,175,55,.06) 0 1px, transparent 1px 18px);
mask:
  radial-gradient(circle at 50% 50%, transparent 0 70%, #000 78% 100%),

-webkit-mask:
  radial-gradient(circle at 50% 50%, transparent 0 70%, #000 78% 100%),

opacity:.30;

border-color:rgba(212,175,55,.55);
box-shadow:
  0 56px 180px rgba(0,0,0,.85),

  inset 0 1px 0 rgba(255,255,255,.12),

}

box-shadow:

/* CORNERS */
.corner{position:fixed;bottom:16px;z-index:270;pointer-events:none}

.corner .btn{pointer-events:auto;width:56px;height:56px;border-radius:16px;border:1px solid rgba(255,255,255,.14);background:linear-gradient(145deg, rgba(10,12,16,.78), rgba(6,8,10,.92));color:#fff;font-weight:980;cursor:pointer}

<body>
<div id="gd-field"></div>
<div id="gd-dragon"></div>

<div id="gd-ui">
  <div class="top">
    <div class="topbar" id="topbar">
      <div class="controls">
        <div class="seg" role="group" aria-label="Compass Layer">
          <button type="button" id="layer1" aria-pressed="true">LAYER 1</button>
          <button type="button" id="layer2" aria-pressed="false">LAYER 2</button>

<script>
(function(){
"use strict";

/* minimal EN state (gd_* only) */
var qs=new URLSearchParams(location.search);
var LS=window.localStorage;
var style=(qs.get("style")||LS.getItem("gd_style")||"informal");
var time =(qs.get("time") ||LS.getItem("gd_time") ||"now");
var depth=(qs.get("depth")||LS.getItem("gd_depth")||"explore");
var lane =(qs.get("lane") ||"platform").toLowerCase();
var layer=(qs.get("layer")||"1");
if(style!=="informal"&&style!=="formal") style="informal";
if(time==="trajectory") time="post";
if(time!=="origin"&&time!=="now"&&time!=="post") time="now";
if(depth!=="explore"&&depth!=="learn") depth="explore";
if(lane!=="platform"&&lane!=="engineering") lane="platform";
if(layer!=="1"&&layer!=="2") layer="1";
try{ LS.setItem("gd_lang","en"); LS.setItem("gd_style",style); LS.setItem("gd_time",time); LS.setItem("gd_depth",depth); }catch(e){}
document.documentElement.lang="en";

function q(over){
  var p=new URLSearchParams();
  p.set("lang","en");
  p.set("style",(over&&over.style)?over.style:style);
  p.set("time",(over&&over.time)?over.time:time);
  p.set("depth",(over&&over.depth)?over.depth:depth);
  var L=(over&&over.lane)?over.lane:lane;
  if(L==="platform"||L==="engineering") p.set("lane",L);
  var lay=(over&&over.layer)?over.layer:layer;
  if(lay==="1"||lay==="2") p.set("layer",lay);
  return "?"+p.toString();
}
function go(path){ location.href = path + q(); }

/* compass data */
var CORE1="/index-core/index.html";
var CORE2="/index-spine/index.html";
var L1=[
  {code:"CORE",label:"CORE",href:CORE1,cls:"core"},
  {code:"N",label:"LAWS",href:"/laws/",cls:"l1"},
  {code:"E",label:"ENERGY",href:"/explore/frontier/energy/",cls:"l1"},
  {code:"S",label:"FINANCE",href:"/finance/",cls:"l1"},
  {code:"W",label:"GOVERNANCE",href:"/governance/",cls:"l1"}
];
var L2=[
  {code:"CORE",label:"CORE",href:CORE2,cls:"core"},
  {code:"NNE",label:"EDUCATION",href:"/products/education/",cls:"l3"},
  {code:"NE",label:"PRODUCTS",href:"/products/",cls:"l2"},
  {code:"ENE",label:"FRONTIER",href:"/explore/frontier/",cls:"l3"},
  {code:"ESE",label:"INFRA",href:"/explore/infrastructure/",cls:"l3"},
  {code:"E",label:"RESEARCH",href:"/research/",cls:"l2"},
  {code:"SE",label:"EXPLORE",href:"/explore/",cls:"l2"},
  {code:"SSE",label:"AGRICULTURE",href:"/products/agriculture/",cls:"l3"},
  {code:"S",label:"GAUGES",href:"/gauges/",cls:"l2"},
  {code:"SSW",label:"DOCTRINE",href:"/products/capital-doctrine/",cls:"l3"},
  {code:"WNW",label:"LATTICE",href:"/explore/frontier/lattice/",cls:"l3"},
  {code:"NW",label:"SHIMMER",href:"/explore/frontier/shimmer/",cls:"l3"},
  {code:"W",label:"VISION",href:"/explore/frontier/vision/",cls:"l3"}
];

var stage=document.getElementById("stage");

function mkNode(it){
  var d=document.createElement("div");
  d.className="node "+it.cls;
  d.setAttribute("role","button");
  d.tabIndex=0;

  var inner=document.createElement("div");
  inner.className="inner";
  var w=document.createElement("div"); w.className="word"; w.textContent=it.label;
  var c=document.createElement("div"); c.className="code"; c.textContent=it.code;
  inner.appendChild(w); inner.appendChild(c);
  d.appendChild(inner);

  function act(){ go(it.href); }
  d.addEventListener("click", act, {passive:true});
  d.addEventListener("keydown", function(e){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); act(); }});
  return d;
}
function clearNodes(){
  var nodes=stage.querySelectorAll(".node");
  for(var i=0;i<nodes.length;i++) nodes[i].remove();
}
function layout1(){
  clearNodes();
  var r=stage.getBoundingClientRect(), cx=r.width/2, cy=r.height/2;
  var R1=164;
  var core=mkNode(L1[0]); core.style.left=cx+"px"; core.style.top=cy+"px"; stage.appendChild(core);

  var map={N:L1[1],E:L1[2],S:L1[3],W:L1[4]};
  var order=["N","E","S","W"];
  var ang=[-Math.PI/2,0,Math.PI/2,Math.PI];
  for(var i=0;i<4;i++){
    var it=map[order[i]];
    var x=cx + R1*Math.cos(ang[i]);
    var y=cy + R1*Math.sin(ang[i]);
    var n=mkNode(it); n.style.left=x+"px"; n.style.top=y+"px"; stage.appendChild(n);
  }
}
function layout2(){
  clearNodes();
  var r=stage.getBoundingClientRect(), cx=r.width/2, cy=r.height/2;
  var R2=236, R3=300;
  var core=mkNode(L2[0]); core.style.left=cx+"px"; core.style.top=cy+"px"; stage.appendChild(core);
  var list=L2.slice(1);
  for(var i=0;i<list.length;i++){
    var it=list[i];
    var a=(i/list.length)*Math.PI*2 - Math.PI/2;
    var rad=(it.cls==="l2")?R2:R3;
    var x=cx + rad*Math.cos(a);
    var y=cy + rad*Math.sin(a);
    var n=mkNode(it); n.style.left=x+"px"; n.style.top=y+"px"; stage.appendChild(n);
  }
}
function render(){ (layer==="1") ? layout1() : layout2(); }
function setPressed(id,on){ document.getElementById(id).setAttribute("aria-pressed", on?"true":"false"); }
function paint(){
  setPressed("layer1", layer==="1");
  setPressed("layer2", layer==="2");
  setPressed("lanePlatform", lane==="platform");
  setPressed("laneEngineering", lane==="engineering");
}
function setLayer(v){ layer=(v==="2")?"2":"1"; history.replaceState({}, "", location.pathname + q({layer:layer})); paint(); render(); }
function setLane(v){ lane=(v==="engineering")?"engineering":"platform"; history.replaceState({}, "", location.pathname + q({lane:lane})); paint(); render(); }

document.getElementById("layer1").addEventListener("click", function(){ setLayer("1"); }, {passive:true});
document.getElementById("layer2").addEventListener("click", function(){ setLayer("2"); }, {passive:true});
document.getElementById("lanePlatform").addEventListener("click", function(){ setLane("platform"); }, {passive:true});
document.getElementById("laneEngineering").addEventListener("click", function(){ setLane("engineering"); }, {passive:true});

document.getElementById("btnExit").addEventListener("click", function(){ go("/door/"); }, {passive:true});
document.getElementById("btnHub").addEventListener("click", function(){ go("/home/"); }, {passive:true});

/* WIRING EXPORT (CSS vars only) */
function exportWiring(){
  var root=document.documentElement;

  var topbar=document.getElementById("topbar");
  var noFlyTop=0;
  if(topbar){
    var tr=topbar.getBoundingClientRect();
    noFlyTop=Math.round(tr.bottom + 16);
  }

  var cl=document.getElementById("cornerLeft");
  var cr=document.getElementById("cornerRight");
  var botTop=Infinity;
  if(cl) botTop=Math.min(botTop, cl.getBoundingClientRect().top);
  if(cr) botTop=Math.min(botTop, cr.getBoundingClientRect().top);
  var noFlyBot=(botTop!==Infinity) ? Math.round(botTop - 16) : Math.round(window.innerHeight - 16);

  var sr=stage.getBoundingClientRect();
  var centerX=Math.round(sr.left + sr.width/2);
  var centerY=Math.round(sr.top  + sr.height/2);

  var bandTop=Math.max(noFlyTop + 24, 0);
  var bandBot=Math.min(noFlyBot - 24, window.innerHeight);
  var bandH=Math.max(1, bandBot - bandTop);

  var laneTop=Math.round(bandTop + bandH*0.30);
  var laneBot=Math.round(bandTop + bandH*0.70);

  root.style.setProperty("--gd_noFlyTop", noFlyTop+"px");
  root.style.setProperty("--gd_noFlyBot", noFlyBot+"px");
  root.style.setProperty("--gd_laneTop",  laneTop+"px");
  root.style.setProperty("--gd_laneBot",  laneBot+"px");
  root.style.setProperty("--gd_centerX",  centerX+"px");
  root.style.setProperty("--gd_centerY",  centerY+"px");
}
exportWiring();
window.addEventListener("resize", exportWiring, {passive:true});

/* engine status + mount */
window.addEventListener("load", function(){
  var bgV=(window.GD_BG && window.GD_BG.version) ? window.GD_BG.version : (window.GD_BG ? "BG_OK" : "BG?");
  var drV=(window.GD_DRAGON && window.GD_DRAGON.version) ? window.GD_DRAGON.version : (window.GD_DRAGON ? "DR_OK" : "DR?");
  document.getElementById("engstat").textContent="ENG: "+bgV+" | "+drV;

  try{ if(window.GD_BG && window.GD_BG.mount) window.GD_BG.mount({fps:30,dpr_cap:1.6}); }catch(e){}
  try{ if(window.GD_DRAGON && window.GD_DRAGON.mount) window.GD_DRAGON.mount({}); }catch(e){}
});

paint();
requestAnimationFrame(render);
window.addEventListener("resize", function(){ render(); }, {passive:true});

})();
</script>

</body>
