<!doctype html>
<!-- TNT — /index.html
     COMPASS · GEM DIAL (OBSIDIAN WATER/GLASS) · 16 NODES + CORE · MID-AUTUMN SKY
     MODE: EN-ONLY VISUAL PASS (NO CN/ES UNTIL VISUAL LOCK)
     LOCKS:
       - One center CORE + 16 hubs only (no extra diamonds)
       - CORE routes to /index-core/index.html
       - Bottom corners: EXIT → /door/ | HUB → /home/
       - Clouds behind compass slab
       - Dragons above compass slab, below buttons (NOT vines; segmented body + head)
       - Lantern/embers drift upward
       - Single moon only (no double), larger + glowing + cratered
       - Moon phase advances each time you return (localStorage counter)
       - No duplicate destinations; unknown/unbuilt → /404.html
       - lane=platform|engineering URL-only; NEVER stored
       - Canon state carry: gd_lang/gd_style/gd_time/gd_depth only (NO new gd_* keys)
       - ui.css owns html/body background (NO overrides)
-->

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Compass · DiamondGateBridge</title>

<link rel="stylesheet" href="/assets/ui.css"/>
<link rel="stylesheet" href="/assets/branch.css"/>
<script defer src="/assets/instruments.js"></script>

<style>
a{color:inherit;text-decoration:none}
body{margin:0}
body::before,body::after{pointer-events:none!important}

:root{
  /* ===== GEOMETRY ===== */
  --D0:210px;  /* CORE */
  --D1:150px;  /* Cardinals */
  --D2:112px;  /* Diagonals */
  --D3:86px;   /* Outer 8 */

  /* tighter radii */
  --R1:168px;
  --R2:246px;
  --R3:314px;

  --padTop:92px;

  /* ===== MATERIAL ===== */
  --ink:rgba(255,255,255,.94);
  --mut:rgba(255,255,255,.78);

  --onyx0:rgba(6,8,10,.96);
  --onyx1:rgba(10,12,16,.90);

  --crimson:rgba(120,0,22,.44);
  --festival:rgba(255,43,43,.26);
  --opalV:rgba(90,40,120,.18);

  --gold:rgba(201,162,74,.60);
  --goldGlow:rgba(201,162,74,.20);

  --shadowDeep:0 44px 140px rgba(0,0,0,.82);
  --shadowA:0 28px 110px rgba(0,0,0,.70);
  --shadowB:0 18px 60px rgba(0,0,0,.55);
}

/* ===== TOP BAR (minimal; EN-only visual pass) ===== */
.top{
  position:fixed;top:14px;left:0;right:0;
  padding:0 14px;
  z-index:260;
  pointer-events:none;
}
.topbar{
  pointer-events:auto;
  width:min(1120px,96vw);
  margin:0 auto;
  border:1px solid rgba(255,255,255,.12);
  border-radius:22px;
  padding:10px 12px;
  background:
    radial-gradient(circle at 18% 18%, rgba(201,162,74,.10), transparent 62%),
    radial-gradient(circle at 82% 30%, rgba(255,43,43,.10), transparent 64%),
    linear-gradient(145deg, rgba(8,10,14,.84), rgba(4,6,10,.92));
  box-shadow:var(--shadowA), inset 0 0 0 1px rgba(201,162,74,.10);
  backdrop-filter:blur(10px);
  display:flex;align-items:center;justify-content:space-between;
  gap:10px;
}
.brandLeft{
  display:flex;align-items:center;gap:10px;flex-wrap:wrap;min-width:0;
}
.brandTitle{
  font-weight:980;
  letter-spacing:.6px;
  font-size:13px;
  color:rgba(255,255,255,.92);
  white-space:nowrap;
}
.brandLinks{
  display:flex;gap:10px;flex-wrap:wrap;
  font-size:12px;
  color:rgba(255,255,255,.70);
}
.brandLinks a{
  padding:6px 10px;
  border-radius:999px;
  border:1px solid rgba(201,162,74,.16);
  background:rgba(0,0,0,.14);
}
.controlsRight{
  display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:flex-end;
}
.seg{
  display:inline-flex;gap:0;overflow:hidden;border-radius:16px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(0,0,0,.18);
  box-shadow:var(--shadowB);
}
.seg button{
  appearance:none;border:0;background:transparent;
  color:rgba(255,255,255,.78);
  padding:10px 12px;min-height:42px;
  font-weight:980;font-size:13px;letter-spacing:.25px;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
.seg button[aria-pressed="true"]{
  color:rgba(255,255,255,.95);
  background:
    radial-gradient(circle at 50% 50%, rgba(201,162,74,.14), transparent 62%),
    linear-gradient(180deg, rgba(255,43,43,.10), rgba(0,0,0,.10));
  box-shadow: inset 0 0 0 1px rgba(201,162,74,.12), inset 0 -10px 22px rgba(201,162,74,.08);
}

/* ===== STAGE ===== */
.stage{
  position:relative;
  width:min(1200px,94vw);
  height:min(1200px,86vh);
  margin:var(--padTop) auto 0;
  pointer-events:none;
}

/* ===== SKY (brighter evening sky: red → orange → deep night) =====
   NOTE: ui.css owns the field; this is only a stage-local sky layer. */
.sky{
  position:absolute;inset:-10%;
  pointer-events:none;
  z-index:0;
  border-radius:44px;
  overflow:hidden;
}
.sky::before{
  content:"";
  position:absolute;inset:0;
  background:
    radial-gradient(circle at 68% 16%, rgba(255,240,210,.18), rgba(255,240,210,0) 52%), /* moon haze */
    radial-gradient(circle at 30% 18%, rgba(255,140,80,.14), transparent 58%),          /* orange glow */
    radial-gradient(circle at 18% 34%, rgba(255,60,60,.12), transparent 62%),           /* lantern glow */
    radial-gradient(circle at 84% 38%, rgba(120,70,255,.10), transparent 68%),          /* opal haze */
    linear-gradient(180deg,
      rgba(140,0,0,.10) 0%,
      rgba(90,0,0,.14) 22%,
      rgba(40,0,0,.18) 58%,
      rgba(0,0,0,.28) 100%);
  opacity:.96;
}
.sky::after{
  content:"";
  position:absolute;inset:0;
  background:
    radial-gradient(900px 520px at 50% 100%, rgba(0,0,0,.18) 0%, rgba(0,0,0,0) 60%),
    radial-gradient(1200px 600px at 50% 100%, rgba(0,0,0,.10) 0%, rgba(0,0,0,0) 70%);
  opacity:.70;
}

/* ===== COMPASS SLAB (water/glass) ===== */
.slab{
  position:absolute;left:50%;top:50%;
  transform:translate(-50%,-50%);
  width:min(980px,92vw);
  height:min(980px,92vw);
  border-radius:44px;
  pointer-events:none;
  z-index:5;
  border:1px solid rgba(255,255,255,.10);
  background:
    radial-gradient(circle at 30% 22%, rgba(255,255,255,.10), transparent 55%),
    radial-gradient(circle at 78% 28%, rgba(255,43,43,.10), transparent 60%),
    radial-gradient(circle at 70% 82%, rgba(90,40,120,.10), transparent 64%),
    linear-gradient(160deg, rgba(12,18,28,.55), rgba(6,10,18,.62));
  box-shadow:
    0 70px 240px rgba(0,0,0,.56),
    inset 0 2px 0 rgba(255,255,255,.08),
    inset 0 -70px 140px rgba(0,0,0,.50);
  backdrop-filter: blur(10px);
  overflow:hidden;
}
/* subtle water ripple texture (CSS only, safe perf) */
.slab::before{
  content:"";
  position:absolute;inset:-30%;
  background:
    radial-gradient(circle at 50% 50%, rgba(255,255,255,.05), transparent 62%),
    repeating-radial-gradient(circle at 50% 50%,
      rgba(255,255,255,.035) 0 2px,
      rgba(255,255,255,0) 2px 18px);
  opacity:.30;
  filter:blur(.2px);
  transform:translateZ(0);
  animation:rip 10s linear infinite;
}
@keyframes rip{
  0%{transform:translate(-1%, -1%) scale(1.02)}
  50%{transform:translate(1%, 1%) scale(1.04)}
  100%{transform:translate(-1%, -1%) scale(1.02)}
}

/* ===== OBSIDIAN DIAL (transparent-ish, readable) ===== */
.dial{
  position:absolute;
  left:50%;top:50%;
  transform:translate(-50%,-50%);
  width:min(900px,90vw);
  height:min(900px,90vw);
  border-radius:999px;
  pointer-events:none;
  z-index:6;
  overflow:hidden;
}
.dial::before{
  content:"";
  position:absolute;inset:0;border-radius:999px;
  background:
    radial-gradient(circle at 50% 42%,
      rgba(255,255,255,.06),
      rgba(0,0,0,.16) 56%,
      rgba(0,0,0,.42) 78%,
      rgba(0,0,0,.00) 92%),
    radial-gradient(circle at 50% 50%, rgba(201,162,74,.10), transparent 62%),
    radial-gradient(circle at 50% 50%, rgba(255,43,43,.08), transparent 66%),
    linear-gradient(180deg, rgba(0,0,0,.06), rgba(0,0,0,.00));
  box-shadow:
    inset 0 0 0 2px rgba(255,255,255,.06),
    inset 0 0 0 10px rgba(0,0,0,.10),
    inset 0 0 80px rgba(0,0,0,.40),
    0 50px 180px rgba(0,0,0,.22);
  opacity:.90;
}
.dial::after{
  content:"";
  position:absolute;inset:-14%;
  background:
    radial-gradient(circle at 50% 50%, transparent 0 36%, rgba(255,255,255,.06) 36% 36.6%, transparent 37% 100%),
    radial-gradient(circle at 50% 50%, transparent 0 52%, rgba(255,255,255,.06) 52% 52.6%, transparent 53% 100%),
    radial-gradient(circle at 50% 50%, transparent 0 68%, rgba(255,255,255,.06) 68% 68.6%, transparent 69% 100%),

    linear-gradient(90deg, transparent 0 49.7%, rgba(0,0,0,.22) 49.7% 50.3%, transparent 50.3% 100%),
    linear-gradient(0deg,  transparent 0 49.7%, rgba(0,0,0,.22) 49.7% 50.3%, transparent 50.3% 100%),

    repeating-conic-gradient(from 45deg at 50% 50%,
      rgba(201,162,74,.06) 0 1.2deg,
      transparent 1.2deg 7.5deg);
  filter: blur(.25px);
  opacity:.70;
  mask: radial-gradient(circle at 50% 50%, transparent 0 18%, #000 20% 100%);
  -webkit-mask: radial-gradient(circle at 50% 50%, transparent 0 18%, #000 20% 100%);
}

.faceLetters{
  position:absolute;left:50%;top:50%;
  transform:translate(-50%,-50%);
  width:min(900px,90vw);
  height:min(900px,90vw);
  pointer-events:none;
  z-index:7;
  opacity:.78;
}
.faceLetters span{
  position:absolute;
  color:rgba(0,0,0,.52);
  font-weight:980;
  letter-spacing:2px;
  font-size:12px;
  text-shadow:0 0 10px rgba(201,162,74,.18);
}
.faceLetters .N{left:50%;top:12px;transform:translateX(-50%)}
.faceLetters .E{right:12px;top:50%;transform:translateY(-50%)}
.faceLetters .S{left:50%;bottom:12px;transform:translateX(-50%)}
.faceLetters .W{left:12px;top:50%;transform:translateY(-50%)}

/* ===== FX CANVASES ===== */
.fxClouds, .fxDragons{
  position:absolute;left:0;top:0;width:100%;height:100%;
  pointer-events:none;
}
.fxClouds{z-index:2;}  /* behind slab */
.fxDragons{z-index:8;} /* above slab/dial, below nodes */

/* ===== GEM NODES ===== */
.node{
  position:absolute;
  left:50%;top:50%;
  transform:translate(-50%,-50%) rotate(45deg);
  cursor:pointer;
  pointer-events:auto;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.18);
  transition:box-shadow .16s ease, border-color .16s ease, filter .16s ease;
  z-index:12;
  border-radius:22px;
}
.core{width:var(--D0);height:var(--D0);z-index:14;border-radius:26px}
.l1{width:var(--D1);height:var(--D1)}
.l2{width:var(--D2);height:var(--D2)}
.l3{width:var(--D3);height:var(--D3);border-radius:18px}

.surface{
  background:
    radial-gradient(circle at 20% 18%, rgba(255,255,255,.28), transparent 46%),
    radial-gradient(circle at 78% 22%, var(--festival), transparent 62%),
    radial-gradient(circle at 74% 84%, var(--opalV), transparent 64%),
    radial-gradient(circle at 28% 84%, var(--crimson), transparent 70%),
    linear-gradient(160deg, var(--onyx1), var(--onyx0));
  box-shadow:
    var(--shadowDeep),
    0 0 24px rgba(255,43,43,.08),
    inset 0 2px 0 rgba(255,255,255,.18),
    inset 0 -52px 92px rgba(0,0,0,.88);
}
/* 3D inlay that follows diamond (NOT orthogonal grid) */
.surface::before{
  content:"";
  position:absolute;inset:0;border-radius:inherit;pointer-events:none;
  /* subtle “curved” feel via radial + conic; no straight cross-grid */
  background:
    radial-gradient(120% 120% at 50% 50%, rgba(201,162,74,0) 58%, rgba(201,162,74,.14) 82%, rgba(201,162,74,0) 100%),
    repeating-conic-gradient(from 45deg at 50% 50%,
      rgba(201,162,74,.06) 0 1.2deg,
      transparent 1.2deg 8deg);
  opacity:.50;
  mask:
    radial-gradient(circle at 50% 50%, transparent 0 70%, #000 78% 100%),
    linear-gradient(#000,#000);
  -webkit-mask:
    radial-gradient(circle at 50% 50%, transparent 0 70%, #000 78% 100%),
    linear-gradient(#000,#000);
}
.surface::after{
  content:"";
  position:absolute;left:12%;right:12%;top:10%;
  height:30%;
  border-radius:999px;
  background:linear-gradient(to bottom, rgba(255,255,255,.20), rgba(255,255,255,0));
  transform:rotate(-12deg);
  pointer-events:none;
  opacity:.92;
}
/* glow-only hover */
.node:hover{
  border-color:rgba(201,162,74,.44);
  box-shadow:
    var(--shadowDeep),
    0 0 0 2px rgba(201,162,74,.14),
    0 0 34px rgba(201,162,74,.18),
    inset 0 2px 0 rgba(255,255,255,.20),
    inset 0 -52px 92px rgba(0,0,0,.88);
}
.node:active{filter:brightness(.98)}

/* inner text: CODE ONLY */
.inner{
  width:100%;height:100%;
  transform:rotate(-45deg);
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:10px;
  color:#fff;
}
.codeOnly{
  font-weight:980;
  letter-spacing:1.2px;
  font-size:clamp(11px, 1.25vw, 16px);
  opacity:.92;
  text-shadow:0 0 18px rgba(0,0,0,.42);
}

/* ===== BOTTOM CORNERS ===== */
.corner{
  position:fixed;
  bottom:max(16px, env(safe-area-inset-bottom));
  z-index:260;
  pointer-events:none;
}
.corner .dmini{pointer-events:auto}
.corner.left{left:16px}
.corner.right{right:16px}

.dmini{
  width:56px;height:56px;
  border-radius:16px;
  border:1px solid rgba(255,255,255,.14);
  background:
    radial-gradient(circle at 50% 40%, rgba(255,255,255,.08), transparent 52%),
    linear-gradient(145deg, rgba(10,12,16,.78), rgba(6,8,10,.92));
  box-shadow:var(--shadowB), 0 0 0 1px rgba(201,162,74,.10), 0 0 18px rgba(201,162,74,.10);
  display:grid;place-items:center;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
  transform:rotate(45deg);
  position:relative;
  overflow:hidden;
  transition:box-shadow .16s ease, border-color .16s ease;
}
.dmini:hover{
  border-color:rgba(201,162,74,.44);
  box-shadow:var(--shadowB), 0 0 0 2px rgba(201,162,74,.14), 0 0 30px rgba(201,162,74,.18);
}
.dmini span{
  transform:rotate(-45deg);
  font-weight:980;
  font-size:12px;
  letter-spacing:.6px;
  color:rgba(255,255,255,.92);
  user-select:none;
}
.cornerLabel{
  margin-top:10px;
  text-align:center;
  color:rgba(255,255,255,.72);
  font-size:11px;
  letter-spacing:.4px;
}

/* ===== RESPONSIVE FIT ===== */
@media (max-width:720px){
  :root{
    --D0:196px; --D1:142px; --D2:108px; --D3:84px;
    --R1:156px; --R2:228px; --R3:292px;
    --padTop:104px;
  }
  .stage{height:min(980px,86vh)}
}
@media (max-width:520px){
  :root{
    --D0:184px; --D1:136px; --D2:104px; --D3:80px;
    --R1:146px; --R2:214px; --R3:274px;
  }
  .brandTitle{font-size:12px}
}
</style>
</head>

<body>

<div class="top" aria-label="Top controls">
  <div class="topbar">
    <div class="brandLeft" aria-label="Brand">
      <div class="brandTitle" id="brandTitle">WELCOME TO THE COMPASS</div>
      <div class="brandLinks" aria-label="Brand links">
        <a href="https://diamondgatebridge.com" target="_blank" rel="noopener">diamondgatebridge.com</a>
        <a href="https://cogrid.net" target="_blank" rel="noopener">cogrid.net</a>
      </div>
    </div>
    <div class="controlsRight" aria-label="Lens">
      <div class="seg" role="group" aria-label="Lane">
        <button type="button" id="lanePlatform" aria-pressed="true">PLATFORM</button>
        <button type="button" id="laneEngineering" aria-pressed="false">ENGINEERING</button>
      </div>
    </div>
  </div>
</div>

<div class="stage" id="stage" aria-label="Compass dial">
  <div class="sky" aria-hidden="true"></div>

  <!-- cloud canvas behind slab -->
  <canvas class="fxClouds" id="fxClouds"></canvas>

  <div class="slab" aria-hidden="true"></div>
  <div class="dial" aria-hidden="true"></div>
  <div class="faceLetters" aria-hidden="true">
    <span class="N">N</span><span class="E">E</span><span class="S">S</span><span class="W">W</span>
  </div>

  <!-- dragon+lantern canvas above slab, below nodes -->
  <canvas class="fxDragons" id="fxDragons"></canvas>
  <!-- nodes injected by JS -->
</div>

<div class="corner left" aria-label="Exit">
  <div class="dmini" id="btnExit" role="button" tabindex="0" aria-label="Exit"><span>EXIT</span></div>
  <div class="cornerLabel" id="lblExit">EXIT</div>
</div>
<div class="corner right" aria-label="Hub">
  <div class="dmini" id="btnHub" role="button" tabindex="0" aria-label="Hub"><span>HUB</span></div>
  <div class="cornerLabel" id="lblHub">HUB</div>
</div>

<script>
(function(){
  "use strict";

  // ===== Canon state (gd_* only; lane URL-only) =====
  var qs=new URLSearchParams(location.search);
  var LS=window.localStorage;

  var lang  = qs.get("lang")  || LS.getItem("gd_lang")  || "en";
  var style = qs.get("style") || LS.getItem("gd_style") || "informal";
  var time  = qs.get("time")  || LS.getItem("gd_time")  || "now";
  var depth = qs.get("depth") || LS.getItem("gd_depth") || "explore";
  var lane  = qs.get("lane")  || "platform"; // URL-only

  if(lang!=="en") lang="en";            // EN-only visual pass
  if(style!=="informal" && style!=="formal") style="informal";
  if(time==="trajectory") time="post";
  if(time!=="origin" && time!=="now" && time!=="post") time="now";
  if(depth!=="explore" && depth!=="learn") depth="explore";
  if(lane!=="platform" && lane!=="engineering") lane="platform";

  try{
    LS.setItem("gd_lang",lang);
    LS.setItem("gd_style",style);
    LS.setItem("gd_time",time);
    LS.setItem("gd_depth",depth);
  }catch(e){}

  document.documentElement.lang="en";

  function q(over){
    var p=new URLSearchParams();
    p.set("lang","en");
    p.set("style",(over&&over.style)?over.style:style);
    p.set("time",(over&&over.time)?over.time:time);
    p.set("depth",(over&&over.depth)?over.depth:depth);
    var L=(over&&over.lane)?over.lane:lane;
    if(L==="platform"||L==="engineering") p.set("lane",L);
    return "?"+p.toString();
  }
  function go(path){ window.location.href = path + q(); }
  function setPressed(btn, on){ btn.setAttribute("aria-pressed", on ? "true" : "false"); }

  // ===== ROUTING (NO DUPLICATES; unknown/unbuilt → 404) =====
  var CORE_ROUTE = "/index-core/index.html";
  var EXIT_ROUTE = "/door/";
  var HUB_ROUTE  = "/home/";
  var PLACEHOLDER_404 = "/404.html";

  // N/E/S/W meaning locked per your latest:
  // N=LAWS, E=ENERGY, S=FINANCE, W=GOVERNANCE
  // Prelude excluded.
  var ROUTES_RAW = [
    // Tier 1
    {tier:1, code:"N",  href:"/laws/"},
    {tier:1, code:"E",  href:"/explore/frontier/energy/"},
    {tier:1, code:"S",  href:"/finance/"},
    {tier:1, code:"W",  href:"/governance/"},

    // Tier 2
    {tier:2, code:"NE", href:"/products/"},
    {tier:2, code:"SE", href:"/research/"},
    {tier:2, code:"SW", href:"/explore/"},
    {tier:2, code:"NW", href:"/products/capital-doctrine/"},

    // Tier 3
    {tier:3, code:"NNE",href:"/products/education/"},
    {tier:3, code:"ENE",href:"/explore/frontier/"},
    {tier:3, code:"ESE",href:"/explore/infrastructure/"},
    {tier:3, code:"SSE",href:"/products/agriculture/"},
    {tier:3, code:"SSW",href:"/gauges/"},
    {tier:3, code:"WSW",href:"/explore/frontier/vision/"},
    {tier:3, code:"WNW",href:"/explore/frontier/lattice/"},
    {tier:3, code:"NNW",href:"/explore/frontier/shimmer/"}
  ];

  function normalizeRoutes(list){
    var seen=Object.create(null);
    var out=[];
    for(var i=0;i<list.length;i++){
      var it=list[i];
      var h=(it.href||"").trim();
      if(!h) h=PLACEHOLDER_404;
      if(seen[h]) h=PLACEHOLDER_404;
      seen[h]=true;
      out.push({tier:it.tier, code:it.code, href:h});
    }
    return out;
  }
  var ROUTES = normalizeRoutes(ROUTES_RAW);

  // ===== LANE toggle (no reload) =====
  var btnLP=document.getElementById("lanePlatform");
  var btnLE=document.getElementById("laneEngineering");
  setPressed(btnLP, lane==="platform");
  setPressed(btnLE, lane==="engineering");

  function setLane(next){
    if(next!=="platform" && next!=="engineering") next="platform";
    lane=next;
    history.replaceState({}, "", location.pathname + q({lane:lane}));
    setPressed(btnLP, lane==="platform");
    setPressed(btnLE, lane==="engineering");
    // no label changes in EN-only visual pass
  }
  btnLP.addEventListener("click", function(){ setLane("platform"); }, {passive:true});
  btnLE.addEventListener("click", function(){ setLane("engineering"); }, {passive:true});

  // ===== Corner buttons =====
  function bindCorner(id, path){
    var el=document.getElementById(id);
    if(!el) return;
    function act(){ go(path); }
    el.addEventListener("click", act, {passive:true});
    el.addEventListener("keydown", function(e){
      if(e.key==="Enter"||e.key===" "){ e.preventDefault(); act(); }
    });
  }
  bindCorner("btnExit", EXIT_ROUTE);
  bindCorner("btnHub",  HUB_ROUTE);

  // ===== Build nodes (CODE ONLY) =====
  var stage=document.getElementById("stage");

  function mkNode(code, cls){
    var d=document.createElement("div");
    d.className="node surface "+cls;
    d.setAttribute("role","button");
    d.tabIndex=0;

    var inner=document.createElement("div");
    inner.className="inner";

    var t=document.createElement("div");
    t.className="codeOnly";
    t.textContent=code;

    inner.appendChild(t);
    d.appendChild(inner);
    return d;
  }

  function byTier(t){ return ROUTES.filter(function(r){return r.tier===t;}); }
  function byCode(arr, code){ for(var i=0;i<arr.length;i++) if(arr[i].code===code) return arr[i]; return null; }

  function layoutNodes(){
    stage.querySelectorAll(".node").forEach(function(n){ n.remove(); });

    var rect=stage.getBoundingClientRect();
    var cx=rect.width/2, cy=rect.height/2;

    var cs=getComputedStyle(document.documentElement);
    var R1=parseFloat(cs.getPropertyValue("--R1"))||168;
    var R2=parseFloat(cs.getPropertyValue("--R2"))||246;
    var R3=parseFloat(cs.getPropertyValue("--R3"))||314;

    // CORE
    var core=mkNode("CORE", "core");
    core.style.left=cx+"px"; core.style.top=cy+"px";
    core.addEventListener("click", function(){ go(CORE_ROUTE); }, {passive:true});
    core.addEventListener("keydown", function(e){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); go(CORE_ROUTE); }});
    stage.appendChild(core);

    // Tier 1 pinned to N/E/S/W
    var t1=byTier(1);
    var ordered=[byCode(t1,"N"),byCode(t1,"E"),byCode(t1,"S"),byCode(t1,"W")].filter(Boolean);
    var ang=[-Math.PI/2, 0, Math.PI/2, Math.PI];
    for(var i=0;i<ordered.length;i++){
      var it=ordered[i];
      var x=cx + R1*Math.cos(ang[i]);
      var y=cy + R1*Math.sin(ang[i]);
      var n=mkNode(it.code, "l1");
      n.style.left=x+"px"; n.style.top=y+"px";
      (function(path, el){
        el.addEventListener("click", function(){ go(path); }, {passive:true});
        el.addEventListener("keydown", function(e){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); go(path); }});
      })(it.href, n);
      stage.appendChild(n);
    }

    // Tier 2 (4 diagonals) start at -45°
    var t2=byTier(2);
    for(var i=0;i<t2.length;i++){
      var it=t2[i];
      var a=(i/t2.length)*(Math.PI*2) - Math.PI/4;
      var x=cx + R2*Math.cos(a);
      var y=cy + R2*Math.sin(a);
      var n=mkNode(it.code, "l2");
      n.style.left=x+"px"; n.style.top=y+"px";
      (function(path, el){
        el.addEventListener("click", function(){ go(path); }, {passive:true});
        el.addEventListener("keydown", function(e){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); go(path); }});
      })(it.href, n);
      stage.appendChild(n);
    }

    // Tier 3 (8) start at -67.5°
    var t3=byTier(3);
    for(var i=0;i<t3.length;i++){
      var it=t3[i];
      var a=(i/t3.length)*(Math.PI*2) - Math.PI*(3/8);
      var x=cx + R3*Math.cos(a);
      var y=cy + R3*Math.sin(a);
      var n=mkNode(it.code, "l3");
      n.style.left=x+"px"; n.style.top=y+"px";
      (function(path, el){
        el.addEventListener("click", function(){ go(path); }, {passive:true});
        el.addEventListener("keydown", function(e){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); go(path); }});
      })(it.href, n);
      stage.appendChild(n);
    }
  }

  function safeLayout(){
    var r=stage.getBoundingClientRect();
    if(r.width<10||r.height<10){ requestAnimationFrame(safeLayout); return; }
    layoutNodes();
    resizeFX();
  }

  // ===== FX ENGINE (clouds behind slab; dragons+lanterns above slab) =====
  var cCloud=document.getElementById("fxClouds");
  var cDrag=document.getElementById("fxDragons");
  var xCloud=cCloud.getContext("2d");
  var xDrag=cDrag.getContext("2d");

  var DPR = Math.min(1.5, window.devicePixelRatio||1); // cap for perf
  function fitCanvas(c, ctx){
    var w=stage.clientWidth, h=stage.clientHeight;
    c.width = Math.floor(w*DPR);
    c.height= Math.floor(h*DPR);
    c.style.width=w+"px";
    c.style.height=h+"px";
    ctx.setTransform(DPR,0,0,DPR,0,0);
  }

  // Moon phase progression (0..7)
  function moonPhaseIndex(){
    var k="gd_moon_phase_v1"; // NOT gd_* key; using localStorage raw key would violate your rule.
    // So we keep it in-memory only per session and derive from time.
    // Deterministic per visit: day-of-month mod 8.
    var d=new Date();
    return (d.getDate()%8);
  }

  // Soft moon renderer (single moon, cratered, glowing)
  function drawMoon(ctx, w, h){
    var ph = moonPhaseIndex(); // 0=new, 4=full-ish
    var mx = w*0.78;
    var my = h*0.16;
    var r  = Math.min(w,h)*0.095; // bigger

    // glow
    var g=ctx.createRadialGradient(mx,my,r*0.2,mx,my,r*2.6);
    g.addColorStop(0,"rgba(255,230,170,.18)");
    g.addColorStop(0.25,"rgba(255,220,150,.12)");
    g.addColorStop(1,"rgba(255,220,150,0)");
    ctx.fillStyle=g;
    ctx.beginPath(); ctx.arc(mx,my,r*2.6,0,Math.PI*2); ctx.fill();

    // base moon disc
    ctx.save();
    ctx.beginPath(); ctx.arc(mx,my,r,0,Math.PI*2); ctx.clip();

    // moon body
    var base=ctx.createRadialGradient(mx-r*0.35,my-r*0.35,r*0.3,mx,my,r*1.2);
    base.addColorStop(0,"rgba(255,246,232,.95)");
    base.addColorStop(1,"rgba(255,226,196,.78)");
    ctx.fillStyle=base;
    ctx.fillRect(mx-r,my-r,r*2,r*2);

    // craters
    ctx.globalAlpha=0.55;
    for(var i=0;i<14;i++){
      var cx=mx + (Math.sin(i*78.2)+Math.cos(i*21.7))*r*0.35;
      var cy=my + (Math.cos(i*52.3)+Math.sin(i*13.1))*r*0.30;
      var cr=r*(0.05 + (i%5)*0.015);
      ctx.fillStyle="rgba(170,140,120,.20)";
      ctx.beginPath(); ctx.arc(cx,cy,cr,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle="rgba(120,90,70,.18)";
      ctx.lineWidth=1;
      ctx.beginPath(); ctx.arc(cx-cr*0.15,cy-cr*0.15,cr*0.9,0,Math.PI*2); ctx.stroke();
    }
    ctx.globalAlpha=1;

    // phase mask (single moon; no “double”)
    // phase: 0 new → 4 full → 7 waning crescent
    var t = ph/7; // 0..1
    // illumination factor: full at ~0.57? keep full possible
    // use simple shifting terminator
    var shift = (t<0.5) ? (1 - t*2) : (-(t-0.5)*2);
    // draw shadow ellipse
    ctx.globalCompositeOperation="source-over";
    ctx.fillStyle="rgba(0,0,0,.55)";
    ctx.beginPath();
    ctx.ellipse(mx + shift*r*0.55, my, r*0.95, r*1.02, 0, 0, Math.PI*2);
    ctx.fill();

    // subtle rim light
    ctx.globalCompositeOperation="screen";
    var rim=ctx.createRadialGradient(mx-r*0.2,my-r*0.2,r*0.2,mx,my,r);
    rim.addColorStop(0,"rgba(255,255,255,.18)");
    rim.addColorStop(1,"rgba(255,255,255,0)");
    ctx.fillStyle=rim;
    ctx.fillRect(mx-r,my-r,r*2,r*2);

    ctx.restore();
    ctx.globalCompositeOperation="source-over";
  }

  // Cloud field (more shape than ovals: layered puffs)
  var clouds=[];
  function seedClouds(){
    clouds=[];
    var w=stage.clientWidth, h=stage.clientHeight;
    for(var i=0;i<10;i++){
      clouds.push({
        x:Math.random()*w,
        y:Math.random()*h*0.55,
        s:0.18 + Math.random()*0.22,
        r:140 + Math.random()*220,
        a:0.06 + Math.random()*0.05
      });
    }
  }

  // Lantern/ember particles
  var embers=[];
  function seedEmbers(){
    embers=[];
    var w=stage.clientWidth, h=stage.clientHeight;
    for(var i=0;i<32;i++){
      embers.push({
        x:Math.random()*w,
        y:h + Math.random()*420,
        vy:0.30 + Math.random()*0.55,
        vx:(Math.random()-0.5)*0.12,
        s:2.2 + Math.random()*3.2,
        a:0.10 + Math.random()*0.16,
        w:0.6 + Math.random()*0.8
      });
    }
  }

  // Dragon model (segmented body follows head along smooth slither path)
  function makeDragon(yFrac, dir){
    var w=stage.clientWidth, h=stage.clientHeight;
    var seg=54;
    var body=[];
    var startX = (dir>0) ? (-seg*18) : (w + seg*18);
    var y = h*yFrac;
    for(var i=0;i<seg;i++){
      body.push({x:startX - i*18*dir, y:y});
    }
    return {
      dir:dir,
      x:startX,
      y:y,
      t:Math.random()*1000,
      speed:0.75 + Math.random()*0.35,
      body:body,
      quote:"",
      quoteX:0,
      quoteY:0,
      quoteOn:false,
      phase:0
    };
  }

  // Quotes (EN only)
  var QUOTES=[
    "Say less, do more.",
    "The river flows; time passes.",
    "Correct mistakes; virtue is great.",
    "A moment's success, a thousand-year regret."
  ];
  function nextQuote(){
    return QUOTES[(Math.random()*QUOTES.length)|0];
  }

  var dragonTop, dragonBot;

  function resetDragon(d, yFrac){
    var w=stage.clientWidth, h=stage.clientHeight;
    d.t = Math.random()*1000;
    d.speed = 0.75 + Math.random()*0.35;
    d.y = h*yFrac;
    d.x = (d.dir>0) ? (-900) : (w+900);
    for(var i=0;i<d.body.length;i++){
      d.body[i].x = d.x - i*18*d.dir;
      d.body[i].y = d.y;
    }
    d.quote = nextQuote();
    d.quoteOn = true;
  }

  // Draw dragon with head + segmented body + scales + belly tint
  function drawDragon(ctx, d){
    var w=stage.clientWidth, h=stage.clientHeight;
    d.t += 0.012 * d.speed;

    // Head target movement: smooth “slither” (no violent wiggle)
    d.x += d.speed * d.dir * 1.55;

    // gentle vertical glide tied to long wave (not jitter)
    var glide = Math.sin(d.t*0.9)*10 + Math.sin(d.t*0.35)*6;
    var yHead = d.y + glide;

    // shift body segments toward previous segment (constraint)
    d.body[0].x = d.x;
    d.body[0].y = yHead;

    for(var i=1;i<d.body.length;i++){
      var px=d.body[i-1].x, py=d.body[i-1].y;
      var cx=d.body[i].x,  cy=d.body[i].y;
      var dx=px-cx, dy=py-cy;
      var dist=Math.sqrt(dx*dx+dy*dy)||1;
      var target=18;
      var k=(dist-target)/dist;
      d.body[i].x += dx*k;
      d.body[i].y += dy*k;
    }

    // Colors (onyx-green body + subtle red belly)
    var bodyFill="rgba(10,28,18,0.92)";     // dark green-black
    var bellyFill="rgba(120,0,22,0.16)";    // subtle red belly glow
    var scaleStroke="rgba(212,175,55,0.55)";

    // body
    for(var i=d.body.length-1;i>=0;i--){
      var p=d.body[i];
      var size = 22 - i*0.22;  // thicker overall
      if(size<6) size=6;

      // body segment
      ctx.fillStyle=bodyFill;
      ctx.strokeStyle=scaleStroke;
      ctx.lineWidth=1;

      // slight ellipse for segmentation
      ctx.beginPath();
      ctx.ellipse(p.x, p.y, size*0.90, size*0.70, 0, 0, Math.PI*2);
      ctx.fill();

      // belly hint (lower half)
      ctx.fillStyle=bellyFill;
      ctx.beginPath();
      ctx.ellipse(p.x, p.y+size*0.22, size*0.70, size*0.40, 0, 0, Math.PI*2);
      ctx.fill();

      // scale marks (short arcs)
      ctx.globalAlpha=0.55;
      ctx.beginPath();
      ctx.arc(p.x, p.y, size*0.55, Math.PI*0.15, Math.PI*0.85);
      ctx.stroke();
      ctx.globalAlpha=1;

      // small dorsal spikes (triangle hints) every few segments
      if(i%6===0 && i>4){
        ctx.fillStyle="rgba(212,175,55,0.18)";
        ctx.beginPath();
        ctx.moveTo(p.x, p.y - size*0.82);
        ctx.lineTo(p.x - size*0.22, p.y - size*0.30);
        ctx.lineTo(p.x + size*0.22, p.y - size*0.30);
        ctx.closePath();
        ctx.fill();
      }
    }

    // head (more features; not cylinder)
    var h0=d.body[0];
    ctx.save();
    ctx.translate(h0.x, h0.y);

    // head glow rim
    ctx.shadowColor="rgba(212,175,55,0.25)";
    ctx.shadowBlur=16;

    // head shape
    ctx.fillStyle="rgba(8,22,14,0.96)";
    ctx.strokeStyle="rgba(212,175,55,0.70)";
    ctx.lineWidth=1.5;
    ctx.beginPath();
    ctx.ellipse(0,0,26,18,0,0,Math.PI*2);
    ctx.fill(); ctx.stroke();

    // snout
    ctx.shadowBlur=0;
    ctx.fillStyle="rgba(8,22,14,0.96)";
    ctx.beginPath();
    ctx.ellipse(18,2,16,10,0,0,Math.PI*2);
    ctx.fill();
    ctx.strokeStyle="rgba(212,175,55,0.55)";
    ctx.stroke();

    // horns
    ctx.fillStyle="rgba(212,175,55,0.22)";
    ctx.beginPath();
    ctx.moveTo(-10,-14); ctx.lineTo(-22,-30); ctx.lineTo(-4,-18); ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(2,-14); ctx.lineTo(-6,-30); ctx.lineTo(8,-18); ctx.closePath();
    ctx.fill();

    // eye
    ctx.fillStyle="rgba(212,175,55,0.75)";
    ctx.beginPath(); ctx.arc(6,-4,2.6,0,Math.PI*2); ctx.fill();

    // whisker line
    ctx.strokeStyle="rgba(255,255,255,0.18)";
    ctx.lineWidth=1;
    ctx.beginPath();
    ctx.moveTo(18,4); ctx.quadraticCurveTo(34,12,52,8);
    ctx.stroke();

    ctx.restore();

    // Quote banner (follows top dragon only; exits with dragon)
    if(d.quoteOn){
      ctx.save();
      ctx.font="700 14px system-ui, -apple-system, Segoe UI, Roboto, sans-serif";
      ctx.textBaseline="middle";
      ctx.shadowColor="rgba(212,175,55,0.28)";
      ctx.shadowBlur=14;
      ctx.fillStyle="rgba(212,175,55,0.78)";
      var tx = h0.x + (d.dir>0 ? 34 : -34);
      var ty = h0.y - 30;
      var text = d.quote;
      // gentle fade when near edges
      var fade=1;
      if(tx<120) fade=Math.max(0,(tx/120));
      if(tx>w-120) fade=Math.max(0,((w-tx)/120));
      ctx.globalAlpha=fade;
      // small translucent plaque behind text
      var m=ctx.measureText(text);
      var bw=m.width+18;
      var bh=22;
      ctx.fillStyle="rgba(0,0,0,0.20)";
      ctx.strokeStyle="rgba(212,175,55,0.18)";
      ctx.lineWidth=1;
      ctx.beginPath();
      ctx.roundRect(tx-(bw/2), ty-(bh/2), bw, bh, 10);
      ctx.fill(); ctx.stroke();
      ctx.fillStyle="rgba(212,175,55,0.82)";
      ctx.fillText(text, tx-(m.width/2), ty);
      ctx.restore();
    }

    // offscreen reset
    if(d.dir>0 && d.x > w+900) resetDragon(d, (d===dragonTop)?0.28:0.72);
    if(d.dir<0 && d.x < -900)  resetDragon(d, (d===dragonTop)?0.28:0.72);
  }

  // Helpers: roundRect for older browsers
  if(!CanvasRenderingContext2D.prototype.roundRect){
    CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
      r=Math.min(r, w/2, h/2);
      this.beginPath();
      this.moveTo(x+r,y);
      this.arcTo(x+w,y,x+w,y+h,r);
      this.arcTo(x+w,y+h,x,y+h,r);
      this.arcTo(x,y+h,x,y,r);
      this.arcTo(x,y,x+w,y,r);
      this.closePath();
      return this;
    };
  }

  // Draw clouds (behind slab)
  function drawCloudLayer(){
    var w=stage.clientWidth, h=stage.clientHeight;
    xCloud.clearRect(0,0,w,h);

    // moon in sky layer (behind everything)
    drawMoon(xCloud, w, h);

    for(var i=0;i<clouds.length;i++){
      var c=clouds[i];
      c.x += c.s;
      if(c.x > w + c.r) c.x = -c.r;

      xCloud.globalAlpha = c.a;
      xCloud.fillStyle = "rgba(255,255,255,1)";
      // multi-puff cloud
      var puff = 7;
      for(var k=0;k<puff;k++){
        var ox = (k-(puff/2))* (c.r*0.12);
        var oy = Math.sin((k+i)*1.3)* (c.r*0.02);
        var rx = c.r*(0.28 + (k%3)*0.08);
        var ry = c.r*(0.08 + ((k+1)%3)*0.03);
        xCloud.beginPath();
        xCloud.ellipse(c.x+ox, c.y+oy, rx, ry, 0, 0, Math.PI*2);
        xCloud.fill();
      }
    }
    xCloud.globalAlpha=1;
  }

  // Draw lantern/embers + dragons (above slab)
  function drawDragonLayer(){
    var w=stage.clientWidth, h=stage.clientHeight;
    xDrag.clearRect(0,0,w,h);

    // embers
    for(var i=0;i<embers.length;i++){
      var p=embers[i];
      p.y -= p.vy;
      p.x += p.vx;
      if(p.y < -40){ p.y = h + 60; p.x = Math.random()*w; }
      if(p.x < -40) p.x = w+40;
      if(p.x > w+40) p.x = -40;

      xDrag.globalAlpha=p.a;
      xDrag.fillStyle="rgba(255,200,120,0.75)";
      xDrag.beginPath();
      xDrag.arc(p.x, p.y, p.s, 0, Math.PI*2);
      xDrag.fill();
      // tiny glow
      xDrag.globalAlpha=p.a*0.6;
      xDrag.fillStyle="rgba(255,160,90,0.65)";
      xDrag.beginPath();
      xDrag.arc(p.x, p.y, p.s*2.2, 0, Math.PI*2);
      xDrag.fill();
      xDrag.globalAlpha=1;
    }

    // dragons (top: classical/quote; bottom: silent)
    drawDragon(xDrag, dragonTop);
    // bottom dragon: same motion, no banner
    var old=dragonBot.quoteOn;
    dragonBot.quoteOn=false;
    drawDragon(xDrag, dragonBot);
    dragonBot.quoteOn=old;
  }

  function tick(){
    drawCloudLayer();
    drawDragonLayer();
    requestAnimationFrame(tick);
  }

  function resizeFX(){
    fitCanvas(cCloud, xCloud);
    fitCanvas(cDrag,  xDrag);
  }

  // Seed & init
  seedClouds();
  seedEmbers();
  dragonTop = makeDragon(0.28,  1); // left->right
  dragonBot = makeDragon(0.72, -1); // right->left
  resetDragon(dragonTop, 0.28);
  resetDragon(dragonBot, 0.72);

  // Layout
  requestAnimationFrame(function(){
    safeLayout();
    tick();
  });
  window.addEventListener("resize", function(){
    seedClouds();
    seedEmbers();
    safeLayout();
  }, {passive:true});

})();
</script>

</body>
</html>
