<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Compass</title>

<link rel="stylesheet" href="/assets/ui.css"/>

<style>

/* =========================
STAGE
========================= */

.stage{
position:relative;
width:min(1200px,95vw);
height:min(1200px,85vh);
margin:120px auto 0;
pointer-events:none;
}

/* =========================
OBSIDIAN DIAL
========================= */

.dial{
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
width:min(900px,90vw);
height:min(900px,90vw);
border-radius:50%;
pointer-events:none;
overflow:hidden;
z-index:1;
}

/* Obsidian material */

.dial::before{
content:"";
position:absolute;
inset:0;
border-radius:50%;

background:
radial-gradient(circle at 50% 45%,rgba(255,255,255,.05),transparent 60%),
linear-gradient(180deg,#0a0e14,#020305);

box-shadow:
inset 0 0 0 2px rgba(255,255,255,.05),
inset 0 0 0 10px rgba(0,0,0,.20),
inset 0 0 80px rgba(0,0,0,.65),
0 40px 160px rgba(0,0,0,.35);
}

/* =========================
INSTRUMENT GOLD RINGS
========================= */

.dial::after{
content:"";
position:absolute;
inset:0;
border-radius:50%;

background:

radial-gradient(circle at 50% 50%,transparent 0 30%,rgba(212,175,55,.18) 30.3% 31%,transparent 31.2%),
radial-gradient(circle at 50% 50%,transparent 0 48%,rgba(212,175,55,.16) 48.2% 48.8%,transparent 49%),
radial-gradient(circle at 50% 50%,transparent 0 66%,rgba(212,175,55,.12) 66.2% 66.8%,transparent 67%),

linear-gradient(90deg,transparent 0 49.7%,rgba(212,175,55,.22) 49.7% 50.3%,transparent 50.3%),
linear-gradient(0deg,transparent 0 49.7%,rgba(212,175,55,.22) 49.7% 50.3%,transparent 50.3%);

opacity:.8;
}

/* =========================
DIAMOND NODES
========================= */

.node{
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%) rotate(45deg);
border-radius:22px;
pointer-events:auto;
cursor:pointer;
overflow:hidden;

background:
radial-gradient(circle at 25% 20%,rgba(255,255,255,.20),transparent 45%),
linear-gradient(145deg,#111827,#020305);

border:1px solid rgba(255,255,255,.16);

box-shadow:
0 25px 80px rgba(0,0,0,.8),
inset 0 2px 0 rgba(255,255,255,.15),
inset 0 -60px 120px rgba(0,0,0,.9);
}

/* diamond sizes */

.core{width:200px;height:200px;z-index:10}
.l1{width:150px;height:150px}
.l2{width:110px;height:110px}
.l3{width:80px;height:80px}

/* =========================
INNER TEXT
========================= */

.inner{
transform:rotate(-45deg);
display:flex;
align-items:center;
justify-content:center;
height:100%;
width:100%;
font-weight:900;
letter-spacing:.6px;
font-size:14px;
color:white;
}

/* =========================
GLOW
========================= */

.node:hover{
box-shadow:
0 30px 90px rgba(0,0,0,.9),
0 0 20px rgba(212,175,55,.35),
inset 0 2px 0 rgba(255,255,255,.15),
inset 0 -60px 120px rgba(0,0,0,.9);
}

</style>
</head>

<body>

<div class="stage" id="stage">

<div class="dial"></div>

</div>

<script>

/* =========================
COMPASS ENGINE
========================= */

const stage=document.getElementById("stage");

const nodes=[
{tier:"core",label:"CORE"},
{tier:"l1",label:"N"},
{tier:"l1",label:"E"},
{tier:"l1",label:"S"},
{tier:"l1",label:"W"},
{tier:"l2",label:"NE"},
{tier:"l2",label:"SE"},
{tier:"l2",label:"SW"},
{tier:"l2",label:"NW"},
{tier:"l3",label:"NNE"},
{tier:"l3",label:"ENE"},
{tier:"l3",label:"ESE"},
{tier:"l3",label:"SSE"},
{tier:"l3",label:"SSW"},
{tier:"l3",label:"WSW"},
{tier:"l3",label:"WNW"},
{tier:"l3",label:"NNW"}
];

function createNode(n){
let d=document.createElement("div");
d.className="node "+n.tier;

let inner=document.createElement("div");
inner.className="inner";
inner.textContent=n.label;

d.appendChild(inner);

stage.appendChild(d);
}

nodes.forEach(createNode);

</script>

</body>
</html>
