<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Products · Gateway</title>

<link rel="stylesheet" href="/assets/ui.css"/>

<style>
/* =========================
   CORE LAYOUT
========================= */
body{
  margin:0;
  overflow:hidden;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  color:#fff;
}

/* =========================
   ENVIRONMENT (WATERFALL DEPTH)
========================= */
.env{
  position:fixed;
  inset:0;
  overflow:hidden;
  z-index:0;
}

.waterfall{
  position:absolute;
  width:120%;
  height:140%;
  left:-10%;
  top:-20%;
  background:
    linear-gradient(to bottom,
      rgba(255,255,255,0.05),
      rgba(255,255,255,0.02),
      transparent 40%),
    radial-gradient(circle at 50% 20%, rgba(255,255,255,.08), transparent 60%);
  animation:flow 12s linear infinite;
  filter:blur(2px);
}

@keyframes flow{
  from{transform:translateY(-5%)}
  to{transform:translateY(5%)}
}

.mist{
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at 50% 60%, rgba(255,255,255,.08), transparent 70%);
  animation:mist 6s ease-in-out infinite alternate;
}

@keyframes mist{
  from{opacity:.4}
  to{opacity:.7}
}

/* =========================
   HERO
========================= */
.hero{
  position:absolute;
  top:18%;
  width:100%;
  text-align:center;
  z-index:2;
}

.hero h1{
  font-size:42px;
  font-weight:900;
  letter-spacing:1px;
  margin:0;
}

.hero p{
  margin-top:10px;
  opacity:.85;
  font-size:16px;
}

/* =========================
   DIAMOND CORE
========================= */
.center{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  display:flex;
  gap:80px;
  z-index:2;
}

/* diamond wrapper */
.diamond{
  position:relative;
  width:180px;
  height:180px;
}

/* rotating shell */
.shell{
  position:absolute;
  inset:0;
  border:2px solid rgba(255,255,255,.3);
  transform:rotate(45deg);
  animation:spinCW 12s linear infinite;
}

.shell.future{
  animation:spinCCW 14s linear infinite;
}

@keyframes spinCW{
  from{transform:rotate(45deg)}
  to{transform:rotate(405deg)}
}

@keyframes spinCCW{
  from{transform:rotate(45deg)}
  to{transform:rotate(-315deg)}
}

/* nested shells */
.shell::after{
  content:"";
  position:absolute;
  inset:20%;
  border:1px solid rgba(201,162,74,.5);
}

/* label (stable) */
.label{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:900;
  letter-spacing:2px;
  pointer-events:none;
}

/* clickable hit area */
.hit{
  position:absolute;
  inset:0;
  cursor:pointer;
}

/* =========================
   PRODUCT FIELD
========================= */
.field{
  position:absolute;
  inset:0;
  display:none;
  z-index:2;
}

.node{
  position:absolute;
  width:120px;
  height:120px;
}

.node .shell{
  border-color:rgba(255,255,255,.25);
  animation-duration:18s;
}

.node .label{
  font-size:12px;
  text-align:center;
}

/* floating motion */
.node{
  animation:float 8s ease-in-out infinite alternate;
}

@keyframes float{
  from{transform:translateY(-10px)}
  to{transform:translateY(10px)}
}

/* =========================
   NAV
========================= */
.nav{
  position:fixed;
  left:16px;
  top:16px;
  z-index:5;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.nav a{
  padding:10px 14px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,.15);
  background:rgba(0,0,0,.4);
  text-decoration:none;
  color:#fff;
  font-weight:800;
}

/* =========================
   MOBILE SAFETY
========================= */
@media(max-width:700px){
  .center{gap:40px}
  .diamond{width:140px;height:140px}
}
</style>
</head>

<body>

<div class="env">
  <div class="waterfall"></div>
  <div class="mist"></div>
</div>

<div class="nav">
  <a href="/index.html">COMPASS</a>
  <a href="/products/">PRODUCTS</a>
  <a href="/explore/">EXPLORE</a>
  <a href="/gauges/">GAUGES</a>
</div>

<div class="hero">
  <h1>PRODUCTS</h1>
  <p>Choose your path. What exists now, or what is being built next.</p>
</div>

<div class="center" id="gate">

  <!-- NOW -->
  <div class="diamond">
    <div class="shell"></div>
    <div class="label">NOW</div>
    <div class="hit" onclick="enterNow()"></div>
  </div>

  <!-- FUTURE -->
  <div class="diamond">
    <div class="shell future"></div>
    <div class="label">FUTURE</div>
    <div class="hit" onclick="enterFuture()"></div>
  </div>

</div>

<!-- PRODUCT FIELD -->
<div class="field" id="field">

  <div class="node" style="top:30%;left:30%" onclick="go('/products/on-your-side-ai/')">
    <div class="shell"></div>
    <div class="label">SIDE</div>
  </div>

  <div class="node" style="top:60%;left:60%" onclick="go('/products/education/')">
    <div class="shell"></div>
    <div class="label">EDUCATION</div>
  </div>

  <div class="node" style="top:40%;left:70%" onclick="go('/products/energy/')">
    <div class="shell"></div>
    <div class="label">ENERGY</div>
  </div>

  <div class="node" style="top:70%;left:40%" onclick="go('/products/governance/')">
    <div class="shell"></div>
    <div class="label">GOVERNANCE</div>
  </div>

</div>

<script>
function enterNow(){
  document.getElementById("gate").style.display="none";
  document.getElementById("field").style.display="block";
}

function enterFuture(){
  window.location.href="/explore/";
}

function go(path){
  window.location.href=path;
}
</script>

</body>
</html>
