<!DOCTYPE html>
<!-- TNT — /index.html
     COMPASS · 2-LAYER (5 + 12) · ENGLISH ONLY (VISUAL PASS)
     FIX:
       - HARD CACHE BUST on engines (bg-engine + dragon)
       - PURGE duplicate bg canvas before boot (prevents “double moon/spin”)
-->

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Compass · DiamondGateBridge</title>

<link rel="stylesheet" href="/assets/ui.css"/>
<link rel="stylesheet" href="/assets/branch.css"/>

<script>
// PRE-BOOT PURGE: if an older bg canvas already exists (dup scripts / cache), remove it.
(function(){
  try{
    var old = document.getElementById("gd_bg_canvas");
    if(old && old.parentNode) old.parentNode.removeChild(old);
  }catch(e){}
})();
</script>

<script defer src="/assets/instruments.js?v=20260304a"></script>
<script defer src="/assets/bg-engine.js?v=20260304a"></script>
<script defer src="/assets/dragon-anatomy.js?v=20260304a"></script>

<style>
body{margin:0}

/* ===== STAGE ===== */
.stage{
  position:relative;
  width:min(1200px,94vw);
  height:min(1100px,86vh);
  margin:90px auto 0;
  pointer-events:none;
}

/* ===== COMPASS DIAL ===== */
.dial{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  width:min(900px,90vw);
  height:min(900px,90vw);
  border-radius:999px;
  z-index:2;
  background:
    radial-gradient(circle at 50% 40%,rgba(255,255,255,.05),rgba(0,0,0,.45) 80%);
  box-shadow:
    0 40px 160px rgba(0,0,0,.75),
    inset 0 0 60px rgba(0,0,0,.65);
}

/* ===== GEMS ===== */
.node{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%) rotate(45deg);
  border-radius:22px;
  border:1px solid rgba(255,255,255,.18);
  background:linear-gradient(160deg,#0b0f16,#050608);
  box-shadow:0 40px 120px rgba(0,0,0,.85);
  cursor:pointer;
  pointer-events:auto;
}

.core{width:200px;height:200px;border-radius:26px}
.l1{width:150px;height:150px;border-radius:22px}
.l2{width:110px;height:110px;border-radius:20px}
.l3{width:92px;height:92px;border-radius:18px}

.inner{
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  transform:rotate(-45deg);
  color:white;
  font-weight:900;
  letter-spacing:.6px;
  font-size:14px;
  text-align:center;
}

/* ===== TOP BAR ===== */
.topbar{
  position:fixed;
  top:12px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:12px;
  padding:8px 14px;
  background:#050608;
  border:1px solid rgba(255,255,255,.15);
  border-radius:14px;
  z-index:300;
}
.topbar button{
  background:none;
  border:none;
  color:white;
  font-weight:800;
  cursor:pointer;
}

/* ===== CORNERS ===== */
.corner{
  position:fixed;
  bottom:20px;
  z-index:300;
}
.corner.left{left:20px}
.corner.right{right:20px}
.corner button{
  background:#050608;
  color:white;
  border:1px solid rgba(255,255,255,.15);
  padding:10px 14px;
  border-radius:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="topbar">
  <button id="layer1">LAYER 1</button>
  <button id="layer2">LAYER 2</button>
</div>

<div class="stage" id="stage">
  <div class="dial"></div>
</div>

<div class="corner left">
  <button id="btnExit">EXIT</button>
</div>

<div class="corner right">
  <button id="btnHub">HUB</button>
</div>

<script>
(function(){
"use strict";

const stage=document.getElementById("stage");

const LAYER1=[
  {label:"CORE",cls:"core",x:0,y:0,href:"/index-core/index.html"},
  {label:"LAWS",cls:"l1",x:0,y:-200,href:"/laws/"},
  {label:"ENERGY",cls:"l1",x:200,y:0,href:"/explore/frontier/energy/"},
  {label:"FINANCE",cls:"l1",x:0,y:200,href:"/finance/"},
  {label:"GOVERNANCE",cls:"l1",x:-200,y:0,href:"/governance/"}
];

const LAYER2=[
  {label:"CORE",cls:"core",x:0,y:0,href:"/index-spine/index.html"},

  {label:"PRODUCTS",cls:"l2",x:0,y:-280,href:"/products/"},
  {label:"FRONTIER",cls:"l3",x:150,y:-240,href:"/explore/frontier/"},
  {label:"INFRA",cls:"l3",x:280,y:-120,href:"/explore/infrastructure/"},
  {label:"RESEARCH",cls:"l2",x:280,y:0,href:"/research/"},
  {label:"EXPLORE",cls:"l2",x:280,y:120,href:"/explore/"},
  {label:"AGRICULTURE",cls:"l3",x:150,y:240,href:"/products/agriculture/"},
  {label:"GAUGES",cls:"l2",x:0,y:280,href:"/gauges/"},
  {label:"DOCTRINE",cls:"l3",x:-150,y:240,href:"/products/capital-doctrine/"},
  {label:"LATTICE",cls:"l3",x:-280,y:120,href:"/explore/frontier/lattice/"},
  {label:"SHIMMER",cls:"l3",x:-280,y:0,href:"/explore/frontier/shimmer/"},
  {label:"VISION",cls:"l3",x:-280,y:-120,href:"/explore/frontier/vision/"},
  {label:"EDUCATION",cls:"l3",x:-150,y:-240,href:"/products/education/"}
];

function clearNodes(){
  document.querySelectorAll(".node").forEach(n=>n.remove());
}

function addNode(n){
  const d=document.createElement("div");
  d.className="node "+n.cls;
  d.style.left=`calc(50% + ${n.x}px)`;
  d.style.top=`calc(50% + ${n.y}px)`;

  const inner=document.createElement("div");
  inner.className="inner";
  inner.textContent=n.label;

  d.appendChild(inner);
  d.addEventListener("click", ()=>{ location.href=n.href; }, {passive:true});

  stage.appendChild(d);
}

function render(layer){
  clearNodes();
  layer.forEach(addNode);
}

document.getElementById("layer1").addEventListener("click", ()=>render(LAYER1), {passive:true});
document.getElementById("layer2").addEventListener("click", ()=>render(LAYER2), {passive:true});

document.getElementById("btnExit").addEventListener("click", ()=>location.href="/door/", {passive:true});
document.getElementById("btnHub").addEventListener("click", ()=>location.href="/home/", {passive:true});

render(LAYER1);

})();
</script>

</body>
</html>
