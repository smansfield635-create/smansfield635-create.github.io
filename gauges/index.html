<!doctype html>
<!-- TNT — /gauges/index.html
     PUBLIC GAUGE DASHBOARD
     PURPOSE:
       - Human-readable health overview
       - Uses existing telemetry storage
       - No Cloudflare changes required
-->

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>System Health Dashboard</title>

<link rel="stylesheet" href="/assets/ui.css"/>
<link rel="stylesheet" href="/assets/branch.css"/>

<style>
body{margin:0;font-family:system-ui,-apple-system,sans-serif;color:#fff}
.page{max-width:980px;margin:100px auto 120px;padding:0 20px}
h1{font-size:34px;margin-bottom:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:20px}
.card{
  border:1px solid rgba(255,255,255,.15);
  border-radius:20px;
  padding:20px;
  background:rgba(0,0,0,.25);
}
.big{font-size:42px;font-weight:800}
.label{opacity:.7;margin-top:6px}
.good{color:#00ff88}
.mid{color:#ffcc00}
.bad{color:#ff4444}
.footer{
  margin-top:40px;
  text-align:center;
}
.btn{
  display:inline-block;
  padding:12px 20px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.2);
  text-decoration:none;
}
</style>
</head>

<body>
<div class="page">

<h1>System Health</h1>

<div class="grid">

<div class="card">
<div class="big" id="healthScore">--</div>
<div class="label">Overall Health</div>
</div>

<div class="card">
<div class="big" id="visitorCount">--</div>
<div class="label">Visitors (24h)</div>
</div>

<div class="card">
<div class="big" id="engagementScore">--</div>
<div class="label">Engagement</div>
</div>

<div class="card">
<div class="big" id="stabilityScore">--</div>
<div class="label">Stability</div>
</div>

</div>

<div class="footer">
<a class="btn" href="/gauges/live/">Open Engineer Console</a>
</div>

</div>

<script>
// Pull existing telemetry from localStorage
function getTelemetry(){
  try{
    return JSON.parse(localStorage.getItem("telemetry_log") || "[]");
  }catch(e){ return []; }
}

function calculate(){
  const data = getTelemetry();
  const now = Date.now();
  const day = 24*60*60*1000;

  const recent = data.filter(d => now - d.timestamp < day);
  const sessions = new Set(recent.map(d => d.session_id));
  const visitors = sessions.size;

  const engagement = Math.min(100, recent.length * 5);
  const stability = Math.max(0, 100 - (recent.filter(d => d.event==="error").length * 20));

  const health = Math.round((engagement + stability)/2);

  document.getElementById("visitorCount").textContent = visitors;
  document.getElementById("engagementScore").textContent = engagement;
  document.getElementById("stabilityScore").textContent = stability;
  document.getElementById("healthScore").textContent = health;

  colorize("healthScore", health);
  colorize("engagementScore", engagement);
  colorize("stabilityScore", stability);
}

function colorize(id,val){
  const el=document.getElementById(id);
  el.classList.remove("good","mid","bad");
  if(val>70) el.classList.add("good");
  else if(val>40) el.classList.add("mid");
  else el.classList.add("bad");
}

calculate();
</script>

</body>
</html>
