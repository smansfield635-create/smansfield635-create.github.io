<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="Diamond Gate Bridge procedural sun asset">
  <defs>
    <radialGradient id="sunDisc" cx="48%" cy="44%" r="58%">
      <stop offset="0%" stop-color="#fffff0"/>
      <stop offset="14%" stop-color="#fff2a8"/>
      <stop offset="38%" stop-color="#ffb33f"/>
      <stop offset="64%" stop-color="#e85f18"/>
      <stop offset="100%" stop-color="#3b0d04"/>
    </radialGradient>

    <radialGradient id="limbShade" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(0,0,0,0)"/>
      <stop offset="64%" stop-color="rgba(0,0,0,0)"/>
      <stop offset="100%" stop-color="rgba(15,4,1,0.72)"/>
    </radialGradient>

    <filter id="solarTexture" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="5" seed="42" result="noise"/>
      <feColorMatrix
        in="noise"
        type="matrix"
        values="
          1.6 0   0   0 0
          0   0.8 0   0 0
          0   0   0.25 0 0
          0   0   0   0.42 0"
        result="coloredNoise"
      />
      <feBlend in="SourceGraphic" in2="coloredNoise" mode="overlay"/>
    </filter>

    <filter id="softCorona" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>

    <clipPath id="discClip">
      <circle cx="512" cy="512" r="310"/>
    </clipPath>
  </defs>

  <rect width="1024" height="1024" fill="none"/>

  <g opacity="0.74" filter="url(#softCorona)">
    <circle cx="512" cy="512" r="430" fill="none" stroke="#ffb340" stroke-width="24" stroke-opacity="0.22"/>
    <circle cx="512" cy="512" r="386" fill="none" stroke="#fff0a8" stroke-width="10" stroke-opacity="0.24"/>
    <path d="M512 70 C558 204 626 220 760 154 C678 286 714 360 886 410 C716 430 678 502 792 650 C636 554 560 594 512 776 C464 594 388 554 232 650 C346 502 308 430 138 410 C310 360 346 286 264 154 C398 220 466 204 512 70Z" fill="#ff9a2f" opacity="0.18"/>
  </g>

  <circle cx="512" cy="512" r="310" fill="url(#sunDisc)" filter="url(#solarTexture)"/>

  <g clip-path="url(#discClip)" opacity="0.58">
    <path d="M214 468 C320 390 408 482 518 410 C622 342 742 384 824 328" fill="none" stroke="#fff2a3" stroke-width="18" stroke-linecap="round" opacity="0.32"/>
    <path d="M170 590 C298 528 398 638 512 558 C630 474 738 584 860 506" fill="none" stroke="#7a1f08" stroke-width="28" stroke-linecap="round" opacity="0.28"/>
    <path d="M234 312 C352 362 430 292 548 322 C650 348 722 312 814 252" fill="none" stroke="#ffd66a" stroke-width="13" stroke-linecap="round" opacity="0.36"/>
    <path d="M224 748 C374 688 462 778 590 698 C690 636 766 690 850 652" fill="none" stroke="#ff8a24" stroke-width="20" stroke-linecap="round" opacity="0.34"/>

    <circle cx="346" cy="356" r="31" fill="#fff8cf" opacity="0.32"/>
    <circle cx="614" cy="408" r="24" fill="#fff8cf" opacity="0.28"/>
    <circle cx="430" cy="666" r="42" fill="#8d2508" opacity="0.22"/>
    <circle cx="718" cy="620" r="36" fill="#fff0a4" opacity="0.22"/>
    <circle cx="270" cy="548" r="26" fill="#7b1e06" opacity="0.24"/>
  </g>

  <circle cx="512" cy="512" r="310" fill="url(#limbShade)"/>
  <circle cx="512" cy="512" r="310" fill="none" stroke="#fff2c5" stroke-width="2" stroke-opacity="0.26"/>
</svg>
