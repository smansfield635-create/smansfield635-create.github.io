<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Compass</title>

<link rel="stylesheet" href="/assets/ui.css"/>
<link rel="stylesheet" href="/assets/branch.css"/>
<script defer src="/assets/instruments.js"></script>

<style>
a{color:inherit;text-decoration:none}
body::before,body::after{pointer-events:none!important}

:root{
  --radius:170px;
  --D:160px;
  --Dminor:150px;

  --onyx0:rgba(6,8,10,.96);
  --onyx1:rgba(10,12,16,.88);

  --crimson:rgba(120,0,22,.42);
  --festival:rgba(255,43,43,.22);
  --opalV:rgba(90,40,120,.16);

  --gold:rgba(201,162,74,.50);
  --goldGlow:rgba(201,162,74,.30);

  --shadowDeep:0 44px 140px rgba(0,0,0,.82);
}

.stage{
  position:relative;
  width:min(760px,94vw);
  height:min(760px,82vh);
  margin:120px auto 0;
  pointer-events:none;
}

.d{
  position:absolute;
  left:50%;
  top:50%;
  width:var(--D);
  height:var(--D);
  border-radius:28px;
  cursor:pointer;
  pointer-events:auto;
  overflow:hidden;
  transform-origin:center;
  transition:transform .2s ease;
}

/* Radial placement */
.dExplore  { transform:translate(-50%,-50%) rotate(45deg) translateY(calc(-1 * var(--radius))); }
.dResearch { transform:translate(-50%,-50%) rotate(45deg) translate(calc(var(--radius) * .7), calc(-1 * var(--radius) * .7)); }
.dProducts { transform:translate(-50%,-50%) rotate(45deg) translateX(var(--radius)); }
.dLaws     { transform:translate(-50%,-50%) rotate(45deg) translateY(var(--radius)); }
.dGauges   { transform:translate(-50%,-50%) rotate(45deg) translate(calc(-1 * var(--radius)), 0); }
.dEducation{ transform:translate(-50%,-50%) rotate(45deg) translate(calc(-1 * var(--radius) * .7), calc(-1 * var(--radius) * .7)); }

.surface{
  background:
    radial-gradient(circle at 22% 18%, rgba(255,255,255,.22), transparent 46%),
    radial-gradient(circle at 75% 22%, var(--festival), transparent 62%),
    radial-gradient(circle at 78% 82%, var(--opalV), transparent 66%),
    radial-gradient(circle at 28% 80%, var(--crimson), transparent 74%),
    linear-gradient(160deg, var(--onyx1), var(--onyx0));

  border:1px solid rgba(255,255,255,.16);
  box-shadow:var(--shadowDeep);
}

.goldTrim{
  border:1px solid var(--gold);
  box-shadow:var(--shadowDeep), 0 0 30px var(--goldGlow);
}

.inner{
  width:100%;
  height:100%;
  transform:rotate(-45deg);
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:980;
  font-size:18px;
  letter-spacing:.6px;
  text-align:center;
  color:#fff;
}

</style>
</head>

<body>

<div class="stage">

  <div class="d surface dExplore" id="dExplore"><div class="inner">EXPLORE</div></div>
  <div class="d surface goldTrim dResearch" id="dResearch"><div class="inner">RESEARCH</div></div>
  <div class="d surface dProducts" id="dProducts"><div class="inner">PRODUCTS</div></div>
  <div class="d surface dLaws" id="dLaws"><div class="inner">LAWS</div></div>
  <div class="d surface dGauges" id="dGauges"><div class="inner">GAUGES</div></div>
  <div class="d surface dEducation" id="dEducation"><div class="inner">EDUCATION</div></div>

</div>

<script>
(function(){
  function go(p){
    var qs=window.location.search||"";
    window.location.href=p+qs;
  }
  dExplore.onclick=()=>go("/explore/");
  dResearch.onclick=()=>go("/research/");
  dProducts.onclick=()=>go("/products/");
  dLaws.onclick=()=>go("/laws/");
  dGauges.onclick=()=>go("/gauges/");
  dEducation.onclick=()=>go("/products/education/");
})();
</script>

</body>
</html>
