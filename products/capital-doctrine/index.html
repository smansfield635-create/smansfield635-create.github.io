<style>
a{color:inherit;text-decoration:none}
body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:#fff}
body::before,body::after{pointer-events:none!important}

:root{
  --dockH:120px;
  --stroke:rgba(255,255,255,.12);
  --stroke2:rgba(255,255,255,.10);

  --ink:rgba(255,255,255,.95);
  --mut:rgba(255,255,255,.82);
  --mut2:rgba(255,255,255,.72);

  --crimson:rgba(120,0,22,.30);
  --festival:rgba(255,43,43,.14);
  --opalV:rgba(90,40,120,.10);
  --goldSoft:rgba(201,162,74,.18);

  --shadowA:0 28px 100px rgba(0,0,0,.65);
  --shadowB:0 18px 60px rgba(0,0,0,.55);
}

/* Top controls */
.top{
  position:fixed;top:16px;left:0;right:0;
  padding:0 16px;
  display:flex;justify-content:space-between;align-items:center;
  gap:12px;z-index:240;pointer-events:none;
}
.top .left,.top .right{
  display:flex;gap:10px;align-items:center;flex-wrap:wrap;white-space:nowrap;
  pointer-events:auto;
}

/* Button (gold under-light only) */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:10px 12px;min-height:44px;border-radius:16px;
  border:1px solid rgba(255,255,255,.14);
  background:
    radial-gradient(circle at 50% 120%, rgba(201,162,74,.16), transparent 64%),
    linear-gradient(145deg, rgba(10,12,16,.78), rgba(6,8,10,.90));
  color:var(--ink);
  font-weight:950;font-size:14px;letter-spacing:.2px;
  -webkit-tap-highlight-color:transparent;
  position:relative;overflow:hidden;
  touch-action:manipulation;
  box-shadow:var(--shadowB);
  white-space:nowrap;
}
.btn:active{transform:translateY(1px)}
.btn::after{
  content:"";
  position:absolute;left:10px;right:10px;bottom:-12px;height:28px;
  background: radial-gradient(circle at 50% 0%, rgba(201,162,74,.34), transparent 72%);
  opacity:.60;pointer-events:none;
}
.btn.red{border-color:rgba(255,43,43,.22); box-shadow:var(--shadowB), 0 0 18px rgba(255,43,43,.12);}

/* Segmented controls */
.seg{
  display:inline-flex;gap:0;overflow:hidden;border-radius:16px;
  border:1px solid rgba(255,255,255,.12);
  background: rgba(0,0,0,.16);
  box-shadow: var(--shadowB);
}
.seg button{
  appearance:none;border:0;background:transparent;color:var(--mut);
  padding:10px 12px;min-height:44px;font-weight:950;font-size:13px;
  letter-spacing:.25px;cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
.seg button[aria-pressed="true"]{
  color:var(--ink);
  background:
    radial-gradient(circle at 50% 120%, rgba(201,162,74,.22), transparent 62%),
    linear-gradient(180deg, rgba(255,43,43,.10), rgba(0,0,0,.10));
  box-shadow: inset 0 -10px 22px rgba(201,162,74,.16);
}

/* Page */
.page{
  width:min(1100px,94vw);
  margin:0 auto;
  padding:110px 0 calc(var(--dockH) + 24px);
  display:flex;
  flex-direction:column;
  gap:14px;
  position:relative;
  z-index:10;
}

/* Header */
.header{
  border:1px solid var(--stroke);
  border-radius:26px;
  padding:24px;
  background:
    radial-gradient(circle at 18% 22%, var(--crimson), transparent 72%),
    radial-gradient(circle at 82% 34%, var(--opalV), transparent 74%),
    radial-gradient(circle at 70% 92%, var(--festival), transparent 62%),
    radial-gradient(circle at 26% 22%, rgba(201,162,74,.12), transparent 62%),
    linear-gradient(160deg, rgba(0,0,0,.22), rgba(0,0,0,.12));
  box-shadow:var(--shadowA);
  position:relative;
  overflow:hidden;
}
.header::before{
  content:"";
  position:absolute;inset:0;border-radius:26px;pointer-events:none;
  box-shadow: inset 0 0 0 1px rgba(201,162,74,.14);
  background:
    repeating-linear-gradient(45deg, rgba(201,162,74,.08) 0 1px, transparent 1px 16px),
    repeating-linear-gradient(-45deg, rgba(201,162,74,.06) 0 1px, transparent 1px 16px);
  opacity:.22;
  mask:
    radial-gradient(circle at 50% 50%, transparent 0 78%, #000 82% 100%),
    linear-gradient(#000,#000);
  -webkit-mask:
    radial-gradient(circle at 50% 50%, transparent 0 78%, #000 82% 100%),
    linear-gradient(#000,#000);
}

.k{margin:0 0 8px;font-size:11px;letter-spacing:4px;text-transform:uppercase;opacity:.78;color:var(--mut);position:relative}
.h1{margin:0;font-weight:980;font-size:34px;letter-spacing:.55px;color:var(--ink);position:relative}
.sub{
  margin-top:14px;
  font-size:16.5px;
  line-height:1.75;
  color:rgba(255,255,255,.88);
  position:relative;
}
.note{
  margin-top:12px;
  font-size:13.25px;
  line-height:1.55;
  color:rgba(255,255,255,.74);
  position:relative;
}

}
.badge{

  background:rgba(0,0,0,.16);
  color:rgba(255,255,255,.78);
  font-weight:950;
  box-shadow:0 14px 36px rgba(0,0,0,.55);

/* Band */
.band{
  padding:10px 12px;border-radius:18px;
  border:1px solid var(--stroke2);
  background:rgba(0,0,0,.14);
  font-weight:980;letter-spacing:.25px;
  color:rgba(255,255,255,.90);
}

/* Accordion */
.stack{display:flex;flex-direction:column;gap:12px}
.card{
  border:1px solid rgba(255,255,255,.10);
  border-radius:22px;
  background:

  position:relative;

.ti{margin:0;font-weight:980;letter-spacing:.2px;font-size:17.5px;color:var(--ink)}
.si{margin-top:8px;font-size:13.75px;line-height:1.45;color:rgba(255,255,255,.84);opacity:.92}
.chev{

  background:rgba(0,0,0,.16);
  display:flex;align-items:center;justify-content:center;
  color:rgba(255,255,255,.78);

  position:relative;overflow:hidden;

.chev::after{
  content:"";

  background: radial-gradient(circle at 50% 0%, rgba(201,162,74,.30), transparent 70%);
  opacity:.62;pointer-events:none;
}
.body{
  display:none;
  padding:16px 16px 18px;
  border-top:1px solid rgba(255,255,255,.08);
  background:
    radial-gradient(circle at 30% 30%, rgba(255,255,255,.06), transparent 55%),

.card.open .body{display:block}

.body p{margin:0;color:rgba(255,255,255,.88);line-height:1.75;font-size:14.75px}
.body p + p{margin-top:12px}
.ul{margin:12px 0 0 18px;padding:0;color:rgba(255,255,255,.84);line-height:1.65;font-size:14px}
.ul li{margin:7px 0}

/* Sub-bubbles */
.subBubbles{margin-top:12px;display:flex;flex-direction:column;gap:10px}
.bubble{
  border:1px solid rgba(255,255,255,.10);
  border-radius:18px;
  background:
    radial-gradient(circle at 22% 18%, rgba(255,43,43,.08), transparent 60%),
    radial-gradient(circle at 82% 70%, rgba(201,162,74,.08), transparent 62%),
    rgba(0,0,0,.12);
  padding:14px 14px 12px;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
  position:relative;
  overflow:hidden;
}
.bubble::after{
  content:"";
  position:absolute;left:10px;right:10px;bottom:-14px;height:30px;
  background: radial-gradient(circle at 50% 0%, rgba(201,162,74,.22), transparent 72%);
  opacity:.50;pointer-events:none;
}
.bubble h4{
  margin:0 0 8px;
  font-weight:980;
  letter-spacing:.15px;
  font-size:15px;
  color:var(--ink);
}
.bubble p{
  margin:0;
  color:rgba(255,255,255,.80);
  line-height:1.7;
  display:none;
  font-size:14.5px;
}
.bubble.open p{display:block}

.actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end;margin-top:14px}

/* Dock */
.dock{
  position:fixed;left:50%;
  bottom:max(12px, env(safe-area-inset-bottom));
  transform:translateX(-50%);
  width:min(980px,94vw);
  padding:12px;border-radius:22px;
  border:1px solid var(--stroke);
  background:rgba(0,0,0,.22);
  backdrop-filter:blur(10px);
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  z-index:220;
}
.dock .btn{width:100%;text-align:center;border-radius:999px;padding:10px}
@media (max-width:520px){
  :root{--dockH:140px}
  .dock{grid-template-columns:repeat(3,1fr)}
  .h1{font-size:30px}
}
</style>

      if(!route) continue;

          var u=new URL(route, location.origin);

          sp.set("style","informal");

          el.setAttribute("href", route);
        }
      }else{
        el.setAttribute("href", route + q());
      }

  // ===== Accordion state (preserve open card on lang/lane changes) =====
  var stack=document.getElementById("stack");
  var cardRefs=[]; // {card,chev,title,subtitle,paras[], bubbles[] {h,p}, actions[]}
  var openIndex=0;

  function closeAll(){
    for(var i=0;i<cardRefs.length;i++){
      cardRefs[i].card.classList.remove("open");
      cardRefs[i].chev.textContent="▸";
    }
  }

  function toggleCard(i){
    var isOpen=cardRefs[i].card.classList.contains("open");
    if(isOpen){
      cardRefs[i].card.classList.remove("open");
      cardRefs[i].chev.textContent="▸";
      return;
    }
    closeAll();
    openIndex=i;
    cardRefs[i].card.classList.add("open");
    cardRefs[i].chev.textContent="▾";
    // collapse bubbles when switching cards
    cardRefs[i].card.querySelectorAll(".bubble").forEach(function(b){ b.classList.remove("open"); });
    wireAll();
  }

  function buildBubble(){
    var b=document.createElement("div");
    b.className="bubble";
    b.setAttribute("role","button");
    b.tabIndex=0;

    var h=document.createElement("h4");
    var p=document.createElement("p");
    b.appendChild(h);
    b.appendChild(p);

    function act(){ b.classList.toggle("open"); }
    b.addEventListener("click", act, {passive:true});
    b.addEventListener("keydown", function(e){
      if(e.key==="Enter"||e.key===" "){ e.preventDefault(); act(); }
    });

    return {wrap:b, h:h, p:p};
  }

  function buildCard(sec, idx){
    var card=document.createElement("div");
    card.className="card";
    card.style.setProperty("--c", sec.c);

    var head=document.createElement("div");
    head.className="head";
    head.setAttribute("role","button");
    head.tabIndex=0;

    var left=document.createElement("div");
    left.style.minWidth="0";

    var ti=document.createElement("div");
    ti.className="ti";

    var si=document.createElement("div");
    si.className="si";

    left.appendChild(ti);
    left.appendChild(si);

    var chev=document.createElement("div");
    chev.className="chev";
    chev.innerHTML='<span class="chevTxt">▸</span>';

    head.appendChild(left);
    head.appendChild(chev);

    var body=document.createElement("div");
    body.className="body";

    // reserve 2 paragraphs (we keep 2 for density; can expand later without changing structure)
    var p1=document.createElement("p");
    var p2=document.createElement("p");
    body.appendChild(p1);
    body.appendChild(p2);

    var sb=document.createElement("div");
    sb.className="subBubbles";

    var b1=buildBubble();
    var b2=buildBubble();
    var b3=buildBubble();

    sb.appendChild(b1.wrap);
    sb.appendChild(b2.wrap);
    sb.appendChild(b3.wrap);
    body.appendChild(sb);

    var actions=document.createElement("div");
    actions.className="actions";

    var a1=document.createElement("a");
    a1.className="btn red";
    a1.setAttribute("data-route","/gauges/");

    var a2=document.createElement("a");
    a2.className="btn";
    a2.setAttribute("data-route","/products/finance/");

    var a3=document.createElement("a");
    a3.className="btn";
    a3.setAttribute("data-route","/products/risk-capital/");

    actions.appendChild(a1);
    actions.appendChild(a2);
    actions.appendChild(a3);
    body.appendChild(actions);

    function onToggle(){ toggleCard(idx); }
    head.addEventListener("click", onToggle, {passive:true});
    head.addEventListener("keydown", function(e){
      if(e.key==="Enter"||e.key===" "){ e.preventDefault(); onToggle(); }
    });

    card.appendChild(head);
    card.appendChild(body);
    stack.appendChild(card);

    cardRefs.push({
      card:card,
      chev:card.querySelector(".chevTxt"),
      ti:ti, si:si,
      p1:p1, p2:p2,
      bubs:[b1,b2,b3],
      acts:[a1,a2,a3]
    });
  }

  function renderSkeleton(){
    stack.innerHTML="";
    cardRefs=[];
    for(var i=0;i<SECTIONS.length;i++){
      buildCard(SECTIONS[i], i);
    }
    openIndex=0;
    toggleCard(0);
  }

  function updateCards(){
    var keep=openIndex;

    for(var i=0;i<SECTIONS.length;i++){
      var sec=SECTIONS[i];
      var ref=cardRefs[i];

      ref.ti.textContent = pick(sec.t);
      ref.si.textContent = pick(sec.s);

      var pack = (lane==="engineering") ? sec.eng : sec.plat;

      ref.p1.textContent = pack.p[0] || "";
      ref.p2.textContent = pack.p[1] || "";

      // bubbles (always 3 on this page by design; if fewer, blank them)
      var bArr = pack.bubbles || [];
      for(var k=0;k<3;k++){
        var b=bArr[k] || {h:P("","", ""), p:P("","", "")};
        ref.bubs[k].h.textContent = pick(b.h) || "";
        ref.bubs[k].p.textContent = pick(b.p) || "";
        // keep open state of each bubble (do not force-close on lang/lane)
      }

      // actions i18n
      ref.acts[0].textContent = (lang==="zh")?"打开：量规":(lang==="es")?"ABRIR: MEDIDORES":"OPEN: GAUGES";
      ref.acts[1].textContent = (lang==="zh")?"打开：金融":(lang==="es")?"ABRIR: FINANZAS":"OPEN: FINANCE";
      ref.acts[2].textContent = (lang==="zh")?"打开：风险与资本":(lang==="es")?"ABRIR: RIESGO Y CAPITAL":"OPEN: RISK & CAPITAL";
    }

    closeAll();
    toggleCard(keep);
    wireAll();
  }

  // ===== No reload toggles (LANG + LANE) =====
  function setLang(next){
    if(next!=="en" && next!=="zh" && next!=="es") next="en";
    lang=next;
    try{ LS.setItem("gd_lang",lang);}catch(e){}
    history.replaceState({}, "", location.pathname + q({lang:lang}));
    applyHeader();
    updateCards();
  }

  function setLane(next){
    if(next!=="platform" && next!=="engineering") next="platform";
    lane=next;
    history.replaceState({}, "", location.pathname + q({lane:lane}));
    applyHeader();
    updateCards();
  }

  document.getElementById("langEN").addEventListener("click", function(){ setLang("en"); }, {passive:true});
  document.getElementById("langZH").addEventListener("click", function(){ setLang("zh"); }, {passive:true});
  document.getElementById("langES").addEventListener("click", function(){ setLang("es"); }, {passive:true});

  document.getElementById("lanePlatform").addEventListener("click", function(){ setLane("platform"); }, {passive:true});
  document.getElementById("laneEngineering").addEventListener("click", function(){ setLane("engineering"); }, {passive:true});

  // ===== INIT =====
  renderSkeleton();
  applyHeader();
  updateCards();
  wireAll();
