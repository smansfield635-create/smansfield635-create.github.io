<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>ARCHCOIN | Products</title>
  <style>
    :root{color-scheme:dark;--bg0:#020612;--bg1:#071427;--line:rgba(173,212,255,.14);--text:#edf5ff;--muted:#9fb2d2;--gold:#f1d28d}
    *{box-sizing:border-box} html,body{margin:0;min-height:100%;background:linear-gradient(180deg,var(--bg1),var(--bg0));color:var(--text);font-family:Inter,system-ui,sans-serif}
    .page{max-width:1080px;margin:0 auto;padding:24px 18px 56px}
    .shell{border:1px solid var(--line);border-radius:28px;background:linear-gradient(180deg,rgba(9,18,40,.86),rgba(10,20,46,.58));padding:28px;box-shadow:0 24px 60px rgba(0,0,0,.42)}
    .eyebrow{margin:0 0 10px;color:var(--gold);font-size:.78rem;font-weight:800;letter-spacing:.16em;text-transform:uppercase}
    h1{margin:0 0 12px;font-family:Georgia,"Times New Roman",serif;font-size:clamp(2.4rem,6vw,4.8rem);line-height:.92}
    p{margin:0;color:var(--muted);line-height:1.72;max-width:760px}
    .cta{display:inline-flex;margin-top:20px;padding:12px 18px;border:1px solid rgba(241,210,141,.26);border-radius:999px;text-decoration:none;color:var(--text);font-weight:800;letter-spacing:.12em;text-transform:uppercase;background:linear-gradient(180deg,rgba(18,36,78,.92),rgba(10,22,48,.84))}
  </style>
</head>
<body>
  <main class="page">
    <section class="shell">
      <p class="eyebrow">Products / ARCHCOIN</p>
      <h1>ARCHCOIN</h1>
      <p>Flagship financial-intelligence asset. This page is now the dedicated extension surface for ARCHCOIN under the products chamber.</p>
      <a class="cta" href="/products/">Back to Products</a>
    </section>
  </main>
</body>
</html>
