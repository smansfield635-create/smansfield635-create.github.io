  font-family:monospace;
  font-size:12px;
  color:#0f0;
  background:#000;
  z-index:9999;
">

</div>

<script type="module">
let status = document.getElementById("boot-status");

function log(msg){
  if(status) status.textContent = msg;
  console.log("[BOOT]", msg);
}

    log("STARTING RUNTIME...");
    mod.startRuntime();
    log("RUNTIME START CALLED");
  } else {
    log("ERROR: startRuntime missing");
    console.error("Runtime start function missing");
  }
