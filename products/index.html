<!doctype html>
<!-- TNT — /products/index.html
     PRODUCTS AUTHORITY — GATE + NOW FIELD
     STATUS:
       - structural rewrite
       - broken button path corrected
       - waterfall backdrop integrated
       - 3D floating gem lattice system integrated
       - nutrition / baseline system centered
       - canon state carry preserved
       - no overlays / no modals / no inline onclick
       - uses ui.css + branch.css only
-->

<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <title>Nine Summits — Products</title>

  <link rel="stylesheet" href="/assets/ui.css"/>
  <link rel="stylesheet" href="/assets/branch.css"/>

  <style>
    a{color:inherit;text-decoration:none}
    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
      color:#fff;
    }
    body::before,body::after{pointer-events:none!important}

    :root{
      --ink:rgba(255,255,255,.96);
      --mut:rgba(255,255,255,.84);
      --mut2:rgba(255,255,255,.72);

      --stroke:rgba(255,255,255,.14);
      --gold:rgba(212,175,55,.52);
      --goldSoft:rgba(212,175,55,.18);

      --crimson:rgba(120,0,22,.28);
      --festival:rgba(255,43,43,.14);
      --opalV:rgba(90,40,120,.12);

      --shadowA:0 40px 140px rgba(0,0,0,.62);
      --shadowB:0 24px 84px rgba(0,0,0,.58);
      --shadowC:0 18px 60px rgba(0,0,0,.52);

      --dockPad:16px;
    }

    #app-shell{
      position:fixed;
      inset:0;
      overflow:hidden;
      isolation:isolate;
      background:
        radial-gradient(circle at 50% 16%, rgba(120,180,255,.12), transparent 24%),
        radial-gradient(circle at 50% 56%, rgba(120,180,255,.08), transparent 38%),
        linear-gradient(180deg, #030712 0%, #071225 48%, #08101f 100%);
    }

    /* =========================
       WATERFALL BACKDROP
    ========================= */
    .env{
      position:absolute;
      inset:0;
      z-index:1;
      pointer-events:none;
      overflow:hidden;
    }

    .fall-core,
    .fall-side,
    .mist,
    .spark-field{
      position:absolute;
      inset:0;
      pointer-events:none;
    }

    .fall-core{
      background:
        linear-gradient(to bottom,
          rgba(255,255,255,.03) 0%,
          rgba(190,225,255,.08) 12%,
          rgba(110,180,255,.14) 32%,
          rgba(90,160,255,.10) 54%,
          rgba(255,255,255,.02) 78%,
          transparent 100%);
      mask-image:
        radial-gradient(circle at 50% 16%, rgba(0,0,0,.95) 0 20%, transparent 52%),
        linear-gradient(to right, transparent 0%, rgba(0,0,0,.9) 18%, rgba(0,0,0,.95) 50%, rgba(0,0,0,.9) 82%, transparent 100%);
      -webkit-mask-image:
        radial-gradient(circle at 50% 16%, rgba(0,0,0,.95) 0 20%, transparent 52%),
        linear-gradient(to right, transparent 0%, rgba(0,0,0,.9) 18%, rgba(0,0,0,.95) 50%, rgba(0,0,0,.9) 82%, transparent 100%);
      filter:blur(1px);
      opacity:.95;
      animation:fallShift 11s linear infinite;
    }

    .fall-side{
      background:
        radial-gradient(circle at 50% 12%, rgba(255,255,255,.10), transparent 14%),
        linear-gradient(to bottom,
          rgba(255,255,255,.02) 0%,
          rgba(120,190,255,.06) 24%,
          rgba(255,255,255,.01) 60%,
          transparent 100%);
      mask-image:
        linear-gradient(to right, transparent 0%, rgba(0,0,0,.62) 26%, transparent 40%, transparent 60%, rgba(0,0,0,.62) 74%, transparent 100%);
      -webkit-mask-image:
        linear-gradient(to right, transparent 0%, rgba(0,0,0,.62) 26%, transparent 40%, transparent 60%, rgba(0,0,0,.62) 74%, transparent 100%);
      opacity:.70;
      filter:blur(2px);
      animation:fallShiftSlow 15s linear infinite;
    }

    .mist{
      background:
        radial-gradient(circle at 50% 76%, rgba(255,255,255,.14), transparent 28%),
        radial-gradient(circle at 50% 94%, rgba(160,220,255,.12), transparent 38%);
      opacity:.62;
      filter:blur(18px);
      animation:mistPulse 8s ease-in-out infinite;
    }

    .spark-field::before,
    .spark-field::after{
      content:"";
      position:absolute;
      inset:-10%;
      background-repeat:repeat;
      mix-blend-mode:screen;
      opacity:.34;
      animation:drift 24s linear infinite;
    }

    .spark-field::before{
      background-size:260px 260px;
      background-image:
        radial-gradient(circle at 28px 36px, rgba(255,255,255,.95) 0 1px, transparent 1.7px),
        radial-gradient(circle at 118px 102px, rgba(255,255,255,.54) 0 1px, transparent 1.7px),
        radial-gradient(circle at 214px 174px, rgba(255,255,255,.72) 0 1px, transparent 1.7px),
        radial-gradient(circle at 180px 54px, rgba(201,162,74,.34) 0 1.2px, transparent 2px),
        radial-gradient(circle at 78px 212px, rgba(255,255,255,.50) 0 1px, transparent 1.6px);
    }

    .spark-field::after{
      background-size:320px 320px;
      background-image:
        radial-gradient(circle at 52px 62px, rgba(120,180,255,.22) 0 1.3px, transparent 2.2px),
        radial-gradient(circle at 222px 204px, rgba(255,255,255,.22) 0 1.2px, transparent 2px),
        radial-gradient(circle at 144px 142px, rgba(255,215,120,.16) 0 1.4px, transparent 2.1px);
      animation-duration:36s;
    }

    /* =========================
       TOP NAV
    ========================= */
    .top-nav{
      position:fixed;
      left:16px;
      top:16px;
      z-index:30;
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .nav-btn,
    .status-pill{
      min-height:42px;
      padding:10px 14px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.15);
      background:
        radial-gradient(circle at 20% 18%, rgba(255,255,255,.12), transparent 42%),
        radial-gradient(circle at 78% 22%, rgba(255,43,43,.10), transparent 62%),
        radial-gradient(circle at 76% 78%, rgba(90,40,120,.08), transparent 66%),
        linear-gradient(160deg, rgba(17,22,28,.88), rgba(11,15,20,.94));
      color:#fff;
      font-weight:900;
      font-size:13px;
      letter-spacing:.05em;
      box-shadow:var(--shadowC);
      backdrop-filter:blur(8px);
      position:relative;
      overflow:hidden;
      transition:border-color .18s ease, box-shadow .18s ease, filter .18s ease;
    }

    .nav-btn::before,
    .status-pill::before{
      content:"";
      position:absolute;
      inset:0;
      border-radius:inherit;
      pointer-events:none;
      background:
        radial-gradient(130% 130% at 50% 50%, rgba(212,175,55,0) 58%, rgba(212,175,55,.18) 82%, rgba(212,175,55,0) 100%),
        repeating-linear-gradient(45deg, rgba(201,162,74,.07) 0 1px, transparent 1px 18px),
        repeating-linear-gradient(-45deg, rgba(201,162,74,.05) 0 1px, transparent 1px 18px);
      mask:
        radial-gradient(circle at 50% 50%, transparent 0 70%, #000 80% 100%),
        linear-gradient(#000,#000);
      -webkit-mask:
        radial-gradient(circle at 50% 50%, transparent 0 70%, #000 80% 100%),
        linear-gradient(#000,#000);
      opacity:.32;
    }

    .nav-btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
    }

    .nav-btn:hover{
      border-color:rgba(212,175,55,.42);
      box-shadow:
        var(--shadowC),
        0 0 18px rgba(212,175,55,.14);
      filter:saturate(1.04);
    }

    .status-pill{
      position:fixed;
      right:16px;
      top:16px;
      z-index:30;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:76px;
    }

    /* =========================
       HERO
    ========================= */
    .hero{
      position:absolute;
      top:9%;
      left:50%;
      transform:translateX(-50%);
      width:min(94vw, 980px);
      text-align:center;
      z-index:10;
      pointer-events:none;
    }

    .hero h1{
      margin:0;
      font-size:clamp(40px, 6.2vw, 86px);
      font-weight:950;
      letter-spacing:.05em;
      line-height:.94;
      text-shadow:0 10px 38px rgba(0,0,0,.62);
    }

    .hero p{
      margin:12px 0 0;
      font-size:clamp(15px, 1.9vw, 21px);
      line-height:1.55;
      color:rgba(255,255,255,.86);
      text-shadow:0 8px 24px rgba(0,0,0,.44);
    }

    /* =========================
       STAGE
    ========================= */
    .stage{
      position:absolute;
      inset:0;
      z-index:12;
    }

    /* =========================
       GATE MODE
    ========================= */
    .gate{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:min(8vw, 96px);
      padding:0 20px;
    }

    .diamond-card{
      position:relative;
      width:clamp(150px, 19vw, 230px);
      height:clamp(150px, 19vw, 230px);
      display:flex;
      align-items:center;
      justify-content:center;
      background:transparent;
      border:0;
      padding:0;
      cursor:pointer;
      color:inherit;
      -webkit-tap-highlight-color:transparent;
      touch-action:manipulation;
    }

    .diamond-shell{
      position:absolute;
      inset:0;
      border:2px solid rgba(255,255,255,.28);
      background:
        radial-gradient(circle at 22% 18%, rgba(255,255,255,.12), transparent 26%),
        linear-gradient(145deg, rgba(10,14,22,.42), rgba(5,8,12,.24));
      box-shadow:
        0 18px 48px rgba(0,0,0,.38),
        inset 0 0 20px rgba(255,255,255,.04);
      transition:border-color .18s ease, box-shadow .18s ease, filter .18s ease;
    }

    .diamond-shell::after{
      content:"";
      position:absolute;
      inset:20%;
      border:1px solid rgba(201,162,74,.50);
    }

    .diamond-shell--now{transform:rotate(0deg)}
    .diamond-shell--future{transform:rotate(45deg)}

    .diamond-label{
      position:relative;
      z-index:2;
      font-weight:950;
      font-size:clamp(22px, 2.6vw, 32px);
      letter-spacing:.12em;
      text-align:center;
      pointer-events:none;
      text-shadow:0 8px 26px rgba(0,0,0,.55);
    }

    .diamond-sub{
      position:absolute;
      left:50%;
      bottom:-44px;
      transform:translateX(-50%);
      min-width:164px;
      text-align:center;
      font-size:12px;
      font-weight:800;
      letter-spacing:.06em;
      color:rgba(255,255,255,.74);
      text-transform:uppercase;
      pointer-events:none;
      white-space:nowrap;
    }

    .diamond-card:hover .diamond-shell{
      border-color:rgba(255,255,255,.42);
      box-shadow:
        0 22px 56px rgba(0,0,0,.46),
        0 0 18px rgba(212,175,55,.16),
        inset 0 0 24px rgba(255,255,255,.05);
      filter:saturate(1.04);
    }

    /* =========================
       NOW FIELD
    ========================= */
    .product-field{
      position:absolute;
      inset:0;
      display:none;
    }

    .product-field.is-active{
      display:block;
    }

    .field-core{
      position:absolute;
      left:50%;
      top:57%;
      transform:translate(-50%,-50%);
      width:min(980px, 90vw);
      height:min(640px, 62vh);
      pointer-events:auto;
    }

    .gem-node{
      position:absolute;
      display:block;
      border:0;
      background:transparent;
      color:inherit;
      padding:0;
      cursor:pointer;
      -webkit-tap-highlight-color:transparent;
      touch-action:manipulation;
      text-decoration:none;
      pointer-events:auto;
      animation:float 8s ease-in-out infinite alternate;
    }

    .gem-node.nutrition{width:220px;height:220px;z-index:4;animation-duration:9s}
    .gem-node.sideai{width:170px;height:170px;z-index:3;animation-duration:8s}
    .gem-node.energy{width:170px;height:170px;z-index:3;animation-duration:10s}
    .gem-node.education{width:170px;height:170px;z-index:3;animation-duration:11s}
    .gem-node.governance{width:170px;height:170px;z-index:3;animation-duration:9.5s}

    .gem-shell{
      position:absolute;
      inset:0;
      transform:rotate(45deg);
      border-radius:28px;
      border:1px solid rgba(255,255,255,.18);
      background:
        radial-gradient(circle at 24% 20%, rgba(255,255,255,.28), transparent 30%),
        radial-gradient(circle at 76% 22%, rgba(255,43,43,.16), transparent 46%),
        radial-gradient(circle at 76% 80%, rgba(90,40,120,.16), transparent 52%),
        linear-gradient(155deg, rgba(16,24,40,.96), rgba(9,12,20,.98));
      box-shadow:
        0 34px 70px rgba(0,0,0,.48),
        0 16px 0 rgba(0,0,0,.12),
        inset 0 1px 0 rgba(255,255,255,.20),
        inset 0 -18px 36px rgba(0,0,0,.55);
      overflow:hidden;
      transition:border-color .18s ease, box-shadow .18s ease, filter .18s ease, transform .18s ease;
    }

    .gem-shell::before{
      content:"";
      position:absolute;
      inset:7%;
      border-radius:20px;
      border:1px solid rgba(201,162,74,.38);
      opacity:.96;
    }

    .gem-shell::after{
      content:"";
      position:absolute;
      inset:-8%;
      background:
        linear-gradient(180deg, rgba(255,255,255,.08), transparent 24%),
        repeating-linear-gradient(90deg, rgba(255,255,255,.05) 0 1px, transparent 1px 34px),
        repeating-linear-gradient(0deg, rgba(255,255,255,.04) 0 1px, transparent 1px 34px);
      opacity:.28;
      transform:rotate(0deg);
      pointer-events:none;
    }

    .gem-face{
      position:absolute;
      inset:0;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:24px 20px;
      z-index:2;
      pointer-events:none;
    }

    .gem-title{
      font-size:clamp(18px, 2vw, 28px);
      font-weight:950;
      letter-spacing:.08em;
      line-height:1.05;
      text-shadow:0 10px 26px rgba(0,0,0,.58);
      text-transform:uppercase;
    }

    .gem-node.nutrition .gem-title{font-size:clamp(22px, 2.4vw, 34px)}

    .gem-sub{
      margin-top:10px;
      font-size:clamp(11px, 1.05vw, 14px);
      font-weight:850;
      letter-spacing:.10em;
      line-height:1.25;
      text-transform:uppercase;
      color:rgba(255,255,255,.78);
    }

    .gem-node:hover .gem-shell{
      border-color:rgba(255,255,255,.34);
      box-shadow:
        0 42px 86px rgba(0,0,0,.54),
        0 0 24px rgba(212,175,55,.14),
        inset 0 1px 0 rgba(255,255,255,.24),
        inset 0 -18px 40px rgba(0,0,0,.58);
      filter:saturate(1.05) brightness(1.03);
    }

    /* positions */
    .nutrition{left:50%;top:50%;transform:translate(-50%,-50%)}
    .sideai{left:56%;top:12%;transform:translate(-50%,-50%)}
    .energy{left:84%;top:56%;transform:translate(-50%,-50%)}
    .education{left:34%;top:82%;transform:translate(-50%,-50%)}
    .governance{left:12%;top:42%;transform:translate(-50%,-50%)}

    /* =========================
       ANIMATION
    ========================= */
    @keyframes flow{from{transform:translateY(-5%)}to{transform:translateY(5%)}}
    @keyframes mist{from{opacity:.40}to{opacity:.72}}
    @keyframes fallShift{from{transform:translateY(-4%)}to{transform:translateY(4%)}}
    @keyframes fallShiftSlow{from{transform:translateY(-2%)}to{transform:translateY(3%)}}
    @keyframes drift{from{transform:translate3d(-1.5%,-1%,0)}to{transform:translate3d(1.5%,1%,0)}}
    @keyframes float{from{translate:0 -10px}to{translate:0 10px}}

    /* =========================
       MOBILE
    ========================= */
    @media (max-width:900px){
      .field-core{
        width:min(94vw, 760px);
        height:min(620px, 58vh);
      }
      .gem-node.nutrition{width:190px;height:190px}
      .gem-node.sideai,
      .gem-node.energy,
      .gem-node.education,
      .gem-node.governance{width:146px;height:146px}
    }

    @media (max-width:640px){
      .hero{
        top:12%;
        width:min(92vw, 700px);
      }

      .gate{
        flex-direction:column;
        gap:64px;
        justify-content:center;
      }

      .field-core{
        width:min(96vw, 360px);
        height:500px;
        top:60%;
      }

      .gem-node.nutrition{width:168px;height:168px}
      .gem-node.sideai,
      .gem-node.energy,
      .gem-node.education,
      .gem-node.governance{width:124px;height:124px}

      .nutrition{left:50%;top:50%}
      .sideai{left:50%;top:16%}
      .energy{left:82%;top:52%}
      .education{left:50%;top:84%}
      .governance{left:18%;top:52%}

      .gem-face{padding:18px 14px}
      .gem-title{font-size:16px}
      .gem-node.nutrition .gem-title{font-size:22px}
      .gem-sub{font-size:10px}
    }
  </style>
</head>

<body>
  <div id="app-shell">
    <div class="env" aria-hidden="true">
      <div class="fall-core"></div>
      <div class="fall-side"></div>
      <div class="mist"></div>
      <div class="spark-field"></div>
    </div>

    <nav class="top-nav" aria-label="Primary">
      <a class="nav-btn" id="navCompass" href="/index.html" data-route="/index.html">COMPASS</a>
      <a class="nav-btn" id="navProducts" href="/products/" data-route="/products/">PRODUCTS</a>
      <a class="nav-btn" id="navExplore" href="/explore/" data-route="/explore/">EXPLORE</a>
      <a class="nav-btn" id="navGauges" href="/gauges/" data-route="/gauges/">GAUGES</a>
    </nav>

    <div class="status-pill" id="statusPill">GATE</div>

    <section class="hero" aria-label="Products hero">
      <h1 id="heroTitle">PRODUCTS</h1>
      <p id="heroTag">Choose your path. What exists now, or what is being built next.</p>
    </section>

    <section class="stage" aria-label="Products authority">
      <div class="gate" id="gate" aria-label="Gateway choices">
        <button class="diamond-card" id="enterNow" type="button" aria-label="Enter available products">
          <div class="diamond-shell diamond-shell--now"></div>
          <div class="diamond-label" id="nowLabel">NOW</div>
          <div class="diamond-sub" id="nowSub">AVAILABLE SURFACE</div>
        </button>

        <button class="diamond-card" id="enterFuture" type="button" aria-label="Enter future products">
          <div class="diamond-shell diamond-shell--future"></div>
          <div class="diamond-label" id="futureLabel">FUTURE</div>
          <div class="diamond-sub" id="futureSub">EXPANSION PATH</div>
        </button>
      </div>

      <section class="product-field" id="field" aria-label="Product field">
        <div class="field-core">
          <a class="gem-node nutrition" id="nodeNutrition" data-route="/products/nutrition/" href="/products/nutrition/" aria-label="Nutrition baseline system">
            <div class="gem-shell"></div>
            <div class="gem-face">
              <div class="gem-title" id="labelNutrition">NUTRITION</div>
              <div class="gem-sub" id="subNutrition">BASELINE SYSTEM</div>
            </div>
          </a>

          <a class="gem-node sideai" id="nodeSideai" data-route="/products/on-your-side-ai/" href="/products/on-your-side-ai/" aria-label="On Your Side AI">
            <div class="gem-shell"></div>
            <div class="gem-face">
              <div class="gem-title" id="labelSide">ON YOUR SIDE AI</div>
              <div class="gem-sub" id="subSide">INTELLIGENCE</div>
            </div>
          </a>

          <a class="gem-node energy" id="nodeEnergy" data-route="/products/energy/" href="/products/energy/" aria-label="Energy">
            <div class="gem-shell"></div>
            <div class="gem-face">
              <div class="gem-title" id="labelEnergy">ENERGY</div>
              <div class="gem-sub" id="subEnergy">SYSTEM OUTPUT</div>
            </div>
          </a>

          <a class="gem-node education" id="nodeEducation" data-route="/products/education/" href="/products/education/" aria-label="Education">
            <div class="gem-shell"></div>
            <div class="gem-face">
              <div class="gem-title" id="labelEducation">EDUCATION</div>
              <div class="gem-sub" id="subEducation">LANGUAGE SYSTEMS</div>
            </div>
          </a>

          <a class="gem-node governance" id="nodeGovernance" data-route="/products/governance/" href="/products/governance/" aria-label="Governance">
            <div class="gem-shell"></div>
            <div class="gem-face">
              <div class="gem-title" id="labelGovernance">GOVERNANCE</div>
              <div class="gem-sub" id="subGovernance">SCALING RULES</div>
            </div>
          </a>
        </div>
      </section>
    </section>
  </div>

  <script type="module">
    (function(){
      "use strict";

      const qs = new URLSearchParams(location.search);
      const LS = window.localStorage;

      let lang  = qs.get("lang")  || LS.getItem("gd_lang")  || "en";
      let style = qs.get("style") || LS.getItem("gd_style") || "informal";
      let time  = qs.get("time")  || LS.getItem("gd_time")  || "now";
      let depth = qs.get("depth") || LS.getItem("gd_depth") || "1";
      let lane  = qs.get("lane")  || "";
      let view  = qs.get("view")  || "gate";

      if(lang!=="en" && lang!=="zh" && lang!=="es") lang="en";
      if(style!=="informal" && style!=="formal") style="informal";
      if(time!=="origin" && time!=="now" && time!=="post") time="now";

      let d = parseInt(depth,10);
      if(!isFinite(d)) d = 1;
      if(d < 1) d = 1;
      if(d > 9) d = 9;
      depth = String(d);

      if(lane!=="platform" && lane!=="engineering") lane = "";
      if(view!=="gate" && view!=="now") view = "gate";

      try{
        LS.setItem("gd_lang", lang);
        LS.setItem("gd_style", style);
        LS.setItem("gd_time", time);
        LS.setItem("gd_depth", depth);
      }catch(e){}

      document.documentElement.lang = (lang==="zh") ? "zh" : (lang==="es" ? "es" : "en");

      function buildQuery(extra){
        const p = new URLSearchParams();
        p.set("lang", (extra && extra.lang) ? extra.lang : lang);
        p.set("style", (extra && extra.style) ? extra.style : style);
        p.set("time", (extra && extra.time) ? extra.time : time);
        p.set("depth", (extra && extra.depth) ? String(extra.depth) : depth);
        p.set("view", (extra && extra.view) ? extra.view : view);

        const resolvedLane = (extra && extra.lane) ? extra.lane : lane;
        if(resolvedLane === "platform" || resolvedLane === "engineering"){
          p.set("lane", resolvedLane);
        }

        return "?" + p.toString();
      }

      function withState(route, extra){
        const glue = route.includes("?") ? "&" : "?";
        return route + glue + buildQuery(extra).slice(1);
      }

      function wireRoutes(){
        const nodes = document.querySelectorAll("[data-route]");
        for(let i=0;i<nodes.length;i+=1){
          const el = nodes[i];
          const route = el.getAttribute("data-route") || "";
          if(!route) continue;
          if(el.tagName === "A"){
            el.setAttribute("href", withState(route));
          }
        }
      }

      function P(en, zh, es){
        return { en, zh, es };
      }

      function pick(o){
        return (lang==="zh") ? o.zh : (lang==="es" ? o.es : o.en);
      }

      const COPY = {
        heroTitle: P("PRODUCTS","产品","PRODUCTOS"),
        heroTag: P(
          "Choose your path. What exists now, or what is being built next.",
          "选择你的路径。选择现在存在的，或正在构建的下一层。",
          "Elige tu camino. Lo que existe ahora, o lo que se está construyendo después."
        ),
        navCompass: P("COMPASS","指南针","BRÚJULA"),
        navProducts: P("PRODUCTS","产品","PRODUCTOS"),
        navExplore: P("EXPLORE","探索","EXPLORAR"),
        navGauges: P("GAUGES","量规","MEDIDORES"),
        gate: P("GATE","闸门","PUERTA"),
        now: P("NOW","现在","AHORA"),
        future: P("FUTURE","未来","FUTURO"),
        nowSub: P("AVAILABLE SURFACE","可用界面","SUPERFICIE DISPONIBLE"),
        futureSub: P("EXPANSION PATH","扩展路径","RUTA DE EXPANSIÓN"),

        nutrition: P("NUTRITION","营养","NUTRICIÓN"),
        nutritionSub: P("BASELINE SYSTEM","基线系统","SISTEMA BASE"),
        side: P("ON YOUR SIDE AI","站你这边 AI","ON YOUR SIDE AI"),
        sideSub: P("INTELLIGENCE","智能","INTELIGENCIA"),
        energy: P("ENERGY","能源","ENERGÍA"),
        energySub: P("SYSTEM OUTPUT","系统输出","SALIDA DEL SISTEMA"),
        education: P("EDUCATION","教育","EDUCACIÓN"),
        educationSub: P("LANGUAGE SYSTEMS","语言系统","SISTEMAS DE LENGUAJE"),
        governance: P("GOVERNANCE","治理","GOBERNANZA"),
        governanceSub: P("SCALING RULES","规模规则","REGLAS DE ESCALA")
      };

      document.getElementById("heroTitle").textContent = pick(COPY.heroTitle);
      document.getElementById("heroTag").textContent = pick(COPY.heroTag);

      document.getElementById("navCompass").textContent = pick(COPY.navCompass);
      document.getElementById("navProducts").textContent = pick(COPY.navProducts);
      document.getElementById("navExplore").textContent = pick(COPY.navExplore);
      document.getElementById("navGauges").textContent = pick(COPY.navGauges);

      document.getElementById("nowLabel").textContent = pick(COPY.now);
      document.getElementById("futureLabel").textContent = pick(COPY.future);
      document.getElementById("nowSub").textContent = pick(COPY.nowSub);
      document.getElementById("futureSub").textContent = pick(COPY.futureSub);

      document.getElementById("labelNutrition").textContent = pick(COPY.nutrition);
      document.getElementById("subNutrition").textContent = pick(COPY.nutritionSub);

      document.getElementById("labelSide").textContent = pick(COPY.side);
      document.getElementById("subSide").textContent = pick(COPY.sideSub);

      document.getElementById("labelEnergy").textContent = pick(COPY.energy);
      document.getElementById("subEnergy").textContent = pick(COPY.energySub);

      document.getElementById("labelEducation").textContent = pick(COPY.education);
      document.getElementById("subEducation").textContent = pick(COPY.educationSub);

      document.getElementById("labelGovernance").textContent = pick(COPY.governance);
      document.getElementById("subGovernance").textContent = pick(COPY.governanceSub);

      wireRoutes();

      const gate = document.getElementById("gate");
      const field = document.getElementById("field");
      const statusPill = document.getElementById("statusPill");
      const enterNowButton = document.getElementById("enterNow");
      const enterFutureButton = document.getElementById("enterFuture");

      function syncView(nextView){
        view = nextView === "now" ? "now" : "gate";

        if(view === "now"){
          gate.style.display = "none";
          field.classList.add("is-active");
          statusPill.textContent = pick(COPY.now);
        }else{
          gate.style.display = "flex";
          field.classList.remove("is-active");
          statusPill.textContent = pick(COPY.gate);
        }

        history.replaceState({}, "", location.pathname + buildQuery({ view:view }));
      }

      function navigateTo(path){
        window.location.href = withState(path, { view:view });
      }

      enterNowButton.addEventListener("click", function(){
        syncView("now");
      }, { passive:true });

      enterFutureButton.addEventListener("click", function(){
        navigateTo("/explore/");
      }, { passive:true });

      syncView(view);
    })();
  </script>
</body>
</html>
