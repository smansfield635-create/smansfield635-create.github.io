<!doctype html>
<!-- TNT — /gauges/index.html
     GAUGES · INSTRUMENTATION SPINE
     STRUCTURE:
       - 7 Canonical Instruments
       - Trilingual: EN / 中文 / ES
       - Four Analytical Lenses (NO NEW gd_* KEYS):
            INFORMAL   = style=informal & depth=explore
            FORMAL     = style=formal   & depth=explore
            PLATFORM   = style=informal & depth=learn
            ENGINEERING= style=formal   & depth=learn
       - Single-open accordion (tap same closes)
       - Canon state carry: lang/style/time/depth via URL + localStorage gd_lang/gd_style/gd_time/gd_depth ONLY
       - NO new gd_* keys
       - lane=platform|engineering is URL-only (preserve if present; never store; Gauges uses depth mapping above)
       - No overlays, no modals
       - No inline onclick; addEventListener only
       - ui.css owns background (do NOT style html/body background)
       - Uses /assets/ui.css + /assets/branch.css + /assets/instruments.js
-->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>GAUGES · Instrumentation</title>

<link rel="stylesheet" href="/assets/ui.css"/>
<link rel="stylesheet" href="/assets/branch.css"/>
<script defer src="/assets/instruments.js"></script>

<style>
a{color:inherit;text-decoration:none}
body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:#fff}
body::before,body::after{pointer-events:none!important}

:root{
  --dockH:124px;

  /* hierarchy: red primary, black secondary, gold adorn */
  --stroke:rgba(255,255,255,.12);
  --stroke2:rgba(255,255,255,.10);

  --ink:rgba(255,255,255,.94);
  --mut:rgba(255,255,255,.84);
  --mut2:rgba(255,255,255,.72);

  --crimson:rgba(120,0,22,.30);
  --festival:rgba(255,43,43,.14);
  --opalV:rgba(90,40,120,.10);

  --gold:rgba(201,162,74,.40);
  --goldSoft:rgba(201,162,74,.18);

  --shadowA:0 30px 100px rgba(0,0,0,.60);
  --shadowB:0 20px 70px rgba(0,0,0,.60);
  --shadowC:0 18px 60px rgba(0,0,0,.55);
}

.page{
  width:min(1100px,94vw);
  margin:0 auto;
  padding:90px 0 calc(var(--dockH) + 18px);
  display:flex;
  flex-direction:column;
  gap:16px;
}

/* TOP (fixed) */
.top{
  position:fixed;top:16px;left:0;right:0;
  padding:0 16px;
  display:flex;justify-content:space-between;align-items:center;
  gap:12px;
  z-index:240;
  pointer-events:none;
}
.top .left,.top .right{
  display:flex;gap:10px;align-items:center;flex-wrap:wrap;white-space:nowrap;
  pointer-events:auto;
}

/* Button */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:10px 12px;min-height:44px;border-radius:16px;
  border:1px solid rgba(255,255,255,.14);
  background:
    radial-gradient(circle at 50% 120%, rgba(201,162,74,.16), transparent 64%),
    linear-gradient(145deg, rgba(10,12,16,.78), rgba(6,8,10,.90));
  color:var(--ink);
  font-weight:950;font-size:14px;letter-spacing:.2px;
  -webkit-tap-highlight-color:transparent;
  position:relative;overflow:hidden;
  touch-action:manipulation;
  box-shadow:var(--shadowC);
  white-space:nowrap;
}
.btn:active{transform:translateY(1px)}
.btn::after{
  content:"";
  position:absolute;left:10px;right:10px;bottom:-12px;height:28px;
  background: radial-gradient(circle at 50% 0%, rgba(201,162,74,.34), transparent 72%);
  opacity:.60;pointer-events:none;
}
.btn.red{border-color:rgba(255,43,43,.22); box-shadow:var(--shadowC), 0 0 18px rgba(255,43,43,.12);}

/* HEADER */
.header{
  border:1px solid var(--stroke);
  border-radius:22px;
  background:
    radial-gradient(circle at 18% 22%, var(--crimson), transparent 72%),
    radial-gradient(circle at 82% 30%, var(--opalV), transparent 74%),
    radial-gradient(circle at 70% 92%, var(--festival), transparent 62%),
    radial-gradient(circle at 26% 22%, rgba(201,162,74,.14), transparent 62%),
    linear-gradient(160deg, rgba(0,0,0,.30), rgba(0,0,0,.14));
  padding:20px;
  box-shadow:var(--shadowA);
  backdrop-filter:blur(10px);
  position:relative;
  overflow:hidden;
}
/* gold diamond lay in trim zone only */
.header::before{
  content:"";
  position:absolute;inset:0;border-radius:22px;pointer-events:none;
  box-shadow: inset 0 0 0 1px rgba(201,162,74,.16);
  background:
    repeating-linear-gradient(45deg, rgba(201,162,74,.08) 0 1px, transparent 1px 16px),
    repeating-linear-gradient(-45deg, rgba(201,162,74,.06) 0 1px, transparent 1px 16px);
  opacity:.26;
  mask:
    radial-gradient(circle at 50% 50%, transparent 0 78%, #000 82% 100%),
    linear-gradient(#000,#000);
  -webkit-mask:
    radial-gradient(circle at 50% 50%, transparent 0 78%, #000 82% 100%),
    linear-gradient(#000,#000);
}

.k{
  margin:0 0 8px;
  font-size:11px;
  letter-spacing:4px;
  text-transform:uppercase;
  opacity:.78;
  color:var(--mut);
}
.t{
  font-weight:980;
  font-size:32px;
  letter-spacing:.8px;
  margin:0 0 12px;
  color:var(--ink);
}
.s{
  font-size:16px;
  line-height:1.7;
  opacity:.92;
  margin:0;
  color:var(--mut);
  max-width:980px;
}

/* Lens selectors */
.selector{
  margin-top:16px;
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  justify-content:space-between;
  align-items:center;
}

.pills{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.pill{
  padding:10px 14px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.12);
  background:
    radial-gradient(circle at 50% 120%, rgba(201,162,74,.12), transparent 64%),
    linear-gradient(145deg, rgba(10,12,16,.78), rgba(6,8,10,.90));
  cursor:pointer;
  font-weight:950;
  letter-spacing:.2px;
  color:var(--ink);
  min-height:44px;
  -webkit-tap-highlight-color:transparent;
  position:relative;
  overflow:hidden;
  box-shadow:0 14px 36px rgba(0,0,0,.55);
}
.pill::after{
  content:"";
  position:absolute;left:10px;right:10px;bottom:-12px;height:28px;
  background: radial-gradient(circle at 50% 0%, rgba(201,162,74,.26), transparent 72%);
  opacity:.45;pointer-events:none;
}
.pill.active{
  border-color:rgba(255,43,43,.32);
  box-shadow:0 14px 36px rgba(0,0,0,.55), 0 0 16px rgba(255,43,43,.12);
}
.stateBadge{
  display:inline-flex;align-items:center;gap:10px;
  padding:10px 12px;border-radius:999px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(0,0,0,.16);
  color:var(--mut);
  font-weight:950;
  box-shadow:0 14px 36px rgba(0,0,0,.55);
}
.stateBadge b{color:var(--ink)}

/* ACCORDION */
.list{display:flex;flex-direction:column;gap:14px}

.row{
  border:1px solid rgba(255,255,255,.10);
  border-radius:22px;
  background:
    radial-gradient(circle at 22% 18%, rgba(255,43,43,.10), transparent 58%),
    radial-gradient(circle at 82% 30%, rgba(90,40,120,.10), transparent 62%),
    linear-gradient(145deg, rgba(17,22,28,.86), rgba(11,15,20,.94));
  overflow:hidden;
  box-shadow:var(--shadowB);
  position:relative;
}
.row::before{
  content:"";
  position:absolute;inset:0;border-radius:22px;pointer-events:none;
  box-shadow: inset 0 0 0 1px rgba(201,162,74,.12);
  opacity:.60;
}

.head{
  padding:16px 16px;
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:10px;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}

.titleWrap{min-width:0}
.title{
  font-weight:980;
  font-size:18px;
  color:var(--ink);
  letter-spacing:.2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.sub{
  margin-top:8px;
  font-size:13.75px;
  color:var(--mut);
  opacity:.92;
  line-height:1.42;
  max-width:92ch;
}

.chev{
  width:36px;height:36px;border-radius:14px;
  border:1px solid rgba(255,255,255,.14);
  background: rgba(0,0,0,.16);
  display:flex;align-items:center;justify-content:center;
  color:var(--mut);
  font-weight:950;
  position:relative;overflow:hidden;
  flex:0 0 auto;margin-top:2px;
}
.chev::after{
  content:"";
  position:absolute;left:6px;right:6px;bottom:-10px;height:22px;
  background: radial-gradient(circle at 50% 0%, rgba(201,162,74,.30), transparent 70%);
  opacity:.62;pointer-events:none;
}

.body{
  display:none;
  padding:16px 16px 18px;
  border-top:1px solid rgba(255,255,255,.08);
  background:
    radial-gradient(circle at 30% 30%, rgba(255,255,255,.06), transparent 55%),
    linear-gradient(145deg, rgba(10,12,16,.86), rgba(6,8,10,.94));
}
.row.open .body{display:block}
.row.open{border-color:rgba(255,43,43,.22); box-shadow:var(--shadowB), 0 0 18px rgba(255,43,43,.10);}

.content{
  font-size:15.25px;
  line-height:1.75;
  color:var(--mut);
  margin:0;
}
.content + .content{margin-top:12px}

.ul{
  margin:12px 0 0 18px;
  padding:0;
  color:rgba(255,255,255,.82);
  line-height:1.55;
  font-size:13.75px;
}
.ul li{margin:6px 0}

.actions{
  display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end;margin-top:14px;
}

/* DOCK */
.dock{
  position:fixed;left:50%;
  bottom:max(10px, env(safe-area-inset-bottom));
  transform:translateX(-50%);
  width:min(980px,94vw);
  padding:10px;
  border-radius:22px;
  border:1px solid rgba(255,255,255,.12);
  background:
    radial-gradient(circle at 18% 18%, rgba(255,43,43,.10), transparent 62%),
    radial-gradient(circle at 82% 70%, rgba(90,40,120,.10), transparent 64%),
    linear-gradient(145deg, rgba(10,12,16,.72), rgba(6,8,10,.86));
  backdrop-filter:blur(10px);
  box-shadow:0 18px 60px rgba(0,0,0,.55);
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}
.dock .btn{width:100%;padding:10px;border-radius:999px}

@media (max-width:520px){
  :root{--dockH:140px}
  .dock{grid-template-columns:repeat(3,1fr)}
  .t{font-size:28px}
  .content{font-size:14.75px}
}
</style>
</head>

<body>

<div class="top" aria-label="Top controls">
  <div class="left">
    <a class="btn" id="btnDoor" href="/door/" data-route="/door/">DOOR</a>
    <a class="btn" id="btnHome" href="/home/" data-route="/home/">HOME</a>
    <a class="btn" id="btnLaws" href="/laws/" data-route="/laws/">LAWS</a>
  </div>
  <div class="right" aria-label="Language">
    <button class="btn" id="btnEN" type="button">EN</button>
    <button class="btn" id="btnZH" type="button">中文</button>
    <button class="btn" id="btnES" type="button">ES</button>
  </div>
</div>

<div class="page">

  <div class="header">
    <p class="k" id="hdrK">GAUGES</p>
    <h1 class="t" id="hdrTitle">INSTRUMENTATION SPINE</h1>
    <p class="s" id="hdrSub"></p>

    <div class="selector" aria-label="Lens selectors">
      <div class="pills" aria-label="Language">
        <button class="pill" id="langEN" type="button">EN</button>
        <button class="pill" id="langZH" type="button">中文</button>
        <button class="pill" id="langES" type="button">ES</button>
      </div>
      <div class="pills" aria-label="Lenses">
        <button class="pill" id="lensInformal" type="button">INFORMAL</button>
        <button class="pill" id="lensFormal" type="button">FORMAL</button>
        <button class="pill" id="lensEngineering" type="button">ENGINEERING</button>
        <button class="pill" id="lensPlatform" type="button">PLATFORM</button>
      </div>
      <div class="stateBadge" aria-label="State">
        <span id="stLang">LANG</span> <b id="stLangV">EN</b>
        <span style="opacity:.6">·</span>
        <span id="stLens">LENS</span> <b id="stLensV">INFORMAL</b>
      </div>
    </div>
  </div>

  <div class="list" id="list"></div>

</div>

<nav class="dock" aria-label="Bottom navigation">
  <a class="btn" id="dockIndex" href="/index.html" data-route="/index.html">COMPASS</a>
  <a class="btn" id="dockExplore" href="/explore/" data-route="/explore/">EXPLORE</a>
  <a class="btn" id="dockProducts" href="/products/" data-route="/products/">PRODUCTS</a>
  <a class="btn" id="dockLaws2" href="/laws/" data-route="/laws/">LAWS</a>
</nav>

<script>
(function(){
  "use strict";

  // ===== Canon state (NO new gd_* keys) =====
  var qs=new URLSearchParams(location.search);
  var LS=window.localStorage;

  var lang  = qs.get("lang")  || LS.getItem("gd_lang")  || "en";
  var style = qs.get("style") || LS.getItem("gd_style") || "informal";
  var time  = qs.get("time")  || LS.getItem("gd_time")  || "now";
  var depth = qs.get("depth") || LS.getItem("gd_depth") || "explore";
  var lane  = qs.get("lane")  || ""; // URL-only preserved if present (not used for lens here)

  if(lang!=="en" && lang!=="zh" && lang!=="es") lang="en";
  if(style!=="formal" && style!=="informal") style="informal";
  if(time!=="origin" && time!=="now" && time!=="post") time="now";
  if(depth!=="explore" && depth!=="learn") depth="explore";
  if(lane!=="platform" && lane!=="engineering") lane="";

  try{
    LS.setItem("gd_lang",lang);
    LS.setItem("gd_style",style);
    LS.setItem("gd_time",time);
    LS.setItem("gd_depth",depth);
  }catch(e){}

  document.documentElement.lang=(lang==="zh")?"zh":(lang==="es")?"es":"en";

  // ===== Lens mapping (4 lenses via existing keys) =====
  // INFORMAL    => style=informal depth=explore
  // FORMAL      => style=formal   depth=explore
  // PLATFORM    => style=informal depth=learn
  // ENGINEERING => style=formal   depth=learn
  function lensKey(){
    if(style==="formal" && depth==="learn") return "engineering";
    if(style==="informal" && depth==="learn") return "platform";
    if(style==="formal") return "formal";
    return "informal";
  }

  function setLens(k){
    if(k==="engineering"){ style="formal"; depth="learn"; }
    else if(k==="platform"){ style="informal"; depth="learn"; }
    else if(k==="formal"){ style="formal"; depth="explore"; }
    else { style="informal"; depth="explore"; }

    try{
      LS.setItem("gd_style",style);
      LS.setItem("gd_depth",depth);
    }catch(e){}

    window.location.href = window.location.pathname + q();
  }

  function q(over){
    var p=new URLSearchParams();
    p.set("lang", (over&&over.lang)?over.lang:lang);
    p.set("style",(over&&over.style)?over.style:style);
    p.set("time", (over&&over.time)?over.time:time);
    p.set("depth",(over&&over.depth)?over.depth:depth);
    if(lane==="platform"||lane==="engineering") p.set("lane", lane); // preserve if present
    return "?" + p.toString();
  }

  // Wire all [data-route] anchors with full state
  function wireAll(){
    var nodes=document.querySelectorAll("[data-route]");
    for(var i=0;i<nodes.length;i++){
      var el=nodes[i];
      var route=el.getAttribute("data-route")||"";
      if(!route) continue;

      if(route.indexOf("?")!==-1){
        try{
          var u=new URL(route, location.origin);
          var sp=u.searchParams;
          if(!sp.get("lang")) sp.set("lang", lang);
          if(!sp.get("style")) sp.set("style", style);
          if(!sp.get("time")) sp.set("time", time);
          if(!sp.get("depth")) sp.set("depth", depth);
          if(!sp.get("lane") && (lane==="platform"||lane==="engineering")) sp.set("lane", lane);
          el.setAttribute("href", u.pathname + "?" + sp.toString() + (u.hash||""));
        }catch(e){
          el.setAttribute("href", route);
        }
      }else{
        el.setAttribute("href", route + q());
      }
    }
  }

  // Language toggle (reload same pathname)
  function setLang(next){
    if(next!=="en" && next!=="zh" && next!=="es") next="en";
    lang=next;
    try{ LS.setItem("gd_lang",lang); }catch(e){}
    window.location.href = window.location.pathname + q({lang:lang});
  }

  var btnEN=document.getElementById("btnEN");
  var btnZH=document.getElementById("btnZH");
  var btnES=document.getElementById("btnES");
  if(btnEN) btnEN.addEventListener("click", function(){ setLang("en"); }, {passive:true});
  if(btnZH) btnZH.addEventListener("click", function(){ setLang("zh"); }, {passive:true});
  if(btnES) btnES.addEventListener("click", function(){ setLang("es"); }, {passive:true});

  // Header language pills
  var langEN=document.getElementById("langEN");
  var langZH=document.getElementById("langZH");
  var langES=document.getElementById("langES");
  if(langEN) langEN.addEventListener("click", function(){ setLang("en"); }, {passive:true});
  if(langZH) langZH.addEventListener("click", function(){ setLang("zh"); }, {passive:true});
  if(langES) langES.addEventListener("click", function(){ setLang("es"); }, {passive:true});

  // Lens pills
  var lensInformal=document.getElementById("lensInformal");
  var lensFormal=document.getElementById("lensFormal");
  var lensEngineering=document.getElementById("lensEngineering");
  var lensPlatform=document.getElementById("lensPlatform");

  if(lensInformal) lensInformal.addEventListener("click", function(){ setLens("informal"); }, {passive:true});
  if(lensFormal) lensFormal.addEventListener("click", function(){ setLens("formal"); }, {passive:true});
  if(lensEngineering) lensEngineering.addEventListener("click", function(){ setLens("engineering"); }, {passive:true});
  if(lensPlatform) lensPlatform.addEventListener("click", function(){ setLens("platform"); }, {passive:true});

  // Copy helpers
  function P(en,zh,es){ return {en:en, zh:zh, es:es}; }
  function pick(o){ return (lang==="zh")?o.zh:(lang==="es")?(o.es||o.en):o.en; }

  function lensLabel(){
    var k=lensKey();
    if(lang==="zh") return (k==="informal"?"通俗":k==="formal"?"正式":k==="platform"?"平台":"工程");
    if(lang==="es") return (k==="informal"?"INFORMAL":k==="formal"?"FORMAL":k==="platform"?"PLATAFORMA":"INGENIERÍA");
    return (k==="informal"?"INFORMAL":k==="formal"?"FORMAL":k==="platform"?"PLATFORM":"ENGINEERING");
  }

  function paintPills(){
    // language
    langEN.classList.toggle("active", lang==="en");
    langZH.classList.toggle("active", lang==="zh");
    langES.classList.toggle("active", lang==="es");
    // lens
    var k=lensKey();
    lensInformal.classList.toggle("active", k==="informal");
    lensFormal.classList.toggle("active", k==="formal");
    lensPlatform.classList.toggle("active", k==="platform");
    lensEngineering.classList.toggle("active", k==="engineering");
  }

  // Header copy (lens-aware)
  var HEAD={
    en:{
      k:"GAUGES",
      t:"INSTRUMENTATION SPINE",
      sub:{
        informal:"If instability exists, it has a pattern. These instruments help you see that pattern before it becomes collapse.",
        formal:"Measurement surfaces provide bounded outputs under declared scope, with reproducible results and reason codes.",
        platform:"Platform posture: deployable monitoring surfaces for oversight, underwriting, and governance integration.",
        engineering:"Engineering posture: deterministic evaluation, windowed stability analysis, correlation exposure, and collapse boundary detection."
      }
    },
    zh:{
      k:"量规",
      t:"测量主干",
      sub:{
        informal:"只要存在不稳定，就一定有模式。下面仪器让你在崩塌前看见模式。",
        formal:"测量面在声明范围内输出有界、可复现结果，并附原因码。",
        platform:"平台姿态：可部署的监测界面，用于监督、承保与治理集成。",
        engineering:"工程姿态：确定性评估、窗口稳定分析、相关暴露与崩塌边界检测。"
      }
    },
    es:{
      k:"MEDIDORES",
      t:"COLUMNA DE INSTRUMENTACIÓN",
      sub:{
        informal:"Si existe inestabilidad, tiene un patrón. Estos instrumentos lo muestran antes del colapso.",
        formal:"Superficies de medición entregan salidas acotadas bajo alcance declarado, con resultados reproducibles y razones.",
        platform:"Plataforma: superficies desplegables para supervisión, suscripción y gobernanza.",
        engineering:"Ingeniería: evaluación determinista, análisis por ventanas, exposición de correlación y detección de límites de colapso."
      }
    }
  };

  // 7 canonical instruments (each has per-lens content + bullets)
  var INSTRUMENTS=[
    {
      c:"#ff2b2b",
      name:P("SCI · Scalar Coherence Index","SCI · 一致性标量指数","SCI · Índice de coherencia escalar"),
      sub:P("Single number summary + reason code trail.","单值摘要 + 原因码轨迹。","Resumen numérico + rastro de razones."),
      text:{
        informal:P(
          "This gauge answers: “Are we getting more coherent or less coherent?” It’s a calm summary that points you to the next place to look.",
          "这项量规回答：“我们更一致还是更碎？”它给出冷静摘要，并指向下一步要看的地方。",
          "Este medidor responde: “¿Más coherentes o menos?” Es un resumen calmado que te dirige a dónde mirar."
        ),
        formal:P(
          "Produces a bounded scalar under declared scope with reproducible computation and emitted reason codes for state transitions.",
          "在声明范围内输出有界标量，计算可复现，并对状态转移发出原因码。",
          "Produce un escalar acotado bajo alcance declarado con cómputo reproducible y códigos de razón."
        ),
        platform:P(
          "Platform use: quick health indicator for stakeholders. Route to details only when the scalar moves outside bands.",
          "平台用途：给利益相关方一个快速健康指示。只有当指数越界才深入细节。",
          "Uso plataforma: indicador rápido para interesados. Enruta a detalle solo cuando sale de bandas."
        ),
        engineering:P(

  // Apply header copy + localize fixed labels
  function lensLabel(){
    var k=lensKey();
    if(lang==="zh") return (k==="informal"?"通俗":k==="formal"?"正式":k==="platform"?"平台":"工程");
    if(lang==="es") return (k==="informal"?"INFORMAL":k==="formal"?"FORMAL":k==="platform"?"PLATAFORMA":"INGENIERÍA");
    return (k==="informal"?"INFORMAL":k==="formal"?"FORMAL":k==="platform"?"PLATFORM":"ENGINEERING");
  }

  function applyHeader(){
    var H=HEAD[lang] || HEAD.en;
    document.getElementById("hdrK").textContent=H.k;
    document.getElementById("hdrTitle").textContent=H.t;
    document.getElementById("hdrSub").textContent=H.sub[lensKey()] || H.sub.informal;

    // state badge
    document.getElementById("stLangV").textContent = (lang==="zh")?"中文":(lang==="es")?"ES":"EN";
    document.getElementById("stLensV").textContent = lensLabel();

    // top button labels
    if(lang==="zh"){
      document.getElementById("btnDoor").textContent="门";
      document.getElementById("btnHome").textContent="主页";
      document.getElementById("btnLaws").textContent="法则";
      document.getElementById("dockIndex").textContent="索引";
      document.getElementById("dockExplore").textContent="探索";
      document.getElementById("dockProducts").textContent="产品";
      document.getElementById("dockLaws2").textContent="法则";
      document.getElementById("stLang").textContent="语言";
      document.getElementById("stLens").textContent="透镜";
      lensInformal.textContent="通俗";
      lensFormal.textContent="正式";
      lensEngineering.textContent="工程";
      lensPlatform.textContent="平台";
    }else if(lang==="es"){
      document.getElementById("btnDoor").textContent="PUERTA";
      document.getElementById("btnHome").textContent="INICIO";
      document.getElementById("btnLaws").textContent="LEYES";
      document.getElementById("dockIndex").textContent="BRÚJULA";
      document.getElementById("dockExplore").textContent="EXPLORAR";
      document.getElementById("dockProducts").textContent="PRODUCTOS";
      document.getElementById("dockLaws2").textContent="LEYES";
      document.getElementById("stLang").textContent="IDIOMA";
      document.getElementById("stLens").textContent="LENTE";
      lensInformal.textContent="INFORMAL";
      lensFormal.textContent="FORMAL";
      lensEngineering.textContent="INGENIERÍA";
      lensPlatform.textContent="PLATAFORMA";
    }else{
      document.getElementById("btnDoor").textContent="DOOR";
      document.getElementById("btnHome").textContent="HOME";
      document.getElementById("btnLaws").textContent="LAWS";
      document.getElementById("dockIndex").textContent="COMPASS";
      document.getElementById("dockExplore").textContent="EXPLORE";
      document.getElementById("dockProducts").textContent="PRODUCTS";
      document.getElementById("dockLaws2").textContent="LAWS";
      document.getElementById("stLang").textContent="LANG";
      document.getElementById("stLens").textContent="LENS";
      lensInformal.textContent="INFORMAL";
      lensFormal.textContent="FORMAL";
      lensEngineering.textContent="ENGINEERING";
      lensPlatform.textContent="PLATFORM";
    }
  }

  function paintPills(){
    // lang pills
    langEN.classList.toggle("active", lang==="en");
    langZH.classList.toggle("active", lang==="zh");
    langES.classList.toggle("active", lang==="es");

    // lens pills
    var k=lensKey();
    lensInformal.classList.toggle("active", k==="informal");
    lensFormal.classList.toggle("active", k==="formal");
    lensPlatform.classList.toggle("active", k==="platform");
    lensEngineering.classList.toggle("active", k==="engineering");
  }

  // Render instruments (single-open)
  var list=document.getElementById("list");

  function closeAll(){
    var rows=list.querySelectorAll(".row");
    for(var i=0;i<rows.length;i++){
      rows[i].classList.remove("open");
      var c=rows[i].querySelector(".chevTxt");
      if(c) c.textContent="▸";
    }
  }

  function currentText(inst){
    var k=lensKey();
    return (inst.text[k] ? pick(inst.text[k]) : pick(inst.text.informal));
  }
  function currentBullet(inst){
    var k=lensKey();
    return pick(inst.bullets[k] || inst.bullets.informal);
  }

  function makeRow(inst, idx){
    var row=document.createElement("div");
    row.className="row";

    var head=document.createElement("div");
    head.className="head";
    head.setAttribute("role","button");
    head.setAttribute("tabindex","0");

    var tw=document.createElement("div");
    tw.className="titleWrap";

    var title=document.createElement("div");
    title.className="title";
    title.textContent=pick(inst.name);

    var sub=document.createElement("div");
    sub.className="sub";
    sub.textContent=pick(inst.sub);

    tw.appendChild(title);
    tw.appendChild(sub);

    var chev=document.createElement("div");
    chev.className="chev";
    chev.innerHTML='<span class="chevTxt">▸</span>';

    head.appendChild(tw);
    head.appendChild(chev);

    var body=document.createElement("div");
    body.className="body";

    var p1=document.createElement("p");
    p1.className="content";
    p1.textContent=currentText(inst);

    var ul=document.createElement("ul");
    ul.className="ul";
    var li=document.createElement("li");
    li.textContent=currentBullet(inst);
    ul.appendChild(li);

    var actions=document.createElement("div");
    actions.className="actions";
    var a=document.createElement("a");
    a.className="btn red";
    a.textContent = (lang==="zh")?"打开：法则边界":(lang==="es")?"ABRIR: LÍMITES (LEYES)":"OPEN: LAWS BOUNDS";
    a.setAttribute("data-route","/laws/");
    actions.appendChild(a);

    body.appendChild(p1);
    body.appendChild(ul);
    body.appendChild(actions);

    function toggle(){
      var isOpen=row.classList.contains("open");
      if(isOpen){
        row.classList.remove("open");
        row.querySelector(".chevTxt").textContent="▸";
        return;
      }
      closeAll();
      row.classList.add("open");
      row.querySelector(".chevTxt").textContent="▾";
      wireAll();
    }

    head.addEventListener("click", toggle, {passive:true});
    head.addEventListener("keydown", function(e){
      if(e.key==="Enter"||e.key===" "){ e.preventDefault(); toggle(); }
    });

    row.appendChild(head);
    row.appendChild(body);

    if(idx===0){
      row.classList.add("open");
      row.querySelector(".chevTxt").textContent="▾";
    }

    return row;
  }

  function render(){
    paintPills();
    applyHeader();

    list.innerHTML="";
    for(var i=0;i<INSTRUMENTS.length;i++){
      list.appendChild(makeRow(INSTRUMENTS[i], i));
    }
    wireAll();
  }

  // INIT
  render();
})();
