<!doctype html>
<!-- TNT — /products/index.html
     PRODUCTS AUTHORITY — GEM LATTICE REWRITE
     STATUS:
       - full authority rewrite
       - canon state carry preserved
       - gate + now field preserved
       - future routes to /explore/
       - no inline onclick
       - no modals / no overlays
       - gem lattice diamonds replace box shells
       - animation restored on page
       - nutrition line integrated
       - uses ui.css + branch.css only
-->

<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <title>Nine Summits — Products</title>

  <link rel="stylesheet" href="/assets/ui.css"/>
  <link rel="stylesheet" href="/assets/branch.css"/>

  <style>
    a{color:inherit;text-decoration:none}
    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
      color:#fff;
    }
    body::before,body::after{pointer-events:none!important}

    :root{
      --ink:rgba(255,255,255,.96);
      --mut:rgba(255,255,255,.84);
      --mut2:rgba(255,255,255,.72);

      --stroke:rgba(255,255,255,.14);
      --stroke2:rgba(255,255,255,.09);

      --gold:rgba(212,175,55,.56);
      --goldSoft:rgba(212,175,55,.18);
      --goldGlow:rgba(212,175,55,.22);

      --crimson:rgba(120,0,22,.30);
      --festival:rgba(255,43,43,.16);
      --opalV:rgba(90,40,120,.14);
      --ice:rgba(120,180,255,.16);

      --shadowA:0 34px 120px rgba(0,0,0,.58);
      --shadowB:0 20px 70px rgba(0,0,0,.62);
      --shadowC:0 18px 60px rgba(0,0,0,.55);
      --shadowD:0 28px 90px rgba(0,0,0,.72);
    }

    #app-shell{
      position:fixed;
      inset:0;
      overflow:hidden;
      isolation:isolate;
      background:
        radial-gradient(circle at 50% 18%, rgba(120,180,255,.10), transparent 28%),
        radial-gradient(circle at 50% 72%, rgba(120,180,255,.06), transparent 36%),
        linear-gradient(180deg, #030712 0%, #071225 52%, #08101f 100%);
    }

    /* =========================
       BACKDROP
    ========================= */
    .env{
      position:absolute;
      inset:0;
      overflow:hidden;
      z-index:1;
      pointer-events:none;
    }

    .waterfall{
      position:absolute;
      width:120%;
      height:140%;
      left:-10%;
      top:-20%;
      background:
        linear-gradient(
          to bottom,
          rgba(255,255,255,.05),
          rgba(255,255,255,.02),
          transparent 42%
        ),
        radial-gradient(circle at 50% 20%, rgba(255,255,255,.08), transparent 60%);
      animation:flow 12s linear infinite;
      filter:blur(2px);
      opacity:.55;
    }

    .mist{
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 50% 56%, rgba(255,255,255,.08), transparent 70%);
      animation:mist 6s ease-in-out infinite alternate;
      opacity:.7;
    }

    .veil{
      position:absolute;
      inset:-10%;
      background:
        radial-gradient(circle at 25% 35%, rgba(255,255,255,.04), transparent 30%),
        radial-gradient(circle at 72% 52%, rgba(212,175,55,.04), transparent 34%),
        radial-gradient(circle at 46% 74%, rgba(120,180,255,.05), transparent 28%);
      filter:blur(18px);
      opacity:.68;
      animation:veilShift 18s ease-in-out infinite alternate;
    }

    /* =========================
       TOP NAV
    ========================= */
    .top-nav{
      position:fixed;
      left:16px;
      top:16px;
      z-index:30;
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .nav-btn,
    .status-pill{
      min-height:42px;
      padding:10px 14px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.15);
      background:
        radial-gradient(circle at 50% 120%, rgba(212,175,55,.10), transparent 64%),
        rgba(0,0,0,.36);
      color:#fff;
      text-decoration:none;
      font-weight:900;
      font-size:13px;
      letter-spacing:.05em;
      backdrop-filter:blur(8px);
      box-shadow:var(--shadowC);
    }

    .nav-btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      transition:border-color .18s ease, box-shadow .18s ease, filter .18s ease;
    }

    .nav-btn:hover{
      border-color:rgba(212,175,55,.34);
      box-shadow:var(--shadowC), 0 0 18px rgba(212,175,55,.12);
      filter:saturate(1.04);
    }

    .status-pill{
      position:fixed;
      right:16px;
      top:16px;
      z-index:30;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:88px;
    }

    /* =========================
       HERO
    ========================= */
    .hero{
      position:absolute;
      top:9.5%;
      left:50%;
      transform:translateX(-50%);
      width:min(94vw, 980px);
      text-align:center;
      z-index:10;
      pointer-events:none;
    }

    .hero h1{
      margin:0;
      font-size:clamp(40px, 6.2vw, 86px);
      font-weight:950;
      letter-spacing:.05em;
      line-height:.94;
      text-shadow:0 10px 38px rgba(0,0,0,.62);
    }

    .hero p{
      margin:12px 0 0;
      font-size:clamp(15px, 1.9vw, 21px);
      line-height:1.55;
      color:rgba(255,255,255,.86);
      text-shadow:0 8px 24px rgba(0,0,0,.44);
    }

    /* =========================
       STAGE
    ========================= */
    .stage{
      position:absolute;
      inset:0;
      z-index:12;
    }

    /* =========================
       GEM LATTICE SYSTEM
    ========================= */
    .gem-btn{
      position:relative;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      border:0;
      padding:0;
      margin:0;
      background:transparent;
      color:inherit;
      cursor:pointer;
      -webkit-tap-highlight-color:transparent;
      touch-action:manipulation;
    }

    .gem{
      position:absolute;
      inset:0;
      clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%);
      background:
        radial-gradient(circle at 50% 50%, rgba(255,255,255,.08), transparent 44%),
        radial-gradient(circle at 22% 18%, rgba(255,255,255,.18), transparent 26%),
        radial-gradient(circle at 78% 24%, var(--festival), transparent 42%),
        radial-gradient(circle at 72% 82%, var(--opalV), transparent 48%),
        radial-gradient(circle at 32% 82%, var(--ice), transparent 40%),
        linear-gradient(145deg, rgba(10,14,22,.78), rgba(5,8,12,.94));
      box-shadow:
        var(--shadowD),
        0 0 24px rgba(212,175,55,.08),
        inset 0 2px 0 rgba(255,255,255,.10),
        inset 0 -30px 44px rgba(0,0,0,.52);
      overflow:hidden;
      transition:border-color .18s ease, box-shadow .18s ease, filter .18s ease;
    }

    .gem::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        linear-gradient(45deg,
          transparent 0 18%,
          rgba(255,255,255,.08) 18% 18.8%,
          transparent 18.8% 31%,
          rgba(212,175,55,.12) 31% 31.8%,
          transparent 31.8% 50%,
          rgba(255,255,255,.06) 50% 50.8%,
          transparent 50.8% 68%,
          rgba(212,175,55,.10) 68% 68.8%,
          transparent 68.8% 100%
        ),
        linear-gradient(-45deg,
          transparent 0 19%,
          rgba(255,255,255,.06) 19% 19.8%,
          transparent 19.8% 36%,
          rgba(212,175,55,.10) 36% 36.8%,
          transparent 36.8% 58%,
          rgba(255,255,255,.06) 58% 58.8%,
          transparent 58.8% 77%,
          rgba(212,175,55,.08) 77% 77.8%,
          transparent 77.8% 100%
        );
      mix-blend-mode:screen;
      opacity:.78;
      animation:latticeShift 11s linear infinite;
    }

    .gem::after{
      content:"";
      position:absolute;
      inset:8%;
      clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%);
      border:1px solid rgba(212,175,55,.34);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.05),
        0 0 26px rgba(212,175,55,.12);
      animation:innerPulse 4.8s ease-in-out infinite;
    }

    .gem-ring{
      position:absolute;
      inset:-10%;
      clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%);
      border:1px solid rgba(255,255,255,.12);
      box-shadow:
        0 0 42px rgba(212,175,55,.10),
        0 0 90px rgba(212,175,55,.06);
      opacity:.85;
      pointer-events:none;
      animation:ringSpin 24s linear infinite;
    }

    .gem-core{
      position:absolute;
      inset:18%;
      clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%);
      background:
        radial-gradient(circle at 50% 50%, rgba(255,255,255,.10), transparent 56%),
        linear-gradient(145deg, rgba(255,255,255,.04), rgba(0,0,0,.12));
      box-shadow:inset 0 0 18px rgba(255,255,255,.06);
      opacity:.82;
      pointer-events:none;
      animation:coreDrift 8s ease-in-out infinite alternate;
    }

    .gem-btn:hover .gem{
      box-shadow:
        var(--shadowD),
        0 0 20px rgba(212,175,55,.18),
        0 0 40px rgba(212,175,55,.10),
        inset 0 2px 0 rgba(255,255,255,.14),
        inset 0 -30px 44px rgba(0,0,0,.54);
      filter:saturate(1.06);
    }

    .gem-btn:hover .gem-ring{
      box-shadow:
        0 0 56px rgba(212,175,55,.16),
        0 0 110px rgba(212,175,55,.08);
    }

    .gem-label{
      position:relative;
      z-index:3;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:18px;
      text-shadow:0 8px 26px rgba(0,0,0,.55);
      pointer-events:none;
    }

    .gem-title{
      display:block;
      font-weight:950;
      letter-spacing:.12em;
      line-height:1.06;
    }

    .gem-sub{
      display:block;
      margin-top:8px;
      font-size:12px;
      font-weight:800;
      letter-spacing:.08em;
      text-transform:uppercase;
      color:rgba(255,255,255,.74);
      line-height:1.18;
    }

    /* =========================
       GATE MODE
    ========================= */
    .gate{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:min(8vw, 96px);
      padding:0 20px;
    }

    .gate-card{
      width:clamp(168px, 20vw, 248px);
      height:clamp(168px, 20vw, 248px);
    }

    .gate-card .gem-title{
      font-size:clamp(22px, 2.7vw, 34px);
    }

    /* =========================
       NOW FIELD
    ========================= */
    .product-field{
      position:absolute;
      inset:0;
      display:none;
    }

    .product-field.is-active{
      display:block;
    }

    .field-core{
      position:absolute;
      left:50%;
      top:57%;
      transform:translate(-50%,-50%);
      width:min(860px, 90vw);
      height:min(620px, 58vh);
      pointer-events:none;
    }

    .product-node{
      position:absolute;
      width:148px;
      height:148px;
      animation:float 8s ease-in-out infinite alternate;
    }

    .product-node:nth-child(2){animation-duration:9s}
    .product-node:nth-child(3){animation-duration:10s}
    .product-node:nth-child(4){animation-duration:11s}
    .product-node:nth-child(5){animation-duration:9.5s}

    .product-node .gem-title{
      font-size:13px;
    }

    .product-node .gem-sub{
      font-size:10px;
      margin-top:6px;
    }

    .product-node.is-core{
      width:170px;
      height:170px;
      z-index:2;
    }

    .product-node.is-core .gem-title{
      font-size:15px;
    }

    /* field positions */
    .node-sideai{left:4%; top:8%}
    .node-energy{right:6%; top:10%}
    .node-education{right:18%; bottom:6%}
    .node-governance{left:18%; bottom:2%}
    .node-nutrition{left:50%; top:50%; transform:translate(-50%,-50%)}

    /* =========================
       ANIMATION
    ========================= */
    @keyframes flow{
      from{transform:translateY(-5%)}
      to{transform:translateY(5%)}
    }

    @keyframes mist{
      from{opacity:.4}
      to{opacity:.7}
    }

    @keyframes veilShift{
      from{transform:translate3d(-2%, -1%, 0) scale(1)}
      to{transform:translate3d(2%, 1%, 0) scale(1.04)}
    }

    @keyframes float{
      from{transform:translateY(-10px)}
      to{transform:translateY(10px)}
    }

    @keyframes latticeShift{
      from{transform:translate3d(-2%,0,0)}
      to{transform:translate3d(2%,0,0)}
    }

    @keyframes innerPulse{
      0%,100%{opacity:.82}
      50%{opacity:1}
    }

    @keyframes ringSpin{
      from{transform:rotate(0deg)}
      to{transform:rotate(360deg)}
    }

    @keyframes coreDrift{
      from{transform:translateY(-2px)}
      to{transform:translateY(2px)}
    }

    /* =========================
       MOBILE
    ========================= */
    @media (max-width:780px){
      .hero{
        top:12%;
        width:min(92vw, 700px);
      }

      .gate{
        gap:40px;
      }

      .field-core{
        width:min(92vw, 620px);
        height:min(560px, 54vh);
        top:59%;
      }

      .product-node{
        width:124px;
        height:124px;
      }

      .product-node.is-core{
        width:146px;
        height:146px;
      }

      .product-node .gem-title{
        font-size:11px;
      }

      .product-node.is-core .gem-title{
        font-size:13px;
      }

      .node-sideai{left:2%; top:10%}
      .node-energy{right:2%; top:14%}
      .node-education{right:12%; bottom:10%}
      .node-governance{left:12%; bottom:4%}
    }

    @media (max-width:560px){
      .top-nav{
        gap:8px;
      }

      .nav-btn{
        min-height:40px;
        padding:9px 12px;
        font-size:12px;
      }

      .status-pill{
        min-height:40px;
        padding:9px 12px;
        font-size:12px;
      }

      .hero{
        top:14%;
      }

      .hero p{
        font-size:15px;
      }

      .gate{
        flex-direction:column;
        gap:64px;
        justify-content:center;
      }

      .gate-card{
        width:172px;
        height:172px;
      }

      .field-core{
        width:min(94vw, 360px);
        height:430px;
        top:61%;
      }

      .product-node{
        width:108px;
        height:108px;
      }

      .product-node.is-core{
        width:124px;
        height:124px;
      }

      .node-sideai{left:0%; top:4%}
      .node-energy{right:0%; top:14%}
      .node-education{right:4%; bottom:16%}
      .node-governance{left:4%; bottom:8%}
    }
  </style>
</head>

<body>
  <div id="app-shell">
    <div class="env" aria-hidden="true">
      <div class="waterfall"></div>
      <div class="mist"></div>
      <div class="veil"></div>
    </div>

    <nav class="top-nav" aria-label="Primary">
      <a class="nav-btn" id="navCompass" href="/index.html" data-route="/index.html">COMPASS</a>
      <a class="nav-btn" id="navProducts" href="/products/" data-route="/products/">PRODUCTS</a>
      <a class="nav-btn" id="navExplore" href="/explore/" data-route="/explore/">EXPLORE</a>
      <a class="nav-btn" id="navGauges" href="/gauges/" data-route="/gauges/">GAUGES</a>
    </nav>

    <div class="status-pill" id="statusPill">GATE</div>

    <section class="hero" aria-label="Products hero">
      <h1 id="heroTitle">PRODUCTS</h1>
      <p id="heroTag">Choose your path. What exists now, or what is being built next.</p>
    </section>

    <section class="stage" aria-label="Products authority">
      <div class="gate" id="gate" aria-label="Gateway choices">
        <button class="gem-btn gate-card" id="enterNow" type="button" aria-label="Enter available products">
          <div class="gem-ring"></div>
          <div class="gem"></div>
          <div class="gem-core"></div>
          <div class="gem-label">
            <span class="gem-title" id="nowLabel">NOW</span>
            <span class="gem-sub" id="nowSub">AVAILABLE SURFACE</span>
          </div>
        </button>

        <button class="gem-btn gate-card" id="enterFuture" type="button" aria-label="Enter future products">
          <div class="gem-ring"></div>
          <div class="gem"></div>
          <div class="gem-core"></div>
          <div class="gem-label">
            <span class="gem-title" id="futureLabel">FUTURE</span>
            <span class="gem-sub" id="futureSub">EXPANSION PATH</span>
          </div>
        </button>
      </div>

      <section class="product-field" id="field" aria-label="Product field">
        <div class="field-core">
          <button class="gem-btn product-node node-sideai" data-route="/products/on-your-side-ai/" type="button" aria-label="On Your Side AI">
            <div class="gem-ring"></div>
            <div class="gem"></div>
            <div class="gem-core"></div>
            <div class="gem-label">
              <span class="gem-title" id="labelSide">ON YOUR SIDE AI</span>
              <span class="gem-sub" id="subSide">RELATIONAL INTELLIGENCE</span>
            </div>
          </button>

          <button class="gem-btn product-node node-energy" data-route="/products/energy/" type="button" aria-label="Energy">
            <div class="gem-ring"></div>
            <div class="gem"></div>
            <div class="gem-core"></div>
            <div class="gem-label">
              <span class="gem-title" id="labelEnergy">ENERGY</span>
              <span class="gem-sub" id="subEnergy">SYSTEM OUTPUT</span>
            </div>
          </button>

          <button class="gem-btn product-node node-education" data-route="/products/education/" type="button" aria-label="Education">
            <div class="gem-ring"></div>
            <div class="gem"></div>
            <div class="gem-core"></div>
            <div class="gem-label">
              <span class="gem-title" id="labelEducation">EDUCATION</span>
              <span class="gem-sub" id="subEducation">LANGUAGE SYSTEMS</span>
            </div>
          </button>

          <button class="gem-btn product-node node-governance" data-route="/products/governance/" type="button" aria-label="Governance">
            <div class="gem-ring"></div>
            <div class="gem"></div>
            <div class="gem-core"></div>
            <div class="gem-label">
              <span class="gem-title" id="labelGovernance">GOVERNANCE</span>
              <span class="gem-sub" id="subGovernance">SCALING RULES</span>
            </div>
          </button>

          <button class="gem-btn product-node is-core node-nutrition" data-route="/products/nutrition/" type="button" aria-label="Nutrition">
            <div class="gem-ring"></div>
            <div class="gem"></div>
            <div class="gem-core"></div>
            <div class="gem-label">
              <span class="gem-title" id="labelNutrition">NUTRITION</span>
              <span class="gem-sub" id="subNutrition">BASELINE SYSTEM</span>
            </div>
          </button>
        </div>
      </section>
    </section>
  </div>

  <script type="module">
    (function(){
      "use strict";

      const qs = new URLSearchParams(location.search);
      const LS = window.localStorage;

      let lang  = qs.get("lang")  || LS.getItem("gd_lang")  || "en";
      let style = qs.get("style") || LS.getItem("gd_style") || "informal";
      let time  = qs.get("time")  || LS.getItem("gd_time")  || "now";
      let depth = qs.get("depth") || LS.getItem("gd_depth") || "1";
      let lane  = qs.get("lane")  || "";
      let view  = qs.get("view")  || "gate";

      if(lang!=="en" && lang!=="zh" && lang!=="es") lang="en";
      if(style!=="informal" && style!=="formal") style="informal";
      if(time!=="origin" && time!=="now" && time!=="post") time="now";

      let d = parseInt(depth,10);
      if(!isFinite(d)) d = 1;
      if(d < 1) d = 1;
      if(d > 9) d = 9;
      depth = String(d);

      if(lane!=="platform" && lane!=="engineering") lane = "";
      if(view!=="gate" && view!=="now") view = "gate";

      try{
        LS.setItem("gd_lang", lang);
        LS.setItem("gd_style", style);
        LS.setItem("gd_time", time);
        LS.setItem("gd_depth", depth);
      }catch(e){}

      document.documentElement.lang = (lang==="zh") ? "zh" : (lang==="es" ? "es" : "en");

      function buildQuery(extra){
        const p = new URLSearchParams();
        p.set("lang", (extra && extra.lang) ? extra.lang : lang);
        p.set("style", (extra && extra.style) ? extra.style : style);
        p.set("time", (extra && extra.time) ? extra.time : time);
        p.set("depth", (extra && extra.depth) ? String(extra.depth) : depth);
        p.set("view", (extra && extra.view) ? extra.view : view);

        const resolvedLane = (extra && extra.lane) ? extra.lane : lane;
        if(resolvedLane === "platform" || resolvedLane === "engineering"){
          p.set("lane", resolvedLane);
        }

        return "?" + p.toString();
      }

      function withState(route, extra){
        const glue = route.includes("?") ? "&" : "?";
        return route + glue + buildQuery(extra).slice(1);
      }

      function wireRoutes(){
        const nodes = document.querySelectorAll("[data-route]");
        for(let i=0;i<nodes.length;i+=1){
          const el = nodes[i];
          const route = el.getAttribute("data-route") || "";
          if(!route) continue;
          if(el.tagName === "A"){
            el.setAttribute("href", withState(route));
          }
        }
      }

      function P(en, zh, es){
        return { en, zh, es };
      }

      function pick(o){
        return (lang==="zh") ? o.zh : (lang==="es" ? o.es : o.en);
      }

      const COPY = {
        heroTitle: P("PRODUCTS","产品","PRODUCTOS"),
        heroTag: P(
          "Choose your path. What exists now, or what is being built next.",
          "选择你的路径。选择现在存在的，或正在构建的下一层。",
          "Elige tu camino. Lo que existe ahora, o lo que se está construyendo después."
        ),
        navCompass: P("COMPASS","指南针","BRÚJULA"),
        navProducts: P("PRODUCTS","产品","PRODUCTOS"),
        navExplore: P("EXPLORE","探索","EXPLORAR"),
        navGauges: P("GAUGES","量规","MEDIDORES"),

        gate: P("GATE","闸门","PUERTA"),
        now: P("NOW","现在","AHORA"),
        future: P("FUTURE","未来","FUTURO"),
        nowSub: P("AVAILABLE SURFACE","可用界面","SUPERFICIE DISPONIBLE"),
        futureSub: P("EXPANSION PATH","扩展路径","RUTA DE EXPANSIÓN"),

        side: P("ON YOUR SIDE AI","站你这边 AI","ON YOUR SIDE AI"),
        sideSub: P("RELATIONAL INTELLIGENCE","关系智能","INTELIGENCIA RELACIONAL"),

        energy: P("ENERGY","能源","ENERGÍA"),
        energySub: P("SYSTEM OUTPUT","系统输出","SALIDA DEL SISTEMA"),

        education: P("EDUCATION","教育","EDUCACIÓN"),
        educationSub: P("LANGUAGE SYSTEMS","语言系统","SISTEMAS DE LENGUAJE"),

        governance: P("GOVERNANCE","治理","GOBERNANZA"),
        governanceSub: P("SCALING RULES","扩展规则","REGLAS DE ESCALA"),

        nutrition: P("NUTRITION","营养","NUTRICIÓN"),
        nutritionSub: P("BASELINE SYSTEM","基线系统","SISTEMA BASELINE")
      };

      document.getElementById("heroTitle").textContent = pick(COPY.heroTitle);
      document.getElementById("heroTag").textContent = pick(COPY.heroTag);

      document.getElementById("navCompass").textContent = pick(COPY.navCompass);
      document.getElementById("navProducts").textContent = pick(COPY.navProducts);
      document.getElementById("navExplore").textContent = pick(COPY.navExplore);
      document.getElementById("navGauges").textContent = pick(COPY.navGauges);

      document.getElementById("nowLabel").textContent = pick(COPY.now);
      document.getElementById("futureLabel").textContent = pick(COPY.future);
      document.getElementById("nowSub").textContent = pick(COPY.nowSub);
      document.getElementById("futureSub").textContent = pick(COPY.futureSub);

      document.getElementById("labelSide").textContent = pick(COPY.side);
      document.getElementById("subSide").textContent = pick(COPY.sideSub);

      document.getElementById("labelEnergy").textContent = pick(COPY.energy);
      document.getElementById("subEnergy").textContent = pick(COPY.energySub);

      document.getElementById("labelEducation").textContent = pick(COPY.education);
      document.getElementById("subEducation").textContent = pick(COPY.educationSub);

      document.getElementById("labelGovernance").textContent = pick(COPY.governance);
      document.getElementById("subGovernance").textContent = pick(COPY.governanceSub);

      document.getElementById("labelNutrition").textContent = pick(COPY.nutrition);
      document.getElementById("subNutrition").textContent = pick(COPY.nutritionSub);

      wireRoutes();

      const gate = document.getElementById("gate");
      const field = document.getElementById("field");
      const statusPill = document.getElementById("statusPill");
      const enterNowButton = document.getElementById("enterNow");
      const enterFutureButton = document.getElementById("enterFuture");
      const productNodes = Array.from(document.querySelectorAll(".product-node"));

      function syncView(nextView){
        view = nextView === "now" ? "now" : "gate";

        if(view === "now"){
          gate.style.display = "none";
          field.classList.add("is-active");
          statusPill.textContent = pick(COPY.now);
        }else{
          gate.style.display = "flex";
          field.classList.remove("is-active");
          statusPill.textContent = pick(COPY.gate);
        }

        history.replaceState({}, "", location.pathname + buildQuery({ view:view }));
      }

      function navigateTo(path){
        window.location.href = withState(path, { view:view });
      }

      enterNowButton.addEventListener("click", function(){
        syncView("now");
      }, { passive:true });

      enterFutureButton.addEventListener("click", function(){
        navigateTo("/explore/");
      }, { passive:true });

      for(let i=0;i<productNodes.length;i+=1){
        const node = productNodes[i];
        const route = node.getAttribute("data-route") || "/products/";
        node.addEventListener("click", function(){
          navigateTo(route);
        }, { passive:true });
      }

      syncView(view);
    })();
  </script>
</body>
</html>
