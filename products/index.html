<!doctype html>
<!-- TNT — /products/index.html
     PRODUCTS AUTHORITY — DUAL STRUCTURE
     MODES:
       - FLAT  = packed blue gem lattice authority
       - ROUND = floating compass-gem hybrid authority
     LOCKS:
       - canon state carry: gd_lang/gd_style/gd_time/gd_depth only
       - lane is URL-only
       - mode is URL-only
       - no inline onclick
       - no modals / no overlays
       - all product buttons route
       - nutrition installed as center authority
       - waterfall atmosphere behind content
-->

<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <title>Nine Summits — Products</title>

  <link rel="stylesheet" href="/assets/ui.css"/>
  <link rel="stylesheet" href="/assets/branch.css"/>

  <style>
    a{color:inherit;text-decoration:none}
    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
      color:#fff;
    }
    body::before,body::after{pointer-events:none!important}

    :root{
      --ink:rgba(255,255,255,.96);
      --mut:rgba(255,255,255,.84);
      --mut2:rgba(255,255,255,.72);

      --stroke:rgba(255,255,255,.14);
      --stroke2:rgba(255,255,255,.08);

      --gold:rgba(212,175,55,.56);
      --goldSoft:rgba(212,175,55,.18);
      --goldGlow:rgba(212,175,55,.22);

      --crimson:rgba(120,0,22,.28);
      --festival:rgba(255,43,43,.14);
      --opalV:rgba(90,40,120,.12);

      --shadowA:0 36px 120px rgba(0,0,0,.58);
      --shadowB:0 20px 70px rgba(0,0,0,.62);
      --shadowC:0 18px 60px rgba(0,0,0,.55);
    }

    #app-shell{
      position:fixed;
      inset:0;
      overflow:hidden;
      isolation:isolate;
      background:
        radial-gradient(circle at 50% 18%, rgba(120,180,255,.12), transparent 28%),
        radial-gradient(circle at 50% 72%, rgba(120,180,255,.08), transparent 36%),
        linear-gradient(180deg, #030712 0%, #071225 52%, #08101f 100%);
    }

    /* =========================
       ATMOSPHERE
    ========================= */
    .env{
      position:absolute;
      inset:0;
      overflow:hidden;
      z-index:1;
      pointer-events:none;
    }

    .waterfall{
      position:absolute;
      inset:-18% -10%;
      background:
        linear-gradient(
          to bottom,
          rgba(255,255,255,.05) 0%,
          rgba(255,255,255,.02) 16%,
          rgba(120,180,255,.06) 34%,
          rgba(255,255,255,.01) 52%,
          transparent 72%
        ),
        radial-gradient(circle at 50% 24%, rgba(255,255,255,.08), transparent 44%),
        radial-gradient(circle at 50% 52%, rgba(120,180,255,.10), transparent 42%);
      filter:blur(2px);
      opacity:.78;
      animation:flow 12s linear infinite;
    }

    .mist{
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 50% 58%, rgba(255,255,255,.08), transparent 58%),
        radial-gradient(circle at 50% 72%, rgba(120,180,255,.10), transparent 42%);
      opacity:.72;
      animation:mist 6s ease-in-out infinite alternate;
    }

    .stars{
      position:absolute;
      inset:-8%;
      opacity:.72;
      background-image:
        radial-gradient(circle at 14% 22%, rgba(255,255,255,.96) 0 1.2px, transparent 1.8px),
        radial-gradient(circle at 34% 16%, rgba(255,255,255,.80) 0 1px, transparent 1.7px),
        radial-gradient(circle at 58% 26%, rgba(255,255,255,.95) 0 1.2px, transparent 1.8px),
        radial-gradient(circle at 76% 18%, rgba(255,255,255,.75) 0 1px, transparent 1.7px),
        radial-gradient(circle at 22% 66%, rgba(255,255,255,.82) 0 1px, transparent 1.7px),
        radial-gradient(circle at 44% 72%, rgba(255,255,255,.96) 0 1.2px, transparent 1.8px),
        radial-gradient(circle at 66% 70%, rgba(255,255,255,.78) 0 1px, transparent 1.7px),
        radial-gradient(circle at 84% 62%, rgba(255,255,255,.92) 0 1.2px, transparent 1.8px);
      filter:blur(.2px);
      animation:drift 34s linear infinite;
    }

    /* =========================
       TOP NAV
    ========================= */
    .top-nav{
      position:fixed;
      left:16px;
      top:16px;
      z-index:30;
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .top-right{
      position:fixed;
      right:16px;
      top:16px;
      z-index:30;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:flex-end;
      align-items:center;
    }

    .nav-btn,
    .top-pill{
      min-height:42px;
      padding:10px 14px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.15);
      background:
        radial-gradient(circle at 50% 120%, rgba(212,175,55,.12), transparent 64%),
        radial-gradient(circle at 18% 18%, rgba(255,255,255,.14), transparent 42%),
        linear-gradient(145deg, rgba(10,12,20,.48), rgba(4,6,10,.62));
      color:#fff;
      font-weight:900;
      font-size:13px;
      letter-spacing:.05em;
      backdrop-filter:blur(10px);
      box-shadow:var(--shadowC);
      position:relative;
      overflow:hidden;
    }

    .nav-btn,
    .top-pill{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      -webkit-tap-highlight-color:transparent;
      touch-action:manipulation;
      transition:border-color .18s ease, box-shadow .18s ease, filter .18s ease;
    }

    .nav-btn::after,
    .top-pill::after{
      content:"";
      position:absolute;
      left:10px;
      right:10px;
      bottom:-12px;
      height:26px;
      background:radial-gradient(circle at 50% 0%, rgba(212,175,55,.26), transparent 72%);
      opacity:.58;
      pointer-events:none;
    }

    .nav-btn:hover,
    .top-pill:hover{
      border-color:rgba(212,175,55,.38);
      box-shadow:var(--shadowC),0 0 18px rgba(212,175,55,.14);
      filter:saturate(1.04);
    }

    .top-pill.active{
      border-color:rgba(212,175,55,.54);
      box-shadow:var(--shadowC),0 0 22px rgba(212,175,55,.18);
    }

    /* =========================
       HERO
    ========================= */
    .hero{
      position:absolute;
      top:10%;
      left:50%;
      transform:translateX(-50%);
      width:min(94vw,980px);
      text-align:center;
      z-index:10;
      pointer-events:none;
    }

    .hero h1{
      margin:0;
      font-size:clamp(40px,6.2vw,86px);
      font-weight:950;
      letter-spacing:.05em;
      line-height:.94;
      text-shadow:0 10px 38px rgba(0,0,0,.62);
    }

    .hero p{
      margin:12px 0 0;
      font-size:clamp(15px,1.9vw,21px);
      line-height:1.55;
      color:rgba(255,255,255,.88);
      text-shadow:0 8px 24px rgba(0,0,0,.44);
    }

    .status-pill{
      position:fixed;
      right:16px;
      bottom:16px;
      z-index:30;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:80px;
      min-height:42px;
      padding:10px 14px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.15);
      background:
        radial-gradient(circle at 50% 120%, rgba(212,175,55,.12), transparent 64%),
        rgba(0,0,0,.36);
      color:#fff;
      font-weight:900;
      font-size:13px;
      letter-spacing:.05em;
      backdrop-filter:blur(8px);
      box-shadow:var(--shadowC);
    }

    /* =========================
       STAGE
    ========================= */
    .stage{
      position:absolute;
      inset:0;
      z-index:12;
    }

    .mode-panel{
      position:absolute;
      inset:0;
      display:none;
    }

    .mode-panel.is-active{
      display:block;
    }

    /* =========================
       FLAT MODE — PACKED BLUE
    ========================= */
    .flat-core{
      position:absolute;
      left:50%;
      top:57%;
      transform:translate(-50%,-50%);
      width:min(920px,88vw);
      height:min(620px,58vh);
      pointer-events:none;
    }

    .flat-node{
      position:absolute;
      border:0;
      background:transparent;
      color:inherit;
      padding:0;
      cursor:pointer;
      pointer-events:auto;
      -webkit-tap-highlight-color:transparent;
      touch-action:manipulation;
    }

    .flat-node.center{
      width:240px;
      height:240px;
      left:50%;
      top:50%;
      margin-left:-120px;
      margin-top:-120px;
      z-index:4;
    }

    .flat-node.small{
      width:176px;
      height:176px;
      z-index:3;
    }

    .flat-node.n1{left:50%;top:4%;margin-left:-88px}
    .flat-node.n2{right:8%;top:50%;margin-top:-88px}
    .flat-node.n3{left:50%;bottom:4%;margin-left:-88px}
    .flat-node.n4{left:8%;top:50%;margin-top:-88px}

    .flat-shell{
      position:absolute;
      inset:0;
      transform:rotate(45deg);
      border-radius:26px;
      border:2px solid rgba(255,255,255,.32);
      background:
        radial-gradient(circle at 22% 18%, rgba(255,255,255,.20), transparent 24%),
        radial-gradient(circle at 80% 22%, rgba(255,43,43,.14), transparent 58%),
        radial-gradient(circle at 28% 82%, rgba(120,0,22,.16), transparent 68%),
        radial-gradient(circle at 50% 58%, rgba(80,180,255,.28), transparent 44%),
        linear-gradient(145deg, rgba(26,42,84,.98), rgba(16,24,46,.98));
      box-shadow:
        0 24px 60px rgba(0,0,0,.34),
        0 0 0 1px rgba(255,255,255,.06) inset,
        0 0 20px rgba(120,180,255,.12);
      overflow:hidden;
      transition:border-color .18s ease, box-shadow .18s ease, filter .18s ease;
    }

    .flat-shell::before{
      content:"";
      position:absolute;
      inset:10px;
      border-radius:20px;
      border:1px solid rgba(212,175,55,.52);
      opacity:.92;
      pointer-events:none;
    }

    .flat-shell::after{
      content:"";
      position:absolute;
      inset:0;
      border-radius:26px;
      pointer-events:none;
      background:
        linear-gradient(90deg, transparent 0 14%, rgba(255,255,255,.10) 14% 15%, transparent 15% 33%, rgba(255,255,255,.08) 33% 34%, transparent 34% 100%),
        linear-gradient(180deg, transparent 0 18%, rgba(255,255,255,.08) 18% 19%, transparent 19% 48%, rgba(255,255,255,.06) 48% 49%, transparent 49% 100%);
      opacity:.40;
      mix-blend-mode:screen;
    }

    .flat-node:hover .flat-shell{
      border-color:rgba(212,175,55,.52);
      box-shadow:
        0 28px 66px rgba(0,0,0,.40),
        0 0 24px rgba(212,175,55,.16),
        0 0 18px rgba(120,180,255,.18);
      filter:saturate(1.06);
    }

    .flat-label{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      flex-direction:column;
      text-align:center;
      padding:18px;
      z-index:2;
      pointer-events:none;
      text-shadow:0 8px 22px rgba(0,0,0,.55);
    }

    .flat-title{
      font-size:clamp(18px,2vw,28px);
      line-height:1.02;
      font-weight:950;
      letter-spacing:.05em;
    }

    .flat-node.small .flat-title{
      font-size:clamp(15px,1.5vw,22px);
    }

    .flat-sub{
      margin-top:10px;
      font-size:clamp(11px,1vw,15px);
      line-height:1.2;
      font-weight:900;
      letter-spacing:.08em;
      color:rgba(255,255,255,.88);
      text-transform:uppercase;
    }

    .flat-outline{
      position:absolute;
      left:50%;
      top:50%;
      width:min(760px,74vw);
      height:min(760px,74vw);
      transform:translate(-50%,-50%) rotate(45deg);
      border:2px solid rgba(255,255,255,.14);
      border-radius:40px;
      opacity:.46;
      pointer-events:none;
      z-index:1;
    }

    /* =========================
       ROUND MODE — FLOATING COMPASS-GEM
    ========================= */
    .round-core{
      position:absolute;
      left:50%;
      top:58%;
      transform:translate(-50%,-50%);
      width:min(980px,90vw);
      height:min(650px,60vh);
      pointer-events:none;
    }

    .round-node{
      position:absolute;
      border:0;
      background:transparent;
      color:inherit;
      padding:0;
      cursor:pointer;
      pointer-events:auto;
      -webkit-tap-highlight-color:transparent;
      touch-action:manipulation;
      animation:float 7.5s ease-in-out infinite alternate;
    }

    .round-node.center{
      width:250px;
      height:250px;
      left:50%;
      top:50%;
      margin-left:-125px;
      margin-top:-125px;
      z-index:4;
      animation-duration:8.8s;
    }

    .round-node.small{
      width:178px;
      height:178px;
      z-index:3;
    }

    .round-node.r1{left:50%;top:2%;margin-left:-89px;animation-duration:7.2s}
    .round-node.r2{right:8%;top:50%;margin-top:-89px;animation-duration:8.2s}
    .round-node.r3{left:50%;bottom:2%;margin-left:-89px;animation-duration:9s}
    .round-node.r4{left:8%;top:50%;margin-top:-89px;animation-duration:7.8s}

    .round-shadow{
      position:absolute;
      left:14%;
      right:14%;
      bottom:10%;
      height:18%;
      border-radius:999px;
      background:radial-gradient(circle at 50% 50%, rgba(0,0,0,.34), transparent 72%);
      filter:blur(10px);
      opacity:.88;
      pointer-events:none;
      z-index:0;
    }

    .round-shell{
      position:absolute;
      inset:0;
      transform:rotate(45deg);
      border-radius:28px;
      border:2px solid rgba(255,255,255,.32);
      background:
        radial-gradient(circle at 22% 18%, rgba(255,255,255,.26), transparent 22%),
        radial-gradient(circle at 80% 22%, rgba(255,43,43,.18), transparent 58%),
        radial-gradient(circle at 50% 82%, rgba(90,40,120,.18), transparent 64%),
        radial-gradient(circle at 50% 58%, rgba(80,180,255,.22), transparent 42%),
        linear-gradient(145deg, rgba(28,38,84,.98), rgba(18,22,48,.98));
      box-shadow:
        0 30px 72px rgba(0,0,0,.42),
        0 0 18px rgba(120,180,255,.12),
        inset 0 0 0 1px rgba(255,255,255,.06);
      overflow:hidden;
      transition:border-color .18s ease, box-shadow .18s ease, filter .18s ease;
    }

    .round-shell::before{
      content:"";
      position:absolute;
      inset:10px;
      border-radius:22px;
      border:1px solid rgba(212,175,55,.50);
      pointer-events:none;
      opacity:.96;
    }

    .round-shell::after{
      content:"";
      position:absolute;
      inset:0;
      border-radius:28px;
      pointer-events:none;
      background:
        linear-gradient(90deg, transparent 0 18%, rgba(255,255,255,.06) 18% 19%, transparent 19% 50%, rgba(255,255,255,.06) 50% 51%, transparent 51% 82%, rgba(255,255,255,.06) 82% 83%, transparent 83% 100%),
        linear-gradient(180deg, transparent 0 18%, rgba(255,255,255,.06) 18% 19%, transparent 19% 50%, rgba(255,255,255,.06) 50% 51%, transparent 51% 82%, rgba(255,255,255,.06) 82% 83%, transparent 83% 100%);
      opacity:.38;
      mix-blend-mode:screen;
    }

    .compass-core{
      position:absolute;
      inset:22%;
      transform:rotate(45deg);
      border-radius:20px;
      border:1px solid rgba(255,255,255,.18);
      background:
        radial-gradient(circle at 50% 50%, rgba(255,255,255,.05), transparent 52%),
        linear-gradient(145deg, rgba(20,28,62,.12), rgba(8,10,22,.02));
      pointer-events:none;
      opacity:.58;
    }

    .compass-core::before,
    .compass-core::after{
      content:"";
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%);
      background:rgba(255,255,255,.16);
      border-radius:999px;
    }

    .compass-core::before{
      width:1px;
      height:92%;
    }

    .compass-core::after{
      width:92%;
      height:1px;
    }

    .round-node:hover .round-shell{
      border-color:rgba(212,175,55,.56);
      box-shadow:
        0 34px 78px rgba(0,0,0,.46),
        0 0 22px rgba(212,175,55,.18),
        0 0 18px rgba(120,180,255,.20);
      filter:saturate(1.08);
    }

    .round-label{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      flex-direction:column;
      text-align:center;
      padding:18px;
      z-index:2;
      pointer-events:none;
      text-shadow:0 8px 22px rgba(0,0,0,.55);
    }

    .round-title{
      font-size:clamp(18px,2vw,28px);
      line-height:1.02;
      font-weight:950;
      letter-spacing:.05em;
    }

    .round-node.small .round-title{
      font-size:clamp(15px,1.5vw,22px);
    }

    .round-sub{
      margin-top:10px;
      font-size:clamp(11px,1vw,15px);
      line-height:1.2;
      font-weight:900;
      letter-spacing:.08em;
      color:rgba(255,255,255,.88);
      text-transform:uppercase;
    }

    /* =========================
       MOTION
    ========================= */
    @keyframes flow{
      from{transform:translateY(-5%)}
      to{transform:translateY(5%)}
    }

    @keyframes mist{
      from{opacity:.42}
      to{opacity:.72}
    }

    @keyframes drift{
      from{transform:translate3d(-1.2%, -0.8%, 0)}
      to{transform:translate3d(1.2%, 0.8%, 0)}
    }

    @keyframes float{
      from{transform:translateY(-10px)}
      to{transform:translateY(10px)}
    }

    /* =========================
       MOBILE
    ========================= */
    @media (max-width:820px){
      .hero{
        top:12%;
        width:min(92vw,700px);
      }

      .flat-core,
      .round-core{
        width:min(94vw,620px);
        height:min(620px,54vh);
      }

      .flat-node.center,
      .round-node.center{
        width:220px;
        height:220px;
        margin-left:-110px;
        margin-top:-110px;
      }

      .flat-node.small,
      .round-node.small{
        width:154px;
        height:154px;
      }

      .flat-node.n1,.round-node.r1{margin-left:-77px}
      .flat-node.n3,.round-node.r3{margin-left:-77px}
      .flat-node.n2,.round-node.r2{margin-top:-77px}
      .flat-node.n4,.round-node.r4{margin-top:-77px}
    }

    @media (max-width:560px){
      .top-nav{
        gap:8px;
      }

      .nav-btn,
      .top-pill{
        min-height:40px;
        padding:9px 12px;
        font-size:12px;
      }

      .hero{
        top:14%;
      }

      .hero p{
        font-size:15px;
      }

      .flat-core,
      .round-core{
        width:min(96vw,390px);
        height:460px;
      }

      .flat-node.center,
      .round-node.center{
        width:182px;
        height:182px;
        margin-left:-91px;
        margin-top:-91px;
      }

      .flat-node.small,
      .round-node.small{
        width:126px;
        height:126px;
      }

      .flat-node.n1,.round-node.r1{top:4%;margin-left:-63px}
      .flat-node.n2,.round-node.r2{right:0%;margin-top:-63px}
      .flat-node.n3,.round-node.r3{bottom:4%;margin-left:-63px}
      .flat-node.n4,.round-node.r4{left:0%;margin-top:-63px}

      .flat-title,.round-title{
        font-size:18px;
      }

      .flat-node.small .flat-title,
      .round-node.small .round-title{
        font-size:14px;
      }

      .flat-sub,.round-sub{
        font-size:10px;
      }
    }
  </style>
</head>

<body>
  <div id="app-shell">
    <div class="env" aria-hidden="true">
      <div class="waterfall"></div>
      <div class="mist"></div>
      <div class="stars"></div>
    </div>

    <nav class="top-nav" aria-label="Primary">
      <a class="nav-btn" id="navCompass" href="/index.html" data-route="/index.html">COMPASS</a>
      <a class="nav-btn" id="navProducts" href="/products/" data-route="/products/">PRODUCTS</a>
      <a class="nav-btn" id="navExplore" href="/explore/" data-route="/explore/">EXPLORE</a>
      <a class="nav-btn" id="navGauges" href="/gauges/" data-route="/gauges/">GAUGES</a>
    </nav>

    <div class="top-right" aria-label="Mode toggle">
      <button class="top-pill" id="modeFlat" type="button">FLAT</button>
      <button class="top-pill" id="modeRound" type="button">ROUND</button>
    </div>

    <section class="hero" aria-label="Products hero">
      <h1 id="heroTitle">PRODUCTS</h1>
      <p id="heroTag">Choose your path. What exists now, or what is being built next.</p>
    </section>

    <div class="status-pill" id="statusPill">FLAT</div>

    <section class="stage" aria-label="Products authority">

      <div class="mode-panel" id="flatPanel" aria-label="Flat authority">
        <div class="flat-core">
          <div class="flat-outline" aria-hidden="true"></div>

          <button class="flat-node center" data-route="/products/nutrition/" type="button" aria-label="Nutrition">
            <div class="flat-shell"></div>
            <div class="flat-label">
              <div class="flat-title" id="flatNutritionTitle">NUTRITION</div>
              <div class="flat-sub" id="flatNutritionSub">BASELINE SYSTEM</div>
            </div>
          </button>

          <button class="flat-node small n1" data-route="/products/on-your-side-ai/" type="button" aria-label="On Your Side AI">
            <div class="flat-shell"></div>
            <div class="flat-label">
              <div class="flat-title" id="flatSideTitle">ON YOUR SIDE AI</div>
              <div class="flat-sub" id="flatSideSub">INTELLIGENCE</div>
            </div>
          </button>

          <button class="flat-node small n2" data-route="/products/energy/" type="button" aria-label="Energy">
            <div class="flat-shell"></div>
            <div class="flat-label">
              <div class="flat-title" id="flatEnergyTitle">ENERGY</div>
              <div class="flat-sub" id="flatEnergySub">SYSTEM OUTPUT</div>
            </div>
          </button>

          <button class="flat-node small n3" data-route="/products/education/" type="button" aria-label="Education">
            <div class="flat-shell"></div>
            <div class="flat-label">
              <div class="flat-title" id="flatEducationTitle">EDUCATION</div>
              <div class="flat-sub" id="flatEducationSub">LANGUAGE SYSTEMS</div>
            </div>
          </button>

          <button class="flat-node small n4" data-route="/products/governance/" type="button" aria-label="Governance">
            <div class="flat-shell"></div>
            <div class="flat-label">
              <div class="flat-title" id="flatGovernanceTitle">GOVERNANCE</div>
              <div class="flat-sub" id="flatGovernanceSub">SCALING RULES</div>
            </div>
          </button>
        </div>
      </div>

      <div class="mode-panel" id="roundPanel" aria-label="Round authority">
        <div class="round-core">

          <button class="round-node center" data-route="/products/nutrition/" type="button" aria-label="Nutrition">
            <div class="round-shadow"></div>
            <div class="round-shell"></div>
            <div class="compass-core"></div>
            <div class="round-label">
              <div class="round-title" id="roundNutritionTitle">NUTRITION</div>
              <div class="round-sub" id="roundNutritionSub">BASELINE SYSTEM</div>
            </div>
          </button>

          <button class="round-node small r1" data-route="/products/on-your-side-ai/" type="button" aria-label="On Your Side AI">
            <div class="round-shadow"></div>
            <div class="round-shell"></div>
            <div class="compass-core"></div>
            <div class="round-label">
              <div class="round-title" id="roundSideTitle">ON YOUR SIDE AI</div>
              <div class="round-sub" id="roundSideSub">INTELLIGENCE</div>
            </div>
          </button>

          <button class="round-node small r2" data-route="/products/energy/" type="button" aria-label="Energy">
            <div class="round-shadow"></div>
            <div class="round-shell"></div>
            <div class="compass-core"></div>
            <div class="round-label">
              <div class="round-title" id="roundEnergyTitle">ENERGY</div>
              <div class="round-sub" id="roundEnergySub">SYSTEM OUTPUT</div>
            </div>
          </button>

          <button class="round-node small r3" data-route="/products/education/" type="button" aria-label="Education">
            <div class="round-shadow"></div>
            <div class="round-shell"></div>
            <div class="compass-core"></div>
            <div class="round-label">
              <div class="round-title" id="roundEducationTitle">EDUCATION</div>
              <div class="round-sub" id="roundEducationSub">LANGUAGE SYSTEMS</div>
            </div>
          </button>

          <button class="round-node small r4" data-route="/products/governance/" type="button" aria-label="Governance">
            <div class="round-shadow"></div>
            <div class="round-shell"></div>
            <div class="compass-core"></div>
            <div class="round-label">
              <div class="round-title" id="roundGovernanceTitle">GOVERNANCE</div>
              <div class="round-sub" id="roundGovernanceSub">SCALING RULES</div>
            </div>
          </button>
        </div>
      </div>

    </section>
  </div>

  <script type="module">
    (function(){
      "use strict";

      const qs = new URLSearchParams(location.search);
      const LS = window.localStorage;

      let lang  = qs.get("lang")  || LS.getItem("gd_lang")  || "en";
      let style = qs.get("style") || LS.getItem("gd_style") || "informal";
      let time  = qs.get("time")  || LS.getItem("gd_time")  || "now";
      let depth = qs.get("depth") || LS.getItem("gd_depth") || "1";
      let lane  = qs.get("lane")  || "";
      let mode  = qs.get("mode")  || "flat";

      if(lang!=="en" && lang!=="zh" && lang!=="es") lang="en";
      if(style!=="informal" && style!=="formal") style="informal";
      if(time!=="origin" && time!=="now" && time!=="post") time="now";

      let d = parseInt(depth,10);
      if(!isFinite(d)) d = 1;
      if(d < 1) d = 1;
      if(d > 9) d = 9;
      depth = String(d);

      if(lane!=="platform" && lane!=="engineering") lane = "";
      if(mode!=="flat" && mode!=="round") mode = "flat";

      try{
        LS.setItem("gd_lang", lang);
        LS.setItem("gd_style", style);
        LS.setItem("gd_time", time);
        LS.setItem("gd_depth", depth);
      }catch(e){}

      document.documentElement.lang = (lang==="zh") ? "zh" : (lang==="es" ? "es" : "en");

      function buildQuery(extra){
        const p = new URLSearchParams();
        p.set("lang", (extra && extra.lang) ? extra.lang : lang);
        p.set("style", (extra && extra.style) ? extra.style : style);
        p.set("time", (extra && extra.time) ? extra.time : time);
        p.set("depth", (extra && extra.depth) ? String(extra.depth) : depth);
        p.set("mode", (extra && extra.mode) ? extra.mode : mode);

        const resolvedLane = (extra && extra.lane) ? extra.lane : lane;
        if(resolvedLane === "platform" || resolvedLane === "engineering"){
          p.set("lane", resolvedLane);
        }
        return "?" + p.toString();
      }

      function withState(route, extra){
        const glue = route.includes("?") ? "&" : "?";
        return route + glue + buildQuery(extra).slice(1);
      }

      function wireRoutes(){
        const nodes = document.querySelectorAll("[data-route]");
        for(let i=0;i<nodes.length;i+=1){
          const el = nodes[i];
          const route = el.getAttribute("data-route") || "";
          if(!route) continue;
          if(el.tagName === "A"){
            el.setAttribute("href", withState(route));
          }
        }
      }

      function navigateTo(path){
        window.location.href = withState(path);
      }

      function P(en, zh, es){
        return { en, zh, es };
      }

      function pick(o){
        return (lang==="zh") ? o.zh : (lang==="es" ? o.es : o.en);
      }

      const COPY = {
        heroTitle: P("PRODUCTS","产品","PRODUCTOS"),
        heroTag: P(
          "Choose your path. What exists now, or what is being built next.",
          "选择你的路径。选择现在存在的，或正在构建的下一层。",
          "Elige tu camino. Lo que existe ahora, o lo que se está construyendo después."
        ),
        navCompass: P("COMPASS","指南针","BRÚJULA"),
        navProducts: P("PRODUCTS","产品","PRODUCTOS"),
        navExplore: P("EXPLORE","探索","EXPLORAR"),
        navGauges: P("GAUGES","量规","MEDIDORES"),
        flat: P("FLAT","平面","PLANO"),
        round: P("ROUND","球面","REDONDO"),
        nutrition: P("NUTRITION","营养","NUTRICIÓN"),
        nutritionSub: P("BASELINE SYSTEM","基线系统","SISTEMA BASELINE"),
        side: P("ON YOUR SIDE AI","站你这边 AI","ON YOUR SIDE AI"),
        sideSub: P("INTELLIGENCE","智能","INTELIGENCIA"),
        energy: P("ENERGY","能源","ENERGÍA"),
        energySub: P("SYSTEM OUTPUT","系统输出","SALIDA DEL SISTEMA"),
        education: P("EDUCATION","教育","EDUCACIÓN"),
        educationSub: P("LANGUAGE SYSTEMS","语言系统","SISTEMAS DE LENGUAJE"),
        governance: P("GOVERNANCE","治理","GOBERNANZA"),
        governanceSub: P("SCALING RULES","扩展规则","REGLAS DE ESCALA")
      };

      document.getElementById("heroTitle").textContent = pick(COPY.heroTitle);
      document.getElementById("heroTag").textContent = pick(COPY.heroTag);

      document.getElementById("navCompass").textContent = pick(COPY.navCompass);
      document.getElementById("navProducts").textContent = pick(COPY.navProducts);
      document.getElementById("navExplore").textContent = pick(COPY.navExplore);
      document.getElementById("navGauges").textContent = pick(COPY.navGauges);

      document.getElementById("modeFlat").textContent = pick(COPY.flat);
      document.getElementById("modeRound").textContent = pick(COPY.round);

      document.getElementById("flatNutritionTitle").textContent = pick(COPY.nutrition);
      document.getElementById("flatNutritionSub").textContent = pick(COPY.nutritionSub);
      document.getElementById("flatSideTitle").textContent = pick(COPY.side);
      document.getElementById("flatSideSub").textContent = pick(COPY.sideSub);
      document.getElementById("flatEnergyTitle").textContent = pick(COPY.energy);
      document.getElementById("flatEnergySub").textContent = pick(COPY.energySub);
      document.getElementById("flatEducationTitle").textContent = pick(COPY.education);
      document.getElementById("flatEducationSub").textContent = pick(COPY.educationSub);
      document.getElementById("flatGovernanceTitle").textContent = pick(COPY.governance);
      document.getElementById("flatGovernanceSub").textContent = pick(COPY.governanceSub);

      document.getElementById("roundNutritionTitle").textContent = pick(COPY.nutrition);
      document.getElementById("roundNutritionSub").textContent = pick(COPY.nutritionSub);
      document.getElementById("roundSideTitle").textContent = pick(COPY.side);
      document.getElementById("roundSideSub").textContent = pick(COPY.sideSub);
      document.getElementById("roundEnergyTitle").textContent = pick(COPY.energy);
      document.getElementById("roundEnergySub").textContent = pick(COPY.energySub);
      document.getElementById("roundEducationTitle").textContent = pick(COPY.education);
      document.getElementById("roundEducationSub").textContent = pick(COPY.educationSub);
      document.getElementById("roundGovernanceTitle").textContent = pick(COPY.governance);
      document.getElementById("roundGovernanceSub").textContent = pick(COPY.governanceSub);

      wireRoutes();

      const flatPanel = document.getElementById("flatPanel");
      const roundPanel = document.getElementById("roundPanel");
      const statusPill = document.getElementById("statusPill");
      const modeFlat = document.getElementById("modeFlat");
      const modeRound = document.getElementById("modeRound");
      const allNodes = Array.from(document.querySelectorAll(".flat-node,.round-node"));

      function syncMode(nextMode){
        mode = nextMode === "round" ? "round" : "flat";

        flatPanel.classList.toggle("is-active", mode === "flat");
        roundPanel.classList.toggle("is-active", mode === "round");
        modeFlat.classList.toggle("active", mode === "flat");
        modeRound.classList.toggle("active", mode === "round");
        statusPill.textContent = mode === "round" ? pick(COPY.round) : pick(COPY.flat);

        history.replaceState({}, "", location.pathname + buildQuery({ mode:mode }));
      }

      modeFlat.addEventListener("click", function(){
        syncMode("flat");
      }, { passive:true });

      modeRound.addEventListener("click", function(){
        syncMode("round");
      }, { passive:true });

      for(let i=0;i<allNodes.length;i+=1){
        const node = allNodes[i];
        const route = node.getAttribute("data-route") || "/products/";
        node.addEventListener("click", function(){
          navigateTo(route);
        }, { passive:true });
      }

      syncMode(mode);
    })();
  </script>
</body>
</html>
