<!doctype html>
<!-- TNT — /explore/frontier/vision/index.html
     FRONTIER · VISION REMOTE (16 DIAMOND CONTROL)
     CENTER = INDEX (Manual)
     OUTER = DIRECT ROUTES (Compass)
     PERFECT SYMMETRY · STATE SAFE · NO MODALS
-->

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>VISION · REMOTE</title>

<link rel="stylesheet" href="/assets/ui.css"/>
<link rel="stylesheet" href="/assets/branch.css"/>

<style>
body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  color:#fff;
}

.stage{
  position:relative;
  width:min(820px,95vw);
  height:min(820px,85vh);
  margin:120px auto;
}

.d{
  position:absolute;
  width:110px;
  height:110px;
  transform:rotate(45deg);
  border-radius:22px;
  background:linear-gradient(145deg,#0c0f14,#06080b);
  border:1px solid rgba(255,255,255,.12);
  box-shadow:0 25px 70px rgba(0,0,0,.6);
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

.d.center{
  width:140px;
  height:140px;
  z-index:5;
}

.inner{
  transform:rotate(-45deg);
  text-align:center;
  pointer-events:none;
}

.word{
  font-weight:800;
  font-size:13px;
  letter-spacing:.4px;
}

.cardinal{
  font-size:10px;
  opacity:.6;
  margin-top:4px;
  letter-spacing:1px;
}

</style>
</head>
<body>

<div class="stage" id="stage"></div>

<script>
(function(){

const routes = [
  {label:"CITIES", code:"N"},
  {label:"WATER", code:"NE"},
  {label:"ENERGY", code:"E"},
  {label:"HABITATS", code:"SE"},
  {label:"AGRI", code:"S"},
  {label:"FINANCE", code:"SW"},
  {label:"INFRA", code:"W"},
  {label:"LATTICE", code:"NW"},
  {label:"SHIMMER", code:"NNE"},
  {label:"TRAJECTORY", code:"ENE"},
  {label:"WASTE", code:"ESE"},
  {label:"URBAN", code:"SSE"},
  {label:"CLOSED", code:"SSW"},
  {label:"GRID", code:"WSW"},
  {label:"DOCTRINE", code:"WNW"},
];

const stage = document.getElementById("stage");
const cx = stage.clientWidth / 2;
const cy = stage.clientHeight / 2;
const radius = 280;

function createDiamond(text, code, angle, isCenter=false){

  const d = document.createElement("div");
  d.className = "d" + (isCenter ? " center" : "");

  if(isCenter){
    d.style.left = (cx - 70) + "px";
    d.style.top  = (cy - 70) + "px";
  } else {
    const x = cx + radius * Math.cos(angle) - 55;
    const y = cy + radius * Math.sin(angle) - 55;
    d.style.left = x + "px";
    d.style.top  = y + "px";
  }

  const inner = document.createElement("div");
  inner.className = "inner";

  const word = document.createElement("div");
  word.className = "word";
  word.textContent = text;

  const cardinal = document.createElement("div");
  cardinal.className = "cardinal";
  cardinal.textContent = code;

  inner.appendChild(word);
  inner.appendChild(cardinal);
  d.appendChild(inner);

  return d;
}

// CENTER (INDEX)
const center = createDiamond("INDEX", "CORE", 0, true);
stage.appendChild(center);

// OUTER 15
routes.forEach((r,i)=>{
  const angle = (i / routes.length) * (Math.PI * 2);
  const diamond = createDiamond(r.label, r.code, angle);
  stage.appendChild(diamond);
});

})();
</script>

</body>
</html>
