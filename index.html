<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Nine Summits — Index</title>
<link rel="stylesheet" href="/assets/ui.css"/>
<style>
html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:#030712;
  color:#fff;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
}
body::before,body::after{pointer-events:none!important}

:root{
  --ink:rgba(255,255,255,.96);
  --mut:rgba(255,255,255,.84);
  --mut2:rgba(255,255,255,.68);
  --stroke:rgba(255,255,255,.12);
  --stroke2:rgba(255,255,255,.08);
  --shadowA:0 18px 52px rgba(0,0,0,.34);
  --shadowB:0 24px 90px rgba(0,0,0,.46);
  --gold:rgba(226,191,92,.92);
  --goldSoft:rgba(226,191,92,.26);
  --goldGlow:rgba(226,191,92,.18);
  --panel:rgba(8,12,20,.46);
  --panel2:rgba(8,12,20,.62);
}

#app-shell{
  position:fixed;
  inset:0;
  overflow:hidden;
  isolation:isolate;
  background:
    radial-gradient(circle at 50% 42%, rgba(50,100,180,.10), transparent 34%),
    linear-gradient(180deg, #030712 0%, #071225 52%, #08101f 100%);
}

#world-canvas{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  display:block;
  z-index:1;
  touch-action:none;
}

#universe-layer,
#atmosphere-layer,
#hero-layer,
#flat-layer,
#orbital-overlay{
  position:fixed;
  inset:0;
}

#universe-layer{
  z-index:2;
  pointer-events:none;
  overflow:hidden;
}
.star-band{
  position:absolute;
  inset:-10%;
  opacity:.42;
  mix-blend-mode:screen;
  animation:starDrift 44s linear infinite;
}
.star-band.near{
  opacity:.62;
  animation-duration:26s;
}
.star-band.far{
  opacity:.20;
  animation-duration:70s;
}
.star-band::before,
.star-band::after{
  content:"";
  position:absolute;
  inset:0;
  background-repeat:repeat;
  background-size:320px 320px;
}
.star-band::before{
  background-image:
    radial-gradient(circle at 20px 24px, rgba(255,255,255,.95) 0 1px, transparent 1.6px),
    radial-gradient(circle at 118px 78px, rgba(255,255,255,.55) 0 1px, transparent 1.6px),
    radial-gradient(circle at 242px 194px, rgba(255,255,255,.82) 0 1px, transparent 1.6px),
    radial-gradient(circle at 286px 42px, rgba(255,255,255,.42) 0 .9px, transparent 1.4px),
    radial-gradient(circle at 68px 214px, rgba(255,255,255,.68) 0 .9px, transparent 1.4px);
}
.star-band::after{
  background-image:
    radial-gradient(circle at 78px 48px, rgba(120,180,255,.28) 0 1.2px, transparent 2px),
    radial-gradient(circle at 204px 158px, rgba(255,215,120,.22) 0 1.3px, transparent 2px),
    radial-gradient(circle at 300px 258px, rgba(180,140,255,.18) 0 1.1px, transparent 1.8px);
  filter:blur(.5px);
}

#atmosphere-layer{
  z-index:3;
  pointer-events:none;
  overflow:hidden;
}
.atmo-glow{
  position:absolute;
  left:50%;
  top:58%;
  width:min(92vw,1040px);
  height:min(92vw,1040px);
  transform:translate(-50%,-50%);
  border-radius:50%;
  background:
    radial-gradient(circle at 50% 50%, rgba(120,180,255,.14), transparent 34%),
    radial-gradient(circle at 50% 56%, rgba(255,255,255,.04), transparent 56%),
    radial-gradient(circle at 50% 50%, rgba(30,90,170,.10), transparent 70%);
  filter:blur(12px);
  animation:glowPulse 8s ease-in-out infinite;
}
.mist-veil{
  position:absolute;
  left:0;
  right:0;
  bottom:-4%;
  height:40%;
  background:
    linear-gradient(
      to bottom,
      transparent 0%,
      rgba(130,190,255,.06) 18%,
      rgba(170,220,255,.10) 54%,
      rgba(255,255,255,.03) 100%
    );
  mask-image:linear-gradient(to bottom, transparent 0%, rgba(0,0,0,.25) 18%, rgba(0,0,0,.95) 84%, transparent 100%);
  -webkit-mask-image:linear-gradient(to bottom, transparent 0%, rgba(0,0,0,.25) 18%, rgba(0,0,0,.95) 84%, transparent 100%);
  opacity:.22;
  transform:translateY(8%);
  animation:veilDrift 9s ease-in-out infinite;
}

#hero-layer{
  z-index:8;
  pointer-events:none;
}
.hero-panel{
  position:absolute;
  left:50%;
  top:7.5vh;
  transform:translateX(-50%);
  width:min(92vw,980px);
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:12px;
  text-align:center;
}
.hero-title{
  margin:0;
  font-size:clamp(42px,7vw,96px);
  font-weight:950;
  letter-spacing:.05em;
  line-height:.9;
  text-shadow:0 10px 38px rgba(0,0,0,.62);
}
.hero-sub{
  margin:0;
  font-size:clamp(18px,2.2vw,26px);
  color:rgba(255,255,255,.90);
}
.hero-tag{
  margin:0;
  font-size:clamp(13px,1.5vw,16px);
  color:rgba(255,255,255,.64);
  letter-spacing:.02em;
}

#flat-layer{
  z-index:9;
  display:none;
  align-items:center;
  justify-content:center;
  pointer-events:none;
}
.flat-menu{
  width:min(92vw,720px);
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:18px;
  pointer-events:auto;
}
.flat-card{
  position:relative;
  min-height:132px;
  border-radius:28px;
  border:1px solid rgba(255,255,255,.16);
  background:
    radial-gradient(circle at 22% 18%, rgba(255,255,255,.18), transparent 22%),
    linear-gradient(145deg, rgba(10,14,22,.92), rgba(5,8,12,.98));
  box-shadow:
    0 18px 48px rgba(0,0,0,.38),
    inset 0 0 20px rgba(255,255,255,.04);
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  font-weight:900;
  font-size:clamp(18px,2.2vw,24px);
  letter-spacing:.06em;
  cursor:pointer;
  overflow:hidden;
  transition:transform .18s ease, border-color .18s ease, background .18s ease;
}
.flat-card:hover{
  transform:translateY(-2px);
  border-color:rgba(255,255,255,.26);
  background:
    radial-gradient(circle at 22% 18%, rgba(255,255,255,.22), transparent 24%),
    linear-gradient(145deg, rgba(14,18,28,.96), rgba(5,8,12,1));
}
.flat-card::before{
  content:"";
  position:absolute;
  left:50%;
  top:50%;
  width:86px;
  height:86px;
  margin:-43px 0 0 -43px;
  transform:rotate(45deg);
  border-radius:14px;
  border:1px solid rgba(255,255,255,.12);
  box-shadow:inset 0 0 14px rgba(255,255,255,.08);
}

.home-pill{
  position:absolute;
  top:16px;
  left:50%;
  transform:translateX(-50%);
  min-width:156px;
  padding:8px 18px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.10);
  background:rgba(0,0,0,.22);
  box-shadow:0 12px 36px rgba(0,0,0,.24);
  backdrop-filter:blur(8px);
  color:rgba(255,255,255,.92);
  font-size:12px;
  font-weight:900;
  letter-spacing:.12em;
  text-transform:uppercase;
  text-align:center;
  pointer-events:none;
  z-index:15;
}

.mode-btn{
  position:absolute;
  top:16px;
  right:16px;
  min-height:42px;
  padding:0 16px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.14);
  background:rgba(10,12,20,.40);
  box-shadow:0 16px 44px rgba(0,0,0,.32);
  backdrop-filter:blur(8px);
  color:rgba(255,255,255,.92);
  font-size:12px;
  font-weight:900;
  letter-spacing:.06em;
  text-transform:uppercase;
  cursor:pointer;
  z-index:16;
}
.mode-btn:active{transform:translateY(1px)}

#orbital-overlay{
  z-index:12;
  pointer-events:none;
}
.orbital-marker{
  position:absolute;
  left:0;
  top:0;
  width:132px;
  height:132px;
  transform:translate(-50%,-50%);
  border:0;
  background:transparent;
  padding:0;
  pointer-events:auto;
  cursor:pointer;
  touch-action:manipulation;
  -webkit-tap-highlight-color:transparent;
}
.orbital-marker[hidden]{display:none}

.orbital-core{
  position:absolute;
  left:50%;
  top:50%;
  width:88px;
  height:88px;
  transform:translate(-50%,-50%);
  border-radius:50%;
  background:
    radial-gradient(circle at 50% 50%, rgba(255,255,255,.08) 0 14%, rgba(255,255,255,0) 54%),
    radial-gradient(circle at 50% 50%, rgba(226,191,92,.22), rgba(226,191,92,.10) 28%, rgba(226,191,92,0) 58%);
  filter:blur(.2px);
  opacity:.98;
}
.orbital-core::before,
.orbital-core::after{
  content:"";
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  border-radius:999px;
  background:linear-gradient(180deg, rgba(255,247,208,.95), rgba(255,228,142,.92), rgba(255,214,98,.26));
  box-shadow:
    0 0 18px rgba(255,225,140,.36),
    0 0 34px rgba(255,219,126,.18);
}
.orbital-core::before{
  width:10px;
  height:78px;
}
.orbital-core::after{
  width:78px;
  height:10px;
}
.orbital-diag-a,
.orbital-diag-b{
  position:absolute;
  left:50%;
  top:50%;
  width:70px;
  height:2px;
  transform-origin:center;
  background:linear-gradient(90deg, rgba(255,227,132,0), rgba(255,233,160,.85), rgba(255,227,132,0));
  opacity:.62;
  filter:blur(.2px);
}
.orbital-diag-a{transform:translate(-50%,-50%) rotate(45deg)}
.orbital-diag-b{transform:translate(-50%,-50%) rotate(-45deg)}

.orbital-glow{
  position:absolute;
  left:50%;
  top:50%;
  width:118px;
  height:118px;
  transform:translate(-50%,-50%);
  border-radius:50%;
  background:
    radial-gradient(circle at 50% 50%, rgba(255,227,132,.14), rgba(255,227,132,.08) 26%, rgba(255,227,132,0) 68%);
  filter:blur(8px);
  opacity:.92;
}

.orbital-code{
  position:absolute;
  left:50%;
  top:22px;
  transform:translateX(-50%);
  font-size:11px;
  font-weight:950;
  letter-spacing:.26em;
  color:rgba(255,246,214,.88);
  text-transform:uppercase;
  text-shadow:0 0 10px rgba(0,0,0,.54);
  white-space:nowrap;
}

.orbital-name{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  min-width:84px;
  padding:3px 10px;
  border-radius:999px;
  background:rgba(6,10,18,.22);
  color:rgba(255,255,255,.94);
  font-size:11px;
  font-weight:950;
  letter-spacing:.10em;
  text-transform:uppercase;
  text-align:center;
  text-shadow:0 0 10px rgba(0,0,0,.62);
  box-shadow:0 6px 22px rgba(0,0,0,.18);
  backdrop-filter:blur(6px);
}

.diagnostics-shell{
  position:absolute;
  left:16px;
  right:16px;
  bottom:16px;
  z-index:14;
  display:flex;
  align-items:flex-end;
  justify-content:center;
  pointer-events:none;
}
.diagnostics-bar{
  width:min(980px,100%);
  min-height:62px;
  padding:10px 12px;
  border-radius:18px;
  border:1px solid rgba(255,255,255,.10);
  background:rgba(7,10,18,.42);
  box-shadow:0 18px 52px rgba(0,0,0,.28);
  backdrop-filter:blur(10px);
  display:grid;
  grid-template-columns:1fr auto;
  align-items:center;
  gap:10px;
  pointer-events:auto;
}
.diagnostics-summary{
  min-width:0;
  opacity:.74;
}
.diagnostics-summary .diagnostic-pill{
  border-color:rgba(255,255,255,.08);
  background:rgba(255,255,255,.02);
}
.diagnostics-toggle{
  min-width:110px;
  min-height:38px;
  padding:0 14px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(10,12,20,.34);
  color:rgba(255,255,255,.92);
  font-size:12px;
  font-weight:900;
  letter-spacing:.04em;
  text-transform:uppercase;
  cursor:pointer;
}
.diagnostics-toggle:active{transform:translateY(1px)}
.debug-panel{
  position:absolute;
  left:16px;
  bottom:94px;
  width:min(420px, calc(100vw - 32px));
  max-height:min(54vh, 520px);
  overflow:auto;
  display:grid;
  gap:10px;
  opacity:0;
  pointer-events:none;
  transform:translateY(10px);
  transition:opacity 160ms ease, transform 160ms ease;
  z-index:15;
}
.debug-panel .panel-section{
  background:rgba(8,14,24,.78);
  border:1px solid rgba(145,175,255,.16);
  box-shadow:0 14px 40px rgba(0,0,0,.30);
  backdrop-filter:blur(10px);
  border-radius:14px;
  padding:12px;
}
body[data-diagnostics="full"] .debug-panel{
  opacity:1;
  pointer-events:auto;
  transform:translateY(0);
}

@keyframes starDrift{
  from{transform:translate3d(-1.5%,-1%,0)}
  to{transform:translate3d(1.5%,1%,0)}
}
@keyframes glowPulse{
  0%,100%{opacity:.82;transform:translate(-50%,-50%) scale(1)}
  50%{opacity:1;transform:translate(-50%,-50%) scale(1.04)}
}
@keyframes veilDrift{
  0%,100%{transform:translateY(8%);opacity:.18}
  50%{transform:translateY(2%);opacity:.28}
}

@media (max-width:700px){
  .hero-panel{
    top:8.4vh;
    gap:12px;
  }
  .flat-menu{
    grid-template-columns:1fr;
    width:min(92vw,420px);
    gap:12px;
  }
  .flat-card{min-height:98px}
  .diagnostics-bar{grid-template-columns:1fr}
  .diagnostics-toggle{justify-self:end}
}
</style>
</head>
<body data-mode="round" data-diagnostics="peek">
<div id="app-shell">
  <canvas id="world-canvas" aria-label="Home world canvas"></canvas>

  <div id="universe-layer" aria-hidden="true">
    <div class="star-band far"></div>
    <div class="star-band"></div>
    <div class="star-band near"></div>
  </div>

  <div id="atmosphere-layer" aria-hidden="true">
    <div class="atmo-glow"></div>
    <div class="mist-veil"></div>
  </div>

  <div id="hero-layer">
    <div class="hero-panel">
      <h1 class="hero-title">NINE SUMMITS</h1>
      <p class="hero-sub">Learn to live, to love.</p>
      <p class="hero-tag">Enter simple. Discover power. Choose depth.</p>
    </div>
  </div>

  <div id="flat-layer">
    <div class="flat-menu">
      <button class="flat-card" data-route="/explore/" type="button">EXPLORE</button>
      <button class="flat-card" data-route="/products/" type="button">PRODUCTS</button>
      <button class="flat-card" data-route="/laws/" type="button">LAWS</button>
      <button class="flat-card" data-route="/gauges/" type="button">GAUGES</button>
    </div>
  </div>

  <div id="orbital-overlay" aria-label="Index markers">
    <button class="orbital-marker" id="marker-north" type="button" hidden>
      <div class="orbital-glow"></div>
      <div class="orbital-core"></div>
      <div class="orbital-diag-a"></div>
      <div class="orbital-diag-b"></div>
      <div class="orbital-code">N</div>
      <div class="orbital-name">PRODUCTS</div>
    </button>

    <button class="orbital-marker" id="marker-east" type="button" hidden>
      <div class="orbital-glow"></div>
      <div class="orbital-core"></div>
      <div class="orbital-diag-a"></div>
      <div class="orbital-diag-b"></div>
      <div class="orbital-code">E</div>
      <div class="orbital-name">GAUGES</div>
    </button>

    <button class="orbital-marker" id="marker-south" type="button" hidden>
      <div class="orbital-glow"></div>
      <div class="orbital-core"></div>
      <div class="orbital-diag-a"></div>
      <div class="orbital-diag-b"></div>
      <div class="orbital-code">S</div>
      <div class="orbital-name">LAWS</div>
    </button>

    <button class="orbital-marker" id="marker-west" type="button" hidden>
      <div class="orbital-glow"></div>
      <div class="orbital-core"></div>
      <div class="orbital-diag-a"></div>
      <div class="orbital-diag-b"></div>
      <div class="orbital-code">W</div>
      <div class="orbital-name">EXPLORE</div>
    </button>
  </div>

  <div class="home-pill">HOME</div>
  <button id="mode-note" class="mode-btn" type="button">ROUND</button>

  <div class="diagnostics-shell">
    <div class="diagnostics-bar">
      <div id="diagnostics-summary" class="diagnostics-summary"></div>
      <button id="diagnostics-toggle" class="diagnostics-toggle" type="button">DIAGNOSTICS</button>
    </div>
  </div>

  <div id="debug-panel" class="debug-panel" aria-live="polite"></div>
</div>

<script type="module">
import { createPlanetEngine } from "/world/planet_engine.js";
import { createRenderer } from "/world/render.js";
import { createControlSystem } from "/world/control.js";
import { createCompletionEngine } from "/world/completion_engine.js";
import { createTransitionEngine } from "/world/transition_engine.js";
import { createInstruments } from "/assets/instruments.js";

const params = new URLSearchParams(location.search);
const initialMode = params.get("mode") === "flat" ? "flat" : "round";

const body = document.body;
const canvas = document.getElementById("world-canvas");
const ctx = canvas.getContext("2d", { alpha: true });

const flatLayer = document.getElementById("flat-layer");
const modeNote = document.getElementById("mode-note");
const diagnosticsSummary = document.getElementById("diagnostics-summary");
const diagnosticsToggle = document.getElementById("diagnostics-toggle");
const debugPanel = document.getElementById("debug-panel");

const overlayMap = Object.freeze({
  "north-products": document.getElementById("marker-north"),
  "east-gauges": document.getElementById("marker-east"),
  "south-laws": document.getElementById("marker-south"),
  "west-explore": document.getElementById("marker-west")
});

const planetEngine = createPlanetEngine();
const renderer = createRenderer();
const control = createControlSystem();
const completionEngine = createCompletionEngine();
const transitionEngine = createTransitionEngine();
const instruments = createInstruments();

const MOTION_STORAGE_KEY = "ns_home_round_motion_v5";
const HANDOFF_STORAGE_KEY = "ns_home_transition_handoff_v1";

const orbitalSystem = Object.freeze({
  objects: Object.freeze([
    Object.freeze({
      id: "north-products",
      label: "PRODUCTS",
      route: "/products/",
      code: "N",
      uiLabel: "PRODUCTS",
      baseLatDeg: 0,
      baseLonDeg: 0,
      bearingOffsetDeg: -90,
      spinOffsetRad: 0.20,
      spinMultiplier: 1.35,
      sizePx: 20
    }),
    Object.freeze({
      id: "south-laws",
      label: "LAWS",
      route: "/laws/",
      code: "S",
      uiLabel: "LAWS",
      baseLatDeg: 0,
      baseLonDeg: 0,
      bearingOffsetDeg: 90,
      spinOffsetRad: 0.80,
      spinMultiplier: 1.25,
      sizePx: 20
    }),
    Object.freeze({
      id: "east-gauges",
      label: "GAUGES",
      route: "/gauges/",
      code: "E",
      uiLabel: "GAUGES",
      baseLatDeg: 0,
      baseLonDeg: 0,
      bearingOffsetDeg: 0,
      spinOffsetRad: 1.10,
      spinMultiplier: 1.45,
      sizePx: 20
    }),
    Object.freeze({
      id: "west-explore",
      label: "EXPLORE",
      route: "/explore/",
      code: "W",
      uiLabel: "EXPLORE",
      baseLatDeg: 0,
      baseLonDeg: 0,
      bearingOffsetDeg: 180,
      spinOffsetRad: 1.70,
      spinMultiplier: 1.30,
      sizePx: 20
    })
  ])
});

let mode = initialMode;
let planetField = null;
let rafId = 0;
let lastFrameAt = performance.now();
let lastRenderReceipt = Object.freeze({ orbitalHits: Object.freeze([]) });

let isDragging = false;
let activePointerId = null;
let movedSincePointerDown = false;
let lastX = 0;
let lastY = 0;
let diagnosticsMode = "peek";
let runtimePacket = Object.freeze({});

function withModeQuery(route, nextMode = mode) {
  const url = new URL(route, location.origin);
  url.searchParams.set("mode", nextMode);
  return url.pathname + url.search;
}

function resizeWorld() {
  const width = window.innerWidth;
  const height = window.innerHeight;
  canvas.width = width;
  canvas.height = height;
  control.resize(width, height);
}

function buildPlanetFieldOnce() {
  if (!planetField) {
    planetField = planetEngine.buildPlanetField({});
  }
}

function restoreMotionState() {
  if (mode !== "round") return;
  try {
    const raw = sessionStorage.getItem(MOTION_STORAGE_KEY);
    if (!raw) return;
    control.restoreMotionState(JSON.parse(raw));
  } catch {}
}

function persistMotionState() {
  if (mode !== "round") return;
  try {
    sessionStorage.setItem(MOTION_STORAGE_KEY, JSON.stringify(control.getMotionState()));
  } catch {}
}

function persistTransitionHandoff(toMode) {
  try {
    const handoff = control.buildTransitionHandoff({ toMode });
    sessionStorage.setItem(HANDOFF_STORAGE_KEY, JSON.stringify(handoff));
  } catch {}
}

function applyStoredHandoff() {
  try {
    const raw = sessionStorage.getItem(HANDOFF_STORAGE_KEY);
    if (!raw) return;
    const handoff = JSON.parse(raw);
    if (handoff && typeof handoff === "object" && handoff.toMode === mode) {
      control.restoreMotionState(handoff);
    }
    sessionStorage.removeItem(HANDOFF_STORAGE_KEY);
  } catch {}
}

function buildRuntimePacket(dtMs) {
  const motionState = control.getMotionState();
  const orbitalState = control.getOrbitalState();
  const projectionSummary = control.getProjectionSummary();
  const renderAudit = lastRenderReceipt?.audit || {};
  const orbitalAudit = lastRenderReceipt?.orbitalAudit || {};

  const runtime = {
    phase: "HOME",
    fps: dtMs > 0 ? 1000 / dtMs : 0,
    dtMs,
    elapsedMs: performance.now(),
    planetField,
    renderAudit,
    orbitalAudit,
    control: {
      projectionSummary,
      motionState,
      orbitalState
    },
    verification: {
      pass: true,
      reasons: []
    },
    failure: {
      phase: "",
      message: ""
    }
  };

  completionEngine.update(runtime);

  const transitionReceipt = transitionEngine.evaluate(runtime, {
    proposed: mode === "round" ? "ROUND_HOME" : "FLAT_HOME",
    family: "HOME_MODE",
    fromRoute: location.pathname,
    toRoute: location.pathname,
    fromMode: mode,
    toMode: mode,
    explicitUserAction: true,
    reason: "runtime_state"
  });

  runtime.transition = transitionReceipt;

  runtime.instrument = instruments.buildInstrumentReceipt({
    currentSample: planetField?.samples?.[projectionSummary.sampleY]?.[projectionSummary.sampleX] || null,
    previousSample: planetField?.samples?.[projectionSummary.sampleY]?.[projectionSummary.sampleX] || null,
    tickIndex: 0,
    motionState: {
      motionRunning: mode === "round",
      rafActive: rafId !== 0,
      pageVisible: document.visibilityState === "visible",
      pageRestored: true,
      yawVelocity: Number.isFinite(motionState?.yawVelocity) ? motionState.yawVelocity : null,
      pitchVelocity: Number.isFinite(motionState?.pitchVelocity) ? motionState.pitchVelocity : null,
      orbitVelocity: Number.isFinite(orbitalState?.orbitAngularVelocity) ? orbitalState.orbitAngularVelocity : null,
      orbitPhase: Number.isFinite(orbitalState?.orbitPhase) ? orbitalState.orbitPhase : null,
      blockedDragOnStarCount: 0,
      starTapCount: 0,
      dtMs
    },
    authorityState: {
      motionOwner: "control.js",
      projectionOwner: "control.js",
      inputOwner: "index.html",
      renderSource: "render.js",
      orbitSource: "control.js"
    },
    transitionState: transitionReceipt
  });

  return Object.freeze(runtime);
}

function updateDiagnostics(dtMs) {
  runtimePacket = buildRuntimePacket(dtMs);
  diagnosticsSummary.innerHTML = instruments.renderCompactBarHTML(runtimePacket);
  debugPanel.innerHTML = instruments.renderPanelHTML(runtimePacket);
}

function syncOverlayMarkers() {
  const hits = Array.isArray(lastRenderReceipt?.orbitalHits)
    ? lastRenderReceipt.orbitalHits
    : [];

  for (const key of Object.keys(overlayMap)) {
    const node = overlayMap[key];
    if (node) node.hidden = true;
  }

  for (let i = 0; i < hits.length; i += 1) {
    const hit = hits[i];
    const marker = overlayMap[hit.id];
    if (!marker) continue;

    marker.hidden = false;
    marker.style.left = `${hit.x}px`;
    marker.style.top = `${hit.y}px`;
  }
}

function renderSurface(dtMs) {
  if (!planetField) return;

  lastRenderReceipt = renderer.renderPlanet({
    ctx,
    planetField,
    projectPoint: (latDeg, lonDeg, radiusOffsetPx = 0) =>
      control.projectSphere(latDeg, lonDeg, radiusOffsetPx),
    viewState: control.getCameraState(),
    orbitalSystem: mode === "round"
      ? Object.freeze({
          phase: control.getOrbitalState().orbitPhase,
          objects: orbitalSystem.objects,
          altitudeFactor: 0.42
        })
      : null
  });

  syncOverlayMarkers();
  updateDiagnostics(dtMs);
}

function frame(now) {
  const dtMs = now - lastFrameAt;
  lastFrameAt = now;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (mode === "round") {
    control.stepInertia(dtMs);
  }

  renderSurface(dtMs);
  rafId = requestAnimationFrame(frame);
}

function setModePresentation() {
  body.setAttribute("data-mode", mode);
  modeNote.textContent = mode.toUpperCase();
  control.setMode(mode);

  if (mode === "flat") {
    flatLayer.style.display = "flex";
    canvas.style.filter = "blur(8px) brightness(.65)";
    for (const key of Object.keys(overlayMap)) {
      const node = overlayMap[key];
      if (node) node.hidden = true;
    }
  } else {
    flatLayer.style.display = "none";
    canvas.style.filter = "none";
  }
}

function setDiagnosticsMode(nextMode) {
  diagnosticsMode = nextMode === "full" ? "full" : "peek";
  body.setAttribute("data-diagnostics", diagnosticsMode);
  diagnosticsToggle.textContent = diagnosticsMode === "full" ? "HIDE DIAGNOSTICS" : "DIAGNOSTICS";
}

function navigateWithTransition(route, nextMode = mode) {
  persistMotionState();
  persistTransitionHandoff(nextMode);
  location.href = withModeQuery(route, nextMode);
}

function bindOverlayRoutes() {
  orbitalSystem.objects.forEach((obj) => {
    const marker = overlayMap[obj.id];
    if (!marker) return;

    marker.addEventListener("click", () => {
      navigateWithTransition(obj.route, mode);
    });
  });
}

function bindRoundPointerEvents() {
  canvas.addEventListener("pointerdown", (event) => {
    if (mode !== "round") return;

    const target = control.classifyPointerTarget(
      event.clientX,
      event.clientY,
      Array.isArray(lastRenderReceipt?.orbitalHits) ? lastRenderReceipt.orbitalHits : []
    );

    if (target.family !== "globe") {
      return;
    }

    activePointerId = event.pointerId;
    isDragging = true;
    movedSincePointerDown = false;
    lastX = event.clientX;
    lastY = event.clientY;
  }, { passive: true });

  window.addEventListener("pointermove", (event) => {
    if (mode !== "round") return;
    if (!isDragging) return;
    if (activePointerId !== null && event.pointerId !== activePointerId) return;

    const dx = event.clientX - lastX;
    const dy = event.clientY - lastY;

    if (Math.abs(dx) > 0 || Math.abs(dy) > 0) {
      movedSincePointerDown = true;
    }

    lastX = event.clientX;
    lastY = event.clientY;

    control.applyDrag(dx, dy);
  }, { passive: true });

  window.addEventListener("pointerup", (event) => {
    if (activePointerId !== null && event.pointerId !== activePointerId) return;
    activePointerId = null;
    isDragging = false;
    movedSincePointerDown = false;
  }, { passive: true });

  window.addEventListener("pointercancel", (event) => {
    if (activePointerId !== null && event.pointerId !== activePointerId) return;
    activePointerId = null;
    isDragging = false;
    movedSincePointerDown = false;
  }, { passive: true });
}

function bindEvents() {
  diagnosticsToggle.addEventListener("click", () => {
    setDiagnosticsMode(diagnosticsMode === "full" ? "peek" : "full");
  });

  modeNote.addEventListener("click", () => {
    const nextMode = mode === "round" ? "flat" : "round";
    navigateWithTransition(location.pathname, nextMode);
  });

  bindRoundPointerEvents();

  document.querySelectorAll(".flat-card").forEach((card) => {
    card.addEventListener("click", () => {
      const route = card.dataset.route || "/home/";
      navigateWithTransition(route, mode);
    });
  });

  window.addEventListener("resize", () => {
    resizeWorld();
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    renderSurface(16.7);
  }, { passive: true });

  window.addEventListener("pagehide", () => {
    persistMotionState();
    if (rafId) {
      cancelAnimationFrame(rafId);
      rafId = 0;
    }
  }, { passive: true });

  window.addEventListener("pageshow", () => {
    if (mode === "round") {
      restoreMotionState();
      applyStoredHandoff();
    }

    if (!rafId) {
      lastFrameAt = performance.now();
      rafId = requestAnimationFrame(frame);
    }
  }, { passive: true });

  document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === "hidden") {
      persistMotionState();
    } else if (document.visibilityState === "visible" && mode === "round") {
      lastFrameAt = performance.now();
    }
  }, { passive: true });
}

function start() {
  resizeWorld();
  buildPlanetFieldOnce();
  setModePresentation();

  if (mode === "round") {
    restoreMotionState();
    applyStoredHandoff();
  }

  bindOverlayRoutes();
  setDiagnosticsMode("peek");
  bindEvents();
  renderSurface(16.7);

  if (mode === "round" && !rafId) {
    lastFrameAt = performance.now();
    rafId = requestAnimationFrame(frame);
  }
}

start();
</script>
</body>
</html>
