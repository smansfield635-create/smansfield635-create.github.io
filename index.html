<!doctype html>
<!-- TNT — /index.html
     COMPASS · TRUE HIERARCHY SCALE v6 (SCREEN FIT COMPRESSION)

     FINAL SCALE MODEL:

     CORE (Tier 0)            = 100%
     Tier 1 (Cardinals)       = 60%
     Tier 2 (Diagonals)       = 45%
     Tier 3 (Intercardinals)  = 40%

     Radii compressed for screen fit.
     Only one dominant center.
     Outer rings progressively smaller.
-->

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Compass</title>

<link rel="stylesheet" href="/assets/ui.css"/>
<link rel="stylesheet" href="/assets/branch.css"/>

<style>
a{color:inherit;text-decoration:none}
body{margin:0;background:#7a0f0f}

/* ================= SCALE ================= */

:root{
  --D0:220px;  /* CORE 100% */
  --D1:132px;  /* 60% */
  --D2:99px;   /* 45% */
  --D3:88px;   /* 40% */

  /* compressed radii */
  --R1:220px;
  --R2:330px;
  --R3:420px;
}

.stage{
  position:relative;
  width:min(1100px,95vw);
  height:min(1000px,85vh);
  margin:110px auto 0;
  pointer-events:none;
}

/* ================= DIAMOND ================= */

.node{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%) rotate(45deg);
  pointer-events:auto;
  cursor:pointer;
  overflow:hidden;
  border-radius:26px;
  transition:.15s ease;
}

.core{ width:var(--D0); height:var(--D0); z-index:10;}
.l1{ width:var(--D1); height:var(--D1);}
.l2{ width:var(--D2); height:var(--D2);}
.l3{ width:var(--D3); height:var(--D3);}

.surface{
  background:
    radial-gradient(circle at 25% 25%, rgba(255,255,255,.35), transparent 45%),
    linear-gradient(160deg,#140707,#000);
  border:1px solid rgba(255,255,255,.2);
  box-shadow:
    0 30px 80px rgba(0,0,0,.8),
    inset 0 3px 0 rgba(255,255,255,.25),
    inset 0 -60px 100px rgba(0,0,0,.95);
}

.surface::after{
  content:"";
  position:absolute;
  left:15%;
  right:15%;
  top:10%;
  height:30%;
  border-radius:999px;
  background:linear-gradient(to bottom,rgba(255,255,255,.35),transparent);
  transform:rotate(-12deg);
}

.node:hover{
  box-shadow:
    0 30px 80px rgba(0,0,0,.8),
    0 0 40px rgba(255,200,120,.4),
    inset 0 3px 0 rgba(255,255,255,.25),
    inset 0 -60px 100px rgba(0,0,0,.95);
}

.inner{
  width:100%;
  height:100%;
  transform:rotate(-45deg);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:14px;
  color:white;
}

.word{
  font-weight:900;
  font-size:clamp(13px,1.2vw,18px);
  line-height:1.1;
}

.code{
  font-size:10px;
  opacity:.7;
  margin-top:6px;
}
</style>
</head>

<body>

<div class="stage" id="stage"></div>

<script>
(function(){

const ROUTES = [
  {tier:1,code:"N",label:"LAWS",href:"/laws/"},
  {tier:1,code:"E",label:"PRODUCTS",href:"/products/"},
  {tier:1,code:"S",label:"ENERGY",href:"/explore/frontier/energy/"},
  {tier:1,code:"W",label:"GAUGES",href:"/gauges/"},

  {tier:2,code:"NE",label:"EXPLORE",href:"/explore/"},
  {tier:2,code:"SE",label:"FINANCE",href:"/finance/"},
  {tier:2,code:"SW",label:"AGRICULTURE",href:"/products/agriculture/"},
  {tier:2,code:"NW",label:"LATTICE",href:"/explore/frontier/lattice/"},

  {tier:3,code:"NNE",label:"PRELUDE",href:"/prelude/"},
  {tier:3,code:"ENE",label:"FRONTIER",href:"/explore/frontier/"},
  {tier:3,code:"ESE",label:"SIGNALS",href:"/gauges/"},
  {tier:3,code:"SSE",label:"CAPITAL",href:"/finance/"},
  {tier:3,code:"SSW",label:"INFRA",href:"/explore/infrastructure/"},
  {tier:3,code:"WSW",label:"GOVERNANCE",href:"/governance/"},
  {tier:3,code:"WNW",label:"VISION",href:"/explore/frontier/vision/"},
  {tier:3,code:"NNW",label:"SHIMMER",href:"/explore/frontier/shimmer/"}
];

const stage=document.getElementById("stage");

function mkNode(item,className){
  const d=document.createElement("div");
  d.className="node surface "+className;
  const inner=document.createElement("div");
  inner.className="inner";
  inner.innerHTML=`<div class="word">${item.label}</div><div class="code">${item.code}</div>`;
  d.appendChild(inner);
  d.onclick=()=>location.href=item.href;
  return d;
}

function layout(){
  stage.innerHTML="";
  const rect=stage.getBoundingClientRect();
  const cx=rect.width/2;
  const cy=rect.height/2;

  const R1=parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--R1"));
  const R2=parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--R2"));
  const R3=parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--R3"));

  const core=mkNode({label:"INDEX",code:"CORE",href:"/index-core/"},"core");
  core.style.left=cx+"px";
  core.style.top=cy+"px";
  stage.appendChild(core);

  function place(list,radius,className,startAngle){
    list.forEach((item,i)=>{
      const angle=startAngle+(i/list.length)*Math.PI*2;
      const x=cx+radius*Math.cos(angle);
      const y=cy+radius*Math.sin(angle);
      const n=mkNode(item,className);
      n.style.left=x+"px";
      n.style.top=y+"px";
      stage.appendChild(n);
    });
  }

  place(ROUTES.filter(r=>r.tier===1),R1,"l1",-Math.PI/2);
  place(ROUTES.filter(r=>r.tier===2),R2,"l2",-Math.PI/4);
  place(ROUTES.filter(r=>r.tier===3),R3,"l3",-Math.PI/8);
}

requestAnimationFrame(layout);
window.addEventListener("resize",layout);

})();
</script>

</body>
</html>
