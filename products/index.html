<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Products</title>

<link rel="stylesheet" href="/assets/ui.css"/>
<link rel="stylesheet" href="/assets/branch.css"/>

<style>
body{margin:0;color:#fff;font-family:system-ui}

/* ===== ROOT ===== */
:root{
  --ink:rgba(255,255,255,.95);
}

/* ===== PAGE ===== */
.page{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  overflow:hidden;
}

/* ===== BACKGROUND ===== */
.bg{
  position:absolute;
  inset:0;
  z-index:0;

  background:
    radial-gradient(circle at 30% 30%, rgba(255,43,43,.18), transparent 60%),
    radial-gradient(circle at 70% 70%, rgba(0,0,0,.6), transparent 70%),
    linear-gradient(180deg, #050608, #0b0d12);
}

/* ===== WATERFALL ===== */
.waterfall{
  position:absolute;
  inset:0;
  z-index:1;
  pointer-events:none;

  background:
    repeating-linear-gradient(
      to bottom,
      rgba(255,255,255,.05) 0px,
      rgba(255,255,255,.02) 6px,
      transparent 12px
    );

  animation:waterfallFlow 1.2s linear infinite;
  opacity:.35;
}

@keyframes waterfallFlow{
  from{transform:translateY(0)}
  to{transform:translateY(40px)}
}

/* ===== CONTENT ===== */
.content{
  position:relative;
  z-index:2;
  text-align:center;
}

/* TITLE */
.title{
  font-size:42px;
  font-weight:900;
  letter-spacing:.08em;
}

.subtitle{
  margin-top:10px;
  opacity:.8;
  font-size:16px;
}

/* ===== DIAMOND FIELD ===== */
.field{
  margin-top:60px;
  display:flex;
  gap:80px;
  justify-content:center;
}

/* NODE */
.node{
  width:160px;
  height:160px;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* DIAMOND */
.diamond{
  width:100%;
  height:100%;
  border:1px solid rgba(255,255,255,.3);
  transform:rotate(45deg);
  position:relative;
}

/* ROTATION */
.spin-cw{animation:spinCW 12s linear infinite;}
.spin-ccw{animation:spinCCW 12s linear infinite;}

@keyframes spinCW{
  from{transform:rotate(45deg)}
  to{transform:rotate(405deg)}
}

@keyframes spinCCW{
  from{transform:rotate(45deg)}
  to{transform:rotate(-315deg)}
}

/* INNER (STABILIZATION) */
.inner{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  transform:rotate(-45deg);
}

/* TEXT */
.label{
  font-size:18px;
  font-weight:900;
  letter-spacing:.25em;
}

/* ===== NAV ===== */
.nav{
  position:absolute;
  left:16px;
  top:16px;
  z-index:3;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.btn{
  padding:10px 14px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,.2);
  background:rgba(0,0,0,.4);
  color:#fff;
  text-decoration:none;
}
</style>
</head>

<body>

<div class="page">

  <!-- BACKGROUND -->
  <div class="bg"></div>
  <div class="waterfall"></div>

  <!-- NAV -->
  <div class="nav">
    <a class="btn" href="/index.html">COMPASS</a>
    <a class="btn" href="/products/">PRODUCTS</a>
    <a class="btn" href="/explore/">EXPLORE</a>
    <a class="btn" href="/gauges/">GAUGES</a>
  </div>

  <!-- CONTENT -->
  <div class="content">
    <div class="title">PRODUCTS</div>
    <div class="subtitle">
      Choose your path. What exists now, or what is being built next.
    </div>

    <div class="field">

      <!-- NOW -->
      <div class="node">
        <div class="diamond spin-cw">
          <div class="inner">
            <div class="label">NOW</div>
          </div>
        </div>
      </div>

      <!-- FUTURE -->
      <div class="node">
        <div class="diamond spin-ccw">
          <div class="inner">
            <div class="label">FUTURE</div>
          </div>
        </div>
      </div>

    </div>
  </div>

</div>

<script>
document.querySelectorAll(".node")[0].onclick=()=>location.href="/products/now/";
document.querySelectorAll(".node")[1].onclick=()=>location.href="/explore/";
</script>

</body>
</html>
