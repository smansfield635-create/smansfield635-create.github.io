     FRONTIER · ENERGY SYSTEMS (INFORMAL SITE LAYER — NEW STANDARD)
     PURPOSE:
       - Define energy instability problem (human first)
       - Express industrial substitution posture (bounded, measurable)
       - Integrate with Waste + Water + Urban OS + Closed Loop
       - Route forward to related frontier rooms
     REQUIREMENTS (NEW STANDARD):
       - Trilingual: EN / 中文 / ES
       - LENSES (VISIBLE ONLY):
           lane=platform|engineering (URL-only; NEVER stored)
         (Informal/formal is NOT user-visible in this layer.)
       - Pins this page to informal layer:
           style = informal (stored in gd_style)
           depth = explore  (stored in gd_depth)
       - Single-open accordion (one open at a time)
       - Switching LANG or LANE does NOT reload page
       - Switching LANG or LANE does NOT close the open section
       - Canon state carry: lang/style/time/depth via URL + LS gd_lang/gd_style/gd_time/gd_depth ONLY
       - NO new gd_* keys

       - Uses /assets/ui.css + /assets/branch.css + /assets/instruments.js
       - ui.css owns html/body background (NO overrides)
-->

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>FRONTIER · Energy Systems</title>

<link rel="stylesheet" href="/assets/ui.css"/>
<link rel="stylesheet" href="/assets/branch.css"/>
<script defer src="/assets/instruments.js"></script>

<style>
a{color:inherit;text-decoration:none}
body{margin:0;color:#fff;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
body::before,body::after{pointer-events:none!important}

:root{
  --dockH:112px;

  /* Red / Black / Gold hierarchy */
  --stroke:rgba(255,255,255,.12);
  --stroke2:rgba(255,255,255,.10);

  --ink:rgba(255,255,255,.94);
  --txt:rgba(255,255,255,.90);
  --mut:rgba(255,255,255,.78);
  --mut2:rgba(255,255,255,.72);

  --crimson:rgba(120,0,22,.30);
  --festival:rgba(255,43,43,.14);
  --opalV:rgba(90,40,120,.10);
  --goldSoft:rgba(201,162,74,.18);

  --shadowA:0 28px 110px rgba(0,0,0,.62);
  --shadowB:0 18px 60px rgba(0,0,0,.55);
  --shadowC:0 40px 120px rgba(0,0,0,.60);
}

/* ===== Page ===== */
.page{
  width:min(1200px,94vw);
  margin:0 auto;
  padding:104px 0 calc(var(--dockH) + 22px);
  display:flex;
  flex-direction:column;
  gap:14px;
  position:relative;
  z-index:10;
}

/* ===== Top controls ===== */
.top{
  position:fixed;top:16px;left:0;right:0;
  padding:0 16px;
  display:flex;justify-content:space-between;align-items:center;
  gap:12px;z-index:240;
  pointer-events:none;
}
.top .left,.top .right{
  display:flex;gap:10px;align-items:center;flex-wrap:wrap;white-space:nowrap;
  pointer-events:auto;
}

/* Button (gold under-light only) */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:10px 12px;min-height:44px;border-radius:16px;
  border:1px solid rgba(255,255,255,.14);
  background:
    radial-gradient(circle at 50% 120%, rgba(201,162,74,.16), transparent 64%),
    linear-gradient(145deg, rgba(10,12,16,.78), rgba(6,8,10,.90));
  color:var(--ink);
  font-weight:950;font-size:14px;letter-spacing:.2px;
  -webkit-tap-highlight-color:transparent;
  position:relative;overflow:hidden;
  touch-action:manipulation;
  box-shadow:var(--shadowB);
  white-space:nowrap;
}
.btn:active{transform:translateY(1px)}
.btn::after{
  content:"";
  position:absolute;left:10px;right:10px;bottom:-12px;height:28px;
  background: radial-gradient(circle at 50% 0%, rgba(201,162,74,.34), transparent 72%);
  opacity:.60;pointer-events:none;
}
.btn.red{border-color:rgba(255,43,43,.22); box-shadow:var(--shadowB), 0 0 18px rgba(255,43,43,.12);}

/* Segmented controls */
.seg{
  display:inline-flex;gap:0;overflow:hidden;border-radius:16px;
  border:1px solid rgba(255,255,255,.12);
  background: rgba(0,0,0,.16);
  box-shadow: var(--shadowB);
}
.seg button{
  appearance:none;border:0;background:transparent;color:var(--mut);
  padding:10px 12px;min-height:44px;font-weight:950;font-size:13px;
  letter-spacing:.25px;cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
.seg button[aria-pressed="true"]{
  color:var(--ink);
  background:
    radial-gradient(circle at 50% 120%, rgba(201,162,74,.22), transparent 62%),
    linear-gradient(180deg, rgba(255,43,43,.10), rgba(0,0,0,.10));
  box-shadow: inset 0 -10px 22px rgba(201,162,74,.16);
}

/* ===== Background context (behind content; not body) ===== */
.backdrop{
  position:absolute;
  left:50%;
  top:68px;
  transform:translateX(-50%);
  width:min(1240px,96vw);
  height:calc(100% - 108px);
  border-radius:34px;
  pointer-events:none;
  z-index:0;
  overflow:hidden;
}
.backdrop::before{
  content:"";
  position:absolute;inset:0;
  border:1px solid rgba(255,255,255,.08);
  border-radius:34px;
  background:
    radial-gradient(circle at 18% 20%, rgba(201,162,74,.10), transparent 60%),
    radial-gradient(circle at 78% 22%, rgba(255,43,43,.12), transparent 62%),
    radial-gradient(circle at 60% 90%, rgba(90,40,120,.10), transparent 64%),
    linear-gradient(160deg, rgba(0,0,0,.18), rgba(0,0,0,.08));
  box-shadow:
    0 70px 220px rgba(0,0,0,.62),
    inset 0 2px 0 rgba(255,255,255,.06),
    inset 0 -70px 140px rgba(0,0,0,.55);
  opacity:.92;
}
.backdrop::after{
  content:"";
  position:absolute;inset:-18%;
  background:
    radial-gradient(circle at 18% 34%, rgba(255,43,43,.18), transparent 44%),
    radial-gradient(circle at 84% 30%, rgba(255,43,43,.14), transparent 46%),
    radial-gradient(circle at 52% 78%, rgba(201,162,74,.12), transparent 48%),
    conic-gradient(from 12deg at 30% 28%,
      rgba(201,162,74,.14), transparent 12%,
      rgba(255,43,43,.12), transparent 24%,
      rgba(90,40,120,.10), transparent 38%,
      transparent 100%),
    conic-gradient(from 180deg at 70% 36%,
      rgba(255,43,43,.12), transparent 14%,
      rgba(201,162,74,.12), transparent 28%,
      rgba(90,40,120,.10), transparent 44%,
      transparent 100%),
    radial-gradient(circle at 50% 50%, rgba(255,255,255,.04), transparent 62%);
  filter:blur(1px);
  opacity:.72;
}

/* ===== Header ===== */
.header{
  position:relative;
  z-index:2;
  border:1px solid rgba(255,255,255,.12);
  border-radius:28px;
  background:
    radial-gradient(circle at 18% 22%, var(--crimson), transparent 70%),
    radial-gradient(circle at 82% 26%, var(--opalV), transparent 72%),
    radial-gradient(circle at 60% 90%, var(--festival), transparent 70%),
    radial-gradient(circle at 26% 22%, rgba(201,162,74,.12), transparent 62%),
    linear-gradient(160deg, rgba(0,0,0,.22), rgba(0,0,0,.12));
  padding:22px;
  box-shadow:var(--shadowA);
  overflow:hidden;
}
.header::before{
  content:"";
  position:absolute;inset:0;border-radius:28px;pointer-events:none;
  box-shadow: inset 0 0 0 1px rgba(201,162,74,.14);
  background:
    repeating-linear-gradient(45deg, rgba(201,162,74,.08) 0 1px, transparent 1px 16px),
    repeating-linear-gradient(-45deg, rgba(201,162,74,.06) 0 1px, transparent 1px 16px);
  opacity:.24;
  mask:
    radial-gradient(circle at 50% 50%, transparent 0 78%, #000 82% 100%),
    linear-gradient(#000,#000);
  -webkit-mask:
    radial-gradient(circle at 50% 50%, transparent 0 78%, #000 82% 100%),
    linear-gradient(#000,#000);
}
.k{margin:0 0 10px;font-size:12px;letter-spacing:6px;text-transform:uppercase;opacity:.72;color:var(--mut);position:relative}
.t{margin:0 0 12px;font-weight:980;font-size:42px;letter-spacing:1px;color:var(--ink);position:relative;line-height:1.08}
.s{margin:0;font-size:18px;line-height:1.65;max-width:1000px;color:rgba(255,255,255,.88);position:relative}

/* ===== Lens strip (NEW STANDARD) ===== */
.lensRow{
  margin-top:16px;
  display:flex;
  gap:12px;
  justify-content:space-between;
  flex-wrap:wrap;
  align-items:center;
}
.statePill{
  display:inline-flex;align-items:center;gap:8px;
  padding:10px 12px;border-radius:999px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(0,0,0,.16);
  color:var(--mut);
  font-weight:950;
  box-shadow:0 14px 36px rgba(0,0,0,.55);
}

/* ===== Accordion ===== */
.accordion{
  position:relative;
  z-index:2;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.section{
  border:1px solid rgba(255,255,255,.10);
  border-radius:26px;
  overflow:hidden;
  background:
    radial-gradient(circle at 22% 18%, rgba(255,43,43,.10), transparent 58%),
    radial-gradient(circle at 82% 30%, rgba(90,40,120,.10), transparent 66%),
    linear-gradient(160deg, rgba(18,22,35,.92), rgba(8,12,20,.98));
  box-shadow:var(--shadowC);
  position:relative;
}
.section::before{
  content:"";
  position:absolute;inset:0;border-radius:26px;pointer-events:none;
  box-shadow: inset 0 0 0 1px rgba(201,162,74,.12);
  opacity:.60;
}

.head{
  padding:18px 18px;
  cursor:pointer;
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:12px;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
  position:relative;
}
.titleWrap{min-width:0}
.title{
  font-size:22px;
  font-weight:980;
  letter-spacing:.4px;
  color:var(--ink);
}
.subline{
  margin-top:8px;
  font-size:14.5px;
  line-height:1.5;
  color:rgba(255,255,255,.86);
  opacity:.92;
  max-width:92ch;
}
.chev{
  width:36px;height:36px;border-radius:14px;
  border:1px solid rgba(255,255,255,.14);
  background: rgba(0,0,0,.16);
  display:flex;align-items:center;justify-content:center;
  color:var(--mut);
  font-weight:980;
  position:relative;overflow:hidden;
  flex:0 0 auto;margin-top:2px;
}
.chev::after{
  content:"";
  position:absolute;left:6px;right:6px;bottom:-10px;height:22px;
  background: radial-gradient(circle at 50% 0%, rgba(201,162,74,.30), transparent 70%);
  opacity:.62;pointer-events:none;
}
.body{
  display:none;
  padding:18px 20px 20px;
  border-top:1px solid rgba(255,255,255,.08);
  font-size:17px;
  line-height:1.75;
  color:rgba(255,255,255,.82);
  position:relative;
}
.section.open .body{display:block}

.body p{margin:0}
.body p + p{margin-top:12px}

.smallband{
  margin-top:14px;
  padding:10px 12px;
  border-radius:18px;
  border:1px solid rgba(255,255,255,.10);
  background:rgba(0,0,0,.14);
  font-weight:980;
  letter-spacing:.15px;
  color:rgba(255,255,255,.86);
  font-size:13px;
}

/* Sub-bubbles */
.subBubbles{margin-top:12px;display:flex;flex-direction:column;gap:10px}
.bubble{
  border:1px solid rgba(255,255,255,.10);
  border-radius:18px;
  background:
    radial-gradient(circle at 22% 18%, rgba(255,43,43,.08), transparent 60%),
    radial-gradient(circle at 82% 70%, rgba(201,162,74,.08), transparent 62%),
    rgba(0,0,0,.12);
  padding:14px 14px 12px;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
  position:relative;
  overflow:hidden;
}
.bubble::after{
  content:"";
  position:absolute;left:10px;right:10px;bottom:-14px;height:30px;
  background: radial-gradient(circle at 50% 0%, rgba(201,162,74,.22), transparent 72%);
  opacity:.50;pointer-events:none;
}
.bubble h4{
  margin:0 0 8px;
  font-weight:980;
  letter-spacing:.15px;
  font-size:15px;
  color:var(--ink);
}
.bubble p{
  margin:0;
  color:rgba(255,255,255,.80);
  line-height:1.7;
  display:none;
  font-size:14.5px;
}
.bubble.open p{display:block}

/* Actions */
.actions{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  justify-content:flex-end;
  margin-top:14px;
}

/* ===== Dock ===== */
.dock{
  position:fixed;
  left:50%;
  bottom:max(10px, env(safe-area-inset-bottom));
  transform:translateX(-50%);
  width:min(1000px,94vw);
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
  padding:12px;
  border-radius:24px;
  border:1px solid rgba(255,255,255,.12);
  background:
    radial-gradient(circle at 18% 18%, rgba(255,43,43,.10), transparent 62%),
    radial-gradient(circle at 82% 70%, rgba(90,40,120,.10), transparent 64%),
    linear-gradient(145deg, rgba(10,12,16,.72), rgba(6,8,10,.86));
  backdrop-filter:blur(10px);
  box-shadow:0 18px 60px rgba(0,0,0,.55);
  z-index:220;
}
.dock .btn{
  padding:12px;
  border-radius:999px;
  text-align:center;
  font-weight:950;
}

@media (max-width:560px){
  :root{--dockH:132px}
  .dock{grid-template-columns:repeat(2,1fr)}
  .t{font-size:36px}
}
</style>
</head>

<body>

<div class="top" aria-label="Top controls">
  <div class="left">
    <a class="btn" id="btnFrontier" data-route="/explore/frontier/" href="/explore/frontier/">FRONTIER</a>
    <a class="btn" id="btnExplore" data-route="/explore/" href="/explore/">EXPLORE</a>
  </div>
  <div class="right" aria-label="Controls">
    <div class="seg" role="group" aria-label="Language">
      <button type="button" id="langEN" aria-pressed="true">EN</button>
      <button type="button" id="langZH" aria-pressed="false">中文</button>
      <button type="button" id="langES" aria-pressed="false">ES</button>
    </div>
    <div class="seg" role="group" aria-label="Lane">
      <button type="button" id="lanePlatform" aria-pressed="true">PLATFORM</button>
      <button type="button" id="laneEngineering" aria-pressed="false">ENGINEERING</button>
    </div>
  </div>
</div>

<div class="page">
  <div class="backdrop" aria-hidden="true"></div>

  <div class="header">
    <p class="k" id="hk">FRONTIER</p>
    <h1 class="t" id="ht">ENERGY SYSTEMS</h1>
    <p class="s" id="hs"></p>

    <div class="lensRow" aria-label="Lens state">
      <div class="statePill" id="laneState">—</div>
      <div class="statePill" id="langState">—</div>
    </div>
  </div>

  <div class="accordion" id="accordion"></div>
</div>

<nav class="dock" aria-label="Related frontier">
  <a class="btn" id="navWater" data-route="/explore/frontier/water/" href="/explore/frontier/water/">WATER</a>
  <a class="btn" id="navUrban" data-route="/explore/frontier/urban/" href="/explore/frontier/urban/">URBAN OS</a>
  <a class="btn" id="navClosed" data-route="/explore/frontier/closed-loop/" href="/explore/frontier/closed-loop/">CLOSED LOOP</a>
  <a class="btn" id="navWaste" data-route="/explore/frontier/waste/" href="/explore/frontier/waste/">WASTE</a>
</nav>

<script>
(function(){
  "use strict";

  // ===== Canon state (gd_* only; no new keys) =====
  var qs=new URLSearchParams(location.search);
  var LS=window.localStorage;

  var lang  = qs.get("lang")  || LS.getItem("gd_lang")  || "en";
  var time  = qs.get("time")  || LS.getItem("gd_time")  || "now";
  var depth = qs.get("depth") || LS.getItem("gd_depth") || "1";
  var lane  = qs.get("lane")  || "platform"; // URL-only

  // Pin informal layer
  var style = "informal";

  if(lang!=="en" && lang!=="zh" && lang!=="es") lang="en";
  if(time==="trajectory") time="post";
  if(time!=="origin" && time!=="now" && time!=="post") time="now";

  var d=parseInt(depth,10);
  if(!isFinite(d)) d=1;
  if(d<1) d=1;
  if(d>9) d=9;
  depth=String(d);

  if(lane!=="platform" && lane!=="engineering") lane="platform";

  try{
    LS.setItem("gd_lang",lang);
    LS.setItem("gd_style","informal");
    LS.setItem("gd_time",time);
    LS.setItem("gd_depth","explore");
  }catch(e){}

  document.documentElement.lang=(lang==="zh")?"zh":(lang==="es")?"es":"en";

  function q(over){
    var p=new URLSearchParams();
    p.set("lang",(over&&over.lang)?over.lang:lang);
    p.set("style","informal");
    p.set("time",(over&&over.time)?over.time:time);
    p.set("depth","explore");
    p.set("lane",(over&&over.lane)?over.lane:lane);
    return "?"+p.toString();
  }

  function setPressed(ids, activeId){
    for(var i=0;i<ids.length;i++){
      var el=document.getElementById(ids[i]);
      if(!el) continue;
      el.setAttribute("aria-pressed", ids[i]===activeId ? "true" : "false");
    }
  }

  function pick3(en,zh,es){ return (lang==="zh")?zh:(lang==="es")?es:en; }
  function P(en,zh,es){ return {en:en, zh:zh, es:es}; }
  function pick(o){ return (lang==="zh")?o.zh:(lang==="es")?(o.es||o.en):o.en; }

  function laneLabel(){
    return (lang==="zh") ? (lane==="engineering"?"工程":"平台")
      : (lang==="es") ? (lane==="engineering"?"INGENIERÍA":"PLATAFORMA")
      : (lane==="engineering"?"ENGINEERING":"PLATFORM");
  }
  function openLabel(){
    return (lang==="zh")?"打开":(lang==="es")?"ABRIR":"OPEN";
  }

  // Wire all internal links with pinned state (and lane)
  function wireAll(){
    var nodes=document.querySelectorAll("[data-route]");
    for(var i=0;i<nodes.length;i++){
      var el=nodes[i];
      var route=el.getAttribute("data-route")||"";
      if(!route) continue;

      if(route.indexOf("?")!==-1){
        try{
          var u=new URL(route, location.origin);
          var sp=u.searchParams;
          sp.set("lang", lang);
          sp.set("style","informal");
          sp.set("time", time);
          sp.set("depth","explore");
          sp.set("lane", lane);
          el.setAttribute("href", u.pathname + "?" + sp.toString() + (u.hash||""));
        }catch(e){
          el.setAttribute("href", route);
        }
      }else{
        el.setAttribute("href", route + q());
      }
    }
  }

  // ===== Copy =====
  var headerCopy = {
    en:{
      platform:"Energy is not scarce. Stability is. When generation, storage, and routing fall out of alignment, volatility replaces reliability.",
      engineering:"Engineering view: stability is a control problem. Define boundaries, measure drift, contain failure locally, and only then scale throughput."
    },
    zh:{
      platform:"能源并不稀缺，稳定性才稀缺。当发电、储存与路由失衡，波动取代可靠。",
      engineering:"工程视图：稳定性是控制问题。先定义边界，测漂移，局部隔离，再谈扩张吞吐。"
    },
    es:{
      platform:"La energía no es escasa. La estabilidad sí lo es. Cuando generación, almacenamiento y ruteo se desalinean, la volatilidad reemplaza la confiabilidad.",
      engineering:"Vista de ingeniería: la estabilidad es un problema de control. Define límites, mide deriva, contiene fallas localmente y luego escala."
    }
  };

  var sections = [
    {
      key:"instability",
      t:P("THE INSTABILITY","不稳定性","INESTABILIDAD"),
      s:P("Reliability fails when the system loses alignment under load.","可靠性在负载下失去对齐时崩。","La confiabilidad falla cuando el sistema se desalinean bajo carga."),
      platform:{
        p:[
          P(
            "Blackouts are not mysteries. They are alignment failures: supply spikes, demand surges, storage lags, and routing fragments.",
            "停电不是神秘事件，而是对齐失败：供应激增、需求冲击、储存滞后、路由碎裂。",
            "Los apagones no son misterios. Son fallas de alineación: picos de oferta, picos de demanda, rezagos de almacenamiento y ruteo fragmentado."
          ),
          P(
            "This page treats energy as a system you can stabilize: measure the mismatch, tighten the boundaries, and stop cascade before it spreads.",
            "本页把能源视为可稳定的系统：测错配、收紧边界、在扩散前阻断级联。",
            "Esta página trata energía como un sistema estabilizable: medir el desajuste, ajustar límites y detener la cascada."
          )
        ],
        bullets:[
          P("If you can’t measure it, you can’t stabilize it.","不能测量，就无法稳定。","Si no se mide, no se estabiliza."),
          P("Scale amplifies small mismatches into large outages.","规模会放大小错配为大停电。","La escala amplifica desajustes en fallas grandes."),
          P("Containment beats hero moves.","隔离胜过英雄主义。","Contención vence a héroes.")
        ]
      },
      engineering:{
        p:[
          P(
            "Instability is a control failure under constrained capacity: generation↔storage↔routing are misaligned across variance bands.",
            "不稳定是约束容量下的控制失败：发电↔储存↔路由在方差带内错位。",
            "La inestabilidad es falla de control bajo capacidad restringida: generación↔almacenamiento↔ruteo desalineados bajo variación."
          ),
          P(
            "Engineering posture: define measurable envelopes, enforce thresholds, localize failures, and avoid escalation beyond measurement capability.",
            "工程姿态：定义可测包络、执行阈值、局部化失败、不得超测量能力升级。",
            "Postura: definir envolventes medibles, aplicar umbrales, localizar fallas y no escalar más allá de la medición."
          )
        ],
        bullets:[
          P("Inputs: generation, storage state, routing capacity, demand variance.","输入：发电、储存状态、路由容量、需求方差。","Entradas: generación, estado de almacenamiento, capacidad de ruteo, varianza de demanda."),

        {h:P("Build Now","现在建","Construir ahora"), platform:P("Start with what already exists: waste heat, routing, and measurable baselines.","从已有系统开始：废热、路由、可测基线。","Empezar con lo existente: calor residual, ruteo y líneas base medibles."), engineering:P("Define interfaces + thresholds; implement containment-first deployment.","定义接口+阈值；实施隔离优先部署。","Definir interfaces+umbrales; desplegar con contención primero.")},

        {h:P("Roadmap","路线图","Hoja de ruta"), platform:P("Use the same traversal logic across Waste/Water/Urban.","把同一遍历逻辑用于废弃物/水/城市。","Usar la misma lógica de recorrido para Residuos/Agua/Urbano."), engineering:P("Bind to lattice + registry for cross-domain comparability.","绑定到晶格+注册表实现跨域可比。","Vincular a lattice+registro para comparabilidad cross-domain.")}

  // ===== Accordion state preserved across lens/lang changes =====
  var acc=document.getElementById("accordion");
  var rows=[]; // {wrap, chev, title, sub, body, p1, p2, band, b1p, b2p, b3p}
  var openIndex=0;

  function closeAll(){
    for(var i=0;i<rows.length;i++){
      rows[i].wrap.classList.remove("open");
      rows[i].chev.textContent="▸";
    }
  }

  function toggleRow(i){
    var isOpen=rows[i].wrap.classList.contains("open");
    if(isOpen){
      rows[i].wrap.classList.remove("open");
      rows[i].chev.textContent="▸";
      return;
    }
    closeAll();
    openIndex=i;
    rows[i].wrap.classList.add("open");
    rows[i].chev.textContent="▾";
  }

  function makeBubble(label, text){
    var b=document.createElement("div");
    b.className="bubble";
    b.setAttribute("role","button");
    b.tabIndex=0;

    var h=document.createElement("h4");
    h.textContent=label;

    var p=document.createElement("p");
    p.textContent=text;

    b.appendChild(h);
    b.appendChild(p);

    function act(){ b.classList.toggle("open"); }
    b.addEventListener("click", act, {passive:true});
    b.addEventListener("keydown", function(e){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); act(); }});

    return {wrap:b, p:p};
  }

  function buildRow(sec, idx){
    var row=document.createElement("div");
    row.className="section";

    var head=document.createElement("div");
    head.className="head";
    head.setAttribute("role","button");
    head.tabIndex=0;

    var titleWrap=document.createElement("div");
    titleWrap.className="titleWrap";

    var title=document.createElement("div");
    title.className="title";

    var subline=document.createElement("div");
    subline.className="subline";

    titleWrap.appendChild(title);
    titleWrap.appendChild(subline);

    var chev=document.createElement("div");
    chev.className="chev";
    chev.textContent="▸";

    head.appendChild(titleWrap);
    head.appendChild(chev);

    var body=document.createElement("div");
    body.className="body";

    var p1=document.createElement("p");
    var p2=document.createElement("p");
    body.appendChild(p1);
    body.appendChild(p2);

    var band=document.createElement("div");
    band.className="smallband";
    body.appendChild(band);

    var bubbles=document.createElement("div");
    bubbles.className="subBubbles";

    var b1=makeBubble(pick3("Concept","概念","Concepto"),"");
    var b2=makeBubble(pick3("Build Now","现在建","Construir ahora"),"");
    var b3=makeBubble(pick3("Roadmap","路线图","Hoja de ruta"),"");
    bubbles.appendChild(b1.wrap);
    bubbles.appendChild(b2.wrap);
    bubbles.appendChild(b3.wrap);
    body.appendChild(bubbles);

    var actions=document.createElement("div");
    actions.className="actions";

    var a1=document.createElement("a");
    a1.className="btn";
    a1.setAttribute("data-route","/explore/frontier/water/");
    actions.appendChild(a1);

    var a2=document.createElement("a");
    a2.className="btn";
    a2.setAttribute("data-route","/explore/frontier/waste/");
    actions.appendChild(a2);

    var a3=document.createElement("a");
    a3.className="btn red";
    a3.setAttribute("data-route","/explore/frontier/urban/");
    actions.appendChild(a3);

    body.appendChild(actions);

    function onToggle(){ toggleRow(idx); }
    head.addEventListener("click", onToggle, {passive:true});
    head.addEventListener("keydown", function(e){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); onToggle(); }});

    row.appendChild(head);
    row.appendChild(body);
    acc.appendChild(row);

    rows.push({
      wrap:row, chev:chev, title:title, sub:subline,
      p1:p1, p2:p2, band:band,
      b1p:b1.p, b2p:b2.p, b3p:b3.p,
      a1:a1, a2:a2, a3:a3
    });
  }

  function render(){
    acc.innerHTML="";
    rows=[];
    for(var i=0;i<sections.length;i++){
      buildRow(sections[i], i);
    }
    openIndex=0;
    toggleRow(0);
  }

  function applyHeader(){
    document.getElementById("hk").textContent = pick3("FRONTIER","前沿","FRONTERA");
    document.getElementById("ht").textContent = pick3("ENERGY SYSTEMS","能源系统","SISTEMAS DE ENERGÍA");

    var h = headerCopy[lang] || headerCopy.en;
    document.getElementById("hs").textContent = (lane==="engineering") ? h.engineering : h.platform;

    document.getElementById("laneState").textContent =
      (lang==="zh") ? ("当前透镜："+laneLabel()) :
      (lang==="es") ? ("Lente actual: "+laneLabel()) :
      ("Current lens: "+laneLabel());

    document.getElementById("langState").textContent =
      (lang==="zh") ? ("语言：中文") :
      (lang==="es") ? ("Idioma: ES") :
      ("Lang: EN");

    // top labels
    document.getElementById("btnFrontier").textContent = pick3("FRONTIER","前沿","FRONTERA");
    document.getElementById("btnExplore").textContent  = pick3("EXPLORE","探索","EXPLORAR");

    // dock labels
    document.getElementById("navWater").textContent  = pick3("WATER","水","AGUA");
    document.getElementById("navUrban").textContent  = pick3("URBAN OS","城市OS","SO URBANO");
    document.getElementById("navClosed").textContent = pick3("CLOSED LOOP","闭环","CICLO CERRADO");
    document.getElementById("navWaste").textContent  = pick3("WASTE","废弃物","RESIDUOS");

    // control labels
    document.getElementById("lanePlatform").textContent   = pick3("PLATFORM","平台","PLATAFORMA");
    document.getElementById("laneEngineering").textContent= pick3("ENGINEERING","工程","INGENIERÍA");

    setPressed(["langEN","langZH","langES"], lang==="zh"?"langZH":(lang==="es"?"langES":"langEN"));
    setPressed(["lanePlatform","laneEngineering"], lane==="engineering"?"laneEngineering":"lanePlatform");
  }

  function updateRows(){
    var keep=openIndex;

    for(var i=0;i<sections.length;i++){
      var sec=sections[i];
      var r=rows[i];

      r.title.textContent = pick(sec.t);
      r.sub.textContent   = pick(sec.s);

      var blk = (lane==="engineering") ? sec.engineering : sec.platform;

      r.p1.textContent = pick(blk.p[0]);
      r.p2.textContent = pick(blk.p[1]);

      // band text
      r.band.textContent =
        (lane==="engineering")
          ? pick3("ENGINEERING — constraints, interfaces, thresholds, containment.","工程 — 约束/接口/阈值/隔离。","INGENIERÍA — restricciones, interfaces, umbrales, contención.")
          : pick3("PLATFORM — human map, next step, clean routing.","平台 — 人话地图/下一步/干净路由。","PLATAFORMA — mapa humano, siguiente paso, ruteo limpio.");

      // sub-bubbles
      r.b1p.textContent = pick( (lane==="engineering") ? sec.bubbles[0].engineering : sec.bubbles[0].platform );
      r.b2p.textContent = pick( (lane==="engineering") ? sec.bubbles[1].engineering : sec.bubbles[1].platform );
      r.b3p.textContent = pick( (lane==="engineering") ? sec.bubbles[2].engineering : sec.bubbles[2].platform );

      // action labels
      r.a1.textContent = openLabel()+": "+pick3("WATER","水","AGUA");
      r.a2.textContent = openLabel()+": "+pick3("WASTE","废弃物","RESIDUOS");
      r.a3.textContent = openLabel()+": "+pick3("URBAN OS","城市OS","SO URBANO");
    }

    closeAll();
    toggleRow(keep);
    wireAll();
  }

  // ===== No reload on language/lane changes =====
  function setLang(next){
    if(next!=="en" && next!=="zh" && next!=="es") next="en";
    lang=next;
    try{ LS.setItem("gd_lang",lang);}catch(e){}
    history.replaceState({}, "", location.pathname + q({lang:lang}));
    applyHeader();
    updateRows();
  }

  function setLane(next){
    if(next!=="platform" && next!=="engineering") next="platform";
    lane=next;
    history.replaceState({}, "", location.pathname + q({lane:lane}));
    applyHeader();
    updateRows();
  }

  document.getElementById("langEN").addEventListener("click", function(){ setLang("en"); }, {passive:true});
  document.getElementById("langZH").addEventListener("click", function(){ setLang("zh"); }, {passive:true});
  document.getElementById("langES").addEventListener("click", function(){ setLang("es"); }, {passive:true});

  document.getElementById("lanePlatform").addEventListener("click", function(){ setLane("platform"); }, {passive:true});
  document.getElementById("laneEngineering").addEventListener("click", function(){ setLane("engineering"); }, {passive:true});

  // ===== INIT =====
  render();
  applyHeader();
  updateRows();
  wireAll();
})();
</script>
