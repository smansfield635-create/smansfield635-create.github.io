<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Nine Summits World</title>
<link rel="stylesheet" href="./assets/ui.css">
</head>

<body data-mode="world" data-diagnostics="peek">

<div id="app-shell">

  <!-- WORLD -->
  <canvas id="world-canvas"></canvas>

  <!-- NAV DOORS -->
  <div id="nav-doors">
    <a href="/home/index.html" class="nav-btn">HOME</a>
    <a href="/explore/index.html" class="nav-btn">EXPLORE</a>
  </div>

  <!-- HUD -->
  <div id="hud">

    <div id="runtime-banner">
      <span id="runtime-phase">BOOT</span>
    </div>

    <div id="debug-panel"></div>

    <div id="diagnostics-dock">
      <div id="diagnostics-bar">
        <div id="diagnostics-summary"></div>
        <button id="diagnostics-toggle"></button>
      </div>
    </div>

  </div>

</div>

<script type="module">
import { WORLD_KERNEL } from "./world/world_kernel.js";
import { createPlanetEngine } from "./world/planet_engine.js";
import { createRenderer } from "./world/render.js";
import { createControlSystem } from "./world/control.js";
import { createInstruments } from "./assets/instruments.js";

const canvas = document.getElementById("world-canvas");
const ctx = canvas.getContext("2d");

const renderer = createRenderer();
const control = createControlSystem();
const engine = createPlanetEngine();
const instruments = createInstruments();

const runtime = {
  phase: "BOOT",
  planetField: null,
  control: {},
  fps: 0
};

let last = performance.now();

/* ---------- CORE ---------- */

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  control.resize(canvas.width, canvas.height);
}

function buildWorld(){
  runtime.planetField = engine.buildPlanetField({});
}

function render(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  if(!runtime.planetField) return;

  renderer.renderPlanet({
    ctx,
    planetField: runtime.planetField,
    projectPoint: (lat,lon)=>control.projectSphere(lat,lon),
    viewState: control.getCameraState()
  });
}

function frame(now){
  const dt = now - last;
  last = now;
  runtime.fps = 1000 / dt;

  control.stepInertia();
  runtime.control = control.getCameraState();

  render();

  requestAnimationFrame(frame);
}

/* ---------- EVENTS ---------- */

let dragging = false;
let lx=0, ly=0;

canvas.addEventListener("pointerdown", e=>{
  dragging = true;
  lx=e.clientX; ly=e.clientY;
});

window.addEventListener("pointermove", e=>{
  if(!dragging) return;
  control.applyDrag(e.clientX-lx, e.clientY-ly);
  lx=e.clientX; ly=e.clientY;
});

window.addEventListener("pointerup", ()=> dragging=false);

/* ---------- START ---------- */

function start(){
  resize();
  buildWorld();
  runtime.phase="RUNNING";
  requestAnimationFrame(frame);
}

window.addEventListener("resize", resize);

start();
</script>

</body>
</html>
