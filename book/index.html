<!-- /book/index.html -->
<!doctype html>
<html
  lang="en"
  data-page="book-canonical-bridge"
  data-route="/book/"
  data-contract="BOOK_CANONICAL_BRIDGE_TO_NINE_SUMMITS_OF_LOVE_TNT_v1"
  data-target-route="/nine-summits-of-love/"
  data-role="route-bridge"
  data-generated-image="false"
  data-graphic-box="false"
  data-streaming="false"
  data-visual-pass-claimed="false"
>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta http-equiv="refresh" content="0; url=/nine-summits-of-love/">
  <link rel="canonical" href="/nine-summits-of-love/">
  <title>Diamond Gate Bridge · Book</title>
  <style>
    :root {
      --bg: #05060d;
      --panel: rgba(255,255,255,0.055);
      --line: rgba(255,255,255,0.16);
      --text: #f8f1dd;
      --muted: rgba(242,246,255,0.72);
      --gold: #f2c76f;
    }

    * { box-sizing: border-box; }

    html,
    body {
      min-height: 100%;
      margin: 0;
      background:
        radial-gradient(circle at 50% 20%, rgba(242,199,111,0.16), transparent 28rem),
        linear-gradient(180deg, #080b16, #030407);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      min-height: 100svh;
      display: grid;
      place-items: center;
      padding: 1.2rem;
      text-align: center;
    }

    .card {
      width: min(100%, 720px);
      padding: clamp(1rem, 4vw, 2rem);
      border: 1px solid var(--line);
      border-radius: 1.3rem;
      background: var(--panel);
      box-shadow: 0 2rem 6rem rgba(0,0,0,0.35);
    }

    .eyebrow {
      margin: 0 0 0.55rem;
      color: var(--gold);
      font-size: 0.78rem;
      font-weight: 950;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 7vw, 4rem);
      line-height: 0.96;
      letter-spacing: -0.06em;
    }

    p {
      width: min(100%, 560px);
      margin: 0.85rem auto 0;
      color: var(--muted);
      line-height: 1.5;
    }

    a {
      min-height: 2.45rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-top: 1rem;
      padding: 0.6rem 1rem;
      border-radius: 999px;
      color: #080a0f;
      background: linear-gradient(135deg, #fff0a3, #f2c76f);
      font-size: 0.78rem;
      font-weight: 950;
      letter-spacing: 0.06em;
      text-decoration: none;
      text-transform: uppercase;
    }
  </style>
</head>

<body>
  <main>
    <section class="card" aria-labelledby="page-title">
      <p class="eyebrow">Book Route Bridge</p>
      <h1 id="page-title">Opening The Nine Summits of Love.</h1>
      <p>This bridge preserves the short Book route while forwarding to the canonical book path.</p>
      <a href="/nine-summits-of-love/">Open the Book</a>
    </section>
  </main>

  <script>
    window.location.replace("/nine-summits-of-love/");
  </script>
</body>
</html>
