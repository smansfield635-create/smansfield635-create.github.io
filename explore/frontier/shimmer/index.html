<head>

<style>
a{color:inherit;text-decoration:none}
body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:#fff}
body::before,body::after{pointer-events:none!important}

:root{
  --dockH:122px;

  --stroke:rgba(255,255,255,.12);
  --stroke2:rgba(255,255,255,.10);

  --ink:rgba(255,255,255,.94);
  --txt:rgba(255,255,255,.92);
  --mut:rgba(255,255,255,.78);
  --mut2:rgba(255,255,255,.70);

  --crimson:rgba(120,0,22,.30);

  --shadowB:0 16px 56px rgba(0,0,0,.62);
  --shadowC:0 18px 60px rgba(0,0,0,.55);
}

/* ===== Top (fixed) ===== */
.top{
  position:fixed;top:16px;left:0;right:0;
  padding:0 16px;
  display:flex;justify-content:space-between;align-items:center;
  gap:12px;
  z-index:240;
  pointer-events:none;
}
.top .left,.top .right{
  display:flex;gap:10px;flex-wrap:wrap;white-space:nowrap;align-items:center;
  pointer-events:auto;
}

/* Button */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:10px 12px;min-height:44px;border-radius:16px;
  border:1px solid rgba(255,255,255,.14);
  background:
    radial-gradient(circle at 50% 120%, rgba(201,162,74,.16), transparent 64%),
    linear-gradient(145deg, rgba(10,12,16,.78), rgba(6,8,10,.90));
  color:var(--ink);
  font-weight:950;font-size:14px;letter-spacing:.2px;
  -webkit-tap-highlight-color:transparent;
  position:relative;overflow:hidden;
  touch-action:manipulation;
  box-shadow:var(--shadowC);
}
.btn:active{transform:translateY(1px)}
.btn::after{
  content:"";
  position:absolute;left:10px;right:10px;bottom:-12px;height:28px;
  background: radial-gradient(circle at 50% 0%, rgba(201,162,74,.34), transparent 72%);
  opacity:.60;pointer-events:none;
}
.btn.red{border-color:rgba(255,43,43,.22); box-shadow:var(--shadowC), 0 0 18px rgba(255,43,43,.12);}

/* Seg */
.seg{
  display:inline-flex;gap:0;overflow:hidden;border-radius:16px;
  border:1px solid rgba(255,255,255,.12);
  background: rgba(0,0,0,.16);
  box-shadow: var(--shadowC);
}
.seg button{
  appearance:none;border:0;background:transparent;color:var(--mut);
  padding:10px 12px;min-height:44px;font-weight:950;font-size:13px;
  letter-spacing:.25px;cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
.seg button[aria-pressed="true"]{
  color:var(--ink);
  background:
    radial-gradient(circle at 50% 120%, rgba(201,162,74,.22), transparent 62%),
    linear-gradient(180deg, rgba(255,43,43,.10), rgba(0,0,0,.10));
  box-shadow: inset 0 -10px 22px rgba(201,162,74,.16);
}

/* ===== Page ===== */
.page{
  width:min(1120px,94vw);
  margin:0 auto;
  padding:104px 0 calc(var(--dockH) + 18px);
  display:flex;
  flex-direction:column;
  gap:12px;
  position:relative;
  z-index:10;
}

/* ===== Background context (behind content; not body) ===== */
.backdrop{
  position:absolute;
  left:50%;
  top:68px;
  transform:translateX(-50%);
  width:min(1180px,96vw);
  height:calc(100% - 108px);
  border-radius:34px;
  pointer-events:none;
  z-index:0;
  overflow:hidden;
}
.backdrop::before{
  content:"";
  position:absolute;inset:0;
  border:1px solid rgba(255,255,255,.08);
  border-radius:34px;
  background:
    radial-gradient(circle at 18% 20%, rgba(201,162,74,.10), transparent 60%),
    radial-gradient(circle at 78% 22%, rgba(255,43,43,.12), transparent 62%),
    radial-gradient(circle at 60% 90%, rgba(90,40,120,.10), transparent 64%),
    linear-gradient(160deg, rgba(0,0,0,.18), rgba(0,0,0,.08));
  box-shadow:
    0 70px 220px rgba(0,0,0,.62),
    inset 0 2px 0 rgba(255,255,255,.06),
    inset 0 -70px 140px rgba(0,0,0,.55);
  opacity:.92;
}
.backdrop::after{
  content:"";
  position:absolute;inset:-18%;
  background:
    radial-gradient(circle at 22% 30%, rgba(90,40,120,.16), transparent 46%),
    radial-gradient(circle at 78% 26%, rgba(255,43,43,.14), transparent 48%),
    radial-gradient(circle at 52% 78%, rgba(201,162,74,.12), transparent 52%),
    conic-gradient(from 14deg at 34% 30%,
      rgba(201,162,74,.14), transparent 12%,
      rgba(90,40,120,.12), transparent 26%,
      rgba(255,43,43,.10), transparent 40%,
      transparent 100%),
    radial-gradient(circle at 50% 50%, rgba(255,255,255,.04), transparent 62%);

  opacity:.72;
}

/* ===== Header ===== */
.header{
  position:relative;
  z-index:2;
  border:1px solid var(--stroke);
  border-radius:22px;
  background:
    radial-gradient(circle at 18% 22%, var(--crimson), transparent 72%),
    radial-gradient(circle at 82% 34%, var(--opalV), transparent 74%),

    radial-gradient(circle at 26% 22%, rgba(201,162,74,.14), transparent 62%),

}
.header::before{
  content:"";

  -webkit-mask:
    radial-gradient(circle at 50% 50%, transparent 0 78%, #000 82% 100%),

}

.k{margin:0 0 8px;font-size:12px;letter-spacing:4px;text-transform:uppercase;opacity:.80;color:rgba(255,255,255,.78)}

}
.head{

}
.body{
  display:none;
  padding:16px 16px 16px;
  border-top:1px solid rgba(255,255,255,.08);

}
.row.open .body{display:block}
.row.open{border-color:rgba(255,43,43,.22); box-shadow:var(--shadowB), 0 0 18px rgba(255,43,43,.10);}

.pdesc{margin:0;color:rgba(255,255,255,.90);line-height:1.65;font-size:15px}
.pdesc + .pdesc{margin-top:10px}

.subBubbles{margin-top:12px;display:flex;flex-direction:column;gap:10px}
.bubble{

.bubble::after{

}
.bubble h4{margin:0 0 8px;font-weight:980;letter-spacing:.15px;font-size:15px;color:var(--ink)}
.bubble p{margin:0;color:rgba(255,255,255,.80);line-height:1.7;display:none;font-size:14.5px}
.bubble.open p{display:block}

.actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end;margin-top:14px}

/* Dock */
.dock{
  position:fixed;
  left:50%;
  bottom:max(10px, env(safe-area-inset-bottom));
  transform:translateX(-50%);
  z-index:220;
  width:min(980px,94vw);
  padding:10px 12px;
  border-radius:22px;
  border:1px solid rgba(255,255,255,.12);
  background:
    radial-gradient(circle at 18% 18%, rgba(255,43,43,.10), transparent 62%),
    radial-gradient(circle at 82% 70%, rgba(90,40,120,.10), transparent 64%),

@media (max-width:520px){
  :root{--dockH:132px}

<body>

<div class="top" aria-label="Top controls">
  <div class="left">

<script>
(function(){
  "use strict";

  // ===== Canon state (gd_* only; no new keys) =====
  var qs=new URLSearchParams(location.search);
  var LS=window.localStorage;

  var lang  = qs.get("lang")  || LS.getItem("gd_lang")  || "en";
  var time  = qs.get("time")  || LS.getItem("gd_time")  || "now";
  var lane  = qs.get("lane")  || "platform"; // URL-only

  // Pin informal layer
  var style = "informal";
  var depth = "explore";

  if(lang!=="en" && lang!=="zh" && lang!=="es") lang="en";
  if(time==="trajectory") time="post";
  if(time!=="origin" && time!=="now" && time!=="post") time="now";
  if(lane!=="platform" && lane!=="engineering") lane="platform";

  try{
    LS.setItem("gd_lang",lang);
    LS.setItem("gd_style","informal");
    LS.setItem("gd_time",time);
    LS.setItem("gd_depth","explore");
  }catch(e){}

  document.documentElement.lang=(lang==="zh")?"zh":(lang==="es")?"es":"en";

  function q(over){
    var p=new URLSearchParams();
    p.set("lang",(over&&over.lang)?over.lang:lang);
    p.set("style","informal");
    p.set("time",(over&&over.time)?over.time:time);
    p.set("depth","explore");
    var L=(over&&over.lane)?over.lane:lane;
    if(L==="platform"||L==="engineering") p.set("lane",L);
    return "?"+p.toString();
  }

  function setPressed(ids, activeId){
    for(var i=0;i<ids.length;i++){
      var el=document.getElementById(ids[i]);
      if(!el) continue;
      el.setAttribute("aria-pressed", ids[i]===activeId ? "true" : "false");
    }
  }

  function pick3(en,zh,es){ return (lang==="zh")?zh:(lang==="es")?es:en; }
  function laneLabel(){
    return (lang==="zh") ? (lane==="engineering"?"工程":"平台")
      : (lang==="es") ? (lane==="engineering"?"INGENIERÍA":"PLATAFORMA")
      : (lane==="engineering"?"ENGINEERING":"PLATFORM");
  }
  function openLabel(){ return (lang==="zh")?"打开":(lang==="es")?"ABRIR":"OPEN"; }
  function labConcept(){ return (lang==="zh")?"概念":(lang==="es")?"Concepto":"Concept"; }
  function labBuild(){ return (lang==="zh")?"现在建":(lang==="es")?"Construir ahora":"Build Now"; }
  function labRoadmap(){ return (lang==="zh")?"路线图":(lang==="es")?"Hoja de ruta":"Roadmap"; }

  // Wire all internal links with pinned state (and lane)
  function wireAll(){
    var nodes=document.querySelectorAll("[data-route]");
    for(var i=0;i<nodes.length;i++){
      var el=nodes[i];
      var route=el.getAttribute("data-route")||"";
      if(!route) continue;

      if(route.indexOf("?")!==-1){
        try{
          var u=new URL(route, location.origin);
          var sp=u.searchParams;
          sp.set("lang", lang);
          sp.set("style","informal");
          sp.set("time", time);
          sp.set("depth","explore");
          sp.set("lane", lane);
          el.setAttribute("href", u.pathname + "?" + sp.toString() + (u.hash||""));
        }catch(e){
          el.setAttribute("href", route);
        }
      }else{
        el.setAttribute("href", route + q());
      }
    }
  }

  // ===== Header copy (lane-aware; pinned informal) =====
  var HEAD={
    en:{
      platform:{
        hs:"Shimmer is where systems stop trusting ‘what feels true’ and start protecting clarity. It treats perception as a routing problem: signal gets distorted, beliefs form, and behavior follows.",
        rule:"Rule: do not argue beliefs. Measure distortion, restore signal, and keep the interface honest."
      },
      engineering:{
        hs:"Engineering view: Shimmer models signal distortion as measurable variance between source and interpretation under bounded interfaces. Stabilization requires thresholds, feedback, and deterministic recalibration triggers.",
        rule:"Rule: define variance bands, detect drift early, and trigger correction before distortion becomes behavior at scale."
      }
    },
    zh:{
      platform:{
        hs:"Shimmer 用来保护清晰度：当系统不再依赖“感觉正确”，而是把感知当作路由问题：信号被扭曲→信念形成→行为跟随。",
        rule:"规则：不争论信念。测量失真、恢复信号、让界面保持诚实。"
      },
      engineering:{
        hs:"工程视图：Shimmer 把信号失真建模为在有界接口下，信号源与认知解释之间的可测方差。稳定需要阈值、反馈与确定性再校准触发。",
        rule:"规则：定义方差带，提前检测漂移，在失真以规模化方式变成行为之前触发修正。"
      }
    },
    es:{
      platform:{
        hs:"Shimmer protege claridad: deja de confiar en ‘lo que se siente cierto’ y trata percepción como ruteo: la señal se distorsiona, se forman creencias y el comportamiento sigue.",
        rule:"Regla: no discutir creencias. Medir distorsión, restaurar señal y mantener la interfaz honesta."
      },
      engineering:{
        hs:"Vista de ingeniería: Shimmer modela distorsión como varianza medible entre fuente e interpretación bajo interfaces acotadas. Estabilización requiere umbrales, feedback y disparadores deterministas de recalibración.",
        rule:"Regla: definir bandas de varianza, detectar deriva temprano y corregir antes de que la distorsión se vuelva conducta a escala."
      }
    }
  };

  // ===== Domains (cards) =====
  var DOMAINS=[
    {
      c:"#c9a24a",
      t:{en:"Signal Integrity Modeling", zh:"信号完整性建模", es:"Modelado de integridad de señal"},
      s:{en:"Where signal gets bent before humans notice.", zh:"信号在被人察觉前如何弯曲。", es:"Dónde la señal se dobla antes de que el humano lo note."},
      platform:{
        intro:{
          en:"Most manipulation doesn’t add new facts—it bends the channel. Shimmer starts by naming the channel and showing where it degrades.",
          zh:"多数操控不是添加新事实，而是弯曲通道。Shimmer 从命名通道开始，展示通道在哪儿变差。",
          es:"La mayoría de manipulación no agrega hechos: dobla el canal. Shimmer nombra el canal y muestra dónde se degrada."
        },
        concept:{en:"Concept: clarity comes from channel hygiene.", zh:"概念：清晰来自通道卫生。", es:"Concepto: claridad viene de higiene del canal."},
        build:{en:"Build now: list your top 3 channels (feeds) and the failure mode for each.", zh:"现在建：列出3个主要通道（信息源）及各自失效模式。", es:"Construir ahora: listar 3 canales y el modo de fallo de cada uno."},
        roadmap:{en:"Roadmap: connect channel failures to measurable indicators and a correction routine.", zh:"路线图：把通道失效与可测指标和修正例程绑定。", es:"Hoja de ruta: ligar fallos del canal a indicadores medibles y rutina de corrección."}
      },
      engineering:{
        intro:{
          en:"Define channel model: source → transforms → presentation → user interpretation. Distortion is measurable variance at each transform boundary.",
          zh:"定义通道模型：信号源→变换→呈现→用户解释。失真是每个变换边界的可测方差。",
          es:"Definir modelo de canal: fuente → transformaciones → presentación → interpretación. Distorsión = varianza medible en cada frontera."
        },
        concept:{en:"Concept: distortion is variance under bounded interface conditions.", zh:"概念：失真=有界接口条件下的方差。", es:"Concepto: distorsión = varianza bajo condiciones de interfaz acotadas."},
        build:{en:"Build now: define a baseline and variance band per channel; log deltas by window.", zh:"现在建：为每条通道定义基线与方差带；按窗口记录差分。", es:"Construir ahora: definir baseline y banda de varianza por canal; registrar deltas por ventana."},
        roadmap:{en:"Roadmap: add reason-coded triggers and audit logs for recalibration actions.", zh:"路线图：为再校准动作增加原因码触发与审计日志。", es:"Hoja de ruta: añadir triggers con razón y logs de auditoría para recalibración."}
      }
    },

    {
      c:"#ff2b2b",
      t:{en:"Attention Stabilization", zh:"注意力稳定", es:"Estabilización de atención"},
      s:{en:"When attention becomes a resource under attack.", zh:"当注意力变成被攻击的资源。", es:"Cuando la atención se vuelve un recurso bajo ataque."},
      platform:{
        intro:{
          en:"If attention gets hijacked, people can’t hold a plan. Stabilization is not control—it’s restoring the ability to choose.",
          zh:"注意力被劫持，人就无法坚持计划。稳定不是控制，而是恢复“选择能力”。",
          es:"Si la atención es secuestrada, la gente no sostiene un plan. Estabilizar no es controlar: es restaurar capacidad de elegir."
        },
        concept:{en:"Concept: the user needs a calm loop.", zh:"概念：用户需要一个安静的循环。", es:"Concepto: el usuario necesita un bucle calmado."},
        build:{en:"Build now: remove ‘infinite scroll’ behaviors from your process; adopt 1-step loops.", zh:"现在建：从你的流程里移除“无限滚动”；采用一步循环。", es:"Construir ahora: eliminar comportamientos de ‘scroll infinito’; adoptar bucles de 1 paso."},
        roadmap:{en:"Roadmap: publish a stabilization playbook (pause → reset → re-enter).", zh:"路线图：发布稳定剧本（暂停→重置→再进入）。", es:"Hoja de ruta: publicar playbook (pausar → reset → re-entrar)."}
      },
      engineering:{
        intro:{
          en:"Model attention load as capacity under variable stimulus. Instability appears as rising switching rate, degraded retention, and higher error variance.",
          zh:"将注意力负载建模为在可变刺激下的容量。不稳定表现为切换率上升、保持下降、错误方差上升。",
          es:"Modelar carga de atención como capacidad bajo estímulo variable. Inestabilidad = más switching, menor retención, más varianza de error."
        },
        concept:{en:"Concept: stabilize by limiting state transitions and variance.", zh:"概念：通过限制状态切换与方差来稳定。", es:"Concepto: estabilizar limitando transiciones de estado y varianza."},
        build:{en:"Build now: define allowable transition rate (per window) and a clamp when exceeded.", zh:"现在建：定义每窗口允许的切换率，并设置超限夹紧。", es:"Construir ahora: definir tasa permitida por ventana y un clamp cuando se excede."},
        roadmap:{en:"Roadmap: closed-loop feedback that reduces switching and restores retention baseline.", zh:"路线图：闭环反馈，降低切换并恢复保持基线。", es:"Hoja de ruta: feedback en bucle cerrado que reduce switching y restaura baseline."}
      }
    },

    {
      c:"#c9a24a",
      t:{en:"Perception Drift Detection", zh:"感知漂移检测", es:"Detección de deriva perceptiva"},
      s:{en:"When the map diverges from reality.", zh:"当地图偏离现实。", es:"Cuando el mapa se separa de la realidad."},
      platform:{
        intro:{
          en:"Drift is when people become confident in a false map. Shimmer looks for drift early and forces a return to receipts.",
          zh:"漂移=人对错误地图越来越自信。Shimmer 早期识别漂移，并强制回到收据。",
          es:"Deriva es cuando la gente se vuelve segura de un mapa falso. Shimmer la detecta temprano y obliga a volver a recibos."
        },
        concept:{en:"Concept: confidence is not proof.", zh:"概念：自信不是证明。", es:"Concepto: confianza no es prueba."},
        build:{en:"Build now: define a ‘reality check’ step before major decisions.", zh:"现在建：在重大决策前定义一个“现实核对”步骤。", es:"Construir ahora: definir un paso de ‘reality check’ antes de decisiones mayores."},
        roadmap:{en:"Roadmap: drift scoreboard (green/yellow/red) with receipts behind each state.", zh:"路线图：漂移记分牌（绿/黄/红），每个状态背后都有收据。", es:"Hoja de ruta: tablero de deriva (verde/amarillo/rojo) con recibos detrás."}
      },
      engineering:{
        intro:{
          en:"Define ground truth proxies and compare interpretation outputs. Drift is divergence over windows with measurable acceleration.",
          zh:"定义真值代理并比较解释输出。漂移是窗口上的可测偏离及其加速。",
          es:"Definir proxies de verdad y comparar salidas de interpretación. Deriva = divergencia por ventanas con aceleración medible."
        },
        concept:{en:"Concept: drift is divergence + acceleration under fixed scope.", zh:"概念：漂移=固定范围下的偏离+加速。", es:"Concepto: deriva = divergencia + aceleración bajo alcance fijo."},
        build:{en:"Build now: compute divergence metrics and trigger thresholds for recalibration.", zh:"现在建：计算偏离指标并设置再校准阈值触发。", es:"Construir ahora: calcular métricas de divergencia y umbrales para recalibración."},
        roadmap:{en:"Roadmap: epoch rollover on rule changes to preserve comparability.", zh:"路线图：规则变化必须新纪元以保持可比性。", es:"Hoja de ruta: rollover de época en cambios de reglas para preservar comparabilidad."}
      }
    },

    {
      c:"#a3a3a3",
      t:{en:"Cognitive Load Balancing", zh:"认知负载平衡", es:"Balanceo de carga cognitiva"},
      s:{en:"How much can a human carry without breaking?", zh:"人能承载多少而不崩？", es:"¿Cuánto puede cargar un humano sin romperse?"},
      platform:{
        intro:{
          en:"Overload creates bad shortcuts: people stop verifying and start reacting. Balance is how you keep the loop intact.",
          zh:"过载会逼出坏捷径：人停止验证，开始反应。平衡让循环保持完整。",
          es:"La sobrecarga crea atajos malos: se deja de verificar y se reacciona. Balance = mantener el bucle intacto."
        },
        concept:{en:"Concept: fewer steps, clearer steps.", zh:"概念：步骤更少、更清晰。", es:"Concepto: menos pasos, pasos más claros."},
        build:{en:"Build now: enforce ‘one open’ UX and single next-step routing.", zh:"现在建：执行“一次只开一个”的UX与单一下一步路由。", es:"Construir ahora: aplicar UX de ‘una abierta’ y ruteo de siguiente paso único."},
        roadmap:{en:"Roadmap: split long processes into short stages with pass/fail checks.", zh:"路线图：把长流程拆成短阶段，并加通过/失败检查。", es:"Hoja de ruta: dividir procesos largos en etapas cortas con checks pasa/falla."}
      },
      engineering:{
        intro:{
          en:"Load is capacity under constraints. Measure error rates, switching frequency, and retention loss to detect overload.",
          zh:"负载=约束下的容量。通过错误率、切换频率、保持损失检测过载。",
          es:"Carga = capacidad bajo restricciones. Medir tasa de error, frecuencia de switching y pérdida de retención para detectar sobrecarga."
        },
        concept:{en:"Concept: overload is measurable variance, not opinion.", zh:"概念：过载是可测方差，不是意见。", es:"Concepto: sobrecarga es varianza medible, no opinión."},
        build:{en:"Build now: define overload thresholds and deterministic UI clamps.", zh:"现在建：定义过载阈值与确定性UI夹紧策略。", es:"Construir ahora: definir umbrales de sobrecarga y clamps deterministas de UI."},
        roadmap:{en:"Roadmap: adaptive pacing that stays within declared limits (no hidden manipulative gates).", zh:"路线图：自适应节奏但保持在声明限制内（无隐藏操控闸门）。", es:"Hoja de ruta: pacing adaptativo dentro de límites declarados (sin compuertas manipulativas ocultas)."}
      }
    },

    {
      c:"#c9a24a",
      t:{en:"Human-System Interface", zh:"人机接口", es:"Interfaz humano-sistema"},
      s:{en:"Where design either preserves agency or steals it.", zh:"设计要么保主体性，要么偷走它。", es:"Donde el diseño preserva agencia o la roba."},
      platform:{
        intro:{
          en:"Interfaces teach behavior. Shimmer demands interfaces that make verification easy, not exhausting.",
          zh:"界面会教人行为。Shimmer 要求界面让验证更容易，而不是更累。",
          es:"Las interfaces enseñan comportamiento. Shimmer exige interfaces que hagan verificación fácil, no agotadora."
        },
        concept:{en:"Concept: make truth the easy path.", zh:"概念：让真相成为最省力的路径。", es:"Concepto: hacer que la verdad sea el camino fácil."},
        build:{en:"Build now: one click = one outcome; keep state; clear exits.", zh:"现在建：一点击=一结果；保留状态；出口清晰。", es:"Construir ahora: un clic = un resultado; preservar estado; salidas claras."},
        roadmap:{en:"Roadmap: attach receipts to every meaningful claim surface.", zh:"路线图：每个有意义的主张面都要挂收据。", es:"Hoja de ruta: adjuntar recibos a cada superficie de afirmación significativa."}
      },
      engineering:{
        intro:{
          en:"Define interface constraints: no ambiguous controls, no silent remaps, no timer gates. Deterministic navigation preserves comparability.",
          zh:"定义接口约束：无模糊控件、无静默重映射、无计时闸门。确定性导航保持可比性。",
          es:"Definir restricciones de interfaz: sin controles ambiguos, sin remapeos silenciosos, sin compuertas por tiempo. Navegación determinista preserva comparabilidad."
        },
        concept:{en:"Concept: interface is a constraint surface.", zh:"概念：界面是约束面。", es:"Concepto: la interfaz es una superficie de restricción."},
        build:{en:"Build now: audit navigation for bypass paths and hidden state mutation.", zh:"现在建：审计导航是否存在绕过路径与隐藏状态变异。", es:"Construir ahora: auditar navegación por rutas de bypass y mutación de estado oculta."},
        roadmap:{en:"Roadmap: signed releases + versioned rule surfaces to prevent capture.", zh:"路线图：签名发布+版本化规则面以防捕获。", es:"Hoja de ruta: releases firmados + superficies de reglas versionadas para evitar captura."}
      }
    },

    {
      c:"#ff2b2b",
      t:{en:"Reality Calibration Layer", zh:"现实校准层", es:"Capa de calibración de realidad"},
      s:{en:"How systems return to shared truth.", zh:"系统如何回到共享真相。", es:"Cómo los sistemas vuelven a una verdad compartida."},
      platform:{
        intro:{
          en:"Calibration is how you stop arguing. You agree on what counts as evidence, then you replay it.",
          zh:"校准能终止争吵：先同意什么算证据，再回放它。",
          es:"La calibración detiene discusiones: se acuerda qué cuenta como evidencia y luego se reproduce."
        },
        concept:{en:"Concept: shared standards beat shared opinions.", zh:"概念：共享标准胜过共享观点。", es:"Concepto: estándares compartidos vencen opiniones compartidas."},
        build:{en:"Build now: a simple ‘calibration check’ before changing rules.", zh:"现在建：在改规则前做一个简单“校准检查”。", es:"Construir ahora: un ‘chequeo de calibración’ antes de cambiar reglas."},
        roadmap:{en:"Roadmap: connect calibration to Laws + Gauges and keep authority explicit.", zh:"路线图：把校准连接到Laws+Gauges，并保持权威清晰。", es:"Hoja de ruta: conectar calibración a Leyes+Medidores y mantener autoridad explícita."}
      },
      engineering:{
        intro:{
          en:"Calibration authority is a protected surface. Threshold tuning must be versioned, audited, and epoch-bumped to preserve determinism.",
          zh:"校准权威是受保护面。阈值调参必须版本化、可审计，并通过新纪元保持确定性。",
          es:"La autoridad de calibración es superficie protegida. Ajuste de umbrales debe versionarse, auditarse y elevar época para preservar determinismo."
        },
        concept:{en:"Concept: calibration is governance of measurement rules.", zh:"概念：校准是对测量规则的治理。", es:"Concepto: calibración es gobernanza de reglas de medición."},
        build:{en:"Build now: signed configuration + audit log for all threshold changes.", zh:"现在建：阈值变化全部走签名配置+审计日志。", es:"Construir ahora: configuración firmada + log de auditoría para todos los cambios de umbral."},
        roadmap:{en:"Roadmap: supervisory stress testing validates whether calibration survives adversarial pressure.", zh:"路线图：监督压力测试验证校准能否抗住对抗压力。", es:"Hoja de ruta: pruebas de estrés supervisor validan si calibración sobrevive presión adversarial."}
      }
    }
  ];

  // ===== Accordion state preserved across lane/lang changes =====
  var list=document.getElementById("list");
  var rowRefs=[];
  var openIndex=0;

  function closeAllRows(){
    for(var i=0;i<rowRefs.length;i++){
      rowRefs[i].row.classList.remove("open");
      rowRefs[i].chev.textContent="▸";
    }
  }

  function toggleRow(i){
    var isOpen=rowRefs[i].row.classList.contains("open");
    if(isOpen){
      rowRefs[i].row.classList.remove("open");
      rowRefs[i].chev.textContent="▸";
      return;
    }
    closeAllRows();
    openIndex=i;
    rowRefs[i].row.classList.add("open");
    rowRefs[i].chev.textContent="▾";
  }

  function makeSubBubble(label){
    var b=document.createElement("div");
    b.className="bubble";
    b.setAttribute("role","button");
    b.tabIndex=0;

    var h=document.createElement("h4");
    h.textContent=label;

    var p=document.createElement("p");
    p.textContent="";

    b.appendChild(h);
    b.appendChild(p);

    function act(){ b.classList.toggle("open"); }
    b.addEventListener("click", act, {passive:true});
    b.addEventListener("keydown", function(e){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); act(); }});

    return {wrap:b, p:p};
  }

  function buildRow(item, idx){
    var row=document.createElement("div");
    row.className="row";
    row.style.setProperty("--c", item.c);

    var head=document.createElement("div");
    head.className="head";
    head.setAttribute("role","button");
    head.tabIndex=0;

    var hL=document.createElement("div");
    hL.className="hL";

    var mark=document.createElement("div");
    mark.className="dmark";
    mark.style.background=item.c;

    var tb=document.createElement("div");
    tb.className="titleBlock";

    var title=document.createElement("div");
    title.className="q";

    var sub=document.createElement("div");
    sub.className="sub";

    tb.appendChild(title);
    tb.appendChild(sub);

    hL.appendChild(mark);
    hL.appendChild(tb);

    var chev=document.createElement("div");
    chev.className="chev";
    chev.innerHTML='<span class="chevTxt">▸</span>';

    head.appendChild(hL);
    head.appendChild(chev);

    var body=document.createElement("div");
    body.className="body";

    var intro=document.createElement("p");
    intro.className="pdesc";
    body.appendChild(intro);

    var bubbles=document.createElement("div");
    bubbles.className="subBubbles";

    var b1=makeSubBubble(labConcept());
    var b2=makeSubBubble(labBuild());
    var b3=makeSubBubble(labRoadmap());

    bubbles.appendChild(b1.wrap);
    bubbles.appendChild(b2.wrap);
    bubbles.appendChild(b3.wrap);
    body.appendChild(bubbles);

    var actions=document.createElement("div");
    actions.className="actions";

    var a1=document.createElement("a"); a1.className="btn"; a1.setAttribute("data-route","/explore/frontier/"); actions.appendChild(a1);
    var a2=document.createElement("a"); a2.className="btn"; a2.setAttribute("data-route","/laws/"); actions.appendChild(a2);
    var a3=document.createElement("a"); a3.className="btn red"; a3.setAttribute("data-route","/gauges/"); actions.appendChild(a3);

    body.appendChild(actions);

    function onToggle(){ toggleRow(idx); wireAll(); }
    head.addEventListener("click", onToggle, {passive:true});
    head.addEventListener("keydown", function(e){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); onToggle(); }});

    row.appendChild(head);
    row.appendChild(body);
    list.appendChild(row);

    rowRefs.push({
      row:row,
      chev:row.querySelector(".chevTxt"),
      title:title,
      sub:sub,
      intro:intro,
      b1p:b1.p, b2p:b2.p, b3p:b3.p,
      a1:a1,a2:a2,a3:a3
    });
  }

  function renderList(){
    list.innerHTML="";
    rowRefs=[];
    for(var i=0;i<DOMAINS.length;i++){
      buildRow(DOMAINS[i], i);
    }
    openIndex=0;
    toggleRow(0);
  }

  function applyHeader(){
    var H=(HEAD[lang]||HEAD.en);
    var lanePack = (lane==="engineering") ? H.engineering : H.platform;

    document.getElementById("hk").textContent = pick3("FRONTIER · SHIMMER","前沿 · SHIMMER","FRONTERA · SHIMMER");
    document.getElementById("ht").textContent = pick3("SHIMMER FIELD","SHIMMER 场","CAMPO SHIMMER");
    document.getElementById("hs").textContent = lanePack.hs;
    document.getElementById("rule").textContent = lanePack.rule;

    document.getElementById("band").textContent =
      pick3("SHIMMER DOMAINS","SHIMMER 域","DOMINIOS SHIMMER");

    document.getElementById("btnFrontier").textContent = pick3("FRONTIER","前沿","FRONTERA");
    document.getElementById("btnExplore").textContent  = pick3("EXPLORE","探索","EXPLORAR");
    document.getElementById("btnHome").textContent     = pick3("HOME","主页","INICIO");

    document.getElementById("dockFrontier").textContent = pick3("FRONTIER","前沿","FRONTERA");
    document.getElementById("dockProducts").textContent = pick3("PRODUCTS","产品","PRODUCTOS");
    document.getElementById("dockLaws").textContent     = pick3("LAWS","法则","LEYES");
    document.getElementById("dockGauges").textContent   = pick3("GAUGES","量规","MEDIDORES");

    document.getElementById("lanePlatform").textContent   = pick3("PLATFORM","平台","PLATAFORMA");
    document.getElementById("laneEngineering").textContent= pick3("ENGINEERING","工程","INGENIERÍA");

    document.getElementById("laneState").textContent =
      (lang==="zh") ? ("当前透镜："+laneLabel()) :
      (lang==="es") ? ("Lente actual: "+laneLabel()) :
      ("Current lens: "+laneLabel());

    document.getElementById("langState").textContent =
      (lang==="zh") ? ("语言：中文") :
      (lang==="es") ? ("Idioma: ES") :
      ("Lang: EN");

    setPressed(["langEN","langZH","langES"], lang==="zh"?"langZH":(lang==="es"?"langES":"langEN"));
    setPressed(["lanePlatform","laneEngineering"], lane==="engineering"?"laneEngineering":"lanePlatform");
  }

  function updateRows(){
    var keep=openIndex;

    for(var i=0;i<DOMAINS.length;i++){
      var item=DOMAINS[i];
      var r=rowRefs[i];

      r.title.textContent = (lang==="zh")?item.t.zh:(lang==="es")?(item.t.es||item.t.en):item.t.en;
      r.sub.textContent   = (lang==="zh")?item.s.zh:(lang==="es")?(item.s.es||item.s.en):item.s.en;

      var pack = (lane==="engineering") ? item.engineering : item.platform;

      r.intro.textContent = (lang==="zh")?pack.intro.zh:(lang==="es")?(pack.intro.es||pack.intro.en):pack.intro.en;
      r.b1p.textContent   = (lang==="zh")?pack.concept.zh:(lang==="es")?(pack.concept.es||pack.concept.en):pack.concept.en;
      r.b2p.textContent   = (lang==="zh")?pack.build.zh:(lang==="es")?(pack.build.es||pack.build.en):pack.build.en;
      r.b3p.textContent   = (lang==="zh")?pack.roadmap.zh:(lang==="es")?(pack.roadmap.es||pack.roadmap.en):pack.roadmap.en;

      r.a1.textContent = openLabel()+": "+pick3("FRONTIER INDEX","前沿索引","ÍNDICE FRONTERA");
      r.a2.textContent = openLabel()+": "+pick3("LAWS","法则","LEYES");
      r.a3.textContent = openLabel()+": "+pick3("GAUGES","量规","MEDIDORES");
    }

    closeAllRows();
    toggleRow(keep);
    wireAll();
  }

  // ===== No reload on language/lane changes =====
  function setLang(next){
    if(next!=="en" && next!=="zh" && next!=="es") next="en";
    lang=next;
    try{ LS.setItem("gd_lang",lang);}catch(e){}
    history.replaceState({}, "", location.pathname + q({lang:lang}));
    applyHeader();
    updateRows();
  }

  function setLane(next){
    if(next!=="platform" && next!=="engineering") next="platform";
    lane=next;
    history.replaceState({}, "", location.pathname + q({lane:lane}));
    applyHeader();
    updateRows();
  }

  document.getElementById("langEN").addEventListener("click", function(){ setLang("en"); }, {passive:true});
  document.getElementById("langZH").addEventListener("click", function(){ setLang("zh"); }, {passive:true});
  document.getElementById("langES").addEventListener("click", function(){ setLang("es"); }, {passive:true});

  document.getElementById("lanePlatform").addEventListener("click", function(){ setLane("platform"); }, {passive:true});
  document.getElementById("laneEngineering").addEventListener("click", function(){ setLane("engineering"); }, {passive:true});

  // ===== INIT =====
  renderList();
  applyHeader();
  updateRows();
  wireAll();
})();
</script>

</body>
</html>
