<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Gauges · System Health</title>

  <style>
    :root {
      --bg0:#020611;
      --bg1:#06122a;
      --text:#e6f0ff;
      --muted:#9fb3d9;
      --line:rgba(170,198,255,.22);
      --gold:#efd29a;
      --blue:#8ec5ff;
    }

    * { box-sizing:border-box; }

    html,body {
      margin:0;
      height:100%;
      color:var(--text);
      font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
      background:
        radial-gradient(circle at 12% 18%, rgba(255,110,40,.12), transparent 28%),
        radial-gradient(circle at 70% 32%, rgba(142,197,255,.10), transparent 30%),
        linear-gradient(180deg,var(--bg1),var(--bg0));
    }

    .stage {
      position:relative;
      width:100vw;
      height:100vh;
      overflow:hidden;
    }

    .stars {
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 12% 18%, rgba(255,255,255,.8) 1px, transparent 2px),
        radial-gradient(circle at 70% 32%, rgba(255,255,255,.7) 1px, transparent 2px),
        radial-gradient(circle at 40% 78%, rgba(255,255,255,.6) 1px, transparent 2px),
        radial-gradient(circle at 85% 70%, rgba(255,255,255,.5) 1px, transparent 2px);
      opacity:.35;
      z-index:0;
    }

    #universeScene {
      position:absolute;
      inset:0;
      z-index:1;
      isolation:isolate;
    }

    .hud {
      position:absolute;
      left:16px;
      bottom:16px;
      z-index:2;
      font-size:12px;
      letter-spacing:.08em;
      color:var(--muted);
    }

    .hud strong {
      color:#fff;
      font-weight:800;
      letter-spacing:.12em;
    }
  </style>
</head>

<body>

<div class="stage">
  <div class="stars"></div>
  <div id="universeScene"></div>

  <div class="hud" id="hud">
    <strong>GAUGES</strong> · INITIALIZING
  </div>
</div>

<script defer src="/gauges/gauges-runtime.js"></script>

</body>
</html>
