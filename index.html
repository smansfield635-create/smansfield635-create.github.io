<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Nine Summits — Index</title>
<link rel="stylesheet" href="/assets/ui.css"/>
<style>
html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:#030712;
  color:#fff;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
}
body::before,body::after{pointer-events:none!important}

:root{
  --ink:rgba(255,255,255,.96);
  --mut:rgba(255,255,255,.84);
  --mut2:rgba(255,255,255,.68);
  --stroke:rgba(255,255,255,.12);
  --shadowA:0 18px 52px rgba(0,0,0,.30);
  --shadowB:0 24px 90px rgba(0,0,0,.42);
  --gold:rgba(226,191,92,.92);
  --panel:rgba(8,12,20,.38);
  --heroDim:1;
  --uiAlpha:1;
  --shellAtmosAlpha:.82;
  --starAlpha:1;
}

#app-shell{
  position:fixed;
  inset:0;
  overflow:hidden;
  isolation:isolate;
  background:
    radial-gradient(circle at 50% 42%, rgba(44,92,164,.08), transparent 34%),
    linear-gradient(180deg, #030712 0%, #071225 52%, #08101f 100%);
}

#world-canvas{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  display:block;
  z-index:1;
  touch-action:none;
}

#universe-layer,
#atmosphere-layer,
#hero-layer,
#flat-layer,
#orbital-overlay{
  position:fixed;
  inset:0;
}

#universe-layer{
  z-index:2;
  pointer-events:none;
  overflow:hidden;
  transition:opacity 220ms ease, filter 220ms ease;
  opacity:var(--starAlpha);
}
.star-band{
  position:absolute;
  inset:-10%;
  opacity:.34;
  mix-blend-mode:screen;
  animation:starDrift 44s linear infinite;
}
.star-band.near{
  opacity:.48;
  animation-duration:26s;
}
.star-band.far{
  opacity:.16;
  animation-duration:70s;
}
.star-band::before,
.star-band::after{
  content:"";
  position:absolute;
  inset:0;
  background-repeat:repeat;
  background-size:320px 320px;
  filter:blur(.15px);
}
.star-band::before{
  background-image:
    radial-gradient(circle at 20px 24px, rgba(255,255,255,.96) 0 .9px, transparent 1.6px),
    radial-gradient(circle at 118px 78px, rgba(255,255,255,.60) 0 .8px, transparent 1.5px),
    radial-gradient(circle at 242px 194px, rgba(255,255,255,.82) 0 1px, transparent 1.7px),
    radial-gradient(circle at 286px 42px, rgba(255,255,255,.42) 0 .7px, transparent 1.3px),
    radial-gradient(circle at 68px 214px, rgba(255,255,255,.68) 0 .8px, transparent 1.4px),
    radial-gradient(circle at 168px 262px, rgba(255,255,255,.50) 0 .7px, transparent 1.4px);
}
.star-band::after{
  background-image:
    radial-gradient(circle at 78px 48px, rgba(120,180,255,.18) 0 1px, transparent 2px),
    radial-gradient(circle at 204px 158px, rgba(255,215,120,.16) 0 1.1px, transparent 2px),
    radial-gradient(circle at 300px 258px, rgba(180,140,255,.12) 0 1px, transparent 1.8px);
  filter:blur(.55px);
}

#atmosphere-layer{
  z-index:3;
  pointer-events:none;
  overflow:hidden;
  transition:opacity 220ms ease;
  opacity:var(--shellAtmosAlpha);
}
.atmo-glow{
  position:absolute;
  left:50%;
  top:58%;
  width:min(92vw,1040px);
  height:min(92vw,1040px);
  transform:translate(-50%,-50%);
  border-radius:50%;
  background:
    radial-gradient(circle at 50% 50%, rgba(108,162,236,.10), transparent 34%),
    radial-gradient(circle at 50% 56%, rgba(255,255,255,.03), transparent 56%),
    radial-gradient(circle at 50% 50%, rgba(30,90,170,.07), transparent 70%);
  filter:blur(12px);
  animation:glowPulse 8s ease-in-out infinite;
}
.mist-veil{
  position:absolute;
  left:0;
  right:0;
  bottom:-4%;
  height:40%;
  background:
    linear-gradient(
      to bottom,
      transparent 0%,
      rgba(130,190,255,.04) 18%,
      rgba(170,220,255,.07) 54%,
      rgba(255,255,255,.02) 100%
    );
  mask-image:linear-gradient(to bottom, transparent 0%, rgba(0,0,0,.25) 18%, rgba(0,0,0,.95) 84%, transparent 100%);
  -webkit-mask-image:linear-gradient(to bottom, transparent 0%, rgba(0,0,0,.25) 18%, rgba(0,0,0,.95) 84%, transparent 100%);
  opacity:.18;
  transform:translateY(8%);
  animation:veilDrift 9s ease-in-out infinite;
}

#hero-layer{
  z-index:8;
  pointer-events:none;
  transition:opacity 180ms ease, transform 180ms ease;
  opacity:var(--heroDim);
}
.hero-panel{
  position:absolute;
  left:50%;
  top:12.8vh;
  transform:translateX(-50%);
  width:min(92vw,980px);
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:12px;
  text-align:center;
}
.hero-title{
  margin:0;
  font-size:clamp(42px,7vw,96px);
  font-weight:950;
  letter-spacing:.05em;
  line-height:.9;
  text-shadow:0 10px 30px rgba(0,0,0,.54);
}
.hero-sub{
  margin:0;
  font-size:clamp(18px,2.2vw,26px);
  color:rgba(255,255,255,.90);
}
.hero-tag{
  margin:0;
  font-size:clamp(13px,1.5vw,16px);
  color:rgba(255,255,255,.64);
  letter-spacing:.02em;
}

#flat-layer{
  z-index:9;
  display:none;
  align-items:center;
  justify-content:center;
  pointer-events:none;
}
.flat-menu{
  width:min(92vw,720px);
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:18px;
  pointer-events:auto;
}
.flat-card{
  position:relative;
  min-height:132px;
  border-radius:28px;
  border:1px solid rgba(255,255,255,.16);
  background:
    radial-gradient(circle at 22% 18%, rgba(255,255,255,.12), transparent 22%),
    linear-gradient(145deg, rgba(10,14,22,.88), rgba(5,8,12,.96));
  box-shadow:
    0 18px 48px rgba(0,0,0,.32),
    inset 0 0 18px rgba(255,255,255,.03);
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  font-weight:900;
  font-size:clamp(18px,2.2vw,24px);
  letter-spacing:.06em;
  cursor:pointer;
  overflow:hidden;
  transition:transform .18s ease, border-color .18s ease, background .18s ease;
}
.flat-card:hover{
  transform:translateY(-2px);
  border-color:rgba(255,255,255,.24);
}
.flat-card::before{
  content:"";
  position:absolute;
  left:50%;
  top:50%;
  width:86px;
  height:86px;
  margin:-43px 0 0 -43px;
  transform:rotate(45deg);
  border-radius:14px;
  border:1px solid rgba(255,255,255,.10);
  box-shadow:inset 0 0 12px rgba(255,255,255,.05);
}

.top-ui{
  position:absolute;
  inset:0 0 auto 0;
  z-index:16;
  pointer-events:none;
  opacity:var(--uiAlpha);
}
.top-ui-row{
  width:100%;
  display:flex;
  justify-content:center;
  pointer-events:none;
}
.top-ui-row--home{
  position:absolute;
  top:12px;
  left:0;
  right:0;
}
.top-ui-row--modes{
  position:absolute;
  top:12px;
  right:12px;
  left:auto;
  width:auto;
}

.home-pill{
  min-width:132px;
  padding:7px 16px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.09);
  background:rgba(0,0,0,.18);
  box-shadow:0 12px 28px rgba(0,0,0,.18);
  backdrop-filter:blur(8px);
  color:rgba(255,255,255,.92);
  font-size:11px;
  font-weight:900;
  letter-spacing:.12em;
  text-transform:uppercase;
  text-align:center;
  pointer-events:none;
}

.mode-cluster{
  display:flex;
  gap:8px;
  pointer-events:auto;
}
.mode-btn{
  min-height:42px;
  padding:0 16px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(10,12,20,.32);
  box-shadow:0 14px 34px rgba(0,0,0,.24);
  backdrop-filter:blur(8px);
  color:rgba(255,255,255,.92);
  font-size:12px;
  font-weight:900;
  letter-spacing:.06em;
  text-transform:uppercase;
  cursor:pointer;
}
.mode-btn:active{transform:translateY(1px)}
.mode-btn.is-active{
  border-color:rgba(226,191,92,.50);
  box-shadow:
    0 14px 34px rgba(0,0,0,.24),
    0 0 0 1px rgba(226,191,92,.10),
    0 0 16px rgba(226,191,92,.10);
  color:#fff5cf;
}

#orbital-overlay{
  z-index:12;
  pointer-events:none;
  transition:opacity 180ms ease;
}
.orbital-marker{
  position:absolute;
  left:0;
  top:0;
  width:132px;
  height:132px;
  transform:translate(-50%,-50%);
  border:0;
  background:transparent;
  padding:0;
  pointer-events:auto;
  cursor:pointer;
  touch-action:manipulation;
  -webkit-tap-highlight-color:transparent;
}
.orbital-marker[hidden]{display:none}

.orbital-core{
  position:absolute;
  left:50%;
  top:50%;
  width:88px;
  height:88px;
  transform:translate(-50%,-50%);
  border-radius:50%;
  background:
    radial-gradient(circle at 50% 50%, rgba(255,255,255,.06) 0 14%, rgba(255,255,255,0) 54%),
    radial-gradient(circle at 50% 50%, rgba(226,191,92,.18), rgba(226,191,92,.08) 28%, rgba(226,191,92,0) 58%);
  opacity:.94;
}
.orbital-core::before,
.orbital-core::after{
  content:"";
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  border-radius:999px;
  background:linear-gradient(180deg, rgba(255,247,208,.88), rgba(255,228,142,.84), rgba(255,214,98,.22));
  box-shadow:
    0 0 16px rgba(255,225,140,.28),
    0 0 28px rgba(255,219,126,.14);
}
.orbital-core::before{
  width:10px;
  height:78px;
}
.orbital-core::after{
  width:78px;
  height:10px;
}
.orbital-diag-a,
.orbital-diag-b{
  position:absolute;
  left:50%;
  top:50%;
  width:70px;
  height:2px;
  transform-origin:center;
  background:linear-gradient(90deg, rgba(255,227,132,0), rgba(255,233,160,.76), rgba(255,227,132,0));
  opacity:.54;
}
.orbital-diag-a{transform:translate(-50%,-50%) rotate(45deg)}
.orbital-diag-b{transform:translate(-50%,-50%) rotate(-45deg)}
.orbital-glow{
  position:absolute;
  left:50%;
  top:50%;
  width:118px;
  height:118px;
  transform:translate(-50%,-50%);
  border-radius:50%;
  background:
    radial-gradient(circle at 50% 50%, rgba(255,227,132,.10), rgba(255,227,132,.05) 26%, rgba(255,227,132,0) 68%);
  filter:blur(8px);
  opacity:.84;
}
.orbital-code{
  position:absolute;
  left:50%;
  top:22px;
  transform:translateX(-50%);
  font-size:11px;
  font-weight:950;
  letter-spacing:.26em;
  color:rgba(255,246,214,.82);
  text-transform:uppercase;
  text-shadow:0 0 10px rgba(0,0,0,.50);
  white-space:nowrap;
}
.orbital-name{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  min-width:84px;
  padding:3px 10px;
  border-radius:999px;
  background:rgba(6,10,18,.18);
  color:rgba(255,255,255,.92);
  font-size:11px;
  font-weight:950;
  letter-spacing:.10em;
  text-transform:uppercase;
  text-align:center;
  text-shadow:0 0 10px rgba(0,0,0,.56);
  box-shadow:0 6px 20px rgba(0,0,0,.14);
  backdrop-filter:blur(6px);
}

.diagnostics-shell{
  position:absolute;
  left:16px;
  right:16px;
  bottom:16px;
  z-index:14;
  display:flex;
  align-items:flex-end;
  justify-content:center;
  pointer-events:none;
  opacity:var(--uiAlpha);
  transition:opacity 180ms ease;
}
.diagnostics-bar{
  width:min(980px,100%);
  min-height:62px;
  padding:10px 12px;
  border-radius:18px;
  border:1px solid rgba(255,255,255,.09);
  background:rgba(7,10,18,.34);
  box-shadow:0 14px 38px rgba(0,0,0,.22);
  backdrop-filter:blur(10px);
  display:grid;
  grid-template-columns:1fr auto;
  align-items:center;
  gap:10px;
  pointer-events:auto;
}
.diagnostics-summary{
  min-width:0;
  opacity:.70;
}
.diagnostics-summary .diagnostic-pill{
  border-color:rgba(255,255,255,.07);
  background:rgba(255,255,255,.02);
}
.diagnostics-toggle{
  min-width:110px;
  min-height:38px;
  padding:0 14px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.11);
  background:rgba(10,12,20,.28);
  color:rgba(255,255,255,.92);
  font-size:12px;
  font-weight:900;
  letter-spacing:.04em;
  text-transform:uppercase;
  cursor:pointer;
}
.diagnostics-toggle:active{transform:translateY(1px)}
.debug-panel{
  position:absolute;
  left:16px;
  bottom:94px;
  width:min(420px, calc(100vw - 32px));
  max-height:min(56vh, 520px);
  overflow:auto;
  display:grid;
  gap:10px;
  opacity:0;
  pointer-events:none;
  transform:translateY(10px);
  transition:opacity 160ms ease, transform 160ms ease;
  z-index:15;
}
.debug-panel .panel-section{
  background:rgba(8,14,24,.74);
  border:1px solid rgba(145,175,255,.14);
  box-shadow:0 14px 40px rgba(0,0,0,.26);
  backdrop-filter:blur(10px);
  border-radius:14px;
  padding:12px;
}
.debug-panel .panel-title{
  margin:0 0 10px 0;
  font-size:13px;
  font-weight:900;
  letter-spacing:.06em;
  text-transform:uppercase;
  color:rgba(255,255,255,.94);
}
.debug-panel .panel-row{
  display:flex;
  justify-content:space-between;
  gap:12px;
  padding:5px 0;
  border-bottom:1px solid rgba(255,255,255,.06);
}
.debug-panel .panel-row:last-child{border-bottom:0}
.debug-panel .panel-key{
  color:rgba(255,255,255,.72);
  font-size:12px;
}
.debug-panel .panel-value{
  color:rgba(255,255,255,.92);
  font-size:12px;
  font-weight:800;
  text-align:right;
}
.debug-panel .panel-value--ok{color:rgba(132,255,170,.96)}
.debug-panel .panel-value--danger{color:rgba(255,132,132,.96)}
.debug-panel .panel-value--muted{color:rgba(255,255,255,.44)}

body[data-diagnostics="full"] .debug-panel{
  opacity:1;
  pointer-events:auto;
  transform:translateY(0);
}

.boot-status{
  position:fixed;
  left:50%;
  top:88px;
  transform:translateX(-50%);
  width:min(760px,92vw);
  z-index:40;
  display:none;
  padding:14px 16px;
  border-radius:18px;
  border:1px solid rgba(255,255,255,.14);
  background:rgba(14,18,28,.86);
  box-shadow:0 20px 60px rgba(0,0,0,.44);
  backdrop-filter:blur(10px);
  white-space:pre-wrap;
  line-height:1.45;
  font-size:13px;
  color:rgba(255,255,255,.90);
}
.boot-status.is-visible{display:block}

body[data-mode="round"]{
  --heroDim:1;
  --uiAlpha:1;
  --shellAtmosAlpha:.82;
  --starAlpha:1;
}
body[data-mode="flat"]{
  --heroDim:.86;
  --uiAlpha:1;
  --shellAtmosAlpha:.54;
  --starAlpha:.72;
}
body[data-mode="observe"]{
  --heroDim:.78;
  --uiAlpha:.88;
  --shellAtmosAlpha:.58;
  --starAlpha:.12;
}
body[data-mode="observe"] #orbital-overlay{
  opacity:0;
}
body[data-mode="observe"] .diagnostics-summary{
  opacity:.68;
}

@keyframes starDrift{
  from{transform:translate3d(-1.5%,-1%,0)}
  to{transform:translate3d(1.5%,1%,0)}
}
@keyframes glowPulse{
  0%,100%{opacity:.82;transform:translate(-50%,-50%) scale(1)}
  50%{opacity:1;transform:translate(-50%,-50%) scale(1.04)}
}
@keyframes veilDrift{
  0%,100%{transform:translateY(8%);opacity:.18}
  50%{transform:translateY(2%);opacity:.28}
}

@media (max-width:700px){
  .top-ui-row--home{top:10px}
  .top-ui-row--modes{
    top:58px;
    left:0;
    right:0;
    width:100%;
    justify-content:center;
  }
  .mode-cluster{gap:6px}
  .mode-btn{
    min-height:38px;
    padding:0 12px;
    font-size:11px;
  }
  .home-pill{
    min-width:108px;
    padding:6px 12px;
    font-size:10px;
    letter-spacing:.10em;
  }
  .hero-panel{
    top:19.5vh;
    gap:12px;
  }
  .flat-menu{
    grid-template-columns:1fr;
    width:min(92vw,420px);
    gap:12px;
  }
  .flat-card{min-height:98px}
  .diagnostics-bar{
    grid-template-columns:1fr;
    min-height:54px;
    padding:8px 10px;
  }
  .diagnostics-toggle{
    min-height:34px;
    min-width:98px;
    justify-self:end;
    font-size:11px;
  }
  .debug-panel{bottom:84px}
}

@media (max-width:420px){
  .hero-panel{top:21vh}
  .hero-title{font-size:clamp(34px,11vw,54px)}
  .hero-sub{font-size:clamp(16px,5.8vw,22px)}
  .hero-tag{font-size:clamp(12px,4vw,14px)}
  .mode-btn{
    padding:0 10px;
    min-height:36px;
    letter-spacing:.04em;
  }
}
</style>
</head>
<body data-mode="round" data-diagnostics="peek">
<div id="app-shell">
  <canvas id="world-canvas" aria-label="Home world canvas"></canvas>

  <div id="universe-layer" aria-hidden="true">
    <div class="star-band far"></div>
    <div class="star-band"></div>
    <div class="star-band near"></div>
  </div>

  <div id="atmosphere-layer" aria-hidden="true">
    <div class="atmo-glow"></div>
    <div class="mist-veil"></div>
  </div>

  <div id="hero-layer">
    <div class="hero-panel" id="hero-panel">
      <h1 class="hero-title">NINE SUMMITS</h1>
      <p class="hero-sub">Learn to live, to love.</p>
      <p class="hero-tag">Enter simply. Discover power. Choose depth.</p>
    </div>
  </div>

  <div id="flat-layer">
    <div class="flat-menu">
      <button class="flat-card" data-route="/explore/" type="button">EXPLORE</button>
      <button class="flat-card" data-route="/products/" type="button">PRODUCTS</button>
      <button class="flat-card" data-route="/laws/" type="button">LAWS</button>
      <button class="flat-card" data-route="/gauges/" type="button">GAUGES</button>
    </div>
  </div>

  <div id="orbital-overlay" aria-label="Index markers">
    <button class="orbital-marker" id="marker-north" type="button" hidden>
      <div class="orbital-glow"></div>
      <div class="orbital-core"></div>
      <div class="orbital-diag-a"></div>
      <div class="orbital-diag-b"></div>
      <div class="orbital-code">N</div>
      <div class="orbital-name">PRODUCTS</div>
    </button>

    <button class="orbital-marker" id="marker-east" type="button" hidden>
      <div class="orbital-glow"></div>
      <div class="orbital-core"></div>
      <div class="orbital-diag-a"></div>
      <div class="orbital-diag-b"></div>
      <div class="orbital-code">E</div>
      <div class="orbital-name">GAUGES</div>
    </button>

    <button class="orbital-marker" id="marker-south" type="button" hidden>
      <div class="orbital-glow"></div>
      <div class="orbital-core"></div>
      <div class="orbital-diag-a"></div>
      <div class="orbital-diag-b"></div>
      <div class="orbital-code">S</div>
      <div class="orbital-name">LAWS</div>
    </button>

    <button class="orbital-marker" id="marker-west" type="button" hidden>
      <div class="orbital-glow"></div>
      <div class="orbital-core"></div>
      <div class="orbital-diag-a"></div>
      <div class="orbital-diag-b"></div>
      <div class="orbital-code">W</div>
      <div class="orbital-name">EXPLORE</div>
    </button>
  </div>

  <div class="top-ui">
    <div class="top-ui-row top-ui-row--home">
      <div class="home-pill" id="home-pill">HOME</div>
    </div>
    <div class="top-ui-row top-ui-row--modes">
      <div class="mode-cluster" id="mode-cluster">
        <button id="btn-flat" class="mode-btn" type="button">FLAT</button>
        <button id="btn-round" class="mode-btn" type="button">ROUND</button>
        <button id="btn-observe" class="mode-btn" type="button">OBSERVE</button>
      </div>
    </div>
  </div>

  <div class="diagnostics-shell" id="diagnostics-shell">
    <div class="diagnostics-bar">
      <div id="diagnostics-summary" class="diagnostics-summary"></div>
      <button id="diagnostics-toggle" class="diagnostics-toggle" type="button">DIAGNOSTICS</button>
    </div>
  </div>

  <div id="debug-panel" class="debug-panel" aria-live="polite"></div>

  <div id="boot-status" class="boot-status" aria-live="polite">
    <div id="boot-status-copy"></div>
  </div>
</div>

<script type="module">
import { createPlanetEngine } from "/world/planet_engine.js";

function restoreMotionState() {
  if (!isRoundVisualMode()) return;
  try {
    const raw = sessionStorage.getItem(MOTION_STORAGE_KEY);

    control.restoreMotionState(JSON.parse(raw));
  } catch {

}

function persistMotionState() {
  if (!isRoundVisualMode()) return;

    sessionStorage.setItem(MOTION_STORAGE_KEY, JSON.stringify(control.getMotionState()));
  } catch {
    return;
  }
}

function safeProjectionSummary() {
  if (typeof control.getProjectionSummary === "function") {
    const summary = control.getProjectionSummary();
    return summary && typeof summary === "object" ? summary : {};
  }
  return {};
}

function safeMotionReceipt(dtMs) {
  const motionState =
    typeof control.getMotionState === "function"
      ? control.getMotionState()
      : {};
  const orbitalState =
    typeof control.getOrbitalState === "function"
      ? control.getOrbitalState()
      : {};

  return {
    motionRunning: isRoundVisualMode(),
    rafActive: rafId !== 0,
    pageVisible: document.visibilityState === "visible",
    pageRestored: true,
    yawVelocity: Number.isFinite(motionState?.yawVelocity) ? motionState.yawVelocity : null,
    pitchVelocity: Number.isFinite(motionState?.pitchVelocity) ? motionState.pitchVelocity : null,
    orbitVelocity: lastProgressionReceipt.progressionApplied ? lastProgressionReceipt.progressionStep : null,
    orbitPhase: Number.isFinite(orbitalState?.orbitPhase) ? orbitalState.orbitPhase : null,
    blockedDragOnStarCount: 0,
    starTapCount: 0,
    dtMs
  };
}

function isAdmissibleSample(sample) {
  return !!(
    sample &&
    sample.landMask === 1 &&
    typeof sample.subRegion === "string" &&
    sample.subRegion !== "NONE"
  );
}

function getDeterministicFallbackSample(field) {
  if (!field?.samples?.length || !field.samples[0]?.length) return null;

  const height = field.samples.length;
  const width = field.samples[0].length;
  const centerY = Math.floor(height * 0.5);
  const centerX = Math.floor(width * 0.5);
  const maxRadius = Math.max(width, height);

  for (let r = 0; r <= maxRadius; r += 1) {
    const minY = Math.max(0, centerY - r);
    const maxY = Math.min(height - 1, centerY + r);
    const minX = Math.max(0, centerX - r);
    const maxX = Math.min(width - 1, centerX + r);

    for (let y = minY; y <= maxY; y += 1) {
      for (let x = minX; x <= maxX; x += 1) {
        const onRing = y === minY || y === maxY || x === minX || x === maxX;
        if (!onRing) continue;
        const candidate = field.samples[y][x];
        if (isAdmissibleSample(candidate)) return candidate;
      }
    }
  }

  return field.samples[centerY]?.[centerX] || field.samples[0]?.[0] || null;
}

function getAdmissibleSample(field, projectionSummary) {
  if (!field?.samples?.length || !field.samples[0]?.length) return null;

  const height = field.samples.length;
  const width = field.samples[0].length;

  const rawX = Number.isInteger(projectionSummary?.sampleX) ? projectionSummary.sampleX : 0;
  const rawY = Number.isInteger(projectionSummary?.sampleY) ? projectionSummary.sampleY : 0;

  const x = Math.max(0, Math.min(width - 1, rawX));
  const y = Math.max(0, Math.min(height - 1, rawY));

  const primary = field.samples[y]?.[x] || null;
  if (isAdmissibleSample(primary)) return primary;

  const MAX_RADIUS = 6;

  for (let r = 1; r <= MAX_RADIUS; r += 1) {
    const minY = Math.max(0, y - r);
    const maxY = Math.min(height - 1, y + r);
    const minX = Math.max(0, x - r);
    const maxX = Math.min(width - 1, x + r);

    for (let ny = minY; ny <= maxY; ny += 1) {
      for (let nx = minX; nx <= maxX; nx += 1) {
        const onRing = ny === minY || ny === maxY || nx === minX || nx === maxX;
        if (!onRing) continue;
        const candidate = field.samples[ny][nx];
        if (isAdmissibleSample(candidate)) return candidate;
      }
    }
  }

  return getDeterministicFallbackSample(field);
}

function buildProgressionReceipt(dtMs) {
  const progressionAuthorized = runtimeReady && isRoundVisualMode();
  const progressionStep = progressionAuthorized ? orbitSpeedForMode() : 0;
  const progressionApplied =
    progressionAuthorized &&
    progressionStep > 0 &&
    typeof control.advanceOrbit === "function";

  if (progressionApplied) {
    control.advanceOrbit(dtMs, progressionStep);
  }

  lastProgressionReceipt = Object.freeze({
    progressionDtMs: Number.isFinite(dtMs) ? dtMs : 0,
    progressionAuthorized,
    progressionApplied,
    progressionStep,
    progressionPass: progressionAuthorized ? progressionApplied : true
  });
}

function buildEmissionReceipt(rawHits, orbitalAudit) {
  const emissionOrbitalCount = Number.isFinite(orbitalAudit?.count) ? orbitalAudit.count : 0;
  const emissionFrontVisible = Number.isFinite(orbitalAudit?.frontVisibleCount) ? orbitalAudit.frontVisibleCount : 0;
  const emissionEmitted = Number.isFinite(orbitalAudit?.emittedCount)
    ? orbitalAudit.emittedCount
    : (Array.isArray(rawHits) ? rawHits.length : 0);

  lastEmissionReceipt = Object.freeze({
    emissionOrbitalCount,
    emissionFrontVisible,
    emissionEmitted,
    emissionSuppressed: Math.max(0, emissionOrbitalCount - emissionEmitted),
    emissionPass: emissionOrbitalCount > 0 && emissionEmitted > 0
  });
}

function buildOrbitalHandshake() {
  return Object.freeze({
    ...lastProgressionReceipt,
    ...lastEmissionReceipt,
    intakeReceived: lastIntakeReceipt.intakeReceived,
    intakeStaged: lastIntakeReceipt.intakeStaged,
    intakeDiscarded: lastIntakeReceipt.intakeDiscarded,
    intakePass: lastIntakeReceipt.intakePass,
    placementPlaceable: lastPlacementReceipt.placementPlaceable,
    placementPlaced: lastPlacementReceipt.placementPlaced,
    placementReservedReject: lastPlacementReceipt.placementReservedReject,
    placementViewportReject: lastPlacementReceipt.placementViewportReject,
    placementPass: lastPlacementReceipt.placementPass
  });
}

function buildRuntimePacket(dtMs) {
  const projectionSummary = safeProjectionSummary();
  const currentSample = getAdmissibleSample(planetField, projectionSummary);
  const previousSample = lastCurrentSample || currentSample;

  const instrument = instruments.buildInstrumentReceipt({
    currentSample,
    previousSample,
    tickIndex: 0,
    motionState: safeMotionReceipt(dtMs),
    authorityState: {
      motionOwner: "control.js",
      projectionOwner: "control.js",
      inputOwner: "index.html",
      renderSource: "render.js",
      orbitSource: "index.html"
    },
    transitionState: {
      proposed: isFlatMode() ? "FLAT_HOME" : isObserveMode() ? "OBSERVE_HOME" : "ROUND_HOME",
      admissible: true,
      accepted: true,
      blockedReason: "",
      family: "HOME_MODE"
    }
  });

  const runtime = Object.freeze({
    phase: "HOME",
    fps: dtMs > 0 ? 1000 / dtMs : 0,
    dtMs,
    elapsedMs: performance.now(),
    instrument,
    control: {
      projectionSummary,
      motionState: typeof control.getMotionState === "function" ? control.getMotionState() : {},
      orbitalState: typeof control.getOrbitalState === "function" ? control.getOrbitalState() : {}
    },
    planetField,
    renderAudit: lastRenderReceipt?.audit || {},
    orbitalAudit: {
      ...(lastRenderReceipt?.orbitalAudit || {}),
      markerRequired: lastPlacementReceipt.markerRequired,
      markerPlacementAdmissible: lastPlacementReceipt.markerPlacementAdmissible,
      markerCollisionCount: lastPlacementReceipt.markerCollisionCount,
      markerRepositionedCount: lastPlacementReceipt.markerRepositionedCount
    },
    orbitalHandshake: buildOrbitalHandshake(),
    progress: {},
    unlocks: {},
    verification: {
      pass: runtimeReady && !!planetField && (runtimeErrorMessage === ""),
      reasons: runtimeErrorMessage ? [runtimeErrorMessage] : []
    },
    failure: {
      phase: runtimeErrorMessage ? "BOOT" : "",
      message: runtimeErrorMessage
    }
  });

  lastCurrentSample = currentSample;
  return runtime;
}

function getViewportCenter() {
  return Object.freeze({
    x: window.innerWidth * 0.5,
    y: window.innerHeight * 0.5
  });
}

function cloneHit(hit, center) {
  const radius = Number.isFinite(hit?.radius) ? hit.radius : 42;
  const dx = hit.x - center.x;
  const dy = hit.y - center.y;
  return {
    id: hit.id,
    label: hit.label,
    route: hit.route,
    x: hit.x,
    y: hit.y,
    radius,
    angle: Math.atan2(dy, dx)
  };
}

function normalizeAngle(value) {
  const twoPi = Math.PI * 2;
  let angle = value;
  while (angle <= -Math.PI) angle += twoPi;
  while (angle > Math.PI) angle -= twoPi;
  return angle;
}

function computeMarkerVector(hit, center) {
  const dx = hit.x - center.x;
  const dy = hit.y - center.y;
  const length = Math.sqrt((dx * dx) + (dy * dy));

  if (length > 0.0001) {
    return Object.freeze({
      ux: dx / length,
      uy: dy / length
    });
  }

  return Object.freeze({
    ux: Math.cos(hit.angle),
    uy: Math.sin(hit.angle)
  });
}

function applyOutwardSeparation(a, b, center) {
  const dx = b.x - a.x;
  const dy = b.y - a.y;
  const distance = Math.sqrt((dx * dx) + (dy * dy));
  const minDistance = a.radius + b.radius + MARKER_PADDING;

  if (distance >= minDistance) return false;

  const overlap = minDistance - Math.max(distance, 0.0001);
  const va = computeMarkerVector(a, center);
  const vb = computeMarkerVector(b, center);

  a.x -= va.ux * (overlap * 0.5);
  a.y -= va.uy * (overlap * 0.5);
  b.x += vb.ux * (overlap * 0.5);
  b.y += vb.uy * (overlap * 0.5);

  return true;
}

function minimalViewportClamp(hit) {
  const width = window.innerWidth;
  const height = window.innerHeight;
  const margin = hit.radius + 4;

  hit.x = Math.max(margin, Math.min(width - margin, hit.x));
  hit.y = Math.max(margin, Math.min(height - margin, hit.y));
}

function countCollisions(hits) {
  let count = 0;
  for (let i = 0; i < hits.length; i += 1) {
    for (let j = i + 1; j < hits.length; j += 1) {
      const a = hits[i];
      const b = hits[j];
      const dx = b.x - a.x;
      const dy = b.y - a.y;
      const minDistance = a.radius + b.radius + MARKER_PADDING;
      if ((dx * dx) + (dy * dy) < minDistance * minDistance) count += 1;
    }
  }
  return count;
}

function circleIntersectsRect(hit, rect) {
  const nearestX = Math.max(rect.left, Math.min(hit.x, rect.right));
  const nearestY = Math.max(rect.top, Math.min(hit.y, rect.bottom));
  const dx = hit.x - nearestX;
  const dy = hit.y - nearestY;
  return (dx * dx) + (dy * dy) <= (hit.radius * hit.radius);
}

function getReservedRects() {
  const rects = [];

  const heroRect = heroPanel?.getBoundingClientRect();
  if (heroRect && heroRect.width > 0 && heroRect.height > 0) {
    rects.push({
      left: heroRect.left - 12,
      top: heroRect.top - 8,
      right: heroRect.right + 12,
      bottom: heroRect.bottom + 8
    });
  }

  const modeRect = modeCluster?.getBoundingClientRect();
  if (modeRect && modeRect.width > 0 && modeRect.height > 0) {
    rects.push({
      left: modeRect.left - 10,
      top: modeRect.top - 10,
      right: modeRect.right + 10,
      bottom: modeRect.bottom + 10
    });
  }

  const homeRect = homePill?.getBoundingClientRect();
  if (homeRect && homeRect.width > 0 && homeRect.height > 0) {
    rects.push({
      left: homeRect.left - 10,
      top: homeRect.top - 10,
      right: homeRect.right + 10,
      bottom: homeRect.bottom + 10
    });
  }

  const diagnosticsRect = diagnosticsShell?.getBoundingClientRect();
  if (diagnosticsRect && diagnosticsRect.width > 0 && diagnosticsRect.height > 0) {
    rects.push({
      left: diagnosticsRect.left - 10,
      top: diagnosticsRect.top - 10,
      right: diagnosticsRect.right + 10,
      bottom: diagnosticsRect.bottom + 10
    });
  }

  return rects;
}

function validateMarkersInViewport(hits) {
  const width = window.innerWidth;
  const height = window.innerHeight;

  for (const hit of hits) {
    if (hit.x - hit.radius < 0) return false;
    if (hit.x + hit.radius > width) return false;
    if (hit.y - hit.radius < 0) return false;
    if (hit.y + hit.radius > height) return false;
  }

  return true;
}

function stageOrbitalCandidates(rawHits, gateAllowed) {
  const received = Array.isArray(rawHits) ? rawHits : [];

  const staged = gateAllowed
    ? received
        .filter((hit) => hit && Number.isFinite(hit.x) && Number.isFinite(hit.y))
        .filter((hit) => hit.frontFacing === true)
        .map((hit) => Object.freeze({
          id: hit.id,
          label: hit.label,
          route: hit.route,
          x: hit.x,
          y: hit.y,
          radius: Number.isFinite(hit.radius) ? hit.radius : 42
        }))
    : [];

  lastIntakeReceipt = Object.freeze({
    intakeReceived: received.length,
    intakeStaged: staged.length,
    intakeDiscarded: Math.max(0, received.length - staged.length),
    intakePass: received.length > 0 ? staged.length > 0 : !gateAllowed,
    stagedHits: Object.freeze(staged)
  });
}

function solveMarkerPlacement(stagedHits) {
  const required = markerModeRequired();

  if (!required) {
    lastPlacementReceipt = Object.freeze({
      markerRequired: false,
      markerPlacementAdmissible: true,
      markerCollisionCount: 0,
      markerRepositionedCount: 0,
      placementPlaceable: 0,
      placementPlaced: 0,
      placementReservedReject: 0,
      placementViewportReject: 0,
      placementPass: true,
      resolvedHits: Object.freeze([])
    });
    return;
  }

  const center = getViewportCenter();
  const reservedRects = getReservedRects();

  const frontHits = stagedHits
    .filter((hit) => Number.isFinite(hit?.x) && Number.isFinite(hit?.y))
    .map((hit) => cloneHit(hit, center))
    .sort((a, b) => a.angle - b.angle);

  if (!frontHits.length) {
    lastPlacementReceipt = Object.freeze({
      markerRequired: true,
      markerPlacementAdmissible: false,
      markerCollisionCount: 0,
      markerRepositionedCount: 0,
      placementPlaceable: 0,
      placementPlaced: 0,
      placementReservedReject: 0,
      placementViewportReject: 0,
      placementPass: false,
      resolvedHits: Object.freeze([])
    });
    return;
  }

  let repositionedCount = 0;

  for (let pass = 0; pass < MARKER_PASSES; pass += 1) {
    let moved = false;

    for (let i = 0; i < frontHits.length; i += 1) {
      const a = frontHits[i];
      const b = frontHits[(i + 1) % frontHits.length];

      if (frontHits.length > 2) {
        const delta = normalizeAngle(b.angle - a.angle);
        if (delta <= 0) continue;
      }

      const changed = applyOutwardSeparation(a, b, center);
      if (changed) {
        moved = true;
        repositionedCount += 2;
      }
    }

    if (!moved) break;
  }

  for (const hit of frontHits) {
    minimalViewportClamp(hit);
  }

  const finalCollisionCount = countCollisions(frontHits);

  let placementReservedReject = 0;
  let placementViewportReject = 0;

  const placeable = frontHits.filter((hit) => {
    const inViewport =
      hit.x - hit.radius >= 0 &&
      hit.x + hit.radius <= window.innerWidth &&
      hit.y - hit.radius >= 0 &&
      hit.y + hit.radius <= window.innerHeight;

    if (!inViewport) {
      placementViewportReject += 1;
      return false;
    }

    const overlapsReserved = reservedRects.some((rect) => circleIntersectsRect(hit, rect));
    if (overlapsReserved) {
      placementReservedReject += 1;
      return false;
    }

    return true;
  });

  const viewportPass = validateMarkersInViewport(placeable);
  const placementPass = placeable.length > 0 && finalCollisionCount === 0 && viewportPass;

  lastPlacementReceipt = Object.freeze({
    markerRequired: true,
    markerPlacementAdmissible: placementPass,
    markerCollisionCount: finalCollisionCount,
    markerRepositionedCount: repositionedCount,
    placementPlaceable: frontHits.length,
    placementPlaced: placeable.length,
    placementReservedReject,
    placementViewportReject,
    placementPass,
    resolvedHits: Object.freeze(placeable.map((hit) => Object.freeze({
      id: hit.id,
      label: hit.label,
      route: hit.route,
      x: hit.x,
      y: hit.y,
      radius: hit.radius
    })))
  });
}

function syncOverlayMarkers(runtime) {
  if (!isRoundVisualMode() || isObserveMode()) {
    lastIntakeReceipt = Object.freeze({
      intakeReceived: 0,
      intakeStaged: 0,
      intakeDiscarded: 0,
      intakePass: false,
      stagedHits: Object.freeze([])
    });
    lastPlacementReceipt = Object.freeze({
      markerRequired: false,
      markerPlacementAdmissible: true,
      markerCollisionCount: 0,
      markerRepositionedCount: 0,
      placementPlaceable: 0,
      placementPlaced: 0,
      placementReservedReject: 0,
      placementViewportReject: 0,
      placementPass: true,
      resolvedHits: Object.freeze([])
    });
    hideAllMarkers();
    return;
  }

  const rawHits = Array.isArray(lastRenderReceipt?.orbitalHits)
    ? lastRenderReceipt.orbitalHits
    : [];

  const gateAllowed =
    runtime?.instrument?.gate === "PASS" &&
    runtime?.instrument?.world?.stabilityClass !== "COLLAPSE";

  stageOrbitalCandidates(rawHits, gateAllowed);
  solveMarkerPlacement(lastIntakeReceipt.stagedHits);

  hideAllMarkers();

  for (const hit of lastPlacementReceipt.resolvedHits) {
    const marker = overlayMap[hit.id];
    if (!marker) continue;
    marker.hidden = false;
    marker.style.left = `${hit.x}px`;
    marker.style.top = `${hit.y}px`;
  }
}

function buildViewState() {
  const cameraState =
    typeof control.getCameraState === "function"
      ? control.getCameraState()
      : {};

  return Object.freeze({
    ...cameraState,
    observeMode: isObserveMode(),
    starfieldSuppressed: isObserveMode()
  });
}

function buildOrbitalConfig() {
  if (!isRoundVisualMode() || isObserveMode()) return null;

  const orbitalState =
    typeof control.getOrbitalState === "function"
      ? control.getOrbitalState()
      : {};

  return Object.freeze({
    phase: Number.isFinite(orbitalState?.orbitPhase) ? orbitalState.orbitPhase : 0,
    objects: orbitalSystem.objects,
    altitudeFactor: 0.42
  });
}

function renderSurface(dtMs) {
  if (!planetField) return;

  lastRenderReceipt = renderer.renderPlanet({
    ctx,
    planetField,
    projectPoint: (latDeg, lonDeg, radiusOffsetPx = 0) =>
      control.projectSphere(latDeg, lonDeg, radiusOffsetPx),
    viewState: buildViewState(),
    orbitalSystem: buildOrbitalConfig()
  });

  buildEmissionReceipt(lastRenderReceipt.orbitalHits, lastRenderReceipt.orbitalAudit);

  let runtime = buildRuntimePacket(dtMs);
  syncOverlayMarkers(runtime);
  runtime = buildRuntimePacket(dtMs);

  updateDiagnostics(runtime);
  emitRuntimeReceipt({
    phase: "RUNNING",
    renderPass: true,
    markerPass: !!lastPlacementReceipt.markerPlacementAdmissible
  });
}

function frame(now) {
  const dtMs = now - lastFrameAt;
  lastFrameAt = now;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (isRoundVisualMode()) {
    control.stepInertia(dtMs);
  }

  buildProgressionReceipt(dtMs);
  renderSurface(dtMs);
  rafId = requestAnimationFrame(frame);
}

function syncModeButtons() {
  btnFlat.classList.toggle("is-active", currentMode === "flat");
  btnRound.classList.toggle("is-active", currentMode === "round");
  btnObserve.classList.toggle("is-active", currentMode === "observe");
}

function setModePresentation() {
  body.setAttribute("data-mode", currentMode);
  syncModeButtons();

  if (isFlatMode()) {
    flatLayer.style.display = "flex";
    canvas.style.filter = "blur(8px) brightness(.64)";
    orbitalOverlay.style.opacity = "0";
    universeLayer.style.filter = "none";
    atmosphereLayer.style.filter = "none";
    heroLayer.style.transform = "none";
    hideAllMarkers();
  } else if (isObserveMode()) {
    flatLayer.style.display = "none";
    canvas.style.filter = "none";
    orbitalOverlay.style.opacity = "0";
    universeLayer.style.filter = "blur(.25px)";
    atmosphereLayer.style.filter = "none";
    heroLayer.style.transform = "translateY(-4px)";
    hideAllMarkers();
  } else {
    flatLayer.style.display = "none";
    canvas.style.filter = "none";
    orbitalOverlay.style.opacity = "1";
    universeLayer.style.filter = "none";
    atmosphereLayer.style.filter = "none";
    heroLayer.style.transform = "none";
  }
}

function setDiagnosticsMode(nextMode) {
  diagnosticsMode = nextMode === "full" ? "full" : "peek";
  body.setAttribute("data-diagnostics", diagnosticsMode);
  diagnosticsToggle.textContent = diagnosticsMode === "full" ? "HIDE DIAGNOSTICS" : "DIAGNOSTICS";
  emitRuntimeReceipt();
}

function navigateToMode(nextMode) {
  persistMotionState();
  location.href = buildModeHref(nextMode);
}

function bindOverlayRoutes() {
  orbitalSystem.objects.forEach((obj) => {
    const marker = overlayMap[obj.id];
    if (!marker) return;

    marker.addEventListener("click", () => {
      persistMotionState();
      location.href = withModeQuery(obj.route);
    });
  });
}

function bindEvents() {
  diagnosticsToggle.addEventListener("click", () => {
    setDiagnosticsMode(diagnosticsMode === "full" ? "peek" : "full");
    renderSurface(16.7);
  });

  btnFlat.addEventListener("click", () => {
    if (currentMode === "flat") return;
    navigateToMode("flat");
  });

  btnRound.addEventListener("click", () => {
    if (currentMode === "round") return;
    navigateToMode("round");
  });

  btnObserve.addEventListener("click", () => {
    if (currentMode === "observe") return;
    navigateToMode("observe");
  });

  if (isRoundVisualMode()) {
    canvas.addEventListener("pointerdown", (event) => {
      isDragging = true;
      lastX = event.clientX;
      lastY = event.clientY;
    }, { passive: true });

    window.addEventListener("pointermove", (event) => {
      if (!isDragging) return;

      const dx = event.clientX - lastX;
      const dy = event.clientY - lastY;

      lastX = event.clientX;
      lastY = event.clientY;

      control.applyDrag(dx, dy);
    }, { passive: true });

    window.addEventListener("pointerup", () => {
      isDragging = false;
    }, { passive: true });

    window.addEventListener("pointercancel", () => {
      isDragging = false;
    }, { passive: true });
  }

  document.querySelectorAll(".flat-card").forEach((card) => {
    card.addEventListener("click", () => {
      const route = card.dataset.route || "/home/";
      persistMotionState();
      location.href = withModeQuery(route);
    });
  });

  window.addEventListener("resize", () => {
    resizeWorld();
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    renderSurface(16.7);
  }, { passive: true });

  window.addEventListener("pagehide", () => {
    persistMotionState();

    if (rafId) {
      cancelAnimationFrame(rafId);
      rafId = 0;
    }
  }, { passive: true });

  window.addEventListener("pageshow", () => {
    control.setPresentationMode(currentMode);

    if (isRoundVisualMode()) {
      restoreMotionState();
    }

    if (!rafId && isRoundVisualMode()) {
      lastFrameAt = performance.now();
      rafId = requestAnimationFrame(frame);
    }
  }, { passive: true });
}

function start() {
  try {
    emitRuntimeReceipt({ phase: "BOOT_START", bootPass: false, renderPass: false, markerPass: false });

    resizeWorld();
    buildPlanetFieldOnce();
    control.setPresentationMode(currentMode);

    if (isRoundVisualMode()) {
      restoreMotionState();
    }

    bindOverlayRoutes();
    setModePresentation();
    setDiagnosticsMode("peek");
    bindEvents();

    runtimeReady = true;
    runtimeErrorMessage = "";
    clearBootStatus();

    buildProgressionReceipt(16.7);
    renderSurface(16.7);

    if (isRoundVisualMode() && !rafId) {
      lastFrameAt = performance.now();
      rafId = requestAnimationFrame(frame);
    }

    emitRuntimeReceipt({ phase: "BOOT_OK", bootPass: true, renderPass: true, markerPass: true });
  } catch (error) {
    runtimeReady = false;
    runtimeErrorMessage = error instanceof Error ? `${error.name}: ${error.message}` : String(error);
    showBootStatus(`World runtime failed to boot.\n\n${runtimeErrorMessage}\n\nStatic navigation remains active.`);
    updateDiagnostics(null);
    emitRuntimeReceipt({
      phase: "BOOT_FAIL",
      bootPass: false,
      renderPass: false,
      markerPass: false,
      error: runtimeErrorMessage
    });
  }
}

start();
</script>
</body>
</html>
