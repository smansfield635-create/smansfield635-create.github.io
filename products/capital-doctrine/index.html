<!doctype html>
<!-- TNT — /products/capital-doctrine/index.html
     CAPITAL COHERENCE DOCTRINE (CCD)
     NEW STANDARD (INFORMAL WEBSITE LAYER — FULL REWRITE)
     NON-NEGOTIABLES (LOCKED):
       - NO HS/COLLEGE/MASTERS/PHD labels anywhere in UI
       - NO tier toggle visible to users
       - This page remains INFORMAL layer (human-accessible, institutional, dense)
       - Two visible lenses only:
           lane=platform|engineering (URL-only; NOT stored)
       - Trilingual UI toggle stays (EN/中文/ES)
       - Page copy remains dense; does NOT collapse into barebones
     STATE:
       - Preserve gd_lang/gd_style/gd_time/gd_depth only (NO new gd_* keys)
       - Preserve URL query: lang/style/time/depth/lane
       - Force gd_style="informal" on this page (informal layer build)
     UX:
       - Single-open accordion (top-level)
       - Sub-bubbles inside sections
       - No modals/overlays; no inline onclick; addEventListener only
     ASSETS:
       - /assets/ui.css + /assets/branch.css + /assets/instruments.js
       - ui.css owns html/body background (NO overrides)
-->

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Capital Coherence Doctrine</title>

<link rel="stylesheet" href="/assets/ui.css"/>
<link rel="stylesheet" href="/assets/branch.css"/>
<script defer src="/assets/instruments.js"></script>

<style>
a{color:inherit;text-decoration:none}
body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:#fff}
body::before,body::after{pointer-events:none!important}

:root{
  --dockH:120px;
  --stroke:rgba(255,255,255,.12);
  --stroke2:rgba(255,255,255,.10);

  --ink:rgba(255,255,255,.95);
  --mut:rgba(255,255,255,.82);
  --mut2:rgba(255,255,255,.72);

  --crimson:rgba(120,0,22,.30);
  --festival:rgba(255,43,43,.14);
  --opalV:rgba(90,40,120,.10);
  --goldSoft:rgba(201,162,74,.18);

  --shadowA:0 28px 100px rgba(0,0,0,.65);
  --shadowB:0 18px 60px rgba(0,0,0,.55);
}

/* Top controls */
.top{
  position:fixed;top:16px;left:0;right:0;
  padding:0 16px;
  display:flex;justify-content:space-between;align-items:center;
  gap:12px;z-index:240;pointer-events:none;
}
.top .left,.top .right{
  display:flex;gap:10px;align-items:center;flex-wrap:wrap;white-space:nowrap;
  pointer-events:auto;
}

/* Button (gold under-light only) */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:10px 12px;min-height:44px;border-radius:16px;
  border:1px solid rgba(255,255,255,.14);
  background:
    radial-gradient(circle at 50% 120%, rgba(201,162,74,.16), transparent 64%),
    linear-gradient(145deg, rgba(10,12,16,.78), rgba(6,8,10,.90));
  color:var(--ink);
  font-weight:950;font-size:14px;letter-spacing:.2px;
  -webkit-tap-highlight-color:transparent;
  position:relative;overflow:hidden;
  touch-action:manipulation;
  box-shadow:var(--shadowB);
  white-space:nowrap;
}
.btn:active{transform:translateY(1px)}
.btn::after{
  content:"";
  position:absolute;left:10px;right:10px;bottom:-12px;height:28px;
  background: radial-gradient(circle at 50% 0%, rgba(201,162,74,.34), transparent 72%);
  opacity:.60;pointer-events:none;
}
.btn.red{border-color:rgba(255,43,43,.22); box-shadow:var(--shadowB), 0 0 18px rgba(255,43,43,.12);}

/* Segmented controls */
.seg{
  display:inline-flex;gap:0;overflow:hidden;border-radius:16px;
  border:1px solid rgba(255,255,255,.12);
  background: rgba(0,0,0,.16);
  box-shadow: var(--shadowB);
}
.seg button{
  appearance:none;border:0;background:transparent;color:var(--mut);
  padding:10px 12px;min-height:44px;font-weight:950;font-size:13px;
  letter-spacing:.25px;cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
.seg button[aria-pressed="true"]{
  color:var(--ink);
  background:
    radial-gradient(circle at 50% 120%, rgba(201,162,74,.22), transparent 62%),
    linear-gradient(180deg, rgba(255,43,43,.10), rgba(0,0,0,.10));
  box-shadow: inset 0 -10px 22px rgba(201,162,74,.16);
}

/* Page */
.page{
  width:min(1100px,94vw);
  margin:0 auto;
  padding:110px 0 calc(var(--dockH) + 24px);
  display:flex;
  flex-direction:column;
  gap:14px;
  position:relative;
  z-index:10;
}

/* Header */
.header{
  border:1px solid var(--stroke);
  border-radius:26px;
  padding:24px;
  background:
    radial-gradient(circle at 18% 22%, var(--crimson), transparent 72%),
    radial-gradient(circle at 82% 34%, var(--opalV), transparent 74%),
    radial-gradient(circle at 70% 92%, var(--festival), transparent 62%),
    radial-gradient(circle at 26% 22%, rgba(201,162,74,.12), transparent 62%),
    linear-gradient(160deg, rgba(0,0,0,.22), rgba(0,0,0,.12));
  box-shadow:var(--shadowA);
  position:relative;
  overflow:hidden;
}
.header::before{
  content:"";
  position:absolute;inset:0;border-radius:26px;pointer-events:none;
  box-shadow: inset 0 0 0 1px rgba(201,162,74,.14);
  background:
    repeating-linear-gradient(45deg, rgba(201,162,74,.08) 0 1px, transparent 1px 16px),
    repeating-linear-gradient(-45deg, rgba(201,162,74,.06) 0 1px, transparent 1px 16px);
  opacity:.22;
  mask:
    radial-gradient(circle at 50% 50%, transparent 0 78%, #000 82% 100%),
    linear-gradient(#000,#000);
  -webkit-mask:
    radial-gradient(circle at 50% 50%, transparent 0 78%, #000 82% 100%),
    linear-gradient(#000,#000);
}
.k{margin:0 0 8px;font-size:11px;letter-spacing:4px;text-transform:uppercase;opacity:.78;color:var(--mut);position:relative}
.h1{margin:0;font-weight:980;font-size:34px;letter-spacing:.55px;color:var(--ink);position:relative}
.sub{
  margin-top:14px;
  font-size:16.5px;
  line-height:1.75;
  color:rgba(255,255,255,.88);
  position:relative;
}
.note{
  margin-top:12px;
  font-size:13.25px;
  line-height:1.55;
  color:rgba(255,255,255,.74);
  position:relative;
}

/* Controls row */
.ctrl{
  margin-top:16px;
  display:flex;gap:10px;flex-wrap:wrap;justify-content:space-between;align-items:center;
}
.badge{
  display:inline-flex;align-items:center;gap:10px;
  padding:10px 12px;border-radius:999px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(0,0,0,.16);
  color:rgba(255,255,255,.78);
  font-weight:950;
  box-shadow:0 14px 36px rgba(0,0,0,.55);
}
.badge b{color:var(--ink)}

/* Band */
.band{
  padding:10px 12px;border-radius:18px;
  border:1px solid var(--stroke2);
  background:rgba(0,0,0,.14);
  font-weight:980;letter-spacing:.25px;
  color:rgba(255,255,255,.90);
}

/* Accordion */
.stack{display:flex;flex-direction:column;gap:12px}
.card{
  border:1px solid rgba(255,255,255,.10);
  border-radius:22px;
  background:
    radial-gradient(circle at 22% 18%, rgba(255,43,43,.10), transparent 58%),
    radial-gradient(circle at 82% 30%, rgba(90,40,120,.10), transparent 66%),
    linear-gradient(145deg, rgba(17,22,28,.86), rgba(11,15,20,.94));
  box-shadow:var(--shadowA);
  overflow:hidden;
  position:relative;
}
.card::after{
  content:"";
  position:absolute;inset:0;border-radius:22px;pointer-events:none;
  box-shadow: inset 0 0 0 1px rgba(201,162,74,.10);
  opacity:.55;
}
.head{
  padding:16px 16px;
  display:flex;justify-content:space-between;align-items:flex-start;gap:12px;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
  position:relative;
}
.ti{margin:0;font-weight:980;letter-spacing:.2px;font-size:17.5px;color:var(--ink)}
.si{margin-top:8px;font-size:13.75px;line-height:1.45;color:rgba(255,255,255,.84);opacity:.92}
.chev{
  width:36px;height:36px;border-radius:14px;
  border:1px solid rgba(255,255,255,.14);
  background:rgba(0,0,0,.16);
  display:flex;align-items:center;justify-content:center;
  color:rgba(255,255,255,.78);
  font-weight:980;
  flex:0 0 auto;margin-top:2px;
  position:relative;overflow:hidden;
}
.chev::after{
  content:"";
  position:absolute;left:6px;right:6px;bottom:-10px;height:22px;
  background: radial-gradient(circle at 50% 0%, rgba(201,162,74,.30), transparent 70%);
  opacity:.62;pointer-events:none;
}
.body{
  display:none;
  padding:16px 16px 18px;
  border-top:1px solid rgba(255,255,255,.08);
  background:
    radial-gradient(circle at 30% 30%, rgba(255,255,255,.06), transparent 55%),
    linear-gradient(145deg, rgba(10,12,16,.86), rgba(6,8,10,.94));
  position:relative;
}
.card.open .body{display:block}

.body p{margin:0;color:rgba(255,255,255,.88);line-height:1.75;font-size:14.75px}
.body p + p{margin-top:12px}
.ul{margin:12px 0 0 18px;padding:0;color:rgba(255,255,255,.84);line-height:1.65;font-size:14px}
.ul li{margin:7px 0}

/* Sub-bubbles */
.subBubbles{margin-top:12px;display:flex;flex-direction:column;gap:10px}
.bubble{
  border:1px solid rgba(255,255,255,.10);
  border-radius:18px;
  background:
    radial-gradient(circle at 22% 18%, rgba(255,43,43,.08), transparent 60%),
    radial-gradient(circle at 82% 70%, rgba(201,162,74,.08), transparent 62%),
    rgba(0,0,0,.12);
  padding:14px 14px 12px;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
  position:relative;
  overflow:hidden;
}
.bubble::after{
  content:"";
  position:absolute;left:10px;right:10px;bottom:-14px;height:30px;
  background: radial-gradient(circle at 50% 0%, rgba(201,162,74,.22), transparent 72%);
  opacity:.50;pointer-events:none;
}
.bubble h4{
  margin:0 0 8px;
  font-weight:980;
  letter-spacing:.15px;
  font-size:15px;
  color:var(--ink);
}
.bubble p{
  margin:0;
  color:rgba(255,255,255,.80);
  line-height:1.7;
  display:none;
  font-size:14.5px;
}
.bubble.open p{display:block}

.actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end;margin-top:14px}

/* Dock */
.dock{
  position:fixed;left:50%;
  bottom:max(12px, env(safe-area-inset-bottom));
  transform:translateX(-50%);
  width:min(980px,94vw);
  padding:12px;border-radius:22px;
  border:1px solid var(--stroke);
  background:rgba(0,0,0,.22);
  backdrop-filter:blur(10px);
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  z-index:220;
}
.dock .btn{width:100%;text-align:center;border-radius:999px;padding:10px}
@media (max-width:520px){
  :root{--dockH:140px}
  .dock{grid-template-columns:repeat(3,1fr)}
  .h1{font-size:30px}
}
</style>
</head>

<body>

<div class="top" aria-label="Top controls">
  <div class="left">
    <a class="btn" id="btnProducts" href="/products/" data-route="/products/">PRODUCTS</a>
    <a class="btn" id="btnFinance" href="/products/finance/" data-route="/products/finance/">FINANCE</a>
    <a class="btn" id="btnRisk" href="/products/risk-capital/" data-route="/products/risk-capital/">RISK & CAPITAL</a>
  </div>
  <div class="right" aria-label="Language">
    <div class="seg" role="group" aria-label="Language toggle">
      <button type="button" id="langEN" aria-pressed="true">EN</button>
      <button type="button" id="langZH" aria-pressed="false">中文</button>
      <button type="button" id="langES" aria-pressed="false">ES</button>
    </div>
  </div>
</div>

<div class="page">

  <section class="header" aria-label="Header">
    <p class="k" id="k0">CAPITAL COHERENCE DOCTRINE</p>
    <h1 class="h1" id="h0">Capital Coherence Doctrine (CCD)</h1>
    <div class="sub" id="hdrSub"></div>
    <div class="note" id="hdrNote"></div>

    <div class="ctrl" aria-label="Controls">
      <div class="seg" role="group" aria-label="Lens">
        <button type="button" id="lanePlatform" aria-pressed="true">PLATFORM</button>
        <button type="button" id="laneEngineering" aria-pressed="false">ENGINEERING</button>
      </div>

      <div class="badge" aria-label="State">
        <span id="bLang">LANG</span> <b id="bLangV">EN</b>
        <span style="opacity:.6">·</span>
        <span id="bLane">LENS</span> <b id="bLaneV">PLATFORM</b>
        <span style="opacity:.6">·</span>
        <span id="bMode">MODE</span> <b id="bModeV">INFORMAL</b>
      </div>
    </div>
  </section>

  <div class="band" id="band0">DOCTRINE SECTIONS (SINGLE-OPEN)</div>
  <div class="stack" id="stack"></div>

</div>

<nav class="dock" aria-label="Bottom navigation">
  <a class="btn" id="dockIndex" href="/index.html" data-route="/index.html">INDEX</a>
  <a class="btn" id="dockProducts" href="/products/" data-route="/products/">PRODUCTS</a>
  <a class="btn" id="dockLaws" href="/laws/" data-route="/laws/">LAWS</a>
  <a class="btn" id="dockGauges" href="/gauges/" data-route="/gauges/">GAUGES</a>
</nav>

<script>
(function(){
  "use strict";

  // ===== Canon state carry (gd_* only) =====
  var qs=new URLSearchParams(location.search);
  var LS=window.localStorage;

  var lang  = qs.get("lang")  || LS.getItem("gd_lang")  || "en";
  var time  = qs.get("time")  || LS.getItem("gd_time")  || "now";
  var depth = qs.get("depth") || LS.getItem("gd_depth") || "1"; // preserved but not surfaced
  var lane  = qs.get("lane")  || "platform"; // URL-only

  // Informal site layer lock for this page
  var style = "informal";

  if(lang!=="en" && lang!=="zh" && lang!=="es") lang="en";
  if(time==="trajectory") time="post";
  if(time!=="origin" && time!=="now" && time!=="post") time="now";

  // preserve depth but do not interpret it here
  var d=parseInt(depth,10);
  if(!isFinite(d)) d=1;
  if(d<1) d=1;
  if(d>9) d=9;
  depth=String(d);

  if(lane!=="platform" && lane!=="engineering") lane="platform";

  try{
    LS.setItem("gd_lang",lang);
    LS.setItem("gd_style",style);
    LS.setItem("gd_time",time);
    LS.setItem("gd_depth",depth);
  }catch(e){}

  document.documentElement.lang=(lang==="zh")?"zh":(lang==="es")?"es":"en";

  function q(over){
    var p=new URLSearchParams();
    p.set("lang",(over&&over.lang)?over.lang:lang);
    p.set("style","informal");
    p.set("time",(over&&over.time)?over.time:time);
    p.set("depth",(over&&over.depth)?String(over.depth):depth);
    p.set("lane",(over&&over.lane)?over.lane:lane);
    return "?" + p.toString();
  }

  function wireAll(){
    var nodes=document.querySelectorAll("[data-route]");
    for(var i=0;i<nodes.length;i++){
      var el=nodes[i];
      var route=el.getAttribute("data-route")||"";
      if(!route) continue;

      if(route.indexOf("?")!==-1){
        try{
          var u=new URL(route, location.origin);
          var sp=u.searchParams;
          sp.set("style","informal");
          if(!sp.get("lang")) sp.set("lang", lang);
          if(!sp.get("time")) sp.set("time", time);
          if(!sp.get("depth")) sp.set("depth", depth);
          if(!sp.get("lane")) sp.set("lane", lane);
          el.setAttribute("href", u.pathname + "?" + sp.toString() + (u.hash||""));
        }catch(e){
          el.setAttribute("href", route);
        }
      }else{
        el.setAttribute("href", route + q());
      }
    }
  }

  function setPressed(ids, activeId){
    for(var i=0;i<ids.length;i++){
      var el=document.getElementById(ids[i]);
      if(!el) continue;
      el.setAttribute("aria-pressed", ids[i]===activeId ? "true" : "false");
    }
  }

  // Language toggle (reload same path)
  function setLang(next){
    if(next!=="en" && next!=="zh" && next!=="es") next="en";
    lang=next;
    try{ LS.setItem("gd_lang",lang);}catch(e){}
    window.location.href = window.location.pathname + q({lang:lang});
  }
  document.getElementById("langEN").addEventListener("click", function(){ setLang("en"); }, {passive:true});
  document.getElementById("langZH").addEventListener("click", function(){ setLang("zh"); }, {passive:true});
  document.getElementById("langES").addEventListener("click", function(){ setLang("es"); }, {passive:true});

  // Lane toggle (URL-only)
  function setLane(next){
    if(next!=="platform" && next!=="engineering") next="platform";
    lane=next;
    window.location.href = window.location.pathname + q({lane:lane});
  }
  document.getElementById("lanePlatform").addEventListener("click", function(){ setLane("platform"); }, {passive:true});
  document.getElementById("laneEngineering").addEventListener("click", function(){ setLane("engineering"); }, {passive:true});

  function P(en,zh,es){ return {en:en, zh:zh, es:es}; }
  function pick(o){ return (lang==="zh")?o.zh:(lang==="es")?(o.es||o.en):o.en; }

  // ===== Header copy (informal layer, dense, institutional) =====
  var HDR = {
    en:{
      sub:"CCD is the superlayer that governs whether capital expansion is structurally safe. It sits above finance and above governance.",
      note:"Informal layer: dense and readable. PLATFORM explains how to use it. ENGINEERING explains how it behaves (without formal protocol language)."
    },
    zh:{
      sub:"CCD 是判断资本扩张是否结构安全的超层规则。它位于金融与治理之上。",
      note:"通俗层：密集但可读。PLATFORM 讲怎么用。ENGINEERING 讲怎么运作（不进入正式协议语言）。"
    },
    es:{
      sub:"CCD es la supercapa que decide si la expansión de capital es estructuralmente segura. Está por encima de finanzas y gobernanza.",
      note:"Capa informal: densa y legible. PLATFORM = cómo usar. ENGINEERING = cómo se comporta (sin protocolo formal)."
    }
  };

  function applyHeader(){
    var H=HDR[lang] || HDR.en;
    document.getElementById("hdrSub").textContent = H.sub;
    document.getElementById("hdrNote").textContent = H.note;

    document.getElementById("bLangV").textContent = (lang==="zh")?"中文":(lang==="es")?"ES":"EN";
    document.getElementById("bLaneV").textContent = (lane==="engineering" ? (lang==="zh"?"工程":(lang==="es"?"INGENIERÍA":"ENGINEERING")) : (lang==="zh"?"平台":(lang==="es"?"PLATAFORMA":"PLATFORM")));
    document.getElementById("bModeV").textContent = (lang==="zh")?"通俗":(lang==="es")?"INFORMAL":"INFORMAL";

    setPressed(["langEN","langZH","langES"], lang==="zh"?"langZH":(lang==="es"?"langES":"langEN"));
    setPressed(["lanePlatform","laneEngineering"], lane==="engineering"?"laneEngineering":"lanePlatform");

    if(lang==="zh"){
      document.getElementById("k0").textContent="资本一致性教义";
      document.getElementById("h0").textContent="资本一致性教义（CCD）";
      document.getElementById("band0").textContent="教义章节（一次只开一个）";
      document.getElementById("bLang").textContent="语言";
      document.getElementById("bLane").textContent="透镜";
      document.getElementById("bMode").textContent="模式";
    }else if(lang==="es"){
      document.getElementById("k0").textContent="DOCTRINA DE COHERENCIA DE CAPITAL";
      document.getElementById("h0").textContent="Doctrina de Coherencia de Capital (CCD)";
      document.getElementById("band0").textContent="SECCIONES (una a la vez)";
      document.getElementById("bLang").textContent="IDIOMA";
      document.getElementById("bLane").textContent="LENTE";
      document.getElementById("bMode").textContent="MODO";
    }else{
      document.getElementById("k0").textContent="CAPITAL COHERENCE DOCTRINE";
      document.getElementById("h0").textContent="Capital Coherence Doctrine (CCD)";
      document.getElementById("band0").textContent="DOCTRINE SECTIONS (SINGLE-OPEN)";
      document.getElementById("bLang").textContent="LANG";
      document.getElementById("bLane").textContent="LENS";
      document.getElementById("bMode").textContent="MODE";
    }
  }

  // ===== Single-open accordion =====
  var stack=document.getElementById("stack");

  function closeAll(){
    stack.querySelectorAll(".card").forEach(function(c){
      c.classList.remove("open");
      var t=c.querySelector(".chevTxt");
      if(t) t.textContent="▸";
    });
  }

  function bubble(title, lines){
    var b=document.createElement("div");
    b.className="bubble";
    b.setAttribute("role","button");
    b.tabIndex=0;

    var h=document.createElement("h4");
    h.textContent=title;

    var p=document.createElement("p");
    p.textContent=Array.isArray(lines) ? lines.join("  ") : String(lines||"");

    b.appendChild(h);
    b.appendChild(p);

    function act(){ b.classList.toggle("open"); }
    b.addEventListener("click", act, {passive:true});
    b.addEventListener("keydown", function(e){
      if(e.key==="Enter"||e.key===" "){ e.preventDefault(); act(); }
    });
    return b;
  }

  function sectionCopy(sec){
    // PLATFORM vs ENGINEERING phrasing only (still informal).
    return (lane==="engineering") ? sec.eng : sec.plat;
  }

  var SECTIONS = [
    {
      c:"#c9a24a",
      t:"Position in System Architecture",
      s:"Where CCD sits, what it governs, and what it refuses to be.",
      plat:[
        "CCD sits above finance and above governance. It exists to prevent money from scaling a weak structure into a bigger failure.",
        "It does not tell you what to buy. It tells you when scaling is safe and when it must pause."
      ],
      eng:[
        "CCD is an upstream admissibility layer for capital action. Finance and governance execute beneath it.",
        "If structural safety cannot be demonstrated, escalation is blocked and rollback is preferred."
      ],
      bubbles:[
        {h:"What CCD governs", p:[
          "Whether expansion is safe.",
          "Whether exposure is bounded.",
          "Whether the system can survive scale."
        ]},
        {h:"What CCD does not do", p:[
          "Not portfolio advice.",
          "Not marketing claims.",
          "Not prediction or narrative forecasting."
        ]},
        {h:"Where it routes", p:[
          "Finance execution surfaces.",
          "Governance gating surfaces.",
          "Gauges for verification."
        ]}
      ]
    },
    {
      c:"#ff2b2b",
      t:"Core Principle",
      s:"One sentence that keeps capital from lying to itself.",
      plat:[

  function makeCard(sec, idx){
    var card=document.createElement("div");
    card.className="card";
    card.style.setProperty("--c", sec.c);

    var head=document.createElement("div");
    head.className="head";
    head.setAttribute("role","button");
    head.tabIndex=0;

    var left=document.createElement("div");
    left.style.minWidth="0";

    var ti=document.createElement("div");
    ti.className="ti";
    ti.textContent=sec.t;

    var si=document.createElement("div");
    si.className="si";
    si.textContent=sec.s;

    left.appendChild(ti);
    left.appendChild(si);

    var chev=document.createElement("div");
    chev.className="chev";
    chev.innerHTML='<span class="chevTxt">▸</span>';

    head.appendChild(left);
    head.appendChild(chev);

    var body=document.createElement("div");
    body.className="body";

    var lines=sectionCopy(sec);
    for(var i=0;i<lines.length;i++){
      var p=document.createElement("p");
      p.textContent=lines[i];
      body.appendChild(p);
    }

    var sb=document.createElement("div");
    sb.className="subBubbles";
    (sec.bubbles||[]).forEach(function(b){
      sb.appendChild(bubble(b.h, b.p));
    });
    body.appendChild(sb);

    var actions=document.createElement("div");
    actions.className="actions";

    var a1=document.createElement("a");
    a1.className="btn red";
    a1.textContent=(lang==="zh")?"打开：量规":(lang==="es")?"ABRIR: MEDIDORES":"OPEN: GAUGES";
    a1.setAttribute("data-route","/gauges/");
    actions.appendChild(a1);

    var a2=document.createElement("a");
    a2.className="btn";
    a2.textContent=(lang==="zh")?"打开：金融":(lang==="es")?"ABRIR: FINANZAS":"OPEN: FINANCE";
    a2.setAttribute("data-route","/products/finance/");
    actions.appendChild(a2);

    var a3=document.createElement("a");
    a3.className="btn";
    a3.textContent=(lang==="zh")?"打开：风险与资本":(lang==="es")?"ABRIR: RIESGO Y CAPITAL":"OPEN: RISK & CAPITAL";
    a3.setAttribute("data-route","/products/risk-capital/");
    actions.appendChild(a3);

    body.appendChild(actions);

    function toggle(){
      var openNow=!card.classList.contains("open");
      if(!openNow){
        card.classList.remove("open");
        card.querySelector(".chevTxt").textContent="▸";
        return;
      }
      closeAll();
      card.classList.add("open");
      card.querySelector(".chevTxt").textContent="▾";
      body.querySelectorAll(".bubble").forEach(function(x){ x.classList.remove("open"); });
      wireAll();
    }

    head.addEventListener("click", toggle, {passive:true});
    head.addEventListener("keydown", function(e){
      if(e.key==="Enter"||e.key===" "){ e.preventDefault(); toggle(); }
    });

    card.appendChild(head);
    card.appendChild(body);

    if(idx===0){
      card.classList.add("open");
      card.querySelector(".chevTxt").textContent="▾";
    }

    return card;
  }

  function render(){
    applyHeader();
    stack.innerHTML="";
    for(var i=0;i<SECTIONS.length;i++){
      stack.appendChild(makeCard(SECTIONS[i], i));
    }
    wireAll();
  }

  render();
})();
</script>
