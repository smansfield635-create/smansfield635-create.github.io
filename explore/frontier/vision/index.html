<!doctype html>
<!-- TNT — /explore/frontier/vision/index.html
     STATUS: FRONTIER BASELINE · CONJUGATED DIAMOND UNIVERSE
     PURPOSE:
       - Split structure from runtime authority
       - Conjugate core and planets into one diamond-body grammar
       - Core remains INDEX button and acts as diamond-sun
       - Planets orbit with depth cycling around the core
       - Preserve canonical carry: gd_lang/gd_style/gd_time/gd_depth only
       - Lane remains URL-only
-->

<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>FRONTIER · VISION REMOTE</title>

  <link rel="stylesheet" href="/assets/ui.css"/>
  <link rel="stylesheet" href="/assets/branch.css"/>

  <style>
    :root{
      --D0:148px;
      --D1:108px;
      --D2:90px;
      --D3:80px;

      --Z0:28px;
      --Z1:22px;
      --Z2:18px;
      --Z3:15px;

      --padTop:118px;

      --ink:rgba(255,255,255,.96);
      --mut:rgba(255,255,255,.78);

      --onyx0:rgba(4,6,10,.98);
      --onyx1:rgba(10,12,18,.92);
      --onyx2:rgba(18,22,30,.82);

      --crimson:rgba(120,0,22,.42);
      --festival:rgba(255,43,43,.20);
      --opalV:rgba(90,40,120,.15);

      --gold:rgba(201,162,74,.58);
      --goldGlow:rgba(201,162,74,.24);
      --goldLine:rgba(201,162,74,.18);

      --shadowDeep:0 44px 140px rgba(0,0,0,.82);
      --shadowC:0 18px 60px rgba(0,0,0,.55);
    }

    *{box-sizing:border-box}
    a{color:inherit;text-decoration:none}

    body{
      margin:0;
      color:#fff;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    }

    body::before,
    body::after{
      pointer-events:none !important;
    }

    .top{
      position:fixed;
      top:16px;
      left:0;
      right:0;
      z-index:240;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:0 16px;
      pointer-events:none;
    }

    .top__group{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      white-space:nowrap;
      pointer-events:auto;
    }

    .stage{
      position:relative;
      width:min(980px,95vw);
      height:min(980px,82vh);
      margin:var(--padTop) auto 0;
      pointer-events:none;
      perspective:1200px;
      perspective-origin:50% 44%;
      transform-style:preserve-3d;
      overflow:hidden;
    }

    .stage::before{
      content:"";
      position:absolute;
      inset:6% 8% 12%;
      z-index:0;
      pointer-events:none;
      border-radius:999px;
      background:
        radial-gradient(circle at 50% 52%, rgba(255,43,43,.10), transparent 28%),
        radial-gradient(circle at 50% 50%, rgba(201,162,74,.08), transparent 44%),
        radial-gradient(circle at 50% 50%, rgba(30,60,140,.10), transparent 74%);
      filter:blur(42px);
      opacity:.70;
      animation:stagePulse 10s ease-in-out infinite;
    }

    .starfield{
      position:absolute;
      inset:0;
      z-index:0;
      pointer-events:none;
      overflow:hidden;
    }

    .star{
      position:absolute;
      border-radius:999px;
      background:rgba(255,255,255,.82);
      box-shadow:0 0 6px rgba(255,255,255,.22);
      animation:starTwinkle linear infinite;
      will-change:opacity;
    }

    .dialFace{
      position:absolute;
      top:50%;
      left:50%;
      z-index:1;
      width:min(860px,92vw);
      height:min(860px,92vw);
      border-radius:999px;
      overflow:hidden;
      pointer-events:none;
      transform:translate(-50%,-50%);
    }

    .dialFace::before{
      content:"";
      position:absolute;
      inset:0;
      border-radius:999px;
      opacity:.90;
      background:
        radial-gradient(circle at 50% 46%, rgba(255,255,255,.06), rgba(0,0,0,.16) 58%, rgba(0,0,0,.44) 79%, rgba(0,0,0,0) 92%),
        radial-gradient(circle at 50% 50%, rgba(201,162,74,.08), transparent 62%),
        radial-gradient(circle at 50% 50%, rgba(255,43,43,.07), transparent 67%),
        linear-gradient(180deg, rgba(255,255,255,.02), rgba(0,0,0,.10));
      box-shadow:
        inset 0 0 0 2px rgba(255,255,255,.05),
        inset 0 0 0 10px rgba(0,0,0,.10),
        inset 0 0 70px rgba(0,0,0,.45),
        0 50px 180px rgba(0,0,0,.35);
      animation:dialBreath 8.8s ease-in-out infinite;
    }

    .dialFace::after{
      content:"";
      position:absolute;
      inset:-16%;
      opacity:.80;
      filter:blur(.25px);
      background:
        radial-gradient(circle at 50% 50%, transparent 0 36%, rgba(255,255,255,.05) 36% 36.6%, transparent 37% 100%),
        radial-gradient(circle at 50% 50%, transparent 0 52%, rgba(255,255,255,.05) 52% 52.6%, transparent 53% 100%),
        radial-gradient(circle at 50% 50%, transparent 0 69%, rgba(255,255,255,.05) 69% 69.6%, transparent 70% 100%),
        linear-gradient(90deg, transparent 0 49.7%, rgba(201,162,74,.09) 49.7% 50.3%, transparent 50.3% 100%),
        linear-gradient(0deg, transparent 0 49.7%, rgba(201,162,74,.09) 49.7% 50.3%, transparent 50.3% 100%),
        repeating-conic-gradient(from 45deg at 50% 50%, rgba(201,162,74,.05) 0 1.2deg, transparent 1.2deg 7.5deg);
      mask:radial-gradient(circle at 50% 50%, transparent 0 18%, #000 20% 100%);
      -webkit-mask:radial-gradient(circle at 50% 50%, transparent 0 18%, #000 20% 100%);
      animation:dialSweep 16s linear infinite;
    }

    .coreGlow{
      position:absolute;
      left:50%;
      top:50%;
      z-index:3;
      width:340px;
      height:340px;
      border-radius:999px;
      transform:translate(-50%,-50%);
      pointer-events:none;
      background:
        radial-gradient(circle at 50% 50%,
          rgba(255,244,210,.92) 0%,
          rgba(255,225,150,.42) 18%,
          rgba(255,200,100,.14) 36%,
          rgba(255,200,100,0) 72%);
      filter:blur(10px);
      animation:coreGlowPulse 7.4s ease-in-out infinite;
    }

    .orbitBand{
      position:absolute;
      left:50%;
      top:50%;
      border:1px solid rgba(205,220,255,.12);
      border-radius:999px;
      transform:translate(-50%,-50%);
      opacity:.56;
      pointer-events:none;
      z-index:2;
    }

    .planetNode{
      --face:var(--D3);
      --depth:var(--Z3);

      position:absolute;
      left:50%;
      top:50%;
      z-index:8;
      width:calc(var(--face) + (var(--depth) * 2));
      height:calc(var(--face) + (var(--depth) * 2));
      pointer-events:auto;
      cursor:pointer;
      touch-action:manipulation;
      -webkit-tap-highlight-color:transparent;
      transform:translate(-50%,-50%);
      transform-style:preserve-3d;
      filter:drop-shadow(0 16px 36px rgba(0,0,0,.34));
    }

    .planetNode--l1{ --face:var(--D1); --depth:var(--Z1); }
    .planetNode--l2{ --face:var(--D2); --depth:var(--Z2); }
    .planetNode--l3{ --face:var(--D3); --depth:var(--Z3); }
    .planetNode--core{ --face:var(--D0); --depth:var(--Z0); }

    .planetShadow{
      position:absolute;
      left:50%;
      top:50%;
      width:calc(var(--face) * .90);
      height:calc(var(--face) * .22);
      pointer-events:none;
      transform:translate(-50%, calc(var(--face) * .42)) rotate(-8deg);
      border-radius:999px;
      background:
        radial-gradient(circle at 50% 50%, rgba(0,0,0,.40) 0%, rgba(0,0,0,.22) 42%, rgba(0,0,0,.07) 72%, rgba(0,0,0,0) 100%);
      filter:blur(9px);
      opacity:.80;
    }

    .planetCube{
      position:absolute;
      left:50%;
      top:50%;
      width:var(--face);
      height:var(--face);
      transform-style:preserve-3d;
      transform:translate(-50%,-50%) rotateZ(45deg) rotateX(62deg) rotateY(-36deg);
      transition:filter .18s ease;
      will-change:transform;
    }

    .planetNode:hover .planetCube,
    .planetNode:focus .planetCube,
    .planetNode:focus-within .planetCube{
      filter:brightness(1.04) saturate(1.05);
    }

    .face{
      position:absolute;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.14);
      backface-visibility:hidden;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.14), inset 0 -22px 42px rgba(0,0,0,.34);
    }

    .face::before{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      background:
        linear-gradient(180deg, rgba(255,255,255,.08), transparent 30%, transparent 72%, rgba(0,0,0,.10)),
        repeating-linear-gradient(45deg, rgba(201,162,74,.07) 0 1px, transparent 1px 18px),
        repeating-linear-gradient(-45deg, rgba(201,162,74,.05) 0 1px, transparent 1px 18px);
      opacity:.72;
    }

    .face::after{
      content:"";
      position:absolute;
      top:-16%;
      left:-34%;
      width:58%;
      height:148%;
      pointer-events:none;
      opacity:.34;
      transform:rotate(10deg);
      background:linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,.04) 24%, rgba(255,255,255,.18) 50%, rgba(255,255,255,.04) 72%, rgba(255,255,255,0) 100%);
      filter:blur(2px);
      animation:faceSweep 9s linear infinite;
      animation-delay:var(--phase,0s);
    }

    .face--front,
    .face--back{
      left:50%;
      top:50%;
      width:var(--face);
      height:var(--face);
      margin-left:calc(var(--face) / -2);
      margin-top:calc(var(--face) / -2);
      border-radius:22px;
    }

    .face--front{
      transform:translateZ(calc(var(--depth) / 2));
      background:
        radial-gradient(circle at 24% 22%, rgba(255,255,255,.24), transparent 36%),
        radial-gradient(circle at 76% 26%, var(--festival), transparent 56%),
        radial-gradient(circle at 74% 82%, var(--opalV), transparent 64%),
        radial-gradient(circle at 26% 82%, var(--crimson), transparent 68%),
        linear-gradient(155deg, var(--onyx2), var(--onyx0));
      box-shadow:
        0 0 24px rgba(255,43,43,.10),
        inset 0 2px 0 rgba(255,255,255,.16),
        inset 0 -42px 82px rgba(0,0,0,.72);
    }

    .planetNode--core .face--front{
      background:
        radial-gradient(circle at 24% 22%, rgba(255,255,255,.34), transparent 34%),
        radial-gradient(circle at 76% 26%, rgba(255,220,130,.24), transparent 58%),
        radial-gradient(circle at 74% 82%, rgba(201,162,74,.18), transparent 64%),
        radial-gradient(circle at 26% 82%, rgba(255,120,60,.14), transparent 66%),
        linear-gradient(155deg, rgba(128,90,34,.84), rgba(22,12,8,.98));
      box-shadow:
        0 0 34px rgba(255,220,130,.18),
        inset 0 2px 0 rgba(255,255,255,.24),
        inset 0 -42px 82px rgba(0,0,0,.66);
    }

    .face--back{
      transform:rotateY(180deg) translateZ(calc(var(--depth) / 2));
      background:
        radial-gradient(circle at 50% 50%, rgba(201,162,74,.06), transparent 56%),
        linear-gradient(155deg, rgba(16,18,24,.84), rgba(4,6,10,.96));
      opacity:.86;
    }

    .face--left,
    .face--right{
      top:50%;
      left:50%;
      width:var(--depth);
      height:var(--face);
      margin-left:calc(var(--depth) / -2);
      margin-top:calc(var(--face) / -2);
      border-radius:14px;
    }

    .face--left{
      transform:rotateY(-90deg) translateZ(calc(var(--face) / 2));
      background:
        linear-gradient(180deg, rgba(255,255,255,.06), rgba(0,0,0,.18)),
        linear-gradient(155deg, rgba(110,22,28,.46), rgba(14,18,26,.94));
    }

    .planetNode--core .face--left{
      background:
        linear-gradient(180deg, rgba(255,255,255,.08), rgba(0,0,0,.14)),
        linear-gradient(155deg, rgba(154,92,40,.54), rgba(28,16,10,.94));
    }

    .face--right{
      transform:rotateY(90deg) translateZ(calc(var(--face) / 2));
      background:
        linear-gradient(180deg, rgba(255,255,255,.12), rgba(0,0,0,.08)),
        linear-gradient(155deg, rgba(184,146,92,.46), rgba(16,18,24,.90));
    }

    .planetNode--core .face--right{
      background:
        linear-gradient(180deg, rgba(255,255,255,.16), rgba(0,0,0,.06)),
        linear-gradient(155deg, rgba(218,180,108,.52), rgba(32,22,12,.92));
    }

    .face--top,
    .face--bottom{
      left:50%;
      top:50%;
      width:var(--face);
      height:var(--depth);
      margin-left:calc(var(--face) / -2);
      margin-top:calc(var(--depth) / -2);
      border-radius:14px;
    }

    .face--top{
      transform:rotateX(90deg) translateZ(calc(var(--face) / 2));
      background:
        linear-gradient(180deg, rgba(255,255,255,.18), rgba(0,0,0,.04)),
        linear-gradient(155deg, rgba(116,86,52,.58), rgba(34,28,22,.88));
    }

    .planetNode--core .face--top{
      background:
        linear-gradient(180deg, rgba(255,255,255,.22), rgba(0,0,0,.02)),
        linear-gradient(155deg, rgba(230,196,126,.54), rgba(80,54,22,.88));
    }

    .face--bottom{
      transform:rotateX(-90deg) translateZ(calc(var(--face) / 2));
      background:
        linear-gradient(180deg, rgba(0,0,0,.08), rgba(0,0,0,.22)),
        linear-gradient(155deg, rgba(12,14,18,.86), rgba(4,6,10,.98));
      opacity:.94;
    }

    .skeleton{
      position:absolute;
      left:50%;
      top:50%;
      width:var(--face);
      height:var(--face);
      margin-left:calc(var(--face) / -2);
      margin-top:calc(var(--face) / -2);
      pointer-events:none;
      transform-style:preserve-3d;
    }

    .skeleton__plane{
      position:absolute;
      inset:0;
      border-radius:22px;
      border:1px solid transparent;
      box-shadow:inset 0 0 0 1px rgba(201,162,74,.18);
      backface-visibility:hidden;
    }

    .planetNode--core .skeleton__plane{
      box-shadow:inset 0 0 0 1px rgba(255,224,146,.24);
    }

    .skeleton__plane--front{
      transform:translateZ(calc(var(--depth) / 2 + 1px));
    }

    .skeleton__plane--back{
      transform:rotateY(180deg) translateZ(calc(var(--depth) / 2 + 1px));
      opacity:.34;
    }

    .skeleton__edge{
      position:absolute;
      left:50%;
      top:50%;
      width:2px;
      height:calc(var(--face) * 1.10);
      margin-left:-1px;
      margin-top:calc(var(--face) * -0.55);
      background:linear-gradient(180deg, rgba(201,162,74,.04), rgba(201,162,74,.42), rgba(201,162,74,.04));
      border-radius:999px;
      transform-origin:center center;
      opacity:.88;
      filter:drop-shadow(0 0 6px rgba(201,162,74,.18));
    }

    .planetNode--core .skeleton__edge{
      background:linear-gradient(180deg, rgba(255,224,146,.08), rgba(255,224,146,.52), rgba(255,224,146,.08));
      filter:drop-shadow(0 0 8px rgba(255,224,146,.22));
    }

    .skeleton__edge--v{ transform:translateZ(calc(var(--depth) / 2 + 2px)); }
    .skeleton__edge--d1{ transform:translateZ(calc(var(--depth) / 2 + 2px)) rotate(45deg); }
    .skeleton__edge--d2{ transform:translateZ(calc(var(--depth) / 2 + 2px)) rotate(-45deg); }

    .skeleton__spine{
      position:absolute;
      left:50%;
      top:50%;
      width:2px;
      height:calc(var(--depth) + 10px);
      margin-left:-1px;
      margin-top:calc((var(--depth) + 10px) / -2);
      background:linear-gradient(180deg, rgba(201,162,74,.16), rgba(255,255,255,.28), rgba(201,162,74,.16));
      transform:translateZ(0) rotateX(90deg);
      border-radius:999px;
      opacity:.78;
      filter:drop-shadow(0 0 4px rgba(201,162,74,.14));
    }

    .planetNode--core .skeleton__spine{
      background:linear-gradient(180deg, rgba(255,224,146,.18), rgba(255,255,255,.34), rgba(255,224,146,.18));
      filter:drop-shadow(0 0 6px rgba(255,224,146,.18));
    }

    .planetLabel{
      position:absolute;
      left:50%;
      top:50%;
      z-index:20;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      width:var(--face);
      height:var(--face);
      pointer-events:none;
      transform:translate(-50%,-50%);
      text-align:center;
      text-shadow:0 0 18px rgba(0,0,0,.42), 0 1px 0 rgba(255,255,255,.04);
    }

    .planetLabel::before{
      content:"";
      position:absolute;
      inset:14% 10% auto;
      height:26%;
      border-radius:999px;
      opacity:.70;
      background:linear-gradient(to bottom, rgba(255,255,255,.18), rgba(255,255,255,0));
      transform:rotate(-12deg);
      filter:blur(.3px);
      pointer-events:none;
    }

    .planetLabel::after{
      content:"";
      position:absolute;
      inset:18% 16%;
      border-radius:18px;
      opacity:.14;
      background:
        radial-gradient(circle at 50% 64%, rgba(255,43,43,.34), transparent 52%),
        radial-gradient(circle at 50% 42%, rgba(201,162,74,.16), transparent 58%);
      filter:blur(10px);
      animation:innerGlow 8s ease-in-out infinite;
      animation-delay:var(--phase,0s);
      pointer-events:none;
    }

    .planetNode--core .planetLabel::after{
      opacity:.22;
      background:
        radial-gradient(circle at 50% 64%, rgba(255,170,80,.28), transparent 52%),
        radial-gradient(circle at 50% 42%, rgba(255,224,146,.24), transparent 58%);
    }

    .planetWord{
      position:relative;
      z-index:2;
      font-size:11.5px;
      font-weight:980;
      line-height:1.05;
      letter-spacing:.55px;
      color:var(--ink);
    }

    .planetCode{
      position:relative;
      z-index:2;
      margin-top:5px;
      font-size:9px;
      letter-spacing:1.1px;
      color:rgba(255,255,255,.84);
      opacity:.82;
    }

    .planetNode--core .planetWord{ font-size:15px; }
    .planetNode--core .planetCode{ font-size:10px; }
    .planetNode--l1 .planetWord{ font-size:13px; }
    .planetNode--l2 .planetWord{ font-size:12px; }

    .control{
      position:relative;
      display:grid;
      place-items:center;
      width:46px;
      height:46px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.14);
      border-radius:14px;
      cursor:pointer;
      pointer-events:auto;
      touch-action:manipulation;
      -webkit-tap-highlight-color:transparent;
      transform:rotate(45deg);
      background:
        radial-gradient(circle at 50% 120%, rgba(201,162,74,.16), transparent 64%),
        linear-gradient(145deg, rgba(10,12,16,.78), rgba(6,8,10,.90));
      box-shadow:var(--shadowC);
      transition:box-shadow .16s ease,border-color .16s ease,filter .16s ease;
      animation:controlAmbient 8.6s ease-in-out infinite;
    }

    .control::before{
      content:"";
      position:absolute;
      inset:0;
      border-radius:inherit;
      opacity:.34;
      pointer-events:none;
      box-shadow:inset 0 0 0 1px rgba(201,162,74,.18);
      background:
        linear-gradient(180deg, rgba(255,255,255,.08), transparent 42%),
        radial-gradient(circle at 78% 24%, rgba(255,43,43,.10), transparent 46%);
    }

    .control::after{
      content:"";
      position:absolute;
      left:10px;
      right:10px;
      bottom:-12px;
      height:26px;
      opacity:.55;
      pointer-events:none;
      background:radial-gradient(circle at 50% 0%, rgba(201,162,74,.30), transparent 72%);
    }

    .control:hover{
      border-color:rgba(201,162,74,.34);
      box-shadow:var(--shadowC), 0 0 0 2px rgba(201,162,74,.14), 0 0 26px rgba(201,162,74,.16);
      filter:brightness(1.03);
    }

    .control.is-on{
      border-color:rgba(255,43,43,.26);
      box-shadow:var(--shadowC), 0 0 16px rgba(255,43,43,.12), 0 0 26px rgba(201,162,74,.08);
    }

    .control__label{
      font-size:12px;
      font-weight:980;
      letter-spacing:.4px;
      color:var(--ink);
      user-select:none;
      transform:rotate(-45deg);
      text-shadow:0 0 12px rgba(0,0,0,.34);
    }

    .corner{
      position:fixed;
      bottom:max(18px, env(safe-area-inset-bottom));
      z-index:240;
      pointer-events:none;
    }

    .corner--left{left:18px}
    .corner--right{right:18px}

    .corner .control{ pointer-events:auto; }

    .corner__text{
      margin-top:10px;
      font-size:11px;
      letter-spacing:.4px;
      text-align:center;
      color:rgba(255,255,255,.72);
      text-shadow:0 0 12px rgba(0,0,0,.38);
    }

    @keyframes stagePulse{
      0%,100%{opacity:.68;filter:blur(42px)}
      50%{opacity:.82;filter:blur(48px)}
    }

    @keyframes starTwinkle{
      0%,100%{opacity:.24}
      50%{opacity:.92}
    }

    @keyframes dialBreath{
      0%,100%{opacity:.92;filter:saturate(1) brightness(1)}
      50%{opacity:.98;filter:saturate(1.05) brightness(1.03)}
    }

    @keyframes dialSweep{
      0%,100%{opacity:.76;filter:blur(.25px) brightness(1)}
      50%{opacity:.90;filter:blur(.25px) brightness(1.05)}
    }

    @keyframes coreGlowPulse{
      0%,100%{opacity:.86;transform:translate(-50%,-50%) scale(1)}
      50%{opacity:1;transform:translate(-50%,-50%) scale(1.04)}
    }

    @keyframes faceSweep{
      0%{left:-34%;opacity:.10}
      18%{opacity:.18}
      52%{opacity:.34}
      80%{opacity:.12}
      100%{left:88%;opacity:.06}
    }

    @keyframes innerGlow{
      0%,100%{opacity:.10}
      50%{opacity:.18}
    }

    @keyframes controlAmbient{
      0%,100%{filter:saturate(1) brightness(1)}
      50%{filter:saturate(1.04) brightness(1.02)}
    }

    @media (prefers-reduced-motion: reduce){
      .stage::before,
      .star,
      .dialFace::before,
      .dialFace::after,
      .face::after,
      .planetLabel::after,
      .control,
      .coreGlow{
        animation:none !important;
      }
    }

    @media (max-width:640px){
      :root{
        --D0:146px;
        --D1:108px;
        --D2:88px;
        --D3:78px;
        --Z0:26px;
        --Z1:20px;
        --Z2:17px;
        --Z3:15px;
        --padTop:128px;
      }

      .planetWord{font-size:11.25px}
      .coreGlow{width:300px;height:300px}
    }

    @media (max-width:420px){
      :root{
        --D0:138px;
        --D1:104px;
        --D2:86px;
        --D3:76px;
        --Z0:24px;
        --Z1:18px;
        --Z2:16px;
        --Z3:14px;
      }

      .planetWord{font-size:11px}
      .coreGlow{width:264px;height:264px}
    }
  </style>
</head>
