<!doctype html>
<!-- TNT — /index-core/index.html
     CADDY · DECISION DIAGNOSTIC ENGINE
     TRILINGUAL (EN / 中文 / ES)
     DUAL LENS (PLATFORM / ENGINEERING)
     STATE: gd_lang / gd_style / gd_time / gd_depth ONLY
     lane=platform|engineering URL-ONLY (not stored)
-->

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>

<title>CADDY · Decision Diagnostic Engine</title>

<link rel="stylesheet" href="/assets/ui.css"/>
<link rel="stylesheet" href="/assets/branch.css"/>

<style>

body{
margin:0;
font-family:system-ui,-apple-system,Segoe UI,Roboto;
color:white;
}

/* PAGE */

.page{
max-width:1100px;
margin:auto;
padding:120px 24px;
display:flex;
flex-direction:column;
gap:28px;
}

/* HEADER */

.header{
border-radius:24px;
padding:28px;
background:
radial-gradient(circle at 20% 20%,rgba(201,162,74,.15),transparent),
linear-gradient(145deg,#080a0e,#040608);
box-shadow:0 40px 120px rgba(0,0,0,.8);
}

.title{
font-size:34px;
font-weight:900;
letter-spacing:.5px;
}

.subtitle{
margin-top:12px;
font-size:16px;
opacity:.85;
line-height:1.6;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:18px;
}

.card{
border-radius:20px;
padding:18px;
background:
radial-gradient(circle at 20% 20%,rgba(255,255,255,.08),transparent),
linear-gradient(150deg,#0d1118,#05070a);
box-shadow:0 20px 60px rgba(0,0,0,.7);
border:1px solid rgba(255,255,255,.1);
}

.card h3{
margin:0 0 10px 0;
font-size:18px;
font-weight:800;
}

select,input{
width:100%;
margin-top:6px;
}

.rangeVal{
margin-top:6px;
font-weight:700;
opacity:.85;
}

/* OUTPUT */

.result{
border-radius:22px;
padding:24px;
background:
radial-gradient(circle at 20% 20%,rgba(201,162,74,.15),transparent),
linear-gradient(140deg,#0b0e14,#04060a);
border:1px solid rgba(255,255,255,.12);
box-shadow:0 20px 80px rgba(0,0,0,.8);
}

.star{
font-size:24px;
font-weight:900;
letter-spacing:.6px;
margin-bottom:12px;
}

.reason{
opacity:.9;
line-height:1.6;
}

/* LINKS */

.links{
display:flex;
flex-wrap:wrap;
gap:12px;
margin-top:20px;
}

.linkBtn{
padding:10px 14px;
border-radius:999px;
border:1px solid rgba(255,255,255,.14);
background:linear-gradient(145deg,#10141a,#070a0e);
cursor:pointer;
}

/* TOP BAR */

.top{
position:fixed;
top:16px;
left:0;
right:0;
display:flex;
justify-content:space-between;
padding:0 20px;
z-index:100;
}

.seg button{
padding:10px 12px;
border-radius:12px;
border:1px solid rgba(255,255,255,.2);
background:#111;
color:white;
cursor:pointer;
}

.seg button[aria-pressed="true"]{
background:#333;
}

</style>
</head>

<body>

<div class="top">

<div class="seg">
<button id="langEN">EN</button>
<button id="langZH">中文</button>
<button id="langES">ES</button>
</div>

<div class="seg">
<button id="lanePlatform">PLATFORM</button>
<button id="laneEngineering">ENGINEERING</button>
</div>

</div>

<div class="page">

<div class="header">

<div class="title" id="title">
CADDY · Decision Diagnostic Engine
</div>

<div class="subtitle" id="subtitle"></div>

</div>

<div class="grid">

<div class="card">
<h3 id="catLabel">Category</h3>
<select id="category">
<option>Individual</option>
<option>Relational</option>
<option>Business</option>
<option>Corporate</option>
</select>
</div>

<div class="card">
<h3 id="scenarioLabel">Scenario</h3>
<select id="scenario">
<option>Strategic Planning</option>
<option>Conflict Resolution</option>
<option>Investment Decision</option>
<option>Leadership Decision</option>
<option>Innovation Development</option>
<option>Risk Management</option>
</select>
</div>

<div class="card">
<h3 id="adversityLabel">Adversity</h3>
<input type="range" min="0" max="100" value="40" id="adversity">
<div class="rangeVal" id="aVal">40</div>
</div>

<div class="card">
<h3 id="ambitionLabel">Ambition</h3>
<input type="range" min="0" max="100" value="60" id="ambition">
<div class="rangeVal" id="bVal">60</div>
</div>

<div class="card">
<h3 id="dispositionLabel">Disposition</h3>
<select id="disposition">
<option>Patient</option>
<option>Balanced</option>
<option>Aggressive</option>
<option>Analytical</option>
</select>
</div>

</div>

<div class="result">

<div class="star" id="alignmentStar"></div>

<div class="reason" id="alignmentReason"></div>

<div class="links">

<div class="linkBtn" onclick="location.href='/research/'">Research</div>
<div class="linkBtn" onclick="location.href='/explore/frontier/'">Frontier</div>
<div class="linkBtn" onclick="location.href='/explore/frontier/vision/'">Vision</div>
<div class="linkBtn" onclick="location.href='/laws/'">Laws</div>
<div class="linkBtn" onclick="location.href='/index.html'">Compass</div>

</div>

</div>

</div>

<script>

/* LANGUAGE */

let lang="en"
let lane="platform"

const TEXT={

en:{
subtitle_platform:"Scenario-based decision engine. Tune conditions and observe alignment.",
subtitle_engineering:"Decision calibration system mapping ambition vs adversity across defined scenarios.",
alignEssential:"Alignment: Essential",
alignStrategic:"Alignment: Strategic",
alignBalanced:"Alignment: Balanced",
alignCaution:"Alignment: Caution"
},

zh:{
subtitle_platform:"基于情境的决策引擎，通过调节变量观察对齐结果。",
subtitle_engineering:"决策校准系统，通过情境映射风险与雄心。",
alignEssential:"对齐：核心",
alignStrategic:"对齐：策略",
alignBalanced:"对齐：平衡",
alignCaution:"对齐：谨慎"
},

es:{
subtitle_platform:"Motor de decisiones basado en escenarios.",
subtitle_engineering:"Sistema de calibración estratégica de decisiones.",
alignEssential:"Alineación: Esencial",
alignStrategic:"Alineación: Estratégica",
alignBalanced:"Alineación: Balanceada",
alignCaution:"Alineación: Precaución"
}

}

/* UPDATE TEXT */

function updateText(){

const t=TEXT[lang]

document.getElementById("subtitle").textContent=
lane==="engineering"?t.subtitle_engineering:t.subtitle_platform

}

/* COMPUTE */

function compute(){

let a=parseInt(adversity.value)
let b=parseInt(ambition.value)

aVal.textContent=a
bVal.textContent=b

let score=b-a
const t=TEXT[lang]

if(score>30){
alignmentStar.textContent=t.alignEssential
alignmentReason.textContent="High ambition relative to adversity."
}

else if(score>10){
alignmentStar.textContent=t.alignStrategic
alignmentReason.textContent="Strategic progression recommended."
}

else if(score>-10){
alignmentStar.textContent=t.alignBalanced
alignmentReason.textContent="Balanced conditions."
}

else{
alignmentStar.textContent=t.alignCaution
alignmentReason.textContent="Containment recommended."
}

}

adversity.oninput=compute
ambition.oninput=compute

compute()
updateText()

/* LANGUAGE BUTTONS */

langEN.onclick=()=>{lang="en";updateText();compute()}
langZH.onclick=()=>{lang="zh";updateText();compute()}
langES.onclick=()=>{lang="es";updateText();compute()}

/* LANE BUTTONS */

lanePlatform.onclick=()=>{lane="platform";updateText()}
laneEngineering.onclick=()=>{lane="engineering";updateText()}

</script>

</body>
</html>
