<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Compass</title>

<style>
html,body{
margin:0;
padding:0;
height:100%;
background:#120706;
font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
color:#fff;
overflow-x:hidden;
}

canvas{
position:fixed;
inset:0;
width:100%;
height:100%;
z-index:0;
}

.stage{
position:relative;
z-index:3;
width:min(1200px,95vw);
margin:auto;
padding-top:60px;
}

.panel{
background:rgba(20,10,12,.6);
border:1px solid rgba(255,255,255,.14);
border-radius:26px;
padding:28px;
backdrop-filter:blur(18px);
box-shadow:0 30px 90px rgba(0,0,0,.5);
}

h1{
margin:0 0 12px;
font-size:42px;
}

.grid{
margin-top:36px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:14px;
}

.gem{
padding:18px;
border-radius:18px;
border:1px solid rgba(255,255,255,.14);
background:
radial-gradient(circle at 30% 25%,rgba(255,255,255,.45),transparent 40%),
linear-gradient(160deg,rgba(40,20,24,.9),rgba(8,5,6,.95));
box-shadow:
0 18px 60px rgba(0,0,0,.45),
inset 0 1px 0 rgba(255,255,255,.3),
inset 0 -60px 90px rgba(0,0,0,.7);
font-weight:800;
text-transform:uppercase;
letter-spacing:.06em;
text-align:center;
}

.gem.core{
font-size:18px;
border-color:rgba(233,197,118,.45);
box-shadow:
0 30px 120px rgba(0,0,0,.8),
0 0 30px rgba(233,197,118,.35),
inset 0 1px 0 rgba(255,255,255,.4),
inset 0 -60px 120px rgba(0,0,0,.8);
}
</style>
</head>

<body>

<canvas id="scene"></canvas>

<div class="stage">

<div class="panel">
<h1>Compass Hub</h1>
<p>Liquid compass instrument with embedded navigation gems.</p>

<div class="grid">

<div class="gem core">CORE</div>

<div class="gem">Governance</div>
<div class="gem">Finance</div>
<div class="gem">Energy</div>
<div class="gem">Medical</div>

<div class="gem">Verification</div>
<div class="gem">Software</div>
<div class="gem">Education</div>
<div class="gem">Gauges</div>

</div>

</div>

</div>

<script src="/variant/scene.js"></script>

</body>
</html>
