<!doctype html>
<!-- TNT — /products/index.html
     PRODUCTS · 5 STREAMS · 20 CORE PRODUCTS
     PLATFORM vs ENGINEERING (URL lane)
     TRILINGUAL (EN / 中文 / ES)
     INFORMAL LAYER PINNED
     SINGLE-OPEN ACCORDION
     STATE SAFE (gd_* only)
-->

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>PRODUCTS</title>

<link rel="stylesheet" href="/assets/ui.css"/>
<link rel="stylesheet" href="/assets/branch.css"/>
<script defer src="/assets/instruments.js"></script>

<style>
a{color:inherit;text-decoration:none}
body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:#fff}
body::before,body::after{pointer-events:none!important}

:root{
  --dockH:120px;
  --stroke:rgba(255,255,255,.12);
  --ink:rgba(255,255,255,.94);
  --mut:rgba(255,255,255,.80);
  --shadow:0 24px 80px rgba(0,0,0,.65);
}

.page{
  width:min(1120px,94vw);
  margin:120px auto 0;
  padding-bottom:calc(var(--dockH) + 24px);
  display:flex;
  flex-direction:column;
  gap:18px;
}

.header{
  border:1px solid var(--stroke);
  border-radius:22px;
  padding:20px;
  background:linear-gradient(145deg, rgba(10,12,16,.85), rgba(6,8,10,.95));
  box-shadow:var(--shadow);
}

.k{font-size:12px;letter-spacing:4px;text-transform:uppercase;opacity:.75}
.t{font-size:28px;font-weight:950;margin:6px 0 10px}
.s{font-size:15px;line-height:1.6;color:var(--mut)}

.list{display:flex;flex-direction:column;gap:14px}

.row{
  border:1px solid var(--stroke);
  border-radius:18px;
  overflow:hidden;
  background:linear-gradient(145deg, rgba(14,18,22,.9), rgba(8,10,14,.95));
  box-shadow:var(--shadow);
}

.head{
  padding:16px 18px;
  display:flex;
  justify-content:space-between;
  cursor:pointer;
}

.title{font-weight:900;font-size:18px}
.chev{opacity:.6}

.body{
  display:none;
  border-top:1px solid var(--stroke);
  padding:16px 18px;
}

.row.open .body{display:block}

.sub{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:12px;
}

.card{
  border:1px solid var(--stroke);
  border-radius:14px;
  padding:12px;
  background:rgba(0,0,0,.18);
}

.card h4{
  margin:0 0 6px;
  font-size:14px;
  font-weight:900;
}

.card p{
  margin:0;
  font-size:13px;
  color:var(--mut);
  line-height:1.5;
}

.seg{
  display:inline-flex;
  border:1px solid var(--stroke);
  border-radius:14px;
  overflow:hidden;
}

.seg button{
  appearance:none;
  border:0;
  background:transparent;
  color:var(--mut);
  padding:8px 12px;
  font-weight:900;
  cursor:pointer;
}

.seg button[aria-pressed="true"]{
  background:rgba(255,43,43,.12);
  color:#fff;
}
</style>
</head>

<body>

<div class="page">

  <div class="header">
    <div class="k">PRODUCT ARCHITECTURE</div>
    <div class="t" id="title">FIVE STREAMS · TWENTY PRODUCTS</div>
    <div class="s" id="subtitle"></div>

    <div style="margin-top:12px;display:flex;gap:10px;flex-wrap:wrap">
      <div class="seg">
        <button id="lanePlatform" aria-pressed="true">PLATFORM</button>
        <button id="laneEngineering" aria-pressed="false">ENGINEERING</button>
      </div>

      <div class="seg">
        <button id="langEN" aria-pressed="true">EN</button>
        <button id="langZH">中文</button>
        <button id="langES">ES</button>
      </div>
    </div>
  </div>

  <div class="list" id="list"></div>

</div>

<script>
(function(){

var qs=new URLSearchParams(location.search);
var LS=window.localStorage;

var lang  = qs.get("lang")  || LS.getItem("gd_lang")  || "en";
var lane  = qs.get("lane")  || "platform";

if(lang!=="en"&&lang!=="zh"&&lang!=="es") lang="en";
if(lane!=="platform"&&lane!=="engineering") lane="platform";

LS.setItem("gd_lang",lang);
LS.setItem("gd_style","informal");
LS.setItem("gd_depth","explore");

document.documentElement.lang = lang==="zh"?"zh":lang==="es"?"es":"en";

function pick(en,zh,es){
  return lang==="zh"?zh:lang==="es"?es:en;
}

function laneText(p,e){
  return lane==="engineering"?e:p;
}

var STREAMS = [

{
name:{en:"GOVERNING",zh:"治理",es:"GOBIERNO"},
products:[
["Policy Engine","政策引擎","Motor de Política"],
["Decision Index","决策指数","Índice de Decisión"],
["Compliance Grid","合规网格","Grid de Cumplimiento"],
["Public Risk Meter","公共风险表","Medidor Público"]
]
},

{
name:{en:"ENERGY",zh:"能源",es:"ENERGÍA"},
products:[
["Grid Optimization","电网优化","Optimización de Red"],
["Storage Stack","储能系统","Sistema de Almacenamiento"],
["Load Balancer","负载平衡","Balanceador de Carga"],
["Resilience Module","韧性模块","Módulo de Resiliencia"]
]
},

{
name:{en:"FINANCE",zh:"金融",es:"FINANZAS"},
products:[
["Capital Doctrine","资本教义","Doctrina de Capital"],
["Liquidity Model","流动性模型","Modelo de Liquidez"],
["Risk Envelope","风险包络","Envolvente de Riesgo"],
["Audit Ledger","审计账本","Libro de Auditoría"]
]
},

{
name:{en:"AGRICULTURE",zh:"农业",es:"AGRICULTURA"},
products:[
["Closed Loop Farming","闭环农业","Agricultura Cerrada"],
["Yield Optimizer","产量优化","Optimizador de Rendimiento"],
["Water Index","水指数","Índice Hídrico"],
["Soil Health Grid","土壤网格","Grid de Suelo"]
]
},

{
name:{en:"INFRASTRUCTURE",zh:"基础设施",es:"INFRAESTRUCTURA"},
products:[
["Urban Stack","城市栈","Stack Urbano"],
["Transit Model","交通模型","Modelo de Tránsito"],
["Waste Loop","废弃循环","Bucle de Residuos"],
["Habitat Module","栖息模块","Módulo de Hábitat"]
]
}

];

var list=document.getElementById("list");

function render(){

list.innerHTML="";

STREAMS.forEach(function(stream){

var row=document.createElement("div");
row.className="row";

var head=document.createElement("div");
head.className="head";

var title=document.createElement("div");
title.className="title";
title.textContent=pick(stream.name.en,stream.name.zh,stream.name.es);

var chev=document.createElement("div");
chev.className="chev";
chev.textContent="▸";

head.appendChild(title);
head.appendChild(chev);

var body=document.createElement("div");
body.className="body";

var sub=document.createElement("div");
sub.className="sub";

stream.products.forEach(function(p){

var card=document.createElement("div");
card.className="card";

var h=document.createElement("h4");
h.textContent=pick(p[0],p[1],p[2]);

var desc=document.createElement("p");
desc.textContent=laneText(
pick("Operational deployment layer.","平台执行层。","Capa operativa."),
pick("Deterministic architecture + manifest discipline.","确定性架构+清单纪律。","Arquitectura determinista + disciplina de manifiesto.")
);

card.appendChild(h);
card.appendChild(desc);
sub.appendChild(card);

});

body.appendChild(sub);

head.addEventListener("click",function(){
document.querySelectorAll(".row").forEach(function(r){ if(r!==row) r.classList.remove("open"); });
row.classList.toggle("open");
});

row.appendChild(head);
row.appendChild(body);
list.appendChild(row);

});

}

document.getElementById("lanePlatform").addEventListener("click",function(){
lane="platform";
this.setAttribute("aria-pressed","true");
document.getElementById("laneEngineering").setAttribute("aria-pressed","false");
render();
});

document.getElementById("laneEngineering").addEventListener("click",function(){
lane="engineering";
this.setAttribute("aria-pressed","true");
document.getElementById("lanePlatform").setAttribute("aria-pressed","false");
render();
});

document.getElementById("langEN").addEventListener("click",function(){lang="en";render();});
document.getElementById("langZH").addEventListener("click",function(){lang="zh";render();});
document.getElementById("langES").addEventListener("click",function(){lang="es";render();});

render();

})();
</script>

</body>
</html>
