<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1400" role="img" aria-labelledby="title desc">
  <title id="title">Upper Room Pendulum</title>
  <desc id="desc">Animated pendulum status graphic for The Upper Room presents A Dollar a Day Keeps the Psychiatrist Away.</desc>

  <defs>
    <linearGradient id="bgGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020816"/>
      <stop offset="45%" stop-color="#031233"/>
      <stop offset="100%" stop-color="#010713"/>
    </linearGradient>

    <radialGradient id="haloGradient" cx="50%" cy="42%" r="50%">
      <stop offset="0%" stop-color="#f7d688" stop-opacity="0.30"/>
      <stop offset="35%" stop-color="#88b9ff" stop-opacity="0.18"/>
      <stop offset="70%" stop-color="#5b73c9" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="glassGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#243152" stop-opacity="0.30"/>
      <stop offset="50%" stop-color="#4b5f8e" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#14203d" stop-opacity="0.26"/>
    </linearGradient>

    <linearGradient id="diamondFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#201b2f" stop-opacity="0.82"/>
      <stop offset="45%" stop-color="#213766" stop-opacity="0.58"/>
      <stop offset="100%" stop-color="#121f40" stop-opacity="0.80"/>
    </linearGradient>

    <radialGradient id="pendulumGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffe7a7" stop-opacity="0.95"/>
      <stop offset="50%" stop-color="#f2c86c" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#f2c86c" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="pendulumRod" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eef4ff" stop-opacity="0.95"/>
      <stop offset="50%" stop-color="#c6d8ff" stop-opacity="0.90"/>
      <stop offset="100%" stop-color="#7f98d8" stop-opacity="0.95"/>
    </linearGradient>

    <linearGradient id="bobFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1731"/>
      <stop offset="100%" stop-color="#182750"/>
    </linearGradient>

    <linearGradient id="goldText" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f4d38c"/>
      <stop offset="50%" stop-color="#f7e8b5"/>
      <stop offset="100%" stop-color="#dfb35d"/>
    </linearGradient>

    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="sharpGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 L0 0 0 40" fill="none" stroke="#6d86bb" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>

    <clipPath id="cardClip">
      <rect x="110" y="210" width="980" height="1080" rx="56"/>
    </clipPath>

    <clipPath id="diamondClip">
      <polygon points="600,370 930,700 600,1030 270,700"/>
    </clipPath>

    <style>
      text{
        font-family:Inter,Arial,sans-serif;
        letter-spacing:.02em;
      }

      .mono{
        font-family:Arial,sans-serif;
        letter-spacing:.18em;
      }

      .fine{fill:#d9e3ff}
      .muted{fill:#b3c1ea}
      .gold{fill:url(#goldText)}

      .pill{
        fill:#040c1d;
        fill-opacity:.88;
        stroke:#87a5e6;
        stroke-opacity:.22;
        stroke-width:2;
      }

      .swing-left{
        animation:pulseLeft 2.8s ease-in-out infinite;
      }

      .swing-right{
        animation:pulseRight 2.8s ease-in-out infinite;
      }

      .sweep{
        animation:sweep 5.6s linear infinite;
      }

      @keyframes pulseLeft{
        0%,18%,52%,100%{opacity:.12}
        68%,82%{opacity:1}
      }

      @keyframes pulseRight{
        0%,16%{opacity:1}
        32%,48%,100%{opacity:.12}
      }

      @keyframes sweep{
        0%{transform:translateX(-260px);opacity:0}
        15%{opacity:.18}
        50%{opacity:.10}
        85%{opacity:.18}
        100%{transform:translateX(260px);opacity:0}
      }
    </style>
  </defs>

  <rect width="1200" height="1400" fill="url(#bgGradient)"/>

  <rect x="0" y="0" width="1200" height="1400" fill="url(#grid)" opacity=".85"/>
  <path d="M600 0 V1400" stroke="#7c93c8" stroke-opacity=".10" stroke-width="2"/>
  <path d="M0 700 H1200" stroke="#7c93c8" stroke-opacity=".08" stroke-width="2"/>

  <ellipse cx="600" cy="640" rx="260" ry="260" fill="url(#haloGradient)" filter="url(#softGlow)"/>

  <rect x="70" y="160" width="1060" height="1160" rx="72" fill="none" stroke="#1b315d" stroke-width="3"/>
  <rect x="110" y="210" width="980" height="1080" rx="56" fill="none" stroke="#243f72" stroke-opacity=".95" stroke-width="3"/>
  <rect x="150" y="250" width="900" height="1000" rx="44" fill="none" stroke="#1a2f56" stroke-opacity=".90" stroke-width="2"/>

  <g clip-path="url(#cardClip)">
    <rect x="110" y="210" width="980" height="1080" rx="56" fill="#040b1c" fill-opacity=".42"/>

    <polygon points="600,370 930,700 600,1030 270,700" fill="url(#diamondFill)" stroke="#cfae66" stroke-opacity=".42" stroke-width="2"/>
    <polygon points="600,420 880,700 600,980 320,700" fill="none" stroke="#8aa7ea" stroke-opacity=".10" stroke-width="2"/>
    <polygon points="600,470 830,700 600,930 370,700" fill="none" stroke="#b99856" stroke-opacity=".18" stroke-width="1.5"/>

    <g clip-path="url(#diamondClip)">
      <rect x="250" y="350" width="700" height="700" fill="url(#glassGradient)"/>
      <path d="M260 560 Q600 440 940 560" fill="none" stroke="#8fa8db" stroke-opacity=".12" stroke-width="4"/>
      <path d="M260 840 Q600 960 940 840" fill="none" stroke="#8fa8db" stroke-opacity=".10" stroke-width="4"/>
      <path d="M410 350 Q600 700 410 1050" fill="none" stroke="#7b95cf" stroke-opacity=".10" stroke-width="4"/>
      <path d="M790 350 Q600 700 790 1050" fill="none" stroke="#7b95cf" stroke-opacity=".10" stroke-width="4"/>

      <g class="sweep">
        <rect x="520" y="280" width="140" height="900" rx="70" fill="#ffffff" opacity=".08" transform="rotate(24 590 730)"/>
      </g>
    </g>

    <path d="M600 370 V1030" stroke="#7a96d7" stroke-opacity=".28" stroke-width="3"/>
    <path d="M270 700 H930" stroke="#7a96d7" stroke-opacity=".24" stroke-width="3"/>

    <g class="swing-left" filter="url(#sharpGlow)">
      <circle cx="420" cy="840" r="20" fill="#f1d084"/>
      <circle cx="420" cy="840" r="42" fill="#f1d084" opacity=".14"/>
    </g>

    <g class="swing-right" filter="url(#sharpGlow)">
      <circle cx="780" cy="840" r="20" fill="#f1d084"/>
      <circle cx="780" cy="840" r="42" fill="#f1d084" opacity=".14"/>
    </g>

    <circle cx="600" cy="700" r="22" fill="#eff7ff" filter="url(#softGlow)"/>
    <circle cx="600" cy="700" r="90" fill="#d6e7ff" opacity=".18"/>

    <g id="pendulum">
      <circle cx="600" cy="520" r="14" fill="#eef3ff" opacity=".95" filter="url(#sharpGlow)"/>
      <circle cx="600" cy="520" r="28" fill="#c4dbff" opacity=".16"/>

      <g>
        <animateTransform
          attributeName="transform"
          type="rotate"
          values="-16 600 520;16 600 520;-16 600 520"
          dur="2.8s"
          repeatCount="indefinite"
          calcMode="spline"
          keyTimes="0;0.5;1"
          keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/>
        <rect x="592" y="520" width="16" height="280" rx="8" fill="url(#pendulumRod)" opacity=".94"/>
        <rect x="570" y="780" width="60" height="84" rx="30" fill="url(#bobFill)" stroke="#d8e5ff" stroke-opacity=".18" stroke-width="2"/>
        <circle cx="600" cy="820" r="82" fill="url(#pendulumGlow)" opacity=".58"/>
        <circle cx="600" cy="814" r="10" fill="#fff8dc" opacity=".96"/>
      </g>
    </g>
  </g>

  <rect class="pill" x="385" y="274" width="430" height="136" rx="68"/>
  <text x="600" y="315" text-anchor="middle" class="mono muted" font-size="20">UPPER ROOM STATUS</text>
  <text x="600" y="350" text-anchor="middle" class="gold" font-size="36" font-weight="700">COMING SOON</text>
  <text x="600" y="382" text-anchor="middle" class="muted" font-size="18">Time is moving · registration interest open</text>

  <text x="150" y="124" class="mono fine" font-size="26" font-weight="700">THE UPPER ROOM</text>
  <text x="150" y="160" class="gold" font-size="72" font-weight="800">A Dollar a Day Keeps</text>
  <text x="150" y="230" class="gold" font-size="72" font-weight="800">the Psychiatrist Away</text>
  <text x="150" y="274" class="mono muted" font-size="24">MOTIVATIONAL CROWD INTERACTION · SUNDAY FEATURE · PREVIEW SURFACE</text>

  <rect class="pill" x="205" y="1120" width="790" height="104" rx="52"/>
  <text x="600" y="1164" text-anchor="middle" class="mono fine" font-size="20" font-weight="700">THE UPPER ROOM PRESENTS</text>
  <text x="600" y="1196" text-anchor="middle" class="muted" font-size="24">A Dollar a Day Keeps the Psychiatrist Away</text>

  <text x="150" y="1328" class="mono muted" font-size="18">ASSET</text>
  <text x="225" y="1328" class="fine" font-size="18">assets/upper-room-pendulum.svg</text>
  <text x="1048" y="1328" text-anchor="end" class="muted" font-size="18">animated pendulum · reusable chamber visual</text>
</svg>
