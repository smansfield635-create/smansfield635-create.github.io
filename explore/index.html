<!doctype html>
<!-- TNT — /explore/index.html
     EXPLORE · EXPANSION MAP (INTRO-TIER ORIENTATION — NO LENSES)
     ROLE:
       - Foundational expansion layer
       - No product collapse
       - No modal traps
       - No lens switching (orientation layer)
       - Trilingual (EN / 中文 / ES)
       - Monument typography
       - Single-open accordion
       - State carry (lang/style/time/depth) via URL + LS gd_lang/gd_style/gd_time/gd_depth ONLY
       - NO new gd_* keys
       - lane=platform|engineering is URL-only (preserve if present; never store)
     LOCKS:
       - ui.css owns background (do NOT style html/body background)
       - branch.css owns geometry
       - instruments.js included
     ROUTING:
       - Links must append full state query
       - If a destination doesn’t exist yet, keep link (routing-safe shell is next deliverable)
-->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Explore · Expansion Map</title>

<link rel="stylesheet" href="/assets/ui.css"/>
<link rel="stylesheet" href="/assets/branch.css"/>
<script defer src="/assets/instruments.js"></script>

<style>
a{color:inherit;text-decoration:none}
body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:#fff}
body::before,body::after{pointer-events:none!important}

:root{
  --dockH:100px;

  /* High-contrast red/black/gold */
  --stroke:rgba(255,255,255,.12);
  --stroke2:rgba(255,255,255,.08);

  --ink:rgba(255,255,255,.94);
  --mut:rgba(255,255,255,.85);
  --mut2:rgba(255,255,255,.72);

  --crimson:rgba(120,0,22,.28);
  --festival:rgba(255,43,43,.14);
  --opalV:rgba(90,40,120,.10);
  --goldA:rgba(201,162,74,.22);
  --goldB:rgba(201,162,74,.10);

  --shadowA:0 40px 140px rgba(0,0,0,.65);
  --shadowB:0 20px 70px rgba(0,0,0,.60);
}

/* Page */
.page{
  width:min(1200px,94vw);
  margin:0 auto;
  padding:90px 0 calc(var(--dockH) + 24px);
  display:flex;
  flex-direction:column;
  gap:18px;
}

/* Top controls */
.top-left{
  position:fixed;left:16px;top:16px;z-index:240;
  display:flex;gap:10px;flex-wrap:wrap;align-items:center;
}
.top-right{
  position:fixed;right:16px;top:16px;z-index:240;
  display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:flex-end;
}

/* Button (gold under-light only) */
.btn{
  display:inline-flex;align-items:center;justify-content:center;
  min-height:44px;padding:10px 12px;border-radius:16px;
  border:1px solid rgba(255,255,255,.14);
  background:
    radial-gradient(circle at 50% 120%, rgba(201,162,74,.16), transparent 64%),
    linear-gradient(145deg, rgba(10,12,16,.78), rgba(6,8,10,.90));
  color:var(--ink);
  font-weight:950;font-size:14px;letter-spacing:.2px;
  -webkit-tap-highlight-color:transparent;
  position:relative;overflow:hidden;
  touch-action:manipulation;
  box-shadow:0 16px 44px rgba(0,0,0,.62);
  white-space:nowrap;
}
.btn:active{transform:translateY(1px)}
.btn::after{
  content:"";
  position:absolute;left:10px;right:10px;bottom:-12px;height:28px;
  background: radial-gradient(circle at 50% 0%, rgba(201,162,74,.34), transparent 72%);
  opacity:.60;pointer-events:none;
}
.btn.red{border-color:rgba(255,43,43,.22); box-shadow:0 16px 44px rgba(0,0,0,.62), 0 0 18px rgba(255,43,43,.12);}

/* Header */
.header{
  border:1px solid var(--stroke);
  border-radius:28px;
  padding:26px 28px;
  background:
    radial-gradient(circle at 18% 18%, var(--crimson), transparent 70%),
    radial-gradient(circle at 82% 26%, var(--opalV), transparent 72%),
    radial-gradient(circle at 70% 92%, var(--festival), transparent 62%),
    radial-gradient(circle at 28% 22%, var(--goldA), transparent 62%),
    radial-gradient(circle at 78% 80%, var(--goldB), transparent 62%),
    linear-gradient(160deg, rgba(0,0,0,.30), rgba(0,0,0,.14));
  box-shadow:var(--shadowA);
  backdrop-filter:blur(10px);
  position:relative;overflow:hidden;
}
/* Gold diamond lay in trim zone only */
.header::before{
  content:"";
  position:absolute;inset:0;border-radius:28px;pointer-events:none;
  box-shadow: inset 0 0 0 1px rgba(201,162,74,.16);
  background:
    repeating-linear-gradient(45deg, rgba(201,162,74,.08) 0 1px, transparent 1px 16px),
    repeating-linear-gradient(-45deg, rgba(201,162,74,.06) 0 1px, transparent 1px 16px);
  opacity:.30;
  mask:
    radial-gradient(circle at 50% 50%, transparent 0 76%, #000 80% 100%),
    linear-gradient(#000,#000);
  -webkit-mask:
    radial-gradient(circle at 50% 50%, transparent 0 76%, #000 80% 100%),
    linear-gradient(#000,#000);
}

.k{
  font-size:12px;
  letter-spacing:6px;
  text-transform:uppercase;
  opacity:.70;
  margin:0 0 14px;
  color:var(--mut);
}
.t{
  font-size:40px;
  font-weight:950;
  letter-spacing:.6px;
  margin:0 0 16px;
  color:var(--ink);
}
.s{
  font-size:18px;
  line-height:1.7;
  color:var(--mut);
  margin:0;
  max-width:1000px;
}

/* Accordion */
.accordion{
  display:flex;
  flex-direction:column;
  gap:14px;
}

.block{
  border:1px solid rgba(255,255,255,.10);
  border-radius:26px;
  background:
    radial-gradient(circle at 22% 18%, rgba(255,43,43,.10), transparent 58%),
    radial-gradient(circle at 82% 30%, rgba(90,40,120,.10), transparent 66%),
    linear-gradient(145deg, rgba(17,22,28,.86), rgba(11,15,20,.92));
  box-shadow:var(--shadowB);
  overflow:hidden;
  position:relative;
}
.block::after{
  content:"";
  position:absolute;inset:0;border-radius:26px;pointer-events:none;
  box-shadow: inset 0 0 0 1px rgba(201,162,74,.12);
  opacity:.60;
}

.head{
  padding:20px 24px;
  cursor:pointer;
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
.title{
  font-size:22px;
  font-weight:950;
  letter-spacing:.3px;
  color:var(--ink);
}
.chev{
  width:36px;height:36px;border-radius:14px;
  border:1px solid rgba(255,255,255,.14);
  background: rgba(0,0,0,.16);
  display:flex;align-items:center;justify-content:center;
  color:var(--mut);
  font-weight:950;
  position:relative;overflow:hidden;
  flex:0 0 auto;
}
.chev::after{
  content:"";
  position:absolute;left:6px;right:6px;bottom:-10px;height:22px;
  background: radial-gradient(circle at 50% 0%, rgba(201,162,74,.32), transparent 70%);
  opacity:.62;pointer-events:none;
}

.body{
  display:none;
  padding:22px 24px 26px;
  border-top:1px solid rgba(255,255,255,.08);
}
.block.open .body{display:block}

.p{
  font-size:17px;
  line-height:1.75;
  color:var(--mut2);
  margin:0 0 18px;
}

.jump{
  display:inline-flex;
  align-items:center;justify-content:center;
  min-height:44px;
  margin-top:10px;
  padding:10px 18px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.14);
  background:
    radial-gradient(circle at 50% 120%, rgba(201,162,74,.16), transparent 64%),
    linear-gradient(145deg, rgba(10,12,16,.78), rgba(6,8,10,.90));
  font-weight:950;
  letter-spacing:.2px;
  position:relative;overflow:hidden;
}
.jump::after{
  content:"";
  position:absolute;left:10px;right:10px;bottom:-12px;height:28px;
  background: radial-gradient(circle at 50% 0%, rgba(201,162,74,.34), transparent 72%);
  opacity:.62;pointer-events:none;
}

/* Dock */
.dock{
  position:fixed;
  left:50%;
  bottom:max(10px, env(safe-area-inset-bottom));
  transform:translateX(-50%);
  z-index:220;
  width:min(1000px,94vw);
  padding:12px;
  border-radius:24px;
  border:1px solid rgba(255,255,255,.12);
  background:
    radial-gradient(circle at 18% 18%, rgba(255,43,43,.10), transparent 62%),
    radial-gradient(circle at 82% 70%, rgba(90,40,120,.10), transparent 64%),
    linear-gradient(145deg, rgba(10,12,16,.72), rgba(6,8,10,.86));
  backdrop-filter:blur(10px);
  box-shadow:0 18px 60px rgba(0,0,0,.55);
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}
.dock .btn{width:100%;border-radius:999px;padding:10px 0}
@media (max-width:560px){
  :root{--dockH:114px}
  .dock{grid-template-columns:repeat(3,1fr)}
  .t{font-size:34px}
  .s{font-size:16px}
}
</style>
</head>

<body>

<div class="top-left" aria-label="Top navigation">
  <a class="btn" id="btnHome" href="/home/" data-route="/home/">HOME</a>
  <a class="btn" id="btnProducts" href="/products/" data-route="/products/">PRODUCTS</a>
</div>

<div class="top-right" aria-label="Language">
  <button class="btn" id="btnEN" type="button">EN</button>
  <button class="btn" id="btnZH" type="button">中文</button>
  <button class="btn" id="btnES" type="button">ES</button>
</div>

<div class="page">

  <div class="header" aria-label="Explore header">
    <p class="k" id="k">EXPLORE</p>
    <h1 class="t" id="t">The Expansion Layer</h1>
    <p class="s" id="s"></p>
  </div>

  <div class="accordion" id="accordion" aria-label="Explore accordion"></div>

</div>

<nav class="dock" aria-label="Bottom navigation">
  <a class="btn" id="dockIndex" href="/index.html" data-route="/index.html">COMPASS</a>
  <a class="btn" id="dockLaws" href="/laws/" data-route="/laws/">LAWS</a>
  <a class="btn" id="dockGauges" href="/gauges/" data-route="/gauges/">GAUGES</a>
  <a class="btn" id="dockDoor" href="/door/" data-route="/door/">DOOR</a>
</nav>

<script>
(function(){
  "use strict";

  // ===== Canon state (NO new gd_* keys) =====
  var qs = new URLSearchParams(location.search);
  var LS = window.localStorage;

  var lang  = qs.get("lang")  || LS.getItem("gd_lang")  || "en";
  var style = qs.get("style") || LS.getItem("gd_style") || "informal";
  var time  = qs.get("time")  || LS.getItem("gd_time")  || "now";
  var depth = qs.get("depth") || LS.getItem("gd_depth") || "1";
  var lane  = qs.get("lane")  || ""; // URL-only preserve only

  if(lang!=="en" && lang!=="zh" && lang!=="es") lang="en";
  if(style!=="informal" && style!=="formal") style="informal";
  if(time!=="origin" && time!=="now" && time!=="post") time="now";

  var d=parseInt(depth,10);
  if(!isFinite(d)) d=1;
  if(d<1) d=1;
  if(d>9) d=9;
  depth=String(d);

  if(lane!=="platform" && lane!=="engineering") lane="";

  try{
    LS.setItem("gd_lang",lang);
    LS.setItem("gd_style",style);
    LS.setItem("gd_time",time);
    LS.setItem("gd_depth",depth);
  }catch(e){}

  document.documentElement.lang = (lang==="zh") ? "zh" : (lang==="es" ? "es" : "en");

  function q(extra){
    var p = new URLSearchParams();
    p.set("lang", (extra&&extra.lang)?extra.lang:lang);
    p.set("style",(extra&&extra.style)?extra.style:style);
    p.set("time", (extra&&extra.time)?extra.time:time);
    p.set("depth",(extra&&extra.depth)?String(extra.depth):depth);
    var L = (extra&&extra.lane)?extra.lane:lane;
    if(L==="platform"||L==="engineering") p.set("lane", L);
    return "?" + p.toString();
  }

  // Wire all internal links with full state
  function wireAll(){
    var nodes=document.querySelectorAll("[data-route]");
    for(var i=0;i<nodes.length;i++){
      var el=nodes[i];
      var route=el.getAttribute("data-route")||"";
      if(!route) continue;

      if(route.indexOf("?")!==-1){
        try{
          var u=new URL(route, location.origin);
          var sp=u.searchParams;
          if(!sp.get("lang")) sp.set("lang", lang);
          if(!sp.get("style")) sp.set("style", style);
          if(!sp.get("time")) sp.set("time", time);
          if(!sp.get("depth")) sp.set("depth", depth);
          if(!sp.get("lane") && (lane==="platform"||lane==="engineering")) sp.set("lane", lane);
          el.setAttribute("href", u.pathname + "?" + sp.toString() + (u.hash||""));
        }catch(e){
          el.setAttribute("href", route);
        }
      }else{
        el.setAttribute("href", route + q());
      }
    }
  }

  // Language toggle (reload SAME pathname)
  function setLang(next){
    if(next!=="en" && next!=="zh" && next!=="es") next="en";
    lang=next;
    try{ LS.setItem("gd_lang",lang); }catch(e){}
    location.href = location.pathname + q({lang:lang});
  }
  var btnEN=document.getElementById("btnEN");
  var btnZH=document.getElementById("btnZH");
  var btnES=document.getElementById("btnES");
  if(btnEN) btnEN.addEventListener("click", function(){ setLang("en"); }, {passive:true});
  if(btnZH) btnZH.addEventListener("click", function(){ setLang("zh"); }, {passive:true});
  if(btnES) btnES.addEventListener("click", function(){ setLang("es"); }, {passive:true});

  // Copy
  var COPY={
    en:{
      head:"The Expansion Layer",
      desc:"Every structure eventually reaches its boundary. Explore is where we push past it — deliberately, measurably, and without losing coherence.",
      blocks:[
        {t:"Frontier Systems",p:"Water, Waste, Energy, Habitat, Urban OS. Structured deployment visions built on measurable substrate logic.",link:"/explore/frontier/"},
        {t:"Economic & Risk Architecture",p:"Finance, Insurance, Compliance, Contracts, Regulatory Mapping. Expansion requires stable economic alignment.",link:"/explore/economic/"},
        {t:"Infrastructure Substitution",p:"Industrial replacement systems that operate within constraint law and deployment gating.",link:"/explore/infrastructure/"},
        {t:"Applied Coherence Models",p:"Where lattice structure meets real-world systems. Measurable, bounded, scalable.",link:"/explore/models/"}
      ],
      enter:"ENTER"
    },
    zh:{
      head:"扩展层",
      desc:"每个结构都会触及边界。Explore 是我们有意识、可测量地突破边界的地方，同时保持架构一致性。",
      blocks:[
        {t:"前沿系统",p:"水、废弃物、能源、栖息地、城市操作系统。这不是概念，而是基于可测逻辑的部署愿景。",link:"/explore/frontier/"},
        {t:"经济与风险架构",p:"金融、保险、合规、合同、监管映射。扩展必须与经济结构一致。",link:"/explore/economic/"},
        {t:"基础设施替代",p:"在约束法则下运行的工业替代系统与部署闸门。",link:"/explore/infrastructure/"},
        {t:"应用一致性模型",p:"晶格结构与现实系统结合。可测量、有界、可扩展。",link:"/explore/models/"}
      ],
      enter:"进入"
    },
    es:{
      head:"Capa de Expansión",
      desc:"Toda estructura alcanza su límite. Explore es donde lo empujamos — deliberado y medible, sin perder coherencia.",
      blocks:[
        {t:"Sistemas Frontier",p:"Agua, Residuos, Energía, Hábitat, Sistema Urbano. Visiones desplegables estructuradas.",link:"/explore/frontier/"},
        {t:"Arquitectura Económica y de Riesgo",p:"Finanzas, Seguros, Cumplimiento, Contratos, Regulación. Escalar requiere alineación económica estable.",link:"/explore/economic/"},
        {t:"Sustitución de Infraestructura",p:"Sistemas industriales de reemplazo bajo leyes de restricción y compuertas de despliegue.",link:"/explore/infrastructure/"},
        {t:"Modelos Aplicados de Coherencia",p:"Donde la estructura de red se encuentra con sistemas reales. Medible, acotado, escalable.",link:"/explore/models/"}
      ],
      enter:"ENTRAR"
    }
  };

  var C=COPY[lang]||COPY.en;
  document.getElementById("t").textContent=C.head;
  document.getElementById("s").textContent=C.desc;

  // Render accordion (single-open)
  var acc=document.getElementById("accordion");

  function closeAll(){
    var blocks=acc.querySelectorAll(".block");
    for(var i=0;i<blocks.length;i++){
      blocks[i].classList.remove("open");
      var ch=blocks[i].querySelector(".chev");
      if(ch) ch.textContent="▸";
    }
  }

  C.blocks.forEach(function(b,i){
    var block=document.createElement("div");
    block.className="block";

    var head=document.createElement("div");
    head.className="head";

    var title=document.createElement("div");
    title.className="title";
    title.textContent=b.t;

    var chev=document.createElement("div");
    chev.className="chev";
    chev.textContent="▸";

    head.appendChild(title);
    head.appendChild(chev);

    var body=document.createElement("div");
    body.className="body";

    var p=document.createElement("p");
    p.className="p";
    p.textContent=b.p;

    var a=document.createElement("a");
    a.className="jump";
    a.textContent=C.enter;
    a.setAttribute("data-route", b.link);

    body.appendChild(p);
    body.appendChild(a);

    head.addEventListener("click", function(){
      var openNow=!block.classList.contains("open");
      closeAll();
      block.classList.toggle("open", openNow);
      chev.textContent = openNow ? "▾" : "▸";
      // wire state onto jump link after any toggle
      wireAll();
    }, {passive:true});

    head.addEventListener("keydown", function(e){
      if(e.key==="Enter"||e.key===" "){ e.preventDefault(); head.click(); }
    });

    block.appendChild(head);
    block.appendChild(body);
    acc.appendChild(block);

    if(i===0){
      block.classList.add("open");
      chev.textContent="▾";
    }
  });

  // Wire nav + jumps
  wireAll();
})();
</script>

</body>
</html>
