<!doctype html>
<!-- TNT — /explore/frontier/index.html
     FRONTIER · INDEX (WIRING HUB)
     PURPOSE:
       - One place that links EVERY frontier room you already created:
         closed-loop / energy / lattice / shimmer / trajectory / urban / vision / waste / water / infrastructure
       - Clean routing + state carry + no loops + no modal traps
     REQUIREMENTS:
       - Trilingual: EN / 中文 / ES (page-level)
       - 4 lenses:
           lane=platform|engineering (URL only; NEVER stored)
           style=informal|formal     (gd_style + URL)
       - Single-open accordion (one open at a time)
       - Inside each row: 3 sub-bubbles (Concept / Build Now / Roadmap) tap-to-open
       - Monument typography (bigger print)
       - Dark opal + red (no washed-out blue)
       - Canon state carry: lang/style/time/depth preserved everywhere via URL + LS gd_lang/gd_style/gd_time/gd_depth ONLY
       - NO new gd_* keys
       - Uses ui.css + branch.css + instruments.js only
       - ui.css owns html/body background (NO overrides)
       - No inline onclick; addEventListener only
-->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>EXPLORE · FRONTIER</title>

<link rel="stylesheet" href="/assets/ui.css"/>
<link rel="stylesheet" href="/assets/branch.css"/>
<script defer src="/assets/instruments.js"></script>

<style>
a{color:inherit;text-decoration:none}
body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:#fff}
body::before,body::after{pointer-events:none!important}

/* ===== TOKENS ===== */
:root{
  --dockH:112px;

  /* Onyx + opal sheen + dual-red + gold trim (avoid washed blue) */
  --stroke:rgba(255,255,255,.12);
  --stroke2:rgba(255,255,255,.10);

  --ink:rgba(255,255,255,.94);
  --txt:rgba(255,255,255,.92);
  --mut:rgba(255,255,255,.78);
  --soft:rgba(255,255,255,.62);

  --crimson:rgba(120,0,22,.30);
  --festival:rgba(255,43,43,.14);
  --opalV:rgba(90,40,120,.10);

  --gold:rgba(201,162,74,.40);
  --goldSoft:rgba(201,162,74,.18);

  --shadowA:0 24px 90px rgba(0,0,0,.58);
  --shadowB:0 16px 56px rgba(0,0,0,.62);
  --shadowC:0 18px 60px rgba(0,0,0,.55);
}

/* ===== PAGE WRAP ===== */
.page{
  width:min(1120px,94vw);
  margin:0 auto;
  padding:14px 0 calc(var(--dockH) + 18px);
  display:flex;
  flex-direction:column;
  gap:12px;
  position:relative;
  z-index:10;
}

/* ===== TOP CONTROLS (sticky; no traps) ===== */
.top{
  position:sticky;
  top:0;
  z-index:240;
  padding:10px 0 6px;
  display:flex;
  justify-content:space-between;
  gap:12px;
}
.top .left,.top .right{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  white-space:nowrap;
  align-items:center;
}

/* ===== Button (gold under-light only) ===== */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:10px 12px;min-height:44px;border-radius:16px;
  border:1px solid rgba(255,255,255,.14);
  background:
    radial-gradient(circle at 50% 120%, rgba(201,162,74,.16), transparent 64%),
    linear-gradient(145deg, rgba(10,12,16,.78), rgba(6,8,10,.90));
  color:var(--ink);
  font-weight:950;font-size:14px;letter-spacing:.2px;
  -webkit-tap-highlight-color:transparent;
  position:relative;overflow:hidden;
  touch-action:manipulation;
  box-shadow:var(--shadowC);
}
.btn:active{transform:translateY(1px)}
.btn::after{
  content:"";
  position:absolute;left:10px;right:10px;bottom:-12px;height:28px;
  background: radial-gradient(circle at 50% 0%, rgba(201,162,74,.34), transparent 72%);
  opacity:.60;pointer-events:none;
}
.btn.red{border-color:rgba(255,43,43,.22); box-shadow:var(--shadowC), 0 0 18px rgba(255,43,43,.12);}

/* ===== HEADER ===== */
.header{
  border:1px solid var(--stroke);
  border-radius:22px;
  background:
    radial-gradient(circle at 18% 22%, var(--crimson), transparent 72%),
    radial-gradient(circle at 82% 34%, var(--opalV), transparent 74%),
    radial-gradient(circle at 55% 110%, var(--festival), transparent 62%),
    radial-gradient(circle at 26% 22%, rgba(201,162,74,.14), transparent 62%),
    linear-gradient(160deg, rgba(0,0,0,.30), rgba(0,0,0,.14));
  backdrop-filter:blur(10px);
  box-shadow:var(--shadowA);
  padding:16px 16px 14px;
  position:relative;
  overflow:hidden;
}
/* Gold diamond lay in trim zone only */
.header::before{
  content:"";
  position:absolute;inset:0;border-radius:22px;pointer-events:none;
  box-shadow: inset 0 0 0 1px rgba(201,162,74,.16);
  background:
    repeating-linear-gradient(45deg, rgba(201,162,74,.08) 0 1px, transparent 1px 16px),
    repeating-linear-gradient(-45deg, rgba(201,162,74,.06) 0 1px, transparent 1px 16px);
  opacity:.28;
  mask:
    radial-gradient(circle at 50% 50%, transparent 0 78%, #000 82% 100%),
    linear-gradient(#000,#000);
  -webkit-mask:
    radial-gradient(circle at 50% 50%, transparent 0 78%, #000 82% 100%),
    linear-gradient(#000,#000);
}

.k{margin:0 0 8px;font-size:12px;letter-spacing:4px;text-transform:uppercase;opacity:.78;color:var(--mut)}
.t{margin:0;font-weight:950;font-size:32px;letter-spacing:.8px;line-height:1.08;color:var(--ink)}
.s{
  margin:12px 0 0;
  font-size:16px;
  opacity:.92;
  line-height:1.55;
  max-width:980px;
  color:var(--txt);
}
.rule{
  margin-top:12px;
  padding:12px 12px;
  border-radius:18px;
  border:1px solid rgba(255,255,255,.10);
  background:
    radial-gradient(circle at 22% 18%, rgba(255,43,43,.10), transparent 58%),
    radial-gradient(circle at 82% 70%, rgba(201,162,74,.10), transparent 62%),
    linear-gradient(160deg, rgba(10,12,16,.62), rgba(6,8,10,.76));
  font-size:13.5px;
  color:rgba(255,255,255,.82);
  line-height:1.45;
}

/* ===== LENSES ROW ===== */
.lenses{
  margin-top:12px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  justify-content:space-between;
  align-items:center;
}
.pills{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.pill{
  padding:10px 14px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.12);
  background:
    radial-gradient(circle at 50% 120%, rgba(201,162,74,.12), transparent 64%),
    linear-gradient(145deg, rgba(10,12,16,.78), rgba(6,8,10,.90));
  box-shadow:0 14px 36px rgba(0,0,0,.65);
  cursor:pointer;
  font-weight:950;
  letter-spacing:.2px;
  color:#fff;
  user-select:none;
  -webkit-tap-highlight-color:transparent;
  min-height:44px;
  position:relative;
  overflow:hidden;
}
.pill::after{
  content:"";
  position:absolute;left:10px;right:10px;bottom:-12px;height:28px;
  background: radial-gradient(circle at 50% 0%, rgba(201,162,74,.28), transparent 72%);
  opacity:.45;pointer-events:none;
}
.pill.active{
  border-color:rgba(201,162,74,.50);
  box-shadow:0 18px 50px rgba(0,0,0,.9), 0 0 14px rgba(201,162,74,.14);
}
.pill.red.active{
  border-color:rgba(255,43,43,.32);
  box-shadow:0 18px 50px rgba(0,0,0,.9), 0 0 16px rgba(255,43,43,.12);
}

/* ===== BAND ===== */
.band{
  padding:10px 12px;
  border-radius:18px;
  border:1px solid var(--stroke2);
  background:rgba(0,0,0,.14);
  font-weight:950;
  letter-spacing:.2px;
  color:rgba(255,255,255,.88);
  font-size:14px;
}

/* ===== ACCORDION (single open) ===== */
.list{display:flex;flex-direction:column;gap:12px}
.row{
  border:1px solid rgba(255,255,255,.10);
  border-radius:22px;
  background:
    radial-gradient(circle at 22% 18%, rgba(255,43,43,.10), transparent 58%),
    radial-gradient(circle at 82% 30%, rgba(90,40,120,.10), transparent 66%),
    linear-gradient(145deg, rgba(17,22,28,.86), rgba(11,15,20,.92));
  box-shadow:var(--shadowB);
  overflow:hidden;
  position:relative;
}
.row::before{
  content:"";
  position:absolute;inset:0;border-radius:22px;pointer-events:none;
  box-shadow: inset 0 0 0 1px rgba(201,162,74,.12);
  opacity:.60;
}
.head{
  display:flex;align-items:flex-start;justify-content:space-between;
  gap:10px;
  padding:16px 16px;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
  position:relative;
}
.left{
  display:flex;
  align-items:flex-start;
  gap:12px;
  min-width:0;
}
.mark{
  width:10px;height:10px;
  transform:rotate(45deg);
  border-radius:3px;
  background:var(--c);
  box-shadow:0 0 0 1px rgba(255,255,255,.14), 0 0 14px rgba(0,0,0,.35);
  flex:0 0 auto;
  margin-top:4px;
}
.titleBlock{min-width:0}
.title{
  font-weight:950;
  letter-spacing:.25px;
  font-size:18px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  color:var(--ink);
}
.sub{
  margin-top:8px;
  font-size:14px;
  opacity:.86;
  line-height:1.45;
  max-width:92ch;
  color:rgba(255,255,255,.86);
}
.chev{
  width:36px;height:36px;border-radius:14px;
  border:1px solid rgba(255,255,255,.14);
  background: rgba(0,0,0,.16);
  display:flex;align-items:center;justify-content:center;
  color:var(--mut);
  font-weight:950;
  position:relative;overflow:hidden;
  flex:0 0 auto;margin-top:2px;
}
.chev::after{
  content:"";
  position:absolute;left:6px;right:6px;bottom:-10px;height:22px;
  background: radial-gradient(circle at 50% 0%, rgba(201,162,74,.32), transparent 70%);
  opacity:.62;pointer-events:none;
}

.body{
  display:none;
  padding:16px 16px 16px;
  border-top:1px solid rgba(255,255,255,.08);
  background:
    radial-gradient(circle at 30% 30%, rgba(255,255,255,.06), transparent 55%),
    linear-gradient(145deg, rgba(10,12,16,.86), rgba(6,8,10,.92));
  position:relative;
}
.row.open .body{display:block}
.row.open{border-color:rgba(255,43,43,.22); box-shadow:var(--shadowB), 0 0 18px rgba(255,43,43,.10);}

.pdesc{
  margin:0;
  color:rgba(255,255,255,.90);
  line-height:1.65;
  font-size:15px;
}
.pdesc + .pdesc{margin-top:10px}

/* Sub-bubbles */
.subBubbles{margin-top:12px;display:flex;flex-direction:column;gap:10px}
.bubble{
  border:1px solid rgba(255,255,255,.10);
  border-radius:18px;
  background:
    radial-gradient(circle at 22% 18%, rgba(255,43,43,.08), transparent 60%),
    radial-gradient(circle at 82% 70%, rgba(201,162,74,.08), transparent 62%),
    rgba(0,0,0,.12);
  padding:14px 14px 12px;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
  position:relative;
  overflow:hidden;
}
.bubble::after{
  content:"";
  position:absolute;left:10px;right:10px;bottom:-14px;height:30px;
  background: radial-gradient(circle at 50% 0%, rgba(201,162,74,.22), transparent 72%);
  opacity:.50;pointer-events:none;
}
.bubble h4{
  margin:0 0 8px;
  font-weight:950;
  letter-spacing:.15px;
  font-size:15px;
  color:var(--ink);
}
.bubble p{
  margin:0;
  color:rgba(255,255,255,.80);
  line-height:1.7;
  display:none;
  font-size:14.5px;
}
.bubble.open p{display:block}

.actions{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  justify-content:flex-end;
  margin-top:14px;
}
.actions .btn{
  padding:10px 14px;
  border-radius:999px;
  white-space:nowrap;
}

/* ===== DOCK ===== */
.dock{
  position:fixed;
  left:50%;
  bottom:max(10px, env(safe-area-inset-bottom));
  transform:translateX(-50%);
  z-index:220;
  width:min(980px,94vw);
  padding:10px 12px;
  border-radius:22px;
  border:1px solid rgba(255,255,255,.12);
  background:
    radial-gradient(circle at 18% 18%, rgba(255,43,43,.10), transparent 62%),
    radial-gradient(circle at 82% 70%, rgba(90,40,120,.10), transparent 64%),
    linear-gradient(145deg, rgba(10,12,16,.72), rgba(6,8,10,.86));
  backdrop-filter:blur(10px);
  box-shadow:0 18px 60px rgba(0,0,0,.55);
  display:grid;
  grid-template-columns:repeat(4, minmax(0,1fr));
  gap:10px;
}
.dock .btn{width:100%;padding:10px 10px;border-radius:999px;white-space:nowrap}
@media (max-width:520px){
  :root{--dockH:132px}
  .dock{grid-template-columns:repeat(3, minmax(0,1fr))}
  .title{font-size:17px}
  .s{font-size:15px}
}
</style>
</head>

<body>

<div class="page">

  <div class="top" aria-label="Top controls">
    <div class="left">
      <a class="btn" id="btnExplore" href="/explore/" data-route="/explore/">EXPLORE</a>
      <a class="btn" id="btnDoor" href="/door/" data-route="/door/">DOOR</a>
      <a class="btn" id="btnHome" href="/home/" data-route="/home/">HOME</a>
    </div>
    <div class="right" aria-label="Language">
      <button class="btn" id="btnEN" type="button">EN</button>
      <button class="btn" id="btnZH" type="button">中文</button>
      <button class="btn" id="btnES" type="button">ES</button>
    </div>
  </div>

  <div class="header" aria-label="Header">
    <p class="k" id="hk">EXPLORE · FRONTIER</p>
    <h1 class="t" id="ht">FRONTIER INDEX</h1>
    <p class="s" id="hs"></p>
    <div class="rule" id="rule"></div>

    <div class="lenses" aria-label="Lenses">
      <div class="pills" aria-label="Lane">
        <button class="pill red" id="pillPlatform" type="button">PLATFORM</button>
        <button class="pill red" id="pillEngineering" type="button">ENGINEERING</button>
      </div>
      <div class="pills" aria-label="Tone">
        <button class="pill" id="pillInformal" type="button">INFORMAL</button>
        <button class="pill" id="pillFormal" type="button">FORMAL</button>
      </div>
    </div>
  </div>

  <div class="band" id="band">FRONTIER ROOMS</div>
  <div class="list" id="list"></div>

</div>

<nav class="dock" aria-label="Bottom navigation">
  <a class="btn" id="dockExplore" href="/explore/" data-route="/explore/">EXPLORE</a>
  <a class="btn" id="dockProducts" href="/products/" data-route="/products/">PRODUCTS</a>
  <a class="btn" id="dockLaws" href="/laws/" data-route="/laws/">LAWS</a>
  <a class="btn" id="dockGauges" href="/gauges/" data-route="/gauges/">GAUGES</a>
</nav>

<script>
(function(){
  "use strict";

  // ===== canonical state (no new gd_* keys) =====
  var qs=new URLSearchParams(location.search);
  var LS=window.localStorage;

  var lang  = qs.get("lang")  || LS.getItem("gd_lang")  || "en";
  var style = qs.get("style") || LS.getItem("gd_style") || "informal";
  var time  = qs.get("time")  || LS.getItem("gd_time")  || "now";
  var depth = qs.get("depth") || LS.getItem("gd_depth") || "1";
  var lane  = qs.get("lane")  || "platform"; // URL-only

  if(lang!=="en" && lang!=="zh" && lang!=="es") lang="en";
  if(style!=="formal" && style!=="informal") style="informal";
  if(time!=="origin" && time!=="now" && time!=="post") time="now";

  var d=parseInt(depth,10);
  if(!isFinite(d)) d=1;
  if(d<1) d=1;
  if(d>9) d=9;
  depth=String(d);

  if(lane!=="platform" && lane!=="engineering") lane="platform";

  try{
    LS.setItem("gd_lang",lang);
    LS.setItem("gd_style",style);
    LS.setItem("gd_time",time);
    LS.setItem("gd_depth",depth);
  }catch(e){}

  document.documentElement.lang=(lang==="zh")?"zh":(lang==="es")?"es":"en";

  function q(over){
    var p=new URLSearchParams();
    p.set("lang", (over&&over.lang)?over.lang:lang);
    p.set("style",(over&&over.style)?over.style:style);
    p.set("time", (over&&over.time)?over.time:time);
    p.set("depth",(over&&over.depth)?String(over.depth):depth);
    var A=(over&&over.lane)?over.lane:lane;
    if(A==="platform"||A==="engineering") p.set("lane", A);
    return "?" + p.toString();
  }

  // Wire all [data-route] links with full state
  function wireAll(){
    var nodes=document.querySelectorAll("[data-route]");
    for(var i=0;i<nodes.length;i++){
      var el=nodes[i];
      var route=el.getAttribute("data-route")||"";
      if(!route) continue;

      if(route.indexOf("?")!==-1){
        try{
          var u=new URL(route, location.origin);
          var sp=u.searchParams;
          if(!sp.get("lang")) sp.set("lang", lang);
          if(!sp.get("style")) sp.set("style", style);
          if(!sp.get("time")) sp.set("time", time);
          if(!sp.get("depth")) sp.set("depth", depth);
          if(!sp.get("lane")) sp.set("lane", lane);
          el.setAttribute("href", u.pathname + "?" + sp.toString() + (u.hash||""));
        }catch(e){
          el.setAttribute("href", route);
        }
      }else{
        el.setAttribute("href", route + q());
      }
    }
  }

  // Language toggle (reload same path)
  function setLang(next){
    if(next!=="en" && next!=="zh" && next!=="es") next="en";
    lang=next;
    try{ LS.setItem("gd_lang",lang);}catch(e){}
    window.location.href = window.location.pathname + q({lang:lang});
  }

  var btnEN=document.getElementById("btnEN");
  var btnZH=document.getElementById("btnZH");
  var btnES=document.getElementById("btnES");
  if(btnEN) btnEN.addEventListener("click", function(){ setLang("en"); }, {passive:true});
  if(btnZH) btnZH.addEventListener("click", function(){ setLang("zh"); }, {passive:true});
  if(btnES) btnES.addEventListener("click", function(){ setLang("es"); }, {passive:true});

  // Pills (lane URL-only; tone updates gd_style)
  var pillPlatform=document.getElementById("pillPlatform");
  var pillEngineering=document.getElementById("pillEngineering");
  var pillInformal=document.getElementById("pillInformal");
  var pillFormal=document.getElementById("pillFormal");

  function paintPills(){
    pillPlatform.classList.toggle("active", lane==="platform");
    pillEngineering.classList.toggle("active", lane==="engineering");
    pillInformal.classList.toggle("active", style==="informal");
    pillFormal.classList.toggle("active", style==="formal");
  }

  function setLane(next){
    if(next!=="platform" && next!=="engineering") next="platform";
    lane=next;
    history.replaceState({}, "", location.pathname + q({lane:lane}));
    paintPills();
    render();
  }

  function setTone(next){
    if(next!=="formal" && next!=="informal") next="informal";
    style=next;
    try{ LS.setItem("gd_style",style);}catch(e){}
    history.replaceState({}, "", location.pathname + q({style:style}));
    paintPills();
    render();
  }

  pillPlatform.addEventListener("click", function(){ setLane("platform"); }, {passive:true});
  pillEngineering.addEventListener("click", function(){ setLane("engineering"); }, {passive:true});
  pillInformal.addEventListener("click", function(){ setTone("informal"); }, {passive:true});
  pillFormal.addEventListener("click", function(){ setTone("formal"); }, {passive:true});

  // Copy helpers
  function P(en,zh,es){ return {en:en, zh:zh, es:es}; }
  function pick(o){ return (lang==="zh")?o.zh:(lang==="es")?(o.es||o.en):o.en; }

  function lensKey(){ return (lane==="platform" ? "platform_" : "engineering_") + (style==="formal" ? "formal" : "informal"); }
  function labConcept(){ return (lang==="zh")?"概念":(lang==="es")?"Concepto":"Concept"; }
  function labBuild(){ return (lang==="zh")?"现在建":(lang==="es")?"Construir ahora":"Build Now"; }
  function labRoadmap(){ return (lang==="zh")?"路线图":(lang==="es")?"Hoja de ruta":"Roadmap"; }
  function openLabel(){ return (lang==="zh")?"打开":(lang==="es")?"ABRIR":"OPEN"; }

  // Header copy
  var HEADER={
    en:{
      k:"EXPLORE · FRONTIER",
      t:"FRONTIER INDEX",
      s:"This is the wiring hub. Every frontier room you built is linked here. Open one row, take one next step.",
      r:"Rule: frontier must stay labeled. Concept stays concept until measurement exists."
    },
    zh:{
      k:"探索 · 前沿",
      t:"前沿索引",
      s:"这是接线枢纽。你建好的前沿房间都在这里链接。一次打开一行，走一个下一步。",
      r:"规则：前沿必须保持标签。没有测量，就只能是概念或路线图。"
    },
    es:{
      k:"EXPLORAR · FRONTERA",
      t:"ÍNDICE DE FRONTERA",
      s:"Este es el hub de cableado. Cada sala de frontera construida se enlaza aquí. Abre una fila y toma un siguiente paso.",
      r:"Regla: la frontera debe permanecer etiquetada. Concepto sigue siendo concepto hasta tener medición."
    }
  };

  function bandLabel(){
    if(lang==="zh") return "前沿房间（一次只开一个）";
    if(lang==="es") return "SALAS DE FRONTERA (una a la vez)";
    return "FRONTIER ROOMS (one open at a time)";
  }

  // Frontier rooms list (authoritative)
  var ROOMS = [
    {id:"vision",        c:"#c9a24a", href:"/explore/frontier/vision/",        t:P("Vision (Index)","愿景（索引）","Visión (índice)"),            s:P("All vision pages live here (labeled).","所有愿景页在这里（有标签）。","Aquí viven páginas de visión (etiquetadas).")},
    {id:"infrastructure",c:"#c9a24a", href:"/explore/frontier/infrastructure/",t:P("Infrastructure","基础设施","Infraestructura"),                s:P("Integration hub across frontier domains.","跨前沿领域的集成枢纽。","Hub de integración entre dominios.")},
    {id:"energy",        c:"#ff2b2b", href:"/explore/frontier/energy/",        t:P("Energy","能源","Energía"),                                     s:P("Industrial substitution pathways.","工业替代路径。","Vías de sustitución industrial.")},
    {id:"waste",         c:"#ff2b2b", href:"/explore/frontier/waste/",         t:P("Waste","废弃物","Residuos"),                                   s:P("Recovery-first routing.","回收优先路由。","Ruteo recovery-first.")},
    {id:"water",         c:"#c9a24a", href:"/explore/frontier/water/",         t:P("Water","水","Agua"),                                           s:P("Source → clean → store → verify → reuse.","取水→净化→储存→验证→复用。","Fuente→limpiar→almacenar→verificar→reusar.")},
    {id:"shimmer",       c:"#ff2b2b", href:"/explore/frontier/shimmer/",       t:P("SHIMMER","SHIMMER","SHIMMER"),                                  s:P("Entropy-routing spine.","熵路由主干。","Columna de ruteo entrópico.")},
    {id:"closedloop",    c:"#a3a3a3", href:"/explore/frontier/closed-loop/",   t:P("Closed-Loop","闭环","Ciclo cerrado"),                           s:P("No ‘away’. Inventory + routing + verification.","没有‘扔掉’：库存+路由+验证。","Sin ‘afuera’: inventario+ruteo+verificación.")},
    {id:"lattice",       c:"#c9a24a", href:"/explore/frontier/lattice/",       t:P("Lattice","晶格","Lattice"),                                     s:P("Finite mapping into enumerated states.","有限映射到可枚举状态。","Mapeo finito a estados enumerables.")},
    {id:"trajectory",    c:"#c9a24a", href:"/explore/frontier/trajectory/",    t:P("Trajectory","轨迹","Trayectoria"),                               s:P("Windowed evidence over time.","时间窗口证据。","Evidencia por ventanas.")},
    {id:"urban",         c:"#c9a24a", href:"/explore/frontier/urban/",         t:P("Urban","城市","Urbano"),                                       s:P("Multi-utility routing in one ledger.","一套账的多公用事业路由。","Ruteo multi-utility en un solo libro.")}
  ];

  // Row rendering
  var list=document.getElementById("list");

  function closeAllRows(){
    var rows=list.querySelectorAll(".row");
    for(var i=0;i<rows.length;i++){
      rows[i].classList.remove("open");
      var c=rows[i].querySelector(".chev");
      if(c) c.textContent="▸";
    }
  }

  function makeSubBubble(label, text){
    var b=document.createElement("div");
    b.className="bubble";
    b.setAttribute("role","button");
    b.tabIndex=0;

    var h=document.createElement("h4");
    h.textContent=label;

    var p=document.createElement("p");
    p.textContent=text;

    b.appendChild(h);
    b.appendChild(p);

    function act(){ b.classList.toggle("open"); }
    b.addEventListener("click", act, {passive:true});
    b.addEventListener("keydown", function(e){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); act(); }});
    return b;
  }

  function makeRow(item, idx){
    var row=document.createElement("div");
    row.className="row";
    row.style.setProperty("--c", item.c);

    var head=document.createElement("div");
    head.className="head";
    head.setAttribute("role","button");
    head.tabIndex=0;

    var left=document.createElement("div");
    left.className="left";

    var mark=document.createElement("div");
    mark.className="mark";
    mark.style.background=item.c;

    var tb=document.createElement("div");
    tb.className="titleBlock";

    var title=document.createElement("div");
    title.className="title";
    title.textContent=pick(item.t);

    var sub=document.createElement("div");
    sub.className="sub";
    sub.textContent=pick(item.s);

    tb.appendChild(title);
    tb.appendChild(sub);

    left.appendChild(mark);
    left.appendChild(tb);

    var chev=document.createElement("div");
    chev.className="chev";
    chev.textContent="▸";

    head.appendChild(left);
    head.appendChild(chev);

    var body=document.createElement("div");
    body.className="body";

    // Lens-specific intro (non-abstract)
    var intro=document.createElement("p");
    intro.className="pdesc";

    var lk=lensKey();
    var introText = (lk==="platform_informal") ? pick(P(
      "What this gives you: a clean route. Click once and land where the frontier work lives.",
      "你得到的是：干净的路由。点一次，落在该房间。",
      "Te da: una ruta limpia. Un clic y llegas a la sala."
    )) :
    (lk==="platform_formal") ? pick(P(
      "Routing posture: stable destination with state-carry. This index prevents frontier collapse into generic pages.",
      "路由姿态：稳定目的地+状态携带。本索引防止前沿坍缩到泛页。",
      "Postura de ruteo: destino estable con estado. Evita colapso de frontera a páginas genéricas."
    )) :
    (lk==="engineering_informal") ? pick(P(
      "Engineering view: what must be measured and contained before any scale claim is allowed.",
      "工程视图：在允许规模化主张前，必须测量与隔离什么。",
      "Vista de ingeniería: qué medir y contener antes de permitir cualquier afirmación de escala."
    )) :
    pick(P(
      "Engineering posture: interfaces, thresholds, containment, rollback. No escalation beyond measurement capability.",
      "工程姿态：接口、阈值、隔离、回滚。不得超出测量能力升级。",
      "Postura: interfaces, umbrales, contención, rollback. Sin escalación más allá de capacidad de medición."
    ));
    intro.textContent=introText;

    // Sub-bubbles (Concept/Build/Roadmap) are consistent + lens-aware
    var bubbles=document.createElement("div");
    bubbles.className="subBubbles";

    var conceptText = (lane==="platform")
      ? (lang==="zh" ? "概念：这是入口。先让人知道要点哪里、要看什么。"
         : lang==="es" ? "Concepto: esta es una entrada. Primero guía al usuario: qué tocar y qué ver."
         : "Concept: this is an entry. Guide the user: what to tap and what to see first.")
      : (lang==="zh" ? "概念：这是接口。先声明输入/输出与阈值，再谈扩张。"
         : lang==="es" ? "Concepto: esto es interfaz. Declara entradas/salidas y umbrales antes de escalar."
         : "Concept: this is interface. Declare inputs/outputs and thresholds before scaling.");

    var buildText = (lane==="platform")
      ? (lang==="zh" ? "现在建：确保路由存在、返回存在、状态携带存在。"
         : lang==="es" ? "Construir ahora: rutas, retorno y estado. Primero usable."
         : "Build now: routes, returns, and state carry. Usable first.")
      : (lang==="zh" ? "现在建：最小闭环：测量→原因码→隔离→回滚。"
         : lang==="es" ? "Construir ahora: bucle mínimo medir→razones→contener→rollback."
         : "Build now: minimum loop measure→reason codes→contain→rollback.");

    var roadText = (lang==="zh"
      ? "路线图：把壳变成系统：共享契约、共享窗口、共享审计输出。"
      : (lang==="es"
        ? "Hoja de ruta: convertir shells en sistema: contratos compartidos, ventanas compartidas, salidas auditables."
        : "Roadmap: turn shells into a system: shared contracts, shared windows, audit-ready outputs."));

    bubbles.appendChild(makeSubBubble(labConcept(), conceptText));
    bubbles.appendChild(makeSubBubble(labBuild(), buildText));
    bubbles.appendChild(makeSubBubble(labRoadmap(), roadText));

    // Actions
    var actions=document.createElement("div");
    actions.className="actions";

    var a=document.createElement("a");
    a.className="btn red";
    a.textContent = openLabel() + ": " + (lang==="zh" ? "进入房间" : (lang==="es" ? "Entrar" : "Enter"));
    a.setAttribute("data-route", item.href);
    actions.appendChild(a);

    body.appendChild(intro);
    body.appendChild(bubbles);
    body.appendChild(actions);

    function toggle(){
      var openNow = !row.classList.contains("open");
      closeAllRows();
      row.classList.toggle("open", openNow);
      chev.textContent = openNow ? "▾" : "▸";
      // Ensure any action link carries latest state
      wireAll();
    }

    head.addEventListener("click", toggle, {passive:true});
    head.addEventListener("keydown", function(e){
      if(e.key==="Enter"||e.key===" "){ e.preventDefault(); toggle(); }
    });

    row.appendChild(head);
    row.appendChild(body);

    if(idx===0){
      row.classList.add("open");
      chev.textContent="▾";
    }
    return row;
  }

  function render(){
    // Localize controls/dock labels (intro-tier)
    if(lang==="zh"){
      document.getElementById("btnExplore").textContent="探索";
      document.getElementById("btnDoor").textContent="门";
      document.getElementById("btnHome").textContent="主页";
      document.getElementById("dockExplore").textContent="探索";
      document.getElementById("dockProducts").textContent="产品";
      document.getElementById("dockLaws").textContent="法则";
      document.getElementById("dockGauges").textContent="量规";
      pillPlatform.textContent="平台";
      pillEngineering.textContent="工程";
      pillInformal.textContent="通俗";
      pillFormal.textContent="正式";
    }else if(lang==="es"){
      document.getElementById("btnExplore").textContent="EXPLORAR";
      document.getElementById("btnDoor").textContent="PUERTA";
      document.getElementById("btnHome").textContent="INICIO";
      document.getElementById("dockExplore").textContent="EXPLORAR";
      document.getElementById("dockProducts").textContent="PRODUCTOS";
      document.getElementById("dockLaws").textContent="LEYES";
      document.getElementById("dockGauges").textContent="MEDIDORES";
      pillPlatform.textContent="PLATAFORMA";
      pillEngineering.textContent="INGENIERÍA";
      pillInformal.textContent="INFORMAL";
      pillFormal.textContent="FORMAL";
    }else{
      document.getElementById("btnExplore").textContent="EXPLORE";
      document.getElementById("btnDoor").textContent="DOOR";
      document.getElementById("btnHome").textContent="HOME";
      document.getElementById("dockExplore").textContent="EXPLORE";
      document.getElementById("dockProducts").textContent="PRODUCTS";
      document.getElementById("dockLaws").textContent="LAWS";
      document.getElementById("dockGauges").textContent="GAUGES";
      pillPlatform.textContent="PLATFORM";
      pillEngineering.textContent="ENGINEERING";
      pillInformal.textContent="INFORMAL";
      pillFormal.textContent="FORMAL";
    }

    // Header
    var H=HEADER[lang] || HEADER.en;
    document.getElementById("hk").textContent=H.k;
    document.getElementById("ht").textContent=H.t;
    document.getElementById("hs").textContent=H.s;
    document.getElementById("rule").textContent=H.r;

    document.getElementById("band").textContent = bandLabel();

    paintPills();

    list.innerHTML="";
    for(var i=0;i<ROOMS.length;i++){
      list.appendChild(makeRow(ROOMS[i], i));
    }

    // Wire routes everywhere after render
    wireAll();
  }

  // Init
  render();
})();
</script>

</body>
</html>
