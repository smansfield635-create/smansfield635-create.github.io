     NEW STANDARD (THIS FILE):
       - Trilingual: EN / 中文 / ES
       - LENSES (VISIBLE ONLY):
           lane=platform|engineering (URL-only; NEVER stored)
         (Informal/formal is NOT user-visible in this layer.)
       - Pin this page to informal layer:
           gd_style = informal
           gd_depth = explore
       - Single-open accordion (tap same closes)
       - Switching LANG or LANE does NOT reload page
       - Switching LANG or LANE does NOT close the open row
       - Canon state carry: lang/style/time/depth via URL + LS gd_lang/gd_style/gd_time/gd_depth ONLY

       - Uses /assets/ui.css + /assets/branch.css + /assets/instruments.js
       - ui.css owns html/body background (NO overrides)
     ROUTES (SAFE SHELLS):
       - CLOSED LOOP → /explore/frontier/closed-loop/
       - ENERGY      → /explore/frontier/energy/

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>FRONTIER · Urban Resource OS</title>

<link rel="stylesheet" href="/assets/ui.css"/>
<link rel="stylesheet" href="/assets/branch.css"/>
<script defer src="/assets/instruments.js"></script>

<style>
a{color:inherit;text-decoration:none}
body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:#fff}
body::before,body::after{pointer-events:none!important}

:root{
  --dockH:132px;

  /* Red / Black / Gold hierarchy (avoid washed blue) */
  --stroke:rgba(255,255,255,.12);
  --stroke2:rgba(255,255,255,.10);

  --ink:rgba(255,255,255,.94);
  --txt:rgba(255,255,255,.92);
  --mut:rgba(255,255,255,.78);
  --mut2:rgba(255,255,255,.72);

  --crimson:rgba(120,0,22,.30);
  --festival:rgba(255,43,43,.14);
  --opalV:rgba(90,40,120,.10);

  --goldSoft:rgba(201,162,74,.18);

  --shadowA:0 24px 90px rgba(0,0,0,.58);
  --shadowB:0 16px 56px rgba(0,0,0,.62);
  --shadowC:0 18px 60px rgba(0,0,0,.55);
}

/* ===== Page wrap ===== */
.page{
  width:min(1120px,94vw);
  margin:0 auto;
  padding:104px 0 calc(var(--dockH) + 18px);
  display:flex;
  flex-direction:column;
  gap:12px;
  position:relative;
  z-index:10;
}

/* ===== Top controls (fixed) ===== */
.top{
  position:fixed;top:16px;left:0;right:0;
  padding:0 16px;
  display:flex;justify-content:space-between;align-items:center;
  gap:12px;
  z-index:240;
  pointer-events:none;
}
.top .left,.top .right{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  white-space:nowrap;
  align-items:center;
  pointer-events:auto;
}

/* Button (gold under-light only) */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:10px 12px;min-height:44px;border-radius:16px;
  border:1px solid rgba(255,255,255,.14);
  background:
    radial-gradient(circle at 50% 120%, rgba(201,162,74,.16), transparent 64%),
    linear-gradient(145deg, rgba(10,12,16,.78), rgba(6,8,10,.90));
  color:var(--ink);
  font-weight:950;font-size:14px;letter-spacing:.2px;
  -webkit-tap-highlight-color:transparent;
  position:relative;overflow:hidden;
  touch-action:manipulation;
  box-shadow:var(--shadowC);
}
.btn:active{transform:translateY(1px)}
.btn::after{
  content:"";
  position:absolute;left:10px;right:10px;bottom:-12px;height:28px;
  background: radial-gradient(circle at 50% 0%, rgba(201,162,74,.34), transparent 72%);
  opacity:.60;pointer-events:none;
}
.btn.red{border-color:rgba(255,43,43,.22); box-shadow:var(--shadowC), 0 0 18px rgba(255,43,43,.12);}

/* Segmented controls */
.seg{
  display:inline-flex;gap:0;overflow:hidden;border-radius:16px;
  border:1px solid rgba(255,255,255,.12);
  background: rgba(0,0,0,.16);
  box-shadow: var(--shadowC);
}
.seg button{
  appearance:none;border:0;background:transparent;color:var(--mut);
  padding:10px 12px;min-height:44px;font-weight:950;font-size:13px;
  letter-spacing:.25px;cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
.seg button[aria-pressed="true"]{
  color:var(--ink);
  background:
    radial-gradient(circle at 50% 120%, rgba(201,162,74,.22), transparent 62%),
    linear-gradient(180deg, rgba(255,43,43,.10), rgba(0,0,0,.10));
  box-shadow: inset 0 -10px 22px rgba(201,162,74,.16);
}

/* ===== Background context (behind content; not body) ===== */
.backdrop{
  position:absolute;
  left:50%;
  top:68px;
  transform:translateX(-50%);
  width:min(1180px,96vw);
  height:calc(100% - 108px);
  border-radius:34px;
  pointer-events:none;
  z-index:0;
  overflow:hidden;
}
.backdrop::before{
  content:"";
  position:absolute;inset:0;
  border:1px solid rgba(255,255,255,.08);
  border-radius:34px;
  background:
    radial-gradient(circle at 18% 20%, rgba(201,162,74,.10), transparent 60%),
    radial-gradient(circle at 78% 22%, rgba(255,43,43,.12), transparent 62%),
    radial-gradient(circle at 60% 90%, rgba(90,40,120,.10), transparent 64%),
    linear-gradient(160deg, rgba(0,0,0,.18), rgba(0,0,0,.08));
  box-shadow:
    0 70px 220px rgba(0,0,0,.62),
    inset 0 2px 0 rgba(255,255,255,.06),
    inset 0 -70px 140px rgba(0,0,0,.55);
  opacity:.92;
}
.backdrop::after{
  content:"";
  position:absolute;inset:-18%;
  background:
    radial-gradient(circle at 18% 34%, rgba(255,43,43,.18), transparent 44%),
    radial-gradient(circle at 84% 30%, rgba(255,43,43,.14), transparent 46%),
    radial-gradient(circle at 52% 78%, rgba(201,162,74,.12), transparent 48%),
    conic-gradient(from 12deg at 30% 28%,
      rgba(201,162,74,.14), transparent 12%,
      rgba(255,43,43,.12), transparent 24%,
      rgba(90,40,120,.10), transparent 38%,
      transparent 100%),
    conic-gradient(from 180deg at 70% 36%,
      rgba(255,43,43,.12), transparent 14%,
      rgba(201,162,74,.12), transparent 28%,
      rgba(90,40,120,.10), transparent 44%,
      transparent 100%),
    radial-gradient(circle at 50% 50%, rgba(255,255,255,.04), transparent 62%);
  filter:blur(1px);
  opacity:.72;
}

/* ===== Header ===== */
.header{
  position:relative;
  z-index:2;
  border:1px solid var(--stroke);
  border-radius:22px;
  background:
    radial-gradient(circle at 18% 22%, var(--crimson), transparent 72%),
    radial-gradient(circle at 82% 34%, var(--opalV), transparent 74%),
    radial-gradient(circle at 70% 92%, var(--festival), transparent 62%),
    radial-gradient(circle at 26% 22%, rgba(201,162,74,.14), transparent 62%),
    linear-gradient(160deg, rgba(0,0,0,.30), rgba(0,0,0,.14));
  backdrop-filter:blur(10px);
  box-shadow:var(--shadowA);
  padding:16px 16px 14px;
  overflow:hidden;
}
.header::before{
  content:"";
  position:absolute;inset:0;border-radius:22px;pointer-events:none;
  box-shadow: inset 0 0 0 1px rgba(201,162,74,.16);
  background:
    repeating-linear-gradient(45deg, rgba(201,162,74,.08) 0 1px, transparent 1px 16px),
    repeating-linear-gradient(-45deg, rgba(201,162,74,.06) 0 1px, transparent 1px 16px);
  opacity:.26;
  mask:
    radial-gradient(circle at 50% 50%, transparent 0 78%, #000 82% 100%),
    linear-gradient(#000,#000);
  -webkit-mask:
    radial-gradient(circle at 50% 50%, transparent 0 78%, #000 82% 100%),
    linear-gradient(#000,#000);
}
.k{margin:0 0 8px;font-size:12px;letter-spacing:4px;text-transform:uppercase;opacity:.80;color:rgba(255,255,255,.78)}
.t{margin:0;font-weight:980;font-size:30px;letter-spacing:.8px;line-height:1.08;color:var(--ink)}
.s{margin:12px 0 0;font-size:16px;opacity:.92;line-height:1.55;max-width:980px;color:var(--txt)}
.rule{
  margin-top:12px;
  padding:12px 12px;
  border-radius:18px;
  border:1px solid rgba(255,255,255,.10);
  background:
    radial-gradient(circle at 22% 18%, rgba(255,43,43,.10), transparent 58%),
    radial-gradient(circle at 82% 70%, rgba(201,162,74,.10), transparent 62%),
    linear-gradient(160deg, rgba(10,12,16,.55), rgba(6,8,10,.72));
  font-size:13.5px;
  color:rgba(255,255,255,.86);
  line-height:1.45;
}

/* Lens state pills */
.lensRow{
  margin-top:12px;
  display:flex;
  justify-content:space-between;
  gap:10px;
  flex-wrap:wrap;
  align-items:center;
}
.statePill{
  display:inline-flex;align-items:center;gap:8px;
  padding:10px 12px;border-radius:999px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(0,0,0,.16);
  color:rgba(255,255,255,.78);
  font-weight:950;
  box-shadow:0 14px 36px rgba(0,0,0,.55);
}

/* Band */
.band{
  position:relative;
  z-index:2;
  padding:10px 12px;
  border-radius:18px;
  border:1px solid var(--stroke2);
  background:rgba(0,0,0,.14);
  font-weight:950;
  letter-spacing:.2px;
  color:rgba(255,255,255,.88);
}

/* Accordion rows */
.list{position:relative;z-index:2;display:flex;flex-direction:column;gap:12px}
.row{
  border:1px solid rgba(255,255,255,.10);
  border-radius:22px;
  background:
    radial-gradient(circle at 22% 18%, rgba(255,43,43,.10), transparent 58%),
    radial-gradient(circle at 82% 30%, rgba(90,40,120,.10), transparent 62%),
    linear-gradient(145deg, rgba(17,22,28,.86), rgba(11,15,20,.94));
  box-shadow:var(--shadowB);
  overflow:hidden;
  position:relative;
}
.row::before{
  content:"";
  position:absolute;inset:0;border-radius:22px;pointer-events:none;
  box-shadow: inset 0 0 0 1px rgba(201,162,74,.12);
  opacity:.60;
}
.head{
  display:flex;align-items:flex-start;justify-content:space-between;
  gap:10px;
  padding:16px 16px;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
.hL{display:flex;gap:12px;align-items:flex-start;min-width:0}
.dmark{
  width:10px;height:10px;border-radius:3px;
  transform:rotate(45deg);
  background:var(--c, rgba(201,162,74,.45));
  box-shadow:0 0 0 1px rgba(255,255,255,.14), 0 0 14px rgba(0,0,0,.35);
  flex:0 0 auto;margin-top:4px;
}
.titleBlock{min-width:0}
.q{
  font-weight:980;letter-spacing:.2px;font-size:18px;color:var(--ink);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.sub{
  margin-top:8px;font-size:13.75px;opacity:.88;line-height:1.42;
  color:rgba(255,255,255,.86);max-width:92ch;
}
.chev{
  width:36px;height:36px;border-radius:14px;
  border:1px solid rgba(255,255,255,.14);
  background: rgba(0,0,0,.16);
  display:flex;align-items:center;justify-content:center;
  color:rgba(255,255,255,.78);
  font-weight:950;
  position:relative;overflow:hidden;
  flex:0 0 auto;margin-top:2px;
}
.chev::after{
  content:"";
  position:absolute;left:6px;right:6px;bottom:-10px;height:22px;
  background: radial-gradient(circle at 50% 0%, rgba(201,162,74,.30), transparent 70%);
  opacity:.62;pointer-events:none;
}
.body{
  display:none;
  padding:16px 16px 16px;
  border-top:1px solid rgba(255,255,255,.08);
  background:
    radial-gradient(circle at 30% 30%, rgba(255,255,255,.06), transparent 55%),
    linear-gradient(145deg, rgba(10,12,16,.86), rgba(6,8,10,.94));
}
.row.open .body{display:block}
.row.open{border-color:rgba(255,43,43,.22); box-shadow:var(--shadowB), 0 0 18px rgba(255,43,43,.10);}

.pdesc{margin:0;color:rgba(255,255,255,.90);line-height:1.65;font-size:15px}
.pdesc + .pdesc{margin-top:10px}

.subBubbles{margin-top:12px;display:flex;flex-direction:column;gap:10px}
.bubble{
  border:1px solid rgba(255,255,255,.10);
  border-radius:18px;
  background:
    radial-gradient(circle at 22% 18%, rgba(255,43,43,.08), transparent 60%),
    radial-gradient(circle at 82% 70%, rgba(201,162,74,.08), transparent 62%),
    rgba(0,0,0,.12);
  padding:14px 14px 12px;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
  position:relative;
  overflow:hidden;
}
.bubble::after{
  content:"";
  position:absolute;left:10px;right:10px;bottom:-14px;height:30px;
  background: radial-gradient(circle at 50% 0%, rgba(201,162,74,.22), transparent 72%);
  opacity:.50;pointer-events:none;
}
.bubble h4{margin:0 0 8px;font-weight:980;letter-spacing:.15px;font-size:15px;color:var(--ink)}
.bubble p{margin:0;color:rgba(255,255,255,.80);line-height:1.7;display:none;font-size:14.5px}
.bubble.open p{display:block}

.actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end;margin-top:14px}

/* Dock */
.dock{
  position:fixed;
  left:50%;
  bottom:max(10px, env(safe-area-inset-bottom));
  transform:translateX(-50%);
  z-index:220;
  width:min(980px,94vw);
  padding:10px 12px;
  border-radius:22px;
  border:1px solid rgba(255,255,255,.12);
  background:
    radial-gradient(circle at 18% 18%, rgba(255,43,43,.10), transparent 62%),
    radial-gradient(circle at 82% 70%, rgba(90,40,120,.10), transparent 64%),
    linear-gradient(145deg, rgba(10,12,16,.72), rgba(6,8,10,.86));
  backdrop-filter:blur(10px);
  box-shadow:0 18px 60px rgba(0,0,0,.55);
  display:grid;
  grid-template-columns:repeat(4, minmax(0,1fr));
  gap:10px;
}
.dock .btn{width:100%;padding:10px 10px;border-radius:999px;white-space:nowrap}
@media (max-width:520px){
  :root{--dockH:132px}
  .dock{grid-template-columns:repeat(2, minmax(0,1fr))}
}
</style>
</head>

<body>

<div class="top" aria-label="Top controls">
  <div class="left">
    <a class="btn" id="btnFrontier" data-route="/explore/frontier/" href="/explore/frontier/">FRONTIER</a>
    <a class="btn" id="btnExplore" data-route="/explore/" href="/explore/">EXPLORE</a>
    <a class="btn" id="btnHome" data-route="/home/" href="/home/">HOME</a>
  </div>
  <div class="right" aria-label="Controls">
    <div class="seg" role="group" aria-label="Language">
      <button type="button" id="langEN" aria-pressed="true">EN</button>
      <button type="button" id="langZH" aria-pressed="false">中文</button>
      <button type="button" id="langES" aria-pressed="false">ES</button>
    </div>
    <div class="seg" role="group" aria-label="Lane">
      <button type="button" id="lanePlatform" aria-pressed="true">PLATFORM</button>
      <button type="button" id="laneEngineering" aria-pressed="false">ENGINEERING</button>
    </div>
  </div>
</div>

<div class="page">
  <div class="backdrop" aria-hidden="true"></div>

  <div class="header" aria-label="Urban OS header">
    <p class="k" id="hk">FRONTIER · URBAN OS</p>
    <h1 class="t" id="ht">URBAN RESOURCE OS</h1>
    <p class="s" id="hs"></p>
    <div class="rule" id="rule"></div>

    <div class="lensRow" aria-label="Lens state">
      <div class="statePill" id="laneState">—</div>
      <div class="statePill" id="langState">—</div>
    </div>
  </div>

  <div class="band" id="band">CITY AS A ROUTED INVENTORY</div>
  <div class="list" id="list"></div>
</div>

<nav class="dock" aria-label="Bottom navigation">
  <a class="btn" id="navClosed" data-route="/explore/frontier/closed-loop/" href="/explore/frontier/closed-loop/">CLOSED LOOP</a>
  <a class="btn" id="navEnergy" data-route="/explore/frontier/energy/" href="/explore/frontier/energy/">ENERGY</a>
  <a class="btn" id="navWater" data-route="/explore/frontier/water/" href="/explore/frontier/water/">WATER</a>
  <a class="btn" id="navWaste" data-route="/explore/frontier/waste/" href="/explore/frontier/waste/">WASTE</a>
</nav>

<script>
(function(){
  "use strict";

  // ===== Canon state (gd_* only; no new keys) =====
  var qs=new URLSearchParams(location.search);
  var LS=window.localStorage;

  var lang  = qs.get("lang")  || LS.getItem("gd_lang")  || "en";
  var time  = qs.get("time")  || LS.getItem("gd_time")  || "now";
  var lane  = qs.get("lane")  || "platform"; // URL-only

  // Pin informal layer
  var style = "informal";
  var depth = "explore";

  if(lang!=="en" && lang!=="zh" && lang!=="es") lang="en";
  if(time==="trajectory") time="post";
  if(time!=="origin" && time!=="now" && time!=="post") time="now";
  if(lane!=="platform" && lane!=="engineering") lane="platform";

  try{
    LS.setItem("gd_lang",lang);
    LS.setItem("gd_style","informal");
    LS.setItem("gd_time",time);
    LS.setItem("gd_depth","explore");
  }catch(e){}

  document.documentElement.lang=(lang==="zh")?"zh":(lang==="es")?"es":"en";

  function q(over){
    var p=new URLSearchParams();
    p.set("lang",(over&&over.lang)?over.lang:lang);
    p.set("style","informal");
    p.set("time",(over&&over.time)?over.time:time);
    p.set("depth","explore");
    var L=(over&&over.lane)?over.lane:lane;
    if(L==="platform"||L==="engineering") p.set("lane",L);
    return "?"+p.toString();
  }

  function setPressed(ids, activeId){
    for(var i=0;i<ids.length;i++){
      var el=document.getElementById(ids[i]);
      if(!el) continue;
      el.setAttribute("aria-pressed", ids[i]===activeId ? "true" : "false");
    }
  }

  function pick3(en,zh,es){ return (lang==="zh")?zh:(lang==="es")?es:en; }
  function laneLabel(){
    return (lang==="zh") ? (lane==="engineering"?"工程":"平台")
      : (lang==="es") ? (lane==="engineering"?"INGENIERÍA":"PLATAFORMA")
      : (lane==="engineering"?"ENGINEERING":"PLATFORM");
  }
  function openLabel(){ return (lang==="zh")?"打开":(lang==="es")?"ABRIR":"OPEN"; }
  function labConcept(){ return (lang==="zh")?"概念":(lang==="es")?"Concepto":"Concept"; }
  function labBuild(){ return (lang==="zh")?"现在建":(lang==="es")?"Construir ahora":"Build Now"; }
  function labRoadmap(){ return (lang==="zh")?"路线图":(lang==="es")?"Hoja de ruta":"Roadmap"; }

  // Wire all internal links with pinned state (and lane)
  function wireAll(){
    var nodes=document.querySelectorAll("[data-route]");
    for(var i=0;i<nodes.length;i++){
      var el=nodes[i];
      var route=el.getAttribute("data-route")||"";
      if(!route) continue;

      if(route.indexOf("?")!==-1){
        try{
          var u=new URL(route, location.origin);
          var sp=u.searchParams;
          sp.set("lang", lang);
          sp.set("style","informal");
          sp.set("time", time);
          sp.set("depth","explore");
          sp.set("lane", lane);
          el.setAttribute("href", u.pathname + "?" + sp.toString() + (u.hash||""));
        }catch(e){
          el.setAttribute("href", route);
        }
      }else{
        el.setAttribute("href", route + q());
      }
    }
  }

  // ===== Header copy (lane-aware; no tone) =====
  var HEAD={
    en:{
      platform:{
        hs:"A city is not a pile of services. It’s a living inventory: water, materials, energy, heat, and waste — moving every hour. The OS is the map that stops leaks from hiding.",
        rule:"Rule: treat the city as one routed machine. Every stream gets a label, a route, and a measurable outcome."
      },
      engineering:{
        hs:"Engineering view: the city is a coupled routing system. Shifting one lever shifts load elsewhere. Stability requires explicit interfaces, segmentation, and windowed verification across lanes.",
        rule:"Rule: no cross-lane coupling without receipts. Correlated exposure is the primary failure amplifier at scale."
      }
    },
    zh:{
      platform:{
        hs:"城市不是一堆服务，而是活的库存：水、材料、能量、热、废弃物——每小时都在流动。Urban OS 是让泄漏无法隐藏的地图。",
        rule:"规则：把城市当作一台路由机器。每条流都有标签、路由与可测结果。"
      },
      engineering:{
        hs:"工程视图：城市是耦合路由系统。动一个杠杆，负载就转移。稳定性要求显式接口、分段隔离与跨车道窗口验证。",
        rule:"规则：无收据不得跨车道耦合。相关暴露是规模下的主要失效放大器。"
      }
    },
    es:{
      platform:{
        hs:"Una ciudad no es un montón de servicios. Es un inventario vivo: agua, materiales, energía, calor y residuos — moviéndose cada hora. El OS es el mapa que impide que las fugas se escondan.",
        rule:"Regla: tratar la ciudad como una máquina de ruteo. Cada flujo tiene etiqueta, ruta y resultado medible."
      },
      engineering:{
        hs:"Vista de ingeniería: la ciudad es un sistema de ruteo acoplado. Mover una palanca desplaza carga a otro carril. La estabilidad exige interfaces explícitas, segmentación y verificación por ventanas.",
        rule:"Regla: sin recibos no hay acoplamiento entre carriles. Exposición correlacionada amplifica fallas al escalar."
      }
    }
  };

  // ===== Sections (dense, legible, lane-aware) =====
  var SECTIONS=[
    {
      c:"#ff2b2b",
      t:{en:"THE PROBLEM WE ACTUALLY HAVE", zh:"我们真正的问题", es:"EL PROBLEMA REAL"},
      s:{en:"‘Away’ is an illusion. Costs don’t disappear.", zh:"“扔掉”是幻觉，成本不会消失。", es:"‘Afuera’ es una ilusión: los costos no desaparecen."},
      platform:{
        intro:{
          en:"Landfills, wastewater, and grid stress look separate because they sit in separate departments. But the city is one coupled machine. Blind routing is the root failure.",

          zh:"概念：别把废/水/能当作三个“问题”。把它们当作一套库存流与路由。",

          zh:"路线图：把跨车道耦合显式化（压力如何转移），再加入测量窗口与决策原因码。",
          es:"Hoja de ruta: hacer explícito el acoplamiento (dónde se mueve la presión), luego ventanas de medición y códigos de razón."
        }
      },
      engineering:{
        intro:{
          en:"Urban fragility is dominated by hidden coupling and correlated exposure across infrastructure lanes. ‘Away’ acts as an unaccounted sink that masks loss and externalizes risk.",
          zh:"城市脆弱性由隐藏耦合与跨车道相关暴露主导。“扔掉”是未核算汇点：掩盖损耗、外部化风险。",
          es:"La fragilidad urbana está dominada por acoplamientos ocultos y exposición correlacionada entre carriles. ‘Afuera’ es un sumidero no contabilizado."
        },
        concept:{
          en:"Concept: model the city as routed inventories under conservation + constraint: measure → route → convert → retain, with explicit thresholds.",

        roadmap:{
          en:"Roadmap: routing matrix optimization under constraints (value + stability + carbon), contamination barriers, and cascade containment proofs.",
          zh:"路线图：在约束下优化路由矩阵（价值+稳定+碳），建立污染隔离与级联隔离证明。",
          es:"Hoja de ruta: optimizar matriz de ruteo bajo restricciones (valor + estabilidad + carbono), barreras de contaminación y pruebas de contención de cascadas."
        }
      }
    },

    {
      c:"#c9a24a",
      t:{en:"THE OS CONTRACT", zh:"OS 契约", es:"CONTRATO DEL OS"},
      s:{en:"It doesn’t ‘solve by speech’. It routes by measurement.", zh:"不靠口号“解决”，靠测量路由。", es:"No ‘soluciona con discurso’; rutea con medición."},
      platform:{
        intro:{
          en:"The OS is not another dashboard. It’s a contract: every stream gets measured, every decision gets a reason code, and every upgrade needs receipts.",
          zh:"OS 不是另一个仪表盘，而是一份契约：每条流都要测量，每次决策都有原因码，每次升级都要收据。",

        roadmap:{

          zh:"路线图：加入阈值、验证窗口与导出。当测量变硬后升级到量规与产品。",

          es:"Construir ahora: instrumentar entrada, definir pureza, ligar conversión a envolventes y publicar rendimientos/pérdidas por ventana."
        },
        roadmap:{

          zh:"路线图：相关暴露监测、分段完整性检查、城市尺度确定性回滚纪律。",
          es:"Hoja de ruta: monitoreo de exposición correlacionada, integridad de segmentación y disciplina determinista de rollback a escala ciudad."
        }
      }
    },

    {

      t:{en:"THE SHIMMER ROUTING SPINE", zh:"SHIMMER 路由脊柱", es:"COLUMNA DE RUTEO SHIMMER"},
      s:{en:"Classify → Segment → Route → Convert → Retain.", zh:"分类→分段→路由→转化→保留。", es:"Clasificar → Segmentar → Rutear → Convertir → Retener."},
      platform:{
        intro:{
          en:"The ‘one move’ that keeps showing up is simple: don’t burn the pile. Sort it, route it, transform it. Same steps, better modules.",
          zh:"反复出现的“同一动作”很简单：别把堆烧了。分类、路由、转化。步骤不变，模块更强。",
          es:"El ‘movimiento único’ es simple: no quemes la pila. Clasifica, rutea y transforma. Mismos pasos, mejores módulos."
        },
        concept:{
          en:"Concept: the spine makes scaling predictable. You copy structure, not stories.",
          zh:"概念：脊柱让扩张可预测。复制结构，不复制故事。",
          es:"Concepto: la columna vuelve el escalado predecible. Copias estructura, no historias."
        },
        build:{
          en:"Build now: connect lane pages (Water/Waste/Energy) as one routed inventory story. Keep jumps clean and stateful.",
          zh:"现在建：把水/废/能页面连接成“一套路由库存故事”。跳转要干净且保状态。",
          es:"Construir ahora: conectar Agua/Residuos/Energía como historia de inventario ruteado. Saltos limpios y con estado."
        },
        roadmap:{
          en:"Roadmap: add receipts and measurement so shells graduate into deployable product surfaces.",
          zh:"路线图：加入收据与测量，让壳升级成可部署产品面。",
          es:"Hoja de ruta: añadir recibos y medición para graduar shells a superficies desplegables."
        }
      },
      engineering:{
        intro:{

          zh:"定义进料向量与模块集合；在时间窗口内按约束计算路由（守恒、污染、吞吐、合规）。",
          es:"Definir vectores de alimentación y módulos; calcular ruteo por ventana bajo restricciones (conservación, contaminación, throughput, cumplimiento)."
        },
        concept:{
          en:"Concept: publish routing fractions, conversion yields, carbon diversion, and energy equivalents as receipts to prevent drift.",
          zh:"概念：发布路由分配、转化产率、碳分流、能量等价作为收据以防漂移。",
          es:"Concepto: publicar fracciones de ruteo, rendimientos, desvío de carbono y equivalentes energéticos como recibos para evitar deriva."
        },
        build:{
          en:"Build now: minimum loop = classify → segment → route → convert → verify. If verification is missing, scale is blocked.",
          zh:"现在建：最小闭环=分类→分段→路由→转化→验证。缺验证则禁止扩张。",
          es:"Construir ahora: bucle mínimo = clasificar → segmentar → rutear → convertir → verificar. Sin verificación se bloquea escala."
        },
        roadmap:{
          en:"Roadmap: integrate Dot.Grid + Registry + Gauges to expose coupling, publish stability bands, and enforce containment/rollback.",
          zh:"路线图：整合 Dot.Grid + Registry + Gauges 暴露耦合、发布稳定带，并执行隔离/回滚。",

        }
      }
    },

    {

      t:{en:"WHY THIS REACHES ORBIT", zh:"为什么这能走向轨道", es:"POR QUÉ ESTO LLEGA A ÓRBITA"},
      s:{en:"Cities are the proving ground for habitats.", zh:"城市是栖息地的验证场。", es:"Las ciudades son el campo de prueba para hábitats."},
      platform:{
        intro:{
          en:"A habitat is a city with no forgiveness. If you can close loops in a city—under politics, markets, and human error—you’re training the same muscles needed for orbit.",
          zh:"栖息地是“没有宽容的城市”。如果你能在城市里闭环——在政治、市场、人为错误下——你就在训练轨道所需的同一套肌肉。",
          es:"Un hábitat es una ciudad sin perdón. Si puedes cerrar ciclos en una ciudad—con política, mercados y error humano—entrenas los mismos músculos que necesitas para órbita."
        },
        concept:{
          en:"Concept: the future tech is discipline: measure, route, retain, repeat.",
          zh:"概念：未来科技是纪律：测量、路由、保留、重复。",
          es:"Concepto: la tecnología futura real es disciplina: medir, rutear, retener, repetir."
        },
        build:{
          en:"Build now: make closure readable (simple scoreboards) and route people to Water/Energy/Waste without losing state.",
          zh:"现在建：让闭合可读（简记分牌），并在不丢状态下路由到水/能/废。",
          es:"Construir ahora: hacer el cierre legible (tableros simples) y rutear a Agua/Energía/Residuos sin perder estado."
        },
        roadmap:{
          en:"Roadmap: expand from one district to many; keep failure local; keep receipts comparable across time.",
          zh:"路线图：从单区扩到多区；失败局部化；收据跨时间可比。",
          es:"Hoja de ruta: expandir de un distrito a muchos; mantener fallos locales; recibos comparables en el tiempo."
        }
      },
      engineering:{
        intro:{
          en:"Habitat constraints are an extreme case of urban closure: bounded resupply, strict contamination limits, and coupled failure modes. Urban deployments provide scalable evidence for closure accounting and routing stability.",
          zh:"栖息地约束是城市闭环的极限情况：补给受限、污染限制严格、故障耦合。城市部署为闭合核算与路由稳定提供可规模证据。",
          es:"Las restricciones de hábitat son el caso extremo del cierre urbano: reabastecimiento acotado, límites estrictos de contaminación y fallos acoplados. Despliegues urbanos aportan evidencia escalable."
        },
        concept:{
          en:"Concept: validate baselines, module yields, contamination barriers, and recovery playbooks. Quantify loss rates and time-to-instability.",
          zh:"概念：验证基线、模块产率、污染隔离与恢复剧本；量化损耗率与到不稳定的时间。",
          es:"Concepto: validar baselines, rendimientos, barreras de contaminación y playbooks de recuperación. Cuantificar pérdidas y tiempo a inestabilidad."
        },
        build:{
          en:"Build now: windowed stress tests + audit exports. Only after stability under perturbation do you increase autonomy and reduce resupply dependence.",

          es:"Construir ahora: pruebas por ventanas + exports de auditoría. Solo tras estabilidad bajo perturbación se aumenta autonomía y se reduce dependencia."
        },
        roadmap:{
          en:"Roadmap: phased escalation: terrestrial → remote → orbital, with explicit prerequisites and no claim inflation.",
          zh:"路线图：阶段升级：地面→偏远→轨道，前置条件明确，禁止主张膨胀。",
          es:"Hoja de ruta: escalación por fases: Tierra → remoto → órbita, con prerrequisitos explícitos y sin inflación de afirmaciones."
        }
      }
    }
  ];

  // ===== Accordion state preserved across lane/lang changes =====
  var list=document.getElementById("list");
  var rowRefs=[];
  var openIndex=0;

  function closeAllRows(){
    for(var i=0;i<rowRefs.length;i++){
      rowRefs[i].row.classList.remove("open");
      rowRefs[i].chev.textContent="▸";
    }
  }

  function toggleRow(i){
    var isOpen=rowRefs[i].row.classList.contains("open");
    if(isOpen){
      rowRefs[i].row.classList.remove("open");
      rowRefs[i].chev.textContent="▸";
      return;
    }
    closeAllRows();
    openIndex=i;
    rowRefs[i].row.classList.add("open");
    rowRefs[i].chev.textContent="▾";
  }

  function makeSubBubble(label){
    var b=document.createElement("div");
    b.className="bubble";
    b.setAttribute("role","button");
    b.tabIndex=0;

    var h=document.createElement("h4");
    h.textContent=label;

    var p=document.createElement("p");
    p.textContent="";

    b.appendChild(h);
    b.appendChild(p);

    function act(){ b.classList.toggle("open"); }
    b.addEventListener("click", act, {passive:true});
    b.addEventListener("keydown", function(e){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); act(); }});

    return {wrap:b, p:p};
  }

  function buildRow(item, idx){
    var row=document.createElement("div");
    row.className="row";
    row.style.setProperty("--c", item.c);

    var head=document.createElement("div");
    head.className="head";
    head.setAttribute("role","button");
    head.tabIndex=0;

    var hL=document.createElement("div");
    hL.className="hL";

    var mark=document.createElement("div");
    mark.className="dmark";
    mark.style.background=item.c;

    var tb=document.createElement("div");
    tb.className="titleBlock";

    var title=document.createElement("div");
    title.className="q";

    var sub=document.createElement("div");
    sub.className="sub";

    tb.appendChild(title);
    tb.appendChild(sub);

    hL.appendChild(mark);
    hL.appendChild(tb);

    var chev=document.createElement("div");
    chev.className="chev";
    chev.innerHTML='<span class="chevTxt">▸</span>';

    head.appendChild(hL);
    head.appendChild(chev);

    var body=document.createElement("div");
    body.className="body";

    var intro=document.createElement("p");
    intro.className="pdesc";
    body.appendChild(intro);

    var bubbles=document.createElement("div");
    bubbles.className="subBubbles";

    var b1=makeSubBubble(labConcept());
    var b2=makeSubBubble(labBuild());
    var b3=makeSubBubble(labRoadmap());

    bubbles.appendChild(b1.wrap);
    bubbles.appendChild(b2.wrap);
    bubbles.appendChild(b3.wrap);
    body.appendChild(bubbles);

    var actions=document.createElement("div");
    actions.className="actions";

    var j1=document.createElement("a");
    j1.className="btn";
    j1.setAttribute("data-route","/explore/frontier/closed-loop/");
    actions.appendChild(j1);

    var j2=document.createElement("a");
    j2.className="btn";
    j2.setAttribute("data-route","/laws/");
    actions.appendChild(j2);

    var j3=document.createElement("a");
    j3.className="btn red";
    j3.setAttribute("data-route","/gauges/");
    actions.appendChild(j3);

    body.appendChild(actions);

    function onToggle(){ toggleRow(idx); wireAll(); }
    head.addEventListener("click", onToggle, {passive:true});
    head.addEventListener("keydown", function(e){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); onToggle(); }});

    row.appendChild(head);
    row.appendChild(body);
    list.appendChild(row);

    rowRefs.push({
      row:row,
      chev:row.querySelector(".chevTxt"),
      title:title,
      sub:sub,
      intro:intro,
      b1p:b1.p, b2p:b2.p, b3p:b3.p,
      j1:j1,j2:j2,j3:j3
    });
  }

  function renderList(){
    list.innerHTML="";
    rowRefs=[];
    for(var i=0;i<SECTIONS.length;i++){
      buildRow(SECTIONS[i], i);
    }
    openIndex=0;
    toggleRow(0);
  }

  function applyHeader(){
    var H=(HEAD[lang]||HEAD.en);
    var lanePack = (lane==="engineering") ? H.engineering : H.platform;

    document.getElementById("hk").textContent = pick3("FRONTIER · URBAN OS","前沿 · 城市OS","FRONTERA · SO URBANO");
    document.getElementById("ht").textContent = pick3("URBAN RESOURCE OS","城市资源操作系统","SO DE RECURSOS URBANOS");
    document.getElementById("hs").textContent = lanePack.hs;
    document.getElementById("rule").textContent = lanePack.rule;

    document.getElementById("band").textContent =
      pick3("CITY AS A ROUTED INVENTORY","城市 = 路由库存","CIUDAD = INVENTARIO RUTEADO");

    document.getElementById("btnFrontier").textContent = pick3("FRONTIER","前沿","FRONTERA");
    document.getElementById("btnExplore").textContent  = pick3("EXPLORE","探索","EXPLORAR");
    document.getElementById("btnHome").textContent     = pick3("HOME","主页","INICIO");

    document.getElementById("navClosed").textContent = pick3("CLOSED LOOP","闭环","CICLO CERRADO");
    document.getElementById("navEnergy").textContent = pick3("ENERGY","能源","ENERGÍA");
    document.getElementById("navWater").textContent  = pick3("WATER","水","AGUA");
    document.getElementById("navWaste").textContent  = pick3("WASTE","废弃物","RESIDUOS");

    document.getElementById("lanePlatform").textContent   = pick3("PLATFORM","平台","PLATAFORMA");
    document.getElementById("laneEngineering").textContent= pick3("ENGINEERING","工程","INGENIERÍA");

    document.getElementById("laneState").textContent =
      (lang==="zh") ? ("当前透镜："+laneLabel()) :
      (lang==="es") ? ("Lente actual: "+laneLabel()) :
      ("Current lens: "+laneLabel());

    document.getElementById("langState").textContent =
      (lang==="zh") ? ("语言：中文") :
      (lang==="es") ? ("Idioma: ES") :
      ("Lang: EN");

    setPressed(["langEN","langZH","langES"], lang==="zh"?"langZH":(lang==="es"?"langES":"langEN"));
    setPressed(["lanePlatform","laneEngineering"], lane==="engineering"?"laneEngineering":"lanePlatform");
  }

  function updateRows(){
    var keep=openIndex;

    for(var i=0;i<SECTIONS.length;i++){
      var item=SECTIONS[i];
      var r=rowRefs[i];

      r.title.textContent = (lang==="zh")?item.t.zh:(lang==="es")?(item.t.es||item.t.en):item.t.en;
      r.sub.textContent   = (lang==="zh")?item.s.zh:(lang==="es")?(item.s.es||item.s.en):item.s.en;

      var pack = (lane==="engineering") ? item.engineering : item.platform;

      r.intro.textContent = (lang==="zh")?pack.intro.zh:(lang==="es")?(pack.intro.es||pack.intro.en):pack.intro.en;
      r.b1p.textContent   = (lang==="zh")?pack.concept.zh:(lang==="es")?(pack.concept.es||pack.concept.en):pack.concept.en;
      r.b2p.textContent   = (lang==="zh")?pack.build.zh:(lang==="es")?(pack.build.es||pack.build.en):pack.build.en;
      r.b3p.textContent   = (lang==="zh")?pack.roadmap.zh:(lang==="es")?(pack.roadmap.es||pack.roadmap.en):pack.roadmap.en;

      r.j1.textContent = openLabel()+": "+pick3("CLOSED LOOP","闭环","CICLO CERRADO");
      r.j2.textContent = openLabel()+": "+pick3("LAWS","法则","LEYES");
      r.j3.textContent = openLabel()+": "+pick3("GAUGES","量规","MEDIDORES");
    }

    closeAllRows();
    toggleRow(keep);
    wireAll();
  }

  // ===== No reload on language/lane changes =====
  function setLang(next){
    if(next!=="en" && next!=="zh" && next!=="es") next="en";
    lang=next;
    try{ LS.setItem("gd_lang",lang);}catch(e){}
    history.replaceState({}, "", location.pathname + q({lang:lang}));
    applyHeader();
    updateRows();
  }

  function setLane(next){
    if(next!=="platform" && next!=="engineering") next="platform";
    lane=next;
    history.replaceState({}, "", location.pathname + q({lane:lane}));
    applyHeader();
    updateRows();
  }

  document.getElementById("langEN").addEventListener("click", function(){ setLang("en"); }, {passive:true});
  document.getElementById("langZH").addEventListener("click", function(){ setLang("zh"); }, {passive:true});
  document.getElementById("langES").addEventListener("click", function(){ setLang("es"); }, {passive:true});

  document.getElementById("lanePlatform").addEventListener("click", function(){ setLane("platform"); }, {passive:true});
  document.getElementById("laneEngineering").addEventListener("click", function(){ setLane("engineering"); }, {passive:true});

  // ===== INIT =====
  renderList();
  applyHeader();
  updateRows();
  wireAll();
})();
</script>

</body>
</html>
