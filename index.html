       - Dragons are NOT vines: head + segmented body + scales + claws + spine + tail taper
       - Two dragons:
           TOP: always classical Chinese sayings (gold glow)
           BOTTOM: language-matched sayings (EN/中文/ES) (gold glow)
         Text changes each full pass (animation iteration).
       - Clouds move opposite direction; never cover CORE.
       - Moon: single moon with crater texture + glow; phase advances by time (no new storage keys)

       - Trilingual EN/中文/ES (NO reload)

       - No overlays/modals; no inline onclick; addEventListener only
       - ui.css owns html/body background (NO overrides)

     ROUTES:

       - Unbuilt/duplicate href → /404.html

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Compass · DiamondGateBridge</title>

<link rel="stylesheet" href="/assets/ui.css"/>
<link rel="stylesheet" href="/assets/branch.css"/>
<script defer src="/assets/instruments.js"></script>

<style>
a{color:inherit;text-decoration:none}
body{margin:0}
body::before,body::after{pointer-events:none!important}

:root{
  /* ===== GEOMETRY ===== */
  --D0:210px;  /* CORE */
  --D1:150px;  /* Cardinals */
  --D2:112px;  /* Diagonals */
  --D3:86px;   /* Outer 8 */

  --R1:168px;
  --R2:246px;
  --R3:314px;

  --padTop:106px;
  --dockH:82px;

  /* ===== MATERIAL ===== */
  --ink:rgba(255,255,255,.94);
  --mut:rgba(255,255,255,.78);

  --onyx0:rgba(6,8,10,.96);
  --onyx1:rgba(10,12,16,.88);

  --crimson:rgba(120,0,22,.40);
  --festival:rgba(255,43,43,.22);
  --opalV:rgba(90,40,120,.14);

  --gold:rgba(201,162,74,.58);
  --goldGlow:rgba(201,162,74,.22);

  --shadowDeep:0 44px 140px rgba(0,0,0,.82);
  --shadowA:0 28px 110px rgba(0,0,0,.70);
  --shadowB:0 18px 60px rgba(0,0,0,.55);
}

/* ===== TOP BAR ===== */
.top{
  position:fixed;top:14px;left:0;right:0;
  padding:0 14px;
  z-index:260;
  pointer-events:none;
}
.topbar{
  pointer-events:auto;
  width:min(1120px,96vw);
  margin:0 auto;
  border:1px solid rgba(255,255,255,.12);
  border-radius:22px;
  padding:10px 12px;
  background:
    radial-gradient(circle at 18% 18%, rgba(201,162,74,.08), transparent 62%),
    radial-gradient(circle at 82% 30%, rgba(255,43,43,.08), transparent 64%),
    linear-gradient(145deg, rgba(12,14,18,.62), rgba(6,8,12,.78));
  box-shadow:var(--shadowA), inset 0 0 0 1px rgba(201,162,74,.10);
  backdrop-filter:blur(12px);
  display:flex;align-items:center;justify-content:space-between;
  gap:10px;
}
.brandLeft{
  display:flex;align-items:center;gap:12px;flex-wrap:wrap;min-width:0;
}
.brandTitle{
  font-weight:980;letter-spacing:.6px;font-size:14px;color:rgba(255,255,255,.94);white-space:nowrap;
}
.brandSub{
  font-size:12px;color:rgba(255,255,255,.74);letter-spacing:.2px;white-space:nowrap;
}
.brandLinks{
  display:flex;gap:10px;flex-wrap:wrap;font-size:12px;color:rgba(255,255,255,.70);
}
.brandLinks a{
  padding:6px 10px;border-radius:999px;
  border:1px solid rgba(201,162,74,.16);
  background:rgba(0,0,0,.14);
}
.controlsRight{
  display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:flex-end;
}

/* segmented controls */
.seg{
  display:inline-flex;gap:0;overflow:hidden;border-radius:16px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(0,0,0,.18);
  box-shadow:var(--shadowB);
}
.seg button{
  appearance:none;border:0;background:transparent;
  color:rgba(255,255,255,.78);
  padding:10px 12px;min-height:42px;
  font-weight:980;font-size:13px;letter-spacing:.25px;
  cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation;
}
.seg button[aria-pressed="true"]{
  color:rgba(255,255,255,.95);
  background:
    radial-gradient(circle at 50% 50%, rgba(201,162,74,.14), transparent 62%),
    linear-gradient(180deg, rgba(255,43,43,.10), rgba(0,0,0,.10));
  box-shadow: inset 0 0 0 1px rgba(201,162,74,.14), inset 0 -10px 22px rgba(201,162,74,.10);
}

/* ===== STAGE ===== */
.stage{
  position:relative;
  width:min(1200px,94vw);
  height:min(1200px,86vh);
  margin:var(--padTop) auto 0;
  pointer-events:none;
  border-radius:34px;
}

/* ===== LAYERS =====
   0 sky (behind stage)
   1 waterGlass (compass slab background)
   2 obsidianDial
   3 clouds (translucent, behind buttons, below dragons)
   4 dragons (opaque, above compass, below buttons)
   5 nodes (opaque)
*/
.layer{position:absolute;inset:0;border-radius:34px;overflow:hidden;pointer-events:none}

/* SKY: red→orange→night gradient + haze */
.sky{z-index:0}
.sky::before{
  content:"";position:absolute;inset:-12%;
  background:
    radial-gradient(circle at 72% 16%, rgba(255,240,210,.16) 0%, rgba(255,240,210,0) 46%), /* moon haze zone */
    radial-gradient(circle at 18% 22%, rgba(255,90,60,.14) 0%, rgba(255,90,60,0) 54%),  /* lantern glow */
    radial-gradient(circle at 86% 38%, rgba(120,70,255,.10) 0%, rgba(120,70,255,0) 62%), /* opal haze */
    linear-gradient(180deg,
      rgba(255,120,60,.14) 0%,
      rgba(255,70,40,.10) 16%,
      rgba(120,0,22,.10) 46%,
      rgba(0,0,0,.28) 100%);
  filter:saturate(1.05);
}

/* MOON: single moon + crater texture + glow + reflection */
.moon{
  position:absolute;
  width:180px;height:180px;border-radius:999px;
  left:78%;top:16%;
  transform:translate(-50%,-50%);
  z-index:1;
  pointer-events:none;
  opacity:.95;
  background:
    /* craters */
    radial-gradient(circle at 36% 38%, rgba(0,0,0,.10) 0 10px, transparent 11px),
    radial-gradient(circle at 62% 44%, rgba(0,0,0,.09) 0 14px, transparent 15px),
    radial-gradient(circle at 48% 62%, rgba(0,0,0,.08) 0 9px, transparent 10px),
    radial-gradient(circle at 30% 70%, rgba(0,0,0,.06) 0 7px, transparent 8px),
    radial-gradient(circle at 55% 28%, rgba(0,0,0,.06) 0 6px, transparent 7px),
    /* surface */
    radial-gradient(circle at 35% 30%, rgba(255,255,255,.98), rgba(245,245,245,.92) 58%, rgba(220,220,220,.86) 100%);
  box-shadow:
    0 0 38px rgba(255,240,210,.32),
    0 0 80px rgba(255,210,150,.16);
  overflow:hidden;
}
.moon::after{
  content:"";
  position:absolute;inset:-30%;
  background:
    radial-gradient(circle at 50% 50%, rgba(255,255,255,.06), transparent 62%);
  opacity:.70;
}
/* phase shadow controlled by JS via --phaseX (-1..1) */
.moon::before{
  content:"";
  position:absolute;top:-10%;bottom:-10%;
  left:calc(50% + var(--phaseX,0) * 42%);
  width:120%;
  border-radius:999px;
  background:rgba(0,0,0,.48);
  filter:blur(.2px);
  mix-blend-mode:multiply;
}

/* reflection in water layer: faint */
.moonRef{
  position:absolute;
  width:210px;height:210px;border-radius:999px;
  left:78%;top:76%;
  transform:translate(-50%,-50%) scaleY(.55);
  opacity:.10;
  filter:blur(1px);
  background:radial-gradient(circle at 35% 30%, rgba(255,255,255,.90), rgba(255,255,255,0) 62%);
  pointer-events:none;
}

/* WATER/GLASS compass face */
.waterGlass{z-index:1}
.waterGlass::before{
  content:"";position:absolute;inset:18px;border-radius:30px;
  border:1px solid rgba(255,255,255,.12);
  background:
    /* bright water plane */
    radial-gradient(circle at 50% 40%, rgba(255,255,255,.14), transparent 62%),
    radial-gradient(circle at 40% 70%, rgba(255,170,120,.12), transparent 62%),
    radial-gradient(circle at 68% 62%, rgba(255,120,80,.10), transparent 62%),
    linear-gradient(180deg, rgba(255,255,255,.06), rgba(0,0,0,.06));
  box-shadow:
    0 70px 220px rgba(0,0,0,.30),
    inset 0 2px 0 rgba(255,255,255,.10),
    inset 0 -70px 140px rgba(0,0,0,.30);
  opacity:.85;
  backdrop-filter:blur(10px);
}
/* subtle ripple (performance-safe): animated background-position */
.waterGlass::after{
  content:"";position:absolute;inset:18px;border-radius:30px;
  background:
    repeating-radial-gradient(circle at 50% 50%,
      rgba(255,255,255,.06) 0 2px,
      rgba(255,255,255,0) 2px 14px);
  opacity:.10;
  mix-blend-mode:overlay;
  animation: rippleShift 14s linear infinite;
}
@keyframes rippleShift{
  0%{background-position:0 0}
  100%{background-position:220px 180px}
}

/* OBISIDIAN DIAL (instrument) */
.dial{z-index:2}
.dial .ring{
  position:absolute;left:50%;top:50%;
  width:min(900px,90vw);height:min(900px,90vw);
  transform:translate(-50%,-50%);
  border-radius:999px;
  pointer-events:none;
  background:
    radial-gradient(circle at 50% 42%,
      rgba(255,255,255,.05),
      rgba(0,0,0,.22) 56%,
      rgba(0,0,0,.58) 78%,
      rgba(0,0,0,.00) 92%),
    radial-gradient(circle at 50% 50%, rgba(201,162,74,.10), transparent 62%),
    radial-gradient(circle at 50% 50%, rgba(255,43,43,.08), transparent 66%),
    linear-gradient(180deg, rgba(0,0,0,.12), rgba(0,0,0,.00));
  box-shadow:
    inset 0 0 0 2px rgba(255,255,255,.06),
    inset 0 0 0 10px rgba(0,0,0,.12),
    inset 0 0 80px rgba(0,0,0,.55),
    0 50px 180px rgba(0,0,0,.22);
  opacity:.82; /* lighter than before */
}
.dial .engrave{
  position:absolute;left:50%;top:50%;
  width:min(900px,90vw);height:min(900px,90vw);
  transform:translate(-50%,-50%);
  border-radius:999px;
  pointer-events:none;
  background:
    radial-gradient(circle at 50% 50%, transparent 0 36%, rgba(255,255,255,.06) 36% 36.6%, transparent 37% 100%),
    radial-gradient(circle at 50% 50%, transparent 0 52%, rgba(255,255,255,.06) 52% 52.6%, transparent 53% 100%),
    radial-gradient(circle at 50% 50%, transparent 0 68%, rgba(255,255,255,.06) 68% 68.6%, transparent 69% 100%),

    /* curved 3D inlay: concentric arcs + faint conic */
    radial-gradient(circle at 50% 50%, rgba(201,162,74,.10) 0 1px, transparent 2px 100%),
    repeating-conic-gradient(from 45deg at 50% 50%, rgba(201,162,74,.06) 0 1.2deg, transparent 1.2deg 7.5deg),

    /* axes */
    linear-gradient(90deg, transparent 0 49.7%, rgba(201,162,74,.10) 49.7% 50.3%, transparent 50.3% 100%),
    linear-gradient(0deg,  transparent 0 49.7%, rgba(201,162,74,.10) 49.7% 50.3%, transparent 50.3% 100%);
  opacity:.55;
  mask: radial-gradient(circle at 50% 50%, transparent 0 18%, #000 20% 100%);
  -webkit-mask: radial-gradient(circle at 50% 50%, transparent 0 18%, #000 20% 100%);
}

/* 16 cardinal labels on dial (gold + black shadow) */
.dialMarks{
  position:absolute;left:50%;top:50%;
  width:min(900px,90vw);height:min(900px,90vw);
  transform:translate(-50%,-50%);
  z-index:3;pointer-events:none;
}
.dialMarks span{
  position:absolute;
  font-weight:980;
  font-size:11px;
  letter-spacing:1.6px;
  color:rgba(201,162,74,.62);
  text-shadow:0 0 10px rgba(0,0,0,.55), 0 0 1px rgba(0,0,0,.9);
  opacity:.85;
}

/* CLOUDS (translucent, behind dragons, never over CORE) */
.clouds{z-index:3}
.cloudBand{
  position:absolute;left:-40%;right:-40%;
  top:26%;
  height:140px;
  opacity:.18;
  filter:blur(.6px);
  background:
    radial-gradient(120px 70px at 10% 60%, rgba(255,255,255,.70), rgba(255,255,255,0) 70%),
    radial-gradient(140px 80px at 22% 40%, rgba(255,255,255,.60), rgba(255,255,255,0) 72%),
    radial-gradient(170px 90px at 36% 60%, rgba(255,255,255,.55), rgba(255,255,255,0) 74%),
    radial-gradient(150px 90px at 50% 45%, rgba(255,255,255,.50), rgba(255,255,255,0) 74%),
    radial-gradient(180px 100px at 66% 55%, rgba(255,255,255,.55), rgba(255,255,255,0) 76%),
    radial-gradient(160px 90px at 82% 45%, rgba(255,255,255,.52), rgba(255,255,255,0) 76%),
    radial-gradient(120px 70px at 92% 60%, rgba(255,255,255,.48), rgba(255,255,255,0) 72%);
  animation: cloudDrift 26s linear infinite;
}
/* lower, smaller cloud band */
.cloudBand.b2{
  top:72%;
  height:110px;
  opacity:.14;
  animation-duration:32s;
}
@keyframes cloudDrift{
  0%{transform:translateX(-10%)}
  100%{transform:translateX(10%)}
}
/* keep clouds off core: mask a central hole */
.cloudsMask{
  position:absolute;inset:0;
  -webkit-mask: radial-gradient(circle at 50% 52%, transparent 0 150px, #000 170px 100%);
  mask: radial-gradient(circle at 50% 52%, transparent 0 150px, #000 170px 100%);
}

/* DRAGONS: opaque, above compass, below nodes */
.dragons{z-index:4}
.dragonWrap{
  position:absolute;left:-35%;
  width:170%;
  height:220px;
  pointer-events:none;
  opacity:.95;
  filter:drop-shadow(0 16px 26px rgba(0,0,0,.55));
}
.dragonWrap.top{top:20%; animation: flyR2L 24s linear infinite;}
.dragonWrap.bot{top:74%; animation: flyL2R 26s linear infinite;}

@keyframes flyR2L{
  0%{transform:translateX(18%)}
  100%{transform:translateX(-18%)}
}
@keyframes flyL2R{
  0%{transform:translateX(-18%)}
  100%{transform:translateX(18%)}
}

/* LANTERNS (subtle up drift) */
.lantern{
  position:absolute;
  width:14px;height:18px;border-radius:6px;
  background:radial-gradient(circle at 50% 40%, rgba(255,220,170,.90), rgba(255,120,60,.60) 60%, rgba(255,120,60,0) 100%);
  box-shadow:0 0 10px rgba(255,170,100,.22);
  opacity:.22;
  animation: lanternUp 18s linear infinite;
}
@keyframes lanternUp{
  0%{transform:translateY(40px);opacity:.10}
  20%{opacity:.22}
  100%{transform:translateY(-520px);opacity:0}
}

/* NODES (gems) */
.node{
  position:absolute;
  left:50%;top:50%;
  transform:translate(-50%,-50%) rotate(45deg);
  cursor:pointer;
  pointer-events:auto;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.18);
  transition:box-shadow .16s ease, border-color .16s ease, filter .16s ease;
  z-index:10;
  border-radius:22px;
}
.core{width:var(--D0);height:var(--D0);z-index:12;border-radius:26px}
.l1{width:var(--D1);height:var(--D1)}
.l2{width:var(--D2);height:var(--D2)}
.l3{width:var(--D3);height:var(--D3);border-radius:18px}

/* fractal-ish gloss + 3D */
.surface{
  background:
    radial-gradient(circle at 22% 18%, rgba(255,255,255,.24), transparent 46%),
    radial-gradient(circle at 78% 22%, var(--festival), transparent 62%),
    radial-gradient(circle at 74% 84%, var(--opalV), transparent 64%),
    radial-gradient(circle at 28% 84%, var(--crimson), transparent 70%),
    /* fractal noise illusion (safe): layered conic micrograin */
    repeating-conic-gradient(from 20deg at 40% 40%,
      rgba(255,255,255,.018) 0 4deg,
      rgba(0,0,0,0) 4deg 14deg),
    linear-gradient(160deg, var(--onyx1), var(--onyx0));
  box-shadow:
    var(--shadowDeep),
    0 0 24px rgba(255,43,43,.08),
    inset 0 2px 0 rgba(255,255,255,.18),
    inset 0 -52px 92px rgba(0,0,0,.88);
}
.surface::before{
  content:"";
  position:absolute;inset:0;border-radius:inherit;pointer-events:none;
  box-shadow: inset 0 0 0 1px rgba(201,162,74,.18);
  /* curved-ish inlay feel: conic + diagonals (NOT axis grid) */
  background:
    repeating-conic-gradient(from 45deg at 50% 50%,
      rgba(201,162,74,.075) 0 1.2deg,
      transparent 1.2deg 8deg),
    radial-gradient(circle at 50% 50%, rgba(201,162,74,.06), transparent 62%);
  opacity:.38;
  -webkit-mask: radial-gradient(circle at 50% 50%, transparent 0 72%, #000 78% 100%);
  mask: radial-gradient(circle at 50% 50%, transparent 0 72%, #000 78% 100%);
}
.surface::after{
  content:"";
  position:absolute;left:12%;right:12%;top:10%;
  height:30%;
  border-radius:999px;
  background:linear-gradient(to bottom, rgba(255,255,255,.20), rgba(255,255,255,0));
  transform:rotate(-12deg);
  pointer-events:none;
  opacity:.92;
}
.node:hover{
  border-color:rgba(201,162,74,.44);
  box-shadow:
    var(--shadowDeep),
    0 0 0 2px rgba(201,162,74,.14),
    0 0 34px rgba(201,162,74,.18),
    inset 0 2px 0 rgba(255,255,255,.20),
    inset 0 -52px 92px rgba(0,0,0,.88);
}
.node:active{filter:brightness(.98)}
.core{
  border-color:rgba(201,162,74,.26);
  box-shadow:
    0 54px 170px rgba(0,0,0,.88),
    0 0 46px rgba(201,162,74,.12),
    inset 0 2px 0 rgba(255,255,255,.22),
    inset 0 -64px 110px rgba(0,0,0,.92);
}

/* inner text */
.inner{
  width:100%;height:100%;
  transform:rotate(-45deg);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:10px;
  gap:6px;
  color:#fff;
  pointer-events:none;
  user-select:none;
}
.word{
  font-weight:980;
  letter-spacing:.6px;
  line-height:1.05;
  text-shadow:0 0 18px rgba(0,0,0,.42);
  font-size:clamp(10px, 1.15vw, 16px);
  max-width:100%;
  word-break:keep-all;
}
.code{
  font-weight:950;
  font-size:10px;
  letter-spacing:1.2px;
  opacity:.78;
}

/* per-button cardinality on corners (tiny) */
.corners{
  position:absolute;inset:8px;
  transform:rotate(-45deg);
  pointer-events:none;
  opacity:.70;
  font-weight:980;
  font-size:9px;
  letter-spacing:1px;
  color:rgba(201,162,74,.70);
  text-shadow:0 0 10px rgba(0,0,0,.55);
}
.corners .n{position:absolute;top:0;left:50%;transform:translateX(-50%)}
.corners .e{position:absolute;right:0;top:50%;transform:translateY(-50%)}
.corners .s{position:absolute;bottom:0;left:50%;transform:translateX(-50%)}
.corners .w{position:absolute;left:0;top:50%;transform:translateY(-50%)}

/* ===== DOCK + EXIT/HUB ABOVE IT ===== */
.dock{
  position:fixed;left:50%;
  bottom:max(10px, env(safe-area-inset-bottom));
  transform:translateX(-50%);
  z-index:240;
  width:min(980px,94vw);
  padding:10px 12px;border-radius:22px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(0,0,0,.20);
  backdrop-filter:blur(12px);
  box-shadow:0 18px 60px rgba(0,0,0,.55);
  display:grid;grid-template-columns:repeat(4, minmax(0,1fr));
  gap:10px;
}
.dock a{
  display:inline-flex;align-items:center;justify-content:center;
  min-height:44px;border-radius:999px;
  border:1px solid rgba(255,255,255,.14);
  background:linear-gradient(145deg, rgba(10,12,16,.70), rgba(6,8,10,.84));
  color:rgba(255,255,255,.90);
  font-weight:980;letter-spacing:.25px;
}

/* corner diamonds above dock */
.corner{
  position:fixed;
  bottom:calc(max(10px, env(safe-area-inset-bottom)) + var(--dockH));
  z-index:250;
  pointer-events:none;
}
.corner .dmini{pointer-events:auto}
.corner.left{left:16px}
.corner.right{right:16px}
.dmini{
  width:56px;height:56px;border-radius:16px;
  border:1px solid rgba(255,255,255,.14);
  background:linear-gradient(145deg, rgba(10,12,16,.78), rgba(6,8,10,.92));
  box-shadow:var(--shadowB);
  display:grid;place-items:center;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  transform:rotate(45deg);
}
.dmini span{
  transform:rotate(-45deg);
  font-weight:980;font-size:12px;letter-spacing:.6px;color:rgba(255,255,255,.92);
  user-select:none;
}
.cornerLabel{
  margin-top:10px;text-align:center;color:rgba(255,255,255,.72);font-size:11px;letter-spacing:.4px;
}

/* responsive */
@media (max-width:720px){
  :root{
    --D0:196px; --D1:142px; --D2:108px; --D3:84px;
    --R1:156px; --R2:228px; --R3:292px;
    --padTop:112px;
    --dockH:96px;
  }
}
@media (max-width:520px){
  :root{
    --D0:184px; --D1:136px; --D2:104px; --D3:80px;
    --R1:146px; --R2:214px; --R3:274px;
    --dockH:108px;
  }
  .brandSub{display:none}
  .dock{grid-template-columns:repeat(3, minmax(0,1fr))}
}
</style>
</head>

<body>

<div class="top" aria-label="Top controls">

<script>
(function(){
  "use strict";

  // ===== Canon state (gd_* only; lane URL-only) =====
  var qs=new URLSearchParams(location.search);
  var LS=window.localStorage;

  var lang  = qs.get("lang")  || LS.getItem("gd_lang")  || "en";
  var style = qs.get("style") || LS.getItem("gd_style") || "informal";
  var time  = qs.get("time")  || LS.getItem("gd_time")  || "now";
  var depth = qs.get("depth") || LS.getItem("gd_depth") || "explore";
  var lane  = qs.get("lane")  || "platform"; // URL-only

  if(lang!=="en" && lang!=="zh" && lang!=="es") lang="en";
  if(style!=="informal" && style!=="formal") style="informal";
  if(time==="trajectory") time="post";
  if(time!=="origin" && time!=="now" && time!=="post") time="now";
  if(depth!=="explore" && depth!=="learn") depth="explore";
  if(lane!=="platform" && lane!=="engineering") lane="platform";

  try{
    LS.setItem("gd_lang",lang);
    LS.setItem("gd_style",style);
    LS.setItem("gd_time",time);
    LS.setItem("gd_depth",depth);
  }catch(e){}

  document.documentElement.lang=(lang==="zh")?"zh":(lang==="es")?"es":"en";

  function q(over){
    var p=new URLSearchParams();
    p.set("lang",(over&&over.lang)?over.lang:lang);
    p.set("style",(over&&over.style)?over.style:style);
    p.set("time",(over&&over.time)?over.time:time);
    p.set("depth",(over&&over.depth)?over.depth:depth);
    var L=(over&&over.lane)?over.lane:lane;
    if(L==="platform"||L==="engineering") p.set("lane",L);
    return "?"+p.toString();
  }
  function go(path){ window.location.href = path + q(); }
  function setPressed(btn, on){ btn.setAttribute("aria-pressed", on ? "true" : "false"); }

  // ===== ROUTING (unique enforced) =====
  var CORE_ROUTE = "/index-core/index.html";
  var EXIT_ROUTE = "/door/";
  var HUB_ROUTE  = "/home/";
  var PLACEHOLDER_404 = "/404.html";

  // N/E/S/W mapping per your rule:
  // N=LAWS, E=ENERGY, S=FINANCE, W=GOVERNANCE
  var ROUTES_RAW = [
    {tier:1, code:"N",  label:{platform:{en:"LAWS",zh:"法则",es:"LEYES"}, engineering:{en:"BOUNDS",zh:"边界",es:"LÍMIT"}}, href:"/laws/"},
    {tier:1, code:"E",  label:{platform:{en:"ENERGY",zh:"能源",es:"ENERGÍA"}, engineering:{en:"POWER",zh:"功率",es:"PWR"}}, href:"/explore/frontier/energy/"},
    {tier:1, code:"S",  label:{platform:{en:"FINANCE",zh:"金融",es:"FINANZAS"}, engineering:{en:"CAPITAL",zh:"资本",es:"CAP"}}, href:"/finance/"},
    {tier:1, code:"W",  label:{platform:{en:"GOVERNANCE",zh:"治理",es:"GOBERNANZA"}, engineering:{en:"EXEC",zh:"执行",es:"EJEC"}}, href:"/governance/"},

    {tier:2, code:"NE", label:{platform:{en:"PRODUCTS",zh:"产品",es:"PRODUCTOS"}, engineering:{en:"DEPLOY",zh:"部署",es:"DESPL"}}, href:"/products/"},
    {tier:2, code:"SE", label:{platform:{en:"RESEARCH",zh:"研究",es:"INVEST."}, engineering:{en:"R&D",zh:"研发",es:"I+D"}}, href:"/research/"},
    {tier:2, code:"SW", label:{platform:{en:"EXPLORE",zh:"探索",es:"EXPLORAR"}, engineering:{en:"MODELS",zh:"模型",es:"MODELOS"}}, href:"/explore/"},
    {tier:2, code:"NW", label:{platform:{en:"DOCTRINE",zh:"教义",es:"DOCTRINA"}, engineering:{en:"CCD",zh:"CCD",es:"CCD"}}, href:"/products/capital-doctrine/"},

    {tier:3, code:"NNE",label:{platform:{en:"EDUCATION",zh:"教育",es:"EDUCACIÓN"}, engineering:{en:"ESL",zh:"ESL",es:"ESL"}}, href:"/products/education/"},
    {tier:3, code:"ENE",label:{platform:{en:"FRONTIER",zh:"前沿",es:"FRONTERA"}, engineering:{en:"FRONTIER",zh:"前沿",es:"FRONTERA"}}, href:"/explore/frontier/"},
    {tier:3, code:"ESE",label:{platform:{en:"INFRA",zh:"基建",es:"INFRA"}, engineering:{en:"SUBST",zh:"替代",es:"SUBST"}}, href:"/explore/infrastructure/"},
    {tier:3, code:"SSE",label:{platform:{en:"AGRICULTURE",zh:"农业",es:"AGRO"}, engineering:{en:"FOOD",zh:"食物",es:"ALIM"}}, href:"/products/agriculture/"},
    {tier:3, code:"SSW",label:{platform:{en:"GAUGES",zh:"量规",es:"MEDIDORES"}, engineering:{en:"SIGNALS",zh:"信号",es:"SEÑALES"}}, href:"/gauges/"},
    {tier:3, code:"WSW",label:{platform:{en:"VISION",zh:"愿景",es:"VISIÓN"}, engineering:{en:"MAP",zh:"映射",es:"MAP"}}, href:"/explore/frontier/vision/"},
    {tier:3, code:"WNW",label:{platform:{en:"LATTICE",zh:"晶格",es:"LATTICE"}, engineering:{en:"256",zh:"256态",es:"256"}}, href:"/explore/frontier/lattice/"},
    {tier:3, code:"NNW",label:{platform:{en:"SHIMMER",zh:"闪烁",es:"SHIMMER"}, engineering:{en:"S.H.I.M.M.E.R.",zh:"SHIMMER",es:"SHIMMER"}}, href:"/explore/frontier/shimmer/"}
  ];

  function normalizeRoutes(list){
    var seen = Object.create(null);
    var out = [];
    for(var i=0;i<list.length;i++){
      var it=list[i];
      var h=(it.href||"").trim();
      if(!h) h=PLACEHOLDER_404;
      if(seen[h]) h=PLACEHOLDER_404;
      seen[h]=true;
      out.push({tier:it.tier, code:it.code, label:it.label, href:h});
    }
    return out;
  }
  var ROUTES = normalizeRoutes(ROUTES_RAW);

  function pick3(en,zh,es){ return (lang==="zh")?zh:(lang==="es")?es:en; }
  function labelFor(it){
    var pack = (lane==="engineering") ? it.label.engineering : it.label.platform;
    return pick3(pack.en, pack.zh, pack.es);
  }

  // ===== Wire dock links with state carry =====
  function wireAll(){
    var nodes=document.querySelectorAll("[data-route]");
    for(var i=0;i<nodes.length;i++){
      var el=nodes[i];
      var route=el.getAttribute("data-route")||"";
      if(!route) continue;
      el.setAttribute("href", route + q());
    }
  }
  wireAll();

  // ===== Moon phase (no new storage; time-based) =====
  (function setMoonPhase(){
    var d=new Date();
    var t = d.getTime();
    // 8 phases based on ~12h buckets
    var phase = Math.floor((t / (1000*60*60*12)) % 8); // 0..7
    // map phase to shadow offset: -1..1
    // full moon at phase 4 (center shadow off to far side)
    var map = [-0.85,-0.60,-0.30,-0.10,0.95,0.60,0.30,0.10];
    var x = map[phase] || 0.95;
    document.getElementById("moon").style.setProperty("--phaseX", String(x));
  })();

  // ===== Dial marks (16) =====
  (function buildDialMarks(){
    var el=document.getElementById("dialMarks");
    if(!el) return;
    el.innerHTML="";
    var marks=["N","NNE","NE","ENE","E","ESE","SE","SSE","S","SSW","SW","WSW","W","WNW","NW","NNW"];
    for(var i=0;i<marks.length;i++){
      var sp=document.createElement("span");
      sp.textContent=marks[i];
      // position around circle
      var ang=(i/marks.length)*Math.PI*2 - Math.PI/2;
      var r= (Math.min(el.clientWidth, el.clientHeight)/2) - 14;
      var cx=el.clientWidth/2, cy=el.clientHeight/2;
      var x=cx + r*Math.cos(ang);
      var y=cy + r*Math.sin(ang);
      sp.style.left = x+"px";
      sp.style.top  = y+"px";
      sp.style.transform = "translate(-50%,-50%)";
      el.appendChild(sp);
    }
  })();

  // ===== Lanterns (few, subtle) =====
  (function initLanterns(){
    var L=document.getElementById("lanternLayer");
    if(!L) return;
    L.innerHTML="";
    var count=8;
    for(var i=0;i<count;i++){
      var d=document.createElement("div");
      d.className="lantern";
      d.style.left = (8 + Math.random()*84) + "%";
      d.style.top  = (70 + Math.random()*30) + "%";
      d.style.animationDelay = (-Math.random()*18) + "s";
      d.style.animationDuration = (16 + Math.random()*10) + "s";
      L.appendChild(d);
    }
  })();

  // ===== Dragon SVG generator (REAL dragon, not vine) =====
  function dragonSVG(opts){
    // opts: {flip:boolean, text:string, top:boolean}
    var fillBody = "#0b3a22";      // dark jade
    var fillBelly= "#184a2c";
    var scaleA   = "#1e6a3a";
    var stroke   = "#071a10";
    var glowText = "rgba(212,175,55,0.95)";
    var text = opts.text || "";
    var flip = opts.flip ? -1 : 1;

    // Path for body (S-curve) used for textPath
    var bodyPathId = "bp_" + Math.random().toString(16).slice(2);

    return ''
    + '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 320" width="100%" height="100%" preserveAspectRatio="none">'
    + '<defs>'
      + '<filter id="g" x="-20%" y="-20%" width="140%" height="140%">'
        + '<feGaussianBlur stdDeviation="2" result="b"/>'
        + '<feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>'
      + '</filter>'
      + '<pattern id="scales" width="48" height="28" patternUnits="userSpaceOnUse">'
        + '<path d="M0,28 C12,14 36,14 48,28" fill="none" stroke="'+scaleA+'" stroke-width="3" opacity="0.65"/>'
        + '<path d="M-24,28 C-12,14 12,14 24,28" fill="none" stroke="'+scaleA+'" stroke-width="3" opacity="0.55"/>'
      + '</pattern>'
      + '<path id="'+bodyPathId+'" d="M 80 170 C 260 80, 420 260, 600 160 C 780 60, 940 260, 1120 170 C 1280 90, 1400 200, 1520 160" />'
    + '</defs>'

    + '<g transform="translate(0,0) scale('+flip+',1) translate('+(flip<0?-1600:0)+',0)">'

      // TAIL
      + '<path d="M1400 170 C 1500 160, 1540 140, 1580 120" fill="none" stroke="'+fillBody+'" stroke-width="26" stroke-linecap="round"/>'
      + '<path d="M1400 170 C 1500 160, 1540 140, 1580 120" fill="none" stroke="'+stroke+'" stroke-width="3" opacity="0.6"/>'

      // BODY base (thick)
      + '<path d="M 110 170 C 270 85, 420 260, 600 160 C 780 60, 940 260, 1120 170 C 1280 90, 1400 200, 1480 160" fill="none" stroke="'+fillBody+'" stroke-width="46" stroke-linecap="round"/>'
      // belly
      + '<path d="M 120 182 C 280 110, 420 270, 600 176 C 780 86, 940 270, 1120 182 C 1280 120, 1400 210, 1470 178" fill="none" stroke="'+fillBelly+'" stroke-width="24" stroke-linecap="round" opacity="0.9"/>'
      // scale overlay (pattern stroked along body with clip feel)
      + '<path d="M 110 170 C 270 85, 420 260, 600 160 C 780 60, 940 260, 1120 170 C 1280 90, 1400 200, 1480 160" fill="none" stroke="url(#scales)" stroke-width="38" stroke-linecap="round" opacity="0.65"/>'
      // spine fins
      + '<path d="M240 92 l10 -28 l12 26 l12 -30 l14 28 l12 -26 l12 24" fill="none" stroke="#2a9a5a" stroke-width="6" stroke-linecap="round" opacity="0.75"/>'
      + '<path d="M700 86 l10 -28 l12 26 l12 -30 l14 28 l12 -26 l12 24" fill="none" stroke="#2a9a5a" stroke-width="6" stroke-linecap="round" opacity="0.75"/>'
      + '<path d="M1080 96 l10 -28 l12 26 l12 -30 l14 28 l12 -26 l12 24" fill="none" stroke="#2a9a5a" stroke-width="6" stroke-linecap="round" opacity="0.75"/>'

      // CLAWS (2 sets)
      + '<g opacity="0.85">'
        + '<path d="M520 210 c-12 18 -26 26 -42 26 c18 -16 20 -28 12 -44 c18 0 26 8 30 18 z" fill="#0a2516"/>'
        + '<path d="M560 216 c-10 16 -22 24 -36 24 c16 -14 18 -24 10 -38 c16 0 22 8 26 14 z" fill="#0a2516"/>'
        + '<path d="M960 214 c-12 18 -26 26 -42 26 c18 -16 20 -28 12 -44 c18 0 26 8 30 18 z" fill="#0a2516"/>'
        + '<path d="M1000 220 c-10 16 -22 24 -36 24 c16 -14 18 -24 10 -38 c16 0 22 8 26 14 z" fill="#0a2516"/>'
      + '</g>'

      // HEAD (horns + whiskers + jaw)
      + '<g transform="translate(120,138)">'
        + '<path d="M0 44 C 22 10, 70 -4, 112 18 C 146 36, 150 74, 120 92 C 86 112, 44 106, 18 86 C -6 68, -10 58, 0 44 Z" fill="'+fillBody+'" stroke="'+stroke+'" stroke-width="3"/>'
        + '<path d="M86 52 C 106 46, 126 54, 132 70 C 120 78, 106 86, 88 86 Z" fill="#0a2516" opacity="0.9"/>'
        + '<circle cx="98" cy="52" r="5" fill="#e8f6ff"/><circle cx="98" cy="52" r="2" fill="#001"/>'
        + '<path d="M118 28 C 132 10, 154 4, 170 12" fill="none" stroke="#e1c16a" stroke-width="6" stroke-linecap="round"/>'
        + '<path d="M108 24 C 118 4, 140 -6, 156 -2" fill="none" stroke="#e1c16a" stroke-width="5" stroke-linecap="round"/>'
        + '<path d="M132 74 C 150 80, 170 74, 182 62" fill="none" stroke="#e1c16a" stroke-width="4" stroke-linecap="round"/>'
        + '<path d="M132 80 C 152 96, 174 96, 190 90" fill="none" stroke="#e1c16a" stroke-width="3" stroke-linecap="round"/>'
        + '<path d="M86 68 C 106 84, 118 92, 130 96" fill="none" stroke="#fff" stroke-width="2" opacity="0.55"/>'
      + '</g>'

      // TEXT (gold glow) along body path
      + '<text filter="url(#g)" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-weight="900" font-size="22" letter-spacing="2" fill="'+glowText+'">'
        + '<textPath href="#'+bodyPathId+'" startOffset="10%">'+escapeXML(text)+'</textPath>'
      + '</text>'

    + '</g></svg>';
  }

  function escapeXML(s){
    return String(s)
      .replace(/&/g,"&amp;")
      .replace(/</g,"&lt;")
      .replace(/>/g,"&gt;")
      .replace(/"/g,"&quot;")
      .replace(/'/g,"&#39;");
  }

  // ===== Sayings pools =====
  var CN_CLASSIC = [
    "少说多做",
    "己所不欲，勿施于人",
    "过而能改，善莫大焉",
    "一失足成千古恨",
    "道可道，非常道",
    "水善利万物而不争"
  ];

  var POOLS = {
    en: [
      "Say less, do more.",
      "If you can correct it, do it.",
      "Keep failure local. Rollback beats cascade.",
      "Evidence first. Upgrade only with receipts.",
      "Scope first. Then speak."
    ],
    zh: [
      "少说多做。",
      "己所不欲，勿施于人。",
      "过而能改，善莫大焉。",
      "一失足成千古恨。",
      "道可道，非常道。"
    ],
    es: [
      "Di menos, haz más.",
      "Si puedes corregirlo, corrígelo.",
      "Evidencia primero; luego escala.",
      "Alcance primero; luego afirmas.",
      "Contén antes de desplegar."
    ]
  };

  function nextFrom(arr, idx){ return arr[(idx % arr.length + arr.length) % arr.length]; }

  var topIdx = 0;
  var botIdx = 0;

  function paintDragons(){
    var topText = nextFrom(CN_CLASSIC, topIdx++);
    var langPool = (lang==="zh") ? POOLS.zh : (lang==="es") ? POOLS.es : POOLS.en;
    var botText = nextFrom(langPool, botIdx++);

    // top: right->left (flip true so head faces left)
    document.getElementById("dragonTop").innerHTML = dragonSVG({flip:true, text: topText});

    // bottom: left->right (flip false so head faces right)
    document.getElementById("dragonBot").innerHTML = dragonSVG({flip:false, text: botText});
  }

  // change sayings each full pass
  document.getElementById("dragonTop").addEventListener("animationiteration", function(){ paintDragons(); }, {passive:true});
  document.getElementById("dragonBot").addEventListener("animationiteration", function(){ paintDragons(); }, {passive:true});
  paintDragons();

  // ===== Nodes =====
  var stage=document.getElementById("stage");

  function mkNode(word, code, cls){
    var d=document.createElement("div");
    d.className="node surface "+cls;
    d.setAttribute("role","button");
    d.tabIndex=0;

    var corners=document.createElement("div");
    corners.className="corners";
    corners.innerHTML='<div class="n">N</div><div class="e">E</div><div class="s">S</div><div class="w">W</div>';

    var inner=document.createElement("div");
    inner.className="inner";

    var w=document.createElement("div");
    w.className="word";
    w.textContent=word;

    var c=document.createElement("div");
    c.className="code";
    c.textContent=code;

    inner.appendChild(w);
    inner.appendChild(c);
    d.appendChild(corners);
    d.appendChild(inner);
    return d;
  }

  function layout(){
    // remove existing nodes
    stage.querySelectorAll(".node").forEach(function(n){ n.remove(); });

    var rect=stage.getBoundingClientRect();
    var cx=rect.width/2, cy=rect.height/2;

    var R1=parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--R1"))||168;
    var R2=parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--R2"))||246;
    var R3=parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--R3"))||314;

    // CORE
    var core=mkNode(pick3("CORE","核心","NÚCLEO"), "INDEX", "core");
    core.style.left=cx+"px"; core.style.top=cy+"px";
    core.addEventListener("click", function(){ go(CORE_ROUTE); }, {passive:true});
    core.addEventListener("keydown", function(e){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); go(CORE_ROUTE); }});
    stage.appendChild(core);

    // split by tier
    var t1=[], t2=[], t3=[];
    for(var i=0;i<ROUTES.length;i++){
      if(ROUTES[i].tier===1) t1.push(ROUTES[i]);
      else if(ROUTES[i].tier===2) t2.push(ROUTES[i]);
      else t3.push(ROUTES[i]);
    }

    function byCode(arr, code){ for(var i=0;i<arr.length;i++) if(arr[i].code===code) return arr[i]; return null; }

    // Tier 1 pinned
    var ordered=[byCode(t1,"N"),byCode(t1,"E"),byCode(t1,"S"),byCode(t1,"W")].filter(Boolean);
    var ang=[-Math.PI/2,0,Math.PI/2,Math.PI];
    for(var i=0;i<ordered.length;i++){
      var it=ordered[i];
      var x=cx + R1*Math.cos(ang[i]);
      var y=cy + R1*Math.sin(ang[i]);
      var n=mkNode(labelFor(it), it.code, "l1");
      n.style.left=x+"px"; n.style.top=y+"px";
      (function(path, el){
        el.addEventListener("click", function(){ go(path); }, {passive:true});
        el.addEventListener("keydown", function(e){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); go(path); }});
      })(it.href, n);
      stage.appendChild(n);
    }

    // Tier 2
    for(var i=0;i<t2.length;i++){
      var it=t2[i];
      var a=(i/t2.length)*(Math.PI*2) - Math.PI/4;
      var x=cx + R2*Math.cos(a);
      var y=cy + R2*Math.sin(a);
      var n=mkNode(labelFor(it), it.code, "l2");
      n.style.left=x+"px"; n.style.top=y+"px";
      (function(path, el){
        el.addEventListener("click", function(){ go(path); }, {passive:true});
        el.addEventListener("keydown", function(e){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); go(path); }});
      })(it.href, n);
      stage.appendChild(n);
    }

    // Tier 3
    for(var i=0;i<t3.length;i++){
      var it=t3[i];
      var a=(i/t3.length)*(Math.PI*2) - Math.PI*(3/8);
      var x=cx + R3*Math.cos(a);
      var y=cy + R3*Math.sin(a);
      var n=mkNode(labelFor(it), it.code, "l3");
      n.style.left=x+"px"; n.style.top=y+"px";
      (function(path, el){
        el.addEventListener("click", function(){ go(path); }, {passive:true});
        el.addEventListener("keydown", function(e){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); go(path); }});
      })(it.href, n);
      stage.appendChild(n);
    }
  }

  function safeLayout(){
    var r=stage.getBoundingClientRect();
    if(r.width<10||r.height<10){ requestAnimationFrame(safeLayout); return; }
    layout();
  }

  // ===== Language + lane toggles (NO reload) =====
  var btnEN=document.getElementById("btnEN");
  var btnZH=document.getElementById("btnZH");
  var btnES=document.getElementById("btnES");
  setPressed(btnEN, lang==="en");
  setPressed(btnZH, lang==="zh");
  setPressed(btnES, lang==="es");

  function paintHeader(){
    var laneWord = (lane==="engineering")
      ? pick3("ENGINEERING","工程","INGENIERÍA")
      : pick3("PLATFORM","平台","PLATAFORMA");

    if(lang==="zh"){
      document.getElementById("brandTitle").textContent="欢迎来到指南针";
      document.getElementById("brandSub").textContent="可视化教程：选方向 → 得到清晰下一步。透镜："+laneWord+"。";
      document.getElementById("lblExit").textContent="退出";
      document.getElementById("lblHub").textContent="枢纽";
      document.querySelector("#btnExit span").textContent="退出";
      document.querySelector("#btnHub span").textContent="枢纽";
      document.getElementById("dockDoor").textContent="门";
      document.getElementById("dockLaws").textContent="法则";
      document.getElementById("dockProducts").textContent="产品";
      document.getElementById("dockResearch").textContent="研究";
    }else if(lang==="es"){
      document.getElementById("brandTitle").textContent="BIENVENIDO A LA BRÚJULA";
      document.getElementById("brandSub").textContent="Tutorial visual: elige dirección → siguiente paso claro. Lente: "+laneWord+".";
      document.getElementById("lblExit").textContent="SALIR";
      document.getElementById("lblHub").textContent="HUB";
      document.querySelector("#btnExit span").textContent="SALIR";
      document.querySelector("#btnHub span").textContent="HUB";
      document.getElementById("dockDoor").textContent="PUERTA";
      document.getElementById("dockLaws").textContent="LEYES";
      document.getElementById("dockProducts").textContent="PRODUCTOS";
      document.getElementById("dockResearch").textContent="INVEST.";
    }else{
      document.getElementById("brandTitle").textContent="WELCOME TO THE COMPASS";
      document.getElementById("brandSub").textContent="A visual tutorial: pick a direction → get a clear next step. Lens: "+laneWord+".";
      document.getElementById("lblExit").textContent="EXIT";
      document.getElementById("lblHub").textContent="HUB";
      document.querySelector("#btnExit span").textContent="EXIT";
      document.querySelector("#btnHub span").textContent="HUB";
      document.getElementById("dockDoor").textContent="DOOR";
      document.getElementById("dockLaws").textContent="LAWS";
      document.getElementById("dockProducts").textContent="PRODUCTS";
      document.getElementById("dockResearch").textContent="RESEARCH";
    }
  }

  function setLang(next){
    if(next!=="en" && next!=="zh" && next!=="es") next="en";
    lang=next;
    try{ LS.setItem("gd_lang",lang);}catch(e){}
    history.replaceState({}, "", location.pathname + q({lang:lang}));
    setPressed(btnEN, lang==="en");
    setPressed(btnZH, lang==="zh");
    setPressed(btnES, lang==="es");
    paintHeader();
    paintDragons(); // bottom dragon language changes
    safeLayout();
    wireAll();
  }
  btnEN.addEventListener("click", function(){ setLang("en"); }, {passive:true});
  btnZH.addEventListener("click", function(){ setLang("zh"); }, {passive:true});
  btnES.addEventListener("click", function(){ setLang("es"); }, {passive:true});

  var btnLP=document.getElementById("lanePlatform");
  var btnLE=document.getElementById("laneEngineering");
  setPressed(btnLP, lane==="platform");
  setPressed(btnLE, lane==="engineering");

  function setLane(next){
    if(next!=="platform" && next!=="engineering") next="platform";
    lane=next;
    history.replaceState({}, "", location.pathname + q({lane:lane}));
    setPressed(btnLP, lane==="platform");
    setPressed(btnLE, lane==="engineering");
    paintHeader();
    safeLayout();
    wireAll();
  }
  btnLP.addEventListener("click", function(){ setLane("platform"); }, {passive:true});
  btnLE.addEventListener("click", function(){ setLane("engineering"); }, {passive:true});

  // ===== Exit/Hub =====
  function bindCorner(id, path){
    var el=document.getElementById(id);
    if(!el) return;
    function act(){ go(path); }
    el.addEventListener("click", act, {passive:true});
    el.addEventListener("keydown", function(e){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); act(); }});
  }
  bindCorner("btnExit", EXIT_ROUTE);
  bindCorner("btnHub", HUB_ROUTE);

  // ===== Init =====
  paintHeader();
  requestAnimationFrame(safeLayout);
  window.addEventListener("resize", function(){ safeLayout(); }, {passive:true});

})();
</script>

</body>
</html>
