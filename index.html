<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Diamond Gate Bridge</title>

<link rel="stylesheet" href="/assets/ui.css">
<link rel="stylesheet" href="/assets/branch.css">

<style>
html,body{
margin:0;
height:100%;
overflow:hidden;
font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
color:#fff;
background:#000;
}

#scene{
position:fixed;
inset:0;
width:100vw;
height:100vh;
display:block;
z-index:0;
}

#uiLayer{
position:relative;
z-index:2;
pointer-events:auto;
padding:24px;
}

.controls{
display:flex;
gap:10px;
margin-bottom:20px;
}

button{
padding:10px 16px;
font-weight:700;
border-radius:6px;
border:none;
cursor:pointer;
background:rgba(255,255,255,.08);
color:#fff;
}

button:hover{
background:rgba(255,255,255,.18);
}
</style>
</head>

<body data-page="index">

<canvas id="scene"></canvas>

<div id="uiLayer">

<div class="controls">
<button onclick="navigatorLayer(1)">Layer 1</button>
<button onclick="navigatorLayer(2)">Layer 2</button>
<button onclick="__DGB_RENDER__.resume()">Resume Spin</button>
</div>

<h1>Navigator</h1>
<p>Layer 1 = cube navigator</p>
<p>Layer 2 = expanded navigator</p>

</div>

<script src="/variant/scene.js"></script>

</body>
</html>
