<!doctype html>
<!-- TNT — /laws/index.html
     LAWS · CANONICAL (7 LAWS) · 4 LENSES · 3 LANG (EN/中文/ES) · MOBILE SAFE · DENSE
     UPDATE: ADD BACKGROUND CONTEXT (FESTIVAL NIGHT / LANTERN / FIREWORKS — BEHIND CONTENT)
     LENSES (NO NEW gd_* KEYS):
       - INFORMAL   = style=informal & depth=explore
       - FORMAL     = style=formal   & depth=explore
       - PLATFORM   = style=informal & depth=learn
       - ENGINEERING= style=formal   & depth=learn
     RULES:
       - Accordion only (no modals/overlays)
       - Single-open accordion (auto-close others; tap same closes)
       - Red signal gradient + diamond markers
       - Canon state carry: lang/style/time/depth via URL + LS gd_lang/gd_style/gd_time/gd_depth ONLY
       - NO new gd_* keys
       - Uses ui.css + branch.css + instruments.js
       - Does NOT style html/body background (ui.css owns field)
       - No inline onclick; addEventListener only
-->

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>LAWS · Canonical</title>

<link rel="stylesheet" href="/assets/ui.css"/>
<link rel="stylesheet" href="/assets/branch.css"/>
<script defer src="/assets/instruments.js"></script>

<style>
a{color:inherit;text-decoration:none}
body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:#fff}
body::before,body::after{pointer-events:none!important}

/* ===== TOKENS ===== */
:root{
  --dockH:112px;

  /* high-contrast red/black/gold (avoid washed blue) */
  --stroke:rgba(255,255,255,.12);
  --stroke2:rgba(255,255,255,.10);

  --ink:rgba(255,255,255,.94);
  --txt:rgba(255,255,255,.90);
  --mut:rgba(255,255,255,.78);
  --mut2:rgba(255,255,255,.70);

  --crimson:rgba(120,0,22,.30);
  --festival:rgba(255,43,43,.14);
  --opalV:rgba(90,40,120,.10);

  --sigR:rgba(255,43,43,.18);
  --sigR2:rgba(255,43,43,.12);

  --gold:rgba(201,162,74,.40);
  --goldSoft:rgba(201,162,74,.18);

  --shadowA:0 24px 80px rgba(0,0,0,.55);
  --shadowB:0 16px 52px rgba(0,0,0,.60);
  --shadowC:0 18px 60px rgba(0,0,0,.55);

  --fsH:28px;   /* monument-type tuned for mobile */
  --fsP:14.75px;
}

/* ===== TOP CONTROLS ===== */
.top{
  position:fixed;top:16px;left:0;right:0;
  padding:0 16px;
  display:flex;justify-content:space-between;align-items:center;
  gap:12px;
  z-index:240;
  pointer-events:none;
}
.top .left,.top .right{
  display:flex;gap:10px;align-items:center;
  flex-wrap:wrap;white-space:nowrap;
  pointer-events:auto;
}
.top .btn{white-space:nowrap}

/* Button (gold under-light only) */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:10px 12px;min-height:44px;border-radius:16px;
  border:1px solid rgba(255,255,255,.14);
  background:
    radial-gradient(circle at 50% 120%, rgba(201,162,74,.16), transparent 64%),
    linear-gradient(145deg, rgba(10,12,16,.78), rgba(6,8,10,.90));
  color:var(--ink);
  font-weight:950;font-size:14px;letter-spacing:.2px;
  -webkit-tap-highlight-color:transparent;
  position:relative;overflow:hidden;
  touch-action:manipulation;
  box-shadow:var(--shadowC);
}
.btn:active{transform:translateY(1px)}
.btn::after{
  content:"";
  position:absolute;left:10px;right:10px;bottom:-12px;height:28px;
  background: radial-gradient(circle at 50% 0%, rgba(201,162,74,.34), transparent 72%);
  opacity:.60;pointer-events:none;
}
.btn.red{border-color:rgba(255,43,43,.22); box-shadow:var(--shadowC), 0 0 18px rgba(255,43,43,.12);}

/* ===== PAGE ===== */
.page{
  width:min(1120px,94vw);
  margin:0 auto;
  padding:84px 0 calc(var(--dockH) + 18px);
  display:flex;
  flex-direction:column;
  gap:12px;
  position:relative;
  z-index:10;
}

/* ===== Background context (behind content; not body) ===== */
.backdrop{
  position:absolute;
  left:50%;
  top:70px;
  transform:translateX(-50%);
  width:min(1180px,96vw);
  height:calc(100% - 120px);
  border-radius:34px;
  pointer-events:none;
  z-index:0;
  overflow:hidden;
}
.backdrop::before{
  content:"";
  position:absolute;inset:0;
  border:1px solid rgba(255,255,255,.08);
  border-radius:34px;
  background:
    radial-gradient(circle at 18% 22%, rgba(201,162,74,.10), transparent 60%),
    radial-gradient(circle at 78% 26%, rgba(255,43,43,.10), transparent 62%),
    radial-gradient(circle at 62% 90%, rgba(90,40,120,.10), transparent 64%),
    linear-gradient(160deg, rgba(0,0,0,.18), rgba(0,0,0,.08));
  box-shadow:
    0 70px 220px rgba(0,0,0,.62),
    inset 0 2px 0 rgba(255,255,255,.06),
    inset 0 -70px 140px rgba(0,0,0,.55);
  opacity:.92;
}
.backdrop::after{
  content:"";
  position:absolute;inset:-18%;
  background:
    radial-gradient(circle at 18% 34%, rgba(255,43,43,.18), transparent 44%),
    radial-gradient(circle at 84% 30%, rgba(255,43,43,.14), transparent 46%),
    radial-gradient(circle at 52% 78%, rgba(201,162,74,.12), transparent 48%),

    conic-gradient(from 12deg at 30% 28%,
      rgba(201,162,74,.14), transparent 12%,
      rgba(255,43,43,.12), transparent 24%,
      rgba(90,40,120,.10), transparent 38%,
      transparent 100%),
    conic-gradient(from 180deg at 70% 36%,
      rgba(255,43,43,.12), transparent 14%,
      rgba(201,162,74,.12), transparent 28%,
      rgba(90,40,120,.10), transparent 44%,
      transparent 100%),

    radial-gradient(circle at 50% 50%, rgba(255,255,255,.04), transparent 62%);
  filter:blur(1px);
  opacity:.72;
}

/* ===== HEADER ===== */
.header{
  position:relative;
  z-index:2;
  border:1px solid var(--stroke);
  border-radius:22px;
  background:
    radial-gradient(circle at 18% 22%, var(--crimson), transparent 72%),
    radial-gradient(circle at 82% 30%, var(--opalV), transparent 74%),
    radial-gradient(circle at 55% 110%, var(--sigR2), transparent 62%),
    radial-gradient(circle at 26% 22%, rgba(201,162,74,.14), transparent 62%),
    linear-gradient(160deg, rgba(0,0,0,.30), rgba(0,0,0,.14));
  backdrop-filter:blur(10px);
  box-shadow:var(--shadowA);
  padding:16px 16px 14px;
  overflow:hidden;
}
/* Red signal rim + gold diamond lay in trim zone */
.header::before{
  content:"";
  position:absolute;inset:0;border-radius:22px;pointer-events:none;
  box-shadow: inset 0 0 0 1px rgba(255,43,43,.18);
  background:
    repeating-linear-gradient(45deg, rgba(201,162,74,.08) 0 1px, transparent 1px 16px),
    repeating-linear-gradient(-45deg, rgba(201,162,74,.06) 0 1px, transparent 1px 16px);
  opacity:.30;
  mask:
    radial-gradient(circle at 50% 50%, transparent 0 78%, #000 82% 100%),
    linear-gradient(#000,#000);
  -webkit-mask:
    radial-gradient(circle at 50% 50%, transparent 0 78%, #000 82% 100%),
    linear-gradient(#000,#000);
}

.k{margin:0 0 6px;font-size:11px;letter-spacing:4px;text-transform:uppercase;opacity:.74;color:var(--mut)}
.t{margin:0;font-weight:950;font-size:var(--fsH);letter-spacing:.7px;line-height:1.12;color:var(--ink)}
.s{margin:10px 0 0;font-size:var(--fsP);opacity:.92;line-height:1.55;color:var(--txt);max-width:980px}
.fine{margin-top:10px;font-size:12.75px;opacity:.80;line-height:1.45;color:var(--mut)}
.rule{
  margin-top:12px;
  border-radius:18px;
  border:1px solid rgba(255,255,255,.10);
  background:
    radial-gradient(circle at 22% 18%, rgba(255,43,43,.10), transparent 58%),
    radial-gradient(circle at 82% 70%, rgba(201,162,74,.10), transparent 62%),
    linear-gradient(160deg, rgba(10,12,16,.55), rgba(6,8,10,.72));
  padding:12px 12px 10px;
  color:rgba(255,255,255,.86);
  font-size:13px;
  line-height:1.5;
}

/* ===== LENSES (4) ===== */
.lensRow{
  margin-top:12px;
  display:flex;
  justify-content:space-between;
  gap:10px;
  flex-wrap:wrap;
  align-items:center;
}
.pills{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.pill{
  padding:10px 14px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.12);
  background:
    radial-gradient(circle at 50% 120%, rgba(201,162,74,.12), transparent 64%),
    linear-gradient(145deg, rgba(10,12,16,.78), rgba(6,8,10,.90));
  box-shadow:0 14px 36px rgba(0,0,0,.65);
  cursor:pointer;
  font-weight:950;
  letter-spacing:.2px;
  color:#fff;
  user-select:none;
  -webkit-tap-highlight-color:transparent;
  min-height:44px;
  position:relative;
  overflow:hidden;
}
.pill::after{
  content:"";
  position:absolute;left:10px;right:10px;bottom:-12px;height:28px;
  background: radial-gradient(circle at 50% 0%, rgba(201,162,74,.26), transparent 72%);
  opacity:.45;pointer-events:none;
}
.pill.active{
  border-color:rgba(255,43,43,.32);
  box-shadow:0 18px 50px rgba(0,0,0,.9), 0 0 16px var(--sigR);
}
.pill.dim{border-color:rgba(201,162,74,.22)}
.pill.dim.active{border-color:rgba(255,43,43,.32)}
.lensState{
  display:inline-flex;align-items:center;gap:8px;
  padding:10px 12px;border-radius:999px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(0,0,0,.16);
  color:var(--mut);
  font-weight:950;
  box-shadow:0 14px 36px rgba(0,0,0,.55);
}

/* ===== BAND ===== */
.band{
  position:relative;
  z-index:2;
  padding:10px 12px;
  border-radius:18px;
  border:1px solid var(--stroke2);
  background:rgba(0,0,0,.14);
  font-weight:950;
  letter-spacing:.2px;
  color:rgba(255,255,255,.88);
}

/* ===== ACCORDION ===== */
.list{position:relative;z-index:2;display:flex;flex-direction:column;gap:12px}

.row{
  position:relative;
  border:1px solid rgba(255,255,255,.10);
  border-radius:22px;
  background:
    radial-gradient(circle at 22% 18%, rgba(255,43,43,.10), transparent 58%),
    radial-gradient(circle at 78% 30%, rgba(90,40,120,.10), transparent 62%),
    linear-gradient(145deg, rgba(17,22,28,.86), rgba(11,15,20,.92));
  box-shadow:var(--shadowB);
  overflow:hidden;
}
.row::before{
  content:"";
  position:absolute;inset:0;border-radius:22px;pointer-events:none;
  box-shadow: inset 0 0 0 1px rgba(201,162,74,.12);
  opacity:.60;
}
.head{
  display:flex;align-items:flex-start;justify-content:space-between;
  gap:10px;
  padding:14px 16px;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
  position:relative;
}
.left{display:flex;align-items:flex-start;gap:12px;min-width:0}
.marker{
  display:flex;flex-direction:column;align-items:center;gap:8px;
  margin-top:2px;flex:0 0 auto;
}
.diamond{
  width:10px;height:10px;border-radius:3px;transform:rotate(45deg);
  background:var(--c);
  box-shadow:0 0 0 1px rgba(255,255,255,.14), 0 0 14px rgba(0,0,0,.35);
}
.bar{
  width:6px;height:22px;border-radius:99px;background:var(--c);
  box-shadow:0 0 18px rgba(0,0,0,.25);
}
.titleBlock{min-width:0}
.title{
  font-weight:950;
  letter-spacing:.25px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  font-size:16.5px;
  color:var(--ink);
}
.sub{
  margin-top:6px;
  font-size:13.25px;
  opacity:.88;
  line-height:1.38;
  max-width:92ch;
  color:rgba(255,255,255,.86);
}
.chev{
  width:36px;height:36px;border-radius:14px;
  border:1px solid rgba(255,255,255,.14);
  background: rgba(0,0,0,.16);
  display:flex;align-items:center;justify-content:center;
  color:var(--mut);
  font-weight:950;
  position:relative;overflow:hidden;
  flex:0 0 auto;margin-top:2px;
}
.chev::after{
  content:"";
  position:absolute;left:6px;right:6px;bottom:-10px;height:22px;
  background: radial-gradient(circle at 50% 0%, rgba(201,162,74,.30), transparent 70%);
  opacity:.62;pointer-events:none;
}

.body{
  display:none;
  padding:14px 16px 16px;
  border-top:1px solid rgba(255,255,255,.08);
  background:
    radial-gradient(circle at 30% 30%, rgba(255,255,255,.06), transparent 55%),
    linear-gradient(145deg, rgba(10,12,16,.86), rgba(6,8,10,.92));
}
.row.open .body{display:block}
.row.open{border-color:rgba(255,43,43,.22); box-shadow:var(--shadowB), 0 0 18px rgba(255,43,43,.10);}

.p{
  margin:0;
  color:rgba(255,255,255,.90);
  line-height:1.7;
  font-size:14.5px;
}
.p + .p{margin-top:10px}
.ul{
  margin:10px 0 0 18px;padding:0;
  color:rgba(255,255,255,.82);
  line-height:1.55;
  font-size:13.5px;
}
.ul li{margin:6px 0}

.smallband{
  margin-top:12px;
  padding:9px 10px;
  border-radius:16px;
  border:1px solid rgba(255,255,255,.10);
  background:rgba(0,0,0,.14);
  font-weight:950;
  letter-spacing:.15px;
  color:rgba(255,255,255,.86);
  font-size:13px;
}

.actions{
  display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end;margin-top:12px;
}

/* ===== DOCK ===== */
.dock{
  position:fixed;left:50%;
  bottom:max(10px, env(safe-area-inset-bottom));
  transform:translateX(-50%);
  z-index:220;
  width:min(980px,94vw);
  padding:10px 12px;
  border-radius:22px;
  border:1px solid rgba(255,255,255,.12);
  background:
    radial-gradient(circle at 18% 18%, rgba(255,43,43,.10), transparent 62%),
    radial-gradient(circle at 82% 70%, rgba(90,40,120,.10), transparent 64%),
    linear-gradient(145deg, rgba(10,12,16,.72), rgba(6,8,10,.86));
  backdrop-filter:blur(10px);
  box-shadow:0 18px 60px rgba(0,0,0,.55);
  display:grid;
  grid-template-columns:repeat(4, minmax(0,1fr));
  gap:10px;
}
.dock .btn{width:100%;padding:10px 10px;border-radius:999px;white-space:nowrap}
@media (max-width:520px){
  :root{--dockH:132px;--fsH:27px;--fsP:14.25px}
  .dock{grid-template-columns:repeat(3, minmax(0,1fr))}
  .title{font-size:15.75px}
}
</style>
</head>

<body>

<div class="top" aria-label="Top controls">
  <div class="left">
    <a class="btn" id="btnDoor" href="/door/" data-route="/door/">DOOR</a>
    <a class="btn" id="btnPrelude" href="/prelude/" data-route="/prelude/">PRELUDE</a>
    <a class="btn" id="btnHome" href="/home/" data-route="/home/">HOME</a>
  </div>
  <div class="right" aria-label="Language">
    <button class="btn" id="btnEN" type="button">EN</button>
    <button class="btn" id="btnZH" type="button">中文</button>
    <button class="btn" id="btnES" type="button">ES</button>
  </div>
</div>

<div class="page">

  <div class="backdrop" aria-hidden="true"></div>

  <div class="header" aria-label="Header">
    <p class="k" id="hk">LAWS</p>
    <h1 class="t" id="ht">THE RULES THAT KEEP BIG IDEAS HONEST</h1>
    <p class="s" id="hs"></p>
    <div class="rule" id="ruleTop"></div>
    <div class="fine" id="fine"></div>

      <div class="pills">
        <button class="pill" id="pillInformal" type="button">INFORMAL</button>
        <button class="pill" id="pillFormal" type="button">FORMAL</button>

        <button class="pill dim" id="pillEngineering" type="button">ENGINEERING</button>
      </div>
      <div class="pills">
        <span class="lensState" id="lensState">—</span>
      </div>

  <div class="band" id="band">CANONICAL LAWS (7)</div>

</div>

<nav class="dock" aria-label="Bottom navigation">
  <a class="btn" id="dockIndex" href="/index.html" data-route="/index.html">COMPASS</a>
  <a class="btn" id="dockExplore" href="/explore/" data-route="/explore/">EXPLORE</a>
  <a class="btn" id="dockProducts" href="/products/" data-route="/products/">PRODUCTS</a>
  <a class="btn" id="dockGauges" href="/gauges/" data-route="/gauges/">GAUGES</a>
</nav>

<script>
(function(){
  "use strict";

  // ===== canonical state (NO NEW gd_* KEYS) =====
  var qs=new URLSearchParams(location.search);
  var LS=window.localStorage;

  var lang  = qs.get("lang")  || LS.getItem("gd_lang")  || "en";
  var style = qs.get("style") || LS.getItem("gd_style") || "informal";
  var time  = qs.get("time")  || LS.getItem("gd_time")  || "now";
  var depth = qs.get("depth") || LS.getItem("gd_depth") || "explore";

  if(lang!=="en" && lang!=="zh" && lang!=="es") lang="en";
  if(style!=="formal" && style!=="informal") style="informal";
  if(time!=="origin" && time!=="now" && time!=="post") time="now";
  if(depth!=="explore" && depth!=="learn") depth="explore";

  try{
    LS.setItem("gd_lang",lang);
    LS.setItem("gd_style",style);
    LS.setItem("gd_time",time);
    LS.setItem("gd_depth",depth);
  }catch(e){}

  document.documentElement.lang=(lang==="zh")?"zh":(lang==="es")?"es":"en";

  function q(over){
    var L=(over&&over.lang)?over.lang:lang;
    var S=(over&&over.style)?over.style:style;
    var T=(over&&over.time)?over.time:time;
    var D=(over&&over.depth)?over.depth:depth;
    return "?lang="+encodeURIComponent(L)+
           "&style="+encodeURIComponent(S)+
           "&time="+encodeURIComponent(T)+
           "&depth="+encodeURIComponent(D);
  }

  // ===== lens mapping (4 lenses using existing keys only) =====
  function lensKey(){
    if(style==="formal" && depth==="learn") return "engineering";
    if(style==="informal" && depth==="learn") return "platform";
    if(style==="formal") return "formal";
    return "informal";
  }

  function setLens(k){
    if(k==="engineering"){ style="formal"; depth="learn"; }
    else if(k==="platform"){ style="informal"; depth="learn"; }
    else if(k==="formal"){ style="formal"; depth="explore"; }
    else { style="informal"; depth="explore"; }

    try{
      LS.setItem("gd_style",style);
      LS.setItem("gd_depth",depth);
    }catch(e){}

    window.location.href = window.location.pathname + q();
  }

  // ===== wire all links with full state carry =====
  function wireAll(){
    var nodes=document.querySelectorAll("[data-route]");
    for(var i=0;i<nodes.length;i++){
      var el=nodes[i];
      var route=el.getAttribute("data-route")||"";
      if(!route) continue;

      if(route.indexOf("?")!==-1){
        try{
          var u=new URL(route, location.origin);
          var sp=u.searchParams;
          if(!sp.get("lang")) sp.set("lang", lang);
          if(!sp.get("style")) sp.set("style", style);
          if(!sp.get("time")) sp.set("time", time);
          if(!sp.get("depth")) sp.set("depth", depth);
          el.setAttribute("href", u.pathname + "?" + sp.toString() + (u.hash||""));
        }catch(e){
          el.setAttribute("href", route);
        }
      }else{
        el.setAttribute("href", route + q());
      }
    }
  }

  // ===== language toggle (reload same path) =====
  function setLang(next){
    if(next!=="en" && next!=="zh" && next!=="es") next="en";
    lang=next;
    try{ LS.setItem("gd_lang",lang); }catch(e){}
    window.location.href = window.location.pathname + q({lang:lang});
  }

  var btnEN=document.getElementById("btnEN");
  var btnZH=document.getElementById("btnZH");
  var btnES=document.getElementById("btnES");
  if(btnEN) btnEN.addEventListener("click", function(){ setLang("en"); }, {passive:true});
  if(btnZH) btnZH.addEventListener("click", function(){ setLang("zh"); }, {passive:true});
  if(btnES) btnES.addEventListener("click", function(){ setLang("es"); }, {passive:true});

  // ===== lens buttons =====
  var pillInformal=document.getElementById("pillInformal");
  var pillFormal=document.getElementById("pillFormal");
  var pillPlatform=document.getElementById("pillPlatform");
  var pillEngineering=document.getElementById("pillEngineering");

  // ===== COPY PACKS =====
  function P(en,zh,es){ return {en:en, zh:zh, es:es}; }
  function pick(o){ return (lang==="zh")?o.zh:(lang==="es")?(o.es||o.en):o.en; }

  var HEAD = {
    en:{
      hs:"What’s the loudest claim you can make without lying? These laws keep every big idea support-bounded so curiosity can scale without collapsing into hype.",
      rule:"Rule: big ideas are welcome. Unbounded claims are not. Upgrades require receipts. Corrections create a new epoch.",
      fine:"Lens meaning: Informal = TED clarity. Formal = spec language. Platform = navigation contracts. Engineering = boundary-first constraints."
    },
    zh:{
      hs:"你能说出的最大主张，却又不会撒谎，是什么？这些法则把一切大想法锁在“可支撑边界”内，让好奇心可以扩张而不会坍塌成噱头。",
      rule:"规则：欢迎大想法；不允许无界主张。升级需要收据；修正会开启新纪元。",
      fine:"透镜含义：通俗=TED式清晰；正式=规格语言；平台=导航契约；工程=边界优先约束。"
    },
    es:{
      hs:"¿Cuál es la afirmación más grande que puedes hacer sin mentir? Estas leyes mantienen las ideas acotadas por soporte para que la curiosidad escale sin hype.",
      rule:"Regla: se permiten ideas grandes. No se permiten afirmaciones sin límites. Mejoras requieren recibos. Correcciones crean nueva época.",
      fine:"Significado: Informal = claridad TED. Formal = especificación. Plataforma = contratos de navegación. Ingeniería = límites/constraints."
    }
  };

  // 7 laws (full content preserved)
  var LAWS = [
    {
      c:"#ff2b2b",
      t:P("Coherence Constraint Law","一致性约束法则","Ley de Restricción de Coherencia"),
      s:P("External trust cannot exceed internal self-consistency under the same evidence.","同证据下：外部信任不可能超过内部自洽。","La confianza externa no puede exceder la consistencia interna con la misma evidencia."),
      blocks:{
        informal:{p:[
          "If words and actions don’t match, pressure exposes it. Coherence is the measurable gap between what you say, what you do, and what happens next.",
          "This law is the gravity behind the stack: mismatch amplifies under scale."
        ],ul:["Mismatch grows when you scale.","Confusion accelerates instability once present.","Contain first when mismatch rises."],bind:"Binds to: Diagnostic · Laws · Gauges."},
        formal:{p:[
          "Coherence is bounded by preservation of declared invariants under declared measurement rules. External trust/honesty/respect cannot exceed internal consistency under identical scope/evidence.",
          "Fragmentation is value/action/outcome mismatch. Corrections require new epoch."
        ],ul:["Deterministic admissibility under fixed inputs.","No intent inference; observed behavior only.","Correction ⇒ epoch rollover."],bind:"Binds to: observer-invariant evaluation · receipts."},
        platform:{p:[
          "Platform posture: the UI must route users to the next clean step without semantic drift. One tap → one outcome, with state preserved.",
          "If a page can be misread, it will be misread. This law forces honest navigation."
        ],ul:["Stable labels across pages.","State carry mandatory.","No hidden remaps."],bind:"Binds to: routing contracts."},
        engineering:{p:[
          "Engineering posture: coherence is a constraint boundary. Admissibility holds only if invariants are preserved across transitions under declared evidence.",
          "Containment prevents cascade under correlated exposure."
        ],ul:["Explicit invariants.","Rollback discipline.","Correlation dominates risk at scale."],bind:"Binds to: containment protocols."}
      }
    },
    {
      c:"#c9a24a",
      t:P("Non-Contradiction Law","不矛盾法则","Ley de No-Contradicción"),
      s:P("Same scope + same receipts cannot produce two different truths.","同范围同收据不可能产出两种相反结论。","Mismo alcance + mismos recibos no pueden producir dos verdades distintas."),
      blocks:{
        informal:{p:[
          "If two people see the same receipts and disagree, the scope or rules are different. Otherwise the system is broken.",
          "This law turns ‘debate’ into structure: scope, receipts, or rule version."
        ],ul:["Disagreement ⇒ check scope.","Then check missing receipts.","Then check rule version."],bind:"Binds to: replayable receipts."},
        formal:{p:[
          "Within fixed scope and fixed measurement rules, outputs must be deterministic. Identical inputs imply identical classification.",
          "Divergence indicates hidden scope mutation, rule ambiguity, or evidence inconsistency."
        ],ul:["Determinism requirement.","No silent scope changes.","No post-hoc semantic swaps."],bind:"Binds to: scope+manifest locks."},
        platform:{p:[
          "Platform posture: the UI must not allow two meanings via two routes. Labels must mean one thing across the site.",
          "State carry + explicit jumps prevent accidental contradictions."
        ],ul:["One meaning per label.","One route per intent.","State preserved on every jump."],bind:"Binds to: navigation contract."},
        engineering:{p:[
          "Engineering posture: classification is a function. If it diverges under identical inputs, the function is inadmissible.",
          "Fix is specification + version bump, not argument."
        ],ul:["Deterministic function.","Inputs include scope+evidence hash.","Fix ⇒ epoch bump."],bind:"Binds to: release discipline."}
      }
    },
    {
      c:"#93c5fd",
      t:P("Scope Precedes Authority","范围先于权力","El Alcance Precede a la Autoridad"),
      s:P("Before you claim, define the map you’re claiming inside.","先定地图，再谈主张。","Antes de afirmar, define el mapa donde afirmas."),
      blocks:{
        informal:{p:[
          "Most bad arguments are missing scope. People debate inside different maps and call it disagreement.",
          "Scope is the fastest honesty tool: it tells you what you can say—and what you must not say yet."
        ],ul:["Define boundaries first.","If scope moves, restart.","No infinite ‘away’ thinking."],bind:"Binds to: the first paragraph on serious pages."},
        formal:{p:[
          "Admissibility requires declared scope: epoch bounds, anchors, lanes, and measurement rules. Scope mutation invalidates conclusions under that scope.",
          "Scope is an input, not rhetoric."
        ],ul:["Scope is part of evidence.","Mutation ⇒ new epoch.","No retroactive widening."],bind:"Binds to: scope declaration schema."},
        platform:{p:[
          "Platform posture: make scope easy. Users should know where they are, what the page does, and what it refuses to do.",
          "Every card ends with a jump to avoid wandering."
        ],ul:["Headers state posture.","Footers state bounds.","Jump points prevent loops."],bind:"Binds to: DOOR/PRELUDE/HUB posture."},
        engineering:{p:[
          "Engineering posture: without explicit scope, metrics are undefined and outputs are garbage. Scope must be machine-checkable.",
          "Undefined scope ⇒ UNDETERMINED output."
        ],ul:["Explicit scope.","Declared measurement rules.","Undefined ⇒ UNDETERMINED."],bind:"Binds to: measurement contracts."}
      }
    },
    {
      c:"#60a5fa",
      t:P("Admissibility Law","可采信法则","Ley de Admisibilidad"),
      s:P("Upgrades require receipts. Missing receipts block escalation.","升级需要收据；缺收据就禁止升级。","Las mejoras requieren recibos; sin recibos no hay escalación."),
      blocks:{
        informal:{p:[
          "This is the anti-hype law. You don’t level up because you feel confident. You level up because receipts exist.",
          "It’s not pessimism. It’s safety—because scale amplifies error."
        ],ul:["Receipts-first.","If missing: hold/contain.","No storytelling upgrades."],bind:"Binds to: every page that implies ‘proof’."},
        formal:{p:[
          "Admissibility is a binary gate under declared scope and rules. Claims may not exceed the evidence stream.",
          "Missing receipts force output to remain NOT MEASURED / UNDETERMINED with reason codes."
        ],ul:["Binary gating.","Reason-coded outputs.","No inference without data."],bind:"Binds to: classifier outputs."},
        platform:{p:[
          "Platform posture: separate lanes so users don’t confuse vision with proof. Vision can be big; Products can be usable; Laws bound meaning; Gauges show signals.",
          "That separation is the UI version of admissibility."
        ],ul:["Keep lanes separate.","Don’t collapse routes.","Every lane has a return."],bind:"Binds to: navigation architecture."},
        engineering:{p:[
          "Engineering posture: gates must be deterministic and non-bypassable. If a gate is bypassable, the system is insecure.",
          "Changes require audit and epoch rollover."
        ],ul:["No bypass paths.","Audit logs for changes.","Epoch bump on correction."],bind:"Binds to: gate design."}
      }
    },
    {
      c:"#34d399",
      t:P("Calibration Authority Law","校准权威法则","Ley de Autoridad de Calibración"),
      s:P("Calibration authority is exclusive. Non-authority input is data only.","校准权威是唯一的；非权威输入只能算数据。","La autoridad de calibración es exclusiva; la entrada no-autorizada es solo dato."),
      blocks:{
        informal:{p:[
          "If everyone can calibrate the ruler, the ruler becomes a weapon. This law protects the instrument from politics.",
          "People can submit data. They can’t redefine the measuring stick without authority."
        ],ul:["Authority is explicit.","Inputs labeled as data.","No crowdsourced ruler."],bind:"Binds to: instrument integrity."},
        formal:{p:[
          "Calibration authority is exclusive by definition. Parameter tuning and rule specification are restricted to the authorized calibrator.",
          "Unauthorized tuning is capture risk and invalidates outputs."
        ],ul:["Authority separation.","No silent tuning.","Capture resistance required."],bind:"Binds to: governance + audit separation."},
        platform:{p:[
          "Platform posture: clearly separate ‘submit evidence’ from ‘change rules.’ The UI must never imply crowds can redefine standards.",
          "That’s why posture labels are explicit."
        ],ul:["Separate data from rules.","Separate feedback from calibration.","Show status plainly."],bind:"Binds to: future admin surfaces."},
        engineering:{p:[
          "Engineering posture: calibration is protected configuration. Threats include unauthorized tuning, silent drift, inconsistent thresholds.",
          "Mitigation: versioned configs, signed releases, audit logs, epoch rollover."
        ],ul:["Signed releases.","Audit logging.","Epoch bump on changes."],bind:"Binds to: release discipline."}
      }
    },
    {
      c:"#a3a3a3",
      t:P("Measurable Stability Law","可测稳定法则","Ley de Estabilidad Medible"),
      s:P("Instability is measurable mismatch that accelerates under scale.","不稳定是可测错配，在规模下加速。","La inestabilidad es desajuste medible que acelera al escalar."),
      blocks:{
        informal:{p:[
          "People say ‘something feels off.’ This law says: great—now measure it. Where is the mismatch? What changed?",
          "Stability is built by making the invisible visible, then fixing the smallest real cause."
        ],ul:["Measure before arguing.","Find mismatch + trend.","Fix smallest real cause."],bind:"Binds to: Dot.Grid + Gauges."},
        formal:{p:[
          "Stability is preserved alignment between declared values, observed actions, and outcomes under fixed scope.",
          "Instability is the divergence vector and its acceleration over a defined window."
        ],ul:["Windowed evaluation.","Trend/acceleration matters.","Ambiguity accelerates propagation."],bind:"Binds to: windowed tests."},
        platform:{p:[
          "Platform posture: translate ‘off’ into ‘here is what changed.’ Route users to the right signal without forcing theory.",
          "Signal-first UX prevents narrative loops."
        ],ul:["Signal-first UX.","Jump to measurement.","Avoid loops."],bind:"Binds to: page contracts."},
        engineering:{p:[
          "Engineering posture: stability requires variance bands, correlation checks, and deterministic rollback paths.",
          "Naming must be locked for comparability."
        ],ul:["Variance bands.","Correlation checks.","Naming lock."],bind:"Binds to: indexing discipline."}
      }
    },
    {
      c:"#f59e0b",
      t:P("Containment Prevents Cascade","隔离阻断级联","La Contención Evita la Cascada"),
      s:P("Keep failure local. Rollback beats collapse.","把失败变小：回滚胜过崩塌。","Mantén el fallo local. Rollback vence al colapso."),
      blocks:{
        informal:{p:[
          "The fastest way to lose everything is to let one failure spread. Containment is intelligence, not fear.",
          "A contained failure becomes a lesson. An uncontained failure becomes a disaster."
        ],ul:["Isolate early.","Rollback fast.","Learn without burning the system."],bind:"Binds to: deployment + operations."},
        formal:{p:[
          "Containment is segmentation plus rollback discipline. It limits blast radius and preserves invariants under fault.",
          "Containment actions must be reason-coded and logged."
        ],ul:["Segmentation.","Rollback discipline.","Reason-coded actions."],bind:"Binds to: resilience engineering."},
        platform:{p:[
          "Platform posture: routes must avoid trap loops. Every page needs a clean exit and a clean return.",
          "Containment is navigation, not just engineering."
        ],ul:["Every open has a return.","Back must not fall through.","No dead ends."],bind:"Binds to: state carry + returns."},
        engineering:{p:[
          "Engineering posture: rollback to last stable receipt state, zone independence, and kill/exit paths are mandatory.",
          "No timer gates. No hidden dependency chains."
        ],ul:["Rollback to stable state.","Zone independence.","Exit paths required."],bind:"Binds to: execution contracts."}
      }
    }
  ];

  // Apply header copy
  var H = HEAD[lang] || HEAD.en;
  document.getElementById("hs").textContent = H.hs;
  document.getElementById("ruleTop").textContent = H.rule;
  document.getElementById("fine").textContent = H.fine;

  // Localize fixed labels
  if(lang==="zh"){
    document.getElementById("hk").textContent="法则";
    document.getElementById("ht").textContent="让大想法保持诚实的规则";
    document.getElementById("band").textContent="规范法则（7）";
    document.getElementById("dockIndex").textContent="索引";
    document.getElementById("dockExplore").textContent="探索";
    document.getElementById("dockProducts").textContent="产品";
    document.getElementById("dockGauges").textContent="量规";
    pillInformal.textContent="通俗";
    pillFormal.textContent="正式";
    pillPlatform.textContent="平台";
    pillEngineering.textContent="工程";
    document.getElementById("btnDoor").textContent="门";
    document.getElementById("btnPrelude").textContent="前奏";
    document.getElementById("btnHome").textContent="主页";
  }else if(lang==="es"){
    document.getElementById("hk").textContent="LEYES";
    document.getElementById("ht").textContent="REGLAS QUE MANTIENEN HONESTAS LAS IDEAS GRANDES";
    document.getElementById("band").textContent="LEYES CANÓNICAS (7)";
    document.getElementById("dockIndex").textContent="BRÚJULA";
    document.getElementById("dockExplore").textContent="EXPLORAR";
    document.getElementById("dockProducts").textContent="PRODUCTOS";
    document.getElementById("dockGauges").textContent="MEDIDORES";
    pillInformal.textContent="INFORMAL";
    pillFormal.textContent="FORMAL";
    pillPlatform.textContent="PLATAFORMA";
    pillEngineering.textContent="INGENIERÍA";
    document.getElementById("btnDoor").textContent="PUERTA";
    document.getElementById("btnPrelude").textContent="PRELUDIO";
    document.getElementById("btnHome").textContent="INICIO";
  }

  // Lens state paint + handlers
  function paintLens(){
    var k=lensKey();
    pillInformal.classList.toggle("active", k==="informal");
    pillFormal.classList.toggle("active", k==="formal");
    pillPlatform.classList.toggle("active", k==="platform");
    pillEngineering.classList.toggle("active", k==="engineering");

    var label =
      (lang==="zh") ? (k==="informal"?"通俗":k==="formal"?"正式":k==="platform"?"平台":"工程") :
      (lang==="es") ? (k==="informal"?"INFORMAL":k==="formal"?"FORMAL":k==="platform"?"PLATAFORMA":"INGENIERÍA") :
      (k==="informal"?"INFORMAL":k==="formal"?"FORMAL":k==="platform"?"PLATFORM":"ENGINEERING");

    document.getElementById("lensState").textContent =
      (lang==="zh") ? ("当前透镜: "+label) :
      (lang==="es") ? ("Lente actual: "+label) :
      ("Current lens: "+label);
  }

  pillInformal.addEventListener("click", function(){ setLens("informal"); }, {passive:true});
  pillFormal.addEventListener("click", function(){ setLens("formal"); }, {passive:true});
  pillPlatform.addEventListener("click", function(){ setLens("platform"); }, {passive:true});
  pillEngineering.addEventListener("click", function(){ setLens("engineering"); }, {passive:true});

  // Render accordion (single-open; tap same closes)
  var list=document.getElementById("list");

  function closeAll(){
    var rows=list.querySelectorAll(".row");
    for(var i=0;i<rows.length;i++){
      rows[i].classList.remove("open");
      var c=rows[i].querySelector(".chev");
      if(c) c.textContent="▸";
    }
  }

  function openWord(){
    return (lang==="zh")?"打开":(lang==="es")?"ABRIR":"OPEN";
  }

  function makeRow(L, idx){
    var row=document.createElement("div");
    row.className="row";
    row.style.setProperty("--c", L.c);

    var head=document.createElement("div");
    head.className="head";
    head.setAttribute("role","button");
    head.setAttribute("tabindex","0");

    var left=document.createElement("div");
    left.className="left";

    var marker=document.createElement("div");
    marker.className="marker";
    var diamond=document.createElement("div");
    diamond.className="diamond";
    diamond.style.background=L.c;
    var bar=document.createElement("div");
    bar.className="bar";
    bar.style.background=L.c;
    marker.appendChild(diamond);
    marker.appendChild(bar);

    var tb=document.createElement("div");
    tb.className="titleBlock";
    var title=document.createElement("div");
    title.className="title";
    title.textContent=pick(L.t);
    var sub=document.createElement("div");
    sub.className="sub";
    sub.textContent=pick(L.s);
    tb.appendChild(title);
    tb.appendChild(sub);

    left.appendChild(marker);
    left.appendChild(tb);

    var chev=document.createElement("div");
    chev.className="chev";
    chev.textContent="▸";

    head.appendChild(left);
    head.appendChild(chev);

    var body=document.createElement("div");
    body.className="body";

    var small=document.createElement("div");
    small.className="smallband";
    small.textContent =
      (lang==="zh") ? ("透镜："+(lensKey()==="informal"?"通俗":lensKey()==="formal"?"正式":lensKey()==="platform"?"平台":"工程")) :
      (lang==="es") ? ("Lente: "+(lensKey()==="informal"?"INFORMAL":lensKey()==="formal"?"FORMAL":lensKey()==="platform"?"PLATAFORMA":"INGENIERÍA")) :
      ("Lens: "+(lensKey()==="informal"?"INFORMAL":lensKey()==="formal"?"FORMAL":lensKey()==="platform"?"PLATFORM":"ENGINEERING"));
    body.appendChild(small);

    var blk = L.blocks[lensKey()] || L.blocks.informal;

    for(var i=0;i<blk.p.length;i++){
      var p=document.createElement("p");
      p.className="p";
      p.textContent=blk.p[i];
      body.appendChild(p);
    }

    if(blk.ul && blk.ul.length){
      var ul=document.createElement("ul");
      ul.className="ul";
      for(var j=0;j<blk.ul.length;j++){
        var li=document.createElement("li");
        li.textContent=blk.ul[j];
        ul.appendChild(li);
      }
      body.appendChild(ul);
    }

    if(blk.bind){
      var bind=document.createElement("p");
      bind.className="p";
      bind.style.opacity=".86";
      bind.textContent=blk.bind;
      body.appendChild(bind);
    }

    var actions=document.createElement("div");
    actions.className="actions";

    var a1=document.createElement("a");
    a1.className="btn";
    a1.textContent=openWord()+": "+(lang==="zh"?"量规":(lang==="es"?"MEDIDORES":"GAUGES"));
    a1.setAttribute("data-route","/gauges/");
    actions.appendChild(a1);

    var a2=document.createElement("a");
    a2.className="btn";
    a2.textContent=openWord()+": "+(lang==="zh"?"产品":(lang==="es"?"PRODUCTOS":"PRODUCTS"));
    a2.setAttribute("data-route","/products/");
    actions.appendChild(a2);

    body.appendChild(actions);

    function toggle(){
      var isOpen=row.classList.contains("open");
      if(isOpen){
        row.classList.remove("open");
        chev.textContent="▸";
        return;
      }
      closeAll();
      row.classList.add("open");
      chev.textContent="▾";
      wireAll();
    }

    head.addEventListener("click", toggle, {passive:true});
    head.addEventListener("keydown", function(e){
      if(e.key==="Enter"||e.key===" "){ e.preventDefault(); toggle(); }
    });

    row.appendChild(head);
    row.appendChild(body);

    if(idx===0){
      row.classList.add("open");
      chev.textContent="▾";
    }

    return row;
  }

  function render(){
    paintLens();
    list.innerHTML="";
    for(var i=0;i<LAWS.length;i++){
      list.appendChild(makeRow(LAWS[i], i));
    }
    wireAll();
  }

  paintLens();
  render();
})();
</script>

</body>
</html>
