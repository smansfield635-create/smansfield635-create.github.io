<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Governed Discovery Platform</title>

<style>
html,body{
margin:0;
padding:0;
background:#04070d;
color:#fff;
font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
overflow-x:hidden;
}

#scene{
position:fixed;
inset:0;
z-index:0;
}

.shell{
position:relative;
z-index:2;
width:min(1200px,90%);
margin:auto;
padding-top:40px;
}

.hero{
background:rgba(10,15,22,.55);
border:1px solid rgba(255,255,255,.12);
border-radius:22px;
padding:30px;
backdrop-filter:blur(16px);
box-shadow:0 30px 80px rgba(0,0,0,.3);
}

h1{
font-size:48px;
margin:0 0 12px;
}

p{
color:rgba(255,255,255,.7);
max-width:650px;
}

button{
margin-top:16px;
padding:12px 20px;
border-radius:12px;
border:1px solid rgba(255,255,255,.2);
background:rgba(255,255,255,.06);
color:white;
font-weight:700;
letter-spacing:.06em;
}

.grid{
margin-top:40px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:14px;
}

.card{
padding:18px;
border-radius:18px;
background:rgba(255,255,255,.04);
border:1px solid rgba(255,255,255,.1);
backdrop-filter:blur(12px);
}
</style>
</head>

<body>

<canvas id="scene"></canvas>

<div class="shell">

<div class="hero">
<h1>Compass aligned entry into the platform</h1>
<p>
This hub preserves the gate order, exposes the directional system,
and mounts the immersive scene behind the host shell.
</p>
<button>Enter Frontier</button>
<button>Read Doctrine</button>
</div>

<div class="grid">

<div class="card"><b>N</b><br>Governance</div>
<div class="card"><b>E</b><br>Finance</div>
<div class="card"><b>S</b><br>Energy</div>
<div class="card"><b>W</b><br>Medical</div>

<div class="card"><b>N★</b><br>Verification</div>
<div class="card"><b>E★</b><br>Software</div>
<div class="card"><b>S★</b><br>Education</div>
<div class="card"><b>W★</b><br>Gauges</div>

</div>

</div>

<script>
const canvas=document.getElementById("scene")
const ctx=canvas.getContext("2d")

function resize(){
canvas.width=window.innerWidth
canvas.height=window.innerHeight
}
resize()
window.addEventListener("resize",resize)

let t=0

function drawCompass(){
let cx=canvas.width/2
let cy=canvas.height*.4
let r=Math.min(canvas.width,canvas.height)*.18

ctx.strokeStyle="rgba(255,255,255,.15)"
ctx.beginPath()
ctx.arc(cx,cy,r,0,Math.PI*2)
ctx.stroke()

ctx.beginPath()
ctx.moveTo(cx-r,cy)
ctx.lineTo(cx+r,cy)
ctx.moveTo(cx,cy-r)
ctx.lineTo(cx,cy+r)
ctx.stroke()

ctx.fillStyle="rgba(255,215,130,.9)"
ctx.font="bold 14px sans-serif"
ctx.textAlign="center"
ctx.fillText("N",cx,cy-r-10)
ctx.fillText("E",cx+r+10,cy)
ctx.fillText("S",cx,cy+r+20)
ctx.fillText("W",cx-r-10,cy)
}

function drawDragon(angle){
let cx=canvas.width/2
let cy=canvas.height*.4
let r=Math.min(canvas.width,canvas.height)*.3

ctx.strokeStyle="rgba(200,220,255,.35)"
ctx.lineWidth=2
ctx.beginPath()

for(let i=0;i<20;i++){
let a=angle-i*.15
let x=cx+Math.cos(a)*r*.9
let y=cy+Math.sin(a)*r*.4
if(i===0)ctx.moveTo(x,y)
else ctx.lineTo(x,y)
}
ctx.stroke()
}

function drawWater(){
let y=canvas.height*.7
ctx.strokeStyle="rgba(160,200,255,.25)"

for(let i=0;i<4;i++){
ctx.beginPath()
for(let x=0;x<canvas.width;x+=10){
let yy=y+i*18+Math.sin(x*.015+t*.02)*6
if(x===0)ctx.moveTo(x,yy)
else ctx.lineTo(x,yy)
}
ctx.stroke()
}
}

function frame(){
ctx.fillStyle="#04070d"
ctx.fillRect(0,0,canvas.width,canvas.height)

drawCompass()
drawDragon(t*.02)
drawDragon(Math.PI+t*.02)
drawWater()

t++
requestAnimationFrame(frame)
}

frame()
</script>

</body>
</html>
