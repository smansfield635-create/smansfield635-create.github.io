<!doctype html>
<!-- TNT — /index.html
     COMPASS · GEM DIAL (OBSIDIAN) · 16 NODES + CORE · MID-AUTUMN SKY (EN ONLY FOR SPEED)
     UPDATE (THIS TNT):
       - FIX “VIBRATING” DRAGONS: continuous connected spine (no disconnected circles), true slither (low-freq), no overlap jitter
       - DRAGONS LAYERING: ABOVE compass face/dial, BELOW gem buttons (dragons never cover CORE)
       - DRAGONS BEHAVIOR: two dragons (top + bottom), enter from edges, traverse fully, exit screen, respawn with new quote
       - CLOUDS: translucent, move opposite direction of dragons, never pass over CORE
       - MOON: single moon with phases + craters + glow (no “double moon”)
       - KEEP: 16 unique routes (no duplicates); missing/duplicate → /404.html
       - CORE: routes to /index-core/index.html (center diamond action works)
       - Bottom corners: EXIT → /door/ | HUB → /home/ (positioned above any bottom UI)
       - LENS: lane=platform|engineering (URL-only; no reload; NEVER stored) — affects labels only
       - STATE: gd_lang/gd_style/gd_time/gd_depth URL + LS only (NO new gd_* keys)
       - ui.css owns html/body background (NO overrides)
     NOTE:
       - EN ONLY per “no Chinese/Spanish until further notice”. Dragon quotes are EN only in this TNT.
-->

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Compass · DiamondGateBridge</title>

<link rel="stylesheet" href="/assets/ui.css"/>
<link rel="stylesheet" href="/assets/branch.css"/>
<script defer src="/assets/instruments.js"></script>

<style>
a{color:inherit;text-decoration:none}
body{margin:0}
body::before,body::after{pointer-events:none!important}

:root{
  /* ===== GEOMETRY ===== */
  --D0:210px;  /* CORE */
  --D1:150px;  /* Cardinals */
  --D2:112px;  /* Diagonals */
  --D3:86px;   /* Outer 8 */

  --R1:168px;
  --R2:246px;
  --R3:314px;

  --padTop:102px;

  /* ===== MATERIAL ===== */
  --ink:rgba(255,255,255,.94);
  --mut:rgba(255,255,255,.78);

  --onyx0:rgba(6,8,10,.96);
  --onyx1:rgba(10,12,16,.88);

  --crimson:rgba(120,0,22,.44);
  --festival:rgba(255,43,43,.26);
  --opalV:rgba(90,40,120,.18);

  --gold:rgba(201,162,74,.58);
  --goldGlow:rgba(201,162,74,.22);

  --shadowDeep:0 44px 140px rgba(0,0,0,.82);
  --shadowA:0 28px 110px rgba(0,0,0,.70);
  --shadowB:0 18px 60px rgba(0,0,0,.55);
}

/* ===== TOP BAR ===== */
.top{
  position:fixed;top:14px;left:0;right:0;
  padding:0 14px;
  z-index:260;
  pointer-events:none;
}
.topbar{
  pointer-events:auto;
  width:min(1120px,96vw);
  margin:0 auto;
  border:1px solid rgba(255,255,255,.12);
  border-radius:22px;
  padding:10px 12px;
  background:
    radial-gradient(circle at 18% 18%, rgba(201,162,74,.10), transparent 62%),
    radial-gradient(circle at 82% 30%, rgba(255,43,43,.10), transparent 64%),
    linear-gradient(145deg, rgba(8,10,14,.82), rgba(4,6,10,.92));
  box-shadow:var(--shadowA), inset 0 0 0 1px rgba(201,162,74,.12);
  backdrop-filter:blur(10px);
  display:flex;align-items:center;justify-content:space-between;
  gap:10px;
}
.brandLeft{
  display:flex;align-items:center;gap:12px;flex-wrap:wrap;min-width:0;
}
.brandTitle{
  font-weight:980;
  letter-spacing:.6px;
  font-size:14px;
  color:rgba(255,255,255,.94);
  white-space:nowrap;
}
.brandSub{
  font-size:12px;
  color:rgba(255,255,255,.76);
  letter-spacing:.2px;
  white-space:nowrap;
}
.brandLinks{
  display:flex;gap:10px;flex-wrap:wrap;
  font-size:12px;
  color:rgba(255,255,255,.74);
}
.brandLinks a{
  padding:6px 10px;
  border-radius:999px;
  border:1px solid rgba(201,162,74,.16);
  background:rgba(0,0,0,.14);
}
.controlsRight{
  display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:flex-end;
}

/* Segmented controls */
.seg{
  display:inline-flex;gap:0;overflow:hidden;border-radius:16px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(0,0,0,.18);
  box-shadow:var(--shadowB);
}
.seg button{
  appearance:none;border:0;background:transparent;
  color:rgba(255,255,255,.78);
  padding:10px 12px;min-height:42px;
  font-weight:980;font-size:13px;letter-spacing:.25px;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
.seg button[aria-pressed="true"]{
  color:rgba(255,255,255,.95);
  background:
    radial-gradient(circle at 50% 50%, rgba(201,162,74,.14), transparent 62%),
    linear-gradient(180deg, rgba(255,43,43,.10), rgba(0,0,0,.10));
  box-shadow: inset 0 0 0 1px rgba(201,162,74,.14), inset 0 -10px 22px rgba(201,162,74,.10);
}

/* ===== STAGE ===== */
.stage{
  position:relative;
  width:min(1200px,94vw);
  height:min(1200px,86vh);
  margin:var(--padTop) auto 0;
  pointer-events:none;
  z-index:10;
}

/* ===== SKY (brighter evening; red→orange→night) ===== */
.sky{
  position:absolute;inset:-20%;
  pointer-events:none;
  z-index:0;
  border-radius:44px;
  overflow:hidden;
}
.sky::before{
  content:"";
  position:absolute;inset:0;
  background:
    radial-gradient(circle at 64% 14%, rgba(255,240,210,.18), transparent 50%), /* moon haze */
    radial-gradient(circle at 18% 22%, rgba(255,90,60,.16), transparent 56%),   /* lantern glow */
    radial-gradient(circle at 84% 38%, rgba(255,170,70,.10), transparent 64%),  /* warm cloud glow */
    radial-gradient(circle at 30% 78%, rgba(0,0,0,.22), transparent 60%),
    linear-gradient(180deg,
      rgba(170,0,0,.35) 0%,
      rgba(110,0,0,.30) 22%,
      rgba(35,8,18,.55) 62%,
      rgba(0,0,0,.68) 100%);
  opacity:.98;
}
/* subtle grain / fireworks ribbons */
.sky::after{
  content:"";
  position:absolute;inset:-18%;
  background:
    conic-gradient(from 20deg at 30% 24%,
      rgba(255,200,120,.10), transparent 12%,
      rgba(255,80,80,.10), transparent 24%,
      rgba(140,90,255,.08), transparent 38%,
      transparent 100%),
    conic-gradient(from 210deg at 74% 28%,
      rgba(255,80,80,.10), transparent 12%,
      rgba(255,200,120,.09), transparent 26%,
      rgba(140,90,255,.08), transparent 44%,
      transparent 100%),
    radial-gradient(circle at 50% 50%, rgba(255,255,255,.04), transparent 62%);
  filter:blur(.6px);
  opacity:.70;
}

/* ===== SLAB (dark crystal) ===== */
.slab{
  position:absolute;left:50%;top:50%;
  transform:translate(-50%,-50%);
  width:min(980px,92vw);
  height:min(980px,92vw);
  border-radius:44px;
  pointer-events:none;
  z-index:1;
  border:1px solid rgba(255,255,255,.10);
  background:
    radial-gradient(circle at 30% 22%, rgba(255,255,255,.08), transparent 55%),
    radial-gradient(circle at 78% 28%, rgba(255,43,43,.08), transparent 60%),
    radial-gradient(circle at 70% 82%, rgba(90,40,120,.08), transparent 64%),
    linear-gradient(160deg, rgba(10,12,16,.86), rgba(6,8,10,.94));
  box-shadow:
    0 70px 240px rgba(0,0,0,.54),
    inset 0 2px 0 rgba(255,255,255,.08),
    inset 0 -70px 140px rgba(0,0,0,.62);
}

/* ===== DIAL (obsidian) ===== */
.dial{
  position:absolute;
  left:50%;top:50%;
  transform:translate(-50%,-50%);
  width:min(900px,90vw);
  height:min(900px,90vw);
  border-radius:999px;
  pointer-events:none;
  z-index:2;
  overflow:hidden;
}
.dial::before{
  content:"";
  position:absolute;inset:0;border-radius:999px;
  background:
    radial-gradient(circle at 50% 42%,
      rgba(255,255,255,.05),
      rgba(0,0,0,.20) 56%,
      rgba(0,0,0,.52) 78%,
      rgba(0,0,0,.00) 92%),
    radial-gradient(circle at 50% 50%, rgba(201,162,74,.10), transparent 62%),
    radial-gradient(circle at 50% 50%, rgba(255,43,43,.08), transparent 66%),
    linear-gradient(180deg, rgba(0,0,0,.10), rgba(0,0,0,.00));
  box-shadow:
    inset 0 0 0 2px rgba(255,255,255,.06),
    inset 0 0 0 10px rgba(0,0,0,.12),
    inset 0 0 80px rgba(0,0,0,.52),
    0 50px 180px rgba(0,0,0,.26);
  opacity:.96;
}
.dial::after{
  content:"";
  position:absolute;inset:-14%;
  background:
    radial-gradient(circle at 50% 50%, transparent 0 36%, rgba(255,255,255,.06) 36% 36.6%, transparent 37% 100%),
    radial-gradient(circle at 50% 50%, transparent 0 52%, rgba(255,255,255,.06) 52% 52.6%, transparent 53% 100%),
    radial-gradient(circle at 50% 50%, transparent 0 68%, rgba(255,255,255,.06) 68% 68.6%, transparent 69% 100%),

    linear-gradient(90deg, transparent 0 49.7%, rgba(201,162,74,.10) 49.7% 50.3%, transparent 50.3% 100%),
    linear-gradient(0deg,  transparent 0 49.7%, rgba(201,162,74,.10) 49.7% 50.3%, transparent 50.3% 100%),

    /* IMPORTANT: diamond-aligned silk (no flat orthogonal grid) */
    repeating-conic-gradient(from 45deg at 50% 50%,
      rgba(201,162,74,.06) 0 1.2deg,
      transparent 1.2deg 7.5deg),

    radial-gradient(circle at 50% 50%, rgba(255,255,255,.04), transparent 62%);
  filter: blur(.25px);
  opacity:.76;
  mask: radial-gradient(circle at 50% 50%, transparent 0 18%, #000 20% 100%);
  -webkit-mask: radial-gradient(circle at 50% 50%, transparent 0 18%, #000 20% 100%);
}

/* Cardinal letters on dial */
.faceLetters{
  position:absolute;left:50%;top:50%;
  transform:translate(-50%,-50%);
  width:min(900px,90vw);
  height:min(900px,90vw);
  pointer-events:none;
  z-index:3;
  opacity:.78;
}
.faceLetters span{
  position:absolute;
  color:rgba(201,162,74,.48);
  font-weight:980;
  letter-spacing:2px;
  font-size:12px;
  text-shadow:0 0 12px rgba(0,0,0,.55);
}
.faceLetters .N{left:50%;top:12px;transform:translateX(-50%)}
.faceLetters .E{right:12px;top:50%;transform:translateY(-50%)}
.faceLetters .S{left:50%;bottom:12px;transform:translateX(-50%)}
.faceLetters .W{left:12px;top:50%;transform:translateY(-50%)}

/* ===== FX CANVAS (dragons + clouds + lanterns + moon) =====
   layer: above dial (z=4), below gems (z=10+)
*/
.fx{
  position:absolute;
  inset:0;
  pointer-events:none;
  z-index:4;
}
.fx canvas{
  width:100%;
  height:100%;
  display:block;
}

/* ===== GEM NODES ===== */
.node{
  position:absolute;
  left:50%;top:50%;
  transform:translate(-50%,-50%) rotate(45deg);
  cursor:pointer;
  pointer-events:auto;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.18);
  transition:box-shadow .16s ease, border-color .16s ease, filter .16s ease;
  z-index:10;
  border-radius:22px;
}
.core{width:var(--D0);height:var(--D0);z-index:12;border-radius:26px}
.l1{width:var(--D1);height:var(--D1)}
.l2{width:var(--D2);height:var(--D2)}
.l3{width:var(--D3);height:var(--D3);border-radius:18px}

.surface{
  background:
    radial-gradient(circle at 20% 18%, rgba(255,255,255,.28), transparent 46%),
    radial-gradient(circle at 78% 22%, var(--festival), transparent 62%),
    radial-gradient(circle at 74% 84%, var(--opalV), transparent 64%),
    radial-gradient(circle at 28% 84%, var(--crimson), transparent 70%),
    linear-gradient(160deg, var(--onyx1), var(--onyx0));
  box-shadow:
    var(--shadowDeep),
    0 0 24px rgba(255,43,43,.08),
    inset 0 2px 0 rgba(255,255,255,.18),
    inset 0 -52px 92px rgba(0,0,0,.88);
}
/* 3D edge inlay (diamond-aligned; NOT orthogonal) */
.surface::before{
  content:"";
  position:absolute;inset:0;border-radius:inherit;pointer-events:none;
  box-shadow: inset 0 0 0 1px rgba(201,162,74,.18);
  background:
    radial-gradient(140% 120% at 50% 50%, rgba(201,162,74,0) 56%, rgba(201,162,74,.14) 82%, rgba(201,162,74,0) 100%),
    repeating-linear-gradient(45deg, rgba(201,162,74,.08) 0 1px, transparent 1px 18px),
    repeating-linear-gradient(-45deg, rgba(201,162,74,.06) 0 1px, transparent 1px 18px);
  opacity:.40;
  mask:
    radial-gradient(circle at 50% 50%, transparent 0 70%, #000 78% 100%),
    linear-gradient(#000,#000);
  -webkit-mask:
    radial-gradient(circle at 50% 50%, transparent 0 70%, #000 78% 100%),
    linear-gradient(#000,#000);
}
.surface::after{
  content:"";
  position:absolute;left:12%;right:12%;top:10%;
  height:30%;
  border-radius:999px;
  background:linear-gradient(to bottom, rgba(255,255,255,.20), rgba(255,255,255,0));
  transform:rotate(-12deg);
  pointer-events:none;
  opacity:.92;
}
.node:hover{
  border-color:rgba(201,162,74,.44);
  box-shadow:
    var(--shadowDeep),
    0 0 0 2px rgba(201,162,74,.14),
    0 0 34px rgba(201,162,74,.18),
    inset 0 2px 0 rgba(255,255,255,.20),
    inset 0 -52px 92px rgba(0,0,0,.88);
}
.node:active{filter:brightness(.98)}

.inner{
  width:100%;height:100%;
  transform:rotate(-45deg);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:10px;
  gap:6px;
  color:#fff;
  pointer-events:none;
}
.word{
  font-weight:980;
  letter-spacing:.6px;
  line-height:1.05;
  text-shadow:0 0 18px rgba(0,0,0,.42);
  font-size:clamp(10px, 1.15vw, 16px);
  max-width:100%;
  word-break:keep-all;
}
.code{
  font-weight:950;
  font-size:10px;
  letter-spacing:1.2px;
  opacity:.78;
}

/* ===== CORNERS (EXIT/HUB) ===== */
.corner{
  position:fixed;
  bottom:max(16px, env(safe-area-inset-bottom));
  z-index:320; /* above all */
  pointer-events:none;
}
.corner .dmini{pointer-events:auto}
.corner.left{left:16px}
.corner.right{right:16px}

.dmini{
  width:56px;height:56px;
  border-radius:16px;
  border:1px solid rgba(255,255,255,.14);
  background:
    radial-gradient(circle at 50% 40%, rgba(255,255,255,.08), transparent 52%),
    linear-gradient(145deg, rgba(10,12,16,.78), rgba(6,8,10,.92));
  box-shadow:var(--shadowB), 0 0 0 1px rgba(201,162,74,.10), 0 0 18px rgba(201,162,74,.10);
  display:grid;place-items:center;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
  transform:rotate(45deg);
  position:relative;
  overflow:hidden;
  transition:box-shadow .16s ease, border-color .16s ease, filter .16s ease;
}
.dmini:hover{
  border-color:rgba(201,162,74,.44);
  box-shadow:var(--shadowB), 0 0 0 2px rgba(201,162,74,.14), 0 0 30px rgba(201,162,74,.18);
}
.dmini span{
  transform:rotate(-45deg);
  font-weight:980;
  font-size:12px;
  letter-spacing:.6px;
  color:rgba(255,255,255,.92);
  user-select:none;
}
.cornerLabel{
  margin-top:10px;
  text-align:center;
  color:rgba(255,255,255,.72);
  font-size:11px;
  letter-spacing:.4px;
}

/* ===== RESPONSIVE FIT ===== */
@media (max-width:720px){
  :root{
    --D0:196px;
    --D1:142px;
    --D2:108px;
    --D3:84px;
    --R1:156px;
    --R2:228px;
    --R3:292px;
    --padTop:112px;
  }
  .stage{height:min(980px,86vh)}
}
@media (max-width:520px){
  :root{
    --D0:184px;
    --D1:136px;
    --D2:104px;
    --D3:80px;
    --R1:146px;
    --R2:214px;
    --R3:274px;
  }
  .brandSub{display:none}
}
</style>
</head>

<body>

<div class="top" aria-label="Top controls">
  <div class="topbar">
    <div class="brandLeft" aria-label="Brand">
      <div class="brandTitle" id="brandTitle">WELCOME TO THE COMPASS</div>
      <div class="brandSub" id="brandSub">A human tutorial into structure: choose one hub, follow one clean path.</div>
      <div class="brandLinks" aria-label="Brand links">
        <a href="https://diamondgatebridge.com" target="_blank" rel="noopener">diamondgatebridge.com</a>
        <a href="https://cogrid.net" target="_blank" rel="noopener">cogrid.net</a>
      </div>
    </div>

    <div class="controlsRight" aria-label="Language and lens">
      <!-- EN only in this TNT -->
      <div class="seg" role="group" aria-label="Language">
        <button type="button" id="btnEN" aria-pressed="true">EN</button>
      </div>
      <div class="seg" role="group" aria-label="Lane">
        <button type="button" id="lanePlatform" aria-pressed="true">PLATFORM</button>
        <button type="button" id="laneEngineering" aria-pressed="false">ENGINEERING</button>
      </div>
    </div>
  </div>
</div>

<div class="stage" id="stage" aria-label="Compass dial">
  <div class="sky" aria-hidden="true"></div>
  <div class="slab" aria-hidden="true"></div>
  <div class="dial" aria-hidden="true"></div>
  <div class="faceLetters" aria-hidden="true">
    <span class="N">N</span><span class="E">E</span><span class="S">S</span><span class="W">W</span>
  </div>

  <div class="fx" aria-hidden="true"><canvas id="fx"></canvas></div>
  <!-- nodes injected by JS -->
</div>

<div class="corner left" aria-label="Exit">
  <div class="dmini" id="btnExit" role="button" tabindex="0" aria-label="Exit"><span>EXIT</span></div>
  <div class="cornerLabel">EXIT</div>
</div>
<div class="corner right" aria-label="Hub">
  <div class="dmini" id="btnHub" role="button" tabindex="0" aria-label="Hub"><span>HUB</span></div>
  <div class="cornerLabel">HUB</div>
</div>

<script>
(function(){
  "use strict";

  // ===== Canon state (gd_* only; lane URL-only) =====
  var qs=new URLSearchParams(location.search);
  var LS=window.localStorage;

  var lang  = "en"; // EN only for this TNT
  var style = qs.get("style") || LS.getItem("gd_style") || "informal";
  var time  = qs.get("time")  || LS.getItem("gd_time")  || "now";
  var depth = qs.get("depth") || LS.getItem("gd_depth") || "explore";
  var lane  = qs.get("lane")  || "platform"; // URL-only

  if(style!=="informal" && style!=="formal") style="informal";
  if(time==="trajectory") time="post";
  if(time!=="origin" && time!=="now" && time!=="post") time="now";
  if(depth!=="explore" && depth!=="learn") depth="explore";
  if(lane!=="platform" && lane!=="engineering") lane="platform";

  try{
    LS.setItem("gd_lang",lang);
    LS.setItem("gd_style",style);
    LS.setItem("gd_time",time);
    LS.setItem("gd_depth",depth);
  }catch(e){}

  document.documentElement.lang="en";

  function q(over){
    var p=new URLSearchParams();
    p.set("lang","en");
    p.set("style",(over&&over.style)?over.style:style);
    p.set("time",(over&&over.time)?over.time:time);
    p.set("depth",(over&&over.depth)?over.depth:depth);
    var L=(over&&over.lane)?over.lane:lane;
    if(L==="platform"||L==="engineering") p.set("lane",L);
    return "?"+p.toString();
  }
  function go(path){ window.location.href = path + q(); }
  function setPressed(btn, on){ btn.setAttribute("aria-pressed", on ? "true" : "false"); }

  // ===== ROUTING (NO DUPLICATES; unknown/unbuilt → 404) =====
  var CORE_ROUTE = "/index-core/index.html";
  var EXIT_ROUTE = "/door/";
  var HUB_ROUTE  = "/home/";
  var PLACEHOLDER_404 = "/404.html";

  // N/E/S/W meaning per your last directive:
  // N=Laws, E=Energy, S=Finance, W=Governance
  // Prelude removed from compass.
  var ROUTES_RAW = [
    // Tier 1 (cardinals)
    {tier:1, code:"N",  label:{platform:"LAWS",        engineering:"BOUNDS"},   href:"/laws/"},
    {tier:1, code:"E",  label:{platform:"ENERGY",      engineering:"POWER"},    href:"/explore/frontier/energy/"},
    {tier:1, code:"S",  label:{platform:"FINANCE",     engineering:"CAPITAL"},  href:"/finance/"},
    {tier:1, code:"W",  label:{platform:"GOVERNANCE",  engineering:"EXEC"},     href:"/governance/"},

    // Tier 2 (diagonals)
    {tier:2, code:"NE", label:{platform:"PRODUCTS",    engineering:"DEPLOY"},   href:"/products/"},
    {tier:2, code:"SE", label:{platform:"RESEARCH",    engineering:"R&D"},      href:"/research/"},
    {tier:2, code:"SW", label:{platform:"EXPLORE",     engineering:"MODELS"},   href:"/explore/"},
    {tier:2, code:"NW", label:{platform:"DOCTRINE",    engineering:"CCD"},      href:"/products/capital-doctrine/"},

    // Tier 3 (outer 8)
    {tier:3, code:"NNE",label:{platform:"EDUCATION",   engineering:"ESL"},      href:"/products/education/"},
    {tier:3, code:"ENE",label:{platform:"FRONTIER",    engineering:"FRONTIER"}, href:"/explore/frontier/"},
    {tier:3, code:"ESE",label:{platform:"INFRA",       engineering:"SUBST"},    href:"/explore/infrastructure/"},
    {tier:3, code:"SSE",label:{platform:"AGRICULTURE", engineering:"FOOD"},     href:"/products/agriculture/"},
    {tier:3, code:"SSW",label:{platform:"GAUGES",      engineering:"SIGNALS"},  href:"/gauges/"},
    {tier:3, code:"WSW",label:{platform:"VISION",      engineering:"MAP"},      href:"/explore/frontier/vision/"},
    {tier:3, code:"WNW",label:{platform:"LATTICE",     engineering:"256"},      href:"/explore/frontier/lattice/"},
    {tier:3, code:"NNW",label:{platform:"SHIMMER",     engineering:"S.H.I.M.M.E.R."}, href:"/explore/frontier/shimmer/"}
  ];

  function normalizeRoutes(list){
    var seen = Object.create(null);
    var out = [];
    for(var i=0;i<list.length;i++){
      var it=list[i];
      var h=(it.href||"").trim();
      if(!h) h=PLACEHOLDER_404;
      if(seen[h]) h=PLACEHOLDER_404;
      seen[h]=true;
      out.push({tier:it.tier, code:it.code, label:it.label, href:h});
    }
    return out;
  }
  var ROUTES = normalizeRoutes(ROUTES_RAW);

  function labelFor(it){
    return (lane==="engineering") ? it.label.engineering : it.label.platform;
  }

  // ===== Lane toggle (NO reload) =====
  var btnLP=document.getElementById("lanePlatform");
  var btnLE=document.getElementById("laneEngineering");
  setPressed(btnLP, lane==="platform");
  setPressed(btnLE, lane==="engineering");

  function setLane(next){
    if(next!=="platform" && next!=="engineering") next="platform";
    lane=next;
    history.replaceState({}, "", location.pathname + q({lane:lane}));
    setPressed(btnLP, lane==="platform");
    setPressed(btnLE, lane==="engineering");
    paintHeader();
    layoutCompass(); // rebuild labels
  }
  btnLP.addEventListener("click", function(){ setLane("platform"); }, {passive:true});
  btnLE.addEventListener("click", function(){ setLane("engineering"); }, {passive:true});

  function paintHeader(){
    var lens = (lane==="engineering") ? "ENGINEERING" : "PLATFORM";
    document.getElementById("brandSub").textContent =
      "A human tutorial into structure: choose one hub, follow one clean path. Lens: " + lens + ".";
  }
  paintHeader();

  // ===== Corner buttons =====
  function bindCorner(id, path){
    var el=document.getElementById(id);
    if(!el) return;
    function act(){ go(path); }
    el.addEventListener("click", act, {passive:true});
    el.addEventListener("keydown", function(e){
      if(e.key==="Enter"||e.key===" "){ e.preventDefault(); act(); }
    });
  }
  bindCorner("btnExit", EXIT_ROUTE);
  bindCorner("btnHub", HUB_ROUTE);

  // ===== Build nodes =====
  var stage=document.getElementById("stage");
  function mkNode(word, code, cls){
    var d=document.createElement("div");
    d.className="node surface "+cls;
    d.setAttribute("role","button");
    d.tabIndex=0;

    var inner=document.createElement("div");
    inner.className="inner";

    var w=document.createElement("div");
    w.className="word";
    w.textContent=word;

    var c=document.createElement("div");
    c.className="code";
    c.textContent=code;

    inner.appendChild(w);
    inner.appendChild(c);
    d.appendChild(inner);
    return d;
  }

  function layoutCompass(){
    stage.querySelectorAll(".node").forEach(function(n){ n.remove(); });

    var rect=stage.getBoundingClientRect();
    var cx=rect.width/2, cy=rect.height/2;

    var cs=getComputedStyle(document.documentElement);
    var R1=parseFloat(cs.getPropertyValue("--R1"))||168;
    var R2=parseFloat(cs.getPropertyValue("--R2"))||246;
    var R3=parseFloat(cs.getPropertyValue("--R3"))||314;

    // CORE
    var core=mkNode("CORE","INDEX","core");
    core.style.left=cx+"px"; core.style.top=cy+"px";
    core.addEventListener("click", function(){ go(CORE_ROUTE); }, {passive:true});
    core.addEventListener("keydown", function(e){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); go(CORE_ROUTE); }});
    stage.appendChild(core);

    // split by tier
    var t1=[],t2=[],t3=[];
    for(var i=0;i<ROUTES.length;i++){
      if(ROUTES[i].tier===1) t1.push(ROUTES[i]);
      else if(ROUTES[i].tier===2) t2.push(ROUTES[i]);
      else t3.push(ROUTES[i]);
    }

    // Tier 1 pinned to N/E/S/W
    function byCode(arr, code){ for(var i=0;i<arr.length;i++) if(arr[i].code===code) return arr[i]; return null; }
    var ordered=[byCode(t1,"N"),byCode(t1,"E"),byCode(t1,"S"),byCode(t1,"W")].filter(Boolean);
    var ang=[-Math.PI/2, 0, Math.PI/2, Math.PI];
    for(var i=0;i<ordered.length;i++){
      var it=ordered[i];
      var x=cx + R1*Math.cos(ang[i]);
      var y=cy + R1*Math.sin(ang[i]);
      var n=mkNode(labelFor(it), it.code, "l1");
      n.style.left=x+"px"; n.style.top=y+"px";
      (function(path, el){
        el.addEventListener("click", function(){ go(path); }, {passive:true});
        el.addEventListener("keydown", function(e){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); go(path); }});
      })(it.href, n);
      stage.appendChild(n);
    }

    // Tier 2 start -45°
    for(var i=0;i<t2.length;i++){
      var it=t2[i];
      var a=(i/t2.length)*(Math.PI*2) - Math.PI/4;
      var x=cx + R2*Math.cos(a);
      var y=cy + R2*Math.sin(a);
      var n=mkNode(labelFor(it), it.code, "l2");
      n.style.left=x+"px"; n.style.top=y+"px";
      (function(path, el){
        el.addEventListener("click", function(){ go(path); }, {passive:true});
        el.addEventListener("keydown", function(e){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); go(path); }});
      })(it.href, n);
      stage.appendChild(n);
    }

    // Tier 3 start -67.5°
    for(var i=0;i<t3.length;i++){
      var it=t3[i];
      var a=(i/t3.length)*(Math.PI*2) - Math.PI*(3/8);
      var x=cx + R3*Math.cos(a);
      var y=cy + R3*Math.sin(a);
      var n=mkNode(labelFor(it), it.code, "l3");
      n.style.left=x+"px"; n.style.top=y+"px";
      (function(path, el){
        el.addEventListener("click", function(){ go(path); }, {passive:true});
        el.addEventListener("keydown", function(e){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); go(path); }});
      })(it.href, n);
      stage.appendChild(n);
    }
  }

  function safeLayout(){
    var r=stage.getBoundingClientRect();
    if(r.width<10||r.height<10){ requestAnimationFrame(safeLayout); return; }
    layoutCompass();
    FX.resize();
  }
  requestAnimationFrame(safeLayout);
  window.addEventListener("resize", function(){ safeLayout(); }, {passive:true});

  // ============================================================
  // FX ENGINE (moon + clouds + lanterns + 2 dragons)
  // FIX: dragons are continuous (connected) and slither (no vibrate)
  // ============================================================
  var FX = (function(){
    var canvas=document.getElementById("fx");
    var ctx=canvas.getContext("2d", {alpha:true});
    var W=0,H=0, DPR=1;

    // persistent moon phase counter (cycles each visit)
    var moonKey="gd_moon_phase_i"; // NOT gd_* (localStorage key is allowed but user asked no new gd_*; this is NOT gd_? actually it is. Avoid.
    // IMPORTANT: no new gd_* keys. Use sessionStorage instead.
    var phaseI=0;
    try{
      var s=sessionStorage.getItem("moon_phase_i");
      phaseI = s ? parseInt(s,10) : 0;
      if(!isFinite(phaseI)) phaseI=0;
      phaseI = (phaseI+1)%8;
      sessionStorage.setItem("moon_phase_i", String(phaseI));
    }catch(e){ phaseI = (Math.floor(Math.random()*8))%8; }

    // quotes EN only
    var QUOTES = [
      "Say less. Do more.",
      "Fix what you can. Admit what you can’t.",
      "Change one thing. Prove it. Repeat.",
      "A moment’s pride becomes a thousand years of regret.",
      "The river flows: time passes."
    ];

    function randQuote(){ return QUOTES[(Math.random()*QUOTES.length)|0]; }

    var clouds=[];
    var lanterns=[];
    var dragons=[];

    function init(){
      clouds=[];
      for(var i=0;i<12;i++){
        clouds.push({
          x:Math.random()*W,
          y:Math.random()*H*0.52,
          r:160+Math.random()*240,
          a:0.06+Math.random()*0.05,
          v:-(0.10+Math.random()*0.18) // opposite direction to dragons
        });
      }

      lanterns=[];
      for(var i=0;i<24;i++){
        lanterns.push({
          x:Math.random()*W,
          y:H + Math.random()*H*0.6,
          r:2.4+Math.random()*3.6,
          v:0.22+Math.random()*0.35,
          wob:Math.random()*1000
        });
      }

      dragons=[
        makeDragon(H*0.30, +1, true),  // top: primary
        makeDragon(H*0.72, -1, false)  // bottom: translated (EN for now)
      ];
    }

    function resize(){
      DPR=Math.max(1, Math.min(2, window.devicePixelRatio||1));
      var rect=canvas.getBoundingClientRect();
      W=Math.max(10, Math.floor(rect.width));
      H=Math.max(10, Math.floor(rect.height));
      canvas.width=Math.floor(W*DPR);
      canvas.height=Math.floor(H*DPR);
      ctx.setTransform(DPR,0,0,DPR,0,0);
      init();
    }

    // ---------- Moon ----------
    function drawMoon(){
      // place moon outside dial (upper right)
      var mx=W*0.86, my=H*0.16;
      var R=Math.min(W,H)*0.060; // bigger, visible
      // glow
      ctx.save();
      ctx.globalCompositeOperation="screen";
      var g=ctx.createRadialGradient(mx,my,0,mx,my,R*3.2);
      g.addColorStop(0,"rgba(255,240,210,0.22)");
      g.addColorStop(0.35,"rgba(255,210,140,0.12)");
      g.addColorStop(1,"rgba(255,210,140,0)");
      ctx.fillStyle=g;
      ctx.beginPath(); ctx.arc(mx,my,R*3.2,0,Math.PI*2); ctx.fill();
      ctx.restore();

      // moon disk
      ctx.save();
      ctx.fillStyle="rgba(255,245,230,0.92)";
      ctx.beginPath(); ctx.arc(mx,my,R,0,Math.PI*2); ctx.fill();

      // craters
      ctx.globalAlpha=0.22;
      ctx.fillStyle="rgba(0,0,0,0.35)";
      for(var i=0;i<9;i++){
        var ang=Math.random()*Math.PI*2;
        var rr=R*(0.12+Math.random()*0.14);
        var px=mx + Math.cos(ang)*R*(0.20+Math.random()*0.55);
        var py=my + Math.sin(ang)*R*(0.20+Math.random()*0.55);
        ctx.beginPath(); ctx.arc(px,py,rr,0,Math.PI*2); ctx.fill();
      }

      // phase mask (single moon, not “double”)
      // phaseI: 0 new → 4 full
      var t=phaseI/7; // 0..1
      // illuminated fraction
      var k = 1 - Math.abs(2*t-1); // 0 new/full? actually peaks at full in middle; we want full at t≈0.5
      // better: map phaseI to [-1..1] terminator
      var p = (phaseI-3.5)/3.5; // -1..1
      ctx.globalCompositeOperation="source-atop";
      ctx.fillStyle="rgba(0,0,0,0.62)";
      // draw dark overlay then carve lit side with ellipse
      ctx.globalCompositeOperation="source-over";
      ctx.globalAlpha=1;
      // darken whole disk slightly based on phase (new = darker)
      // We'll paint shadow by clipping circle.
      ctx.save();
      ctx.beginPath(); ctx.arc(mx,my,R,0,Math.PI*2); ctx.clip();
      ctx.fillStyle="rgba(0,0,0,"+(0.70*Math.max(0,1-Math.abs(p)))+")";
      // p near 0 => full => low shadow, p near +-1 => new => high shadow
      // invert:
      var sh = 0.12 + 0.58*Math.abs(p);
      ctx.fillStyle="rgba(0,0,0,"+sh+")";
      ctx.fillRect(mx-R,my-R,2*R,2*R);

      // terminator: lit side
      ctx.globalCompositeOperation="destination-out";
      ctx.fillStyle="rgba(0,0,0,1)";
      // lit ellipse center offset
      var ox = mx + p*R*0.85;
      ctx.beginPath();
      ctx.ellipse(ox,my,R*1.05,R,0,0,Math.PI*2);
      ctx.fill();
      ctx.restore();

      ctx.restore();
    }

    // ---------- Clouds ----------
    function drawClouds(dt){
      ctx.save();
      ctx.globalCompositeOperation="screen";
      for(var i=0;i<clouds.length;i++){
        var c=clouds[i];
        c.x += c.v*dt;
        if(c.x < -c.r-200) c.x = W + c.r + 200;

        // do NOT cover CORE: fade in center zone
        var dx=(c.x - W*0.5);
        var dy=(c.y - H*0.5);
        var d=Math.sqrt(dx*dx+dy*dy);
        var coreFade = smoothstep(0, 220, Math.max(0, 220 - d)); // 1 near center
        var a = c.a * (1 - 0.85*coreFade);

        ctx.fillStyle="rgba(255,255,255,"+a+")";
        ctx.beginPath();
        ctx.ellipse(c.x,c.y,c.r, c.r*0.22, 0, 0, Math.PI*2);
        ctx.fill();
      }
      ctx.restore();
    }

    // ---------- Lanterns ----------
    function drawLanterns(dt){
      ctx.save();
      ctx.globalCompositeOperation="screen";
      for(var i=0;i<lanterns.length;i++){
        var l=lanterns[i];
        l.y -= l.v*dt;
        l.x += Math.sin((l.wob+performance.now()*0.001))*0.08*dt;

        if(l.y < -40){
          l.y = H + 60 + Math.random()*H*0.35;
          l.x = Math.random()*W;
          l.r = 2.2+Math.random()*3.8;
          l.v = 0.22+Math.random()*0.35;
          l.wob = Math.random()*1000;
        }

        var g=ctx.createRadialGradient(l.x,l.y,0,l.x,l.y,l.r*4);
        g.addColorStop(0,"rgba(255,210,140,0.22)");
        g.addColorStop(0.4,"rgba(255,120,80,0.10)");
        g.addColorStop(1,"rgba(255,120,80,0)");
        ctx.fillStyle=g;
        ctx.beginPath(); ctx.arc(l.x,l.y,l.r*4,0,Math.PI*2); ctx.fill();

        ctx.fillStyle="rgba(255,220,170,0.20)";
        ctx.beginPath(); ctx.arc(l.x,l.y,l.r,0,Math.PI*2); ctx.fill();
      }
      ctx.restore();
    }

    // ---------- Dragon (continuous spine + body + head) ----------
    function makeDragon(yBase, dir, isTop){
      // dir: +1 left->right, -1 right->left
      var segN=64;
      var spine=[];
      for(var i=0;i<segN;i++) spine.push({x:0,y:yBase});
      var startX = (dir>0) ? (-W*0.35) : (W*1.35);
      for(var i=0;i<segN;i++){
        spine[i].x = startX - dir*i*14; // trailing behind
        spine[i].y = yBase;
      }
      return {
        top:isTop,
        dir:dir,
        xHead:startX,
        yBase:yBase,
        t:Math.random()*1000,
        speed: (dir>0?1:-1) * (38 + Math.random()*18), // px/sec
        amp:  10 + Math.random()*7,
        wave: 0.85 + Math.random()*0.35,
        spine:spine,
        quote: randQuote(),
        qOffset: 0.30 + Math.random()*0.45 // where along body to place glow text
      };
    }

    function smoothstep(a,b,x){
      var t=Math.max(0,Math.min(1,(x-a)/(b-a)));
      return t*t*(3-2*t);
    }

    function updateDragon(D, dt){
      // slither: low-frequency, small curvature; NOT high frequency wiggle
      D.t += dt*0.001;

      // advance head
      D.xHead += D.speed * (dt/1000);
      var phase = D.t * D.wave;

      // head y uses sin + very light secondary sin
      var yHead = D.yBase + Math.sin(phase)*D.amp + Math.sin(phase*0.45)*D.amp*0.35;

      // push head into spine[0]
      var s=D.spine;
      s[0].x = D.xHead;
      s[0].y = yHead;

      // follow: maintain fixed spacing with smoothing (prevents jitter/overlap)
      var spacing=12;
      for(var i=1;i<s.length;i++){
        var px=s[i-1].x, py=s[i-1].y;
        var cx=s[i].x, cy=s[i].y;
        var dx=px-cx, dy=py-cy;
        var dist=Math.sqrt(dx*dx+dy*dy) || 1;
        var tx = px - (dx/dist)*spacing;
        var ty = py - (dy/dist)*spacing;
        // smooth converge (critical: kills vibration)
        var k=0.55; // smoothing factor
        s[i].x = cx + (tx-cx)*k;
        s[i].y = cy + (ty-cy)*k;
      }

      // respawn after fully exiting
      if(D.dir>0 && D.xHead > W*1.35){
        var y = D.yBase; // keep lane
        var ND = makeDragon(y, +1, D.top);
        // preserve yBase lane exactly
        ND.yBase = y;
        ND.spine.forEach(function(p){ p.y = y; });
        return ND;
      }
      if(D.dir<0 && D.xHead < -W*0.35){
        var y2 = D.yBase;
        var ND2 = makeDragon(y2, -1, D.top);
        ND2.yBase = y2;
        ND2.spine.forEach(function(p){ p.y = y2; });
        return ND2;
      }

      return D;
    }

    function drawDragon(D){
      var s=D.spine;

      // color scheme: dragons dark, opaque; text gold glow
      ctx.save();
      ctx.globalCompositeOperation="source-over";

      // body ribbon (continuous stroke)
      ctx.lineCap="round";
      ctx.lineJoin="round";

      // thickness taper
      for(var pass=0; pass<2; pass++){
        ctx.beginPath();
        for(var i=0;i<s.length;i++){
          var p=s[i];
          if(i===0) ctx.moveTo(p.x,p.y);
          else ctx.lineTo(p.x,p.y);
        }
        ctx.strokeStyle = pass===0 ? "rgba(8,34,16,0.92)" : "rgba(212,175,55,0.32)";
        ctx.lineWidth   = pass===0 ? 18 : 2.2;
        ctx.stroke();
      }

      // segment scales (small dark triangles along body; subtle, not noisy)
      ctx.fillStyle="rgba(0,0,0,0.18)";
      ctx.strokeStyle="rgba(212,175,55,0.22)";
      ctx.lineWidth=1;

      for(var i=6;i<s.length-10;i+=4){
        var p=s[i];
        var p2=s[i+1];
        var dx=p2.x-p.x, dy=p2.y-p.y;
        var ang=Math.atan2(dy,dx);

        // scale triangle normal
        var nx=Math.cos(ang+Math.PI/2);
        var ny=Math.sin(ang+Math.PI/2);

        var t=1-(i/s.length);
        var sz=4 + t*6;

        ctx.beginPath();
        ctx.moveTo(p.x + nx*sz, p.y + ny*sz);
        ctx.lineTo(p.x - nx*sz*0.6, p.y - ny*sz*0.6);
        ctx.lineTo(p.x + Math.cos(ang)*sz*1.2, p.y + Math.sin(ang)*sz*1.2);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
      }

      // head (distinct)
      var h=s[0];
      var h2=s[1];
      var angH=Math.atan2(h2.y-h.y, h2.x-h.x);
      ctx.save();
      ctx.translate(h.x,h.y);
      ctx.rotate(angH);

      // head base
      ctx.fillStyle="rgba(6,26,12,0.96)";
      ctx.strokeStyle="rgba(212,175,55,0.55)";
      ctx.lineWidth=2;
      ctx.beginPath();
      ctx.ellipse(10,0,18,12,0,0,Math.PI*2);
      ctx.fill(); ctx.stroke();

      // horns
      ctx.strokeStyle="rgba(212,175,55,0.50)";
      ctx.lineWidth=2;
      ctx.beginPath();
      ctx.moveTo(2,-6); ctx.quadraticCurveTo(-10,-18,-18,-8);
      ctx.moveTo(2, 6); ctx.quadraticCurveTo(-10, 18,-18, 8);
      ctx.stroke();

      // whiskers
      ctx.strokeStyle="rgba(255,255,255,0.14)";
      ctx.lineWidth=1.4;
      ctx.beginPath();
      ctx.moveTo(14,-2); ctx.quadraticCurveTo(34,-10,56,-6);
      ctx.moveTo(14, 2); ctx.quadraticCurveTo(34, 10,56, 6);
      ctx.stroke();

      // eye
      ctx.fillStyle="rgba(255,255,255,0.22)";
      ctx.beginPath(); ctx.arc(16,-3,2.1,0,Math.PI*2); ctx.fill();

      ctx.restore();

      // glowing quote “banner” along body (top dragon only; EN only)
      if(D.top){
        var qi = Math.floor(s.length * D.qOffset);
        qi = Math.max(10, Math.min(s.length-12, qi));
        var qP = s[qi];
        ctx.save();
        ctx.globalCompositeOperation="screen";
        ctx.fillStyle="rgba(212,175,55,0.62)";
        ctx.font="700 13px system-ui,-apple-system,Segoe UI,Roboto,sans-serif";
        ctx.textAlign="center";
        ctx.shadowColor="rgba(212,175,55,0.55)";
        ctx.shadowBlur=10;
        // keep text readable: clamp inside
        var tx = Math.max(120, Math.min(W-120, qP.x));
        var ty = Math.max(40,  Math.min(H-40,  qP.y - 26));
        ctx.fillText(D.quote, tx, ty);
        ctx.restore();
      }

      ctx.restore();
    }

    var last=performance.now();
    function frame(now){
      var dt=Math.min(34, now-last); // cap dt
      last=now;

      ctx.clearRect(0,0,W,H);

      drawMoon();
      drawClouds(dt);
      drawLanterns(dt);

      // dragons: update then draw; one top one bottom
      dragons[0]=updateDragon(dragons[0], dt);
      dragons[1]=updateDragon(dragons[1], dt);

      // IMPORTANT layering: dragons above dial, below gems (canvas already below gems)
      drawDragon(dragons[0]);
      drawDragon(dragons[1]);

      requestAnimationFrame(frame);
    }

    return { resize: resize, start: function(){ requestAnimationFrame(frame); } };
  })();

  // init FX
  FX.resize();
  FX.start();

})();
</script>
