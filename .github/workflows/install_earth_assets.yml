name: Install Earth Assets

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  install-earth-assets:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Create Earth asset directory
        run: |
          mkdir -p assets/earth

      - name: Install image tools
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick file

      - name: Download Earth surface asset
        run: |
          curl -L -f \
            "https://commons.wikimedia.org/wiki/Special:Redirect/file/Land_ocean_ice_2048.jpg" \
            -o assets/earth/earth_surface_2048.jpg

      - name: Download Earth cloud asset
        run: |
          curl -L -f \
            "https://neo.gsfc.nasa.gov/archive/bluemarble/cloud_combined_8192_preview.png" \
            -o /tmp/earth_clouds_source.png

          convert /tmp/earth_clouds_source.png \
            -resize 2048x1024\! \
            assets/earth/earth_clouds_2048.png

      - name: Verify Earth assets
        run: |
          test -s assets/earth/earth_surface_2048.jpg
          test -s assets/earth/earth_clouds_2048.png
          file assets/earth/earth_surface_2048.jpg
          file assets/earth/earth_clouds_2048.png

      - name: Commit Earth assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add assets/earth/earth_surface_2048.jpg assets/earth/earth_clouds_2048.png

          if git diff --cached --quiet; then
            echo "Earth assets already current."
          else
            git commit -m "Install local Earth surface and cloud assets"
            git push
          fi
