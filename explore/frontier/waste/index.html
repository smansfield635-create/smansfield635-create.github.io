<style>

:root{

.btn{

    radial-gradient(circle at 50% 120%, rgba(201,162,74,.16), transparent 64%),

  position:relative;overflow:hidden;
  touch-action:manipulation;
  box-shadow:var(--shadowC);
}
.btn:active{transform:translateY(1px)}
.btn::after{
  content:"";

}
.backdrop::after{

.actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end;margin-top:14px}

/* Dock */
.dock{
  position:fixed;

<body>

<script>
(function(){
  "use strict";

  // ===== Canon state (gd_* only; no new keys) =====
  var qs=new URLSearchParams(location.search);
  var LS=window.localStorage;

  var lang  = qs.get("lang")  || LS.getItem("gd_lang")  || "en";
  var time  = qs.get("time")  || LS.getItem("gd_time")  || "now";
  var lane  = qs.get("lane")  || "platform"; // URL-only

  // Pin informal layer
  var style = "informal";
  var depth = "explore";

  if(lang!=="en" && lang!=="zh" && lang!=="es") lang="en";
  if(time==="trajectory") time="post";
  if(time!=="origin" && time!=="now" && time!=="post") time="now";
  if(lane!=="platform" && lane!=="engineering") lane="platform";

  try{
    LS.setItem("gd_lang",lang);
    LS.setItem("gd_style","informal");
    LS.setItem("gd_time",time);
    LS.setItem("gd_depth","explore");
  }catch(e){}

  document.documentElement.lang=(lang==="zh")?"zh":(lang==="es")?"es":"en";

  function q(over){
    var p=new URLSearchParams();
    p.set("lang",(over&&over.lang)?over.lang:lang);
    p.set("style","informal");
    p.set("time",(over&&over.time)?over.time:time);
    p.set("depth","explore");
    var L=(over&&over.lane)?over.lane:lane;
    if(L==="platform"||L==="engineering") p.set("lane",L);
    return "?"+p.toString();
  }

  function setPressed(ids, activeId){
    for(var i=0;i<ids.length;i++){
      var el=document.getElementById(ids[i]);
      if(!el) continue;
      el.setAttribute("aria-pressed", ids[i]===activeId ? "true" : "false");
    }
  }

  function pick3(en,zh,es){ return (lang==="zh")?zh:(lang==="es")?es:en; }
  function laneLabel(){
    return (lang==="zh") ? (lane==="engineering"?"工程":"平台")
      : (lang==="es") ? (lane==="engineering"?"INGENIERÍA":"PLATAFORMA")
      : (lane==="engineering"?"ENGINEERING":"PLATFORM");
  }
  function openLabel(){ return (lang==="zh")?"打开":(lang==="es")?"ABRIR":"OPEN"; }
  function labConcept(){ return (lang==="zh")?"概念":(lang==="es")?"Concepto":"Concept"; }
  function labBuild(){ return (lang==="zh")?"现在建":(lang==="es")?"Construir ahora":"Build Now"; }
  function labRoadmap(){ return (lang==="zh")?"路线图":(lang==="es")?"Hoja de ruta":"Roadmap"; }

  // Wire all internal links with pinned state (and lane)
  function wireAll(){
    var nodes=document.querySelectorAll("[data-route]");
    for(var i=0;i<nodes.length;i++){
      var el=nodes[i];
      var route=el.getAttribute("data-route")||"";
      if(!route) continue;

      if(route.indexOf("?")!==-1){
        try{
          var u=new URL(route, location.origin);
          var sp=u.searchParams;
          sp.set("lang", lang);
          sp.set("style","informal");
          sp.set("time", time);
          sp.set("depth","explore");
          sp.set("lane", lane);
          el.setAttribute("href", u.pathname + "?" + sp.toString() + (u.hash||""));
        }catch(e){
          el.setAttribute("href", route);
        }
      }else{
        el.setAttribute("href", route + q());
      }
    }
  }

  // ===== Header copy (lane-aware; no tone) =====
  var HEAD={
    en:{
      platform:{
        hs:"What happens when a system cannot see its own waste? Entropy accumulates. Cost hides. Risk compounds. Waste is not garbage — it is misplaced structure.",
        rule:"Rule: stop destroying information. Classify → route → recover. If you can’t classify it, you can’t stabilize it."
      },
      engineering:{
        hs:"Engineering view: waste is an identity + routing problem under constraints. If output streams are unmeasured past disposal, the system cannot learn.",
        rule:"Rule: instrument the stream, preserve identity long enough to extract value, and contain failure modes before scale."
      }
    },
    zh:{
      platform:{
        hs:"当系统看不见自己的废弃物，会发生什么？熵累积，成本隐藏，风险叠加。废弃物不是垃圾——它是错位的结构。",
        rule:"规则：别毁掉信息。分类→路由→回收。不能分类就不能稳定。"
      },
      engineering:{
        hs:"工程视图：废弃物=身份+路由的约束问题。若处置后不再测量输出流，系统就无法学习。",
        rule:"规则：测量流、保留身份以提取价值、在规模化前隔离失效模式。"
      }
    },
    es:{
      platform:{
        hs:"¿Qué ocurre cuando un sistema no ve su propio residuo? La entropía se acumula. El costo se oculta. El riesgo se multiplica. El residuo no es basura: es estructura mal ubicada.",
        rule:"Regla: no destruyas información. Clasificar → rutear → recuperar. Si no puedes clasificar, no puedes estabilizar."
      },
      engineering:{
        hs:"Vista de ingeniería: residuo = identidad + ruteo bajo restricciones. Si los flujos no se miden después de la disposición, el sistema no aprende.",
        rule:"Regla: instrumentar el flujo, conservar identidad para extraer valor y contener modos de fallo antes de escalar."
      }
    }
  };

  // ===== Sections (dense, legible, lane-aware) =====
  var SECTIONS=[
    {
      c:"#ff2b2b",
      t:{en:"THE PROBLEM", zh:"问题", es:"EL PROBLEMA"},
      s:{en:"We move waste out of sight, not out of system.", zh:"我们只是移出视野，不是移出系统。", es:"Movemos el residuo fuera de la vista, no del sistema."},
      platform:{
        intro:{

    },
    {
      c:"#c9a24a",
      t:{en:"STRUCTURAL MAP", zh:"结构映射", es:"MAPA ESTRUCTURAL"},

      },
      engineering:{
        intro:{

          zh:"结构映射=分类本体+路径契约。没有契约，路由就会变成叙事，产率也不可知。",

        },
        roadmap:{
          en:"Roadmap: cross-domain coupling (waste↔energy↔water), correlation exposure checks, and windowed stability evaluation.",
          zh:"路线图：跨域耦合（废↔能↔水）、相关暴露检查、以及窗口稳定性评估。",
          es:"Hoja de ruta: acoplar dominios (residuos↔energía↔agua), chequeos de exposición correlacionada y evaluación por ventanas."
        }
      }

    {
      c:"#a3a3a3",
      t:{en:"FINITE MEASURE", zh:"有限测量", es:"MEDIDA FINITA"},
      s:{en:"If you cannot measure loss, you cannot reduce it.", zh:"无法测量损耗，就无法减少它。", es:"Si no puedes medir pérdida, no puedes reducirla."},
      platform:{
        intro:{
          en:"Measurement is what turns waste from a shame bucket into a control surface. If it’s measured, it can improve.",
          zh:"测量能把废弃物从“羞耻桶”变成“控制面”。能测就能改进。",
          es:"La medición convierte el residuo de cubo de vergüenza a superficie de control. Si se mide, se mejora."
        },
        concept:{
          en:"Concept: use a finite set of labels so the whole system can agree on what’s happening.",
          zh:"概念：用有限标签，让系统对“发生了什么”达成一致。",
          es:"Concepto: usar un conjunto finito de etiquetas para que el sistema acuerde qué ocurre."
        },
        build:{
          en:"Build now: track three numbers: volume in, volume routed, volume lost. Then shrink the loss.",
          zh:"现在建：追三件事：进量、路由量、损耗量。然后把损耗变小。",
          es:"Construir ahora: seguir tres números: volumen entra, volumen ruteado, volumen perdido. Luego reducir pérdida."
        },
        roadmap:{
          en:"Roadmap: publish the dashboard in Gauges; use Laws for boundary language; graduate stable shells into Products.",
          zh:"路线图：在量规发布看板；用法则管理边界语言；稳定壳升级为产品。",
          es:"Hoja de ruta: publicar tablero en Medidores; usar Leyes para límites; subir shells estables a Productos."
        }
      },
      engineering:{
        intro:{
          en:"Finite measure means enumerated states: waste vectors map into state IDs for deterministic classification and drift detection.",
          zh:"有限测量意味着可枚举状态：废弃物向量映射到状态ID，实现确定性分类与漂移检测。",
          es:"Medida finita significa estados enumerados: los vectores de residuos se mapean a IDs para clasificación determinista y detección de deriva."
        },
        concept:{
          en:"Concept: define state variables (composition, moisture, contamination, energy potential) and route under constraints.",
          zh:"概念：定义状态变量（成分、含水、污染、能量潜力），在约束下路由。",
          es:"Concepto: definir variables de estado (composición, humedad, contaminación, potencial energético) y rutear bajo restricciones."
        },
        build:{
          en:"Build now: bind classification outputs to registry entries; enforce non-bypass gates; reason-code every disposition.",
          zh:"现在建：把分类输出绑定到注册表条目；闸门不可绕过；每个处置都必须原因码。",
          es:"Construir ahora: vincular salidas de clasificación al registro; compuertas no bypass; codificar razones en cada disposición."
        },
        roadmap:{
          en:"Roadmap: 256-state sweep compatibility, replayable receipts, and audit exports for regulators and operators.",
          zh:"路线图：256态扫掠兼容、可回放收据、以及面向监管与运营的审计导出。",
          es:"Hoja de ruta: compatibilidad con barrido 256 estados, recibos reproducibles y exports de auditoría para reguladores y operadores."
        }
      }
    }
  ];

  // ===== Accordion state preserved across lane/lang changes =====
  var list=document.getElementById("list");
  var rowRefs=[];
  var openIndex=0;

  function closeAllRows(){
    for(var i=0;i<rowRefs.length;i++){
      rowRefs[i].row.classList.remove("open");
      rowRefs[i].chev.textContent="▸";
    }
  }

  function toggleRow(i){
    var isOpen=rowRefs[i].row.classList.contains("open");
    if(isOpen){
      rowRefs[i].row.classList.remove("open");
      rowRefs[i].chev.textContent="▸";
      return;
    }
    closeAllRows();
    openIndex=i;
    rowRefs[i].row.classList.add("open");
    rowRefs[i].chev.textContent="▾";
  }

  function makeSubBubble(label){
    var b=document.createElement("div");
    b.className="bubble";
    b.setAttribute("role","button");
    b.tabIndex=0;

    var h=document.createElement("h4");
    h.textContent=label;

    var p=document.createElement("p");
    p.textContent="";

    b.appendChild(h);
    b.appendChild(p);

    function act(){ b.classList.toggle("open"); }
    b.addEventListener("click", act, {passive:true});
    b.addEventListener("keydown", function(e){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); act(); }});

    return {wrap:b, p:p};
  }

  function buildRow(item, idx){
    var row=document.createElement("div");
    row.className="row";
    row.style.setProperty("--c", item.c);

    var head=document.createElement("div");
    head.className="head";
    head.setAttribute("role","button");
    head.tabIndex=0;

    var hL=document.createElement("div");
    hL.className="hL";

    var mark=document.createElement("div");
    mark.className="dmark";
    mark.style.background=item.c;

    var tb=document.createElement("div");
    tb.className="titleBlock";

    var title=document.createElement("div");
    title.className="q";

    var sub=document.createElement("div");
    sub.className="sub";

    tb.appendChild(title);
    tb.appendChild(sub);

    hL.appendChild(mark);
    hL.appendChild(tb);

    var chev=document.createElement("div");
    chev.className="chev";
    chev.innerHTML='<span class="chevTxt">▸</span>';

    head.appendChild(hL);
    head.appendChild(chev);

    var body=document.createElement("div");
    body.className="body";

    var intro=document.createElement("p");
    intro.className="pdesc";
    body.appendChild(intro);

    var bubbles=document.createElement("div");
    bubbles.className="subBubbles";

    var b1=makeSubBubble(labConcept());
    var b2=makeSubBubble(labBuild());
    var b3=makeSubBubble(labRoadmap());

    bubbles.appendChild(b1.wrap);
    bubbles.appendChild(b2.wrap);
    bubbles.appendChild(b3.wrap);
    body.appendChild(bubbles);

    var actions=document.createElement("div");
    actions.className="actions";

    var a=document.createElement("a");
    a.className="btn red";
    a.textContent=openLabel()+": "+pick3("OPEN RELATED ROOM","打开关联房间","ABRIR SALA RELACIONADA");
    a.setAttribute("data-route","/explore/frontier/water/");
    actions.appendChild(a);

    body.appendChild(actions);

    function onToggle(){ toggleRow(idx); wireAll(); }
    head.addEventListener("click", onToggle, {passive:true});
    head.addEventListener("keydown", function(e){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); onToggle(); }});

    row.appendChild(head);
    row.appendChild(body);
    list.appendChild(row);

    rowRefs.push({
      row:row,
      chev:row.querySelector(".chevTxt"),
      title:title,
      sub:sub,
      intro:intro,
      b1p:b1.p, b2p:b2.p, b3p:b3.p,
      action:a
    });
  }

  function renderList(){
    list.innerHTML="";
    rowRefs=[];
    for(var i=0;i<SECTIONS.length;i++){
      buildRow(SECTIONS[i], i);
    }
    openIndex=0;
    toggleRow(0);
  }

  function applyHeader(){
    var H=(HEAD[lang]||HEAD.en);
    var lanePack = (lane==="engineering") ? H.engineering : H.platform;

    document.getElementById("hk").textContent = pick3("FRONTIER · WASTE","前沿 · 废弃物","FRONTERA · RESIDUOS");
    document.getElementById("ht").textContent = pick3("WASTE SYSTEMS","废弃物系统","SISTEMAS DE RESIDUOS");
    document.getElementById("hs").textContent = lanePack.hs;
    document.getElementById("rule").textContent = lanePack.rule;

    document.getElementById("band").textContent = pick3("WASTE SECTIONS (OPEN ONE)","废弃物模块（打开一个）","SECCIONES DE RESIDUOS (ABRE UNA)");

    document.getElementById("btnFrontier").textContent = pick3("FRONTIER","前沿","FRONTERA");
    document.getElementById("btnExplore").textContent  = pick3("EXPLORE","探索","EXPLORAR");
    document.getElementById("btnHome").textContent     = pick3("HOME","主页","INICIO");

    document.getElementById("navTrajectory").textContent = pick3("TRAJECTORY","轨迹","TRAYECTORIA");
    document.getElementById("navWater").textContent      = pick3("WATER","水","AGUA");
    document.getElementById("navEnergy").textContent     = pick3("ENERGY","能源","ENERGÍA");
    document.getElementById("navUrban").textContent      = pick3("URBAN OS","城市OS","SO URBANO");

    document.getElementById("lanePlatform").textContent   = pick3("PLATFORM","平台","PLATAFORMA");
    document.getElementById("laneEngineering").textContent= pick3("ENGINEERING","工程","INGENIERÍA");

    document.getElementById("laneState").textContent =
      (lang==="zh") ? ("当前透镜："+laneLabel()) :
      (lang==="es") ? ("Lente actual: "+laneLabel()) :
      ("Current lens: "+laneLabel());

    document.getElementById("langState").textContent =
      (lang==="zh") ? ("语言：中文") :
      (lang==="es") ? ("Idioma: ES") :
      ("Lang: EN");

    setPressed(["langEN","langZH","langES"], lang==="zh"?"langZH":(lang==="es"?"langES":"langEN"));
    setPressed(["lanePlatform","laneEngineering"], lane==="engineering"?"laneEngineering":"lanePlatform");
  }

  function updateRows(){
    var keep=openIndex;

    for(var i=0;i<SECTIONS.length;i++){
      var item=SECTIONS[i];
      var r=rowRefs[i];

      r.title.textContent = (lang==="zh")?item.t.zh:(lang==="es")?(item.t.es||item.t.en):item.t.en;
      r.sub.textContent   = (lang==="zh")?item.s.zh:(lang==="es")?(item.s.es||item.s.en):item.s.en;

      var pack = (lane==="engineering") ? item.engineering : item.platform;

      r.intro.textContent = (lang==="zh")?pack.intro.zh:(lang==="es")?(pack.intro.es||pack.intro.en):pack.intro.en;
      r.b1p.textContent   = (lang==="zh")?pack.concept.zh:(lang==="es")?(pack.concept.es||pack.concept.en):pack.concept.en;
      r.b2p.textContent   = (lang==="zh")?pack.build.zh:(lang==="es")?(pack.build.es||pack.build.en):pack.build.en;
      r.b3p.textContent   = (lang==="zh")?pack.roadmap.zh:(lang==="es")?(pack.roadmap.es||pack.roadmap.en):pack.roadmap.en;

      // Lane-based next step
      var actionRoute = (lane==="engineering") ? "/explore/frontier/energy/" : "/explore/frontier/water/";
      r.action.setAttribute("data-route", actionRoute);
      r.action.textContent = openLabel()+": "+pick3(
        lane==="engineering" ? "ENERGY" : "WATER",
        lane==="engineering" ? "能源" : "水",
        lane==="engineering" ? "ENERGÍA" : "AGUA"
      );
    }

    closeAllRows();
    toggleRow(keep);
    wireAll();
  }

  // ===== No reload on language/lane changes =====
  function setLang(next){
    if(next!=="en" && next!=="zh" && next!=="es") next="en";
    lang=next;
    try{ LS.setItem("gd_lang",lang);}catch(e){}
    history.replaceState({}, "", location.pathname + q({lang:lang}));
    applyHeader();
    updateRows();
  }

  function setLane(next){
    if(next!=="platform" && next!=="engineering") next="platform";
    lane=next;
    history.replaceState({}, "", location.pathname + q({lane:lane}));
    applyHeader();
    updateRows();
  }

  document.getElementById("langEN").addEventListener("click", function(){ setLang("en"); }, {passive:true});
  document.getElementById("langZH").addEventListener("click", function(){ setLang("zh"); }, {passive:true});
  document.getElementById("langES").addEventListener("click", function(){ setLang("es"); }, {passive:true});

  document.getElementById("lanePlatform").addEventListener("click", function(){ setLane("platform"); }, {passive:true});
  document.getElementById("laneEngineering").addEventListener("click", function(){ setLane("engineering"); }, {passive:true});

  // ===== INIT =====
  renderList();
  applyHeader();
  updateRows();
  wireAll();
})();
</script>

</body>
</html>
