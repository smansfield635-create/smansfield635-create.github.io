<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />
  <title>Diamond Gate Bridge — Universe Entry</title>
  <meta
    name="description"
    content="Euclidean universe entry host for Diamond Gate Bridge. Canvas-first runtime with optional inspection panels and boot-failure capture."
  />
  <style>
    :root {
      --bg-0: #020611;
      --bg-1: #071427;
      --bg-2: #10233d;

      --fg: #eef3ff;
      --muted: #a9b8dc;
      --soft: rgba(238, 243, 255, 0.74);

      --line: rgba(255, 255, 255, 0.12);
      --line-strong: rgba(244, 226, 176, 0.22);

      --panel: rgba(5, 11, 24, 0.54);
      --panel-strong: rgba(5, 11, 24, 0.70);

      --gold: rgba(244, 226, 176, 0.96);
      --gold-soft: rgba(244, 226, 176, 0.14);

      --crimson: rgba(120, 0, 22, 0.34);
      --festival: rgba(255, 43, 43, 0.18);
      --opalV: rgba(90, 40, 120, 0.16);
      --blueField: rgba(18, 58, 140, 0.12);

      --shadow: rgba(0, 0, 0, 0.34);
      --hud-blur: 10px;

      --safe-top: env(safe-area-inset-top, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg-0);
      color: var(--fg);
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      min-height: 100vh;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      isolation: isolate;
      background:
        radial-gradient(circle at 50% 42%, rgba(90, 130, 220, 0.05) 0%, rgba(90, 130, 220, 0) 34%),
        linear-gradient(180deg, var(--bg-2) 0%, var(--bg-1) 44%, var(--bg-0) 100%);
    }

    #scene {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      z-index: 1;
      background: transparent;
      touch-action: manipulation;
    }

    #home-ui {
      position: absolute;
      inset: 0;
      z-index: 20;
      pointer-events: none;
      padding-top: var(--safe-top);
      padding-right: var(--safe-right);
      padding-bottom: var(--safe-bottom);
      padding-left: var(--safe-left);
      opacity: 0;
      visibility: hidden;
      transition: opacity 180ms ease, visibility 180ms ease;
    }

    #hud-toggle:checked ~ #home-ui {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    #hud-toggle:checked ~ .universe-note {
      opacity: 0;
    }

    .hud-toggle {
      position: absolute;
      top: calc(14px + var(--safe-top));
      right: calc(14px + var(--safe-right));
      z-index: 30;
      appearance: none;
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 999px;
      background:
        radial-gradient(circle at 50% 120%, rgba(201,162,74,.16), transparent 64%),
        linear-gradient(145deg, rgba(10,12,20,.62), rgba(4,6,10,.78));
      color: var(--fg);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.28);
      padding: 10px 14px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      user-select: none;
      overflow: hidden;
    }

    .hud-toggle::after,
    .chip::after,
    .action::after {
      content: "";
      position: absolute;
      left: 10px;
      right: 10px;
      bottom: -12px;
      height: 28px;
      background: radial-gradient(circle at 50% 0%, rgba(201,162,74,.34), transparent 72%);
      opacity: 0.52;
      pointer-events: none;
    }

    .universe-note {
      position: absolute;
      left: calc(16px + var(--safe-left));
      top: calc(16px + var(--safe-top));
      z-index: 15;
      pointer-events: none;
      color: var(--soft);
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-shadow: 0 2px 10px rgba(0,0,0,0.4);
      max-width: min(420px, calc(100vw - 120px));
      transition: opacity 180ms ease;
    }

    .panel {
      border: 1px solid var(--line);
      background:
        radial-gradient(circle at 14% 18%, rgba(255,43,43,.10), transparent 58%),
        radial-gradient(circle at 84% 24%, rgba(90,40,120,.14), transparent 66%),
        radial-gradient(circle at 64% 24%, rgba(18,58,140,.10), transparent 68%),
        radial-gradient(circle at 26% 22%, rgba(201,162,74,.10), transparent 62%),
        linear-gradient(180deg, var(--panel) 0%, var(--panel-strong) 100%);
      backdrop-filter: blur(var(--hud-blur));
      -webkit-backdrop-filter: blur(var(--hud-blur));
      border-radius: 18px;
      box-shadow: 0 14px 42px var(--shadow);
      position: absolute;
      overflow: hidden;
    }

    .panel::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      box-shadow: inset 0 0 0 1px rgba(201,162,74,.12);
      opacity: 0.55;
      pointer-events: none;
    }

    .title-block {
      top: 18px;
      left: 18px;
      width: min(640px, calc(100vw - 100px));
      padding: 15px 17px;
    }

    .title-block h1 {
      margin: 0 0 8px 0;
      font-size: 18px;
      line-height: 1.08;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .title-block p {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
      letter-spacing: 0.02em;
    }

    .legend {
      top: 18px;
      right: 18px;
      width: min(360px, calc(100vw - 36px));
      padding: 14px 16px;
    }

    .scale-panel {
      right: 18px;
      bottom: 18px;
      width: min(390px, calc(100vw - 36px));
      padding: 14px 16px;
      background:
        radial-gradient(circle at 14% 18%, rgba(255,43,43,.10), transparent 58%),
        radial-gradient(circle at 84% 24%, rgba(90,40,120,.14), transparent 66%),
        radial-gradient(circle at 64% 24%, rgba(18,58,140,.10), transparent 68%),
        linear-gradient(180deg, rgba(5,11,24,.68) 0%, rgba(5,11,24,.78) 100%);
    }

    .status {
      left: 18px;
      bottom: 18px;
      width: min(700px, calc(100vw - 36px));
      padding: 12px 15px;
      font-size: 12px;
      line-height: 1.5;
      color: var(--muted);
      background:
        radial-gradient(circle at 14% 18%, rgba(255,43,43,.08), transparent 58%),
        radial-gradient(circle at 84% 24%, rgba(90,40,120,.10), transparent 66%),
        radial-gradient(circle at 64% 24%, rgba(18,58,140,.08), transparent 68%),
        linear-gradient(180deg, rgba(5,11,24,.28) 0%, rgba(5,11,24,.38) 100%);
    }

    .legend h2,
    .scale-panel h2 {
      margin: 0 0 10px 0;
      font-size: 13px;
      line-height: 1.1;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--gold);
    }

    .legend-row,
    .scale-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 14px;
      margin: 7px 0;
      font-size: 12px;
      line-height: 1.3;
      color: var(--muted);
    }

    .legend-row strong,
    .scale-row strong {
      color: var(--fg);
      font-weight: 700;
      text-align: right;
      flex: 0 0 auto;
      max-width: 56%;
    }

    .status strong {
      color: var(--fg);
      font-weight: 700;
    }

    .inline-divider {
      display: inline-block;
      margin: 0 7px;
      color: rgba(255, 255, 255, 0.22);
    }

    .boot-banner {
      position: absolute;
      top: calc(14px + var(--safe-top));
      left: 50%;
      transform: translateX(-50%);
      z-index: 25;
      min-width: 180px;
      max-width: calc(100vw - 120px);
      padding: 8px 12px;
      border-radius: 999px;
      background:
        radial-gradient(circle at 50% 120%, rgba(201,162,74,.16), transparent 64%),
        linear-gradient(145deg, rgba(10,12,20,.68), rgba(4,6,10,.82));
      border: 1px solid rgba(255,255,255,0.12);
      color: rgba(235,242,255,0.92);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-align: center;
      pointer-events: none;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      box-shadow: 0 10px 30px rgba(0,0,0,0.24);
    }

    #boot-status {
      display: none;
    }

    .boot-fail {
      position: absolute;
      left: 14px;
      right: 14px;
      bottom: calc(14px + var(--safe-bottom));
      z-index: 40;
      display: none;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid rgba(255,120,120,0.28);
      background: rgba(30, 8, 10, 0.90);
      color: rgba(255,235,235,0.96);
      font-size: 12px;
      line-height: 1.45;
      white-space: pre-wrap;
      box-shadow: 0 14px 40px rgba(0,0,0,0.35);
    }

    .boot-fail.is-visible {
      display: block;
    }

    .chip-row,
    .action-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }

    .chip,
    .action {
      min-height: 38px;
      padding: 0 14px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.14);
      background:
        radial-gradient(circle at 50% 120%, rgba(201,162,74,.16), transparent 64%),
        linear-gradient(145deg, rgba(10,12,20,.54), rgba(4,6,10,.70));
      color: #fff;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      box-shadow: 0 10px 30px rgba(0,0,0,0.22);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .action {
      min-height: 42px;
      padding: 0 16px;
      font-size: 12px;
      cursor: pointer;
      pointer-events: auto;
      transition: transform 140ms ease, opacity 140ms ease, border-color 140ms ease;
    }

    .action:hover {
      transform: scale(1.02);
    }

    .action:active {
      transform: scale(0.98);
    }

    .action--strong,
    .chip--strong {
      border-color: var(--line-strong);
      color: #fff3cf;
      box-shadow:
        0 10px 30px rgba(0,0,0,0.22),
        0 0 0 1px rgba(244,226,176,.08),
        0 0 18px rgba(244,226,176,.10);
    }

    @media (max-width: 980px) {
      .legend {
        top: auto;
        bottom: 168px;
      }
    }

    @media (max-width: 760px) {
      .title-block,
      .legend,
      .scale-panel,
      .status {
        left: 14px;
        right: 14px;
        width: auto;
        max-width: none;
      }

      .title-block {
        top: 12px;
      }

      .legend {
        top: auto;
        bottom: 196px;
      }

      .scale-panel {
        bottom: 72px;
      }

      .status {
        bottom: 12px;
      }

      .title-block h1 {
        font-size: 16px;
      }

      .title-block,
      .legend,
      .scale-panel,
      .status {
        padding: 14px 15px;
      }

      .boot-banner {
        max-width: calc(100vw - 140px);
      }
    }

    @media (max-width: 520px) {
      .legend {
        bottom: 236px;
      }

      .legend-row,
      .scale-row {
        gap: 10px;
      }

      .legend-row strong,
      .scale-row strong {
        max-width: 54%;
      }

      .hud-toggle {
        top: auto;
        bottom: calc(14px + var(--safe-bottom));
        right: calc(14px + var(--safe-right));
      }

      .universe-note {
        top: auto;
        bottom: calc(18px + var(--safe-bottom));
        max-width: calc(100vw - 110px);
      }

      .boot-banner {
        top: calc(10px + var(--safe-top));
        max-width: calc(100vw - 140px);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      #home-ui {
        transition: none;
      }

      .action {
        transition: none;
      }
    }
  </style>
</head>
<body>
  <div id="app" data-app-root="true">
    <canvas id="scene" aria-label="Diamond Gate Bridge Universe Entry"></canvas>

    <input id="hud-toggle" type="checkbox" hidden />
    <label for="hud-toggle" class="hud-toggle">Panels</label>

    <div class="boot-banner" id="boot-banner">Euclidean Universe Host</div>

    <div class="universe-note" aria-hidden="true">
      Euclidean-only runtime active. Panels are optional.
    </div>

    <div id="boot-status" aria-live="polite"></div>
    <div id="boot-fail" class="boot-fail" aria-live="polite"></div>
    <div id="home-ui" aria-live="polite"></div>
  </div>

  <script src="/index.js?v=14"></script>
</body>
</html>
