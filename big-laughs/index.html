<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="refresh" content="0; url=/big-laugh/big-laughs/" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Redirecting · Big Laughs Comedy</title>
  <meta
    name="description"
    content="Big Laughs Comedy now lives under the Big Laugh parent chamber."
  />
  <link rel="canonical" href="/big-laugh/big-laughs/" />
  <style>
    :root{
      --bg:#020610;
      --line:rgba(164,188,255,.18);
      --text:#eef4ff;
      --muted:#9aabd0;
      --gold:#efd29a;
      --shadow:0 24px 80px rgba(0,0,0,.50);
    }

    *{box-sizing:border-box}

    body{
      min-height:100vh;
      margin:0;
      display:grid;
      place-items:center;
      color:var(--text);
      font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:
        radial-gradient(circle at 50% 20%, rgba(112,151,255,.22), transparent 24%),
        linear-gradient(180deg,#020610 0%,#071225 52%,#020610 100%);
      padding:20px;
    }

    .card{
      width:min(680px,100%);
      border:1px solid var(--line);
      border-radius:30px;
      padding:28px;
      background:linear-gradient(180deg, rgba(9,17,33,.92), rgba(6,12,24,.86));
      box-shadow:var(--shadow);
    }

    .kicker{
      color:#c8d7ff;
      font-size:.72rem;
      text-transform:uppercase;
      letter-spacing:.16em;
      margin-bottom:10px;
    }

    h1{
      margin:0 0 12px;
      font-size:clamp(2rem,6vw,3.8rem);
      line-height:.96;
      letter-spacing:-.055em;
    }

    h1 span{color:var(--gold)}

    p{
      color:var(--muted);
      line-height:1.58;
      margin:0 0 18px;
    }

    a{
      display:inline-flex;
      min-height:46px;
      align-items:center;
      justify-content:center;
      padding:0 18px;
      border-radius:18px;
      border:1px solid rgba(239,210,154,.34);
      background:linear-gradient(180deg, rgba(239,210,154,.20), rgba(239,210,154,.06));
      color:#fff8ea;
      text-decoration:none;
      font-weight:900;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="kicker">Big Laugh hierarchy updated</div>
    <h1>Big Laughs now lives under <span>Big Laugh</span>.</h1>
    <p>
      The Big Laughs Comedy event page has moved to the Big Laugh parent chamber.
      Redirecting now.
    </p>
    <a href="/big-laugh/big-laughs/">Open Big Laughs Comedy</a>
  </main>
</body>
</html>
