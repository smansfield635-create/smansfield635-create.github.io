<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  >
  <title>Nine Summits World</title>
  <meta
    name="description"
    content="Compressed 256×256 world engine bootstrap shell."
  >
  <link rel="stylesheet" href="./assets/ui.css">
</head>
<body data-diagnostics="peek">
  <div id="app-shell">
    <canvas id="world-canvas" class="world-canvas" aria-label="World canvas"></canvas>

    <div id="hud" class="hud">
      <div id="runtime-banner" class="runtime-banner" aria-live="polite">
        <span id="runtime-phase">BOOT</span>
      </div>

      <div id="debug-panel" class="debug-panel" aria-live="polite">
        <section class="panel-section">
          <h3 class="panel-title">Loading</h3>
          <div class="panel-row">
            <span class="panel-key">State</span>
            <span class="panel-value">Booting application shell…</span>
          </div>
        </section>
      </div>

      <div id="compass-overlay" class="compass-overlay" aria-hidden="true"></div>

      <div id="diagnostics-dock" class="diagnostics-dock">
        <div id="diagnostics-bar" class="diagnostics-bar" aria-live="polite">
          <div id="diagnostics-summary" class="diagnostic-bar__summary">
            <div class="diagnostic-bar__group">
              <span class="diagnostic-pill">
                <span class="diagnostic-pill__label">State</span>
                <span class="diagnostic-pill__value">Booting…</span>
              </span>
            </div>
          </div>

          <button
            id="diagnostics-toggle"
            class="diagnostics-toggle"
            type="button"
            aria-label="Toggle diagnostics"
            aria-expanded="false"
          ></button>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { WORLD_KERNEL } from "./world/world_kernel.js";
    import { createPlanetEngine } from "./world/planet_engine.js";
    import { createRenderer } from "./world/render.js";
    import { createControlSystem } from "./world/control.js";
    import { createInstruments } from "./assets/instruments.js";

    const worldCanvas = document.getElementById("world-canvas");
    const debugPanel = document.getElementById("debug-panel");
    const runtimePhase = document.getElementById("runtime-phase");
    const diagnosticsToggle = document.getElementById("diagnostics-toggle");
    const diagnosticsSummary = document.getElementById("diagnostics-summary");

    const planetEngine = createPlanetEngine();
    const renderer = createRenderer();
    const control = createControlSystem();
    const instruments = createInstruments();

    const ctx = worldCanvas.getContext("2d", { alpha: true });

    const runtime = {
      phase: "BOOT",
      activeFile: "index.html",
      kernel: WORLD_KERNEL,
      planetField: null,
      control: {
        cameraState: null,
        projectionSummary: null,
        cardinals: null
      },
      verification: null,
      failure: null,
      dtMs: 0,
      fps: 0,
      elapsedMs: 0
    };

    let frameHandle = 0;
    let lastFrameAt = performance.now();
    let startedAt = lastFrameAt;
    let isDragging = false;
    let lastX = 0;
    let lastY = 0;

    let panelCacheKey = "";
    let compactCacheKey = "";
    let lastDiagnosticsWriteAt = 0;
    const DIAGNOSTICS_INTERVAL_MS = 250;

    function setPhase(phase) {
      runtime.phase = phase;
      if (runtimePhase) runtimePhase.textContent = phase;
    }

    function buildPanelCacheKey() {
      const projection = runtime.control?.projectionSummary ?? {};
      const summary = runtime.planetField?.summary ?? {};
      const verification = runtime.verification ?? {};

      return JSON.stringify({
        phase: runtime.phase,
        fps: Number.isFinite(runtime.fps) ? runtime.fps.toFixed(1) : "—",
        elapsedMs: Number.isFinite(runtime.elapsedMs) ? Math.floor(runtime.elapsedMs) : "—",
        sampleX: projection.sampleX ?? "—",
        sampleY: projection.sampleY ?? "—",
        cellId: projection.cellId ?? "—",
        summarySampleCount: summary.sampleCount ?? "—",
        summaryLandCount: summary.landCount ?? "—",
        summaryWaterCount: summary.waterCount ?? "—",
        verificationPass:
          verification.pass === true ? "PASS" :
          verification.pass === false ? "FAIL" :
          verification.pass ?? "MISSING",
        failurePhase: runtime.failure?.phase ?? "—",
        failureMessage: runtime.failure?.message ?? "—"
      });
    }

    function buildCompactCacheKey() {
      const projection = runtime.control?.projectionSummary ?? {};
      const summary = runtime.planetField?.summary ?? {};
      const verification = runtime.verification ?? {};

      return JSON.stringify({
        phase: runtime.phase,
        fps: Number.isFinite(runtime.fps) ? runtime.fps.toFixed(1) : "—",
        cellId: projection.cellId ?? "—",
        sampleCount: summary.sampleCount ?? "—",
        verificationPass:
          verification.pass === true ? "PASS" :
          verification.pass === false ? "FAIL" :
          verification.pass ?? "MISSING"
      });
    }

    function writePanels(force = false) {
      const now = performance.now();

      if (!force && now - lastDiagnosticsWriteAt < DIAGNOSTICS_INTERVAL_MS) {
        return;
      }

      const nextPanelKey = buildPanelCacheKey();
      const nextCompactKey = buildCompactCacheKey();

      if (debugPanel && (force || nextPanelKey !== panelCacheKey)) {
        debugPanel.innerHTML = instruments.renderPanelHTML(runtime);
        panelCacheKey = nextPanelKey;
      }

      if (diagnosticsSummary && (force || nextCompactKey !== compactCacheKey)) {
        diagnosticsSummary.innerHTML = instruments.renderCompactBarHTML(runtime);
        compactCacheKey = nextCompactKey;
      }

      lastDiagnosticsWriteAt = now;
    }

    function resizeWorld() {
      const width = window.innerWidth;
      const height = window.innerHeight;

      worldCanvas.width = width;
      worldCanvas.height = height;

      control.resize(width, height);
    }

    function buildProjectionFunction() {
      return function projectPoint(latDeg, lonDeg, radiusOffsetPx = 0) {
        return control.projectSphere(latDeg, lonDeg, radiusOffsetPx);
      };
    }

    function updateControlState() {
      runtime.control.cameraState = control.getCameraState();
      runtime.control.projectionSummary = control.getProjectionSummary();
      runtime.control.cardinals = control.getCardinals();
    }

    function updateTiming(now) {
      const dtMs = now - lastFrameAt;
      lastFrameAt = now;
      runtime.dtMs = dtMs;
      runtime.fps = dtMs > 0 ? 1000 / dtMs : 0;
      runtime.elapsedMs = now - startedAt;
    }

    function buildPlanetFieldOnce() {
      runtime.planetField = planetEngine.buildPlanetField({});
    }

    function verifyRuntime() {
      runtime.verification = WORLD_KERNEL.verification.verifyCanonicalStructure({
        fileHomes: WORLD_KERNEL.canon.fileHomeRegistry,
        dependency: WORLD_KERNEL.canon.dependencyRegistry ?? WORLD_KERNEL.canon.chronologyRegistry,
        ownership: WORLD_KERNEL.canon.ownershipRegistry,
        duplicateTruth: WORLD_KERNEL.canon.duplicateTruthRegistry,
        pulseOrder: WORLD_KERNEL.planetField.order,
        sampleContract: WORLD_KERNEL.planetField.sampleContract,
        scope: WORLD_KERNEL.scope
      });
    }

    function renderFrame() {
      if (!runtime.planetField) return;

      renderer.renderPlanet({
        ctx,
        planetField: runtime.planetField,
        projectPoint: buildProjectionFunction(),
        viewState: runtime.control.cameraState
      });
    }

    function drawBootBackground() {
      ctx.clearRect(0, 0, worldCanvas.width, worldCanvas.height);
    }

    function frame(now) {
      updateTiming(now);

      if (!isDragging) {
        control.stepInertia();
      }

      updateControlState();
      renderFrame();
      writePanels(false);

      frameHandle = requestAnimationFrame(frame);
    }

    function onPointerDown(event) {
      isDragging = true;
      lastX = event.clientX;
      lastY = event.clientY;
    }

    function onPointerMove(event) {
      if (!isDragging) return;

      const dx = event.clientX - lastX;
      const dy = event.clientY - lastY;

      lastX = event.clientX;
      lastY = event.clientY;

      control.applyDrag(dx, dy);
      control.updateSelection(event.clientX, event.clientY);
      updateControlState();
      renderFrame();
      writePanels(false);
    }

    function onPointerUp() {
      isDragging = false;
    }

    function cycleDiagnostics() {
      const current = document.body.dataset.diagnostics || "peek";
      const next = current === "full" ? "peek" : "full";

      document.body.dataset.diagnostics = next;

      if (diagnosticsToggle) {
        diagnosticsToggle.setAttribute("aria-expanded", next === "full" ? "true" : "false");
      }

      writePanels(true);
    }

    function bindEvents() {
      diagnosticsToggle?.addEventListener("click", cycleDiagnostics);

      window.addEventListener("resize", () => {
        resizeWorld();
        updateControlState();
        renderFrame();
        writePanels(true);
      });

      worldCanvas.addEventListener("pointerdown", onPointerDown);
      window.addEventListener("pointermove", onPointerMove);
      window.addEventListener("pointerup", onPointerUp);
      window.addEventListener("pointercancel", onPointerUp);
    }

    function beginRunningLoop() {
      setPhase("RUNNING");
      startedAt = performance.now();
      lastFrameAt = startedAt;
      frameHandle = requestAnimationFrame(frame);
    }

    function failStartup(error) {
      runtime.failure = {
        phase: "startup",
        message: error instanceof Error ? error.message : String(error)
      };
      setPhase("ERROR");
      writePanels(true);

      if (frameHandle) {
        cancelAnimationFrame(frameHandle);
        frameHandle = 0;
      }
    }

    function continueStartupAfterPaint() {
      requestAnimationFrame(() => {
        try {
          buildPlanetFieldOnce();
          verifyRuntime();
          updateControlState();
          renderFrame();
          writePanels(true);
          bindEvents();
          beginRunningLoop();
        } catch (error) {
          failStartup(error);
        }
      });
    }

    function start() {
      try {
        resizeWorld();
        control.updateSelection(window.innerWidth * 0.5, window.innerHeight * 0.5);
        updateControlState();
        drawBootBackground();
        setPhase("INITIALIZING");
        writePanels(true);
        continueStartupAfterPaint();
      } catch (error) {
        failStartup(error);
      }
    }

    start();
  </script>
</body>
</html>
