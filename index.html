<!doctype html>
<!-- TNT — /index.html
     COMPASS · 2-LAYER (5 + 12) · ENGLISH-ONLY (VISUAL PASS)
     PRIMARY GOAL: STOP “OUT OF CONTROL” MOTION BY:
       (1) LOADING ONLY ONE DRAGON ENGINE
       (2) MOUNTING ENGINES ONCE
       (3) CACHE-BUSTING ENGINE JS (MOBILE)
     OWNER: SEAN

     LOCKS:
       - ENGLISH ONLY (no zh/es until visuals finished)
       - TWO LAYERS:
           LAYER 1 = CORE + 4 (N/E/S/W)
           LAYER 2 = CORE + 12
       - CORE 1 → /index-core/index.html
       - CORE 2 → /index-spine/index.html (placeholder)
       - EXIT → /door/ | HUB → /home/
       - No inline onclick; addEventListener only
       - Canon carry: gd_lang/gd_style/gd_time/gd_depth only
       - lane=platform|engineering URL-only; never stored
       - ui.css owns html/body background (NO overrides)
-->

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Compass · DiamondGateBridge</title>

<link rel="stylesheet" href="/assets/ui.css"/>
<link rel="stylesheet" href="/assets/branch.css"/>

<!-- ALWAYS load canonical state runtime -->
<script defer src="/assets/instruments.js?v=compass_v5"></script>

<!-- CACHE-BUST ENGINES (MOBILE) -->
<script defer src="/assets/bg-engine.js?v=compass_v5"></script>
<script defer src="/assets/dragon-engine.js?v=compass_v5"></script>

<style>
a{color:inherit;text-decoration:none}
body{margin:0}
body::before,body::after{pointer-events:none!important}

:root{
  --padTop:96px;

  --D0:208px; /* CORE */
  --D1:150px; /* cardinals */
  --D2:116px; /* mid */
  --D3:92px;  /* outer */

  --R1:164px;
  --R2:236px;
  --R3:300px;

  --shadowA:0 28px 110px rgba(0,0,0,.70);
  --shadowB:0 18px 60px rgba(0,0,0,.55);
  --shadowDeep:0 44px 140px rgba(0,0,0,.82);

  --onyx0:rgba(6,8,10,.96);
  --onyx1:rgba(10,12,16,.88);
  --crimson:rgba(120,0,22,.40);
  --festival:rgba(255,43,43,.18);
  --opalV:rgba(90,40,120,.14);
  --gold:rgba(201,162,74,.60);
}

/* ===== TOP BAR ===== */
.top{
  position:fixed;top:14px;left:0;right:0;
  padding:0 14px;
  z-index:260;
  pointer-events:none;
}
.topbar{
  pointer-events:auto;
  width:min(1120px,96vw);
  margin:0 auto;
  border:1px solid rgba(255,255,255,.12);
  border-radius:22px;
  padding:10px 12px;
  background:
    radial-gradient(circle at 18% 18%, rgba(201,162,74,.10), transparent 62%),
    radial-gradient(circle at 82% 30%, rgba(255,43,43,.10), transparent 64%),
    linear-gradient(145deg, rgba(8,10,14,.86), rgba(4,6,10,.92));
  box-shadow:var(--shadowA), inset 0 0 0 1px rgba(201,162,74,.12);
  backdrop-filter:blur(10px);
  display:flex;align-items:center;justify-content:space-between;
  gap:10px;
}
.brandLeft{display:flex;align-items:center;gap:12px;flex-wrap:wrap;min-width:0}
.brandTitle{font-weight:980;letter-spacing:.6px;font-size:14px;color:rgba(255,255,255,.94);white-space:nowrap}
.brandSub{font-size:12px;color:rgba(255,255,255,.74);letter-spacing:.2px;white-space:nowrap}
.brandLinks{display:flex;gap:10px;flex-wrap:wrap;font-size:12px;color:rgba(255,255,255,.72)}
.brandLinks a{
  padding:6px 10px;border-radius:999px;
  border:1px solid rgba(201,162,74,.16);
  background:rgba(0,0,0,.14);
}
.controlsRight{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:flex-end}

/* Segmented controls */
.seg{
  display:inline-flex;gap:0;overflow:hidden;border-radius:16px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(0,0,0,.18);
  box-shadow:var(--shadowB);
}
.seg button{
  appearance:none;border:0;background:transparent;
  color:rgba(255,255,255,.78);
  padding:10px 12px;min-height:42px;
  font-weight:980;font-size:13px;letter-spacing:.25px;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
.seg button[aria-pressed="true"]{
  color:rgba(255,255,255,.95);
  background:
    radial-gradient(circle at 50% 50%, rgba(201,162,74,.14), transparent 62%),
    linear-gradient(180deg, rgba(255,43,43,.10), rgba(0,0,0,.10));
  box-shadow: inset 0 0 0 1px rgba(201,162,74,.14), inset 0 -10px 22px rgba(201,162,74,.10);
}

/* ===== STAGE ===== */
.stage{
  position:relative;
  width:min(1200px,94vw);
  height:min(1200px,86vh);
  margin:var(--padTop) auto 0;
  pointer-events:none;
}

/* glass plate */
.glassPlate{
  position:absolute;left:50%;top:50%;
  transform:translate(-50%,-50%);
  width:min(980px,92vw);
  height:min(980px,92vw);
  border-radius:44px;
  pointer-events:none;
  z-index:1;
  border:1px solid rgba(255,255,255,.10);
  background:
    radial-gradient(circle at 28% 20%, rgba(255,255,255,.08), transparent 55%),
    radial-gradient(circle at 78% 28%, rgba(255,43,43,.08), transparent 60%),
    radial-gradient(circle at 70% 82%, rgba(90,40,120,.08), transparent 64%),
    linear-gradient(160deg, rgba(10,12,16,.34), rgba(6,8,10,.44));
  box-shadow:
    0 70px 240px rgba(0,0,0,.48),
    inset 0 2px 0 rgba(255,255,255,.08),
    inset 0 -70px 140px rgba(0,0,0,.52);
  opacity:.86;
}

/* dial */
.dial{
  position:absolute;
  left:50%;top:50%;
  transform:translate(-50%,-50%);
  width:min(900px,90vw);
  height:min(900px,90vw);
  border-radius:999px;
  pointer-events:none;
  z-index:2;
  overflow:hidden;
}
.dial::before{
  content:"";
  position:absolute;inset:0;border-radius:999px;
  background:
    radial-gradient(circle at 50% 42%, rgba(255,255,255,.05), rgba(0,0,0,.14) 56%, rgba(0,0,0,.34) 78%, rgba(0,0,0,0) 92%),
    radial-gradient(circle at 50% 50%, rgba(201,162,74,.10), transparent 62%),
    radial-gradient(circle at 50% 50%, rgba(255,43,43,.08), transparent 66%);
  box-shadow:
    inset 0 0 0 2px rgba(255,255,255,.06),
    inset 0 0 80px rgba(0,0,0,.35),
    0 50px 180px rgba(0,0,0,.22);
  opacity:.92;
}
.dial::after{
  content:"";
  position:absolute;inset:-14%;
  background:
    radial-gradient(circle at 50% 50%, transparent 0 36%, rgba(255,255,255,.06) 36% 36.6%, transparent 37% 100%),
    radial-gradient(circle at 50% 50%, transparent 0 52%, rgba(255,255,255,.06) 52% 52.6%, transparent 53% 100%),
    radial-gradient(circle at 50% 50%, transparent 0 68%, rgba(255,255,255,.06) 68% 68.6%, transparent 69% 100%),
    linear-gradient(90deg, transparent 0 49.7%, rgba(201,162,74,.10) 49.7% 50.3%, transparent 50.3% 100%),
    linear-gradient(0deg,  transparent 0 49.7%, rgba(201,162,74,.10) 49.7% 50.3%, transparent 50.3% 100%),
    repeating-conic-gradient(from 45deg at 50% 50%, rgba(201,162,74,.06) 0 1.2deg, transparent 1.2deg 7.5deg);
  filter: blur(.25px);
  opacity:.78;
  mask: radial-gradient(circle at 50% 50%, transparent 0 18%, #000 20% 100%);
  -webkit-mask: radial-gradient(circle at 50% 50%, transparent 0 18%, #000 20% 100%);
}

/* ===== GEM NODES ===== */
.node{
  position:absolute;
  left:50%;top:50%;
  transform:translate(-50%,-50%) rotate(45deg);
  cursor:pointer;
  pointer-events:auto;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.18);
  transition:box-shadow .16s ease, border-color .16s ease, filter .16s ease;
  z-index:20;           /* above any canvas engines */
  border-radius:22px;
}
.core{width:var(--D0);height:var(--D0);z-index:24;border-radius:26px}
.l1{width:var(--D1);height:var(--D1)}
.l2{width:var(--D2);height:var(--D2)}
.l3{width:var(--D3);height:var(--D3);border-radius:18px}

.surface{
  background:
    radial-gradient(circle at 20% 18%, rgba(255,255,255,.28), transparent 46%),
    radial-gradient(circle at 78% 22%, var(--festival), transparent 62%),
    radial-gradient(circle at 74% 84%, var(--opalV), transparent 64%),
    radial-gradient(circle at 28% 84%, var(--crimson), transparent 70%),
    linear-gradient(160deg, var(--onyx1), var(--onyx0));
  box-shadow:
    var(--shadowDeep),
    0 0 24px rgba(255,43,43,.08),
    inset 0 2px 0 rgba(255,255,255,.18),
    inset 0 -52px 92px rgba(0,0,0,.88);
}
.surface::before{
  content:"";
  position:absolute;inset:0;border-radius:inherit;pointer-events:none;
  box-shadow: inset 0 0 0 1px rgba(201,162,74,.18);
  background:
    repeating-linear-gradient(45deg, rgba(201,162,74,.09) 0 1px, transparent 1px 18px),
    repeating-linear-gradient(-45deg, rgba(201,162,74,.07) 0 1px, transparent 1px 18px);
  opacity:.34;
  mask: radial-gradient(circle at 50% 50%, transparent 0 72%, #000 78% 100%), linear-gradient(#000,#000);
  -webkit-mask: radial-gradient(circle at 50% 50%, transparent 0 72%, #000 78% 100%), linear-gradient(#000,#000);
}
.surface::after{
  content:"";
  position:absolute;left:12%;right:12%;top:10%;
  height:30%;
  border-radius:999px;
  background:linear-gradient(to bottom, rgba(255,255,255,.20), rgba(255,255,255,0));
  transform:rotate(-12deg);
  pointer-events:none;
  opacity:.92;
}
.node:hover{
  border-color:rgba(201,162,74,.44);
  box-shadow:
    var(--shadowDeep),
    0 0 0 2px rgba(201,162,74,.14),
    0 0 34px rgba(201,162,74,.18),
    inset 0 2px 0 rgba(255,255,255,.20),
    inset 0 -52px 92px rgba(0,0,0,.88);
}
.node:active{filter:brightness(.98)}

.inner{
  width:100%;height:100%;
  transform:rotate(-45deg);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:10px;
  gap:6px;
  color:#fff;
}
.word{font-weight:980;letter-spacing:.6px;line-height:1.05;text-shadow:0 0 18px rgba(0,0,0,.42);font-size:clamp(10px, 1.15vw, 16px)}
.code{font-weight:950;font-size:10px;letter-spacing:1.2px;opacity:.78}

/* corners */
.corner{
  position:fixed;
  bottom:max(16px, env(safe-area-inset-bottom));
  z-index:270;
  pointer-events:none;
}
.corner .dmini{pointer-events:auto}
.corner.left{left:16px}
.corner.right{right:16px}

.dmini{
  width:56px;height:56px;border-radius:16px;
  border:1px solid rgba(255,255,255,.14);
  background:linear-gradient(145deg, rgba(10,12,16,.78), rgba(6,8,10,.92));
  box-shadow:var(--shadowB);
  display:grid;place-items:center;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
  transform:rotate(45deg);
}
.dmini span{
  transform:rotate(-45deg);
  font-weight:980;font-size:12px;letter-spacing:.6px;
  color:rgba(255,255,255,.92);
  user-select:none;
}

@media (max-width:720px){
  :root{--D0:196px;--D1:142px;--D2:110px;--D3:88px;--R1:154px;--R2:224px;--R3:286px;--padTop:112px;}
  .stage{height:min(980px,86vh)}
}
@media (max-width:520px){
  :root{--D0:184px;--D1:136px;--D2:106px;--D3:86px;--R1:146px;--R2:212px;--R3:268px;}
  .brandSub{display:none}
}
</style>
</head>

<body>

<div class="top" aria-label="Top controls">
  <div class="topbar">
    <div class="brandLeft" aria-label="Brand">
      <div class="brandTitle">WELCOME TO THE COMPASS</div>
      <div class="brandSub">Two-layer navigation · EN-only visual pass</div>
      <div class="brandLinks" aria-label="Brand links">
        <a href="https://diamondgatebridge.com" target="_blank" rel="noopener">diamondgatebridge.com</a>
        <a href="https://cogrid.net" target="_blank" rel="noopener">cogrid.net</a>
      </div>
    </div>

    <div class="controlsRight" aria-label="Controls">
      <div class="seg" role="group" aria-label="Compass Layer">
        <button type="button" id="layer1" aria-pressed="true">LAYER 1</button>
        <button type="button" id="layer2" aria-pressed="false">LAYER 2</button>
      </div>
      <div class="seg" role="group" aria-label="Lane">
        <button type="button" id="lanePlatform" aria-pressed="true">PLATFORM</button>
        <button type="button" id="laneEngineering" aria-pressed="false">ENGINEERING</button>
      </div>
    </div>
  </div>
</div>

<div class="stage" id="stage" aria-label="Compass dial">
  <div class="glassPlate" aria-hidden="true"></div>
  <div class="dial" aria-hidden="true"></div>
  <!-- nodes injected -->
</div>

<div class="corner left" aria-label="Exit">
  <div class="dmini" id="btnExit" role="button" tabindex="0" aria-label="Exit"><span>EXIT</span></div>
</div>
<div class="corner right" aria-label="Hub">
  <div class="dmini" id="btnHub" role="button" tabindex="0" aria-label="Hub"><span>HUB</span></div>
</div>

<script>
(function(){
  "use strict";

  // ==============================
  // STATE (gd_* only; EN locked)
  // ==============================
  var qs=new URLSearchParams(location.search);
  var LS=window.localStorage;

  // EN-only visual pass
  var style = qs.get("style") || LS.getItem("gd_style") || "informal";
  var time  = qs.get("time")  || LS.getItem("gd_time")  || "now";
  var depth = qs.get("depth") || LS.getItem("gd_depth") || "explore";
  var lane  = (qs.get("lane") || "platform").toLowerCase(); // URL-only
  var layer = qs.get("layer") || "1"; // URL-only

  if(style!=="informal" && style!=="formal") style="informal";
  if(time==="trajectory") time="post";
  if(time!=="origin" && time!=="now" && time!=="post") time="now";
  if(depth!=="explore" && depth!=="learn") depth="explore";
  if(lane!=="platform" && lane!=="engineering") lane="platform";
  if(layer!=="1" && layer!=="2") layer="1";

  try{
    LS.setItem("gd_lang","en");
    LS.setItem("gd_style",style);
    LS.setItem("gd_time",time);
    LS.setItem("gd_depth",depth);
  }catch(e){}

  function q(over){
    var p=new URLSearchParams();
    p.set("lang","en");
    p.set("style",(over&&over.style)?over.style:style);
    p.set("time",(over&&over.time)?over.time:time);
    p.set("depth",(over&&over.depth)?over.depth:depth);
    var L=(over&&over.lane)?over.lane:lane;
    if(L==="platform"||L==="engineering") p.set("lane",L);
    var lay=(over&&over.layer)?over.layer:layer;
    if(lay==="1"||lay==="2") p.set("layer",lay);
    return "?"+p.toString();
  }

  function go(path){ window.location.href = path + q(); }

  // ==============================
  // ENGINE SINGLE-MOUNT GUARD
  // (prevents duplicate instances)
  // ==============================
  function mountEnginesOnce(){
    // BG engine (moon/water) — mount once only
    try{
      if(window.GD_BG && window.GD_BG.mount && !window.__GD_BG_MOUNTED){
        window.__GD_BG_MOUNTED = true;
        window.GD_BG.mount({
          fps: 30,
          dpr_cap: 1.6,
          crater_count: 18,
          moon_radius: 0.064
        });
      }
    }catch(e){}

    // Dragon engine — DO NOT start a second dragon system here.
    // This page purposefully loads only /assets/dragon-engine.js.
    // If that file auto-runs, we DO NOT create another runner.
    // If it exposes mount(), we mount once (optional).
    try{
      if(window.GD_DRAGON && window.GD_DRAGON.mount && !window.__GD_DRAGON_MOUNTED){
        window.__GD_DRAGON_MOUNTED = true;
        window.GD_DRAGON.mount({
          // slow + readable (if your dragon-engine honors these)
          speed: 0.18,
          girth: 3.0,
          segments: 120
        });
      }
    }catch(e){}
  }

  window.addEventListener("load", mountEnginesOnce, {passive:true});

  // ==============================
  // ROUTES
  // ==============================
  var CORE1_ROUTE="/index-core/index.html";
  var CORE2_ROUTE="/index-spine/index.html";
  var EXIT_ROUTE="/door/";
  var HUB_ROUTE="/home/";
  var PLACEHOLDER_404="/404.html";

  // Layer 1 = CORE + 4
  var L1 = [
    {code:"CORE", label:"CORE", href:CORE1_ROUTE, cls:"core"},
    {code:"N", label:"LAWS", href:"/laws/", cls:"l1"},
    {code:"E", label:"ENERGY", href:"/explore/frontier/energy/", cls:"l1"},
    {code:"S", label:"FINANCE", href:"/finance/", cls:"l1"},
    {code:"W", label:"GOVERNANCE", href:"/governance/", cls:"l1"}
  ];

  // Layer 2 = CORE + 12
  var L2 = [
    {code:"CORE", label:"CORE", href:CORE2_ROUTE, cls:"core"},
    {code:"NNE", label:"EDUCATION", href:"/products/education/", cls:"l3"},
    {code:"NE",  label:"PRODUCTS",   href:"/products/", cls:"l2"},
    {code:"ENE", label:"FRONTIER",   href:"/explore/frontier/", cls:"l3"},
    {code:"ESE", label:"INFRA",      href:"/explore/infrastructure/", cls:"l3"},
    {code:"E",   label:"RESEARCH",   href:"/research/", cls:"l2"},
    {code:"SE",  label:"EXPLORE",    href:"/explore/", cls:"l2"},
    {code:"SSE", label:"AGRICULTURE",href:"/products/agriculture/", cls:"l3"},
    {code:"S",   label:"GAUGES",     href:"/gauges/", cls:"l2"},
    {code:"SSW", label:"DOCTRINE",   href:"/products/capital-doctrine/", cls:"l3"},
    {code:"WNW", label:"LATTICE",    href:"/explore/frontier/lattice/", cls:"l3"},
    {code:"NW",  label:"SHIMMER",    href:"/explore/frontier/shimmer/", cls:"l3"},
    {code:"W",   label:"VISION",     href:"/explore/frontier/vision/", cls:"l3"}
  ];

  function normalizeUnique(list){
    var seen = Object.create(null);
    var out = [];
    for(var i=0;i<list.length;i++){
      var it=list[i];
      var h=(it.href||"").trim();
      if(!h) h=PLACEHOLDER_404;
      if(seen[h]) h=PLACEHOLDER_404;
      seen[h]=true;
      out.push({code:it.code,label:it.label,href:h,cls:it.cls});
    }
    return out;
  }

  L1 = normalizeUnique(L1);
  L2 = normalizeUnique(L2);

  // ==============================
  // NODES
  // ==============================
  var stage=document.getElementById("stage");

  function mkNode(it){
    var d=document.createElement("div");
    d.className="node surface "+it.cls;
    d.setAttribute("role","button");
    d.tabIndex=0;

    var inner=document.createElement("div");
    inner.className="inner";

    var w=document.createElement("div");
    w.className="word";
    w.textContent=it.label;

    var c=document.createElement("div");
    c.className="code";
    c.textContent=it.code;

    inner.appendChild(w);
    inner.appendChild(c);
    d.appendChild(inner);

    function act(){ go(it.href); }
    d.addEventListener("click", act, {passive:true});
    d.addEventListener("keydown", function(e){
      if(e.key==="Enter"||e.key===" "){ e.preventDefault(); act(); }
    });

    return d;
  }

  function clearNodes(){
    var nodes=stage.querySelectorAll(".node");
    for(var i=0;i<nodes.length;i++) nodes[i].remove();
  }

  function layoutLayer1(){
    clearNodes();
    var rect=stage.getBoundingClientRect();
    var cx=rect.width/2, cy=rect.height/2;
    var cs=getComputedStyle(document.documentElement);
    var R1=parseFloat(cs.getPropertyValue("--R1"))||164;

    // CORE
    var core=mkNode(L1[0]);
    core.style.left=cx+"px"; core.style.top=cy+"px";
    stage.appendChild(core);

    // Cardinals pinned
    var map={N:null,E:null,S:null,W:null};
    for(var i=1;i<L1.length;i++) map[L1[i].code]=L1[i];

    var order=["N","E","S","W"];
    var ang=[-Math.PI/2,0,Math.PI/2,Math.PI];
    for(var j=0;j<order.length;j++){
      var it=map[order[j]];
      if(!it) continue;
      var x=cx+R1*Math.cos(ang[j]);
      var y=cy+R1*Math.sin(ang[j]);
      var n=mkNode(it);
      n.style.left=x+"px"; n.style.top=y+"px";
      stage.appendChild(n);
    }
  }

  function layoutLayer2(){
    clearNodes();
    var rect=stage.getBoundingClientRect();
    var cx=rect.width/2, cy=rect.height/2;
    var cs=getComputedStyle(document.documentElement);
    var R2=parseFloat(cs.getPropertyValue("--R2"))||236;
    var R3=parseFloat(cs.getPropertyValue("--R3"))||300;

    // CORE2
    var core=mkNode(L2[0]);
    core.style.left=cx+"px"; core.style.top=cy+"px";
    stage.appendChild(core);

    var list=L2.slice(1);
    for(var i=0;i<list.length;i++){
      var it=list[i];
      var a=(i/list.length)*Math.PI*2 - Math.PI/2;
      var r=(it.cls==="l2") ? R2 : R3;
      var x=cx+r*Math.cos(a);
      var y=cy+r*Math.sin(a);
      var n=mkNode(it);
      n.style.left=x+"px"; n.style.top=y+"px";
      stage.appendChild(n);
    }
  }

  function render(){
    if(layer==="1") layoutLayer1();
    else layoutLayer2();
  }

  // ==============================
  // CONTROLS (NO RELOAD)
  // ==============================
  function setPressed(btn,on){ btn.setAttribute("aria-pressed", on ? "true":"false"); }

  var bL1=document.getElementById("layer1");
  var bL2=document.getElementById("layer2");
  var bLP=document.getElementById("lanePlatform");
  var bLE=document.getElementById("laneEngineering");

  function paintControls(){
    setPressed(bL1, layer==="1");
    setPressed(bL2, layer==="2");
    setPressed(bLP, lane==="platform");
    setPressed(bLE, lane==="engineering");
  }

  function setLayer(next){
    if(next!=="1" && next!=="2") next="1";
    layer=next;
    history.replaceState({}, "", location.pathname + q({layer:layer}));
    paintControls();
    render();
  }

  function setLane(next){
    if(next!=="platform" && next!=="engineering") next="platform";
    lane=next;
    history.replaceState({}, "", location.pathname + q({lane:lane}));
    paintControls();
    render();
  }

  bL1.addEventListener("click", function(){ setLayer("1"); }, {passive:true});
  bL2.addEventListener("click", function(){ setLayer("2"); }, {passive:true});
  bLP.addEventListener("click", function(){ setLane("platform"); }, {passive:true});
  bLE.addEventListener("click", function(){ setLane("engineering"); }, {passive:true});

  function bindCorner(id, path){
    var el=document.getElementById(id);
    if(!el) return;
    function act(){ go(path); }
    el.addEventListener("click", act, {passive:true});
    el.addEventListener("keydown", function(e){
      if(e.key==="Enter"||e.key===" "){ e.preventDefault(); act(); }
    });
  }
  bindCorner("btnExit", EXIT_ROUTE);
  bindCorner("btnHub", HUB_ROUTE);

  paintControls();
  requestAnimationFrame(function(){ render(); });
  window.addEventListener("resize", function(){ render(); }, {passive:true});

})();
</script>

</body>
</html>
