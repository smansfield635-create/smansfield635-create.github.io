.seg{display:inline-flex;overflow:hidden;border-radius:16px;border:1px solid rgba(255,255,255,.12);background:rgba(0,0,0,.18)}
.seg button{border:0;background:transparent;color:rgba(255,255,255,.78);padding:10px 12px;min-height:42px;font-weight:980}

.stage{position:relative;width:min(1200px,94vw);height:min(1200px,86vh);margin:96px auto 0;pointer-events:none}

.dial::before{content:"";position:absolute;inset:0;border-radius:999px;background:radial-gradient(circle at 50% 42%, rgba(255,255,255,.05), rgba(0,0,0,.14) 56%, rgba(0,0,0,.34) 78%, rgba(0,0,0,0) 92%);box-shadow:inset 0 0 0 2px rgba(255,255,255,.06), inset 0 0 80px rgba(0,0,0,.35), 0 50px 180px rgba(0,0,0,.22);opacity:.92}

<script>
(function(){
"use strict";

/* L1 compass nodes (for spacing tests) */
var stage=document.getElementById("stage");
function mkNode(label, code, cls, dx, dy){
  var d=document.createElement("div");
  d.className="node "+cls;
  var inner=document.createElement("div");
  inner.className="inner";
  var w=document.createElement("div"); w.className="word"; w.textContent=label;
  var c=document.createElement("div"); c.className="code"; c.textContent=code;
  inner.appendChild(w); inner.appendChild(c);
  d.appendChild(inner);
  d.style.left="50%";
  d.style.top="50%";
  d.style.transform="translate("+dx+"px,"+dy+"px) rotate(45deg)";
  stage.appendChild(d);
}
mkNode("CORE","CORE","core",0,0);
mkNode("LAWS","N","l1",0,-164);
mkNode("ENERGY","E","l1",164,0);
mkNode("FINANCE","S","l1",0,164);
mkNode("GOVERNANCE","W","l1",-164,0);

/* Engine status + mount */
window.addEventListener("load", function(){
  var bgV = (window.GD_BG && window.GD_BG.version) ? window.GD_BG.version : (window.GD_BG ? "BG_OK" : "BG?");
  var drV = (window.GD_DRAGON && window.GD_DRAGON.version) ? window.GD_DRAGON.version : (window.GD_DRAGON ? "DR_OK" : "DR?");
  document.getElementById("engstat").textContent = "ENG: " + bgV + " | " + drV;

  try{ if(window.GD_BG && window.GD_BG.mount) window.GD_BG.mount({fps:30,dpr_cap:1.6}); }catch(e){}
  try{ if(window.GD_DRAGON && window.GD_DRAGON.mount) window.GD_DRAGON.mount({}); }catch(e){}
});
})();
</script>
