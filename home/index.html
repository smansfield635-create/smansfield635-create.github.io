<!doctype html>
<!-- TNT — /home/index.html
     HOME · LAUNCHPAD (TRILINGUAL · NO LENSES · MONUMENT TYPE · SINGLE-OPEN ACCORDION)
     UPDATE: ADD BACKGROUND CONTEXT (FESTIVAL NIGHT / LANTERN / FIREWORKS — BEHIND CONTENT)
     PURPOSE:
       - “Where do I go next?” without teaching taxonomy
       - Dense, legible, one-open-at-a-time bubbles
       - Visual variance: elevated panels are NOT same as background
     RULES:
       - EN / 中文 / ES
       - No modals. No overlays.
       - No inline onclick. Tap-safe (addEventListener only).
       - Single-open accordion (one opens; others close; tap same closes)
       - Canon state carry: lang/style/time/depth via URL + localStorage gd_lang/gd_style/gd_time/gd_depth ONLY
       - NO new gd_* keys
       - lane=platform|engineering is URL-only (preserve if present; never store)
       - Language toggle reloads SAME pathname (GH Pages safe)
       - Uses /assets/ui.css + /assets/branch.css + /assets/instruments.js only
       - Does NOT style html/body background (ui.css owns field)
     ROUTES:
       - DOOR  → /door/
       - PRELUDE → /prelude/
       - INDEX → /index.html
       - PRODUCTS → /products/
       - EXPLORE → /explore/
       - LAWS → /laws/
       - GAUGES → /gauges/
-->

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>HOME</title>

<link rel="stylesheet" href="/assets/ui.css"/>
<link rel="stylesheet" href="/assets/branch.css"/>
<script defer src="/assets/instruments.js"></script>

<style>
a{color:inherit;text-decoration:none}
body{position:relative;z-index:0;margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:#fff}
body::before,body::after{z-index:0!important;pointer-events:none!important}
#root{position:relative;z-index:10}

/* ===== TOKENS (RED primary, BLACK secondary, GOLD adorn; high contrast) ===== */
:root{
  --dockH:96px;

  --stroke:rgba(255,255,255,.12);
  --stroke2:rgba(255,255,255,.10);

  --ink:rgba(255,255,255,.94);
  --txt:rgba(255,255,255,.92);
  --mut:rgba(255,255,255,.80);
  --mut2:rgba(255,255,255,.72);
  --soft:rgba(255,255,255,.62);

  --onyx0:rgba(6,8,10,.90);
  --onyx1:rgba(10,12,16,.78);
  --opalV:rgba(90,40,120,.10);
  --crimson:rgba(120,0,22,.30);
  --festival:rgba(255,43,43,.14);
  --gold:rgba(201,162,74,.40);
  --goldSoft:rgba(201,162,74,.18);

  --shadowA:0 34px 120px rgba(0,0,0,.58);
  --shadowB:0 16px 52px rgba(0,0,0,.60);
  --shadowC:0 18px 60px rgba(0,0,0,.55);
}

/* ===== TOP (fixed; no pointer traps) ===== */
.top{
  position:fixed;top:16px;left:0;right:0;
  padding:0 16px;
  display:flex;align-items:center;justify-content:space-between;
  gap:12px;
  z-index:240;
  pointer-events:none;
}
.top .left,.top .right{
  display:flex;gap:10px;align-items:center;
  flex-wrap:wrap;white-space:nowrap;
  pointer-events:auto;
}
.top .btn{white-space:nowrap}

/* ===== Button (gold under-light; no haze) ===== */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:10px 12px;min-height:44px;border-radius:16px;
  border:1px solid rgba(255,255,255,.14);
  background:
    radial-gradient(circle at 50% 120%, rgba(201,162,74,.16), transparent 64%),
    linear-gradient(145deg, rgba(10,12,16,.78), rgba(6,8,10,.90));
  color:var(--ink);
  font-weight:950;font-size:14px;letter-spacing:.2px;
  -webkit-tap-highlight-color:transparent;
  position:relative;overflow:hidden;
  touch-action:manipulation;
  box-shadow:var(--shadowC);
}
.btn:active{transform:translateY(1px)}
.btn::after{
  content:"";
  position:absolute;left:10px;right:10px;bottom:-12px;height:28px;
  background: radial-gradient(circle at 50% 0%, rgba(201,162,74,.34), transparent 72%);
  opacity:.62;pointer-events:none;
}
.btn.red{border-color:rgba(255,43,43,.22); box-shadow:var(--shadowC), 0 0 18px rgba(255,43,43,.12);}

/* ===== PAGE ===== */
.page{
  width:min(1100px,94vw);
  margin:0 auto;
  padding:86px 0 calc(var(--dockH) + 18px);
  display:flex;
  flex-direction:column;
  gap:12px;
  position:relative;
  z-index:10;
}

/* ===== Background context (behind hero + stack; not body) ===== */
.backdrop{
  position:absolute;
  left:50%;
  top:70px;
  transform:translateX(-50%);
  width:min(1160px,96vw);
  height:calc(100% - 120px);
  border-radius:34px;
  pointer-events:none;
  z-index:0;
  overflow:hidden;
}
.backdrop::before{
  content:"";
  position:absolute;inset:0;
  border:1px solid rgba(255,255,255,.08);
  border-radius:34px;
  background:
    radial-gradient(circle at 18% 22%, rgba(201,162,74,.10), transparent 60%),
    radial-gradient(circle at 78% 26%, rgba(255,43,43,.10), transparent 62%),
    radial-gradient(circle at 62% 90%, rgba(90,40,120,.10), transparent 64%),
    linear-gradient(160deg, rgba(0,0,0,.18), rgba(0,0,0,.08));
  box-shadow:
    0 70px 220px rgba(0,0,0,.62),
    inset 0 2px 0 rgba(255,255,255,.06),
    inset 0 -70px 140px rgba(0,0,0,.55);
  opacity:.92;
}
.backdrop::after{
  content:"";
  position:absolute;inset:-18%;
  background:
    radial-gradient(circle at 18% 34%, rgba(255,43,43,.18), transparent 44%),
    radial-gradient(circle at 84% 30%, rgba(255,43,43,.14), transparent 46%),
    radial-gradient(circle at 52% 78%, rgba(201,162,74,.12), transparent 48%),

    conic-gradient(from 12deg at 30% 28%,
      rgba(201,162,74,.14), transparent 12%,
      rgba(255,43,43,.12), transparent 24%,
      rgba(90,40,120,.10), transparent 38%,
      transparent 100%),
    conic-gradient(from 180deg at 70% 36%,
      rgba(255,43,43,.12), transparent 14%,
      rgba(201,162,74,.12), transparent 28%,
      rgba(90,40,120,.10), transparent 44%,
      transparent 100%),

    radial-gradient(circle at 50% 50%, rgba(255,255,255,.04), transparent 62%);
  filter:blur(1px);
  opacity:.72;
}

/* ===== HERO (monument) ===== */
.hero{
  position:relative;
  z-index:2;
  border-radius:26px;
  border:1px solid var(--stroke);
  background:
    radial-gradient(circle at 18% 22%, var(--crimson), transparent 70%),
    radial-gradient(circle at 82% 28%, var(--opalV), transparent 72%),
    radial-gradient(circle at 62% 92%, var(--festival), transparent 62%),
    radial-gradient(circle at 26% 22%, rgba(201,162,74,.14), transparent 62%),
    linear-gradient(160deg, rgba(0,0,0,.30), rgba(0,0,0,.14));
  backdrop-filter:blur(12px);
  box-shadow:var(--shadowA);
  overflow:hidden;
  padding:18px 18px 16px;
}
.hero::before{
  content:"";
  position:absolute;inset:0;
  border-radius:26px;
  pointer-events:none;
  opacity:.30;
  box-shadow: inset 0 0 0 1px rgba(201,162,74,.16);
  background:
    repeating-linear-gradient(45deg, rgba(201,162,74,.08) 0 1px, transparent 1px 16px),
    repeating-linear-gradient(-45deg, rgba(201,162,74,.06) 0 1px, transparent 1px 16px);
  mask:
    radial-gradient(circle at 50% 50%, transparent 0 76%, #000 80% 100%),
    linear-gradient(#000,#000);
  -webkit-mask:
    radial-gradient(circle at 50% 50%, transparent 0 76%, #000 80% 100%),
    linear-gradient(#000,#000);
}
.hero::after{
  content:"";
  position:absolute;
  left:50%;top:62%;
  width:min(980px,92vw);
  height:min(980px,92vw);
  transform:translate(-50%,-50%) rotate(45deg);
  border-radius:70px;
  pointer-events:none;
  opacity:.20;
  background:
    radial-gradient(circle at 30% 25%, rgba(255,255,255,.08), transparent 55%),
    radial-gradient(circle at 70% 80%, rgba(255,43,43,.10), transparent 60%),
    radial-gradient(circle at 55% 45%, rgba(90,40,120,.10), transparent 60%),
    linear-gradient(160deg, rgba(10,12,16,.55) 0%, rgba(6,8,10,.78) 70%);
  box-shadow:
    0 100px 280px rgba(0,0,0,.65),
    inset 0 2px 0 rgba(255,255,255,.10),
    inset 0 -55px 100px rgba(0,0,0,.55);
}

.k{
  position:relative;z-index:2;
  margin:0 0 6px;
  font-size:12px;
  letter-spacing:4px;
  text-transform:uppercase;
  opacity:.80;
  color:var(--mut);
}
.h1{
  position:relative;z-index:2;
  margin:0;
  font-weight:950;
  font-size:38px;
  letter-spacing:1.1px;
  line-height:1.08;
  color:var(--ink);
}
.tag{
  position:relative;z-index:2;
  margin:10px 0 0;
  color:var(--txt);
  font-size:16px;
  line-height:1.55;
  max-width:980px;
}
.rule{
  position:relative;z-index:2;
  margin:12px 0 0;
  padding:12px 14px;
  border-radius:18px;
  border:1px solid rgba(255,255,255,.12);
  background:
    radial-gradient(circle at 22% 18%, rgba(255,43,43,.10), transparent 58%),
    radial-gradient(circle at 82% 70%, rgba(201,162,74,.10), transparent 62%),
    linear-gradient(160deg, rgba(10,12,16,.62), rgba(6,8,10,.76));
  box-shadow:0 14px 48px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.06);
  font-size:13.5px;
  color:var(--mut);
  line-height:1.5;
}

/* ===== BAND ===== */
.band{
  position:relative;
  z-index:2;
  padding:10px 12px;
  border-radius:18px;
  border:1px solid var(--stroke2);
  background:rgba(0,0,0,.12);
  font-weight:950;
  letter-spacing:.2px;
  color:rgba(255,255,255,.88);
}

/* ===== ACCORDION (single-open; long bubbles) ===== */
.stack{position:relative;z-index:2;display:flex;flex-direction:column;gap:12px}

.card{
  position:relative;
  border:1px solid rgba(255,255,255,.10);
  border-radius:22px;
  background:
    radial-gradient(circle at 22% 18%, rgba(255,43,43,.10), transparent 58%),
    radial-gradient(circle at 78% 30%, rgba(90,40,120,.10), transparent 62%),
    linear-gradient(145deg, rgba(17,22,28,.86), rgba(11,15,20,.92));
  box-shadow:var(--shadowB);
  overflow:hidden;
}
.card::before{
  content:"";
  position:absolute;inset:0;border-radius:inherit;padding:1px;
  background:linear-gradient(120deg, transparent 0%, var(--goldSoft) 50%, transparent 100%);
  opacity:.45;
  -webkit-mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  -webkit-mask-composite:xor;mask-composite:exclude;
  pointer-events:none;
}
.head{
  display:flex;align-items:flex-start;justify-content:space-between;
  gap:10px;
  padding:16px 16px;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
.hL{display:flex;gap:12px;align-items:flex-start;min-width:0}
.dmark{
  width:10px;height:10px;border-radius:3px;
  transform:rotate(45deg);
  background:var(--c, rgba(201,162,74,.45));
  box-shadow:0 0 0 1px rgba(255,255,255,.14), 0 0 14px rgba(0,0,0,.35);
  flex:0 0 auto;
  margin-top:4px;
}
.titleBlock{min-width:0}
.q{
  font-weight:950;
  letter-spacing:.2px;
  font-size:18px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  color:var(--ink);
}
.s{
  margin-top:8px;
  font-size:13.75px;
  opacity:.88;
  line-height:1.42;
  color:rgba(255,255,255,.86);
  max-width:92ch;
}
.chev{
  width:36px;height:36px;border-radius:14px;
  border:1px solid rgba(255,255,255,.14);
  background: rgba(0,0,0,.16);
  display:flex;align-items:center;justify-content:center;
  color:var(--mut);
  font-weight:950;
  position:relative;overflow:hidden;
  flex:0 0 auto;
  margin-top:2px;
}
.chev::after{
  content:"";
  position:absolute;left:6px;right:6px;bottom:-10px;height:22px;
  background: radial-gradient(circle at 50% 0%, rgba(201,162,74,.32), transparent 70%);
  opacity:.62;pointer-events:none;
}

.body{
  display:none;
  padding:14px 16px 16px;
  border-top:1px solid rgba(255,255,255,.08);
  background:
    radial-gradient(circle at 30% 30%, rgba(255,255,255,.06), transparent 55%),
    linear-gradient(145deg, rgba(10,12,16,.86), rgba(6,8,10,.92));
}
.card.open .body{display:block}
.card.open{border-color:rgba(255,43,43,.22); box-shadow:var(--shadowB), 0 0 18px rgba(255,43,43,.10);}

.p{
  margin:0;
  color:rgba(255,255,255,.90);
  line-height:1.68;
  font-size:14.25px;
}
.p + .p{margin-top:10px}
.actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end;margin-top:14px}
.actions .btn{border-radius:999px;padding:10px 14px;white-space:nowrap}

/* ===== DOCK ===== */
.dock{
  position:fixed;left:50%;
  bottom:max(10px, env(safe-area-inset-bottom));
  transform:translateX(-50%);
  z-index:220;
  width:min(980px,94vw);
  padding:10px 12px;
  border-radius:22px;
  border:1px solid rgba(255,255,255,.12);
  background:
    radial-gradient(circle at 18% 18%, rgba(255,43,43,.10), transparent 62%),
    radial-gradient(circle at 82% 70%, rgba(90,40,120,.10), transparent 64%),
    linear-gradient(145deg, rgba(10,12,16,.72), rgba(6,8,10,.86));
  backdrop-filter:blur(10px);
  box-shadow:0 18px 60px rgba(0,0,0,.55);
  display:grid;
  grid-template-columns:repeat(4, minmax(0,1fr));
  gap:10px;
}
.dock .btn{width:100%;padding:10px 10px;border-radius:999px;white-space:nowrap}
@media (max-width:520px){
  :root{--dockH:112px}
  .dock{grid-template-columns:repeat(3, minmax(0,1fr))}
  .h1{font-size:34px}
}
</style>
</head>

<body>
<div id="root">

  <div class="top" aria-label="Top controls">
    <div class="left">
      <a class="btn" id="btnDoor" href="/door/" data-route="/door/">DOOR</a>
      <a class="btn" id="btnPrelude" href="/prelude/" data-route="/prelude/">PRELUDE</a>
      <a class="btn red" id="btnIndex" href="/index.html" data-route="/index.html">COMPASS</a>
      <a class="btn" id="btnProducts" href="/products/" data-route="/products/">PRODUCTS</a>
      <a class="btn" id="btnExplore" href="/explore/" data-route="/explore/">EXPLORE</a>
    </div>
    <div class="right" aria-label="Language">
      <button class="btn" id="btnEN" type="button">EN</button>
      <button class="btn" id="btnZH" type="button">中文</button>
      <button class="btn" id="btnES" type="button">ES</button>
    </div>
  </div>

  <div class="page">

    <div class="backdrop" aria-hidden="true"></div>

    <section class="hero" aria-label="Home hero">
      <p class="k" id="k0">HOME</p>
      <h1 class="h1" id="h0">WHERE DO YOU WANT TO GO NEXT?</h1>
      <p class="tag" id="tag0"></p>
      <div class="rule" id="rule0"></div>
    </section>

    <div class="band" id="band0">SURFACES (OPEN ONE)</div>
    <div class="stack" id="stack"></div>

  </div>

  <nav class="dock" aria-label="Bottom navigation">
    <a class="btn" id="dockProducts" href="/products/" data-route="/products/">PRODUCTS</a>
    <a class="btn" id="dockExplore" href="/explore/" data-route="/explore/">EXPLORE</a>
    <a class="btn" id="dockLaws" href="/laws/" data-route="/laws/">LAWS</a>
    <a class="btn" id="dockGauges" href="/gauges/" data-route="/gauges/">GAUGES</a>
  </nav>

</div>

<script>
(function(){
  // ===== canonical state =====
  var qs=new URLSearchParams(location.search);
  var lang  = qs.get("lang")  || localStorage.getItem("gd_lang")  || "en";
  var style = qs.get("style") || localStorage.getItem("gd_style") || "informal";
  var time  = qs.get("time")  || localStorage.getItem("gd_time")  || "now";
  var depth = qs.get("depth") || localStorage.getItem("gd_depth") || "explore";
  var lane  = qs.get("lane")  || ""; // URL-only preserve if present

  if(lang!=="en" && lang!=="zh" && lang!=="es") lang="en";
  if(style!=="formal" && style!=="informal") style="informal";
  if(time==="trajectory") time="post";
  if(time!=="origin" && time!=="now" && time!=="post") time="now";
  if(depth!=="explore" && depth!=="learn") depth="explore";
  if(lane!=="platform" && lane!=="engineering") lane="";

  try{
    localStorage.setItem("gd_lang",lang);
    localStorage.setItem("gd_style",style);
    localStorage.setItem("gd_time",time);
    localStorage.setItem("gd_depth",depth);
  }catch(e){}

  document.documentElement.lang = (lang==="zh") ? "zh" : (lang==="es" ? "es" : "en");

  function q(over){
    var L=(over&&over.lang)?over.lang:lang;
    var S=(over&&over.style)?over.style:style;
    var T=(over&&over.time)?over.time:time;
    var D=(over&&over.depth)?over.depth:depth;
    var A=(over&&over.lane)?over.lane:lane;
    var out="?lang="+encodeURIComponent(L)+"&style="+encodeURIComponent(S)+"&time="+encodeURIComponent(T)+"&depth="+encodeURIComponent(D);
    if(A==="platform"||A==="engineering") out+="&lane="+encodeURIComponent(A);
    return out;
  }

  function wire(id,path){
    var el=document.getElementById(id);
    if(el) el.href = path + q();
  }

  // top wires
  wire("btnDoor","/door/");
  wire("btnPrelude","/prelude/");
  wire("btnIndex","/index.html");
  wire("btnProducts","/products/");
  wire("btnExplore","/explore/");

  // dock wires
  wire("dockProducts","/products/");
  wire("dockExplore","/explore/");
  wire("dockLaws","/laws/");
  wire("dockGauges","/gauges/");

  // wire all data-route anchors with state carry
  (function wireAll(){
    var nodes=document.querySelectorAll("[data-route]");
    for(var i=0;i<nodes.length;i++){
      var el=nodes[i];
      var route=el.getAttribute("data-route")||"";
      if(!route) continue;
      el.setAttribute("href", route + q());
    }
  })();

  // language toggle (reload same path)
  function setLang(next){
    if(next!=="en" && next!=="zh" && next!=="es") next="en";
    lang=next;
    try{ localStorage.setItem("gd_lang",lang); }catch(e){}
    window.location.href = window.location.pathname + q({lang:lang});
  }
  document.getElementById("btnEN").addEventListener("click", function(){ setLang("en"); });
  document.getElementById("btnZH").addEventListener("click", function(){ setLang("zh"); });
  document.getElementById("btnES").addEventListener("click", function(){ setLang("es"); });

  // ===== copy packs (question-first; human words) =====
  function P(en,zh,es){ return {en:en, zh:zh, es:es}; }
  function pick(o){ return (lang==="zh")?o.zh:(lang==="es")?o.es:o.en; }

  var HERO = {
    tag:P(
      "Home is the fast lane. It doesn’t teach. It routes. If you want the deep ‘why’, use Prelude. If you want the compass, use Index. If you want the intro table, use Door.",
      "主页是快车道：不教学，只路由。想看深层“为什么”去前奏；想用指南针去索引；想看入门桌面去门。",
      "Home es el carril rápido: no enseña, enruta. Para el ‘por qué’ profundo: Preludio. Para brújula: Índice. Para mesa de entrada: Puerta."
    ),
    rule:P(
      "Rule: choose one surface, read one block, then jump. This keeps your brain calm and your path clean.",
      "规则：选一个面，读一个块，然后跳转。这样大脑更安静，路径更干净。",
      "Regla: elige una superficie, lee un bloque y salta. Mantiene la mente calmada y la ruta limpia."
    ),
    band:P("SURFACES (OPEN ONE)","入口（打开一个）","SUPERFICIES (ABRE UNA)")
  };

  document.getElementById("tag0").textContent = pick(HERO.tag);
  document.getElementById("rule0").textContent = pick(HERO.rule);
  document.getElementById("band0").textContent = pick(HERO.band);

  // ===== accordion data =====
  var CARDS = [
    {
      c:"#c9a24a",
      q:P("Do you want the big table first?","你想先看总桌面吗？","¿Quieres la mesa grande primero?"),
      s:P("Door is the intro: choose your entry without guessing.","门是入门：不靠猜选入口。","Puerta es intro: eliges entrada sin adivinar."),
      p:P(
        "Use Door when you want a clean starting posture: Intro → Compass → Hub.\n\nDoor is where the site tells you what it is, what it is not, and how to enter without getting lost.",
        "想要干净起步就用门：介绍 → 指南针 → 枢纽。\n\n门会告诉你：网站是什么、不是什麽，以及如何不迷路地进入。",
        "Usa Puerta para un inicio limpio: Intro → Brújula → Hub.\n\nPuerta explica qué es, qué no es y cómo entrar sin perderte."
      ),
      jump:{label:P("OPEN: DOOR","打开：门","ABRIR: PUERTA"), href:"/door/"}
    },
    {
      c:"#ff2b2b",
      q:P("Do you want direction, not discussion?","你想要方向而不是讨论吗？","¿Quieres dirección, no discusión?"),
      s:P("Index is the compass: pick a direction and go.","索引是指南针：选方向就走。","Índice es brújula: eliges dirección y vas."),
      p:P(
        "Use Index when you want fast traversal. It’s designed to move you into a lane (Products / Laws / Gauges / Explore) without teaching you theory.\n\nIf you feel stuck, Index is the fastest reset.",
        "想要快速遍历就用索引：它会把你送入某条车道（产品/法则/量规/探索），而不要求你先学理论。\n\n如果你卡住了，索引是最快的重置。",

  // ===== accordion render (single-open; tap same closes) =====
  var stack=document.getElementById("stack");

  function closeAll(){
    var cards=stack.querySelectorAll(".card");
    for(var i=0;i<cards.length;i++){
      cards[i].classList.remove("open");
      var ch=cards[i].querySelector(".chevTxt");
      if(ch) ch.textContent="▸";
    }
  }

  function makeCard(item, idx){
    var card=document.createElement("div");
    card.className="card";
    card.style.setProperty("--c", item.c);

    var head=document.createElement("div");
    head.className="head";
    head.setAttribute("role","button");
    head.setAttribute("tabindex","0");

    var hL=document.createElement("div");
    hL.className="hL";

    var mark=document.createElement("div");
    mark.className="dmark";
    mark.style.background=item.c;

    var tb=document.createElement("div");
    tb.className="titleBlock";

    var qEl=document.createElement("div");
    qEl.className="q";
    qEl.textContent=pick(item.q);

    var sEl=document.createElement("div");
    sEl.className="s";
    sEl.textContent=pick(item.s);

    tb.appendChild(qEl);
    tb.appendChild(sEl);

    hL.appendChild(mark);
    hL.appendChild(tb);

    var chev=document.createElement("div");
    chev.className="chev";
    chev.innerHTML='<span class="chevTxt">▸</span>';

    head.appendChild(hL);
    head.appendChild(chev);

    var body=document.createElement("div");
    body.className="body";

    var paras=String(pick(item.p)).split("\n\n");
    for(var i=0;i<paras.length;i++){
      var p=document.createElement("p");
      p.className="p";
      p.textContent=paras[i];
      body.appendChild(p);
    }

    var actions=document.createElement("div");
    actions.className="actions";
    var a=document.createElement("a");
    a.className="btn red";
    a.textContent=pick(item.jump.label);
    a.setAttribute("data-route", item.jump.href);
    actions.appendChild(a);
    body.appendChild(actions);

    function toggle(){
      var isOpen=card.classList.contains("open");
      if(isOpen){
        card.classList.remove("open");
        chev.querySelector(".chevTxt").textContent="▸";
        return;
      }
      closeAll();
      card.classList.add("open");
      chev.querySelector(".chevTxt").textContent="▾";
    }

    head.addEventListener("click", toggle, {passive:true});
    head.addEventListener("keydown", function(e){
      if(e.key==="Enter"||e.key===" "){ e.preventDefault(); toggle(); }
    });

    card.appendChild(head);
    card.appendChild(body);

    if(idx===0){
      card.classList.add("open");
      chev.querySelector(".chevTxt").textContent="▾";
    }
    return card;
  }

  function render(){
    stack.innerHTML="";
    for(var i=0;i<CARDS.length;i++){
      stack.appendChild(makeCard(CARDS[i], i));
    }

    if(lang==="zh"){
      document.getElementById("k0").textContent="主页";
      document.getElementById("h0").textContent="你下一步想去哪？";
      document.getElementById("band0").textContent="入口（打开一个）";
      document.getElementById("btnDoor").textContent="门";
      document.getElementById("btnPrelude").textContent="前奏";
      document.getElementById("btnIndex").textContent="指南针";
      document.getElementById("btnProducts").textContent="产品";
      document.getElementById("btnExplore").textContent="探索";
      document.getElementById("dockProducts").textContent="产品";
      document.getElementById("dockExplore").textContent="探索";
      document.getElementById("dockLaws").textContent="法则";
      document.getElementById("dockGauges").textContent="量规";
