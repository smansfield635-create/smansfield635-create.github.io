<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Nine Summits</title>

<link rel="stylesheet" href="./assets/ui.css"/>
<style>
body{margin:0;background:#020612;color:#fff;font-family:system-ui}

/* ===== ROOT LAYERS ===== */
#door-layer,
#world-layer{
  position:fixed;inset:0;
}

/* ===== DOOR MODE ===== */
#door-layer{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  gap:18px;
  z-index:20;
}

#door-title{
  font-size:42px;
  font-weight:900;
  letter-spacing:1px;
}

#door-sub{
  opacity:.8;
}

.door-buttons{
  display:flex;
  gap:14px;
}

.door-btn{
  padding:12px 18px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.2);
  background:rgba(255,255,255,.06);
  cursor:pointer;
}

/* ===== WORLD MODE ===== */
#world-layer{
  z-index:10;
}

canvas{
  width:100%;
  height:100%;
  display:block;
}

/* ===== CONTROL PANEL ===== */
#control-panel{
  position:absolute;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:10px;
  z-index:30;
}

.ctrl-btn{
  padding:10px 14px;
  border-radius:999px;
  background:rgba(0,0,0,.5);
  border:1px solid rgba(255,255,255,.15);
}

/* ===== STATE ===== */
.hidden{display:none;}
</style>
</head>

<body>

<!-- ===== DOOR ===== -->
<div id="door-layer">
  <div id="door-title">NINE SUMMITS</div>
  <div id="door-sub">Choose your reality.</div>

  <div class="door-buttons">
    <button class="door-btn" id="btn-round">WORLD IS ROUND</button>
    <button class="door-btn" id="btn-flat">WORLD IS FLAT</button>
  </div>
</div>

<!-- ===== WORLD ===== -->
<div id="world-layer">
  <canvas id="world-canvas"></canvas>

  <div id="control-panel" class="hidden">
    <button class="ctrl-btn">OPEN</button>
    <button class="ctrl-btn">EXPLORE</button>
    <button class="ctrl-btn">PRODUCTS</button>
    <button class="ctrl-btn">LAWS</button>
  </div>
</div>

<script type="module">
import { createPlanetEngine } from "./world/planet_engine.js";
import { createRenderer } from "./world/render.js";
import { createControlSystem } from "./world/control.js";

/* ===== MODE ===== */
const params = new URLSearchParams(location.search);
const mode = params.get("mode") || "door";

/* ===== DOM ===== */
const door = document.getElementById("door-layer");
const world = document.getElementById("world-layer");
const panel = document.getElementById("control-panel");

const btnRound = document.getElementById("btn-round");
const btnFlat = document.getElementById("btn-flat");

const canvas = document.getElementById("world-canvas");
const ctx = canvas.getContext("2d");

/* ===== ENGINE ===== */
const engine = createPlanetEngine();
const renderer = createRenderer();
const control = createControlSystem();

let planetField = null;

/* ===== RESIZE ===== */
function resize(){
  canvas.width = innerWidth;
  canvas.height = innerHeight;
  control.resize(innerWidth, innerHeight);
}
window.addEventListener("resize", resize);
resize();

/* ===== MODE HANDLERS ===== */
function enterDoor(){
  door.classList.remove("hidden");
  panel.classList.add("hidden");
}

function enterWorld(flat=false){
  door.classList.add("hidden");
  panel.classList.remove("hidden");

  planetField = engine.buildPlanetField({});

  if(flat){
    canvas.style.filter = "blur(6px) brightness(.7)";
  } else {
    canvas.style.filter = "none";
  }

  startLoop();
}

/* ===== ROUTING ===== */
btnRound.onclick = () => {
  location.href = "/index.html?mode=world";
};

btnFlat.onclick = () => {
  location.href = "/index.html?mode=flat";
};

/* ===== LOOP ===== */
let last = performance.now();

function loop(now){
  const dt = now - last;
  last = now;

  control.stepInertia();

  renderer.renderPlanet({
    ctx,
    planetField,
    projectPoint:(lat,lon,r=0)=>control.projectSphere(lat,lon,r),
    viewState:control.getCameraState()
  });

  requestAnimationFrame(loop);
}

function startLoop(){
  last = performance.now();
  requestAnimationFrame(loop);
}

/* ===== INIT ===== */
if(mode === "world"){
  enterWorld(false);
}else if(mode === "flat"){
  enterWorld(true);
}else{
  enterDoor();
}
</script>

</body>
</html>
