<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>DiamondGateBridge</title>

<link rel="stylesheet" href="/assets/ui.css"/>
<link rel="stylesheet" href="/assets/branch.css"/>

<style>
body{margin:0;overflow:hidden}
#gd-field,#gd-dragon,#gd-ui{position:fixed;inset:0;width:100%;height:100%}
#gd-field{z-index:0;pointer-events:none}
#gd-dragon{z-index:6;pointer-events:none}
#gd-ui{z-index:20;pointer-events:none}
.stage{position:relative;width:min(980px,95vw);height:min(980px,82vh);margin:120px auto 0;pointer-events:none}
</style>

<script defer src="/assets/hel-render.js"></script>
<script defer src="/assets/hel-client.js"></script>
</head>
<body>

<div id="gd-field"></div>
<div id="gd-dragon"></div>

<div id="gd-ui">
  <div class="stage">
    <div class="gd_dialFace"></div>
    <div class="gd_diamond gd_core" style="left:50%;top:50%"><div class="gd_inner"><div class="gd_word">CORE</div><div class="gd_code">CORE</div></div></div>
    <div class="gd_diamond gd_l1" style="left:50%;top:calc(50% - var(--gd_r1))"><div class="gd_inner"><div class="gd_word">LAWS</div><div class="gd_code">N</div></div></div>
    <div class="gd_diamond gd_l1" style="left:calc(50% + var(--gd_r1));top:50%"><div class="gd_inner"><div class="gd_word">ENERGY</div><div class="gd_code">E</div></div></div>
    <div class="gd_diamond gd_l1" style="left:50%;top:calc(50% + var(--gd_r1))"><div class="gd_inner"><div class="gd_word">FINANCE</div><div class="gd_code">S</div></div></div>
    <div class="gd_diamond gd_l1" style="left:calc(50% - var(--gd_r1));top:50%"><div class="gd_inner"><div class="gd_word">GOV</div><div class="gd_code">W</div></div></div>
  </div>
</div>

</body>
</html>
