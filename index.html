<!doctype html>
<!-- TNT — /index.html
     COMPASS · PRIMARY NAVIGATION
     UPDATE:
       - Adds RESEARCH as equal structural node
       - Gold accent for RESEARCH (per instruction)
     LOCKS:
       - Canon state carry (lang/style/time/depth via gd_*)
       - No new gd_* keys
       - No overlays / no modals
       - ui.css owns html/body background
       - Red primary · Black secondary · Gold accent
-->

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Compass</title>

<link rel="stylesheet" href="/assets/ui.css"/>
<link rel="stylesheet" href="/assets/branch.css"/>
<script defer src="/assets/instruments.js"></script>

<style>
a{color:inherit;text-decoration:none}
body::before,body::after{pointer-events:none!important}

:root{
  --R:150px;
  --D:170px;
  --dockH:120px;

  --onyxA:rgba(8,10,14,.92);
  --onyxB:rgba(12,14,18,.98);

  --crimson:rgba(120,0,22,.35);
  --festival:rgba(255,43,43,.18);
  --opalV:rgba(90,40,120,.14);

  --gold:rgba(201,162,74,.40);
  --goldGlow:rgba(201,162,74,.28);

  --shadow:0 40px 140px rgba(0,0,0,.75);
}

/* Top Nav */
.top{
  position:fixed;
  top:16px;
  left:0;
  right:0;
  display:flex;
  justify-content:space-between;
  padding:0 16px;
  z-index:240;
}

.btn{
  padding:10px 14px;
  border-radius:16px;
  border:1px solid rgba(255,255,255,.14);
  background:linear-gradient(145deg, var(--onyxA), var(--onyxB));
  font-weight:950;
  white-space:nowrap;
}

/* Stage */
.stage{
  position:relative;
  width:min(720px,94vw);
  height:min(720px,78vh);
  margin:120px auto 0;
  pointer-events:none;
}

.d{
  width:var(--D);
  height:var(--D);
  position:absolute;
  left:50%;
  top:50%;
  transform-origin:center;
  border-radius:28px;
  cursor:pointer;
  pointer-events:auto;
  overflow:hidden;

  background:
    radial-gradient(circle at 18% 18%, var(--crimson), transparent 70%),
    radial-gradient(circle at 82% 30%, var(--opalV), transparent 74%),
    radial-gradient(circle at 70% 92%, var(--festival), transparent 62%),
    linear-gradient(160deg, var(--onyxA), var(--onyxB));

  border:1px solid rgba(255,255,255,.16);
  box-shadow:var(--shadow);
  transition:transform .18s ease;
}

.d:hover{
  transform:translate(-50%,-50%) rotate(45deg) scale(1.02);
}

.d::after{
  content:"";
  position:absolute;
  left:12px;
  right:12px;
  bottom:-16px;
  height:30px;
  background: radial-gradient(circle at 50% 0%, var(--goldGlow), transparent 72%);
  opacity:.6;
  pointer-events:none;
}

.inner{
  width:100%;
  height:100%;
  transform:rotate(-45deg);
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:950;
  font-size:18px;
  letter-spacing:.6px;
  text-align:center;
}

/* Placement */
.dN{transform:translate(-50%,-50%) translate(0,-150px) rotate(45deg)}
.dE{transform:translate(-50%,-50%) translate(150px,0) rotate(45deg)}
.dS{transform:translate(-50%,-50%) translate(0,150px) rotate(45deg)}
.dW{transform:translate(-50%,-50%) translate(-150px,0) rotate(45deg)}
.dNE{transform:translate(-50%,-50%) translate(105px,-105px) rotate(45deg)}
.dNW{transform:translate(-50%,-50%) translate(-105px,-105px) rotate(45deg)}

.gold{
  border-color:var(--gold);
  box-shadow:var(--shadow), 0 0 22px var(--goldGlow);
}

</style>
</head>

<body>

<div class="top">
  <div>
    <a class="btn" id="btnDoor" href="/door/">DOOR</a>
  </div>
  <div>
    <a class="btn" id="btnHome" href="/home/">HOME</a>
  </div>
</div>

<div class="stage">

  <div class="d dN" id="dExplore">
    <div class="inner">EXPLORE</div>
  </div>

  <div class="d dE" id="dProducts">
    <div class="inner">PRODUCTS</div>
  </div>

  <div class="d dS" id="dLaws">
    <div class="inner">LAWS</div>
  </div>

  <div class="d dW" id="dGauges">
    <div class="inner">GAUGES</div>
  </div>

  <div class="d dNE gold" id="dResearch">
    <div class="inner">RESEARCH</div>
  </div>

  <div class="d dNW" id="dEducation">
    <div class="inner">EDUCATION</div>
  </div>

</div>

<script>
(function(){

  var qs=new URLSearchParams(location.search);
  var lang  = qs.get("lang")  || localStorage.getItem("gd_lang")  || "en";
  var style = qs.get("style") || localStorage.getItem("gd_style") || "informal";
  var time  = qs.get("time")  || localStorage.getItem("gd_time")  || "now";
  var depth = qs.get("depth") || localStorage.getItem("gd_depth") || "explore";

  if(!["en","zh","es"].includes(lang)) lang="en";
  if(!["informal","formal"].includes(style)) style="informal";
  if(!["origin","now","post"].includes(time)) time="now";
  if(!["explore","learn"].includes(depth)) depth="explore";

  localStorage.setItem("gd_lang",lang);
  localStorage.setItem("gd_style",style);
  localStorage.setItem("gd_time",time);
  localStorage.setItem("gd_depth",depth);

  function q(){
    return "?lang="+lang+"&style="+style+"&time="+time+"&depth="+depth;
  }

  function go(path){ location.href=path+q(); }

  document.getElementById("dExplore").addEventListener("click",()=>go("/explore/"));
  document.getElementById("dProducts").addEventListener("click",()=>go("/products/"));
  document.getElementById("dLaws").addEventListener("click",()=>go("/laws/"));
  document.getElementById("dGauges").addEventListener("click",()=>go("/gauges/"));
  document.getElementById("dResearch").addEventListener("click",()=>go("/research/"));
  document.getElementById("dEducation").addEventListener("click",()=>go("/products/education/"));

  document.getElementById("btnDoor").href="/door/"+q();
  document.getElementById("btnHome").href="/home/"+q();

})();
</script>

</body>
</html>
