  <script>
    (() => {
      "use strict";

      const canvas = document.getElementById("earthCanvas");
      const ctx = canvas.getContext("2d", { alpha: true });

      const STATE = {
        phase: 0.18,
        cloudPhase: 0.08,
        velocity: 0,
        dragging: false,
        lastX: 0,
        started: performance.now()
      };

      const SIZE = 640;
      const CENTER = SIZE / 2;
      const RADIUS = SIZE * 0.405;
      const TWO_PI = Math.PI * 2;
      const HALF_PI = Math.PI / 2;
      const LIGHT = normalize({ x: -0.48, y: -0.30, z: 0.82 });

      function clamp(value, min, max) {
        return Math.min(max, Math.max(min, value));
      }

      function wrap01(value) {
        return ((value % 1) + 1) % 1;
      }

      function lerp(a, b, t) {
        return a + (b - a) * t;
      }

      function smoothstep(edge0, edge1, value) {
        const t = clamp((value - edge0) / (edge1 - edge0), 0, 1);
        return t * t * (3 - 2 * t);
      }

      function normalize(v) {
        const length = Math.sqrt(v.x * v.x + v.y * v.y + v.z * v.z) || 1;
        return { x: v.x / length, y: v.y / length, z: v.z / length };
      }

      function dot(a, b) {
        return a.x * b.x + a.y * b.y + a.z * b.z;
      }

      function hash2(x, y) {
        const s = Math.sin(x * 127.1 + y * 311.7) * 43758.5453123;
        return s - Math.floor(s);
      }

      function noise2(x, y) {
        const ix = Math.floor(x);
        const iy = Math.floor(y);
        const fx = x - ix;
        const fy = y - iy;
        const ux = fx * fx * (3 - 2 * fx);
        const uy = fy * fy * (3 - 2 * fy);

        const a = hash2(ix, iy);
        const b = hash2(ix + 1, iy);
        const c = hash2(ix, iy + 1);
        const d = hash2(ix + 1, iy + 1);

        return lerp(lerp(a, b, ux), lerp(c, d, ux), uy);
      }

      function fbm(x, y) {
        let value = 0;
        let amplitude = 0.56;
        let frequency = 1;

        for (let i = 0; i < 6; i += 1) {
          value += noise2(x * frequency, y * frequency) * amplitude;
          frequency *= 2.02;
          amplitude *= 0.52;
        }

        return clamp(value, 0, 1);
      }

      function mix(a, b, t) {
        return [
          lerp(a[0], b[0], t),
          lerp(a[1], b[1], t),
          lerp(a[2], b[2], t)
        ];
      }

      function sampleSurface(lat, lon, cloudPhase, time) {
        const u = wrap01(lon / TWO_PI + 0.5);
        const v = clamp(0.5 - lat / Math.PI, 0, 1);
        const absLat = Math.abs(lat) / HALF_PI;

        const continent =
          0.52 * fbm(u * 2.45 + 0.22, v * 1.78 - 0.17) +
          0.28 * fbm(u * 5.2 - 1.4, v * 4.25 + 0.8) +
          0.14 * Math.sin(lon * 2.2 + Math.sin(lat * 3.2)) +
          0.10 * Math.cos(lat * 4.8 + Math.sin(lon * 1.7));

        const threshold = 0.43 + absLat * 0.11 - 0.04 * Math.sin(lon * 3.0);
        const coastDistance = Math.abs(continent - threshold);
        const ice = smoothstep(0.72, 0.96, absLat + fbm(u * 5.2, v * 5.2) * 0.08);
        const land = continent > threshold && ice < 0.84;
        const coast = coastDistance < 0.052 && ice < 0.8;

        const elevation = land
          ? clamp((continent - threshold) * 2.6 + fbm(u * 12.0, v * 8.0) * 0.46, 0, 1)
          : 0;

        const oceanDepth = land
          ? 0
          : clamp((threshold - continent) * 2.8 + fbm(u * 7.0 + 4.0, v * 5.0) * 0.25, 0, 1);

        const moisture = clamp(
          0.52 +
          0.28 * Math.cos(lat * 2.0) +
          0.18 * fbm(u * 8.0 + 9.0, v * 6.0 - 2.0) -
          0.20 * elevation,
          0,
          1
        );

        let color;

        if (ice > 0.84) {
          color = mix([218, 236, 242], [248, 250, 246], ice);
        } else if (land) {
          const arid = moisture < 0.42 && Math.abs(lat) > 0.16 && Math.abs(lat) < 0.72;
          const forest = moisture >= 0.54 && elevation < 0.62;
          const highland = elevation >= 0.62;

          if (highland) {
            color = mix([88, 90, 72], [190, 182, 146], elevation);
          } else if (arid) {
            color = mix([128, 106, 58], [190, 156, 86], 0.50 + elevation * 0.35);
          } else if (forest) {
            color = mix([24, 90, 56], [66, 135, 70], moisture);
          } else {
            color = mix([50, 112, 72], [122, 136, 78], elevation * 0.55);
          }
        } else if (coast || oceanDepth < 0.18) {
          color = mix([13, 76, 105], [36, 154, 157], 1 - oceanDepth);
        } else {
          color = mix([3, 18, 52], [8, 56, 96], 1 - oceanDepth);
        }

        if (coast && ice < 0.75) {
          color = mix(color, land ? [184, 168, 112] : [46, 166, 160], 0.36);
        }

        const cloudNoise =
          0.60 * fbm(u * 9.5 + cloudPhase * 6.0, v * 5.0 + time * 0.012) +
          0.25 * fbm(u * 23.0 - cloudPhase * 9.0, v * 11.0 + 2.0) +
          0.12 * Math.sin((u + cloudPhase) * TWO_PI * 3.0 + v * 7.0);

        const stormBand = smoothstep(0.12, 0.60, Math.cos(lat * 3.0) * 0.5 + 0.5);
        const cloudAlpha = clamp(smoothstep(0.58, 0.92, cloudNoise) * (0.30 + stormBand * 0.48), 0, 0.66);

        return { color, cloudAlpha, water: land ? 0 : 1 };
      }

      function draw() {
        const image = ctx.createImageData(SIZE, SIZE);
        const data = image.data;
        const now = performance.now();
        const time = (now - STATE.started) / 1000;
        const tilt = 23.44 * Math.PI / 180;

        for (let py = 0; py < SIZE; py += 1) {
          const dy = (py + 0.5 - CENTER) / RADIUS;

          for (let px = 0; px < SIZE; px += 1) {
            const dx = (px + 0.5 - CENTER) / RADIUS;
            const rr = dx * dx + dy * dy;
            const idx = (py * SIZE + px) * 4;

            if (rr > 1) {
              data[idx] = 0;
              data[idx + 1] = 0;
              data[idx + 2] = 0;
              data[idx + 3] = 0;
              continue;
            }

            const z = Math.sqrt(Math.max(0, 1 - rr));
            const normal = { x: dx, y: -dy, z };

            const yTilted = normal.y * Math.cos(tilt) - normal.z * Math.sin(tilt);
            const zTilted = normal.y * Math.sin(tilt) + normal.z * Math.cos(tilt);

            const lat = Math.asin(clamp(yTilted, -1, 1));
            const lon = Math.atan2(normal.x, zTilted) + STATE.phase * TWO_PI;

            const sample = sampleSurface(lat, lon, STATE.cloudPhase, time);

            let color = sample.color.slice();
            const light = clamp(dot(normal, LIGHT) * 0.74 + 0.35, 0.14, 1.08);
            const limb = clamp(1 - normal.z, 0, 1);
            const haze = Math.pow(limb, 2.25);
            const rim = Math.pow(limb, 3.0);

            color[0] *= light;
            color[1] *= light;
            color[2] *= light;

            if (sample.water > 0.5) {
              const specular = Math.pow(clamp(dot(normal, LIGHT), 0, 1), 18) * Math.pow(1 - limb, 3.4);
              color[0] += specular * 42;
              color[1] += specular * 68;
              color[2] += specular * 98;
            }

            color = mix(color, [82, 154, 230], haze * 0.20);

            if (sample.cloudAlpha > 0) {
              color = mix(color, [232, 238, 235], sample.cloudAlpha * clamp(0.42 + light * 0.58, 0, 1));
            }

            color[0] += rim * 22;
            color[1] += rim * 46;
            color[2] += rim * 86;

            data[idx] = clamp(Math.round(color[0]), 0, 255);
            data[idx + 1] = clamp(Math.round(color[1]), 0, 255);
            data[idx + 2] = clamp(Math.round(color[2]), 0, 255);
            data[idx + 3] = 255;
          }
        }

        ctx.clearRect(0, 0, SIZE, SIZE);
        ctx.putImageData(image, 0, 0);

        ctx.save();
        ctx.beginPath();
        ctx.arc(CENTER, CENTER, RADIUS + 2, 0, TWO_PI);
        ctx.strokeStyle = "rgba(188,223,255,.35)";
        ctx.lineWidth = 2;
        ctx.stroke();

        ctx.beginPath();
        ctx.arc(CENTER, CENTER, RADIUS + 16, 0, TWO_PI);
        ctx.strokeStyle = "rgba(102,174,255,.16)";
        ctx.lineWidth = 10;
        ctx.stroke();
        ctx.restore();
      }

      function tick() {
        STATE.phase = wrap01(STATE.phase + 0.00062 + STATE.velocity);
        STATE.cloudPhase = wrap01(STATE.cloudPhase + 0.00024 + STATE.velocity * 0.42);
        STATE.velocity *= 0.945;

        if (Math.abs(STATE.velocity) < 0.000012) {
          STATE.velocity = 0;
        }

        draw();
        requestAnimationFrame(tick);
      }

      canvas.addEventListener("pointerdown", (event) => {
        STATE.dragging = true;
        STATE.lastX = event.clientX;
        STATE.velocity = 0;

        try {
          canvas.setPointerCapture(event.pointerId);
        } catch (error) {}

        if (event.cancelable) event.preventDefault();
      }, { passive: false });

      window.addEventListener("pointermove", (event) => {
        if (!STATE.dragging) return;

        const dx = event.clientX - STATE.lastX;
        STATE.lastX = event.clientX;

        const delta = -dx * 0.00145;
        STATE.phase = wrap01(STATE.phase + delta);
        STATE.cloudPhase = wrap01(STATE.cloudPhase + delta * 0.42);
        STATE.velocity = delta * 0.58;

        if (event.cancelable) event.preventDefault();
      }, { passive: false });

      window.addEventListener("pointerup", () => {
        STATE.dragging = false;
      });

      window.addEventListener("pointercancel", () => {
        STATE.dragging = false;
      });

      window.DGB_EARTH_VISUAL_PROOF_RECEIPT = {
        contract: "EARTH_G6_VISUAL_PROOF_EXCEPTION_SINGLE_FILE_TNT_v1",
        route: "/showroom/globe/earth/",
        goal: "show_the_planet_first",
        statusScreen: "forbidden",
        runtimeChain: "bypassed_for_visual_proof",
        baseSurface: "generated_from_code",
        generatedImage: false,
        graphicBox: false,
        visualPassClaimed: false,
        timestamp: new Date().toISOString()
      };

      draw();
      tick();
    })();
