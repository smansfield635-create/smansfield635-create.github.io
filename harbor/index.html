<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Harbor Core · Nine Summits Island</title>
  <meta name="description" content="Harbor Core entry region for Nine Summits Island.">
  <style>
    :root{
      --bg:#09060a;
    }
    *{box-sizing:border-box}
    html,body{
      margin:0;
      padding:0;
      height:100%;
      background:var(--bg);
      overflow:hidden;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      color:#fff4e6;
    }
    .page{
      position:relative;
      width:100%;
      height:100%;
    }
    #scene{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      display:block;
      touch-action:none;
    }
    .top-pill{
      position:absolute;
      top:max(14px,env(safe-area-inset-top));
      left:50%;
      transform:translateX(-50%);
      min-width:118px;
      height:34px;
      padding:0 16px;
      display:flex;
      align-items:center;
      justify-content:center;
      border-radius:999px;
      background:rgba(12,10,16,0.58);
      border:1px solid rgba(255,220,160,0.22);
      box-shadow:0 10px 30px rgba(0,0,0,0.28);
      backdrop-filter:blur(10px);
      font-size:12px;
      font-weight:800;
      letter-spacing:.10em;
      text-transform:uppercase;
      z-index:10;
      pointer-events:none;
    }
  </style>
</head>
<body>
  <div class="page">
    <canvas id="scene" aria-label="Harbor Core scene"></canvas>
    <div class="top-pill">Harbor Core</div>
  </div>

  <script src="/assets/openworld_camera.js?v=sanity1"></script>
  <script src="/assets/openworld_background_renderer.js?v=sanity1"></script>
  <script src="/assets/openworld_compass_renderer.js?v=sanity1"></script>
  <script src="/assets/openworld_scene_input.js?v=sanity1"></script>
  <script src="/assets/openworld_scene_fx.js?v=sanity1"></script>
  <script src="/assets/openworld_showroom_renderer.js?v=sanity1"></script>
  <script src="/assets/openworld_dragon_renderer.js?v=sanity1"></script>
  <script src="/world/harbor_renderer.js?v=sanity1"></script>
  <script src="/world/environment_runtime.js?v=sanity1"></script>
  <script src="/world/island_regions.js?v=sanity1"></script>
  <script src="/variant/scene.js?v=sanity1"></script>
</body>
</html>
