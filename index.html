<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Navigator</title>

<style>
html,body{
margin:0;
height:100%;
overflow:hidden;
background:#000;
font-family:system-ui,Segoe UI,Roboto,sans-serif;
color:white;
}

#scene{
position:fixed;
left:0;
top:0;
width:100%;
height:100%;
display:block;
}

.controls{
position:fixed;
top:16px;
left:16px;
z-index:10;
display:flex;
gap:8px;
}

button{
padding:8px 12px;
border-radius:8px;
border:none;
background:rgba(255,255,255,.15);
color:white;
font-weight:600;
cursor:pointer;
}
</style>
</head>

<body>

<canvas id="scene"></canvas>

<div class="controls">
<button onclick="navigatorLayer(1)">Layer 1</button>
<button onclick="navigatorLayer(2)">Layer 2</button>
</div>

<script src="/variant/scene.js"></script>

</body>
</html>
