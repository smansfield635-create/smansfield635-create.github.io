<!doctype html>
<!-- TNT — /index.html
     COMPASS · FIELD LATTICE (FUNNEL-GRAVITY) · COLOR FIX (RED/DARK/RED/DARK) · 2-LANE DUAL-LAYER
     OWNER: SEAN
     FIX (YOUR ASK):
       - Palette becomes: RED (site field via ui.css) → DARK (header glass) → RED (compass slab/water face) → DARK (dial + gems)
       - ui.css still owns html/body background (NO overrides)
       - English-only for speed (no CN/ES toggles in this build)
       - lane=platform|engineering is URL-only; NO storage; NO reload
       - gd_* carry only: gd_lang/gd_style/gd_time/gd_depth
       - Dual-layer compass: PLATFORM shows inner 8 hubs; ENGINEERING swaps diagonals (still 8 hubs + CORE + cardinals)
       - No ring layout; funnel lattice layout (gravity field), not circle distribution
       - No inline onclick; addEventListener only
     ROUTES:
       - CORE routes to /index-core/index.html
       - Unknown/unbuilt routes to /404.html
-->

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Compass · DiamondGateBridge</title>

<link rel="stylesheet" href="/assets/ui.css"/>
<link rel="stylesheet" href="/assets/branch.css"/>
<script defer src="/assets/instruments.js"></script>

<style>
a{color:inherit;text-decoration:none}
body{margin:0}
body::before,body::after{pointer-events:none!important}

:root{
  /* ===== GEOMETRY (GRAVITY FIELD) ===== */
  --padTop:108px;

  --D0:210px;  /* CORE */
  --D1:148px;  /* cardinals */
  --D2:118px;  /* diagonals */

  /* ===== COLOR MODEL (RED/DARK/RED/DARK) =====
     - RED is ui.css field (global)
     - DARK = header glass + dial + gems
     - RED = compass slab "water face" (internal panel layer)
  */
  --ink:rgba(255,255,255,.94);
  --mut:rgba(255,255,255,.78);
  --stroke:rgba(255,255,255,.12);

  /* header glass (DARK) */
  --hdrA:rgba(8,10,14,.74);
  --hdrB:rgba(4,6,10,.82);

  /* compass slab (RED layer) */
  --slabR0:rgba(255,95,70,.10);
  --slabR1:rgba(255,60,60,.10);
  --slabR2:rgba(212,175,55,.08);

  /* dial (DARK layer) */
  --dialA:rgba(0,0,0,.18);
  --dialB:rgba(0,0,0,.44);

  /* gem material (DARK) */
  --onyx0:rgba(6,8,10,.96);
  --onyx1:rgba(10,12,16,.88);
  --crimson:rgba(120,0,22,.38);
  --festival:rgba(255,43,43,.18);
  --opalV:rgba(90,40,120,.12);

  --gold:rgba(212,175,55,.55);
  --goldGlow:rgba(212,175,55,.22);

  --shadowDeep:0 44px 140px rgba(0,0,0,.80);
  --shadowA:0 26px 90px rgba(0,0,0,.60);
  --shadowB:0 18px 60px rgba(0,0,0,.55);
}

/* ===== TOP BAR (DARK glass layer) ===== */
.top{
  position:fixed;top:14px;left:0;right:0;
  padding:0 14px;
  z-index:260;
  pointer-events:none;
}
.topbar{
  pointer-events:auto;
  width:min(1120px,96vw);
  margin:0 auto;
  border:1px solid rgba(255,255,255,.12);
  border-radius:22px;
  padding:10px 12px;
  background:
    radial-gradient(circle at 18% 18%, rgba(212,175,55,.10), transparent 62%),
    radial-gradient(circle at 82% 30%, rgba(255,43,43,.10), transparent 64%),
    linear-gradient(145deg, var(--hdrA), var(--hdrB));
  box-shadow:var(--shadowA), inset 0 0 0 1px rgba(212,175,55,.10);
  backdrop-filter:blur(10px);
  display:flex;align-items:center;justify-content:space-between;
  gap:10px;
}

.brandLeft{
  display:flex;align-items:center;gap:12px;flex-wrap:wrap;min-width:0;
}
.brandTitle{
  font-weight:980;
  letter-spacing:.6px;
  font-size:14px;
  color:rgba(255,255,255,.94);
  white-space:nowrap;
}
.brandSub{
  font-size:12px;
  color:rgba(255,255,255,.74);
  letter-spacing:.2px;
  white-space:nowrap;
}
.brandLinks{
  display:flex;gap:10px;flex-wrap:wrap;
  font-size:12px;color:rgba(255,255,255,.70);
}
.brandLinks a{
  padding:6px 10px;border-radius:999px;
  border:1px solid rgba(212,175,55,.16);
  background:rgba(0,0,0,.14);
}

.controlsRight{
  display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:flex-end;
}

/* segmented controls */
.seg{
  display:inline-flex;gap:0;overflow:hidden;border-radius:16px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(0,0,0,.18);
  box-shadow:var(--shadowB);
}
.seg button{
  appearance:none;border:0;background:transparent;
  color:rgba(255,255,255,.78);
  padding:10px 12px;min-height:42px;
  font-weight:980;font-size:13px;letter-spacing:.25px;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
.seg button[aria-pressed="true"]{
  color:rgba(255,255,255,.95);
  background:
    radial-gradient(circle at 50% 50%, rgba(212,175,55,.14), transparent 62%),
    linear-gradient(180deg, rgba(255,43,43,.10), rgba(0,0,0,.10));
  box-shadow: inset 0 0 0 1px rgba(212,175,55,.14), inset 0 -10px 22px rgba(212,175,55,.10);
}

/* ===== STAGE ===== */
.stage{
  position:relative;
  width:min(1200px,94vw);
  height:min(1200px,86vh);
  margin:var(--padTop) auto 0;
  pointer-events:none;
}

/* slab is the RED layer (water-face) */
.slab{
  position:absolute;left:50%;top:50%;
  transform:translate(-50%,-50%);
  width:min(1020px,92vw);
  height:min(1020px,92vw);
  border-radius:44px;
  pointer-events:none;
  z-index:1;
  border:1px solid rgba(255,255,255,.10);
  background:
    radial-gradient(circle at 30% 22%, rgba(255,255,255,.08), transparent 55%),
    radial-gradient(circle at 78% 28%, var(--slabR1), transparent 60%),
    radial-gradient(circle at 70% 82%, var(--slabR0), transparent 64%),
    radial-gradient(circle at 50% 50%, var(--slabR2), transparent 62%),
    linear-gradient(160deg, rgba(0,0,0,.14), rgba(0,0,0,.08));
  box-shadow:
    0 70px 240px rgba(0,0,0,.50),
    inset 0 2px 0 rgba(255,255,255,.08),
    inset 0 -70px 140px rgba(0,0,0,.40);
  opacity:.98;
}

/* dial is DARK layer */
.dial{
  position:absolute;
  left:50%;top:50%;
  transform:translate(-50%,-50%);
  width:min(940px,90vw);
  height:min(940px,90vw);
  border-radius:999px;
  pointer-events:none;
  z-index:2;
  overflow:hidden;
}
.dial::before{
  content:"";
  position:absolute;inset:0;border-radius:999px;
  background:
    radial-gradient(circle at 50% 42%,
      rgba(255,255,255,.05),
      var(--dialA) 56%,
      var(--dialB) 78%,
      rgba(0,0,0,.00) 92%),
    radial-gradient(circle at 50% 50%, rgba(212,175,55,.10), transparent 62%),
    radial-gradient(circle at 50% 50%, rgba(255,43,43,.08), transparent 66%);
  box-shadow:
    inset 0 0 0 2px rgba(255,255,255,.06),
    inset 0 0 0 10px rgba(0,0,0,.12),
    inset 0 0 80px rgba(0,0,0,.55),
    0 50px 180px rgba(0,0,0,.26);
  opacity:.96;
}
.dial::after{
  content:"";
  position:absolute;inset:-14%;
  background:
    /* rings (gold) */
    radial-gradient(circle at 50% 50%, transparent 0 34%, rgba(212,175,55,.10) 34% 34.6%, transparent 35% 100%),
    radial-gradient(circle at 50% 50%, transparent 0 52%, rgba(212,175,55,.10) 52% 52.6%, transparent 53% 100%),
    radial-gradient(circle at 50% 50%, transparent 0 70%, rgba(212,175,55,.10) 70% 70.6%, transparent 71% 100%),

    /* axes */
    linear-gradient(90deg, transparent 0 49.7%, rgba(212,175,55,.16) 49.7% 50.3%, transparent 50.3% 100%),
    linear-gradient(0deg,  transparent 0 49.7%, rgba(212,175,55,.16) 49.7% 50.3%, transparent 50.3% 100%),

    /* subtle curved shimmer (breaks "grid" look) */
    repeating-radial-gradient(circle at 50% 50%,
      rgba(212,175,55,.05) 0 2px,
      transparent 2px 18px);

  filter: blur(.25px);
  opacity:.55;
  mask: radial-gradient(circle at 50% 50%, transparent 0 18%, #000 20% 100%);
  -webkit-mask: radial-gradient(circle at 50% 50%, transparent 0 18%, #000 20% 100%);
}

.faceLetters{
  position:absolute;left:50%;top:50%;
  transform:translate(-50%,-50%);
  width:min(940px,90vw);
  height:min(940px,90vw);
  pointer-events:none;
  z-index:3;
  opacity:.72;
}
.faceLetters span{
  position:absolute;
  color:rgba(212,175,55,.55);
  font-weight:980;
  letter-spacing:2px;
  font-size:12px;
  text-shadow:0 0 12px rgba(0,0,0,.55);
}
.faceLetters .N{left:50%;top:12px;transform:translateX(-50%)}
.faceLetters .E{right:12px;top:50%;transform:translateY(-50%)}
.faceLetters .S{left:50%;bottom:12px;transform:translateX(-50%)}
.faceLetters .W{left:12px;top:50%;transform:translateY(-50%)}

/* ===== GEM NODES (DARK) ===== */
.node{
  position:absolute;
  left:50%;top:50%;
  transform:translate(-50%,-50%) rotate(45deg);
  cursor:pointer;
  pointer-events:auto;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.18);
  transition:box-shadow .16s ease, border-color .16s ease, filter .16s ease;
  z-index:10;
  border-radius:22px;
}
.core{width:var(--D0);height:var(--D0);z-index:12;border-radius:26px}
.l1{width:var(--D1);height:var(--D1)}
.l2{width:var(--D2);height:var(--D2);border-radius:20px}

.surface{
  background:
    radial-gradient(circle at 20% 18%, rgba(255,255,255,.22), transparent 46%),
    radial-gradient(circle at 78% 22%, var(--festival), transparent 62%),
    radial-gradient(circle at 74% 84%, var(--opalV), transparent 64%),
    radial-gradient(circle at 28% 84%, var(--crimson), transparent 70%),
    linear-gradient(160deg, var(--onyx1), var(--onyx0));
  box-shadow:
    var(--shadowDeep),
    0 0 24px rgba(255,43,43,.06),
    inset 0 2px 0 rgba(255,255,255,.16),
    inset 0 -52px 92px rgba(0,0,0,.88);
}

/* “3D” inlay that is NOT vertical/horizontal grid */
.surface::before{
  content:"";
  position:absolute;inset:0;border-radius:inherit;pointer-events:none;

  /* curved + diamond-aligned */
  background:
    repeating-conic-gradient(from 45deg at 50% 50%,
      rgba(212,175,55,.10) 0 1.1deg,
      transparent 1.1deg 10deg),
    radial-gradient(circle at 50% 50%, transparent 0 62%, rgba(212,175,55,.14) 66%, transparent 72%);

  opacity:.26;
  mask: radial-gradient(circle at 50% 50%, transparent 0 64%, #000 74% 100%);
  -webkit-mask: radial-gradient(circle at 50% 50%, transparent 0 64%, #000 74% 100%);
}

.surface::after{
  content:"";
  position:absolute;left:12%;right:12%;top:10%;
  height:30%;
  border-radius:999px;
  background:linear-gradient(to bottom, rgba(255,255,255,.20), rgba(255,255,255,0));
  transform:rotate(-12deg);
  pointer-events:none;
  opacity:.92;
}

.node:hover{
  border-color:rgba(212,175,55,.44);
  box-shadow:
    var(--shadowDeep),
    0 0 0 2px rgba(212,175,55,.14),
    0 0 34px rgba(212,175,55,.18),
    inset 0 2px 0 rgba(255,255,255,.18),
    inset 0 -52px 92px rgba(0,0,0,.88);
}
.node:active{filter:brightness(.985)}

/* inner text */
.inner{
  width:100%;height:100%;
  transform:rotate(-45deg);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:10px;
  gap:6px;
  color:#fff;
  pointer-events:none;
  user-select:none;
}
.word{
  font-weight:980;
  letter-spacing:.6px;
  line-height:1.05;
  text-shadow:0 0 18px rgba(0,0,0,.42);
  font-size:clamp(12px, 1.1vw, 18px);
}
.code{
  font-weight:950;
  font-size:10px;
  letter-spacing:1.2px;
  opacity:.78;
}
.core .word{font-size:clamp(14px, 1.35vw, 20px)}

/* bottom corners */
.corner{
  position:fixed;
  bottom:max(16px, env(safe-area-inset-bottom));
  z-index:260;
  pointer-events:none;
}
.corner .dmini{pointer-events:auto}
.corner.left{left:16px}
.corner.right{right:16px}

.dmini{
  width:56px;height:56px;
  border-radius:16px;
  border:1px solid rgba(255,255,255,.14);
  background:
    radial-gradient(circle at 50% 40%, rgba(255,255,255,.08), transparent 52%),
    linear-gradient(145deg, rgba(10,12,16,.78), rgba(6,8,10,.92));
  box-shadow:var(--shadowB), 0 0 0 1px rgba(212,175,55,.10), 0 0 18px rgba(212,175,55,.10);
  display:grid;place-items:center;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
  transform:rotate(45deg);
  position:relative;
  overflow:hidden;
  transition:box-shadow .16s ease, border-color .16s ease;
}
.dmini:hover{
  border-color:rgba(212,175,55,.44);
  box-shadow:var(--shadowB), 0 0 0 2px rgba(212,175,55,.14), 0 0 30px rgba(212,175,55,.18);
}
.dmini span{
  transform:rotate(-45deg);
  font-weight:980;
  font-size:12px;
  letter-spacing:.6px;
  color:rgba(255,255,255,.92);
}
.cornerLabel{
  margin-top:10px;
  text-align:center;
  color:rgba(255,255,255,.72);
  font-size:11px;
  letter-spacing:.4px;
}

/* mobile */
@media (max-width:720px){
  :root{
    --D0:196px;
    --D1:142px;
    --D2:112px;
    --padTop:112px;
  }
  .stage{height:min(980px,86vh)}
}
@media (max-width:520px){
  :root{
    --D0:184px;
    --D1:136px;
    --D2:108px;
  }
  .brandSub{display:none}
}
</style>
</head>

<body>

<div class="top" aria-label="Top controls">
  <div class="topbar">
    <div class="brandLeft" aria-label="Brand">
      <div class="brandTitle">WELCOME TO THE COMPASS</div>
      <div class="brandSub" id="brandSub">A visual tutorial: pick one hub → get one clear next step.</div>
      <div class="brandLinks" aria-label="Brand links">
        <a href="https://diamondgatebridge.com" target="_blank" rel="noopener">diamondgatebridge.com</a>
        <a href="https://cogrid.net" target="_blank" rel="noopener">cogrid.net</a>
      </div>
    </div>

    <div class="controlsRight" aria-label="Controls">
      <div class="seg" role="group" aria-label="Lane">
        <button type="button" id="lanePlatform" aria-pressed="true">PLATFORM</button>
        <button type="button" id="laneEngineering" aria-pressed="false">ENGINEERING</button>
      </div>
    </div>
  </div>
</div>

<div class="stage" id="stage" aria-label="Compass field">
  <div class="slab" aria-hidden="true"></div>
  <div class="dial" aria-hidden="true"></div>
  <div class="faceLetters" aria-hidden="true">
    <span class="N">N</span><span class="E">E</span><span class="S">S</span><span class="W">W</span>
  </div>
</div>

<div class="corner left" aria-label="Exit">
  <div class="dmini" id="btnExit" role="button" tabindex="0" aria-label="Exit"><span>EXIT</span></div>
  <div class="cornerLabel">EXIT</div>
</div>
<div class="corner right" aria-label="Hub">
  <div class="dmini" id="btnHub" role="button" tabindex="0" aria-label="Hub"><span>HUB</span></div>
  <div class="cornerLabel">HUB</div>
</div>

<script>
(function(){
  "use strict";

  // ===== Canon state (gd_* only; lane URL-only) =====
  var qs=new URLSearchParams(location.search);
  var LS=window.localStorage;

  var lang  = "en"; // English-only build
  var style = qs.get("style") || LS.getItem("gd_style") || "informal"; // informal = your “RED/DARK/RED/DARK”
  var time  = qs.get("time")  || LS.getItem("gd_time")  || "now";
  var depth = qs.get("depth") || LS.getItem("gd_depth") || "explore";
  var lane  = qs.get("lane")  || "platform"; // URL-only

  if(style!=="informal" && style!=="formal") style="informal";
  if(time==="trajectory") time="post";
  if(time!=="origin" && time!=="now" && time!=="post") time="now";
  if(depth!=="explore" && depth!=="learn") depth="explore";
  if(lane!=="platform" && lane!=="engineering") lane="platform";

  try{
    LS.setItem("gd_lang","en");
    LS.setItem("gd_style",style);
    LS.setItem("gd_time",time);
    LS.setItem("gd_depth",depth);
  }catch(e){}

  document.documentElement.lang="en";

  // ===== Color variant (NO new keys):
  // informal = your target palette; formal = darker “night” variant.
  if(style==="formal"){
    document.documentElement.style.setProperty("--hdrA","rgba(0,0,0,.78)");
    document.documentElement.style.setProperty("--hdrB","rgba(0,0,0,.88)");
    document.documentElement.style.setProperty("--slabR0","rgba(255,95,70,.06)");
    document.documentElement.style.setProperty("--slabR1","rgba(255,43,43,.06)");
    document.documentElement.style.setProperty("--slabR2","rgba(212,175,55,.06)");
    document.documentElement.style.setProperty("--dialB","rgba(0,0,0,.52)");
  }

  function q(over){
    var p=new URLSearchParams();
    p.set("lang","en");
    p.set("style",(over&&over.style)?over.style:style);
    p.set("time",(over&&over.time)?over.time:time);
    p.set("depth",(over&&over.depth)?over.depth:depth);
    var L=(over&&over.lane)?over.lane:lane;
    if(L==="platform"||L==="engineering") p.set("lane",L);
    return "?"+p.toString();
  }
  function go(path){ window.location.href = path + q(); }

  // ===== ROUTING =====
  var PLACEHOLDER_404="/404.html";
  var CORE_ROUTE="/index-core/index.html";
  var EXIT_ROUTE="/door/";
  var HUB_ROUTE="/home/";

  // always-present cardinals (you set: N laws, E energy, S finance, W governance)
  var CARDINALS=[
    {code:"N", label:"LAWS", href:"/laws/"},
    {code:"E", label:"ENERGY", href:"/explore/frontier/energy/"},
    {code:"S", label:"FINANCE", href:"/finance/"},
    {code:"W", label:"GOVERNANCE", href:"/governance/"}
  ];

  // platform diagonals (inner 4)
  var DIAG_PLATFORM=[
    {code:"NE", label:"PRODUCTS", href:"/products/"},
    {code:"SE", label:"RESEARCH", href:"/research/"},
    {code:"SW", label:"EXPLORE", href:"/explore/"},
    {code:"NW", label:"DOCTRINE", href:"/products/capital-doctrine/"}
  ];

  // engineering diagonals (swap set; keeps it to 8 hubs, not 16)
  var DIAG_ENGINEERING=[
    {code:"NE", label:"EDUCATION", href:"/products/education/"},
    {code:"SE", label:"INFRA", href:"/explore/infrastructure/"},
    {code:"SW", label:"AGRICULTURE", href:"/products/agriculture/"},
    {code:"NW", label:"SHIMMER", href:"/explore/frontier/shimmer/"}
  ];

  function safeHref(h){
    if(!h) return PLACEHOLDER_404;
    return String(h).trim() || PLACEHOLDER_404;
  }

  function mkNode(word, code, cls){
    var d=document.createElement("div");
    d.className="node surface "+cls;
    d.setAttribute("role","button");
    d.tabIndex=0;

    var inner=document.createElement("div");
    inner.className="inner";

    var w=document.createElement("div");
    w.className="word";
    w.textContent=word;

    var c=document.createElement("div");
    c.className="code";
    c.textContent=code;

    inner.appendChild(w);
    inner.appendChild(c);
    d.appendChild(inner);
    return d;
  }

  var stage=document.getElementById("stage");

  // ===== Funnel lattice positions (NOT ring)
  // Core at center.
  // Cardinals: up/right/down/left around core.
  // Diagonals: four corners around that.
  function layout(){
    stage.querySelectorAll(".node").forEach(function(n){ n.remove(); });

    var rect=stage.getBoundingClientRect();
    var cx=rect.width/2, cy=rect.height/2;

    // core
    var core=mkNode("CORE INDEX","CORE","core");
    core.style.left=cx+"px"; core.style.top=cy+"px";
    core.addEventListener("click", function(){ go(CORE_ROUTE); }, {passive:true});
    core.addEventListener("keydown", function(e){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); go(CORE_ROUTE); }});
    stage.appendChild(core);

    // spacing derived from core size (gravity)
    var D0=parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--D0"))||210;
    var D1=parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--D1"))||148;
    var gap = Math.max(18, Math.round(D0*0.12));
    var r1 = (D0/2) + (D1/2) - gap; // pulls inward (funnel feel)
    var r2 = r1 + (D1*0.62);        // diagonal ring

    // cardinals pinned
    var angC=[-Math.PI/2, 0, Math.PI/2, Math.PI];
    for(var i=0;i<CARDINALS.length;i++){
      var it=CARDINALS[i];
      var x=cx + r1*Math.cos(angC[i]);
      var y=cy + r1*Math.sin(angC[i]);
      var n=mkNode(it.label, it.code, "l1");
      n.style.left=x+"px"; n.style.top=y+"px";
      (function(path, el){
        var href=safeHref(path);
        el.addEventListener("click", function(){ go(href); }, {passive:true});
        el.addEventListener("keydown", function(e){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); go(href); }});
      })(it.href, n);
      stage.appendChild(n);
    }

    // diagonals swapped by lane
    var diags = (lane==="engineering") ? DIAG_ENGINEERING : DIAG_PLATFORM;
    var angD=[-Math.PI/4, Math.PI/4, 3*Math.PI/4, -3*Math.PI/4]; // NE, SE, SW, NW
    for(var j=0;j<diags.length;j++){
      var it2=diags[j];
      var x2=cx + r2*Math.cos(angD[j]);
      var y2=cy + r2*Math.sin(angD[j]);
      var n2=mkNode(it2.label, it2.code, "l2");
      n2.style.left=x2+"px"; n2.style.top=y2+"px";
      (function(path, el){
        var href=safeHref(path);
        el.addEventListener("click", function(){ go(href); }, {passive:true});
        el.addEventListener("keydown", function(e){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); go(href); }});
      })(it2.href, n2);
      stage.appendChild(n2);
    }
  }

  function safeLayout(){
    var r=stage.getBoundingClientRect();
    if(r.width<10||r.height<10){ requestAnimationFrame(safeLayout); return; }
    layout();
  }

  // ===== Lane toggle (URL-only; no storage; no reload)
  function setPressed(idOn){
    var p=document.getElementById("lanePlatform");
    var e=document.getElementById("laneEngineering");
    if(p) p.setAttribute("aria-pressed", idOn==="platform" ? "true" : "false");
    if(e) e.setAttribute("aria-pressed", idOn==="engineering" ? "true" : "false");
  }
  function setLane(next){
    if(next!=="platform" && next!=="engineering") next="platform";
    lane=next;
    history.replaceState({}, "", location.pathname + q({lane:lane}));
    setPressed(lane);
    safeLayout();
  }

  document.getElementById("lanePlatform").addEventListener("click", function(){ setLane("platform"); }, {passive:true});
  document.getElementById("laneEngineering").addEventListener("click", function(){ setLane("engineering"); }, {passive:true});
  setPressed(lane);

  // ===== Corners
  function bindCorner(id, path){
    var el=document.getElementById(id);
    if(!el) return;
    function act(){ go(path); }
    el.addEventListener("click", act, {passive:true});
    el.addEventListener("keydown", function(e){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); act(); }});
  }
  bindCorner("btnExit", EXIT_ROUTE);
  bindCorner("btnHub", HUB_ROUTE);

  // init
  requestAnimationFrame(safeLayout);
  window.addEventListener("resize", function(){ safeLayout(); }, {passive:true});

})();
</script>

</body>
</html>
