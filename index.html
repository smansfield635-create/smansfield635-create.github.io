<!doctype html>
<!-- TNT — /index.html
     COMPASS (DUAL-LAYER) — ENGLISH ONLY (VISUAL-FIRST) — V5 RETRY
     FIXES THIS PASS:
       - NO extra diamonds (no “4 random extras”)
       - LAYER 1 = CORE + N/E/S/W (4 of the 16)
       - LAYER 2 = CORE2 + 12 (remaining 12 of the 16)
       - Cores + EXIT/HUB are NOT counted in the 16
       - COLOR STACK: red (field) → dark (panel) → red (dial rim glow) → dark (dial) → dark (gems)
       - CRISP dial rings (no blur)
       - ONE background engine only: /assets/bg-engine.js (canvas zIndex 0)
       - NO other animation scripts on this page
     STATE (LOCKED):
       - gd_* keys only: gd_lang/gd_style/gd_time/gd_depth (LS + URL)
       - layer=1|2 URL-only (NOT stored)
       - lane=platform|engineering URL-only (NOT stored)
     ROUTING (LOCKED):
       - CORE  -> /index-core/index.html
       - CORE2 -> /index-core/index.html (temporary spine)
       - EXIT  -> /door/
       - HUB   -> /home/
     RULES:
       - ui.css owns html/body background (NO overrides)
       - No overlays/modals; no inline onclick; addEventListener only
-->

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Compass</title>

<link rel="stylesheet" href="/assets/ui.css"/>
<link rel="stylesheet" href="/assets/branch.css"/>
<script defer src="/assets/instruments.js"></script>
<script defer src="/assets/bg-engine.js"></script>

<style>
a{color:inherit;text-decoration:none}
body{margin:0}
body::before,body::after{pointer-events:none!important}

:root{
  --padTop:96px;

  /* geometry sizes */
  --D0:204px; /* CORE */
  --D1:146px; /* N/E/S/W */
  --D2:114px; /* Layer2 ring nodes */

  /* radii */
  --R1:176px;
  --R2:268px;

  /* local material tokens (NO body bg) */
  --stroke:rgba(255,255,255,.12);
  --ink:rgba(255,255,255,.94);
  --mut:rgba(255,255,255,.72);

  --onyx0:rgba(6,8,10,.96);
  --onyx1:rgba(10,12,16,.88);

  --crimson:rgba(120,0,22,.40);
  --festival:rgba(255,43,43,.22);
  --opalV:rgba(90,40,120,.12);

  --gold:rgba(212,175,55,.62);

  --shadowA:0 28px 110px rgba(0,0,0,.70);
  --shadowB:0 18px 60px rgba(0,0,0,.55);
  --shadowDeep:0 44px 140px rgba(0,0,0,.82);

  --dialW:min(980px,92vw);
}

/* ===== TOP BAR ===== */
.top{
  position:fixed;top:14px;left:0;right:0;
  padding:0 14px;
  z-index:260;
  pointer-events:none;
}
.topbar{
  pointer-events:auto;
  width:min(1120px,96vw);
  margin:0 auto;
  border:1px solid rgba(255,255,255,.12);
  border-radius:22px;
  padding:10px 12px;
  background:
    radial-gradient(circle at 18% 18%, rgba(212,175,55,.10), transparent 62%),
    radial-gradient(circle at 82% 30%, rgba(255,43,43,.10), transparent 64%),
    linear-gradient(145deg, rgba(8,10,14,.90), rgba(4,6,10,.96));
  box-shadow:var(--shadowA), inset 0 0 0 1px rgba(212,175,55,.10);
  backdrop-filter:blur(10px);
  display:flex;align-items:center;justify-content:space-between;
  gap:10px;
}
.brandLeft{
  display:flex;align-items:center;gap:12px;flex-wrap:wrap;min-width:0;
}
.brandTitle{
  font-weight:980;letter-spacing:.6px;font-size:14px;color:rgba(255,255,255,.94);
  white-space:nowrap;
}
.brandSub{
  font-size:12px;color:rgba(255,255,255,.72);letter-spacing:.2px;white-space:nowrap;
}
.brandLinks{
  display:flex;gap:10px;flex-wrap:wrap;font-size:12px;color:rgba(255,255,255,.70);
}
.brandLinks a{
  padding:6px 10px;border-radius:999px;
  border:1px solid rgba(212,175,55,.16);
  background:rgba(0,0,0,.14);
}

.controlsRight{
  display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:flex-end;
}

.seg{
  display:inline-flex;gap:0;overflow:hidden;border-radius:16px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(0,0,0,.18);
  box-shadow:var(--shadowB);
}
.seg button{
  appearance:none;border:0;background:transparent;
  color:rgba(255,255,255,.78);
  padding:10px 12px;min-height:42px;
  font-weight:980;font-size:13px;letter-spacing:.25px;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
.seg button[aria-pressed="true"]{
  color:rgba(255,255,255,.95);
  background:
    radial-gradient(circle at 50% 50%, rgba(212,175,55,.14), transparent 62%),
    linear-gradient(180deg, rgba(255,43,43,.10), rgba(0,0,0,.10));
  box-shadow: inset 0 0 0 1px rgba(212,175,55,.14), inset 0 -10px 22px rgba(212,175,55,.10);
}

/* ===== STAGE ===== */
.stage{
  position:relative;
  width:min(1200px,94vw);
  height:min(1200px,86vh);
  margin:var(--padTop) auto 0;
  pointer-events:none;
  z-index:10; /* above bg canvas */
}

/* “dark” panel behind dial (dark layer) */
.panel{
  position:absolute;inset:0;
  border-radius:34px;
  pointer-events:none;
  background:
    radial-gradient(circle at 28% 18%, rgba(255,80,60,.10), transparent 58%),
    radial-gradient(circle at 78% 22%, rgba(212,175,55,.08), transparent 62%),
    linear-gradient(160deg, rgba(0,0,0,.14), rgba(0,0,0,.24));
  border:1px solid rgba(255,255,255,.08);
  box-shadow:0 70px 240px rgba(0,0,0,.44);
}

/* Dial: red sheen (thin) over dark obsidian */
.dialWrap{
  position:absolute;left:50%;top:50%;
  transform:translate(-50%,-50%);
  width:var(--dialW);height:var(--dialW);
  border-radius:999px;
  pointer-events:none;
  z-index:12;
}
.dialRed{
  position:absolute;inset:-2px;border-radius:999px;
  background:
    radial-gradient(circle at 50% 40%, rgba(255,80,60,.10), transparent 64%),
    radial-gradient(circle at 50% 55%, rgba(255,43,43,.08), transparent 70%),
    radial-gradient(circle at 50% 50%, rgba(212,175,55,.08), transparent 72%);
  opacity:.80;
}
.dial{
  position:absolute;inset:0;border-radius:999px;
  overflow:hidden;
  background:
    radial-gradient(circle at 50% 42%,
      rgba(255,255,255,.05),
      rgba(0,0,0,.22) 56%,
      rgba(0,0,0,.58) 78%,
      rgba(0,0,0,.00) 92%),
    radial-gradient(circle at 50% 50%, rgba(212,175,55,.08), transparent 62%),
    radial-gradient(circle at 50% 50%, rgba(255,43,43,.06), transparent 66%),
    linear-gradient(180deg, rgba(0,0,0,.12), rgba(0,0,0,.00));
  box-shadow:
    inset 0 0 0 2px rgba(255,255,255,.06),
    inset 0 0 0 10px rgba(0,0,0,.12),
    inset 0 0 80px rgba(0,0,0,.55),
    0 50px 180px rgba(0,0,0,.28);
}
.dial::after{
  content:"";
  position:absolute;inset:-14%;
  background:
    radial-gradient(circle at 50% 50%, transparent 0 36%, rgba(255,255,255,.06) 36% 36.6%, transparent 37% 100%),
    radial-gradient(circle at 50% 50%, transparent 0 52%, rgba(255,255,255,.06) 52% 52.6%, transparent 53% 100%),
    radial-gradient(circle at 50% 50%, transparent 0 68%, rgba(255,255,255,.06) 68% 68.6%, transparent 69% 100%),

    linear-gradient(90deg, transparent 0 49.7%, rgba(212,175,55,.12) 49.7% 50.3%, transparent 50.3% 100%),
    linear-gradient(0deg,  transparent 0 49.7%, rgba(212,175,55,.12) 49.7% 50.3%, transparent 50.3% 100%),

    repeating-conic-gradient(from 45deg at 50% 50%,
      rgba(212,175,55,.06) 0 1.2deg,
      transparent 1.2deg 7.5deg),

    radial-gradient(circle at 50% 50%, rgba(255,255,255,.04), transparent 62%);
  opacity:.78;
  filter:none; /* CRISP */
}

/* Letters */
.faceLetters{
  position:absolute;left:50%;top:50%;
  transform:translate(-50%,-50%);
  width:var(--dialW);height:var(--dialW);
  pointer-events:none;
  z-index:13;
  opacity:.86;
}
.faceLetters span{
  position:absolute;
  color:rgba(212,175,55,.62);
  font-weight:980;
  letter-spacing:2px;
  font-size:12px;
  text-shadow:0 0 12px rgba(0,0,0,.55);
}
.faceLetters .N{left:50%;top:12px;transform:translateX(-50%)}
.faceLetters .E{right:12px;top:50%;transform:translateY(-50%)}
.faceLetters .S{left:50%;bottom:12px;transform:translateX(-50%)}
.faceLetters .W{left:12px;top:50%;transform:translateY(-50%)}

/* ===== NODES ===== */
.node{
  position:absolute;
  left:50%;top:50%;
  transform:translate(-50%,-50%) rotate(45deg);
  cursor:pointer;
  pointer-events:auto;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.18);
  transition:box-shadow .16s ease, border-color .16s ease, filter .16s ease;
  z-index:40;
  border-radius:22px;
}
.core{width:var(--D0);height:var(--D0);border-radius:26px;z-index:50;}
.l1{width:var(--D1);height:var(--D1);border-radius:22px;}
.l2{width:var(--D2);height:var(--D2);border-radius:20px;}

.surface{
  background:
    radial-gradient(circle at 20% 18%, rgba(255,255,255,.28), transparent 46%),
    radial-gradient(circle at 78% 22%, var(--festival), transparent 62%),
    radial-gradient(circle at 74% 84%, var(--opalV), transparent 64%),
    radial-gradient(circle at 28% 84%, var(--crimson), transparent 70%),
    linear-gradient(160deg, var(--onyx1), var(--onyx0));
  box-shadow:
    var(--shadowDeep),
    0 0 24px rgba(255,43,43,.08),
    inset 0 2px 0 rgba(255,255,255,.18),
    inset 0 -52px 92px rgba(0,0,0,.88);
}
.surface::before{
  content:"";
  position:absolute;inset:0;border-radius:inherit;pointer-events:none;
  box-shadow: inset 0 0 0 1px rgba(212,175,55,.18);
  background:
    repeating-linear-gradient(45deg, rgba(212,175,55,.09) 0 1px, transparent 1px 18px),
    repeating-linear-gradient(-45deg, rgba(212,175,55,.07) 0 1px, transparent 1px 18px);
  opacity:.34;
  mask:
    radial-gradient(circle at 50% 50%, transparent 0 72%, #000 78% 100%),
    linear-gradient(#000,#000);
  -webkit-mask:
    radial-gradient(circle at 50% 50%, transparent 0 72%, #000 78% 100%),
    linear-gradient(#000,#000);
}
.surface::after{
  content:"";
  position:absolute;left:12%;right:12%;top:10%;
  height:30%;
  border-radius:999px;
  background:linear-gradient(to bottom, rgba(255,255,255,.20), rgba(255,255,255,0));
  transform:rotate(-12deg);
  pointer-events:none;
  opacity:.92;
}

.node:hover{
  border-color:rgba(212,175,55,.50);
  box-shadow:
    var(--shadowDeep),
    0 0 0 2px rgba(212,175,55,.14),
    0 0 34px rgba(212,175,55,.18),
    inset 0 2px 0 rgba(255,255,255,.20),
    inset 0 -52px 92px rgba(0,0,0,.88);
}
.node:active{filter:brightness(.98);}

.inner{
  width:100%;height:100%;
  transform:rotate(-45deg);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  text-align:center;
  padding:10px;
  gap:6px;
  color:#fff;
}
.word{
  font-weight:980;
  letter-spacing:.6px;
  line-height:1.05;
  text-shadow:0 0 18px rgba(0,0,0,.42);
  font-size:clamp(10px, 1.2vw, 16px);
}
.code{
  font-weight:950;
  font-size:10px;
  letter-spacing:1.2px;
  opacity:.78;
}

/* ===== CORNERS ===== */
.corner{
  position:fixed;
  bottom:max(16px, env(safe-area-inset-bottom));
  z-index:260;
  pointer-events:none;
}
.corner .dmini{pointer-events:auto}
.corner.left{left:16px}
.corner.right{right:16px}

.dmini{
  width:56px;height:56px;
  border-radius:16px;
  border:1px solid rgba(255,255,255,.14);
  background:
    radial-gradient(circle at 50% 40%, rgba(255,255,255,.08), transparent 52%),
    linear-gradient(145deg, rgba(10,12,16,.78), rgba(6,8,10,.92));
  box-shadow:var(--shadowB), 0 0 0 1px rgba(212,175,55,.10), 0 0 18px rgba(212,175,55,.10);
  display:grid;place-items:center;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
  transform:rotate(45deg);
  position:relative;
  overflow:hidden;
  transition:box-shadow .16s ease, border-color .16s ease;
}
.dmini:hover{
  border-color:rgba(212,175,55,.44);
  box-shadow:var(--shadowB), 0 0 0 2px rgba(212,175,55,.14), 0 0 30px rgba(212,175,55,.18);
}
.dmini span{
  transform:rotate(-45deg);
  font-weight:980;
  font-size:12px;
  letter-spacing:.6px;
  color:rgba(255,255,255,.92);
  user-select:none;
}
.cornerLabel{
  margin-top:10px;
  text-align:center;
  color:rgba(255,255,255,.72);
  font-size:11px;
  letter-spacing:.4px;
}

/* responsive */
@media (max-width:720px){
  :root{
    --D0:194px; --D1:140px; --D2:112px;
    --R1:166px; --R2:248px;
    --padTop:110px;
  }
  .stage{height:min(980px,86vh)}
}
@media (max-width:520px){
  :root{
    --D0:182px; --D1:134px; --D2:108px;
    --R1:154px; --R2:234px;
  }
  .brandSub{display:none}
}
</style>
</head>

<body>

<div class="top" aria-label="Top controls">
  <div class="topbar">
    <div class="brandLeft" aria-label="Brand">
      <div class="brandTitle" id="brandTitle">WELCOME TO THE COMPASS</div>
      <div class="brandSub" id="brandSub">Layer 1: CORE + N/E/S/W · Layer 2: CORE2 + 12</div>
      <div class="brandLinks" aria-label="Brand links">
        <a href="https://diamondgatebridge.com" target="_blank" rel="noopener">diamondgatebridge.com</a>
        <a href="https://cogrid.net" target="_blank" rel="noopener">cogrid.net</a>
      </div>
    </div>

    <div class="controlsRight" aria-label="Controls">
      <div class="seg" role="group" aria-label="Layer">
        <button type="button" id="btnLayer1" aria-pressed="true">LAYER 1</button>
        <button type="button" id="btnLayer2" aria-pressed="false">LAYER 2</button>
      </div>
      <div class="seg" role="group" aria-label="Lane">
        <button type="button" id="lanePlatform" aria-pressed="true">PLATFORM</button>
        <button type="button" id="laneEngineering" aria-pressed="false">ENGINEERING</button>
      </div>
    </div>
  </div>
</div>

<div class="stage" id="stage" aria-label="Compass stage">
  <div class="panel" aria-hidden="true"></div>

  <div class="dialWrap" aria-hidden="true">
    <div class="dialRed" aria-hidden="true"></div>
    <div class="dial" aria-hidden="true"></div>
  </div>

  <div class="faceLetters" aria-hidden="true">
    <span class="N">N</span><span class="E">E</span><span class="S">S</span><span class="W">W</span>
  </div>
</div>

<div class="corner left" aria-label="Exit">
  <div class="dmini" id="btnExit" role="button" tabindex="0" aria-label="Exit"><span>EXIT</span></div>
  <div class="cornerLabel" id="lblExit">EXIT</div>
</div>
<div class="corner right" aria-label="Hub">
  <div class="dmini" id="btnHub" role="button" tabindex="0" aria-label="Hub"><span>HUB</span></div>
  <div class="cornerLabel" id="lblHub">HUB</div>
</div>

<script>
(function(){
  "use strict";

  // ===== STATE (gd_* only; layer + lane URL-only) =====
  var qs = new URLSearchParams(location.search);
  var LS = window.localStorage;

  // ENGLISH ONLY for this pass
  var lang  = "en";
  var style = qs.get("style") || LS.getItem("gd_style") || "informal";
  var time  = qs.get("time")  || LS.getItem("gd_time")  || "now";
  var depth = qs.get("depth") || LS.getItem("gd_depth") || "explore";

  var lane  = qs.get("lane")  || "platform"; // URL-only
  var layer = qs.get("layer") || "1";        // URL-only

  if(style!=="informal" && style!=="formal") style="informal";
  if(time==="trajectory") time="post";
  if(time!=="origin" && time!=="now" && time!=="post") time="now";
  if(depth!=="explore" && depth!=="learn") depth="explore";
  if(lane!=="platform" && lane!=="engineering") lane="platform";
  if(layer!=="1" && layer!=="2") layer="1";

  try{
    LS.setItem("gd_lang","en");
    LS.setItem("gd_style",style);
    LS.setItem("gd_time",time);
    LS.setItem("gd_depth",depth);
  }catch(e){}

  document.documentElement.lang="en";

  function q(over){
    var p = new URLSearchParams();
    p.set("lang","en");
    p.set("style",(over&&over.style)?over.style:style);
    p.set("time",(over&&over.time)?over.time:time);
    p.set("depth",(over&&over.depth)?over.depth:depth);

    var L = (over&&over.lane)?over.lane:lane;
    var Y = (over&&over.layer)?over.layer:layer;

    if(L==="platform"||L==="engineering") p.set("lane", L);
    if(Y==="1"||Y==="2") p.set("layer", Y);

    return "?" + p.toString();
  }

  function go(path){ window.location.href = path + q(); }
  function setPressed(btn, on){ btn.setAttribute("aria-pressed", on ? "true" : "false"); }

  // ===== ROUTES =====
  var CORE1_ROUTE = "/index-core/index.html";
  var CORE2_ROUTE = "/index-core/index.html"; // TEMP
  var EXIT_ROUTE  = "/door/";
  var HUB_ROUTE   = "/home/";
  var PLACEHOLDER_404 = "/404.html";

  // Layer 1 (4 of 16)
  var L1 = [
    {code:"N", label:{platform:"LAWS",       engineering:"BOUNDS"},  href:"/laws/"},
    {code:"E", label:{platform:"ENERGY",     engineering:"POWER"},   href:"/explore/frontier/energy/"},
    {code:"S", label:{platform:"FINANCE",    engineering:"CAPITAL"}, href:"/finance/"},
    {code:"W", label:{platform:"GOVERNANCE", engineering:"EXEC"},    href:"/governance/"}
  ];

  // Layer 2 (remaining 12 of 16)
  var L2 = [
    {code:"NNE", label:{platform:"EDUCATION",  engineering:"ESL"},     href:"/products/education/"},
    {code:"NE",  label:{platform:"PRODUCTS",   engineering:"DEPLOY"},  href:"/products/"},
    {code:"ENE", label:{platform:"FRONTIER",   engineering:"FRONTIER"},href:"/explore/frontier/"},
    {code:"ESE", label:{platform:"INFRA",      engineering:"SUBST"},   href:"/explore/infrastructure/"},
    {code:"SE",  label:{platform:"RESEARCH",   engineering:"R&D"},     href:"/research/"},
    {code:"SSE", label:{platform:"AGRICULTURE",engineering:"FOOD"},    href:"/products/agriculture/"},
    {code:"SSW", label:{platform:"GAUGES",     engineering:"SIGNALS"}, href:"/gauges/"},
    {code:"SW",  label:{platform:"EXPLORE",    engineering:"MODELS"},  href:"/explore/"},
    {code:"WSW", label:{platform:"VISION",     engineering:"MAP"},     href:"/explore/frontier/vision/"},
    {code:"WNW", label:{platform:"LATTICE",    engineering:"256"},     href:"/explore/frontier/lattice/"},
    {code:"NW",  label:{platform:"DOCTRINE",   engineering:"CCD"},     href:"/products/capital-doctrine/"},
    {code:"NNW", label:{platform:"SHIMMER",    engineering:"SHIMMER"}, href:"/explore/frontier/shimmer/"}
  ];

  function normalizeUnique(list){
    var seen = Object.create(null);
    var out = [];
    for(var i=0;i<list.length;i++){
      var it = list[i];
      var h = (it.href||"").trim();
      if(!h) h = PLACEHOLDER_404;
      if(seen[h]) h = PLACEHOLDER_404;
      seen[h] = true;
      out.push({code:it.code, label:it.label, href:h});
    }
    return out;
  }
  L1 = normalizeUnique(L1);
  L2 = normalizeUnique(L2);

  function labelFor(it){
    return (lane==="engineering") ? it.label.engineering : it.label.platform;
  }

  // ===== BUILD NODES =====
  var stage = document.getElementById("stage");

  function mkNode(word, code, cls){
    var d = document.createElement("div");
    d.className = "node surface " + cls;
    d.setAttribute("role","button");
    d.tabIndex = 0;

    var inner = document.createElement("div");
    inner.className = "inner";

    var w = document.createElement("div");
    w.className = "word";
    w.textContent = word;

    var c = document.createElement("div");
    c.className = "code";
    c.textContent = code;

    inner.appendChild(w);
    inner.appendChild(c);
    d.appendChild(inner);

    return d;
  }

  function clearNodes(){
    var nodes = stage.querySelectorAll(".node");
    for(var i=0;i<nodes.length;i++) nodes[i].remove();
  }

  function layout(){
    clearNodes();

    var rect = stage.getBoundingClientRect();
    var cx = rect.width/2, cy = rect.height/2;

    var cs = getComputedStyle(document.documentElement);
    var R1 = parseFloat(cs.getPropertyValue("--R1")) || 176;
    var R2 = parseFloat(cs.getPropertyValue("--R2")) || 268;

    if(layer === "1"){
      var core = mkNode("CORE", "INDEX", "core");
      core.style.left = cx+"px"; core.style.top = cy+"px";
      core.addEventListener("click", function(){ go(CORE1_ROUTE); }, {passive:true});
      core.addEventListener("keydown", function(e){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); go(CORE1_ROUTE); }});
      stage.appendChild(core);

      var ang = {N:-Math.PI/2, E:0, S:Math.PI/2, W:Math.PI};
      for(var i=0;i<L1.length;i++){
        var it = L1[i];
        var a = ang[it.code] || 0;
        var x = cx + R1*Math.cos(a);
        var y = cy + R1*Math.sin(a);
        var n = mkNode(labelFor(it), it.code, "l1");
        n.style.left = x+"px"; n.style.top = y+"px";
        (function(path, el){
          el.addEventListener("click", function(){ go(path); }, {passive:true});
          el.addEventListener("keydown", function(e){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); go(path); }});
        })(it.href, n);
        stage.appendChild(n);
      }
    }else{
      var core2 = mkNode("CORE2", "SPINE", "core");
      core2.style.left = cx+"px"; core2.style.top = cy+"px";
      core2.addEventListener("click", function(){ go(CORE2_ROUTE); }, {passive:true});
      core2.addEventListener("keydown", function(e){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); go(CORE2_ROUTE); }});
      stage.appendChild(core2);

      for(var j=0;j<L2.length;j++){
        var it2 = L2[j];
        var a2 = (j/L2.length) * (Math.PI*2) - Math.PI/2;
        var x2 = cx + R2*Math.cos(a2);
        var y2 = cy + R2*Math.sin(a2);
        var n2 = mkNode(labelFor(it2), it2.code, "l2");
        n2.style.left = x2+"px"; n2.style.top = y2+"px";
        (function(path, el){
          el.addEventListener("click", function(){ go(path); }, {passive:true});
          el.addEventListener("keydown", function(e){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); go(path); }});
        })(it2.href, n2);
        stage.appendChild(n2);
      }
    }
  }

  function safeLayout(){
    var r = stage.getBoundingClientRect();
    if(r.width < 10 || r.height < 10){ requestAnimationFrame(safeLayout); return; }
    layout();
  }

  // ===== CONTROLS =====
  var btnLayer1 = document.getElementById("btnLayer1");
  var btnLayer2 = document.getElementById("btnLayer2");
  setPressed(btnLayer1, layer==="1");
  setPressed(btnLayer2, layer==="2");

  function setLayer(next){
    if(next!=="1" && next!=="2") next="1";
    layer = next;
    history.replaceState({}, "", location.pathname + q({layer:layer}));
    setPressed(btnLayer1, layer==="1");
    setPressed(btnLayer2, layer==="2");
    safeLayout();
  }
  btnLayer1.addEventListener("click", function(){ setLayer("1"); }, {passive:true});
  btnLayer2.addEventListener("click", function(){ setLayer("2"); }, {passive:true});

  var btnLP = document.getElementById("lanePlatform");
  var btnLE = document.getElementById("laneEngineering");
  setPressed(btnLP, lane==="platform");
  setPressed(btnLE, lane==="engineering");

  function setLane(next){
    if(next!=="platform" && next!=="engineering") next="platform";
    lane = next;
    history.replaceState({}, "", location.pathname + q({lane:lane}));
    setPressed(btnLP, lane==="platform");
    setPressed(btnLE, lane==="engineering");
    safeLayout();
  }
  btnLP.addEventListener("click", function(){ setLane("platform"); }, {passive:true});
  btnLE.addEventListener("click", function(){ setLane("engineering"); }, {passive:true});

  // corners
  function bindCorner(id, path){
    var el = document.getElementById(id);
    if(!el) return;
    function act(){ go(path); }
    el.addEventListener("click", act, {passive:true});
    el.addEventListener("keydown", function(e){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); act(); }});
  }
  bindCorner("btnExit", EXIT_ROUTE);
  bindCorner("btnHub", HUB_ROUTE);

  // ===== BACKGROUND ENGINE (ONE CANVAS ONLY) =====
  function mountBG(){
    if(!window.GD_BG || !window.GD_BG.mount) return;
    window.GD_BG.mount({
      fps: 30,
      dpr_cap: 1.6,
      // keep moon-only version stable if that's what bg-engine.js implements
      moon_radius: 0.062,
      crater_count: 16
    });
  }

  requestAnimationFrame(function(){
    mountBG();
    safeLayout();
  });
  window.addEventListener("resize", function(){ safeLayout(); }, {passive:true});

})();
</script>

</body>
</html>
