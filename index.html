<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Nine Summits — Index</title>
<link rel="stylesheet" href="/assets/ui.css"/>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: #000;
  width: 100%;
  height: 100%;
  overflow: hidden;
}

#app-shell {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
}

#world {
  position: absolute;
  inset: 0;
  width: 100vw;
  height: 100vh;
  display: block;
  z-index: 0;
  background: #000;
}

#runtime-root,
#diagnostics-dock,
#debug-panel {
  position: relative;
  z-index: 10;
}

#boot-status {
  position: fixed;
  top: 0;
  left: 0;
  right: auto;
  max-width: calc(100vw - 16px);
  padding: 6px 10px;
  font-family: monospace;
  font-size: 12px;
  line-height: 1.35;
  color: #0f0;
  background: #000;
  border-right: 1px solid rgba(255,255,255,0.12);
  border-bottom: 1px solid rgba(255,255,255,0.12);
  z-index: 9999;
  white-space: pre-wrap;
  word-break: break-word;
}

.boot-ok { color: #7fffd4; }
.boot-warn { color: #ffd27a; }
.boot-fail { color: #ff7a7a; }
</style>
</head>

<body data-mode="round" data-diagnostics="peek">
<div id="app-shell">
  <canvas id="world"></canvas>

  <div id="runtime-root"></div>

  <div id="diagnostics-dock" class="diagnostics-dock">
    <div id="diagnostics-bar" class="diagnostics-bar">
      <div id="diagnostics-summary" class="diagnostic-bar__summary"></div>
      <button id="diagnostics-toggle" class="diagnostics-toggle" type="button">
        DIAGNOSTICS
      </button>
    </div>
  </div>

  <div id="debug-panel" class="debug-panel"></div>
</div>

<div id="boot-status" class="boot-warn">BOOTING...</div>

<script type="module">
const statusNode = document.getElementById("boot-status");
const diagnosticsToggle = document.getElementById("diagnostics-toggle");

const BOOT_CONTRACT = Object.freeze({
  id: "INDEX_BOOT_CONTRACT_RENEWAL_v4",
  engineContract: "PLANET_ENGINE_CONTRACT_RENEWAL_v1",
  runtimeContract: "WORLD_RUNTIME_CONTRACT_v1",
  renderContract: "RENDER_BASELINE_CONTRACT_RENEWAL_v2",
  diagnosticsPath: "/gauges/",
  runtimeStorageKey: "cte_runtime_v4",
  runtimeReceiptKey: "__AUTHORITY_RECEIPT__",
  bootStateKey: "__INDEX_BOOT_STATE__",
  ignitionTimeoutMs: 12000,
  ignitionPollMs: 100
});

const MODULES = Object.freeze([
  Object.freeze({
    key: "world_kernel",
    path: "/world/world_kernel.js",
    required: true
  }),
  Object.freeze({
    key: "planet_engine",
    path: "/world/planet_engine.js",
    required: true,
    validate(mod) {
      return typeof mod?.createPlanetEngine === "function" ||
        typeof mod?.buildPlanetField === "function" ||
        typeof mod?.default?.buildPlanetField === "function";
    },
    validationMessage: "planet_engine contract missing createPlanetEngine/buildPlanetField"
  }),
  Object.freeze({
    key: "render",
    path: "/world/render.js",
    required: true,
    validate(mod) {
      return typeof mod?.createRenderer === "function" ||
        typeof mod?.renderPlanet === "function" ||
        typeof mod?.default?.renderPlanet === "function";
    },
    validationMessage: "render contract missing createRenderer/renderPlanet"
  }),
  Object.freeze({
    key: "control",
    path: "/world/control.js",
    required: true,
    validate(mod) {
      return typeof mod?.createControlSystem === "function" ||
        typeof mod?.default?.createControlSystem === "function";
    },
    validationMessage: "control contract missing createControlSystem"
  }),
  Object.freeze({
    key: "instruments",
    path: "/assets/instruments.js",
    required: true
  }),
  Object.freeze({
    key: "runtime",
    path: "/world/runtime/world_runtime.js",
    required: true,
    validate(mod) {
      return typeof mod?.startRuntime === "function" ||
        typeof mod?.default?.startRuntime === "function";
    },
    validationMessage: "runtime contract missing startRuntime"
  })
]);

const bootState = {
  phase: "BOOT_INIT",
  activeModule: null,
  modulesLoaded: [],
  failedModule: null,
  failurePath: null,
  failureMessage: "",
  verificationPass: false
};

function writeBootState() {
  window[BOOT_CONTRACT.bootStateKey] = {
    phase: bootState.phase,
    activeModule: bootState.activeModule,
    modulesLoaded: [...bootState.modulesLoaded],
    failedModule: bootState.failedModule,
    failurePath: bootState.failurePath,
    failureMessage: bootState.failureMessage,
    verificationPass: bootState.verificationPass
  };
}

function setBootPhase(phase, extras = {}) {
  bootState.phase = phase;
  if ("activeModule" in extras) bootState.activeModule = extras.activeModule;
  if ("failedModule" in extras) bootState.failedModule = extras.failedModule;
  if ("failurePath" in extras) bootState.failurePath = extras.failurePath;
  if ("failureMessage" in extras) bootState.failureMessage = extras.failureMessage;
  if ("verificationPass" in extras) bootState.verificationPass = extras.verificationPass;
  writeBootState();
}

function setStatus(message, tone = "boot-warn") {
  if (statusNode) {
    statusNode.textContent = message;
    statusNode.className = tone;
  }
  console.log("[BOOT]", message);
}

function toMessage(error) {
  if (error instanceof Error && typeof error.message === "string" && error.message.length > 0) {
    return error.message;
  }
  return String(error);
}

function classifyImportFailure(error) {
  const message = toMessage(error);
  const lowered = message.toLowerCase();

  if (lowered.includes("unexpected end of input") || lowered.includes("unexpected end of script")) {
    return "PARSE_EOF";
  }
  if (lowered.includes("unexpected token")) {
    return "PARSE_TOKEN";
  }
  if (lowered.includes("failed to fetch dynamically imported module")) {
    return "FETCH_IMPORT";
  }
  if (lowered.includes("cannot find module") || lowered.includes("does not provide an export")) {
    return "EXPORT_CONTRACT";
  }
  return "IMPORT_FAILURE";
}

function formatFailureBlock(definition, error) {
  const message = toMessage(error);
  const classification = classifyImportFailure(error);

  return [
    `BOOT ERROR: ${definition.key} import failed`,
    definition.path,
    `CLASS: ${classification}`,
    message
  ].join("\n");
}

async function importModule(definition) {
  setBootPhase("MODULE_IMPORT", {
    activeModule: definition.key,
    failedModule: null,
    failurePath: null,
    failureMessage: ""
  });

  setStatus(`IMPORTING ${definition.key.toUpperCase()}...`, "boot-warn");
  const mod = await import(definition.path);

  if (typeof definition.validate === "function" && definition.validate(mod) !== true) {
    throw new Error(definition.validationMessage || `${definition.key} contract validation failed`);
  }

  bootState.modulesLoaded.push(definition.key);
  writeBootState();

  setStatus(`IMPORTED ${definition.key.toUpperCase()}`, "boot-ok");
  return mod;
}

async function preflightModules() {
  const loaded = Object.create(null);

  for (const definition of MODULES) {
    try {
      loaded[definition.key] = await importModule(definition);
    } catch (error) {
      const failureBlock = formatFailureBlock(definition, error);

      setBootPhase("MODULE_IMPORT_FAILED", {
        activeModule: definition.key,
        failedModule: definition.key,
        failurePath: definition.path,
        failureMessage: toMessage(error),
        verificationPass: false
      });

      setStatus(failureBlock, "boot-fail");
      console.error(`[BOOT] ${definition.key} import failed`, error);
      throw error;
    }
  }

  setBootPhase("MODULE_PREFLIGHT_OK", {
    activeModule: null,
    failedModule: null,
    failurePath: null,
    failureMessage: ""
  });

  return loaded;
}

function resolveStartRuntime(runtimeModule) {
  if (typeof runtimeModule?.startRuntime === "function") return runtimeModule.startRuntime;
  if (typeof runtimeModule?.default?.startRuntime === "function") return runtimeModule.default.startRuntime;
  return null;
}

function validateCanvasPresence() {
  const world = document.getElementById("world");
  if (!world) {
    throw new Error("Missing #world canvas");
  }
  return world;
}

function readRuntimeStorageReceipt() {
  try {
    const raw = localStorage.getItem(BOOT_CONTRACT.runtimeStorageKey);
    if (!raw) return null;
    const parsed = JSON.parse(raw);
    return parsed && typeof parsed === "object" ? parsed : null;
  } catch {
    return null;
  }
}

function readWindowReceipt() {
  const receipt = window[BOOT_CONTRACT.runtimeReceiptKey];
  return receipt && typeof receipt === "object" ? receipt : null;
}

function resolveVerificationState() {
  const windowReceipt = readWindowReceipt();
  const storageReceipt = readRuntimeStorageReceipt();

  const verificationPass =
    windowReceipt?.verification?.pass === true ||
    storageReceipt?.verification?.pass === true;

  const failurePhase =
    windowReceipt?.failure?.phase ??
    storageReceipt?.failure?.phase ??
    null;

  const failureMessage =
    windowReceipt?.failure?.message ??
    storageReceipt?.failure?.message ??
    "";

  return {
    verificationPass,
    failurePhase,
    failureMessage
  };
}

async function waitForIgnition() {
  const startedAt = performance.now();

  setBootPhase("IGNITION_WAIT", {
    verificationPass: false
  });

  while ((performance.now() - startedAt) < BOOT_CONTRACT.ignitionTimeoutMs) {
    const state = resolveVerificationState();

    if (state.failurePhase) {
      setBootPhase("RUNTIME_FAILURE", {
        failureMessage: state.failureMessage,
        verificationPass: false
      });

      setStatus(
        `RUNTIME ERROR: ${state.failurePhase}\n${state.failureMessage || "Unknown runtime failure"}`,
        "boot-fail"
      );
      return false;
    }

    if (state.verificationPass === true) {
      setBootPhase("RUNNING", {
        verificationPass: true,
        failureMessage: ""
      });

      setStatus(
        `RUNNING\nBOOT: ${BOOT_CONTRACT.id}\nENGINE: ${BOOT_CONTRACT.engineContract}\nRUNTIME: ${BOOT_CONTRACT.runtimeContract}\nRENDER: ${BOOT_CONTRACT.renderContract}`,
        "boot-ok"
      );
      return true;
    }

    setStatus(
      `WAITING FOR IGNITION...\nBOOT: ${BOOT_CONTRACT.id}\nENGINE: ${BOOT_CONTRACT.engineContract}\nRUNTIME: ${BOOT_CONTRACT.runtimeContract}\nRENDER: ${BOOT_CONTRACT.renderContract}`,
      "boot-warn"
    );

    await new Promise((resolve) => window.setTimeout(resolve, BOOT_CONTRACT.ignitionPollMs));
  }

  const state = resolveVerificationState();
  if (state.failurePhase) {
    setBootPhase("RUNTIME_FAILURE", {
      failureMessage: state.failureMessage,
      verificationPass: false
    });

    setStatus(
      `RUNTIME ERROR: ${state.failurePhase}\n${state.failureMessage || "Unknown runtime failure"}`,
      "boot-fail"
    );
    return false;
  }

  setBootPhase("IGNITION_TIMEOUT", {
    verificationPass: false
  });

  setStatus(
    `IGNITION TIMEOUT\nBOOT: ${BOOT_CONTRACT.id}\nENGINE: ${BOOT_CONTRACT.engineContract}\nRUNTIME: ${BOOT_CONTRACT.runtimeContract}\nRENDER: ${BOOT_CONTRACT.renderContract}`,
    "boot-fail"
  );
  return false;
}

async function boot() {
  try {
    setBootPhase("BOOT_INIT", {
      activeModule: null,
      failedModule: null,
      failurePath: null,
      failureMessage: "",
      verificationPass: false
    });

    validateCanvasPresence();

    setStatus(
      `BOOT CONTRACT: ${BOOT_CONTRACT.id}\nENGINE: ${BOOT_CONTRACT.engineContract}\nRUNTIME: ${BOOT_CONTRACT.runtimeContract}\nRENDER: ${BOOT_CONTRACT.renderContract}`,
      "boot-warn"
    );

    const modules = await preflightModules();
    const startRuntime = resolveStartRuntime(modules.runtime);

    if (!startRuntime) {
      setBootPhase("RUNTIME_CONTRACT_FAILURE", {
        failedModule: "runtime",
        failurePath: "/world/runtime/world_runtime.js",
        failureMessage: "runtime startRuntime missing",
        verificationPass: false
      });

      setStatus(
        `BOOT ERROR: runtime startRuntime missing\n/world/runtime/world_runtime.js`,
        "boot-fail"
      );
      return;
    }

    setBootPhase("RUNTIME_START", {
      activeModule: "runtime",
      failedModule: null,
      failurePath: null,
      failureMessage: ""
    });

    setStatus(
      `STARTING RUNTIME...\nBOOT: ${BOOT_CONTRACT.id}\nENGINE: ${BOOT_CONTRACT.engineContract}\nRUNTIME: ${BOOT_CONTRACT.runtimeContract}\nRENDER: ${BOOT_CONTRACT.renderContract}`,
      "boot-warn"
    );

    startRuntime();
    await waitForIgnition();
  } catch {
    // exact failure already surfaced above
  }
}

diagnosticsToggle?.addEventListener("click", () => {
  window.location.href = BOOT_CONTRACT.diagnosticsPath;
});

writeBootState();
boot();
</script>
</body>
</html>
