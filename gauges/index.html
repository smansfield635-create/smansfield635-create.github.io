<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D World Runtime - LIVE v6.1</title>
    <!-- CORE STOCK: THE 3D ENGINE LIBRARY -->
    <script src="https://cdnjs.cloudflare.com"></script>
    <style>
        :root { 
            --accent: #00ff88; 
            --muted: #666; 
            --line: #222; 
            --bg: #050505; 
        }
        body { 
            margin: 0; 
            background: var(--bg); 
            color: #fff; 
            font-family: 'Courier New', monospace; 
            overflow: hidden; 
            user-select: none;
        }

        /* 3D RENDER SURFACE */
        #canvas-container { position: absolute; inset: 0; z-index: 1; }

        /* OBSERVABILITY LAYER (The Gauges) */
        .container { 
            position: absolute; 
            top: 20px; 
            left: 20px; 
            z-index: 10; 
            width: 360px; 
            background: rgba(0,0,0,0.92); 
            border: 1px solid var(--line); 
            border-radius: 12px; 
            padding: 20px; 
            backdrop-filter: blur(15px); 
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }

        .status { 
            font-weight: bold; 
            margin-bottom: 15px; 
            color: #ff4444; 
            font-size: 11px;
            letter-spacing: 1.5px;
            display: flex;
            justify-content: space-between;
        }

        .title { 
            color: var(--accent); 
            font-weight: bold; 
            font-size: 14px; 
            margin-bottom: 18px;
            border-bottom: 1px solid var(--line);
            padding-bottom: 10px;
        }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 12px; 
        }

        .node { 
            padding: 12px; 
            border: 1px solid var(--line); 
            border-radius: 8px; 
            background: rgba(255,255,255,0.02); 
        }

        .label { 
            opacity: 0.5; 
            font-size: 9px; 
            text-transform: uppercase; 
            margin-bottom: 5px;
            color: var(--muted);
        }

        .value { 
            font-size: 18px; 
            font-weight: bold;
            color: #fff;
        }

        .trajectory {
            margin-top: 15px;
            padding: 12px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: linear-gradient(90deg, rgba(0,255,136,0.05), transparent);
        }

        .path {
            font-size: 11px;
            color: var(--accent);
            letter-spacing: 1px;
            font-weight: bold;
        }

        .canvasWrap { 
            margin-top: 20px; 
            border: 1px solid var(--line); 
            border-radius: 8px; 
            overflow: hidden; 
            background: #000;
        }

        canvas#runtimeChart { display: block; width: 100%; height: 80px; }

        .footer {
            margin-top: 15px;
            font-size: 9px;
            color: var(--muted);
            text-align: right;
            opacity: 0.6;
        }
    </style>
</head>
<body>

<div id="canvas-container"></div>

<div class="container">
    <div id="status" class="status">
        <span>STATE: <span id="state-txt">OFFLINE</span></span>
        <span id="age-txt">0ms</span>
    </div>
    <div class="title">DIAMONDGATE_DIAGNOSTICS_v6.1</div>
    
    <div class="grid">
        <div class="node"><div class="label">Lattice_Index</div><div id="val-index" class="value">0</div></div>
        <div class="node"><div class="label">Coherence_Level</div><div id="val-coh" class="value">0.000</div></div>
        <div class="node"><div class="label">FPS_Heartbeat</div><div id="val-fps" class="value">0</div></div>
        <div class="node"><div class="label">Delta_Latency</div><div id="val-dt" class="value">0ms</div></div>
    </div>

    <div class="trajectory">
        <div class="label">Current Trajectory</div>
        <div id="val-path" class="path">HELL → HARP → SKY → HOME</div>
    </div>

    <div class="canvasWrap">
        <canvas id="runtimeChart" width="340" height="80"></canvas>
    </div>
    
    <div class="footer">EA: SEAN // ARCHITECT_AUTHENTICATED</div>
</div>

<script>
/** 
 * SECTION 1: THE PLANET_ENGINE (DATA EMITTER)
 */
function initPlanetEngine() {
    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    container.appendChild(renderer.domElement);

    // Geometry STOCK
    const globe = new THREE.Mesh(
        new THREE.IcosahedronGeometry(2, 4),
        new THREE.MeshBasicMaterial({ color: 0x00ff88, wireframe: true, transparent: true, opacity: 0.15 })
    );
    scene.add(globe);
    camera.position.z = 6;

    let lastTime = performance.now();
    
    function animate(time) {
        const dt = time - lastTime;
        lastTime = time;
        const fps = Math.round(1000 / dt);

        globe.rotation.y += 0.002;
        renderer.render(scene, camera);

        // EMIT TELEMETRY TO SHARED SCOPE
        window.__AUTHORITY_RECEIPT__ = {
            phase: "RUNNING",
            timestamp: Date.now(),
            fps: fps,
            dtMs: dt,
            instrument: {
                classifiedState: "ACTIVE_WORLD",
                index: 219 + Math.floor(Math.random() * 5),
                coherence: (0.895 + Math.random() * 0.01).toFixed(6),
                path: "VARIANT_9 → NORTH → ACTIVE"
            }
        };
        requestAnimationFrame(animate);
    }
    requestAnimationFrame(animate);
}

/** 
 * SECTION 2: THE GAUGES_RUNTIME (OBSERVER)
 */
const history = [];

function updateGauges() {
    const receipt = window.__AUTHORITY_RECEIPT__ || {};
    const stateTxt = document.getElementById("state-txt");
    const statusEl = document.getElementById("status");
    const ageTxt = document.getElementById("age-txt");
    
    if (receipt.phase === "RUNNING") {
        const inst = receipt.instrument;
        
        stateTxt.innerText = "LIVE • RUNNING";
        statusEl.style.color = "var(--accent)";
        ageTxt.innerText = (Date.now() - receipt.timestamp) + "ms";

        document.getElementById("val-index").innerText = inst.index;
        document.getElementById("val-coh").innerText = inst.coherence;
        document.getElementById("val-fps").innerText = receipt.fps;
        document.getElementById("val-dt").innerText = Math.round(receipt.dtMs) + "ms";
        document.getElementById("val-path").innerText = inst.path;

        history.push(receipt.fps);
        if (history.length > 60) history.shift();
        renderChart();
    } else {
        stateTxt.innerText = "SEARCHING...";
        statusEl.style.color = "#ff4444";
    }
    requestAnimationFrame(updateGauges);
}

function renderChart() {
    const canvas = document.getElementById("runtimeChart");
    const ctx = canvas.getContext("2d");
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.strokeStyle = "#00ff88";
    ctx.lineWidth = 2;
    ctx.beginPath();
    history.forEach((v, i) => {
        const x = (i / 60) * canvas.width;
        const y = canvas.height - (Math.min(v, 100) / 100) * canvas.height;
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    });
    ctx.stroke();
}

// EXECUTION
initPlanetEngine();
updateGauges();

window.addEventListener('resize', () => location.reload());
</script>
</body>
</html>
