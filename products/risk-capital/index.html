<!doctype html>
<!-- TNT — /products/risk-capital/index.html
     RISK & CAPITAL SYSTEMS — ADMISSIBILITY SPINE (TRILINGUAL · 4 LENSES)
     SUPERLAYER RULE:
       - Capital Coherence Doctrine (CCD) is the governing layer for allocation admissibility.
       - This page is an implementation surface under CCD (not a replacement).
     LENSES:
       - lane=platform|engineering (URL-only)
       - style=informal|formal     (gd_style + URL)
     STATE:
       - lang/style/time/depth via URL + localStorage gd_lang/gd_style/gd_time/gd_depth ONLY
       - NO new gd_* keys
     UX:
       - Single-open accordion (global)
       - Sub-bubbles inside each row
       - No modals/overlays; no inline onclick; addEventListener only
     ASSETS:
       - /assets/ui.css + /assets/branch.css + /assets/instruments.js
       - ui.css owns html/body background (NO overrides)
-->

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Risk & Capital Systems</title>

<link rel="stylesheet" href="/assets/ui.css"/>
<link rel="stylesheet" href="/assets/branch.css"/>
<script defer src="/assets/instruments.js"></script>

<style>
a{color:inherit;text-decoration:none}
body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:#fff}
body::before,body::after{pointer-events:none!important}

:root{
  --dockH:112px;

  --stroke:rgba(255,255,255,.12);
  --stroke2:rgba(255,255,255,.10);

  --ink:rgba(255,255,255,.94);
  --txt:rgba(255,255,255,.92);
  --mut:rgba(255,255,255,.80);

  --crimson:rgba(120,0,22,.30);
  --festival:rgba(255,43,43,.14);
  --opalV:rgba(90,40,120,.10);

  --goldSoft:rgba(201,162,74,.18);

  --shadowA:0 28px 100px rgba(0,0,0,.65);
  --shadowB:0 18px 60px rgba(0,0,0,.55);
}

/* Top controls */
.top{
  position:fixed;top:16px;left:0;right:0;
  padding:0 16px;
  display:flex;justify-content:space-between;align-items:center;
  gap:12px;z-index:240;pointer-events:none;
}
.top .left,.top .right{
  display:flex;gap:10px;align-items:center;flex-wrap:wrap;white-space:nowrap;
  pointer-events:auto;
}

/* Button (gold under-light only) */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:10px 12px;min-height:44px;border-radius:16px;
  border:1px solid rgba(255,255,255,.14);
  background:
    radial-gradient(circle at 50% 120%, rgba(201,162,74,.16), transparent 64%),
    linear-gradient(145deg, rgba(10,12,16,.78), rgba(6,8,10,.90));
  color:var(--ink);
  font-weight:950;font-size:14px;letter-spacing:.2px;
  -webkit-tap-highlight-color:transparent;
  position:relative;overflow:hidden;
  touch-action:manipulation;
  box-shadow:var(--shadowB);
  white-space:nowrap;
}
.btn:active{transform:translateY(1px)}
.btn::after{
  content:"";
  position:absolute;left:10px;right:10px;bottom:-12px;height:28px;
  background: radial-gradient(circle at 50% 0%, rgba(201,162,74,.34), transparent 72%);
  opacity:.60;pointer-events:none;
}
.btn.red{border-color:rgba(255,43,43,.22); box-shadow:var(--shadowB), 0 0 18px rgba(255,43,43,.12);}

/* Segmented toggles */
.seg{
  display:inline-flex;gap:0;overflow:hidden;border-radius:16px;
  border:1px solid rgba(255,255,255,.12);
  background: rgba(0,0,0,.16);
  box-shadow: var(--shadowB);
}
.seg button{
  appearance:none;border:0;background:transparent;color:var(--mut);
  padding:10px 12px;min-height:44px;font-weight:950;font-size:13px;
  letter-spacing:.25px;cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
.seg button[aria-pressed="true"]{
  color:var(--ink);
  background:
    radial-gradient(circle at 50% 120%, rgba(201,162,74,.22), transparent 62%),
    linear-gradient(180deg, rgba(255,43,43,.10), rgba(0,0,0,.10));
  box-shadow: inset 0 -10px 22px rgba(201,162,74,.16);
}

/* Page */
.page{
  width:min(1100px,94vw);
  margin:0 auto;
  padding:98px 0 calc(var(--dockH) + 18px);
  display:flex;flex-direction:column;gap:14px;
  position:relative;z-index:10;
}

/* Header */
.header{
  border:1px solid var(--stroke);
  border-radius:26px;
  padding:22px;
  background:
    radial-gradient(circle at 18% 22%, var(--crimson), transparent 72%),
    radial-gradient(circle at 82% 34%, var(--opalV), transparent 74%),
    radial-gradient(circle at 70% 92%, var(--festival), transparent 62%),
    radial-gradient(circle at 26% 22%, rgba(201,162,74,.12), transparent 62%),
    linear-gradient(160deg, rgba(0,0,0,.22), rgba(0,0,0,.12));
  box-shadow:var(--shadowA);
  position:relative;overflow:hidden;
}
.header::before{
  content:"";
  position:absolute;inset:0;border-radius:26px;pointer-events:none;
  box-shadow: inset 0 0 0 1px rgba(201,162,74,.14);
  background:
    repeating-linear-gradient(45deg, rgba(201,162,74,.08) 0 1px, transparent 1px 16px),
    repeating-linear-gradient(-45deg, rgba(201,162,74,.06) 0 1px, transparent 1px 16px);
  opacity:.22;
  mask: radial-gradient(circle at 50% 50%, transparent 0 78%, #000 82% 100%), linear-gradient(#000,#000);
  -webkit-mask: radial-gradient(circle at 50% 50%, transparent 0 78%, #000 82% 100%), linear-gradient(#000,#000);
}
.k{margin:0 0 8px;font-size:11px;letter-spacing:4px;text-transform:uppercase;opacity:.78;color:var(--mut);position:relative}
.h1{margin:0;font-weight:980;font-size:30px;letter-spacing:.35px;color:var(--ink);position:relative}
.p0{margin:12px 0 0;line-height:1.75;color:rgba(255,255,255,.88);font-size:15.75px;position:relative}
.note0{margin-top:10px;color:rgba(255,255,255,.78);font-size:13.25px;line-height:1.55;position:relative}

/* Lens row */
.lensRow{
  margin-top:14px;
  display:flex;gap:10px;flex-wrap:wrap;justify-content:space-between;align-items:center;
}
.badge{
  display:inline-flex;align-items:center;gap:10px;
  padding:10px 12px;border-radius:999px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(0,0,0,.16);
  color:rgba(255,255,255,.78);
  font-weight:950;
  box-shadow:0 14px 36px rgba(0,0,0,.55);
}
.badge b{color:var(--ink)}

/* Bands */
.band{
  padding:10px 12px;border-radius:18px;
  border:1px solid var(--stroke2);
  background:rgba(0,0,0,.14);
  font-weight:980;letter-spacing:.25px;
  color:rgba(255,255,255,.90);
}

/* Accordion rows */
.list{display:flex;flex-direction:column;gap:12px}
.row{
  border:1px solid rgba(255,255,255,.10);
  border-radius:22px;
  background:
    radial-gradient(circle at 22% 18%, rgba(255,43,43,.10), transparent 58%),
    radial-gradient(circle at 82% 30%, rgba(90,40,120,.10), transparent 66%),
    linear-gradient(145deg, rgba(17,22,28,.86), rgba(11,15,20,.94));
  box-shadow:var(--shadowA);
  overflow:hidden;
  position:relative;
}
.row::after{
  content:"";
  position:absolute;inset:0;border-radius:22px;pointer-events:none;
  box-shadow: inset 0 0 0 1px rgba(201,162,74,.10);
  opacity:.55;
}
.head{
  padding:16px 16px;
  display:flex;justify-content:space-between;align-items:flex-start;gap:12px;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
  position:relative;
}
.hL{display:flex;gap:12px;align-items:flex-start;min-width:0}
.mark{
  width:10px;height:10px;border-radius:3px;
  transform:rotate(45deg);
  background:var(--c, rgba(201,162,74,.45));
  box-shadow:0 0 0 1px rgba(255,255,255,.14), 0 0 14px rgba(0,0,0,.35);
  flex:0 0 auto;margin-top:4px;
}
.titleBlock{min-width:0}
.q{
  font-weight:980;letter-spacing:.2px;font-size:18px;color:var(--ink);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.sub{
  margin-top:8px;font-size:13.75px;opacity:.88;line-height:1.42;
  color:rgba(255,255,255,.86);max-width:92ch;
}
.chev{
  width:36px;height:36px;border-radius:14px;
  border:1px solid rgba(255,255,255,.14);
  background:rgba(0,0,0,.16);
  display:flex;align-items:center;justify-content:center;
  color:rgba(255,255,255,.78);
  font-weight:980;
  flex:0 0 auto;margin-top:2px;
  position:relative;overflow:hidden;
}
.chev::after{
  content:"";
  position:absolute;left:6px;right:6px;bottom:-10px;height:22px;
  background: radial-gradient(circle at 50% 0%, rgba(201,162,74,.30), transparent 70%);
  opacity:.62;pointer-events:none;
}
.body{
  display:none;
  padding:16px 16px 18px;
  border-top:1px solid rgba(255,255,255,.08);
  background:
    radial-gradient(circle at 30% 30%, rgba(255,255,255,.06), transparent 55%),
    linear-gradient(145deg, rgba(10,12,16,.86), rgba(6,8,10,.94));
  position:relative;
}
.row.open .body{display:block}

/* Sub-bubbles */
.subBubbles{margin-top:12px;display:flex;flex-direction:column;gap:10px}
.bubble{
  border:1px solid rgba(255,255,255,.10);
  border-radius:18px;
  background:
    radial-gradient(circle at 22% 18%, rgba(255,43,43,.08), transparent 60%),
    radial-gradient(circle at 82% 70%, rgba(201,162,74,.08), transparent 62%),
    rgba(0,0,0,.12);
  padding:14px 14px 12px;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
  position:relative;
  overflow:hidden;
}
.bubble::after{
  content:"";
  position:absolute;left:10px;right:10px;bottom:-14px;height:30px;
  background: radial-gradient(circle at 50% 0%, rgba(201,162,74,.22), transparent 72%);
  opacity:.50;pointer-events:none;
}
.bubble h4{
  margin:0 0 8px;
  font-weight:980;
  letter-spacing:.15px;
  font-size:15px;
  color:var(--ink);
}
.bubble p{
  margin:0;
  color:rgba(255,255,255,.80);
  line-height:1.7;
  display:none;
  font-size:14.5px;
}
.bubble.open p{display:block}

.actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end;margin-top:14px}

/* Dock */
.dock{
  position:fixed;left:50%;
  bottom:max(12px, env(safe-area-inset-bottom));
  transform:translateX(-50%);
  width:min(980px,94vw);
  padding:12px;border-radius:22px;
  border:1px solid var(--stroke);
  background:rgba(0,0,0,.22);
  backdrop-filter:blur(10px);
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  z-index:220;
}
.dock .btn{width:100%;text-align:center;border-radius:999px;padding:10px}
@media (max-width:520px){
  :root{--dockH:132px}
  .dock{grid-template-columns:repeat(3,1fr)}
  .h1{font-size:27px}
}
</style>
</head>

<body>

<div class="top" aria-label="Top controls">
  <div class="left">
    <a class="btn" id="btnProducts" href="/products/" data-route="/products/">PRODUCTS</a>
    <a class="btn red" id="btnDoctrine" href="/products/capital-doctrine/" data-route="/products/capital-doctrine/">CAPITAL DOCTRINE</a>
    <a class="btn" id="btnIndex" href="/index.html" data-route="/index.html">COMPASS</a>
  </div>
  <div class="right" aria-label="Language">
    <div class="seg" role="group" aria-label="Language toggle">
      <button type="button" id="langEN" aria-pressed="true">EN</button>
      <button type="button" id="langZH" aria-pressed="false">中文</button>
      <button type="button" id="langES" aria-pressed="false">ES</button>
    </div>
  </div>
</div>

<div class="page">

  <section class="header" aria-label="Header">
    <p class="k" id="k0">PRODUCTS · RISK & CAPITAL</p>
    <h1 class="h1" id="h0">RISK & CAPITAL SYSTEMS</h1>

    <p class="p0" id="p0"></p>
    <div class="note0" id="note0"></div>

    <div class="lensRow" aria-label="Lenses">
      <div class="seg" role="group" aria-label="Lane toggle">
        <button type="button" id="lanePlatform" aria-pressed="true">PLATFORM</button>
        <button type="button" id="laneEngineering" aria-pressed="false">ENGINEERING</button>
      </div>

      <div class="seg" role="group" aria-label="Style toggle">
        <button type="button" id="styleInformal" aria-pressed="true">INFORMAL</button>
        <button type="button" id="styleFormal" aria-pressed="false">FORMAL</button>
      </div>

      <div class="badge" aria-label="State">
        <span id="bLang">LANG</span> <b id="bLangV">EN</b>
        <span style="opacity:.6">·</span>
        <span id="bLane">LANE</span> <b id="bLaneV">PLATFORM</b>
        <span style="opacity:.6">·</span>
        <span id="bStyle">STYLE</span> <b id="bStyleV">INFORMAL</b>
      </div>
    </div>
  </section>

  <div class="band" id="band0">ADMISSIBILITY SURFACE</div>
  <div class="list" id="list"></div>

</div>

<nav class="dock" aria-label="Bottom navigation">
  <a class="btn" id="dockIndex" href="/index.html" data-route="/index.html">INDEX</a>
  <a class="btn" id="dockExplore" href="/explore/" data-route="/explore/">EXPLORE</a>
  <a class="btn" id="dockLaws" href="/laws/" data-route="/laws/">LAWS</a>
  <a class="btn" id="dockGauges" href="/gauges/" data-route="/gauges/">GAUGES</a>
</nav>

<script>
(function(){
  "use strict";

  // ===== canonical state carry (gd_* only) =====
  var qs=new URLSearchParams(location.search);
  var LS=window.localStorage;

  var lang  = qs.get("lang")  || LS.getItem("gd_lang")  || "en";
  var style = qs.get("style") || LS.getItem("gd_style") || "informal";
  var time  = qs.get("time")  || LS.getItem("gd_time")  || "now";
  var depth = qs.get("depth") || LS.getItem("gd_depth") || "explore";
  var lane  = qs.get("lane")  || "platform"; // URL-only

  if(lang!=="en" && lang!=="zh" && lang!=="es") lang="en";
  if(style!=="informal" && style!=="formal") style="informal";
  if(time==="trajectory") time="post";
  if(time!=="origin" && time!=="now" && time!=="post") time="now";
  if(depth!=="explore" && depth!=="learn") depth="explore";
  if(lane!=="platform" && lane!=="engineering") lane="platform";

  try{
    LS.setItem("gd_lang",lang);
    LS.setItem("gd_style",style);
    LS.setItem("gd_time",time);
    LS.setItem("gd_depth",depth);
  }catch(e){}

  document.documentElement.lang=(lang==="zh")?"zh":(lang==="es")?"es":"en";

  function q(over){
    var L=(over&&over.lang)?over.lang:lang;
    var S=(over&&over.style)?over.style:style;
    var T=(over&&over.time)?over.time:time;
    var D=(over&&over.depth)?over.depth:depth;
    var A=(over&&over.lane)?over.lane:lane;
    return "?lang="+encodeURIComponent(L)+
           "&style="+encodeURIComponent(S)+
           "&time="+encodeURIComponent(T)+
           "&depth="+encodeURIComponent(D)+
           "&lane="+encodeURIComponent(A);
  }

  function wireAll(){
    var nodes=document.querySelectorAll("[data-route]");
    for(var i=0;i<nodes.length;i++){
      var el=nodes[i];
      var route=el.getAttribute("data-route")||"";
      if(!route) continue;

      if(route.indexOf("?")!==-1){
        try{
          var u=new URL(route, location.origin);
          var sp=u.searchParams;
          if(!sp.get("lang")) sp.set("lang", lang);
          if(!sp.get("style")) sp.set("style", style);
          if(!sp.get("time")) sp.set("time", time);
          if(!sp.get("depth")) sp.set("depth", depth);
          if(!sp.get("lane")) sp.set("lane", lane);
          el.setAttribute("href", u.pathname + "?" + sp.toString() + (u.hash||""));
        }catch(e){
          el.setAttribute("href", route);
        }
      }else{
        el.setAttribute("href", route + q());
      }
    }
  }

  // Language toggle reload same path
  function setLang(next){
    if(next!=="en" && next!=="zh" && next!=="es") next="en";
    lang=next;
    try{ LS.setItem("gd_lang",lang); }catch(e){}
    window.location.href = window.location.pathname + q({lang:lang});
  }

  var langEN=document.getElementById("langEN");
  var langZH=document.getElementById("langZH");
  var langES=document.getElementById("langES");
  langEN.addEventListener("click", function(){ setLang("en"); }, {passive:true});
  langZH.addEventListener("click", function(){ setLang("zh"); }, {passive:true});
  langES.addEventListener("click", function(){ setLang("es"); }, {passive:true});

  function setPressed(ids, activeId){
    for(var i=0;i<ids.length;i++){
      var el=document.getElementById(ids[i]);
      if(!el) continue;
      el.setAttribute("aria-pressed", ids[i]===activeId ? "true" : "false");
    }
  }

  // Lane + Style
  function setLane(next){
    if(next!=="platform" && next!=="engineering") next="platform";
    lane=next;
    window.location.href = window.location.pathname + q({lane:lane});
  }
  function setStyle(next){
    if(next!=="informal" && next!=="formal") next="informal";
    style=next;
    try{ LS.setItem("gd_style",style); }catch(e){}
    window.location.href = window.location.pathname + q({style:style});
  }

  document.getElementById("lanePlatform").addEventListener("click", function(){ setLane("platform"); }, {passive:true});
  document.getElementById("laneEngineering").addEventListener("click", function(){ setLane("engineering"); }, {passive:true});
  document.getElementById("styleInformal").addEventListener("click", function(){ setStyle("informal"); }, {passive:true});
  document.getElementById("styleFormal").addEventListener("click", function(){ setStyle("formal"); }, {passive:true});

  function P(en,zh,es){ return {en:en, zh:zh, es:es}; }
  function pick(o){ return (lang==="zh")?o.zh:(lang==="es")?(o.es||o.en):o.en; }

  function laneLabel(){
    if(lang==="zh") return (lane==="engineering")?"工程":"平台";
    if(lang==="es") return (lane==="engineering")?"INGENIERÍA":"PLATAFORMA";
    return (lane==="engineering")?"ENGINEERING":"PLATFORM";
  }
  function styleLabel(){
    if(lang==="zh") return (style==="formal")?"正式":"通俗";
    if(lang==="es") return (style==="formal")?"FORMAL":"INFORMAL";
    return (style==="formal")?"FORMAL":"INFORMAL";
  }

  // ===== Header copy (explicit doctrine binding) =====
  var HEAD={
    en:{
      platform_informal:"This surface organizes risk, contracts, compliance, insurance, and finance into an admissibility posture. It is governed by the Capital Coherence Doctrine.",
      platform_formal:"This surface is an admissibility layer for economic systems. It is subordinated to Capital Coherence Doctrine invariants and routes execution only after bounds are declared.",
      engineering_informal:"Engineering view: exposure must be measurable; segmentation must be real; escalation requires receipts. Doctrine governs before deployment.",
      engineering_formal:"Engineering posture: deterministic bounds, versioned manifests, audited routes. Doctrine invariants constrain finance and governance simultaneously.",
      note:"Governing Superlayer: /products/capital-doctrine/ (CCD). This page implements bounded economic surfaces; it does not define invariants."
    },
    zh:{
      platform_informal:"本执行面把风险、合约、合规、保险与金融组织成可采信姿态，并受资本一致性教义治理。",
      platform_formal:"本面是经济系统的可采信层。它从属于资本一致性教义不变量，只有在边界声明后才允许执行路由。",
      engineering_informal:"工程视图：暴露必须可测；分段必须真实；升级需要收据。部署前先过教义。",
      engineering_formal:"工程姿态：确定性边界、版本化清单、可审计路由。教义同时约束金融与治理。",
      note:"治理超层：/products/capital-doctrine/（CCD）。本页是有界经济执行面，不定义不变量。"
    },
    es:{
      platform_informal:"Esta superficie organiza riesgo, contratos, cumplimiento, seguros y finanzas como postura de admisibilidad. Está gobernada por la Doctrina de Coherencia de Capital.",
      platform_formal:"Capa de admisibilidad económica subordinada a invariantes de la Doctrina. Solo enruta ejecución tras declarar límites.",
      engineering_informal:"Vista ingeniería: exposición medible; segmentación real; escalación requiere recibos. Doctrina antes del despliegue.",
      engineering_formal:"Postura ingeniería: límites deterministas, manifiestos versionados, rutas auditables. La doctrina restringe finanzas y gobernanza.",
      note:"Supercapa gobernante: /products/capital-doctrine/ (CCD). Esta página implementa superficies económicas acotadas; no define invariantes."
    }
  };

  function applyHeader(){
    var H=HEAD[lang] || HEAD.en;
    var key=(lane==="platform" ? "platform_" : "engineering_") + (style==="formal" ? "formal" : "informal");

    document.getElementById("p0").textContent = H[key];
    document.getElementById("note0").textContent = H.note;

    document.getElementById("bLangV").textContent = (lang==="zh")?"中文":(lang==="es")?"ES":"EN";
    document.getElementById("bLaneV").textContent = laneLabel();
    document.getElementById("bStyleV").textContent = styleLabel();

    if(lang==="zh"){
      document.getElementById("k0").textContent="产品 · 风险与资本";
      document.getElementById("h0").textContent="风险与资本系统";
      document.getElementById("band0").textContent="可采信执行面（一次只开一个）";
      document.getElementById("bLang").textContent="语言";
      document.getElementById("bLane").textContent="车道";
      document.getElementById("bStyle").textContent="语气";
      document.getElementById("btnProducts").textContent="产品";
      document.getElementById("btnDoctrine").textContent="资本教义";
      document.getElementById("btnIndex").textContent="指南针";
      document.getElementById("dockIndex").textContent="索引";
      document.getElementById("dockExplore").textContent="探索";
      document.getElementById("dockLaws").textContent="法则";
      document.getElementById("dockGauges").textContent="量规";
      document.getElementById("lanePlatform").textContent="平台";
      document.getElementById("laneEngineering").textContent="工程";
      document.getElementById("styleInformal").textContent="通俗";
      document.getElementById("styleFormal").textContent="正式";
    }else if(lang==="es"){
      document.getElementById("k0").textContent="PRODUCTOS · RIESGO Y CAPITAL";
      document.getElementById("h0").textContent="SISTEMAS DE RIESGO Y CAPITAL";

  var list=document.getElementById("list");

  function closeAll(){
    list.querySelectorAll(".row").forEach(function(r){
      r.classList.remove("open");
      var c=r.querySelector(".chevTxt");
      if(c) c.textContent="▸";
    });
  }

  function bubble(h, p){
    var b=document.createElement("div");
    b.className="bubble";
    b.setAttribute("role","button");
    b.tabIndex=0;

    var hh=document.createElement("h4");
    hh.textContent=h;

    var pp=document.createElement("p");
    pp.textContent=p;

    b.appendChild(hh);
    b.appendChild(pp);

    function act(){ b.classList.toggle("open"); }
    b.addEventListener("click", act, {passive:true});
    b.addEventListener("keydown", function(e){
      if(e.key==="Enter"||e.key===" "){ e.preventDefault(); act(); }
    });
    return b;
  }

  function makeRow(item, idx){
    var row=document.createElement("div");
    row.className="row";
    row.style.setProperty("--c", item.c);

    var head=document.createElement("div");
    head.className="head";
    head.setAttribute("role","button");
    head.tabIndex=0;

    var hL=document.createElement("div");
    hL.className="hL";

    var mark=document.createElement("div");
    mark.className="mark";
    mark.style.background=item.c;

    var tb=document.createElement("div");
    tb.className="titleBlock";

    var qEl=document.createElement("div");
    qEl.className="q";
    qEl.textContent=pick(item.t);

    var sEl=document.createElement("div");
    sEl.className="sub";
    sEl.textContent=pick(item.s);

    tb.appendChild(qEl);
    tb.appendChild(sEl);

    hL.appendChild(mark);
    hL.appendChild(tb);

    var chev=document.createElement("div");
    chev.className="chev";
    chev.innerHTML='<span class="chevTxt">▸</span>';

    head.appendChild(hL);
    head.appendChild(chev);

    var body=document.createElement("div");
    body.className="body";

    var p1=document.createElement("p");
    p1.className="p";
    p1.textContent=pick(item.p1);

    var p2=document.createElement("p");
    p2.className="p";
    p2.textContent=pick(item.p2);

    var bubbles=document.createElement("div");
    bubbles.className="subBubbles";

    item.bubbles.forEach(function(bb){
      bubbles.appendChild(bubble(pick(bb.h), pick(bb.p)));
    });

    var actions=document.createElement("div");
    actions.className="actions";

    var a1=document.createElement("a");
    a1.className="btn red";
    a1.textContent=(lang==="zh"?"打开：资本教义":(lang==="es"?"ABRIR: DOCTRINA":"OPEN: CAPITAL DOCTRINE"));
    a1.setAttribute("data-route","/products/capital-doctrine/");
    actions.appendChild(a1);

    var a2=document.createElement("a");
    a2.className="btn";
    a2.textContent=(lang==="zh"?"打开：量规":(lang==="es"?"ABRIR: MEDIDORES":"OPEN: GAUGES"));
    a2.setAttribute("data-route","/gauges/");
    actions.appendChild(a2);

    body.appendChild(p1);
    body.appendChild(p2);
    body.appendChild(bubbles);
    body.appendChild(actions);

    function toggle(){
      var openNow=!row.classList.contains("open");
      closeAll();
      row.classList.toggle("open", openNow);
      row.querySelector(".chevTxt").textContent = openNow ? "▾" : "▸";
      // close bubbles when row opens to reduce clutter
      if(openNow){
        body.querySelectorAll(".bubble").forEach(function(x){ x.classList.remove("open"); });
      }
      wireAll();
    }

    head.addEventListener("click", toggle, {passive:true});
    head.addEventListener("keydown", function(e){
      if(e.key==="Enter"||e.key===" "){ e.preventDefault(); toggle(); }
    });

    row.appendChild(head);
    row.appendChild(body);

    if(idx===0){
      row.classList.add("open");
      row.querySelector(".chevTxt").textContent="▾";
    }

    return row;
  }
