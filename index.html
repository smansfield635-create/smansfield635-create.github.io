<!doctype html>
<!-- TNT — /index.html
     COMPASS · GEM DIAL (OBSIDIAN) · 16 NODES + CORE · MID-AUTUMN SKY (EN-ONLY VISUAL PASS)
     OWNER: SEAN (Website Building Room)

     EXECUTION GOAL (THIS PASS):
       - Fix dragons: true head + segmented spine + smooth SLITHER (no vibration, no “vines”)
       - Fix clouds: placed BEHIND compass lens (under water/glass)
       - Fix color stack: red → dark → red (water lens) → dark (buttons)
       - Keep: 16 hubs + CORE only (no extra diamonds)
       - Keep: no duplicate destinations; missing/unbuilt → /404.html
       - CORE routes to /index-core/index.html
       - Bottom corner controls: EXIT → /door/ | HUB → /home/
       - State carry: gd_lang/gd_style/gd_time/gd_depth via URL + LS ONLY (NO new gd_* keys)
       - lane=platform|engineering is URL-only (no reload; never stored) — kept
       - ui.css owns html/body background (NO overrides)

     NOTE (PER YOUR LAST DIRECTION):
       - ENGLISH ONLY for now (visual correctness first). No CN/ES text on UI in this pass.
       - Only dragon banner text is rendered (English quotes). Can swap to CN top / locale bottom later.
-->

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Compass · DiamondGateBridge</title>

<link rel="stylesheet" href="/assets/ui.css"/>
<link rel="stylesheet" href="/assets/branch.css"/>
<script defer src="/assets/instruments.js"></script>

<style>
a{color:inherit;text-decoration:none}
body{margin:0}
body::before,body::after{pointer-events:none!important}

:root{
  /* ===== GEOMETRY (one dominant center; progressively smaller outward) ===== */
  --D0:210px;  /* CORE (dominant) */
  --D1:150px;  /* Cardinals */
  --D2:112px;  /* Diagonals */
  --D3:86px;   /* Outer 8 */

  /* radii (tight, fit on screen) */
  --R1:168px;
  --R2:246px;
  --R3:314px;

  --padTop:102px;

  /* ===== MATERIAL ===== */
  --ink:rgba(255,255,255,.94);
  --mut:rgba(255,255,255,.78);

  --onyx0:rgba(6,8,10,.96);
  --onyx1:rgba(10,12,16,.90);

  --crimson:rgba(120,0,22,.44);
  --festival:rgba(255,43,43,.26);
  --opalV:rgba(90,40,120,.18);

  --gold:rgba(201,162,74,.58);
  --goldGlow:rgba(201,162,74,.22);

  --shadowDeep:0 44px 140px rgba(0,0,0,.82);
  --shadowA:0 28px 110px rgba(0,0,0,.70);
  --shadowB:0 18px 60px rgba(0,0,0,.55);
}

/* ===== TOP BAR ===== */
.top{
  position:fixed;top:14px;left:0;right:0;
  padding:0 14px;
  z-index:260;
  pointer-events:none;
}
.topbar{
  pointer-events:auto;
  width:min(1120px,96vw);
  margin:0 auto;
  border:1px solid rgba(255,255,255,.12);
  border-radius:22px;
  padding:10px 12px;
  background:
    radial-gradient(circle at 18% 18%, rgba(201,162,74,.10), transparent 62%),
    radial-gradient(circle at 82% 30%, rgba(255,43,43,.10), transparent 64%),
    linear-gradient(145deg, rgba(10,10,14,.70), rgba(4,6,10,.82));
  box-shadow:var(--shadowA), inset 0 0 0 1px rgba(201,162,74,.10);
  backdrop-filter:blur(10px);
  display:flex;align-items:center;justify-content:space-between;
  gap:10px;
}
.brandLeft{
  display:flex;align-items:center;gap:12px;flex-wrap:wrap;min-width:0;
}
.brandTitle{
  font-weight:980;
  letter-spacing:.6px;
  font-size:14px;
  color:rgba(255,255,255,.94);
  white-space:nowrap;
}
.brandSub{
  font-size:12px;
  color:rgba(255,255,255,.74);
  letter-spacing:.2px;
  white-space:nowrap;
}
.brandLinks{
  display:flex;gap:10px;flex-wrap:wrap;
  font-size:12px;
  color:rgba(255,255,255,.72);
}
.brandLinks a{
  padding:6px 10px;
  border-radius:999px;
  border:1px solid rgba(201,162,74,.16);
  background:rgba(0,0,0,.12);
}
.controlsRight{
  display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:flex-end;
}

/* Segmented controls */
.seg{
  display:inline-flex;gap:0;overflow:hidden;border-radius:16px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(0,0,0,.18);
  box-shadow:var(--shadowB);
}
.seg button{
  appearance:none;border:0;background:transparent;
  color:rgba(255,255,255,.78);
  padding:10px 12px;min-height:42px;
  font-weight:980;font-size:13px;letter-spacing:.25px;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
.seg button[aria-pressed="true"]{
  color:rgba(255,255,255,.95);
  background:
    radial-gradient(circle at 50% 50%, rgba(201,162,74,.14), transparent 62%),
    linear-gradient(180deg, rgba(255,43,43,.10), rgba(0,0,0,.10));
  box-shadow: inset 0 0 0 1px rgba(201,162,74,.14), inset 0 -10px 22px rgba(201,162,74,.10);
}

/* ===== STAGE ===== */
.stage{
  position:relative;
  width:min(1200px,94vw);
  height:min(1200px,86vh);
  margin:var(--padTop) auto 0;
  pointer-events:none;
}

/* ===== OUTER SKY (brighter evening sky; NOT too dark) ===== */
.sky{
  position:absolute;inset:-18%;
  pointer-events:none;
  z-index:0;
  border-radius:44px;
  overflow:hidden;
}
.sky::before{
  content:"";
  position:absolute;inset:0;
  background:
    radial-gradient(circle at 62% 14%, rgba(255,230,160,.16) 0%, rgba(255,230,160,0) 56%), /* moon haze */
    radial-gradient(circle at 20% 24%, rgba(255,120,60,.14) 0%, rgba(255,120,60,0) 58%),  /* orange dusk */
    radial-gradient(circle at 86% 34%, rgba(160,90,255,.10) 0%, rgba(160,90,255,0) 62%),   /* opal */
    radial-gradient(circle at 48% 72%, rgba(0,0,0,.18) 0%, rgba(0,0,0,0) 62%),
    linear-gradient(180deg,
      rgba(180,0,0,.00) 0%,
      rgba(122,0,0,.10) 35%,
      rgba(40,0,0,.22) 100%);
  opacity:.98;
}
.sky::after{
  content:"";
  position:absolute;inset:0;
  background:
    radial-gradient(900px 520px at 50% 100%, rgba(0,0,0,.18) 0%, rgba(0,0,0,0) 68%),
    radial-gradient(220px 220px at 18% 18%, rgba(255,220,160,.10) 0%, rgba(255,220,160,0) 66%),
    radial-gradient(260px 260px at 80% 22%, rgba(255,210,150,.08) 0%, rgba(255,210,150,0) 70%);
  mix-blend-mode:screen;
  opacity:.55;
}

/* ===== STAGE SLAB (dark container) ===== */
.slab{
  position:absolute;left:50%;top:50%;
  transform:translate(-50%,-50%);
  width:min(980px,92vw);
  height:min(980px,92vw);
  border-radius:44px;
  pointer-events:none;
  z-index:1;
  border:1px solid rgba(255,255,255,.10);
  background:
    radial-gradient(circle at 30% 22%, rgba(255,255,255,.06), transparent 55%),
    radial-gradient(circle at 78% 28%, rgba(255,43,43,.08), transparent 60%),
    radial-gradient(circle at 70% 82%, rgba(90,40,120,.08), transparent 64%),
    linear-gradient(160deg, rgba(10,12,16,.86), rgba(6,8,10,.94));
  box-shadow:
    0 70px 240px rgba(0,0,0,.52),
    inset 0 2px 0 rgba(255,255,255,.08),
    inset 0 -70px 140px rgba(0,0,0,.58);
}

/* ===== COMPASS WATER LENS (red/translucent; provides the missing RED layer) ===== */
.waterLens{
  position:absolute;
  left:50%;top:50%;
  transform:translate(-50%,-50%);
  width:min(940px,90vw);
  height:min(940px,90vw);
  border-radius:999px;
  pointer-events:none;
  z-index:4; /* sits above clouds and dial, below dragons and buttons */
  overflow:hidden;
  border:1px solid rgba(255,255,255,.10);
  box-shadow:
    inset 0 0 0 1px rgba(201,162,74,.10),
    inset 0 0 90px rgba(0,0,0,.22);
  background:
    radial-gradient(circle at 50% 40%, rgba(255,255,255,.05), transparent 60%),
    radial-gradient(circle at 50% 55%, rgba(255,43,43,.10), rgba(255,43,43,.04) 58%, rgba(0,0,0,0) 78%),
    linear-gradient(180deg, rgba(255,43,43,.06), rgba(0,0,0,.06));
  opacity:.92;
}
.waterLens::before{
  content:"";
  position:absolute;inset:-30%;
  background:
    radial-gradient(circle at 30% 35%, rgba(255,255,255,.06), transparent 46%),
    radial-gradient(circle at 70% 60%, rgba(255,255,255,.04), transparent 52%),
    repeating-radial-gradient(circle at 50% 50%,
      rgba(255,255,255,.055) 0 2px,
      rgba(255,255,255,0) 2px 18px);
  filter:blur(.35px);
  opacity:.55;
  animation: rippleMove 10s linear infinite;
  mix-blend-mode:screen;
}
@keyframes rippleMove{
  0%{ transform:translate(-4%, -2%) rotate(0deg); }
  50%{ transform:translate(3%, 2%) rotate(6deg); }
  100%{ transform:translate(-4%, -2%) rotate(0deg); }
}

/* ===== OBISIDIAN DIAL FACE (under water lens) ===== */
.dial{
  position:absolute;
  left:50%;top:50%;
  transform:translate(-50%,-50%);
  width:min(900px,90vw);
  height:min(900px,90vw);
  border-radius:999px;
  pointer-events:none;
  z-index:2;
  overflow:hidden;
}
.dial::before{
  content:"";
  position:absolute;inset:0;border-radius:999px;
  background:
    radial-gradient(circle at 50% 42%,
      rgba(255,255,255,.05),
      rgba(0,0,0,.20) 56%,
      rgba(0,0,0,.56) 78%,
      rgba(0,0,0,.00) 92%),
    radial-gradient(circle at 50% 50%, rgba(201,162,74,.10), transparent 62%),
    radial-gradient(circle at 50% 50%, rgba(255,43,43,.08), transparent 66%),
    linear-gradient(180deg, rgba(0,0,0,.10), rgba(0,0,0,.00));
  box-shadow:
    inset 0 0 0 2px rgba(255,255,255,.06),
    inset 0 0 0 10px rgba(0,0,0,.12),
    inset 0 0 80px rgba(0,0,0,.55),
    0 50px 180px rgba(0,0,0,.28);
  opacity:.96;
}
.dial::after{
  content:"";
  position:absolute;inset:-14%;
  background:
    radial-gradient(circle at 50% 50%, transparent 0 36%, rgba(255,255,255,.06) 36% 36.6%, transparent 37% 100%),
    radial-gradient(circle at 50% 50%, transparent 0 52%, rgba(255,255,255,.06) 52% 52.6%, transparent 53% 100%),
    radial-gradient(circle at 50% 50%, transparent 0 68%, rgba(255,255,255,.06) 68% 68.6%, transparent 69% 100%),
    linear-gradient(90deg, transparent 0 49.7%, rgba(0,0,0,.16) 49.7% 50.3%, transparent 50.3% 100%),
    linear-gradient(0deg,  transparent 0 49.7%, rgba(0,0,0,.16) 49.7% 50.3%, transparent 50.3% 100%),
    repeating-conic-gradient(from 45deg at 50% 50%,
      rgba(201,162,74,.06) 0 1.2deg,
      transparent 1.2deg 7.5deg),
    radial-gradient(circle at 50% 50%, rgba(255,255,255,.04), transparent 62%);
  filter: blur(.25px);
  opacity:.78;
  mask: radial-gradient(circle at 50% 50%, transparent 0 18%, #000 20% 100%);
  -webkit-mask: radial-gradient(circle at 50% 50%, transparent 0 18%, #000 20% 100%);
}

/* ===== GEM NODES ===== */
.node{
  position:absolute;
  left:50%;top:50%;
  transform:translate(-50%,-50%) rotate(45deg);
  cursor:pointer;
  pointer-events:auto;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.18);
  transition:box-shadow .16s ease, border-color .16s ease, filter .16s ease;
  z-index:20;
  border-radius:22px;
}
.core{width:var(--D0);height:var(--D0);z-index:22;border-radius:26px}
.l1{width:var(--D1);height:var(--D1)}
.l2{width:var(--D2);height:var(--D2)}
.l3{width:var(--D3);height:var(--D3);border-radius:18px}

.surface{
  background:
    radial-gradient(circle at 20% 18%, rgba(255,255,255,.28), transparent 46%),
    radial-gradient(circle at 78% 22%, var(--festival), transparent 62%),
    radial-gradient(circle at 74% 84%, var(--opalV), transparent 64%),
    radial-gradient(circle at 28% 84%, var(--crimson), transparent 70%),
    linear-gradient(160deg, var(--onyx1), var(--onyx0));
  box-shadow:
    var(--shadowDeep),
    0 0 24px rgba(255,43,43,.08),
    inset 0 2px 0 rgba(255,255,255,.18),
    inset 0 -52px 92px rgba(0,0,0,.88);
}
/* 3D edge inlay aligned to diamond, not orthogonal grid */
.surface::before{
  content:"";
  position:absolute;inset:0;border-radius:inherit;pointer-events:none;
  box-shadow: inset 0 0 0 1px rgba(201,162,74,.18);
  background:
    /* curved “edge sweep” to suggest bevel */
    radial-gradient(140% 120% at 18% 20%, rgba(212,175,55,.16) 0%, rgba(212,175,55,0) 55%),
    radial-gradient(140% 120% at 82% 82%, rgba(212,175,55,.10) 0%, rgba(212,175,55,0) 58%),
    /* silk trim follows diamond orientation */
    repeating-linear-gradient(45deg, rgba(201,162,74,.09) 0 1px, transparent 1px 18px),
    repeating-linear-gradient(-45deg, rgba(201,162,74,.07) 0 1px, transparent 1px 18px);
  opacity:.34;
  mask:
    radial-gradient(circle at 50% 50%, transparent 0 70%, #000 78% 100%),
    linear-gradient(#000,#000);
  -webkit-mask:
    radial-gradient(circle at 50% 50%, transparent 0 70%, #000 78% 100%),
    linear-gradient(#000,#000);
}
.surface::after{
  content:"";
  position:absolute;left:12%;right:12%;top:10%;
  height:30%;
  border-radius:999px;
  background:linear-gradient(to bottom, rgba(255,255,255,.20), rgba(255,255,255,0));
  transform:rotate(-12deg);
  pointer-events:none;
  opacity:.92;
}
.node:hover{
  border-color:rgba(201,162,74,.44);
  box-shadow:
    var(--shadowDeep),
    0 0 0 2px rgba(201,162,74,.14),
    0 0 34px rgba(201,162,74,.18),
    inset 0 2px 0 rgba(255,255,255,.20),
    inset 0 -52px 92px rgba(0,0,0,.88);
}
.node:active{filter:brightness(.98)}

/* inner text (kept; full word fit via clamp) */
.inner{
  width:100%;height:100%;
  transform:rotate(-45deg);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:10px;
  gap:6px;
  color:#fff;
  pointer-events:none;
}
.word{
  font-weight:980;
  letter-spacing:.6px;
  line-height:1.05;
  text-shadow:0 0 18px rgba(0,0,0,.42);
  font-size:clamp(10px, 1.15vw, 16px);
  max-width:100%;
  word-break:keep-all;
}
.code{
  font-weight:950;
  font-size:10px;
  letter-spacing:1.2px;
  opacity:.78;
}

/* CORE emphasis */
.core{
  border-color:rgba(201,162,74,.26);
  box-shadow:
    0 54px 170px rgba(0,0,0,.88),
    0 0 46px rgba(201,162,74,.12),
    inset 0 2px 0 rgba(255,255,255,.22),
    inset 0 -64px 110px rgba(0,0,0,.92);
}

/* ===== CORNERS ===== */
.corner{
  position:fixed;
  bottom:max(16px, env(safe-area-inset-bottom));
  z-index:260;
  pointer-events:none;
}
.corner .dmini{pointer-events:auto}
.corner.left{left:16px}
.corner.right{right:16px}

.dmini{
  width:56px;height:56px;
  border-radius:16px;
  border:1px solid rgba(255,255,255,.14);
  background:
    radial-gradient(circle at 50% 40%, rgba(255,255,255,.08), transparent 52%),
    linear-gradient(145deg, rgba(10,12,16,.78), rgba(6,8,10,.92));
  box-shadow:var(--shadowB), 0 0 0 1px rgba(201,162,74,.10), 0 0 18px rgba(201,162,74,.10);
  display:grid;place-items:center;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
  transform:rotate(45deg);
  position:relative;
  overflow:hidden;
  transition:box-shadow .16s ease, border-color .16s ease;
}
.dmini:hover{
  border-color:rgba(201,162,74,.44);
  box-shadow:var(--shadowB), 0 0 0 2px rgba(201,162,74,.14), 0 0 30px rgba(201,162,74,.18);
}
.dmini span{
  transform:rotate(-45deg);
  font-weight:980;
  font-size:12px;
  letter-spacing:.6px;
  color:rgba(255,255,255,.92);
  user-select:none;
}
.cornerLabel{
  margin-top:10px;
  text-align:center;
  color:rgba(255,255,255,.72);
  font-size:11px;
  letter-spacing:.4px;
}

/* ===== NOTE PILL ===== */
.pillWrap{
  width:min(1120px,94vw);
  margin:14px auto 0;
  padding-bottom:90px;
}
.pill{
  border:1px solid rgba(255,255,255,.12);
  border-radius:22px;
  padding:14px 16px;
  background:
    radial-gradient(circle at 18% 22%, rgba(255,43,43,.10), transparent 62%),
    radial-gradient(circle at 82% 32%, rgba(90,40,120,.10), transparent 66%),
    radial-gradient(circle at 50% 92%, rgba(201,162,74,.10), transparent 62%),
    rgba(0,0,0,.16);
  box-shadow:0 26px 90px rgba(0,0,0,.55);
  color:rgba(255,255,255,.86);
  line-height:1.55;
  font-size:13.5px;
}
.pill b{color:rgba(255,255,255,.95)}
.pill .g{color:rgba(201,162,74,.80);font-weight:980}

/* ===== RESPONSIVE ===== */
@media (max-width:720px){
  :root{
    --D0:196px;
    --D1:142px;
    --D2:108px;
    --D3:84px;
    --R1:156px;
    --R2:228px;
    --R3:292px;
    --padTop:112px;
  }
  .stage{height:min(980px,86vh)}
}
@media (max-width:520px){
  :root{
    --D0:184px;
    --D1:136px;
    --D2:104px;
    --D3:80px;
    --R1:146px;
    --R2:214px;
    --R3:274px;
  }
  .brandSub{display:none}
}
</style>
</head>

<body>

<div class="top" aria-label="Top controls">
  <div class="topbar">
    <div class="brandLeft" aria-label="Brand">
      <div class="brandTitle" id="brandTitle">WELCOME TO THE COMPASS</div>
      <div class="brandSub" id="brandSub">A visual tutorial: choose a construct, enter a hub, keep your path clean.</div>
      <div class="brandLinks" aria-label="Brand links">
        <a href="https://diamondgatebridge.com" target="_blank" rel="noopener">diamondgatebridge.com</a>
        <a href="https://cogrid.net" target="_blank" rel="noopener">cogrid.net</a>
      </div>
    </div>

    <div class="controlsRight" aria-label="Lens">
      <div class="seg" role="group" aria-label="Lane">
        <button type="button" id="lanePlatform" aria-pressed="true">PLATFORM</button>
        <button type="button" id="laneEngineering" aria-pressed="false">ENGINEERING</button>
      </div>
    </div>
  </div>
</div>

<div class="stage" id="stage" aria-label="Compass dial">
  <div class="sky" aria-hidden="true"></div>
  <div class="slab" aria-hidden="true"></div>
  <div class="dial" aria-hidden="true"></div>

  <!-- clouds + moon live on fxBackCanvas (z behind lens) -->
  <canvas id="fxBack"></canvas>

  <!-- compass lens (RED layer) -->
  <div class="waterLens" aria-hidden="true"></div>

  <!-- dragons + banners live on fxMidCanvas (above lens, below buttons) -->
  <canvas id="fxMid"></canvas>

  <!-- nodes injected by JS -->
</div>

<div class="pillWrap" aria-label="Compass note">
  <div class="pill" id="pill">
    <b>Compass:</b> One center (<span class="g">CORE</span>) + 16 hubs. No duplicate destinations. Unbuilt hubs route to <span class="g">/404.html</span>.
  </div>
</div>

<div class="corner left" aria-label="Exit">
  <div class="dmini" id="btnExit" role="button" tabindex="0" aria-label="Exit"><span>EXIT</span></div>
  <div class="cornerLabel" id="lblExit">EXIT</div>
</div>
<div class="corner right" aria-label="Hub">
  <div class="dmini" id="btnHub" role="button" tabindex="0" aria-label="Hub"><span>HUB</span></div>
  <div class="cornerLabel" id="lblHub">HUB</div>
</div>

<script>
(function(){
  "use strict";

  // ===== Canon state (gd_* only; lane URL-only) =====
  var qs=new URLSearchParams(location.search);
  var LS=window.localStorage;

  var lang  = qs.get("lang")  || LS.getItem("gd_lang")  || "en"; // kept, EN only UI in this pass
  var style = qs.get("style") || LS.getItem("gd_style") || "informal";
  var time  = qs.get("time")  || LS.getItem("gd_time")  || "now";
  var depth = qs.get("depth") || LS.getItem("gd_depth") || "explore";
  var lane  = qs.get("lane")  || "platform"; // URL-only

  if(lang!=="en" && lang!=="zh" && lang!=="es") lang="en";
  if(style!=="informal" && style!=="formal") style="informal";
  if(time==="trajectory") time="post";
  if(time!=="origin" && time!=="now" && time!=="post") time="now";
  if(depth!=="explore" && depth!=="learn") depth="explore";
  if(lane!=="platform" && lane!=="engineering") lane="platform";

  try{
    LS.setItem("gd_lang",lang);
    LS.setItem("gd_style",style);
    LS.setItem("gd_time",time);
    LS.setItem("gd_depth",depth);
  }catch(e){}

  document.documentElement.lang=(lang==="zh")?"zh":(lang==="es")?"es":"en";

  function q(over){
    var p=new URLSearchParams();
    p.set("lang",(over&&over.lang)?over.lang:lang);
    p.set("style",(over&&over.style)?over.style:style);
    p.set("time",(over&&over.time)?over.time:time);
    p.set("depth",(over&&over.depth)?over.depth:depth);
    var L=(over&&over.lane)?over.lane:lane;
    if(L==="platform"||L==="engineering") p.set("lane",L);
    return "?"+p.toString();
  }

  function go(path){ window.location.href = path + q(); }
  function setPressed(btn, on){ btn.setAttribute("aria-pressed", on ? "true" : "false"); }

  // ===== ROUTING (NO DUPLICATES; missing/unbuilt → 404) =====
  var CORE_ROUTE = "/index-core/index.html";
  var EXIT_ROUTE = "/door/";
  var HUB_ROUTE  = "/home/";
  var PLACEHOLDER_404 = "/404.html";

  // N/E/S/W mapping per your latest accepted hierarchy:
  // N = Laws, E = Energy, S = Finance, W = Governance
  // Prelude removed. Research included. Doctrine fixed.
  var ROUTES_RAW = [
    // Tier 1 (cardinals)
    {tier:1, code:"N",  label:{platform:"LAWS",        engineering:"BOUNDS"},     href:"/laws/"},
    {tier:1, code:"E",  label:{platform:"ENERGY",      engineering:"POWER"},      href:"/explore/frontier/energy/"},
    {tier:1, code:"S",  label:{platform:"FINANCE",     engineering:"CAPITAL"},    href:"/finance/"},
    {tier:1, code:"W",  label:{platform:"GOVERNANCE",  engineering:"EXEC"},       href:"/governance/"},

    // Tier 2 (diagonals)
    {tier:2, code:"NE", label:{platform:"PRODUCTS",    engineering:"DEPLOY"},     href:"/products/"},
    {tier:2, code:"SE", label:{platform:"RESEARCH",    engineering:"R&D"},        href:"/research/"},
    {tier:2, code:"SW", label:{platform:"EXPLORE",     engineering:"MODELS"},     href:"/explore/"},
    {tier:2, code:"NW", label:{platform:"DOCTRINE",    engineering:"CCD"},        href:"/products/capital-doctrine/"},

    // Tier 3 (outer 8)
    {tier:3, code:"NNE",label:{platform:"EDUCATION",   engineering:"ESL"},        href:"/products/education/"},
    {tier:3, code:"ENE",label:{platform:"FRONTIER",    engineering:"FRONTIER"},   href:"/explore/frontier/"},
    {tier:3, code:"ESE",label:{platform:"INFRA",       engineering:"SUBST"},      href:"/explore/infrastructure/"},
    {tier:3, code:"SSE",label:{platform:"AGRICULTURE", engineering:"FOOD"},       href:"/products/agriculture/"},
    {tier:3, code:"SSW",label:{platform:"GAUGES",      engineering:"SIGNALS"},    href:"/gauges/"},
    {tier:3, code:"WSW",label:{platform:"VISION",      engineering:"MAP"},        href:"/explore/frontier/vision/"},
    {tier:3, code:"WNW",label:{platform:"LATTICE",     engineering:"256"},        href:"/explore/frontier/lattice/"},
    {tier:3, code:"NNW",label:{platform:"SHIMMER",     engineering:"S.H.I.M.M.E.R."}, href:"/explore/frontier/shimmer/"}
  ];

  function normalizeRoutes(list){
    var seen = Object.create(null);
    var out = [];
    for(var i=0;i<list.length;i++){
      var it=list[i];
      var h=(it.href||"").trim();
      if(!h) h=PLACEHOLDER_404;
      if(seen[h]) h=PLACEHOLDER_404;
      seen[h]=true;
      out.push({tier:it.tier, code:it.code, label:it.label, href:h});
    }
    return out;
  }
  var ROUTES = normalizeRoutes(ROUTES_RAW);

  function labelFor(it){
    return (lane==="engineering") ? it.label.engineering : it.label.platform;
  }

  // ===== Lane toggle (NO reload) =====
  var btnLP=document.getElementById("lanePlatform");
  var btnLE=document.getElementById("laneEngineering");
  setPressed(btnLP, lane==="platform");
  setPressed(btnLE, lane==="engineering");

  function setLane(next){
    if(next!=="platform" && next!=="engineering") next="platform";
    lane=next;
    history.replaceState({}, "", location.pathname + q({lane:lane}));
    setPressed(btnLP, lane==="platform");
    setPressed(btnLE, lane==="engineering");
    paintHeader();
    layoutNodes();
  }
  btnLP.addEventListener("click", function(){ setLane("platform"); }, {passive:true});
  btnLE.addEventListener("click", function(){ setLane("engineering"); }, {passive:true});

  function paintHeader(){
    var laneWord = (lane==="engineering") ? "ENGINEERING" : "PLATFORM";
    document.getElementById("brandSub").textContent =
      "A visual tutorial: choose a construct, enter a hub, keep your path clean. Lens: "+laneWord+".";
  }
  paintHeader();

  // ===== Corner buttons =====
  function bindCorner(id, path){
    var el=document.getElementById(id);
    if(!el) return;
    function act(){ go(path); }
    el.addEventListener("click", act, {passive:true});
    el.addEventListener("keydown", function(e){
      if(e.key==="Enter"||e.key===" "){ e.preventDefault(); act(); }
    });
  }
  bindCorner("btnExit", EXIT_ROUTE);
  bindCorner("btnHub", HUB_ROUTE);

  // ===== Nodes (16 + core only) =====
  var stage=document.getElementById("stage");

  function mkNode(word, code, cls){
    var d=document.createElement("div");
    d.className="node surface "+cls;
    d.setAttribute("role","button");
    d.tabIndex=0;

    var inner=document.createElement("div");
    inner.className="inner";

    var w=document.createElement("div");
    w.className="word";
    w.textContent=word;

    var c=document.createElement("div");
    c.className="code";
    c.textContent=code;

    inner.appendChild(w);
    inner.appendChild(c);
    d.appendChild(inner);

    return d;
  }

  function layoutNodes(){
    // remove existing nodes
    stage.querySelectorAll(".node").forEach(function(n){ n.remove(); });

    var rect=stage.getBoundingClientRect();
    var cx=rect.width/2, cy=rect.height/2;

    var R1=parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--R1"))||168;
    var R2=parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--R2"))||246;
    var R3=parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--R3"))||314;

    // CORE
    var core=mkNode("CORE","INDEX","core");
    core.style.left=cx+"px"; core.style.top=cy+"px";
    core.addEventListener("click", function(){ go(CORE_ROUTE); }, {passive:true});
    core.addEventListener("keydown", function(e){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); go(CORE_ROUTE); }});
    stage.appendChild(core);

    var t1=[], t2=[], t3=[];
    for(var i=0;i<ROUTES.length;i++){
      if(ROUTES[i].tier===1) t1.push(ROUTES[i]);
      else if(ROUTES[i].tier===2) t2.push(ROUTES[i]);
      else t3.push(ROUTES[i]);
    }

    function byCode(arr, code){
      for(var i=0;i<arr.length;i++) if(arr[i].code===code) return arr[i];
      return null;
    }

    // Tier 1 pinned N/E/S/W
    var ordered=[byCode(t1,"N"),byCode(t1,"E"),byCode(t1,"S"),byCode(t1,"W")].filter(Boolean);
    var ang=[-Math.PI/2, 0, Math.PI/2, Math.PI];
    for(var i=0;i<ordered.length;i++){
      var it=ordered[i];
      var x=cx + R1*Math.cos(ang[i]);
      var y=cy + R1*Math.sin(ang[i]);
      var n=mkNode(labelFor(it), it.code, "l1");
      n.style.left=x+"px"; n.style.top=y+"px";
      (function(path, el){
        el.addEventListener("click", function(){ go(path); }, {passive:true});
        el.addEventListener("keydown", function(e){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); go(path); }});
      })(it.href, n);
      stage.appendChild(n);
    }

    // Tier 2 diagonals
    for(var i=0;i<t2.length;i++){
      var it=t2[i];
      var a=(i/t2.length)*(Math.PI*2) - Math.PI/4;
      var x=cx + R2*Math.cos(a);
      var y=cy + R2*Math.sin(a);
      var n=mkNode(labelFor(it), it.code, "l2");
      n.style.left=x+"px"; n.style.top=y+"px";
      (function(path, el){
        el.addEventListener("click", function(){ go(path); }, {passive:true});
        el.addEventListener("keydown", function(e){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); go(path); }});
      })(it.href, n);
      stage.appendChild(n);
    }

    // Tier 3 outer 8
    for(var i=0;i<t3.length;i++){
      var it=t3[i];
      var a=(i/t3.length)*(Math.PI*2) - Math.PI*(3/8);
      var x=cx + R3*Math.cos(a);
      var y=cy + R3*Math.sin(a);
      var n=mkNode(labelFor(it), it.code, "l3");
      n.style.left=x+"px"; n.style.top=y+"px";
      (function(path, el){
        el.addEventListener("click", function(){ go(path); }, {passive:true});
        el.addEventListener("keydown", function(e){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); go(path); }});
      })(it.href, n);
      stage.appendChild(n);
    }
  }

  function safeLayoutNodes(){
    var r=stage.getBoundingClientRect();
    if(r.width<10||r.height<10){ requestAnimationFrame(safeLayoutNodes); return; }
    layoutNodes();
  }

  // ===== FX CANVASES =====
  var fxBack=document.getElementById("fxBack");
  var fxMid =document.getElementById("fxMid");
  var back=fxBack.getContext("2d");
  var mid =fxMid.getContext("2d");

  fxBack.style.position="absolute";
  fxBack.style.left="0"; fxBack.style.top="0";
  fxBack.style.width="100%"; fxBack.style.height="100%";
  fxBack.style.pointerEvents="none";
  fxBack.style.zIndex="3"; // clouds+moon under water lens

  fxMid.style.position="absolute";
  fxMid.style.left="0"; fxMid.style.top="0";
  fxMid.style.width="100%"; fxMid.style.height="100%";
  fxMid.style.pointerEvents="none";
  fxMid.style.zIndex="6"; // dragons above lens, below nodes

  function dpr(){
    return Math.min(2, window.devicePixelRatio || 1);
  }

  function resizeFX(){
    var r=stage.getBoundingClientRect();
    var s=dpr();
    fxBack.width=Math.max(1, Math.floor(r.width*s));
    fxBack.height=Math.max(1, Math.floor(r.height*s));
    fxMid.width=fxBack.width;
    fxMid.height=fxBack.height;
    back.setTransform(s,0,0,s,0,0);
    mid.setTransform(s,0,0,s,0,0);
  }

  window.addEventListener("resize", function(){
    resizeFX();
    safeLayoutNodes();
  }, {passive:true});

  // ===== MOON (single moon, phase advance per return) =====
  function nextMoonPhase(){
    var key="moon_phase_step";
    var v=0;
    try{ v=parseInt(sessionStorage.getItem(key)||"0",10); if(!isFinite(v)) v=0; }catch(e){ v=0; }
    v=(v+1)%8;
    try{ sessionStorage.setItem(key,String(v)); }catch(e){}
    return v; // 0..7
  }
  var moonPhase=nextMoonPhase();

  function drawMoon(ctx, w, h){
    var mx=w*0.78, my=h*0.16;
    var r=Math.min(w,h)*0.07; // bigger than before
    // glow
    var g=ctx.createRadialGradient(mx,my,0,mx,my,r*2.2);
    g.addColorStop(0,"rgba(255,240,210,0.26)");
    g.addColorStop(0.35,"rgba(255,240,210,0.12)");
    g.addColorStop(1,"rgba(255,240,210,0)");
    ctx.fillStyle=g;
    ctx.beginPath(); ctx.arc(mx,my,r*2.2,0,Math.PI*2); ctx.fill();

    // moon body
    ctx.save();
    ctx.beginPath(); ctx.arc(mx,my,r,0,Math.PI*2);
    ctx.clip();
    var mgrad=ctx.createRadialGradient(mx-r*0.25,my-r*0.2,r*0.2,mx,my,r*1.1);
    mgrad.addColorStop(0,"rgba(255,250,240,0.92)");
    mgrad.addColorStop(1,"rgba(210,190,160,0.92)");
    ctx.fillStyle=mgrad;
    ctx.fillRect(mx-r,my-r,r*2,r*2);

    // craters
    ctx.globalAlpha=0.22;
    ctx.fillStyle="rgba(0,0,0,0.45)";
    for(var i=0;i<10;i++){
      var cx=mx + (Math.sin(i*2.2)*0.55)*r*0.7;
      var cy=my + (Math.cos(i*1.9)*0.55)*r*0.65;
      var rr=r*(0.08 + (i%3)*0.04);
      ctx.beginPath(); ctx.arc(cx,cy,rr,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha=1;

    // phase shadow (single moon, no double)
    var phase = moonPhase; // 0 new .. 4 full .. 7 waning crescent
    var t = phase/7;       // 0..1
    // map: new -> full -> new
    var illum = (phase<=4) ? (phase/4) : ((8-phase)/4); // 0..1..0
    // shadow offset
    var off = (phase<=4) ? (1-illum) : -(1-illum);
    ctx.globalCompositeOperation="source-over";
    ctx.fillStyle="rgba(0,0,0,0.55)";
    ctx.beginPath();
    ctx.ellipse(mx + off*r*0.85, my, r, r, 0, 0, Math.PI*2);
    ctx.fill();

    ctx.restore();
  }

  // ===== CLOUDS (behind compass lens) =====
  var clouds=[];
  function seedClouds(){
    clouds=[];
    for(var i=0;i<12;i++){
      clouds.push({
        x: Math.random()*stage.clientWidth,
        y: Math.random()*stage.clientHeight*0.45 + stage.clientHeight*0.06,
        v: 0.12 + Math.random()*0.18,
        s: 140 + Math.random()*220,
        a: 0.030 + Math.random()*0.020,
        o: Math.random()*1000
      });
    }
  }

  function drawCloudBlob(ctx, x, y, size, alpha){
    ctx.save();
    ctx.globalAlpha=alpha;
    ctx.fillStyle="rgba(255,255,255,1)";
    // multi-lobe cloud
    var lobes=6;
    for(var i=0;i<lobes;i++){
      var ang=i*(Math.PI*2/lobes);
      var rx=size*(0.32+0.10*Math.sin(i*1.7));
      var ry=size*(0.16+0.06*Math.cos(i*1.3));
      var lx=x + Math.cos(ang)*size*0.18;
      var ly=y + Math.sin(ang)*size*0.06;
      ctx.beginPath();
      ctx.ellipse(lx,ly,rx,ry,0,0,Math.PI*2);
      ctx.fill();
    }
    ctx.restore();
  }

  function drawClouds(){
    var w=stage.clientWidth, h=stage.clientHeight;
    back.save();
    back.globalCompositeOperation="screen";
    for(var i=0;i<clouds.length;i++){
      var c=clouds[i];
      // soft drift left->right
      c.x += c.v;
      // subtle vertical drift
      c.y += Math.sin((performance.now()*0.00008)+c.o)*0.03;
      if(c.x > w + c.s) c.x = -c.s;

      // translucent, so buttons always show
      drawCloudBlob(back, c.x, c.y, c.s, c.a);
    }
    back.restore();
  }

  // ===== LANTERN EMBERS (behind dragons; above clouds) =====
  var embers=[];
  function seedEmbers(){
    embers=[];
    for(var i=0;i<36;i++){
      embers.push({
        x: Math.random()*stage.clientWidth,
        y: stage.clientHeight + Math.random()*240,
        v: 0.25 + Math.random()*0.45,
        s: 1.4 + Math.random()*2.6,
        w: 0.6 + Math.random()*1.2,
        o: Math.random()*1000
      });
    }
  }
  function drawEmbers(ctx){
    var w=stage.clientWidth, h=stage.clientHeight;
    ctx.save();
    ctx.globalCompositeOperation="screen";
    for(var i=0;i<embers.length;i++){
      var e=embers[i];
      e.y -= e.v;
      e.x += Math.sin((performance.now()*0.0012)+e.o)*0.18;
      if(e.y < -30){
        e.y = h + 30;
        e.x = Math.random()*w;
      }
      ctx.fillStyle="rgba(255,200,120,0.18)";
      ctx.beginPath();
      ctx.ellipse(e.x,e.y,e.s*1.2,e.s*2.0,0,0,Math.PI*2);
      ctx.fill();

      ctx.fillStyle="rgba(255,160,90,0.08)";
      ctx.beginPath();
      ctx.arc(e.x,e.y,e.s*2.2,0,Math.PI*2);
      ctx.fill();
    }
    ctx.restore();
  }

  // ===== DRAGON ENGINE (true head + segmented spine; smooth slither) =====
  var quotes = [
    "Say less. Do more.",
    "Time passes. The river flows.",
    "Fix what you can. Learn from what you can’t.",
    "Do not do to others what you do not want done to you.",
    "A moment’s mistake can become a long regret."
  ];
  var quoteIndex = Math.floor(Math.random()*quotes.length);

  function Dragon(opts){
    this.dir = opts.dir;            // 1 = left->right, -1 = right->left
    this.yBase = opts.yBase;        // baseline
    this.yAmp  = opts.yAmp;         // slither amplitude
    this.speed = opts.speed;        // px per frame
    this.len   = opts.len;          // segment count
    this.segDist = opts.segDist;    // distance between segments
    this.phase = Math.random()*1000;
    this.reset();
  }

  Dragon.prototype.reset = function(){
    var w=stage.clientWidth;
    var startX = (this.dir===1) ? -200 : (w+200);
    this.head = {x:startX, y:this.yBase};
    this.body=[];
    for(var i=0;i<this.len;i++){
      this.body.push({x:startX - this.dir*i*this.segDist, y:this.yBase});
    }
    quoteIndex = (quoteIndex+1)%quotes.length;
    this.quote = quotes[quoteIndex];
    this.bannerT = 0;
  };

  Dragon.prototype.step = function(t){
    var w=stage.clientWidth;
    // head movement: smooth slither, low frequency (not violent)
    var drift = Math.sin((t*0.00045)+this.phase)*this.yAmp;
    this.head.x += this.speed*this.dir;
    this.head.y = this.yBase + drift;

    // follow chain (inverse kinematics)
    this.body[0].x = this.head.x;
    this.body[0].y = this.head.y;

    for(var i=1;i<this.body.length;i++){
      var p=this.body[i];
      var prev=this.body[i-1];

      var dx = prev.x - p.x;
      var dy = prev.y - p.y;
      var dist = Math.sqrt(dx*dx+dy*dy) || 1;

      var target = this.segDist;
      var k = (dist - target)/dist;

      // pull segment toward fixed distance
      p.x += dx*k;
      p.y += dy*k;
    }

    // offscreen reset after full pass
    if(this.dir===1 && this.head.x > w+240) this.reset();
    if(this.dir===-1 && this.head.x < -240) this.reset();
  };

  function drawDragon(ctx, dragon, t){
    // dark green dragon with segmented body + ridge spikes + head details
    var body=dragon.body;
    if(body.length<6) return;

    ctx.save();
    ctx.globalCompositeOperation="source-over";

    // colors
    var fill="rgba(10,40,18,0.92)";
    var edge="rgba(0,0,0,0.55)";
    var gold="rgba(212,175,55,0.70)";

    // draw body back-to-front
    for(var i=body.length-1;i>=0;i--){
      var p=body[i];

      // taper: thick near head, thinner to tail
      var u = i/(body.length-1);
      var base = (1-u);
      var w = 22*base + 6;
      var h = 16*base + 5;

      // slight local rotation following tangent
      var prev = body[Math.max(0,i-1)];
      var next = body[Math.min(body.length-1,i+1)];
      var ang = Math.atan2(next.y - prev.y, next.x - prev.x);

      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(ang);

      // segment
      ctx.fillStyle=fill;
      ctx.beginPath();
      ctx.ellipse(0,0,w,h,0,0,Math.PI*2);
      ctx.fill();

      // shadow edge
      ctx.strokeStyle="rgba(0,0,0,0.28)";
      ctx.lineWidth=1;
      ctx.beginPath();
      ctx.ellipse(0,0,w,h,0,0,Math.PI*2);
      ctx.stroke();

      // ridge spikes (not leaves): small triangles along top edge near head-mid
      if(i<42 && i>10 && (i%3===0)){
        ctx.fillStyle="rgba(212,175,55,0.18)";
        ctx.beginPath();
        ctx.moveTo(-w*0.10, -h*0.98);
        ctx.lineTo(0, -h*1.55);
        ctx.lineTo(w*0.10, -h*0.98);
        ctx.closePath();
        ctx.fill();
      }

      ctx.restore();
    }

    // head (draw on top)
    var hx=dragon.head.x, hy=dragon.head.y;
    var h2=body[3];
    var hAng=Math.atan2(hy - h2.y, hx - h2.x);

    ctx.save();
    ctx.translate(hx, hy);
    ctx.rotate(hAng);

    // skull
    ctx.fillStyle="rgba(12,48,20,0.98)";
    ctx.beginPath();
    ctx.ellipse(0,0,28,20,0,0,Math.PI*2);
    ctx.fill();

    // snout
    ctx.beginPath();
    ctx.ellipse(16,4,18,12,0,0,Math.PI*2);
    ctx.fill();

    // jaw shadow
    ctx.fillStyle="rgba(0,0,0,0.25)";
    ctx.beginPath();
    ctx.ellipse(10,10,20,10,0,0,Math.PI*2);
    ctx.fill();

    // eye glow
    ctx.fillStyle="rgba(212,175,55,0.75)";
    ctx.beginPath();
    ctx.arc(8,-4,2.2,0,Math.PI*2);
    ctx.fill();

    // horns
    ctx.fillStyle="rgba(212,175,55,0.18)";
    ctx.beginPath();
    ctx.moveTo(-6,-18); ctx.lineTo(-14,-34); ctx.lineTo(2,-22);
    ctx.closePath(); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(2,-18); ctx.lineTo(-2,-36); ctx.lineTo(10,-22);
    ctx.closePath(); ctx.fill();

    // whisker
    ctx.strokeStyle="rgba(255,255,255,0.12)";
    ctx.lineWidth=1;
    ctx.beginPath();
    ctx.moveTo(26,4);
    ctx.quadraticCurveTo(46,0,62,-8);
    ctx.stroke();

    ctx.restore();

    // banner (English only; gold glow) follows dragon, below head slightly
    ctx.save();
    ctx.globalCompositeOperation="screen";
    ctx.font="700 14px system-ui, -apple-system, Segoe UI, Roboto, sans-serif";
    ctx.fillStyle="rgba(212,175,55,0.68)";
    ctx.shadowColor="rgba(212,175,55,0.18)";
    ctx.shadowBlur=14;

    // place banner near segment 10..20
    var bx=body[14].x, by=body[14].y + 22;
    ctx.fillText(dragon.quote, bx, by);
    ctx.restore();
  }

  // ===== Render loop =====
  var dragonTop = new Dragon({dir:-1, yBase: stage.clientHeight*0.30, yAmp: 18, speed: 0.70, len: 70, segDist: 10});
  var dragonBot = new Dragon({dir: 1, yBase: stage.clientHeight*0.72, yAmp: 16, speed: 0.62, len: 68, segDist: 10});

  function render(){
    var w=stage.clientWidth, h=stage.clientHeight;
    // clear
    back.clearRect(0,0,w,h);
    mid.clearRect(0,0,w,h);

    // BACK LAYER: moon + clouds
    drawMoon(back, w, h);
    drawClouds();

    // MID LAYER: dragons + embers (embers above clouds, still under buttons)
    drawEmbers(mid);

    var t=performance.now();
    dragonTop.step(t);
    dragonBot.step(t);

    drawDragon(mid, dragonTop, t);
    drawDragon(mid, dragonBot, t);

    requestAnimationFrame(render);
  }

  // ===== Init =====
  function init(){
    resizeFX();
    seedClouds();
    seedEmbers();
    safeLayoutNodes();
    requestAnimationFrame(render);
  }
  init();

})();
</script>

</body>
