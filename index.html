<!doctype html>
<!-- TNT — /index.html
     COMPASS · GEM DIAL (WATER GLASS) · 16 NODES + CORE · MID-AUTUMN SKY + DRAGONS (V6)
     OWNER: SEAN (Website Building Room)

     GOAL (YOUR CURRENT ASK):
       - Premium visual deliverance > diversity/complexity
       - Clear (no fuzz), 4K-safe, cinematic
       - Evening sky (not too dark) + water-reflection compass face
       - Clouds drift L→R (reflection layer); dragons drift R→L (between compass and buttons)
       - 2 dragons: top = classical Chinese; bottom = current language (EN/ES/中文)
       - Glowing gold sayings on dragons (textPath), dragon bodies look like dragons (not vines)
       - Lanterns drift upward
       - One moon with phases + craters + glow + reflection (phase advances each return in same tab)
       - 16 direction marks visible on compass face (gold overlay + black print; N/E/S/W boldest)
       - Buttons: opaque gem, 3D edge, curved inlay (NOT orthogonal grid), fractalized surface
       - Every button shows micro cardinal corners (NW/NE/SE/SW) inside the gem (subtle)
       - CORE action: routes to /index-core/index.html
       - Bottom corners: EXIT → /door/ | HUB → /home/ (placed above safe-area)

     LOCKS:
       - Trilingual: EN/中文/ES (NO reload)
       - Lens: lane=platform|engineering (URL-only; NO reload; NEVER stored)
       - Canon state carry: gd_lang/gd_style/gd_time/gd_depth via URL + LS ONLY (NO new gd_* keys)
       - No overlays/modals; no inline onclick; addEventListener only
       - ui.css owns html/body background (NO overrides)
       - 16 unique destinations (no duplicates); unknown/unbuilt → /404.html
-->

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Compass · DiamondGateBridge</title>

<link rel="stylesheet" href="/assets/ui.css"/>
<link rel="stylesheet" href="/assets/branch.css"/>
<script defer src="/assets/instruments.js"></script>

<style>
a{color:inherit;text-decoration:none}
body{margin:0}
body::before,body::after{pointer-events:none!important}

/* ============================================================
   GEOMETRY (ONE DOMINANT CENTER; SMALLER OUTWARD)
   ============================================================ */
:root{
  --D0:208px;  /* CORE */
  --D1:148px;  /* Cardinals */
  --D2:112px;  /* Diagonals */
  --D3:86px;   /* Outer 8 */

  --R1:164px;
  --R2:238px;
  --R3:304px;

  --padTop:106px;

  --ink:rgba(255,255,255,.94);
  --mut:rgba(255,255,255,.78);
  --stroke:rgba(255,255,255,.12);

  --onyx0:rgba(6,8,10,.96);
  --onyx1:rgba(10,12,16,.88);

  --crimson:rgba(120,0,22,.44);
  --festival:rgba(255,43,43,.24);
  --opalV:rgba(90,40,120,.16);

  --gold:rgba(212,175,55,.78);
  --goldSoft:rgba(212,175,55,.22);
  --goldGlow:rgba(212,175,55,.18);

  --shadowDeep:0 44px 140px rgba(0,0,0,.82);
  --shadowA:0 28px 110px rgba(0,0,0,.70);
  --shadowB:0 18px 60px rgba(0,0,0,.55);
}

/* ============================================================
   TOP BAR (LIGHTER, HUMAN)
   ============================================================ */
.top{
  position:fixed;top:14px;left:0;right:0;
  padding:0 14px;
  z-index:260;
  pointer-events:none;
}
.topbar{
  pointer-events:auto;
  width:min(1120px,96vw);
  margin:0 auto;
  border:1px solid rgba(255,255,255,.12);
  border-radius:22px;
  padding:10px 12px;
  background:
    radial-gradient(circle at 18% 18%, rgba(212,175,55,.10), transparent 62%),
    radial-gradient(circle at 82% 30%, rgba(255,43,43,.10), transparent 64%),
    linear-gradient(145deg, rgba(14,16,22,.82), rgba(10,12,18,.90));
  box-shadow:var(--shadowA), inset 0 0 0 1px rgba(212,175,55,.10);
  backdrop-filter:blur(10px);
  display:flex;align-items:center;justify-content:space-between;
  gap:10px;
}
.brandLeft{
  display:flex;align-items:center;gap:12px;flex-wrap:wrap;min-width:0;
}
.brandTitle{
  font-weight:980;
  letter-spacing:.6px;
  font-size:14px;
  color:rgba(255,255,255,.95);
  white-space:nowrap;
}
.brandSub{
  font-size:12px;
  color:rgba(255,255,255,.78);
  letter-spacing:.2px;
  white-space:nowrap;
}
.brandLinks{
  display:flex;gap:10px;flex-wrap:wrap;
  font-size:12px;
  color:rgba(255,255,255,.78);
}
.brandLinks a{
  padding:6px 10px;
  border-radius:999px;
  border:1px solid rgba(212,175,55,.16);
  background:rgba(0,0,0,.12);
}
.controlsRight{
  display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:flex-end;
}

/* segmented */
.seg{
  display:inline-flex;gap:0;overflow:hidden;border-radius:16px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(0,0,0,.16);
  box-shadow:var(--shadowB);
}
.seg button{
  appearance:none;border:0;background:transparent;
  color:rgba(255,255,255,.80);
  padding:10px 12px;min-height:42px;
  font-weight:980;font-size:13px;letter-spacing:.25px;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
.seg button[aria-pressed="true"]{
  color:rgba(255,255,255,.96);
  background:
    radial-gradient(circle at 50% 50%, rgba(212,175,55,.12), transparent 62%),
    linear-gradient(180deg, rgba(255,43,43,.10), rgba(0,0,0,.10));
  box-shadow: inset 0 0 0 1px rgba(212,175,55,.12), inset 0 -10px 22px rgba(212,175,55,.08);
}

/* ============================================================
   STAGE + LAYERS (SKY → WATER → DIAL → CLOUDS → DRAGONS → GEMS)
   ============================================================ */
.stage{
  position:relative;
  width:min(1200px,94vw);
  height:min(1200px,86vh);
  margin:var(--padTop) auto 0;
  pointer-events:none;
}

/* Evening sky (lighter than prior; warm night) */
.sky{
  position:absolute;inset:-18%;
  pointer-events:none;
  z-index:0;
  border-radius:44px;
  overflow:hidden;
}
.sky::before{
  content:"";
  position:absolute;inset:0;
  background:
    radial-gradient(circle at 68% 14%, rgba(255,240,220,.22), transparent 48%), /* moon haze */
    radial-gradient(circle at 18% 22%, rgba(255,120,80,.16), transparent 56%), /* lantern glow */
    radial-gradient(circle at 86% 34%, rgba(255,170,80,.10), transparent 62%), /* warm haze */
    radial-gradient(circle at 40% 80%, rgba(0,0,0,.22), transparent 60%),
    linear-gradient(180deg,
      rgba(120,0,0,.08) 0%,
      rgba(160,40,0,.10) 26%,
      rgba(40,10,16,.22) 70%,
      rgba(0,0,0,.26) 100%);
  opacity:.96;
}

/* Water sheet (the “ground” reflection) */
.water{
  position:absolute;
  left:50%;top:50%;
  transform:translate(-50%,-50%);
  width:min(1040px,92vw);
  height:min(1040px,92vw);
  border-radius:44px;
  pointer-events:none;
  z-index:1;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.10);
  background:
    /* sky reflection tint */
    radial-gradient(circle at 68% 14%, rgba(255,240,220,.16), transparent 52%),
    radial-gradient(circle at 20% 28%, rgba(255,120,80,.10), transparent 60%),
    radial-gradient(circle at 86% 36%, rgba(255,170,80,.08), transparent 66%),
    linear-gradient(180deg, rgba(12,18,26,.58), rgba(8,12,18,.70));
  box-shadow:
    0 70px 240px rgba(0,0,0,.46),
    inset 0 2px 0 rgba(255,255,255,.07),
    inset 0 -70px 140px rgba(0,0,0,.55);
}

/* Subtle ripple (clear, not fuzzy): animated specular bands + micro caustics */
.water::before{
  content:"";
  position:absolute;inset:-22%;
  pointer-events:none;
  background:
    repeating-linear-gradient(135deg,
      rgba(255,255,255,.06) 0 2px,
      rgba(255,255,255,0) 2px 28px),
    repeating-linear-gradient(45deg,
      rgba(212,175,55,.04) 0 1px,
      rgba(212,175,55,0) 1px 34px),
    radial-gradient(circle at 50% 50%, rgba(255,255,255,.05), transparent 60%);
  opacity:.55;
  animation:waterDrift 18s linear infinite;
  mix-blend-mode:screen;
}
.water::after{
  content:"";
  position:absolute;inset:0;
  pointer-events:none;
  background:
    radial-gradient(140% 120% at 50% 40%, rgba(255,255,255,.07), rgba(0,0,0,.00) 58%),
    radial-gradient(120% 120% at 50% 78%, rgba(0,0,0,.22), rgba(0,0,0,0) 60%);
  opacity:.62;
}
@keyframes waterDrift{
  0%{ transform:translate3d(-10px,0,0) rotate(0deg); }
  100%{ transform:translate3d(10px,0,0) rotate(0.001deg); }
}

/* Compass face (glass on water): brightened, transparent */
.dial{
  position:absolute;
  left:50%;top:50%;
  transform:translate(-50%,-50%);
  width:min(920px,90vw);
  height:min(920px,90vw);
  border-radius:999px;
  pointer-events:none;
  z-index:2;
  overflow:hidden;
}
.dial::before{
  content:"";
  position:absolute;inset:0;border-radius:999px;
  background:
    radial-gradient(circle at 50% 42%,
      rgba(255,255,255,.08),
      rgba(0,0,0,.10) 56%,
      rgba(0,0,0,.28) 78%,
      rgba(0,0,0,0) 92%),
    radial-gradient(circle at 50% 50%, rgba(212,175,55,.10), transparent 62%),
    radial-gradient(circle at 50% 50%, rgba(255,43,43,.08), transparent 66%),
    linear-gradient(180deg, rgba(255,255,255,.02), rgba(0,0,0,0));
  box-shadow:
    inset 0 0 0 2px rgba(255,255,255,.06),
    inset 0 0 0 10px rgba(0,0,0,.08),
    inset 0 0 70px rgba(0,0,0,.35),
    0 50px 180px rgba(0,0,0,.22);
  opacity:.92;
}
.dial::after{
  content:"";
  position:absolute;inset:-14%;
  background:
    /* rings */
    radial-gradient(circle at 50% 50%, transparent 0 36%, rgba(0,0,0,.26) 36% 36.6%, transparent 37% 100%),
    radial-gradient(circle at 50% 50%, transparent 0 52%, rgba(0,0,0,.22) 52% 52.6%, transparent 53% 100%),
    radial-gradient(circle at 50% 50%, transparent 0 68%, rgba(0,0,0,.18) 68% 68.6%, transparent 69% 100%),

    /* 16 tick marks (gold) */
    repeating-conic-gradient(from -90deg at 50% 50%,
      rgba(212,175,55,.00) 0 18deg,
      rgba(212,175,55,.16) 18deg 18.8deg,
      rgba(212,175,55,.00) 18.8deg 22.5deg),

    /* 45° curved inlay (conic) */
    repeating-conic-gradient(from 45deg at 50% 50%,
      rgba(212,175,55,.06) 0 1.2deg,
      transparent 1.2deg 7.5deg);
  opacity:.68;
  mask: radial-gradient(circle at 50% 50%, transparent 0 18%, #000 20% 100%);
  -webkit-mask: radial-gradient(circle at 50% 50%, transparent 0 18%, #000 20% 100%);
}

/* 16 direction labels on compass face (black print + gold overlay) */
.faceLabels{
  position:absolute;left:50%;top:50%;
  transform:translate(-50%,-50%);
  width:min(920px,90vw);height:min(920px,90vw);
  pointer-events:none;z-index:3;
}
.faceLabels span{
  position:absolute;
  font-weight:980;
  letter-spacing:1.4px;
  font-size:11px;
  color:rgba(0,0,0,.55); /* black print */
  text-shadow:
    0 1px 0 rgba(255,255,255,.06),
    0 0 10px rgba(0,0,0,.35);
}
.faceLabels span::after{
  content:attr(data-gold);
  position:absolute;left:0;top:0;
  color:rgba(212,175,55,.52);
  text-shadow:0 0 14px rgba(212,175,55,.18);
}
.faceLabels .b{font-size:12px}
.faceLabels .bb{font-size:13px}
.faceLabels .N{left:50%;top:10px;transform:translateX(-50%)}
.faceLabels .NNE{left:67%;top:42px;transform:translateX(-50%)}
.faceLabels .NE{left:83%;top:118px;transform:translateX(-50%)}
.faceLabels .ENE{left:92%;top:248px;transform:translateX(-50%)}
.faceLabels .E{right:10px;top:50%;transform:translateY(-50%)}
.faceLabels .ESE{left:92%;bottom:248px;transform:translateX(-50%)}
.faceLabels .SE{left:83%;bottom:118px;transform:translateX(-50%)}
.faceLabels .SSE{left:67%;bottom:42px;transform:translateX(-50%)}
.faceLabels .S{left:50%;bottom:10px;transform:translateX(-50%)}
.faceLabels .SSW{left:33%;bottom:42px;transform:translateX(-50%)}
.faceLabels .SW{left:17%;bottom:118px;transform:translateX(-50%)}
.faceLabels .WSW{left:8%;bottom:248px;transform:translateX(-50%)}
.faceLabels .W{left:10px;top:50%;transform:translateY(-50%)}
.faceLabels .WNW{left:8%;top:248px;transform:translateX(-50%)}
.faceLabels .NW{left:17%;top:118px;transform:translateX(-50%)}
.faceLabels .NNW{left:33%;top:42px;transform:translateX(-50%)}

/* Moon (single) + reflection */
.moon{
  position:absolute;
  left:68%;
  top:8%;
  width:110px;height:110px;
  border-radius:999px;
  pointer-events:none;
  z-index:1; /* behind dial */
  background:
    radial-gradient(circle at 30% 30%, rgba(255,255,255,.95) 0%, rgba(255,255,255,.70) 42%, rgba(255,255,255,.40) 62%, rgba(255,255,255,.18) 74%, rgba(255,255,255,0) 100%),
    radial-gradient(circle at 42% 48%, rgba(0,0,0,.10) 0 10px, transparent 11px),
    radial-gradient(circle at 60% 62%, rgba(0,0,0,.08) 0 7px, transparent 8px),
    radial-gradient(circle at 34% 66%, rgba(0,0,0,.06) 0 6px, transparent 7px);
  box-shadow:
    0 0 42px rgba(255,240,210,.26),
    0 0 70px rgba(255,240,210,.16);
  filter:saturate(1.05);
}
.moonShadow{
  position:absolute;inset:-10%;
  border-radius:999px;
  background:rgba(0,0,0,.0);
  pointer-events:none;
}
.moonRef{
  position:absolute;
  left:68%;
  top:64%;
  width:120px;height:120px;
  border-radius:999px;
  pointer-events:none;
  z-index:1;
  opacity:.22;
  transform:translateX(-20px) scaleY(0.72);
  filter:blur(0.4px);
  background:
    radial-gradient(circle at 30% 30%, rgba(255,255,255,.70) 0%, rgba(255,255,255,.22) 52%, rgba(255,255,255,0) 100%);
  mix-blend-mode:screen;
}

/* Clouds (reflection layer) — masked to avoid CORE */
.clouds{
  position:absolute;inset:0;
  pointer-events:none;
  z-index:3; /* above dial, below dragons, below buttons */
  overflow:hidden;
}
.clouds::before{
  content:"";
  position:absolute;inset:-10%;
  background:
    radial-gradient(240px 120px at 10% 30%, rgba(255,255,255,.10) 0%, rgba(255,255,255,0) 70%),
    radial-gradient(280px 140px at 22% 42%, rgba(255,255,255,.08) 0%, rgba(255,255,255,0) 72%),
    radial-gradient(320px 160px at 40% 34%, rgba(255,255,255,.07) 0%, rgba(255,255,255,0) 74%),
    radial-gradient(260px 130px at 62% 42%, rgba(255,255,255,.08) 0%, rgba(255,255,255,0) 72%),
    radial-gradient(300px 150px at 78% 30%, rgba(255,255,255,.09) 0%, rgba(255,255,255,0) 74%),
    radial-gradient(340px 170px at 90% 44%, rgba(255,255,255,.07) 0%, rgba(255,255,255,0) 74%);
  opacity:.62;
  transform:translate3d(-30%,0,0);
  animation:cloudDrift 85s linear infinite;
  /* mask hole over core */
  mask: radial-gradient(circle at 50% 50%, transparent 0 120px, #000 150px 100%);
  -webkit-mask: radial-gradient(circle at 50% 50%, transparent 0 120px, #000 150px 100%);
}
@keyframes cloudDrift{
  0%{ transform:translate3d(-35%,0,0); }
  100%{ transform:translate3d(35%,0,0); }
}

/* Lanterns */
.lanternLayer{
  position:absolute;inset:0;
  pointer-events:none;
  z-index:2;
}
.lantern{
  position:absolute;
  width:10px;height:10px;
  border-radius:999px;
  background:rgba(255,190,120,.55);
  box-shadow:
    0 0 10px rgba(255,190,120,.28),
    0 0 22px rgba(255,120,80,.18);
  opacity:.78;
  animation:lanternRise linear infinite;
}
@keyframes lanternRise{
  0%{ transform:translate3d(0,0,0); opacity:0; }
  12%{ opacity:.72; }
  100%{ transform:translate3d(0,-120vh,0); opacity:0; }
}

/* Dragons (between compass and buttons) */
.dragonLayer{
  position:absolute;inset:0;
  pointer-events:none;
  z-index:5; /* above clouds/dial, below buttons */
}
.dragon{
  position:absolute;
  left:-40%;
  width:180%;
  height:220px;
  opacity:1;
  filter:drop-shadow(0 18px 40px rgba(0,0,0,.35));
}
.dragon.top{
  top:10%;
  animation:dragonFlyTop 52s linear infinite;
}
.dragon.bottom{
  bottom:10%;
  animation:dragonFlyBot 60s linear infinite;
}
@keyframes dragonFlyTop{
  0%{ transform:translate3d(120vw,0,0); }
  100%{ transform:translate3d(-120vw,0,0); }
}
@keyframes dragonFlyBot{
  0%{ transform:translate3d(120vw,0,0); }
  100%{ transform:translate3d(-120vw,0,0); }
}

/* Bird (idle) */
.birdLayer{
  position:absolute;inset:0;
  pointer-events:none;
  z-index:20; /* above buttons when perched */
}
.bird{
  position:absolute;
  left:50%;top:50%;
  transform:translate(-50%,-50%);
  width:260px;height:200px;
  opacity:0;
  pointer-events:none;
  transition:opacity .25s ease;
  filter:drop-shadow(0 22px 50px rgba(0,0,0,.45));
}
.bird.show{ opacity:1; }

/* ============================================================
   GEM NODES (OPAQUE) — 3D EDGE + CURVED INLAY + FRACTALIZED
   ============================================================ */
.node{
  position:absolute;
  left:50%;top:50%;
  transform:translate(-50%,-50%) rotate(45deg);
  cursor:pointer;
  pointer-events:auto;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.18);
  transition:box-shadow .16s ease, border-color .16s ease, filter .16s ease;
  z-index:12;
  border-radius:22px;
}
.core{width:var(--D0);height:var(--D0);z-index:14;border-radius:26px}
.l1{width:var(--D1);height:var(--D1)}
.l2{width:var(--D2);height:var(--D2)}
.l3{width:var(--D3);height:var(--D3);border-radius:18px}

/* fractalized gem + depth */
.surface{
  background:
    /* fractal-ish facets */
    conic-gradient(from 210deg at 50% 50%,
      rgba(255,255,255,.14),
      rgba(255,255,255,0) 12%,
      rgba(212,175,55,.10) 22%,
      rgba(255,43,43,.10) 38%,
      rgba(90,40,120,.10) 54%,
      rgba(255,255,255,0) 76%,
      rgba(255,255,255,.12) 100%),
    conic-gradient(from 30deg at 30% 30%,
      rgba(255,255,255,.10),
      rgba(255,255,255,0) 20%,
      rgba(212,175,55,.08) 40%,
      rgba(255,255,255,0) 70%,
      rgba(255,255,255,.10) 100%),
    radial-gradient(circle at 22% 18%, rgba(255,255,255,.26), transparent 46%),
    radial-gradient(circle at 78% 22%, var(--festival), transparent 62%),
    radial-gradient(circle at 74% 84%, var(--opalV), transparent 64%),
    radial-gradient(circle at 28% 84%, var(--crimson), transparent 70%),
    linear-gradient(160deg, var(--onyx1), var(--onyx0));
  box-shadow:
    var(--shadowDeep),
    0 0 24px rgba(255,43,43,.08),
    inset 0 2px 0 rgba(255,255,255,.18),
    inset 0 -52px 92px rgba(0,0,0,.88);
}

/* 3D edge bevel + curved (conic) inlay: NOT orthogonal */
.surface::before{
  content:"";
  position:absolute;inset:-2px;
  border-radius:inherit;
  pointer-events:none;
  background:
    /* beveled edge ring */
    radial-gradient(120% 120% at 50% 50%,
      rgba(212,175,55,0) 58%,
      rgba(212,175,55,.18) 82%,
      rgba(212,175,55,0) 100%),
    /* curved inlay lines */
    repeating-conic-gradient(from 45deg at 50% 50%,
      rgba(212,175,55,.08) 0 1.15deg,
      transparent 1.15deg 7.5deg);
  opacity:.62;
  mask:
    radial-gradient(circle at 50% 50%, transparent 0 70%, #000 78% 100%),
    linear-gradient(#000,#000);
  -webkit-mask:
    radial-gradient(circle at 50% 50%, transparent 0 70%, #000 78% 100%),
    linear-gradient(#000,#000);
}

/* gloss streak */
.surface::after{
  content:"";
  position:absolute;left:12%;right:12%;top:10%;
  height:30%;
  border-radius:999px;
  background:linear-gradient(to bottom, rgba(255,255,255,.22), rgba(255,255,255,0));
  transform:rotate(-12deg);
  pointer-events:none;
  opacity:.92;
}

/* glow-only hover */
.node:hover{
  border-color:rgba(212,175,55,.44);
  box-shadow:
    var(--shadowDeep),
    0 0 0 2px rgba(212,175,55,.14),
    0 0 34px rgba(212,175,55,.18),
    inset 0 2px 0 rgba(255,255,255,.20),
    inset 0 -52px 92px rgba(0,0,0,.88);
}
.node:active{filter:brightness(.98)}

/* inner text */
.inner{
  width:100%;height:100%;
  transform:rotate(-45deg);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:10px;
  gap:6px;
  color:#fff;
  position:relative;
}
.word{
  font-weight:980;
  letter-spacing:.6px;
  line-height:1.05;
  text-shadow:0 0 18px rgba(0,0,0,.42);
  font-size:clamp(10px, 1.15vw, 16px);
  max-width:100%;
  word-break:keep-all;
}
.code{
  font-weight:950;
  font-size:10px;
  letter-spacing:1.2px;
  opacity:.78;
}

/* micro corners: NW/NE/SE/SW inside each gem */
.corners{
  position:absolute;inset:10px;
  pointer-events:none;
  opacity:.55;
}
.corners i{
  position:absolute;
  font-style:normal;
  font-weight:980;
  font-size:9px;
  letter-spacing:.6px;
  color:rgba(0,0,0,.45);
  text-shadow:0 0 10px rgba(212,175,55,.18);
}
.corners i::after{
  content:attr(data-gold);
  position:absolute;left:0;top:0;
  color:rgba(212,175,55,.55);
  text-shadow:0 0 12px rgba(212,175,55,.18);
}
.corners .nw{left:0;top:0}
.corners .ne{right:0;top:0}
.corners .sw{left:0;bottom:0}
.corners .se{right:0;bottom:0}

/* CORE emphasis */
.core{
  border-color:rgba(212,175,55,.26);
  box-shadow:
    0 54px 170px rgba(0,0,0,.88),
    0 0 46px rgba(212,175,55,.12),
    inset 0 2px 0 rgba(255,255,255,.22),
    inset 0 -64px 110px rgba(0,0,0,.92);
}

/* ============================================================
   BOTTOM CORNERS (ABOVE SAFE AREA; DO NOT CONFLICT)
   ============================================================ */
.corner{
  position:fixed;
  bottom:calc(max(16px, env(safe-area-inset-bottom)) + 8px);
  z-index:260;
  pointer-events:none;
}
.corner .dmini{pointer-events:auto}
.corner.left{left:16px}
.corner.right{right:16px}

.dmini{
  width:56px;height:56px;
  border-radius:16px;
  border:1px solid rgba(255,255,255,.14);
  background:
    radial-gradient(circle at 50% 40%, rgba(255,255,255,.08), transparent 52%),
    linear-gradient(145deg, rgba(10,12,16,.78), rgba(6,8,10,.92));
  box-shadow:var(--shadowB), 0 0 0 1px rgba(212,175,55,.10), 0 0 18px rgba(212,175,55,.10);
  display:grid;place-items:center;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
  transform:rotate(45deg);
  position:relative;
  overflow:hidden;
  transition:box-shadow .16s ease, border-color .16s ease;
}
.dmini:hover{
  border-color:rgba(212,175,55,.44);
  box-shadow:var(--shadowB), 0 0 0 2px rgba(212,175,55,.14), 0 0 30px rgba(212,175,55,.18);
}
.dmini span{
  transform:rotate(-45deg);
  font-weight:980;
  font-size:12px;
  letter-spacing:.6px;
  color:rgba(255,255,255,.92);
  user-select:none;
}
.cornerLabel{
  margin-top:10px;
  text-align:center;
  color:rgba(255,255,255,.72);
  font-size:11px;
  letter-spacing:.4px;
}

/* Bottom pill */
.pillWrap{
  width:min(1120px,94vw);
  margin:14px auto 0;
  padding-bottom:98px;
}
.pill{
  border:1px solid rgba(255,255,255,.12);
  border-radius:22px;
  padding:14px 16px;
  background:
    radial-gradient(circle at 18% 22%, rgba(255,43,43,.10), transparent 62%),
    radial-gradient(circle at 82% 32%, rgba(90,40,120,.10), transparent 66%),
    radial-gradient(circle at 50% 92%, rgba(212,175,55,.10), transparent 62%),
    rgba(0,0,0,.14);
  box-shadow:0 26px 90px rgba(0,0,0,.45);
  color:rgba(255,255,255,.88);
  line-height:1.55;
  font-size:13.5px;
}
.pill b{color:rgba(255,255,255,.95)}
.pill .g{color:rgba(212,175,55,.82);font-weight:980}

<script>
(function(){
  "use strict";

  // ===== Canon state (gd_* only; lane URL-only) =====
  var qs=new URLSearchParams(location.search);
  var LS=window.localStorage;

  var lang  = qs.get("lang")  || LS.getItem("gd_lang")  || "en";
  var style = qs.get("style") || LS.getItem("gd_style") || "informal";
  var time  = qs.get("time")  || LS.getItem("gd_time")  || "now";
  var depth = qs.get("depth") || LS.getItem("gd_depth") || "explore";
  var lane  = qs.get("lane")  || "platform"; // URL-only

  if(lang!=="en" && lang!=="zh" && lang!=="es") lang="en";
  if(style!=="informal" && style!=="formal") style="informal";
  if(time==="trajectory") time="post";
  if(time!=="origin" && time!=="now" && time!=="post") time="now";
  if(depth!=="explore" && depth!=="learn") depth="explore";
  if(lane!=="platform" && lane!=="engineering") lane="platform";

  try{
    LS.setItem("gd_lang",lang);
    LS.setItem("gd_style",style);
    LS.setItem("gd_time",time);
    LS.setItem("gd_depth",depth);
  }catch(e){}

  document.documentElement.lang=(lang==="zh")?"zh":(lang==="es")?"es":"en";

  function q(over){
    var p=new URLSearchParams();
    p.set("lang",(over&&over.lang)?over.lang:lang);
    p.set("style",(over&&over.style)?over.style:style);
    p.set("time",(over&&over.time)?over.time:time);
    p.set("depth",(over&&over.depth)?over.depth:depth);
    var L=(over&&over.lane)?over.lane:lane;
    if(L==="platform"||L==="engineering") p.set("lane",L);
    return "?"+p.toString();
  }
  function go(path){ window.location.href = path + q(); }
  function setPressed(btn, on){ btn.setAttribute("aria-pressed", on ? "true" : "false"); }

  // ===== ROUTING (NO DUPLICATES; unknown/unbuilt → 404) =====
  var CORE_ROUTE = "/index-core/index.html";
  var EXIT_ROUTE = "/door/";
  var HUB_ROUTE  = "/home/";
  var PLACEHOLDER_404 = "/404.html";

  // Cardinal meaning locked:
  // N = Laws, E = Energy, S = Finance, W = Governance
  // Prelude removed. Research included. Doctrine fixed.
  var ROUTES_RAW = [
    // Tier 1 (cardinals)
    {tier:1, code:"N",  label:{platform:{en:"LAWS",zh:"法则",es:"LEYES"}, engineering:{en:"BOUNDS",zh:"边界",es:"LÍMIT"}}, href:"/laws/"},
    {tier:1, code:"E",  label:{platform:{en:"ENERGY",zh:"能源",es:"ENERGÍA"}, engineering:{en:"POWER",zh:"功率",es:"PWR"}}, href:"/explore/frontier/energy/"},
    {tier:1, code:"S",  label:{platform:{en:"FINANCE",zh:"金融",es:"FINANZAS"}, engineering:{en:"CAPITAL",zh:"资本",es:"CAP"}}, href:"/finance/"},
    {tier:1, code:"W",  label:{platform:{en:"GOVERNANCE",zh:"治理",es:"GOBERNANZA"}, engineering:{en:"EXEC",zh:"执行",es:"EJEC"}}, href:"/governance/"},

    // Tier 2 (diagonals)
    {tier:2, code:"NE", label:{platform:{en:"PRODUCTS",zh:"产品",es:"PRODUCTOS"}, engineering:{en:"DEPLOY",zh:"部署",es:"DESPL"}}, href:"/products/"},
    {tier:2, code:"SE", label:{platform:{en:"RESEARCH",zh:"研究",es:"INVEST."}, engineering:{en:"R&D",zh:"研发",es:"I+D"}}, href:"/research/"},
    {tier:2, code:"SW", label:{platform:{en:"EXPLORE",zh:"探索",es:"EXPLORAR"}, engineering:{en:"MODELS",zh:"模型",es:"MODELOS"}}, href:"/explore/"},
    {tier:2, code:"NW", label:{platform:{en:"DOCTRINE",zh:"教义",es:"DOCTRINA"}, engineering:{en:"CCD",zh:"CCD",es:"CCD"}}, href:"/products/capital-doctrine/"},

    // Tier 3 (outer 8)
    {tier:3, code:"NNE",label:{platform:{en:"EDUCATION",zh:"教育",es:"EDUCACIÓN"}, engineering:{en:"ESL",zh:"ESL",es:"ESL"}}, href:"/products/education/"},
    {tier:3, code:"ENE",label:{platform:{en:"FRONTIER",zh:"前沿",es:"FRONTERA"}, engineering:{en:"FRONTIER",zh:"前沿",es:"FRONTERA"}}, href:"/explore/frontier/"},
    {tier:3, code:"ESE",label:{platform:{en:"INFRA",zh:"基建",es:"INFRA"}, engineering:{en:"SUBST",zh:"替代",es:"SUBST"}}, href:"/explore/infrastructure/"},
    {tier:3, code:"SSE",label:{platform:{en:"AGRICULTURE",zh:"农业",es:"AGRO"}, engineering:{en:"FOOD",zh:"食物",es:"ALIM"}}, href:"/products/agriculture/"},
    {tier:3, code:"SSW",label:{platform:{en:"GAUGES",zh:"量规",es:"MEDIDORES"}, engineering:{en:"SIGNALS",zh:"信号",es:"SEÑALES"}}, href:"/gauges/"},
    {tier:3, code:"WSW",label:{platform:{en:"VISION",zh:"愿景",es:"VISIÓN"}, engineering:{en:"MAP",zh:"映射",es:"MAP"}}, href:"/explore/frontier/vision/"},
    {tier:3, code:"WNW",label:{platform:{en:"LATTICE",zh:"晶格",es:"LATTICE"}, engineering:{en:"256",zh:"256态",es:"256"}}, href:"/explore/frontier/lattice/"},
    {tier:3, code:"NNW",label:{platform:{en:"SHIMMER",zh:"闪烁",es:"SHIMMER"}, engineering:{en:"S.H.I.M.M.E.R.",zh:"SHIMMER",es:"SHIMMER"}}, href:"/explore/frontier/shimmer/"}

  function normalizeRoutes(list){
    var seen = Object.create(null);
    var out = [];
    for(var i=0;i<list.length;i++){
      var it=list[i];
      var h=(it.href||"").trim();
      if(!h) h=PLACEHOLDER_404;
      if(seen[h]) h=PLACEHOLDER_404;
      seen[h]=true;
      out.push({tier:it.tier, code:it.code, label:it.label, href:h});
    }
    return out;
  }
  var ROUTES = normalizeRoutes(ROUTES_RAW);

  function pick3(en,zh,es){ return (lang==="zh")?zh:(lang==="es")?es:en; }

    var pack = (lane==="engineering") ? it.label.engineering : it.label.platform;
    return pick3(pack.en, pack.zh, pack.es);
  }

  // ===== Header i18n (human) =====
  function laneWord(){
    if(lane==="engineering") return pick3("ENGINEERING","工程","INGENIERÍA");
    return pick3("PLATFORM","平台","PLATAFORMA");
  }
  function paintHeader(){
    if(lang==="zh"){

      document.querySelector("#btnExit span").textContent="退出";
      document.querySelector("#btnHub span").textContent="枢纽";

      document.getElementById("brandTitle").textContent="BIENVENIDO A LA BRÚJULA";
      document.getElementById("brandSub").textContent="Tutorial visual: elige dirección → siguiente paso claro. Lente: "+laneWord()+".";
      document.getElementById("lblExit").textContent="SALIR";
      document.getElementById("lblHub").textContent="HUB";
      document.querySelector("#btnExit span").textContent="SALIR";
      document.querySelector("#btnHub span").textContent="HUB";
      document.getElementById("pill").innerHTML="<b>Brújula:</b> Un centro (<span class='g'>CORE</span>) + 16 hubs. Sin destinos duplicados. No construido → <span class='g'>/404.html</span>.";
    }else{
      document.getElementById("brandTitle").textContent="WELCOME TO THE COMPASS";
      document.getElementById("brandSub").textContent="A visual tutorial: pick a direction → get a clear next step. Lens: "+laneWord()+".";
      document.getElementById("lblExit").textContent="EXIT";
      document.getElementById("lblHub").textContent="HUB";
      document.querySelector("#btnExit span").textContent="EXIT";
      document.querySelector("#btnHub span").textContent="HUB";
      document.getElementById("pill").innerHTML="<b>Compass:</b> One center (<span class='g'>CORE</span>) + 16 hubs. No duplicate destinations. Unbuilt hubs route to <span class='g'>/404.html</span>.";
    }
  }

  // ===== Build nodes =====
  var stage=document.getElementById("stage");

  function mkNode(word, code, cls){
    var d=document.createElement("div");
    d.className="node surface "+cls;
    d.setAttribute("role","button");
    d.tabIndex=0;

    var inner=document.createElement("div");
    inner.className="inner";

    var corners=document.createElement("div");
    corners.className="corners";
    corners.innerHTML =
      '<i class="nw" data-gold="NW">NW</i>'+
      '<i class="ne" data-gold="NE">NE</i>'+
      '<i class="sw" data-gold="SW">SW</i>'+
      '<i class="se" data-gold="SE">SE</i>';

    var w=document.createElement("div");
    w.className="word";
    w.textContent=word;

    var c=document.createElement("div");
    c.className="code";
    c.textContent=code;

    inner.appendChild(corners);
    inner.appendChild(w);
    inner.appendChild(c);
    d.appendChild(inner);
    return d;
  }

  function layout(){
    stage.querySelectorAll(".node").forEach(function(n){ n.remove(); });

    var rect=stage.getBoundingClientRect();
    var cx=rect.width/2, cy=rect.height/2;

    var R1=parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--R1"))||164;
    var R2=parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--R2"))||238;
    var R3=parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--R3"))||304;

    // CORE
    var core=mkNode(pick3("CORE","核心","NÚCLEO"), "INDEX", "core");
    core.style.left=cx+"px"; core.style.top=cy+"px";
    core.addEventListener("click", function(){ go(CORE_ROUTE); }, {passive:true});
    core.addEventListener("keydown", function(e){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); go(CORE_ROUTE); }});
    stage.appendChild(core);

    var t1=[], t2=[], t3=[];
    for(var i=0;i<ROUTES.length;i++){
      if(ROUTES[i].tier===1) t1.push(ROUTES[i]);
      else if(ROUTES[i].tier===2) t2.push(ROUTES[i]);
      else t3.push(ROUTES[i]);
    }

    // Tier 1 pinned to N/E/S/W angles
    function byCode(arr, code){ for(var i=0;i<arr.length;i++) if(arr[i].code===code) return arr[i]; return null; }
    var ordered=[byCode(t1,"N"),byCode(t1,"E"),byCode(t1,"S"),byCode(t1,"W")].filter(Boolean);
    var ang=[-Math.PI/2, 0, Math.PI/2, Math.PI];
    for(var i=0;i<ordered.length;i++){
      var it=ordered[i];
      var x=cx + R1*Math.cos(ang[i]);
      var y=cy + R1*Math.sin(ang[i]);
      var n=mkNode(labelFor(it), it.code, "l1");
      n.style.left=x+"px"; n.style.top=y+"px";
      (function(path, el){
        el.addEventListener("click", function(){ go(path); }, {passive:true});
        el.addEventListener("keydown", function(e){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); go(path); }});
      })(it.href, n);
      stage.appendChild(n);
    }

    // Tier 2 (4 diagonals) start -45°
    for(var i=0;i<t2.length;i++){
      var it=t2[i];
      var a=(i/t2.length)*(Math.PI*2) - Math.PI/4;
      var x=cx + R2*Math.cos(a);
      var y=cy + R2*Math.sin(a);
      var n=mkNode(labelFor(it), it.code, "l2");
      n.style.left=x+"px"; n.style.top=y+"px";
      (function(path, el){
        el.addEventListener("click", function(){ go(path); }, {passive:true});
        el.addEventListener("keydown", function(e){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); go(path); }});
      })(it.href, n);
      stage.appendChild(n);
    }

    // Tier 3 (8) start -67.5°
    for(var i=0;i<t3.length;i++){
      var it=t3[i];
      var a=(i/t3.length)*(Math.PI*2) - Math.PI*(3/8);
      var x=cx + R3*Math.cos(a);
      var y=cy + R3*Math.sin(a);
      var n=mkNode(labelFor(it), it.code, "l3");
      n.style.left=x+"px"; n.style.top=y+"px";
      (function(path, el){
        el.addEventListener("click", function(){ go(path); }, {passive:true});
        el.addEventListener("keydown", function(e){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); go(path); }});
      })(it.href, n);
      stage.appendChild(n);
    }
  }

  function safeLayout(){
    var r=stage.getBoundingClientRect();
    if(r.width<10||r.height<10){ requestAnimationFrame(safeLayout); return; }
    layout();
  }

  // ===== Language (NO reload) =====
  var btnEN=document.getElementById("btnEN");
  var btnZH=document.getElementById("btnZH");
  var btnES=document.getElementById("btnES");
  setPressed(btnEN, lang==="en");
  setPressed(btnZH, lang==="zh");
  setPressed(btnES, lang==="es");

  function setLang(next){
    if(next!=="en" && next!=="zh" && next!=="es") next="en";
    lang=next;
    try{ LS.setItem("gd_lang",lang);}catch(e){}
    history.replaceState({}, "", location.pathname + q({lang:lang}));
    setPressed(btnEN, lang==="en");
    setPressed(btnZH, lang==="zh");
    setPressed(btnES, lang==="es");
    paintHeader();
    updateDragonTexts(true);
    safeLayout();
  }
  btnEN.addEventListener("click", function(){ setLang("en"); }, {passive:true});
  btnZH.addEventListener("click", function(){ setLang("zh"); }, {passive:true});
  btnES.addEventListener("click", function(){ setLang("es"); }, {passive:true});

  // ===== Lane (NO reload; URL-only) =====
  var btnLP=document.getElementById("lanePlatform");
  var btnLE=document.getElementById("laneEngineering");
  setPressed(btnLP, lane==="platform");
  setPressed(btnLE, lane==="engineering");

  function setLane(next){
    if(next!=="platform" && next!=="engineering") next="platform";
    lane=next;
    history.replaceState({}, "", location.pathname + q({lane:lane}));
    setPressed(btnLP, lane==="platform");
    setPressed(btnLE, lane==="engineering");
    paintHeader();
    safeLayout();
  }
  btnLP.addEventListener("click", function(){ setLane("platform"); }, {passive:true});
  btnLE.addEventListener("click", function(){ setLane("engineering"); }, {passive:true});

  // ===== Corners =====
  function bindCorner(id, path){
    var el=document.getElementById(id);
    if(!el) return;
    function act(){ go(path); }
    el.addEventListener("click", act, {passive:true});
    el.addEventListener("keydown", function(e){
      if(e.key==="Enter"||e.key===" "){ e.preventDefault(); act(); }
    });
  }
  bindCorner("btnExit", EXIT_ROUTE);
  bindCorner("btnHub", HUB_ROUTE);

  // ===== Lanterns (medium density; performance-safe) =====
  var lanternLayer=document.getElementById("lanternLayer");
  function spawnLantern(){
    var l=document.createElement("div");
    l.className="lantern";
    var x=Math.random()*100;
    var dur=14 + Math.random()*10;
    var size=7 + Math.random()*7;
    l.style.left = x+"%";
    l.style.bottom = "-20px";
    l.style.width = size+"px";
    l.style.height = size+"px";
    l.style.animationDuration = dur+"s";
    lanternLayer.appendChild(l);
    setTimeout(function(){ try{ l.remove(); }catch(e){} }, (dur*1000)+2000);
  }
  setInterval(spawnLantern, 9000);
  setTimeout(spawnLantern, 500);
  setTimeout(spawnLantern, 3500);

  // ===== Moon phase (single moon; advances each return in same tab) =====
  var moonShadow=document.getElementById("moonShadow");
  var moonRef=document.getElementById("moonRef");
  function applyMoonPhase(){
    // session-only phase advance (no localStorage keys)
    var k="gd_moon_phase_step";
    var step=0;
    try{
      step = parseInt(sessionStorage.getItem(k)||"0",10);
      if(!isFinite(step)) step=0;
      step = (step+1) % 8;
      sessionStorage.setItem(k, String(step));
    }catch(e){
      step = Math.floor((Date.now()/3600000) % 8);
    }

    // phase: 0 new → 4 full → 7 waning crescent
    // shadow uses a translating circle via radial gradient
    var full = (step===4);
    var t = (step-4) / 4; // [-1..1]
    // shadow center x moves opposite to light
    var sx = 50 + (t*28); // 22..78
    // shadow strength lower near full
    var op = full ? 0 : Math.min(0.62, 0.16 + Math.abs(t)*0.46);

    moonShadow.style.background =
      "radial-gradient(circle at "+sx+"% 50%, rgba(0,0,0,"+op+") 0 54%, rgba(0,0,0,0) 56% 100%)";

    // glow bump on full moon
    var moon=document.getElementById("moon");
    if(full){
      moon.style.boxShadow="0 0 54px rgba(255,240,210,.34), 0 0 90px rgba(255,240,210,.22)";
      moonRef.style.opacity=".30";
    }else{
      moon.style.boxShadow="0 0 42px rgba(255,240,210,.26), 0 0 70px rgba(255,240,210,.16)";
      moonRef.style.opacity=".22";
    }
  }
  applyMoonPhase();

  // ===== Dragon sayings (top classical CN; bottom = current language) =====
  var TOP_SAYINGS = [
    "道可道 非常道",
    "道生一 一生二 二生三 三生万物",
    "己所不欲 勿施于人",
    "少说多做"
  ];

  var BOT_SAYINGS = {
    en:[
      "SAY LESS · DO MORE",
      "WHAT YOU CAN FIX, FIX",
      "ONE MOMENT'S ERROR · A THOUSAND YEARS' REGRET",
      "DO AS THE WAY DOES · WITHOUT STRAIN"
    ],
    zh:[
      "少说多做",
      "知错能改 善莫大焉",
      "一时之成 千古恨",
      "己所不欲 勿施于人"
    ],
    es:[
      "DI MENOS · HAZ MÁS",
      "CORRIGE LO CORREGIBLE",
      "UN ERROR · MIL AÑOS DE PESAR",
      "EL CAMINO ES EL CAMINO"
    ]
  };

  var topIdx=0, botIdx=0;
  var topText=document.getElementById("topTextPath");
  var botText=document.getElementById("botTextPath");

  function updateDragonTexts(force){
    if(force){ topIdx=0; botIdx=0; }
    if(topText) topText.textContent = TOP_SAYINGS[topIdx % TOP_SAYINGS.length];
    var arr = BOT_SAYINGS[lang] || BOT_SAYINGS.en;
    if(botText) botText.textContent = arr[botIdx % arr.length];
  }
  updateDragonTexts(true);

  // on each pass (animation iteration), advance phrase
  var dragonTop=document.getElementById("dragonTop");
  var dragonBottom=document.getElementById("dragonBottom");
  if(dragonTop){
    dragonTop.addEventListener("animationiteration", function(){
      topIdx = (topIdx+1) % TOP_SAYINGS.length;
      updateDragonTexts(false);
    });
  }
  if(dragonBottom){
    dragonBottom.addEventListener("animationiteration", function(){
      botIdx = (botIdx+1) % ( (BOT_SAYINGS[lang]||BOT_SAYINGS.en).length );
      updateDragonTexts(false);
    });
  }

  // ===== Bird idle (60s) =====
  var bird=document.getElementById("bird");
  var idleMs=60000;
  var idleT=null;
  function hideBird(){ if(bird) bird.classList.remove("show"); }
  function showBird(){ if(bird) bird.classList.add("show"); }
  function resetIdle(){
    hideBird();
    if(idleT) clearTimeout(idleT);
    idleT = setTimeout(showBird, idleMs);
  }
  ["mousemove","mousedown","keydown","scroll","touchstart"].forEach(function(ev){
    window.addEventListener(ev, resetIdle, {passive:true});
  });
  resetIdle();

  // ===== Init =====
  paintHeader();
  requestAnimationFrame(safeLayout);
  window.addEventListener("resize", function(){ safeLayout(); }, {passive:true});
})();
</script>
