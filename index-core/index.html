<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>INDEX · CORE · Honest AIDE</title>

<link rel="stylesheet" href="/assets/ui.css"/>
<link rel="stylesheet" href="/assets/branch.css"/>
<script defer src="/assets/instruments.js"></script>

<style>
a{color:inherit;text-decoration:none}
body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:#fff}
body::before,body::after{pointer-events:none!important}

/* ===== TOKENS (match compass gloss + perimeter glow) ===== */
:root{
  --dockH:124px;

  --stroke:rgba(255,255,255,.12);
  --stroke2:rgba(255,255,255,.10);

  --ink:rgba(255,255,255,.95);
  --txt:rgba(255,255,255,.90);
  --mut:rgba(255,255,255,.78);
  --mut2:rgba(255,255,255,.70);

  --onyx0:rgba(6,8,10,.94);
  --onyx1:rgba(10,12,16,.86);

  --crimson:rgba(120,0,22,.30);
  --festival:rgba(255,43,43,.14);
  --opalV:rgba(90,40,120,.10);

  --gold:rgba(201,162,74,.58);
  --goldGlow:rgba(201,162,74,.18);
  --goldGlow2:rgba(201,162,74,.10);

  --shadowA:0 28px 110px rgba(0,0,0,.70);
  --shadowB:0 18px 60px rgba(0,0,0,.55);
  --shadowC:0 18px 60px rgba(0,0,0,.55);
}

/* ===== TOP CONTROLS ===== */
.top{
  position:fixed;top:16px;left:0;right:0;
  padding:0 16px;
  display:flex;justify-content:space-between;align-items:center;
  gap:12px;
  z-index:240;
  pointer-events:none;
}
.top .left,.top .right{
  display:flex;gap:10px;flex-wrap:wrap;align-items:center;white-space:nowrap;
  pointer-events:auto;
}

/* perimeter-glow button (NO motion) */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:10px 12px;min-height:44px;border-radius:16px;
  border:1px solid rgba(255,255,255,.14);
  background:
    radial-gradient(circle at 50% 40%, rgba(255,255,255,.08), transparent 52%),
    linear-gradient(145deg, rgba(10,12,16,.78), rgba(6,8,10,.92));
  color:var(--ink);
  font-weight:950;font-size:14px;letter-spacing:.2px;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
  position:relative;overflow:hidden;
  box-shadow:var(--shadowC), 0 0 0 1px rgba(201,162,74,.10), 0 0 18px rgba(201,162,74,.10);
  white-space:nowrap;
}
.btn:hover{
  border-color:rgba(201,162,74,.44);
  box-shadow:var(--shadowC), 0 0 0 2px rgba(201,162,74,.16), 0 0 30px rgba(201,162,74,.18);
}
.btn:active{filter:brightness(.98)}
.btn.red{
  border-color:rgba(255,43,43,.22);
  box-shadow:var(--shadowC), 0 0 0 1px rgba(255,43,43,.12), 0 0 18px rgba(255,43,43,.10);
}
.btn.red:hover{
  border-color:rgba(255,43,43,.30);
  box-shadow:var(--shadowC), 0 0 0 2px rgba(255,43,43,.16), 0 0 30px rgba(255,43,43,.14);
}

/* segmented toggles */
.seg{
  display:inline-flex;gap:0;overflow:hidden;border-radius:16px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(0,0,0,.18);
  box-shadow:var(--shadowB);
}
.seg button{
  appearance:none;border:0;background:transparent;
  color:rgba(255,255,255,.78);
  padding:10px 12px;min-height:44px;
  font-weight:980;font-size:13px;letter-spacing:.25px;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
.seg button[aria-pressed="true"]{
  color:rgba(255,255,255,.95);
  background:
    radial-gradient(circle at 50% 50%, rgba(201,162,74,.14), transparent 62%),
    linear-gradient(180deg, rgba(255,43,43,.10), rgba(0,0,0,.10));
  box-shadow: inset 0 0 0 1px rgba(201,162,74,.14), inset 0 -10px 22px rgba(201,162,74,.10);
}

/* ===== PAGE ===== */
.page{
  width:min(1180px,94vw);
  margin:0 auto;
  padding:104px 0 calc(var(--dockH) + 18px);
  position:relative;
  z-index:10;
  display:flex;
  flex-direction:column;
  gap:12px;
}

/* backdrop slab (behind content) */
.backdrop{
  position:absolute;
  left:50%;
  top:68px;
  transform:translateX(-50%);
  width:min(1240px,96vw);
  height:calc(100% - 108px);
  border-radius:34px;
  pointer-events:none;
  z-index:0;
  overflow:hidden;
}
.backdrop::before{
  content:"";
  position:absolute;inset:0;
  border:1px solid rgba(255,255,255,.08);
  border-radius:34px;
  background:
    radial-gradient(circle at 18% 20%, rgba(201,162,74,.10), transparent 60%),
    radial-gradient(circle at 78% 22%, rgba(255,43,43,.12), transparent 62%),
    radial-gradient(circle at 60% 90%, rgba(90,40,120,.10), transparent 64%),
    linear-gradient(160deg, rgba(0,0,0,.18), rgba(0,0,0,.08));
  box-shadow:
    0 70px 220px rgba(0,0,0,.62),
    inset 0 2px 0 rgba(255,255,255,.06),
    inset 0 -70px 140px rgba(0,0,0,.55);
  opacity:.92;
}
.backdrop::after{
  content:"";
  position:absolute;inset:-18%;
  background:
    radial-gradient(circle at 18% 34%, rgba(255,43,43,.18), transparent 44%),
    radial-gradient(circle at 84% 30%, rgba(255,43,43,.14), transparent 46%),
    radial-gradient(circle at 52% 78%, rgba(201,162,74,.12), transparent 48%),
    repeating-conic-gradient(from 45deg at 50% 50%, rgba(201,162,74,.06) 0 1.2deg, transparent 1.2deg 7.5deg),
    radial-gradient(circle at 50% 50%, rgba(255,255,255,.04), transparent 62%);
  filter:blur(1px);
  opacity:.72;
}

/* ===== HERO (captivation #1) ===== */
.hero{
  position:relative;
  z-index:2;
  border:1px solid rgba(255,255,255,.12);
  border-radius:28px;
  padding:22px 20px 18px;
  background:
    radial-gradient(circle at 18% 22%, var(--crimson), transparent 72%),
    radial-gradient(circle at 82% 30%, var(--opalV), transparent 74%),
    radial-gradient(circle at 70% 92%, var(--festival), transparent 62%),
    radial-gradient(circle at 26% 22%, rgba(201,162,74,.14), transparent 62%),
    linear-gradient(160deg, rgba(0,0,0,.30), rgba(0,0,0,.14));
  box-shadow:var(--shadowA);
  backdrop-filter:blur(10px);
  overflow:hidden;
}
.hero::before{
  content:"";
  position:absolute;inset:0;border-radius:28px;pointer-events:none;
  box-shadow: inset 0 0 0 1px rgba(201,162,74,.16);
  background:
    repeating-linear-gradient(45deg, rgba(201,162,74,.08) 0 1px, transparent 1px 16px),
    repeating-linear-gradient(-45deg, rgba(201,162,74,.06) 0 1px, transparent 1px 16px);
  opacity:.22;
  mask:
    radial-gradient(circle at 50% 50%, transparent 0 78%, #000 82% 100%),
    linear-gradient(#000,#000);
  -webkit-mask:
    radial-gradient(circle at 50% 50%, transparent 0 78%, #000 82% 100%),
    linear-gradient(#000,#000);
}
.k{
  margin:0 0 8px;
  font-size:11px;
  letter-spacing:4px;
  text-transform:uppercase;
  opacity:.78;
  color:var(--mut);
}
.h1{
  margin:0;
  font-weight:980;
  font-size:34px;
  letter-spacing:.7px;
  line-height:1.08;
  color:var(--ink);
}
.sub{
  margin-top:12px;
  font-size:15.5px;
  line-height:1.6;
  color:rgba(255,255,255,.88);
  max-width:980px;
}
.metaRow{
  margin-top:12px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  align-items:center;
  justify-content:space-between;
}
.pill{
  display:inline-flex;align-items:center;gap:8px;
  padding:10px 12px;border-radius:999px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(0,0,0,.16);
  color:rgba(255,255,255,.78);
  font-weight:950;
  box-shadow:0 14px 36px rgba(0,0,0,.55);
}
.pill .g{color:rgba(201,162,74,.78);font-weight:980}

/* ===== GRAVITY WELL (captivation #2 + CTA) ===== */
.well{
  position:relative;
  z-index:2;
  border:1px solid rgba(255,255,255,.10);
  border-radius:28px;
  padding:18px 18px 18px;
  background:
    radial-gradient(circle at 50% 35%, rgba(255,255,255,.06), transparent 55%),
    radial-gradient(circle at 50% 50%, rgba(201,162,74,.10), transparent 62%),
    radial-gradient(circle at 50% 62%, rgba(255,43,43,.10), transparent 66%),
    linear-gradient(145deg, rgba(17,22,28,.84), rgba(11,15,20,.94));
  box-shadow:var(--shadowA);
  overflow:hidden;
}
.well::after{
  content:"";
  position:absolute;inset:-40%;
  background:
    radial-gradient(circle at 50% 50%, rgba(201,162,74,.10), transparent 45%),
    radial-gradient(circle at 50% 50%, rgba(255,255,255,.05), transparent 58%),
    radial-gradient(circle at 50% 50%, rgba(0,0,0,.00), rgba(0,0,0,.38) 62%, rgba(0,0,0,.00) 78%);
  opacity:.75;
  pointer-events:none;
  filter:blur(.35px);
}

.wellTop{
  position:relative;
  display:flex;
  gap:12px;
  flex-wrap:wrap;
  align-items:center;
  justify-content:space-between;
}
.wellTitle{
  font-weight:980;
  letter-spacing:.2px;
  font-size:16px;
  color:rgba(255,255,255,.92);
}
.wellHint{
  font-size:12.75px;
  color:rgba(255,255,255,.74);
  line-height:1.4;
  max-width:72ch;
}

.cta{
  margin-top:14px;
  display:flex;
  justify-content:center;
}
.ctaBig{
  width:min(760px, 100%);
  padding:16px 18px;
  min-height:58px;
  border-radius:22px;
  border:1px solid rgba(255,255,255,.14);
  background:
    radial-gradient(circle at 50% 40%, rgba(255,255,255,.10), transparent 55%),
    radial-gradient(circle at 50% 50%, rgba(201,162,74,.12), transparent 62%),
    linear-gradient(145deg, rgba(10,12,16,.78), rgba(6,8,10,.92));
  box-shadow:
    var(--shadowA),
    0 0 0 2px rgba(201,162,74,.12),
    0 0 38px rgba(201,162,74,.14);
  color:rgba(255,255,255,.96);
  font-weight:980;
  letter-spacing:.4px;
  font-size:16px;
  text-align:center;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
  position:relative;
  overflow:hidden;
}
.ctaBig::after{
  content:"";
  position:absolute;left:14%;right:14%;top:10%;
  height:34%;
  border-radius:999px;
  background:linear-gradient(to bottom, rgba(255,255,255,.22), rgba(255,255,255,0));
  transform:rotate(-10deg);
  opacity:.9;
  pointer-events:none;
}
.ctaBig:hover{
  border-color:rgba(201,162,74,.44);
  box-shadow:
    var(--shadowA),
    0 0 0 2px rgba(201,162,74,.16),
    0 0 46px rgba(201,162,74,.18);
}
.ctaBig:active{filter:brightness(.98)}
.ctaSub{
  margin-top:10px;
  color:rgba(255,255,255,.80);
  line-height:1.55;
  font-size:13.75px;
  text-align:center;
}

/* ===== EXPLANATION BUBBLES (single-open) ===== */
.band{
  position:relative;z-index:2;
  padding:10px 12px;border-radius:18px;
  border:1px solid var(--stroke2);
  background:rgba(0,0,0,.14);
  font-weight:980;letter-spacing:.25px;
  color:rgba(255,255,255,.90);
}
.list{position:relative;z-index:2;display:flex;flex-direction:column;gap:12px}
.row{
  border:1px solid rgba(255,255,255,.10);
  border-radius:22px;
  background:
    radial-gradient(circle at 22% 18%, rgba(255,43,43,.10), transparent 58%),
    radial-gradient(circle at 82% 30%, rgba(90,40,120,.10), transparent 66%),
    linear-gradient(145deg, rgba(17,22,28,.86), rgba(11,15,20,.94));
  box-shadow:var(--shadowA);
  overflow:hidden;
  position:relative;
}
.row::before{
  content:"";
  position:absolute;inset:0;border-radius:22px;pointer-events:none;
  box-shadow: inset 0 0 0 1px rgba(201,162,74,.10);
  opacity:.55;
}
.head{
  display:flex;align-items:flex-start;justify-content:space-between;
  gap:10px;padding:16px 16px;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
.hL{display:flex;gap:12px;align-items:flex-start;min-width:0}
.mark{
  width:10px;height:10px;border-radius:3px;transform:rotate(45deg);
  background:var(--c);
  box-shadow:0 0 0 1px rgba(255,255,255,.14), 0 0 14px rgba(0,0,0,.35);
  flex:0 0 auto;margin-top:4px;
}
.q{
  font-weight:980;letter-spacing:.2px;font-size:18px;color:var(--ink);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.subt{
  margin-top:8px;font-size:13.75px;opacity:.88;line-height:1.42;
  color:rgba(255,255,255,.86);max-width:92ch;
}
.chev{
  width:36px;height:36px;border-radius:14px;
  border:1px solid rgba(255,255,255,.14);
  background: rgba(0,0,0,.16);
  display:flex;align-items:center;justify-content:center;
  color:rgba(255,255,255,.78);
  font-weight:950;
  position:relative;overflow:hidden;
  flex:0 0 auto;margin-top:2px;
}
.chev::after{
  content:"";
  position:absolute;left:6px;right:6px;bottom:-10px;height:22px;
  background: radial-gradient(circle at 50% 0%, rgba(201,162,74,.30), transparent 70%);
  opacity:.62;pointer-events:none;
}
.body{
  display:none;
  padding:16px 16px 18px;
  border-top:1px solid rgba(255,255,255,.08);
  background:
    radial-gradient(circle at 30% 30%, rgba(255,255,255,.06), transparent 55%),
    linear-gradient(145deg, rgba(10,12,16,.86), rgba(6,8,10,.94));
}
.row.open .body{display:block}
.p{margin:0;color:rgba(255,255,255,.90);line-height:1.7;font-size:14.5px}
.p + .p{margin-top:10px}
.actions{margin-top:14px;display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end}
.actions .btn{padding:10px 14px;border-radius:999px;min-height:40px;font-size:13px}

/* ===== JUMP STRIP (secondary; approved jump points) ===== */
.jumpStrip{
  position:relative;z-index:2;
  display:grid;
  grid-template-columns:repeat(5, minmax(0,1fr));
  gap:10px;
}
@media (max-width:980px){ .jumpStrip{grid-template-columns:repeat(3, minmax(0,1fr));} }
.jumpStrip .btn{width:100%;border-radius:999px}

/* ===== DOCK ===== */
.dock{
  position:fixed;left:50%;
  bottom:max(10px, env(safe-area-inset-bottom));
  transform:translateX(-50%);
  z-index:220;
  width:min(980px,94vw);
  padding:10px 12px;border-radius:22px;
  border:1px solid rgba(255,255,255,.12);
  background:
    radial-gradient(circle at 18% 18%, rgba(255,43,43,.10), transparent 62%),
    radial-gradient(circle at 82% 70%, rgba(90,40,120,.10), transparent 64%),
    linear-gradient(145deg, rgba(10,12,16,.72), rgba(6,8,10,.86));
  backdrop-filter:blur(10px);
  box-shadow:0 18px 60px rgba(0,0,0,.55);
  display:grid;grid-template-columns:repeat(4, minmax(0,1fr));
  gap:10px;
}
.dock .btn{width:100%;padding:10px 10px;border-radius:999px;white-space:nowrap}
@media (max-width:520px){
  :root{--dockH:148px}
  .dock{grid-template-columns:repeat(3, minmax(0,1fr))}
}
</style>
</head>

<body>

<div class="top" aria-label="Top controls">
  <div class="left">
    <a class="btn" id="btnCompass" data-route="/index.html" href="/index.html">COMPASS</a>

  <div class="backdrop" aria-hidden="true"></div>

  <section class="hero" aria-label="Hero">
    <p class="k" id="k0">INDEX · CORE</p>
    <h1 class="h1" id="h0">Honest AIDE</h1>

    <div class="metaRow" aria-label="Meta">
      <div class="pill" id="laneState">—</div>
      <div class="pill"><span class="g" id="tsLabel">Timestamp</span>: <span id="tsVal">—</span></div>

  <section class="well" aria-label="Gravitational well">

        <div class="wellTitle" id="wellTitle">Engine posture</div>

<nav class="dock" aria-label="Bottom navigation">

<script>
(function(){
  "use strict";

  // ==========================================================
  // ROUTE MAP (EDIT HERE ONLY)
  // ==========================================================
  var ROUTE_DIAGNOSTIC = "/diagnostic/";                 // Honest AIDE (Alignment Diagnostic)
  var ROUTE_COMPASS    = "/index.html";
  var ROUTE_HOME       = "/home/";
  var ROUTE_DOOR       = "/door/";
  var ROUTE_LAWS       = "/laws/";
  var ROUTE_RESEARCH   = "/research/";
  var ROUTE_FRONTIER   = "/explore/frontier/";
  var ROUTE_VISION     = "/explore/frontier/vision/";
  var ROUTE_EXPLORE    = "/explore/";

  // ==========================================================
  // STATE (gd_* only; lane is URL-only)
  // ==========================================================
  var qs=new URLSearchParams(location.search);
  var LS=window.localStorage;

  var lang  = qs.get("lang")  || LS.getItem("gd_lang")  || "en";
  var style = qs.get("style") || LS.getItem("gd_style") || "informal";
  var time  = qs.get("time")  || LS.getItem("gd_time")  || "now";
  var depth = qs.get("depth") || LS.getItem("gd_depth") || "explore";
  var lane  = qs.get("lane")  || "platform"; // URL-only

  if(lang!=="en" && lang!=="zh" && lang!=="es") lang="en";
  if(style!=="informal" && style!=="formal") style="informal";
  if(time==="trajectory") time="post";
  if(time!=="origin" && time!=="now" && time!=="post") time="now";
  if(depth!=="explore" && depth!=="learn") depth="explore";
  if(lane!=="platform" && lane!=="engineering") lane="platform";

  try{
    LS.setItem("gd_lang",lang);
    LS.setItem("gd_style",style);
    LS.setItem("gd_time",time);
    LS.setItem("gd_depth",depth);
  }catch(e){}

  document.documentElement.lang=(lang==="zh")?"zh":(lang==="es")?"es":"en";

  function q(over){
    var p=new URLSearchParams();
    p.set("lang",(over&&over.lang)?over.lang:lang);
    p.set("style",(over&&over.style)?over.style:style);
    p.set("time",(over&&over.time)?over.time:time);
    p.set("depth",(over&&over.depth)?over.depth:depth);
    var L=(over&&over.lane)?over.lane:lane;
    if(L==="platform"||L==="engineering") p.set("lane",L);
    return "?"+p.toString();
  }

           pad2(d.getHours())+":"+pad2(d.getMinutes())+":"+pad2(d.getSeconds());

    document.getElementById("h0").textContent=c.h0;
    document.getElementById("sub0").textContent = (lane==="engineering") ? c.sub0_engineering : c.sub0_platform;

    document.getElementById("wellTitle").textContent=c.wellTitle;
    document.getElementById("wellHint").textContent = (lane==="engineering") ? c.wellHint_engineering : c.wellHint_platform;

    document.getElementById("btnStart").textContent=c.cta;
    document.getElementById("ctaSub").textContent = (lane==="engineering") ? c.ctaSub_engineering : c.ctaSub_platform;

    document.getElementById("bandHow").textContent=c.bandHow;
    document.getElementById("bandJumps").textContent=c.bandJumps;

    document.getElementById("laneState").textContent =
      (lang==="zh") ? (c.lanePfx+laneLabel()) :
      (lang==="es") ? (c.lanePfx+laneLabel()) :

    document.getElementById("dockStart").textContent    = pick3("START","开始","INICIAR");
  }

  // ==========================================================
  // ACCORDION BUILD (single-open)
  // ==========================================================
  var list=document.getElementById("list");
  var refs=[];
  var openIndex=0;

  function closeAll(){
    for(var i=0;i<refs.length;i++){
      refs[i].row.classList.remove("open");
      refs[i].chev.textContent="▸";
    }
  }
  function toggle(i){
    var isOpen=refs[i].row.classList.contains("open");
    if(isOpen){
      refs[i].row.classList.remove("open");
      refs[i].chev.textContent="▸";
      return;
    }
    closeAll();
    openIndex=i;
    refs[i].row.classList.add("open");
    refs[i].chev.textContent="▾";
  }

  function build(){
    list.innerHTML="";
    refs=[];
    var rows=C().rows;

    for(var i=0;i<rows.length;i++){
      var it=rows[i];

      var row=document.createElement("div");
      row.className="row";
      row.style.setProperty("--c", it.c);

      var head=document.createElement("div");
      head.className="head";
      head.setAttribute("role","button");
      head.tabIndex=0;

      var hL=document.createElement("div");
      hL.className="hL";

      var mark=document.createElement("div");
      mark.className="mark";
      mark.style.background=it.c;

      var tb=document.createElement("div");
      tb.style.minWidth="0";

      var qd=document.createElement("div");
      qd.className="q";
      qd.textContent=it.q;

      var sd=document.createElement("div");
      sd.className="subt";
      sd.textContent=it.s;

      tb.appendChild(qd); tb.appendChild(sd);
      hL.appendChild(mark); hL.appendChild(tb);

      var chev=document.createElement("div");
      chev.className="chev";
      chev.innerHTML='<span class="chevTxt">▸</span>';

      head.appendChild(hL);
      head.appendChild(chev);

      var body=document.createElement("div");
      body.className="body";

      var p1=document.createElement("p"); p1.className="p"; p1.textContent=it.p[0]||"";
      var p2=document.createElement("p"); p2.className="p"; p2.textContent=it.p[1]||"";

      body.appendChild(p1); body.appendChild(p2);

      var actions=document.createElement("div");
      actions.className="actions";

      var a1=document.createElement("a");
      a1.className="btn red";
      a1.textContent=openLabel()+": "+it.a1.t;
      a1.setAttribute("data-route", it.a1.href);

      var a2=document.createElement("a");
      a2.className="btn";
      a2.textContent=openLabel()+": "+it.a2.t;
      a2.setAttribute("data-route", it.a2.href);

      actions.appendChild(a1); actions.appendChild(a2);
      body.appendChild(actions);

      function act(){ toggle(i); wireAll(); }
      head.addEventListener("click", act, {passive:true});
      head.addEventListener("keydown", function(e){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); act(); }});

      row.appendChild(head);
      row.appendChild(body);
      list.appendChild(row);

      refs.push({row:row,chev:row.querySelector(".chevTxt")});
    }

    openIndex=0;
    toggle(0);
  }

  // ==========================================================
  // STATE-CARRY WIRE ALL (including lane)
  // ==========================================================
  function wireAll(){
    var nodes=document.querySelectorAll("[data-route]");
    for(var i=0;i<nodes.length;i++){
      var el=nodes[i];
      var route=el.getAttribute("data-route")||"";
      if(!route) continue;
      el.setAttribute("href", route + q());
    }
  }

  // ==========================================================
  // TOGGLES (NO reload)
  // ==========================================================
  function setLang(next){
    if(next!=="en"&&next!=="zh"&&next!=="es") next="en";
    lang=next;
    try{ LS.setItem("gd_lang",lang);}catch(e){}
    history.replaceState({}, "", location.pathname + q({lang:lang}));
    setPressed(["langEN","langZH","langES"], lang==="zh"?"langZH":(lang==="es"?"langES":"langEN"));
    applyCopy();
    build();
    wireAll();
  }

  function setLane(next){
    if(next!=="platform"&&next!=="engineering") next="platform";
    lane=next;
    history.replaceState({}, "", location.pathname + q({lane:lane}));
    setPressed(["lanePlatform","laneEngineering"], lane==="engineering"?"laneEngineering":"lanePlatform");
    applyCopy();
    build();
    wireAll();
  }

  document.getElementById("langEN").addEventListener("click", function(){ setLang("en"); }, {passive:true});
  document.getElementById("langZH").addEventListener("click", function(){ setLang("zh"); }, {passive:true});
  document.getElementById("langES").addEventListener("click", function(){ setLang("es"); }, {passive:true});

  document.getElementById("lanePlatform").addEventListener("click", function(){ setLane("platform"); }, {passive:true});
  document.getElementById("laneEngineering").addEventListener("click", function(){ setLane("engineering"); }, {passive:true});

  setPressed(["langEN","langZH","langES"], lang==="zh"?"langZH":(lang==="es"?"langES":"langEN"));
  setPressed(["lanePlatform","laneEngineering"], lane==="engineering"?"laneEngineering":"lanePlatform");

  // ==========================================================
  // CTA
  // ==========================================================
  document.getElementById("btnStart").addEventListener("click", function(){
    go(ROUTE_DIAGNOSTIC);
  }, {passive:true});

  // ==========================================================
  // INIT
  // ==========================================================
  applyCopy();
  build();
  wireAll();

})();
