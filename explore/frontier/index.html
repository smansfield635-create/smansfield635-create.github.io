<!DOCTYPE html>
<html lang="en" data-frontier-generation="second-generation-renewal">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Frontier · Diamond Gate Bridge</title>
  <meta
    name="description"
    content="Frontier at Diamond Gate Bridge: a Generation 2 route surface that sends visitors into Explore Frontier."
  />
  <link rel="canonical" href="/explore/frontier/" />
  <meta http-equiv="refresh" content="2; url=/explore/frontier/" />

  <style>
    :root {
      --bg:#020610;
      --panel:rgba(7,14,28,.92);
      --panel-strong:rgba(10,20,42,.96);
      --line:rgba(170,198,255,.18);
      --text:#eef4ff;
      --muted:#aab8d8;
      --gold:#efd29a;
      --shadow:0 24px 80px rgba(0,0,0,.50);
    }

    * { box-sizing:border-box; }

    html, body {
      margin:0;
      min-height:100%;
      color:var(--text);
      font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:
        radial-gradient(circle at 50% 6%,rgba(239,210,154,.16),transparent 25%),
        radial-gradient(circle at 16% 32%,rgba(142,197,255,.12),transparent 30%),
        linear-gradient(180deg,#020610 0%,#071225 55%,#020610 100%);
    }

    body {
      display:grid;
      place-items:center;
      padding:18px;
    }

    .card {
      width:min(760px,100%);
      border:1px solid var(--line);
      border-radius:30px;
      padding:clamp(22px,5vw,42px);
      background:
        radial-gradient(circle at 50% 0%,rgba(239,210,154,.10),transparent 42%),
        linear-gradient(180deg,var(--panel-strong),var(--panel));
      box-shadow:var(--shadow);
    }

    .pill {
      display:inline-flex;
      width:fit-content;
      align-items:center;
      gap:10px;
      padding:8px 12px;
      margin-bottom:16px;
      border-radius:999px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.035);
      color:#d8e3ff;
      text-transform:uppercase;
      letter-spacing:.14em;
      font-size:.70rem;
      font-weight:850;
    }

    .pill::before {
      content:"";
      width:9px;
      height:9px;
      border-radius:2px;
      transform:rotate(45deg);
      background:var(--gold);
      box-shadow:0 0 18px rgba(239,210,154,.50);
    }

    h1 {
      margin:0;
      color:#fff;
      font-size:clamp(2.6rem,9vw,5.2rem);
      line-height:.9;
      letter-spacing:-.07em;
    }

    h2 {
      margin:12px 0 0;
      color:var(--gold);
      font-size:clamp(1.4rem,4.5vw,2.6rem);
      line-height:1;
      letter-spacing:-.04em;
    }

    p {
      margin:16px 0 0;
      color:var(--muted);
      line-height:1.58;
      font-size:1rem;
    }

    .actions {
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-top:22px;
    }

    a {
      color:inherit;
      text-decoration:none;
    }

    .button {
      min-height:44px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:0 14px;
      border:1px solid rgba(239,210,154,.38);
      border-radius:999px;
      background:
        linear-gradient(180deg,rgba(239,210,154,.24),rgba(239,210,154,.07)),
        rgba(255,255,255,.035);
      color:#fff8ea;
      font-weight:850;
    }
  </style>
</head>

<body>
  <main
    class="card"
    data-generation="second-generation-renewal"
    data-page="frontier"
    data-sending-room="door"
    data-receiving-room="explore-frontier"
    data-target-route="/explore/frontier/"
  >
    <span class="pill">Door sends Frontier</span>
    <h1>Frontier</h1>
    <h2>Explore receives the edge.</h2>

    <p>
      Frontier now opens through Explore. Continue to the active Generation 2 surface:
      Explore Frontier.
    </p>

    <div class="actions">
      <a class="button" href="/explore/frontier/">Open Explore Frontier</a>
      <a class="button" href="/explore/">Back to Explore</a>
      <a class="button" href="/">Door</a>
    </div>
  </main>

  <script>
    window.setTimeout(function () {
      window.location.replace("/explore/frontier/");
    }, 700);
  </script>
</body>
</html>
