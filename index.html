<!doctype html>
<!-- TNT — /index.html
     COMPASS · 16-POINT RING + CENTER INDEX (CORE)
     UPDATE (PER SEAN):
       - REMOVE HOME + DOOR from compass geometry (they do NOT belong in the ring)
       - MOVE HOME + DOOR into bottom corner diamonds (outside geometry)
       - KEEP 16-point glossy ring (perfect symmetry) + center glossy INDEX (CORE)
       - NO DUPLICATION: 16 facets = 16 UNIQUE destinations
         - If not built yet, route to UNIQUE placeholder paths (expected 404 until filled)
       - Upgrade gold inlay to respect 3D diamond geometry (no flat grid look)
       - Festival night / lantern / fireworks context BEHIND geometry (no overlays/modals)
       - Non-modal context pill
       - Trilingual labels (EN/中文/ES)
       - Canon state carry (gd_lang/gd_style/gd_time/gd_depth) via URL + LS only
       - No new gd_* keys
       - No inline onclick (addEventListener only)
-->

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Compass</title>

<link rel="stylesheet" href="/assets/ui.css"/>
<link rel="stylesheet" href="/assets/branch.css"/>
<script defer src="/assets/instruments.js"></script>

<style>
a{color:inherit;text-decoration:none}
body{margin:0}
body::before,body::after{pointer-events:none!important}

:root{
  /* ===== GEOMETRY (16-point ring) ===== */
  --D:94px;        /* outer diamond size */
  --C:138px;       /* center diamond size */
  --R:250px;       /* ring radius */
  --padTop:120px;

  /* ===== MATERIAL ===== */
  --onyx0:rgba(6,8,10,.96);
  --onyx1:rgba(10,12,16,.88);

  --crimson:rgba(120,0,22,.44);
  --festival:rgba(255,43,43,.26);
  --opalV:rgba(90,40,120,.18);

  --gold:rgba(201,162,74,.55);
  --goldGlow:rgba(201,162,74,.36);

  --shadowDeep:0 44px 140px rgba(0,0,0,.82);
  --stroke:rgba(255,255,255,.12);
}

/* ===== Top controls (non-modal, tap-safe) ===== */
.top{
  position:fixed;top:16px;left:0;right:0;
  padding:0 16px;
  display:flex;justify-content:space-between;align-items:center;
  gap:12px;
  z-index:240;
  pointer-events:none;
}
.top .left,.top .right{
  display:flex;gap:10px;align-items:center;flex-wrap:wrap;white-space:nowrap;
  pointer-events:auto;
}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:10px 12px;min-height:44px;border-radius:16px;
  border:1px solid rgba(255,255,255,.14);
  background:
    radial-gradient(circle at 50% 120%, rgba(201,162,74,.14), transparent 64%),
    linear-gradient(145deg, rgba(10,12,16,.78), rgba(6,8,10,.90));
  color:rgba(255,255,255,.92);
  font-weight:950;font-size:14px;letter-spacing:.2px;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
  position:relative;overflow:hidden;
}
.btn:active{transform:translateY(1px)}
.btn::after{
  content:"";
  position:absolute;left:10px;right:10px;bottom:-12px;height:28px;
  background: radial-gradient(circle at 50% 0%, rgba(201,162,74,.28), transparent 72%);
  opacity:.60;pointer-events:none;
}
.seg{
  display:inline-flex;gap:0;overflow:hidden;border-radius:16px;
  border:1px solid rgba(255,255,255,.12);
  background: rgba(0,0,0,.16);
}
.seg button{
  appearance:none;border:0;background:transparent;color:rgba(255,255,255,.78);
  padding:10px 12px;min-height:44px;font-weight:950;font-size:13px;
  letter-spacing:.25px;cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
.seg button[aria-pressed="true"]{
  color:rgba(255,255,255,.96);
  background:
    radial-gradient(circle at 50% 120%, rgba(201,162,74,.18), transparent 62%),
    linear-gradient(180deg, rgba(255,43,43,.10), rgba(0,0,0,.10));
}

/* ===== Stage ===== */
.stage{
  position:relative;
  width:min(900px,94vw);
  height:min(900px,82vh);
  margin:var(--padTop) auto 0;
  pointer-events:none;
}

/* ===== Background Context (behind diamonds) ===== */
.backdrop{
  position:absolute;inset:-26px;
  border-radius:44px;
  pointer-events:none;
  overflow:hidden;
}
.backdrop::before{
  content:"";
  position:absolute;inset:0;
  border-radius:44px;
  border:1px solid rgba(255,255,255,.10);
  background:
    radial-gradient(circle at 22% 18%, rgba(201,162,74,.10), transparent 60%),
    radial-gradient(circle at 80% 26%, rgba(255,43,43,.10), transparent 62%),
    radial-gradient(circle at 62% 92%, rgba(90,40,120,.10), transparent 66%),
    linear-gradient(160deg, rgba(0,0,0,.20), rgba(0,0,0,.10));
  box-shadow:
    0 70px 210px rgba(0,0,0,.62),
    inset 0 2px 0 rgba(255,255,255,.08),
    inset 0 -60px 120px rgba(0,0,0,.55);
  opacity:.95;
}
.backdrop::after{
  content:"";
  position:absolute;inset:-18%;
  background:
    radial-gradient(circle at 18% 34%, rgba(255,43,43,.20), transparent 42%),
    radial-gradient(circle at 82% 30%, rgba(255,43,43,.16), transparent 44%),
    radial-gradient(circle at 50% 76%, rgba(201,162,74,.12), transparent 46%),

    conic-gradient(from 10deg at 30% 28%,
      rgba(201,162,74,.16), transparent 10%,
      rgba(255,43,43,.14), transparent 22%,
      rgba(90,40,120,.12), transparent 35%,
      rgba(201,162,74,.10), transparent 50%,
      transparent 100%),

    conic-gradient(from 180deg at 70% 36%,
      rgba(255,43,43,.14), transparent 12%,
      rgba(201,162,74,.14), transparent 26%,
      rgba(90,40,120,.10), transparent 42%,
      transparent 100%),

    radial-gradient(circle at 50% 50%, rgba(255,255,255,.05), transparent 60%);
  filter: blur(1px);
  opacity:.75;
}
.halo{
  position:absolute;left:50%;top:50%;
  width:min(700px,92vw);height:min(700px,92vw);
  transform:translate(-50%,-50%);
  border-radius:999px;
  pointer-events:none;
  background:
    radial-gradient(circle at 50% 50%, rgba(0,0,0,.00), rgba(0,0,0,.22) 58%, rgba(0,0,0,.00) 78%),
    radial-gradient(circle at 50% 50%, rgba(201,162,74,.10), transparent 62%),
    radial-gradient(circle at 50% 50%, rgba(255,43,43,.10), transparent 66%);
  opacity:.9;
}

/* ===== Diamonds ===== */
.d{
  position:absolute;
  left:50%;
  top:50%;
  width:var(--D);
  height:var(--D);
  border-radius:22px;
  cursor:pointer;
  pointer-events:auto;
  transform:translate(-50%,-50%) rotate(45deg);
  transform-origin:center;
  transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease;
  overflow:hidden;
}

/* FULL GLOSS MATERIAL STACK */
.surface{
  background:
    radial-gradient(circle at 20% 18%, rgba(255,255,255,.30), transparent 45%),
    radial-gradient(circle at 78% 22%, var(--festival), transparent 60%),
    radial-gradient(circle at 75% 82%, var(--opalV), transparent 65%),
    radial-gradient(circle at 30% 80%, var(--crimson), transparent 72%),
    linear-gradient(160deg, var(--onyx1), var(--onyx0));
  border:1px solid rgba(255,255,255,.18);
  box-shadow:
    var(--shadowDeep),
    0 0 32px rgba(255,43,43,.14),
    inset 0 2px 0 rgba(255,255,255,.22),
    inset 0 -50px 90px rgba(0,0,0,.90);
}

/* UPGRADED GOLD INLAY: diamond-aligned weave + bevel sweep (no flat grid look) */
.surface::before{
  content:"";
  position:absolute; inset:0;
  border-radius:inherit;
  pointer-events:none;

  /* 3D-respecting inlay: conic weave + bevel sweep */
  background:
    /* bevel sweep (top-left → bottom-right) */
    linear-gradient(135deg, rgba(201,162,74,.14), transparent 42%, rgba(0,0,0,0) 70%),
    /* secondary bevel */
    linear-gradient(-45deg, rgba(201,162,74,.08), transparent 44%),

    /* diamond weave (not axis grid) */
    repeating-conic-gradient(
      from 45deg at 50% 50%,
      rgba(201,162,74,.11) 0 6deg,
      transparent 6deg 18deg
    ),

    /* subtle edge energy */
    radial-gradient(circle at 50% 50%, rgba(201,162,74,.10), transparent 62%);

  opacity:.44;

  /* trim-zone only */
  mask:
    radial-gradient(circle at 50% 50%, transparent 0 70%, #000 78% 100%),
    linear-gradient(#000,#000);
  -webkit-mask:
    radial-gradient(circle at 50% 50%, transparent 0 70%, #000 78% 100%),
    linear-gradient(#000,#000);

  box-shadow: inset 0 0 0 1px rgba(201,162,74,.18);
}

/* Highlight streak */
.surface::after{
  content:"";
  position:absolute;
  left:12%;
  right:12%;
  top:10%;
  height:30%;
  border-radius:999px;
  background:linear-gradient(to bottom, rgba(255,255,255,.22), rgba(255,255,255,0));
  transform:rotate(-12deg);
  pointer-events:none;
  opacity:.95;
}

.goldTrim{
  border:1px solid var(--gold);
  box-shadow:
    var(--shadowDeep),
    0 0 38px var(--goldGlow),
    inset 0 2px 0 rgba(255,255,255,.24),
    inset 0 -50px 90px rgba(0,0,0,.90);
}

.d:hover{ transform:translate(-50%,-50%) rotate(45deg) scale(1.05); }

.inner{
  width:100%;height:100%;
  transform:rotate(-45deg);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  color:#fff;
  padding:8px;
  gap:5px;
}
.word{
  font-weight:980;
  font-size:13.25px;
  letter-spacing:.55px;
  line-height:1.05;
}
.code{
  font-weight:950;
  font-size:10px;
  letter-spacing:1.2px;
  opacity:.78;
}

/* CENTER INDEX diamond */
.center{
  width:var(--C);
  height:var(--C);
  border-radius:26px;
  z-index:10;
  border-color:rgba(201,162,74,.26);
  box-shadow:
    0 54px 170px rgba(0,0,0,.90),
    0 0 48px rgba(201,162,74,.14),
    inset 0 2px 0 rgba(255,255,255,.22),
    inset 0 -54px 100px rgba(0,0,0,.88);
}
.center .word{font-size:15px}
.center .code{opacity:.82}

/* Bottom corner nav diamonds (HOME + DOOR live here, NOT in compass) */
.corner{
  position:fixed;
  bottom:max(18px, env(safe-area-inset-bottom));
  z-index:240;
  pointer-events:none;
}
.corner .dmini{pointer-events:auto}
.corner.left{left:18px}
.corner.right{right:18px}

.dmini{
  width:54px;height:54px;
  border-radius:16px;
  border:1px solid rgba(255,255,255,.14);
  background:
    radial-gradient(circle at 50% 120%, rgba(201,162,74,.16), transparent 64%),
    linear-gradient(145deg, rgba(10,12,16,.78), rgba(6,8,10,.90));
  box-shadow:0 18px 60px rgba(0,0,0,.55);
  display:grid;place-items:center;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
  transform:rotate(45deg);
  position:relative;
  overflow:hidden;
}
.dmini::after{
  content:"";
  position:absolute;left:10px;right:10px;bottom:-12px;height:28px;
  background: radial-gradient(circle at 50% 0%, rgba(201,162,74,.30), transparent 72%);
  opacity:.55;pointer-events:none;
}
.dmini:active{transform:rotate(45deg) translateY(1px)}
.dmini span{
  transform:rotate(-45deg);
  font-weight:980;
  font-size:12px;
  letter-spacing:.6px;
  color:rgba(255,255,255,.92);
  user-select:none;
}
.cornerLabel{
  margin-top:10px;
  text-align:center;
  color:rgba(255,255,255,.70);
  font-size:11px;
  letter-spacing:.4px;
}

/* Context pill (non-modal) */
.pill{
  width:min(820px,94vw);
  margin:14px auto 0;
  padding:14px 16px;
  border-radius:22px;
  border:1px solid rgba(255,255,255,.12);
  background:
    radial-gradient(circle at 18% 22%, rgba(255,43,43,.10), transparent 62%),
    radial-gradient(circle at 82% 32%, rgba(90,40,120,.10), transparent 66%),
    radial-gradient(circle at 50% 92%, rgba(201,162,74,.10), transparent 62%),
    rgba(0,0,0,.16);
  box-shadow:0 26px 90px rgba(0,0,0,.55);
  color:rgba(255,255,255,.86);
  line-height:1.55;
  font-size:13.75px;
}
.pill b{color:rgba(255,255,255,.95)}

/* Mobile tweak */
@media (max-width:600px){
  :root{ --D:86px; --C:134px; --R:220px; --padTop:124px; }
  .word{font-size:12.25px}
  .center .word{font-size:14.5px}
  .stage{height:min(740px,82vh)}
  .halo{width:min(620px,92vw);height:min(620px,92vw)}
}
@media (max-width:420px){
  :root{ --D:82px; --C:128px; --R:206px; }
}
</style>
</head>

<body>

<!-- Top controls -->
<div class="top" aria-label="Top controls">
  <div class="left">
    <a class="btn" id="btnProducts" href="/products/" data-route="/products/">PRODUCTS</a>
    <a class="btn" id="btnExplore" href="/explore/" data-route="/explore/">EXPLORE</a>
  </div>
  <div class="right">
    <div class="seg" role="group" aria-label="Language">
      <button type="button" id="btnEN" aria-pressed="true">EN</button>
      <button type="button" id="btnZH" aria-pressed="false">中文</button>
      <button type="button" id="btnES" aria-pressed="false">ES</button>
    </div>
  </div>
</div>

<div class="stage" id="stage" aria-label="Compass ring (16) with center index">
  <div class="backdrop" aria-hidden="true"></div>
  <div class="halo" aria-hidden="true"></div>
  <!-- center + ring injected by JS for perfect symmetry -->
</div>

<div class="pill" id="pill">
  <b>Compass:</b> Ring = domain hubs. Center = Index (core manual). Home + Door live outside the compass.
</div>

<!-- Bottom corners: DOOR + HOME (OUTSIDE ring) -->
<div class="corner left" aria-label="Door">
  <div class="dmini" id="btnDoorMini" role="button" tabindex="0" aria-label="Door"><span>DOOR</span></div>
  <div class="cornerLabel" id="lblDoor">DOOR</div>
</div>
<div class="corner right" aria-label="Home">
  <div class="dmini" id="btnHomeMini" role="button" tabindex="0" aria-label="Home"><span>HOME</span></div>
  <div class="cornerLabel" id="lblHome">HOME</div>
</div>

<script>
(function(){
  "use strict";

  // Canon state (gd_* only)
  var qs=new URLSearchParams(location.search);
  var LS=window.localStorage;

  var lang  = qs.get("lang")  || LS.getItem("gd_lang")  || "en";
  var style = qs.get("style") || LS.getItem("gd_style") || "informal";
  var time  = qs.get("time")  || LS.getItem("gd_time")  || "now";
  var depth = qs.get("depth") || LS.getItem("gd_depth") || "explore";

  if(lang!=="en" && lang!=="zh" && lang!=="es") lang="en";
  if(style!=="informal" && style!=="formal") style="informal";
  if(time==="trajectory") time="post";
  if(time!=="origin" && time!=="now" && time!=="post") time="now";
  if(depth!=="explore" && depth!=="learn") depth="explore";

  try{
    LS.setItem("gd_lang",lang);
    LS.setItem("gd_style",style);
    LS.setItem("gd_time",time);
    LS.setItem("gd_depth",depth);
  }catch(e){}

  document.documentElement.lang=(lang==="zh")?"zh":(lang==="es")?"es":"en";

  function q(){
    return "?lang="+encodeURIComponent(lang)+
           "&style="+encodeURIComponent(style)+
           "&time="+encodeURIComponent(time)+
           "&depth="+encodeURIComponent(depth);
  }

  function go(path){ window.location.href = path + q(); }

  // Wire [data-route] anchors with full state
  function wireAll(){
    var nodes=document.querySelectorAll("[data-route]");
    for(var i=0;i<nodes.length;i++){
      var el=nodes[i];
      var route=el.getAttribute("data-route")||"";
      if(!route) continue;
      el.setAttribute("href", route + q());
    }
  }
  wireAll();

  // Language buttons (reload same path)
  function setPressed(btn, on){ btn.setAttribute("aria-pressed", on ? "true" : "false"); }
  function setLang(next){
    if(next!=="en" && next!=="zh" && next!=="es") next="en";
    lang=next;
    try{ LS.setItem("gd_lang",lang); }catch(e){}
    window.location.href = window.location.pathname + q();
  }

  var btnEN=document.getElementById("btnEN");
  var btnZH=document.getElementById("btnZH");
  var btnES=document.getElementById("btnES");

  setPressed(btnEN, lang==="en");
  setPressed(btnZH, lang==="zh");
  setPressed(btnES, lang==="es");

  btnEN.addEventListener("click", function(){ setLang("en"); }, {passive:true});
  btnZH.addEventListener("click", function(){ setLang("zh"); }, {passive:true});
  btnES.addEventListener("click", function(){ setLang("es"); }, {passive:true});

  // Trilingual context pill + corner labels
  var pill=document.getElementById("pill");
  var lblDoor=document.getElementById("lblDoor");
  var lblHome=document.getElementById("lblHome");

  function paintText(){
    if(lang==="zh"){
      pill.innerHTML="<b>指南针：</b>外环=领域枢纽；中心=索引（核心说明书）。主页与门在罗盘之外。";
      lblDoor.textContent="门";
      lblHome.textContent="主页";
      document.querySelector("#btnDoorMini span").textContent="门";
      document.querySelector("#btnHomeMini span").textContent="主页";
    }else if(lang==="es"){
      pill.innerHTML="<b>Brújula:</b> anillo = hubs de dominio. centro = Índice (manual). Inicio y Puerta van fuera de la brújula.";
      lblDoor.textContent="PUERTA";
      lblHome.textContent="INICIO";
      document.querySelector("#btnDoorMini span").textContent="PUERTA";
      document.querySelector("#btnHomeMini span").textContent="INICIO";
    }else{
      pill.innerHTML="<b>Compass:</b> Ring = domain hubs. Center = Index (core manual). Home + Door live outside the compass.";
      lblDoor.textContent="DOOR";
      lblHome.textContent="HOME";
      document.querySelector("#btnDoorMini span").textContent="DOOR";
      document.querySelector("#btnHomeMini span").textContent="HOME";
    }
  }
  paintText();

  // Bottom corners: DOOR + HOME (outside ring)
  function bindMini(id, path){
    var el=document.getElementById(id);
    if(!el) return;
    function act(){ go(path); }
    el.addEventListener("click", act, {passive:true});
    el.addEventListener("keydown", function(e){
      if(e.key==="Enter"||e.key===" "){ e.preventDefault(); act(); }
    });
  }
  bindMini("btnDoorMini","/door/");
  bindMini("btnHomeMini","/home/");

  // ===== CENTER INDEX ROUTE (CORE MANUAL) =====
  var INDEX_ROUTE = "/index-core/"; /* change later if needed */

  // ===== UNIQUE PLACEHOLDER ROUTES (expected 404 until you fill them) =====
  function TODO(slug){ return "/_todo/"+slug+"/"; }

  // ===== 16 UNIQUE HUBS (NO DUPLICATION) =====
  // If you haven't created a hub yet, it gets a unique TODO path (404 is OK for now).
  var ROUTES = [
    {code:"N",   en:"EDUCATION",    zh:"教育",     es:"EDUCACIÓN", href:"/products/education/"},
    {code:"NNE", en:"PRELUDE",      zh:"前奏",     es:"PRELUDIO",  href:"/prelude/"},
    {code:"NE",  en:"EXPLORE",      zh:"探索",     es:"EXPLORAR",  href:"/explore/"},
    {code:"ENE", en:"FRONTIER",     zh:"前沿",     es:"FRONTERA",  href:"/explore/frontier/"},
    {code:"E",   en:"RESEARCH",     zh:"研究",     es:"INVEST.",   href:"/research/", gold:true},
    {code:"ESE", en:"OBSERVATORY",  zh:"观测",     es:"OBSERV.",   href:"/gauges/"},                 /* rename later if you create /observatory/ */
    {code:"SE",  en:"PRODUCTS",     zh:"产品",     es:"PRODUCTOS", href:"/products/"},
    {code:"SSE", en:"FINANCE",      zh:"金融",     es:"FINANZAS",  href:TODO("finance-hub")},        /* UNIQUE placeholder until /finance/ exists */
    {code:"S",   en:"ENERGY",       zh:"能源",     es:"ENERGÍA",   href:"/explore/frontier/energy/"},
    {code:"SSW", en:"INFRA",        zh:"基建",     es:"INFRA",     href:"/explore/infrastructure/"},
    {code:"SW",  en:"AGRICULTURE",  zh:"农业",     es:"AGRO",      href:"/products/agriculture/"},
    {code:"WSW", en:"GOVERNANCE",   zh:"治理",     es:"GOBIERNO",  href:TODO("governance-hub")},     /* UNIQUE placeholder until /governance/ exists */
    {code:"W",   en:"DOCTRINE",     zh:"教义",     es:"DOCTRINA",  href:"/laws/"},                   /* keep as global doctrine for now */
    {code:"WNW", en:"VISION",       zh:"愿景",     es:"VISIÓN",    href:"/explore/frontier/vision/"},
    {code:"NW",  en:"LATTICE",      zh:"晶格",     es:"LATTICE",   href:"/explore/frontier/lattice/"},
    {code:"NNW", en:"SHIMMER",      zh:"闪烁",     es:"SHIMMER",   href:"/explore/frontier/shimmer/"}
  ];

  function mkDiamond(item, isCenter){
    var d=document.createElement("div");
    d.className="d surface" + (isCenter ? " center" : "") + (item.gold ? " goldTrim" : "");
    d.setAttribute("role","button");
    d.tabIndex=0;

    var inner=document.createElement("div");
    inner.className="inner";

    var w=document.createElement("div");
    w.className="word";
    w.textContent = (lang==="zh")?item.zh:(lang==="es")?item.es:item.en;

    var c=document.createElement("div");
    c.className="code";
    c.textContent=item.code;

    inner.appendChild(w);
    inner.appendChild(c);
    d.appendChild(inner);

    function act(){ go(item.href); }
    d.addEventListener("click", act, {passive:true});
    d.addEventListener("keydown", function(e){
      if(e.key==="Enter"||e.key===" "){ e.preventDefault(); act(); }
    });

    return d;
  }

  // Layout ring (perfect symmetry) + center
  var stage=document.getElementById("stage");

  function layout(){
    stage.querySelectorAll(".d").forEach(function(n){ n.remove(); });

    var rect=stage.getBoundingClientRect();
    var cx=rect.width/2;
    var cy=rect.height/2;

    var R=parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--R")) || 250;

    // Center INDEX
    var centerItem={code:"CORE", en:"INDEX", zh:"索引", es:"ÍNDICE", href:INDEX_ROUTE};
    var center=mkDiamond(centerItem, true);
    center.style.left = cx + "px";
    center.style.top  = cy + "px";
    stage.appendChild(center);

    // Ring
    var n=ROUTES.length;
    for(var i=0;i<n;i++){
      var item=ROUTES[i];
      var angle=(i/n)*(Math.PI*2) - (Math.PI/2);
      var x=cx + R*Math.cos(angle);
      var y=cy + R*Math.sin(angle);

      var d=mkDiamond(item, false);
      d.style.left=x+"px";
      d.style.top=y+"px";
      stage.appendChild(d);
    }
  }

  function safeLayout(){
    var r=stage.getBoundingClientRect();
    if(r.width<10||r.height<10){ requestAnimationFrame(safeLayout); return; }
    layout();
  }
  requestAnimationFrame(safeLayout);
  window.addEventListener("resize", function(){ safeLayout(); }, {passive:true});

})();
</script>

</body>
