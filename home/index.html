<!doctype html>
<!-- TNT — /home/index.html
     HOME · RUSSIAN DOLL LEVEL 4
     PURPOSE:
       - Compress Home into nested Russian doll structure
       - Preserve Level 4 content without always-visible crowding
       - Keep Home as interior-orientation chamber, not the Door
       - Preserve EN/中文/ES, PLATFORM/ENGINEERING, URL state carry, LS boundary
       - No modals, no overlays, no inline onclick
       - addEventListener only
       - gd_* localStorage keys only: gd_lang, gd_style, gd_time, gd_depth
-->

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>HOME · Diamond Gate Bridge</title>

<link rel="stylesheet" href="/assets/ui.css"/>
<link rel="stylesheet" href="/assets/branch.css"/>
<script defer src="/assets/instruments.js"></script>

<style>
a{color:inherit;text-decoration:none}
body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:#fff}
body::before,body::after{pointer-events:none!important}

:root{
  --dockH:132px;
  --stroke:rgba(255,255,255,.12);
  --stroke2:rgba(255,255,255,.10);
  --ink:rgba(255,255,255,.95);
  --txt:rgba(255,255,255,.90);
  --mut:rgba(255,255,255,.78);
  --soft:rgba(255,255,255,.62);
  --crimson:rgba(120,0,22,.28);
  --festival:rgba(255,43,43,.12);
  --skyBlue:rgba(83,119,255,.16);
  --gold:rgba(201,162,74,.62);
  --goldSolid:rgba(201,162,74,.92);
  --goldGlow:rgba(201,162,74,.22);
  --goldGlowSoft:rgba(201,162,74,.14);
  --green:rgba(128,240,182,.92);
  --shadowA:0 24px 90px rgba(0,0,0,.58);
  --shadowB:0 16px 56px rgba(0,0,0,.62);
  --shadowC:0 18px 60px rgba(0,0,0,.55);
}

.top{
  position:fixed;top:16px;left:0;right:0;
  padding:0 16px;
  display:flex;justify-content:space-between;align-items:center;
  gap:12px;z-index:240;pointer-events:none;
}
.top .left,.top .right{
  display:flex;gap:10px;flex-wrap:wrap;align-items:center;white-space:nowrap;
  pointer-events:auto;
}

.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:10px 12px;min-height:44px;border-radius:16px;
  border:1px solid rgba(255,255,255,.14);
  background:
    radial-gradient(circle at 50% 50%, rgba(201,162,74,.08), transparent 58%),
    linear-gradient(145deg, rgba(10,12,16,.78), rgba(6,8,10,.90));
  color:var(--ink);
  font-weight:950;font-size:14px;letter-spacing:.2px;
  -webkit-tap-highlight-color:transparent;
  position:relative;overflow:hidden;touch-action:manipulation;
  box-shadow:var(--shadowC);
}
.btn:active{transform:translateY(1px)}
.btn::after{
  content:"";position:absolute;inset:-2px;border-radius:18px;pointer-events:none;
  box-shadow:
    0 0 0 1px rgba(255,255,255,.10),
    0 0 18px var(--goldGlowSoft),
    inset 0 0 0 1px rgba(201,162,74,.10);
  opacity:.85;
}
.btn.red{
  border-color:rgba(255,43,43,.22);
  box-shadow:var(--shadowC), 0 0 18px rgba(255,43,43,.10);
}
.btn.red::after{
  box-shadow:
    0 0 0 1px rgba(255,255,255,.10),
    0 0 24px var(--goldGlow),
    inset 0 0 0 1px rgba(201,162,74,.16);
}

.seg{
  display:inline-flex;gap:0;overflow:hidden;border-radius:16px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(0,0,0,.16);
  box-shadow:var(--shadowC);
}
.seg button{
  appearance:none;border:0;background:transparent;color:var(--mut);
  padding:10px 12px;min-height:44px;font-weight:950;font-size:13px;
  letter-spacing:.25px;cursor:pointer;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;position:relative;
}
.seg button[aria-pressed="true"]{
  color:var(--ink);
  background:
    radial-gradient(circle at 50% 50%, rgba(201,162,74,.14), transparent 60%),
    linear-gradient(180deg, rgba(255,43,43,.10), rgba(0,0,0,.10));
  box-shadow:inset 0 0 0 1px rgba(201,162,74,.14);
}
.seg button[aria-pressed="true"]::after{
  content:"";position:absolute;inset:2px;border-radius:14px;pointer-events:none;
  box-shadow:0 0 20px var(--goldGlowSoft);opacity:.95;
}

.page{
  width:min(1120px,94vw);
  margin:0 auto;
  padding:104px 0 calc(var(--dockH) + 18px);
  display:flex;flex-direction:column;gap:12px;
  position:relative;z-index:10;
}

.backdrop{
  position:absolute;left:50%;top:68px;transform:translateX(-50%);
  width:min(1180px,96vw);height:calc(100% - 108px);
  border-radius:34px;pointer-events:none;z-index:0;overflow:hidden;
}
.backdrop::before{
  content:"";position:absolute;inset:0;border:1px solid rgba(255,255,255,.08);border-radius:34px;
  background:
    radial-gradient(circle at 16% 20%, rgba(201,162,74,.10), transparent 58%),
    radial-gradient(circle at 76% 18%, rgba(83,119,255,.15), transparent 62%),
    radial-gradient(circle at 62% 88%, rgba(255,43,43,.10), transparent 64%),
    linear-gradient(160deg, rgba(0,0,0,.18), rgba(0,0,0,.08));
  box-shadow:
    0 70px 220px rgba(0,0,0,.62),
    inset 0 2px 0 rgba(255,255,255,.06),
    inset 0 -70px 140px rgba(0,0,0,.55);
  opacity:.92;
}
.backdrop::after{
  content:"";position:absolute;inset:-18%;
  background:
    radial-gradient(circle at 20% 34%, rgba(255,43,43,.14), transparent 44%),
    radial-gradient(circle at 82% 30%, rgba(83,119,255,.16), transparent 48%),
    radial-gradient(circle at 52% 78%, rgba(201,162,74,.12), transparent 48%),
    conic-gradient(from 22deg at 34% 30%,
      rgba(201,162,74,.14), transparent 12%,
      rgba(83,119,255,.12), transparent 24%,
      rgba(90,40,120,.10), transparent 38%,
      transparent 100%);
  filter:blur(1px);opacity:.72;
}

.header{
  position:relative;z-index:2;
  border:1px solid var(--stroke);border-radius:24px;
  background:
    radial-gradient(circle at 18% 22%, var(--crimson), transparent 72%),
    radial-gradient(circle at 82% 30%, var(--skyBlue), transparent 74%),
    radial-gradient(circle at 70% 92%, var(--festival), transparent 62%),
    radial-gradient(circle at 26% 22%, rgba(201,162,74,.14), transparent 62%),
    linear-gradient(160deg, rgba(0,0,0,.30), rgba(0,0,0,.14));
  backdrop-filter:blur(10px);box-shadow:var(--shadowA);
  padding:16px 16px 14px;overflow:hidden;
}
.header::before{
  content:"";position:absolute;inset:0;border-radius:24px;pointer-events:none;
  box-shadow:inset 0 0 0 1px rgba(201,162,74,.16);
  background:
    radial-gradient(circle at 50% 50%, transparent 0 72%, rgba(201,162,74,.10) 78%, transparent 84%),
    conic-gradient(from 45deg at 50% 50%,
      rgba(201,162,74,.12) 0 6%,
      transparent 6% 12%,
      rgba(201,162,74,.08) 12% 18%,
      transparent 18% 100%);
  opacity:.26;
  mask:radial-gradient(circle at 50% 50%, transparent 0 78%, #000 82% 100%),linear-gradient(#000,#000);
  -webkit-mask:radial-gradient(circle at 50% 50%, transparent 0 78%, #000 82% 100%),linear-gradient(#000,#000);
}
.k{margin:0 0 6px;font-size:11px;letter-spacing:4px;text-transform:uppercase;opacity:.78;color:var(--mut);position:relative}
.t{margin:0;font-weight:980;font-size:30px;letter-spacing:.7px;color:var(--ink);position:relative}
.s{margin:10px 0 0;font-size:15.5px;line-height:1.55;color:var(--txt);max-width:980px;position:relative}
.rule{
  margin-top:12px;padding:12px;border-radius:18px;
  border:1px solid rgba(255,255,255,.10);
  background:
    radial-gradient(circle at 50% 50%, rgba(201,162,74,.10), transparent 58%),
    radial-gradient(circle at 22% 18%, rgba(255,43,43,.10), transparent 58%),
    linear-gradient(160deg, rgba(10,12,16,.62), rgba(6,8,10,.76));
  font-size:13.25px;color:rgba(255,255,255,.86);line-height:1.45;position:relative;
}
.stateRow{margin-top:12px;display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;align-items:center}
.statePill{
  display:inline-flex;align-items:center;gap:8px;
  padding:10px 12px;border-radius:999px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(0,0,0,.16);color:rgba(255,255,255,.78);
  font-weight:950;box-shadow:0 14px 36px rgba(0,0,0,.55);
}

.band{
  position:relative;z-index:2;padding:10px 12px;border-radius:18px;
  border:1px solid var(--stroke2);background:rgba(0,0,0,.14);
  font-weight:980;letter-spacing:.25px;color:rgba(255,255,255,.90);
}

.dollShell{
  position:relative;z-index:2;
  border:1px solid rgba(255,255,255,.10);
  border-radius:26px;
  background:
    radial-gradient(circle at 18% 18%, rgba(201,162,74,.10), transparent 58%),
    linear-gradient(145deg, rgba(17,22,28,.80), rgba(11,15,20,.94));
  box-shadow:var(--shadowA);
  padding:14px;
}
.routeCaps{
  display:grid;
  grid-template-columns:repeat(4,minmax(0,1fr));
  gap:10px;
}
.cap{
  border:1px solid rgba(255,255,255,.10);
  border-radius:20px;
  padding:14px;
  background:
    radial-gradient(circle at 50% 50%, rgba(201,162,74,.08), transparent 62%),
    rgba(0,0,0,.16);
  cursor:pointer;
  text-align:left;
  color:var(--ink);
  min-height:118px;
  position:relative;
  overflow:hidden;
  -webkit-tap-highlight-color:transparent;
}
.cap::after{
  content:"";position:absolute;inset:-2px;border-radius:22px;pointer-events:none;
  box-shadow:0 0 22px rgba(201,162,74,.10);
  opacity:.62;
}
.cap[aria-expanded="true"]{
  border-color:rgba(201,162,74,.34);
  background:
    radial-gradient(circle at 50% 50%, rgba(201,162,74,.14), transparent 62%),
    linear-gradient(145deg, rgba(17,22,28,.92), rgba(11,15,20,.98));
}
.capMark{
  width:10px;height:10px;border-radius:3px;transform:rotate(45deg);
  background:var(--c);
  box-shadow:0 0 0 1px rgba(255,255,255,.14), 0 0 14px rgba(0,0,0,.35);
  margin-bottom:10px;
}
.cap h3{margin:0;color:var(--ink);font-size:17px;line-height:1.05;letter-spacing:.1px}
.cap p{margin:8px 0 0;color:rgba(255,255,255,.76);font-size:13.25px;line-height:1.38}

.dollBody{
  display:none;
  margin-top:12px;
  border:1px solid rgba(255,255,255,.10);
  border-radius:22px;
  background:
    radial-gradient(circle at 26% 18%, rgba(255,43,43,.08), transparent 58%),
    radial-gradient(circle at 72% 26%, rgba(83,119,255,.10), transparent 62%),
    linear-gradient(145deg, rgba(10,12,16,.82), rgba(6,8,10,.94));
  box-shadow:var(--shadowB);
  padding:16px;
}
.dollBody[data-open="true"]{display:block}
.dollTitle{margin:0 0 8px;font-size:22px;line-height:1.05;color:var(--ink);letter-spacing:.1px}
.dollIntro{margin:0;color:rgba(255,255,255,.88);font-size:14.75px;line-height:1.62}

.subBubbles{margin-top:12px;display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}
.bubble{
  border:1px solid rgba(255,255,255,.10);
  border-radius:18px;
  background:
    radial-gradient(circle at 22% 18%, rgba(255,43,43,.08), transparent 60%),
    radial-gradient(circle at 50% 50%, rgba(201,162,74,.08), transparent 58%),
    rgba(0,0,0,.12);
  padding:14px 14px 12px;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
  position:relative;overflow:hidden;
}
.bubble::after{
  content:"";position:absolute;inset:-2px;border-radius:20px;
  pointer-events:none;box-shadow:0 0 22px rgba(201,162,74,.10);opacity:.60;
}
.bubble h4{margin:0 0 8px;font-weight:980;letter-spacing:.15px;font-size:15px;color:var(--ink)}
.bubble p{margin:0;color:rgba(255,255,255,.80);line-height:1.62;display:none;font-size:14px}
.bubble.open p{display:block}

.innerControls{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
.innerBtn{
  border:1px solid rgba(255,255,255,.12);
  border-radius:999px;
  padding:9px 11px;
  background:rgba(0,0,0,.18);
  color:rgba(255,255,255,.78);
  cursor:pointer;
  font-weight:950;
  font-size:12px;
  letter-spacing:.55px;
  text-transform:uppercase;
}
.innerBtn[aria-pressed="true"]{
  color:var(--ink);
  border-color:rgba(201,162,74,.38);
  background:rgba(201,162,74,.10);
  box-shadow:0 0 18px var(--goldGlowSoft);
}
.innerPanel{
  display:none;
  margin-top:10px;
  border:1px solid rgba(255,255,255,.10);
  border-radius:18px;
  background:rgba(0,0,0,.18);
  padding:14px;
}
.innerPanel[data-open="true"]{display:block}
.innerPanel h4{margin:0 0 8px;color:var(--goldSolid);font-size:14px;letter-spacing:.8px;text-transform:uppercase}
.innerPanel p{margin:0;color:rgba(255,255,255,.82);line-height:1.58;font-size:14px}
.innerGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-top:10px}
.innerBox{border-top:1px solid rgba(255,255,255,.08);padding-top:8px;color:rgba(255,255,255,.80);line-height:1.45;font-size:13.25px}
.innerBox strong{display:block;color:var(--goldSolid);font-size:11px;letter-spacing:1.3px;text-transform:uppercase;margin-bottom:4px}
.routeMap{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:8px;margin-top:10px}
.routeMap a{
  min-height:42px;border:1px solid rgba(255,255,255,.10);border-radius:16px;
  background:linear-gradient(145deg, rgba(10,12,16,.72), rgba(6,8,10,.86));
  display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.82);
  font-weight:950;font-size:12px;letter-spacing:.2px;position:relative;overflow:hidden;
}
.routeMap a::after{
  content:"";position:absolute;inset:-2px;border-radius:18px;pointer-events:none;
  box-shadow:0 0 16px var(--goldGlowSoft);opacity:.62;
}
.actions{margin-top:14px;display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end}
.actions .btn{padding:10px 14px;border-radius:999px;min-height:40px;font-size:13px}

.dock{
  position:fixed;left:50%;
  bottom:max(10px, env(safe-area-inset-bottom));
  transform:translateX(-50%);
  z-index:220;width:min(980px,94vw);
  padding:10px 12px;border-radius:22px;
  border:1px solid rgba(255,255,255,.12);
  background:
    radial-gradient(circle at 18% 18%, rgba(255,43,43,.10), transparent 62%),
    radial-gradient(circle at 82% 70%, rgba(83,119,255,.10), transparent 64%),
    linear-gradient(145deg, rgba(10,12,16,.72), rgba(6,8,10,.86));
  backdrop-filter:blur(10px);
  box-shadow:0 18px 60px rgba(0,0,0,.55);
  display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;
}
.dock .btn{width:100%;padding:10px;border-radius:999px;white-space:nowrap}

@media (max-width:900px){
  .routeCaps{grid-template-columns:repeat(2,minmax(0,1fr))}
  .subBubbles{grid-template-columns:1fr}
  .innerGrid{grid-template-columns:1fr}
  .routeMap{grid-template-columns:repeat(2,minmax(0,1fr))}
}
@media (max-width:620px){
  .top{position:absolute}
  .top .left,.top .right{width:100%}
  .seg{max-width:100%;overflow:auto}
}
@media (max-width:520px){
  :root{--dockH:148px}
  .dock{grid-template-columns:repeat(3,minmax(0,1fr))}
  .routeCaps{grid-template-columns:1fr}
  .routeMap{grid-template-columns:1fr}
}
</style>
</head>

<body>

<div class="top" aria-label="Top controls">
  <div class="left">
    <a class="btn" id="btnCompass" data-route="/index.html" href="/index.html">COMPASS</a>
    <a class="btn" id="btnPrelude" data-route="/prelude/" href="/prelude/">PRELUDE</a>
    <a class="btn" id="btnExplore" data-route="/explore/" href="/explore/">EXPLORE</a>
  </div>
  <div class="right" aria-label="Controls">
    <div class="seg" role="group" aria-label="Language">
      <button type="button" id="langEN" aria-pressed="true">EN</button>
      <button type="button" id="langZH" aria-pressed="false">中文</button>
      <button type="button" id="langES" aria-pressed="false">ES</button>
    </div>
    <div class="seg" role="group" aria-label="Lane">
      <button type="button" id="lanePlatform" aria-pressed="true">PLATFORM</button>
      <button type="button" id="laneEngineering" aria-pressed="false">ENGINEERING</button>
    </div>
  </div>
</div>

<div class="page">
  <div class="backdrop" aria-hidden="true"></div>

  <section class="header" aria-label="Home header">
    <p class="k" id="hk">HOME</p>
    <h1 class="t" id="ht">INTERIOR ORIENTATION</h1>
    <p class="s" id="hs"></p>
    <div class="rule" id="rule"></div>
    <div class="stateRow" aria-label="State">
      <div class="statePill" id="laneState">—</div>
      <div class="statePill" id="langState">—</div>
    </div>
  </section>

  <div class="band" id="band">OPEN ONE DOLL</div>

  <section class="dollShell" aria-label="Home Russian doll controls">
    <div class="routeCaps" id="caps"></div>
    <div class="dollBody" id="dollBody" data-open="false"></div>
  </section>
</div>

<nav class="dock" aria-label="Bottom navigation">
  <a class="btn" id="dockDoor" data-route="/door/" href="/door/">DOOR</a>
  <a class="btn" id="dockLaws" data-route="/laws/" href="/laws/">LAWS</a>
  <a class="btn" id="dockGovernance" data-route="/governance/" href="/governance/">GOVERNANCE</a>
  <a class="btn red" id="dockCompass" data-route="/index.html" href="/index.html">COMPASS</a>
</nav>

<script>
(function(){
  "use strict";

  var qs=new URLSearchParams(location.search);
  var LS=window.localStorage;

  var lang=qs.get("lang")||LS.getItem("gd_lang")||"en";
  var time=qs.get("time")||LS.getItem("gd_time")||"now";
  var lane=qs.get("lane")||"platform";

  var style="informal";
  var depth="explore";

  if(lang!=="en"&&lang!=="zh"&&lang!=="es") lang="en";
  if(time==="trajectory") time="post";
  if(time!=="origin"&&time!=="now"&&time!=="post") time="now";
  if(lane!=="platform"&&lane!=="engineering") lane="platform";

  try{
    LS.setItem("gd_lang",lang);
    LS.setItem("gd_style","informal");
    LS.setItem("gd_time",time);
    LS.setItem("gd_depth","explore");
  }catch(e){}

  document.documentElement.lang=(lang==="zh")?"zh":(lang==="es")?"es":"en";

  function q(over){
    var p=new URLSearchParams();
    p.set("lang",(over&&over.lang)?over.lang:lang);
    p.set("style","informal");
    p.set("time",(over&&over.time)?over.time:time);
    p.set("depth","explore");
    var L=(over&&over.lane)?over.lane:lane;
    if(L==="platform"||L==="engineering") p.set("lane",L);
    return "?"+p.toString();
  }

  function pick3(en,zh,es){return lang==="zh"?zh:(lang==="es"?es:en)}
  function setPressed(ids,activeId){
    ids.forEach(function(id){
      var el=document.getElementById(id);
      if(el) el.setAttribute("aria-pressed",id===activeId?"true":"false");
    });
  }
  function laneLabel(){
    return lang==="zh"?(lane==="engineering"?"工程":"平台"):
      lang==="es"?(lane==="engineering"?"INGENIERÍA":"PLATAFORMA"):
      lane==="engineering"?"ENGINEERING":"PLATFORM";
  }

  var ROUTES={
    compass:"/index.html",
    door:"/door/",
    prelude:"/prelude/",
    explore:"/explore/",
    products:"/products/",
    gauges:"/gauges/",
    laws:"/laws/",
    governance:"/governance/"
  };

  var HEAD={
    en:{
      platform:{
        hs:"Home is the first interior chamber after the Door: calm center, clear route, optional depth.",
        rule:"Rule: open one doll at a time. Home orients first, then unfolds only what the visitor asks to see."
      },
      engineering:{
        hs:"Engineering view: Home is a compact interior-state router with nested disclosure and state-carry links.",
        rule:"Rule: Home may compress, expose, and route; it must not overload or overwrite downstream authority."
      }
    },
    zh:{
      platform:{
        hs:"Home 是门之后的第一个内部房间：冷静中心、清晰路线、可选深度。",
        rule:"规则：一次只打开一个套娃。Home 先定位，只展开访问者要求看到的内容。"
      },
      engineering:{
        hs:"工程视图：Home 是紧凑的内部状态路由器，使用嵌套展开与状态携带链接。",
        rule:"规则：Home 可以压缩、展开、路由；不可过载或覆盖下游权威。"
      }
    },
    es:{
      platform:{
        hs:"Home es la primera cámara interior después de la Puerta: centro calmado, ruta clara, profundidad opcional.",
        rule:"Regla: abrir una muñeca a la vez. Home orienta primero y despliega solo lo que se solicita."
      },
      engineering:{
        hs:"Vista de ingeniería: Home es un enrutador compacto de estado interior con divulgación anidada y enlaces con estado.",
        rule:"Regla: Home puede comprimir, exponer y enrutar; no debe sobrecargar ni reemplazar autoridad posterior."
      }
    }
  };

  function P(en,zh,es){return{en:en,zh:zh,es:es}}

  var ZONES=[
    {
      id:"orientation",c:"#93c5fd",
      t:P("Orientation","定位","Orientación"),
      s:P("Know where you are after the Door.","越过门之后知道自己在哪里。","Saber dónde estás después de la Puerta."),
      platform:{

        b:[P("Current position","当前位置","Posición actual"),P("Home confirms the interior has begun.","Home 确认内部已开始。","Home confirma que el interior comenzó."),

      engineering:{

        b:[P("State","状态","Estado"),P("INTERIOR_ROLE=ACTIVE; DOOR_ROLE=PREVIOUS_ENTRY.","INTERIOR_ROLE=ACTIVE；DOOR_ROLE=PREVIOUS_ENTRY。","INTERIOR_ROLE=ACTIVE; DOOR_ROLE=PREVIOUS_ENTRY."),
           P("Route clarity","路由清晰","Claridad"),P("Every visible route points to a real page with state carry.","每个可见路由指向真实页面并携带状态。","Cada ruta visible apunta a página real con estado."),
           P("Compression","压缩","Compresión"),P("Labels first; explanations unfold only inside requested dolls.","标签优先；解释只在请求的套娃内展开。","Etiquetas primero; explicación en muñecas solicitadas.")]
      }
    },
    {
      id:"center",c:"#c9a24a",
      t:P("Center Hold","中心保持","Sostener centro"),
      s:P("Home stabilizes without overexpressing.","Home 稳定但不过度表达。","Home estabiliza sin sobreexpresar."),
      platform:{
        intro:P("Center Hold keeps Home from doing every page’s job. It gives enough meaning to choose a path, then lets the visitor move.","中心保持防止 Home 承担每个页面的职责。它给足以选择路径的意义，然后让访问者移动。","Sostener centro evita que Home haga el trabajo de todas las páginas."),
        b:[P("Restraint","克制","Contención"),P("The center is stable because it does less, not because it says everything.","中心稳定是因为少做，而不是说尽一切。","El centro es estable porque hace menos."),
           P("Interior tone","内部语气","Tono interior"),P("Readable, calm, and direct.","可读、冷静、直接。","Legible, calmo y directo."),
           P("Visitor control","访问者控制","Control"),P("Visitors choose depth through nested capsules.","访问者通过嵌套胶囊选择深度。","El visitante elige profundidad por cápsulas.")]
      },
      engineering:{
        intro:P("Center Hold preserves low cognitive load while retaining route completeness.","中心保持在保留完整路由的同时降低认知负荷。","Sostener centro mantiene baja carga cognitiva con rutas completas."),
        b:[P("Load rule","负荷规则","Carga"),P("Visible default stays compact; depth is opt-in.","默认可见保持紧凑；深度为主动选择。","Visible compacto; profundidad opt-in."),
           P("Authority rule","权威规则","Autoridad"),P("Home routes out; downstream pages own their content.","Home 只路由；下游页面拥有内容。","Home enruta; páginas posteriores poseen contenido."),
           P("Fail-safe","安全失败","Fail-safe"),P("If scripts fail, links and readable text remain usable.","脚本失败时，链接和文字仍可用。","Si scripts fallan, enlaces/texto siguen usables.")]
      }
    },
    {
      id:"routes",c:"#34d399",
      t:P("Route Cleanly","干净路由","Enrutar limpio"),
      s:P("Send the visitor to the correct next chamber.","把访问者送到正确的下一个房间。","Enviar al visitante a la siguiente cámara correcta."),
      platform:{
        intro:P("Home routes without pretending to be the destination. Prelude prepares, Explore maps, Products packages, Gauges inspects, Laws bound, Governance executes.","Home 路由但不假装自己是目的地。Prelude 准备，Explore 映射，Products 打包，Gauges 检查，Laws 定边界，Governance 执行。","Home enruta sin fingir ser destino."),
        b:[P("Route labels","路由标签","Etiquetas"),P("Labels are short enough to scan and strong enough to guide.","标签足够短以扫描，也足够强以引导。","Etiquetas breves y guía clara."),
           P("Route purpose","路由目的","Propósito"),P("Every link answers why to go there next.","每个链接都回答为什么下一步去那里。","Cada enlace responde por qué ir ahí."),
           P("No dead ends","无死路","Sin callejones"),P("Home should not create future doors that do not exist.","Home 不应创建不存在的未来门。","Home no crea puertas futuras inexistentes.")]
      },
      engineering:{
        intro:P("Route Cleanly is the navigation contract: all outbound links carry state and point to stable route owners.","干净路由是导航契约：所有外链携带状态并指向稳定路由所有者。","Enrutar limpio es contrato de navegación."),
        b:[P("State carry","状态携带","Estado"),P("lang/style/time/depth/lane are preserved through URLs.","lang/style/time/depth/lane 通过 URL 保留。","lang/style/time/depth/lane por URL."),
           P("Route owner","路由所有者","Dueño"),P("Downstream pages own their controls.","下游页面拥有自己的控制。","Páginas posteriores poseen controles."),
           P("Auditability","可审计","Auditable"),P("Route map is visible inside the nested panel.","路由图在嵌套面板中可见。","Mapa visible en panel anidado.")]
      }
    },
    {
      id:"continuity",c:"#ff2b2b",
      t:P("Continuity","连续性","Continuidad"),
      s:P("Keep the interior consistent across language, lens, and time.","让内部在语言、透镜与时间中保持一致。","Mantener consistencia por idioma, lente y tiempo."),
      platform:{
        intro:P("Continuity makes Home feel like part of the same house as the Door, Governance, Laws, Products, and Gauges.","连续性让 Home 感觉属于同一座房子，与 Door、Governance、Laws、Products 和 Gauges 一致。","Continuidad hace que Home pertenezca a la misma casa."),
        b:[P("Language","语言","Idioma"),P("EN, 中文, and ES switch without reload or closing the open doll.","EN、中文、ES 切换不刷新也不关闭打开的套娃。","Cambian sin recargar ni cerrar muñeca."),
           P("Lens","透镜","Lente"),P("Platform and Engineering remain separate reads of the same structure.","平台与工程是同一结构的不同读法。","Plataforma e Ingeniería son lecturas separadas."),
           P("Time","时间","Tiempo"),P("Origin, now, and post travel without new storage keys.","origin、now、post 可传递且不增加新存储键。","origin, now y post sin claves nuevas.")]
      },
      engineering:{
        intro:P("Continuity binds state carry and storage boundaries without creating hidden state.","连续性绑定状态携带与存储边界，不创建隐藏状态。","Continuidad vincula estado y límites sin estado oculto."),
        b:[P("Storage boundary","存储边界","Límite"),P("Allowed LS keys: gd_lang, gd_style, gd_time, gd_depth only.","允许 LS 键：gd_lang、gd_style、gd_time、gd_depth。","Claves LS: gd_lang, gd_style, gd_time, gd_depth."),
           P("No reload","不刷新","Sin recarga"),P("Language and lane changes are local DOM updates with history replacement.","语言与透镜变更是本地 DOM 更新并替换 history。","Actualización DOM local con history."),
           P("Same house","同一座房","Misma casa"),P("Visual language stays aligned with Governance Level 4 and the site spine.","视觉语言与 Governance Level 4 和站点脊柱一致。","Visual alineado con Governance Nivel 4.")]
      }
    }
  ];

  var L4={
    compass:P("Home is the first interior chamber after the Door. It is not the whole map; it is the stabilizing center.","Home 是门后的第一个内部房间。它不是完整地图，而是稳定中心。","Home es la primera cámara interior tras la Puerta. No es todo el mapa; es centro estabilizador."),
    star:P("Home is healthy when a visitor can understand where they are, choose a route, and remain oriented without total-system explanation.","当访问者能理解位置、选择路线，并且不需要全系统解释也能保持方向时，Home 就是健康的。","Home es sano cuando se entiende ubicación, ruta y orientación sin explicar todo."),
    legend:[
      P("North: identity, center, current location, Door/interior boundary.","北：身份、中心、当前位置、门/内部边界。","Norte: identidad, centro, ubicación y límite."),
      P("East: forward routes and future movement.","东：前进路由与未来运动。","Este: rutas futuras y movimiento."),
      P("South: stability, readability, and no-overload protection.","南：稳定、可读性与防过载保护。","Sur: estabilidad, legibilidad y protección."),
      P("West: pressure control, stale labels, broken routes, confusing entry paths.","西：压力控制、陈旧标签、断路由、混乱入口。","Oeste: presión, etiquetas obsoletas, rutas rotas.")
    ],
    ledger:[
      P("Interior orientation: active.","内部定位：已激活。","Orientación interior: activa."),
      P("Center hold: compact and readable.","中心保持：紧凑且可读。","Centro: compacto y legible."),
      P("Route map: state-carrying.","路由图：携带状态。","Mapa: transporta estado."),
      P("Language/lens: no reload.","语言/透镜：无刷新。","Idioma/lente: sin recarga."),
      P("Level 4: nested, not crowded.","第四级：嵌套，不拥挤。","Nivel 4: anidado, no saturado.")
    ]
  };

  var openIndex=null;
  var innerOpen=null;
  var caps=document.getElementById("caps");
  var body=document.getElementById("dollBody");

  function activePack(zone){return lane==="engineering"?zone.engineering:zone.platform}

  function buildCaps(){
    caps.innerHTML="";
    ZONES.forEach(function(zone,i){
      var b=document.createElement("button");
      b.type="button";
      b.className="cap";
      b.setAttribute("data-cap",String(i));
      b.setAttribute("aria-expanded",openIndex===i?"true":"false");
      b.style.setProperty("--c",zone.c);
      b.innerHTML='<div class="capMark"></div><h3></h3><p></p>';
      b.querySelector("h3").textContent=pick3(zone.t.en,zone.t.zh,zone.t.es);
      b.querySelector("p").textContent=pick3(zone.s.en,zone.s.zh,zone.s.es);
      b.addEventListener("click",function(){toggleCap(i)}, {passive:true});
      caps.appendChild(b);
    });
  }

  function makeBubble(title,text){
    var d=document.createElement("div");
    d.className="bubble";
    d.setAttribute("role","button");
    d.tabIndex=0;
    var h=document.createElement("h4");
    var p=document.createElement("p");
    h.textContent=pick3(title.en,title.zh,title.es);
    p.textContent=pick3(text.en,text.zh,text.es);
    d.appendChild(h);
    d.appendChild(p);
    function act(){d.classList.toggle("open")}
    d.addEventListener("click",act,{passive:true});
    d.addEventListener("keydown",function(e){if(e.key==="Enter"||e.key===" "){e.preventDefault();act()}});
    return d;
  }

  function renderBody(){
    if(openIndex===null||openIndex===undefined){
      body.setAttribute("data-open","false");
      body.innerHTML="";
      return;
    }

    var zone=ZONES[openIndex];
    var pack=activePack(zone);
    var b=pack.b;

    body.setAttribute("data-open","true");
    body.innerHTML="";

    var title=document.createElement("h2");
    title.className="dollTitle";
    title.textContent=pick3(zone.t.en,zone.t.zh,zone.t.es);

    var intro=document.createElement("p");
    intro.className="dollIntro";
    intro.textContent=pick3(pack.intro.en,pack.intro.zh,pack.intro.es);

    var bubbles=document.createElement("div");
    bubbles.className="subBubbles";
    bubbles.appendChild(makeBubble(b[0],b[1]));
    bubbles.appendChild(makeBubble(b[2],b[3]));
    bubbles.appendChild(makeBubble(b[4],b[5]));

    var controls=document.createElement("div");
    controls.className="innerControls";
    [
      ["compass",pick3("Compass","罗盘","Brújula")],
      ["star",pick3("North Star","北星","Estrella Norte")],
      ["ledger",pick3("Ledger","账本","Registro")],
      ["routes",pick3("Routes","路由","Rutas")]
    ].forEach(function(item){
      var btn=document.createElement("button");
      btn.type="button";
      btn.className="innerBtn";
      btn.setAttribute("data-inner",item[0]);
      btn.setAttribute("aria-pressed",innerOpen===item[0]?"true":"false");
      btn.textContent=item[1];
      btn.addEventListener("click",function(){toggleInner(item[0])});
      controls.appendChild(btn);
    });

    var panel=document.createElement("div");
    panel.className="innerPanel";
    panel.setAttribute("data-open",innerOpen?"true":"false");
    panel.innerHTML=innerHtml();

    var actions=document.createElement("div");
    actions.className="actions";
    actions.innerHTML=
      '<a class="btn red" data-route="/prelude/" href="/prelude/"></a>'+
      '<a class="btn" data-route="/explore/" href="/explore/"></a>'+
      '<a class="btn" data-route="/gauges/" href="/gauges/"></a>';
    actions.children[0].textContent=pick3("OPEN: PRELUDE","打开：序章","ABRIR: PRELUDIO");
    actions.children[1].textContent=pick3("OPEN: EXPLORE","打开：探索","ABRIR: EXPLORAR");
    actions.children[2].textContent=pick3("OPEN: GAUGES","打开：量规","ABRIR: MEDIDORES");

    body.appendChild(title);
    body.appendChild(intro);
    body.appendChild(bubbles);
    body.appendChild(controls);
    body.appendChild(panel);
    body.appendChild(actions);
    wireAll();
  }

  function innerHtml(){
    if(!innerOpen) return "";
    if(innerOpen==="compass"){
      return '<h4>'+pick3("Compass","罗盘","Brújula")+'</h4><p>'+pick3(L4.compass.en,L4.compass.zh,L4.compass.es)+'</p><div class="innerGrid">'+
        L4.legend.map(function(x){return '<div class="innerBox"><strong>'+pick3("Legend","图例","Leyenda")+'</strong>'+pick3(x.en,x.zh,x.es)+'</div>'}).join("")+
        '</div>';
    }
    if(innerOpen==="star"){
      return '<h4>'+pick3("North Star","北星","Estrella Norte")+'</h4><p>'+pick3(L4.star.en,L4.star.zh,L4.star.es)+'</p>';
    }
    if(innerOpen==="ledger"){
      return '<h4>'+pick3("Home Ledger","HOME 账本","Registro Home")+'</h4><div class="innerGrid">'+
        L4.ledger.map(function(x){return '<div class="innerBox"><strong>'+pick3("Strong","强","Fuerte")+'</strong>'+pick3(x.en,x.zh,x.es)+'</div>'}).join("")+
        '</div>';
    }
    if(innerOpen==="routes"){
      return '<h4>'+pick3("Route Map","路由图","Mapa de rutas")+'</h4><p>'+pick3("Primary Home routes remain tucked here instead of crowding the surface.","主要 Home 路由收纳在这里，不挤占表面。","Rutas primarias quedan aquí, no saturan la superficie.")+'</p>'+
        '<div class="routeMap">'+
        '<a data-route="/index.html" href="/index.html">COMPASS</a>'+
        '<a data-route="/prelude/" href="/prelude/">PRELUDE</a>'+
        '<a data-route="/explore/" href="/explore/">EXPLORE</a>'+
        '<a data-route="/products/" href="/products/">PRODUCTS</a>'+
        '<a data-route="/gauges/" href="/gauges/">GAUGES</a>'+
        '</div>';
    }
    return "";
  }

  function toggleCap(i){
    if(openIndex===i){openIndex=null;innerOpen=null}
    else{openIndex=i;innerOpen=null}
    buildCaps();
    renderBody();
  }

  function toggleInner(key){
    innerOpen=innerOpen===key?null:key;
    renderBody();
  }

  function applyHeader(){
    var pack=HEAD[lang][lane];
    document.getElementById("hk").textContent=pick3("HOME","首页","HOME");
    document.getElementById("ht").textContent=pick3("INTERIOR ORIENTATION","内部定位","ORIENTACIÓN INTERIOR");
    document.getElementById("hs").textContent=pack.hs;
    document.getElementById("rule").textContent=pack.rule;
    document.getElementById("band").textContent=pick3("OPEN ONE DOLL","打开一个套娃","ABRE UNA MUÑECA");
    document.getElementById("laneState").textContent=pick3("Current lens: ","当前透镜：","Lente actual: ")+laneLabel();
    document.getElementById("langState").textContent=lang==="zh"?"语言：中文":(lang==="es"?"Idioma: ES":"Lang: EN");

    document.getElementById("btnCompass").textContent=pick3("COMPASS","指南针","BRÚJULA");
    document.getElementById("btnPrelude").textContent=pick3("PRELUDE","序章","PRELUDIO");
    document.getElementById("btnExplore").textContent=pick3("EXPLORE","探索","EXPLORAR");
    document.getElementById("dockDoor").textContent=pick3("DOOR","门","PUERTA");
    document.getElementById("dockLaws").textContent=pick3("LAWS","法则","LEYES");
    document.getElementById("dockGovernance").textContent=pick3("GOVERNANCE","治理","GOBERNANZA");
    document.getElementById("dockCompass").textContent=pick3("COMPASS","指南针","BRÚJULA");
  }

  function wireAll(){
    Array.prototype.slice.call(document.querySelectorAll("[data-route]")).forEach(function(el){
      var route=el.getAttribute("data-route")||"";
      if(!route) return;
      if(route.indexOf("?")!==-1){
        try{
          var u=new URL(route,location.origin);
          var sp=u.searchParams;
          sp.set("lang",lang);sp.set("style","informal");sp.set("time",time);sp.set("depth","explore");sp.set("lane",lane);
          el.setAttribute("href",u.pathname+"?"+sp.toString()+(u.hash||""));
        }catch(e){el.setAttribute("href",route)}
      }else{
        el.setAttribute("href",route+q());
      }
    });
  }

  function setLang(next){
    if(next!=="en"&&next!=="zh"&&next!=="es") next="en";
    lang=next;
    document.documentElement.lang=lang==="zh"?"zh":(lang==="es"?"es":"en");
    try{LS.setItem("gd_lang",lang)}catch(e){}
    history.replaceState({},"",location.pathname+q({lang:lang}));
    setPressed(["langEN","langZH","langES"],lang==="zh"?"langZH":(lang==="es"?"langES":"langEN"));
    applyHeader();buildCaps();renderBody();wireAll();
  }

  function setLane(next){
    if(next!=="platform"&&next!=="engineering") next="platform";
    lane=next;
    history.replaceState({},"",location.pathname+q({lane:lane}));
    setPressed(["lanePlatform","laneEngineering"],lane==="engineering"?"laneEngineering":"lanePlatform");
    applyHeader();buildCaps();renderBody();wireAll();
  }

  document.getElementById("langEN").addEventListener("click",function(){setLang("en")},{passive:true});
  document.getElementById("langZH").addEventListener("click",function(){setLang("zh")},{passive:true});
  document.getElementById("langES").addEventListener("click",function(){setLang("es")},{passive:true});
  document.getElementById("lanePlatform").addEventListener("click",function(){setLane("platform")},{passive:true});
  document.getElementById("laneEngineering").addEventListener("click",function(){setLane("engineering")},{passive:true});

  setPressed(["langEN","langZH","langES"],lang==="zh"?"langZH":(lang==="es"?"langES":"langEN"));
  setPressed(["lanePlatform","laneEngineering"],lane==="engineering"?"laneEngineering":"lanePlatform");

  applyHeader();
  buildCaps();
  renderBody();
  wireAll();
})();
</script>

</body>
