<!doctype html>
<!-- TNT — /research/industry-context/index.html
     RESEARCH · INDUSTRY CONTEXT (STRUCTURED CASE STUDIES) · DUAL LENS
     GOALS (PER SEAN):
       - More bubbles / more categories / more structure
       - Less clutter (nested, collapsible sub-bubbles)
       - Include ALL listed companies (no rankings, no marketing comparisons)
       - LeafGuard highlighted (more detail) but neutral posture
       - BIGGER PRINT (monument readability)
     LENS RULE (NO NEW gd_* KEYS):
       - Narrative lens = depth=explore
       - Engineering lens = depth=learn
       - Uses existing canonical key: gd_depth + URL depth
     CONSTRAINTS (LOCKED):
       - Informational only · no monetization · no lead capture · no affiliates
       - No logos · no product images · no implied partnerships
       - Plain text references only · neutral academic tone
       - Canon state carry: lang/style/time/depth via URL + LS gd_lang/gd_style/gd_time/gd_depth ONLY
       - NO new gd_* keys
       - Uses /assets/ui.css + /assets/branch.css + /assets/instruments.js
       - ui.css owns html/body background (NO overrides)
       - Single-open accordion (top-level). Sub-bubbles tap-to-open (single-open inside each card)
-->

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Research · Industry Context</title>

<link rel="stylesheet" href="/assets/ui.css"/>
<link rel="stylesheet" href="/assets/branch.css"/>
<script defer src="/assets/instruments.js"></script>

<style>
a{color:inherit;text-decoration:none}
body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:#fff}
body::before,body::after{pointer-events:none!important}

:root{
  --dockH:118px;

  --stroke:rgba(255,255,255,.12);
  --stroke2:rgba(255,255,255,.10);

  --ink:rgba(255,255,255,.96);
  --mut:rgba(255,255,255,.88);
  --mut2:rgba(255,255,255,.76);

  --shadowA:0 28px 100px rgba(0,0,0,.65);
  --shadowB:0 18px 60px rgba(0,0,0,.55);

  /* Red/Black/Gold */
  --crimson:rgba(120,0,22,.30);
  --festival:rgba(255,43,43,.14);
  --opalV:rgba(90,40,120,.10);
  --goldSoft:rgba(201,162,74,.18);
  --goldEdge:rgba(201,162,74,.28);
}

/* ===== TOP CONTROLS (FIXED) ===== */
.top{
  position:fixed;top:12px;left:0;right:0;
  padding:0 12px;
  z-index:240;
  pointer-events:none;
}
.topbar{
  pointer-events:auto;
  width:min(1040px,96vw);
  margin:0 auto;
  padding:10px 10px;
  border-radius:22px;
  border:1px solid rgba(255,255,255,.12);
  background:
    radial-gradient(circle at 20% 20%, rgba(201,162,74,.10), transparent 60%),
    linear-gradient(145deg, rgba(8,10,14,.92), rgba(4,6,10,.96));
  box-shadow:var(--shadowA), inset 0 0 0 1px rgba(201,162,74,.14);
  backdrop-filter:blur(10px);
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
}
.topLeft,.topRight{
  display:flex;gap:10px;align-items:center;flex-wrap:wrap;white-space:nowrap;
}

/* Button (gold under-light only) */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:10px 14px;min-height:44px;border-radius:16px;
  border:1px solid rgba(255,255,255,.14);
  background:
    radial-gradient(circle at 50% 120%, rgba(201,162,74,.16), transparent 64%),
    linear-gradient(145deg, rgba(10,12,16,.78), rgba(6,8,10,.90));
  color:var(--ink);
  font-weight:950;font-size:14px;letter-spacing:.2px;
  -webkit-tap-highlight-color:transparent;
  position:relative;overflow:hidden;
  touch-action:manipulation;
  box-shadow:var(--shadowB);
}
.btn:active{transform:translateY(1px)}
.btn::after{
  content:"";
  position:absolute;left:10px;right:10px;bottom:-12px;height:28px;
  background: radial-gradient(circle at 50% 0%, rgba(201,162,74,.34), transparent 72%);
  opacity:.55;pointer-events:none;
}

/* Lens pills (mapped to depth) */
.pill{
  padding:10px 14px;min-height:44px;border-radius:999px;
  border:1px solid rgba(255,255,255,.14);
  background:
    radial-gradient(circle at 50% 120%, rgba(201,162,74,.14), transparent 64%),
    rgba(0,0,0,.20);
  color:var(--ink);
  font-weight:950;
  letter-spacing:.2px;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}
.pill.active{
  border-color:rgba(255,255,255,.30);
  box-shadow:0 0 18px rgba(255,43,43,.18);
}

/* ===== PAGE ===== */
.page{
  width:min(980px,94vw);
  margin:0 auto;
  padding:160px 0 calc(var(--dockH) + 24px); /* clears fixed topbar */
  display:flex;
  flex-direction:column;
  gap:14px;
  position:relative;
  z-index:10;
}

/* ===== HEADER (BIG TYPE) ===== */
.header{
  border:1px solid var(--stroke);
  border-radius:26px;
  padding:24px;
  background:
    radial-gradient(circle at 18% 22%, var(--crimson), transparent 72%),
    radial-gradient(circle at 82% 34%, var(--opalV), transparent 74%),
    radial-gradient(circle at 70% 92%, var(--festival), transparent 62%),
    radial-gradient(circle at 26% 22%, rgba(201,162,74,.12), transparent 62%),
    linear-gradient(160deg, rgba(0,0,0,.22), rgba(0,0,0,.12));
  box-shadow:var(--shadowA);
  position:relative;
  overflow:hidden;
}
.header::before{
  content:"";
  position:absolute;inset:0;border-radius:26px;pointer-events:none;
  box-shadow: inset 0 0 0 1px rgba(201,162,74,.14);
  background:
    repeating-linear-gradient(45deg, rgba(201,162,74,.08) 0 1px, transparent 1px 16px),
    repeating-linear-gradient(-45deg, rgba(201,162,74,.06) 0 1px, transparent 1px 16px);
  opacity:.20;
  mask:
    radial-gradient(circle at 50% 50%, transparent 0 78%, #000 82% 100%),
    linear-gradient(#000,#000);
  -webkit-mask:
    radial-gradient(circle at 50% 50%, transparent 0 78%, #000 82% 100%),
    linear-gradient(#000,#000);
}
.k{margin:0 0 10px;font-size:12px;letter-spacing:5px;text-transform:uppercase;opacity:.82;color:var(--mut)}
.h1{margin:0;font-weight:980;font-size:34px;letter-spacing:.35px;color:var(--ink);line-height:1.12}
.p0{margin:14px 0 0;line-height:1.75;color:var(--mut);font-size:17px}
.note0{margin-top:10px;color:var(--mut2);font-size:14px;line-height:1.55}

/* ===== ACCORDION (TOP-LEVEL SINGLE OPEN) ===== */
.stack{display:flex;flex-direction:column;gap:12px}
.card{
  border:1px solid rgba(255,255,255,.10);
  border-radius:22px;
  background:
    radial-gradient(circle at 22% 18%, rgba(255,43,43,.10), transparent 58%),
    radial-gradient(circle at 82% 30%, rgba(90,40,120,.10), transparent 66%),
    linear-gradient(145deg, rgba(17,22,28,.86), rgba(11,15,20,.94));
  box-shadow:var(--shadowA);
  overflow:hidden;
  position:relative;
}
.card::after{
  content:"";
  position:absolute;inset:0;border-radius:22px;pointer-events:none;
  box-shadow: inset 0 0 0 1px rgba(201,162,74,.10);
  opacity:.50;
}
.head{
  padding:18px 16px;
  display:flex;justify-content:space-between;align-items:flex-start;gap:12px;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
.ti{margin:0;font-weight:980;letter-spacing:.2px;font-size:18px;color:var(--ink)}
.si{margin-top:8px;font-size:15px;line-height:1.55;color:rgba(255,255,255,.86);opacity:.95}
.chev{
  width:40px;height:40px;border-radius:14px;
  border:1px solid rgba(255,255,255,.14);
  background:rgba(0,0,0,.18);
  display:flex;align-items:center;justify-content:center;
  color:var(--mut);
  font-weight:980;
  flex:0 0 auto;
  margin-top:2px;
  font-size:18px;
}
.body{
  display:none;
  padding:16px 16px 18px;
  border-top:1px solid rgba(255,255,255,.08);
  background:
    radial-gradient(circle at 30% 30%, rgba(255,255,255,.06), transparent 55%),
    linear-gradient(145deg, rgba(10,12,16,.86), rgba(6,8,10,.94));
}
.card.open .body{display:block}

/* ===== SUB-BUBBLES (SINGLE-OPEN WITHIN CARD) ===== */
.subBubbles{margin-top:12px;display:flex;flex-direction:column;gap:10px}
.bubble{
  border:1px solid rgba(255,255,255,.10);
  border-radius:18px;
  background:
    radial-gradient(circle at 22% 18%, rgba(255,43,43,.08), transparent 60%),
    radial-gradient(circle at 82% 70%, rgba(201,162,74,.08), transparent 62%),
    rgba(0,0,0,.12);
  padding:14px 14px 12px;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
  position:relative;
  overflow:hidden;
}
.bubble::after{
  content:"";
  position:absolute;left:10px;right:10px;bottom:-14px;height:30px;
  background: radial-gradient(circle at 50% 0%, rgba(201,162,74,.22), transparent 72%);
  opacity:.45;pointer-events:none;
}
.bubble h4{
  margin:0 0 8px;
  font-weight:980;
  letter-spacing:.15px;
  font-size:16px; /* bigger */
  color:var(--ink);
}
.bubble p{
  margin:0;
  color:rgba(255,255,255,.88);
  line-height:1.75;
  display:none;
  font-size:15px; /* bigger */
}
.bubble.open p{display:block}

/* Lens text blocks */
[data-lens]{display:none;}
[data-lens].show{display:block;}

/* LeafGuard highlight (neutral, but visually distinct) */
.leafGuardCard{border-color:rgba(201,162,74,.18)}
.leafGuardCard::after{box-shadow: inset 0 0 0 1px rgba(201,162,74,.22);opacity:.65}
.leafGuardTag{
  display:inline-flex;
  padding:6px 10px;
  border-radius:999px;
  border:1px solid rgba(201,162,74,.28);
  background:rgba(0,0,0,.14);
  color:rgba(255,255,255,.86);
  font-size:11px;
  letter-spacing:.22px;
  margin-left:8px;
}

/* ===== DOCK ===== */
.dock{
  position:fixed;left:50%;
  bottom:max(12px, env(safe-area-inset-bottom));
  transform:translateX(-50%);
  width:min(980px,94vw);
  padding:12px;border-radius:22px;
  border:1px solid var(--stroke);
  background:rgba(0,0,0,.22);
  backdrop-filter:blur(10px);
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  z-index:220;
}
.dock .btn{width:100%;text-align:center;border-radius:999px;padding:10px}

@media (max-width:520px){
  :root{--dockH:136px}
  .dock{grid-template-columns:repeat(3,1fr)}
  .h1{font-size:30px}
}
</style>
</head>

<body>

<div class="top" aria-label="Top controls">
  <div class="topbar">
    <div class="topLeft">
      <a class="btn" id="btnBack" href="/research/">RESEARCH</a>
      <a class="btn" id="btnIndex" href="/index.html">INDEX</a>
    </div>
    <div class="topRight" aria-label="Controls">
      <button class="btn" id="btnEN" type="button">EN</button>
      <button class="btn" id="btnZH" type="button">中文</button>
      <button class="btn" id="btnES" type="button">ES</button>
      <button class="pill" id="pillNarrative" type="button">NARRATIVE</button>
      <button class="pill" id="pillEngineering" type="button">ENGINEERING</button>
    </div>
  </div>
</div>

<div class="page">

  <section class="header" aria-label="Header">
    <p class="k" id="k0">RESEARCH · INDUSTRY CONTEXT</p>
    <h1 class="h1" id="h0">Engineering-Led Construction Benchmarks</h1>
    <p class="p0" id="p0"></p>
    <div class="note0" id="note0"></div>
  </section>

  <div class="stack" id="stack"></div>

</div>

<nav class="dock" aria-label="Bottom navigation">
  <a class="btn" id="dockIndex" href="/index.html">INDEX</a>
  <a class="btn" id="dockExplore" href="/explore/">EXPLORE</a>
  <a class="btn" id="dockProducts" href="/products/">PRODUCTS</a>
  <a class="btn" id="dockLaws" href="/laws/">LAWS</a>
</nav>

<script>
(function(){
  "use strict";

  // ===== Canon state (gd_* only) =====
  var qs=new URLSearchParams(location.search);
  var lang  = qs.get("lang")  || localStorage.getItem("gd_lang")  || "en";
  var style = qs.get("style") || localStorage.getItem("gd_style") || "informal";
  var time  = qs.get("time")  || localStorage.getItem("gd_time")  || "now";
  var depth = qs.get("depth") || localStorage.getItem("gd_depth") || "explore"; // explore|learn

  if(lang!=="en" && lang!=="zh" && lang!=="es") lang="en";
  if(style!=="informal" && style!=="formal") style="informal";
  if(time!=="origin" && time!=="now" && time!=="post") time="now";
  if(depth!=="explore" && depth!=="learn") depth="explore";

  try{
    localStorage.setItem("gd_lang",lang);
    localStorage.setItem("gd_style",style);
    localStorage.setItem("gd_time",time);
    localStorage.setItem("gd_depth",depth);
  }catch(e){}

  document.documentElement.lang = (lang==="zh") ? "zh" : (lang==="es" ? "es" : "en");

  // Lens mapping: narrative=explore, engineering=learn
  var lens = (depth==="learn") ? "engineering" : "narrative";

  function q(over){
    var L=(over&&over.lang)?over.lang:lang;
    var S=(over&&over.style)?over.style:style;
    var T=(over&&over.time)?over.time:time;
    var D=(over&&over.depth)?over.depth:depth;
    return "?lang="+encodeURIComponent(L)+"&style="+encodeURIComponent(S)+"&time="+encodeURIComponent(T)+"&depth="+encodeURIComponent(D);
  }

  // Wire nav with state carry
  function wire(id,path){
    var el=document.getElementById(id);
    if(el) el.href = path + q();
  }
  wire("btnBack","/research/");
  wire("btnIndex","/index.html");
  wire("dockIndex","/index.html");
  wire("dockExplore","/explore/");
  wire("dockProducts","/products/");
  wire("dockLaws","/laws/");

  // Language toggle reload same pathname
  function setLang(next){
    if(next!=="en" && next!=="zh" && next!=="es") next="en";
    lang=next;
    try{ localStorage.setItem("gd_lang",lang);}catch(e){}
    window.location.href = window.location.pathname + q({lang:lang});
  }
  document.getElementById("btnEN").addEventListener("click", function(){ setLang("en"); }, {passive:true});
  document.getElementById("btnZH").addEventListener("click", function(){ setLang("zh"); }, {passive:true});
  document.getElementById("btnES").addEventListener("click", function(){ setLang("es"); }, {passive:true});

  // Lens toggle (depth only; no new keys)
  var pillNarr=document.getElementById("pillNarrative");
  var pillEng=document.getElementById("pillEngineering");
  function paintLens(){
    pillNarr.classList.toggle("active", lens==="narrative");
    pillEng.classList.toggle("active", lens==="engineering");
    pillNarr.textContent = (lang==="zh")?"通俗":"NARRATIVE";
    pillEng.textContent  = (lang==="zh")?"工程":"ENGINEERING";
    if(lang==="es"){ pillNarr.textContent="NARRATIVO"; pillEng.textContent="INGENIERÍA"; }
  }
  function setLens(next){
    lens = (next==="engineering") ? "engineering" : "narrative";
    depth = (lens==="engineering") ? "learn" : "explore";
    try{ localStorage.setItem("gd_depth",depth);}catch(e){}
    // update URL without losing other state
    window.location.href = window.location.pathname + q({depth:depth});
  }
  pillNarr.addEventListener("click", function(){ setLens("narrative"); });
  pillEng.addEventListener("click", function(){ setLens("engineering"); });

  // Copy helper
  function P(en,zh,es){ return {en:en, zh:zh, es:es}; }
  function pick(o){ return (lang==="zh")?o.zh:(lang==="es")?(o.es||o.en):o.en; }

  // Header copy
  var HEAD={
    en:{
      p0:"This page extracts engineering innovation patterns across mature construction-system verticals (HVAC, roofing, insulation, fenestration, plumbing, rainwater management). It is research context only.",
      note0:"No rankings. No product comparisons. No endorsement or affiliation implied. Plain-text references only."
    },
    zh:{
      p0:"本页提取成熟建筑系统领域（暖通、屋面、保温、门窗、管道、雨水管理）中的工程创新模式。仅作研究背景参考。",
      note0:"不排名、不对比、不背书、不暗示合作。仅纯文本引用。"
    },
    es:{
      p0:"Esta página extrae patrones de innovación de ingeniería en verticales maduros (HVAC, techos, aislamiento, ventanas, plomería, gestión de lluvia). Solo contexto de investigación.",
      note0:"Sin rankings, sin comparaciones, sin respaldo ni afiliación. Solo referencias en texto."
    }
  };
  var H=HEAD[lang]||HEAD.en;
  document.getElementById("p0").textContent=H.p0;
  document.getElementById("note0").textContent=H.note0;

  if(lang==="zh"){
    document.getElementById("k0").textContent="研究 · 行业背景";
    document.getElementById("h0").textContent="工程主导的施工基准（结构化案例）";
  }else if(lang==="es"){
    document.getElementById("k0").textContent="INVESTIGACIÓN · CONTEXTO INDUSTRIAL";
    document.getElementById("h0").textContent="Referencias de construcción dirigidas por ingeniería (casos estructurados)";
  }

  // ===== Sections (ALL companies included) =====
  // Each bubble has BOTH lens texts; we show one based on lens.
  var SECTIONS=[
    {
      t:P("Innovation Pattern (used across the site)","创新模式（全站使用）","Patrón de innovación (usado en el sitio)"),
      s:P("Constraint → Test → Standardize → Scale (with containment).","约束→测试→标准化→扩张（含隔离）。","Restricción → Prueba → Estandarizar → Escalar (con contención)."),
      leafguard:false,
      bubbles:[
        {h:P("Concept","概念","Concepto"),
         narrative:P(
          "Innovation is treated as a repeatable cycle: find the real failure point, fix it without guessing, prove it under stress, then standardize the install so it stays stable at scale.",
          "创新被视为可重复循环：找到真实失效点，不靠猜修正，在压力下证明，然后标准化安装，使规模化仍稳定。",
          "La innovación es un ciclo repetible: detectar el fallo real, corregir sin adivinar, probar bajo estrés y estandarizar la instalación."
         ),
         engineering:P(
          "Cycle: isolate boundary → bounded redesign → verification under variance → interface standardization → scale with containment.",
          "循环：隔离边界→有界再设计→方差下验证→接口标准化→带隔离扩张。",
          "Ciclo: aislar límite → rediseño acotado → verificación bajo variación → estandarizar interfaz → escalar con contención."
         )},
        {h:P("Why it’s structured this way","为什么这样结构化","Por qué está estructurado así"),
         narrative:P(
          "This page is split into bubbles so you can read fast: domain scope, the innovation pattern, and the benchmarks referenced — without clutter.",
          "本页用气泡分块便于快速阅读：领域范围、创新模式、引用基准，减少杂乱。",
          "Se divide en burbujas para leer rápido: alcance, patrón y referencias, sin desorden."
         ),
         engineering:P(
          "Structure reduces cognitive load: scope → mechanism → references. No rankings. No claims beyond context.",
          "结构降低认知负荷：范围→机制→引用。无排名。无超出背景的主张。",
          "La estructura reduce carga: alcance → mecanismo → referencias. Sin rankings. Sin afirmaciones fuera de contexto."
         )}
      ]
    },

    {
      t:P("HVAC (Carrier / Trane / Lennox)","暖通（Carrier / Trane / Lennox）","HVAC (Carrier / Trane / Lennox)"),
      s:P("Closed-loop climate control under thermodynamic constraints.","热力学约束下的闭环气候控制。","Control climático en bucle cerrado bajo restricciones termodinámicas."),
      leafguard:false,
      bubbles:[
        {h:P("Domain scope","领域范围","Alcance del dominio"),
         narrative:P(
          "HVAC is about keeping a house stable when the weather is not. Comfort is the result; control is the method.",
          "暖通是在天气不稳定时让房子保持稳定。舒适是结果，控制是方法。",
          "HVAC mantiene estable la casa cuando el clima no lo es. Confort es el resultado; control es el método."
         ),
         engineering:P(
          "Control variables: temperature, humidity, airflow, energy throughput under varying external load. Maturity appears as stable envelopes and testable thresholds.",
          "控制变量：温度、湿度、风量、能量吞吐在外部负载变化下保持稳定。成熟体现为稳定包络与可测试阈值。",
          "Variables: temperatura, humedad, flujo de aire, energía bajo carga variable. Madurez = envolventes estables y umbrales testeables."
         )},
        {h:P("Innovation pattern","创新模式","Patrón de innovación"),
         narrative:P(
          "Leaders shrink failure: fewer surprises, clearer controls, and consistent service outcomes.",
          "领导者压缩失效：更少意外、更清晰控制、更一致的维护结果。",
          "Los líderes reducen fallos: menos sorpresas, control claro y servicio consistente."
         ),
         engineering:P(
          "Cycle: identify inefficiency/failure mode → redesign component/control logic → verify across seasonal variance → standardize install/service interfaces → scale.",
          "循环：识别低效/失效模式→重设计部件/控制逻辑→跨季节方差验证→标准化安装/维护接口→扩张。",
          "Ciclo: detectar ineficiencia/fallo → rediseñar componente/control → verificar por variación estacional → estandarizar interfaces → escalar."
         )},
        {h:P("Benchmarks referenced","引用基准","Referencias"),
         narrative:P(
          "Carrier, Trane, and Lennox are referenced as mature examples of engineered climate control systems.",
          "Carrier、Trane、Lennox 被引用为成熟的工程化气候控制系统例子。",
          "Carrier, Trane y Lennox se citan como ejemplos maduros de control climático."
         ),
         engineering:P(
          "Carrier — HVAC system innovation. Trane — mechanical cooling systems. Lennox — furnace and climate systems.",
          "Carrier—暖通系统创新。Trane—机械制冷系统。Lennox—炉具与气候系统。",
          "Carrier—innovación HVAC. Trane—enfriamiento mecánico. Lennox—hornos y clima."
         )}
      ]
    },

  // ===== Render accordion + nested bubbles =====
  var stack=document.getElementById("stack");

  function closeAllCards(){
    var cards=stack.querySelectorAll(".card");
    for(var i=0;i<cards.length;i++){
      cards[i].classList.remove("open");
      var c=cards[i].querySelector(".chev");
      if(c) c.textContent="▸";
    }
  }

  function makeLensPara(narr, eng){
    var wrap=document.createElement("div");
    var pn=document.createElement("p");
    pn.setAttribute("data-lens","narrative");
    pn.textContent=narr;
    var pe=document.createElement("p");
    pe.setAttribute("data-lens","engineering");
    pe.textContent=eng;
    wrap.appendChild(pn);
    wrap.appendChild(pe);
    return wrap;
  }

  function showLensIn(node){
    node.querySelectorAll("[data-lens]").forEach(function(el){
      el.classList.remove("show");
      var k=el.getAttribute("data-lens");
      if(k===lens) el.classList.add("show");
    });
  }

  function makeBubble(hText, narrText, engText, leaf){
    var b=document.createElement("div");
    b.className="bubble" + (leaf ? " leafGuardCard" : "");
    b.setAttribute("role","button");
    b.tabIndex=0;

    var h=document.createElement("h4");
    h.textContent=hText;

    // add highlight tag for LeafGuard domain scope bubble (visual only)
    if(leaf && (hText.toLowerCase().indexOf("domain scope")===0 || hText.indexOf("领域范围")===0 || hText.toLowerCase().indexOf("alcance")===0)){
      var tag=document.createElement("span");
      tag.className="leafGuardTag";
      tag.textContent=(lang==="zh")?"重点":(lang==="es")?"DESTACADO":"HIGHLIGHT";
      h.appendChild(tag);
    }

    var pWrap=makeLensPara(narrText, engText);

    b.appendChild(h);
    b.appendChild(pWrap);

    function closeSiblings(){
      var sib=b.parentElement ? b.parentElement.querySelectorAll(".bubble") : [];
      for(var i=0;i<sib.length;i++){
        if(sib[i]!==b) sib[i].classList.remove("open");
      }
    }

    function act(){
      var willOpen=!b.classList.contains("open");
      closeSiblings();
      b.classList.toggle("open", willOpen);
      showLensIn(b);
    }

    b.addEventListener("click", act, {passive:true});
    b.addEventListener("keydown", function(e){
      if(e.key==="Enter"||e.key===" "){ e.preventDefault(); act(); }
    });

    // Ensure lens is applied even when closed/open
    showLensIn(b);
    return b;
  }

  function makeCard(sec, idx){
    var card=document.createElement("div");
    card.className="card" + (sec.leafguard ? " leafGuardCard" : "");

    var head=document.createElement("div");
    head.className="head";
    head.setAttribute("role","button");
    head.tabIndex=0;

    var left=document.createElement("div");
    left.style.minWidth="0";

    var ti=document.createElement("div");
    ti.className="ti";
    ti.textContent=pick(sec.t);

    var si=document.createElement("div");
    si.className="si";
    si.textContent=pick(sec.s);

    left.appendChild(ti);
    left.appendChild(si);

    var chev=document.createElement("div");
    chev.className="chev";
    chev.textContent="▸";

    head.appendChild(left);
    head.appendChild(chev);

    var body=document.createElement("div");
    body.className="body";

    var bubbles=document.createElement("div");
    bubbles.className="subBubbles";

    (sec.bubbles||[]).forEach(function(bb){
      bubbles.appendChild(
        makeBubble(
          pick(bb.h),
          pick(bb.narrative),
          pick(bb.engineering),
          !!sec.leafguard
        )
      );
    });

    body.appendChild(bubbles);

    function toggle(){
      var isOpen=card.classList.contains("open");
      if(isOpen){
        card.classList.remove("open");
        chev.textContent="▸";
        return;
      }
      closeAllCards();
      card.classList.add("open");
      chev.textContent="▾";
      // close all sub-bubbles when opening card (less clutter)
      body.querySelectorAll(".bubble").forEach(function(b){ b.classList.remove("open"); showLensIn(b); });
    }

    head.addEventListener("click", toggle, {passive:true});
    head.addEventListener("keydown", function(e){
      if(e.key==="Enter"||e.key===" "){ e.preventDefault(); toggle(); }
    });

    card.appendChild(head);
    card.appendChild(body);

    if(idx===0){
      card.classList.add("open");
      chev.textContent="▾";
    }

    return card;
  }

  // Render
  SECTIONS.forEach(function(sec,i){ stack.appendChild(makeCard(sec,i)); });

  // Paint lens pills
  paintLens();

})();
