<!-- /products/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Products Field</title>
  <meta
    name="description"
    content="Thirty-two points distributed by Fibonacci growth, rotated into a diamond-relative field, grouped by North, South, East, and West."
  />
  <style>
    :root{
      --bg:#030814;
      --bg-2:#071224;
      --panel:#0a1528cc;
      --line:rgba(138,166,255,.18);
      --line-strong:rgba(168,196,255,.32);
      --text:#eaf1ff;
      --muted:#9fb0d6;
      --north:#dfe9ff;
      --south:#8ee3ac;
      --east:#8ec5ff;
      --west:#ffd58a;
      --danger:#ff7d7d;
      --shadow:0 18px 64px rgba(0,0,0,.45);
      --radius:28px;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      color:var(--text);
      font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:
        radial-gradient(circle at 50% 24%, rgba(68,106,196,.22), transparent 24%),
        radial-gradient(circle at 50% 48%, rgba(38,74,154,.14), transparent 28%),
        linear-gradient(180deg, #020611 0%, #051022 45%, #020611 100%);
      overflow-x:hidden;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      opacity:.16;
      background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,.35) 0 1px, transparent 1.5px),
        radial-gradient(circle at 72% 30%, rgba(255,255,255,.22) 0 1px, transparent 1.5px),
        radial-gradient(circle at 38% 72%, rgba(255,255,255,.2) 0 1px, transparent 1.5px),
        radial-gradient(circle at 84% 84%, rgba(255,255,255,.18) 0 1px, transparent 1.5px);
      background-size: 260px 260px, 340px 340px, 420px 420px, 560px 560px;
    }

    #productsPage{
      width:min(1180px,calc(100vw - 28px));
      margin:0 auto;
      padding:28px 0 44px;
    }

    .hero{
      position:relative;
      padding:26px 22px 22px;
      border:1px solid var(--line);
      border-radius:calc(var(--radius) + 4px);
      background:linear-gradient(180deg, rgba(8,18,38,.86), rgba(6,13,26,.78));
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .hero::after{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      background:
        linear-gradient(90deg, transparent, rgba(255,255,255,.04), transparent),
        radial-gradient(circle at 50% 0%, rgba(126,160,255,.15), transparent 34%);
      mix-blend-mode:screen;
    }

    .eyebrow{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 12px;
      border:1px solid var(--line);
      border-radius:999px;
      color:#c8d8ff;
      letter-spacing:.12em;
      font-size:.72rem;
      text-transform:uppercase;
      background:rgba(11,23,44,.65);
    }

    .hero h1{
      margin:14px 0 10px;
      font-size:clamp(2rem,4.4vw,3.35rem);
      line-height:1.02;
      letter-spacing:-.03em;
    }

    .hero p{
      max-width:760px;
      margin:0;
      color:var(--muted);
      font-size:clamp(1rem,2vw,1.28rem);
      line-height:1.55;
    }

    .filters{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      margin:22px 0 0;
    }

    .filter-chip{
      appearance:none;
      border:1px solid var(--line);
      background:rgba(9,18,36,.72);
      color:#d7e3ff;
      border-radius:999px;
      padding:12px 18px;
      min-width:122px;
      font-weight:700;
      letter-spacing:.1em;
      text-transform:uppercase;
      cursor:pointer;
      transition:transform .16s ease, border-color .16s ease, background .16s ease, box-shadow .16s ease;
      box-shadow:0 8px 24px rgba(0,0,0,.22), inset 0 0 0 1px rgba(255,255,255,.02);
    }

    .filter-chip:hover,
    .filter-chip:focus-visible{
      transform:translateY(-1px);
      outline:none;
      border-color:var(--line-strong);
      background:rgba(13,26,50,.9);
    }

    .filter-chip.is-active{
      border-color:rgba(205,220,255,.42);
      background:linear-gradient(180deg, rgba(24,40,74,.94), rgba(12,24,46,.94));
      box-shadow:0 0 0 1px rgba(188,210,255,.1), 0 10px 28px rgba(0,0,0,.28);
    }

    .filter-chip .dot{
      display:inline-block;
      inline-size:12px;
      block-size:12px;
      border-radius:50%;
      margin-right:10px;
      box-shadow:0 0 14px currentColor;
      vertical-align:-1px;
    }

    #productsGrid{
      margin-top:20px;
    }

    #productsEmptyState{
      display:none;
      margin-top:18px;
      padding:16px 18px;
      border:1px dashed var(--line);
      border-radius:18px;
      background:rgba(8,16,30,.6);
      color:var(--muted);
    }

    .products-shell{
      display:grid;
      grid-template-columns:minmax(0,1.45fr) minmax(300px,.85fr);
      gap:20px;
      align-items:start;
    }

    .door-panel,
    .detail-panel{
      border:1px solid var(--line);
      border-radius:32px;
      background:linear-gradient(180deg, rgba(8,18,38,.88), rgba(5,12,24,.86));
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .door-panel{
      padding:16px;
    }

    .detail-panel{
      padding:22px;
      position:sticky;
      top:18px;
    }

    .section-header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:18px;
      margin-bottom:14px;
      padding:6px 6px 2px;
    }

    .section-title{
      margin:0;
      font-size:1.02rem;
      letter-spacing:.14em;
      text-transform:uppercase;
      color:#d7e2ff;
    }

    .section-meta{
      color:var(--muted);
      font-size:.88rem;
      text-transform:uppercase;
      letter-spacing:.12em;
      white-space:nowrap;
    }

    .door-stage{
      position:relative;
      min-height:min(76vw,980px);
      border:1px solid rgba(113,141,224,.14);
      border-radius:32px;
      background:
        radial-gradient(circle at 50% 44%, rgba(88,123,216,.2), transparent 18%),
        linear-gradient(180deg, rgba(4,10,22,.86), rgba(2,8,18,.96));
      overflow:hidden;
      isolation:isolate;
    }

    .door-stage::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        linear-gradient(180deg, transparent, rgba(255,255,255,.02), transparent),
        repeating-linear-gradient(0deg, rgba(255,255,255,.03) 0 1px, transparent 1px 78px),
        repeating-linear-gradient(90deg, rgba(255,255,255,.02) 0 1px, transparent 1px 78px);
      opacity:.3;
      pointer-events:none;
    }

    .door-frame{
      position:relative;
      width:min(100%,760px);
      margin:18px auto 82px;
      aspect-ratio:5/7.4;
      filter:drop-shadow(0 32px 60px rgba(0,0,0,.48));
    }

    .door-arch{
      position:absolute;
      inset:0;
      border-radius:360px 360px 42px 42px / 300px 300px 42px 42px;
      border:1px solid rgba(157,181,255,.3);
      background:
        linear-gradient(180deg, rgba(15,28,58,.82), rgba(6,14,28,.88)),
        radial-gradient(circle at 50% 26%, rgba(111,149,255,.12), transparent 34%);
      overflow:hidden;
    }

    .door-arch::before{
      content:"";
      position:absolute;
      inset:22px;
      border-radius:320px 320px 32px 32px / 260px 260px 32px 32px;
      border:1px solid rgba(156,180,255,.22);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.02),
        inset 0 -24px 48px rgba(0,0,0,.22),
        0 0 80px rgba(67,106,206,.12);
    }

    .door-arch::after{
      content:"";
      position:absolute;
      inset:52px 18%;
      border-radius:280px 280px 28px 28px / 240px 240px 28px 28px;
      background:
        radial-gradient(circle at 50% 40%, rgba(87,120,208,.28), transparent 28%),
        linear-gradient(180deg, rgba(8,20,40,.2), rgba(5,9,18,.4));
      box-shadow:
        inset 0 0 0 1px rgba(177,196,255,.14),
        inset 0 0 72px rgba(74,111,209,.16);
    }

    .door-seam{
      position:absolute;
      top:8.5%;
      bottom:7%;
      left:50%;
      width:1px;
      transform:translateX(-50%);
      background:
        linear-gradient(180deg, transparent, rgba(220,230,255,.55), transparent);
      opacity:.82;
      z-index:2;
    }

    .door-points{
      position:absolute;
      inset:0;
      z-index:3;
    }

    .door-node{
      position:absolute;
      left:var(--x);
      top:var(--y);
      transform:translate(-50%,-50%);
      width:18px;
      height:18px;
      border-radius:50%;
      border:1px solid rgba(255,255,255,.72);
      background:var(--color);
      box-shadow:
        0 0 0 5px rgba(255,255,255,.04),
        0 0 18px var(--glow),
        0 0 36px var(--glow);
      cursor:pointer;
      transition:transform .16s ease, opacity .16s ease, box-shadow .16s ease, filter .16s ease;
      z-index:4;
    }

    .door-node::after{
      content:attr(data-short);
      position:absolute;
      top:calc(100% + 10px);
      left:50%;
      transform:translateX(-50%);
      font-size:.64rem;
      letter-spacing:.12em;
      text-transform:uppercase;
      color:#d9e5ff;
      white-space:nowrap;
      opacity:.72;
      pointer-events:none;
    }

    .door-node:hover,
    .door-node:focus-visible{
      transform:translate(-50%,-50%) scale(1.16);
      outline:none;
      box-shadow:
        0 0 0 6px rgba(255,255,255,.06),
        0 0 20px var(--glow),
        0 0 54px var(--glow);
    }

    .door-node.is-active{
      transform:translate(-50%,-50%) scale(1.24);
      box-shadow:
        0 0 0 7px rgba(255,255,255,.08),
        0 0 26px var(--glow),
        0 0 72px var(--glow);
    }

    .door-node.is-muted{
      opacity:.18;
      filter:saturate(.4);
    }

    .door-footer{
      position:absolute;
      left:50%;
      bottom:24px;
      transform:translateX(-50%);
      width:min(84%,500px);
      padding:16px 22px;
      border-radius:999px;
      border:1px solid rgba(130,160,240,.24);
      background:rgba(6,14,28,.76);
      text-align:center;
      letter-spacing:.16em;
      text-transform:uppercase;
      color:#d9e3ff;
      box-shadow:0 12px 32px rgba(0,0,0,.28), inset 0 0 0 1px rgba(255,255,255,.02);
      z-index:5;
    }

    .door-footer strong{
      font-weight:800;
      color:#ffffff;
    }

    .detail-panel h2{
      margin:0 0 10px;
      font-size:1.4rem;
      line-height:1.08;
      letter-spacing:-.02em;
    }

    .detail-panel p{
      margin:0 0 16px;
      color:var(--muted);
      line-height:1.6;
    }

    .detail-kicker{
      display:flex;
      align-items:center;
      gap:10px;
      margin-bottom:10px;
      color:#d7e3ff;
      letter-spacing:.14em;
      text-transform:uppercase;
      font-size:.74rem;
    }

    .detail-kicker .badge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:36px;
      height:24px;
      padding:0 10px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.04);
      color:#ffffff;
    }

    .detail-stats{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:12px;
      margin-top:18px;
    }

    .stat{
      padding:14px 14px 13px;
      border-radius:18px;
      border:1px solid var(--line);
      background:rgba(8,18,34,.62);
    }

    .stat-label{
      display:block;
      margin-bottom:6px;
      color:#90a3ce;
      font-size:.72rem;
      letter-spacing:.12em;
      text-transform:uppercase;
    }

    .stat-value{
      color:#f4f7ff;
      font-size:1rem;
      font-weight:700;
    }

    .legend{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:10px;
      margin-top:18px;
    }

    .legend-item{
      display:flex;
      align-items:center;
      gap:10px;
      padding:12px 12px;
      border-radius:16px;
      border:1px solid var(--line);
      background:rgba(8,18,34,.5);
      color:#cbd8f7;
      font-size:.9rem;
    }

    .legend-dot{
      width:12px;
      height:12px;
      border-radius:50%;
      flex:none;
      box-shadow:0 0 14px currentColor;
    }

    .subtle{
      margin-top:16px;
      font-size:.88rem;
      color:#8fa2cf;
    }

    @media (max-width: 980px){
      .products-shell{
        grid-template-columns:1fr;
      }

      .detail-panel{
        position:static;
      }

      .door-stage{
        min-height:860px;
      }
    }

    @media (max-width: 680px){
      #productsPage{
        width:min(100vw - 18px, 1180px);
        padding:18px 0 28px;
      }

      .hero{
        padding:20px 16px 18px;
      }

      .door-panel{
        padding:10px;
      }

      .door-stage{
        min-height:720px;
      }

      .door-frame{
        margin:14px auto 76px;
        width:100%;
      }

      .door-node{
        width:15px;
        height:15px;
      }

      .door-node::after{
        font-size:.56rem;
      }

      .door-footer{
        width:min(90%, 420px);
        padding:14px 18px;
        font-size:.8rem;
      }

      .detail-stats,
      .legend{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>
<body>
  <main id="productsPage">
    <section class="hero" aria-labelledby="productsTitle">
      <span class="eyebrow">Products Chamber · Symmetric Door</span>
      <h1 id="productsTitle">Products field</h1>
      <p>
        Thirty-two points distributed by Fibonacci growth, rotated into a diamond-relative field,
        grouped by North, South, East, and West — now expressed as an elegant balanced door rather
        than a collapsed window.
      </p>

      <div class="filters" id="cardinalFilters" aria-label="Filter products by cardinal direction">
        <button class="filter-chip is-active" type="button" data-filter="all">
          <span class="dot" style="color:#cdd8f5;background:#cdd8f5;"></span>All
        </button>
        <button class="filter-chip" type="button" data-filter="north">
          <span class="dot" style="color:var(--north);background:var(--north);"></span>North
        </button>
        <button class="filter-chip" type="button" data-filter="south">
          <span class="dot" style="color:var(--south);background:var(--south);"></span>South
        </button>
        <button class="filter-chip" type="button" data-filter="east">
          <span class="dot" style="color:var(--east);background:var(--east);"></span>East
        </button>
        <button class="filter-chip" type="button" data-filter="west">
          <span class="dot" style="color:var(--west);background:var(--west);"></span>West
        </button>
      </div>
    </section>

    <section id="productsGrid" aria-live="polite"></section>
    <div id="productsEmptyState">No points are visible for this filter.</div>
  </main>

  <script type="module" src="./index.js"></script>
</body>
</html>
