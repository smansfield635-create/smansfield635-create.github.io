<!doctype html>
<!-- TNT — /explore/frontier/vision/index.html
     FRONTIER · VISION REMOTE (INFORMAL LAYER — NEW STANDARD · UO GLOSS · DIAL FACE UPGRADE)
     UPGRADE (MATCH COMPASS STANDARD):
       - Add instrument-grade dial face (anti-snowflake) behind geometry (no body override)
       - Keep UO gloss + gold inlay aligned to diamond (no flat orthogonal grid)
       - Hover = glow only (NO movement)
       - Hierarchical diamond sizing + radii (same concept as Compass):
           CORE = largest (center)
           Cardinals (N/E/S/W) = next largest, closer to center
           Diagonals (NE/SE/SW/NW) = smaller, medium radius
           Other 8 (NNE/ENE/ESE/SSE/SSW/WSW/WNW/NNW) = smallest, outer radius
     GEOMETRY (LOCKED):
       - 16 outer controls (N, NNE, NE, ENE, E, ESE, SE, SSE, S, SSW, SW, WSW, W, WNW, NW, NNW)
       - 1 center CORE (manual index / linear map)
       - 2 bottom controls: EXIT → /door/  |  HUB → /index.html
     UI (LOCKED):
       - Trilingual UI (EN/中文/ES) (no reload)
       - Visible lens ONLY: lane=platform|engineering (URL-only; never stored) (no reload)
       - Pinned informal layer: gd_style=informal, gd_depth=explore
       - Canon carry: gd_lang/gd_style/gd_time/gd_depth only (NO new gd_* keys)
       - No modals/overlays; no inline onclick; addEventListener only
     ROUTING (EDIT ONLY IN ROUTE MAP SECTION):
       - CORE path + each of 16 manifold paths
-->

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>FRONTIER · VISION REMOTE</title>

<link rel="stylesheet" href="/assets/ui.css"/>
<link rel="stylesheet" href="/assets/branch.css"/>

<style>
a{color:inherit;text-decoration:none}
body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:#fff}
body::before,body::after{pointer-events:none!important}

:root{
  --D0:154px;
  --D1:112px;
  --D2:92px;
  --D3:80px;

  --R1:178px;
  --R2:246px;
  --R3:300px;

  --padTop:118px;

  --ink:rgba(255,255,255,.94);

  --onyx0:rgba(6,8,10,.96);
  --onyx1:rgba(10,12,16,.86);

  --crimson:rgba(120,0,22,.40);
  --festival:rgba(255,43,43,.22);
  --opalV:rgba(90,40,120,.14);

  --gold:rgba(201,162,74,.56);
  --goldGlow:rgba(201,162,74,.22);

  --shadowDeep:0 44px 140px rgba(0,0,0,.82);
  --shadowC:0 18px 60px rgba(0,0,0,.55);
}

.stage{
  position:relative;
  width:min(980px,95vw);
  height:min(980px,82vh);
  margin:var(--padTop) auto 0;
  pointer-events:none;
}

.slab{
  position:absolute;left:50%;top:50%;
  width:min(820px,92vw);
  height:min(820px,92vw);
  transform:translate(-50%,-50%) rotate(45deg);
  border-radius:72px;
  pointer-events:none;
  opacity:.16;
  border:1px solid rgba(255,255,255,.10);
  background:
    radial-gradient(circle at 30% 25%, rgba(255,255,255,.08), transparent 55%),
    radial-gradient(circle at 70% 80%, var(--opalV), transparent 60%),
    radial-gradient(circle at 50% 55%, var(--crimson), transparent 72%),
    linear-gradient(160deg, rgba(10,12,16,.55) 0%, rgba(6,8,10,.78) 70%);
  box-shadow:
    0 90px 260px rgba(0,0,0,.52),
    inset 0 2px 0 rgba(255,255,255,.10),
    inset 0 -50px 90px rgba(0,0,0,.55);
}

.dialFace{
  position:absolute;
  left:50%;top:50%;
  transform:translate(-50%,-50%);
  width:min(860px,92vw);
  height:min(860px,92vw);
  border-radius:999px;
  pointer-events:none;
  overflow:hidden;
  z-index:1;
}
.dialFace::before{
  content:"";
  position:absolute;inset:0;border-radius:999px;
  background:
    radial-gradient(circle at 50% 45%,
      rgba(255,255,255,.06),
      rgba(0,0,0,.18) 58%,
      rgba(0,0,0,.46) 78%,
      rgba(0,0,0,.00) 92%),
    radial-gradient(circle at 50% 50%, rgba(201,162,74,.10), transparent 62%),
    radial-gradient(circle at 50% 50%, rgba(255,43,43,.08), transparent 66%),
    linear-gradient(180deg, rgba(0,0,0,.10), rgba(0,0,0,.00));
  box-shadow:
    inset 0 0 0 2px rgba(255,255,255,.06),
    inset 0 0 0 10px rgba(0,0,0,.10),
    inset 0 0 70px rgba(0,0,0,.45),
    0 50px 180px rgba(0,0,0,.35);
  opacity:.92;
}
.dialFace::after{
  content:"";
  position:absolute;inset:-16%;
  background:
    radial-gradient(circle at 50% 50%, transparent 0 36%, rgba(255,255,255,.06) 36% 36.6%, transparent 37% 100%),
    radial-gradient(circle at 50% 50%, transparent 0 52%, rgba(255,255,255,.06) 52% 52.6%, transparent 53% 100%),
    radial-gradient(circle at 50% 50%, transparent 0 69%, rgba(255,255,255,.06) 69% 69.6%, transparent 70% 100%),
    linear-gradient(90deg, transparent 0 49.7%, rgba(201,162,74,.10) 49.7% 50.3%, transparent 50.3% 100%),
    linear-gradient(0deg,  transparent 0 49.7%, rgba(201,162,74,.10) 49.7% 50.3%, transparent 50.3% 100%),
    repeating-conic-gradient(from 45deg at 50% 50%,
      rgba(201,162,74,.06) 0 1.2deg,
      transparent 1.2deg 7.5deg),
    radial-gradient(circle at 50% 50%, rgba(255,255,255,.04), transparent 62%);
  filter:blur(.25px);
  opacity:.78;
  mask: radial-gradient(circle at 50% 50%, transparent 0 18%, #000 20% 100%);
  -webkit-mask: radial-gradient(circle at 50% 50%, transparent 0 18%, #000 20% 100%);
}

.d{
  position:absolute;
  left:50%;
  top:50%;
  width:var(--D3);
  height:var(--D3);
  transform:translate(-50%,-50%) rotate(45deg);
  border-radius:18px;
  cursor:pointer;
  pointer-events:auto;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
  overflow:hidden;
  z-index:5;
  background:
    radial-gradient(circle at 20% 18%, rgba(255,255,255,.28), transparent 46%),
    radial-gradient(circle at 78% 22%, var(--festival), transparent 62%),
    radial-gradient(circle at 74% 84%, var(--opalV), transparent 64%),
    radial-gradient(circle at 28% 84%, var(--crimson), transparent 70%),
    linear-gradient(160deg, var(--onyx1), var(--onyx0));
  border:1px solid rgba(255,255,255,.16);
  box-shadow:
    var(--shadowDeep),
    0 0 28px rgba(255,43,43,.10),
    inset 0 2px 0 rgba(255,255,255,.18),
    inset 0 -44px 84px rgba(0,0,0,.84);
  transition:box-shadow .16s ease, border-color .16s ease, filter .16s ease;
}
.d::before{
  content:"";
  position:absolute;inset:0;border-radius:inherit;pointer-events:none;
  box-shadow: inset 0 0 0 1px rgba(201,162,74,.20);
  background:
    repeating-linear-gradient(45deg, rgba(201,162,74,.09) 0 1px, transparent 1px 18px),
    repeating-linear-gradient(-45deg, rgba(201,162,74,.07) 0 1px, transparent 1px 18px);
  opacity:.42;
  mask:
    radial-gradient(circle at 50% 50%, transparent 0 70%, #000 78% 100%),
    linear-gradient(#000,#000);
  -webkit-mask:
    radial-gradient(circle at 50% 50%, transparent 0 70%, #000 78% 100%),
    linear-gradient(#000,#000);
}
.d::after{
  content:"";
  position:absolute;left:12%;right:12%;top:10%;
  height:32%;
  border-radius:999px;
  background:linear-gradient(to bottom, rgba(255,255,255,.18), rgba(255,255,255,0));
  transform:rotate(-12deg);
  pointer-events:none;
  opacity:.92;
}
.d:hover{
  border-color:rgba(201,162,74,.34);
  box-shadow:
    var(--shadowDeep),
    0 0 0 2px rgba(201,162,74,.14),
    0 0 28px rgba(201,162,74,.18),
    0 0 44px rgba(201,162,74,.10),
    inset 0 2px 0 rgba(255,255,255,.22),
    inset 0 -46px 86px rgba(0,0,0,.88);
}
.d:active{filter:brightness(.985)}

.d.core{width:var(--D0);height:var(--D0);border-radius:26px;z-index:10}
.d.l1{width:var(--D1);height:var(--D1);border-radius:22px}
.d.l2{width:var(--D2);height:var(--D2);border-radius:20px}
.d.l3{width:var(--D3);height:var(--D3);border-radius:18px}

.inner{
  transform:rotate(-45deg);
  width:100%;height:100%;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  text-align:center;
  padding:6px;
  user-select:none;
  pointer-events:none;
}
.word{
  font-weight:980;
  font-size:11.5px;
  letter-spacing:.55px;
  color:var(--ink);
  text-shadow:0 0 18px rgba(0,0,0,.42);
  line-height:1.05;
}
.cardinal{
  margin-top:5px;
  font-size:9px;
  opacity:.78;
  letter-spacing:1.1px;
  color:rgba(255,255,255,.84);
}
.d.core .word{font-size:15px}
.d.core .cardinal{font-size:10px}
.d.l1 .word{font-size:13px}
.d.l2 .word{font-size:12px}

.top{
  position:fixed;top:16px;left:0;right:0;
  padding:0 16px;
  display:flex;justify-content:space-between;align-items:center;
  gap:12px;
  z-index:240;
  pointer-events:none;
}
.top .left,.top .right{
  display:flex;gap:10px;flex-wrap:wrap;align-items:center;white-space:nowrap;
  pointer-events:auto;
}
.dbtn{
  width:46px;height:46px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,.14);
  background:
    radial-gradient(circle at 50% 120%, rgba(201,162,74,.16), transparent 64%),
    linear-gradient(145deg, rgba(10,12,16,.78), rgba(6,8,10,.90));
  box-shadow:var(--shadowC);
  display:grid;place-items:center;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
  transform:rotate(45deg);
  position:relative;
  overflow:hidden;
  transition:box-shadow .16s ease, border-color .16s ease, filter .16s ease;
}
.dbtn::after{
  content:"";
  position:absolute;left:10px;right:10px;bottom:-12px;height:26px;
  background: radial-gradient(circle at 50% 0%, rgba(201,162,74,.30), transparent 72%);
  opacity:.55;pointer-events:none;
}
.dbtn:hover{
  border-color:rgba(201,162,74,.34);
  box-shadow:var(--shadowC), 0 0 0 2px rgba(201,162,74,.14), 0 0 26px rgba(201,162,74,.16);
}
.dbtn:active{transform:rotate(45deg) translateY(1px);filter:brightness(.985)}
.dbtn span{
  transform:rotate(-45deg);
  font-weight:980;
  font-size:12px;
  letter-spacing:.4px;
  color:var(--ink);
  user-select:none;
}
.dbtn.on{
  border-color:rgba(255,43,43,.26);
  box-shadow:var(--shadowC), 0 0 16px rgba(255,43,43,.12);
}

.corner{
  position:fixed;
  bottom:max(18px, env(safe-area-inset-bottom));
  z-index:240;
  pointer-events:none;
}
.corner .dbtn{pointer-events:auto}
.corner.left{left:18px}
.corner.right{right:18px}
.cornerLabel{
  margin-top:10px;
  text-align:center;
  color:rgba(255,255,255,.70);
  font-size:11px;
  letter-spacing:.4px;
}

@media (max-width:640px){
  :root{
    --D0:148px; --D1:108px; --D2:88px; --D3:78px;
    --R1:168px; --R2:234px; --R3:286px;
    --padTop:128px;
  }
  .word{font-size:11.25px}
}
@media (max-width:420px){
  :root{
    --D0:140px; --D1:104px; --D2:86px; --D3:76px;
    --R1:160px; --R2:224px; --R3:274px;
  }
  .word{font-size:11px}
}
</style>
</head>

<body>

<div class="top" aria-label="Top controls">
  <div class="left" aria-label="Language">
    <div class="dbtn on" id="langEN" role="button" tabindex="0" aria-label="English"><span>EN</span></div>
    <div class="dbtn" id="langZH" role="button" tabindex="0" aria-label="Chinese"><span>中文</span></div>
    <div class="dbtn" id="langES" role="button" tabindex="0" aria-label="Spanish"><span>ES</span></div>
  </div>

  <div class="right" aria-label="Lane">
    <div class="dbtn on" id="lanePlatform" role="button" tabindex="0" aria-label="Platform lane"><span>P</span></div>
    <div class="dbtn" id="laneEngineering" role="button" tabindex="0" aria-label="Engineering lane"><span>E</span></div>
  </div>
</div>

<div class="stage" id="stage" aria-label="Vision Remote">
  <div class="slab" aria-hidden="true"></div>
  <div class="dialFace" aria-hidden="true"></div>
</div>

<div class="corner left" aria-label="Exit">
  <div class="dbtn" id="btnExit" role="button" tabindex="0" aria-label="Exit to Door"><span>⟲</span></div>
  <div class="cornerLabel" id="lblExit">EXIT</div>
</div>

<div class="corner right" aria-label="Hub Jump">
  <div class="dbtn" id="btnHub" role="button" tabindex="0" aria-label="Hub Jump to Compass"><span>◆</span></div>
  <div class="cornerLabel" id="lblHub">HUB</div>
</div>

<script>
(function(){
  "use strict";

  var qs=new URLSearchParams(location.search);
  var LS=window.localStorage;

  var lang  = qs.get("lang")  || LS.getItem("gd_lang")  || "en";
  var time  = qs.get("time")  || LS.getItem("gd_time")  || "now";
  var lane  = qs.get("lane")  || "platform";

  var style = "informal";
  var depth = "explore";

  if(lang!=="en" && lang!=="zh" && lang!=="es") lang="en";
  if(time==="trajectory") time="post";
  if(time!=="origin" && time!=="now" && time!=="post") time="now";
  if(lane!=="platform" && lane!=="engineering") lane="platform";

  try{
    LS.setItem("gd_lang",lang);
    LS.setItem("gd_style","informal");
    LS.setItem("gd_time",time);
    LS.setItem("gd_depth","explore");
  }catch(e){}

  document.documentElement.lang = (lang==="zh")?"zh":(lang==="es")?"es":"en";

  function q(over){
    var p=new URLSearchParams();
    p.set("lang",(over&&over.lang)?over.lang:lang);
    p.set("style","informal");
    p.set("time",(over&&over.time)?over.time:time);
    p.set("depth","explore");
    var L=(over&&over.lane)?over.lane:lane;
    if(L==="platform"||L==="engineering") p.set("lane", L);
    return "?"+p.toString();
  }

  function go(path){
    window.location.href = path + q();
  }

  var ROUTE_CORE = "/explore/frontier/manual/";
  var ROUTE_EXIT = "/door/";
  var ROUTE_HUB  = "/index.html";

  var MANIFOLDS = [
    {code:"N",   href:"/explore/frontier/urban/",        p:{en:"CITIES",zh:"城市",es:"CIUDADES"},    e:{en:"URBAN",zh:"城市OS",es:"URB-OS"}},
    {code:"NNE", href:"/explore/frontier/shimmer/",      p:{en:"SHIMMER",zh:"闪烁",es:"SHIMMER"},   e:{en:"CLEAR",zh:"清晰",es:"CLAR"}},
    {code:"NE",  href:"/explore/frontier/water/",        p:{en:"WATER",zh:"水",es:"AGUA"},          e:{en:"H2O",zh:"水系",es:"H2O"}},
    {code:"ENE", href:"/explore/frontier/trajectory/",   p:{en:"TRAJ",zh:"轨迹",es:"TRAY"},         e:{en:"WIN",zh:"窗口",es:"VENT"}},
    {code:"E",   href:"/explore/frontier/energy/",       p:{en:"ENERGY",zh:"能源",es:"ENERGÍA"},    e:{en:"POWER",zh:"功率",es:"PWR"}},
    {code:"ESE", href:"/explore/frontier/waste/",        p:{en:"WASTE",zh:"废弃物",es:"RESID"},     e:{en:"ENTROPY",zh:"熵",es:"ENT"}},
    {code:"SE",  href:"/explore/frontier/closed-loop/",  p:{en:"HABITATS",zh:"栖息地",es:"HÁBIT"},  e:{en:"HAB",zh:"栖息",es:"HAB"}},
    {code:"SSE", href:"/explore/frontier/urban/",        p:{en:"URBAN",zh:"城市群",es:"URBANO"},    e:{en:"CLUSTER",zh:"集群",es:"CLUST"}},
    {code:"S",   href:"/explore/frontier/agri/",         p:{en:"AGRI",zh:"农业",es:"AGRO"},         e:{en:"FOOD",zh:"食物",es:"ALIM"}},
    {code:"SSW", href:"/explore/frontier/closed-loop/",  p:{en:"CLOSED",zh:"闭环",es:"CERRADO"},   e:{en:"NO-AWAY",zh:"无扔掉",es:"SIN"}},
    {code:"SW",  href:"/products/finance/",              p:{en:"FINANCE",zh:"金融",es:"FINANZ"},    e:{en:"CAPITAL",zh:"资本",es:"CAP"}},
    {code:"WSW", href:"/explore/infrastructure/grid-storage/", p:{en:"GRID",zh:"电网",es:"RED"},    e:{en:"BALANCE",zh:"平衡",es:"BAL"}},
    {code:"W",   href:"/explore/infrastructure/",        p:{en:"INFRA",zh:"基建",es:"INFRA"},       e:{en:"SUBST",zh:"替代",es:"SUB"}},
    {code:"WNW", href:"/products/capital-doctrine/",     p:{en:"DOCTRINE",zh:"教义",es:"DOCTR"},    e:{en:"CCD",zh:"CCD",es:"CCD"}},
    {code:"NW",  href:"/explore/frontier/lattice/",      p:{en:"LATTICE",zh:"晶格",es:"LATTICE"},   e:{en:"256",zh:"256态",es:"256"}},
    {code:"NNW", href:"/explore/frontier/vision/",       p:{en:"VISION",zh:"愿景",es:"VISIÓN"},     e:{en:"MAP",zh:"映射",es:"MAP"}}
  ];

  var stage=document.getElementById("stage");

  function setPressedLang(){
    document.getElementById("langEN").classList.toggle("on", lang==="en");
    document.getElementById("langZH").classList.toggle("on", lang==="zh");
    document.getElementById("langES").classList.toggle("on", lang==="es");
  }

  function setPressedLane(){
    document.getElementById("lanePlatform").classList.toggle("on", lane==="platform");
    document.getElementById("laneEngineering").classList.toggle("on", lane==="engineering");
  }

  function pick(o){
    return (lang==="zh")?o.zh:(lang==="es")?(o.es||o.en):o.en;
  }

  function labelFor(m){
    return (lane==="engineering") ? pick(m.e) : pick(m.p);
  }

  function mkDiamond(word, code, cls){
    var d=document.createElement("div");
    d.className="d "+cls;
    d.setAttribute("role","button");
    d.tabIndex=0;

    var inner=document.createElement("div");
    inner.className="inner";

    var w=document.createElement("div");
    w.className="word";
    w.textContent=word;

    var c=document.createElement("div");
    c.className="cardinal";
    c.textContent=code;

    inner.appendChild(w);
    inner.appendChild(c);
    d.appendChild(inner);
    return d;
  }

  function tierFor(code){
    if(code==="N"||code==="E"||code==="S"||code==="W") return {cls:"l1", r:1};
    if(code==="NE"||code==="SE"||code==="SW"||code==="NW") return {cls:"l2", r:2};
    return {cls:"l3", r:3};
  }

  var ringEls=[];

  function layout(){
    var slab=stage.querySelector(".slab");
    var dial=stage.querySelector(".dialFace");
    stage.innerHTML="";
    if(slab) stage.appendChild(slab);
    if(dial) stage.appendChild(dial);

    ringEls=[];

    var rect=stage.getBoundingClientRect();
    var cx=rect.width/2;
    var cy=rect.height/2;

    var core=mkDiamond(
      (lang==="zh")?"索引":(lang==="es")?"ÍNDICE":"INDEX",
      "CORE",
      "core"
    );
    core.style.left=cx+"px";
    core.style.top=cy+"px";
    core.addEventListener("click", function(){ go(ROUTE_CORE); }, {passive:true});
    core.addEventListener("keydown", function(e){
      if(e.key==="Enter"||e.key===" "){
        e.preventDefault();
        go(ROUTE_CORE);
      }
    });
    stage.appendChild(core);

    var cs=getComputedStyle(document.documentElement);
    var R1=parseFloat(cs.getPropertyValue("--R1"))||178;
    var R2=parseFloat(cs.getPropertyValue("--R2"))||246;
    var R3=parseFloat(cs.getPropertyValue("--R3"))||300;

    var n=MANIFOLDS.length;
    for(var i=0;i<n;i++){
      var m=MANIFOLDS[i];
      var ang=(i/n)*Math.PI*2 - Math.PI/2;
      var t=tierFor(m.code);
      var r=t.r===1 ? R1 : (t.r===2 ? R2 : R3);

      var x=cx + r*Math.cos(ang);
      var y=cy + r*Math.sin(ang);

      var d=mkDiamond(labelFor(m), m.code, t.cls);
      d.style.left=x+"px";
      d.style.top=y+"px";

      (function(path, el){
        el.addEventListener("click", function(){ go(path); }, {passive:true});
        el.addEventListener("keydown", function(e){
          if(e.key==="Enter"||e.key===" "){
            e.preventDefault();
            go(path);
          }
        });
      })(m.href, d);

      stage.appendChild(d);
      ringEls.push({el:d, m:m});
    }

    document.getElementById("lblExit").textContent = (lang==="zh")?"退出":(lang==="es")?"SALIR":"EXIT";
    document.getElementById("lblHub").textContent  = (lang==="zh")?"枢纽":(lang==="es")?"HUB":"HUB";
  }

  function updateLabelsOnly(){
    for(var i=0;i<ringEls.length;i++){
      var o=ringEls[i];
      var w=o.el.querySelector(".word");
      if(w) w.textContent=labelFor(o.m);
    }
  }

  function setLang(next){
    if(next!=="en"&&next!=="zh"&&next!=="es") next="en";
    lang=next;
    try{ LS.setItem("gd_lang",lang);}catch(e){}
    history.replaceState({}, "", location.pathname + q({lang:lang}));
    setPressedLang();
    updateLabelsOnly();
    document.getElementById("lblExit").textContent = (lang==="zh")?"退出":(lang==="es")?"SALIR":"EXIT";
    document.getElementById("lblHub").textContent  = (lang==="zh")?"枢纽":(lang==="es")?"HUB":"HUB";
  }

  function setLane(next){
    if(next!=="platform"&&next!=="engineering") next="platform";
    lane=next;
    history.replaceState({}, "", location.pathname + q({lane:lane}));
    setPressedLane();
    updateLabelsOnly();
  }

  function bindBtn(id, fn){
    var el=document.getElementById(id);
    if(!el) return;
    el.addEventListener("click", fn, {passive:true});
    el.addEventListener("keydown", function(e){
      if(e.key==="Enter"||e.key===" "){
        e.preventDefault();
        fn();
      }
    });
  }

  bindBtn("langEN", function(){ setLang("en"); });
  bindBtn("langZH", function(){ setLang("zh"); });
  bindBtn("langES", function(){ setLang("es"); });

  bindBtn("lanePlatform", function(){ setLane("platform"); });
  bindBtn("laneEngineering", function(){ setLane("engineering"); });

  bindBtn("btnExit", function(){ go(ROUTE_EXIT); });
  bindBtn("btnHub",  function(){ go(ROUTE_HUB); });

  setPressedLang();
  setPressedLane();

  function safeLayout(){
    var r=stage.getBoundingClientRect();
    if(r.width<10 || r.height<10){
      requestAnimationFrame(safeLayout);
      return;
    }
    layout();
    updateLabelsOnly();
  }

  requestAnimationFrame(safeLayout);
  window.addEventListener("resize", function(){ safeLayout(); });
})();
</script>

</body>
</html>
