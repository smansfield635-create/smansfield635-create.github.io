<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  />
  <title>Nine Summits</title>
  <link rel="stylesheet" href="./assets/ui.css" />
  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #030712;
      color: #fff;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    }

    #app-shell {
      position: fixed;
      inset: 0;
      overflow: hidden;
      isolation: isolate;
      background:
        radial-gradient(circle at 50% 42%, rgba(50, 100, 180, 0.12), transparent 34%),
        linear-gradient(180deg, #030712 0%, #071225 52%, #08101f 100%);
    }

    #world-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      z-index: 1;
      pointer-events: none;
    }

    #universe-layer,
    #atmosphere-layer,
    #orbital-layer,
    #door-layer {
      position: fixed;
      inset: 0;
    }

    #universe-layer {
      z-index: 2;
      pointer-events: none;
      overflow: hidden;
    }

    .star-band {
      position: absolute;
      inset: -10%;
      opacity: 0.42;
      mix-blend-mode: screen;
      animation: starDrift 44s linear infinite;
    }

    .star-band.near {
      opacity: 0.62;
      animation-duration: 26s;
    }

    .star-band.far {
      opacity: 0.2;
      animation-duration: 70s;
    }

    .star-band::before,
    .star-band::after {
      content: "";
      position: absolute;
      inset: 0;
      background-repeat: repeat;
      background-size: 320px 320px;
    }

    .star-band::before {
      background-image:
        radial-gradient(circle at 20px 24px, rgba(255,255,255,0.95) 0 1px, transparent 1.6px),
        radial-gradient(circle at 118px 78px, rgba(255,255,255,0.55) 0 1px, transparent 1.6px),
        radial-gradient(circle at 242px 194px, rgba(255,255,255,0.82) 0 1px, transparent 1.6px),
        radial-gradient(circle at 286px 42px, rgba(255,255,255,0.42) 0 0.9px, transparent 1.4px),
        radial-gradient(circle at 68px 214px, rgba(255,255,255,0.68) 0 0.9px, transparent 1.4px);
    }

    .star-band::after {
      background-image:
        radial-gradient(circle at 78px 48px, rgba(120, 180, 255, 0.28) 0 1.2px, transparent 2px),
        radial-gradient(circle at 204px 158px, rgba(255, 215, 120, 0.22) 0 1.3px, transparent 2px),
        radial-gradient(circle at 300px 258px, rgba(180, 140, 255, 0.18) 0 1.1px, transparent 1.8px);
      filter: blur(0.5px);
    }

    #atmosphere-layer {
      z-index: 3;
      pointer-events: none;
      overflow: hidden;
    }

    .atmo-glow {
      position: absolute;
      left: 50%;
      top: 56%;
      width: min(90vw, 1000px);
      height: min(90vw, 1000px);
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background:
        radial-gradient(circle at 50% 50%, rgba(120, 180, 255, 0.12), transparent 34%),
        radial-gradient(circle at 50% 56%, rgba(255, 255, 255, 0.04), transparent 56%),
        radial-gradient(circle at 50% 50%, rgba(30, 90, 170, 0.1), transparent 70%);
      filter: blur(12px);
      animation: glowPulse 8s ease-in-out infinite;
    }

    .mist-veil {
      position: absolute;
      left: 0;
      right: 0;
      bottom: -4%;
      height: 40%;
      background:
        linear-gradient(
          to bottom,
          transparent 0%,
          rgba(130, 190, 255, 0.06) 18%,
          rgba(170, 220, 255, 0.1) 54%,
          rgba(255, 255, 255, 0.03) 100%
        );
      mask-image: linear-gradient(to bottom, transparent 0%, rgba(0, 0, 0, 0.25) 18%, rgba(0, 0, 0, 0.95) 84%, transparent 100%);
      -webkit-mask-image: linear-gradient(to bottom, transparent 0%, rgba(0, 0, 0, 0.25) 18%, rgba(0, 0, 0, 0.95) 84%, transparent 100%);
      opacity: 0.22;
      transform: translateY(8%);
      animation: veilDrift 9s ease-in-out infinite;
    }

    #orbital-layer {
      z-index: 8;
      pointer-events: none;
    }

    .orbit-shell {
      position: absolute;
      left: 50%;
      top: 58%;
      width: min(84vw, 780px);
      height: min(84vw, 780px);
      transform: translate(-50%, -50%);
    }

    .orbit-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      animation: orbitRotate 38s linear infinite;
    }

    .orbit-ring::before,
    .orbit-ring::after {
      content: "";
      position: absolute;
      inset: 12%;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.06);
      box-shadow:
        0 0 70px rgba(100, 170, 255, 0.06),
        inset 0 0 34px rgba(255, 255, 255, 0.02);
    }

    .orbit-ring::after {
      inset: 22%;
      opacity: 0.66;
    }

    .orbit-node {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 120px;
      height: 120px;
      margin: -60px 0 0 -60px;
      pointer-events: none;
      transform-origin: 50% 50%;
      transition: filter 0.18s ease, opacity 0.18s ease;
    }

    .orbit-node .gem {
      position: absolute;
      inset: 0;
      transform: rotate(45deg);
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      background:
        radial-gradient(circle at 22% 18%, rgba(255,255,255,0.28), transparent 26%),
        radial-gradient(circle at 70% 74%, rgba(255,255,255,0.08), transparent 34%),
        linear-gradient(145deg, rgba(10, 18, 34, 0.94), rgba(6, 8, 14, 0.98)),
        linear-gradient(45deg, rgba(102,194,255,0.12), rgba(255,212,120,0.1));
      box-shadow:
        0 0 20px rgba(255, 255, 255, 0.08),
        0 0 50px rgba(0, 0, 0, 0.68),
        inset 0 0 16px rgba(255, 255, 255, 0.08),
        inset 0 0 42px rgba(120, 180, 255, 0.06);
      overflow: hidden;
      animation: gemSpinCW 14s linear infinite;
    }

    .orbit-node.ccw .gem {
      animation-name: gemSpinCCW;
    }

    .orbit-node .gem::before {
      content: "";
      position: absolute;
      inset: -20%;
      background:
        linear-gradient(
          120deg,
          transparent 18%,
          rgba(255,255,255,0.12) 34%,
          transparent 48%,
          rgba(255,255,255,0.07) 58%,
          transparent 72%
        );
      transform: translateX(-26%);
      animation: shimmerSweep 4.8s ease-in-out infinite;
    }

    .orbit-node .label {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 13px;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      text-align: center;
      text-shadow: 0 2px 18px rgba(0, 0, 0, 0.52);
      opacity: 0.88;
    }

    .orbit-node.explore {
      transform: translate(-50%, -50%) translateY(calc(-1 * min(31vw, 302px)));
    }

    .orbit-node.products {
      transform: translate(-50%, -50%) translateX(min(31vw, 302px));
    }

    .orbit-node.laws {
      transform: translate(-50%, -50%) translateY(min(31vw, 302px));
    }

    .orbit-node.gauges {
      transform: translate(-50%, -50%) translateX(calc(-1 * min(31vw, 302px)));
    }

    #door-layer {
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      text-align: center;
      pointer-events: none;
    }

    .door-panel {
      pointer-events: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      margin-top: 7.5vh;
      padding: 24px;
      width: min(92vw, 960px);
    }

    .door-title {
      margin: 0;
      font-size: clamp(44px, 7vw, 96px);
      font-weight: 950;
      letter-spacing: 0.05em;
      line-height: 0.9;
      text-shadow: 0 10px 38px rgba(0, 0, 0, 0.62);
    }

    .door-sub {
      margin: 0;
      font-size: clamp(16px, 2vw, 22px);
      color: rgba(255, 255, 255, 0.86);
    }

    .door-tag {
      margin: 0 0 4px;
      font-size: clamp(13px, 1.5vw, 16px);
      color: rgba(255, 255, 255, 0.64);
      letter-spacing: 0.02em;
    }

    .door-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
    }

    .door-btn {
      appearance: none;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      border-radius: 999px;
      padding: 12px 18px;
      min-height: 46px;
      font-weight: 800;
      letter-spacing: 0.03em;
      cursor: pointer;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.24);
      backdrop-filter: blur(10px);
      transition: transform 0.18s ease, background 0.18s ease, border-color 0.18s ease;
    }

    .door-btn:hover {
      transform: translateY(-1px);
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(255, 255, 255, 0.24);
    }

    @keyframes starDrift {
      from { transform: translate3d(-1.5%, -1%, 0); }
      to   { transform: translate3d(1.5%, 1%, 0); }
    }

    @keyframes glowPulse {
      0%,100% { opacity: 0.82; transform: translate(-50%, -50%) scale(1); }
      50%     { opacity: 1; transform: translate(-50%, -50%) scale(1.04); }
    }

    @keyframes veilDrift {
      0%,100% { transform: translateY(8%); opacity: 0.18; }
      50%     { transform: translateY(2%); opacity: 0.28; }
    }

    @keyframes orbitRotate {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    @keyframes gemSpinCW {
      from { transform: rotate(45deg); }
      to   { transform: rotate(405deg); }
    }

    @keyframes gemSpinCCW {
      from { transform: rotate(45deg); }
      to   { transform: rotate(-315deg); }
    }

    @keyframes shimmerSweep {
      0%,100% { transform: translateX(-34%); }
      50%     { transform: translateX(34%); }
    }

    @media (max-width: 900px) {
      .orbit-shell {
        width: min(92vw, 660px);
        height: min(92vw, 660px);
        top: 60%;
      }

      .orbit-node {
        width: 106px;
        height: 106px;
        margin: -53px 0 0 -53px;
      }
    }

    @media (max-width: 700px) {
      .door-panel {
        margin-top: 8.4vh;
        gap: 12px;
        padding: 18px;
      }

      .orbit-shell {
        width: min(96vw, 560px);
        height: min(96vw, 560px);
        top: 61%;
      }

      .orbit-node {
        width: 92px;
        height: 92px;
        margin: -46px 0 0 -46px;
      }

      .orbit-node .label {
        font-size: 11px;
        letter-spacing: 0.6px;
      }
    }
  </style>
</head>
<body>
  <div id="app-shell">
    <canvas id="world-canvas" aria-label="World preview canvas"></canvas>

    <div id="universe-layer" aria-hidden="true">
      <div class="star-band far"></div>
      <div class="star-band"></div>
      <div class="star-band near"></div>
    </div>

    <div id="atmosphere-layer" aria-hidden="true">
      <div class="atmo-glow"></div>
      <div class="mist-veil"></div>
    </div>

    <div id="orbital-layer" aria-hidden="true">
      <div class="orbit-shell">
        <div class="orbit-ring">
          <div class="orbit-node explore">
            <span class="gem"></span>
            <span class="label">EXPLORE</span>
          </div>
          <div class="orbit-node products ccw">
            <span class="gem"></span>
            <span class="label">PRODUCTS</span>
          </div>
          <div class="orbit-node laws">
            <span class="gem"></span>
            <span class="label">LAWS</span>
          </div>
          <div class="orbit-node gauges ccw">
            <span class="gem"></span>
            <span class="label">GAUGES</span>
          </div>
        </div>
      </div>
    </div>

    <div id="door-layer">
      <div class="door-panel">
        <h1 class="door-title">NINE SUMMITS</h1>
        <p class="door-sub">Choose your reality.</p>
        <p class="door-tag">Enter simple. Discover power. Choose depth.</p>

        <div class="door-buttons">
          <button id="btn-round" class="door-btn" type="button">WORLD IS ROUND</button>
          <button id="btn-flat" class="door-btn" type="button">WORLD IS FLAT</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { createPlanetEngine } from "./world/planet_engine.js";
    import { createRenderer } from "./world/render.js";
    import { createControlSystem } from "./world/control.js";

    const canvas = document.getElementById("world-canvas");
    const ctx = canvas.getContext("2d", { alpha: true });

    const btnRound = document.getElementById("btn-round");
    const btnFlat = document.getElementById("btn-flat");

    const planetEngine = createPlanetEngine();
    const renderer = createRenderer();
    const control = createControlSystem();

    let planetField = null;
    let rafId = 0;
    let lastFrameAt = performance.now();
    let idlePhase = 0;

    function resizeWorld() {
      const width = window.innerWidth;
      const height = window.innerHeight;
      canvas.width = width;
      canvas.height = height;
      control.resize(width, height);
    }

    function buildPlanetFieldOnce() {
      if (!planetField) {
        planetField = planetEngine.buildPlanetField({});
      }
    }

    function renderSurface() {
      if (!planetField) return;

      renderer.renderPlanet({
        ctx,
        planetField,
        projectPoint: (latDeg, lonDeg, radiusOffsetPx = 0) => {
          return control.projectSphere(latDeg, lonDeg, radiusOffsetPx);
        },
        viewState: control.getCameraState()
      });
    }

    function stepIdleDrift(dtMs) {
      idlePhase += dtMs * 0.00018;
      const yawDrift = 0.05 + Math.sin(idlePhase) * 0.016;
      control.applyDrag(yawDrift * dtMs * 0.18, 0);
      control.stepInertia(dtMs);
    }

    function frame(now) {
      const dtMs = now - lastFrameAt;
      lastFrameAt = now;

      stepIdleDrift(dtMs);
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      renderSurface();

      rafId = requestAnimationFrame(frame);
    }

    function start() {
      resizeWorld();
      buildPlanetFieldOnce();

      if (!rafId) {
        lastFrameAt = performance.now();
        rafId = requestAnimationFrame(frame);
      }
    }

    window.addEventListener("resize", () => {
      resizeWorld();
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      renderSurface();
    }, { passive: true });

    window.addEventListener("pagehide", () => {
      if (rafId) {
        cancelAnimationFrame(rafId);
        rafId = 0;
      }
    }, { passive: true });

    btnRound.addEventListener("click", () => {
      location.href = "/home/?mode=round";
    });

    btnFlat.addEventListener("click", () => {
      location.href = "/home/?mode=flat";
    });

    start();
  </script>
</body>
</html>
