<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Nine Summits — Index</title>
<link rel="stylesheet" href="/assets/ui.css"/>
<style>
html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:#030712;
  color:#fff;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
}
body::before,body::after{pointer-events:none!important}

:root{
  --ink:rgba(255,255,255,.96);
  --mut:rgba(255,255,255,.84);
  --mut2:rgba(255,255,255,.68);
  --stroke:rgba(255,255,255,.12);
  --stroke2:rgba(255,255,255,.08);
  --shadowA:0 18px 52px rgba(0,0,0,.30);
  --shadowB:0 24px 90px rgba(0,0,0,.42);
  --gold:rgba(226,191,92,.92);
  --goldSoft:rgba(226,191,92,.22);
  --goldGlow:rgba(226,191,92,.16);
  --panel:rgba(8,12,20,.38);
  --panel2:rgba(8,12,20,.56);
  --heroDim:1;
  --uiAlpha:1;
  --shellAtmosAlpha:.82;
  --starAlpha:1;
}

#app-shell{
  position:fixed;
  inset:0;
  overflow:hidden;
  isolation:isolate;
  background:
    radial-gradient(circle at 50% 42%, rgba(44,92,164,.08), transparent 34%),
    linear-gradient(180deg, #030712 0%, #071225 52%, #08101f 100%);
}

#world-canvas{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  display:block;
  z-index:1;
  touch-action:none;
}

#universe-layer,
#atmosphere-layer,
#hero-layer,
#flat-layer,
#orbital-overlay{
  position:fixed;
  inset:0;
}

#universe-layer{
  z-index:2;
  pointer-events:none;
  overflow:hidden;
  transition:opacity 220ms ease, filter 220ms ease;
  opacity:var(--starAlpha);
}
.star-band{
  position:absolute;
  inset:-10%;
  opacity:.34;
  mix-blend-mode:screen;
  animation:starDrift 44s linear infinite;
}
.star-band.near{
  opacity:.48;
  animation-duration:26s;
}
.star-band.far{
  opacity:.16;
  animation-duration:70s;
}
.star-band::before,
.star-band::after{
  content:"";
  position:absolute;
  inset:0;
  background-repeat:repeat;
  background-size:320px 320px;
  filter:blur(.15px);
}
.star-band::before{
  background-image:
    radial-gradient(circle at 20px 24px, rgba(255,255,255,.96) 0 .9px, transparent 1.6px),
    radial-gradient(circle at 118px 78px, rgba(255,255,255,.60) 0 .8px, transparent 1.5px),
    radial-gradient(circle at 242px 194px, rgba(255,255,255,.82) 0 1px, transparent 1.7px),
    radial-gradient(circle at 286px 42px, rgba(255,255,255,.42) 0 .7px, transparent 1.3px),
    radial-gradient(circle at 68px 214px, rgba(255,255,255,.68) 0 .8px, transparent 1.4px),
    radial-gradient(circle at 168px 262px, rgba(255,255,255,.50) 0 .7px, transparent 1.4px);
}
.star-band::after{
  background-image:
    radial-gradient(circle at 78px 48px, rgba(120,180,255,.18) 0 1px, transparent 2px),
    radial-gradient(circle at 204px 158px, rgba(255,215,120,.16) 0 1.1px, transparent 2px),
    radial-gradient(circle at 300px 258px, rgba(180,140,255,.12) 0 1px, transparent 1.8px);
  filter:blur(.55px);
}

#atmosphere-layer{
  z-index:3;
  pointer-events:none;
  overflow:hidden;
  transition:opacity 220ms ease;
  opacity:var(--shellAtmosAlpha);
}
.atmo-glow{
  position:absolute;
  left:50%;
  top:58%;
  width:min(92vw,1040px);
  height:min(92vw,1040px);
  transform:translate(-50%,-50%);
  border-radius:50%;
  background:
    radial-gradient(circle at 50% 50%, rgba(108,162,236,.10), transparent 34%),
    radial-gradient(circle at 50% 56%, rgba(255,255,255,.03), transparent 56%),
    radial-gradient(circle at 50% 50%, rgba(30,90,170,.07), transparent 70%);
  filter:blur(12px);
  animation:glowPulse 8s ease-in-out infinite;
}
.mist-veil{
  position:absolute;
  left:0;
  right:0;
  bottom:-4%;
  height:40%;
  background:
    linear-gradient(
      to bottom,
      transparent 0%,
      rgba(130,190,255,.04) 18%,
      rgba(170,220,255,.07) 54%,
      rgba(255,255,255,.02) 100%
    );
  mask-image:linear-gradient(to bottom, transparent 0%, rgba(0,0,0,.25) 18%, rgba(0,0,0,.95) 84%, transparent 100%);
  -webkit-mask-image:linear-gradient(to bottom, transparent 0%, rgba(0,0,0,.25) 18%, rgba(0,0,0,.95) 84%, transparent 100%);
  opacity:.18;
  transform:translateY(8%);
  animation:veilDrift 9s ease-in-out infinite;
}

#hero-layer{
  z-index:8;
  pointer-events:none;
  transition:opacity 180ms ease, transform 180ms ease;
  opacity:var(--heroDim);
}
.hero-panel{
  position:absolute;
  left:50%;
  top:7.4vh;
  transform:translateX(-50%);
  width:min(92vw,980px);
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:12px;
  text-align:center;
}
.hero-title{
  margin:0;
  font-size:clamp(42px,7vw,96px);
  font-weight:950;
  letter-spacing:.05em;
  line-height:.9;
  text-shadow:0 10px 30px rgba(0,0,0,.54);
}
.hero-sub{
  margin:0;
  font-size:clamp(18px,2.2vw,26px);
  color:rgba(255,255,255,.90);
}
.hero-tag{
  margin:0;
  font-size:clamp(13px,1.5vw,16px);
  color:rgba(255,255,255,.64);
  letter-spacing:.02em;
}

#flat-layer{
  z-index:9;
  display:none;
  align-items:center;
  justify-content:center;
  pointer-events:none;
}
.flat-menu{
  width:min(92vw,720px);
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:18px;
  pointer-events:auto;
}
.flat-card{
  position:relative;
  min-height:132px;
  border-radius:28px;
  border:1px solid rgba(255,255,255,.16);
  background:
    radial-gradient(circle at 22% 18%, rgba(255,255,255,.12), transparent 22%),
    linear-gradient(145deg, rgba(10,14,22,.88), rgba(5,8,12,.96));
  box-shadow:
    0 18px 48px rgba(0,0,0,.32),
    inset 0 0 18px rgba(255,255,255,.03);
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  font-weight:900;
  font-size:clamp(18px,2.2vw,24px);
  letter-spacing:.06em;
  cursor:pointer;
  overflow:hidden;
  transition:transform .18s ease, border-color .18s ease, background .18s ease;
}
.flat-card:hover{
  transform:translateY(-2px);
  border-color:rgba(255,255,255,.24);
  background:
    radial-gradient(circle at 22% 18%, rgba(255,255,255,.16), transparent 24%),
    linear-gradient(145deg, rgba(14,18,28,.92), rgba(5,8,12,.98));
}
.flat-card::before{
  content:"";
  position:absolute;
  left:50%;
  top:50%;
  width:86px;
  height:86px;
  margin:-43px 0 0 -43px;
  transform:rotate(45deg);
  border-radius:14px;
  border:1px solid rgba(255,255,255,.10);
  box-shadow:inset 0 0 12px rgba(255,255,255,.05);
}

.home-pill{
  position:absolute;
  top:16px;
  left:50%;
  transform:translateX(-50%);
  min-width:156px;
  padding:8px 18px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.09);
  background:rgba(0,0,0,.18);
  box-shadow:0 12px 28px rgba(0,0,0,.18);
  backdrop-filter:blur(8px);
  color:rgba(255,255,255,.92);
  font-size:12px;
  font-weight:900;
  letter-spacing:.12em;
  text-transform:uppercase;
  text-align:center;
  pointer-events:none;
  z-index:15;
  opacity:var(--uiAlpha);
}

.mode-cluster{
  position:absolute;
  top:16px;
  right:16px;
  z-index:16;
  display:flex;
  gap:8px;
  opacity:var(--uiAlpha);
  transition:opacity 180ms ease;
}
.mode-btn{
  min-height:42px;
  padding:0 16px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(10,12,20,.32);
  box-shadow:0 14px 34px rgba(0,0,0,.24);
  backdrop-filter:blur(8px);
  color:rgba(255,255,255,.92);
  font-size:12px;
  font-weight:900;
  letter-spacing:.06em;
  text-transform:uppercase;
  cursor:pointer;
}
.mode-btn:active{transform:translateY(1px)}
.mode-btn.is-active{
  border-color:rgba(226,191,92,.50);
  box-shadow:
    0 14px 34px rgba(0,0,0,.24),
    0 0 0 1px rgba(226,191,92,.10),
    0 0 16px rgba(226,191,92,.10);
  color:#fff5cf;
}

/* overlay markers */
#orbital-overlay{
  z-index:12;
  pointer-events:none;
  transition:opacity 180ms ease;
}
.orbital-marker{
  position:absolute;
  left:0;
  top:0;
  width:132px;
  height:132px;
  transform:translate(-50%,-50%);
  border:0;
  background:transparent;
  padding:0;
  pointer-events:auto;
  cursor:pointer;
  touch-action:manipulation;
  -webkit-tap-highlight-color:transparent;
}
.orbital-marker[hidden]{display:none}

.orbital-core{
  position:absolute;
  left:50%;
  top:50%;
  width:88px;
  height:88px;
  transform:translate(-50%,-50%);
  border-radius:50%;
  background:
    radial-gradient(circle at 50% 50%, rgba(255,255,255,.06) 0 14%, rgba(255,255,255,0) 54%),
    radial-gradient(circle at 50% 50%, rgba(226,191,92,.18), rgba(226,191,92,.08) 28%, rgba(226,191,92,0) 58%);
  filter:blur(.2px);
  opacity:.94;
}
.orbital-core::before,
.orbital-core::after{
  content:"";
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  border-radius:999px;
  background:linear-gradient(180deg, rgba(255,247,208,.88), rgba(255,228,142,.84), rgba(255,214,98,.22));
  box-shadow:
    0 0 16px rgba(255,225,140,.28),
    0 0 28px rgba(255,219,126,.14);
}
.orbital-core::before{
  width:10px;
  height:78px;
}
.orbital-core::after{
  width:78px;
  height:10px;
}
.orbital-diag-a,
.orbital-diag-b{
  position:absolute;
  left:50%;
  top:50%;
  width:70px;
  height:2px;
  transform-origin:center;
  background:linear-gradient(90deg, rgba(255,227,132,0), rgba(255,233,160,.76), rgba(255,227,132,0));
  opacity:.54;
  filter:blur(.2px);
}
.orbital-diag-a{transform:translate(-50%,-50%) rotate(45deg)}
.orbital-diag-b{transform:translate(-50%,-50%) rotate(-45deg)}

.orbital-glow{
  position:absolute;
  left:50%;
  top:50%;
  width:118px;
  height:118px;
  transform:translate(-50%,-50%);
  border-radius:50%;
  background:
    radial-gradient(circle at 50% 50%, rgba(255,227,132,.10), rgba(255,227,132,.05) 26%, rgba(255,227,132,0) 68%);
  filter:blur(8px);
  opacity:.84;
}

.orbital-code{
  position:absolute;
  left:50%;
  top:22px;
  transform:translateX(-50%);
  font-size:11px;
  font-weight:950;
  letter-spacing:.26em;
  color:rgba(255,246,214,.82);
  text-transform:uppercase;
  text-shadow:0 0 10px rgba(0,0,0,.50);
  white-space:nowrap;
}

.orbital-name{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  min-width:84px;
  padding:3px 10px;
  border-radius:999px;
  background:rgba(6,10,18,.18);
  color:rgba(255,255,255,.92);
  font-size:11px;
  font-weight:950;
  letter-spacing:.10em;
  text-transform:uppercase;
  text-align:center;
  text-shadow:0 0 10px rgba(0,0,0,.56);
  box-shadow:0 6px 20px rgba(0,0,0,.14);
  backdrop-filter:blur(6px);
}

/* diagnostics */
.diagnostics-shell{
  position:absolute;
  left:16px;
  right:16px;
  bottom:16px;
  z-index:14;
  display:flex;
  align-items:flex-end;
  justify-content:center;
  pointer-events:none;
  opacity:var(--uiAlpha);
  transition:opacity 180ms ease;
}
.diagnostics-bar{
  width:min(980px,100%);
  min-height:62px;
  padding:10px 12px;
  border-radius:18px;
  border:1px solid rgba(255,255,255,.09);
  background:rgba(7,10,18,.34);
  box-shadow:0 14px 38px rgba(0,0,0,.22);
  backdrop-filter:blur(10px);
  display:grid;
  grid-template-columns:1fr auto;
  align-items:center;
  gap:10px;
  pointer-events:auto;
}
.diagnostics-summary{
  min-width:0;
  opacity:.70;
}
.diagnostics-summary .diagnostic-pill{
  border-color:rgba(255,255,255,.07);
  background:rgba(255,255,255,.02);
}
.diagnostics-toggle{
  min-width:110px;
  min-height:38px;
  padding:0 14px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.11);
  background:rgba(10,12,20,.28);
  color:rgba(255,255,255,.92);
  font-size:12px;
  font-weight:900;
  letter-spacing:.04em;
  text-transform:uppercase;
  cursor:pointer;
}
.diagnostics-toggle:active{transform:translateY(1px)}
.debug-panel{
  position:absolute;
  left:16px;
  bottom:94px;
  width:min(380px, calc(100vw - 32px));
  max-height:min(48vh, 420px);
  overflow:auto;
  display:grid;
  gap:10px;
  opacity:0;
  pointer-events:none;
  transform:translateY(10px);
  transition:opacity 160ms ease, transform 160ms ease;
  z-index:15;
}
.debug-panel .panel-section{
  background:rgba(8,14,24,.74);
  border:1px solid rgba(145,175,255,.14);
  box-shadow:0 14px 40px rgba(0,0,0,.26);
  backdrop-filter:blur(10px);
  border-radius:14px;
  padding:12px;
}
body[data-diagnostics="full"] .debug-panel{
  opacity:1;
  pointer-events:auto;
  transform:translateY(0);
}

/* mode-specific presentation */
body[data-mode="round"]{
  --heroDim:1;
  --uiAlpha:1;
  --shellAtmosAlpha:.82;
  --starAlpha:1;
}
body[data-mode="flat"]{
  --heroDim:.86;
  --uiAlpha:1;
  --shellAtmosAlpha:.54;
  --starAlpha:.72;
}
body[data-mode="observe"]{
  --heroDim:.56;
  --uiAlpha:.74;
  --shellAtmosAlpha:.58;
  --starAlpha:.12;
}
body[data-mode="observe"] #orbital-overlay{
  opacity:0;
}
body[data-mode="observe"] .diagnostics-summary{
  opacity:.58;
}

@keyframes starDrift{
  from{transform:translate3d(-1.5%,-1%,0)}
  to{transform:translate3d(1.5%,1%,0)}
}
@keyframes glowPulse{
  0%,100%{opacity:.82;transform:translate(-50%,-50%) scale(1)}
  50%{opacity:1;transform:translate(-50%,-50%) scale(1.04)}
}
@keyframes veilDrift{
  0%,100%{transform:translateY(8%);opacity:.18}
  50%{transform:translateY(2%);opacity:.28}
}

@media (max-width:700px){
  .hero-panel{
    top:8.4vh;
    gap:12px;
  }
  .flat-menu{
    grid-template-columns:1fr;
    width:min(92vw,420px);
    gap:12px;
  }
  .flat-card{min-height:98px}
  .diagnostics-bar{grid-template-columns:1fr}
  .diagnostics-toggle{justify-self:end}
  .mode-cluster{
    gap:6px;
  }
  .mode-btn{
    padding:0 12px;
  }
}
</style>
</head>
<body data-mode="round" data-diagnostics="peek">
<div id="app-shell">
  <canvas id="world-canvas" aria-label="Home world canvas"></canvas>

  <div id="universe-layer" aria-hidden="true">
    <div class="star-band far"></div>
    <div class="star-band"></div>
    <div class="star-band near"></div>
  </div>

  <div id="atmosphere-layer" aria-hidden="true">
    <div class="atmo-glow"></div>
    <div class="mist-veil"></div>
  </div>

  <div id="hero-layer">
    <div class="hero-panel">
      <h1 class="hero-title">NINE SUMMITS</h1>
      <p class="hero-sub">Learn to live, to love.</p>
      <p class="hero-tag">Enter simply. Discover power. Choose depth.</p>
    </div>
  </div>

  <div id="flat-layer">
    <div class="flat-menu">
      <button class="flat-card" data-route="/explore/" type="button">EXPLORE</button>
      <button class="flat-card" data-route="/products/" type="button">PRODUCTS</button>
      <button class="flat-card" data-route="/laws/" type="button">LAWS</button>
      <button class="flat-card" data-route="/gauges/" type="button">GAUGES</button>
    </div>
  </div>

  <div id="orbital-overlay" aria-label="Index markers">
    <button class="orbital-marker" id="marker-north" type="button" hidden>
      <div class="orbital-glow"></div>
      <div class="orbital-core"></div>
      <div class="orbital-diag-a"></div>
      <div class="orbital-diag-b"></div>
      <div class="orbital-code">N</div>
      <div class="orbital-name">PRODUCTS</div>
    </button>

    <button class="orbital-marker" id="marker-east" type="button" hidden>
      <div class="orbital-glow"></div>
      <div class="orbital-core"></div>
      <div class="orbital-diag-a"></div>
      <div class="orbital-diag-b"></div>
      <div class="orbital-code">E</div>
      <div class="orbital-name">GAUGES</div>
    </button>

    <button class="orbital-marker" id="marker-south" type="button" hidden>
      <div class="orbital-glow"></div>
      <div class="orbital-core"></div>
      <div class="orbital-diag-a"></div>
      <div class="orbital-diag-b"></div>
      <div class="orbital-code">S</div>
      <div class="orbital-name">LAWS</div>
    </button>

    <button class="orbital-marker" id="marker-west" type="button" hidden>
      <div class="orbital-glow"></div>
      <div class="orbital-core"></div>
      <div class="orbital-diag-a"></div>
      <div class="orbital-diag-b"></div>
      <div class="orbital-code">W</div>
      <div class="orbital-name">EXPLORE</div>
    </button>
  </div>

  <div class="home-pill">HOME</div>

  <div class="mode-cluster">
    <button id="btn-flat" class="mode-btn" type="button">FLAT</button>
    <button id="btn-round" class="mode-btn" type="button">ROUND</button>
    <button id="btn-observe" class="mode-btn" type="button">OBSERVE</button>
  </div>

  <div class="diagnostics-shell">
    <div class="diagnostics-bar">
      <div id="diagnostics-summary" class="diagnostics-summary"></div>
      <button id="diagnostics-toggle" class="diagnostics-toggle" type="button">DIAGNOSTICS</button>
    </div>
  </div>

  <div id="debug-panel" class="debug-panel" aria-live="polite"></div>
</div>

<script type="module">
import { createPlanetEngine } from "/world/planet_engine.js";
import { createRenderer } from "/world/render.js";
import { createControlSystem } from "/world/control.js";
import { createInstruments } from "/assets/instruments.js";

const params = new URLSearchParams(location.search);
const modeParam = params.get("mode");
const mode =
  modeParam === "flat" || modeParam === "observe"
    ? modeParam
    : "round";

const body = document.body;
const canvas = document.getElementById("world-canvas");
const ctx = canvas.getContext("2d", { alpha: true });

const flatLayer = document.getElementById("flat-layer");
const universeLayer = document.getElementById("universe-layer");
const atmosphereLayer = document.getElementById("atmosphere-layer");
const heroLayer = document.getElementById("hero-layer");
const orbitalOverlay = document.getElementById("orbital-overlay");
const diagnosticsSummary = document.getElementById("diagnostics-summary");
const diagnosticsToggle = document.getElementById("diagnostics-toggle");
const debugPanel = document.getElementById("debug-panel");

const btnFlat = document.getElementById("btn-flat");
const btnRound = document.getElementById("btn-round");
const btnObserve = document.getElementById("btn-observe");

const overlayMap = Object.freeze({
  "north-products": document.getElementById("marker-north"),
  "east-gauges": document.getElementById("marker-east"),
  "south-laws": document.getElementById("marker-south"),
  "west-explore": document.getElementById("marker-west")
});

const planetEngine = createPlanetEngine();
const renderer = createRenderer();
const control = createControlSystem();
const instruments = createInstruments();

const MOTION_STORAGE_KEY = "ns_home_round_motion_v6";

const orbitalSystem = Object.freeze({
  objects: Object.freeze([
    Object.freeze({
      id: "north-products",
      label: "PRODUCTS",
      route: "/products/",
      code: "N",
      uiLabel: "PRODUCTS",
      baseLatDeg: 0,
      baseLonDeg: 0,
      bearingOffsetDeg: -90,
      spinOffsetRad: 0.20,
      spinMultiplier: 1.35,
      sizePx: 20
    }),
    Object.freeze({
      id: "south-laws",
      label: "LAWS",
      route: "/laws/",
      code: "S",
      uiLabel: "LAWS",
      baseLatDeg: 0,
      baseLonDeg: 0,
      bearingOffsetDeg: 90,
      spinOffsetRad: 0.80,
      spinMultiplier: 1.25,
      sizePx: 20
    }),
    Object.freeze({
      id: "east-gauges",
      label: "GAUGES",
      route: "/gauges/",
      code: "E",
      uiLabel: "GAUGES",
      baseLatDeg: 0,
      baseLonDeg: 0,
      bearingOffsetDeg: 0,
      spinOffsetRad: 1.10,
      spinMultiplier: 1.45,
      sizePx: 20
    }),
    Object.freeze({
      id: "west-explore",
      label: "EXPLORE",
      route: "/explore/",
      code: "W",
      uiLabel: "EXPLORE",
      baseLatDeg: 0,
      baseLonDeg: 0,
      bearingOffsetDeg: 180,
      spinOffsetRad: 1.70,
      spinMultiplier: 1.30,
      sizePx: 20
    })
  ])
});

let planetField = null;
let rafId = 0;
let lastFrameAt = performance.now();
let lastRenderReceipt = Object.freeze({
  orbitalHits: Object.freeze([]),
  orbitalAudit: Object.freeze({ count: 0, frontVisibleCount: 0 }),
  audit: Object.freeze({})
});

let isDragging = false;
let lastX = 0;
let lastY = 0;
let diagnosticsMode = "peek";

function isFlatMode() {
  return mode === "flat";
}

function isObserveMode() {
  return mode === "observe";
}

function isRoundVisualMode() {
  return mode === "round" || mode === "observe";
}

function buildModeHref(nextMode) {
  const q = new URLSearchParams(location.search);
  q.set("mode", nextMode);
  return `${location.pathname}?${q.toString()}`;
}

function withModeQuery(route) {
  const glue = route.includes("?") ? "&" : "?";
  return `${route}${glue}mode=${mode}`;
}

function resizeWorld() {
  const width = window.innerWidth;
  const height = window.innerHeight;
  canvas.width = width;
  canvas.height = height;
  control.resize(width, height);
}

function buildPlanetFieldOnce() {
  if (!planetField) {
    planetField = planetEngine.buildPlanetField({});
  }
}

function restoreMotionState() {
  if (!isRoundVisualMode()) return;
  try {
    const raw = sessionStorage.getItem(MOTION_STORAGE_KEY);
    if (!raw) return;
    control.restoreMotionState(JSON.parse(raw));
  } catch {
    return;
  }
}

function persistMotionState() {
  if (!isRoundVisualMode()) return;
  try {
    sessionStorage.setItem(MOTION_STORAGE_KEY, JSON.stringify(control.getMotionState()));
  } catch {
    return;
  }
}

function safeProjectionSummary() {
  if (typeof control.getProjectionSummary === "function") {
    const summary = control.getProjectionSummary();
    return summary && typeof summary === "object" ? summary : {};
  }
  return {};
}

function safeMotionReceipt(dtMs) {
  const motionState =
    typeof control.getMotionState === "function"
      ? control.getMotionState()
      : {};
  const orbitalState =
    typeof control.getOrbitalState === "function"
      ? control.getOrbitalState()
      : {};

  return {
    motionRunning: isRoundVisualMode(),
    rafActive: rafId !== 0,
    pageVisible: document.visibilityState === "visible",
    pageRestored: true,
    yawVelocity: Number.isFinite(motionState?.yawVelocity) ? motionState.yawVelocity : null,
    pitchVelocity: Number.isFinite(motionState?.pitchVelocity) ? motionState.pitchVelocity : null,
    orbitVelocity: Number.isFinite(orbitalState?.orbitAngularVelocity) ? orbitalState.orbitAngularVelocity : null,
    orbitPhase: Number.isFinite(orbitalState?.orbitPhase) ? orbitalState.orbitPhase : null,
    blockedDragOnStarCount: 0,
    starTapCount: 0,
    dtMs
  };
}

function buildRuntimePacket(dtMs) {
  const projectionSummary = safeProjectionSummary();
  const sample =
    planetField?.samples?.[projectionSummary.sampleY]?.[projectionSummary.sampleX] ||
    planetField?.samples?.[128]?.[128] ||
    null;

  const instrument = instruments.buildInstrumentReceipt({
    currentSample: sample,
    previousSample: sample,
    tickIndex: 0,
    motionState: safeMotionReceipt(dtMs),
    authorityState: {
      motionOwner: "control.js",
      projectionOwner: "control.js",
      inputOwner: "index.html",
      renderSource: "render.js",
      orbitSource: "index.html"
    },
    transitionState: {
      proposed: isFlatMode() ? "FLAT_HOME" : isObserveMode() ? "OBSERVE_HOME" : "ROUND_HOME",
      admissible: true,
      accepted: true,
      blockedReason: "",
      family: "HOME_MODE"
    }
  });

  return Object.freeze({
    phase: "HOME",
    fps: dtMs > 0 ? 1000 / dtMs : 0,
    dtMs,
    elapsedMs: performance.now(),
    instrument,
    control: {
      projectionSummary,
      motionState: typeof control.getMotionState === "function" ? control.getMotionState() : {},
      orbitalState: typeof control.getOrbitalState === "function" ? control.getOrbitalState() : {}
    },
    planetField,
    renderAudit: lastRenderReceipt?.audit || {},
    orbitalAudit: lastRenderReceipt?.orbitalAudit || {},
    progress: {},
    unlocks: {},
    verification: {
      pass: true,
      reasons: []
    },
    failure: {
      phase: "",
      message: ""
    }
  });
}

function updateDiagnostics(dtMs) {
  const runtime = buildRuntimePacket(dtMs);
  diagnosticsSummary.innerHTML = instruments.renderCompactBarHTML(runtime);
  debugPanel.innerHTML = instruments.renderPanelHTML(runtime);
}

function hideAllMarkers() {
  for (const key of Object.keys(overlayMap)) {
    const node = overlayMap[key];
    if (node) node.hidden = true;
  }
}

function syncOverlayMarkers() {
  if (!isRoundVisualMode() || isObserveMode()) {
    hideAllMarkers();
    return;
  }

  const hits = Array.isArray(lastRenderReceipt?.orbitalHits)
    ? lastRenderReceipt.orbitalHits
    : [];

  hideAllMarkers();

  for (let i = 0; i < hits.length; i += 1) {
    const hit = hits[i];
    const marker = overlayMap[hit.id];
    if (!marker) continue;

    marker.hidden = false;
    marker.style.left = `${hit.x}px`;
    marker.style.top = `${hit.y}px`;
  }
}

function buildViewState() {
  const cameraState =
    typeof control.getCameraState === "function"
      ? control.getCameraState()
      : {};

  const observeZoomScale = isObserveMode() ? 1.24 : 1;

  return Object.freeze({
    ...cameraState,
    observeMode: isObserveMode(),
    radius: Number.isFinite(cameraState?.radius)
      ? cameraState.radius * observeZoomScale
      : undefined,
    starfieldSuppressed: isObserveMode()
  });
}

function buildOrbitalConfig() {
  if (!isRoundVisualMode() || isObserveMode()) return null;

  const orbitalState =
    typeof control.getOrbitalState === "function"
      ? control.getOrbitalState()
      : {};

  return Object.freeze({
    phase: Number.isFinite(orbitalState?.orbitPhase) ? orbitalState.orbitPhase : 0,
    objects: orbitalSystem.objects,
    altitudeFactor: 0.42
  });
}

function renderSurface(dtMs) {
  if (!planetField) return;

  lastRenderReceipt = renderer.renderPlanet({
    ctx,
    planetField,
    projectPoint: (latDeg, lonDeg, radiusOffsetPx = 0) =>
      control.projectSphere(latDeg, lonDeg, radiusOffsetPx),
    viewState: buildViewState(),
    orbitalSystem: buildOrbitalConfig()
  });

  syncOverlayMarkers();
  updateDiagnostics(dtMs);
}

function frame(now) {
  const dtMs = now - lastFrameAt;
  lastFrameAt = now;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (isRoundVisualMode()) {
    control.stepInertia(dtMs);
  }

  renderSurface(dtMs);
  rafId = requestAnimationFrame(frame);
}

function syncModeButtons() {
  btnFlat.classList.toggle("is-active", mode === "flat");
  btnRound.classList.toggle("is-active", mode === "round");
  btnObserve.classList.toggle("is-active", mode === "observe");
}

function setModePresentation() {
  body.setAttribute("data-mode", mode);
  syncModeButtons();

  if (isFlatMode()) {
    flatLayer.style.display = "flex";
    canvas.style.filter = "blur(8px) brightness(.64)";
    orbitalOverlay.style.opacity = "0";
    universeLayer.style.filter = "none";
    atmosphereLayer.style.filter = "none";
    heroLayer.style.transform = "none";
    hideAllMarkers();
  } else if (isObserveMode()) {
    flatLayer.style.display = "none";
    canvas.style.filter = "none";
    orbitalOverlay.style.opacity = "0";
    universeLayer.style.filter = "blur(.25px)";
    atmosphereLayer.style.filter = "none";
    heroLayer.style.transform = "translateY(-4px)";
    hideAllMarkers();
  } else {
    flatLayer.style.display = "none";
    canvas.style.filter = "none";
    orbitalOverlay.style.opacity = "1";
    universeLayer.style.filter = "none";
    atmosphereLayer.style.filter = "none";
    heroLayer.style.transform = "none";
  }
}

function setDiagnosticsMode(nextMode) {
  diagnosticsMode = nextMode === "full" ? "full" : "peek";
  body.setAttribute("data-diagnostics", diagnosticsMode);
  diagnosticsToggle.textContent = diagnosticsMode === "full" ? "HIDE DIAGNOSTICS" : "DIAGNOSTICS";
}

function navigateToMode(nextMode) {
  persistMotionState();
  location.href = buildModeHref(nextMode);
}

function bindOverlayRoutes() {
  orbitalSystem.objects.forEach((obj) => {
    const marker = overlayMap[obj.id];
    if (!marker) return;

    marker.addEventListener("click", () => {
      persistMotionState();
      location.href = withModeQuery(obj.route);
    });
  });
}

function bindEvents() {
  diagnosticsToggle.addEventListener("click", () => {
    setDiagnosticsMode(diagnosticsMode === "full" ? "peek" : "full");
  });

  btnFlat.addEventListener("click", () => {
    if (mode === "flat") return;
    navigateToMode("flat");
  });

  btnRound.addEventListener("click", () => {
    if (mode === "round") return;
    navigateToMode("round");
  });

  btnObserve.addEventListener("click", () => {
    if (mode === "observe") return;
    navigateToMode("observe");
  });

  if (isRoundVisualMode()) {
    canvas.addEventListener("pointerdown", (event) => {
      isDragging = true;
      lastX = event.clientX;
      lastY = event.clientY;
    }, { passive: true });

    window.addEventListener("pointermove", (event) => {
      if (!isDragging) return;

      const dx = event.clientX - lastX;
      const dy = event.clientY - lastY;

      lastX = event.clientX;
      lastY = event.clientY;

      control.applyDrag(dx, dy);
    }, { passive: true });

    window.addEventListener("pointerup", () => {
      isDragging = false;
    }, { passive: true });

    window.addEventListener("pointercancel", () => {
      isDragging = false;
    }, { passive: true });
  }

  document.querySelectorAll(".flat-card").forEach((card) => {
    card.addEventListener("click", () => {
      const route = card.dataset.route || "/home/";
      persistMotionState();
      location.href = withModeQuery(route);
    });
  });

  window.addEventListener("resize", () => {
    resizeWorld();
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    renderSurface(16.7);
  }, { passive: true });

  window.addEventListener("pagehide", () => {
    persistMotionState();

    if (rafId) {
      cancelAnimationFrame(rafId);
      rafId = 0;
    }
  }, { passive: true });

  window.addEventListener("pageshow", () => {
    if (isRoundVisualMode()) {
      restoreMotionState();
    }

    if (!rafId && isRoundVisualMode()) {
      lastFrameAt = performance.now();
      rafId = requestAnimationFrame(frame);
    }
  }, { passive: true });
}

function start() {
  resizeWorld();
  buildPlanetFieldOnce();

  if (isRoundVisualMode()) {
    restoreMotionState();
  }

  bindOverlayRoutes();
  setModePresentation();
  setDiagnosticsMode("peek");
  bindEvents();
  renderSurface(16.7);

  if (isRoundVisualMode() && !rafId) {
    lastFrameAt = performance.now();
    rafId = requestAnimationFrame(frame);
  }
}

start();
</script>
</body>
</html>
