<!doctype html>
<html
  lang="en"
  data-route="/showroom/globe/earth/"
  data-page="earth-planet-view-only"
  data-contract="EARTH_G6_PLANET_VIEW_ONLY_VISIBLE_MOUNT_TNT_v1"
  data-earth-canvas-contract="EARTH_G6_256_LATTICE_PHYSICS_SYNTHETIC_SATELLITE_VIEW_TNT_v1"
  data-earth-runtime-contract="EARTH_G6_ASSETS_RUNTIME_256_LATTICE_SIMULATION_MODE_TNT_v1"
  data-source-standard="PHYSICS_SYNTHETIC_SATELLITE_VIEW"
  data-base-surface="generated-from-256-lattice"
  data-generated-image="false"
  data-graphic-box="false"
  data-visual-pass-claimed="false"
>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Earth · Planet View</title>

  <link rel="stylesheet" href="/assets/earth/earth_material.css?v=EARTH_G6_PLANET_VIEW_ONLY_VISIBLE_MOUNT_TNT_v1">

  <style>
    :root {
      color-scheme: dark;
      --ink: #f7f1de;
      --soft: rgba(247,241,222,.72);
      --line: rgba(150,190,245,.22);
      --gold: #f4c95d;
      --blue: #7dbbff;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-width: 320px;
      min-height: 100%;
      background:
        radial-gradient(circle at 50% 38%, rgba(92,156,255,.24), transparent 34rem),
        radial-gradient(circle at 50% 55%, rgba(3,8,18,.72), transparent 44rem),
        linear-gradient(180deg, #07111f 0%, #02040a 70%, #000 100%);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow-x: hidden;
    }

    body {
      min-height: 100svh;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    .earth-top {
      position: relative;
      z-index: 3;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: .75rem;
      width: min(1180px, calc(100% - 24px));
      margin: 0 auto;
      padding: max(.8rem, env(safe-area-inset-top)) 0 .7rem;
    }

    .earth-brand {
      display: grid;
      gap: .12rem;
    }

    .earth-brand strong {
      font-size: clamp(1rem, 4vw, 1.35rem);
      line-height: 1;
      letter-spacing: -.035em;
    }

    .earth-brand span {
      color: var(--soft);
      font-size: .72rem;
      font-weight: 900;
      letter-spacing: .12em;
      text-transform: uppercase;
    }

    .earth-nav {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: .45rem;
    }

    .earth-nav a {
      min-height: 2.15rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: .48rem .72rem;
      color: var(--ink);
      background: rgba(255,255,255,.045);
      font-size: .72rem;
      font-weight: 900;
      text-decoration: none;
    }

    .earth-stage {
      position: relative;
      z-index: 2;
      width: min(100%, 980px);
      margin: 0 auto;
      display: grid;
      place-items: center;
      padding: clamp(.5rem, 2vw, 1rem);
    }

    #earthRenderMount {
      position: relative;
      display: grid;
      place-items: center;
      width: min(100%, 860px);
      min-height: clamp(420px, 82vw, 820px);
      margin: 0 auto;
      padding: clamp(8px, 2vw, 18px);
      overflow: visible;
      isolation: isolate;
      border: 1px solid rgba(150,190,245,.18);
      border-radius: clamp(1.1rem, 4vw, 2rem);
      background:
        radial-gradient(circle at 50% 45%, rgba(125,187,255,.22), transparent 30rem),
        radial-gradient(circle at 50% 50%, rgba(0,0,0,.34), transparent 38rem),
        rgba(0,0,0,.16);
      box-shadow:
        0 0 3rem rgba(92,156,255,.14),
        inset 0 1px 0 rgba(255,255,255,.06);
    }

    #earthRenderMount canvas {
      display: block !important;
      visibility: visible !important;
      opacity: 1 !important;
      max-width: min(92vw, 720px) !important;
      max-height: min(92vw, 720px) !important;
    }

    .earth-footer {
      position: relative;
      z-index: 3;
      width: min(1180px, calc(100% - 24px));
      margin: 0 auto;
      padding: .8rem 0 max(.9rem, env(safe-area-inset-bottom));
      color: rgba(247,241,222,.50);
      font-size: .72rem;
      text-align: center;
    }

    [data-earth-route-status],
    [data-earth-preview-status],
    [data-earth-runtime-status],
    .route-receipt,
    [data-route-receipt],
    [data-contract-receipt],
    [data-debug-receipt] {
      position: absolute !important;
      width: 1px !important;
      height: 1px !important;
      overflow: hidden !important;
      clip: rect(0 0 0 0) !important;
      clip-path: inset(50%) !important;
      white-space: nowrap !important;
      border: 0 !important;
      padding: 0 !important;
      margin: -1px !important;
      opacity: 0 !important;
      pointer-events: none !important;
    }

    @media (max-width: 680px) {
      .earth-top {
        align-items: flex-start;
        flex-direction: column;
      }

      .earth-nav {
        justify-content: flex-start;
      }

      #earthRenderMount {
        min-height: clamp(390px, 105vw, 700px);
      }
    }
  </style>
</head>

<body>
  <header class="earth-top">
    <div class="earth-brand">
      <span>Diamond Gate Bridge</span>
      <strong>Earth</strong>
    </div>

    <nav class="earth-nav" aria-label="Earth navigation">
      <a href="/showroom/globe/">Globe Split</a>
      <a href="/showroom/globe/audralia/">Audralia</a>
      <a href="/gauges/">Gauges</a>
    </nav>
  </header>

  <main class="earth-stage" aria-label="Earth planet view">
    <div
      id="earthRenderMount"
      data-earth-render-mount
      data-body="earth"
      data-render-mount
      data-dgb-earth-mount
      aria-label="Interactive physics synthetic satellite-view Earth generated from the 256-state lattice"
    ></div>

    <div data-earth-route-status>
      Earth route waiting for G6 planet render.
    </div>

    <template id="route-receipt" data-route-receipt>
EARTH_G6_PLANET_VIEW_ONLY_VISIBLE_MOUNT_TNT_v1
route=/showroom/globe/earth/
purpose=show_the_planet_now
canvas=/assets/earth/earth_canvas.js
runtime=/assets/earth/earth_assets_runtime.js

physics=/assets/earth/earth_physics_sensor.js
atmosphere=/assets/earth/earth_atmosphere_model.js
base_surface=generated_from_256_lattice
source_standard=PHYSICS_SYNTHETIC_SATELLITE_VIEW
nasa_reference=forbidden
jpg_allowed=false
static_image_dependency=false
graphic_box=false
generated_image=false
visual_pass_claimed=false
    </template>
  </main>

  <footer class="earth-footer">
    EARTH_G6_PLANET_VIEW_ONLY_VISIBLE_MOUNT_TNT_v1 · 256 lattice simulation mode.
  </footer>

  <script src="/assets/earth/earth_lattice_256.js?v=EARTH_G6_PLANET_VIEW_ONLY_VISIBLE_MOUNT_TNT_v1" defer></script>
  <script src="/assets/earth/earth_physics_sensor.js?v=EARTH_G6_PLANET_VIEW_ONLY_VISIBLE_MOUNT_TNT_v1" defer></script>
  <script src="/assets/earth/earth_atmosphere_model.js?v=EARTH_G6_PLANET_VIEW_ONLY_VISIBLE_MOUNT_TNT_v1" defer></script>
  <script src="/assets/earth/earth_canvas.js?v=EARTH_G6_PLANET_VIEW_ONLY_VISIBLE_MOUNT_TNT_v1" defer></script>
  <script src="/assets/earth/earth_assets_runtime.js?v=EARTH_G6_PLANET_VIEW_ONLY_VISIBLE_MOUNT_TNT_v1" defer></script>
</body>
</html>
