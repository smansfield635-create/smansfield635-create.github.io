<!doctype html>
<!-- TNT — /index.html
     BUILD: DRAGON_INDEX_RUNTIME_v1
     PURPOSE: Stable runtime loader for dragon engine
-->

<html lang="en">

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>DiamondGateBridge</title>

<link rel="stylesheet" href="/assets/ui.css">
<link rel="stylesheet" href="/assets/branch.css">

<style>

html,body{
height:100%;
width:100%;
margin:0;
overflow:hidden;
}

#stage{
position:fixed;
inset:0;
}

#gd-dragon{
position:absolute;
inset:0;
}

</style>

</head>

<body>

<div id="stage">

<div id="gd-dragon"></div>

</div>

<script>

(function(){

/* runtime loader (always reloads engine cleanly) */

function loadDragon(){

var old=document.getElementById("dragon_engine_script");
if(old) old.remove();

var s=document.createElement("script");
s.id="dragon_engine_script";
s.src="/assets/dragon-engine.js?v="+Date.now();
s.defer=true;

document.body.appendChild(s);

}

window.addEventListener("DOMContentLoaded",loadDragon);

})();

</script>

</body>
</html>
