<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Compass · DiamondGateBridge</title>

<link rel="stylesheet" href="/assets/ui.css"/>
<link rel="stylesheet" href="/assets/branch.css"/>
<script defer src="/assets/instruments.js"></script>

<style>
a{color:inherit;text-decoration:none}
body{margin:0}
body::before,body::after{pointer-events:none!important}

/* =========================
   GEOMETRY
   ========================= */
:root{
  --padTop:92px;

  /* dial sizes */
  --stage: min(1180px, 94vw);
  --stageH: min(1180px, 86vh);

  /* ring radii */
  --R1: 176px;  /* cardinals */
  --R2: 264px;  /* outer ring */

  /* node sizes (one big core; others smaller by distance, NOT “importance”) */
  --core: 206px;
  --nodeA: 142px; /* cardinals */
  --nodeB: 96px;  /* outer */

  /* material */
  --ink: rgba(255,255,255,.94);
  --mut: rgba(255,255,255,.78);
  --stroke: rgba(255,255,255,.12);

  --onyx0: rgba(6,8,10,.96);
  --onyx1: rgba(10,12,16,.88);

  --crimson: rgba(120,0,22,.44);
  --festival: rgba(255,43,43,.22);
  --opalV: rgba(90,40,120,.14);

  --gold: rgba(201,162,74,.58);
  --goldGlow: rgba(201,162,74,.22);

  --shadowDeep: 0 44px 140px rgba(0,0,0,.82);
  --shadowA: 0 28px 110px rgba(0,0,0,.70);
  --shadowB: 0 18px 60px rgba(0,0,0,.55);
}

/* =========================
   TOP BAR
   ========================= */
.top{
  position:fixed;top:14px;left:0;right:0;
  padding:0 14px;
  z-index:260;
  pointer-events:none;
}
.topbar{
  pointer-events:auto;
  width:min(1120px,96vw);
  margin:0 auto;
  border:1px solid rgba(255,255,255,.12);
  border-radius:22px;
  padding:10px 12px;
  background:
    radial-gradient(circle at 18% 18%, rgba(201,162,74,.10), transparent 62%),
    radial-gradient(circle at 82% 30%, rgba(255,43,43,.10), transparent 64%),
    linear-gradient(145deg, rgba(16,10,12,.86), rgba(8,6,10,.92));
  box-shadow:var(--shadowA), inset 0 0 0 1px rgba(201,162,74,.10);
  backdrop-filter:blur(10px);
  display:flex;align-items:center;justify-content:space-between;
  gap:10px;
}
.brandLeft{
  display:flex;align-items:center;gap:12px;flex-wrap:wrap;min-width:0;
}
.brandTitle{
  font-weight:980;
  letter-spacing:.6px;
  font-size:14px;
  color:rgba(255,255,255,.94);
  white-space:nowrap;
}
.brandSub{
  font-size:12px;
  color:rgba(255,255,255,.74);
  letter-spacing:.2px;
  white-space:nowrap;
}
.brandLinks{
  display:flex;gap:10px;flex-wrap:wrap;
  font-size:12px;
  color:rgba(255,255,255,.72);
}
.brandLinks a{
  padding:6px 10px;
  border-radius:999px;
  border:1px solid rgba(201,162,74,.16);
  background:rgba(0,0,0,.12);
}
.controlsRight{
  display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:flex-end;
}

/* Segmented controls */
.seg{
  display:inline-flex;gap:0;overflow:hidden;border-radius:16px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(0,0,0,.18);
  box-shadow:var(--shadowB);
}
.seg button{
  appearance:none;border:0;background:transparent;
  color:rgba(255,255,255,.82);
  padding:10px 12px;min-height:42px;
  font-weight:980;font-size:13px;letter-spacing:.25px;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
.seg button[aria-pressed="true"]{
  color:rgba(255,255,255,.96);
  background:
    radial-gradient(circle at 50% 50%, rgba(201,162,74,.14), transparent 62%),
    linear-gradient(180deg, rgba(255,43,43,.12), rgba(0,0,0,.10));
  box-shadow: inset 0 0 0 1px rgba(201,162,74,.14), inset 0 -10px 22px rgba(201,162,74,.08);
}

/* =========================
   STAGE
   ========================= */
.stage{
  position:relative;
  width:var(--stage);
  height:var(--stageH);
  margin:var(--padTop) auto 0;
  pointer-events:none;
}

/* sky “panel” inside stage: red/orange night (lighter than obsidian) */
.skyPanel{
  position:absolute;inset:0;
  border-radius:34px;
  overflow:hidden;
  z-index:0;
  pointer-events:none;
}
.skyPanel::before{
  content:"";
  position:absolute;inset:0;
  background:
    radial-gradient(circle at 70% 12%, rgba(255,210,150,.18), transparent 52%),
    radial-gradient(circle at 14% 20%, rgba(255,70,60,.16), transparent 56%),
    radial-gradient(circle at 88% 38%, rgba(255,140,60,.10), transparent 62%),
    radial-gradient(circle at 50% 90%, rgba(0,0,0,.26), transparent 62%),
    linear-gradient(180deg, rgba(140,20,20,.22), rgba(90,10,20,.20) 55%, rgba(0,0,0,.18));
  opacity:1;
}

/* dark-red “slab” under the dial (not black) */
.slab{
  position:absolute;left:50%;top:50%;
  transform:translate(-50%,-50%);
  width:min(1040px,92vw);
  height:min(1040px,92vw);
  border-radius:44px;
  pointer-events:none;
  z-index:1;
  border:1px solid rgba(255,255,255,.10);
  background:
    radial-gradient(circle at 28% 20%, rgba(255,255,255,.08), transparent 55%),
    radial-gradient(circle at 78% 26%, rgba(255,43,43,.10), transparent 60%),
    radial-gradient(circle at 72% 82%, rgba(90,40,120,.10), transparent 64%),
    linear-gradient(160deg, rgba(40,0,12,.62), rgba(10,8,12,.90));
  box-shadow:
    0 70px 240px rgba(0,0,0,.58),
    inset 0 2px 0 rgba(255,255,255,.08),
    inset 0 -70px 140px rgba(0,0,0,.58);
}

/* water-glass compass face (lighter red “glass”), where ripples live */
.dial{
  position:absolute;
  left:50%;top:50%;
  transform:translate(-50%,-50%);
  width:min(940px,90vw);
  height:min(940px,90vw);
  border-radius:999px;
  pointer-events:none;
  z-index:2;
  overflow:hidden;
}
.dial::before{
  content:"";
  position:absolute;inset:0;border-radius:999px;
  background:
    radial-gradient(circle at 50% 40%,
      rgba(255,255,255,.06),
      rgba(0,0,0,.16) 56%,
      rgba(0,0,0,.36) 78%,
      rgba(0,0,0,.00) 92%),
    radial-gradient(circle at 50% 50%, rgba(255,120,90,.14), transparent 62%),
    radial-gradient(circle at 50% 50%, rgba(201,162,74,.08), transparent 68%),
    linear-gradient(180deg, rgba(255,70,60,.08), rgba(0,0,0,.00));
  box-shadow:
    inset 0 0 0 2px rgba(255,255,255,.06),
    inset 0 0 0 10px rgba(0,0,0,.10),
    inset 0 0 80px rgba(0,0,0,.35),
    0 50px 180px rgba(0,0,0,.28);
  opacity:.96;
}
.dial::after{
  content:"";
  position:absolute;inset:-14%;
  background:
    /* rings */
    radial-gradient(circle at 50% 50%, transparent 0 36%, rgba(255,255,255,.06) 36% 36.6%, transparent 37% 100%),
    radial-gradient(circle at 50% 50%, transparent 0 52%, rgba(255,255,255,.06) 52% 52.6%, transparent 53% 100%),
    radial-gradient(circle at 50% 50%, transparent 0 68%, rgba(255,255,255,.06) 68% 68.6%, transparent 69% 100%),

    /* cardinal engrave (black + gold overlay feel) */
    linear-gradient(90deg, transparent 0 49.7%, rgba(0,0,0,.22) 49.7% 50.3%, transparent 50.3% 100%),
    linear-gradient(0deg,  transparent 0 49.7%, rgba(0,0,0,.22) 49.7% 50.3%, transparent 50.3% 100%),

    /* gold “curved” resonance (no flat orthogonal grid) */
    repeating-conic-gradient(from 45deg at 50% 50%,
      rgba(201,162,74,.07) 0 1.2deg,
      transparent 1.2deg 7.5deg),

    radial-gradient(circle at 50% 50%, rgba(255,255,255,.04), transparent 62%);
  filter: blur(.25px);
  opacity:.84;
  mask: radial-gradient(circle at 50% 50%, transparent 0 18%, #000 20% 100%);
  -webkit-mask: radial-gradient(circle at 50% 50%, transparent 0 18%, #000 20% 100%);
}
.faceLetters{
  position:absolute;left:50%;top:50%;
  transform:translate(-50%,-50%);
  width:min(940px,90vw);
  height:min(940px,90vw);
  pointer-events:none;
  z-index:3;
  opacity:.78;
}
.faceLetters span{
  position:absolute;
  color:rgba(201,162,74,.50);
  font-weight:980;
  letter-spacing:2px;
  font-size:12px;
  text-shadow:0 0 12px rgba(0,0,0,.55);
}
.faceLetters .N{left:50%;top:12px;transform:translateX(-50%)}
.faceLetters .E{right:12px;top:50%;transform:translateY(-50%)}
.faceLetters .S{left:50%;bottom:12px;transform:translateX(-50%)}
.faceLetters .W{left:12px;top:50%;transform:translateY(-50%)}

/* =========================
   GEM NODES
   ========================= */
.node{
  position:absolute;
  left:50%;top:50%;
  transform:translate(-50%,-50%) rotate(45deg);
  cursor:pointer;
  pointer-events:auto;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.18);
  transition:box-shadow .16s ease, border-color .16s ease, filter .16s ease;
  z-index:10;
  border-radius:22px;
}
.core{width:var(--core);height:var(--core);z-index:12;border-radius:26px}
.a{width:var(--nodeA);height:var(--nodeA)}
.b{width:var(--nodeB);height:var(--nodeB);border-radius:18px}

.surface{
  background:
    radial-gradient(circle at 20% 18%, rgba(255,255,255,.28), transparent 46%),
    radial-gradient(circle at 78% 22%, var(--festival), transparent 62%),
    radial-gradient(circle at 74% 84%, var(--opalV), transparent 64%),
    radial-gradient(circle at 28% 84%, var(--crimson), transparent 70%),
    linear-gradient(160deg, var(--onyx1), var(--onyx0));
  box-shadow:
    var(--shadowDeep),
    0 0 24px rgba(255,43,43,.08),
    inset 0 2px 0 rgba(255,255,255,.18),
    inset 0 -52px 92px rgba(0,0,0,.88);
}

/* honeycomb / lattice “fractalized” surface hint (edge-only + subtle) */
.surface::before{
  content:"";
  position:absolute;inset:0;border-radius:inherit;pointer-events:none;
  opacity:.28;
  background:
    repeating-linear-gradient(60deg, rgba(201,162,74,.10) 0 1px, transparent 1px 14px),
    repeating-linear-gradient(-60deg, rgba(201,162,74,.08) 0 1px, transparent 1px 14px),
    repeating-linear-gradient(0deg, rgba(201,162,74,.06) 0 1px, transparent 1px 14px);
  mask:
    radial-gradient(circle at 50% 50%, transparent 0 70%, #000 78% 100%),
    linear-gradient(#000,#000);
  -webkit-mask:
    radial-gradient(circle at 50% 50%, transparent 0 70%, #000 78% 100%),
    linear-gradient(#000,#000);
}

/* highlight streak */
.surface::after{
  content:"";
  position:absolute;left:12%;right:12%;top:10%;
  height:30%;
  border-radius:999px;
  background:linear-gradient(to bottom, rgba(255,255,255,.20), rgba(255,255,255,0));
  transform:rotate(-12deg);
  pointer-events:none;
  opacity:.92;
}

/* glow-only hover (NO movement) */
.node:hover{
  border-color:rgba(201,162,74,.44);
  box-shadow:
    var(--shadowDeep),
    0 0 0 2px rgba(201,162,74,.14),
    0 0 34px rgba(201,162,74,.18),
    inset 0 2px 0 rgba(255,255,255,.20),
    inset 0 -52px 92px rgba(0,0,0,.88);
}
.node:active{filter:brightness(.98)}

/* text */
.inner{
  width:100%;height:100%;
  transform:rotate(-45deg);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  text-align:center;
  padding:10px;
  gap:6px;
  color:#fff;
}
.word{
  font-weight:980;
  letter-spacing:.6px;
  line-height:1.05;
  text-shadow:0 0 18px rgba(0,0,0,.42);
  font-size:clamp(10px, 1.15vw, 16px);
  max-width:100%;
}
.code{
  font-weight:950;
  font-size:10px;
  letter-spacing:1.2px;
  opacity:.78;
}

/* =========================
   CORNER BUTTONS (EXIT/HUB)
   ========================= */
.corner{
  position:fixed;
  bottom:max(16px, env(safe-area-inset-bottom));
  z-index:260;
  pointer-events:none;
}
.corner .dmini{pointer-events:auto}
.corner.left{left:16px}
.corner.right{right:16px}

.dmini{
  width:56px;height:56px;
  border-radius:16px;
  border:1px solid rgba(255,255,255,.14);
  background:
    radial-gradient(circle at 50% 40%, rgba(255,255,255,.08), transparent 52%),
    linear-gradient(145deg, rgba(10,12,16,.78), rgba(6,8,10,.92));
  box-shadow:var(--shadowB), 0 0 0 1px rgba(201,162,74,.10), 0 0 18px rgba(201,162,74,.10);
  display:grid;place-items:center;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
  transform:rotate(45deg);
  position:relative;
  overflow:hidden;
  transition:box-shadow .16s ease, border-color .16s ease;
}
.dmini:hover{
  border-color:rgba(201,162,74,.44);
  box-shadow:var(--shadowB), 0 0 0 2px rgba(201,162,74,.14), 0 0 30px rgba(201,162,74,.18);
}
.dmini span{
  transform:rotate(-45deg);
  font-weight:980;
  font-size:12px;
  letter-spacing:.6px;
  color:rgba(255,255,255,.92);
  user-select:none;
}
.cornerLabel{
  margin-top:10px;
  text-align:center;
  color:rgba(255,255,255,.72);
  font-size:11px;
  letter-spacing:.4px;
}

/* bottom note */
.noteWrap{
  width:min(1120px,94vw);
  margin:14px auto 0;
  padding-bottom:90px;
}
.note{
  border:1px solid rgba(255,255,255,.12);
  border-radius:22px;
  padding:14px 16px;
  background:
    radial-gradient(circle at 18% 22%, rgba(255,43,43,.10), transparent 62%),
    radial-gradient(circle at 82% 32%, rgba(90,40,120,.10), transparent 66%),
    radial-gradient(circle at 50% 92%, rgba(201,162,74,.10), transparent 62%),
    rgba(0,0,0,.14);
  box-shadow:0 26px 90px rgba(0,0,0,.50);
  color:rgba(255,255,255,.86);
  line-height:1.55;
  font-size:13.5px;
}
.note b{color:rgba(255,255,255,.95)}
.note .g{color:rgba(201,162,74,.82);font-weight:980}

@media (max-width:720px){
  :root{
    --core:196px;
    --nodeA:136px;
    --nodeB:92px;
    --R1:164px;
    --R2:244px;
    --padTop:108px;
  }
  .stage{height:min(1100px,86vh)}
}
@media (max-width:520px){
  :root{
    --core:186px;
    --nodeA:130px;
    --nodeB:90px;
    --R1:154px;
    --R2:232px;
  }
  .brandSub{display:none}
}
</style>
</head>

<body>

<div class="top" aria-label="Top controls">
  <div class="topbar">
    <div class="brandLeft" aria-label="Brand">
      <div class="brandTitle" id="brandTitle">WELCOME TO THE COMPASS</div>
      <div class="brandSub" id="brandSub">A visual navigation interface. Start at CORE. Pick one hub. Move clean.</div>
      <div class="brandLinks" aria-label="Brand links">
        <a href="https://diamondgatebridge.com" target="_blank" rel="noopener">diamondgatebridge.com</a>

      </div>
    </div>

    <div class="controlsRight" aria-label="Layer controls">
      <div class="seg" role="group" aria-label="Compass layer">
        <button type="button" id="layer1" aria-pressed="true">LAYER 1</button>
        <button type="button" id="layer2" aria-pressed="false">LAYER 2</button>
      </div>
    </div>

</div>

<div class="stage" id="stage" aria-label="Compass dial">
  <div class="skyPanel" aria-hidden="true"></div>

  </div>
</div>

</div>

  <div class="cornerLabel" id="lblHub">HUB</div>

<script>
(function(){
  "use strict";

  // =========================
  // STATE (gd_* only; no new keys)
  // =========================
  var qs=new URLSearchParams(location.search);
  var LS=window.localStorage;

  var lang  = qs.get("lang")  || LS.getItem("gd_lang")  || "en";     // kept, but EN-only UI
  var style = qs.get("style") || LS.getItem("gd_style") || "informal";
  var time  = qs.get("time")  || LS.getItem("gd_time")  || "now";
  var depth = qs.get("depth") || LS.getItem("gd_depth") || "explore";
  var lane  = qs.get("lane")  || "platform"; // URL-only if present, not stored

  if(lang!=="en" && lang!=="zh" && lang!=="es") lang="en";
  if(style!=="informal" && style!=="formal") style="informal";
  if(time==="trajectory") time="post";
  if(time!=="origin" && time!=="now" && time!=="post") time="now";
  if(depth!=="explore" && depth!=="learn") depth="explore";
  if(lane!=="platform" && lane!=="engineering") lane="platform";

  try{
    LS.setItem("gd_lang","en");       // EN-only tonight
    LS.setItem("gd_style",style);
    LS.setItem("gd_time",time);
    LS.setItem("gd_depth",depth);
  }catch(e){}

  document.documentElement.lang="en";

  function q(){
    var p=new URLSearchParams();
    p.set("lang","en");
    p.set("style",style);
    p.set("time",time);
    p.set("depth",depth);
    if(lane==="platform"||lane==="engineering") p.set("lane",lane);
    return "?"+p.toString();
  }
  function go(path){ window.location.href = path + q(); }

  // =========================
  // ROUTING (16 hubs split across 2 layers; no duplicates)
  // =========================
  var PLACEHOLDER_404 = "/404.html";

  // CORE routes
  var CORE1_ROUTE = "/index-core/index.html";     // diagnostic gravitational well entry
  var CORE2_ROUTE = "/index-spine/index.html";    // (placeholder spine core) create later; will 404 if missing

  // exit / hub
  var EXIT_ROUTE = "/door/";
  var HUB_ROUTE  = "/home/";

  // LAYER 1: 4 hubs + CORE1 (not counted in 16)
  // N/E/S/W meaning (locked by your last accepted hierarchy):
  // N=LAWS, E=ENERGY, S=FINANCE, W=GOVERNANCE
  var L1 = [
    {code:"N", label:"LAWS",      href:"/laws/"},
    {code:"E", label:"ENERGY",    href:"/explore/frontier/energy/"},
    {code:"S", label:"FINANCE",   href:"/finance/"},
    {code:"W", label:"GOVERNANCE",href:"/governance/"}
  ];

  // LAYER 2: remaining 12 hubs + CORE2 (not counted in 16)
  var L2 = [
    {code:"NE",  label:"PRODUCTS",   href:"/products/"},
    {code:"SE",  label:"RESEARCH",   href:"/research/"},
    {code:"SW",  label:"EXPLORE",    href:"/explore/"},
    {code:"NW",  label:"DOCTRINE",   href:"/products/capital-doctrine/"},
    {code:"NNE", label:"EDUCATION",  href:"/products/education/"},
    {code:"ENE", label:"FRONTIER",   href:"/explore/frontier/"},
    {code:"ESE", label:"INFRA",      href:"/explore/infrastructure/"},
    {code:"SSE", label:"AGRICULTURE",href:"/products/agriculture/"},
    {code:"SSW", label:"GAUGES",     href:"/gauges/"},
    {code:"WSW", label:"VISION",     href:"/explore/frontier/vision/"},
    {code:"WNW", label:"LATTICE",    href:"/explore/frontier/lattice/"},
    {code:"NNW", label:"SHIMMER",    href:"/explore/frontier/shimmer/"}
  ];

  function normalizeNoDup(list){
    var seen = Object.create(null);
    var out = [];
    for(var i=0;i<list.length;i++){
      var it=list[i];
      var h=(it.href||"").trim();
      if(!h) h=PLACEHOLDER_404;
      if(seen[h]) h=PLACEHOLDER_404;
      seen[h]=true;
      out.push({code:it.code,label:it.label,href:h});
    }
    return out;
  }
  L1 = normalizeNoDup(L1);
  L2 = normalizeNoDup(L2);

  // =========================
  // BUILD BUTTONS
  // =========================
  var stage=document.getElementById("stage");
  var currentLayer = "1"; // "1" or "2"
  var nodes = [];         // {el, data}

  function mkNode(label, code, cls){
    var d=document.createElement("div");
    d.className="node surface "+cls;
    d.setAttribute("role","button");
    d.tabIndex=0;

    var inner=document.createElement("div");
    inner.className="inner";

    var w=document.createElement("div");
    w.className="word";
    w.textContent=label;

    var c=document.createElement("div");
    c.className="code";
    c.textContent=code;

    inner.appendChild(w);
    inner.appendChild(c);
    d.appendChild(inner);

    return d;
  }

  function placeAt(el, x, y){
    el.style.left = x+"px";
    el.style.top  = y+"px";
  }

  function clearNodes(){
    nodes = [];
    stage.querySelectorAll(".node").forEach(function(n){ n.remove(); });
  }

  function buildLayer(layer){
    clearNodes();

    var rect=stage.getBoundingClientRect();
    var cx=rect.width/2, cy=rect.height/2;

    var cs=getComputedStyle(document.documentElement);
    var R1=parseFloat(cs.getPropertyValue("--R1"))||176;
    var R2=parseFloat(cs.getPropertyValue("--R2"))||264;

    // Core
    var core = mkNode(layer==="1" ? "CORE" : "CORE 2", layer==="1" ? "INDEX" : "SPINE", "core");
    placeAt(core, cx, cy);
    stage.appendChild(core);

    var coreRoute = (layer==="1") ? CORE1_ROUTE : CORE2_ROUTE;
    core.addEventListener("click", function(){ go(coreRoute || PLACEHOLDER_404); }, {passive:true});
    core.addEventListener("keydown", function(e){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); go(coreRoute || PLACEHOLDER_404); }});

    // Keep FX from drawing over the active core
    window.__GD_CORE_EXCLUDE = { x: cx, y: cy, r: Math.max(96, Math.min(rect.width,rect.height)*0.12) };

    if(layer==="1"){
      // N/E/S/W pinned
      var map = {N:-Math.PI/2, E:0, S:Math.PI/2, W:Math.PI};
      for(var i=0;i<L1.length;i++){
        var it=L1[i];
        var a=map[it.code] || (-Math.PI/2 + i*Math.PI/2);
        var x=cx + R1*Math.cos(a);
        var y=cy + R1*Math.sin(a);
        var n=mkNode(it.label, it.code, "a");
        placeAt(n,x,y);
        stage.appendChild(n);

        (function(path, el){
          el.addEventListener("click", function(){ go(path); }, {passive:true});
          el.addEventListener("keydown", function(e){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); go(path); }});
        })(it.href, n);

        nodes.push({el:n, data:it});
      }
    }else{
      // 12 around the ring
      var nCount=L2.length;
      for(var j=0;j<nCount;j++){
        var it2=L2[j];
        var ang = (j/nCount)*Math.PI*2 - Math.PI/2;
        var x2 = cx + R2*Math.cos(ang);
        var y2 = cy + R2*Math.sin(ang);
        var n2 = mkNode(it2.label, it2.code, "b");
        placeAt(n2,x2,y2);
        stage.appendChild(n2);

        (function(path, el){
          el.addEventListener("click", function(){ go(path); }, {passive:true});
          el.addEventListener("keydown", function(e){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); go(path); }});
        })(it2.href, n2);

        nodes.push({el:n2, data:it2});
      }
    }
  }

  // =========================
  // BACKGROUND FX (single canvas; stable moon; slither dragons; lanterns; clouds)
  // =========================
  (function initFX(){
    var canvas = document.getElementById("gd_fx_canvas");
    if(canvas) canvas.remove();

    canvas = document.createElement("canvas");
    canvas.id = "gd_fx_canvas";
    canvas.style.position = "fixed";
    canvas.style.inset = "0";
    canvas.style.width = "100%";
    canvas.style.height = "100%";
    canvas.style.pointerEvents = "none";
    canvas.style.zIndex = "4"; // above dial, below buttons
    document.body.prepend(canvas);

    var ctx = canvas.getContext("2d", {alpha:true, desynchronized:true});
    if(!ctx) return;

    var DPR_CAP = 1.6;
    var DPR = 1;
    var W=1,H=1;
    function resize(){
      var ww = Math.max(1, window.innerWidth || 1);
      var hh = Math.max(1, window.innerHeight || 1);
      var dpr = 1;
      try{ dpr = window.devicePixelRatio || 1; }catch(e){}
      DPR = Math.min(DPR_CAP, Math.max(1, dpr));
      W = Math.floor(ww * DPR);
      H = Math.floor(hh * DPR);
      canvas.width = W;
      canvas.height = H;
    }
    resize();
    window.addEventListener("resize", resize, {passive:true});

    function lerp(a,b,t){ return a+(b-a)*t; }
    function clamp(n,a,b){ return Math.max(a, Math.min(b,n)); }

    // ---- seeded moon craters (stable) ----
    var moonSeed = Math.random()*1e9;
    function rnd(){
      // deterministic LCG
      moonSeed = (moonSeed * 1664525 + 1013904223) % 4294967296;
      return moonSeed / 4294967296;
    }
    var moonCraters = [];
    function seedMoonCraters(){
      moonCraters = [];
      for(var i=0;i<14;i++){
        moonCraters.push({
          ox: (rnd()*2-1)*0.58,
          oy: (rnd()*2-1)*0.58,
          r: lerp(0.05, 0.16, rnd()),
          a: lerp(0.10, 0.28, rnd())
        });
      }
    }
    seedMoonCraters();

    // ---- phase (random per load, advances by referrer return without storage) ----
    var phase = Math.random(); // 0..1
    // If returning from inside site, nudge forward using time delta only
    // (no storage; just makes it *feel* progressive)
    var t0 = Date.now();
    function phase01(){
      var dt = (Date.now() - t0) / 1000;
      var p = (phase + dt/240.0) % 1; // very slow drift while on page
      return p;
    }

    // ---- clouds (3 depth layers) ----
    var clouds = [];
    function seedClouds(){
      clouds = [];
      var count = 26;
      for(var i=0;i<count;i++){
        clouds.push({
          x: rnd()*W,
          y: lerp(H*0.52, H*0.92, rnd()),
          r: lerp(80, 240, rnd())*DPR,
          a: lerp(0.02, 0.07, rnd()),
          sp: lerp(0.015, 0.045, rnd())*DPR,
          z: rnd() // depth
        });
      }
    }
    seedClouds();

    // ---- lanterns (embers/lantern drift upward) ----
    var lanterns = [];
    function seedLanterns(){
      lanterns = [];
      var n = 26;
      for(var i=0;i<n;i++){
        lanterns.push({
          x: rnd()*W,
          y: H + rnd()*H*0.4,
          r: lerp(1.6, 3.4, rnd())*DPR,
          sp: lerp(0.018, 0.050, rnd())*DPR,
          wob: rnd()*6.28,
          a: lerp(0.18, 0.32, rnd())
        });
      }
    }
    seedLanterns();

    // ---- dragons (2) ----
    var CN_CLASSIC = ["道生一","一生二","二生三","三生万物","道可道","非常道"];
    var EN_PHRASES = ["SAY LESS, DO MORE","BOUND THEN SCALE","RECEIPTS > ARGUMENTS","CONTAIN FIRST","MEASURE THEN MOVE"];

    function drawDragon(yMid, t, top){
      var exclude = window.__GD_CORE_EXCLUDE || {x:W*0.5,y:H*0.5,r:120*DPR};
      // slower speed
      var speed = (top ? 0.020 : 0.018) * DPR; // px/ms
      var margin = W*0.35;
      var travel = W + margin*2;
      var u = (t*speed) % travel;
      var headX = (W + margin - u);

      var len = W*0.92;
      var segs = 34;
      var amp = (top ? 18 : 22) * DPR;
      var thick = (top ? 16 : 15) * DPR;

      var bodyFill = top ? "rgba(6,26,16,0.88)" : "rgba(5,22,14,0.86)";
      var belly = "rgba(120,0,22,0.24)"; // subtle red belly tint
      var edge = "rgba(0,0,0,0.40)";

      // build spine points
      var pts = [];
      for(var i=0;i<=segs;i++){
        var s = i/segs;
        var x = headX - len*s;
        var y = yMid + Math.sin(s*6.6 + t*0.0010 + (top?0.2:1.1))*amp;
        pts.push({x:x,y:y});
      }

      // clip so dragon does NOT pass over core
      ctx.save();
      ctx.beginPath();
      ctx.rect(0,0,W,H);
      ctx.moveTo(exclude.x + exclude.r, exclude.y);
      ctx.arc(exclude.x, exclude.y, exclude.r*1.05, 0, Math.PI*2, true);
      ctx.closePath();
      ctx.clip("evenodd");

      // body shadow stroke
      ctx.lineCap="round"; ctx.lineJoin="round";
      ctx.strokeStyle=edge;
      ctx.lineWidth=thick + 6*DPR;
      ctx.beginPath();
      for(var j=0;j<pts.length;j++){
        var p=pts[j];
        if(j===0) ctx.moveTo(p.x,p.y); else ctx.lineTo(p.x,p.y);
      }
      ctx.stroke();

      // body fill stroke (main)
      ctx.strokeStyle=bodyFill;
      ctx.lineWidth=thick;
      ctx.beginPath();
      for(var k=0;k<pts.length;k++){
        var p2=pts[k];
        if(k===0) ctx.moveTo(p2.x,p2.y); else ctx.lineTo(p2.x,p2.y);
      }
      ctx.stroke();

      // belly glow stroke
      ctx.globalAlpha=0.65;
      ctx.strokeStyle=belly;
      ctx.lineWidth=thick*0.65;
      ctx.beginPath();
      for(var m=0;m<pts.length;m++){
        var p3=pts[m];
        if(m===0) ctx.moveTo(p3.x,p3.y+thick*0.42); else ctx.lineTo(p3.x,p3.y+thick*0.42);
      }
      ctx.stroke();
      ctx.globalAlpha=1;

      // scale “plates” (hex-ish highlights)
      ctx.strokeStyle="rgba(212,175,55,0.10)";
      ctx.lineWidth=1.2*DPR;
      for(var sIdx=2;sIdx<pts.length-2;sIdx++){
        if(sIdx%2!==0) continue;
        var a=pts[sIdx], b=pts[sIdx+1];
        var ang=Math.atan2(b.y-a.y, b.x-a.x);
        var rr=thick*0.60;
        ctx.beginPath();
        ctx.arc(a.x, a.y, rr, ang+0.6, ang+1.8);
        ctx.stroke();
      }

      // head (more “dragon” than circles: snout + crest + jaw)
      var hd=pts[0];
      ctx.save();
      ctx.translate(hd.x, hd.y);
      // direction is left
      ctx.rotate(Math.PI);

      // skull
      ctx.fillStyle="rgba(6,30,18,0.96)";
      ctx.beginPath();
      ctx.ellipse(0,0,thick*1.05,thick*0.82,0,0,Math.PI*2);
      ctx.fill();

      // snout
      ctx.fillStyle="rgba(5,24,15,0.96)";
      ctx.beginPath();
      ctx.ellipse(thick*0.85, thick*0.18, thick*0.88, thick*0.52, 0, 0, Math.PI*2);
      ctx.fill();

      // jaw line
      ctx.strokeStyle="rgba(0,0,0,0.35)";
      ctx.lineWidth=2*DPR;
      ctx.beginPath();
      ctx.moveTo(thick*0.15, thick*0.35);
      ctx.lineTo(thick*1.35, thick*0.55);
      ctx.stroke();

      // eye
      ctx.fillStyle="rgba(212,175,55,0.95)";
      ctx.beginPath();
      ctx.arc(thick*0.25, -thick*0.12, thick*0.15, 0, Math.PI*2);
      ctx.fill();

      // horns
      ctx.strokeStyle="rgba(212,175,55,0.55)";
      ctx.lineWidth=2*DPR;
      ctx.beginPath();
      ctx.moveTo(-thick*0.20, -thick*0.55);
      ctx.lineTo(-thick*0.95, -thick*1.40);
      ctx.moveTo(thick*0.05, -thick*0.60);
      ctx.lineTo(-thick*0.20, -thick*1.55);
      ctx.stroke();

      // whiskers
      ctx.strokeStyle="rgba(212,175,55,0.40)";
      ctx.lineWidth=1.3*DPR;
      ctx.beginPath();
      ctx.moveTo(thick*1.45, thick*0.10);
      ctx.lineTo(thick*2.40, -thick*0.35);
      ctx.moveTo(thick*1.45, thick*0.20);
      ctx.lineTo(thick*2.35, thick*0.55);
      ctx.stroke();

      ctx.restore(); // head

      // text “tattoo” (gold glow)
      var phrases = top ? CN_CLASSIC : EN_PHRASES;
      var phrase = phrases[Math.floor((t*0.00012) % phrases.length)];
      ctx.save();
      ctx.globalAlpha=0.92;
      ctx.fillStyle="rgba(212,175,55,0.78)";
      ctx.shadowColor="rgba(212,175,55,0.35)";
      ctx.shadowBlur=10*DPR;
      ctx.font=(12*DPR)+"px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace";
      for(var q=6;q<pts.length-6;q+=7){
        var pA=pts[q], pB=pts[q+1];
        var ang2=Math.atan2(pB.y-pA.y, pB.x-pA.x);
        ctx.save();
        ctx.translate(pA.x, pA.y);
        ctx.rotate(ang2);
        ctx.fillText(phrase, -ctx.measureText(phrase).width*0.12, -thick*0.95);
        ctx.restore();
      }
      ctx.restore();

      ctx.restore(); // clip
    }

    // ---- water ripples (radial outward, stable direction) ----
    function drawWater(t){
      var rect=stage.getBoundingClientRect();
      var cx=(rect.left + rect.width*0.5) * DPR;
      var cy=(rect.top  + rect.height*0.5) * DPR;
      var r=Math.min(rect.width,rect.height)*0.34*DPR;

      ctx.save();
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI*2);
      ctx.clip();

      // gentle tint
      var grd=ctx.createRadialGradient(cx, cy-r*0.2, r*0.2, cx, cy, r);
      grd.addColorStop(0, "rgba(255,210,170,0.12)");
      grd.addColorStop(0.55, "rgba(255,120,90,0.07)");
      grd.addColorStop(1, "rgba(0,0,0,0)");
      ctx.fillStyle=grd;
      ctx.fillRect(cx-r, cy-r, r*2, r*2);

      // outward rings
      ctx.strokeStyle="rgba(255,255,255,0.05)";
      ctx.lineWidth=1.1*DPR;
      var base=(t*0.00055) % 1; // outward drift
      for(var i=0;i<8;i++){
        var rr=r*(0.18 + i*0.10 + base*0.10);
        ctx.beginPath();
        ctx.arc(cx, cy, rr, 0, Math.PI*2);
        ctx.stroke();
      }

      // moving gold arc highlight
      ctx.globalAlpha=0.72;
      ctx.strokeStyle="rgba(212,175,55,0.06)";
      ctx.lineWidth=2*DPR;
      var a=t*0.00030;
      ctx.beginPath();
      ctx.arc(cx, cy, r*0.80, a, a+1.2);
      ctx.stroke();

      ctx.restore();
    }

    // ---- moon + reflection (single) ----
    function drawMoon(t){
      var mx=W*0.78, my=H*0.16;
      var mr=Math.min(W,H)*0.062;

      // glow
      ctx.save();
      ctx.globalAlpha=1;
      var g=ctx.createRadialGradient(mx,my,mr*0.2,mx,my,mr*2.6);
      g.addColorStop(0,"rgba(255,245,210,0.95)");
      g.addColorStop(0.35,"rgba(255,220,160,0.50)");
      g.addColorStop(1,"rgba(255,220,160,0)");
      ctx.fillStyle=g;
      ctx.beginPath();
      ctx.arc(mx,my,mr*2.6,0,Math.PI*2);
      ctx.fill();

      // disk
      ctx.shadowColor="rgba(255,240,220,0.40)";
      ctx.shadowBlur=18*DPR;
      ctx.fillStyle="rgba(255,248,232,0.95)";
      ctx.beginPath();
      ctx.arc(mx,my,mr,0,Math.PI*2);
      ctx.fill();
      ctx.shadowBlur=0;

      // shadow (single-moon phase, source-atop)
      var p=phase01();                 // 0..1
      var k=Math.cos(p*Math.PI*2);     // -1..1
      ctx.globalCompositeOperation="source-atop";
      ctx.fillStyle="rgba(0,0,0,0.60)";
      ctx.beginPath();
      ctx.ellipse(mx + (k*mr*0.58), my, mr, mr, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.globalCompositeOperation="source-over";

      // craters (seeded)
      ctx.globalAlpha=1;
      for(var i=0;i<moonCraters.length;i++){
        var c=moonCraters[i];
        var cx=mx + c.ox*mr*0.90;
        var cy=my + c.oy*mr*0.90;
        var rr=mr*c.r;
        ctx.fillStyle="rgba(0,0,0,"+c.a.toFixed(3)+")";
        ctx.beginPath();
        ctx.arc(cx,cy,rr,0,Math.PI*2);
        ctx.fill();
      }

      // reflection on “water line” (lower half)
      var wy=H*0.60;
      var rg=ctx.createLinearGradient(0,wy,0,wy+mr*4.2);
      rg.addColorStop(0,"rgba(255,235,180,0.18)");
      rg.addColorStop(1,"rgba(255,235,180,0)");
      ctx.fillStyle=rg;
      ctx.beginPath();
      ctx.ellipse(mx, wy+mr*0.8, mr*0.95, mr*2.2, 0, 0, Math.PI*2);
      ctx.fill();

      ctx.restore();
    }

    // ---- clouds (behind dial, in reflection plane), NOT over core ----
    function drawClouds(t){
      var exclude = window.__GD_CORE_EXCLUDE || {x:W*0.5,y:H*0.5,r:120*DPR};
      var yMin=H*0.50;

      ctx.save();
      ctx.beginPath();
      ctx.rect(0,0,W,H);
      ctx.moveTo(exclude.x + exclude.r, exclude.y);
      ctx.arc(exclude.x, exclude.y, exclude.r*1.10, 0, Math.PI*2, true);
      ctx.closePath();
      ctx.clip("evenodd");

      // three depth layers via z
      for(var i=0;i<clouds.length;i++){
        var c=clouds[i];
        var z=c.z;
        var sp = c.sp * lerp(0.65, 1.35, z);
        var x = (c.x + t*sp*0.04) % (W + c.r*2) - c.r;
        var y = clamp(c.y, yMin, H);
        var rr = c.r * lerp(0.75, 1.25, z);
        var a  = c.a * lerp(0.70, 1.25, z);

        // depth shading: darker base + bright crown
        ctx.globalCompositeOperation="screen";
        ctx.globalAlpha=a;
        var g=ctx.createRadialGradient(x, y-rr*0.15, 0, x, y, rr);
        g.addColorStop(0, "rgba(255,230,190,1)");
        g.addColorStop(0.45, "rgba(255,170,130,0.55)");
        g.addColorStop(1, "rgba(0,0,0,0)");
        ctx.fillStyle=g;
        ctx.beginPath();
        ctx.arc(x,y,rr,0,Math.PI*2);
        ctx.fill();

        ctx.globalCompositeOperation="source-over";
        ctx.globalAlpha=a*0.55;
        var g2=ctx.createRadialGradient(x, y+rr*0.10, 0, x, y, rr);
        g2.addColorStop(0, "rgba(0,0,0,0.18)");
        g2.addColorStop(1, "rgba(0,0,0,0)");
        ctx.fillStyle=g2;
        ctx.beginPath();
        ctx.arc(x,y,rr,0,Math.PI*2);
        ctx.fill();
      }

      ctx.restore();
      ctx.globalAlpha=1;
      ctx.globalCompositeOperation="source-over";
    }

    // ---- lanterns (upward drift), NOT over core ----
    function drawLanterns(t){
      var exclude = window.__GD_CORE_EXCLUDE || {x:W*0.5,y:H*0.5,r:120*DPR};
      ctx.save();
      ctx.beginPath();
      ctx.rect(0,0,W,H);
      ctx.moveTo(exclude.x + exclude.r, exclude.y);
      ctx.arc(exclude.x, exclude.y, exclude.r*1.08, 0, Math.PI*2, true);
      ctx.closePath();
      ctx.clip("evenodd");

      for(var i=0;i<lanterns.length;i++){
        var l=lanterns[i];
        l.y -= l.sp;
        l.x += Math.sin(t*0.0005 + l.wob)*0.12*DPR;

        if(l.y < -40*DPR){
          l.y = H + rnd()*H*0.25;
          l.x = rnd()*W;
        }

        // warm glow dot
        ctx.save();
        ctx.globalCompositeOperation="screen";
        ctx.globalAlpha=l.a;
        var g=ctx.createRadialGradient(l.x,l.y,0,l.x,l.y,l.r*6);
        g.addColorStop(0,"rgba(255,220,150,1)");
        g.addColorStop(0.35,"rgba(255,140,90,0.55)");
        g.addColorStop(1,"rgba(0,0,0,0)");
        ctx.fillStyle=g;
        ctx.beginPath();
        ctx.arc(l.x,l.y,l.r*6,0,Math.PI*2);
        ctx.fill();
        ctx.restore();
      }

      ctx.restore();
      ctx.globalCompositeOperation="source-over";
      ctx.globalAlpha=1;
    }

    // deterministic rand for lantern respawn (uses moonSeed’s LCG stream)
    function rnd(){ return rnd._f ? rnd._f() : Math.random(); }
    rnd._f = (function(){
      var s = (Math.random()*1e9)|0;
      return function(){
        s = (s * 1664525 + 1013904223) >>> 0;
        return (s / 4294967296);
      };
    })();

    // ---- loop (30fps) ----
    var last=0, acc=0, FRAME=1000/30;

    function frame(ts){
      if(!last) last=ts;
      var dt=ts-last; last=ts;
      acc+=dt;
      if(acc<FRAME){ requestAnimationFrame(frame); return; }
      acc=0;

      ctx.clearRect(0,0,W,H);

      // paint order: clouds (behind dial), moon (outside dial), water ripples (in dial), lanterns, dragons
      drawClouds(ts);
      drawMoon(ts);
      drawWater(ts);
      drawLanterns(ts);

      // dragons: above water, below buttons
      drawDragon(H*0.28, ts, true);
      drawDragon(H*0.76, ts, false);

      requestAnimationFrame(frame);
    }

    requestAnimationFrame(frame);
  })();

  // =========================
  // LAYER TOGGLE
  // =========================
  var b1=document.getElementById("layer1");
  var b2=document.getElementById("layer2");

  function setLayer(next){
    currentLayer = (next==="2") ? "2" : "1";
    b1.setAttribute("aria-pressed", currentLayer==="1" ? "true" : "false");
    b2.setAttribute("aria-pressed", currentLayer==="2" ? "true" : "false");
    buildLayer(currentLayer);
  }

  b1.addEventListener("click", function(){ setLayer("1"); }, {passive:true});
  b2.addEventListener("click", function(){ setLayer("2"); }, {passive:true});

  // =========================
  // EXIT / HUB
  // =========================
  function bindCorner(id, path){
    var el=document.getElementById(id);
    if(!el) return;
    function act(){ go(path); }
    el.addEventListener("click", act, {passive:true});
    el.addEventListener("keydown", function(e){
      if(e.key==="Enter"||e.key===" "){ e.preventDefault(); act(); }
    });
  }
  bindCorner("btnExit", EXIT_ROUTE);
  bindCorner("btnHub", HUB_ROUTE);

  // =========================
  // INIT
  // =========================
  function safeBuild(){
    var r=stage.getBoundingClientRect();
    if(r.width<10||r.height<10){ requestAnimationFrame(safeBuild); return; }
    buildLayer(currentLayer);
  }
  requestAnimationFrame(safeBuild);
  window.addEventListener("resize", function(){ buildLayer(currentLayer); }, {passive:true});

})();
</script>

</body>
</html>
