<!doctype html>
<!-- TNT — /explore/frontier/vision/index.html
     STATUS: FULL-FILE REWRITE · FRONTIER BASELINE · SKELETONED VOLUMETRIC DIAMOND-CUBES
     PURPOSE:
       - Preserve locked geometry, routing model, and state carry
       - Keep ui.css as background owner
       - Establish new frontier baseline separate from locked flat-world legacy
       - Use one global centric field and minimal local per-diamond spin axes
       - Add internal skeleton so motion reads as object truth, not blob drift
       - Keep lane URL-only and never stored
-->

<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>FRONTIER · VISION REMOTE</title>

  <link rel="stylesheet" href="/assets/ui.css"/>
  <link rel="stylesheet" href="/assets/branch.css"/>

  <style>
    :root{
      --D0:154px;
      --D1:112px;
      --D2:92px;
      --D3:80px;

      --Z0:52px;
      --Z1:36px;
      --Z2:28px;
      --Z3:22px;

      --R1:178px;
      --R2:246px;
      --R3:300px;

      --padTop:118px;

      --ink:rgba(255,255,255,.96);
      --mut:rgba(255,255,255,.78);

      --onyx0:rgba(4,6,10,.98);
      --onyx1:rgba(10,12,18,.92);
      --onyx2:rgba(18,22,30,.82);
      --onyx3:rgba(30,36,44,.56);

      --crimson:rgba(120,0,22,.42);
      --festival:rgba(255,43,43,.20);
      --opalV:rgba(90,40,120,.15);

      --gold:rgba(201,162,74,.58);
      --goldGlow:rgba(201,162,74,.24);
      --goldLine:rgba(201,162,74,.18);

      --shadowDeep:0 44px 140px rgba(0,0,0,.82);
      --shadowC:0 18px 60px rgba(0,0,0,.55);
    }

    *{box-sizing:border-box}

    a{
      color:inherit;
      text-decoration:none;
    }

    body{
      margin:0;
      color:#fff;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    }

    body::before,
    body::after{
      pointer-events:none !important;
    }

    .top{
      position:fixed;
      top:16px;
      left:0;
      right:0;
      z-index:240;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:0 16px;
      pointer-events:none;
    }

    .top__group{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      white-space:nowrap;
      pointer-events:auto;
    }

    .stage{
      position:relative;
      width:min(980px,95vw);
      height:min(980px,82vh);
      margin:var(--padTop) auto 0;
      pointer-events:none;
      perspective:1600px;
      perspective-origin:50% 42%;
      transform-style:preserve-3d;
    }

    .stage::before{
      content:"";
      position:absolute;
      inset:8% 10% 12%;
      z-index:0;
      pointer-events:none;
      border-radius:999px;
      opacity:.72;
      background:
        radial-gradient(circle at 50% 52%, rgba(255,43,43,.11), transparent 32%),
        radial-gradient(circle at 50% 50%, rgba(201,162,74,.10), transparent 48%),
        radial-gradient(circle at 50% 50%, rgba(30,60,140,.12), transparent 72%);
      filter:blur(42px);
      animation:stagePulse 10.4s ease-in-out infinite;
    }

    .stage::after{
      content:"";
      position:absolute;
      inset:14%;
      z-index:0;
      pointer-events:none;
      border-radius:999px;
      background:
        conic-gradient(from 0deg,
          transparent 0deg,
          rgba(201,162,74,.04) 34deg,
          transparent 74deg,
          rgba(255,255,255,.03) 132deg,
          transparent 178deg,
          rgba(255,43,43,.04) 242deg,
          transparent 290deg,
          rgba(201,162,74,.04) 338deg,
          transparent 360deg);
      opacity:.55;
      filter:blur(22px);
      animation:dialPhase 28s linear infinite;
    }

    .slab{
      position:absolute;
      top:50%;
      left:50%;
      width:min(820px,92vw);
      height:min(820px,92vw);
      border:1px solid rgba(255,255,255,.10);
      border-radius:72px;
      opacity:.18;
      pointer-events:none;
      transform:translate(-50%,-50%) rotate(45deg);
      background:
        radial-gradient(circle at 30% 25%, rgba(255,255,255,.08), transparent 55%),
        radial-gradient(circle at 70% 80%, var(--opalV), transparent 60%),
        radial-gradient(circle at 50% 55%, var(--crimson), transparent 72%),
        linear-gradient(160deg, rgba(10,12,16,.55) 0%, rgba(6,8,10,.78) 70%);
      box-shadow:
        0 90px 260px rgba(0,0,0,.52),
        inset 0 2px 0 rgba(255,255,255,.10),
        inset 0 -50px 90px rgba(0,0,0,.55);
    }

    .dialFace{
      position:absolute;
      top:50%;
      left:50%;
      z-index:1;
      width:min(860px,92vw);
      height:min(860px,92vw);
      border-radius:999px;
      overflow:hidden;
      pointer-events:none;
      transform:translate(-50%,-50%);
    }

    .dialFace::before{
      content:"";
      position:absolute;
      inset:0;
      border-radius:999px;
      opacity:.94;
      background:
        radial-gradient(circle at 50% 46%,
          rgba(255,255,255,.07),
          rgba(0,0,0,.18) 58%,
          rgba(0,0,0,.48) 79%,
          rgba(0,0,0,0) 92%),
        radial-gradient(circle at 50% 50%, rgba(201,162,74,.10), transparent 62%),
        radial-gradient(circle at 50% 50%, rgba(255,43,43,.09), transparent 67%),
        linear-gradient(180deg, rgba(255,255,255,.02), rgba(0,0,0,.10));
      box-shadow:
        inset 0 0 0 2px rgba(255,255,255,.06),
        inset 0 0 0 10px rgba(0,0,0,.10),
        inset 0 0 70px rgba(0,0,0,.45),
        0 50px 180px rgba(0,0,0,.35);
      animation:dialBreath 8.8s ease-in-out infinite;
    }

    .dialFace::after{
      content:"";
      position:absolute;
      inset:-16%;
      opacity:.82;
      filter:blur(.25px);
      background:
        radial-gradient(circle at 50% 50%, transparent 0 36%, rgba(255,255,255,.06) 36% 36.6%, transparent 37% 100%),
        radial-gradient(circle at 50% 50%, transparent 0 52%, rgba(255,255,255,.06) 52% 52.6%, transparent 53% 100%),
        radial-gradient(circle at 50% 50%, transparent 0 69%, rgba(255,255,255,.06) 69% 69.6%, transparent 70% 100%),
        linear-gradient(90deg, transparent 0 49.7%, rgba(201,162,74,.10) 49.7% 50.3%, transparent 50.3% 100%),
        linear-gradient(0deg, transparent 0 49.7%, rgba(201,162,74,.10) 49.7% 50.3%, transparent 50.3% 100%),
        repeating-conic-gradient(from 45deg at 50% 50%,
          rgba(201,162,74,.06) 0 1.2deg,
          transparent 1.2deg 7.5deg),
        radial-gradient(circle at 50% 50%, rgba(255,255,255,.04), transparent 62%);
      mask:radial-gradient(circle at 50% 50%, transparent 0 18%, #000 20% 100%);
      -webkit-mask:radial-gradient(circle at 50% 50%, transparent 0 18%, #000 20% 100%);
      animation:dialSweep 15s linear infinite;
    }

    .dialHalo{
      position:absolute;
      top:50%;
      left:50%;
      z-index:2;
      width:min(760px,84vw);
      height:min(760px,84vw);
      pointer-events:none;
      border-radius:999px;
      transform:translate(-50%,-50%);
      background:
        radial-gradient(circle at 50% 50%, rgba(201,162,74,.10), transparent 34%),
        radial-gradient(circle at 50% 50%, rgba(255,43,43,.08), transparent 44%),
        radial-gradient(circle at 50% 50%, transparent 56%, rgba(201,162,74,.07) 57% 58%, transparent 59%);
      filter:blur(10px);
      opacity:.74;
      animation:haloPulse 8.4s ease-in-out infinite;
    }

    .cubeScene{
      --face:var(--D3);
      --depth:var(--Z3);

      position:absolute;
      top:50%;
      left:50%;
      z-index:6;
      width:calc(var(--face) + (var(--depth) * 2));
      height:calc(var(--face) + (var(--depth) * 2));
      pointer-events:auto;
      cursor:pointer;
      touch-action:manipulation;
      -webkit-tap-highlight-color:transparent;
      transform:translate(-50%,-50%);
      transform-style:preserve-3d;
      filter:drop-shadow(0 16px 36px rgba(0,0,0,.34));
    }

    .cubeScene--core{ --face:var(--D0); --depth:var(--Z0); z-index:12; }
    .cubeScene--l1  { --face:var(--D1); --depth:var(--Z1); z-index:9; }
    .cubeScene--l2  { --face:var(--D2); --depth:var(--Z2); z-index:8; }
    .cubeScene--l3  { --face:var(--D3); --depth:var(--Z3); z-index:7; }

    .cubeShadow{
      position:absolute;
      left:50%;
      top:50%;
      width:calc(var(--face) * .90);
      height:calc(var(--face) * .22);
      pointer-events:none;
      transform:translate(-50%, calc(var(--face) * .42)) rotate(-8deg);
      border-radius:999px;
      background:
        radial-gradient(circle at 50% 50%,
          rgba(0,0,0,.44) 0%,
          rgba(0,0,0,.26) 42%,
          rgba(0,0,0,.08) 72%,
          rgba(0,0,0,0) 100%);
      filter:blur(9px);
      opacity:.82;
      animation:shadowPulse 8s ease-in-out infinite;
      animation-delay:var(--phase,0s);
    }

    .diamondCube{
      position:absolute;
      left:50%;
      top:50%;
      width:var(--face);
      height:var(--face);
      transform-style:preserve-3d;
      transform:
        translate(-50%,-50%)
        rotateZ(45deg)
        rotateX(62deg)
        rotateY(-36deg);
      animation:cubeSpin 7.8s linear infinite;
      animation-delay:var(--phase,0s);
      transition:
        filter .18s ease,
        transform .18s ease;
      will-change:transform, filter;
    }

    .cubeScene:hover .diamondCube,
    .cubeScene:focus .diamondCube,
    .cubeScene:focus-within .diamondCube{
      filter:brightness(1.04) saturate(1.05);
    }

    .face{
      position:absolute;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.14);
      backface-visibility:hidden;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.14),
        inset 0 -22px 42px rgba(0,0,0,.34);
    }

    .face::before{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      background:
        linear-gradient(180deg, rgba(255,255,255,.08), transparent 30%, transparent 72%, rgba(0,0,0,.10)),
        repeating-linear-gradient(45deg, rgba(201,162,74,.07) 0 1px, transparent 1px 18px),
        repeating-linear-gradient(-45deg, rgba(201,162,74,.05) 0 1px, transparent 1px 18px);
      opacity:.72;
    }

    .face::after{
      content:"";
      position:absolute;
      top:-16%;
      left:-34%;
      width:58%;
      height:148%;
      pointer-events:none;
      opacity:.34;
      transform:rotate(10deg);
      background:linear-gradient(
        90deg,
        rgba(255,255,255,0) 0%,
        rgba(255,255,255,.04) 24%,
        rgba(255,255,255,.18) 50%,
        rgba(255,255,255,.04) 72%,
        rgba(255,255,255,0) 100%
      );
      filter:blur(2px);
      animation:faceSweep 9s linear infinite;
      animation-delay:var(--phase,0s);
    }

    .face--front,
    .face--back{
      left:50%;
      top:50%;
      width:var(--face);
      height:var(--face);
      margin-left:calc(var(--face) / -2);
      margin-top:calc(var(--face) / -2);
      border-radius:22px;
    }

    .face--front{
      transform:translateZ(calc(var(--depth) / 2));
      background:
        radial-gradient(circle at 24% 22%, rgba(255,255,255,.24), transparent 36%),
        radial-gradient(circle at 76% 26%, var(--festival), transparent 56%),
        radial-gradient(circle at 74% 82%, var(--opalV), transparent 64%),
        radial-gradient(circle at 26% 82%, var(--crimson), transparent 68%),
        linear-gradient(155deg, var(--onyx2), var(--onyx0));
      box-shadow:
        0 0 24px rgba(255,43,43,.10),
        inset 0 2px 0 rgba(255,255,255,.16),
        inset 0 -42px 82px rgba(0,0,0,.72);
    }

    .face--back{
      transform:rotateY(180deg) translateZ(calc(var(--depth) / 2));
      background:
        radial-gradient(circle at 50% 50%, rgba(201,162,74,.06), transparent 56%),
        linear-gradient(155deg, rgba(16,18,24,.84), rgba(4,6,10,.96));
      opacity:.86;
    }

    .face--left,
    .face--right{
      top:50%;
      left:50%;
      width:var(--depth);
      height:var(--face);
      margin-left:calc(var(--depth) / -2);
      margin-top:calc(var(--face) / -2);
      border-radius:14px;
    }

    .face--left{
      transform:rotateY(-90deg) translateZ(calc(var(--face) / 2));
      background:
        linear-gradient(180deg, rgba(255,255,255,.06), rgba(0,0,0,.18)),
        linear-gradient(155deg, rgba(110,22,28,.46), rgba(14,18,26,.94));
    }

    .face--right{
      transform:rotateY(90deg) translateZ(calc(var(--face) / 2));
      background:
        linear-gradient(180deg, rgba(255,255,255,.12), rgba(0,0,0,.08)),
        linear-gradient(155deg, rgba(184,146,92,.46), rgba(16,18,24,.90));
    }

    .face--top,
    .face--bottom{
      left:50%;
      top:50%;
      width:var(--face);
      height:var(--depth);
      margin-left:calc(var(--face) / -2);
      margin-top:calc(var(--depth) / -2);
      border-radius:14px;
    }

    .face--top{
      transform:rotateX(90deg) translateZ(calc(var(--face) / 2));
      background:
        linear-gradient(180deg, rgba(255,255,255,.18), rgba(0,0,0,.04)),
        linear-gradient(155deg, rgba(116,86,52,.58), rgba(34,28,22,.88));
    }

    .face--bottom{
      transform:rotateX(-90deg) translateZ(calc(var(--face) / 2));
      background:
        linear-gradient(180deg, rgba(0,0,0,.08), rgba(0,0,0,.22)),
        linear-gradient(155deg, rgba(12,14,18,.86), rgba(4,6,10,.98));
      opacity:.94;
    }

    .skeleton{
      position:absolute;
      left:50%;
      top:50%;
      width:var(--face);
      height:var(--face);
      margin-left:calc(var(--face) / -2);
      margin-top:calc(var(--face) / -2);
      pointer-events:none;
      transform-style:preserve-3d;
    }

    .skeleton__plane{
      position:absolute;
      inset:0;
      border-radius:22px;
      border:1px solid transparent;
      box-shadow:inset 0 0 0 1px rgba(201,162,74,.18);
      backface-visibility:hidden;
    }

    .skeleton__plane--front{
      transform:translateZ(calc(var(--depth) / 2 + 1px));
    }

    .skeleton__plane--back{
      transform:rotateY(180deg) translateZ(calc(var(--depth) / 2 + 1px));
      opacity:.34;
    }

    .skeleton__edge{
      position:absolute;
      left:50%;
      top:50%;
      width:2px;
      height:calc(var(--face) * 1.10);
      margin-left:-1px;
      margin-top:calc(var(--face) * -0.55);
      background:linear-gradient(180deg, rgba(201,162,74,.04), rgba(201,162,74,.42), rgba(201,162,74,.04));
      border-radius:999px;
      transform-origin:center center;
      opacity:.88;
      filter:drop-shadow(0 0 6px rgba(201,162,74,.18));
    }

    .skeleton__edge--v{ transform:translateZ(calc(var(--depth) / 2 + 2px)); }
    .skeleton__edge--d1{ transform:translateZ(calc(var(--depth) / 2 + 2px)) rotate(45deg); }
    .skeleton__edge--d2{ transform:translateZ(calc(var(--depth) / 2 + 2px)) rotate(-45deg); }

    .skeleton__spine{
      position:absolute;
      left:50%;
      top:50%;
      width:2px;
      height:calc(var(--depth) + 10px);
      margin-left:-1px;
      margin-top:calc((var(--depth) + 10px) / -2);
      background:linear-gradient(180deg, rgba(201,162,74,.16), rgba(255,255,255,.28), rgba(201,162,74,.16));
      transform:translateZ(0) rotateX(90deg);
      border-radius:999px;
      opacity:.78;
      filter:drop-shadow(0 0 4px rgba(201,162,74,.14));
    }

    .cubeLabel{
      position:absolute;
      left:50%;
      top:50%;
      z-index:20;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      width:var(--face);
      height:var(--face);
      pointer-events:none;
      transform:translate(-50%,-50%);
      text-align:center;
      text-shadow:
        0 0 18px rgba(0,0,0,.42),
        0 1px 0 rgba(255,255,255,.04);
    }

    .cubeLabel::before{
      content:"";
      position:absolute;
      inset:14% 10% auto;
      height:26%;
      border-radius:999px;
      opacity:.70;
      background:linear-gradient(to bottom, rgba(255,255,255,.18), rgba(255,255,255,0));
      transform:rotate(-12deg);
      filter:blur(.3px);
      pointer-events:none;
    }

    .cubeLabel::after{
      content:"";
      position:absolute;
      inset:18% 16%;
      border-radius:18px;
      opacity:.14;
      background:
        radial-gradient(circle at 50% 64%, rgba(255,43,43,.34), transparent 52%),
        radial-gradient(circle at 50% 42%, rgba(201,162,74,.16), transparent 58%);
      filter:blur(10px);
      animation:innerGlow 8s ease-in-out infinite;
      animation-delay:var(--phase,0s);
      pointer-events:none;
    }

    .cubeWord{
      position:relative;
      z-index:2;
      font-size:11.5px;
      font-weight:980;
      line-height:1.05;
      letter-spacing:.55px;
      color:var(--ink);
    }

    .cubeCode{
      position:relative;
      z-index:2;
      margin-top:5px;
      font-size:9px;
      letter-spacing:1.1px;
      color:rgba(255,255,255,.84);
      opacity:.82;
    }

    .cubeScene--core .cubeWord{ font-size:15px; }
    .cubeScene--core .cubeCode{ font-size:10px; }
    .cubeScene--l1 .cubeWord{ font-size:13px; }
    .cubeScene--l2 .cubeWord{ font-size:12px; }

    .control{
      position:relative;
      display:grid;
      place-items:center;
      width:46px;
      height:46px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.14);
      border-radius:14px;
      cursor:pointer;
      pointer-events:auto;
      touch-action:manipulation;
      -webkit-tap-highlight-color:transparent;
      transform:rotate(45deg);
      background:
        radial-gradient(circle at 50% 120%, rgba(201,162,74,.16), transparent 64%),
        linear-gradient(145deg, rgba(10,12,16,.78), rgba(6,8,10,.90));
      box-shadow:var(--shadowC);
      transition:box-shadow .16s ease,border-color .16s ease,filter .16s ease;
      animation:controlAmbient 8.6s ease-in-out infinite;
    }

    .control::before{
      content:"";
      position:absolute;
      inset:0;
      border-radius:inherit;
      opacity:.34;
      pointer-events:none;
      box-shadow:inset 0 0 0 1px rgba(201,162,74,.18);
      background:
        linear-gradient(180deg, rgba(255,255,255,.08), transparent 42%),
        radial-gradient(circle at 78% 24%, rgba(255,43,43,.10), transparent 46%);
    }

    .control::after{
      content:"";
      position:absolute;
      left:10px;
      right:10px;
      bottom:-12px;
      height:26px;
      opacity:.55;
      pointer-events:none;
      background:radial-gradient(circle at 50% 0%, rgba(201,162,74,.30), transparent 72%);
    }

    .control:hover{
      border-color:rgba(201,162,74,.34);
      box-shadow:
        var(--shadowC),
        0 0 0 2px rgba(201,162,74,.14),
        0 0 26px rgba(201,162,74,.16);
      filter:brightness(1.03);
    }

    .control.is-on{
      border-color:rgba(255,43,43,.26);
      box-shadow:
        var(--shadowC),
        0 0 16px rgba(255,43,43,.12),
        0 0 26px rgba(201,162,74,.08);
    }

    .control__label{
      font-size:12px;
      font-weight:980;
      letter-spacing:.4px;
      color:var(--ink);
      user-select:none;
      transform:rotate(-45deg);
      text-shadow:0 0 12px rgba(0,0,0,.34);
    }

    .corner{
      position:fixed;
      bottom:max(18px, env(safe-area-inset-bottom));
      z-index:240;
      pointer-events:none;
    }

    .corner--left{left:18px}
    .corner--right{right:18px}

    .corner .control{ pointer-events:auto; }

    .corner__text{
      margin-top:10px;
      font-size:11px;
      letter-spacing:.4px;
      text-align:center;
      color:rgba(255,255,255,.72);
      text-shadow:0 0 12px rgba(0,0,0,.38);
    }

    @keyframes stagePulse{
      0%,100%{opacity:.68;filter:blur(42px)}
      50%{opacity:.82;filter:blur(48px)}
    }

    @keyframes dialPhase{
      0%{transform:rotate(0deg)}
      100%{transform:rotate(360deg)}
    }

    @keyframes dialBreath{
      0%,100%{opacity:.92;filter:saturate(1) brightness(1)}
      50%{opacity:.98;filter:saturate(1.05) brightness(1.03)}
    }

    @keyframes dialSweep{
      0%,100%{opacity:.76;filter:blur(.25px) brightness(1)}
      50%{opacity:.90;filter:blur(.25px) brightness(1.05)}
    }

    @keyframes haloPulse{
      0%,100%{opacity:.68;filter:blur(10px)}
      50%{opacity:.82;filter:blur(14px)}
    }

    @keyframes cubeSpin{
      0%{
        transform:translate(-50%,-50%) rotateZ(45deg) rotateX(62deg) rotateY(-36deg);
      }
      25%{
        transform:translate(-50%,-50%) rotateZ(45deg) rotateX(63deg) rotateY(-31deg);
      }
      50%{
        transform:translate(-50%,-50%) rotateZ(45deg) rotateX(62deg) rotateY(-26deg);
      }
      75%{
        transform:translate(-50%,-50%) rotateZ(45deg) rotateX(61deg) rotateY(-31deg);
      }
      100%{
        transform:translate(-50%,-50%) rotateZ(45deg) rotateX(62deg) rotateY(-36deg);
      }
    }

    @keyframes shadowPulse{
      0%,100%{opacity:.72;filter:blur(8px)}
      50%{opacity:.88;filter:blur(10px)}
    }

    @keyframes faceSweep{
      0%{left:-34%;opacity:.10}
      18%{opacity:.18}
      52%{opacity:.34}
      80%{opacity:.12}
      100%{left:88%;opacity:.06}
    }

    @keyframes innerGlow{
      0%,100%{opacity:.10}
      50%{opacity:.18}
    }

    @keyframes controlAmbient{
      0%,100%{filter:saturate(1) brightness(1)}
      50%{filter:saturate(1.04) brightness(1.02)}
    }

    @media (prefers-reduced-motion: reduce){
      .stage::before,
      .stage::after,
      .dialFace::before,
      .dialFace::after,
      .dialHalo,
      .cubeShadow,
      .diamondCube,
      .face::after,
      .cubeLabel::after,
      .control{
        animation:none !important;
      }
    }

    @media (max-width:640px){
      :root{
        --D0:148px;
        --D1:108px;
        --D2:88px;
        --D3:78px;

        --Z0:50px;
        --Z1:34px;
        --Z2:26px;
        --Z3:20px;

        --R1:168px;
        --R2:234px;
        --R3:286px;
        --padTop:128px;
      }

      .cubeWord{font-size:11.25px}
    }

    @media (max-width:420px){
      :root{
        --D0:140px;
        --D1:104px;
        --D2:86px;
        --D3:76px;

        --Z0:46px;
        --Z1:32px;
        --Z2:24px;
        --Z3:18px;

        --R1:160px;
        --R2:224px;
        --R3:274px;
      }

      .cubeWord{font-size:11px}
    }
  </style>
</head>

<body>
  <header class="top" aria-label="Top controls">
    <div class="top__group" aria-label="Language">
      <div class="control is-on" id="langEN" role="button" tabindex="0" aria-label="English">
        <span class="control__label">EN</span>
      </div>
      <div class="control" id="langZH" role="button" tabindex="0" aria-label="Chinese">
        <span class="control__label">中文</span>
      </div>
      <div class="control" id="langES" role="button" tabindex="0" aria-label="Spanish">
        <span class="control__label">ES</span>
      </div>
    </div>

    <div class="top__group" aria-label="Lane">
      <div class="control is-on" id="lanePlatform" role="button" tabindex="0" aria-label="Platform lane">
        <span class="control__label">P</span>
      </div>
      <div class="control" id="laneEngineering" role="button" tabindex="0" aria-label="Engineering lane">
        <span class="control__label">E</span>
      </div>
    </div>
  </header>

  <main class="stage" id="stage" aria-label="Vision Remote">
    <div class="slab" aria-hidden="true"></div>
    <div class="dialFace" aria-hidden="true"></div>
    <div class="dialHalo" aria-hidden="true"></div>
  </main>

  <div class="corner corner--left" aria-label="Exit">
    <div class="control" id="btnExit" role="button" tabindex="0" aria-label="Exit to Door">
      <span class="control__label">⟲</span>
    </div>
    <div class="corner__text" id="lblExit">EXIT</div>
  </div>

  <div class="corner corner--right" aria-label="Hub Jump">
    <div class="control" id="btnHub" role="button" tabindex="0" aria-label="Hub Jump to Compass">
      <span class="control__label">◆</span>
    </div>
    <div class="corner__text" id="lblHub">HUB</div>
  </div>

  <script>
    (() => {
      "use strict";

      const STORAGE_KEYS = {
        lang: "gd_lang",
        style: "gd_style",
        time: "gd_time",
        depth: "gd_depth"
      };

      const VALID = {
        lang: new Set(["en", "zh", "es"]),
        time: new Set(["origin", "now", "post"]),
        lane: new Set(["platform", "engineering"])
      };

      const DEFAULTS = {
        lang: "en",
        time: "now",
        lane: "platform",
        style: "informal",
        depth: "explore"
      };

      const UI_COPY = {
        en: {
          exit: "EXIT",
          hub: "HUB",
          core: "INDEX",
          langLabels: { en: "English", zh: "Chinese", es: "Spanish" },
          laneLabels: { platform: "Platform lane", engineering: "Engineering lane" }
        },
        zh: {
          exit: "退出",
          hub: "枢纽",
          core: "索引",
          langLabels: { en: "英文", zh: "中文", es: "西班牙语" },
          laneLabels: { platform: "平台通道", engineering: "工程通道" }
        },
        es: {
          exit: "SALIR",
          hub: "HUB",
          core: "ÍNDICE",
          langLabels: { en: "Inglés", zh: "Chino", es: "Español" },
          laneLabels: { platform: "Carril de plataforma", engineering: "Carril de ingeniería" }
        }
      };

      const ROUTES = {
        core: "/explore/frontier/manual/",
        exit: "/door/",
        hub: "/index.html"
      };

      /* ROUTE MAP SECTION — EDIT ONLY HERE */
      const MANIFOLDS = [
        { code: "N",   href: "/explore/frontier/urban/",                     p: { en: "CITIES",   zh: "城市",   es: "CIUDADES" }, e: { en: "URBAN",   zh: "城市OS", es: "URB-OS" } },
        { code: "NNE", href: "/explore/frontier/shimmer/",                   p: { en: "SHIMMER",  zh: "闪烁",   es: "SHIMMER" },  e: { en: "CLEAR",   zh: "清晰",   es: "CLAR" } },
        { code: "NE",  href: "/explore/frontier/water/",                     p: { en: "WATER",    zh: "水",     es: "AGUA" },     e: { en: "H2O",     zh: "水系",   es: "H2O" } },
        { code: "ENE", href: "/explore/frontier/trajectory/",                p: { en: "TRAJ",     zh: "轨迹",   es: "TRAY" },     e: { en: "WIN",     zh: "窗口",   es: "VENT" } },
        { code: "E",   href: "/explore/frontier/energy/",                    p: { en: "ENERGY",   zh: "能源",   es: "ENERGÍA" },  e: { en: "POWER",   zh: "功率",   es: "PWR" } },
        { code: "ESE", href: "/explore/frontier/waste/",                     p: { en: "WASTE",    zh: "废弃物", es: "RESID" },    e: { en: "ENTROPY", zh: "熵",     es: "ENT" } },
        { code: "SE",  href: "/explore/frontier/closed-loop/",               p: { en: "HABITATS", zh: "栖息地", es: "HÁBIT" },    e: { en: "HAB",     zh: "栖息",   es: "HAB" } },
        { code: "SSE", href: "/explore/frontier/urban/",                     p: { en: "URBAN",    zh: "城市群", es: "URBANO" },   e: { en: "CLUSTER", zh: "集群",   es: "CLUST" } },
        { code: "S",   href: "/explore/frontier/agri/",                      p: { en: "AGRI",     zh: "农业",   es: "AGRO" },     e: { en: "FOOD",    zh: "食物",   es: "ALIM" } },
        { code: "SSW", href: "/explore/frontier/closed-loop/",               p: { en: "CLOSED",   zh: "闭环",   es: "CERRADO" },  e: { en: "NO-AWAY", zh: "无扔掉", es: "SIN" } },
        { code: "SW",  href: "/products/finance/",                           p: { en: "FINANCE",  zh: "金融",   es: "FINANZ" },   e: { en: "CAPITAL", zh: "资本",   es: "CAP" } },
        { code: "WSW", href: "/explore/infrastructure/grid-storage/",        p: { en: "GRID",     zh: "电网",   es: "RED" },      e: { en: "BALANCE", zh: "平衡",   es: "BAL" } },
        { code: "W",   href: "/explore/infrastructure/",                     p: { en: "INFRA",    zh: "基建",   es: "INFRA" },    e: { en: "SUBST",   zh: "替代",   es: "SUB" } },
        { code: "WNW", href: "/products/capital-doctrine/",                  p: { en: "DOCTRINE", zh: "教义",   es: "DOCTR" },    e: { en: "CCD",     zh: "CCD",    es: "CCD" } },
        { code: "NW",  href: "/explore/frontier/lattice/",                   p: { en: "LATTICE",  zh: "晶格",   es: "LATTICE" },  e: { en: "256",     zh: "256态",  es: "256" } },
        { code: "NNW", href: "/explore/frontier/vision/",                    p: { en: "VISION",   zh: "愿景",   es: "VISIÓN" },   e: { en: "MAP",     zh: "映射",   es: "MAP" } }
      ];
      /* END ROUTE MAP SECTION */

      const elements = {
        stage: document.getElementById("stage"),
        langEN: document.getElementById("langEN"),
        langZH: document.getElementById("langZH"),
        langES: document.getElementById("langES"),
        lanePlatform: document.getElementById("lanePlatform"),
        laneEngineering: document.getElementById("laneEngineering"),
        btnExit: document.getElementById("btnExit"),
        btnHub: document.getElementById("btnHub"),
        lblExit: document.getElementById("lblExit"),
        lblHub: document.getElementById("lblHub")
      };

      const state = {
        lang: readInitialLang(),
        time: readInitialTime(),
        lane: readInitialLane(),
        style: DEFAULTS.style,
        depth: DEFAULTS.depth
      };

      let ringRefs = [];
      let resizeScheduled = false;

      function getSearchParams() {
        return new URLSearchParams(window.location.search);
      }

      function readStorage(key) {
        try {
          return window.localStorage.getItem(key);
        } catch (_error) {
          return null;
        }
      }

      function writeStorage(key, value) {
        try {
          window.localStorage.setItem(key, value);
        } catch (_error) {}
      }

      function normalizeLang(value) {
        return VALID.lang.has(value) ? value : DEFAULTS.lang;
      }

      function normalizeTime(value) {
        const candidate = value === "trajectory" ? "post" : value;
        return VALID.time.has(candidate) ? candidate : DEFAULTS.time;
      }

      function normalizeLane(value) {
        return VALID.lane.has(value) ? value : DEFAULTS.lane;
      }

      function readInitialLang() {
        const params = getSearchParams();
        return normalizeLang(params.get("lang") || readStorage(STORAGE_KEYS.lang) || DEFAULTS.lang);
      }

      function readInitialTime() {
        const params = getSearchParams();
        return normalizeTime(params.get("time") || readStorage(STORAGE_KEYS.time) || DEFAULTS.time);
      }

      function readInitialLane() {
        const params = getSearchParams();
        return normalizeLane(params.get("lane") || DEFAULTS.lane);
      }

      function currentCopy() {
        return UI_COPY[state.lang] || UI_COPY.en;
      }

      function buildQueryString(overrides = {}) {
        const params = new URLSearchParams();
        params.set("lang", overrides.lang || state.lang);
        params.set("style", DEFAULTS.style);
        params.set("time", overrides.time || state.time);
        params.set("depth", DEFAULTS.depth);

        const lane = overrides.lane || state.lane;
        if (VALID.lane.has(lane)) {
          params.set("lane", lane);
        }

        return `?${params.toString()}`;
      }

      function syncCanonicalState() {
        writeStorage(STORAGE_KEYS.lang, state.lang);
        writeStorage(STORAGE_KEYS.style, DEFAULTS.style);
        writeStorage(STORAGE_KEYS.time, state.time);
        writeStorage(STORAGE_KEYS.depth, DEFAULTS.depth);

        window.history.replaceState({}, "", window.location.pathname + buildQueryString());
        document.documentElement.lang = state.lang === "zh" ? "zh" : state.lang === "es" ? "es" : "en";
      }

      function navigate(path) {
        window.location.href = path + buildQueryString();
      }

      function setToggleStates() {
        const copy = currentCopy();

        elements.langEN.classList.toggle("is-on", state.lang === "en");
        elements.langZH.classList.toggle("is-on", state.lang === "zh");
        elements.langES.classList.toggle("is-on", state.lang === "es");

        elements.lanePlatform.classList.toggle("is-on", state.lane === "platform");
        elements.laneEngineering.classList.toggle("is-on", state.lane === "engineering");

        elements.langEN.setAttribute("aria-label", copy.langLabels.en);
        elements.langZH.setAttribute("aria-label", copy.langLabels.zh);
        elements.langES.setAttribute("aria-label", copy.langLabels.es);
        elements.lanePlatform.setAttribute("aria-label", copy.laneLabels.platform);
        elements.laneEngineering.setAttribute("aria-label", copy.laneLabels.engineering);
      }

      function pickLocalized(map) {
        if (state.lang === "zh") return map.zh;
        if (state.lang === "es") return map.es || map.en;
        return map.en;
      }

      function labelFor(manifold) {
        return state.lane === "engineering" ? pickLocalized(manifold.e) : pickLocalized(manifold.p);
      }

      function tierFor(code) {
        if (code === "N" || code === "E" || code === "S" || code === "W") {
          return { cls: "cubeScene--l1", radiusLevel: 1 };
        }
        if (code === "NE" || code === "SE" || code === "SW" || code === "NW") {
          return { cls: "cubeScene--l2", radiusLevel: 2 };
        }
        return { cls: "cubeScene--l3", radiusLevel: 3 };
      }

      function radiusFor(level) {
        const styles = getComputedStyle(document.documentElement);
        if (level === 1) return parseFloat(styles.getPropertyValue("--R1")) || 178;
        if (level === 2) return parseFloat(styles.getPropertyValue("--R2")) || 246;
        return parseFloat(styles.getPropertyValue("--R3")) || 300;
      }

      function bindPress(node, handler) {
        node.addEventListener("click", handler, { passive: true });
        node.addEventListener("keydown", (event) => {
          if (event.key === "Enter" || event.key === " ") {
            event.preventDefault();
            handler();
          }
        });
      }

      function createFace(faceClass) {
        const face = document.createElement("div");
        face.className = `face ${faceClass}`;
        return face;
      }

      function createSkeleton() {
        const s = document.createElement("div");
        s.className = "skeleton";

        const front = document.createElement("div");
        front.className = "skeleton__plane skeleton__plane--front";

        const back = document.createElement("div");
        back.className = "skeleton__plane skeleton__plane--back";

        const v = document.createElement("div");
        v.className = "skeleton__edge skeleton__edge--v";

        const d1 = document.createElement("div");
        d1.className = "skeleton__edge skeleton__edge--d1";

        const d2 = document.createElement("div");
        d2.className = "skeleton__edge skeleton__edge--d2";

        const spine = document.createElement("div");
        spine.className = "skeleton__spine";

        s.appendChild(front);
        s.appendChild(back);
        s.appendChild(v);
        s.appendChild(d1);
        s.appendChild(d2);
        s.appendChild(spine);
        return s;
      }

      function createCubeNode({ word, code, sceneClass, ariaLabel, phase }) {
        const scene = document.createElement("div");
        scene.className = `cubeScene ${sceneClass}`;
        scene.setAttribute("role", "button");
        scene.setAttribute("tabindex", "0");
        scene.style.setProperty("--phase", `${phase}s`);
        scene.setAttribute("aria-label", ariaLabel);

        const shadow = document.createElement("div");
        shadow.className = "cubeShadow";

        const cube = document.createElement("div");
        cube.className = "diamondCube";

        cube.appendChild(createFace("face--front"));
        cube.appendChild(createFace("face--back"));
        cube.appendChild(createFace("face--left"));
        cube.appendChild(createFace("face--right"));
        cube.appendChild(createFace("face--top"));
        cube.appendChild(createFace("face--bottom"));
        cube.appendChild(createSkeleton());

        const label = document.createElement("div");
        label.className = "cubeLabel";

        const wordEl = document.createElement("div");
        wordEl.className = "cubeWord";
        wordEl.textContent = word;

        const codeEl = document.createElement("div");
        codeEl.className = "cubeCode";
        codeEl.textContent = code;

        label.appendChild(wordEl);
        label.appendChild(codeEl);

        scene.appendChild(shadow);
        scene.appendChild(cube);
        scene.appendChild(label);

        return scene;
      }

      function preserveScaffold() {
        const slab = elements.stage.querySelector(".slab");
        const dial = elements.stage.querySelector(".dialFace");
        const halo = elements.stage.querySelector(".dialHalo");

        elements.stage.innerHTML = "";
        if (slab) elements.stage.appendChild(slab);
        if (dial) elements.stage.appendChild(dial);
        if (halo) elements.stage.appendChild(halo);
      }

      function renderCore(cx, cy) {
        const copy = currentCopy();

        const core = createCubeNode({
          word: copy.core,
          code: "CORE",
          sceneClass: "cubeScene--core",
          ariaLabel: copy.core,
          phase: 0.10
        });

        core.style.left = `${cx}px`;
        core.style.top = `${cy}px`;

        bindPress(core, () => navigate(ROUTES.core));
        elements.stage.appendChild(core);
      }

      function renderManifolds(cx, cy) {
        ringRefs = [];
        const total = MANIFOLDS.length;

        MANIFOLDS.forEach((manifold, index) => {
          const angle = (index / total) * Math.PI * 2 - Math.PI / 2;
          const tier = tierFor(manifold.code);
          const radius = radiusFor(tier.radiusLevel);

          const x = cx + radius * Math.cos(angle);
          const y = cy + radius * Math.sin(angle);

          const label = labelFor(manifold);
          const node = createCubeNode({
            word: label,
            code: manifold.code,
            sceneClass: tier.cls,
            ariaLabel: `${label} ${manifold.code}`,
            phase: 0.16 * (index + 1)
          });

          node.style.left = `${x}px`;
          node.style.top = `${y}px`;

          bindPress(node, () => navigate(manifold.href));
          elements.stage.appendChild(node);

          ringRefs.push({ el: node, manifold });
        });
      }

      function renderCornerLabels() {
        const copy = currentCopy();
        elements.lblExit.textContent = copy.exit;
        elements.lblHub.textContent = copy.hub;
      }

      function renderStage() {
        preserveScaffold();

        const rect = elements.stage.getBoundingClientRect();
        const cx = rect.width / 2;
        const cy = rect.height / 2;

        renderCore(cx, cy);
        renderManifolds(cx, cy);
        renderCornerLabels();
      }

      function updateRingLabelsOnly() {
        ringRefs.forEach(({ el, manifold }) => {
          const label = labelFor(manifold);
          const word = el.querySelector(".cubeWord");
          if (word) word.textContent = label;
          el.setAttribute("aria-label", `${label} ${manifold.code}`);
        });
      }

      function setLanguage(nextLang) {
        state.lang = normalizeLang(nextLang);
        syncCanonicalState();
        setToggleStates();
        updateRingLabelsOnly();
        renderCornerLabels();
      }

      function setLane(nextLane) {
        state.lane = normalizeLane(nextLane);
        window.history.replaceState({}, "", window.location.pathname + buildQueryString());
        setToggleStates();
        updateRingLabelsOnly();
      }

      function safeLayout() {
        const rect = elements.stage.getBoundingClientRect();
        if (rect.width < 10 || rect.height < 10) {
          window.requestAnimationFrame(safeLayout);
          return;
        }
        renderStage();
      }

      function requestSafeLayout() {
        if (resizeScheduled) return;
        resizeScheduled = true;
        window.requestAnimationFrame(() => {
          resizeScheduled = false;
          safeLayout();
        });
      }

      function bindEvents() {
        bindPress(elements.langEN, () => setLanguage("en"));
        bindPress(elements.langZH, () => setLanguage("zh"));
        bindPress(elements.langES, () => setLanguage("es"));

        bindPress(elements.lanePlatform, () => setLane("platform"));
        bindPress(elements.laneEngineering, () => setLane("engineering"));

        bindPress(elements.btnExit, () => navigate(ROUTES.exit));
        bindPress(elements.btnHub, () => navigate(ROUTES.hub));

        window.addEventListener("resize", requestSafeLayout);
      }

      bindEvents();
      syncCanonicalState();
      setToggleStates();
      window.requestAnimationFrame(safeLayout);
    })();
  </script>
</body>
</html>
