name: Baseline Language Sync V10A

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/baseline-language-sync-v10a.yml"

permissions:
  contents: write

jobs:
  sync-language:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Synchronize current baseline language across source layers
        shell: bash
        run: |
          node <<'NODE'
          const fs = require("node:fs");
          const path = require("node:path");

          const ROOT = process.cwd();
          const REPORT_DIR = path.join(ROOT, "authority-reports");
          const REPORT_FILE = path.join(REPORT_DIR, "baseline-language-sync-v10a-report.txt");

          const EXCLUDED_DIRS = new Set([
            ".git",
            "node_modules",
            ".github",
            "tools",
            "authority-reports",
            ".next",
            ".cache",
            ".turbo",
            ".vercel",
            ".netlify"
          ]);

          const TEXT_EXTENSIONS = new Set([
            ".html",
            ".htm",
            ".js",
            ".mjs",
            ".cjs",
            ".jsx",
            ".ts",
            ".tsx",
            ".json",
            ".md",
            ".txt",
            ".php",
            ".liquid",
            ".astro",
            ".vue",
            ".svelte"
          ]);

          const LANGUAGE_CONTRACT = {
            currentEstate: "Rich Manor and Estate",
            routeMapLabel: "Manor",
            routeMapPath: "/explore/",
            worldSetting: "Nine Summits Universe",
            homeWorld: "Audralia",
            viewer: "Audralia Viewer",
            sun: "Audralia's Sun",
            moon: "Adralia's Moon",
            proof: "Gauges",
            showroom: "Showroom",
            frontier: "Frontier"
          };

          const REPLACEMENTS = [
            ["Demo Actual Universe", "Audralia Universe"],
            ["Demo Universe", "Audralia Universe"],
            ["Earth · Sun · Moon G1", "Audralia · Audralia's Sun · Adralia's Moon"],
            ["Earth, Sun, and Moon", "Audralia, Audralia's Sun, and Adralia's Moon"],
            ["Earth G1", "Audralia"],
            ["Sun G1", "Audralia's Sun"],
            ["Moon G1", "Adralia's Moon"],
            ["Planet 1", "Audralia"],

            ["DEMO_ACTUAL_UNIVERSE", "AUDRALIA_UNIVERSE"],
            ["DEMO_UNIVERSE", "AUDRALIA_UNIVERSE"],
            ["EARTH_G1", "AUDRALIA"],
            ["SUN_G1", "AUDRALIAS_SUN"],
            ["MOON_G1", "ADRALIAS_MOON"],
            ["PLANET_1", "AUDRALIA"],

            ["demo-actual-universe", "audralia-universe"],
            ["demo-universe", "audralia-universe"],
            ["earth-g1", "audralia"],
            ["sun-g1", "audralias-sun"],
            ["moon-g1", "adralias-moon"],
            ["planet-1", "audralia"],

            ["demo_actual_universe", "audralia_universe"],
            ["demo_universe", "audralia_universe"],
            ["earth_g1", "audralia"],
            ["sun_g1", "audralias_sun"],
            ["moon_g1", "adralias_moon"],
            ["planet_1", "audralia"],

            ["Explore · Public route-map surface", "Manor · Route Map Surface"],
            ["Explore maps.", "Manor maps."],
            ["Explore maps", "Manor maps"],
            ["Explore keeps the route clean", "Manor keeps the route clean"],

            ["Shimmer · G1 V10", "Shimmer · G1 V10A"],
            ["Shimmer/Lattice · G1 V10", "Shimmer/Lattice · G1 V10A"],
            ["SHIMMER_LATTICE_G1_V10=ACTIVE", "SHIMMER_G1_V10A_UNIVERSAL_NODE_ACTIVE=TRUE"],
            ["SHIMMER_LATTICE_G1_V10", "SHIMMER_G1_V10A_UNIVERSAL_NODE_ACTIVE"],
            ["Shimmer contract restored to baseline.", "Universal Node · V10A active."],
            ["Shimmer contract restored to baseline", "Universal Node · V10A active"],

            ["BASELINE=THE_WORLD_IS_FLAT", "BASELINE=AUDRALIA_UNIVERSE_V10A"],
            ["METHOD=RUSSIAN_DOLL_LABEL_EXPANSION", "METHOD=UNIVERSAL_NODE_RUSSIAN_DOLL_EXPANSION"],
            ["VISIBLE_LENS=PLATFORM_OR_ENGINEERING_URL_ONLY", "VISIBLE_LENS=PLATFORM_OR_ENGINEERING_URL_AND_CONTROL"]
          ];

          const RETIRED_TERMS = [
            "Demo Actual Universe",
            "Demo Universe",
            "Earth G1",
            "Sun G1",
            "Moon G1",
            "Planet 1",
            "DEMO_UNIVERSE",
            "EARTH_G1",
            "SUN_G1",
            "MOON_G1",
            "PLANET_1",
            "demo-universe",
            "earth-g1",
            "sun-g1",
            "moon-g1",
            "planet-1",
            "SHIMMER_LATTICE_G1_V10"
          ];

          const report = [];

          function log(line = "") {
            report.push(line);
            console.log(line);
          }

          function ensureDir(dir) {
            fs.mkdirSync(dir, { recursive: true });
          }

          function isExcluded(fullPath) {
            const rel = path.relative(ROOT, fullPath);
            const parts = rel.split(path.sep);

            return parts.some((part) => EXCLUDED_DIRS.has(part));
          }

          function isTextCandidate(fullPath) {
            const ext = path.extname(fullPath).toLowerCase();
            const base = path.basename(fullPath).toLowerCase();

            if (TEXT_EXTENSIONS.has(ext)) return true;
            if (base.includes("frontier")) return true;
            if (base.includes("shimmer")) return true;
            if (base.includes("products")) return true;
            if (base.includes("laws")) return true;
            if (base.includes("universe")) return true;
            if (base.includes("showroom")) return true;
            if (base.includes("gauges")) return true;
            if (base.includes("registry")) return true;
            if (base.includes("kernel")) return true;
            if (base.includes("world")) return true;

            return false;
          }

          function walk(dir, output = []) {
            if (isExcluded(dir)) return output;

            for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
              const fullPath = path.join(dir, entry.name);

              if (entry.isDirectory()) {
                walk(fullPath, output);
                continue;
              }

              if (entry.isFile() && isTextCandidate(fullPath)) {
                output.push(fullPath);
              }
            }

            return output;
          }

          function readUtf8(fullPath) {
            const stat = fs.statSync(fullPath);

            if (!stat.isFile()) return null;
            if (stat.size > 8_000_000) return null;

            const buffer = fs.readFileSync(fullPath);
            if (buffer.includes(0)) return null;

            return buffer.toString("utf8");
          }

          function replaceAll(text, from, to) {
            return text.split(from).join(to);
          }

          function applyLanguageSync(original) {
            let next = original;

            for (const [from, to] of REPLACEMENTS) {
              next = replaceAll(next, from, to);
            }

            if (
              next.includes("/explore/frontier/shimmer/") &&
              !next.includes("PUBLIC_PROOF_MARKER=Universal Node · V10A active")
            ) {
              next += "\nPUBLIC_PROOF_MARKER=Universal Node · V10A active\n";
            }

            if (
              next.includes("/showroom/globe/") &&
              !next.includes("CURRENT_VIEWER=Audralia Viewer")
            ) {
              next += "\nCURRENT_VIEWER=Audralia Viewer\n";
            }

            if (
              next.includes("/nine-summits/universe/") &&
              !next.includes("CURRENT_WORLD=Audralia")
            ) {
              next += "\nCURRENT_WORLD=Audralia\n";
            }

            if (
              next.includes("/products/") &&
              !next.includes("BASELINE_LANGUAGE=Audralia_Manor_Current")
            ) {
              next += "\nBASELINE_LANGUAGE=Audralia_Manor_Current\n";
            }

            if (
              next.includes("/laws/") &&
              !next.includes("LANGUAGE_RULE=Current terms govern; retired terms do not control active identity.")
            ) {
              next += "\nLANGUAGE_RULE=Current terms govern; retired terms do not control active identity.\n";
            }

            return next;
          }

          function scanRetired(text) {
            const hits = [];

            for (const term of RETIRED_TERMS) {
              if (text.includes(term)) hits.push(term);
            }

            return hits;
          }

          ensureDir(REPORT_DIR);

          log("BASELINE LANGUAGE SYNC V10A REPORT");
          log(`Generated: ${new Date().toISOString()}`);
          log(`Repo root: ${ROOT}`);
          log("");
          log("CURRENT LANGUAGE CONTRACT:");
          log(JSON.stringify(LANGUAGE_CONTRACT, null, 2));
          log("");

          const files = walk(ROOT);
          const changed = [];
          const remaining = [];

          for (const file of files) {
            const original = readUtf8(file);
            if (!original) continue;

            const beforeHits = scanRetired(original);
            const next = applyLanguageSync(original);
            const afterHits = scanRetired(next);

            if (next !== original) {
              fs.writeFileSync(file, next, "utf8");

              changed.push({
                file,
                beforeHits,
                afterHits
              });
            }

            if (afterHits.length) {
              remaining.push({
                file,
                hits: afterHits
              });
            }
          }

          log("CHANGED FILES:");

          if (!changed.length) {
            log("NONE");
          } else {
            for (const item of changed) {
              log("");
              log(`FILE=${path.relative(ROOT, item.file)}`);
              log(`BEFORE=${item.beforeHits.join(",") || "none"}`);
              log(`AFTER=${item.afterHits.join(",") || "none"}`);
            }
          }

          log("");
          log("RETIRED TERMS REMAINING AFTER SYNC:");

          if (!remaining.length) {
            log("NONE");
          } else {
            for (const item of remaining) {
              log("");
              log(`FILE=${path.relative(ROOT, item.file)}`);
              log(`HITS=${item.hits.join(",")}`);
            }
          }

          log("");
          log("PUBLIC SUCCESS LANGUAGE:");
          log("Audralia");
          log("Audralia Universe");
          log("Audralia Viewer");
          log("Audralia's Sun");
          log("Adralia's Moon");
          log("Manor");
          log("Shimmer · G1 V10A");
          log("Universal Node · V10A active");
          log("");
          log(remaining.length ? "RESULT=SYNC_COMPLETE_WITH_REMAINING_RETIRED_TERMS" : "RESULT=SYNC_COMPLETE_CLEAN");

          fs.writeFileSync(REPORT_FILE, report.join("\n"), "utf8");
          NODE

      - name: Commit baseline language sync
        shell: bash
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Synchronize baseline language to Audralia V10A"
            git push
          fi
