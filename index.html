<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Nine Summits — Index</title>
<link rel="stylesheet" href="/assets/ui.css"/>

<script>
(function () {
  var params = new URLSearchParams(location.search);
  var isDoorBg = params.get("doorbg") === "1";
  document.documentElement.setAttribute("data-doorbg", isDoorBg ? "1" : "0");
})();
</script>

<style>
html,
body {
  margin: 0;
  padding: 0;
  background: #000;
  width: 100%;
  height: 100%;
  overflow: hidden;
}

#app-shell {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
}

#world {
  position: absolute;
  inset: 0;
  width: 100vw;
  height: 100vh;
  display: block;
  z-index: 0;
  background: #000;
}

#runtime-root {
  position: relative;
  z-index: 10;
}

#diagnostics-dock {
  position: fixed;
  left: 12px;
  right: 12px;
  bottom: 12px;
  display: flex;
  justify-content: center;
  pointer-events: none;
  z-index: 120;
}

#diagnostics-bar {
  width: min(1100px, 100%);
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 18px;
  background: rgba(8,12,20,0.78);
  box-shadow: 0 20px 60px rgba(0,0,0,0.44);
  backdrop-filter: blur(10px);
  pointer-events: auto;
}

#diagnostics-summary {
  min-width: 0;
  flex: 1 1 auto;
  color: rgba(255,255,255,0.92);
  font-family: monospace;
  font-size: 12px;
  line-height: 1.35;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

#diagnostics-toggle {
  min-height: 38px;
  padding: 0 14px;
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,0.14);
  background: rgba(10,12,20,0.42);
  color: rgba(255,255,255,0.94);
  font: inherit;
  font-size: 12px;
  font-weight: 900;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  cursor: pointer;
}

#diagnostics-toggle:active {
  transform: translateY(1px);
}

#boot-status {
  position: fixed;
  top: 0;
  left: 0;
  right: auto;
  max-width: calc(100vw - 16px);
  padding: 6px 10px;
  font-family: monospace;
  font-size: 12px;
  line-height: 1.35;
  color: #0f0;
  background: #000;
  border-right: 1px solid rgba(255,255,255,0.12);
  border-bottom: 1px solid rgba(255,255,255,0.12);
  z-index: 9999;
  white-space: pre-wrap;
  word-break: break-word;
}

.boot-ok { color: #7fffd4; }
.boot-warn { color: #ffd27a; }
.boot-fail { color: #ff7a7a; }

html[data-doorbg="1"] #runtime-root,
html[data-doorbg="1"] #diagnostics-dock,
html[data-doorbg="1"] #boot-status {
  display: none !important;
}

@media (max-width: 760px) {
  #diagnostics-bar {
    flex-wrap: wrap;
  }

  #diagnostics-summary {
    width: 100%;
    white-space: normal;
  }
}
</style>
</head>

<body data-mode="round" data-diagnostics="peek">
<div id="app-shell">
  <canvas id="world"></canvas>
  <div id="runtime-root"></div>

  <div id="diagnostics-dock">
    <div id="diagnostics-bar">
      <div id="diagnostics-summary">DIAGNOSTICS AVAILABLE AT /GAUGES/</div>
      <button id="diagnostics-toggle" type="button">GAUGES</button>
    </div>
  </div>
</div>

<div id="boot-status" class="boot-warn">BOOTING...</div>

<script type="module">
const statusNode = document.getElementById("boot-status");
const diagnosticsToggle = document.getElementById("diagnostics-toggle");
const IS_DOOR_BG = document.documentElement.getAttribute("data-doorbg") === "1";

const RUNTIME_STORAGE_KEY = "cte_runtime_v4";
const RUNTIME_RECEIPT_KEY = "__AUTHORITY_RECEIPT__";
const BOOT_STATE_KEY = "__INDEX_BOOT_STATE__";
const DIAGNOSTICS_PATH = "/gauges/";
const IGNITION_TIMEOUT_MS = 12000;
const IGNITION_POLL_MS = 100;

const MODULES = Object.freeze([
  Object.freeze({
    key: "world_kernel",
    path: "/world/world_kernel.js"
  }),
  Object.freeze({
    key: "planet_engine",
    path: "/world/planet_engine.js",
    validate(mod) {
      return typeof mod?.createPlanetEngine === "function" ||
        typeof mod?.buildPlanetField === "function" ||
        typeof mod?.default?.buildPlanetField === "function";
    }
  }),
  Object.freeze({
    key: "render",
    path: "/world/render/index.js",
    validate(mod) {
      return typeof mod?.createRenderer === "function" ||
        typeof mod?.renderPlanet === "function" ||
        typeof mod?.default?.renderPlanet === "function";
    }
  }),
  Object.freeze({
    key: "control",
    path: "/world/control.js",
    validate(mod) {
      return typeof mod?.createControlSystem === "function" ||
        typeof mod?.default?.createControlSystem === "function";
    }
  }),
  Object.freeze({
    key: "instruments",
    path: "/assets/instruments.js"
  }),
  Object.freeze({
    key: "runtime",
    path: "/world/runtime/world_runtime.js",
    validate(mod) {
      return typeof mod?.startRuntime === "function" ||
        typeof mod?.default?.startRuntime === "function";
    }
  })
]);

const bootState = {
  phase: "BOOT_INIT",
  modulesLoaded: [],
  failedModule: null,
  failureMessage: "",
  verificationPass: false
};

function writeBootState() {
  window[BOOT_STATE_KEY] = {
    phase: bootState.phase,
    modulesLoaded: bootState.modulesLoaded.slice(),
    failedModule: bootState.failedModule,
    failureMessage: bootState.failureMessage,
    verificationPass: bootState.verificationPass,
    isDoorBackground: IS_DOOR_BG
  };
}

function setBootState(next) {
  if (typeof next.phase === "string") bootState.phase = next.phase;
  if (Array.isArray(next.modulesLoaded)) bootState.modulesLoaded = next.modulesLoaded.slice();
  if ("failedModule" in next) bootState.failedModule = next.failedModule;
  if ("failureMessage" in next) bootState.failureMessage = next.failureMessage;
  if ("verificationPass" in next) bootState.verificationPass = next.verificationPass;
  writeBootState();
}

function setStatus(message, tone = "boot-warn") {
  if (!IS_DOOR_BG && statusNode) {
    statusNode.textContent = message;
    statusNode.className = tone;
  }
  console.log("[BOOT]", message);
}

function toMessage(error) {
  if (error instanceof Error && typeof error.message === "string" && error.message.length > 0) {
    return error.message;
  }
  return String(error);
}

async function importModule(definition) {
  setBootState({
    phase: "MODULE_IMPORT",
    failedModule: null,
    failureMessage: "",
    verificationPass: false
  });

  setStatus("IMPORTING " + definition.key.toUpperCase() + "...", "boot-warn");

  let mod;
  try {
    mod = await import(definition.path);
  } catch (error) {
    const message = toMessage(error);
    setBootState({
      phase: "MODULE_IMPORT_FAILED",
      failedModule: definition.key,
      failureMessage: message,
      verificationPass: false
    });
    setStatus(
      [
        "BOOT ERROR: " + definition.key + " import failed",
        definition.path,
        message
      ].join("\n"),
      "boot-fail"
    );
    throw error;
  }

  if (typeof definition.validate === "function" && definition.validate(mod) !== true) {
    const message = definition.key + " contract validation failed";
    setBootState({
      phase: "MODULE_VALIDATION_FAILED",
      failedModule: definition.key,
      failureMessage: message,
      verificationPass: false
    });
    setStatus(
      [
        "BOOT ERROR: " + definition.key + " validation failed",
        definition.path,
        message
      ].join("\n"),
      "boot-fail"
    );
    throw new Error(message);
  }

  bootState.modulesLoaded.push(definition.key);
  writeBootState();
  setStatus("IMPORTED " + definition.key.toUpperCase(), "boot-ok");

  return mod;
}

async function preflightModules() {
  const loaded = Object.create(null);

  for (const definition of MODULES) {
    loaded[definition.key] = await importModule(definition);
  }

  setBootState({
    phase: "MODULE_PREFLIGHT_OK",
    failedModule: null,
    failureMessage: "",
    verificationPass: false
  });

  return loaded;
}

function resolveStartRuntime(runtimeModule) {
  if (typeof runtimeModule?.startRuntime === "function") return runtimeModule.startRuntime;
  if (typeof runtimeModule?.default?.startRuntime === "function") return runtimeModule.default.startRuntime;
  return null;
}

function validateCanvasPresence() {
  const world = document.getElementById("world");
  if (!world) {
    throw new Error("Missing #world canvas");
  }
  return world;
}

function readRuntimeStorageReceipt() {
  try {
    const raw = localStorage.getItem(RUNTIME_STORAGE_KEY);
    if (!raw) return null;
    const parsed = JSON.parse(raw);
    return parsed && typeof parsed === "object" ? parsed : null;
  } catch {
    return null;
  }
}

function readWindowReceipt() {
  const receipt = window[RUNTIME_RECEIPT_KEY];
  return receipt && typeof receipt === "object" ? receipt : null;
}

function readIgnitionState() {
  const windowReceipt = readWindowReceipt();
  const storageReceipt = readRuntimeStorageReceipt();

  return {
    verificationPass:
      windowReceipt?.verification?.pass === true ||
      storageReceipt?.verification?.pass === true,
    failurePhase:
      windowReceipt?.failure?.phase ??
      storageReceipt?.failure?.phase ??
      null,
    failureMessage:
      windowReceipt?.failure?.message ??
      storageReceipt?.failure?.message ??
      ""
  };
}

async function waitForIgnition() {
  const startedAt = performance.now();

  setBootState({
    phase: "IGNITION_WAIT",
    failedModule: null,
    failureMessage: "",
    verificationPass: false
  });

  while ((performance.now() - startedAt) < IGNITION_TIMEOUT_MS) {
    const state = readIgnitionState();

    if (state.failurePhase) {
      setBootState({
        phase: "RUNTIME_FAILURE",
        failedModule: "runtime",
        failureMessage: state.failureMessage || state.failurePhase,
        verificationPass: false
      });

      setStatus(
        [
          "RUNTIME ERROR: " + state.failurePhase,
          state.failureMessage || "Unknown runtime failure"
        ].join("\n"),
        "boot-fail"
      );
      return false;
    }

    if (state.verificationPass === true) {
      setBootState({
        phase: "RUNNING",
        failedModule: null,
        failureMessage: "",
        verificationPass: true
      });

      setStatus("RUNNING", "boot-ok");
      return true;
    }

    setStatus("WAITING FOR IGNITION...", "boot-warn");
    await new Promise((resolve) => window.setTimeout(resolve, IGNITION_POLL_MS));
  }

  const finalState = readIgnitionState();
  if (finalState.failurePhase) {
    setBootState({
      phase: "RUNTIME_FAILURE",
      failedModule: "runtime",
      failureMessage: finalState.failureMessage || finalState.failurePhase,
      verificationPass: false
    });

    setStatus(
      [
        "RUNTIME ERROR: " + finalState.failurePhase,
        finalState.failureMessage || "Unknown runtime failure"
      ].join("\n"),
      "boot-fail"
    );
    return false;
  }

  setBootState({
    phase: "IGNITION_TIMEOUT",
    failedModule: "runtime",
    failureMessage: "Ignition timed out before verification pass.",
    verificationPass: false
  });

  setStatus("IGNITION TIMEOUT", "boot-fail");
  return false;
}

async function boot() {
  try {
    setBootState({
      phase: "BOOT_INIT",
      modulesLoaded: [],
      failedModule: null,
      failureMessage: "",
      verificationPass: false
    });

    validateCanvasPresence();
    setStatus("BOOTING...", "boot-warn");

    const modules = await preflightModules();
    const startRuntime = resolveStartRuntime(modules.runtime);

    if (!startRuntime) {
      const message = "runtime startRuntime missing";
      setBootState({
        phase: "RUNTIME_CONTRACT_FAILURE",
        failedModule: "runtime",
        failureMessage: message,
        verificationPass: false
      });
      setStatus(
        [
          "BOOT ERROR: runtime startRuntime missing",
          "/world/runtime/world_runtime.js",
          message
        ].join("\n"),
        "boot-fail"
      );
      return;
    }

    setBootState({
      phase: "RUNTIME_START",
      failedModule: null,
      failureMessage: "",
      verificationPass: false
    });

    setStatus("STARTING RUNTIME...", "boot-warn");
    startRuntime();
    await waitForIgnition();
  } catch {
    // surfaced above
  }
}

if (!IS_DOOR_BG) {
  diagnosticsToggle?.addEventListener("click", function () {
    window.location.href = DIAGNOSTICS_PATH;
  });
}

writeBootState();
boot();
</script>
</body>
</html>
