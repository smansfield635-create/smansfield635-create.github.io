<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Compass</title>

<link rel="stylesheet" href="/assets/ui.css"/>
<script src="/assets/hex-lattice-engine.js"></script>

<style>

/* =============================
   LAYER COLORS
   red → dark → red → dark
============================= */

:root{

--red-field:#9e0000;
--dark-ring:#0b0f16;
--red-compass:#b00000;
--dark-button:#080b12;

--gold:#d4af37;

--core:180px;
--cardinal:120px;
--minor:90px;

--r1:150px;
--r2:230px;
--r3:300px;

}

/* =============================
   FIELD
============================= */

body{
background:radial-gradient(circle at center,
#9e0000 0%,
#600000 45%,
#300000 100%);
overflow:hidden;
}

/* =============================
   STAGE
============================= */

.stage{
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
width:900px;
height:900px;
}

/* =============================
   COMPASS RINGS
============================= */

.ring{
position:absolute;
border-radius:50%;
left:50%;
top:50%;
transform:translate(-50%,-50%);
pointer-events:none;
}

.ring.outer{
width:760px;
height:760px;
border:2px solid rgba(212,175,55,.35);
}

.ring.mid{
width:520px;
height:520px;
border:2px solid rgba(212,175,55,.25);
}

.ring.inner{
width:320px;
height:320px;
border:2px solid rgba(212,175,55,.20);
}

/* =============================
   MOON
============================= */

.moon{
position:absolute;
top:60px;
right:90px;
width:80px;
height:80px;
border-radius:50%;

background:
radial-gradient(circle at 35% 30%,
#fff8d6 0%,
#ffeaa0 40%,
#ffd86a 70%,
#ffcf4d 100%);

box-shadow:
0 0 40px rgba(255,240,200,.6),
0 0 120px rgba(255,210,100,.4);

}

/* =============================
   DIAMOND BUTTONS
============================= */

.node{
position:absolute;
transform:rotate(45deg);
background:#080b12;
border:1px solid rgba(255,255,255,.15);
box-shadow:
0 12px 30px rgba(0,0,0,.8),
0 0 18px rgba(212,175,55,.18);
cursor:pointer;
}

.node:hover{
box-shadow:
0 12px 30px rgba(0,0,0,.9),
0 0 24px rgba(212,175,55,.35);
}

/* sizes */

.core{width:var(--core);height:var(--core);}
.cardinal{width:var(--cardinal);height:var(--cardinal);}
.minor{width:var(--minor);height:var(--minor);}

/* label */

.node span{
transform:rotate(-45deg);
display:block;
text-align:center;
color:white;
font-weight:700;
font-size:14px;
line-height:1;
position:absolute;
top:50%;
left:50%;
transform-origin:center;
translate:-50% -50%;
}

</style>
</head>

<body>

<div class="stage" id="stage">

<div class="ring outer"></div>
<div class="ring mid"></div>
<div class="ring inner"></div>

<div class="moon"></div>

</div>

<script>

/* =============================
   GEOMETRY
============================= */

const stage = document.getElementById("stage")

function addNode(label,x,y,size){

let node = document.createElement("div")
node.className="node "+size

node.style.left = x+"px"
node.style.top = y+"px"

let text = document.createElement("span")
text.innerText = label

node.appendChild(text)
stage.appendChild(node)

}

/* =============================
   CORE
============================= */

addNode("CORE",360,360,"core")

/* =============================
   CARDINALS
============================= */

addNode("LAWS",360,210,"cardinal")
addNode("ENERGY",520,360,"cardinal")
addNode("FINANCE",360,520,"cardinal")
addNode("GOVERNANCE",210,360,"cardinal")

/* =============================
   MINOR
============================= */

addNode("PRODUCTS",520,210,"minor")
addNode("RESEARCH",600,360,"minor")
addNode("EXPLORE",520,520,"minor")
addNode("DOCTRINE",360,600,"minor")

addNode("EDUCATION",210,520,"minor")
addNode("FRONTIER",120,360,"minor")
addNode("INFRA",210,210,"minor")
addNode("AGRICULTURE",360,120,"minor")

/* =============================
   CONTROLS
============================= */

addNode("EXIT",120,700,"minor")
addNode("HUB",600,700,"minor")
addNode("HOME",360,750,"minor")
addNode("INDEX",360,30,"minor")

</script>

</body>
</html>
