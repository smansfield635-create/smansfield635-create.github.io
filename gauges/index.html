<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Diagnostic Gauges</title>
<style>
:root{
  --bg:#0b0f14;
  --panel:#0f1620;
  --line:#1f2a36;
  --text:#d7f9ff;
  --muted:rgba(215,249,255,.72);
  --accent:#7fffd4;
}
*{box-sizing:border-box}
html,body{margin:0;background:var(--bg);color:var(--text);font-family:monospace}
.container{padding:16px;max-width:1040px;margin:0 auto}
.status{color:var(--accent);font-weight:bold;margin-bottom:12px}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.modeBtn{
  min-height:38px;
  padding:0 14px;
  border-radius:999px;
  border:1px solid var(--line);
  background:var(--panel);
  color:var(--text);
  font:inherit;
  cursor:pointer;
}
.modeBtn.is-active{
  border-color:var(--accent);
  color:var(--accent);
}
.group{
  margin-bottom:12px;
  border:1px solid var(--line);
  border-radius:12px;
  background:var(--panel);
  overflow:hidden;
}
.summary{
  display:flex;
  align-items:center;
  gap:12px;
  width:100%;
  padding:12px;
  background:transparent;
  border:0;
  color:var(--text);
  text-align:left;
  cursor:pointer;
}
.summary:active{transform:translateY(1px)}
.diamondWrap{
  width:26px;
  height:26px;
  position:relative;
  flex:0 0 26px;
}
.diamond{
  position:absolute;
  inset:0;
  transform:rotate(45deg);
  border-radius:4px;
  border:1px solid rgba(255,255,255,.18);
  box-shadow:
    inset 0 0 12px rgba(255,255,255,.08),
    0 0 10px rgba(255,255,255,.12);
  animation:spin 7s linear infinite,pulse 1.8s ease-in-out infinite;
}
.spark::after{
  content:"";
  position:absolute;
  inset:-3px;
  border-radius:6px;
  border:1px solid rgba(255,255,255,.25);
  transform:rotate(45deg);
  animation:flicker .6s steps(2,end) infinite;
}
@keyframes spin{
  from{transform:rotate(45deg)}
  to{transform:rotate(405deg)}
}
@keyframes pulse{
  0%,100%{filter:brightness(.95)}
  50%{filter:brightness(1.18)}
}
@keyframes flicker{
  0%,100%{opacity:.12}
  25%{opacity:.55}
  50%{opacity:.18}
  75%{opacity:.72}
}
.state-white{background:rgba(255,255,255,.88)}
.state-gray{background:rgba(144,154,166,.72)}
.state-yellow{background:rgba(255,224,128,.88)}
.state-orange{background:rgba(255,170,102,.92)}
.state-red{background:rgba(255,108,108,.95)}
.state-black{background:rgba(12,12,12,.96);border-color:rgba(255,255,255,.28)}
.state-blue{background:rgba(110,231,255,.9)}
.summaryText{min-width:0;flex:1 1 auto}
.titleRow{display:flex;align-items:center;justify-content:space-between;gap:12px}
.title{color:var(--accent);font-weight:bold}
.meta{color:var(--muted);font-size:12px;white-space:nowrap}
.preview{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:8px;
  margin-top:6px;
}
.previewItem{
  padding:6px 8px;
  border:1px solid var(--line);
  border-radius:8px;
  background:rgba(255,255,255,.02);
}
.previewK{opacity:.72;font-size:11px}
.previewV{margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.detail{
  display:none;
  padding:0 12px 12px 12px;
  border-top:1px solid var(--line);
}
.group.open .detail{display:block}
.rows{margin-top:10px}
.row{display:flex;justify-content:space-between;gap:16px;margin:4px 0}
.row div:first-child{opacity:.9}
.row div:last-child{text-align:right;word-break:break-word}
.canvasWrap{
  margin-top:10px;
  border:1px solid var(--line);
  border-radius:8px;
  overflow:hidden;
  background:var(--bg);
}
canvas{display:block;width:100%}
.small{opacity:.7;font-size:12px;margin-top:6px}
.hidden{display:none}
@media (max-width:760px){
  .preview{grid-template-columns:1fr}
  .row{flex-direction:column;gap:2px}
  .row div:last-child{text-align:left}
}
</style>
</head>

<body>
<div class="container">
  <div id="status" class="status">STATE: OFFLINE</div>

  <div class="toolbar">
    <button id="btn-display" class="modeBtn is-active" type="button">DISPLAY</button>
    <button id="btn-diagnostics" class="modeBtn" type="button">DIAGNOSTICS</button>
  </div>

  <div id="display-layer"></div>
  <div id="diagnostics-layer" class="hidden"></div>
</div>

<script>
const RECEIPT_KEY = "__AUTHORITY_RECEIPT__";
const HISTORY_SIZE = 180;

const history = {
  fps: [],
  dtMs: [],
  coherence: [],
  stability: []
};

function normalizeObject(value){
  return value && typeof value === "object" && !Array.isArray(value) ? value : {};
}

function push(arr, value){
  arr.push(value);
  if(arr.length > HISTORY_SIZE) arr.shift();
}

function row(k,v){
  return `<div class="row"><div>${k}</div><div>${v ?? "—"}</div></div>`;
}

function esc(v){
  return String(v ?? "—")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;");
}

function fmt(v, digits = 6){
  return typeof v === "number" && Number.isFinite(v) ? v.toFixed(digits) : "—";
}

function bool(v){
  return v === true ? "true" : v === false ? "false" : "—";
}

function readReceipt(){
  return normalizeObject(window[RECEIPT_KEY]);
}

function readInstrument(receipt){
  return normalizeObject(receipt.instrument);
}

function inferStateColor(receipt, instrument){
  const state = instrument.classifiedState ?? "OFFLINE";
  const failurePhase = receipt.failure?.phase ?? null;

  if (failurePhase) return {color:"red", spark:true};
  if (state === "LIVE") return {color:"white", spark:false};
  if (state === "STALE") return {color:"yellow", spark:false};
  if (state === "INVALID") return {color:"orange", spark:false};
  if (state === "OFFLINE") return {color:"gray", spark:false};
  return {color:"gray", spark:false};
}

function colorClass(state){
  switch(state){
    case "white": return "state-white";
    case "gray": return "state-gray";
    case "yellow": return "state-yellow";
    case "orange": return "state-orange";
    case "red": return "state-red";
    case "black": return "state-black";
    case "blue": return "state-blue";
    default: return "state-gray";
  }
}

function buildSummaryPreview(items){
  return `
    <div class="preview">
      ${items.map(([k,v]) => `
        <div class="previewItem">
          <div class="previewK">${esc(k)}</div>
          <div class="previewV">${esc(v)}</div>
        </div>
      `).join("")}
    </div>
  `;
}

function groupBlock(id, title, meta, previewItems, detailHtml, state){
  const sparkClass = state.spark ? "spark" : "";
  return `
    <div class="group open" data-group="${esc(id)}">
      <button class="summary" type="button">
        <div class="diamondWrap ${sparkClass}">
          <div class="diamond ${colorClass(state.color)}"></div>
        </div>
        <div class="summaryText">
          <div class="titleRow">
            <div class="title">${esc(title)}</div>
            <div class="meta">${esc(meta)}</div>
          </div>
          ${buildSummaryPreview(previewItems)}
        </div>
      </button>
      <div class="detail">${detailHtml}</div>
    </div>
  `;
}

function drawSeries(canvas, seriesA, seriesB, yMax){
  const ctx = canvas.getContext("2d");
  const w = canvas.width;
  const h = canvas.height;

  ctx.clearRect(0,0,w,h);
  ctx.fillStyle = "#0b0f14";
  ctx.fillRect(0,0,w,h);

  ctx.strokeStyle = "#1f2a36";
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, h - 12);
  ctx.lineTo(w, h - 12);
  ctx.stroke();

  function draw(series, color){
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.beginPath();
    series.forEach((v, i) => {
      const n = typeof v === "number" && Number.isFinite(v)
        ? Math.max(0, Math.min(1, yMax > 0 ? v / yMax : 0))
        : 0;
      const x = (i / Math.max(1, HISTORY_SIZE - 1)) * w;
      const y = h - 12 - n * (h * 0.72);
      if(i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    });
    ctx.stroke();
  }

  draw(seriesA, "#7fffd4");
  draw(seriesB, "#6fe7ff");
}

function drawScalarSeries(canvas, seriesA, seriesB){
  const ctx = canvas.getContext("2d");
  const w = canvas.width;
  const h = canvas.height;

  ctx.clearRect(0,0,w,h);
  ctx.fillStyle = "#0b0f14";
  ctx.fillRect(0,0,w,h);

  ctx.strokeStyle = "#1f2a36";
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, h - 12);
  ctx.lineTo(w, h - 12);
  ctx.stroke();

  function draw(series, color){
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.beginPath();
    series.forEach((v, i) => {
      const n = typeof v === "number" && Number.isFinite(v) ? Math.max(0, Math.min(1, v)) : 0;
      const x = (i / Math.max(1, HISTORY_SIZE - 1)) * w;
      const y = h - 12 - n * (h * 0.72);
      if(i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    });
    ctx.stroke();
  }

  draw(seriesA, "#7fffd4");
  draw(seriesB, "#ffd27a");
}

function renderDisplayLayer(root, receipt, instrument){
  const displayPayload = normalizeObject(instrument.displayPayload);
  const baseline = normalizeObject(displayPayload.baseline);
  const progress = normalizeObject(displayPayload.progress);
  const failure = normalizeObject(displayPayload.failure);
  const state = inferStateColor(receipt, instrument);

  root.innerHTML = [
    groupBlock(
      "runtime",
      "RUNTIME",
      `${receipt.phase ?? "—"} • ${Math.round(receipt.fps || 0)} fps`,
      [
        ["classifiedState", instrument.classifiedState ?? "—"],
        ["phase", receipt.phase ?? "—"],
        ["mode", receipt.mode ?? "—"]
      ],
      `<div class="rows">
        ${row("classifiedState", instrument.classifiedState ?? "—")}
        ${row("phase", receipt.phase ?? "—")}
        ${row("mode", receipt.mode ?? "—")}
        ${row("timestamp", receipt.timestamp ?? "—")}
        ${row("fps", Math.round(receipt.fps || 0))}
        ${row("dtMs", Math.round(receipt.dtMs || 0))}
        ${row("failure.phase", receipt.failure?.phase ?? "—")}
        ${row("failure.message", receipt.failure?.message ?? "—")}
      </div>`,
      state
    ),
    groupBlock(
      "baseline",
      "BASELINE",
      `${baseline.p ?? "—"} • ${baseline.s ?? "—"}`,
      [
        ["t", baseline.t ?? "—"],
        ["p", baseline.p ?? "—"],
        ["s", baseline.s ?? "—"]
      ],
      `<div class="rows">
        ${row("t", baseline.t ?? "—")}
        ${row("p", baseline.p ?? "—")}
        ${row("s", baseline.s ?? "—")}
        ${row("v", baseline.v ?? "—")}
      </div>`,
      state
    ),
    groupBlock(
      "progress",
      "PROGRESS",
      `${fmt(progress.c,3)} / ${fmt(progress.st,3)}`,
      [
        ["f", progress.f ?? "—"],
        ["dt", progress.dt ?? "—"],
        ["tr", progress.tr ?? "—"]
      ],
      `<div class="rows">
        ${row("f", progress.f ?? "—")}
        ${row("dt", progress.dt ?? "—")}
        ${row("c", fmt(progress.c, 6))}
        ${row("st", fmt(progress.st, 6))}
        ${row("tr", progress.tr ?? "—")}
      </div>
      <div class="canvasWrap"><canvas id="progressChart" width="1000" height="120"></canvas></div>
      <div class="small">coherence = green · stability = yellow</div>`,
      state
    ),
    groupBlock(
      "failure",
      "FAILURE",
      `${failure.ph ?? "—"}`,
      [
        ["ph", failure.ph ?? "—"],
        ["msg", failure.msg ?? "—"],
        ["s", bool(failure.s)]
      ],
      `<div class="rows">
        ${row("ph", failure.ph ?? "—")}
        ${row("msg", failure.msg ?? "—")}
        ${row("s", bool(failure.s))}
      </div>`,
      state
    )
  ].join("");

  const progressChart = document.getElementById("progressChart");
  if (progressChart){
    drawScalarSeries(progressChart, history.coherence, history.stability);
  }
}

function renderDiagnosticsLayer(root, receipt, instrument){
  const diagnosticsPayload = normalizeObject(instrument.diagnosticsPayload);
  const state = inferStateColor(receipt, instrument);

  root.innerHTML = [
    groupBlock(
      "classification",
      "CLASSIFICATION PROOF",
      `${instrument.classifiedState ?? "—"}`,
      [
        ["classifiedState", instrument.classifiedState ?? "—"],
        ["payloadState", diagnosticsPayload.classifiedState ?? "—"],
        ["sourcePhase", diagnosticsPayload.sourcePhase ?? "—"]
      ],
      `<div class="rows">
        ${row("classifiedState", instrument.classifiedState ?? "—")}
        ${row("diagnostics.classifiedState", diagnosticsPayload.classifiedState ?? "—")}
        ${row("sourcePhase", diagnosticsPayload.sourcePhase ?? "—")}
        ${row("sourceMode", diagnosticsPayload.sourceMode ?? "—")}
      </div>`,
      state
    ),
    groupBlock(
      "freshness",
      "FRESHNESS PROOF",
      `${bool(diagnosticsPayload.fresh)}`,
      [
        ["timestampMs", diagnosticsPayload.timestampMs ?? "—"],
        ["ageMs", diagnosticsPayload.ageMs ?? "—"],
        ["fresh", bool(diagnosticsPayload.fresh)]
      ],
      `<div class="rows">
        ${row("timestampMs", diagnosticsPayload.timestampMs ?? "—")}
        ${row("ageMs", diagnosticsPayload.ageMs ?? "—")}
        ${row("timestampValid", bool(diagnosticsPayload.timestampValid))}
        ${row("fresh", bool(diagnosticsPayload.fresh))}
      </div>`,
      state
    ),
    groupBlock(
      "frame",
      "FRAME PROOF",
      `${bool(diagnosticsPayload.frameSync)} / ${bool(diagnosticsPayload.verificationPass)}`,
      [
        ["frameSync", bool(diagnosticsPayload.frameSync)],
        ["verificationPass", bool(diagnosticsPayload.verificationPass)],
        ["fps", diagnosticsPayload.fps ?? "—"]
      ],
      `<div class="rows">
        ${row("frameSync", bool(diagnosticsPayload.frameSync))}
        ${row("verificationPass", bool(diagnosticsPayload.verificationPass))}
        ${row("fps", diagnosticsPayload.fps ?? "—")}
        ${row("dtMs", diagnosticsPayload.dtMs ?? "—")}
      </div>
      <div class="canvasWrap"><canvas id="runtimeChart" width="1000" height="120"></canvas></div>
      <div class="small">fps = green · dtMs = cyan</div>`,
      state
    ),
    groupBlock(
      "diagfailure",
      "FAILURE PROOF",
      `${diagnosticsPayload.failurePhase ?? "—"}`,
      [
        ["failurePhase", diagnosticsPayload.failurePhase ?? "—"],
        ["failureMessage", diagnosticsPayload.failureMessage ?? "—"],
        ["receiptFailure", receipt.failure?.phase ?? "—"]
      ],
      `<div class="rows">
        ${row("failurePhase", diagnosticsPayload.failurePhase ?? "—")}
        ${row("failureMessage", diagnosticsPayload.failureMessage ?? "—")}
        ${row("receipt.failure.phase", receipt.failure?.phase ?? "—")}
        ${row("receipt.failure.message", receipt.failure?.message ?? "—")}
      </div>`,
      state
    )
  ].join("");

  const runtimeChart = document.getElementById("runtimeChart");
  if (runtimeChart){
    drawSeries(runtimeChart, history.fps, history.dtMs, Math.max(60, ...history.fps, ...history.dtMs, 1));
  }
}

function updateHistory(receipt, instrument){
  const progress = normalizeObject(normalizeObject(instrument.displayPayload).progress);
  const diagnostics = normalizeObject(instrument.diagnosticsPayload);

  push(history.fps, typeof diagnostics.fps === "number" ? diagnostics.fps : (receipt.fps || 0));
  push(history.dtMs, typeof diagnostics.dtMs === "number" ? diagnostics.dtMs : (receipt.dtMs || 0));
  push(history.coherence, typeof progress.c === "number" ? progress.c : 0);
  push(history.stability, typeof progress.st === "number" ? progress.st : 0);
}

function render(){
  const statusNode = document.getElementById("status");
  const displayRoot = document.getElementById("display-layer");
  const diagnosticsRoot = document.getElementById("diagnostics-layer");

  const receipt = readReceipt();
  const instrument = readInstrument(receipt);

  if (Object.keys(receipt).length === 0 || Object.keys(instrument).length === 0){
    statusNode.textContent = "STATE: OFFLINE";
    displayRoot.innerHTML = "";
    diagnosticsRoot.innerHTML = "";
    return;
  }

  updateHistory(receipt, instrument);

  const timestamp = receipt.timestamp ? new Date(receipt.timestamp).getTime() : null;
  const age = typeof timestamp === "number" && Number.isFinite(timestamp)
    ? Math.max(0, Date.now() - timestamp)
    : null;

  statusNode.textContent = `STATE: ${instrument.classifiedState ?? "OFFLINE"} • ${receipt.phase ?? "—"} • ${age ?? "—"}ms`;

  renderDisplayLayer(displayRoot, receipt, instrument);
  renderDiagnosticsLayer(diagnosticsRoot, receipt, instrument);
}

function setMode(mode){
  const displayRoot = document.getElementById("display-layer");
  const diagnosticsRoot = document.getElementById("diagnostics-layer");
  const btnDisplay = document.getElementById("btn-display");
  const btnDiagnostics = document.getElementById("btn-diagnostics");

  const showDisplay = mode === "display";

  displayRoot.classList.toggle("hidden", !showDisplay);
  diagnosticsRoot.classList.toggle("hidden", showDisplay);
  btnDisplay.classList.toggle("is-active", showDisplay);
  btnDiagnostics.classList.toggle("is-active", !showDisplay);
}

function installModeHandlers(){
  document.getElementById("btn-display").onclick = function(){
    setMode("display");
  };
  document.getElementById("btn-diagnostics").onclick = function(){
    setMode("diagnostics");
  };
}

function loop(){
  render();
  requestAnimationFrame(loop);
}

installModeHandlers();
setMode("display");
loop();
</script>
</body>
</html>
