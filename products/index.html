<!doctype html>
<!-- TNT — /products/index.html
     PRODUCTS · SIGNATURE SYSTEMS + 5 STREAMS (FULL / GLOSS / COLOR / NO SHELLS)
     INFORMAL SITE LAYER (PINNED):
       - gd_style = informal
       - gd_depth = explore
     TRILINGUAL UI: EN / 中文 / ES  (NO RELOAD)
     VISIBLE LENS ONLY:
       - lane=platform|engineering (URL-only; NEVER stored) (NO RELOAD)
     UX:
       - Signature first (8 glossy diamonds; 4×2)
       - Streams are single-open accordion
       - Each stream body is a 2×2 glossy diamond grid (4 products, no empty space)
       - Switching LANG or LANE does NOT reload and does NOT close the open stream
     STATE:
       - Preserve gd_lang/gd_style/gd_time/gd_depth only (NO new gd_* keys)
       - Preserve URL query: lang/style/time/depth/lane
     ASSETS:
       - /assets/ui.css + /assets/branch.css + /assets/instruments.js
       - ui.css owns html/body background (NO overrides)
     ROUTING:
       - Edit ROUTES table only.
       - If a destination 404s: create that page, don’t degrade this hub.
-->

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>PRODUCTS</title>

<link rel="stylesheet" href="/assets/ui.css"/>
<link rel="stylesheet" href="/assets/branch.css"/>
<script defer src="/assets/instruments.js"></script>

<style>
a{color:inherit;text-decoration:none}
body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:#fff}
body::before,body::after{pointer-events:none!important}

/* ===== TOKENS ===== */
:root{
  --dockH:132px;

  --stroke:rgba(255,255,255,.12);
  --stroke2:rgba(255,255,255,.10);

  --ink:rgba(255,255,255,.95);
  --txt:rgba(255,255,255,.90);
  --mut:rgba(255,255,255,.78);
  --soft:rgba(255,255,255,.62);

  --onyx0:rgba(6,8,10,.96);
  --onyx1:rgba(10,12,16,.86);

  --crimson:rgba(120,0,22,.34);
  --festival:rgba(255,43,43,.18);
  --opalV:rgba(90,40,120,.12);

  --gold:rgba(201,162,74,.55);
  --goldGlow:rgba(201,162,74,.30);

  --shadowA:0 28px 110px rgba(0,0,0,.70);
  --shadowB:0 18px 60px rgba(0,0,0,.55);
  --shadowC:0 18px 60px rgba(0,0,0,.55);
}

/* ===== TOP CONTROLS ===== */
.top{
  position:fixed;top:16px;left:0;right:0;
  padding:0 16px;
  display:flex;justify-content:space-between;align-items:center;
  gap:12px;
  z-index:240;
  pointer-events:none;
}
.top .left,.top .right{
  display:flex;gap:10px;flex-wrap:wrap;align-items:center;white-space:nowrap;
  pointer-events:auto;
}

/* Buttons */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:10px 12px;min-height:44px;border-radius:16px;
  border:1px solid rgba(255,255,255,.14);
  background:
    radial-gradient(circle at 50% 120%, rgba(201,162,74,.16), transparent 64%),
    linear-gradient(145deg, rgba(10,12,16,.78), rgba(6,8,10,.90));
  color:var(--ink);
  font-weight:950;font-size:14px;letter-spacing:.2px;
  -webkit-tap-highlight-color:transparent;
  position:relative;overflow:hidden;
  touch-action:manipulation;
  box-shadow:var(--shadowC);
}
.btn:active{transform:translateY(1px)}
.btn::after{
  content:"";
  position:absolute;left:10px;right:10px;bottom:-12px;height:28px;
  background: radial-gradient(circle at 50% 0%, rgba(201,162,74,.34), transparent 72%);
  opacity:.60;pointer-events:none;
}
.btn.red{border-color:rgba(255,43,43,.22); box-shadow:var(--shadowC), 0 0 18px rgba(255,43,43,.12);}

/* Seg */
.seg{
  display:inline-flex;gap:0;overflow:hidden;border-radius:16px;
  border:1px solid rgba(255,255,255,.12);
  background: rgba(0,0,0,.16);
  box-shadow: var(--shadowC);
}
.seg button{
  appearance:none;border:0;background:transparent;color:var(--mut);
  padding:10px 12px;min-height:44px;font-weight:950;font-size:13px;
  letter-spacing:.25px;cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
.seg button[aria-pressed="true"]{
  color:var(--ink);
  background:
    radial-gradient(circle at 50% 120%, rgba(201,162,74,.22), transparent 62%),
    linear-gradient(180deg, rgba(255,43,43,.10), rgba(0,0,0,.10));
  box-shadow: inset 0 -10px 22px rgba(201,162,74,.16);
}

/* ===== PAGE ===== */
.page{
  width:min(1180px,94vw);
  margin:0 auto;
  padding:104px 0 calc(var(--dockH) + 18px);
  display:flex;
  flex-direction:column;
  gap:12px;
  position:relative;
  z-index:10;
}

/* Background context behind content */
.backdrop{
  position:absolute;
  left:50%;
  top:68px;
  transform:translateX(-50%);
  width:min(1240px,96vw);
  height:calc(100% - 108px);
  border-radius:34px;
  pointer-events:none;
  z-index:0;
  overflow:hidden;
}
.backdrop::before{
  content:"";
  position:absolute;inset:0;
  border:1px solid rgba(255,255,255,.08);
  border-radius:34px;
  background:
    radial-gradient(circle at 18% 20%, rgba(201,162,74,.10), transparent 60%),
    radial-gradient(circle at 78% 22%, rgba(255,43,43,.12), transparent 62%),
    radial-gradient(circle at 60% 90%, rgba(90,40,120,.10), transparent 64%),
    linear-gradient(160deg, rgba(0,0,0,.18), rgba(0,0,0,.08));
  box-shadow:
    0 70px 220px rgba(0,0,0,.62),
    inset 0 2px 0 rgba(255,255,255,.06),
    inset 0 -70px 140px rgba(0,0,0,.55);
  opacity:.92;
}
.backdrop::after{
  content:"";
  position:absolute;inset:-18%;
  background:
    radial-gradient(circle at 18% 34%, rgba(255,43,43,.18), transparent 44%),
    radial-gradient(circle at 84% 30%, rgba(255,43,43,.14), transparent 46%),
    radial-gradient(circle at 52% 78%, rgba(201,162,74,.12), transparent 48%),
    conic-gradient(from 12deg at 30% 28%,
      rgba(201,162,74,.14), transparent 12%,
      rgba(255,43,43,.12), transparent 24%,
      rgba(90,40,120,.10), transparent 38%,
      transparent 100%),
    conic-gradient(from 180deg at 70% 36%,
      rgba(255,43,43,.12), transparent 14%,
      rgba(201,162,74,.12), transparent 28%,
      rgba(90,40,120,.10), transparent 44%,
      transparent 100%),
    radial-gradient(circle at 50% 50%, rgba(255,255,255,.04), transparent 62%);
  filter:blur(1px);
  opacity:.72;
}

/* ===== HEADER ===== */
.header{
  position:relative;
  z-index:2;
  border:1px solid var(--stroke);
  border-radius:26px;
  padding:20px 18px 16px;
  background:
    radial-gradient(circle at 18% 22%, var(--crimson), transparent 72%),
    radial-gradient(circle at 82% 30%, var(--opalV), transparent 74%),
    radial-gradient(circle at 70% 92%, var(--festival), transparent 62%),
    radial-gradient(circle at 26% 22%, rgba(201,162,74,.14), transparent 62%),
    linear-gradient(160deg, rgba(0,0,0,.30), rgba(0,0,0,.14));
  backdrop-filter:blur(10px);
  box-shadow:var(--shadowA);
  overflow:hidden;
}
.header::before{
  content:"";
  position:absolute;inset:0;border-radius:26px;pointer-events:none;
  box-shadow: inset 0 0 0 1px rgba(201,162,74,.16);
  background:
    repeating-linear-gradient(45deg, rgba(201,162,74,.08) 0 1px, transparent 1px 16px),
    repeating-linear-gradient(-45deg, rgba(201,162,74,.06) 0 1px, transparent 1px 16px);
  opacity:.26;
  mask:
    radial-gradient(circle at 50% 50%, transparent 0 78%, #000 82% 100%),
    linear-gradient(#000,#000);
  -webkit-mask:
    radial-gradient(circle at 50% 50%, transparent 0 78%, #000 82% 100%),
    linear-gradient(#000,#000);
}

.k{margin:0 0 8px;font-size:11px;letter-spacing:4px;text-transform:uppercase;opacity:.78;color:var(--mut)}
.h1{margin:0;font-weight:980;font-size:30px;letter-spacing:.7px;color:var(--ink);line-height:1.08}
.sub{
  margin-top:12px;
  font-size:15.5px;
  line-height:1.6;
  color:rgba(255,255,255,.88);
  max-width:980px;
}
.rule{
  margin-top:12px;
  padding:12px 12px;
  border-radius:18px;
  border:1px solid rgba(255,255,255,.10);
  background:
    radial-gradient(circle at 22% 18%, rgba(255,43,43,.10), transparent 58%),
    radial-gradient(circle at 82% 70%, rgba(201,162,74,.10), transparent 62%),
    linear-gradient(160deg, rgba(10,12,16,.62), rgba(6,8,10,.76));
  font-size:13.25px;
  color:rgba(255,255,255,.86);
  line-height:1.45;
}

/* State pills */
.stateRow{
  margin-top:12px;
  display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;align-items:center;
}
.statePill{
  display:inline-flex;align-items:center;gap:8px;
  padding:10px 12px;border-radius:999px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(0,0,0,.16);
  color:rgba(255,255,255,.78);
  font-weight:950;
  box-shadow:0 14px 36px rgba(0,0,0,.55);
}

/* ===== SIGNATURE ===== */
.band{
  position:relative;z-index:2;
  padding:10px 12px;border-radius:18px;
  border:1px solid var(--stroke2);
  background:rgba(0,0,0,.14);
  font-weight:980;letter-spacing:.25px;
  color:rgba(255,255,255,.90);
}

.sigPanel{
  position:relative;z-index:2;
  border:1px solid rgba(255,255,255,.10);
  border-radius:24px;
  padding:16px 16px 18px;
  background:
    radial-gradient(circle at 22% 18%, rgba(201,162,74,.10), transparent 58%),
    radial-gradient(circle at 78% 30%, rgba(255,43,43,.10), transparent 62%),
    linear-gradient(145deg, rgba(17,22,28,.84), rgba(11,15,20,.94));
  box-shadow:var(--shadowA);
  overflow:hidden;
}
.sigIntro{
  margin:0 0 14px;
  font-size:14.75px;
  line-height:1.65;
  color:rgba(255,255,255,.86);
  max-width:980px;
}

/* Diamond grid: 4×2 */
.dgrid{
  display:grid;
  grid-template-columns:repeat(4, minmax(0,1fr));
  gap:14px;
}
@media (max-width:920px){
  .dgrid{grid-template-columns:repeat(2, minmax(0,1fr))}
}

/* Glossy diamond tile */
.dtile{
  border:1px solid rgba(255,255,255,.12);
  border-radius:22px;
  padding:14px;
  background:
    radial-gradient(circle at 22% 18%, rgba(255,255,255,.20), transparent 50%),
    radial-gradient(circle at 78% 22%, rgba(255,43,43,.14), transparent 60%),
    radial-gradient(circle at 70% 86%, rgba(90,40,120,.12), transparent 66%),
    radial-gradient(circle at 26% 82%, rgba(120,0,22,.22), transparent 70%),
    linear-gradient(160deg, rgba(10,12,16,.88), rgba(6,8,10,.96));
  box-shadow:
    0 22px 70px rgba(0,0,0,.62),
    0 0 26px rgba(255,43,43,.08),
    inset 0 2px 0 rgba(255,255,255,.14),
    inset 0 -46px 86px rgba(0,0,0,.78);
  position:relative;
  overflow:hidden;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
.dtile::before{
  content:"";
  position:absolute;inset:0;border-radius:22px;pointer-events:none;
  box-shadow: inset 0 0 0 1px rgba(201,162,74,.14);
  background:
    repeating-linear-gradient(45deg, rgba(201,162,74,.08) 0 1px, transparent 1px 18px),
    repeating-linear-gradient(-45deg, rgba(201,162,74,.06) 0 1px, transparent 1px 18px);
  opacity:.28;
  mask:
    radial-gradient(circle at 50% 50%, transparent 0 74%, #000 80% 100%),
    linear-gradient(#000,#000);
  -webkit-mask:
    radial-gradient(circle at 50% 50%, transparent 0 74%, #000 80% 100%),
    linear-gradient(#000,#000);
}
.dtile::after{
  content:"";
  position:absolute;left:12%;right:12%;top:10%;
  height:30%;
  border-radius:999px;
  background:linear-gradient(to bottom, rgba(255,255,255,.18), rgba(255,255,255,0));
  transform:rotate(-12deg);
  pointer-events:none;
  opacity:.90;
}

.dtop{display:flex;align-items:flex-start;gap:10px}
.dmark{
  width:10px;height:10px;border-radius:3px;transform:rotate(45deg);
  background:var(--c,#c9a24a);
  box-shadow:0 0 0 1px rgba(255,255,255,.14), 0 0 14px rgba(0,0,0,.35);
  flex:0 0 auto;margin-top:4px;
}
.dtitle{
  font-weight:980;
  letter-spacing:.2px;
  font-size:15.5px;
  color:var(--ink);
  line-height:1.15;
}
.dpara{
  margin-top:10px;
  font-size:13.75px;
  line-height:1.55;
  color:rgba(255,255,255,.84);
}
.dfoot{
  margin-top:12px;
  display:flex;justify-content:flex-end;
}
.dfoot .btn{min-height:40px;padding:10px 12px;border-radius:999px;font-size:13px}

/* ===== STREAMS ACCORDION ===== */
.list{position:relative;z-index:2;display:flex;flex-direction:column;gap:12px}
.row{
  border:1px solid rgba(255,255,255,.10);
  border-radius:22px;
  background:
    radial-gradient(circle at 22% 18%, rgba(255,43,43,.10), transparent 58%),
    radial-gradient(circle at 82% 30%, rgba(90,40,120,.10), transparent 66%),
    linear-gradient(145deg, rgba(17,22,28,.86), rgba(11,15,20,.94));
  box-shadow:var(--shadowA);
  overflow:hidden;
  position:relative;
}
.row::before{
  content:"";
  position:absolute;inset:0;border-radius:22px;pointer-events:none;
  box-shadow: inset 0 0 0 1px rgba(201,162,74,.10);
  opacity:.55;
}
.head{
  display:flex;align-items:flex-start;justify-content:space-between;
  gap:10px;padding:16px 16px;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
.hL{display:flex;gap:12px;align-items:flex-start;min-width:0}
.hDia{
  width:10px;height:10px;border-radius:3px;transform:rotate(45deg);
  background:var(--c);
  box-shadow:0 0 0 1px rgba(255,255,255,.14), 0 0 14px rgba(0,0,0,.35);
  flex:0 0 auto;margin-top:4px;
}
.hTitleBlock{min-width:0}
.hTitle{
  font-weight:980;letter-spacing:.2px;font-size:18px;color:var(--ink);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.hSub{
  margin-top:8px;font-size:13.75px;opacity:.88;line-height:1.42;
  color:rgba(255,255,255,.86);max-width:92ch;
}
.chev{
  width:36px;height:36px;border-radius:14px;
  border:1px solid rgba(255,255,255,.14);
  background: rgba(0,0,0,.16);
  display:flex;align-items:center;justify-content:center;
  color:rgba(255,255,255,.78);
  font-weight:950;
  position:relative;overflow:hidden;
  flex:0 0 auto;margin-top:2px;
}
.chev::after{
  content:"";
  position:absolute;left:6px;right:6px;bottom:-10px;height:22px;
  background: radial-gradient(circle at 50% 0%, rgba(201,162,74,.30), transparent 70%);
  opacity:.62;pointer-events:none;
}

.body{
  display:none;
  padding:16px 16px 18px;
  border-top:1px solid rgba(255,255,255,.08);
  background:
    radial-gradient(circle at 30% 30%, rgba(255,255,255,.06), transparent 55%),
    linear-gradient(145deg, rgba(10,12,16,.86), rgba(6,8,10,.94));
}
.row.open .body{display:block}
.row.open{border-color:rgba(255,43,43,.22); box-shadow:var(--shadowA), 0 0 18px rgba(255,43,43,.10);}

.streamPara{
  margin:0 0 14px;
  color:rgba(255,255,255,.88);
  font-size:14.75px;
  line-height:1.65;
  max-width:980px;
}

/* stream grid: fixed 2×2 diamonds for symmetry */
.sgrid{
  display:grid;
  grid-template-columns:repeat(2, minmax(0,1fr));
  gap:14px;
}
@media (max-width:720px){
  .sgrid{grid-template-columns:repeat(1, minmax(0,1fr))}
}

/* ===== DOCK ===== */
.dock{
  position:fixed;left:50%;
  bottom:max(10px, env(safe-area-inset-bottom));
  transform:translateX(-50%);
  z-index:220;
  width:min(980px,94vw);
  padding:10px 12px;border-radius:22px;
  border:1px solid rgba(255,255,255,.12);
  background:
    radial-gradient(circle at 18% 18%, rgba(255,43,43,.10), transparent 62%),
    radial-gradient(circle at 82% 70%, rgba(90,40,120,.10), transparent 64%),
    linear-gradient(145deg, rgba(10,12,16,.72), rgba(6,8,10,.86));
  backdrop-filter:blur(10px);
  box-shadow:0 18px 60px rgba(0,0,0,.55);
  display:grid;grid-template-columns:repeat(4, minmax(0,1fr));
  gap:10px;
}
.dock .btn{width:100%;padding:10px 10px;border-radius:999px;white-space:nowrap}
@media (max-width:520px){
  :root{--dockH:148px}
  .dock{grid-template-columns:repeat(3, minmax(0,1fr))}
}
</style>
</head>

<body>

<div class="top" aria-label="Top controls">
  <div class="left">
    <a class="btn" id="btnDoor" data-route="/door/" href="/door/">DOOR</a>
    <a class="btn" id="btnHome" data-route="/home/" href="/home/">HOME</a>
    <a class="btn red" id="btnCompass" data-route="/index.html" href="/index.html">COMPASS</a>
  </div>
  <div class="right" aria-label="Controls">
    <div class="seg" role="group" aria-label="Language">
      <button type="button" id="langEN" aria-pressed="true">EN</button>
      <button type="button" id="langZH" aria-pressed="false">中文</button>
      <button type="button" id="langES" aria-pressed="false">ES</button>
    </div>
    <div class="seg" role="group" aria-label="Lane">
      <button type="button" id="lanePlatform" aria-pressed="true">PLATFORM</button>
      <button type="button" id="laneEngineering" aria-pressed="false">ENGINEERING</button>
    </div>
  </div>
</div>

<div class="page">
  <div class="backdrop" aria-hidden="true"></div>

  <section class="header" aria-label="Products header">
    <p class="k" id="hk">PRODUCTS</p>
    <h1 class="h1" id="ht">SIGNATURE SYSTEMS · DEPLOYMENT STREAMS</h1>
    <p class="sub" id="hs"></p>
    <div class="rule" id="rule"></div>

    <div class="stateRow" aria-label="State">
      <div class="statePill" id="laneState">—</div>
      <div class="statePill" id="langState">—</div>
    </div>
  </section>

  <div class="band" id="bandSig">SIGNATURE SYSTEMS (OPEN ONE → ENTER)</div>
  <section class="sigPanel" aria-label="Signature systems">
    <p class="sigIntro" id="sigIntro"></p>
    <div class="dgrid" id="sigGrid"></div>
  </section>

  <div class="band" id="bandStreams">STREAMS (OPEN ONE)</div>
  <div class="list" id="list"></div>
</div>

<nav class="dock" aria-label="Bottom navigation">
  <a class="btn" id="dockExplore" data-route="/explore/" href="/explore/">EXPLORE</a>
  <a class="btn red" id="dockProducts" data-route="/products/" href="/products/">PRODUCTS</a>
  <a class="btn" id="dockLaws" data-route="/laws/" href="/laws/">LAWS</a>
  <a class="btn" id="dockGauges" data-route="/gauges/" href="/gauges/">GAUGES</a>
</nav>

<script>
(function(){
  "use strict";

  // ===== STATE (gd_* only; pinned informal layer) =====
  var qs=new URLSearchParams(location.search);
  var LS=window.localStorage;

  var lang = qs.get("lang") || LS.getItem("gd_lang") || "en";
  var time = qs.get("time") || LS.getItem("gd_time") || "now";
  var lane = qs.get("lane") || "platform"; // URL-only

  // pinned layer
  var style="informal";
  var depth="explore";

  if(lang!=="en" && lang!=="zh" && lang!=="es") lang="en";
  if(time==="trajectory") time="post";
  if(time!=="origin" && time!=="now" && time!=="post") time="now";
  if(lane!=="platform" && lane!=="engineering") lane="platform";

  try{
    LS.setItem("gd_lang",lang);
    LS.setItem("gd_style","informal");
    LS.setItem("gd_time",time);
    LS.setItem("gd_depth","explore");
  }catch(e){}

  document.documentElement.lang=(lang==="zh")?"zh":(lang==="es")?"es":"en";

  function q(over){
    var p=new URLSearchParams();
    p.set("lang",(over&&over.lang)?over.lang:lang);
    p.set("style","informal");
    p.set("time",(over&&over.time)?over.time:time);
    p.set("depth","explore");
    var L=(over&&over.lane)?over.lane:lane;
    if(L==="platform"||L==="engineering") p.set("lane",L);
    return "?"+p.toString();
  }

  function go(path){
    window.location.href = path + q();
  }

  function setPressed(ids, activeId){
    for(var i=0;i<ids.length;i++){
      var el=document.getElementById(ids[i]);
      if(!el) continue;
      el.setAttribute("aria-pressed", ids[i]===activeId ? "true" : "false");
    }
  }

  function pick3(en,zh,es){ return (lang==="zh")?zh:(lang==="es")?es:en; }

  function laneLabel(){
    return (lang==="zh") ? (lane==="engineering"?"工程":"平台")
      : (lang==="es") ? (lane==="engineering"?"INGENIERÍA":"PLATAFORMA")
      : (lane==="engineering"?"ENGINEERING":"PLATFORM");
  }

  function openLabel(){ return (lang==="zh")?"打开":(lang==="es")?"ABRIR":"OPEN"; }

  // ===== ROUTES (single source of truth) =====
  // IMPORTANT: If any is 404, create that page at the path.
  var ROUTES = {
    // SIGNATURE SYSTEMS
    sig_shimmer: "/explore/frontier/shimmer/",
    sig_lattice256: "/explore/frontier/lattice/",
    sig_dotdot: "/gauges/dot-grid/",
    sig_onyourside: "/products/on-your-side-ai/",
    sig_fusion_traversal: "/products/fusion-traversal-engine/",
    sig_ccd: "/products/capital-doctrine/",
    sig_clean_english: "/products/education/",

  function mkTile(item){

    tile.style.setProperty("--c", item.c);
    tile.setAttribute("role","button");
    tile.tabIndex=0;

    var top=document.createElement("div");
    top.className="dtop";

    var m=document.createElement("div");
    m.className="dmark";
    m.style.background=item.c;

    var t=document.createElement("div");
    t.className="dtitle";

    top.appendChild(m);
    top.appendChild(t);

    var para=document.createElement("div");
    para.className="dpara";

    var foot=document.createElement("div");
    foot.className="dfoot";

    var btn=document.createElement("a");
    btn.className="btn red";
    btn.setAttribute("data-route", ROUTES[item.id] || "/products/");
    foot.appendChild(btn);

    tile.appendChild(top);
    tile.appendChild(para);
    tile.appendChild(foot);

    function act(){ go(ROUTES[item.id] || "/products/"); }
    tile.addEventListener("click", act, {passive:true});
    tile.addEventListener("keydown", function(e){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); act(); }});

    return {wrap:tile,title:t,para:para,btn:btn,item:item};
  }

  var sigRefs=[];
  function renderSignature(){
    sigGrid.innerHTML="";
    sigRefs=[];
    for(var i=0;i<SIGNATURE.length;i++){
      var r=mkTile(SIGNATURE[i]);
      sigGrid.appendChild(r.wrap);
      sigRefs.push(r);
    }
  }

  // ===== STREAMS ACCORDION =====
  var list=document.getElementById("list");
  var streamRefs=[];
  var openStream=0;

  function closeAllStreams(){
    for(var i=0;i<streamRefs.length;i++){
      streamRefs[i].row.classList.remove("open");
      streamRefs[i].chev.textContent="▸";
    }
  }

  function toggleStream(i){
    var isOpen=streamRefs[i].row.classList.contains("open");
    if(isOpen){
      streamRefs[i].row.classList.remove("open");
      streamRefs[i].chev.textContent="▸";
      return;
    }
    closeAllStreams();
    openStream=i;
    streamRefs[i].row.classList.add("open");
    streamRefs[i].chev.textContent="▾";
  }

  function buildStreamRow(s, idx){
    var row=document.createElement("div");
    row.className="row";
    row.style.setProperty("--c", s.c);

    var head=document.createElement("div");
    head.className="head";
    head.setAttribute("role","button");
    head.tabIndex=0;

    var hL=document.createElement("div");
    hL.className="hL";

    var dia=document.createElement("div");
    dia.className="hDia";
    dia.style.background=s.c;

    var tb=document.createElement("div");
    tb.className="hTitleBlock";

    var hTitle=document.createElement("div");
    hTitle.className="hTitle";

    var hSub=document.createElement("div");
    hSub.className="hSub";

    tb.appendChild(hTitle);
    tb.appendChild(hSub);

    hL.appendChild(dia);
    hL.appendChild(tb);

    var chev=document.createElement("div");
    chev.className="chev";
    chev.innerHTML='<span class="chevTxt">▸</span>';

    head.appendChild(hL);
    head.appendChild(chev);

    var body=document.createElement("div");
    body.className="body";

    var para=document.createElement("p");
    para.className="streamPara";
    body.appendChild(para);

    var grid=document.createElement("div");
    grid.className="sgrid";

    var tiles=[];
    for(var i=0;i<s.products.length;i++){
      var t=mkTile(s.products[i]);
      // slightly stronger color signal for stream items
      t.wrap.style.boxShadow =
        "0 22px 70px rgba(0,0,0,.62), 0 0 18px rgba(255,43,43,.08), inset 0 2px 0 rgba(255,255,255,.14), inset 0 -46px 86px rgba(0,0,0,.78)";
      grid.appendChild(t.wrap);
      tiles.push(t);
    }
    body.appendChild(grid);

    function act(){ toggleStream(idx); }
    head.addEventListener("click", act, {passive:true});
    head.addEventListener("keydown", function(e){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); act(); }});

    row.appendChild(head);
    row.appendChild(body);
    list.appendChild(row);

    streamRefs.push({
      row:row,
      chev:row.querySelector(".chevTxt"),
      title:hTitle,
      sub:hSub,
      para:para,
      tiles:tiles,
      stream:s
    });
  }

  function renderStreams(){
    list.innerHTML="";
    streamRefs=[];
    for(var i=0;i<STREAMS.length;i++){
      buildStreamRow(STREAMS[i], i);
    }
    openStream=0;
    toggleStream(0);
  }

  // ===== APPLY COPY (no rebuild; preserves open stream) =====
  function lanePack(obj){
    var key = (lane==="engineering") ? "engineering" : "platform";
    var L = obj[lang] || obj.en;
    return L[key];
  }

  function applyHeader(){
    var H = HEAD[lang] || HEAD.en;
    var pack = (lane==="engineering") ? H.engineering : H.platform;

    document.getElementById("hk").textContent = pick3("PRODUCTS","产品","PRODUCTOS");
    document.getElementById("ht").textContent = pick3("SIGNATURE SYSTEMS · DEPLOYMENT STREAMS","签名系统 · 部署产品流","SISTEMAS FIRMA · STREAMS DE DESPLIEGUE");
    document.getElementById("hs").textContent = pack.hs;
    document.getElementById("rule").textContent = pack.rule;

    document.getElementById("bandSig").textContent = pick3("SIGNATURE SYSTEMS (ENTER)","签名系统（进入）","SISTEMAS FIRMA (ENTRAR)");
    document.getElementById("bandStreams").textContent = pick3("STREAMS (OPEN ONE)","产品流（打开一个）","STREAMS (ABRE UNO)");

    document.getElementById("sigIntro").textContent =
      (lane==="engineering")
        ? pick3(
            "These are shared primitives. They interlock. They do not compete. Every deployment stream below is built on these engines.",
            "这些是共享原语：互锁不互斥。下面每条产品流都建立在这些引擎之上。",
            "Estas son primitivas compartidas: se interconectan, no compiten. Cada stream se construye sobre estos motores."
          )
        : pick3(
            "These are the headline systems. They remove confusion, prevent drift, and give the public a readable path from problem → execution.",
            "这些是头部系统：削减混乱、阻止漂移，并给公众一个可读的“问题→执行”路径。",
            "Estos son los sistemas líderes: reducen confusión, evitan deriva y dan un camino legible de problema → ejecución."
          );

    document.getElementById("laneState").textContent =
      (lang==="zh") ? ("当前透镜："+laneLabel()) :
      (lang==="es") ? ("Lente actual: "+laneLabel()) :
      ("Current lens: "+laneLabel());

    document.getElementById("langState").textContent =
      (lang==="zh") ? "语言：中文" : (lang==="es") ? "Idioma: ES" : "Lang: EN";

    document.getElementById("btnDoor").textContent = pick3("DOOR","门","PUERTA");
    document.getElementById("btnHome").textContent = pick3("HOME","主页","INICIO");
    document.getElementById("btnCompass").textContent = pick3("COMPASS","指南针","BRÚJULA");

    document.getElementById("dockExplore").textContent = pick3("EXPLORE","探索","EXPLORAR");
    document.getElementById("dockProducts").textContent = pick3("PRODUCTS","产品","PRODUCTOS");
    document.getElementById("dockLaws").textContent = pick3("LAWS","法则","LEYES");
    document.getElementById("dockGauges").textContent = pick3("GAUGGES","量规","MEDIDORES").replace("GAUGGES","GAUGES");

    document.getElementById("lanePlatform").textContent = pick3("PLATFORM","平台","PLATAFORMA");
    document.getElementById("laneEngineering").textContent = pick3("ENGINEERING","工程","INGENIERÍA");
  }

  function updateTiles(){
    // signature
    for(var i=0;i<sigRefs.length;i++){
      var r=sigRefs[i];
      var item=r.item;
      var name = (lane==="engineering") ? item.n.engineering : item.n.platform;
      var para = (lane==="engineering") ? item.p.engineering : item.p.platform;

      r.title.textContent = pick3(name.en, name.zh, name.es);
      r.para.textContent  = pick3(para.en, para.zh, para.es);
      r.btn.textContent   = openLabel()+": "+pick3("ENTER","进入","ENTRAR");
    }

    // streams + stream tiles
    for(var s=0;s<streamRefs.length;s++){
      var SR=streamRefs[s];
      var S=SR.stream;

      SR.title.textContent = pick3(S.name.en, S.name.zh, S.name.es);
      SR.sub.textContent   = pick3("", "", "");
      SR.sub.textContent   = pick3(
        (S.name.en==="FINANCE")?"Admissibility before scale.":"Four deployable surfaces.",
        (S.name.zh==="金融")?"先可采信再扩张。":"四个可部署面。",
        (S.name.es==="FINANZAS")?"Admisibilidad antes de escalar.":"Cuatro superficies desplegables."
      );

      var SP = (lane==="engineering") ? (S.para[lang]||S.para.en).engineering : (S.para[lang]||S.para.en).platform;
      SR.para.textContent = SP;

      for(var j=0;j<SR.tiles.length;j++){
        var T=SR.tiles[j];
        var P=T.item;
        var nm=(lane==="engineering")?P.n.engineering:P.n.platform;
        var pr=(lane==="engineering")?P.p.engineering:P.p.platform;

        T.title.textContent = pick3(nm.en, nm.zh, nm.es);
        T.para.textContent  = pick3(pr.en, pr.zh, pr.es);
        T.btn.textContent   = openLabel()+": "+pick3("ENTER","进入","ENTRAR");
      }
    }

    // keep open stream
    closeAllStreams();
    toggleStream(openStream);
  }

  // ===== STATE-CARRY WIRING =====
  function wireAll(){
    var nodes=document.querySelectorAll("[data-route]");
    for(var i=0;i<nodes.length;i++){
      var el=nodes[i];
      var route=el.getAttribute("data-route")||"";
      if(!route) continue;

      if(route.indexOf("?")!==-1){
        try{
          var u=new URL(route, location.origin);
          var sp=u.searchParams;
          sp.set("lang", lang);
          sp.set("style","informal");
          sp.set("time", time);
          sp.set("depth","explore");
          sp.set("lane", lane);
          el.setAttribute("href", u.pathname + "?" + sp.toString() + (u.hash||""));
        }catch(e){
          el.setAttribute("href", route);
        }
      }else{
        el.setAttribute("href", route + q());
      }
    }
  }

  // ===== NO-RELOAD TOGGLES =====
  function setLang(next){
    if(next!=="en"&&next!=="zh"&&next!=="es") next="en";
    lang=next;
    try{ LS.setItem("gd_lang",lang);}catch(e){}
    history.replaceState({}, "", location.pathname + q({lang:lang}));
    setPressed(["langEN","langZH","langES"], lang==="zh"?"langZH":(lang==="es"?"langES":"langEN"));
    applyHeader();
    updateTiles();
    wireAll();
  }

  function setLane(next){
    if(next!=="platform"&&next!=="engineering") next="platform";
    lane=next;
    history.replaceState({}, "", location.pathname + q({lane:lane}));
    setPressed(["lanePlatform","laneEngineering"], lane==="engineering"?"laneEngineering":"lanePlatform");
    applyHeader();
    updateTiles();
    wireAll();
  }

  // ===== BINDINGS =====
  document.getElementById("langEN").addEventListener("click", function(){ setLang("en"); }, {passive:true});
  document.getElementById("langZH").addEventListener("click", function(){ setLang("zh"); }, {passive:true});
  document.getElementById("langES").addEventListener("click", function(){ setLang("es"); }, {passive:true});

  document.getElementById("lanePlatform").addEventListener("click", function(){ setLane("platform"); }, {passive:true});
  document.getElementById("laneEngineering").addEventListener("click", function(){ setLane("engineering"); }, {passive:true});

  // ===== INIT =====
  setPressed(["langEN","langZH","langES"], lang==="zh"?"langZH":(lang==="es"?"langES":"langEN"));
  setPressed(["lanePlatform","laneEngineering"], lane==="engineering"?"laneEngineering":"lanePlatform");

  renderSignature();
  renderStreams();
  applyHeader();
  updateTiles();
  wireAll();

})();
</script>

</body>
