<!doctype html>
<!-- TNT — /products/agriculture/index.html
     PRODUCTS · AGRICULTURE (INDEX) — TRILINGUAL · PLATFORM/ENGINEERING (URL-ONLY) · BUBBLE-FIRST
     PURPOSE:
       - Fix the last dead link (AGRICULTURE) as a real, legible hub page
       - Provide a clean, non-looping entry into Agriculture as a product domain
       - Keep traversal discipline: no “random jump links” inside every paragraph
         (jumps live in the final “ROUTE OUT” bubble + bottom dock)
     STATE (CANON ONLY, NO NEW gd_* KEYS):
       - gd_lang, gd_style, gd_time, gd_depth (LS + URL)
       - lane=platform|engineering is URL-only (NEVER stored)
     UX:
       - Bubble-first, high contrast, 3D gloss + gold trim
       - Single-open accordion (tap same closes)
       - LANG + LANE toggles do NOT reload and do NOT close open bubble
       - Buttons glow (no motion)
     ASSETS:
       - /assets/ui.css + /assets/branch.css + /assets/instruments.js
       - ui.css owns html/body background (NO overrides)
-->

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Agriculture · Products</title>

<link rel="stylesheet" href="/assets/ui.css"/>
<link rel="stylesheet" href="/assets/branch.css"/>
<script defer src="/assets/instruments.js"></script>

<style>
a{color:inherit;text-decoration:none}
body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:#fff}
body::before,body::after{pointer-events:none!important}

:root{
  --dockH:128px;

  --stroke:rgba(255,255,255,.12);
  --stroke2:rgba(255,255,255,.10);

  --ink:rgba(255,255,255,.95);
  --txt:rgba(255,255,255,.90);
  --mut:rgba(255,255,255,.78);

  --crimson:rgba(120,0,22,.30);
  --festival:rgba(255,43,43,.14);
  --opalV:rgba(90,40,120,.10);

  --gold:rgba(201,162,74,.55);
  --goldGlow:rgba(201,162,74,.18);

  --shadowA:0 28px 110px rgba(0,0,0,.70);
  --shadowB:0 18px 60px rgba(0,0,0,.55);
  --shadowC:0 18px 60px rgba(0,0,0,.55);
}

/* ===== Top ===== */
.top{
  position:fixed;top:16px;left:0;right:0;
  padding:0 16px;
  display:flex;justify-content:space-between;align-items:center;
  gap:12px;
  z-index:240;
  pointer-events:none;
}
.top .left,.top .right{
  display:flex;gap:10px;flex-wrap:wrap;align-items:center;white-space:nowrap;
  pointer-events:auto;
}

/* Button (perimeter glow; no bottom-only underlay) */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:10px 12px;min-height:44px;border-radius:16px;
  border:1px solid rgba(255,255,255,.14);
  background:
    radial-gradient(circle at 50% 40%, rgba(255,255,255,.08), transparent 52%),
    linear-gradient(145deg, rgba(10,12,16,.78), rgba(6,8,10,.90));
  color:var(--ink);
  font-weight:950;font-size:14px;letter-spacing:.2px;
  -webkit-tap-highlight-color:transparent;
  position:relative;overflow:hidden;
  touch-action:manipulation;
  box-shadow:var(--shadowC), 0 0 0 1px rgba(201,162,74,.10), 0 0 18px rgba(201,162,74,.10);
}
.btn:hover{
  border-color:rgba(201,162,74,.44);
  box-shadow:var(--shadowC), 0 0 0 2px rgba(201,162,74,.18), 0 0 28px rgba(201,162,74,.18);
}
.btn:active{filter:brightness(.98)}
.btn.red{
  border-color:rgba(255,43,43,.22);
  box-shadow:var(--shadowC), 0 0 0 1px rgba(255,43,43,.14), 0 0 18px rgba(255,43,43,.10);
}
.btn.red:hover{
  border-color:rgba(255,43,43,.30);
  box-shadow:var(--shadowC), 0 0 0 2px rgba(255,43,43,.16), 0 0 28px rgba(255,43,43,.14);
}

/* Seg */
.seg{
  display:inline-flex;gap:0;overflow:hidden;border-radius:16px;
  border:1px solid rgba(255,255,255,.12);
  background: rgba(0,0,0,.16);
  box-shadow: var(--shadowC);
}
.seg button{
  appearance:none;border:0;background:transparent;color:var(--mut);
  padding:10px 12px;min-height:44px;font-weight:950;font-size:13px;
  letter-spacing:.25px;cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
.seg button[aria-pressed="true"]{
  color:var(--ink);
  background:
    radial-gradient(circle at 50% 50%, rgba(201,162,74,.14), transparent 60%),
    linear-gradient(180deg, rgba(255,43,43,.10), rgba(0,0,0,.10));
  box-shadow: inset 0 0 0 1px rgba(201,162,74,.14), inset 0 -10px 22px rgba(201,162,74,.10);
}

/* ===== Page ===== */
.page{
  width:min(1120px,94vw);
  margin:0 auto;
  padding:104px 0 calc(var(--dockH) + 18px);
  display:flex;flex-direction:column;gap:12px;
  position:relative;
  z-index:10;
}

/* Backdrop slab behind content */
.backdrop{
  position:absolute;
  left:50%;
  top:68px;
  transform:translateX(-50%);
  width:min(1180px,96vw);
  height:calc(100% - 108px);
  border-radius:34px;
  pointer-events:none;
  z-index:0;
  overflow:hidden;
}
.backdrop::before{
  content:"";
  position:absolute;inset:0;
  border:1px solid rgba(255,255,255,.08);
  border-radius:34px;
  background:
    radial-gradient(circle at 18% 20%, rgba(201,162,74,.10), transparent 60%),
    radial-gradient(circle at 78% 22%, rgba(255,43,43,.12), transparent 62%),
    radial-gradient(circle at 60% 90%, rgba(90,40,120,.10), transparent 64%),
    linear-gradient(160deg, rgba(0,0,0,.18), rgba(0,0,0,.08));
  box-shadow:
    0 70px 220px rgba(0,0,0,.62),
    inset 0 2px 0 rgba(255,255,255,.06),
    inset 0 -70px 140px rgba(0,0,0,.55);
  opacity:.92;
}
.backdrop::after{
  content:"";
  position:absolute;inset:-18%;
  background:
    radial-gradient(circle at 18% 34%, rgba(255,43,43,.18), transparent 44%),
    radial-gradient(circle at 84% 30%, rgba(255,43,43,.14), transparent 46%),
    radial-gradient(circle at 52% 78%, rgba(201,162,74,.12), transparent 48%),
    repeating-conic-gradient(from 45deg at 50% 50%,
      rgba(201,162,74,.06) 0 1.2deg, transparent 1.2deg 7.5deg),
    radial-gradient(circle at 50% 50%, rgba(255,255,255,.04), transparent 62%);
  filter:blur(1px);
  opacity:.72;
}

/* Header */
.header{
  position:relative;
  z-index:2;
  border:1px solid var(--stroke);
  border-radius:26px;
  padding:20px 18px 16px;
  background:
    radial-gradient(circle at 18% 22%, var(--crimson), transparent 72%),
    radial-gradient(circle at 82% 30%, var(--opalV), transparent 74%),
    radial-gradient(circle at 70% 92%, var(--festival), transparent 62%),
    radial-gradient(circle at 26% 22%, rgba(201,162,74,.14), transparent 62%),
    linear-gradient(160deg, rgba(0,0,0,.30), rgba(0,0,0,.14));
  backdrop-filter:blur(10px);
  box-shadow:var(--shadowA);
  overflow:hidden;
}
.header::before{
  content:"";
  position:absolute;inset:0;border-radius:26px;pointer-events:none;
  box-shadow: inset 0 0 0 1px rgba(201,162,74,.16);
  background:
    repeating-linear-gradient(45deg, rgba(201,162,74,.08) 0 1px, transparent 1px 16px),
    repeating-linear-gradient(-45deg, rgba(201,162,74,.06) 0 1px, transparent 1px 16px);
  opacity:.24;
  mask:
    radial-gradient(circle at 50% 50%, transparent 0 78%, #000 82% 100%),
    linear-gradient(#000,#000);
  -webkit-mask:
    radial-gradient(circle at 50% 50%, transparent 0 78%, #000 82% 100%),
    linear-gradient(#000,#000);
}
.k{margin:0 0 8px;font-size:11px;letter-spacing:4px;text-transform:uppercase;opacity:.78;color:var(--mut)}
.h1{margin:0;font-weight:980;font-size:30px;letter-spacing:.7px;color:var(--ink);line-height:1.08}
.sub{margin-top:12px;font-size:15.5px;line-height:1.6;color:rgba(255,255,255,.88);max-width:980px}
.metaRow{margin-top:12px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between}
.pill{
  display:inline-flex;align-items:center;gap:8px;
  padding:10px 12px;border-radius:999px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(0,0,0,.16);
  color:rgba(255,255,255,.78);
  font-weight:950;
  box-shadow:0 14px 36px rgba(0,0,0,.55);
}
.pill .g{color:rgba(201,162,74,.75);font-weight:950}

/* Band */
.band{
  position:relative;z-index:2;
  padding:10px 12px;border-radius:18px;
  border:1px solid var(--stroke2);
  background:rgba(0,0,0,.14);
  font-weight:980;letter-spacing:.25px;
  color:rgba(255,255,255,.90);
}

/* Accordion */
.list{position:relative;z-index:2;display:flex;flex-direction:column;gap:12px}
.row{
  border:1px solid rgba(255,255,255,.10);
  border-radius:22px;
  background:
    radial-gradient(circle at 22% 18%, rgba(255,43,43,.10), transparent 58%),
    radial-gradient(circle at 82% 30%, rgba(90,40,120,.10), transparent 66%),
    linear-gradient(145deg, rgba(17,22,28,.86), rgba(11,15,20,.94));
  box-shadow:var(--shadowA);
  overflow:hidden;
  position:relative;
}
.row::before{
  content:"";
  position:absolute;inset:0;border-radius:22px;pointer-events:none;
  box-shadow: inset 0 0 0 1px rgba(201,162,74,.10);
  opacity:.55;
}
.head{
  display:flex;align-items:flex-start;justify-content:space-between;
  gap:10px;padding:16px 16px;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
.hL{display:flex;gap:12px;align-items:flex-start;min-width:0}
.mark{
  width:10px;height:10px;border-radius:3px;transform:rotate(45deg);
  background:var(--c);
  box-shadow:0 0 0 1px rgba(255,255,255,.14), 0 0 14px rgba(0,0,0,.35);
  flex:0 0 auto;margin-top:4px;
}
.q{
  font-weight:980;letter-spacing:.2px;font-size:18px;color:var(--ink);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.subt{
  margin-top:8px;font-size:13.75px;opacity:.88;line-height:1.42;
  color:rgba(255,255,255,.86);max-width:92ch;
}
.chev{
  width:36px;height:36px;border-radius:14px;
  border:1px solid rgba(255,255,255,.14);
  background: rgba(0,0,0,.16);
  display:flex;align-items:center;justify-content:center;
  color:rgba(255,255,255,.78);
  font-weight:950;
  position:relative;overflow:hidden;
  flex:0 0 auto;margin-top:2px;
}
.chev::after{
  content:"";
  position:absolute;left:6px;right:6px;bottom:-10px;height:22px;
  background: radial-gradient(circle at 50% 0%, rgba(201,162,74,.30), transparent 70%);
  opacity:.62;pointer-events:none;
}
.body{
  display:none;
  padding:16px 16px 18px;
  border-top:1px solid rgba(255,255,255,.08);
  background:
    radial-gradient(circle at 30% 30%, rgba(255,255,255,.06), transparent 55%),
    linear-gradient(145deg, rgba(10,12,16,.86), rgba(6,8,10,.94));
}
.row.open .body{display:block}
.p{margin:0;color:rgba(255,255,255,.90);line-height:1.7;font-size:14.5px}
.p + .p{margin-top:10px}

/* sub-bubbles inside each row */
.subBubbles{margin-top:12px;display:flex;flex-direction:column;gap:10px}
.bubble{
  border:1px solid rgba(255,255,255,.10);
  border-radius:18px;
  background:
    radial-gradient(circle at 22% 18%, rgba(255,43,43,.08), transparent 60%),
    radial-gradient(circle at 82% 70%, rgba(201,162,74,.08), transparent 62%),
    rgba(0,0,0,.12);
  padding:14px 14px 12px;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
  position:relative;
  overflow:hidden;
}
.bubble::after{
  content:"";
  position:absolute;left:10px;right:10px;bottom:-14px;height:30px;
  background: radial-gradient(circle at 50% 0%, rgba(201,162,74,.22), transparent 72%);
  opacity:.45;pointer-events:none;
}
.bubble h4{margin:0 0 8px;font-weight:980;letter-spacing:.15px;font-size:15px;color:var(--ink)}
.bubble p{margin:0;color:rgba(255,255,255,.84);line-height:1.7;display:none;font-size:14px}
.bubble.open p{display:block}

/* actions (only in final Route Out bubble) */
.actions{margin-top:14px;display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end}
.actions .btn{padding:10px 14px;border-radius:999px;min-height:40px;font-size:13px}

/* Dock */
.dock{
  position:fixed;left:50%;
  bottom:max(10px, env(safe-area-inset-bottom));
  transform:translateX(-50%);
  z-index:220;
  width:min(980px,94vw);
  padding:10px 12px;border-radius:22px;
  border:1px solid rgba(255,255,255,.12);
  background:
    radial-gradient(circle at 18% 18%, rgba(255,43,43,.10), transparent 62%),
    radial-gradient(circle at 82% 70%, rgba(90,40,120,.10), transparent 64%),
    linear-gradient(145deg, rgba(10,12,16,.72), rgba(6,8,10,.86));
  backdrop-filter:blur(10px);
  box-shadow:0 18px 60px rgba(0,0,0,.55);
  display:grid;grid-template-columns:repeat(4, minmax(0,1fr));
  gap:10px;
}
.dock .btn{width:100%;padding:10px 10px;border-radius:999px;white-space:nowrap}
@media (max-width:520px){
  :root{--dockH:156px}
  .dock{grid-template-columns:repeat(2, minmax(0,1fr))}
}
</style>
</head>

<body>

<div class="top" aria-label="Top controls">
  <div class="left">
    <a class="btn" id="btnCompass" data-route="/index.html" href="/index.html">COMPASS</a>
    <a class="btn" id="btnProducts" data-route="/products/" href="/products/">PRODUCTS</a>
    <a class="btn red" id="btnAg" data-route="/products/agriculture/" href="/products/agriculture/">AGRICULTURE</a>
  </div>
  <div class="right" aria-label="Controls">
    <div class="seg" role="group" aria-label="Language">
      <button type="button" id="langEN" aria-pressed="true">EN</button>
      <button type="button" id="langZH" aria-pressed="false">中文</button>
      <button type="button" id="langES" aria-pressed="false">ES</button>
    </div>
    <div class="seg" role="group" aria-label="Lane">
      <button type="button" id="lanePlatform" aria-pressed="true">PLATFORM</button>
      <button type="button" id="laneEngineering" aria-pressed="false">ENGINEERING</button>
    </div>
  </div>
</div>

<div class="page">
  <div class="backdrop" aria-hidden="true"></div>

  <section class="header" aria-label="Header">
    <p class="k" id="hk">PRODUCTS · AGRICULTURE</p>
    <h1 class="h1" id="ht">AGRICULTURE INDEX</h1>
    <p class="sub" id="hs"></p>

    <div class="metaRow" aria-label="Meta">
      <div class="pill" id="laneState">—</div>
      <div class="pill" id="tsPill"><span class="g" id="tsLabel">Timestamp</span>: <span id="tsVal">—</span></div>
    </div>
  </section>

  <div class="band" id="band">BUBBLES (OPEN ONE)</div>
  <div class="list" id="list"></div>
</div>

<nav class="dock" aria-label="Bottom navigation">
  <a class="btn" id="dockDoor" data-route="/door/" href="/door/">DOOR</a>
  <a class="btn" id="dockLaws" data-route="/laws/" href="/laws/">LAWS</a>
  <a class="btn" id="dockResearch" data-route="/research/" href="/research/">RESEARCH</a>
  <a class="btn" id="dockVision" data-route="/explore/frontier/vision/" href="/explore/frontier/vision/">VISION</a>
</nav>

<script>
(function(){
  "use strict";

  // ===== State (gd_* only; lane URL-only) =====
  var qs=new URLSearchParams(location.search);
  var LS=window.localStorage;

  var lang  = qs.get("lang")  || LS.getItem("gd_lang")  || "en";
  var style = qs.get("style") || LS.getItem("gd_style") || "informal";
  var time  = qs.get("time")  || LS.getItem("gd_time")  || "now";
  var depth = qs.get("depth") || LS.getItem("gd_depth") || "explore";
  var lane  = qs.get("lane")  || "platform"; // URL-only

  if(lang!=="en" && lang!=="zh" && lang!=="es") lang="en";
  if(style!=="informal" && style!=="formal") style="informal";
  if(time==="trajectory") time="post";
  if(time!=="origin" && time!=="now" && time!=="post") time="now";
  if(depth!=="explore" && depth!=="learn") depth="explore";
  if(lane!=="platform" && lane!=="engineering") lane="platform";

  try{
    LS.setItem("gd_lang",lang);
    LS.setItem("gd_style",style);
    LS.setItem("gd_time",time);
    LS.setItem("gd_depth",depth);
  }catch(e){}

  document.documentElement.lang=(lang==="zh")?"zh":(lang==="es")?"es":"en";

  function q(over){
    var p=new URLSearchParams();
    p.set("lang",(over&&over.lang)?over.lang:lang);
    p.set("style",(over&&over.style)?over.style:style);
    p.set("time",(over&&over.time)?over.time:time);
    p.set("depth",(over&&over.depth)?over.depth:depth);
    var L=(over&&over.lane)?over.lane:lane;
    if(L==="platform"||L==="engineering") p.set("lane",L);
    return "?"+p.toString();
  }

  function setPressed(ids, activeId){
    for(var i=0;i<ids.length;i++){
      var el=document.getElementById(ids[i]);
      if(!el) continue;
      el.setAttribute("aria-pressed", ids[i]===activeId ? "true" : "false");
    }
  }

  function pick3(en,zh,es){ return (lang==="zh")?zh:(lang==="es")?es:en; }
  function laneLabel(){
    return (lang==="zh") ? (lane==="engineering"?"工程":"平台")
      : (lang==="es") ? (lane==="engineering"?"INGENIERÍA":"PLATAFORMA")
      : (lane==="engineering"?"ENGINEERING":"PLATFORM");
  }

  // ===== Timestamp =====
  function pad2(n){ return (n<10?"0":"")+n; }
  function tsNow(){
    var d=new Date();
    return d.getFullYear()+"-"+pad2(d.getMonth()+1)+"-"+pad2(d.getDate())+" "+
           pad2(d.getHours())+":"+pad2(d.getMinutes())+":"+pad2(d.getSeconds());
  }
  document.getElementById("tsVal").textContent = tsNow();

  // ===== Wiring =====
  function wireAll(){
    var nodes=document.querySelectorAll("[data-route]");
    for(var i=0;i<nodes.length;i++){
      var el=nodes[i];
      var route=el.getAttribute("data-route")||"";
      if(!route) continue;
      el.setAttribute("href", route + q());
    }
  }

  // ===== Toggles (NO reload; keep open row) =====
  var openIndex=0;

  function setLang(next){
    if(next!=="en"&&next!=="zh"&&next!=="es") next="en";
    lang=next;
    try{ LS.setItem("gd_lang",lang);}catch(e){}
    history.replaceState({}, "", location.pathname + q({lang:lang}));
    setPressed(["langEN","langZH","langES"], lang==="zh"?"langZH":(lang==="es"?"langES":"langEN"));
    applyCopy();
    updateRows();
    wireAll();
  }

  function setLane(next){
    if(next!=="platform"&&next!=="engineering") next="platform";
    lane=next;
    history.replaceState({}, "", location.pathname + q({lane:lane}));
    setPressed(["lanePlatform","laneEngineering"], lane==="engineering"?"laneEngineering":"lanePlatform");
    applyCopy();
    updateRows();
    wireAll();
  }

  document.getElementById("langEN").addEventListener("click", function(){ setLang("en"); }, {passive:true});
  document.getElementById("langZH").addEventListener("click", function(){ setLang("zh"); }, {passive:true});
  document.getElementById("langES").addEventListener("click", function(){ setLang("es"); }, {passive:true});
  document.getElementById("lanePlatform").addEventListener("click", function(){ setLane("platform"); }, {passive:true});
  document.getElementById("laneEngineering").addEventListener("click", function(){ setLane("engineering"); }, {passive:true});

  setPressed(["langEN","langZH","langES"], lang==="zh"?"langZH":(lang==="es"?"langES":"langEN"));
  setPressed(["lanePlatform","laneEngineering"], lane==="engineering"?"laneEngineering":"lanePlatform");

  // ===== Copy =====
  function P(en,zh,es){ return {en:en, zh:zh, es:es}; }
  function pick(o){ return (lang==="zh")?o.zh:(lang==="es")?(o.es||o.en):o.en; }

  var COPY={
    en:{
      hk:"PRODUCTS · AGRICULTURE",
      ht:"AGRICULTURE INDEX",
      hs_platform:"Agriculture is a scale system: water, soil, energy, logistics, and governance collide. This page is the clean entry point. Open one bubble, finish the thought, then route out.",
      hs_engineering:"Engineering view: agriculture is a constraint network (water/soil/energy/inputs/logistics/regulation). This index is a bounded map: scope → interfaces → failure modes → verification posture.",
      band:"BUBBLES (OPEN ONE)"
    },
    zh:{
      hk:"产品 · 农业",
      ht:"农业索引",
      hs_platform:"农业是规模系统：水、土壤、能源、物流与治理叠加。本页是干净入口：打开一个气泡，读完，再路由出去。",
      hs_engineering:"工程视图：农业是约束网络（水/土壤/能源/投入/物流/监管）。本索引是有界地图：范围→接口→失效模式→核查姿态。",
      band:"气泡（打开一个）"
    },
    es:{
      hk:"PRODUCTOS · AGRICULTURA",
      ht:"ÍNDICE DE AGRICULTURA",
      hs_platform:"Agricultura es un sistema de escala: agua, suelo, energía, logística y gobernanza chocan. Esta página es la entrada limpia: abre un bubble, termínalo, y luego enruta.",
      hs_engineering:"Vista ingeniería: agricultura = red de restricciones (agua/suelo/energía/insumos/logística/regulación). Índice acotado: alcance → interfaces → fallos → postura de verificación.",
      band:"BURBUJAS (ABRE UNA)"
    }
  };

  // Route-safe placeholders (no dead ends)
  var ROUTE_404="/404.html";
  var ROUTES={
    field_study: "/research/",                 // already live
    laws: "/laws/",
    governance: "/governance/",
    frontier: "/explore/frontier/",
    products: "/products/",
    compass: "/index.html",
    vision: "/explore/frontier/vision/",
    // agriculture sub-pages (shells can be added later)
    water: ROUTE_404,
    soil: ROUTE_404,
    inputs: ROUTE_404,
    logistics: ROUTE_404,
    verification: ROUTE_404
  };

  // ===== Rows (top-level) =====
  // “Route Out” is the only row that contains jump buttons (traversal discipline).
  var ROWS=[
    {
      c:"#c9a24a",
      q:P("What Agriculture means here","农业在这里是什么意思","Qué significa Agricultura aquí"),
      s:P("A scale domain bound by constraints, not a vibe.","规模领域：被约束绑定，而不是口号。","Dominio de escala acotado, no una vibra."),
      bubbles:[
        {h:P("Platform view","平台视图","Vista plataforma"),
         p:P(
          "Platform: agriculture is food security under pressure. When the system is stable, people forget it exists. When it drifts, everything upstream breaks.",
          "平台：农业是在压力下的粮食安全。稳定时人们忽略它；漂移时上游全断。",
          "Plataforma: agricultura = seguridad alimentaria bajo presión. Si deriva, todo aguas arriba falla."
         )},
        {h:P("Engineering view","工程视图","Vista ingeniería"),
         p:P(
          "Engineering: agriculture is a constraint network. The core variables are measurable. Claims must remain bounded to scope and receipts.",
          "工程：农业是约束网络。核心变量可测。主张必须受范围与收据约束。",
          "Ingeniería: agricultura es red de restricciones. Variables medibles. Afirmaciones acotadas a alcance y recibos."
         )}
      ]
    },
    {
      c:"#93c5fd",
      q:P("Primary constraint set","主要约束集合","Conjunto de restricciones"),
      s:P("Water, soil, energy, inputs, logistics, and policy.","水、土壤、能源、投入、物流、政策。","Agua, suelo, energía, insumos, logística y política."),
      bubbles:[
        {h:P("Water","水","Agua"), p:P("Yield is gated by water access, timing, storage, and distribution discipline.","产量受水获取、时序、储存、分配纪律闸门控制。","Rendimiento depende de acceso, timing, almacenamiento y disciplina de distribución.")},
        {h:P("Soil","土壤","Suelo"), p:P("Soil is a living system: structure, nutrients, erosion control, and regeneration rate.","土壤是活系统：结构、养分、侵蚀控制、再生速率。","El suelo es un sistema vivo: estructura, nutrientes, erosión y regeneración.")},
        {h:P("Energy + Inputs","能源+投入","Energía + insumos"), p:P("Fertilizer, fuel, equipment, and labor are throughput constraints.","化肥、燃料、设备、劳动力是吞吐约束。","Fertilizante, combustible, equipo y mano de obra son restricciones de throughput.")},
        {h:P("Logistics","物流","Logística"), p:P("Harvest is worthless if storage/transport fails. Cold chain is a gate, not a feature.","收获若储运失败就归零。冷链是闸门，不是加分项。","Cosecha no vale si falla almacenamiento/transporte. Cadena fría es compuerta.")},
        {h:P("Policy + Governance","政策+治理","Política + gobernanza"), p:P("Rules decide what scales. Governance is the execution layer that makes finance/agriculture real.","规则决定什么能扩张。治理是让金融/农业规模化落地的执行层。","Reglas deciden qué escala. Gobernanza es capa de ejecución que vuelve real finanzas/agro.")},
      ]
    },
    {
      c:"#ff2b2b",
      q:P("Failure modes that matter","关键失效模式","Fallos que importan"),
      s:P("Containment-first: keep damage local.","隔离优先：把损害局部化。","Contención primero: mantener daño local."),
      bubbles:[
        {h:P("Single-point fragility","单点脆弱","Fragilidad de punto único"),
         p:P(
          "If one supplier, one route, or one reservoir breaks the whole chain, the system is unstable at scale.",
          "如果一个供应商、一条路线、或一个水库断了就全链崩溃，则规模不稳定。",
          "Si un proveedor/una ruta/un embalse rompe toda la cadena, el sistema es inestable a escala."
         )},
        {h:P("Measurement gaps","测量缺口","Brechas de medición"),
         p:P(
          "If you can’t measure a claim, it stays in Explore. Products require receipts.",
          "若无法测量主张，它只能留在探索；产品必须有收据。",
          "Si no puedes medir la afirmación, se queda en Explorar. Productos requieren recibos."
         )},
        {h:P("Drift under scale","规模漂移","Deriva al escalar"),
         p:P(
          "Training, installs, inspections, and enforcement must stay comparable. Otherwise results drift.",
          "培训、安装、检验、执法必须可比，否则结果漂移。",
          "Entrenamiento/instalación/inspección/enforcement deben ser comparables o deriva."
         )}
      ]
    },
    {
      c:"#34d399",
      q:P("Verification posture","核查姿态","Postura de verificación"),
      s:P("What “proof” looks like before we deploy.","部署前“证明”长什么样。","Cómo se ve la prueba antes de desplegar."),
      bubbles:[
        {h:P("Receipts-first","收据优先","Recibos primero"),
         p:P(
          "Inputs → actions → outcomes must be replayable. If not replayable, it’s not a deployable product claim.",
          "输入→行动→结果必须可回放；不可回放就不是可部署产品主张。",
          "Entradas→acciones→resultados deben ser replayables; si no, no es claim desplegable."
         )},
        {h:P("Windows and seasons","窗口与季节","Ventanas y estaciones"),
         p:P(
          "Agriculture lives in windows. If it doesn’t survive seasons, it doesn’t survive scale.",
          "农业在窗口里运行。扛不过季节，就扛不过规模。",
          "Agricultura vive por ventanas. Si no sobrevive estaciones, no sobrevive escala."
         )}
      ]
    },
    {
      c:"#c9a24a",
      q:P("Route out","路由出口","Ruta de salida"),
      s:P("Finish here, then jump. No loops.","在这里结束，再跳转。避免循环。","Termina aquí y salta. Sin bucles."),
      bubbles:[
        {h:P("Next surfaces","下一步面","Superficies siguientes"),
         p:P(
          "Pick one surface: Laws (bounds), Governance (execution), Research (context), Vision (frontier).",
          "选一个面：法则（边界）、治理（执行）、研究（背景）、愿景（前沿）。",
          "Elige una superficie: Leyes (límites), Gobernanza (ejecución), Investigación (contexto), Visión (frontera)."
         )}
      ],
      actions:true
    }
  ];

  // ===== DOM =====
  var list=document.getElementById("list");
  var refs=[];
  function closeAll(){
    for(var i=0;i<refs.length;i++){
      refs[i].row.classList.remove("open");
      refs[i].chev.textContent="▸";
    }
  }
  function toggle(i){
    var isOpen=refs[i].row.classList.contains("open");
    if(isOpen){
      refs[i].row.classList.remove("open");
      refs[i].chev.textContent="▸";
      return;
    }
    closeAll();
    openIndex=i;
    refs[i].row.classList.add("open");
    refs[i].chev.textContent="▾";
  }

  function makeBubble(h, p){
    var b=document.createElement("div");
    b.className="bubble";
    b.setAttribute("role","button");
    b.tabIndex=0;

    var hh=document.createElement("h4");
    hh.textContent=h;

    var pp=document.createElement("p");
    pp.textContent=p;

    b.appendChild(hh);
    b.appendChild(pp);

    function closeSibs(){
      var sib=b.parentElement ? b.parentElement.querySelectorAll(".bubble") : [];
      for(var i=0;i<sib.length;i++) if(sib[i]!==b) sib[i].classList.remove("open");
    }
    function act(){
      var willOpen=!b.classList.contains("open");
      closeSibs();
      b.classList.toggle("open", willOpen);
    }
    b.addEventListener("click", act, {passive:true});
    b.addEventListener("keydown", function(e){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); act(); }});

    return b;
  }

  function build(){
    list.innerHTML="";
    refs=[];

    for(var i=0;i<ROWS.length;i++){
      (function(idx){
        var row=document.createElement("div");
        row.className="row";
        row.style.setProperty("--c", ROWS[idx].c);

        var head=document.createElement("div");
        head.className="head";
        head.setAttribute("role","button");
        head.tabIndex=0;

        var hL=document.createElement("div");
        hL.className="hL";

        var mark=document.createElement("div");
        mark.className="mark";
        mark.style.background=ROWS[idx].c;

        var tb=document.createElement("div");
        tb.style.minWidth="0";

        var q=document.createElement("div");
        q.className="q";

        var s=document.createElement("div");
        s.className="subt";

        tb.appendChild(q); tb.appendChild(s);
        hL.appendChild(mark); hL.appendChild(tb);

        var chev=document.createElement("div");
        chev.className="chev";
        chev.innerHTML='<span class="chevTxt">▸</span>';

        head.appendChild(hL);
        head.appendChild(chev);

        var body=document.createElement("div");
        body.className="body";

        var sub=document.createElement("div");
        sub.className="subBubbles";
        var bubbles=ROWS[idx].bubbles || [];
        for(var j=0;j<bubbles.length;j++){
          sub.appendChild(makeBubble("", "")); // placeholders; filled in update()
        }
        body.appendChild(sub);

        // actions only in Route Out row
        var actions=document.createElement("div");
        actions.className="actions";
        actions.style.display = ROWS[idx].actions ? "flex" : "none";

        var a1=document.createElement("a"); a1.className="btn red";
        var a2=document.createElement("a"); a2.className="btn";
        var a3=document.createElement("a"); a3.className="btn";
        var a4=document.createElement("a"); a4.className="btn";
        actions.appendChild(a1); actions.appendChild(a2); actions.appendChild(a3); actions.appendChild(a4);
        body.appendChild(actions);

        function act(){ toggle(idx); }
        head.addEventListener("click", act, {passive:true});
        head.addEventListener("keydown", function(e){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); act(); }});

        row.appendChild(head);
        row.appendChild(body);
        list.appendChild(row);

        refs.push({
          row:row,
          chev:row.querySelector(".chevTxt"),
          q:q, s:s,
          sub:sub,
          a1:a1,a2:a2,a3:a3,a4:a4
        });
      })(i);
    }
    openIndex=0;
    toggle(0);
  }

  function applyCopy(){
    var C=COPY[lang]||COPY.en;

    document.getElementById("hk").textContent=C.hk;
    document.getElementById("ht").textContent=C.ht;
    document.getElementById("hs").textContent=(lane==="engineering") ? C.hs_engineering : C.hs_platform;
    document.getElementById("band").textContent=C.band;

    document.getElementById("laneState").textContent =
      (lang==="zh") ? ("当前透镜："+laneLabel()) :
      (lang==="es") ? ("Lente actual: "+laneLabel()) :
      ("Current lens: "+laneLabel());

    // top labels
    document.getElementById("btnCompass").textContent = pick3("COMPASS","指南针","BRÚJULA");
    document.getElementById("btnProducts").textContent = pick3("PRODUCTS","产品","PRODUCTOS");
    document.getElementById("btnAg").textContent = pick3("AGRICULTURE","农业","AGRICULTURA");

    // dock labels
    document.getElementById("dockDoor").textContent = pick3("DOOR","门","PUERTA");
    document.getElementById("dockLaws").textContent = pick3("LAWS","法则","LEYES");
    document.getElementById("dockResearch").textContent = pick3("RESEARCH","研究","INVEST.");
    document.getElementById("dockVision").textContent = pick3("VISION","愿景","VISIÓN");

    // lane buttons
    document.getElementById("lanePlatform").textContent  = pick3("PLATFORM","平台","PLATAFORMA");
    document.getElementById("laneEngineering").textContent= pick3("ENGINEERING","工程","INGENIERÍA");
  }

  function updateRows(){
    var keep=openIndex;

    for(var i=0;i<refs.length;i++){
      var R=refs[i];
      var row=ROWS[i];

      R.q.textContent = pick(row.q);
      R.s.textContent = pick(row.s);

      // rebuild bubbles content (single-open inside row)
      var sub=R.sub;
      sub.innerHTML="";
      for(var j=0;j<row.bubbles.length;j++){
        var b=row.bubbles[j];
        var bb=document.createElement("div");
        bb.className="bubble";
        bb.setAttribute("role","button");
        bb.tabIndex=0;

        var h=document.createElement("h4");
        h.textContent=pick(b.h);

        var p=document.createElement("p");
        p.textContent=pick(b.p);

        bb.appendChild(h);
        bb.appendChild(p);

        (function(el){
          function closeSibs(){
            var sib=el.parentElement ? el.parentElement.querySelectorAll(".bubble") : [];
            for(var k=0;k<sib.length;k++) if(sib[k]!==el) sib[k].classList.remove("open");
          }
          function act(){
            var willOpen=!el.classList.contains("open");
            closeSibs();
            el.classList.toggle("open", willOpen);
          }
          el.addEventListener("click", act, {passive:true});
          el.addEventListener("keydown", function(e){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); act(); }});
        })(bb);

        sub.appendChild(bb);
      }

      // actions only on Route Out
      if(row.actions){
        R.a1.textContent = pick3("OPEN: LAWS","打开：法则","ABRIR: LEYES");
        R.a2.textContent = pick3("OPEN: GOVERNANCE","打开：治理","ABRIR: GOBERNANZA");
        R.a3.textContent = pick3("OPEN: RESEARCH","打开：研究","ABRIR: INVEST.");
        R.a4.textContent = pick3("OPEN: VISION","打开：愿景","ABRIR: VISIÓN");

        R.a1.setAttribute("data-route", ROUTES.laws);
        R.a2.setAttribute("data-route", ROUTES.governance);
        R.a3.setAttribute("data-route", ROUTES.field_study);
        R.a4.setAttribute("data-route", ROUTES.vision);
      }
    }

    // restore open
    closeAll();
    toggle(keep);
  }

  // ===== Init =====
  build();
  applyCopy();
  updateRows();
  wireAll();

  // bind state-aware links
  wireAll();

})();
</script>
