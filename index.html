<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Nine Summits — Index</title>
<link rel="stylesheet" href="/assets/ui.css"/>

<script>
(function () {
  var params = new URLSearchParams(location.search);
  var isDoorBg = params.get("doorbg") === "1";
  document.documentElement.setAttribute("data-doorbg", isDoorBg ? "1" : "0");
})();
</script>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: #000;
  width: 100%;
  height: 100%;
  overflow: hidden;
}

#app-shell {
  position: fixed;
  inset: 0;
}

#world {
  position: absolute;
  inset: 0;
  width: 100vw;
  height: 100vh;
  display: block;
  background: #000;
  z-index: 0;
}

#runtime-root {
  position: relative;
  z-index: 10;
}

#boot-status {
  position: fixed;
  top: 0;
  left: 0;
  padding: 6px 10px;
  font-family: monospace;
  font-size: 12px;
  color: #0f0;
  background: #000;
  border-right: 1px solid rgba(255,255,255,0.12);
  border-bottom: 1px solid rgba(255,255,255,0.12);
  z-index: 9999;
}

.boot-ok { color: #7fffd4; }
.boot-warn { color: #ffd27a; }
.boot-fail { color: #ff7a7a; }

html[data-doorbg="1"] #runtime-root,
html[data-doorbg="1"] #boot-status {
  display: none !important;
}
</style>
</head>

<body>
<div id="app-shell">
  <canvas id="world"></canvas>
  <div id="runtime-root"></div>
</div>

<div id="boot-status" class="boot-warn">BOOTING...</div>

<script type="module">
const statusNode = document.getElementById("boot-status");
const canvas = document.getElementById("world");
const runtimeRoot = document.getElementById("runtime-root");

const MODULES = Object.freeze([
  { key: "runtime", path: "/world/runtime/world_runtime.js", validate: m =>
      typeof m?.startRuntime === "function" ||
      typeof m?.default?.startRuntime === "function"
  },
  { key: "world_kernel", path: "/world/world_kernel.js" },
  { key: "planet_engine", path: "/world/planet_engine.js" },
  { key: "render", path: "/world/render/index.js" },
  { key: "control", path: "/world/control.js" },
  { key: "instruments", path: "/assets/instruments.js" }
]);

function setStatus(msg, tone="boot-warn"){
  if (statusNode){
    statusNode.textContent = msg;
    statusNode.className = tone;
  }
  console.log("[BOOT]", msg);
}

function ensureCanvas(canvas){
  const dpr = Math.max(1, window.devicePixelRatio || 1);
  const w = Math.floor(window.innerWidth * dpr);
  const h = Math.floor(window.innerHeight * dpr);

  canvas.width = w;
  canvas.height = h;
  canvas.style.width = "100vw";
  canvas.style.height = "100vh";
}

async function importModule(def){
  try {
    const mod = await import(def.path);
    if (def.validate && !def.validate(mod)) {
      throw new Error(def.key + " contract invalid");
    }
    return mod;
  } catch (e) {
    throw new Error(def.key + " failed: " + (e?.message || e));
  }
}

async function boot(){
  try {
    setStatus("BOOTING...", "boot-warn");

    if (!canvas) throw new Error("missing canvas");

    ensureCanvas(canvas);
    window.addEventListener("resize", () => ensureCanvas(canvas));

    const loaded = {};
    for (const m of MODULES){
      setStatus("IMPORT " + m.key + "...", "boot-warn");
      loaded[m.key] = await importModule(m);
    }

    const runtimeModule = loaded.runtime;
    const startRuntime =
      runtimeModule.startRuntime ||
      runtimeModule.default?.startRuntime;

    if (!startRuntime){
      throw new Error("startRuntime missing");
    }

    setStatus("HANDOFF TO RUNTIME...", "boot-warn");

    startRuntime({
      canvas,
      root: runtimeRoot,
      mode: "index"
    });

    setStatus("AWAITING RUNTIME RECEIPT...", "boot-warn");

    // single authoritative receipt
    const TIMEOUT = 12000;
    const start = performance.now();

    while (performance.now() - start < TIMEOUT){
      const receipt = window.__RUNTIME_RECEIPT__;
      if (receipt?.status === "RUNNING"){
        setStatus("RUNNING", "boot-ok");
        return;
      }
      if (receipt?.status === "FAIL"){
        throw new Error(receipt?.message || "runtime failure");
      }
      await new Promise(r => setTimeout(r, 100));
    }

    throw new Error("ignition timeout");

  } catch (e){
    setStatus("BOOT ERROR:\n" + (e?.message || e), "boot-fail");
  }
}

boot();
</script>
</body>
</html>
