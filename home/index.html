<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

  <style>
    :root{
      color-scheme:dark;
      --bg0:#0c132d;
      --bg1:#113068;
      --bg2:#1a0f31;
      --ink:#f8fbff;
      --mut:rgba(248,251,255,.82);
      --soft:rgba(248,251,255,.62);
      --gold:#ffd76a;
      --rose:#ff6fb0;
      --sky:#7fd4ff;
      --emerald:#7ef0c4;
      --violet:#c28cff;
      --line:rgba(255,255,255,.14);
      --shadow:0 24px 84px rgba(0,0,0,.42);
      --panel:rgba(11,16,36,.68);
      --panelStrong:rgba(10,12,28,.86);
    }
    *{box-sizing:border-box}
    html,body{
      margin:0;
      min-height:100%;
      font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
      color:var(--ink);
      background:
        radial-gradient(circle at 18% 18%, rgba(127,212,255,.18), transparent 22%),
        radial-gradient(circle at 82% 20%, rgba(255,111,176,.14), transparent 20%),
        radial-gradient(circle at 50% 70%, rgba(126,240,196,.12), transparent 18%),
        linear-gradient(180deg,var(--bg1) 0%,var(--bg0) 50%,var(--bg2) 100%);
    }
    body{overflow-x:hidden}
    a{color:inherit;text-decoration:none}
    .page{
      position:relative;
      min-height:100vh;
      overflow:hidden;
      isolation:isolate;
    }
    .stars,.stars:before{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      display:block;
    }
    .stars{
      opacity:.5;
      background-image:
        radial-gradient(circle at 14% 20%, rgba(255,255,255,.92) 0 1px, transparent 2px),
        radial-gradient(circle at 28% 66%, rgba(255,255,255,.82) 0 1px, transparent 2px),
        radial-gradient(circle at 62% 22%, rgba(255,255,255,.88) 0 1px, transparent 2px),
        radial-gradient(circle at 84% 72%, rgba(255,255,255,.82) 0 1px, transparent 2px);
    }
    .stars:before{
      opacity:.4;
      background:
        radial-gradient(circle at 20% 24%, rgba(127,212,255,.16), transparent 18%),
        radial-gradient(circle at 80% 26%, rgba(255,111,176,.14), transparent 18%),
        radial-gradient(circle at 52% 64%, rgba(126,240,196,.14), transparent 18%);
      filter:blur(20px);
    }
    .wrap{
      position:relative;
      z-index:1;
      width:min(1200px,calc(100vw - 32px));
      margin:0 auto;
      padding:24px 0 42px;
      display:grid;
      gap:18px;
    }
    .topbar,.hero,.hub,.footerbox{
      border:1px solid var(--line);
      background:
        linear-gradient(180deg,rgba(255,255,255,.07),rgba(255,255,255,.02)),
        linear-gradient(180deg,var(--panel),var(--panelStrong));
      box-shadow:var(--shadow);
      backdrop-filter:blur(14px);
      -webkit-backdrop-filter:blur(14px);
      position:relative;
      overflow:hidden;
    }
    .topbar{
      border-radius:999px;
      padding:14px 18px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
    }
    .brand{display:flex;align-items:center;gap:12px}
    .mark{
      width:44px;height:44px;border-radius:14px;transform:rotate(45deg);
      background:linear-gradient(135deg,var(--sky),var(--gold) 35%,var(--emerald) 70%,var(--violet));
      flex:0 0 auto;
    }
    .brand h2{margin:0;font-size:.96rem;font-weight:900;letter-spacing:.08em;text-transform:uppercase}
    .brand p{margin:2px 0 0;color:var(--soft);font-size:.82rem}
    .pills{display:flex;gap:10px;flex-wrap:wrap}
